body:
  text: 西河集卷七十九翰林院檢討毛竒齡撰傳七沈七傳沈七名禹錫字子先邑人居崇儒里其先七世連舉于鄉七生而好竒期大用崇禎已卯補諸生既乃棄舉子業讀書著詩古文辭當是時浙上軍大起永興以東畫溝土為壘自酉逮戌七嘗為相視其間卒厭其柢枑私念負才不得用當或有所為而視諸所為不道又不善用竒計棄不復顧讀書漁林間鍵門遍讀十三經諸子暨兵符陰陽家書以逮漢魏晉六朝唐宋諸名家集合萬餘卷城南蔡五十一仲光城東毛甡市東橋包二先生與七為四友時七念甡甡避近漁林七得之持而哭而蔡五十一避芝塘相去五十里即欲取道往芝塘中道而雨隱麻中七扼甡手拊其首長嘆曰古有云頭鮮惡骨而豫也骼骼然者而不知其瘦也既而鄉中不可居復居崇儒里益悉力讀書畢發生平所好書聚一樓嘗讀二十一史以板枯不能復購他本乃手畫其板自朝迄夜漏下十餘刻不衰而七不以為苦以為常既而嘔血旋愈旋嘔血至數斗復愈時治之者以為七困厄不平不得已讀書是必血逆妄上行也無大故既復嘔血如粒米復愈復嘔壅血塊而軟不可卒破遇錢塘醫者曰嗟乎是病鬱也治期月當愈七素恃已精力無敗理遂傾信之喜過望數服益信之遂至敗然是時醫者十數輩皆殊其候竟不得定七病而七病凡五年以戊子十一月二十七日死死之日其母哭曰兒將死耶七以右手拊左手審視尺寸曰不死也時年二十七七貌瘠薄兩手盛夏不暖性穎口好為微辭尤喜觀劇八嵗作文鄉里奇其才多稱之後每一文出必傳誦鄉里而七故祕之不以示及病甚或詢所著書大怒以為預已死也及死而愛之者以為七負才不得用用抑鬱死憐其才將輯其為文刻傳於世而其母又哭不示曰其遺意也乃刻其寄友詩若干首因憶七病時作雜詩遣其僕寄豫時來蕃在坐共詠之蕃愀然云沈七數詩皆哀絶似非生人時聞之不以為意不悟其言驗也豫與七就醫錢塘推七命當死豫初惡聞其言且七病中多嫌畏既歸為變其説而意不自樂七未之知也長嘆曰嗟乎人生有命胡為不樂哉嗚呼乃竟不知豫不樂者也楊孝子傳嘗讀典例無有以刲臂割肝旌孝子者故西河出遊人以刲臂事屬傳必謝之或不得已稍見之雜文如題吳門沙孝子卷如新安程舉人母事狀如為京口汪將軍記事如錢塘方氏母子五人節孝録序而獨于上海楊孝子則不然孝子名文蔚本浙之上虞人其父榮生員在明天啓間隨其所親宦上海而家之康熙丁未父病時年八十七孝子走厠牏嘗其糞甘號于天請身代不得竟死越十年母痢見血中死法醫者凡數輩皆前後相顧去孝子獨念父危死不救今復然生男何為也世已無針石燻灼豈湯醴亦告絶者闔户刲左臂以其肉雜參汁濩之三濩三進母初進而體下再進而浾滓以去三進而愈時康熙丙辰九月二十一日又二年戊午上海令任君廉其事請告之臺將奬之孝子泣曰是欲重我以忤德也且豫何如人其敢以忤德越典例再拜固辭固強之不受乃為之題其門曰以身壽母而請西河為之傳西河氏曰豫兩過上海未得訪所為孝子者而見之也豫友丁明府曽與之遊每盛稱其人謙而和恭而能容輕財好義而不自放于俠烈人以孝稱之必變色踧踖却不受每月吉必詣城隍祠禱之願減年以益母年然祕不令諸兄知若惟恐以獨行傷兄意者方母病時體羸甚又年髙將彌八十耄而瞶以為不療即療必不能康強如平日乃既愈又健皆眙􅌓不知所為丁明府曰孝子將刲臂夾臂以兩麻令肉墳起然後迫噬之而脫之以刀故其創甚巨骨露凡一百二十日始合創人不知也又曰初以臂肉巨雜參濩之揚其膏令竭屢濩屢竭今所餘臘肉猶有重至八銖外者嗟乎孝已别有雜贈詩文卷附傳後曹太常卿别傳山隂曹君太常卿與豫內從祖南京五城兵馬指揮陳君為姻交陳君為之傳傳者置也謂其行事可傳置也則傳置可已且曹君舊有聲其號秋水名惟才人能稱之其以第一人舉于鄉成進士仕泉州司理歷兵禮二垣給諫進太常卿人皆能指之其仁于先和于閭門勤于供官而竭蹶于國家多故間也人又能數之道之然則何傳乎傳其軼事君之初仕時以泉州司理攝漳州也漳故多冦而君以泉州理來咸望君且郡闕兵備冦之將至嘗占守未備以乘其隟君出廳事間服鄙袒衣偃仰四顧而命課夫漳之儒生儒生雖強起應之然竊笑且有怪之者乃益復召他郡他郡亦應之當是之時大宗伯黃公道周適鄉居講學芝山君復服鄙袒覆以深衣導𨽻詣講所麾諸儒生進其廡而環坐以聽既復往著榕壇問業黃公深許之且贈言曰文治之有華實猶黍稷之有馨香也豐儉不同享祀不可失也其重如此于是此漳之人怪之者咸更起而笑之曰此翁儒者也各棄去及其久始無笑者而冦竟以是慞徨不前及其去漳州而返泉州也君本理泉州泉州于是復有冦居民相驚議事者謂泉州閩衝也非司理君不可于是檄司理趣命駕返泉州或進曰司理君儒者講芝山者也恐不足當冦或乃因而阻之且竊言曰天下事豈得數數幸矣君返日坐廳事按簿書若無知者悉禁諸譁言隂為扞掫而冦且登岸有來探者故疏其坊音防令之入入城晏如故窺廳事簿書蒯𨽻如故乃曰唏此易與耳于是賊稍縱漸因居民之為內應者散伏焉將乘隟而舉以入君乃令黠者隂伺之已得其處閲日令假為賊藏甲所忽召諸坊民及偵者曰甲所應有賊也皆相顧愕偵之返曰然又令藏乙所復曰乙所賊當獲衆皆笑頃之則捷而獲者立庭下于是皆相視不知所為以為司理君儒者言事且中而君次日急召諸衆曰賊今日當敗可擒矣盍與我出城則衆皆伏地曰諾如公言夜半薄賊營縛其渠泉州平則凡閩海間知與不知以為司理君儒者講芝山者也能縛賊預識善敗儼若鬼神者若有物依之能預人禍福事者而于是咸服之曰司理君神齊于生曰君嘗自言曰擾人者將以定人之擾也而擾之是擾者也官人者我將有以官之而使人官我則不官也故其為官如所言嘗憶黃公遊會稽與郡司理華亭陳公多道君事君為諫官值國亂及其後始以太常卿治軍閩故多海冦在漳與泉州尤甚人無敢任其地者是故嘗乏員而君之仕閩最久君嘗曰冦漳者劉香冦泉州者林瓚元也更有僧不得其名字徵士包二先生傳蕭山包二先生名秉德字飲和别字即山與同邑崇儒里沈七禹錫城南蔡五十一仲光城東里毛甡為四友沈七長于甡而少包二先生一十五嵗每髙會包二先生坐上坐口呿呿體慙而目卑已欲言忸怩人以言及之亦忸怩而沈七坐將末摘擲號笑四顧無坐人者曽與包二先生作酒賦沈七四顧談不即屬詞已而持几出從容扶几伸白而吮黑自恃讀書萬餘卷當必無或過而包二先生向隅坐小息私納紙入博袖沈七不疑其遽成也笑探之先生乃大慚已而探益急不得避掣紙尾出誦之音詞琅然沈七驟輟筆捲白而去次日又賭作琴賦先生小息成不加點綴七故以捷勝既已屬詞然惡其速成也又去由是邑之推古學者必推包二先生焉戊子沈七死又四年壬辰包二先生死死時其尊大人猶在也先生面中赤勉起扶伏于簀叩頭若有言者卒無所言竟死先生系出楚申包氏世居安陸其後有仕宋尚書虞部員外郎者遷合肥生孝肅公為宋天章閣待制龍圖直學士子繶早死得出媵生子綖贖以為嗣凡七傳有台州醫學教授次子榮從兄宦遊遷于蕭其時有兄弟五人俱仕顯稱五桂包家其一名大中住包家弄則先生之宗也先生補諸生第一崇禎末棄去徵為郎贊江上軍復不應授書里閈間年既長與弟秉衡各娶婦産子女身無私錢比嵗懷授書金跪其尊大人慙獻之獨甲嵗跪赧然不起良久曰兒于中擅取數緡矣偵之周甲貧也又乙嵗復然易書也其謹如此先生與沈七俱好讀書而七以遘病作輟先生獨坐讀有常候比讀必過丙夜嘗授書友人宅其宅髙樓當城隅販傭僦焉每丁夜渡江其婦睡醒聽先生度紙聲并竹中鴟輒曰鴟未呼包二先生尚拽書起徐徐而七當病時夜寢勿讀也後販婦聞先生死出涕先生所著詩十卷賦一卷讀史詩二卷倣西涯樂府體也雜文二卷雜志五卷雜輯古今名物事理别為一家言名蟲弋編三十卷其酒賦與琴賦集不載先生諡淳博毛甡曰豫與先生為四友時邑之稱最博學者無過蔡五十一仲光沈七思勝之故日夕讀書過萬餘卷惜已死然且兩人者皆自謂不如先生然則先生之學何如也自昔十室相許必將成名豫四友者當衰時相結嚮榮而枯而先生與沈七更相繼以死悲哉先生之尊大人與其弟各以其傳志屬甡以甡為先生友也嗚呼先生曽為詩定交效國風體詩曰香草曰桑扈曰松與柏伍各四章一自勗一勵友也豫向思和之而未就也豫至今慚之家義門彥恭公傳義門毛彥恭浙江遂安人也本名文􅕩以字行祖希成好行義篤于倫敘誡子姓勿析産傳至彥恭族愈蕃計男女二百餘口恐不能繼乃創立同居家規雞三號男女齊起問安于家長各就東西舍操作漏一下罷去自冠姻瘞祀以迄衣被饋食之細分甘均荼釐毫必悉中外罄咳不敢忤且復建義倉以周閭里凡逺方來學者延師儒以董教之而給之以薪膏之資兄弟五人共營一瘞地中穿其壙使達氣不隔而别瘞妯娌于山之麓曰吾欲使百年後吾兄弟魂魄猶相依也嘉靖十三年十月太保禮部尚書夏言請于朝詔旌曰六世同居義門給官銀三十兩建棹楔優免丁田雜差如例嘗入夜見東西舍操作燈火煜煜如舉子號屋譁笑之聲不達户外嵗時男女候家長從東西舍搴簾出男各覿其婦不甚辨驟見恧縮以平日無晝面故也其家規之肅有如是者太史氏曰豫與祥符令會侯為兄弟行會侯每言其先人吏部公為義門曽孫與其子司訓次子文學並以孝稱豫心儀久之暨豫入史館草義門傳然後知孝義蓋有本也義門後頗大而大以此尼演傳平陽翟輝商銅于江寧女殊色浙軍正藍旗強委之禽女初不從既來旗則辮髮革胝二月十九日隨衆女騎至上天竺控驔行前道驚盡回面騎周呵之中一女騎朗言曰本欲朝奶奶北人稱觀音曰奶奶而生奶奶從道中行寧無觀乎既而孀居旗爭奪之女自剄再聽髠為尼遂名道演天童忞公以國師乘傳衛使貴人掌導者止吳山觀尼將參公步經花市一市皆驚漸有攔觀尼前者尼怒遽返既又參靈隱禮公于郭童園公曰是未可與言也逮前作色曰從誰來耶曰身獨來曰身與和尚有何親而令獨來尼不能答羞之紅界于面公喝曰狐情尚不減何用參為尼嚙臂鍵户嘗有盜入尼室驚其豔屏息伺大士座傍見尼入靜將易衣蔑火復搆火掬鉢水塗掌咒炷蓮片投體大士前登床結跏儼若大士者香氣葉葉繞上下夜分盜熟視悔之直前叩頭曰姑姑佛也吾見佛從此懴盜矣期年尼忽曰早知如此靈隱禮公深然之將豫之衣不受無疾卒西河氏曰邑有蔡氏女許山隂余氏而未歸也余死女為尼于余山隂張南士曰有姑許邑王氏者亦未歸王也王死喪之亦為尼惜哉其為尼也雖然若尼演者則又幸為尼者與不然奪之矣張名族與蔡有戚蔡大父萬里為刑官余從父煌死國難有名近異教有女子髠髮不嫁者郡有某某氏此則悖理蔑倫之甚者豫懼得與二女事且為例也距二女事十餘嵗然後有此教近嵗中璜曰蔡氏尼即蔡貞女也西河别有詩見五律卷陳老蓮别傳洪綬好畫蓮自稱老蓮數嵗見李公麟畫孔門弟子勒本能指其誤處十四嵗懸其畫市中立致金錢初法傅染時錢塘藍瑛工寫生蓮請瑛法傅染已而輕瑛瑛亦自以不逮蓮終其身不寫生曰此天授也蓮遊于酒人所致金錢隨手盡尤喜為窶儒畫窶儒藉蓮畫給空豪家索之千緡勿得也嘗為諸生督學使索之亦勿得顧生平好婦人非婦人在坐不飲夕寢非婦人不得寐有攜婦人乞畫輒應去崇禎末愍皇帝命供奉不拜尋以兵罷監國中待詔王師下浙東大將軍撫軍固山從圍城中搜得蓮大喜急令畫不畫刃迫之不畫以酒與婦人誘之畫久之請彚所為畫署名且有粉本渲染已大飲夜抱畫寢及伺之遁矣朝鮮兀良哈日本撒馬兒罕烏思藏購蓮畫重其直海內傳模為生者數千家甬東袁鵾貧為洋船典簿記藏蓮畫兩幅截竹中將歸貽日本主主大喜重豫宴酬以囊珠亦傳模筆也蓮嘗模周長史畫至再三猶不欲已人指所模畫謂之曰此畫已過周而猶嗛嗛何也曰此所以不及者也吾畫易見好則能事未盡也長史本至能而若無能此難能也吾試以為文言之今夫為文者非持論即托事耳以議屬文以文屬事雖備經營亦安容有作者之意存其中耶自作家者出而作法秩然每一文至必銜毫吮墨一若有作者之意先于行間舍夫論與事而就我之法曰如是則當如是則不當而文亡矣故夫畫氣韻兼力渢渢容容周秦之文也勾綽捉勒隨境塹錯漢魏文也驅遣于法度之中釘前燕後陵轢矜軼摶裂頓斫作氣滿前八家也故畫有入神家有名家有當家有作家有匠者家吾惟不離乎作家以負此嗛也其論如此蓮畫以天勝然各有法骨法法吳生用筆法鄭法士墨法荆浩疏渲傅染法管仲姬古皇聖賢孔門弟子法李公麟觀音疏筆法吳生細公麟七佛法衛協烏瑟摩法范瓊諸天羅漢菩薩神馗鬼䰩法張驃騎道經變相法公麟衣冠士法閻右相士女法周長史昉嬰法勾龍爽倭墮結法長史髾鬋長史衣帶盤薄法吳生金璧宫臺林泉湍峙長陂豐卉法大小李將軍雲山法浩水法董羽溜水法河陽郭熙几幛尊卣瓶罌什器戎衣穹廬畨馬駱駝羊犬法趙承旨馬承旨小馬法承旨之子竹石窠木法趙大年鈎勒竹法劉涇墨竹管仲姬折枝桃牡丹梅水仙草花法黃檢校錢選鳥睛花鬚點漆凸厚法宣和蜂蟬蛺蝶蠐螬螳螂蟋􅀈法宣和亦雜法崔徐黃父子鵪鶉鳩女法閻助教士安雀法雀兒黃蓮法於蓮於青年以蓮稱莆螺法母延之湖中二客傳饒估彭萬年禱吳城之張令公祠夜夢令公授之坐詢曰剽人財而室人室何等律乎答曰斬耳頃裸一人反接至使畫字萬年畫斬字于背及獻級則其伴鄒三也先是萬年與三伴分舟而行萬年避風𣟵蠡左三舟渡湖是夜盜劫兩舟去一三一黃壽三與壽俱被殺而壽舟有吳人秀才趙瑩者匿壽子并婢載他舟行蓋壽者襄陽估也萬年寤驚覓三舟湖口知三已死哭之遂斂三木挈三家人置後舟偕之維揚暨回舟而飲三婦于艙詢曰夫人非三妻而得隨三何也婦愕失箸既而視僕萬年令三僕避後婦流涕曰妾建昌追工妻也夫積工值攜妾歸附三後舟夫病而三據妾身并值有之夫棺在板子之沙家遺老姑存亡不足知君何得詢及之乎萬年曰吾唯稔其情以有此詢也雖然亦思歸乎曰思之萬年遂呼三僕語割贏財千金半與三家人而以其半給婦歸建昌使養姑焉方三舟之渡湖也三聞壽舟絃鞉聲及窺之則有婢福妮善彈别名瑟瑟因與之聯舟暨被盜而秀才趙瑩者傭算者也藩估購妓樂豔婢容髮競卭值以購既筮日有成説婢急謀瑩瑩亦為婢計顧自視無槖中金而前後舟悉秦越無可主者乃懷刺謁九江守告之守謝藩估去牒瑩押婢并其子與家人等還歸襄陽瑩乃為歌令婢彈名瑟瑟彈丐諸故人之有財者詞曰大堤估兮襄陽商風吹鐵鹿兮渡潯陽何人劫公兮身首以創遺末婢兮蘆之傍低無丫棙兮髙無檣夕不藉絮兮晝不咽稗與粳孤兒無恃兮惟末婢之將將歸洞庭兮還故鄉洪濤洶洶兮青天茫茫願假羽翼兮翺且翔一彈再鼓兮心悢悢齊于生曰瑩以匿婢故曽見豫舟次且不疑豫為無財謀資婢歸蓋其人長者也西河有瑟瑟詩見排律卷江右王猷定嘗言觀察宋公能道張令公見夢事其人為士人非彭姓今核之則萬年者實迹也豈事偶相類抑亦傳聞之訛與夫天下衣冠方幅藉藉稱士人而錙銖成市所爭豪釐生死頓易其為萬年所不潔者則亦何限萬年雖估乎估而士人行即士人矣張令公者或曰唐真源令張巡也其祀湖所始則無可按者桑山人傳山人許氏汴人少舉茂才崇禎中嘗獻𠞰賊三策于閣部督師楊公不用既而為東平侯劉澤清幕客與澤清語不合辭去鄉人怨家發其隱事于王師之鎮汴者走匿桑下因姓桑號桑山人山人乃與嵩陽曹道士遊夜坐耳鳴絲竹徐發若有物拔其頂聳身丈餘骨節皆通嘗賣藥嵩山廟市以水酌喑者能言許州小男為狐所苦呼狐斬之既還汴怨家見曰此許澄茂才也帥捕十許人迹至山人乃獨身指揮盡縛諸捕者揖怨家去謝之而身遊衡陽不返云何顛傳何顛非顛也有顛名為人潔居冬夏衣絺衣裂緯蓑蓑顧自以為妍好人佯唾其裾則急揊之嘗揊衣日影中飈塵揚揚揊勿得已每踰梱攝前後衣左足預著梱中履危杙然以右躍之􅀈如也旦起靧水濱引手左右捉水駴躍若捕泅蟲然後激灑其首項以面霤焉越食頃攫懷中幘浣之引著頂去小復至如之則又復至冰雪不間日食斗黍酒百瓶然不必得也夜不就枕與人言輒了了豫與顛遇來氏其中表也揖讓進退如常人或曰其曽大父為明世宗朝南京工部尚書其大父鼇為刑部尚書其父以垢厠摩𢷾纍日死溷中于先生曰是畸志者也屈平不潔其族人日三濯纓顛近之栁宗元傳李赤至曰以世為溷以溷為帝君清都唯世淟濁若溷者則唯處溷中然後潔清之極致也前人外記多寓言豫目徵之言之實故語特猥瑣世或以何氏父子相繼顛焉何哉西河集卷七十九
