body:
  text: 西河集卷九翰林院檢討毛奇齡撰杭州治火議杭州多火災嵗必數發發必延數里且有蹈火以死者豫僦杭之前一年相傳自鹽橋至羊市縱橫十餘里其為家約六萬有餘死者若干人豫雖未親見顧燋爛猶在目也乃不數年而自孩兒巷至菜市東街與前略相等豫所僦住房已親見入煙焰中其他則時發時熄不可勝計以詢居人即中年者亦必答曰豫生若干次矣其最徼幸可喜亦必樹一指曰慚愧已一次矣從未有云無有者頃者黃中堂門樓偶不戒而五人齊死一樓不得下踰日而藩司東街又復延熳里許焚燒數百家又踰日而太平門外忽燻焰蔽天不知所究竟今則褚堂上下復炎炎矣何以致此或曰此天象也前漢天文志謂吳越分野在戍而太初歷法以太嵗出戌當房心之間心者火也又吳楚之疆候熒惑占鳥銜熒惑火宿而鳥銜為南方鶉火之首凡此者皆主多火而豫獨曰否夫既曰吳楚吳越則當及楚越兩地楚疆跨荆揚之間而東南百越逺界嶺徼未嘗限一吳郡也且即此吳郡而南極富春北踰江淮為地甚廣乃區區以杭州一城當之其可通乎或曰此地理也郡南鳳皇山蜿蜒南峙南屬離方以離方之龍而衝城而入焉得無火然而亦非是者嘗考浙河左右其自新安以南太末以東凡在山縣多有離龍南起排闉抵治者然未聞有災害也且此鳳皇山非離龍也其山在正陽門西清波門南以卦位言之則為西南之坤土以大衍五行言之則為天九成金之坤金土龍金龍皆非離龍故豫郡西南有鮑郎山土龍入城而豫邑正西則直有西山金龍橫撞其右未嘗礙也於是無所歸咎有議開火巷者謂曩時每街必有火巷間截之今多為民間侵佃以致堙塞火患之多實由于此則試思火巷之廣孰如大街大街廣六丈有餘尚不能截火而謂數尺之巷能截之乎且火之熾滅全不繫街之寡多與巷之廣狹蘇州閶門揚州埂子祗一街耳然且兩距相望連手可接而皆終古無火患何與更有歸咎于六井之不開者謂唐時李泌為刺史特開六大井為澆火之藉今六井久塞無由灌救則杭州城寬延袤若干必非六井所能濟且比户有井綆缶之功不能急升即舊時當事敕每家門首貯水一缸而車薪杯水毫無所用甚至西洋水車飛灑空際而並不及火翻致車轂盆盎填梗道路寥寥六水窪將安用之若云水可厭火則西湖一大水與全城首尾然且三門引氣一閘通流尚不能厭而謂六井能厭之此婦孺之語也然則如何夫火不自致必有所以致之者嘗疑失火塘報各省無有獨杭城則屢見報文下此惟湖之漢口偶有報延燒至數千家者則必杭之房與漢口之屋有異于他而備查兩地則漢口専用竹而杭則兼用竹木自基壂以至梁欐棟柱櫋櫩無非木也而且以木為牆障以竹為瓦薦壁夾凡户牖之間牖用􅎉槅而半墉承牖又復以板與竹夾為之間或護牖以笆護墉以籬層層褁飾非竹則木然且單房少而重屋多兩重架格猶復接木楹于軒宇之上名曰曬臺計一室所用其為磚埴之工者祗瓦稜數片耳又且市㕓儥闠多接飛簷橋梁巷門每通復閣鱗排櫛比了無罅隙夫以滿城燈火百萬家煙爨原足比沃焦之山象鬱收之穴而且上下四旁無非竹木既已埋身在烈坑中矣加之儈販營業多以炊煮蒸熬燻焙燒炙為生計而貧民晝苦趂逐往多夜作諸凡治機絲煆金錫皆通夕不寐又且俗尚苟偷大抵箕籠厝火竹檠點燈暑則燃蚊煙寒則烘草薦無非硝炭而况俗尚釋老合鄉禮斗聨棚誦經焚香燒燭沿宵纍旦此風在當事尤宜禁革又何一非致火者考春秋宋鄭火災梓慎曰木即火也宋太皡之墟鄭祝融之墟皆火房也夫太皥以木德王祝融以火德王而皆稱火房則以木者實火之所由生也是以震本木也非火也而一搆乎離則以震雷生離火而離反足以滅震如晉獻嫁女于秦穆而秦伯伐晉反獲晉侯于韓原當時晉史占之者謂歸妹之暌以雷澤而變為火澤為雷為火為嬴敗姬以震本木質而具雷火之性雖生火而反為火滅比晉雖嫁女而反即以女而害其母家蓋明言夫木之必當召火禍也是以治火之法先計嚮邇後計撲滅嚮邇謂嚮而近之也撲滅者撲使滅也惟可嚮邇然後可撲滅否則近且不能何有于撲故盤庚遷殷有云若火之燎于原不可嚮邇其猶可撲滅謂原田草火其勢卑小雖不可近猶可信手撲滅之若房室炎上則五行志云及濫災既起焚宗廟燒宫室雖興師動衆不能救也亦以宫室宗廟多用木飾一經炎上則木火難近而必不能救蓋諸火無威而木火有威冶工聚火而鑄用木骸即炭而不用木則雖金鐵銷鑠而執工者得近之何則以無威也祝嘏焚明幣于庭紙錢錫鏹皆可指撥而及燬靈座杭俗以木主藏木室祀寢三年謂之靈座深合古禮反主于寢之義為木無幾然而尋丈之外各環向而不得前何則以威著也今以木火而及屋則威著已極近且不能而欲施手足之烈難矣然且闤闠連綿左房未燼而右室已爇木中之火以外熱而炙于其裏往往火所未及而木先出煙以外火與內火兩相煏也如此則爛熳無已時矣故春秋有書災有書火者其書凌室災則天災也夫凌室本冰室而猶有火此其所為天也其書成周宣榭火則人火也夫有木曰榭在爾雅已明言之既稱有木而猶欲其無火得乎此人為之也故左傳曰天火曰災人火曰火然則杭州之火人火矣若夫􅝩房則不然古作室之工多用陶埴㼾甃以銜木自棟梁榱桷以外皆取瓴甋墁附之考工記稱為瓦屋今稱為􅝩房凡宫室之牆壁屏蔽以及庭塗堂壂無用木者如梓材云既勤垣墉惟其塗塈茨謂合苫土以墁之則外牆不用木儀禮士適寢居北墉下注土牆曰墉則內牆不用木莊子鑿壞而遁壞者土壁也則房壁不用木毛詩中唐有甓謂甃中庭以􅝩也則庭塗不用木廣雅堂以堙壂唐史北廳以花甎甃地謂堂址也則堂壂不用木説文屏障謂之坫禮記反坫在兩楹之間謂以􅝩作屏蔽以土作楹臺也則屏與楹總不用木若左傳云圬人以時塓館宫室夫館與宫室其宜時葺者何限乃不戒木斫而戒圬塓則土之勝木久矣是以寢廟藏主則并朾柱亦去之春秋謂之宗祏即石堂也太史藏典籍則并梁欐榱棟皆去之周禮序謂之巖屋即石室也若夫毛詩之縮版以載謂以版築土非用版也秦風之在其板屋謂西戎地寒瓦凍易裂或以板代瓦非謂中國之屋可以木板作牆壁也蓋中國屋製四海一轍北土南􅝩俱足禦火他不具論即以豫郡言之凡造屋者以復􅝩為垣單􅝩為壁厚􅝩為壂薄􅝩為薦一室之中惟棟梁椽柱是木耳他皆􅝩也脫或不戒則棟間于牆柱間于壁梁與椽各間于瓦薦凡木火所向㼾灰瓦確皆足以抗之而火不成勢火不成勢則救者可近救者可近則此屋之火不能熱彼屋之木即任其自焚亦不過數間止耳古有云雨衣易漏易之以瓦則不漏今木屋易火易之以􅝩則不火此非理之至明而事之易曉者乎嘗記豫里居竈門失火俗以草代薪原易蔓延且司爨者又稚婢也乃草燼而屋並無恙則以竈門向屋隅兩面正側皆􅝩所燋爛者獨椽柱耳蓋􅝩房之可恃如此然而習俗相沿其來已久庸人狃于故常而憚于更革即一二有識者或痛思改作稍知求一勞永逸之計而寡不敵衆一室之磚不能抗萬間之木是必藉當事大力留心民瘼以一切之法嚴行之其已成者勿論已但新被災之地則必大張示諭并敇該圖里總勒買􅝩塊且立喚紹興工匠使另為製造不得因仍舊習私用竹木違者以非法處之并拆其所造屋則以漸移易庶幾有濟夫開河大工築萬雉而建二十臺城于其問亦豈細役乃前此趙大中丞毅然行之而官不糜費民不騷擾兩河十門臺髙而水深至今望之者曰此趙公城泳之者曰此趙公河也苟當事關心深析利害則一矢口間無興作無科斂無徴發期會祗假以威神而澤之被已千秋恩之浹且萬户矣則亦何憚而不為之乃阻之者有二説一曰􅝩貴而竹木賤也夫杭屋外垣純用土築而舂基埋石畚土蓋瓦材費不資所絶無者獨􅝩耳然且日聚多人一唱三嘆邪許聲連連計物值工價每縱橫尋丈約不下十金有餘若丈牆之􅝩則空斗復上丈􅝩三百塊不彀一金而且土工一工可築數丈牆其工價裁數分耳以十金之牆而以一金零數分當之孰貴孰賤若夫壁則單􅝩側疊尋丈之􅝩必不敵尋丈之板之值而苟舍板而用竹則竹木土灰四者齊用杭州土皆貴賣而削築圬墁諸工並進恐物值工價未必有歉于􅝩也夫以一焚而家資千百盡付燼炭則雖十倍之費猶當痛自袚濯改柯易葉為百年不拔之良䇿而况工值計較為牆固甚省而為壁亦不費即曰創始實難採辦未給或不能頓集諸物而商估趨利如騖稍有微贏則其物無脛而至况􅝩埴瓦片多出之過江之湘湖而嘉湖二府亦有陶窑苟能用之則纂纂四來將見草橋螺螄太平艮山四門外堆垜如丘山物盈則賤豈止易辦而已乎一曰杭州寸金地闤闠稠密竹木占地少而􅝩則占地多也是又不然土牆髙大者約址占三四尺否亦一二尺􅝩牆則髙大者四五寸否即三四寸也板壁􅝩壁各以寸為度相去不逺竹壁則用木朾而編竹夾以墁之合須一寸土灰兩面合一寸共二寸􅝩則以寸厚之塊側纍而上但得寸而無加矣然則不占地亦莫􅝩若也是以被災之地必易􅝩房然後積漸次第徐圖一轍必使滿城皆􅝩而後已此固救時良䇿稍有識者必不以其言為河漢也然而未災之屋亦當商所以救之之法大抵杭人多賃屋而居屋非已有即屋中什器亦所值無幾脫不幸即竄身已耳以故不關痛癢而間有住已屋者又往往以因循忽之故救之者一曰徇火令先立三十家牌以牌中各户輪流為首每首值十日每日早晚則值者至各家呼曰請查火俟其家查看一遍答曰查訖然後至第二家亦如之其法用牌一方橫列三十家竪列三十日縱橫界之以作格每查訖則于某家格下某日格中覆以朱圈以為他日火罰之案焉乃不幸失火則杭城多遊手人噪聚乘間名為救火實搶火也今且旗丁甚夥馬蹄一蹴踏而其地已糜爛矣故救之者二曰斷火巷每三十家中合置兩大木先截其街巷之兩頭而橫關之里總報附近官府官府即差役樹兩牌于兩頭第許內出不許外入外入者即坐曰搶火許守關者持大棍撲擊之死傷此地者竟置勿論至于內出者則各給籌一枝驗其運帑或有親䣊請入運帑者許持籌者引之驗入若有救火輩來則預作標識如鹽橋仙林橋各坊義民素有册籍許標識其坊名書于燈而稱竿以持之并所㩦鈎鐮繩索救火械仗次第驗入毋使溷亂此要領也若其救法則春秋原有備水器蓄水潦諸事而此地皆無所用惟有撤小屋塗大屋六字則最為切當大抵木火難近撲既不能溝澮鮮少澆又必不得惟撤屋為第一良法量其火之大小以定所撤之逺近逺踰若干丈近踰若干丈須在官者預立程度以一切行之法在必撤毋許阻擋阻擋者以違法論至事畢則一里內保全之家又量其逺近而合錢多寡以償其所撤屋無偏戾焉若遇大屋則以水泥塗之以水衣布幔之杭俗屋大則牆壁髙峻可以堵禦否則亦撤之以待更為無失但大屋必屬大家其合錢補償之事可不必耳則三曰撤火屋而救法已無他矣至于其四則曰嚴火罰從來起火之家名曰火頭其罰甚重今既設徇令則必查其起火者為何牌何户誰徇誰答未徇耶則罪在徇既答而不戒則罪在答雖罪不致死然必重創之以懲其後來考明季火頭之罰以鋃鐺繫頸遊于十門然後從縣解府解道解司至撫院而止每解衙門必責二十箠以為常誠重之也今罰宜仍舊與否或不必然然而嚴則必然耳西河集卷九
