body:
  text: 西河集卷一百七十一翰林院檢討毛竒齡撰五言律詩四送何生赴沂州邵使君幕曾子浴沂後嘉賔入幕年黃梅江上雨行李泗州船祖帳傾吳酒官程接魯田使君今管仲應著牧民篇尤司理園林飲次和韻四首是地真幽絶臨流亦快哉長林迷草樹逺水見樓臺栁色遮成幔荷花卷似杯泉明有三徑早已賦歸來二吳苑饒名勝斯遊倍爽然平橋低著水高樹暗參天露席驚鷗起繩牀對客眠舊時池館在只許辟疆傳三東城環壠畔北柴傍湖濵金谷園中酒藍田莊上人雲深常帶雨日隙不流塵處處蓮塘滿何從下釣綸四紅泉疑物外碧草遠人間圖史長年靜琴樽入夏間開扉通下塢隔郭見遙山倘許留旬日無容覔棹還登箕山為訪箕山隱淹留潁水間千秋高士地一片白雲間暝鳥枝頭囀春花石上斑清泉堪洗耳不欲竟來還箕山有懷處治能忘賤居然遂爾超知時來避禹生世幾逢堯石蔓披香褐山菘掩翠瓢嵩高棲息地一望在青霄玉溪村家碧篠參天密清流抱屋斜衣冠忘歲月門巷遍桑麻晚日東亭酒春風西曲花終年愁避地思煞此村家憩叢祠叢祠臨大壑高閣俯層波破壁銷圖畫殘碑罥薜蘿山深通鳥道地僻有漁蓑却羡投竿者悠悠意若何荷澤荷澤將迎暑陶丘轉上征野花薰日墜深樹引涼生負郭荒村淺連郊古瀆平賣漿師尚父空向路傍行土寨土寨分徒輦山橋度馬蹄花邊回望逺棗下引頭低客舍虀舂繞人家酒斾迷紅塵遙合處日落太丘西宿儀封懷王少保變姓遊梁楚棲遲孰問津高門懷少保下館對封人葛蕊餐當午榆花墜晚春驅車千里客望起浚川塵定陶道中并謝魏文學兄弟奔走未寧息幡然濟上行陶朱遊子姓毛遂野人名風落楊橋暮煙籠麥坂晴望門堪止宿孔氏弟兄情征行曲車騎出龍沙屠耆轉戰賒長雲迷白漫大雪下黃花夜火連邊障天兵識漢家延州有軍吏勿使右賢遮二旌斾繞邊風將軍逺鑿空五原徵少俊十乘啓元戎月落關山白烽高塞谷紅磧西皆內地不必備回中三北斗覆黃河征行日荷戈全軍通敕勒救餉過滹沱玉鏃遮鴻雁金裝繞駱駝寒風吹角罷猶聽短簫歌四王者慎佳兵志士喜從征赤羽馳河外黃榆落薊城飛狐方轉戰飲馬自橫行五郡良家子何時返玉京長至夜答徐生體仁見懷朔雪下層冰嚴飇轉玉繩躬耕懷孺子麗句想徐陵律動牽緹縵衣寒覆㲩􅚊陽春初起和愈使野愁增題吳九彥聖所藏黃檢校寒林畫幛過臘回清境何年製粉圖晴鳩翻領繡雪糝墜花柎散彩分毫末輕寒辨有無深林求勝事令我念成都夜雨集桐音百里鑑湖潮輕風度畫橈衡門春寂寂山雨暮瀟瀟帳暖融桑落燈流動草苗明朝攜屐去應醉緑楊橋平津簞醪河飲次作十載論文契千秋尚友情長貧思鮑叔多難感虞卿夏雨槐廳靜朝花莞簟清簟醪相對飲偃蹇愧平生寄贈朱大禹錫出宰山陽漢室臨淮郡銅章分治遙軒車洪澤雨錦纜射陽潮叢桂依官閣魚鹽散市橋南陽朱季在應聽府中謡董良檟明府候選歸里振策遊蓬苑看山返鏡湖秦官需縣令漢相重江都日下開金簡花間啓玉壺鳯毛才五色羡汝早棲梧嗣佳日克千為伯音先生長君若耶溪春水緑紋斜行行度若耶樓頭吹栁絮溪口種荷花翠袖方扶槳明粧出浣紗是誰騎馬去招我過東家閨晚少婦新粧罷東墻日薄時暮光流雀噪晚樹織蛛絲油壁歸來早紅繩拋去遲城南桑壠下猶駐五金羈川上望月旅宿清川月流光冷欲侵臨軒時倚徙竟夜起沈吟水靜浮寒壁風來蕩碎金前洲驚泛景定有未棲禽懷沈司理嶺外粵徼驅驄馬循城佐鹿車蕉花扶使節竻子削刑書海日霜旌麗瀧臺水鏡虛紫雲東嶺望時見起金魚送向陽遊天台歸還舊京華頂看朝旭天門聽海雞浮槎環碧草挂席返青溪流水樽前逝桃花去後迷中秋明月滿疑在石梁西同友送康臣肩吾二國子赴都和韻十載聨鄉譽同時詣帝居暫為三舍客不讀四門書漢苑推司馬膠西聘仲舒楊園春暖候看上總明車二淥浦開行餞朱花拂去鞍著成郎省賦名在太常官觀起東西偉人分甲乙難長安遊顧陸仍作洛中看送龍川令之官再捧郎官檄重尋茂宰船看花還雁塞飛舄下龍川盧橘垂江館丹蕉拆露田揮絃吟舊曲莫忘葛公篇獨駕小艇行大舶橫關不得前賦用自慰小艇蓬根婦垂鬟亂似麻誰家艫畔女雙臉豔如花倚棹歌殘月新粧照淺沙片帆相顧遇各自惜年華顧侍御巡鹽將還京甡以羈遊不得奉餞申此二詩嗣佳曰顧西巘先生以文章名世舊知西河直指逹霜威聞將返禁闈雕鷹當午擊驄馬逮春歸斥地留葭鼓朝天整繡衣鄉關期飲餞竟與寸心違二柱史巡吳海星軺起宋宫波連霜簡白花映繡衣紅三坐需鳴鳯諸侯合避驄自憐流滯客腸斷浙潮中柬許記室欲賦共王殿還登杜甫臺岱雲搖北斗海日近東萊齊魯文章勝鄒枚賔客才湖陵城下過俟我一徘徊蓮河祝贈為朱敬身尊人也丹鳯起南柯靈椿長舊柯清觴銜栗里高閣近蓮河植杖生風雨裁衣捲薜蘿海鼇垂釣去有子勝詹何夏首送李三還興化時京口有警兵甲未寧息憐君思故鄉到來江路永歸去海天長葛葉裁新服荷花蔽野航舊時雙劍匣仍入一空囊二古驛平潮外長帆細雨中愁心浦草緑遮眼石榴紅烽火吳王塹煙花煬帝宫前途如未逹歸去莫匆匆聞天章還家清源倪生久失意託迹江淮間一旦便辭去飄然歸故山清泉流古縣晴日滿郊關我本無家客愁看飛鳥還勃安書至云天章一草亭分與居且曰薜荔花開緑隂滿庭室邇人遙不覺泪下今日復前日故人還故鄉草亭無恙在聞道與劉郎夜月江淮渡春風薜荔墻夢中尋路逺那得到東昌題眷西堂并序閻氏自山右來淮名其堂眷西不能忘舊乃從堂主人再彭之請云耳甲第移家逺茅堂倚郭新久為淮海客仍是太原人荷蓋看留楚瓜生想去豳天涯多蕩子誰得買君鄰二鹽策開鴻緒魚鬵念舊鄉人倫重東國彼美在西方啼鳥聽幽谷流泉繞夕陽千秋垂乃眷聊以志斯堂旅次送劉孝亷赴試把酒江城暮逢君赴帝京春華思庶子歲晚見劉生好友多聞逹中原罷甲兵驊騮相顧去記取贈鞭情信宿信宿幽人境流連野老家蜂撩澗底絮魚沫水中花踏竹翻田罼看雲拂釣車平疇通曲塢猶見好桑麻南村叟最喜南村叟長耕西社田蒲衣遮雨後稻種浸春前安分能完課憑勤減貸錢終朝力作苦一話太平年將過鵝湖經釣巖作望望鵝湖勝青崖去不窮人行鴉樹底山在水光中巖寺浮天碧溪莎隔嵗紅幾時幽覽遂重訪葛仙翁送外生多難隨郗氏他鄉别魏舒外家憐爾勝相宅竟誰居夜雪廬陵酒秋風甓社魚一為殷浩詠雙泪落衣裾秋夜薑侍御席上贈胡璲二首東道開丹幂南臺敞素秋白榆天上落青桂月中浮旅燕棲華屋蒼鷹下錦韝孝亷誰第一伯始在中州二烏府陳瑶席黃星映少微萱花和晚鱠蓮葉翦秋衣夜靜江聲逺霜清燭影稀金鈎一十五親見巨魚飛原韻酬德俊命世甘時詘循墻守德隅人誰憐抱璞俗尚好吹竽北海君家論南州漢季儒青春方努力莫忘鯉庭趨徐九芳烈採得雙頭紫芝三秀何年種雙花獨自攀階庭分謝樹兄弟共商山嗣佳曰徽之為涵之次兄華蓋春雲紫金莖曉露殷芝房歌再起苦憶漢京還夀蔡貞女詩有序蔡貞女者豫里蔡青蓮君女也許配山隂余孟宣未及婚而孟宣病殂摽梅未將叢蘭已敗貞女告其父素車請往往則賦兩髦而守志焉歌傳蔡婦嘗看芣苡之花絃斷中郎不辨鴛鴦之線豫故撫女貞之木而流涕彈思歸之操以傷心况孟宣家有忠節翰林赴水謁帝蒼梧明府歸田攜朋白社遂因貞女之五旬謬踵高賢之四韻雖知無當於雅嘆聊以紀豫之里吟矢作余齊室真成蔡宋賢三春垂嫁子五十未亡年衛女流泉操貞娘茂木篇彈琴稱夀酒泪落一觴邊夀錢節母東海稱閨範南山啓夀書瑶臺龍管合漆室蟹筐虛上客敲銅狄諸兒御板輿青陵他日路堪作廣成居柬黃二之翰絶愛湖東墅頻思江夏黃間情春樹賦高閣午橋莊碧乳傾蒲盞紅船載豆娘榴花新雨後相隔在端陽二謝爾傳瑶柬邀豫泛桂舟萱亭迷浦溆艾雨暗汀洲採藥留丹井分衣入畫樓東湖逢令節愁絶此中遊發茱萸灣并寄徽之大敬南士桐音曉樹前村白孤舟獨夜醒一身叢怨悔草載竟飄零江濶流宵露衣寒覆曙星茱萸何處採愁思滿前汀雨中望廬山秋雨入鄱陽浮浮接混茫丹崖迷北滙青影散南康波面雙帆渺天間九嶂長望中真汗漫何處問柴桑泊匡廬下屢涉三潯水還依五老峯流飇衝洞壑寒雨漱芙蓉城僻回陽雁江空度暮鐘捨舟毋恨晚自有白雲從遊敬亭秋色滿晴澗我來遊敬亭長林消雨緑空磴出雲青靈迹開金剎高吟倚翠屏陵陽手可接何必眺明星得家人所寄衣頓有秋衣至誰憐王彥寒寄遙無使到縫密避人看約帶鈎全緩連絲泪未乾可憐裘敝久不用到長安二蒙袂誰相問招魂未有名故衣鄉井思新練藁砧情歲暮羊哀去天寒范叔行無須勞旅婦長誓水清清廢第廢第誰家舊緣城是徑通臺欹公府側簾斷妓樓東倚井芭蕉緑燒池菡蓞紅田文捐館後誰聽雍門桐阻水小澆津館懷徽之積雨迷津館驚風阻客船栁塘傾晚漲草屋閉朝煙近縣投無地懸江泛到天南州徐孺榻相對是何年來鳯亭夜集分韻得青字春草暗江汀春風江上亭煙寒千樹白月出萬峯青換席穿林火憑欄落浦星山公留醉曲長使葛強聽春遊即事江郭看新栁山亭數落梅鳴蛙當晚日驚蟄動春雷野氣蒸車幔鄉心入酒杯津橋臨眺逺燈火莫相催夢李逹萬里三韓客連宵頻見君關長人竟度悲極語無聞江上雞竿月天邊馬塞雲相看知是夢把袂愈難分晦日又爾當初晦湔衣恨若何春光三十盡歲序一分過栁色搖金穗梅花墜玉坡明朝逢令節不道是中和唐以二月朔為中和節過萬竹禪院孤遊復逺尋蕭蕭萬竹林晝靄當門合春雲出殿深龍潭諸佛影禪誦上人心幾疊青苔裏誰憐有布金客中至日翻輳杜甫小至詩遣興至日將添線中冬且放杯山雲時覆岸葭琯又吹灰栁弱春相刺天寒臘欲催六陽生意動不待異鄉來附何道安詩杯天意吹陽動山中臘欲梅殊鄉異生事至日且添栁岸容人放葭灰教琯催寒冬飛不待相刺又春來將陽事至臘且待春催弱栁添寒動徐克家詩天山雲放日來刺紋生繡線吹琯待舒梅異國殊鄉意教人欲覆杯西山雪行遘先大人忌辰寒雪西山裏蒼茫祗一身百年皆恨日七尺是亡人葛屨時行地芻車未返窀王修真不孝掩面度兹辰二自分違桑梓無須廢蓼莪寒風吹袂裂凍雪沁心多禁日天邊度趨庭夢裏過可憐生罔極行役遍山河寄懷薑都諫每憶薑都諫相看意氣真分星同碧酒開閣讓烏巾晏子真知己朱雲本直臣十年違道路生死託何人詢來十三時美消息不得曽有婚姻約長悲兒女殤違離同隔世夢寐在他鄉白首歸侯幕青天斷客航漂流何處問掩泪過東昌騎病驛馬有感白馬白龍兒春星皎皎姿官槽傷玉臆驛路斷金絲病沫垂來澀卑蹄蹴去遲田方今在側泪落不能騎墮馬解嘲示同遊諸公峻坂一長鳴風高馬自驚非關多軼步豈是合徒行王濟盤猶姣羊公臂尚輕從來騏驥相泛駕是星精噉栗噉栗秋山裏清甘勝脆桃撲來團露棘拆去用霜刀銜實同溪鼠穿林羡木猱解飢方拾橡切莫厭貪叨二山果經時覓溪亭便坐餐日斜雙澗暮雨過一林寒叢刺刳金彈重衣剝翠紈女筐攜不盡還向樹頭看奉贈丁進士克揚母太君初度乍向金門返欣看錦帨陳觴傳東第客花擁北堂人錫夀丹書古徵歌絳樹春抑之家伎部名絳樹最憐雙舞袖燦燦賜袍新泛碧浪湖曉日青絲笮春風碧浪湖野塘翻宿燕淺水漾新蒲鄰舫歌來豔前溪人姓盧那堪臨泛去懷舊起踟蹰寄逺公八姪旅思恆千遍家書無一函河魚終疾病越燕又呢喃演昜思王濟投林想阿咸明年春草發為我搆東巖題八寶王子藥房幽思裁芳檻佳名重藥房欲持荷作柱私喜杏為梁杲日連滄海薰風動射陽烏衣新巷改猶幸見諸王題雲門道五松亭偃亞沓柯濃空亭倚衆松山雲飛冉冉溪雨過重重紅羽巢孤鵲青天拔五龍闌干秦望起無復大夫封寄酬劉中柱原韻不作平原客長思鄴下才擬觀滄海去還向白田來酒斾搖紅露衣車蔽緑苔秋風歸棹近就汝一登臺曉發呈伯兄涼月幾時落渡頭風正生四時寒役苦百慮曉眠驚歲晏吳關路江高季子程青天看不極一雁向東行淨慧園奉陪儲公赴忞公法食白社留方俗青蓮樹法垣維摩香積寺長者給孤園乳鹿盤間起飢烏掌上喧衡廬相望迥無處可攀援二精舍何年築黃金布未成隨時觀有道就食得無生迸水流香碗飛花散上城曇摩逢寶志同有渡江情經張梯舊居尚有青堂贈寧知白馬來盤飱仍地主涕泪滿泉臺叢草留人暗繁星照户開鄰家吹笛苦中夜起悲哀二十載窮泉路千秋處士廬驕兒彭澤訓難弟晉陽書時南士滯解州棘楚悲黃鳥鄉潭上白魚誰憐徐氏劍猶挂子雲居三不作西州哭依然東道親文章真墜地朋舊尚為人海鶴何年返山花幾度春空堂樽酒夜獨坐聽雞晨和徐水部南關署中八首宋德夀宫梅嶺外何年種相攜入故宫風開上林雪日映夀陽紅吹笛官亭杳裁詩水部工孤山宋處士苦憶月明中二友軒一名梅石雙清處古署開三益前除有二難經營輸匠事冰雪受冬官石轉江心動花飛隴上寒方春鳴鳥下倚徙近闌干玉蘭臺陌上春光滿簷前曙色幽但知都水監不見望春樓香霧迷銀版晴風敞玉甌高枝何所寄為我問鳲鳩桂墀曲室依蘭橑空階映桂枝涼風吹碧葉秋色滿丹墀天上披香殿淮南叢樹詞王孫能待我千載一相思石芙蓉不見中書石長聞在錦林鞭成跨海路削取木蓮心枯蘚粧秋色寒花老夕隂五工無限意慘淡到如今蕉塢碧甃深成塢叢蕉折作阿雨餘蛛自網夢裏鹿曾過翠影搖虛榻冰心卷素羅南方多草樹愁望奈君何閣後梧桐金井風初落銀牀月欲回臺含琴瑟響閣引鳯凰來南嶽千秋幹龍門百尺材冬官有司囿樲棘莫相猜雲峰怪石堆盤砌荒臺傍日曛湖星懸不落湘燕舞能羣辨岫疑春雨從風轉夏雲青州曾作貢審飭莫紛紛送客之天台是時海上方用兵念其垂老入戎馬地繫之以詩戎馬正紛紜城南一送君仙山天外路竹蓋嶺頭雲楚雨迷初歇川程去不分欲留知未得倚徙傍斜曛二渺渺章安道君將何所之榴花環岸曲梅雨遍天涯玉洞貽書遠丹崖控鶴遲倘尋華頂去莫賦惡溪詩三固欲尋仙島還思渡海潮兵連白嶠驛人上赤欄橋雨拾溪中橡霞分城上標金堂堪避地仙侣定招邀四水白過新鷺山黃熟早梅百年逾甲子五月上天台采藥旌旗暗看花溪路回赤城逢許邁但勸早歸來周侍郎來湖上辱貽賴古堂集用龔掌憲贈侍郎南還詩韻二首奉寄九彩朝陽鳯單棲城上烏罻羅同處少羽翼望來孤高藻傾三峽間情寄五湖吳中饒賤士留盻在菰蘆二夫子真蘭質違時名櫟園夷魚推介節賦鵩幸生存古道誰持攬新詩藉討論生平感知己不獨識虞翻餞薑七國昌北行暑帔越羅輕薰風送遠行紅船揚子渡黃馬信安城帝里秋花早仙臺曉露清故宫封碣石猶識大鄒名二别酒傾胥浦離歌起射湖馬周非朔客王粲去西都紫塞燕關逺黃金昜水孤丈夫原有志五十况縣弧遙同薛宷徐嵩九日倡和詩九日題詩易三秋會面難登臺思宋武招隱愧劉安黃花開節冷白雁度關寒欲採茱萸寄臨風仔細看贈楊二洵美江左王郎寓城西許掾亭解來黃絹字草就太玄經花院逢歌葉松壇訪負苓天池千萬頃時洗鳯凰翎二遁迹憐幽境名賢重過江遊遨時有待清白世無雙紫水浮丹鼎青油啓碧幢南園花發候日日醉春缸觀查孝亷蹴毬七寶繡文毬花前蹴踏遊拋虹隨地轉躍月似星流戲古遺鈿杖場空近畫樓綵門三躍後時毬師三透毬門翻向碧枝留蹴毬妓畫袴錦毬簾團花溜復黏翻雲縈鬢影撥地用韡尖趫捷風隨帶低回月滿簾近人佯背拂不用更回瞻白馬蘭葉出雕題梨花剪白蹄摐金無局步噴玉但長嘶並日雙瞳曜追風萬里迷權竒看汗血不獨大宛西二海豹白花煙龍毛拂錦韉玉翎翻雪薤鐵足散冰蓮掣練銜絲細環珠束帶圓燕昭曾不遇驤首是何年答魯生我愛龍門勝君從狗監來風清玄度宅霜滿越王臺月旦欣能副兵戈苦未回只今東海上深憶仲連才陸少府自南海還京枉顧留飲試吏南天逺還京北望遙將看酈亭月遂渡浙江潮馬首稱新語烏蠻有舊標明珠船不繫為我上河橋二幸返橫槎浦重逢鎮海樓種花歸五嶺振轡及三秋丹闕需黃牒紅亭泛白甌殷勤無别語但看水東流同薑黃門希轍陪太翁虞部看梅西溪即事車騎出城西芳流傍碧蹊雲深穿竹暗日暖照花迷午寺停山屐春船纜水畦徐家莊上路咫尺是西溪二小檻低還敞平橋斷復通村回千澗外人在萬花中酒晃當筵日香隨過幔風看梅官閣興留醉任山翁三暮宿龎公宅朝尋許掾家山前五里霧溪上百層花撤􅚫踰連塢乘查度曲沙如何林下友尚自隔天涯時入雲溪訪俍亭不值懷來十四度别駕雲南萬里滇陽道孤身洱海邊從軍踰絶徼别駕任南天嵗課車蠻井春開路賧田中郎方建節歸國是何年吕八師濓劉大孔學遊滇府有懷司馬持駹檄張騫出夏城高文標鐵柱大府重銀生蒟醬三都賦蘭王七郡兵彩雲何處見終古望昆明希軻曰漢武時彩雲見南中將投滇陽寄吕八避俗投窮徼無家逐荷戈死生留八甸居處託諸羅黑角蠻中路青蛉荒外河永昌吕凱在文教近如何誥贈中憲夫人執紼詞未啓滕公室將歸緱氏城花間金誥在天上玉樓成遙海悲濤壯前關落日平行看龍尾上倣佛婺星橫二鸞馭搖旌碧龍章映篆紅三遷標令節雙表待秋風賜帔流花露遺文賦草蟲古來翻大鳥閨閣本相同雪夕病起翻少陵臘日詩同諸公宿巴陵署日泄罌脂暖年還澤草消翠萱侵臘色凍雪散春條藥管隨良月銀光漏紫霄今朝謀醉夜陵下酒家遙希軻曰十月為良月見左傳言病自冬也徐克家曰是詩最難翻時相約翻入脂藥罌管等字故尤難猶記何道安有謀家隨下澤醉雪縱今朝語頗佳豫隨成復已始知觀成不如下手欲如此高融朗密未易到也周括蒼茂源貽書以未歸失展裁因賦代答一代風流守曾經刺括蒼十年夢寐客相别在南昌閲嵗驚霜雪懷人致鯉魴那知遊蕩子猶自滯江鄉豫宿桐音宅出所賦慰詩四章妙麗愀愴諷之傷懷因勉酬三詩導情故國藏車日他鄉賣餅人秋衣憐季布夜酒對孫賔閣下紅蕉暗燈前白髮新十年悲往事相顧泪盈巾二依徙當時暮還歸未晝遊久辭荀里去仍向孔門投霜葉吟東郭秋星墜北樓誰憐頻把袂猶攬舊烏裘三困日知音少衰年好會難驚心聽漏促久語落杯寒妙句當筵發嬌兒出幔看夜闌生感激對飯不能餐擊銅鉢和天衣雜題十首丹壑啓蒙茸招提表十峯殿方環埤堄人似坐芙蓉疊嶂連疑復添雲襯轉重摳衣因避地長愧舊周顒右十峯翠壁千尋拔清溪雙帶幽飛崖看散下到寺喜同流覆草披遙磧浮花逐細漚巖前斟法乳此下有龍湫右雙澗刺史前朝彥臨文書亦豪螭頭標去麗鼇背負來高金壁迷蒼蘚銀鈎折白毫千秋黃絹字相對轉蕭騷右北海碑眉池何嵗鑿傳道在西陳挂月如圓璧浮波只半輪丹顔隨鏡破碧甃帶沙湮入水酬功德無容幻影親右半月泉池法寶翻華藏經臺展妙香慈賢真下座好女自提筐露宿隨烏子雲開見象王僧繇曾有畫飛去在何鄉右普賢臺七寶梁王供三皈晉季崇天衣饒鉢錫佛像本金銅守瑞亡前代神綖出漢宫傷心賢惠國看賜繡經紅右帝主頒賜經像衣錫等嶻􅑖雲門嶴蕭條下寺灣鷲曾遷舊嶺龍尚護雄關翠甓圍禾黍荒臺盡草菅劫灰何處認金布滿空山右下寺灣方丘如對仗列岫正標門左右分環衛中間奉至尊馱經蠻象伏説法弋獅蹲何似恆河上祥禽擁佛園右獅象對峙蜒蜿喬松埂依稀古塔畿千花龍負湧七級雁銜飛翠粒浮沙逺蒼鱗偃蓋微夕陽殘照裏應見寶幢歸右古松埂為三塔舊址清磬三時靜踈鐘五夜號雲邊回竹閣天半吼蒲牢度澗疑秋雨連山響暮濤陶潛歸較晚巨挺問誰操右鐘樓西河集卷一百七十一
