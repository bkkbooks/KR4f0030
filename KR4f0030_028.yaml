body:
  text: 西河集卷二十八翰林院檢討毛竒齡撰序五送余鍊師居升鉉觀序菰城山水甲天下武康計籌山則春秋計倪所棲地也相傳計大夫佐越禽吳嘗籌畫此山及句踐還越范蠡出三江之口浮海至齊而計大夫亦歸棲山中山有升鉉觀大夫嘗燒金云其後二千餘年觀毁屢矣然巗岫曲坲利于幽託故前此葛稚川杜道堅趙文敏薑白石輩皆遲回此山山中人能道之臨安余鍊師自臯亭來顧而樂斯乃葺其廢墜假之偃息同人各為詩贈行而命豫以序夫鍊師修髯廣顙身具仙骨而又好讀古異書闡經國謀野之學雖談衆妙如九術焉殆章甫而黃冠者與昔者計大夫年少于物甚長嘗因句踐之問深明于治歲至分隂陽水火甲乙粢黍諸術七年而伯功已成可謂雄矣然而言本于修身道要于知幾行見于居仁而利義則使以嘉遁之姿而察于祕計挾道德之用而不盡委之餐黃吮白之數前籌未舉穴處何時宜其顧此山而憬然思也余嘗慕菰城之勝思泛苕溪霅水以兼求古賢棲息之處而奔走未逮鍊師先我而遲回焉世有審時交而咨知計者燒金之事于是乎後矣詩限四韻概所貽也然而送行多越人有似乎不忘計大夫者若月日甡序送戴山人入道并募助衣裝序豫邑無工畫者少時珍吳人戴鶴畫扇日色薰炙風氣炎薄不敢出衣袖間既而知其僦于邑也近也忽之又既而入吳指其畫扇遊東虎丘東虎丘人見所畫扇輒咨嗟曰此吾里戴山人盡也其畫不可得矣豫因問之皆曰吳中畫數家知師叔平道甫者其一時同里有陳遵盧逸周之冕王中立皆膺能名山人其一也今諸君盡亡而山人遁矣豫聞之雖稍重山人然并不料周陳諸君如是近也則并周陳諸君忽之夫人之貴逺而賤近甚矣相如子雲當時不信為可傳矧微伎乎向使山人不僦吾邑即僦吾邑而去斯世稍逺浸假得山人畫紙藏之折枝賸羽其珍重保愛未必不倍豫疇昔而若何其近也今山人將入道矣山人年七十猶能為人作寫生畫玻璃其目手挂兩管為粒食計既而嘆曰吾髠吾頂矣誰為助衣裝者耶毛甡曰山隂沈祕書有山人方𢎞者追人師也能截犀稍作脂榼琢山莊圖四圍豪末不減曾屬為馬腦琅當鏤十六兒其人燕人也髠頂雲門祕書贈其凡所需者滿車載去此寧非近事乎人近則易忽然亦易感夫以山人之畫方之前人其于隂陽向背動靜榮落曲盡隨類應物之致當亦不讓五代貫休北宋吕拙而在休與拙一則為蜀王賜朱一則為太宗賜紫其為入道者可按也逺即可貴不必加貴于蜀宋近即可賤何當竟令其出追師下也豈無感祕書而興者矣張少尹七哀詩序張少尹君曾隨其從祖憲副君宦京洛交天下士大夫豫于是時得一遇少尹君逮少尹君宦吾浙復宦吾邑則豫遊瀨上始矣君以奉使馳燕豫轉而甌粵屢出而屢返者凡五年會邑多故七更邑令又兵興驛騷海上烽堠相接君奉臺使檄督造征海樓船于甬東界上工賾值大徴限亟促既已倉黃斂賦復解運愆程期材不給督撫大將軍刻戰責之下邑而邑之計徒庸辦餱廩者剝瘠狼狽什百于他邑君愳一致誤而邑之引繩批根且萬家也君乃拂邸壁賦七哀詩飲歌于浮橋飲訖委身波濤兩岸觀者不得救呼搶投擲或曰似跨紅木泅水中或曰有物者持之自浮橋至桃花渡凡三里檄救得免而樓船之役明賴之以稍緩云今其事雖已而君之詩固在也昔屈平沈湘為歌九歌王粲滯荆州因之有七哀之什夫七哀猶九歌也然而以七名者哀止一情而感哀有七君內感于心外感于身其連纍而生感者則即此萬家之民夫君為萬家而感其哀而欲使萬家之民讀是詩而不哀焉不能也君原有詩集名赤暹集赤暹其字也豫序之今附詩于集而别為一卷復命豫序故序湘溪集序湘溪集者蛤公和尚所為詩也蛤公生江陵長參諸方驅錫燕齊吳楚之間其既也從平陽受信器應分寧席而苐以初時避地在永興也永興有湘湖因名湘溪顧豫永興人也聞蛤公海內名而不疑其在永興蛤公知豫永興人而以豫避地不得從永興致豫一見及得見而豫已暮矣蛤公聞道早其于道猶渴之于漿而寒之于罽與布也當其參費堂頭時髮腐齒落絶智計之能即轉而入報恩之枯木堂猶且形如稿梧股不橫袵者將十年彼其時豈嘗有文章之念在其中哉暨乎從大覺老人再赴京師設難于帝主王公之前平陽慕其竒未經接受而遽以臨濟之金縷僧伽黎衣先大覺而爭付之可謂偉矣乃以不立文字者而轉為文字其於終身把鉛槧沾沾自矜而逡巡以至于暮者即以文觀且超乎上之也昔湯休沸大廣宣寶月皎然栖一諸公未嘗聞道而初祖以來若大鑒若溈山若石頭守清南嶽俱無文章蛤公直指本心證阿育菩提而苐以其餘為詩縱使歷下伸紙而太倉把筆猶不能踰其所得而進其所以至也則夫以溈山而兼杜陵佛氏之盛倘亦生民所未有者與獨是豫以避地餘生不能舉安丘吳市一一而標識之而湘溪之名其不忘所寄如此豫選蛤公詩兼付剞劂而重述豫言以為之敘世有誚豫以能選文不能選道者蛤公有言曰詩非道則道非道乎鴉鳴雀噪非道乎吾得而應之矣樂生會序自履道九君為尚齒之會而其後踵之者唯睢陽洛陽為極盛然率皆登朝建名致所學于民而功成不居退而與里社交遊垂老道故故其生可樂若夫生逢不辰丁年亂離視歲月所趍本不甚惜而乃合里中羣材年與相比者藉飲酒以為歡娛題曰樂生得毋我生之靡樂與人有各寄百鏹于其藏者一除而用之一則除而置之無用之地夫猶是百鏹而一用一舍不可謂非錢之有幸不幸而要之錢以有用而易盡以無用而反不覺其頓盡者是無故彼流泉如騖出入蜂午初何容早計夫缿筒之有限而逮乎將盡而後憬然于九府之未可恃也是惟無所用之而阿堵當前致可把玩則是同此百歲而用之而促反不若不用之而得舒也可樂也且耆英尚齒必垂老明農而後可以與斯會今皆得而早計之又可樂也故記曰樂樂其所自生生不自樂歲月其除矣不然五十非大年也且有不及五十而亦與焉者記不又云乎生日不樂吾亦何為勸鼓瑟焉金母壽序夫淳鈞之鋭不絀于切靡凌厲之蹤不困于偃蹇故南金徑而百鍊不得虧其真栝柏堅而霜雪不能移其質何則其神全矣神全者壽故昔所稱久長者皆其能持之一日者也能持一日則百年可知矣金母蔡夫人雷甲族也會稽金君九洲當明崇禎間隨其從父宦于雷甲申之際從父殉國則金君家焉因娶母生丈夫子一而金君且歸思理其故廬乃迎母也順治戊子西南兵大起震動嶺表凡滇黔猺獠溪洞諸冦所在蜂發母初避新城既避舊城既又避擎雷之諸山既又避海蹈火得免溺于水得免漂潮上下得免遇哮虎得免圍城免餐粃饜土屑桐桂桄榔椰梨不火食者月餘得免最甚者偕其從母避南山時勢不均全必欲隨無良者為偷生計金君去雷六千餘里問久絶兵革且未艾也勸與迫者衆母仰天曰所不自裁者此兒耳携兒潛奔卒得遇其父蔡翁而究竟免是母之堅持不詘百靡不可磷者已十餘年也今五嶺已平諸堠已息金君已更娶而後迎母歸已二十餘年丈夫子已承家能有立母已老矣癸丑夏謀所以設母帨者或曰勩哉母之歷嶮巇以得有是也母之艱也或曰賢矣鬻子之閔恩勤拮據卒能越五嶺以還歸故廬雖室有逼處如兄弟然可不謂賢或又曰母之賢母之節也今之所矢靡他者即向之預歌不隳者也母賢在終身而母之節則定之三十年之前而總之合以成母之夀夫操力嚴者匪旦暮之所能搖葆神深者匪春秋之所可量和羮以辛苦而益安于醇盤根因屈曲而愈貞其久則是立斷之器無假沉閭髙飛之姿勿庸烏鵲綿綿之神不需仙厯賢以樹之節以持之艱以藝之則荆南之木也世之願誦母壽者何以渝此張將軍七十序將軍字亦明文葻伯祖少時從家兄遊見家兄所友者輒心識之是時早知有張將軍云顧君與家兄友時未為將軍也為文章不可一世思以此致身而所至數竒棄去膺兩浙觀察辟命為諸曹掾糾愆彈違既承藉有令譽乃復綱紀大端簡置文法使觀察坐嘯以為能于是復薦之京師進觀上選此故明崇禎間事也當是時天下多故君私負才地考圖察象工騎射知攻取要略而仲弟為文章有名方謂分道進取可以得志不當為參幕限也乃獻冦重躝襄陽軍需旁午復棄考選去杖策説都閫沈君維烈戲下出守鳩兹姑孰間所在有功王師下江南鎮軍盡潰而寧南侯以犯順之兵戈船方下君迎之皖城既已克捷將控其上遊以次進掩而潰兵且貫至也遂以中軍遊擊將軍歸命為興朝行營擢用舉二弟自隨論者謂將軍從此可得大用乃又復棄去還歸舊廬迄于今墻東之居其為投老者已有年也歲三月將軍年七十豫適返里門拜君于堂已非復嚮時從伯兄所見文章几席與其壯年杖策時説元戎于抵掌之間然且矍鑠走趨周旋顧盼意揚揚也少好書射今不復射也乃把丈筆書丈餘字君身材頗短字倍于身隱身其中以為樂邑中事無大小悉以咨君君調之去西江水濫邑取利病吏薦君臺使恃君隄築以慰民命君近逃浮屠有修廬山舊社者耆英友也將為序壽君而以其文屬之毛甡甡曰君初薄文學不為既薄參幕不為既又薄將軍不為是君惟不為以延此年也然而臺使之聞君名者榜君耆碩而君受之今天子龍飛之年首推郡縣有隱德者舉鄉飲酒禮吏以君應坐君于西北嚌啐禮備尊之曰賔而君復安之然則以無用為有用以不為為有為呼將軍則應以將軍呼耆碩呼賔則應以耆碩以賔此皆莊生之所為長生者也君得之矣若夫五福稱富三祝稱多男君固可致然豈足為君道哉募修北京西山髙井村觀音寺序燕都以西山為名勝地四方遊仕者車騎往來曩時紀帝京風物恆首載之山之麓曰髙井村距城西四十里古剎相望其為摩騰為淨居者無算也萬歷中有御馬監中貴何公相村之福地創觀音寺門堂數層金釭玉磩叢草灌樹與前後諸名剎互相輝映每為遊覽者所憩而歲月久逺巋然棟宇未免漂搖于風雨鼠雀之間住持守心者惄然憂之將丐豫文而以遍告諸逺近之檀那者也夫天下興廢多矣廢而能興自昔所難惟釋則因無造有往能就初地而恢之劫灰之後故成梁除道王政之經今悉舉而歸之釋氏誠以概多益寡纍十得百其為力不專而為功易遍博施之義實于王政有重賴焉况興廢未有已也聞之經曰某國舍人欲興古寺以金錢不足入海得貝而寺卒以興此雖寓言然亦以人果有為則神將效焉故釋迦説四梵餘福而以補理故寺為二梵之福夫誠閔寺將廢而共為補理則福臻二梵亦又多乎則又安必曰君子不期福也餘姚諸耿衣六十序十年前為文壽耿衣又十年而仍以豫文為耿衣壽然則豫之無已于耿衣也雖然當豫知耿衣時耿衣方盛年懷抱宏略交遊滿天下天下人爭先知耿衣或得為耿衣知尤幸而豫以總丱之末亦且窺其所著文遙申慕私安知耿衣志氣猶然詘處如今日哉且安知三十年以來豫尚浮湛為文章相餉耿衣如今日哉乃當斯伏處久矣其出者固已無論同為行遜或當時原無所表建藉以掩隟或方洋自廢過為儻䓪或乃更遁于緇衣羽服之間或貧病代謝迄于今其卓然可見鮮矣耿衣藉忠定之後世擅氣節又理齋先生以理學開纘凡夫文章節概學問經術俱已小用于棲遲十畝之間鹿門夫婦已從容相敬愛有禮諸子擊鮮良日數過擇善田養秫揃剝湛熾足假銜啐而餘苑雜植流觀娛豫小婦挾瑟上堂日暮嬿婉自友朋雞黍外復能使衣褐投止者匿處田舍則憶疇昔避世時亦安知其至此世固有得不必慶不得不必慮者耿衣六十年爾其閲視深其領袖羣賢者久其詘處田間又非一日然甫當耆年其從此而進者無已也乃曩時交遊其願附壇坫者或大用于朝或小試于雜宦後先貴顯熏轑震世者纍纍也三十年來亦且寥落罕存在者則是得失之難分而用不用之未可限也且豫十年之間其流離也甚矣然亦尚能為文章相餉况進此也西河集卷二十八
