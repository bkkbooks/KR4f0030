body:
  text: 西河集巻一百四十一翰林院檢討毛竒齡撰七言絶句四客南臺送髙兆之粤東南臺節候近端陽客裏逢君去五羊欲解五絲爲纜去可能暫繫女螺傍螺女江在南臺後二餞飲西園酒未醺平船先載隔江雲閩南荔子今應熟五月嘗時不共君三陸郎不用跨班騅前路逢迎知阿誰趙德門邊舊程里看君乗興一相追時君先到潮故云四三山五嶠總天涯擬向番禺汎海槎此去肯留蓮葉寨待予同看木棉花盤谷先生歌爲陳舍人上善書扇盤谷先生好作書年來右肘病難舒當軒傾得三升酒便上雞林估客車二盤谷先生書勢良鴻都新碣比中郎可憐老興渾難盡屈鐵更爲丞相章三西平仲子去何年近見先生賢復賢但著一篇盤谷賦從無千頃洛陽田四盤谷如盤花似銀中書君老不勝春那知玉笥山前草猶坐金華殿裏人時舍人流寓江西雪中别二友梁園客散暮雲低閼伯祠前重解擕愁見馬蹄殘雪上兩行東去一行西和苑中遇雪應制龍馭春遊仙苑深祥雲曉幕帝臺隂若非霰集先行斾只道花開滿上林同友游南阜山憶何道安詩南阜蕭條最可思夕陽山木晩來時從君一望清秋色只當重吟何遜詩題畵幛子江城碧草正芊眠細雨南湖阻畵船纔是錦堂懸曉幛便敎白鷺滿晴川二碧渚翩韆集鷺翿新蒲片片映青袍原來共滯南湖曲别有凌霄一羽毛除夕作旅館椒花紅欲然椒盤愁向客中傳如何纔聽金雞唱便喚今宵是客年同友柳下作東度吳關値暮春關前楊柳暗長津行來相向垂雙淚不是江陵種柳人雨夜就亭送客觀芍藥即席和施公子彥慤花間送客暮登臺急管嬌絲且慢催君聽堦前正風雨莫敎别後憶花開二何來玉樹謝家兒夜雨能歌送客詞華燭滿欄人盡醉一時囘首看將離予再赴湖西講堂已暮春矣聽座中歌孟氏牛山篇不覺出涕因賦懷家園詩一章見意三彈歸鋏楚天涯日望西陵不見家痛殺江南春夜雨還開井上旅葵花湖西講堂作臨江草色滿前汀玉節諸侯自講經慚愧十年岐路客空隨車馬上汾亭淮市柳與同行者淮市西頭西楚祠祠前楊柳亂垂絲攀來不忍貽君看記得樟亭折柳時王二漢書予詩館壁進士坊邊花巷春烏椑門巷寂無塵誰家能寫毛甡句只爲相如臣里人西湖竹枝詞斷橋西去杏花開年年橋上送郎囘分明一片連橋子何日何年斷得來杭人呼橋子猶曰三橋子也二昭慶祠頭春水生大船長傍小船行湖東日上湖西落湖裏何時不是晴三小姑十五壓花鈿長抱琵琶坐小船借問小姑何處住陸公祠下岳墳前四十錦塘前好㧞蒲十錦塘上百花鋪可憐八尺斜斜路隔斷南湖與北湖五湖心亭子近三潯儂日思郎思不禁阿郎好比湖亭子朝朝暮暮在儂心六小姑梳頭日西時不到山前到水涯屋裏挿花湖裏炤山前歸路有風吹七水上花開水底紅東風吹水水濛濛水上看花猶自可水底看花愁殺儂八誰道湖波鏡子同看花須看水中紅船邊水動花難見不若船頭看阿儂九阿儂不上採菱船只買白藕種紅蓮蓮花有心長得藕藕根無心長得蓮十青驄油壁漫相尋只在前山松樹林山雨不吹裙帶濕乾將絲子結同心十一湖頭闌干一様鋪湖上一色好當壚莫尋橋畔紅䦨子只認門前白項烏十二莫道西湖好浪游南山雲斷北山頭莫道妾心能間隔外湖水入裏湖流十三飛來峰前花正開蝴蝶探花飛幾廻髙峰不似花蝴蝶不識因何飛得來十四石新婦在釣漁磯桃花爲面竹爲衣面上桃花有時落湖邊望郎何日歸十五油車宛宛度西林日暮歸來懊惱深曾在第三橋上坐金釵失落不曾尋十六買得甘𤓰又買􅐽莫道甘苦不相宜前山空有臙脂嶺不上唇來那得知十七湖堤風起便生潮裙帶斜牽堤路遥女兒上堤欲歸去可憐綠草抱裙腰十八蘇小門前楊柳新西林橋下水粼粼琵琶只在盲婆手不見西湖愁殺人遇蕭鍊師梅市上清仙人紅玉腮冰漿分貯紫霞杯他年若問青牛使梅福山前曾見來二自返青華厯翠微千年縫就五銖衣相逢偶説前朝事親見英皇北狩歸看玉田觀道士棋玉田道士井公才白日分星石上排總是還鄉人不識儘留洞府看棋來雨淋鈴望京樓上月亭亭興慶宫中草色青舊日張徽今在否春風不奏雨淋鈴史四廷柏五十飲席閒園初發拒霜花賔客盈堂泛紫霞一石餘杭仙媼酒千秋南渡相公家二畵檻丹楓炤綺筵楓花片片墜朱錢東方二十嫺兵法不道蹉跎三十年欲上臯亭看桃花不得因題吳九彥聖竹院桃花幛子寄嘅欲上臯亭細雨來春江渺渺夜舟廻那知竹院重逢處尚有桃花千樹開葢羅縫瑶林玉闕啟金扉仙女親縫雲錦衣當時誤聽天雞唱失在蓬山不得歸二瑶林玉樹摘青房仙女親縫雲錦裳跨來緱氏山頭鶴看去金華道上羊鎦姬彈琴得平沙落雁曲請賦重重簾幙捲霜華西望衡陽音信遐何處青桐流響急一行塞雁落平沙二金罏香盡夜堂清過雁咿呀指下生最是琴心堪問處從頭撥拉兩三聲南鎭春遊詞春船兩漿白蘋開十里横塘晩未囘南鎭祠前北風急夏王陵上雨飛來二鷁頭艇子鹿頭車山路深深雨又斜何處相逢增懊惱凌家山下看桃花三香罏峰峻少人登兩兩三三上禹陵陵前草深花似霧山頭風急雨如繩南鎭後春游詞同南士祗臣桐音作晴江演漾動輕橈夾㟁垂楊去路遥九十春光八十雨横塘水滿晩生潮二金書玉柱鎭宮牌畵舫紅裙鑑水涯春草年年陵下路行人拾得雀頭釵三上宮碧玉駐青油自洗湘裙杜若洲落日横江不歸去還尋窆石殿東頭四陽明洞口鎖天闗瑶草琪花掩髩鬟欲覔雙成探玉蘂敎人長上會稽山寄徽之大敬代書時聞沈九嗣范邵二懷棠雋南宮春雁歸時未有書三年思食漸江魚親知盡獻長楊賦誰道還乗廣柳車吹臺懷陸大進張四綱孫毛五騤汴水東流去復來大梁城下重徘徊西游不見賢王客三月花飛滿吹臺天台僧夜話海州東望海門闗玉洞桃花謝往還夜半老僧彈指後恍疑身在赤城山王使君席同陳内翰贈歌者江城四月柳如絲錦瑟彈成入破詞太守筵前爭認得大功坊底杜紅兒二槐㕔入夜燭屏深試舞新衫是縷金座上詩成誰最早鄴宮倚馬舊陳琳宿東溪山寺遇雪東溪山寺暮鐘天借得生公一榻眠早起欲行溪口望雪花堆滿寺門前槿花紫槿東籬慢曲盤朝昏榮樂詎須看憐他相伴秋光裏傍暑開花直到寒寄沈九秘書吳興才子掌文詞日草黄麻共紫絲誰念十年烏鵲侶裁書一寄鳳凰池溪亭懷舊清溪深處一亭幽曾傍闌干洗玉甌二十年前亭下水至今猶帶落花流舟中見張園鶴紅橋畵幕勝青田獨鶴翛翛瞰碧川過客不知波下影長疑兩鶴住洲邊一抄作青田羽客隔秋江紫蓼丹楓畵木杠水面聽聲如欲斷波間看影似成雙内叔陳大憲祖付予詩歌妓玉華因復拈贈翠幄朱欄覆綠池西園公子夜裁詩自慚抱瑟同盧女不敢將歌付雪兒李少宗伯更名臨江城外清江爲使君江感施分司之淸也予去臨江因徘徊使君江上慨然成詩蒲帆五月去江城城下江流清復清酹酒欲行重繫纜最難忘是使君名二五月榴花炤地丹離筵重聽五絃彈使君江上多情水還載孤舟下信安過信安殷浩宅示田甥有序浩北征廢徙後唯韓甥隨經年因詠曹顔逺貧賤親戚離送甥江上涕泗横流予過信安城南宅乃不覺有傷于心亦示甥云爾當年殷浩南遷日無復親知相伴行今日一過殷浩宅敎人流涕對韓甥予悶居法華寺偶閲梁山牧牛頌乾菴大師問如何是忘牛存人夙不解禪戲拈舉依韻金絲籠絡卸前山山北山南處處閒驀地擘開拽鼻手了無繩子在中間師稱善他日舉似金輪僧僧曰李白自稱金粟王後身徒誑語耳子眞是耶因笑而成詩咸陽宮前金粟山金粟花開只等閒若許傍人認金粟如何金粟在花間予夙得惡夢徐二十二慰以絶句因答他鄉故國兩茫茫春草春花總斷腸但恨情多過王子敢言才盡比江郎徐詩末云莫愁隴上飛鸚鵡夢裏應吞五色雲發紖詞爲舒城黄母胡太君作蕭山城南白雨傾蕭山城北白雞鳴龍舒王姥將歸去白鹿銜花不忍行二黄門將母板輿中樹得山花浙水東不道河陽九秋月北堂萱草墮霜紅三翩翩丹旐出城西暫駐湘湖第一溪駟馬不行踣地哭平橋衰柳一時低四金章墨綬綵衣新次第堦前看雉馴自是王喬飛舄早玉棺先獻太夫人五已聞邵伯曾爲父不信王戎尚作兒子姓裂裳隨太母牽輀挽紼到江湄六樟亭古渡引旌幢望裏飛霞接上江披牡戴苴皆玉立從來江夏本無雙指其孫平十也舒城有飛霞亭七治從門外禮文新藩省稽留倍苦辛翟相總無踰制事山濤豈是奪情人八晨輁曉葢望中遐擬泛西陵江上槎痛煞野棠官路裏近前還發數枝花同陳柱國將軍張杉赴商命說徴說舟集雨宿即事江城度雨細如烟翠幕金尊襍管絃越女避人窺錦纜將軍下馬入樓船二爛柯山下石磐新錦洞秋花落繡茵行盡深林歸竟晩却疑身作爛柯人三將軍抱甕坐胡牀夜雨輕寒覆鷫鸘百尺冰荷紅幕裏風流重見杜當陽四商山兄弟謫仙才灎㶑金缸汎玉醅一日邀予湖上去十年藏我壁中來五南塘十里駐青絲正是南湖入暝時中夜舵樓重作吹張衡髙詠四愁詩未獲識邑明府趙公顔色途次感激愀然成詩家在平原歸去遲欲瞻趙勝更無期如何千載秋蓬客竟買紅絲付繡兒過魯連村懐大聲荒村寂寂㪚朝烟何處還尋魯仲連欲向村前騎馬過一時泪盡綠楊邊哭趙弟李子東游春復春王成賣卜死河濵最憐旅舎埋金客猶在徐州作酒人奉陪姜太翁觀燈宴作綵炬千枝列錦城畵堂髙宴夜吹笙爲看火鳳山前舞却上星橋樹杪行西河集巻一百四十一
