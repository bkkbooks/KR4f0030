body:
  text: 四河集巻九十一翰林院檢討毛竒齡撰墓誌銘一沈君墓誌銘予友沈七禹錫二十七嵗死嘔血其諸宗沈功宗與予前後友亦嘔血二十七嵗死死時作書曰先生肯為我作誌耶其弟在宗持書泣屬誌且云某日將葬苧蘿山東崗啓其書其遺筆也功宗字孚先蕭山汀頭人其讀書處名江園稱江園沈子後山隂傅宗者慕之就君同里居師事來蕃讀書江園中又稱江園二子君十嵗著大臣論稍長尚風節嘗讀漢書黨錮傳至度遼將軍皇甫規自以西州豪傑不得與黨人上書自訟君捉筆填其下曰時蕭山沈功宗以童子同將軍上書其慷慨如此君善書法遇縑素必移易書滿雅好談毎達曙不寐時其師來君同學傅君亦皆好談故嘗與談無厭情一日來君書同邑毛甡之詩示君曰此何人詩也君應聲曰此嘉州也又示曰此白太傅也來君咥然而起曰何哉此城東里毛甡者也君曰有是乎次日遂走城東里問甡值甡過埭上君亦走埭上相與語甚驩當是時毛甡過埭上埭上黄君好結客日接遠方履置酒高㑹毛甡既指君徧告座客座客與君語亦大驚後客有為問難者君著答客難數千言頃刻成客傳寫去至是客至者必詢江園沈子焉君嘗夜思甡逐月隨一僕走埭上凡二十里語逹旦及甡過横山君復隨一僕乘夜走横山横山去江園三十里中界以江呼江漁刺舟亂于江時雞將一鳴江㟁有踞虎兩目如燐接江水君信為燐也叱之虎遁杖追之時近江村民驚以盜一村皆起江園前有苧蘿山西子所居處也旁有浣紗溪溪祠西子其祠前為越王走馬崗君嘗行崗上悵久之著越紐遺書不就乃與傅君合刻所著詩共十四巻名江園二子詩集呉江顧有孝臨安陸圻徐繼恩山隂張梯慈谿魏更與同邑毛甡皆有序後傅君出試君不從與之别傅君出試輙第一庚子舉于鄉而君以戊戌十二月嘔血死死葬苧蘿山無子遺一女傳君告諸木娶為子婦銘曰猗乎崇蘭馥馥其華扄之幽巖凛霜來加嗚呼昊天曾是不瑕焚芒灼蘖剸榮刳葩維兹苧蘿有懷著書畜志不逮言還其墟材優覇服思成王圖其人即亡其心不渝宗有沈君風流相似鄭鄉即同楊冡亦邇能通秘埏相語𤣥里夜月尚縣江園之水姜桐音墓誌銘君諱廷梧字桐音明大司農少子也司農死國事于贛長子國昌走五嶺負楬櫝以還行至閩征南兵大索于路漢旗徐帥者捕生人為逃丁兒械國昌手載之行將以釁鐎斯時有總角少年膝行馬前求代兄即君也君幼給㨗行文不起草口所誦即成句大宗伯黄公道周曽與司農謀國事勸司農行夜宿君宅聽君詠詩而怪之疾顧司農連言曰君尚難為陸荆州耶此非平原乎君歴世仕宦而無籯笥然性喜中友之急蕭山毛甡避隟人于君君歴之日與山隂張杉往來拯􅀈山隂徐緘家嘗被賊賊質其子男而要之贖徐不能贖也君卸婦頭上粧贖之君世為炎帝後姜姓師尚父其宗也自蜀漢鎭西大將軍後如千傳歴宋南渡有從一宣教者家姚江為姚江姜氏入明益大高祖考榮以工部主事左遷通判則嘗劾逆瑾得罪者也時徙居姚江南城曽祖子羔有文章名由禮部郎歴陜西按察使進行太僕寺卿與分宜相公忤致仕祖鏡解元中禮闈試自禮部出守為建儲上書罷職既而例贈光禄卿徙家㑹稽又為㑹稽姜氏焉父一洪則司農公也司農公初叅政東粤遷太僕卿以國故偕大宗伯黄公入閩叅機事尋由吏部侍郎進户部尚書而走死于贑君曰吾世受朝廷恩如此日見舊世家子保家門者悉應徴出君獨義不出闔户而居㑹稽故瀕海大將軍統征海旗丁輦徒以東自永興逹例有供役日括坊民為夫君已循例而賤值莫僱也倪文正公長子者君女兄夫也有喑奴客居民間以賤值僱旗丁者虐奴客泣而不得語既辨其喑者也利其喑指為旗丁兒逋逃有年是家敢藏逃法當死法藏匿滿洲逃亡新舊家人不主首他人為勾稽名窩東人東人鞭之還旗窩者斬十家家連坐流徙塞外當赦不赦君既家被抄無遺金錢而奴客喑躅足竟不得辯一語于是桎梏君觧京師赴督捕府讞而君以道病有坊民義君者願代君不可其兄國昌自道還急詣縣府首自被桎梏解督捕府督捕府亦竟以君枉命釋君君向與兄共户居既各娶子婦以居隘兄僦道南居以居君獨居既而兄亦貧力不給僦乃還道南所僦居仍與君居君乃穿户傍賃旋人所居居久壊也立四泥垣埒汙泥􅘠其中而獨身居時夏方溽甚泥水中體客濕淫于腎腸腫發于幕鑱石湯火治不可救戊申十一月若甲子死距生年若甲子若月若日甲子四十有二君少遇筮者曰君當有大節惜乎蹇也畫蹇卦于紙且曰六九其遇二四其數也君初不解今解之也蹇也者蹇也六九者六九也蹇六之九所謂不事王侯者也二四者倒探之猶云得策十八者四十二也君長于文章而無成稿所存詩待刪集如千巻芳樹齋集如千巻甲乙詩抄一巻皆已刻其未刻者藏于家如千巻詩類何景明近為詩者莫過也娶郡祁氏名􅌢英明廵撫蘇松殉難贈太傅兵部尚書謚忠敏祁公長女賢有文章每與君倡和或君遠遊則必詒詩相問訊有詩一巻藏于家名靜好集子男五人長兆熊郡文學次兆鵬次兆驊邑文學次兆驥次兆鵠俱幼女五人兆熊娶邑董氏明尚寳卿董公𢡟中孫女生孫一允垣若甲子若月日將擇塟若所兆熊兆鵬兆驊同持狀造蕭山毛甡跪請為銘甡以言㣲辭兆熊泣曰先大人易簀時呼熊前囑曰守身誦讀奉慈慈幼此八言命固也西河毛先生吾肺腑交而流離走四方吾不能與之訣吾念之汝執筆記吾言是先生與先大人何如而忍無一言于先大人且先大人隱者也隱而何以顯者銘甡曰然可以銘已銘曰系惟四岳兆天水宗既遷既大大于姚江歴世顯仕垂珩珮璁各礱名節咸鐟鐘鏞繄惟夫子實紹司農退秉大義詎為苟容蕨食成饌土室是封衣剪薜荔詩裁芙蓉其同王考猶有敷庸或待闕庭或登鄉邦而君不然永謝世徵曩予攀鳳以君腹龍果逃海上見稱遼東仲尼有言君子固窮嗟其命詘不如文豐既歴坎坷亦羅罦罿貧無室居死于泥中穴乎有竁惟君之宫砆之瘞之利其後乗張梯墓誌銘山隂有三張子張梯張杉張楞也王正義先生以詩文㑹天下士三張子俱幼小坐末坐天下聞三張子名各爭起問訊已而見三張子在坐末輒相顧嘆息去順治三年征南兵下浙江山隂鄭遵謙率民徒抗之江濵張楞死焉張梯乃髠髮㳺澤中性不嗜酒至是飲飲必劇醉嘗與弟杉過維揚維揚人聞梯兄弟名爭邀梯兄弟飲梯既以劇飲稍成疾至是益甚歴晝夜下血不得止杉事梯如父不脫衣履晝夜坐梯傍篝火假寐聞呻吟聲輙前按摩之扶上行清不能拭惡杉為手拭日十餘上灑穢釁臭豪氂不見如是者五六月及歸而杉亦敝極幾死是時醫者多人不能得効有山隂倪君蕭山俞君錢唐張君戴君皆名下醫願為梯効醫爭造其家餉藥致餌晨夕調伺終不効遂死既死而張杉獨行人間者若干年前此三張子與蕭山毛甡友善甡避人渡江未歸至是杉尋甡于汝南城南之蔣亭酒酣泣曰吾四兄死若干年矣天柱之麓是其墓也顧無為之誌其墓者誌之者其在君乎甡曰諾乃誌之君行四字木弟世居山隂之曰魚潭稱白魚潭張氏九歳能屬文名聞當時為人孝友慈愛然好立名節從游于劉忠端公之門嘗入市有武人私詆公理學君直前批其靣武人初斂手避既而啣之然卒畏君名不敢前祁中丞殉後其家寢落里中豪侵中丞寓山莊田君挺身為理之其人雖素豪見君前輙惶恐謝還所侵去方鄭遵謙之起兵也兵無舂糧遵謙素與讓簷王氏不相能王氏家有多藏者遵謙將以是報籍其家君抗言曰讓簷王氏者非他吾舅氏王正義先生之族人也明公方假義旗相向而先以私怨使正義先生不得庇其族何用示天下拂衣而起遵謙頓請過狼狽乃止其為人方正類如此君代有令名其先數世皆以甲第著大節矯矯于時六世祖以𢎞明憲宗朝進士由庶吉士授兵科給事中以萬妃擅寵䟽諫得罪廷杖後遷江西布政使司參議五世景琦以進士授刑部主事治太醫院姦獄忤逆瑾意謫通判歴官廣西桂林知府有清德焉高祖元冲進士由庶吉士授工科給事中歴江西廵撫都察院右副都御史平江西賊曽從游于王文成公之門讀書浮峰山他日文成思之指浮峰曰此山卓犖不羣有似叔謙叔謙其字今所稱浮峰先生是也神宗朝進士曽祖諱一坤刑部主事歴官江西布政使司右布政祖諱鎡晉府左長史與劉忠端公講學及卒忠端率學者私諡正學三張子出而聲稱藉甚論者謂張氏益大乃驟當明季相繼落拓悲夫先是其五世祖景琦有仲弟景明世廟長史以入繼大統召拜相抵閣而死季弟景暘為侍御史皆以進士貴顯世稱前三張後三張焉乃系之銘銘曰於皇先生命世是期既邵義德尤工文辭氣竝川流臭如蘭颸踵武前哲貽規後來誰曰孝友祗在周鎬亦聞竒偉將邁漢造乃逄陽九旋遘百六中含霄澄外蔽泥濁紆其養仁厲于嫉俗生同時衰用致膚剥曩者晉彦首推孟陽與弟景季號稱三張曠代而下兩與頡頏前為逹著後當貞明固將飾節為時所方如何喪斯永閟不彰峨峨天柱惟先生藏表之樹之以揚令名禮部精饍司主事曹公墓誌銘予游汝南聞曹先生孝名自郡使君下悉以狀上之臺使者臺使者以上之朝廷予怪詢之或曰子浮江來獨不聞奉母江淮間曹孝子乎葢先生曾于避地時稱孝養云既而先生之子與予游持狀來示予泣且請曰此先大人儀曹公狀也先大人以孝死未有誌也惟竁之幽頼碣以彰翳孔竉之閟而君辭是揚予曰何哉君之為誌者夫飾碣于幽堂者以為光也砥文石于𤣥埏之竉以為寵也汙溲之沚光無所于施放廢之詞寵之而益鄙誰則用賤而語貴欲語賢而用不賢者而曰不然使先大人而尚書諸曹事耶則語貴由貴也使先大人而孝子也耶則是將以賢語賢也且先大人有言矣吾慚吾德焉耳胡可使貴官逹人得我譽也葢懼夫飾者也乃為誌曰先生諱琪字玉度别字淮湄世居息之臨淮里故明崇禎癸酉舉于鄉鼎革初奉母王避之江淮間當是之時以為母獨處驟罹兵革乃一旦輕棄墳墓流離遠土恐不得慰母心江淮間風土樂耳目旉豫可用忘歳月乃窮意極娛畢致江淮諸玩好什物媮靡鮮華雖親朋貺臨其在母前驕張施為詘人力無所顧此即當時之所為養母曹孝子也而母曰亦獨思歸耳吾不能去親戚墳墓居此鄉矣先生曰雖然柰公車何母曰兒為母而就公車不亦可乎於是歸上公車遂于順治六年己丑成進士策三甲第一釋褐復告歸曰願養母不願仕也越三年母曰為母而仕可乎于是仕授行人司行人然居嘗不樂每以迎母就養母不許鬰鬰屢請使思藉以歸省順治十年奉使詔延綏軍既辭行仰天曰吾欲假南覲而得西使命也乃兼道行詔畢南馳四千里荒山隃河得覲母于堂而留不行母叱之行于是行世賢録曰先生嘗請假歸省不得請終養又不得乃為書詒所親者當路曰汝南周磐讀汝墳之卒章用養母而始就辟也既已赴辟歴三縣長即又以思母而棄之歸然而朝廷不因之而無良臣草野不因之而無令子汝南人士即又何負于國乎十三年再請使南贑拜母于閭立赴使以還而稅諸家復不行醉而誘之行狀曰方先生之使贑還也自十三年丙申逮十四年丁酉而猶遲遲行值歳鄉試先生例當典試闈或勸之行先生曰得門生百曾如我娛親刻也遂不行適闈撤而較文者以不肖得罪凢無分大小分闈咸伏誅去而先生以遲行免或曰此孝之報云既而稍遷禮部精饍司主事復迎母就養母不許葢母重去土天性猶之昔之避江淮時母思歸也然而是時在廷官例鮮予養葢以杜趨避僥倖故先生于兩使時思以此得罪棄去因留之家而又不能也既而母卒先生曰今而後果不得養吾母乎曰嗟乎欲如向時奉母江淮間得耶負星而奔道病不能行舁之既而又奔至柩側坐卧于其下哭無時也上食必哭哭必盡哀及至後不能哭則以腹傅地呦如也既而大哭卒嗚呼孝矣或曰先生故不止死孝者也先生歸省時陳邑中利疾邑頼之如折畝如减夫如减繇皆有成效或曰先生久當為孝死世賢録曰先生之父象乾公用先朝覃恩授訓導今贈文林郎行人司行人祀鄉賢者當崇禎十五年二月一十二日闖賊攻邑城城無守者公踴躍呼士民登陴守之不克戰于闉闍不克戰于衢不克戰于巷不克殊扞而死先生拽棘前繼之母哭止之曰母在而子繼以死母何依乎乃嚙指礪掌晝夜嚎躃畫殺賊狀賊敗乃止則是先生之願死孝不止一日惜乎時不見用雖已成進士而仍以親殉猶然與孝亷色養時同見稱也雖然孝天德也稱曰孝可以止矣先生以順治十七年八月六日卒年五十七以康熈元年十二月二十一日卜塟于邑城東鳳鳴崗先人墓側有子男一人曰鑄由廪選甲午㧞貢士能文章有名為原配彭生彭早卒以覃恩敕贈孺人女子一適光山前進士應安廵撫程世昌子謙孚為繼娶孺人馮生有孫男二曰澄曰濟女孫四一適儒士崔嶷一適池州府同知宣紹中子汝楫一適前進士陜西布政司左叅政劉四端孫澍一適固始前進士新任湖廣按察司副使分廵辰沅靖道祝昌孫日恂先生有題旌崇祀諸典見世賢録銘曰至德云亡世無孝子嗟哉先生用孝而死南陔草柔北山杞長有親未祀何為方將幼讀汝墳長游淮涘白華絳趺以紛以斐亦歴銅街亦登金馬握蘭前墀䕶衣中府初展星軺嗣揚饍鬴以為靡家不在母側賜羹誰遺厠牏誰滌半菽勿承萬鍾何益乃遘風木遂歌山蔚哭踊辟朝袒括就位符表不食竝母以喪呉恒臨祭乃慟而亡勿譏曾閔敢嫓荀何苟能殉親皇咨其他有山可錯有刀可礱翳誰記之孝子之宫馬跼道傍鳥鳴樹側翳誰記之孝子之宅郭宗有道蔡喈無詞萬年是􅀢千秋爾思西河集巻九十一
