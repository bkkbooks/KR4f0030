body:
  text: 西河集卷一百八十翰林院檢討毛竒齡撰七言律詩七早朝和韻端門高啟傍青霄待漏初廻金水橋綵仗暗排雙闕麗玊階徐引一燈遙風飄御琯疑鳴鳯寒動朝衫許覆貂只愧仙盤頻賜露毎朝賜酪侍臣有渇未曾消下朝鳴鞭退後皷鐘稀日上松杉鵶漸飛庭燭乍收遙仗綵罏香猶在近臣衣蠻隨九陛陳琛去象駕雙輿負䌫歸咫尺皇威雖暫遠玊欄回望轉依依呉二東游三年流滯薊門關歸路重游徐泗間逸駕豈能留駿骨望鄉終自蔽龜山清秋醉向湖陵度落日吟從梁父還他日滄洲儻相憶為予東望大瀛環寄昌平道沈僉事二首軍都遙接塞門寛北䕶神京似奠磐舊衛尚持宣尉節外臺方重惠文冠牙開雄鎭邊雲静幕映前朝寢樹寒最喜子牟懐闕近日華高處即長安二北門鎖鑰壯皇封大斾朱􅓚間錡茸鐵騎不湏屯上谷金湯長此控居庸朶顔故部安三衛袋帶新裝賜九重聞道麟符分輦後登樓清嘯甚從容醉和任明府官署歌席原韻申江三月暮春天入夜華燈簇錦筵官舍有情啣獸斚客心無緖似鵾絃歌成三疊愁將變醉看雙娥使近前多少臨卭仙令客問誰眞是馬卿賢春日偕諸公集梅花樓并食即空上人魚餐即席和韻不愛桐君與竹君毎看花發思紛紜風來水曲初生漲雨過山頭尚帶雲醇酒早隨公瑾醉瑤琴願續惠休文有魚堪作伊蒲供誰道行厨少苾芬陶君雙壽荷花並蒂滿江潯並坐薰風鼓瑟琴記得述昏曾見志最難却聘有同心青蛾一奏瑤華樂綵鳯雙栖珠樹林終日題詩編甲子徴君吟過細君吟送杭州顧使若之任彦先才地冠中朝新賜朱幡領六條井邑雜通甌海路郡樓平對浙江潮花前試印開硃匣雨後行車駐畵橋誰道薊門乘傳遠專城峻望已干霄壽張學士早拜叅知領從班毎因清逹霽天顔詞頭日判鸞扉裏軫上星明帝座間人到講筵餘紫氣史成斷案若青山時為史舘總裁年年寳樹埀弧月載酒㩦花共往還唐公子授西安郡丞春桐花發待鸞栖黄綬金章惜解攜秦地通侯誇上佐謝家司馬重安西亭臨冀闕看承露車過嶢關却屏泥公府家聲曾不改嘉名何必向人題餞長沙趙使君湘州司馬汎星槎南雪消時好及𤓰虞愿舊曾官海上賈生從此相長沙琵琶峰轉看迎斾橘柚洲晴待放衙前上紫微如有憶春來應寄石壇花考功郎劉君主試閩中啣命東觀海嶠雄風流裴楷著清通持衡自昔推司列敏識于今藉考功萬選錢留浯海碧三條燭展洞蕉紅閩王宮畔長春閣時有天風下至公翁使君之桂林郡使君南控五驊騮萬里褰帷入桂州蠻地盡從辰嶺隔郡堂斜見灌江流枇杷花發行苗部鈷鉧潭清記柳侯此去建陵如戀闕晩晴時上望湘樓益都相公歸田後以冶湖汎舟作見簡且自叙晨夕鄉游之樂謹依原韻和答成詩南天從此罷樓船東墅時聞載管絃客至汎湖當雨後使來授簡及春前歴長不記移花日税薄剛逢刈麥天誰信太平元老貴竟同野稚餉炊烟寄贈黔南蔡開府使君重移幕府鎭炎荒御繖曾經賜武昌入蜀路開韋節度平吳功著杜當陽九隆爨税收青海四部蠻歌侑白狼欲汎一觴何處見雲龍洲畔即瀾滄贈别邵明府左遷之蘭州幕西上蘭州路𣺌漫參軍埀老遠之官故交綠酒傾來晩從事青衫着去寒塞柳凋随車後落嶽蓮高入幕中看上林多少鸞枝在誰道卑栖乏羽翰過江晤王甫白後旋有詩寄懐因依原韻荅寄錢塘江上對門居絶勝河汾一舊廬入洛已經逢季雅仕秦何必羡由余尋還高士廻通德記得思君在執徐咫尺西陵風雨近莫愁論學少三餘蔣將軍輓歌先生射獵早歸田門下重歌薤露篇曾破黄巾還渤海何辭青塜象祁連文螭自繞新題碣櫪馬猶披舊賜韉惆悵過庭蔣詡在方開三徑杜陵邊過姚使君寓樓答贈依韻金雙峙倚秋空迤邐尋君蕭寺中亭午薄雲方漏日新晴高樹昜生風攜來圖史披將盡亂後登臨感自同欲紀舊時監郡績請看杜牧贈姚公杜牧之有贈姚公詩見樊川集寄李方伯鶴繡犀鞶照錦茵屏藩高啟浙河濵關中轉運推蕭相洛下軍需藉冦恂滿道官花方向日盤根仙李正乘春賔門漸覺薇垣近幾度思君意倍親上海㕔事前枯槐再花和任明府韻洛令原推任峻才春風長拂印牀開分田不用兼收秫夾道能生半死槐紅雨潑殘新燧火黄花飛滿舊階苔星精自應三台貴何必王家再種來槐木為虛星之精故云送張學士給假還里四首給侍昭文敢乞身十年華蓋鎭相親蹔從丹禁辭明主要使滄洲識近臣私第慢教收祕笈還朝早已訂温綸洞門雨後春風發仙驥翾飛總絶塵二蓬閣由來多歲年此行未許遂歸田授餐還撤東堂饌賜槖長攜内府錢擁傳春啣金勒淺登樓時見玉繩懸還家總道家山好却訝蒼龍當晝眠學士所居在龍眠山三修文中禁許誰尋乍見鵷鸞出上林䟽入獨言親塟遠慨焉予告聖恩深城連百子思埋玉舟過三江笑鑄金移孝作忠疇得似年來空愧接衣簪四横門供帳傍春城况値淸明草又生中袐早詶圖史願東山終有薜蘿情六筐瘞後猶登壠五嶽游時慢記名祗恐聖明懐望切海門潮上促王程奉寄錢唐梁明府東垣才子興翩翩試宰錢唐年又年海日近從城闕上湖山長在縣門邊陶家種秫分官釀吳女栽花傍訟田只為愛聽絃誦好春來時有過江船田公子示詩却寄公子才名冠帝鄉趨庭猶自逐龍驤觀書爾獨追𢎞正結客人稱過孟嘗劍入斗邊雲氣盡文隨幕下海濤揚何緣共踞胡牀坐一唱陽春大道王趙生為武城宰銅符初綰濟河西此去陽平一望迷吳下高賢仍作宰晉陽公子實封齊官淸養廐皆齋馬學至操刀好割鷄當日弦歌如未撤慢嫌為政笑宣尼寄南豐令軒綏高駕向南城江介時瞻列宿明自得獨孤為茂宰儘教李覯作編氓壺中巖傍春雲曉旴下堂隨秋雨成華轂朱輪相送後有誰專對在延英送錢編修歸養雲間暫辭東觀返蘭幃相送青門望有輝國史預裁毛義傳宮羅先製老萊衣前臨通潞當南浦為望干山啟北扉顧去慈鵶歸哺早春來仍向禁林飛屠少府左補始興驛丞南行且莫厭官閒梅尉高風好去攀傍舍不湏撝緑綺開衙長自對靑山嶺隨陸賈乘傳去座有司農置驛還暇日題詩尋玊筍丹砂正好駐朱顔奉和高陽相公初春入直喜雪原韻東風吹雪滿重城錯認山礬散落英内府乘春忻有象天街入夜静無聲珠光照海驚龍蟄玉粒盈田任鳥耕但使三農兆三白萬方誰不荷生成二粲粲瓊霄接帝城羔裘重喜綴三英望添苑樹朝來色聽得宮鵶曉度聲闕下久淹東郭履山前誰念子輿耕難探相國憂時意不是陽春和不成奉和高陽雪中下直原韻雪朝下直快幽期控馬端門欲度遲雲葉擘成堤上絮天花散作手中絲高懐自埽迎賔路雅㑹難傳禁軆詩何幸玉堂揮翰早一時歌動郢中兒二靑女便娟未有期春空冉冉下來遲霙連似把靑瑶屑霰集惟抽碧藕絲發粟久從齊相請撒鹽終是謝家詩連朝僵臥柴車客也和新聲付管兒餞宋員外使𣙜贑關一軺分𣙜使南天正値都官拜簡年驛騎預呈候吏板亭餐不用算商錢横江路出蒹葭外望闕心懸霄漢邊只恐嚴關烽火近將軍從此駕樓船二星旌遙指鬱孤臺春到雙江水自廻撾鼓喜君乘傳至吹笳放客過關來厓門珠舶花前發海嶠金裝雪後開借問開元丞相裔何時可賦嶺頭梅員外為相國子同吳江俞鹿牀赴江覲臣蔡右宣閶門舟集即席分韻是日送施分司還宣州畵舫張筵汎水涯衣冠吳㑹集來賖近船歌散烟中柳隔岸燈埀雨後花客至早吟江總賦人如夜過蔡經家松陵高士相違久欲送宣州思轉遐雪中游張家園作名園雪霽快追陪酒釃冰壺凍未開豈有瑶臺乘馬至却疑雲漢汎槎廻樓高俯見雲千疊裘敝偏驚風四來不信燕山方十月寒枝發盡嶺頭梅送東莞令之任青袍如草鷊如緺萬里炎方去路賖縣斾乍迎嶺徼月海田先種日南花獻來紫貝當輸稻收盡紅棉好及𤓰滿匣印泥方照眼何湏句漏覔丹砂送益陽江明府為郎上應軫傍星八月秋風過洞庭戍火夜銷平蜀路官舟曉泊望湘亭黄陵過雨衣常潤白鹿啣花車未停莫道攜琴高和少湘靈一曲暮山靑雨後小飲任氏草堂卽席拈句草堂積雨未曾開霽色忻逢酒一杯風息草頭知礙竹日穿葉隙見殘梅當軒野鳥横烟下滿案江魚堆雪來自昔題詩傾四座何人不讓彦升才劉明府赴任南漳陶令南行心自閑十三徽上綴珠殷名同星列丹霄上操比漳流清漢間編户遠連龎統宅閒田長在卞家山期君便作南游客極浦看雲共往還送周長陽之任都鄉本是大夫才欲赴長陽作宰來官牒下迎吳㑹遠縣門高向蜀江開亭留白鶴雲常䕶峽過黄牛水自廻此去荆門争戰息江關何處有烽臺秋初從吳中歸値甬東葉天樂以詩下詢依韻答之杏子街頭墮寶鞭野橋歸路興騷然傾囊不載黄金賦買酒還啣緑玉船别妓遠從花港外思君久在竹溪邊時天樂避地竹溪炎天衣褐無繇浣何幸攜來白雪篇二吳中意氣贈歸鞭正値榴花似火然風過毎懐高士榻月明初到下江船時逢乾鵲塡河曲㑹有雙魚寄海邊只恐采蕭歌未斷相思還著九秋篇余將往都中任四辰旦招賞芍藥和韻名花初發日遲遲共對閒堂把玊巵紅白間來深淺色參差開作短長枝嬌嫌日炙從遮幔香逐風生似解褵一自洧川留贈返到今相顧眼迷離益都夫子生日與同門諸公共祝長椿寺飲次奉和夫子首倡原韻公府同師陸象先良辰高㑹法堂前慿拈麟紱環龍藏敢謂羔裘藉豹緣誦去波羅聲習習醉隨海鶴舞仙仙八千總是長椿酒好借花宮祝大年餞鈕明府赴項城百里雷封始拜除衣縣錦帶佩銅魚久傳潘岳能為賦豈有高柴不讀書露濯繭絲堪作縵秋來烏鵲解迎車潁川自昔多循吏攬轡三河思有餘餘姚諸徴君六十并其内人偕壽千葉荷花卷作巵客星山下看彈碁才名舊已誇甌越甲子今還記義熙履道與人同繪靣深房有婦且齊眉十年前與長庚㑹五十時曾以文與詞為壽從此綏桃採未遲餞薛中丞廵撫上江璽書新拜大中丞𤾂口高懸幕府旌水國星分吳楚㑹晴㠶春上建康城九賔方集官僚長四岳曾逢江漢清由湖廣方伯轉太常卿故云此去儀同閒作鎭東南萬里正休兵恭祝李少司農夫子初度三首煌煌㑹計佐天都薄海新歸一版圖唐世間稱中宰相周官最重小司徒當陽武庫曹端肅李絳文名天下無暫假春盤介春酒百年長此進屠蘇初度在正月下浣二甞陪華葢引崇班出長人曹鬢未斑圖為重農時再啟門因却餽晝甞關纈袍舊領東堂賜文劍新從内庫頒才捧百年觴欲進陽和頓逐探春還三珠繩轉後物華新此際生賢似有神正度上元談甲子時嵗次甲子豈同下士守庚申庾開近賜春前酒户闢方塡海外塵是年臺灣甫破三載司徒年未老耆英未是㑹中人徐起部以小箱作枕函外裹以綺名曰詩枕自題索和高吟長臥鬱金牀暫借游仙當錦囊覆褓結成魚口襭方函空似女兒箱開緘已覺通明遠得句偏教入夣長行笈自來無袐事不湏衡論比中郎送趙侍衛弟出鎭永寧早領鉤陳典禁闈為聨戎索出金微帳懸牙將新收鐵篋貯今皇舊賜衣馬邑營連環紫罽雁門關險傍朱旂辭朝祖帳盈車轍誰道軍前揖客稀二將軍出塞備才賢金殿承恩正少年宣府兵迎冬雪後渾河馬渡夕陽邊垣間掣電知搖斾幕有飛烏為控絃却憶侍臣同下直鶡冠長遇禁門前三開平舊衛久休兵欵塞無煩更請纓𠂻甲露㸔銀鯉躍耳衣風傍錦貂生時開邊障排雲陣夜擁灰罏畵地營兄弟城陽輕此别肯教皇甫厭逢迎勅賜瀛臺秋藕叩謝恭紀延景門西太液寛秋登碧藕餉詞官蓮衣紅散丹臺影蔤節香分緑水寒玊戺横陳驚雪積金門偃息媿泥蟠空教三載相如渇長向仙人掌上看欽簡日講官宣入乾清門引見志喜金殿𢎞開詔集賢微臣何幸與陶甄恭聞銀蚪宣宸禁恍見丹書出御筵象繫未詮瑤册裏星文先繞玉階前桓榮稽古如堪賞那數東京侍講年送何使君出守牂柯亷范高風不可攀西行何惜路途艱漢家初闢犍為郡太守能通瓦甸關喻蜀文章開百𤏡渡瀘風俗變諸蠻從來叱馭忠臣事安用朱旗九折還二刺史行邊析守珪青孤山險雜羗氐魚鳬盡處遮三峽馬援前時過五溪部遠不辭穿赤甲官亷常禁採朱提使星未許長留蜀幢葢還朝望豈迷金魚池聞笛餞陸大歸里并示其令子曾禹水滿池塘酒滿巵平欄吹笛使人思賦成宮柳遮新埒歸見園花落故枝陸大時喪婦信至近岸錦鱗將掉尾摩天黄鵠未啣雌還家賸有超宗在涕泪應霑華黍詞天安門頒詔雙闕平明捲霧開九重頒詔出層臺旛懸木鳯啣書舞仗立金鷄下赦來彩櫝横時天宇豁黄封展盡聖心裁䇿災本是賢良事何處還尋杜谷才送平驃騎出守東平玉節新分驃騎營須句舊地重東平旌門時啟中都路弓月秋翻海上城堠轉琱戈廻過騎漕來輓粟聽鳴鉦黄山尚有遺書在東去寧無進履情魯太史歸覲薰風六月漾芙蕖歸向東園馭板輿破闥暫飛蓬海燕還家方饌賀湖魚裁來暑帔當宮錦束得晨裝是袐書此處槐堂堪愛日待君重數八甎餘翰林院中舊有柯亭劉井井為劉文安定之所鑿柯學士潛手植二栢建瀛洲亭以臨之李西涯詩有云我行樹隂日千匝是也今遺蹟尚存而其人已往同年尤太史過此慨然有感遂成二詩予與施侍講彭編修陳檢討同和其韻東觀曾開玊甃寒後園鑿井笑劉安銀牀不負丹砂甕金綆猶埀白石欄起草日添麻底潤覆桐秋老葉中乾相看一片冰花鏡欲寄蓬山難又難二瀛洲學士本重來尚有軒牕水際開地勝不湏通黍谷名高從此近蘭臺簷前虛挹波千頃樹下閒行日幾回多少登臨歌詠去問誰堪繼栢梁才陸明府之郟初拜郎官汝水邊河魚秋上待烹鮮車驅宓氏攜琴日地列周王定鼎年紅斾吏迎嵩外驛黄陂人種魯東田十年同學方游仕手攬青袍思黯然送張太守之濟南銜命東行海嶽秋使君著績在秦州曾為秦州守破賊有功詔書特賜楊承令竹馬新迎郭細侯衣覆黄金腰底綬花含白雪郡東樓此鄉原有前賢蹟早晩應傳買犢謳寄蔡君七十子尼埀老着青裙七十年來齒倍芬西塞巖邊誰是侶南州座上毎逢君尋還宛委餘金字望盡鄉關見紫雲羡汝趨庭方入對請纓闕下有終軍西河集卷一百八十
