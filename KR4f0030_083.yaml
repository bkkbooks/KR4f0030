body:
  text: 西河集卷八十三翰林院檢討毛竒齡撰傳十一列朝備傳郭東山郭東山字魯瞻萊之掖縣人𢎞治六年登進士知紹興山隂縣以憂去服除補濬縣薦第一十六年召入授陜西道監察御史首論英國并以天象陳權倖交通數事觸時忌奪俸三月正德改元使頒賞于陜西三邊二年出按宣大二鎮時邊冦犯獨石宣兵畏縮乃趣令進而調大同兵犄角禦之冦遁追斬數百級捷聞賜金綺如是者數逆瑾亂政邊儲嵗一覈實受命徃察有欲苛刻迎合者東山執不可瑾銜之時巨璫開三厰偵事勢焰薫灼其昆弟厮養卒冐名入籍以邀功賞東山在鎮復裁抑之于是奸黨搆陷逮東山於獄被笞免官七年起廢擢四川按察司僉事鴇賊寥麻子喻赸横甚時以受撫挿臨江市既而復叛朝廷命左都御史討之而以東山為監軍由德陽至劒州累捷東山料賊勢必走潼川伏兵起江賊果至半渡擊之俘斬甚衆及次射洪遇前賊親督行陣斬右掖長不用命者以徇諸軍奮勇縛其首蠻端公轉戰至牛山及三义溪連有俘斬獲赸妻子及輜重賊狼狽不支轉而奔北乗勝長追行縢鐵澁與士卒共賊計窮乞降十一年擢副使撫治東達適僰彛普法煽亂東山署川南道事討之抵葛魁諸寨擣其巢元惡授首其烏蒙部諸寨亦隨宜撫輯之奏聞加俸一級仍莅東達十三年擢右參政以疾疏乞歸卒張士隆張士隆字仲修安陽人也𢎞治八年舉鄉試不第攜母妹就太學卒業遂與三原馬理講學至十八年始由進士出身授推官入為監察御史巡鹽河東當是時光禄卿李良曽以女字劉健孫諂健既而健為瑾所去乃詐言女死謀他適士大夫多薄其行而鹽法運使劉瑜貪狡壊法人人側目士隆劾罷良復劾罷瑜時皆快之正德九年乾清宫灾士隆疏曰陛下前有逆瑾之横後遭薊盜之亂既不知警方且興居無度狎暱非人徹夜燕游外見烟燎内官取貨于外武臣黷亂在位扣尅軍糧名曰進貢織造龍幄科害靡極賢黜而奸進翫至則患生夫裒衣博帶之雅孰與市井狡穢之羣廣厦細旃之娯孰與邊徼驅馳之險不報巡按鳳陽織造太監史宣者出荷黃梃二列之騶前名賜棍有抗令者輒杖殺之自都御史下皆莫敢問士隆按列其罪狀疏之令去暨還院而大猾張順往隨中官使雲南殺人仍匿之京雲南巡撫移逮甚急不得已出官押以二𨽻至桃源貨𨽻招淮上病丐斃之告順死勘實給文歸已二年矣士隆疑其案密廉之數月乃忽得順于淮上而坐之以辟時廖鵬附錢寧為奸初兄事廖堂夤守河南積金如丘山堂敗又以鸞為兄謀子鎧守陜西而已入錦衣理事廖氏父子名隆隆起京師元臣師保皆降席相接士隆率僚屬疏劾之其疏有曰堂前鸞後兄弟擅勢鵬内鎧外父子作慝鵬毒河南既招羣盜鎧虐關右必召邊釁朝廷豈無他才專用一家兩省亦有何罪罹此百害疏入寧大恨㑹寶坻薛鳳鳴以罪削御史籍無賴諂諸佞倖而寧以通其妾故尤曲庇之嘗與從弟鳳翔訐嗾緝事發其私收詣刑部論死部疑有寃并捕鞫鳳鳴鳳鳴使其妾懐狀自殺長安門狀聞仍坐鳳翔死而立出鳳鳴于理且詞連寶坻知縣周在并素所讎者數十人逮赴都察院院長下士隆暨御史許完先後雜治士隆乃重掠鳳鳴取伏而釋周安等數十人寧怒令鳳鳴女告治獄偏枉下士隆并完詔獄復謫士隆判晉州完判定州時院中周鵷潘倣等皆被議悉賂寧免而士隆毅然獨行既而陞知州嘉靖初始復御史然忌之者猶擬以知府缺用尚書石瑤曰凡官居以資深超用而謫者罷者反以淺資拘常調是佞者常伸而忠者常詘也乃以士隆為漢中兵備副使㑹漢中賊王大王三閻仲良結回回入冦官不敢捕所在立親識急則投匿號曰賊主士隆至首諭之曰能擒賊者為良民有功受髙旌不能即為賊至殺身屠其妻子孫而瀦乎其門夫一反手間而是二者于禍福何居民初聞之憬然既而猶豫乃取賊主怙惡者十家破滅之于是賊主争獻賊無一遁者無何卒于官附錄被獻徵錄分省人物考皆稱薛鳯鳴以殺人為巨盜逮又夜自殺二婢子置朝門外懐牒訴其寃而實録稱與從弟鳳翔有怨收詣刑部又使妾自縊長安門愬寃與諸書稍異今從實錄楊旦楊旦字晉叔福建建安人太師榮曽孫也登𢎞治三年進士授吏部主事歴郎中以剛直聞嘗考察京職有被黜奏辯者奉㫖再覈尚書馬文升欲改擬旦獨持不可曰改擬非例也且倖門一開後將謂何既而陞太僕少卿尋改太常正德初予省還京逆瑾要一見不見遂以違限例出知温州府有能聲時瑾偵邏旁午府縣苦誅求旦獨鎮以静民賴之安遷浙江按察副使提督學政瑾誅起應天府丞進順天尹貧民有負内供不能償者請以贓罰并帑藏之羨者代充其逋仍禁縣吏無重科四方流民薦食京師道殣相望因募人為叢塚收葬之明年陞南禮右侍郎尋轉北改户侍總督京通等倉西羌回賊犯順甘肅繹騷奉勅總理糧餉所在充足開中鹽課以其餘均給三邊及賞賚哈密有功人哈密推戴上恩誓不敢負當永樂時其曽祖榮從文皇帝西征過甘肅人德之今旦至甘人舉手曰是楊太師後耶率遮道來瞻以獲識為幸無何陞都御史總督兩廣軍務兼理巡撫㑹蘇岡十八山滴水巖青龍岡㡌子峰等寨猺獞負固稔惡大肆焚掠乃調集官軍分道並擊斬級一萬一千有奇俘獲四千一百有奇奪回擄掠男婦二百三十有奇牛馬輜重無算捷聞璽書褒之逆濠之變南贛撫治都御史王守仁已咨援兵旦即委兵備僉事王大用朱昂都指揮董禎馬英率驍勇五千直薄南昌前後凡九咨守仁未幾濠就擒始徹兵歸田州土官岑猛初以岑濬亂得罪降級請謁權要希復職㑹龍州土官趙源亡後以姪相嗣猛乗間黨源假子韋璋以計襲破龍州逐趙相遂賂本兵及當國者使璋冐趙宗奪龍州且欲藉是復已原官請託于旦旦執不可而當國者廣人也子弟素與叛人通又本兵擅威福凡巡撫在外嵗有厚餽而旦獨無有當國者與本兵交怒旦乃嗾巡按廣西御史曹珪誣劾之幸吏部持公為駁白誣卒不行未幾丁内艱服闋起掌南院陞南户書又改南吏書踰年又改北㑹桂萼張璁以傳奉陞學士旦率部院諸臣上疏論列語極激切一時悚然用是忤㫖遂為給事中陳洸誣奏致仕年七十一卒俞敦俞敦字崇禮江都人也以進士改庶吉士出為刑科給事中首劾江彬不軌事聞者憚之其後次第陳禁門守衛縁邊賞賚及薦舉臺閣諸弊皆有裨時政正德十三年特㫖行勘河南總兵張璽等夜夢巨人授天理人心四字後按罪狀具獄衆懾伏錢寧重敦名求與交納敦峻拒之且不為延接時上亦特賜銀牌金織衣以旌其直既而遷禮科右給事中世宗入嗣敦首疏四事一去壅蔽二親儒臣三立紀綱四惜名器後賜麒麟服與翰林院編修孫承恩奉詔勅犒幣諭賜安南國王黎晭道聞其國叛晭遇害還行至梧州病卒敦生四嵗亡父其後居母喪痛母勞苦不盥不櫛不食稻衣絮者三年人稱其孝云李紹賢李紹賢字崇德其先巢人洪武初有李文者以軍官隨湯武襄王戰采石有功籍𨽻泗州衛紹賢生有大志正德二年舉于鄉十二年中進士觀政户部例户部饟邊銀有火耗如干觀政者皆得分其餘紹賢却不取釋褐授行人司行人遂奉使賫孝貞皇后遺詔詔江北至徐州開讀徐州太監與州衛官不得並行禮命撤太監席太監帖然不敢動㑹上謀南幸兵部郎中黃鞏翰林院編修舒芬等已具疏留而紹賢偕行人司司副余廷瓚等復同詞入諫上怒甚詔獄尋梏拲跪午門五日而終以語侵中官怒不解遂于釋跪日杖舒芬等三十而于紹賢等加至五十紹賢死嘉靖元年遣鳳陽推官吳璟諭祭降勅贈監察御史建顯忠祠初杖紹賢時彬等密伺之慮不死隂遣醫者市杖膏而傅以毒是時死者十一人行人司居其六而紹賢最烈戚杰子伸附戚杰字世秀中都泗州人父昂神武衛經歴生杰有異徴八嵗通一經十三嵗補州生員嘉靖四十四年㑹試中式隆慶改元除河南上蔡知縣上蔡故多盜民嗜訟杰到官日大書民之父母四字于堂約與民更始力行教化督閭胥振鐸以儆舊俗俗為之變巡方御史頒其所條上十事檄庶司受成著為令大計舉卓異第一擢吏部稽勲主事當是時進士重京職薄令長既行召即棄去若侻杰獨經畫所未盡者設立丈田法竣事乃去㑹稽勲正副郎缺杰以主事攝司事有革職知府謁選陽言贈書投一匱于邸鑿書而空之實以金珠杰啓匱大驚曰傖何敢然舁匱五達而疏諸朝治之如律無何調考功忽思親以歸養請不許遂稱疾去事二親三年神宗嗣位起原官既歴選司員外郎㑹進退天下羣吏以盡瘁得疾萬厯四年遷考功郎中是年復當計力疾視事著吏部職掌一書既而核各省學政攝四司事瘁甚疾陡發不可治遂卒于官杰有概節幼聘花氏女女盲且罹風疾婦翁以杰舉于鄉請自罷不可既而女亡始他娶子伸伸字起蓁方杰死官時伸才三嵗母教之讀書儼夙誦者九嵗舉童試于鄉督學御史奇其才乃屬以對曰九嵗童生伸應聲曰萬厯皇帝既而以選貢入監與嘉興錢士升輩為文友稱七才子故事南監試居首例進于北伸兩居監首遷北監萬厯四十六年舉京闈鄉試次年㑹試中副榜伸不受選顧性孝侍母疾嘗糞刲股請身代無所不劇及親故而刻木為二像祀祠側崇禎改元登進士除户部主事使𣙜滸墅時兵餉不足𣙜稍嚴伸獨寛其𣙜坦坦然吏無譏訶才足辧解額不贏一錢當事已薦伸而中貴有索伸名刺以為重者伸不與遂乞假去先是伸未去官時日不給吏有指無名官錢為可取者伸笑曰吾授經里門貧未嘗減于今也嘗夜坐婦兄蕭君書舍見白光如流往來亭桓間以告婦兄婦兄掘地得良金千鎰請割其半以謝予而未有取也夫即人間無名錢而不之取也取官錢哉焦芳焦芳泌陽人天順進士李賢以同鄉故引入翰林芳曲意仰事賢隂遣細人侍嵗節視酒饌同于子姓時將以侍講遷學士或語萬安曰不學如焦芳亦學士乎安咍之芳聞大恚曰是必彭華間我也我不學士者且刺華長安道當是時翰林纂大訓為東宫進講其書皆華等為之芳恥不與至是遇進講芳故摘其疵揚衆中同館夙以禮相齒芳獨猜狠無文又多口衆頗畏避㑹芳黨尹旻父子旻敗株累謫桂陽同知芳疑出華安二人所為銜入骨𢎞治初陞霍州知州尋陞四川提學副使上書乞憐調湖廣副使乃百計謀復翰林未幾陞南通政以憂歸㑹南祭酒李傑服闋待除傑亦故出自翰林錢溥欲遂以翰林還傑劉健不可曰焦芳伺此久矣今日援傑明日能拒芳耶溥不聽及傑入芳兼程至亦授太常少卿兼學士尋擢吏部右侍郎日于衆中嫚罵健其在禮部行文書有不可意即引筆抹勒不關白尚書俄改吏部時馬文升為尚書老臣亦並加姍侮且隂結言官使抨劾素所不快及在已上者因求入内閣為謝遷所抑尤怒遷毎言及餘姚江西人輒罵正德初户部尚書韓文疏論㑹計不足詔廷臣集議僉謂理財無奇術唯勸上節儉而已芳知上左右有竊聽者大言曰庶民家尚須用度況縣官邪諺云無錢揀故紙今天下逋税匿税何限不是之揀而但云損上上聞之大喜㑹文升去遂以芳代之給事中劉􅉅陶諧等共劾八閹韓文將上疏疏當首吏部走告芳芳曰我大臣也知格君心而已既而文伏闕上召諸臣左順門芳故曳履徐行曰今日之事為首者當之而乃預洩伏闕謀于瑾瑾德之健遷去瑾援入内閣累加少師華蓋殿大學士凡瑾所以濁亂海内變置成法皆芳導為之芳過瑾稱千嵗公公自稱門下每事先得瑾意出言如一口且寡學其閲章疏不大了而伺瑾頥授四方賂瑾者先賂芳立應芳子黃中亦傲狠不學舉進士廷試必欲得第一李東陽王鏊為置二甲之首乃言瑾徑授翰林檢討又一年驟改編修録黃中策與一甲三人並列然尚時時以不得狀頭移怒東陽罵詈之瑾聞之曰黃中昨在吾家吾試之榴詩甚拙顧恨李耶瑾嘗怒翰林官傲已欲盡出之外張綵勸不可及纂修孝宗實録成瑾復持前議綵復力勸瑾意良平而芳父子與其私人檢討段炅輩文致諸翰林密投瑾乃以擴充政事為名出編修顧清等二十餘人為郎屬餘姚薦舉四人以試文忤瑾瑾持文至閣必逮遷且籍其家東陽解之芳厲聲曰縱輕處不當除名耶乃黜遷為民而榜逐餘姚人之為京官者滿刺加國王所遣使亞劉本江西萬安人名蕭明舉以罪叛入其國而與其國人端亞智等來朝既又謀入浡泥國索寶殺亞智等方下勘奏而芳批其尾曰江西土俗故多玩法如彭華尹直徐瓊李孜省黃景等多起物議宜裁減江西鄉試解額五十名通籍者勿選京職著為令且謂安石禍宋吳澄仕元宜榜其罪于朝堂使為他日用江西士人之戒楊廷和解曰以一盜而詞連通省試事至裁解額亦已足矣恐宋元兩朝人物或不便併案否乃止芳大都深惡南人其于江浙尤甚既裁江西解額乃復増河南陜西山東山西各三十餘名而㑹試南北并以四川入南巻而分南北各一百五十名令均意猶不足毎退一南人進一北人輒喜雖尚論古人亦必詆南而譽北嘗作南人不可為相圗進瑾其與修孝宗實録亦以筆惡南人若葉盛何喬新彭韶謝遷皆肆情誣詆反自喜負曰今朝廷之上有誰如我直者始張綵為郎時芳薦以悦瑾覬共奸利既綵為尚書芳父子納賂薦人無虚日綵不能滿其意遂有隙而段炅見芳勢衰轉向附綵盡發其隂事互搆于瑾瑾大怒先是土官岑濬没入家口當給賜大臣芳聞濬妾美求得焉嬖之與其妻反目至操刀殺而黃中乗芳卧病逼通妾淫毐嚙臂時就寢醜聲達瑾瑾常于衆中斥芳父子㑹南司業缺芳乞瑾擠汪俊為瑾所斥頗愧沮而寘鐇初平禮部以黃中充頒詔使瑾復于左順門斥芳不聽行芳乃立乞歸黃中疏請送父并匄閣廕以侍讀隨父還里瑾敗科道交劾芳父子黨瑾當正法以尚有奥援僅削其散官月米黜黃中為民而芳使黃中大賫持金寶分饋權貴上章求湔雪復官吏科駮之且歴數其罪于是吏部覆奏謂芳當瑾用事時首先附和蠧政亂法黷貨淫刑援引憸邪殺害忠正一切欺君誤國之事瑾意未發而未遂者倡引助成無所不至本當急正典刑偶䝉寛貸已屬漏惡不知慚悔反肆奏辨殆鬼神震怒驅令就誅乞將芳父子械繫法司彰天討之公雪人心之憤為萬世奸臣之戒覆上隨令緹騎捕黃中黄中棄貲重狼狽遁走及得㫖始免芳居第宏麗治作勞數省大盜趙鐩入泌陽火之發窖仆牆多得其藏金乃盡掘其先人冢墓襍燒以牛馬死盜骨曰使無擇也求芳父子不得取芳衣冠被庭樹面縛如首罪狀歴數之厲齒拔劍斫其首而使羣盜争糜之曰吾得手斬此賊幸矣鐩後禽德安臨刑呼市中曰吾非反者吾欲誅焦芳父子以謝天下而不能也瑾姪劉二漢亦曰我死固當第吾家所為惟焦芳與張綵耳今綵與我處極刑而芳獨晏然家居豈非寃哉附録是諸書載焦芳比尹旻父子而弇州别記稱尹龍要旻子名耳獨弇州于其官爵遷次不甚考据其云擢吏部右侍郎則是禮部右侍郎轉左改吏部進尚書者吏部但為左不為右也且其云進尚書後韓文疏㑹計不足則尤誤芳之得代文升為尚書正為議㑹計一節耳又云黃中授翰林檢封踰月遷侍讀則誤之甚黄中不由庶吉士授檢討踰年改編修至芳告歸時始陞侍讀同歸此實録與他書彰彰者而弇州之謬至此亦可異也西河集卷八十三
