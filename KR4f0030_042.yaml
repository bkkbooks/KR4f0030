body:
  text: 西河集卷四十二翰林院檢討毛竒齡撰序十九彚刻南巡記頌録總序古巡狩無頌辭孟子載夏諺而頌辭興焉我皇上德被寰海一巡再巡頌聲滿天下當其始省方念切惟恐小民痌瘝不一周知而山川土俗且相隔而不之浹而其既則觀河祀禹遍顧閭閻而咨以疾苦其間省軍減從凡太馭掌較司賔職會未嘗有欒鈴鼓柝之設因之羃鼎不張帷宫不御田更市販趨走如故則夫王通所言虞帝一歲四巡而國不費民不勞者于斯有焉東漢光武巡行南陽特召父老吏人與之飲食兼復其租賦他未嘗有皇上羽騎所至輒有犒恤東南大省盡捐賦稅是車駕經行而民受大賚真所謂不遊何休不豫何助者謳頌之興即起帝嚳虞舜夏禹周成而一一記之未有若今日之盛者也草臣聶先託迹吳門親見夫萬戶歌思兆人慨慕攀鑾留仗向天號泣而臣民之陳謳獻頌者萬紙盈集皇上慮涉鋪張屏却勿納然而民志殷焉臣聶先隨遇所見彚録一帙不務㨑剔庶存大旨于以鼓休明而歌太平不無有助因為敷揚之而題之于篇李廣寧課慎初集序開國之初天必生勘亂諸賢以拓疆土而繼世稍定即為天地闢經緯之資堊飾民物故揆文奮武往往相倚而當其王氣所鍾則參墟豐邑每萃其材于一區將易所謂嚮離以佐治而動為甲兵即靜為文明義取此矣我國家從龍之彥盡出遼海青山李氏尤以大勳在王室勒旗常銘帶礪父子兄弟皆仗旄負纛功名蓋天下迄于今即以遊仕蒞九州牧伯不一而足乃廣寧先生獨擅文譽比之東吳之有平原江左之有康樂自通籍以至課績所至燕齊吳楚山川風物舉凡賔客之往來政治之得失悉有以見諸篇章而形之賦詠渢渢乎文章之能事稱極備焉往豫在京師序廣寧所為詩猗猗雋永趣昭而辭壯韻流鋒發嘆為近代詩人所未曾有今則體裁既遍卷帙更博自鬲津楚遊數詩而外益以耕露元對諸草髙文典册合為一集庶幾哉滄海之洪觀矣易以山嶽之尊下于坤輿名之為謙而夫子誦其勞而不伐有功而不德顧往往以語言概之故謙本從言而繫以德言禮言驗其恭謹今先生以課慎名集已極卑牧乃復由渤海專城東方千騎不憚越數千里惠示兼本索一言以題其篇何善下也夫物薄而用重者則謂之慎功大而語下者則謂之謙故勞謙撓過每至贊易者並提而論而先生之集有以兼之讀先生之集而不嘆為德言之先資髙文之厚藉豈人情矣顧溪翁拈頌序嘗與張杉寓天衣嫚侮知識戲拈梁山牧牛頌以試之各口占數語而雜以諸方語録非知識所素曉者知識分别是否乃句割而字析之如肉之剔骨而白之判黑張杉始愕然因而信之且好之而豫則至今未有省也會豫官京師天子召知識圜公令居萬善殿而圜公以病辭先涅槃十日預定行期為疏謝至尊兼作書以别所知者當是時其所記莂者顧溪翁也吾聞溪翁居長安口不言佛日與公卿大夫抵掌論時政得失溪翁氣故豪抑且多學將遊于選人以見諸行事不知其所記莂者抑又何等得毋以世法當佛法與乃溪翁歷參諸方多有拈頌其先後圜公而願授以法王法者且比比焉豫請急歸里而溪翁南來復得讀舊時所拈頌茫然不省一如前之拈梁山頌者豫方悔相從之晚而張杉已物化假使杉尚在得見是頌不知以視當時之所拈又何等也若其附棹歌諸詩則船子倡和别有解會歌苦者非通州司馬詩也兩浙提督學政春坊鄭公新任序自昔三年一比士每遣使巡視諸學而宋崇寧間遂有提舉學事之制令専興學政歲巡所部此即提學之所由昉也我國家設官分職一循舊制獨於學使諸路天子念東南文盛特遣江浙兩省比之直𨽻既改道為院而以曩時直𨽻用侍御史者今更以詞臣為之非曰蘭臺柱下舊本相通祗向以史館權輕惟臺省知雜可以杜怨望而斥鄙薄而今則堂堂使臣無敢褻越第出槐廳學士子手秉衡尺以之坐鎮而有餘則夫向之用御史者所以重事權而今之用詞臣者抑所以崇文教矣春坊鄭公由青宫近臣視學吾浙其生平藝文固足以上副主知下慰人望獨是學習稍弛以冰清之府而視為羶薌雖伯夷仲子之操皭然不滓猶必以潢汙目之在他人之覬覦而干進者固亦不乏而屬垣闞室其將緣窺伺而思以中之日三至焉世亦知先生之髙行固何如者耶夫致身通顯貴乎早成故有志特達者往往詘指年歲競以三年執政五年持槖為盛事而先生垂髫登第方以丁年為十九人中之冠將進此而黑頭入侍控馬長吟所為其年不可及者而乃棲遲閭閻踟蹰子舍者越二十年即戀闕情深猶且偃仰東園從容就道其甘心寧淡為何如者天下未有薄於世榮而猶可干以所私者也況貴視其所與窮視其所不取先生方鄉遊日與諸同志飲酒賦詩登山臨水遇逺道客至必典衣治具為交遊歡其髙談性命咨諏治術每有口道榮利以為恥者甚至當事見重有邀以請託藉之作舟車僕賃之資而傲然不屑却之如浼非髙懷峻潔皎然若冰壺之湛於胸何以得此且夫先生之得人非今日始也在昔西南甫闢昆明乍收朝廷以揆文為奮武之略特命先生驅車萬里主文其地一時文教煥然麟麟炳炳即至􅌢弓擐甲之徒亦復詘躬搖筆聽鹿鳴而膺論秀一何盛也夫銅街備官亦既多日其同籍諸賢已有進持槖而至執政者而先生方庶幾服官之年出典文柄倣之故事原有下車迎慶之典況初度甫值則又舉觴所必及者竊思文昌六星在魁前炳耀介於諸府故天之六府皆稱文昌而先生以司命該六府之盛此與弧南之壽正復相埒且詩不云乎周王壽考遐不作人夫文王以官人稱矣奉璋髦士無非良材濟濟蒸徒昭于雲漢其官人之功何關年歲然而誦其詞者不曰萬壽無疆則曰祈爾壽考然則文王之壽以官人傳先生之年以作人進在前迎慶原以朝廷之得人為吾浙賀在後舉觴即又以先生之作人為天下賀也因合志其辭而為之序沈母陳太君壽序師尹又宗尊人也古閨中無頌禱之詞近世尚生齒凡閨闈內外懸弧懸帨槩有頌詞故豫自弱冠即為親朋閭里行文寫幛閲五十餘年其為文不知凡幾大率金泥鼎篆為屏幛光悅已耳其文置勿弆即弆亦百不得一二而乃有不盡然者沈母陳太君以潁川名族而歸于吳興少時工織絍婉娩姆訓且席王父方伯公後知書􅈺禮讓不幸而兩失怙恃相依中表間然且剔臂和糜以報其鞠子之勞暨乎歸而相君受室餽祀獻饗仍然以不逮事尊章屏巾却御比之桓少之從夫樂羊之事親較有類者獨是豫與太君之子遊在十年之間其尊人文學公早年有聲豫嘗與其家司法褐衣席帽應崇禎已卯鄉試已知文學公頭角嶄然暨同遭國故見公與太君負鍤偕隱然猶竊誦其所為文以為難及至若一門羣從都官詞翰其為聨丹陛而惇世好者又無論也乃師尹又宗兄弟但讀父遺書以祗服母訓自豫歸田後而與豫益親若以豫為江左老成可以備冠冕本源之問不憚載酒造廬以相為周旋夫以師尹兄弟之才當青陽壯齒出其所學何難驟見諸施為乃獨蒔花藝竹經營湖山泉石間日侍太君膝前以娛其志意然且定交有道藉其語言于以壽其親于勿替此其孝思為何如者今夫鳳凰為羽族之長翺翔丹山負仁義而苞德業其于靈祥四應可謂極備然必雙雛羅其前九子繞其後然後足以昭六象之華喬松結根于山阿上拂浮雲下淩巨壑含星辰而麗日月其于窶藪紛綸蔦蘿轇轕可謂極盛然必五叉之枝附其旁三鬛之萌挺于下然後可以成千仞之勢何則其所孕育者大也方豫少年俠遊雅尚氣節不事家人歡暨稍長而儉德避難益復無所顧戀今且暮矣然當斯之世出處進退無一不可而特不能優遊于門戶之間若太丘之子所稱閨門雍睦者而師尹兄弟皆能之毋論他日致身厚邀揚顯而即此娛親膝前茂枝葉以芘本根有非尋常羽翼所能及者是則可慶而可頌也已仁和邑明府王公治行録序周制以縣正掌縣政令而秦漢分國因之設百里之寄雖猶仍縣名而南面方幅與列侯等故白太傅曰今之縣令即古之子男也其位與后王君公有大小而無軒輊凡一縣之事皆得專制故西晉以後縣有治行即報以大郡非歷宰名邑即不得入為臺郎而宋淳熙中每用京朝官出署縣事此其為任亦重矣夫以綦重之權加之以專一之制稍有偏側即成畸致豪氂而千鈞跬步而尋丈生焉衡麓王公知其然其宰仁和也務為坦坦不務為矯矯曰為政去太甚而已乃不數年而政成凡顯義詘惡舉利斥害自講律讀法而外諸如農錢獄市都里術序水旱盜賊凡諸當為事無不一一經畫豫以各得而民已便之為之謳其功誦其德歌咏其教澤所謂所在無赫赫名而令人可思公之謂乎生平讀大學怪其所言皆天下國家之事其所肄業率皆后王君公名卿秀士之輩而其言好惡一歸于平孟子譏國僑乘輿濟人而其所救正之者第曰君子平其政夫以民好民惡為民父母者而惟以至平之政行之故洪範曰無有作好又曰無有作惡夫猶是好惡而作之非平平即非作此遵王之路所以一本于王道之平平也我國家首嚴治外每慎簡百里以為激揚故三年試士自詞官外悉起家邑宰以覘諳練而方州伯長即又廉法自持倡率諸屬則亦何得有咈志違道下干民譽而有意圖治或未免蹈賢智之過公無慮也蓋為政得失關乎學問公西陽名宿舉進士者若干年文章遍海內其于學無所不窺即盤根錯節宰會城首邑日持衣出入倥偬不暇給而一出以學問之氣從容就理倘所稱左手畫圜右手圖方者耶倘所稱韋抗能理繁尹賞堪治劇者耶倘所稱試宰大邑內可為臺郎即外可報大郡者耶夫一邑之長與一國之君相等也一邑之民與天下之民無以異也一民歌之衆民和之天下之民皆應之然則公之宰天下有如此録矣重修慈濟禪院募序慈濟禪院者敕建寺也其寺在杭州花市中相傳元至正間有牧牛孝公者遵母遺命改其宅為寺會其時住僧有以國師為元主所賜名所稱𢎞慈普濟者而節取二字以名寺謂之慈濟郡志皆載之而歲久而瀕于毁也夫古剎之難復久矣以將洇之迹當不資之工加之以金錢四匱之際欲程株集土建標飾幹以力求興復誠亦甚難獨不曰人各有親乎昔有過王祥之里而式其廬入田真兄弟之鄉而願觀其宅與其樹者今區區一寺而昔以孝興今坐視其廢而不思其孝必非人情況金錢雖匱不必有過于牧牛倫行雖衰不必即遜于牧牛之行孝住僧雖無緣不必驟幾于𢎞慈普濟之動帝王而錫名號則一念及親而重為之感激而慷慨焉未為無是也因應寺僧請而告善信以是言聖賢儒史序聖賢儒史者王子草堂為學宫祀典作也夫學宫祀典而何以謂之聖賢儒史也哉古者有學而無廟凡釋菜釋奠皆設位為之而其所為設位者則一聖數師而賢與儒不與焉一聖者先聖也數師者先師如書師禮師干戈羽籥諸師皆是也故唐虞夏商其為聖為師皆不可考而自周以後則周公為聖而孔子參之若夫師則詩祀毛萇書祀伏勝樂祀制氏禮祀髙堂生即生其時為學宫教授周官所稱師氏者而死亦祀以為師蓋聖重于師久矣兩漢六季猶學與廟異故髙帝光武皆以太牢祀孔子則皆在魯廟而魏晉以降如成康泰始講經釋奠則皆在學宫自唐代以周公為聖孔子為師詔立廟于學此廟學所由始既而以孔子為聖顔淵為師而然後徐及于諸賢又既則以向之所為師者若毛萇若伏勝若制氏若髙堂生輩復祀于諸賢之下而于是始又及于儒則是聖與賢與儒皆後世遞增之名而非其舊也夫聖與師非溷稱也在昔孔子周時已稱先聖與周公並尊所謂在周以周公為先聖在魯以孔子為先聖者即在唐以後偶詘孔子為先師而即已改正則既裁封號亦宜獨加以先聖之名而以諸賢諸儒可以當五經六藝之師者則為先師乃明代寡學以嘉靖議禮之臣而妄改祀典忽易之以至聖先師之名而後遂遵之而莫敢易焉古注師官名即學宫之官故周禮學官稱師氏鄉學稱遂師族師酇師閭師故後漢朱浮曰天下宗師皆博士之官故泛稱夫子可稱師如孟子百世之師孔子廟廷可稱師如韓愈孔子廟碑匹夫而為天下師類而獨于學宫不可蓋古凡生為學師死即祀于學亦稱先師見鄭康成注則先師即學官也若以師為無位之稱則不然相傳夏商以後多以堯舜為先聖后夔伯夷工倕輩為先師則皆有位者且師保傅皆官名亦皆主教訓之官左右王者又師工也如宗工宗匠類以為一曲皆有師耳但世有工師樂師而無工聖樂聖則何如分先師之名而獨稱先聖為確當也夫合師于聖邋而不尊附聖于師轉見輶褻然且賢儒錯列前後紊序舊所列儒若鄭玄盧植服虔范寧輩翻以學未顯著明末罷祀而乃越級升降如宋徽宗之陟王安石于顔淵之下明季崇禎時之躋周邵程朱于漢儒之上而于是為賢為儒皆不可問矣且夫學也者非廟之謂也今既立廟于學而上有追祀下有配食前以饗先聖之先而後且逮于邦賢國大夫之報祀則已煌煌然為孔氏廟庭而至于負牆面水圜橋半池之制則盡設之于廟廷之前假使春誦夏弦詔樂講射憲老而合語饗賔而上尊以及文則授經于堂武則獻馘于陛皆行之几筵俎豆之傍則瀆亂猥褻不可為訓于是不得不别搆一堂以當學宫如今所稱明倫堂者而枵然三楹無牆以依之無圜橋以進之無泮林泮水以周旋之可謂學乎今議禮者當于孔子廟庭外或傍别設學宫而移􅎉星門內圜橋頖水之制于學宫前為是則夫今之為學宫記為祀典志者皆非其實也曰吾第以為聖為賢為儒者之史而已矣然而為聖為賢為儒者之史而列傳一百列贊三百自表序譜志以後凡山川里巷封爵年齒制度名物禮樂文章以及諸儒之黜陟配位之升降釐正訛謬辨析毫髮纂若干時成若干卷煌煌乎孔林之巨觀聖門之盛事也草堂幼尚實學長為人師其祖其父皆以孝友姻睦稱于鄉豫嘗登其堂聆其教而敬之重之草堂一本其世學履方居正曽于和碩康親王南征之際獻以正學有云王之富貴非今之所謂富貴也蓋聞富莫大乎蓄道德貴莫大于為聖賢親王聞其言而式廬賜蟒呼為醇儒豫嘗讀其所著書嘆其于朱陸同異之際多所昌明使後儒顓隅之見盡為氷釋嘗以為儒林千載有如此人而今為是書其有功于為聖為賢為儒而以為史也其明于禮也夫其不悖于古也夫佳山堂二集序馮相公詩集也夫子致政將東歸豫時為史官不能從然心實依之于其錢也走馬出長安門外望後車既逺猶立大栁下流淚而返既而夫子貽書來招豫云鄉林雖遙然有田可耕有書可讀城中佳山堂與城外冶湖相望可往來遊從于是為五字詩招之今集中詩有所為寄大可者是也豫時約小妻曼殊並車往無何曼殊死豫嘗過萬栁堂見夫子所種栁徘徊思之嗣是豫請急迂道謁夫子于佳山堂留連三日然其于從遊之志終不果去其逮今夫子之子為豫郡司馬以嵗薦遷信安太守瀕行始出夫子所為詩命豫較訂書曰詩言志子夏曰在心為志發之為詩當夫子致政時本期以明農之志乞還東山而天子賜詩曰元臣樂志年且復鋟文石為印記以贈行有云東山適志者夫人惟心間故意適性定故情樂而皆于志乎見之志適則無往不適志樂則無往不樂故人謂夫子之詩一隨乎遇而不知志之所在詩即因之毋論薦荷被芰優遊畎畝其志悠然而即其槐堂判事身勞而志適綸闈參政所憂者在民而所樂者仍在志亦安往而不自得矣佳山堂詩集鋟自庚申閲二年而後致政今之二集則半猶壬戌以前詩也自庚申以後戊辰以前同一適志亦同一樂志所謂夫子之詩不以出處殊不以顯晦異不以勞逸岐不以安危變猶造化然獨是豫壬戌嵗隨諸朝士餞夫子東歸閲四年而始請急過謁通德又三年而餞夫子之子椎輪卧轍始得讀夫子二集較讎之而附以一言然猶未得決從遊而遂以志也若夫佳山堂則已别名為適志堂云西河集卷四十二
