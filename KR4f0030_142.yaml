body:
  text: 西河集卷一百四十二翰林院檢討毛奇齡撰七言絶句五集晉安朱氏山亭題壁間亭髙枕劍山阿暇日登臨此嘯歌幾曲山城萬重澗晚來青翠滿窗螺二栽花種竹傍東籬邀客同銜錦蠣巵忽見黑雲迷似海樣樓山半雨來時前山有樓名樣樓宋時建署亭春雨和李觀察原韻山亭雨過暝煙平亭下春池水自生但得司農頻置驛何須谷口再聽鶯二空向嵓阿問尚平春雲帶雨檻邊生亭前自有桃花片不用銜來隔院鶯奉陪薑京兆赴李觀察席酒間命歌者韓希捧觴乞詩遂口占用觀察春雨韻兼邀同席薑九别駕為書詩于扇歷陽徐泰畫背以寵之宜春子弟奏升平御史筵前錦鏇生唯有韓希花字舞就中能作囀林鶯花字舞名為尤悔庵悼亡時悔庵以召試在京金門未許遂幽棲隴首先亡王霸妻試向玉河橋上望溝頭流水自東西二慢記簾釘挂緑裙當窗曾織竇家文春還不見璿璣轉愁殺遼西舊使君悔庵舊為永平司理故遼西地也三銀牀斷綆素絲懸每讀新詞泪暗牽不道顧榮貽婦句竟成潘嶽悼亡篇奉寄張陸舟先生二首白魚潭水暮生煙長繫張融岸上船何日東歸重相訪開窗間倚白雲天二林下曾同倒玉壺君家小阮得歸無聞張五南士死嶺外朝回一望山河逺痛煞黃公舊酒壚胡生之撫寧署相逢燕市酒重携漫向金臺覔駃騠六月炎風吹似火送君仗劍到遼西二少年意氣本縱橫兄弟相過在撫寧舊日臨榆如可問清秋一上五花城長安遇輪庵和尚即三十年前文園公也三十年前角勝場今朝相會藉慈航不知投筆辭文府可似從軍返武昌輪公回武昌軍前入道二生年只合著袈裟誤向長安度嵗華一夢春明猶未醒眼看落盡曼陀花時豫小妻曼殊將亡和邊詞有序畨人有請牧大草灘者為守者所却政府誦之有詞大草灘前秋草腓燉煌無復獵焉支不虞四郡河西地尚見三州瓦剌兒二甘州賔兔肅州羌大草灘前撤舊防一自湟中開衛去有誰牧馬到莊浪家明府以徵車赴御試下第還任祥符為詩送之宜春門外栁絲長欲綰雙輪返大梁祗為漢庭尊吏治不將王吉作賢良二薰風冉冉動髙旌空道宏詞繼永貞篋裏文章雄八代當時猶失退之名三吹臺南上夏雲移父老歡迎卓茂時千里雁行相望處為君一誦角弓詩孫嘯夫歸錢唐託迹蒼崖未易攀風吹海月弄珠還忽聞天畔金雞唱知在蘇門一嘯間二雪滿平臺各賦詩枚生歸里未嫌遲朔風吹徹東湖水正是寒梅欲放時入直即事平明入直噪宮鴉傍午花隂一榻斜却笑玉堂無管鑰尚令清夢得還家清明日請沐西郊與同館汪春坊喬侍讀汪檢討主事作朝回並馬出城西城畔埀楊一望迷却怪曉來分火後輕煙飛作馬頭泥京師呼塵為泥二阜城門外有荒臺紫幕紅茵竸舉杯多少縱橫林下路花竿挑送紙錢來三畫輪丹轂犢頭車珠髻銀環覆碧紗馬上相逢春欲盡東風催放野桃花四百尺紅牆鎖玉扉望舒壇下換春衣青驄偶向林間住粉蝶爭從草際飛五謖謖松風古道場摩訶庵供大音王誰知世上三生果只在關前八里莊曾與王五别駕關外有訪故云六杏粥榆羔出佛筵石蓮花座法幢前西堂載酒曾留偈回首春風又一年七華表􅀢嶬髙入雲搖車猶覆內官墳沙門指點前朝事讀罷殘碑日欲曛八香臺坐處是香山地名杳山鄉長笛頻吹鶴未還一道紅塵歸騎遠莊亭半在夕陽間春詞四首和覺羅博公所貽原韻御溝垂柳暗殘春柳外聽歌河瀆神自笑蓼蟲長食苦縱銜花葉不知卒二油幕重重匝地青散垂螺片作窗櫺那知霧幛三千幅絶勝湘山十二屏三晴空映日揚遊絲金水橋邊獨坐時愁煞隔牆深樹裏黃鶯啼歇最髙枝四宣武門髙十丈塵馬蹄踏盡未歸人故園桃李如相待為我花前問呵新白雪紅梅詞限韻倣長慶體和枚臣雪裏誰歌白雪詞紅梅開得似胭脂雪花堆在梅花上半是桃枝半李枝二白雪紅梅有慢詞梅如紅粉雪如脂慢言霧幛遮華燭慢道冰綃裹荔枝三春來只唱雪梅詞不唱歡聞阿得脂誰道石家綾幔裹珊瑚擎出一枝枝豫舊夢一緑鸚鵡被鎖去以為魂也暨來京師甬東葉吟以上林鸚鵡四詩見寄遂感而和之見者幸毋哂為夢中説夢可耳葉詩四首見倡和合刻卷翠襟紺臆去還非但聽宮前喚緑衣三尺紅縧空自繫不如還向隴山飛二洲邊靈鳥隔三湘長寄新詞到故鄉欲脫雕籠無别意只言有友武遊郎三三年憶别在江東清泪霑成畫柱紅采翼未分臨鎖去回頭猶是夢魂中四妙體金精世莫知金房安用羽毛奇肯留林邑丹脣在且詠吳江青草詩題夫壻早朝圖為汪主事作疊鼓傳朝火樹紅龕鬖車網去匆匆為郎刷盡膠清鬢猶在髙丘一夢中恭誦應安親王世子秋江夜月絶句依韻奉和秋入澄江白露寒月明夜靜水無瀾茫茫一片冰壺色只作青天萬里看帝京踏燈詞毬場花帽打三郎重戴朱竿學教坊何處大鼇山最美三條火巷在廊房二勾欄缺處接燈棚五色番花四角擎踏斷麻鞋歸不得永安門外老田更三放夜金吾首戴翎紅纓白馬駕朱軿月明只覺天星少撒作車盤兩面釘四夜涼蟬鬢貼金貂漏滴銅瓶水漸消忽聽盒中千炮發襄陽城破在中宵火盒科數有炮打襄陽城名五一道燈輪去復回瓜囊鏤作八仙臺走橋婦女呼教住好讓秧歌唱過來六靈佑宫聨祈穀壇蠟糊紅紙坐坊官露珠滴盡壇前樹綵翦蓮花偏耐寒題觀瀑圖唐寅畫幾多隔塢新花谷無數臨江舊草亭對面插來千仞碧從頭界破一條青下車東華門無馬步行解嘲上直東華負曉暾飛龍廄馬竟安存步行且學歐陽九不跨疲驢入禁門自注唐學士入直例許借飛龍廄馬匹呵筆寒夜憑將信史裁虛堂銷盡夜罏灰頻銜三品湘東管那得宫嬪呵凍來漫示景文沙門額上珠圓見有因雪山童子是前身慢投修水巖邊去且作巢雲閣上人時沙門將遊寧州故云巢雲湘溪閣名二會有三摩觀自然何須五字當隨緣請看帛氏從師日正是阿難得道年蛤上人還住湘溪一從擲錫中峯去二十年來溪路迷今日重尋朗公樹白雲依舊滿湘溪二淨土門中清淨身珠繩百八挂來新西河居士將西渡此後誰為問道人湘溪有淨土寺山陽縣署嵗飲古署青雲繞嵗幡屠蘇宴罷不知還莫辭漉酒當筵盡尚有懸魚在壁間徐允哲讀豫文稿辱貽二絶微及豫舊事感生于心依韻奉和素衣何幸變為蒼長就安丘壁裏藏今日逢君頭似雪依然度嵗在他方二生平空自號文雄祗向天涯賦送窮羡煞滬城徐孺子題詩多在落花中梁令索賦梁竦聲名著有年臨安試宰豈徒然多才自作三都賦乘興還揮五色絃餞姚公子世兄歸桐城山棠花發越江春公子空留亷吏貧自痛十年優孟客歸來還送負薪人二一錢亭下換征裘陳陳楊花點素甌此去𤾂城春漲後思親應復上階州尊人以豫邑令遷階州牧題同年李澄中中允所藏明月蘆花卷子秋風淅瀝起菰蒲明月當汀雁影徂此日晴窗開卷後頓令清興滿江湖二瀛海蓬山幾作塵月明猶得認前津白花黃葉依然在誰謂菰蘆無此人寄祝湘潭沈使君八十琵琶峰頂企朝暾玉杖扶來好弄孫怪道行厨仙醖美法曹曾使在吳門使君曾為蘇州推官二楚澤行吟八十秋長看織女會牽牛初度七夕醉來忽夢少年事猶道慈恩寺裏遊髙檢討同年假歸太史將歸敞别筵臨岐執手泪潸然慢言夙昔相尋久同館追隨又六年二清秋過雨濕衣裝出宿難留胄貴坊南望碧山何處是謝公亭畔北湖傍三初衣換去驛樓斜扶侍南還有阿楂令嗣長君同歸但到故園應認得十年前種馬蘭花四山莊休沐慢徘徊䇿府猶需良史才暫向東田訪朋舊十旬假滿且還來五白首聯鑣春又春退朝長約乞間身何期召下還鄉日仍是樽前送客人同朱宫允王內史眺郭外雙林庵後院河水次壁間韻荷風吹度暮秋天越客同登説法筵祗為道林相憶久晚來如上剡溪船題乘犍讀書圖深林牧犢曉煙新露下松杉滴滿身不識比來工畫客因何寫出帶經人二春草深林細雨初烏犍下坂不曾鋤恰疑人向緱山去獨坐蒲韉看漢書飲王大司馬園林八首緑野堂成野興濃開樽長對碧芙蓉間尋翠嶂才三疊便隔紅塵幾萬重二玲瓏石洞覆丹蕉洞口紅泉瀉去遙記得曲梁斜渡處賀湖南畔馬臻橋三潛行復壁忽天開石上雕盤泛白醅不是羊裴連榻坐却疑誤入洞中來四回廊屈曲畫欄低紫蔓蒼藤到處迷十月晴光翻葉盡尚餘清影幔亭西五石樓高處一壺懸萬樹秋花接禁煙欲覔三山瑶海外但看雙闕彩雲邊六松臺月上待龜黃八節灘前再舉觴佳客總歸履道里名園原在集賢坊七東都賜第近宸居誰道韋家舊谷虛時啓嫏嬛微探去滿牀散疊李筌書八冰荷開盡簇朱茵鶴露澆成馬埓銀紫嶠丹山何處返夜來愁煞醉歸人漫和尤太史馬上口占原韻二首家在江南楊柳村村前有客每停軒為栽洛下潘家果長到吳中顧氏園二家在江南楊柳村每逢佳節斷人魂今來無酒澆寒食猶典朝衣出便門西河集卷一百四十二
