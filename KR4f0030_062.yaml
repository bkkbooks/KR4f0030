body:
  text: 西河集卷六十二翰林院檢討毛竒齡撰碑記一息縣雷迹碑記息縣市東祠有雷迹碑宋元祐所立碑也碑在祠東廡髙三尺石裂而刓字剝泐不可誦大略元祐七年辛卯夏六月巨旱燒禾數百里驟得大風雨三日淮北岸舟人張乂者操舟前聞雷聲見雷熖熖從東北來出舟墜于地火氣霩烈轉旋猶車輪久之似有物舁而去者既視其地短草被灼如烙馬毛烙迹入泥寸圜為輪輪納八輻輻杪各兩岐凡八而倍是日弋陽有震人則是雷之為也記者張姓而名漫滅不知為何人且其文亦不具然而事奇矣豫遊息寓祠下祠僧引豫拂其石就其漶字而索其義重為之記曰雷也者先王象之以作樂崇德者也然而亦嘗用之以辟惡是故天地解而雷雨作雷雨作而萬物始動故繫曰動萬物者莫捷于雷今天下有聞殷雷而不憬然動心者哉動則奮奮則爓然若有見故智者不見鈇鉞而得所畏焉愚者畏威而如見鈇鉞焉故夫孔子聞迅雷必變非迂也故雷奮而識崇德之象夫崇德有象雷迹是也然則雷迹之不宜泯也久矣昔者稗官家記雷車事涉乎誕罔而李肇補國史至謂雷州有雷楔每雷即得之田間佩之者用以辟惡此猶近鑿若夫元祐之為雷則似非偶然也聞之建中靖國間樹元祐姦黨碑于宣和殿前他日者雷怒而碎其石夫以德為邪而至攖雷怒然則雷之必欲為崇德而不為長惡固也然則元祐之早為此碑有為也然則天下之見雷迹而知感者不獨元祐矣或曰數之以八則陰所由成也雷于天地為長子故少陽而陰成焉其又岐則推之而盡也自太極岐而極之無勿岐者岐德不専故用以生物而即以殺物故曰軒轅為雷雨之神而卦以生豈無義也重建賞祊戒定寺址碑記自後梁開平間大興古剎修律戒而習禪定于是越州城西多戒定禪寺賞祊其一矣嘗考賞祊戒定較諸戒定為最雄而往多興廢當梁時有賞祊善士全君允忠捨宅恢寺别名從善顧戒定名猶故也允忠以象教裝金自明淨宫命道人邵良操持其中逮宋至道中而允忠之玄孫仲修出為南昌府教授與其女夫南昌府太守徐儼之子踵置寺田將以𢎞祖德而闡玄義遂以天聖六年重請于朝勑賜加額更號積慶命僧人趙文廣住持之然猶且立戒定名傳至景祐則徐踵全事有稱昊一主簿者重捨田蕩始創寺譜而昊一之孫九明為後軍都督府都督其夫人全則理宗皇帝太后娣也夫人親賫奏乞皇帝降勑淳祐八年皇帝親降勑為御書而太后請加之璽標額并軸實藏諸寺而于是積慶之名掩戒定焉逮明崇禎間城西戒定各燬于兵火其在賞祊者址猶可考也而寺田及譜蕩不復存按元至正時寺燬于兵有僧會椿者收御軸及譜藏之族家逡巡至𢎞治仍復戒定而徐氏之後尚有揀獲原譜以歸之寺者因有嘉靖十八年勤石之志而惜乎其湮也釋子元潤名海印矢志恢復植香于釋迦之前將布金故地復梁戒定而以曩時徐與全之不能再也乃告諸全徐之後并告善信以徒杯而募四方上下桐陵苕水間砂積而黍畜之會苦嵗自順治十二年至康熙元年募甫合先立寺址界增寸闢尺于是攻位凡若門若坪若殿若房共若干畝東至若西至若南至若北至若位成僧衆將勒石而以記告之蕭山毛甡毛甡曰有是哉是由梁而五代而宋元明以傳之于今日者也是刺史之請後軍之復帝主后妃之勑名僧檀那之維護而興而廢廢而復興者也是屢易其名者也夫以帝主宰官檀那合興之于前而不能免于廢以一僧人徒募于後而即幾于興然則何記乎亦記夫興之者之可繼而已矣衆曰善遂臚其説以為記旌表徐節婦貞節里碑記蕭山貞節里者明旌表徐節婦所居里也里在儒學左而北旋户沿流居為縣西舊名西河里曩時稱甲科家里相望節婦居其中傳節婦者曰節婦故李姓閩縣儒學教諭徐公黼繼妻也公筮泉州晉江縣訓導故有妻氏周死晉江𢎞治元年月日無考再娶泉州永寧衛李指揮女則節婦也節婦年十八逮明年公遷閩縣教諭領符忽遘重疾傳志稱二年六月時距娶節婦時尚未及期也公先有一子係周出非節婦生者至是指其子謂節婦曰蕭山去泉州三千里吾即不還者如是何矣節婦曰事君未及期然事君矣其不即先君死者為三千里君與是也何不還者矣公時已疾亟乃復強起拜節婦蓐間節婦坐饗之先是節婦父母之許節婦時逆公必家閩故以許至是恐失望逮公卒節婦慮父母不聽歸也先公訃一日潛遣齋生長丁儀者告之縣封識其篋笥歸縣以鑰而後訃父母父母既偵節婦意大恨計誘之復不可奪乃置酒集宗黨紿節婦别而鐍諸室節婦起自絞父母不得已始聽之乃復集宗黨姑姊妹數十人送之上道故為放聲哭牽衣而行如是者十餘里欲動節婦節婦稍服臆縈淚于睫不少動既而舟抵暮各泊以處節婦乃始仰天連呼曰天乎吾豈不知父母别我悲耶獨念悲則行阻耳且不可使他日得憶我矣于是遽犒操舟者乘夜潛發不令送者覺遂扶二櫬攜一孤歸蕭時兵部尚書錢塘洪君為閩布政使亷其事移檄蕭山令恤之節婦乃營壙掩公及周葺故廬自寒食省墓外足不躡畿木日治紡績比篝燈績罷甚始就寢覺即遽起篝燈績如故或問之曰勞則寡所思也盛夏不單衣衣必重袵所居置一閣比浴必攜盤內閣間登閣去其階階兩竿級也後所撫子亡遺二孫在襁褓撫之既而孫婦亡遺曾孫襁褓又撫之正德丙子知縣伍希周上其事監司奬其門嘉靖庚寅郡司馬孔君攝縣事上諸臺時節婦年六十嘉靖十年辛卯知縣張選踵前事請于臺使者于是臺使者請于朝命下詔旌其門會張以遷去知縣蕭敬德踵而奉行之給禮部勘合世復其家勑縣為摩石立碑又倣魏孝烈勘合優子孫免人田四丁後大司馬趙君故為侍御史按浙勑有司月給米冬夏布帛各有差終身至嘉靖四十三年年八十八距公死六十九年卒邑御史致仕翁君五倫為志銘山隂工部郎黃君猷吉傳之自浙江通志以下至郡縣學志皆有載至崇禎二年知縣陳振豪始名其里為貞節里豎碑于儒學左三元樓側時節婦五世孫晉台公明徴舉于鄉又十五年而邑人毛甡與節婦六世孫芳聲芳烈友善乃為之記毛甡曰吾見邑之遊于學者衆矣讀孔氏之書修明堯湯伊吕之道教以百行而不能以一行名且夫里居者皆曩時甲科家也門閥相望致足伐施其鄉人逮死而不能稱于巷里草陳根嵗為衰菀呼其里者無變也嗟乎可以興矣或曰周書云表厥宅里旌其門而綽楔之表其宅也碑而名其鄉表里也三代後無表里例且其事亦偶不多見漢時稱鄭公鄉非典例也然亦且私不得濫其為時慎重如此蕭山又有夏孝鄉為晉夏孝子里居也在城南與節婦貞節里俱載志中永興道藏櫝碑記嘗考周官蠟氏掌除胔者遇客死道路則埋之而置楬于其傍大書嵗月且縣其衣服任器于有地之官以俟其人而漢制濶略亦復有給櫝還鄉之令自世之漸降重生輕死于是有暴骼不藏者有徙櫝不得歸棄不及埋捐不能恤其災者王政之多亡亦仁情之不備也永興道多往來暴櫝自望京門樓以達江滸平沙斥略而蜒蜿道左其為無主者纍纍焉嘗念此木中人亦即夫道之驂驔車轂人也行營出户每多疾病一旦之事而黃口牽衣白首倚閭者仰視滄浪天未知死生乃復骨肉墮地漸漬草木衣裳絞襪悉化為塵埃野馬其幸而就木猶且見棄斯土寒風野火寧無怨傷夫道多疵癘天之行也殣于其地而不使之有所歸邑大夫以下之責也長河來孝亷義士也捐資百金將聚諸櫝為藏俟之計而邑侯黃公割俸成之但其事須次第舉也畫地坦衍覆上而填下區以五楹纍令辟若梁周四楹中置楬櫝其上而鱗次之中供大士募僧者守焉大略已成然而啓閉畜發或以時修撤且為蓋藏而油燎漆木旁及錢鈹日遼而月長皆有費也夫邑大夫創之于始而鄉縉紳士民各承之于後情也昔者文王作靈臺掘得陳骨王命瘞之而六州以誦唐節度使劉昌瘞涇原將士奏之于庭給衣賜冢夜夢將士者各謝焉邑大夫有地之官或不應求報而報之自至人不得辭夫濟人者得福神道也鬼則近神矣能濟鬼不更得福乎夫王政何常豫仁以全而以餘者豫福報無不可也因合具二石磨其一以俟登士民之第月與日車守之而以稍任其諸所費者乃為頌頌曰維永興之道有露其櫝藏之俟之以均載爾福白龜圃記中州講理學者二其在河南則為上蔡張先生先生與徵君孫鍾元交徴君家信都而講學于故衛之凡城在河北豫往欲渡河訪之未逮也嵗已酉避人之淮西會淮西守金公者飾書幣躬除故所搆天中書院張帷設燎將卜迎先生于蔡豫幸于此時當得一見所為河南張先生者而部使按故藩廢采巡視汝南南陽間車蹄訝導不絶于路既館所除書院去豫亦適南下遂不得委摯一見越明年復來淮則西和夏令曽令蔡適將過蔡造先生廬豫謀與偕前而夏令不能待也夏令還告曰先生方讀易于家搆圃而椽焉題曰白龜請記之吾聞先生家蓍臺則包犧氏畫卦地也昔者包犧畫卦時有縞龜曳河傍生禱蓍故後題其臺曰蓍臺而三代職方至表其邦以為蔡先生方取義于畫而攡文于象非物之神孰與為識故六龜之掌或雷或獵各以其方色辨定物名而雷者白也于名為皎于方為西夫先天之西不云坎乎文明之生兆于天一後天之西不云兌乎生成廣大迄于少女故翕闢既備兆于白而亦迄于白蓋華文者繼起之象也然而亦先物而去其迹故貞白之守尊于玄也原始反終要于無終此或先生讀易之微義矣乎孫徵君曰先生自言曰吾眼前地固見有不得讓堯舜者然則先生之為包犧久矣豫嚮以避人湖西得三入湖西講堂以質豫曩時所聞于姚江蕺山之學今復以避人故獲為先生作圃記倘避人不已將必造先生于圃且渡河去一質之徵君以肆求先生所為讀易也者為辭曰天户之闢是名包犧察民興物神明以齋觀鳥獸文與其地宜蓍苞于陸蔡浮于河越千百年神靈閟之相彼玄文尚汨其辭誰是縞介而遊之波離火為物屬復為雷表水成澤生成之資隨時轉應章于神蓍惟我先生乃生蓍臺嗣犧而起當逢其期編韋既續樊圃是居觀象觀法白龜還來重建息縣儒學大成殿碑記禮曰凡始立學者必釋奠于先聖先師吾未知三代以前其所為先師者何人也嗣此者則嗣孔子故曩時稱孔子廟庭又或爵孔子為文宣王稱文宣王廟既久而始更為大成殿為先師殿焉息之有學前此可志者始之宋之慶厯間以是時天子方好文始從范仲淹建學議也若先師殿五間則重創自元至元二十五年而逡巡歷明三百年以迄于我興朝開國建學之始增修者八改修者四庶幾相延補苴不致墮壞而不謂其即于圮也康熙七年夏大􅀢潦橫流之不由道者夾城而奔殿頽及廡捧神藏而廬居之欂枿瓦確散不可拾春秋興秩舍菜明禋趨蹌者負星行事邑宰劉君丞夏君尉章君學博張君于行事之次相顧咨嗟謀所以恢是殿者會弟子員差擇與祭有行名者皆在列于是何子朝宗王子復旦全子嘉嗣黃子錫珍輩起矢志休復用書量事程材慮功約費若干金劉捐若干金為倡而丞夏君者願盡捐厯年以來所食俸合得若干金且任為相役凡學博以及薦紳諸生各捐費有差始康熙八年五月迄九年六月凡一年工告成自殿庭及廡及門及屏遞相標揭木巧之飾層欒浮柱瓴翔榱翬墄平闔扇文磚雕雘啓庠側出戟門兩張櫺星東西增樹雙闕翼翼延延揆之以日將妥神告虔駿奔其中而先為飾石用志其初終以備載事春秋傳曰鄭人遊于學而可以議執政之善否夫執政善否何與于學顧吾聞之漢文翁時私置學宫于成都市中此非遵漢令也宋胡瑗自為齋舍時亦未經行文正之議建郡縣學而兩公倡為之而朝廷方且下其式于郡與縣至著為令今學宫之立雖凖前代終以天下初定未遑修舉故一旦有廢博士不必白于師師氏不必以咨于邑長邑長不必告于臺臺使者亦不必以聞之朝廷而邑長以下乃不憚咨嗟成之上不耗國下不朘民斯已難矣況興廢所時有也古不云乎論堂有廷接于圃草三館之門猶之論堂曽不踰年而休復如故獨不聞學耶進修之業勿綢而弛振起之功不殖將落嚮之增修者則日新之資也今之創興者則震動之藉也然則優遊之未可為功而風雨之反不足為厲也繼此可觀矣殿南面淮水前當南城之龍門唐列樹柏四北負湖舊有明倫堂五間尊經閣三間倉厫射圃齋房各三間敬一亭三間皆久廢未復在殿後以俟後之繼此者蕭山毛甡為文曰繄惟三代首建學宫九房入闥逮之男邦大昕入奏先師是崇漢唐而暨惟尼山宗發蒙振􅘈如日之曈報諸祼瓉饗之鐘鏞諸生以時習禮其中日月既積風雨攸降震此梁木漂于湍瀧誰其興之長贊之功又誰成之師儒以共鴻材博植以匠以工既勤拔擢乃資垣墉櫨丹桷赤山雕木礱翠錢結牖黃金為釭堯文禹樂顔和曽恭九筵七筵周袤有容長吏以逮束修其躬諸生奕奕將為蛟龍朱干可執蒼珉可攻布之後來以昭無窮洞神宫記會稽馮經以制舉爭雄齊郡者二十年不得志也去而遊嵩洛其同邑章貞者謫滎陽貽豫書曰有仙源君來將以洞神宫屬子為文豫未審仙源君者何人也既而知為經念經居齊郡者久嘗七登岱矣或者天孫之區足以棲神覆其壇而宫之經曰不然會稽山者東南之福地也昔者大禹藏會計之圖謂之苖龍而周職方氏以揚州之鎮封于其山此其山有神山之前曰罏峰其傍曰陽明洞折而宛衍有泉涾然洞神之所基也余怪經以制舉爭雄將出其文章以馳騁天下而忽為是蹈虛跖逺之舉是必有説而經曰吾嘗觀趵突泉矣趵突泉者齊郡七十二泉之一泉也其上祠吕仙吕仙者純陽也世恆禱而夢卜焉豫方潔躬告于掌夢當是時將欲急見其文于當世而以不即見決所趣也有物挾而奔掠之瀾汗四顧㶖㶖然若匒匌而鼓作焉者其勢漰湱聞如驚雷驟見神人于連延之坪而舍之語之新訣命棄其故于是急變其名字而許以身從今所稱仙源是也夫遊物外者輕去其鄉仙源以出應制科遨遊青齊者二十年一旦以失志之故遊心翀舉乃反趣還之故山之麓而重與之謀息隂撰辰之所倘所稱歸來何期與物終始非耶然則豫之好逺遊而誦涉江聞仙源之言而後感可知也宫在鎮宫左禹井之隂祕殿橫崖凌臺而張枌栱奕奕鏤其英而追其華瑤壇墳然樹以芳草旁有丹竈將俟燔鍊貌仙于其中以報其所夢題之曰洞神仙源君從之然豫聞仙源又言嘗從少室還遇苾芻于道授之丹經私臆苾芻者仙所幻也則似仙亦所在有之無定所若月日山隂上方山長生庵碑記長生庵者在山陰上方山之麓比丘尼慈修之所創也尼故名家子年十八而亡其雄又無嗣也家以其無嗣謀奪之不可鍵室辟纑者凡八年一日忽哭辭其栗自翦首髮偏體弛足而矢為尼或問之曰吾痛我生也然義無入他阿藍理又其勢不得復家處因出所辟纑嬴錢搆一椽居當是時其家之欲奪其志者則稍息焉又十年尼乃言曰吾生十七年事人一年辟纑者八年尼十年合三十六年吾生亦長矣乃就所搆居廓而大之堊壁塗戺稍稍翦闢養佛母其中傍築一楹棲其身前後厨房圊舍圃場林麓各有差名長生庵乃遣女奴越百里介其所戚踵西河之門而請為記且曰凡所為記將以墐夫人之欲虐之而奪之者也吾聞尼故名家子也所歸又名族夫以名家之子歸名族為婦宜無所樂乎為尼然且為尼無厭心是豈花氏之城果可悟道空明在前則女身得度乎良以禪定而心一則心不奪尼定而志一則志不奪然則尼惟無所奪以有此生也且尼所生亦幸耳以十八年未死之婺又十八年而不意其尚未死也則自今以後亦嘗如此十八年中已耳彼釋氏之教必極無生而後乃至于生生尼非其人乎且夫生之為言姓也為所生者即為之姓尼且無姓矣阿含經云四河入海無復河名四姓入釋乃無姓氏夫以尼故名家子又名家婦而至所至以尼名歷三十六年所生之久而終不得以存其姓氏則是尼之必無限於所生也夫既無限于所生而凡有姓者又安得挾所生而非干之矣乃為記記曰翳碧麓開金田有遺婺為女禪飯黃蘗栖紅蓮憑未亡留餘年以短景當長生生如何惟永貞讀畫樓藏畫記好文必好畫畫猶文也司馬子長稱寫生家而長卿子虛直欲以何有之人摹意為賦此非畫乎顧好畫不甚耳今之好畫之甚者曰周先生先生積心好畫者凡若干年持購走四方其有善畫者招來之海內無遺畫者汗牛而充車嵗得若干箱箱得若干稛易嵗則損其與心忤者若干乃為之甲乙或降若干乙升若干甲于是裝潢成帙凡若干帙其未成帙者若干紙若干絹其善畫有名自隆萬以後到今若干年合得若干人或其無畫名而能文為薦紳大夫為隱君子願為先生偶然畫入妙者若干所畫山川雲物人馬花樹竹石鳥禽蟲魚以逮吹噓榮落冬春凄皎之若有若無者若干境其為倣古為摹舊為唐為宋元為倪黃為荆關董巨為范寬李成夏圭馬逺為文待詔為董宗伯為法若干為規模若干而凡題之者或楷或行或巨若指或細若毫毛或填上下方或書左右或詩歌記序或藻品又凡若干則則若干字合并而藏之一樓名讀畫樓畫猶文也先生曰吾以文為畫而讀名焉戊申秋豫從江上謁先生先生出畫册命讀豫讀之栩然若遊板桐焉翼翼然若翺翔于廖天而徘徊于九環與十洲焉豫避人出走所至名山水間覽登之然處壁中時多也嚮使趙岐在壁中十年得是畫讀之其所著書當不僅釋孟子七篇而豫也栖栖廡下早得藏讀畫樓讀先生畫册必不至胸胃結轖髮焦項稿車曳其踵而豚圈其衣若今日者也然則讀畫之感心蓋如是其不可已也或曰先生當蒙難時出陳待詔畫凡若干幀貽之友人乃為兩題于其側眷戀悲愴如判所私者如剜其肝腎析其指爪顧望痌痛而不能恝者夫先生之蒙難亦甚矣虎視于前狼疐于後舉赤肉而投之鑊湯之中在強無畏者亦且瞻首顧末傍徨躑躅之不暇而先生獨沾沾焉留心于斡皴渲染丹堊繢黦之瑣屑而不之置然則先生之為文何如也先生號櫟園名亮工大梁人當世能文家之所推為櫟下先生者也所畫人冗冗不詳其名字先生曰記之毛甡記息縣丞廳壁勒石記豫遊息聞息丞名懷刺入縣門求所謂丞廳事者無有也市之東僦居喧卑門僅容馬馬首接于庭不能旋撤所憑桉下饌饗賔既而娛之以搏摘投擲之具圜方雜遝即又撤所下饌去他日又過之則不然或移饌置榻前揖讓飲食他日又過之則又不然或拉登馬遍飲諸名士往來家日一易其處如是者纍月而罷先是丞本有廳事在縣堂東嵗久就圮丞具狀願復向所謂廳事者郡已下其狀顧視諸帑藏無嬴官錢賦民錢又不可遂寢其狀會廷議析海澄軍由七閩以還屯之汝南南陽間任地墾草官給房與居乃樹垣椓杙陶土笵井丞請為監工思欲以此時録其餘材庶幾復廳事于舊址中卒不可得庚戌秋豫再遊汝南息名士曹子鑄王子復旦各遺書來請為丞作廳事記豫喜曰丞已得復有廳事乎是何月日何藉而得有此在何所則索其所復狀越五日復遺書曰噫乎是即向所謂撤桉下饌者也即所謂恆徙食者也今夫有道之長出而休于樹此偶然耳人之謂斯樹也者一若為之終居之曰此公舍也且夫人登山四顧悄然傷于心初非有擇乎其地而後之望其山者仰淚雨面以為此公之所遊之山況處其中有年乎丞愛民也切與民日嬉遊于庭慕士也篤與士日吟諷于房好賔客也摯與賔客日飲饌于其中而不可忘丞之德在心丞之風流在此堂也丞雖去猶或將祠丞于此而謂非丞之廳事不可也且丞亦何事之有向之丞無所不承今之丞承糧而已向之丞承糧而親糧今之丞承糧而不親糧然則丞至今日雖有廳亦無聽事者則即無廳事而或謂之有廳事寧或過乎且將以此風乎後之有廳事者也豫曰然請記之石嵌于壁君夏姓名聲字廣秦浙之東嘉人也由司理左補為今官性好飲工詩所著有前後蓮渚詩集曽攝令上蔡上蔡人德之為勒石西河集卷六十二
