body:
  text: 西河集卷六十七翰林院檢討毛竒齡撰碑記六兩浙廵撫金公重修西江塘碑記浙江為三江之一自姑蔑導坎厯婺州睦州以迄章安而陡作一折謂之浙江蕭山西南偏則折流之衝也其水北注澔涆抵所衝而詘而之西於是築塘以捍之以其地之在縣西也名西江塘明正統間魏公文靖躬修之厯百餘年逮天啓改元秋潦水暴漲決塘而奔民之骴衣漂漂者相望千里顧隨決隨築不致大壞今則五年之間且兩決矣先是二十一年決二百餘丈山㑹蕭三縣盡成澤國鄉官姚總制捐貲修之至二十六年決二十餘丈急畚擁間復決三十餘丈非前此墇堅而今墇疏也又非墇之者不力也前此北注湱湱以漸而殺其折也勾而不矩勾而不矩則水少力水少力則增防易固今則折流之西抱者有沙生脇間水之循沙而折者沙轉出則水轉盓水轉盓則向之挽彊以西者今徑矢而東而於是承之者以横亘尺土當長江徑矢之衝初如撞闛繼如擣匼下穴而上頽欲其墇之久難矣大中丞開府金公視猶己溺一日檄三下舉三縣民生嘻嘻處堂者而公悉驚為灼體㓤膚之痛先審料形勢若潭頭若張家堰若上落埠若諸暨濆若於池若大小門臼歴求其受患之故且務極根柢必以築老塘勿僅築備塘為斷曰不見夫塞河者乎河之患未有減于江然而先之以石菑石菑者石臿也繼以楗楗杙也下淇園之竹以為楗是也而後加之以䈾䈾者攟木而横之者也而後塡之以竹落竹落者河隄使者刳大竹為落實以石夾船而沈之是也夫如是而工亦幾矣徒以老塘柢深虚擲民間金僅築備塘此黃葉止啼耳且棄民田棄廬舍何益自今伊始毋怙舊毋憚煩毋補苴目前而隳棄永久牘十上十反甚至集官民里老共議可否必各使心伏令畫押上乃衆議噆然反謂築備塘便何也以為河隄無正衝者旁決易補而正衝難塞一也且河身髙於隄其決也隄耳此則江深而隄髙隄亘于地抵衝者以地不以隄故當其衝時先齧其隄地而後隄隨之以傾方春水發隄地如蟂潭不特捧土難塞即塡以巨舟投以篰石隨濤而捲等于飄蓬故菑楗之設但施于隄而不施于築隄之地所謂不與水爭地其説二也且水能決隄不能決地地藉隄以禦漲水耳能遜地于水地不即渫則隄不即壊其説三夫江流有定而沙之遷徙有定乎沙徙西則西衝徙東則東衝築一定之塘不能抵數徙之衝保無東向之沙不仍徙而之西乎其説四要之皆非公意也是何也則以公意在久逺而順民之情則仍近于補苴也乃塘工所需有云得利民田者民利之民自築之蕭山得利田計十六萬畝而山㑹二縣計一百萬畝有奇則其利六倍于蕭然且蕭山地髙而山㑹地下傾盪之害亦復不啻數倍天下未有利奓而功慳禍重而救反輕者考之嘉靖間三縣通修曽無氐卭今則山㑹合金僅足抵蕭山之一似乎畸重乃公復如傷為念惟恐民力之或不足既己議輸四千金蕭山半之山會二縣共半之而公特倡率司道捐金二千却三縣之半計程立簿猶恐董之非人則其工不固且或來中飽之患復簡屬吏之㢘能而勤慎者共推郡司馬馮君㑹馮君以清軍兼攝水利遂董其事塘距水五丈底七丈頟二丈髙一丈五尺長二百一十丈有奇餘悉増庳培薄内桓而外殺鼛之椓之諒工役勤惰而親為之犒計楗若干土若干篰與石若干自二十五年十月至二十六年三月凡六閱月工成夫方州大臣興利除害固屬本分然往往視為故事遇修翰所關一委之都水聴其便宜從未有己溺己飢如公者且民利民築嚮有成例而公以氷清之操却苞絶匭然且惟恐民力之或竭為之割腽而剖腊以資于成繼此者可風己公諱鋐字冶公别字悚存壬辰進士由内翰林起家改祭酒歴按察布政二司使進兵部侍郎巡撫福建調繁為今官頌曰於越同利有如三江北流而折在餘暨傍馮修􅂒匌江婔洄湟縵地逆阞民為鯉魴我公仁愛宛如身創負土作埭捐金捍防前者䇿堰龜山仲房我公嗣興以頡以頏公之功德煌煌版章祗此澤闓一何汪洋沙漫可泐江穨可當公恩蕩蕩千秋勿忘重建宗慧堂記法相寺在西湖南髙峯下五代時長耳和尚舊道塲也其傍有宗慧堂相傳趙宋時所建而今亡矣嘗考法相所始不得其實或曰法相即長耳院又名宗慧禪院實即定光佛寺也夫定光與宗慧長耳何與及按舊跡得宋翰林侍講范楷所撰碑文而碑燬于元即文亦闕失不甚備惟眀嘉靖中有蘇州太守徐節所樹一碑尚存西楹其文為翰林庶吉士王穀祥所譔拂讀之彷彿其槩而惜其時月多未協也考師泉南人生于唐昭宗景福之元其母夢吞日而生師生則兩耳垂及肩名長耳兒長耳兒七嵗不言忽一僧謂曰何鈍置耶師答曰不遇作家徒撞破烟樓耳當是時人早知其為應化身矣其後㳺方外祝髮金陵瓦棺寺而歴參諸方至後唐同光二年始至杭見西湖南山而樂焉依石築室以乏水咒而得水今名卓錫泉是也自同光二年居此閱二十六年至後漢乾祐三年十一月二日永眀禪師者聖僧也居淨慈寺呉越王生日飯僧問永眀有真僧乎曰有南山長耳和尚則定光佛應化身也王趣駕至山禮師直呼定光佛師不答但曰永眀可信乎趺坐而化則是法相之建或在此時或過此已往而碑云石晉時建則石晉二主共十一年正當師所居二十六年之中是時未嘗知師也且即此二十六年中石晉多事大梁去此逺毋論不知師即知師必不能賜院至呉越境即或賜院至呉越境或呉越王自知師當石晉時王自賜院不必出石晉敕建則長耳之名己著南山何必待永眀而後聞也且夫宗慧之建何自也舊以為是寺所始本名長耳而宋始更名法相且賜長耳為宗慧大師則是宗慧名堂必始于宋苐不知在宋何代而碑云師遺蜕不壊膚革津澤月必三淨其爪髮而金人侵境刃所傷處皆流白血因于崇寧三年應僧司之請然後覆以髹漆而錫以今名夫崇寧者徽宗年也其時天下稍安燕閒所至表錫及此固未可知然而當其時金人未嘗侵境也即謂金人侵境後此之事是時但賜號則又不得謂僧師上其事而後得之蓋上即上其侵境事矣予謂是寺所始必始于五代之漢宋僅易名耳若堂所由建必在南宋而世誤以崇寧實之事當因革即基構見存尚多倪㐳而為文不慎致有以己成之記為謬誤者此興復之所當亟而為之文者倍不可不為之審也予重詣法相寺求所為宗慧堂者而不得因考其故碑而重為辨定若此若夫師之應化所在皆有天台文殊囊山之辟支佛池之金地藏鶴林之布袋和尚靈巖之智積菩薩皆有顯跡而師在生時杭人以水旱疾疫及禱生求嗣曳其長耳無不立應今遺蜕巋然尚能趨四方之士碑不云乎蘇州徐使君以禱而生所為三致意而報以碣也世之有事于堂者可知已康熙己巳住僧方謀興復因丐斯文為勸緣之舉越一年堂成寺僧請書碑乃即書其文于石某月日兩浙提督學政右春坊王公試士碑文自昔無學使之制眀始出曹郎為提督學政分𨽻諸道而以兩京為首善地特遣侍御有聲者陞為院使賜笳皷開轅建纛設丞令官屬視諸三巡特未嘗舉詞臣而懋其選也大清興専以直𨽻用院使而盛京則但令京兆兼之乃敕詞臣自講讀以下編檢以上充直𨽻督學院官而盛京及他道使皆不與焉嵗乙丑天子念學使任重非詞臣莫承而江南兩浙人文蔚興宜破格陞道為院羣臣循例列銜者紛紛上天子獨慎簡先生謂先生品譽髙當拔諸方局越資俸使任兩浙凡一切幕府行事與直𨽻埒可謂重矣乃自乙丑至丁卯三年之間一嵗一類合八十郡縣文人學士甲乙而差次之無不頫觀仰息狂讙劇謼謂稱量之精去取之公真國朝四十餘年所未有事嗟乎亦何道而得此夫士人生平攻苦力學祇期得當乎主文而一旦出我所學斥拔人類極一時英俊皆得厠我門下斯已快矣乃甄鎔搜剔必欲使璠璵金錫並収之筐篚而後己故有謂國家旁求鎻㕔之得人百不如案學之造士為有要而先生皆有以幾之嘗觀其兩試吾越每一榜出士人爭来觀輒羣相指曰某貧士某名士某遲暮士始而驚繼而慶又繼而咨嗟感嘆且有至涕泣而不止者自兵戈相仍誦讀少又户口多薄瘠功令定限入學歳無幾志灰敗漸有舍此改他業者其一二學究不得志課塾為生計自視無色而有司狃習俗更有相因為請託者夫是以特達者罕今一旦反是皆曰世亦有至公如是者事固未可料也則又曰人亦患不學爾學則得之今此可騐也則又曰語有之力田不如逢年此非有年乎雖然吾懼其不易逢也于是吾越之士進三字以頌先生曰窮通翁窮通翁何也曰先生所取皆窮士也然而皆通人夫文至今日而變甚矣縦橫之家紛紛競起而先生一以榘錯繩之涵溶雋永悉準乎度豈非通乎然而齒亦稍進焉夫日暮途逺將老死牖下日與乾螢枯蠧相為因緣而先生驟起而祓濯之如顚蘖之生而蟄蟲之振矍鑠哉翁乎夫天下未有窮而不通者也夫能通雖翁猶通也夫至翁而公至矣翁者公也因而天下之人亦稍稍相傳為窮通翁者予承乏史館忝與先生為先後進而請急歸里則正值先生試士時也邑之人士謀勒石頌德而謁予以文因為書所見而應之如此先生名掞字藻儒日講官起居注右春坊右贊善兼翰林院檢討奉使為今官世為江南太倉人自曽祖文肅後歴世顯仕三傳至先生皆以文章名蹟稱于時創建羊山石佛寺大悲殿碑記越有二石佛一柯山一羊山也二山産石石工取石者割剝壘凷周刳其四圍而留砫于中就其形撫㘭凸而刻之為佛髙五丈六尺相傳隋開皇間有石工發願為此畢生石不成以禪之子子復禪孫凡三世訖工或曰石工死而生生而死死而又生以願力之堅而假胚此鄉者三世矣乃就其石窞而袤延之以甍以築名石佛寺康熙二十三年大樹禪師従京師還卓錫于其寺募金造大悲大殿于舊寺之側址之樹之上陶而下甓減木増漆䫉大悲像而索予為記予乃拱筆作偈且誦之曰如此大慈悲無處無祗陀乃假憩于此以與壘凷俱是為大悲力千手千眼目照鑒此一方無福不翔備我今作慶讚勸此十方衆惟是石龍龕石幢石鐘磬鑿石與鏤木妙相無有二謂石為大悲謂大悲即石是殿是石龕藉此大悲力馮太傅適志堂記太傅引年時天子念元臣復辟無以命寧于其行也御製五字詩灑之宸翰中有元臣適志之句維時同頒者有螭領文石復鋟適志東山四筯篆于上太傅感焉遂于歸田之暇築室藏弆即以適志二字顔其堂且屬宫詹學士沈君為之書紀聖恩也人各有志當其入居槐㕔時志在致君即其統宅百揆平章軍國出與斯世建平成之業志在安民而今則杜門却謁逍遙桑苧日與刳瓢薦芰者優㳺出入以自眀其志此其間有何一之不自適而事有不盡然者夫居優總方第為所得為己矣乃或中有未靖在當日機務緯繣未之或覺迨習靜思之而無以自安又或朱組繡裳徒取尊榮一旦退居晏閒則晃日之目難于爥幽鄉人有市歸而縬然若自失者何則寂擾之勢殊也且夫人境未有盡也富貴己至當復進冀所未有者餐芝茹蘂不能即效則復轉而覬人世之寵或造廬特存或起家再入未免元纁白璧安車蒲輪之想皆足以擾而太傅均不爾也太傅嘗自敘矣七十老人生平無不可自示之心然且澹泊寧靜出處一轍聖天子既以眀農許之而優㳺歳月皆足自適浩浩乎蓋樂天知命先憂後樂志有在焉境固不得而限也故蕭條髙寄徃往于執政之時每寓其意于東田西塞之間致聖天子賜詩猶以平泉綠野為辭而太傅自若也太傅之所適者此一堂而已矣堂五􅺉倍之而十凡兩層旁無挾廡每以左右兩􅺉為藏書之所而左則别為重屋如書樓然堂除廣甃皆以文磚相亞次髙敞燥潔可坐千人髙軒過者䃔䃔然欲一投止而不得也有當事掃門拒勿入太傅曰盍記之謹記重建宣城徐烈婦祠碑記宣城徐烈婦生而許字其同鄉兒施氏稍長邑豪湯一泰者豔其色倚從子官翰林烜赫謀之徐之無賴者而委之禽烈婦父拒之勿受然慮有變立趣施娶女去豪大怒湯族居洪林獨翰林以貴故郡居㑹翰林従郡還呵于途湯族傳豪者佯聞而唾之曰止家有婦而不能庇而第呵族人何耶翰林初不解及詢知亦怒使訟之郡郡太守張君直施則復訟之臺使者使下郡覆讞當是時兩造各詣縣解豪張甚麾僕捽擊施徐之在解者血胾濩落甚至簒取其媒氏匿之勿令解及解而施之父諸生也諸生有不平者譁而起各執詞詣郡亭豪亦賂諸生相持太守見諸生者各有直然未分也令曰諸生直施者居墀左直湯者右則多居左者豪益怒麾僕伺郡亭擊居左者烈婦時就解既己怖甚至是泣曰湯横如此吾不終為施婦矣萬一暴簒之如之何其姑聞其言不省夜同祖母寢逮曙忽失烈婦所時四月晦日雨後跡之則遺一履在青魚塘傍既眀出其屍以告太守太守方坐㕔事聞之仰而曰有是哉賢乎得死所矣趣駕親驗則自領巾而衵而襦而縑袜連紉不解太守與觀者數百人皆掩泣既而謀所以停棺者近塘有張睢陽祠衆欲殯于祠而祝不可請卜之神卜襲吉祝猶難之衆曰然則惟祝卜之耳俗卜剖篿以取向背其象衡拂神則縦祝擲之篿縦於是衆閧然􅑣擁而入萬厯二十七年郡太守張君德眀請于督學御史陳君子貞操江都御史耿君定力旌之建烈女祠未幾督學御史熊君廷弼者翰林門下士也其按宣城則盡反前事毁祠褫諸生之左施徐者而箠之人凡六易箠漢制箠令即今之竹板也當箠者箠臋每箠五數為一易箠竟内之獄有瘐死者既而督學御史賈君繼善踵至則又反前事旌瘐死者題以官而給廩餼于諸生之未死者使得按年貢其按年自被害日始崇禎元年巡按御史田君惟嘉聞于廷復祠名不冺香名祠在迎春巷東至康熙二十年侍讀施君閏章屬某為記記曰予至宣城宣城人多能言烈婦事者云烈婦名領姑其父子仁與諸生施大德者同里閈相愛不能已遂為婚姻湯故名閥然施徐亦不相下時徐尚有司冦君名元太者鄉居當烈婦之死盛暑桐棺如苴而蠅不敢近衆奇之弔之者垜其香路傍如丘山司冦君亦冠大布受弔祠下時以為榮然且湯徐之爭其勢力不敵如此祠此者可鑒矣重為詞曰惟此祠以烈名豈與勢爭毁成祠再成名不毁祠此者以世世剏建古越鄉祠碑記古難于出鄉非謂五土異宜遷于地而弗能良也夫既各君其國則百里内外亦遂有分疆别族之思况傳餐委積建亭築館皆君國者事而下此無有今則天下一家溝涂四達民之梯航而至止者所在輻輳然而上無贈勞下罕餈給即至往来揭櫝猶且盱盱倀倀徘徊乎中衢其能振顛踣而収暴棄鮮矣予居京師竊怪諸州入仕皆設㑹館為棲沐之地獨吾鄉闕然每思倡興之而未有便也人有従大梁来者告予以汴渠之陰鄉祠落成將書事于石而謁予以文夫大梁固畿輔以南一都㑹也鄉人之萃斯土者京朝而外以此為最其為之鳩度而周居之亦固其所顧誰則載事而浸至于是前此姚江王君為中州觀察記室其同邑余君曽挾長桑術以懸壺市門而溘焉長逝其婦寡且貧復無嗣也然而矢志不可二王君憐之為之立募簿募于吾鄉之宦是邦者約得若干金將以設官舎置園田而并以處于􅑱婺之以鞠而以居者也乃垂成而婺辭之以為衆恵多寵非婺所受稠房襍閣婺不以息王君嘉其志分婺别居使自食其力而以所既募之金自捐若干悉置為鄉祠義田且旁及瘞貍之地按簿而稽自别駕大尹以及丞簿尉幕無不列其名而紀其數即他省宦此與夫肇牽逺服之操贏者皆合細成鉅各有記載遂于東城外割畝頃之半而中廬之曠可掩骼而于城中濟瀆廟街購宅之有㕔事者凡三楹祠鄉神其中然後増屏門置廊旁可以居鄉人之至止者夫以王君之好義厚于鄉人而樂于成善而􅑱婺之矢志者復能堅持苦節不受寵恤以迫成其事皆可感也遂因鄉人請而記之如此王君名安夫字復古餘姚人余君婦胡氏與之同邑曼殊回生記曼殊以壬戌十月十一日死死而有息顧僵噤不内藥眼鼻血迸出醫者謂中死法不治㑹十五日入朝同朝官藉藉稱髙郵葛先生國工在孫黃門家盍診之既診曰是氣蹷也肝衝以逆極憤不得洩擁周身之涎與血而填之肺俞之間故氣不下接竅不上闢五藏八㑹皆結轖而不得其通是非湯液所能攻也然而何以致此先是予来京相國馮公予師也憐予無子擇取曼殊為小妻及予室南至以屋窄徙居曼殊右安門而馮公憐之惟恐曼殊終失所囑予遣曼殊而迎曼殊至其家親勸之去曼殊執不可座有旗下婦辮髪曉譬甚至曼殊謝之泣公亦泣既而公乃推按起曰賢哉請月致米石薪蔬銀五金以佐不給曼殊歸詘兩膝躇地匄勿遣予慰之既而予戚媪有居京者假予言遣之不信重强之且曰汝之去就何足關而堅抝乃爾曼殊聞其言大憤且誤以為果予意號咷曰命至此耶􅑷身而擲之其婢持救之不得躑躅氣絶曼殊之死以是也葛先生曰有是哉有人如此而吾不為之急救吾負吾術矣乃治匜鉢理錡鬲湔木燖石手研而指調之先以物刷眉間絞桑皮蘸末探鼻竅中焚石炭于盎澆以醯用巾覆首接盎㳂使臭沸而騰入于鼻初不為動而遲久而眉小皺又既而鼽嚏曰可治矣乃以酢梅刷其齒撟錐齒間研丸子嚥之不内再嚥之且撏雞翎之翹者探喉間忽涎涌如泄乃濩藥注之涎盡然血尚未下當是時病者拳手坼目稍開動而日己逾午葛先生飢乃就隣人買不托食之于是和齊市衆香襍煑令嚥時日已墜地曰吾去但煑渣食當能言預貯茗汁和他丸待之聞隣廟鐘聲若有唏噓在牀者急取火視大哭己而服臆果能言初曼殊善病嘗夢奶奶喚之去不肯曰俟汝三年奶奶者大士稱也至是復見奶奶至曰吾憐汝飲汝葛婆水一啜而醒葛婆者疑葛陂之訛也然而先生果葛姓方子下朝時卜前門武安王祠其卜詞有碧玉生来字碧玉者小妻也生来生之也又曰正是人間第一仙則在武安已呼先生為仙矣嘗讀倉公傳嘆古有聖儒能起死人令之生今無是矣葛先生非耶先生名天廕國子生淑承其字也父寅谷以醫仙去十月二十記西河集巻六十七
