body:
  text: 西河集巻六十九翰林院檢討毛竒齡撰碑記八兩浙布政使司政事堂歌咏勒石記政事堂者布政使司堂也其使用宰相之副為之謂之使相俗稱方伯連帥非是前代無其官明初設中書行省而以參知政事領其職即元時所稱中書參知政事行省者晉唐以中書監令為宰相而以參知政事同平章事副之明洪武初設中書行省出參知政事為大使至九年始改布政使司布政使故名路曰省名堂曰紫薇而名其官曰參知政事即後改布政而其名省名堂名參政如故焉今司官仍有參政名下大使一等第漢制外郡自刺史止以為親民之官當久于其職使上下淪浹然後覘積勤以資不次不宜朝遷晡擢等之傳舍故刺史以上别無他使致有進刺史而為三公者自隋唐以降封軺四出凡㢘訪轉運諸使皆得加大府之上而其後提刑觀察比于外鎮及元設行省明改布政而使官之尊極矣故自大府至行省猶之刺史之進三公而其階迂其陟緩其受事反不得久而獨于吾浙有不然者上郡馬公従尚書郎来使榷杭州至一麾而復守其地㑹天子南巡旌其才使提刑全浙分外鎮赤幢曲蓋以宣布使指復未㡬而進浙行省析圭擁節為外臺長有似乎刺史之進三公者乃仍歴諸使以登于副相其階迂其陟緩其受事仍未為久而乃躐大府以臻大臬不為不徑數年之間而由分部以進乎全轄不為不速自使榷行軺尋至斯土歴方州大臣而尚不離乎其地不為不久是豈天之巧于愛公而位彌紆陟彌迅與是豈皇上之曲于衞民而名為遷移實久于撫治與是豈此方之民别與我公有冥漠之私而由父而祖戴帡幪而長子孫一似藩鎮之分封其地而君斯國子斯民與夫名郡之主進為都君其間親民惠物不一其事即間為提刑皦然清白坐赤棘于五都之㑹其為安族而悦衆者亦復何限而皆于我公得之如是而欲禁民之愛戴而歌咏焉不得也夫大府有政政可歌也大臬亦有政政可歌也今巋然敷政嫓于開府其内躋執政而外掌儀同特跬步間耳乃四民歌之百城歌之諸州萬户俱歌之凡飭綱陳紀舉善絀惡敷言輯瑞賓興論秀水旱灾荒關梁獄市租調版籍陂塘亭障觀風造士延師正樂質契平價育嬰保赤却請拒餽掩骼埋觜種種也書曰爾有成績紀于太常嗟乎太常之紀績従此始矣是為記康熙辛未十月日趙使君補山閣勒石記管亭趙使君以良二千石守松江還里築閣于宅之西偏方落成時其湘潭門人陳君鵬年登而樂之因拾宋人又補青山入座來之句顔曰補山紀所見也夫以管亭所居在山水之間柯亭當其前瓜渚環其左未有閣時山未嘗少減及建閣而山不加多而乃曰補之蕭山毛生曰凡所為補所以補使君之不逮者也夫使君非不足于山與水也弱冠却柔翰杖策出門值東甌用兵賢王入粤之際摩盾戎馬間遂以試士啓東南之治暨遷潭州司馬則又當滇南初定車徒轉運不絶于路予嘗謂管亭賦才官靈均頌橘之鄉而迫于公事逮之官而後有詞正謂是也及守呉淞㑹國家嚴吏治方州大臣率餐疏衣敝寅作而酉息程文簿以鈞石其間勸德絀惡觀農升俊讀法于里門而平爭于聴事日不暇給是其生平所自歉者祇在拄頰觀山之興而今後而得補之是閣中之所見猶是而使君之所見者有獨加也夫時有不足端賴于補人亦自思其生平所不足而有待于補救者亦復何限而使君所補惟是可以思矣康熙壬申予與同館查君庶常前後登閣庶常曰傳曰進思盡忠退思補過使君今日之事也然詩又云衮職有闕惟仲山甫補之則又後此者所當勉也予曰善遂用其言以為記且乞庶常書之石以示後之登斯閣者笑隱庵碑記笑隱庵者笑和尚所隱庵也其址在杭州清波門外舊名法喜院而中丁毁廢大􅟣陳氏購復之以開住者為照福笑魯和尚而笑近于喜因以笑隠名其庵康熙二十二年奕是和尚従平陽来㑹靈巖翼庵將退院而以奕公曽落染此庵遂合檀越及僧衆啓請願為奕公量笏地而奕公應之今十法臘矣吾聞釋氏以退晦為名雖持燭破暗而未嘗自炫即或勤于精進而究之無所于先若此者所云隱也㡬有釋氏而猶未隱者而未可概也人有絶人世而仍不得稱為處士者矣生平挾特原無可恃為世用即不見物物亦安用為見之此如田更市傭其為袒膊而箕肱者傲物也與哉禮不足耳惟我固自有繁飾之具而以為無益躬化謂何而去之夫然後可埤堄曰安用是拘拘者為今天下沙門千百槁項黄馘其東投西驀何關出處惟夫禪法之雄為龍為象既已披僧伽黎衣髙眎人世將出其所學樹之大寳幢以告四逺而仍然詘處如面壁然此可謂隱矣公少通儒書一出而參諸方即付以大鑒之法年未及子淵而早聞大道宜乎髙坐名山岸然揮麈以進退夫三皈之衆而乃退居一室詠歌以自娯吾嘗讀其詩觀其所為書而深慕乎公之才與公之道之廣也夫可以用而不用斯之謂才可以不及而無所不及斯之謂道之廣可以不處于此而猶處于此斯之謂隱公非其人乎若夫笑者舊所名而今復仍之曰吾以知靈山之笑之别有在也公笑曰記之遂為記兩浙公建育嬰堂碑記王者有慈少之文而順時行惠則春育幼穉與秋養衰老往往並布之眀堂月令之間此後世漏澤之制所由養無告而先以孤也顧曩時育孤大抵在保抱以後如孟子所云幼而無父者而至于胎娩之餘甫離苞絡則前此並未及焉自國朝定鼎京師丁兵燹之後道多遺嬰益都相公曽啓之章皇帝前開育嬰堂于崇文門外畿南數百里車攜擔負口哺手綳者日踵踵至及益都致政還里而宛平相公復繼之其式遂遍于天下吾浙育嬰舊堂在呉山之麓地偏而棟陿所輸貲糧嘗不足以給日用乳婦各散處無所稽攝巡撫張公顧而恤之于公家之暇往往咨及而布政使馬公遂力任其事㑹方城五達有皇華舊驛本駐使節而鞠為茂草久矣乃址而堵之闢堂三楹而列甲乙舍于其傍分坏别牖設牀而鋪墼冬罏夏嬰料居乳婦于舍間有夫者共棲之使之㤀内顧之憂凡竹車絮藉所以供兒之坐卧者無勿周具且延醫師之良者以䕶其疾其于保字之用心可謂極矣然又恐遲久不繼買田數百畝為儲峙需而立首事鄉官月稽而日核之嘗讀周書康誥以武王之聖康叔之賢治妹邦之地之大而當時寒煖燥濕饑渇勞佚口所不能言心所不能達而為之上者以己意而宣之達之予所好而去所惡有如嬰然則是合帝王保大之心而後可以養一嬰極都伯重臣上下經營之全力而後可以保一赤推之萬姓何異矣康熙壬申之三月甫載事而五月工竣當事者請為文以布之石使他日繼此者有所視因為之記某日某記兩浙布政使司布政使遷江西巡撫都察院政蹟碑記聖天子御極之三十一年上郡熊公由兩浙使相進秩大中丞開府西江為外臺垣翰之長建牙樹纛設笳鼓節鉞一時士大夫咸拱手為天子稱得人慶而下民哀號謂奪我公去扳車卧轍不得已乃歴數公政蹟凡若干條琢石雕朱于行省之門仰眎流涕一如羊開府之在襄陽者誠曠世事也夫善政在得民得民在獲上夫人而知之矣然而二者嘗不能兼京朝左右日親近幃幄而澤不下逮其在專城制閫去君門萬里即曰御屏多記注徒虚語耳獨我公由一軺使榷早合輿誦至皇上南巡駐蹕茲土親見公趨事勤敏所向無稽業而民之愛戴者衢巷歌呼無不曰我公賢我公賢以故公凡三進秩皆不出茲土以慰民望而終遷峻省重之都府以彰我懋簡従來方州大臣未有得君得民若我公者然則遷之者君之恩而思之者則民之情也考之三代封建設官不同而郡縣相仍大率以兩漢官制逓為沿革漢法最尊者莫如宰相執法暨郡國相守故凡有大舉則必以丞相御史列侯中二千石為之領袖今之大府即二千石也上而布政使司布政使即丞相之副後所稱參知政事者也又上而巡撫都御史則御史大夫也漢以丞相御史𨽻之京朝而歴代重使臣則往往以京朝大僚出之為垣翰之長故使至執法則使之極事矣公自大府而觀察而行省而御史中丞以一身備諸使而且得久于其地其獲上之專與得民之深如此第民心惟一而其類有四其在官屬即士類也凡承流宣化整綱肅紀與夫飭法眀計杜夤絶請諸條此所謂勵官常以儆師士者至于士則講讀考課而外爰有監鄉闈建義學諸條而農長諸民諸如舉孝奬㢘粥孤養老恤菑捍患調爭減役以及耗羨之除常平之置皆是也若夫工估則凡釐漕平關築隍濬畎與夫行户所必裁承應所必捐牙埠所必格輕減子錢均平物價比比而是因件其實蹟疏為若干而但存其目于左以俾後之􅊩此者有所取法且曰此民志也若夫公之德則槩以政見且有非斯石所能記者皇華使館瞻御書記康熙三十五年皇帝遣刑部貟外臣宋駿業手捧御書將至紹興山陰之蘭亭車過杭州在籍兵部左侍郎臣楊雍建詹事府少詹事臣邵逺平國子監祭酒臣汪霦翰林院檢討臣毛奇齡翰林院編修臣凌紹雯中書科中書臣顧之璿等詣皇華之館叩頭問皇帝起居畢跪復請匄御書瞻仰駿業不可曰此非臣等所敢擅也皇上未嘗有旨令汝等觀也且亦未嘗以書法教天下臣也皇上以為自昔巡幸皆有祀古帝王賢臣之典載在史册故漢帝祠黄帝橋山祭魏信陵君封樂毅後而東漢建初且有祠本朝臣桓譚冢者朕觀河南巡東祀神禹而獨不得一訪問先代賢臣之在其地者朕深憾焉因于萬㡬之暇曽憶晉臣蘭亭舊蹟在禹井東西洇沬不彰遂手書蘭亭記一通將以張諸石而補祠其地汝等誤以為皇上文武神聖乃區區與右軍將軍較書法乎臣雍建等俱伏地曰何敢然何敢然第聖人御世動無過舉在國家行之為典禮而在臣民見之即為法式此如天然在蒼蒼祇以自舒其陰陽之功而在天下人即仰之為金輪為玉波為䨧翹華蓋不可名狀今有景星慶雲出于天而薄海内外不爭先願睹者乎有醴泉生于山甘露降于林而鄉城老幼不扶杖襁負願少須臾毋死以冀得一見者乎今皇上加惠東浙龍文逺頒臣等身居浙西方私相怨望以為獨後而瞻天仰聖尚閟抑不前恐亦皇華所未忍也駿業乃仰而告俯而祝曰惟皇上惠之敕設几行叩頭禮畢甫展軸而天氣清朗日色相照耀庭前草木雞犬皆爛然有光色彷彿見黄帝垂衣倉頡布象龍跳虎躍鸞驚而鵠峙滿庭皆踊躍歡抃觸首呼萬嵗不能起臣伏見三古之世極重書學故中庸曰書同文又曰非天子不考文蓋古凡入學則天子頒其書法于學官使天子胄子與公卿大夫元士之適子皆習其書是以大戴保傅篇諄諄記書學之事而漢志有云周官八嵗入學保氏即教以六書是書之為重于天下久矣今皇上書法前掩千古後掩萬年雖神禹手書岣嶁武王親銘几杖皆莫之及自宜頒其書于天下使後世臣民永為法式今日之瞻則百代規摩所自始也衆皆曰然遂以臣奇齡原職史氏當備載其事以俟採擇因略敘始末而記之如右臣奇齡稽首頓首謹記趙開府六事圖記兩浙巡撫中丞趙公開府杭州予與同鄉官出餞之朝陽門外暨予請假歸而公已移鎮江南尋且還臺遷部堂去其撫浙之政值在京不得而知也然杭之人每思公其有得于心必曰此公澤也其或不得于心必曰公何在耶又曰向使公在不至此以故范公貌劖公治行以廟以碣其在今己十年所矣猶有繪公六事圖屬予記者曰開河曰築十觀臺曰刑奸曰代民還營錢曰講道學曰移鎮公事不止六且移鎮非事實祇以紀朝廷倚重并浙人留公之意然而大者具焉夫開府無細事官其地當使山増髙而水増深杭昔苦􅀢塞前哲鑿八井不足其穿城水關有渠而陻公開中河十餘里西小河十里南自慶封關北達清湖尅期而工成乃築城十門觀臺髙廣若干丈牆樓參差且増坏諸障隧令城中士女偕觀撫埤堄循牆而游如是者三日今所繪城端纍纍是也夫東南四民生于逐末賣漿負飴者貸營錢為餌旬日倍子母還之而風雨疾病或不幸不售縲係敲扑鬻妻孥逮死比比也公代民償責累巨萬而禁其將来至于土豪作奸者詰殺之曰吾去其害馬者而己念無可與士大夫往來請益于是借講堂論議得失以予觀世之為政者髙其牙盛其伍伯日與下吏候門者罄折問詢相對移日晷而士大夫之車轍若冬雷焉民之暴亂非法者矜之以為恩遇有大事大役即惴惴不敢任聴其脞廢曰清靜曰以不治治或百不得己任之而動輒箕斂曰設法以至重農驅惰抑奢崇儉不務識大勢而概以祛末之見任意催割雖賢如湯斌其治呉閶不免也有如是六事而猶謂不足以砥世也乎吾記之猶思之矣海竺庵食田碑記海竺庵者吾族蜜修之所也従來四恩報主各稱檀海今以海濱隟地建旛量笏為衆生修覺之塲則雖小葊而海以名焉前此族弟尹儔與其婦周㑮雅好施濟曽築室數椽濩茶歇暍有年矣今尹儔夫婦垂老無嗣遂拓之為庵且以此為他時樂丘使翦茅其前培龕其後生時焚且誦而百年之後歸于其室此固鐘鳴漏寂剨然猛省一大機也因族叔遐伯従弟鎮還夫婦皆有同志則自此而推將必有踵其事而増其華者故特延禪僧髙修為之住持作開山之師而以尹儔夫婦為之山主乃為述其事而記之如此庵坐落祖宅之南相距一里許後有田如干畝即尹儔夫婦歸藏地也别有田如干畝為常住食田皆尹儔周㑮身施之族之人毋許佔者某月日祁夫人易服記姜桐音先生以疾死其配祁夫人服三年喪畢不易服先是先生易簀時其諸子環列先生指謂夫人曰以累子以故諸子無長少皆夫人教之至是諸子請易服不許家人請于祠不許少京兆定庵先生其猶子行也拜于庭為陳大義謂非先王法且先人亦莫之行反覆論説終不許㑹國朝定鼎郡之以世家保家門者日隆隆起而先生席列卿後獨家食不出于是諸子有乞試者屬京兆君為之請而夫人許之康熙辛酉次君貢于鄉及癸酉長君登賢書方是時距先生之死己一十六年榜帖至家人仍有以易服請者邀予至其家語之夫人夫人怫然曰謂此區區者遂足以易吾心乎而予曰不然方予之與先生交也約四十年矣始為患難逰既而以文章為伯仲又既而音容閴絶莽莽若隔世而夫人非他巡撫蘇松殉難贈太傅諡忠敏公之長女也予少至東書堂時夫人従母商夫人學詩而以予通家子每出諸閨中詩屬予㸃定以故每讀夫人詩而為之賞之其後與先生倡和更名靜好集者是也今商夫人已即世東書堂已毁當時所㸃定詩己俱散失靜好集己殉棺去即夫人所授四子書及經義諸子售後已厭晦將抵之牀下天下亦何事不従遷變髙門華屋改為蓬茅滄海之波移而為塊壤而祇此絲蒯之縷縷而不之易且未聞易服而即可以易心者也世可易心不可易也夫人乃忻然税服而曰可易矣遂詮次其語而屬為之記雖然離騷云進不入以罹尤兮退將復修吾初服夫進不罹尤退不修服君子之過也初服安在吾作易服記而重為思之重修臨安縣學眀倫堂碑記眀倫堂者學宮之一堂也古學與廟二釋奠先聖每設主帛以行事而學宮甚廣由垣而門而堂而室房而館舍而圃林凡讀書養老興師貢士以及上功上齒序飲序射皆集于其中而名之曰學自隋唐以還間立周公孔子廟于學中而元眀更制遂以孔子廟為學而别立一堂題之曰眀倫無米廩無瞽宗無論庭射圃二館三舍祇一圜橋一泮林亦列之廟前而堂無與焉則此一堂者固合全學有所事而存焉者也使此堂而尚任其圮則全學廢矣郇陽郭侯存齋舉鄉試第一以揀選知臨安縣事其􅊩任也見聖廟巋然而啓聖宮壊捐俸修之未竣也及集多士于眀倫堂將習講誦而堂本五楹而墮其三棟欹而壂礫慨然傷之念邑為西呉奧區代産偉人即今衣冠濟濟科名相繼起而顧令本源之地荒蔑若此古不云乎學始于不足而成于克奮苟能奮興雖經費不足何害因敕諸生鄒偉元等使先竣啓聖宮功而徐議堂事康熙三十八年夏六月朢日候首捐月進不足請輸于紳士又不足則以贖鍰佐之凡陶土刻木負繩運榘一切任材効力聽擇所便不苛亦不濫乃請練事紳士如許君胡君駱君盛君典司出入而縣尉任君董視之越五月工成侯因㑹諸生于堂而課以文且舉鄉飲酒禮并讀法焉及侯將引疾未暇記事又二年而諸生礱碣請為記夫學之賴修成久矣君陳曰簡厥修亦簡其或不修學記曰凡入學者七年而小成九年而大成向使廢墜不修毋論是堂無㡬即漢唐國學往有二百四十房一千八百餘室而諸館之門墾為菜畦即初授廣文一職有雨淋屋塌而不可入者况官居相嬗等之郵驛計侯之􅊩治才五年耳初衣之遂本諸夙抱祇此數年間何難膚膜置之而多方經畫以集于成然且瀕行頃刻不忘斯舉而就許胡諸貢士而三致意焉其不令或闕如是也聖天子崇儒右文其將稽士成以稽官成胥視此矣乃為文曰文缺西河集卷六十九
