body:
  text: 西河集卷八十六翰林院檢討毛奇齡撰墓表誥授奉政大夫翰林院侍讀加一級施君墓表上之二十二年侍讀施君死于官將擇月日歸葬于宣城城南之牛喜沖以病臻時曾與豫泣訣屬豫為表墓之文而恐失記顧檢討髙君知狀至是檢討帥孝子彥恪來再拜述君命豫思豫與君締交有年今又同館微命猶將以哀念重纍其生平况君命乎君諱閏章字尚白宣城人順治已丑由進士授刑部主事當世祖章皇帝大婚禮成上皇太后徽號頒赦天下君奉使廣西謁定南王于桂林船發灕江會永明兵犯桂林殺定南王而東略地及平樂君還至平樂聞變哭王于官亭將嬰城共守尹君揮君行曰使臣無嬰城理君乃行抵家以承重居吳太夫人喪服闋補員外郎大司冦劉君重君名一切部事皆屬之君引經折獄平反盈百而大憝終無幸者會章皇帝右文拔曹郎尤者充學使御試得七人而君為首因提學山東君嘆曰吾世嬗理學三傳而皆絀于諸弟子吾一旦抗顔為人師進退學者吾惴焉吾敢以俗學負家學哉故其取士必先行而後文且所在講學重儒術嘗過鄒平謁伏生墓觀其祠堂壁間所畫鼂錯受尚書狀慨然久之臨去垂涕示諸生謂經學已絶其授受宜亟如此已奉命分守湖西所轄吉臨袁三州故殘破袁無土著民聽流民占籍墾土而集其壯者萬人曰麻棚吉閥閲家聚文昌折桂兩鄉多保險吉水令捕其梟長髮廣袖檻車膠軍門君陳兵摐鼓金若赴市者叱縳其人屠首髮割其所衣廣袖衣而盡釋之豫約令悔罪能招致諸所與者得不死其人流涕願如約于是自為文使持之諭兩鄉民兩鄉民感激爭請得一見君歸命而麻棚之在袁者亦散去方是時永明兵猖狂轉餫最亟御史以逋賦檄君征輸君乃作勸民急公歌垂涕而諭之遍歷崇山峻谷間悉窮民狀作彈子嶺大坑嘆竹源坑諸篇以告當事當事咨嗟比之元道州之作舂陵行而民亦輸賦毋敢後君乃務休息每日昃一視事但對閣皂山支頥賦詩築愚樓于官廨之傍環以橘柚暇即與過客登臨其中出入屏干掫行部所在設講堂講學學者無大小從之如市會廷議裁諸道使民留君者咸醵金建龍岡書院如祠君請君講學三日去初君駐臨江有清江環城下以其清也民過之者咸泣曰是江如使君因改名清江為使君江至是民送君使君江上不能别復送君至湖會湖漲君所乘官舟御史所贈物也輕不能渡民爭買石膏填之已渡乏食賣其舟而歸康熙已未上初開制科詔丞相御史及諸郡縣舉天下學士備顧問者三相上君名御試授翰林院侍講充明史纂修官會日講員闕上親出君名令補忌者沮之辛酉典試河南明年升侍讀奉命纂修太宗文皇帝寶訓時筆札既煩復以哭叔父訃時過哀毁神氣澌散值望日朝下端坐草馮恭定傳自午迄酉移按就櫩隙草罷不能起左右掖之至榻間若形存者然而卒無病越數月沐浴卒君數世以理學顯祖諱鴻猷曽從陳九龍先生暨石城焦淡園吉州鄒南臯遊既死號中明子中明子子二長諱察以君貴贈奉政大夫山東按察司僉事稱述明公則君父也君生而仁讓于物不忍好自下勤學而博于酬接口吃艱語詞顧論理便便聞忠孝事及羇人才士有失職者輒感憤慷愾涕泗隨語下嘗與同邑吳君赴春官試吳有老母下第君已在第中相持而泣一若與之俱擯者友朋窮無歸疾病死喪自經給膳療以及殯輁必周必具嘗􅎭服營友人窆慟如天倫且有梓其遺文碑其壟買田置宅以贍其子若姓者平樂守尹君嬰城死其子三十未娶君為娶之君嘗曰吾去平樂時放舟中流回望尹君送豫還其前後伍伯忽獸走斿蓋散盡獨一輿眇眇隨決眥沒吾至今思之而痛于心方君之道平樂也吳太夫人踰八十日計官程思以嬴日歸侍太夫人而太夫人適以是年死然而猶幸及歸侍者初述明公孝日與君母馬夫人謀所以事吳太夫人吳太夫人偶病洟以為失溫叱馬夫人歸其家而馬夫人卒君初字屺雲以是也其後述明公悔之然亦卒君從鄉薦還謀與叔父砥園公歸馬夫人主祔廟而重傷父心將俟吳太夫人命祔之惟恐吳太夫人將一日不懌可如何至是使歸會覃恩贈馬夫人為宜人賀者在門君以手據地號哭丐吳太夫人命吳太夫人命設豆上坐而坐述明公主于其傍食而囑之且令為文告于廟太夫人白首親挈馬夫人主同述明公主入祔焚黃贈宜人當是時君手據地行伏主前號哭不起左右皆哭賀者倣徨不敢進為之罷賀乃事畢而吳太夫人始減膳若有待者君家世孝友述明公兒時侍王父食食肉退而見吳太夫人以鹽虀膠筯驚且泣嗣後王父召之食不往王父怪問故嘆曰新婦有孝兒遂併賜肉君少孤育于叔父砥園公已就外傅冬月隨羣兒履冰砥園公杖之而逐居孰外之土山寺孰師王君中明公老友也讓曰兄一孤而忍出之砥園公泣曰正惟兄一孤故然也雖然命之矣乃親就寺抱而歸君嘗官湖西砥園公視君君跪迎之有不悅必服冠跪終日俟其解乃起自中明公歷世創義田不就君仕無嬴財獨積俸置義田二百畝繼其業君好忘分友天下士天下士多歸之典謁日入刺雖臨事必屏去趨迎與談移日景非語竭氣敗不忍已後進有佳士力奬誘以成其名至所在善行興舉利濟其事煩不可得而載也君為文數易其稿客在座即咨之推求施易或竟體無原稿字者要其文一歸于正雅其講學以體仁為本子二彥淳彥恪能世其所學乃為詞曰惟君先閥起自石渠粵至尊道建坊于閭懿則代嬗以孝友于歷世而大爰産斯儒當其通籍陳汝臬事賦白雲詞于赤棘下朝重儒術豫觀學使程文自齊講德于魯中秉玉節分藩湖西創瘍之後以喣以嬉獨其介節餔􅝽茹藜過清江者泫然而哀乃者天子由制科召置之講讀式是來學云何前史編纂未就特乞撰紀如歐陽九以兹筆墨雜置籓溷手足皸瘃況戀親串于是哀樂中年大傷迄暮而衰亦惟其常君之文章已貯石室君之德業堪表象闕其澤及人户口能説矧其世學昭于月日今啓輿旐將還故阡琢石載事繼之以文惟愳石褊載罔克全謹標槩節以垂墓門誥授御前二等侍衛拖沙喇哈番原任兵部郎中加一級逹君暨誥封淑人錫克特勒氏墓表皇清御前二等侍衛拖沙喇哈番原任兵部郎中達里虎者韎韐族也少敏鋭捷給善應事世祖章皇帝器之授以內法一旦筆帖式哈番即漢所謂內鑾儀衛者君出其知計才技典金吾諸衛以兢以業內深其籌略而外肆其投蓋超距之能不數月間遽進君本衛他赤哈哈番即他齊哈哈番當是時君始以佛保名改達里虎敇文所云初任內鑾儀衛筆帖式哈番佛保二任本衛他齊哈哈番達里虎是也乃君甫受事值東人多逃舉向時開原廣寧攻城略地所收鹵者往往掉臂去已設督部侍郎于兵部專理其事而以君為副理事官君制軍詰姦佐大司戎糾邦國禁令比之列代軍司馬夏官大夫之選頗得其任乃復以開國天潢所繫良巨遷君宗人府郎中分司戚事掌金匱玉牒上嘉其能仍改君兵部郎中復令以夏官大夫參司戎之要君竭忠辦事部無稽牒因纍遇覃恩膺誥授者凡四而其妻錫克特勒氏亦從公纍次進封以為榮會擦哈爾布爾尼弄兵塞上君以候補司正官挺身勦賊時遇賊大魯擦哈爾布爾尼率賊三千人用鳥鎗為前茅以次抗戰而君遽策騎麾兵度嶺忽賊伏發嶺右衝而前衆倉皇間君率先奮擊且遣甲喇衡馳之大敗賊衆于大魯之溝特授君拖沙喇哈番準襲一次明年進二等侍衛又明年進二等侍衛拖沙喇哈番而其妻錫克特勒氏亦得以是時進封淑人康熙二十一年君女夫巴爾翰今户部郎中以君訃并狀來云某月日將葬君某塋而附錫充特勒氏于其傍請表之嗟乎君之刑于可考已因表之曰公初名佛保繼名達里虎即達里胡錫克特勒氏即西克忒克勒氏系曰惟君令質發迹卞韓從龍而起為開國藩初授衛尉嘗冠虎冠既佐司戎遂歷夏官爾時五屬金枝玉欒藉君司戚以資奠磐爰相睢鳩翩翩羽翰九伐正邦圻父是觀乃遘小蠢盜兵塞垣敗之大魯獻俘天安特厠親近為楨為幹肇事羽衛終于期門況君治內厥有可聞庶揚寵賚以傳貞珉西河集卷八十六
