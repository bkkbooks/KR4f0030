body:
  text: 西河集卷八十八翰林院檢討毛竒齡撰墓表三敕封承德郎雲南永昌軍民府通判林君墓表豫入史館作土司傳歎西南徼外哀牢金齒諸域要荒萬里苐鞭箠之已足矣乃復版户而長衆之曩時所為流官者今且堂堂選人試仕其地士君子讀書談義亦安所自恃會豫請假歸而故人之子林生兆哲赴東曹選得雲南永昌軍民府通判則正值斯地時合餞國門微視林生將之官了無難色獨咨嗟謂家有嚴君惟是晨昏遠隔可用為慮而其既之官即以兼知新興事積逋六七萬林生受其尊人教不忍敲朴而前任之在繫者纍頸無所訴咸謂蠻地果難治其尊人儒者迂遠不足以利世用林生遵教且太過忽恩赦自天下凡全滇七年逋負銀米蠲貸殆盡逋官之在繫者皆得釋人因誦林生賢能徼天子恩天子神聖能使下吏得自愛惠澤滂淠儒者雖迂濶未必不見利於世也赴三年而其尊人以疾卒於寢又一年林生歸葬涕泣請表墓嗚呼君諱瀾字觀子杭州人先世自宋末由莆田來遷其始遷祖均仕元初為提領官居於杭州之大井巷三傳至榮當明洪武初贈官通議大夫長子才次子文永樂中官監察御史又次森封太常正卿森生章景泰改元舉神童召試授中書舍人天順間遷儀制員外郎歷山東布政使司左參議進太常正卿與修憲宗實録及大明一統志續通鑑綱目諸書進階一品榮祿大夫詔祖父如其官森生應禧正德中授內閣中書舍人以忤瑾歸瑾敗起大理寺副歷尚寶卿遷湖廣布政使司布政使進順天府丞應禧生竒贈刑部員外郎竒生梓嘉靖壬戌進士由刑部員外郎改延平府知府遷雲南按察司副使整飭金騰等處進階贊治尹崇禎十年請祀延平名宦梓生逢春萬歷甲寅舉明經廷試受官則君曾祖也君世居大井巷繼遷褚堂皆歷世仕宦暨祖長蔭父宗震承曽祖遺訓遷居倉橋閉户爭著書各以文章氣節見於時世每稱遜抗之後繼以機雲而君復承之值明季喪亂少年即漂泊干戈之際既以成童補諸生第一便棄去遍讀諸藏書目兼行下搦筆為文章瞬息千萬言同硯者辟易不敢前君自薄小技每脫藁不一再視苐與坐客談孤虛之學駮之不勝退而盡發諸河東郭公南陽許氏之書討練有年忽大悟遂肆幡演禽六壬竒門太乙遁甲及圖緯占候風角以逆刺諸物通驗若神每曰數雖小道能探精研微可以補造物不全之憾發生民未見之隱所繫豈細若夫君平布算激貪勵俗亦在人為之耳名士有學何者不可以自見必以八比取富貴雖吾前人嘗為之顧吾非其人且夫人各有志也既而曰郎仲綴襲京氏易徒善天步袁客師播星歷之策要皆失師傳不得所始夫始之者天也惟齊姑臧侯為神武所封得金韜飛候玄象渾蓋諸術吾將用之以探其本源而知其所始於是窮古今天文七十二家之説倣璣衡舊軌按其圖目分躔而别氣其言災祥能使書墨入版而言晷漏則左右司晨司刻可以時應每於清夜子分登臺察雲氣占星辰順逆以之辨風雨明晦燠暘遲速之節且用之以定一嵗陰陽損益之道其言多先見人或以西學難之答曰使吾為五官正者吾能講太乙五紀八象三統諸歷以折取於中雖然吾甘與西學較尺寸哉乃以杭俗好相地中外姻婭多藉口竹策未定露柩室不掩連年纍嵗君過而咨嗟覓海角神經唐世所祕為金匱玉柙回元天機者􅊧討其論説登山臨水躬驗諸吉凶離合即以五行生尅二氣王衰推諸地道周親歸葬者多得效去而于是葬者日以告即鄰人柩室皆為之空乃復痛天札疵癘無由拯救曩者軒轅著書上窮天紀下極地理中知人事其間府藏陰陽經絡生死運會升降皆可窮抽極繹發我神智漢張機云夫天有五行以運萬類人稟五常以辟五府玄微莫徴變化不可擬自非才髙識廣安能剖晣幽遐盡其理致哉苐洞垣前脘世無其人針石尉烙其法又不授雖諸家內經􅊧討極備而論議浩博考索難竟即盧國難經與皇甫士安甲乙諸著俱未能析其指歸而得其要領惟元人滑壽作素問鈔一書頗稱簡切顧靈樞真經實先素問而未得並著于世以相為表裏非闕事乎雖明末張氏彚作類經已嘗搜入而義例煩賾乃仍倣滑氏分類十二約文五百汰其冗而貫其錯合靈樞素問為一書名靈素合鈔自攝生以至運氣定十有五卷為醫學宗然而黃岐不作凡伯髙雷公少俞仲文及長桑扁鵲公乘太倉諸學皆别為一途金石也而代以湯液耳目也而代以尺寸辨府俞而釋草木周秦以後所可考按者獨東漢張機一人夫證之難理莫如傷寒言理之可信則莫如張機之書今傷寒卒病諸論俱在人間雖前後倒置篇帙錯雜其中三陽三陰以及太陽少陽太隂少陰諸部皆有紕謬乃博􅊧典籍自靈素而下凡元化中藏稚川肘後北齊禇氏唐人孫思邈諸所著以至中朝聖方外彛醫鑑合數千卷彼此相訂因採擇而論辨之以法次證以方次法即以説次方割塵析杪輯為傷寒折𠂻一書取二十七篇症外合二百五十七法一百一十二方共十二卷加類證八卷鏤版行世世爭購其書以為凖的一時名流如卿子張氏亮宸沈氏子由盧氏易園陳氏夔師潘氏輩皆互相發明以昌大其説而於是醫學得大成焉先是兩書鏤板成凡數千葉為估人所藏而不戒於火時漏已三下家人欲往救板者君曰吾殫精力費嵗月以成是書為利濟耳今鍥木甫竣而遽燬之是必有不足於利濟在也否則必勿燬詰旦估人來告曰居以內無不燼者而板乃獨免坊人有救他板者而誤出之也君為人沉默而談理侃侃若河流之東注然故下物動以古為期雖博極羣籍有叩必應未嘗以此詘坐客坐客雖不勝亦慰之去生平不二色不喜事家人産産日廢顧志意髙逺襟期落落然門以外事悉屏絶不以聞與學人遊學人皆稱之為萊庵先生晚年耽于內典及養生家言淡泊寧謐與釋氏相對具有見解嘗曰肢體弛則誦黃庭以振之意見起則諷楞嚴以消之其多學而達如此君著書等身所存者于詩文有滄門集自娛集秦川雜詠酉冬雜著壬戌新鈔於經學有學庸集説論孟彚解古今聖賢録於史學有古今名臣經濟録讀史寫琰録於雜著有武林雜志武林英賢志西湖逸志林氏家乘輿圖津要廣輿志考其於天文地理星歷諸學則有五星辨難火坑珠寶圖説點穴歌地理微旨天玉正傳祕旨示掌歷較正元經餘編纂未就者不可勝紀康熙三十年四月二十三日卒距生天啓丁卯年六月十一日享年六十有五以覃恩敕封承德郎雲南永昌軍民府通判娶沈封安人子六長即兆哲判永昌者君之封是也次聖則見任雲南黑鹽井鹽課司使以他後降服次兆異太學生次兆杰貢監生次兆琪次兆德孫五啓瑚啓璉皆監生啓璿啓琛啓璵女三女孫七其所適所娶皆名族詳志中乃表以辭其辭曰古之鴻學以多藝名藝十得五而名已成至于百氏則匪所營彼談天者下逮九瀛紛綸噂􅊱有如集蠅況當療物上嗣阿衡誰為為之以著凖繩君之先世代為列卿乃獨髙尚同魯兩生以博墳索不止嚘嚶果能觀察得天地并上撅天隱下達地靈中洞人則誰謂貞白不足與京孝子筮仕能述父行墓門之碑千秋永貞故明兵部車駕司郎中黃君墓表君諱運泰字開平當明亡之日破産募邑中死士得五百人渡江叩巡撫黃君于軍門黃君閩人受其衆以同姓故弟呼之請于江南僭號者授君兵部車駕司郎中久之不得意視一時所為殊不道却而歸見豫于土室曰江南事無成矣會馬士英奉福王太后奔杭州與故鎮東將軍方國安敗軍合拒王師于西陵渡口因在江南時與君舊君饗之萬人山中諸養舍囷廪一空已而嘆曰與我餵此賊何如餵沙中蟲哉乃挈眷藏南山間闢其先人所搆園名文園者種桐養漆于其中晝課傭作夜即飲酒近婦人達旦不寐江東監國有以故官召君者却之順治三年王師下江東君乃出山以文章會天下名士天下名士東渡者悉館其家日以百十人設長筵于堂隨到隨就坐咄嗟而遍窮海陸珍錯之饌每大社入郡一切供張厨傳皆其所治時嘉興南湖作十郡文會君連舟十餘鳴鉦吹鐃越郡名士皆載之以行嘗與豫撰越郡詩選庶常王君選四詩中一詩為鄆城夜走題則明亡時庶常從賊中遁歸作也豫為哀其遇因以右丞司户評其詩簡間而庶常家人謂譏其從賊搆豫怨家陰中豫以隟然後遣人密諷君改所評語君曰此不可改也豫與毛生共為此毛生即不幸有豫在豫能賣吾并賣吾友哉愈易購多紙染其板不絶居常無聊召能飲者一人不問其所來與對坐各不出一語徐徐飲自朝至晡隤然不能動坐寐鼾齁客去不知也自後家寖落良田廣蕩半屬蕪泄文園數千頃亭臺池館半傾圮不復理或勸之節嗇君持杯長嘆曰當吾叩黃軍門時衷革者一月脫此時出關死于兵吾尚能嗛嗛飲此酒哉既而有病不能食危坐却飲噉十日一夕大醉卒方君卒時豫尚未歸里君泣曰吾友在天涯能知别豫在今日乎顧其子曰毛先生倘歸當請一言志豫墓他勿請也康熙十年豫客淮西君已出葬于天樂鄉應駕尖黃州府君之壠傍其子致書請志墓不達暨豫歸而墓門已闔乃承君遺志其子再拜口授狀請表之君所居名黃竹塘父上舍諱衍祚席世富厚以豪俠自喜而其祖諱可師者以國子籍中萬歷丙午北京鄉試丙辰登進士其鄉會墨義俱為世傳誦有名初仕行人遷刑部員外郎升黃州知府而卒曾祖諱初元由監作上林苑苑丞贈刑部主事與弟希元中天啓辛酉鄉試者俱以詩文名于時髙祖諱世厚以國子籍中嘉靖戊午南京鄉試授江夏知縣時充湖廣鄉試同考官江陵相公陰囑以少子入解不許罷職歸里六世祖九臯中嘉靖戊子鄉試戊戌登進士拜魯王相與王左右不相能謝去七世祖懌中正德癸酉鄉試授安溪知縣崇祀名宦君曰吾纍世通籍如此吾何如矣君年四十二子五女二所娶所嫁皆名族康熙十九年友人毛生表其墓且為偯曰西有黃竹今在東渡兮族居以黃比江夏兮世本隆上君適丁其汚兮子房破産不用為家兮亦有良友天之涯海之角兮墓有宿草尚不能一哭兮今者歸來車過腹痛兮欲識其幽反為之題其竉兮身其深深名者其聳聳兮嗟乎是樗里之葬兮苟無恙兮嗟乎此栁下季之藏兮苟無傷兮錢唐李記室墓表嘗從家明府許讀李東琪文嘆其博植不卑貶于雜文有蜂氣是名才之鮮時習者及豫官京師見其弟上珍于馮儀部宅意度翛舉貌骨見如瘠鶴多讀書而往與山人者遊若于衣羽家有所遇者暨豫歸而東琪已厭世獨與上珍為主客聫校往來久之上珍忽言曰豫將遊成都歸期未可知先生文致足禪世恐從此卓逺相見罕念先人有隱德當鼎革之際徵書四下不得已應徵為檢校大使卒以非其意旋棄去而生平好古疏記天下事無所試以康熙八年己酉五月二十六日賫志以殁距故明萬歷癸巳生時春秋七十有七而無所傳述即次年九月七日卜葬于錢糧司嶺之新阡亦並無志石匿于墓不孝之罪著矣今幸交先生先生能無出一言表之遂手狀再拜豫誦狀稱居譙李氏有武毅公者從明太祖開國積戰功為將軍而虎賁公繼之遂領虎賁衛世禪勳爵奄至武略公以食采于浙始遷錢唐豐寧里凡十世以詩書代興數矣自北渠公傳敬渠公而公生單傳鮮兄弟娶謝生式金早卒其次式王即東琪也又娶馬生式璉則豫所交字上珍者又娶沈生式瑚凡四子皆名下士而二為豫友至公卒之嵗遂有孫十曾孫八而十孫之中有名成輅字宏載以康熙癸酉登兩浙鄉榜者則又豫兄子同年生也然則豫之于公其世交若此雖不文又何敢辭獨是公在前朝時抱其所學思有用嘗為本省巡鹽侍御史記室參軍值崇禎改元秋颶風發海水上涌浙東西田廬皆蕩于水即滷地澒泄牢盆竈􅀈蕩若浮梗公把筆繕疏力請巡鹽者馳奏捐課若干既而鹽運司災邊引官牘悉燼于火運司將得罪而公代為疏寬之會倭冦初平海上籍鹽徒若干指為盜皆坐以辟讞上爰書堆垜不能釋公晝夜檢閲所上凡萬紙刻求其可平反者遂徼減其半新安巨估吳氏以觸忤海虞鄉官囑侍御史殺以事以侍御史同年生也公執不聽曰豈有以私怨僇無害者時私販充斥法漸弛公力為整飭使積引泉流不少壅滯嘗清核帑庫有贏金萬兩在常賦之外皆疏引之後所增入者而公仍具疏請給邊軍總制傅宗龍義之移書曰邊實壙積士氣不先久矣若朝廷得士盡如君者何憂兵事哉其經術有用如此公嘗居貧與友人共估友亡司計者侵蝕其資本殆盡友家請各歸所賸公曰不幸而友亡彼寡也所餘何幾而尚恐分之乃不取一錢振袖歸若無有者公諱干霄字卓如初諱立志表曰時李記室之塋表而述之以見其平生西河集卷八十八
