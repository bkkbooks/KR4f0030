body:
  text: 西河集卷五十六翰林院檢討毛竒齡撰序三十三萬夀册序皇帝御極之五十年溥天下臣民爭呼萬嵗臣竒齡在籍即已率家人北靣叩首仰祝聖夀而兩浙布政使司布政使臣郎廷極恭彚近屬臣民禱頌諸詞裝成一冊將抃舞以進猥以臣齒長居臣民引年之首謬屬臣序次其事臣竊惟聖人之夀自與天地相終始原無一年一慶十年再慶之典故自循蜚以來黄帝少昊帝嚳皆百十餘嵗不必有誦揚之文傳于人間即三多之祝進自華封而帝堯辭之召虎以萬年詠周宣而其詩不列于頌縱或君臣相悦稱觴上夀亦未嘗以誕彌之辰立常度者惟唐明皇以生日建千秋節而有宋倣之因之有天申瑞慶諸節畧見章表是聖誕拜揚曾何足為我皇重而無如臣民之心之不能已也夫大衍之期即天地之數也天五地五必五位相得而各有合亦元㑹運世一初基也彼夫一年一慶者天一之始十年再慶者地十之積則是五十年而稱大慶正合天始與地積而共成一元其在臣民之肝膈並未有過獨是從來頌禱定多浮詞而惟我皇萬夀則刺人之骨沁人之心探諸懷而出諸口有千百言不為多而一二言不為少者蓋五十年之恩深矣曩者史臣頌堯首曰欽明我皇上敬天尊祖燔祼必親即端居宸極亦時時以嚴恭寅畏凛諸咫尺豈非欽乎且夫庶政亦殷繁矣天下臣民亦衆矣大君耳目焉能一一而周知之而皇上萬幾具舉百務秩然即中外臣工亦孰有不親别其妍蚩而灼知其良楛者一何明也乃考伯益之賛舜則又曰乃聖乃神乃武乃文夫以我皇上之濬哲何所不通毋論大經大法洞徹微𦕈即軒帝三墳倉頡六書亦且窮源竟委動為世則而至于旦明則並由精一以進于中是聖且神也然且天威不假撻伐四出既已南平葉榆東埽溟渤又復親犁北庭以大拓屬國于流沙萬里之外而究之文命誕敷聲教四訖出經天緯地之學躬秉天文然後觀人文以化成天下是既武又且文也臣民雖愚其敢須臾忘聖神哉又豈敢有一時之不仰文謨不承武烈哉乃若夏書之敷土奠川即我皇之軫念河淮殫力疏濬也商書之克寛克仁即我皇之三驅舍逆四網解憝也周書之上下勤恤即我皇之巡視方岳吏治日以修圖繪耕織民事日以奮也夫三代無侮聖之君而今則尊崇闕里倍于疇昔古王饒興賢之治而今則闢科廣學優于前時雖斯世不乏矜寡而我則從而恵鮮之即民間亦多老弱而我則因而懷保之捐租賑荒之詔每歲必下而且罪疑惟輕災眚斯赦省刑薄罰以全其好生之心是禹湯文武凡有一于是已足稱揚史乘而我皇且兼之然則我皇固兼堯舜禹湯文武而合為一人也夫兼堯舜禹湯文武而合為一人則我皇之夀將必兼唐虞三代之年而合為一人之年斷可知矣臣年八十一幸覯昇平雖夏蟲不當語冰蜉蝣不能知春秋而逡巡里閭猶得仰化日悠長以私慰瞻戀慶孰甚焉因于兩浙臣民祝頌之末謹臚其次第而序之如此别有頌一篇亦附卷後臣竒齡臨序不勝踊躍歡抃之至佟國舅一等公周易註序易傳有辭象變占四義而後儒説易每以此定五易之準故東京建學首以施孟梁丘并京房四家分立學官大扺施氏梁丘氏同出于田王孫之門以小章句起家專主易辭而孟喜京房則别以卦候五行隂陽災異刻劃夫象變以訖于占而其後賈直説行梁丘與施氏並亡西晉而孟京諸書僅採入漢五行志畧見百一而世之為師承者于此絶焉顧費氏説辭猶尚有古義存乎其間是以鄭𤣥王肅輩習費氏學者彪䝉豶互其為舊辭之詁訓未嘗乏也王弼起而盡掃之不特象占亡即辭亦無一存矣宋學代起并四義而分之為二曰理曰數以為辭者理也象與變與占數也程子言理過于王孫而邵氏堯夫且復著圖象于孟京之外而漢易四學為之一新予嘗謂學有逓趨而難于驟返經師授受但當就近儒所説以徐通指歸漢易殘闕自不如宋易之備而可徵而無如後此者之仍紛紛也皇舅佟公闡精一之秘世嬗理學因謂三古先聖奕代相傳之道莫逾於易乃博討羣書溯源竟委上自儀象以下逮名物無不周知其義而又妙簡于諸儒所學専以程氏之理邵氏之數定為指歸謂非親見三聖特摽夫五易而能若是乎我皇上逺紹羲農合墳典丘索之書而萃于一身開運㑹以衍連山擴地軸以繼歸藏統天地民物家國政治以隠脗乎乾坤坎離咸恒既未之易而為之輔者復能發明理數剔抉幽微表兩經十傳為天下後世法則此真循蜚以來一啟闢也朝廷下搜書之令凡天下鯫生家有裨經學者皆得獻之禮官進充袐府夫聖人出世自有圖書四庫既開吾必以是書為河洛之先事也已來木菴詩賦集序夫良材不琢非謂人工之無可施也以為此固有天焉而不可强也予少時與來紫垣游見其為舉文不費㓦劃毫管裁脱戴而信手搖捩輒文采爛然此可謂非天乎顧早歲成進士由判事東閣出之作萊州司馬而乃以武人狂瘈怨學使之軋已也懷刅闇向之而誤中紫垣予嘗嘆文人無命即巖墻之立而不能避名為得天而亦安所得乎天每欲呼天以問之而無可如何乃其子木菴痛父之亡寄居城南桃源村自稱桃源旅人雖已升俊入四門學而以王父吏部公當崇禎之季曾罣誤編管與其父兩世俱以舉文顯于時而皆遭不幸遂絶意進取却試塲若犴狴第為詩為詞賦而不為舉文顧天才横絶不砥而平不濾而清不翦刻暴染而進乎菁英予每誦其賦讀其詞覩其五七字諸詩必以六季三唐許之然不自信也嘗過予杭州故遺其稿去且易書不知為誰作也長夏卧簟拾而展其編曰此非木菴詞賦乎投珠于市雜毛嬙先施于藩姑井婦之間而終不可掩在木菴過自韜晦傷先人不幸而不欲自見其所長揣其情亦固有大不得已于其際者然而今文與古文不必同工而同于不學而工雲霞在天朝披而夕攬焉東塍雜花與南園毨毳初未嘗有所檢㸃而春秋逓代時既至而文自見焉天實為之謂之何哉孫肖夫詩序詩有㳂革革四字而㳂五字七字革律之六韻而㳂四韻而人必從㳂而不從革此易解也顧詩有升降升厚而降庳升雅而降俚升博大而降纎靡而人亦必從所降而不從所升此不可解也肖夫詩質本大雅不屑俚諺而意境空濶所至無局步且復浸淫于黄鐘大吕之音未嘗槭槭與瓦釡争響以故作五字七字雖仍㳂舊物而隨所遇而得詠嘆鮮升降焉往謂肖夫有家學其尊人元襄先生豪于藝文向嘗見其遺稿袛論序數篇而學術之洽器識之廣上下千古之充斥無一不備今肖夫工襍文兼長于詩賦諸體而苐以詩論亦似有卷帙之氣溢乎言間人有擁巨貲而閟其閈周其藩掩蓋其暨茨初若不足于所觀而中藏擴然仰之而却步以為此未易窺也過門攤市肆而青黄雕琢絢然在人目而求之而一往而盡然後知所降之必不逮夫所升也而從之何也平澹人徳配陶夫人七十序予束髮與澹人游在五十年前維時郡城好結社每社譜出予與澹人必聨名有若榜帖以故予至郡必主其家因之能道其家人事顧未悉也逮予避所嫌藏澹人複壁越十日而後出門當是時丘嫂陶夫人主晨夕餐飯凡粢醴涼暖脯糒乾濕皆一一口受而心記之至于今不能忘乃予年八十有一回顧曩時所游者百無一存即澹人已先我去而夫人則竟以七十聞予嘗疏夫人生平以賢門弱媛年少婉孌歸之我友之名下其于伉儷間亦又何歉而獨于夫人有難言者澹人雖世積兄弟鼎盛而其所後者世父也在堂餘老嫜與所生舅姑孝養兼責每歲時伏臘轝轎舟楫東西至如流水而夫人以一身周旋其間雖劇易不齊必得其樏理而後已況羣從滿前多望之長伯遠游饒結納而姻婭戚族槃匜饋餉又雜遝無歉日加之家室多故叔隗尚未絶而戴厲相續勤于下逮其為佩刀之逓授與衣絮之咸被于以費經營而煩㓦劃蓋不知凡幾也而夫人一以敬順將之謙沖其中而和愉其外在本性鮮嫉媢而孝先慈後畧無墮闕自持門至翕幙并絶佻侻陜輸之習世嘗稱石簣家學歴産賢哲而夫人以閨閣善承其後以故八荀三薛前後相繼即門楣宅相亦且競秀如他日今而後乃始知夫人之教澤長也夫歲月幾何榮落有限曩時結社諸大家或贏或絀往有嵸嶐若丘山而數十年來頓夷為培塿而不可止者予與澹人訂交時即自忖所至亦不輒料其止此乃一轉瞬間而相顧倐忽夫人且已老矣予力憊不能身入郡城親捧錦帨為夫人夀然意念所及高門閥閲恢大于舊而膝前奮起各能以文章馳譽逺邇然且友朋踵至所云拜母庭下者多于疇昔不翅名姻貴戚酒漿筐篚之接跡于道則異日在廷之褒遲久不厭夫人達人當必有曠然于其際者予故馳一觴而獻以是言地理心書序地理心書者張子禹臣所著書也周官族師氏有相墓之説謂古有𦵏式須視其封窆以合軌度非謂此中有吉凶當審擇也自陶侃羊祜相傳有隂陽家言指亡人坎埳以為生者休咎之驗因之地理一門肇于東晉而盛行于宋之南渡以後蓋嗣是而在庭楄柎欲早安窀穸難矣張子禹臣知其然謂撥沙表竹言人人殊景純仲祥動多荒誕亦顧其心何如耳于是著地理數卷而顔曰心書蓋心有二義一則俗師㝠頑心本不靈焉能瓜見土禹臣以博通之懷精于名理豈區區阪險而猶不能直抉其徑與遂者一則心乃仁術苟巧于依違則外而徇人内而徇已皆足自壞其本心而禹臣一以至誠行之故吾謂心書者禹臣之達心與其心術相附成焉者也然則讀是書而倘有㑹焉亦㑹之以心而已矣寧晉邑侯去思碑記序古之為吏者自通籍後比年觀政三年而報績其善者留其屐而懸之縣門不善者唾其輿噪而驅之今稍不然居官長子孫動輒十年毋論善與不善初立長生牌而繼即為祠而填牌其中及其去也詛者詬者怨憤而譁者咸集祠下甚至焚其牌毁其所為祠而後愉快是曷故哉則以民心之難欺而愛與戴之不可以勢力取也邵君二峰之宰寧晉也吾壹不知其居官何等也其治行在人人能言之吾不能壹壹而疏布之也乃計其受事之日裁數稔耳自下車以至乞疾裁轉轂間耳迄于今相距已七年矣邑之人尚能思其人念其平生詠嘆其所行糾錢買石思樹之五達而邑之士大夫即又起而件計之礲之勒之彚諸所詠歌合為之文以傳於不壞人皆曰寧晉民良能不忘舊官又曰官毋虐視士大夫士大夫尚能以遲久之言相於有成而吾謂此皆君之有以感之夫懷塼之俗今所同也挽攸推謝之謠不必寧晉士大夫始能言也況恩久必息思逺則忘變榖改燧不待來復而乃感愈積而澤愈長日彌逺而思彌切夫驩虞之術可以暫而不可以久假借之恩可以頃刻而不可以終年彼苛政無論已間有假以小恵者初與民噢咻遇草衣芒戴之族言語喣喣涕泗相慰勞而乃隂料其貧富而利其財每事為氐卭貧者軒之富者輕之其始也貧者多快心可肆忮害而究之人匱財竭而同底于盡甚或摧抑士大夫以悦愚昧而等威一喪强者暴者率能自恃其慿陵以加寡弱而其為禍反不在士大夫而在百姓此害馬之政也此違道以干百姓之譽者也君居官坦然行所無事而四民安之邑有瀝城即滹沱水也周環數百里一望洋洋繞蒲葦魚鱉菱芡茭菰之利男婦日游居其中而相與為樂嘗指之曰吾侯澤淠然有如此城此非涓滴沾濡之所能邀矣漢史之頌循良者有曰所至無赫赫名去後嘗令人思邑之思君其得之去後如此吾故樂題其請以為世之為吏者勸焉吳母章太君夀序嘗讀易至節之六四嘆節以三隂當水澤之交互相推移而惟六四為不易是以身處艮中雖震動未已臨以坎䧟而安于互艮而止而不遷君子以是卜其能安貞焉予年老不喜作夀序苐遇七十以上則偶然應之以為年老杜門庶幾説長年舊事猶得置身童稚間强為笑樂而獨于吳母章太君則重有感者太君為吾郡都掌諌章公愛女方公忤權相編管均州正值崇禎之季國事大壞雖莊烈皇帝䆒已用吳太常請令復公故職而倉卒不逮當是時公荷戈渡江叩浙撫軍門興師勤王太君牽衣不為動而既而遯于四荒太君偕其兄尋父不得彷徨墟墓間則在太君家居時已歴坎矣且太君所配非他即宫允吳公之次子也公與宫允公本同年同館且同為黨人因訂婚姻而鼎革以後宫允公亦入山往時清華之望髙門大户了不復舊時之盛公絶志不為子孫計以故太君來歸時年祗十五而公子之親迎者且御輪草草不止桓氏挽鹿車焉乃公子弱冠即與其兄星叟皆以文章為東南領袖而羣小叵測往往窺兩家踪跡隂相哃喝以致發憤鬱結驟赴玉樓者又三十四年夫以世家門第煌煌鼎盛鄉里望之若崇墉峻闔而一旦夷于草萊席門窮巷已不堪矣況覆巢危卵幾至不保而又仰黄鵠而誦單栖遺孤孑然迄有成立此其憂患為何如者彼夫水澤汗然亦云坎險太君以艮止當之既承上道復昌後來然且嗣君大賢能令坎離震兑各馭時序彖所謂天地節而四時成是也夫節者賢也以一節而成四時則賢也而進于夀矣歲之載陽為太君誕辰戚里飾漆屏虛其右以待雕琢于其上乃執一觴就其請而慨然應之吳静及詩序吾越當鼎革之際曾作越郡詩選若干卷遍搜越人之為詩者而選之而杭州不然限人數于十名為西泠而外此勿錄以故予來杭祗與十人作倡酬往來一似舎此無詩人者今其事往矣名才相望各出其咏吟以摰于人雖牋版數行亦復相遺若束帛況篇聨卷接者乎吳子静及好為詩所至題郵畫壁散作方幅嘗介友人示予并請予序而予以剖析經學弃之篋中已久矣長夏卧床始得卒讀其為詩而附以數語向過杭州與所識者論詩其言畫一雖十人而仍如一人了無出入進退于其間而今則離竒錯雜極唐宋元明平陂正側雅俗濃淡之各有所到以大體言之不無過賾然而四時雖殊寒煖則一今試過鄉縣蕭條閭巷千里一色而一過都㑹則臺城參差車轂紛出要其為四民之所居則無勿同也静及力趨大雅本不為時好所逐即偶然遣放亦復去故就新歸于正則是雖十人相遇亦未嘗不忻然把臂而況予之不立選格者矣錢姚三子獻萬夀頌序西林多軼才其所為詩古文詞甲于他郡㑹皇上萬夀行省徵治屬工文賦者多為祝詞合書冊以進予嘗竊觀至二姚子作一賦一詩嘆其工麗饒體㑹可稱才士而既而得錢子集唐三十首依平水所併上下平兩十五韻淪漣詄蕩對精而屬切以為聲律之極事莫過于此顧其冊以彚遲稍闕畧未入獻也乃皇上以觀河之亟星言至浙羣臣在途多獻頌者三子亦循例録所著捧之至鳳山門側蒙駐輦垂問歴訊其官銜版籍且乙覧移刻命其親賫向行在投入已異數矣及投訖而傳㫖侍衛引見于中堂張公且同仁和王錫等五人一體奬勞抑何至尊之優視文士一至此也予嘗嘆桓滎被服誇稽古之力而經生年少即親承咫尺面受温言為高文典冊生色此其于稽古寧有歉與予垂老僦杭祗閉户窮經無暇及詩文一字而錢子升巖姚子立方皆數以經學與之往來今錢子景舒正升巖之子而魯思彦暉即立方猶子也三子有家學且同巷居古皇見佳賦喜與同時他日以同學而同進公朝其為同時而獻賦又豈相逺焉邵時來先生七十序人生以百年為期而十臻其七已稱稀有况閨闈合徳中外齊齒而又有名父以居其前有順子賢孫以隨于其後此雖孟子三樂周詩九如亦于此遜不逮而先生實躬逢之友朋姻婭其屬予一言以稱慶者屨且滿矣予嘗從其嗣君在掫觀所輯邵氏世譜嘆閥閲盛大為東江望族之冠而先生父子皆以多學為藝文領袖乃高蹈不出先生且嘗游京洛為王公鉅卿所敬禮争相館饗而終以歸養之故辭之南還其徳配孫太孺人則又以南臺之後世席贏餘舍珠玉錦繡而挽鹿來歸苐日主中饋佐先生洗腆然且束髮與難兄孝廉君同硯稱詩説禮迄于今其膝前奮發早能以文章娱事二世皆太孺人教也夫先生七十不敢言老而上有忘年之耆英岸然在堂下有不可不知年之嗣子且獻觴庭下是毋論親朋姻婭稱祝無既而即此一堂雍容合三世中外以為吾先生稀有之慶慶孰有大于此矣因就所為幛而并書之西河集巻五十六
