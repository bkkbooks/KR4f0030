body:
  text: 西河集巻四十五翰林院檢討毛竒齡撰序二十二李廣寧司馬詩集序十嵗見楊盈川詩初未嘗知為詩也而誦而好之以為斯文中固有如是其可娛者人有以東野夫子集問伯兄伯兄稱其佳而竊為不然伯兄曰汝何知汝他日當知之迄今越四十年而其所為不然者猶故也文之在人猶雲霞在天一望軒然雖有他物不得而掩之必再顧三顧而後知其為美者非真美者也予讀廣寧詩目之所接口之所誦皆豁達于心有口所不能道心所不能發者而廣寧能道之發之其思深其意廣語奇調髙而一凖于法意向之所為一見而知其美者其在斯與廣寧為人卑以自牧其接物恂恂一如有愷摯之氣行乎其間宜其詩之温柔親切有如是矣或言廣寧治鬲津政聲藉藉然不廢吟詠有鬲津集行世其後游楚有楚游集今將以魯國司馬特遣開牙于淮沂之間褰帷而行予謂為政與為詩表裏政閒故心閒心閒故為詩亦閒他日過魯必有以魯國風詩採之入奏者豈僅靈光一賦已哉王舍人選刻宋元詩序昔昭明選文謂文有變本不相仍襲譬之椎輪為大輅所始而大輅不必為推輪増冰為積水所加而増冰不必皆積水審如是則漢魏六季升降甚懸然猶不能存漢魏而去六季而欲以三唐之詩一舉夫宋金元五六百年之所作而盡去之豈理也哉夫唐之必為宋金元者水之為冰也然而猶為唐則冰之仍可為水也宋金元之大異于唐者鉛之為丹也然而不必為唐者丹即不為鉛而亦未嘗非鉛也曩時嘉隆間論詩太嚴過于傾宋元而竟至于亡宋元夫宋元必不能亡而欲亡宋元遂致竟陵公安競相簒處勢不至于傾唐不止今之為宋元之説者過于重宋元而抑明夫明必不可抑而過于抑明而重宋元其勢亦不至于傾宋元不止舍人王君惟恐以今之為宋元者如昔之為唐而仍蹈其弊于是搜討遴錄遍輯宋金元之詩而以揀以料揚其粃而汰其礫取夫宋金元之近唐者而存之夫丹固亦可爇之而仍為鉛也今無論宋時詩人如渭南滄浪眉山涪川諸集其見諸編者去唐未逺而即取金元之在選者而試誦之夫不見虛中好問之近韓韋師拓麻革之近郊島趙承㫖虞學士之近錢劉鮮于機薩都刺之近温李掲奚斯太不花之近張籍王建乃賢郭奎張憲兀顏子敬之近方羅近滄渾哉理學備考序聖門無不一之理而有不一之學惟無不一之理故堯禹湯文皋䕫伊散所行不同而同歸于理惟有不一之學故雖聖人之門同一授受而四科而外漆雕氏南宫子容以退為進曽晳琴子開以無為為宗端木公孫子龍以説辨相矜多仲子路澹臺滅明以游俠顯卜商商瞿馯臂子弓以論著討求置身于傳述之列然而殊途同歸合源異流卒不以此開分别之途若是何也則以此理之本無異也故理同則學同學不同而理愈無不同逮趙宋繼起雖其同時言理學者肇于周子而二程而邵而張稍有區别外至涑水崇安漸涉踈曠然猶一理相學不分彼我及金溪紫陽偶相質難而學者遂以此為齟齬之端設立門户區分畛畍是欲使吕尚隂符黜于皋謨卜氏詩序殊于商易也而可乎夫列聖之不同列聖之行也其無不同者則其理也理在天為天在人為性在天與人之所行為道故儒者以理為天又曰性即理也又當乎理之謂道而合性與天與道總之為學葢學以學此而已雖所學不同亦學此而已譬之至都者以舟以車以趾以蹄以東西朔南隂陽向背而究之至都而止故日月不並行而皆麗乎天江河不同流而皆見于地隂陽寒燠燥濕不同候而皆合乎天與地之氣所謂衆致者一致之歸故貴乎學也今之學者吾惑焉守支離者訾金溪崇易簡者鄙紫陽而沿其流弊遂移之為河津姚江餘于新㑹紛紛牴牾夫朱陸尚無異同而欲以朱陸之同異移之他人不亦怪乎彪西先生為河東夙儒考道有年乃復以理學相傳恐有闕略或致是非同異相持不決因輯諸儒語錄為理學備考一書夫不裒不減不贏不匱備之謂也備則無偏陂之見存乎其中備則無罣漏之形見乎其外而就其學以溯其理洋洋海若不知南極與北極也星漢入其中日月出其裏隂陽寒燠燥濕皆與為往來而藉以消長理學雖繁欲舍此而更為異同不得也顧吾有進者先生與河津同里崑崙可溯百川俱㑹定無守一曲以為獨得而其書倘行聖天子經筵進講時及理學且諄諄以消朋黨化同異為諭果能進其書以邀乙覽縱語錄纎微然安知不即與卜詩商易稱極備哉丁孝子身後芳名册子序身後芳名册子者故明丁東阜先生之孝蹟也先生為嘉靖國子生曽侍父雙槐公疾將革百醫不能療值嵗除先生徒跣禱城隍祠歸而闔户以泣既則詣竈詣家廟衆不知何所為也詰旦元日雙槐公回面謂先生曰吾不能再逢此元矣子孝舁我至前庭加衣冠其身將一謝天地祖父而後别即舁第出先生率諸子姓羣從拜天地祖父畢焚紙幣出袖中片牘雜幣中雙槐公卧視見若有神物攫幣去者驚而謂先生先生唯唯私喜曰事得濟矣越五日先生不疾死死一日而雙槐公愈越數月公與先生子撿先生書室收諸留遺見篋中有讓年算以代父死疏藁筆畫儼然公執藁而泣始悟元旦焚幣時其雜投之牘即是也且又悟神物之攫之者亦以是故乃告諸親族既而外之人亦漸漸有言其事者府縣長吏争為題而榜於其門而好事者復圖繪而歌詠之于是同邑内史孫公為書其册首曰身後芳名今其事已往矣其五世孫進士文龍以謁選來京師重裝潢素册彷舊圖而書先生遺疏于其上以乞夫京師之善歌詠者予思孝者天徳人敦不樂道況世逺代易而為之子孫者復能誦揚先徳以彰夫駿烈則是先生之孝其不匱者可知也且此亦身後事也予在故鄉時已題前巻今復記其始末而序之如此世之詠歌者可以觀焉張澹民詩序少時與澹民之弟公授為詩未嘗見澹民詩也既而見澹民之詩則澹民詩實勝公授顧公授以客游不歸而澹民亦日走四方在故鄉時少故予極愛其為詩而求與倡和之則什不得一焉今予來京師而澹民適逺遊過闕寓于其家人為都官郎者因得卒讀其近年所為詩夫澹民為詩不多而寄託隠深于古詩得子建法其近體詩則蕭散閒雋多自得之句顧賦寫饒實境今為詩者不及矣予少好宋元人詩既而隨俗觀鍾伯敬選詩又既而悉棄去效嘉隆間王李吳謝邊徐諸詩則正與公授為詩時也今距三十年海内為詩家又加于昔而變易百出復有竄而之宋元者而澹民之詩則猶從嘉隆而進之于唐其不為習誘若此獨是澹民以世家子能襲其家學詩本小道尚足繼其先人宫諭公下及累代名集究其所得當不止詩一節而澹民生長豪奢自幼迄壯悉得修服食玩好宫臺圃榭之美及圖畫典籍什器刀劍金銅鎡石漆沐雕鎪追琢冶鑄之巧以追席夫先世遺緒朱輪華裀之盛者三十年來猶未之有改也而公授客死澹民則驟丁貧困至道路瑣尾具饑人之色乃猶然泄泄洋洋下筆為詩文慷慨磊落毫無牢愁憤嘆及局脊踽窮之見于詞句此予之掩巻而興思者乎館擬甲子科湖廣鄉試錄序皇上御極之二十三年值元㑹初開干支初闢之始禮臣以賔興大典恪遵成例開列諸臣應任選者仰荷睿鑒特命臣偕臣典試三楚伏念天下當蕩平之際東漸西被海波不揚而三楚介在南服自荆門以南逺至五嶺中間數千餘里前代雈苻跆藉不遺尺寸賴世祖皇帝方行克詰耆定武功江漢之間幸有寧宇而潢池盜兵又適當黔巫之衝浸淫衡嶽凡鋪敦師旅悉集之襄樊穀鄧以下與湖湘為控馭卒之六師張皇皆藉我皇上聖文神武裒荆罙入持玉斧而劈之瀾滄之外洞庭上下重見天日迄于今文徳振興賢書進獻者又三年矣古者生聚教訓必須時日而皇上以存神過化與斯民更始如風之刁嘹而萬竅齊發不數年間巖居谷處悉受披拂臣雖駑劣亦何致以文命覃敷不加宣布獨是三物六行互相比較惟恐以浮文虚夸致妨徳藝是必于程硃較墨之間使言行相副始不負我皇上求賢至意用是惴惴惟謹乃暑雨宵晨既底其地即與二三臣工載厲厥事惟時監臨巡撫中外劼毖綱紀肅然而提調則布政㕘政經理精詳監試則㕘議僉事防衛周悉爰集同考試官決題發策進提學僉事所取士而三試之垂簾于堂合衆視而通以一心一若心入重淵而目營四海積若干日得若干人以覃恩廣額増若干人并取乙巻貢成均者附若干人而錄文若干首以獻臣謹拜手稽首颺言簡端臣惟國家致治莫先用人用人之要在乎言行故三代立賢必以言揚行舉為旁求之則而成周三載選士必大比其徳行考詢其話言而後升諸宅俊以貯為世用此無他言者行之表徳者言之本也自西京取士有舉有試而分徳與言為二然且試士之目猶尚躬行如所稱賢良方正孝弟力田者簡拔之中仍不失砥礪之㫖故兩漢得人較後為盛暨隋唐以還廣立科目但以天子親試者謂之制科而别立秀才進士明經諸科為有司所試舍此以外别無他途為進身之地而于是以行求言而言見以言求行而行不可必見夫立言者既欲借言以表其所得而求言者亦即欲因言以定其生平則疏其辭矣必瞯其情也瞯其情矣必覈其義也覈其義矣必覘其情之何以通與義之何以立也夫如是而衡文之難也甚矣曩者漢庭制策首重儒術然鼂錯内習申韓外應文學雖孝文之明猶不能辨其醇雜宋代啟髙文闢詭習顧劉暉私製新體而應試則謬為方正之語以嘗有司則雖歐陽之聰亦且為其所蒙昧而絶不之覺況今人之文不逮鼂錯有司之識逺遜歐陽而欲以尺幅之間燭照數計坐見其敗也乃者兢兢業業殫精敝思自謂可以告鬼神而終不能少釋于寤寐者以為因言以求人仍不若因言以求言葢言有偉肆而非夸者終不若醇謹而不流于固言有綺麗而非靡者終不若清真而不隣于薄言有勃窣而非僻者終不若簡易而不淪于一望而易盡則文字雖微亦即為維持氣運變易風俗之大道而況髙文華國正聖天子啟迪文教所有事哉夫文體不同要歸一致前代取士多途總皆以登選之一意行之雖明經明法不一其科三年二年不一其候兩省禮部不一其地帖括經義不一其業然其為求賢之㫖則一也況今者家共一書人共一藝上以是求而下以是應閉門造車出户而合登明選公夫豈有二姑無論其他即楚材晉用起自春秋而其後三楚人物漢唐輩出諸如黄香孟宗以孝行著易雄李芾以忠義見黄瓊郭翻之方正胥偃鄭獬之氣節龎徳公劉凝之之髙尚孟浩然皮日休之曠達以至幹辦如龎統向寵品量如孟嘉羅友力學如車𦙍潘京該博如黄琬李善詞翰如李邕歐陽詢文章如羅含習鑿齒王延夀杜審言輩何一非生其後者所當法式而其各不一以歸于至一有如是也然則言行雖殊求之惟一而至于文體之變猶次焉者矣臣之所自勉以勉多士者如此若夫有事茲役有吏臣若若例得並書王文仲六十序予與文仲為禊洛之㑹正始諸賢未有少于予與文仲者也既而與文仲之子作河朔游則河朔諸賢仍未有少于文仲之子者夫以阮籍之才曠視一世猶然與長原安豐父子前後友好況以予之愚而幸友文仲又幸友文仲之子豈不甚快獨是以夙昔所齒序者而其子繼起乃復與之講友朋之好則其嵗月之所經亦已多矣予中年避人不知文仲之所以處壯者如何也第觀其少時意氣蔪然擴乎其神明皦焉若初日之升于林其争衡藝文卓立壇坫又何嘗不以用行之事為己任哉曽幾何時而三豆之觴即已在鄉曲間也夫汝潁之士流離世故猶有託身天宇之感而柴桑心悼逺役尚官百里文仲以麟龍之姿處約味道凡生平取與過為降薄毋論世味沖子即其自奉之歉茹蔬斷肉雜虀瓿几桉服食􅀈顇誠有生人之所不能甘者予嘗服其行髙其誼而未嘗不悲其資世之遇淡也今年秋以六十生日屬予為文夫櫟确無才棄置能乆此物情之恒惟是楩梓珠玉亦以寡用為乆長人固各有志耳李愬以西平之子建功淮蔡而愿歸盤谷兄弟異趣文仲自處隠閟而有兄在朝領殿中執法之選為天子親臣人之志量各自有在獨予固文仲友也避人有年復能偕其子之友一觴寄祝天下有耐乆如予者可以為頌矣劉櫟夫詩序予毎誦雲間之為詩輒念黄門當日以古學剪辟蓁薉奪楚人邪説而歸于正何其雄也今則宛陵涪川簒行于世毋論其所宗者皆鄙猥褻敗不足深據而即以難易觀之夫才人當為其所難以千百人為王岑必不得者而一二人為聖俞山谷而即已大噪于時然則其所尚者止藏瘢廋慝當逋逃之數而非丈夫抒才見學之能事也劉子櫟夫來長安予重讀其詩嘆曰此非當時與黄門同事者乎乃以當世非笑雲間之日而櫟夫仍攜雲間詩以遊于世且其詩則向時遊秦之作也秦風剛勁為三百變體而櫟夫以正行之凡涇南渭北蕭闗瓦亭之間詠歌笑傲而仍不失四始六義之正嗟乎此何如者耶今天子好文取天下為詩文者試之昭示天下而間在舉中猶且習氣未除半趣弇鄙向非册府大臣力持文教申敕再四幾不能使昌明張大之業行于開闢然則櫟夫之為詩譬諸松栢本後時之凋而今且復為先時之榮不亦怪哉何生洛仙北游集序人能為唐詩而後可以為宋元之詩如衣冠然攣手局步隣于拲械而後稍稍為開襟偃裼之狀差足鳴快而不然者則裂冠毁冕而已顧能為唐詩者必不為宋元之詩如琴瑟然搏拊詠嘆已通神明而欲偶降為街衢巷陌之音以為娱樂則流汗被地而世人不知則以為弦匏無異聲鐘釜無異鳴而已吾鄉為詩者不數家特地僻而風略時習沿染皆所不及故其為詩皆一以三唐為斷而一入長安反驚心于時之所為宋元詩者以為長安首善之地一時人文萃集為國家啟教化而流俗蠱壊反至于此遂一手榰梧以與時之波靡者争而近則東方漸啟爝火頓熄乃吾里為詩如何生洛仙者先予入長安且流連于燕齊趙代之間者至乆且逺獨其所為詩廣大和平不為時誘是何其錚錚者與予門下何生卓人為洛仙大阮其為詩矯然獨立予方欲馳書示之使之知郊廟明堂之音黄鐘大吕之調而洛仙在上國觀光最近以此倡和南北吾知四始六義不難復也此集係一時遊覽所作然已能見大概于其過也遂序而告之張芍房摩青集序日見千百人不足當所見也其足當所見者或數年之間不見一人或一日見一二人然且所見不一有一二見者有一見不再見者夫至所願見之人而一見而不復再見甚矣所見之可思也予與張子芍房見于汝南之南亭致相好也顧嗣此不復再見康熈乙丑其猶子舉人偕計車來京距向相見時一十八年始接其書問且間見其近日所為詩若詞而其人終未見也古人能任意不詘于事且不為境遇所稽滯故毎一思及千里命駕而予以一官升斗棲遲京邸不即歸也即歸亦覔食鄉里不得挾餱糧徒步訪友則其相見有終未可必者毋已則第見之于其詩與詞而其詩與詞抑何四顧磊落忼愾沈摰其聲情相屬一若芍房之在前而與告語也夫良朋契濶既乆其間隂陽寒煖亦已遞變即生人齒髮精力亦漸減薄而其為文如故也然則今之視後來亦猶是矣芍房有從父廣文君予見之息縣與見芍房者同時而猶子舉人則見之今之京師其繼此相見與否俱未可知聞芍房搆園居名曰陟園取陟岵陟屺之義而中建傑閣以摩青名則即李白登華時所稱頂摩青穹者是也夫陟園思親已不再得而登髙四望有懐逺道則芍房亦第于君父朋友間相思願見而登愈髙則見愈逺因不憚抵蒼拂昊以求快其志則其所相思而願見者安知不即于恒山北望間加之意焉西河集巻四十五
