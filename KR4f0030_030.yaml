body:
  text: 西河集卷三十翰林院檢討毛竒齡撰序七厯法天在序夫物生有象而數已備焉矧天日垂象于前而目不可得而視心不可得而較稽幸而藉口曰吾儒生也向使集博士衣冠于清臺之下使之考五紀而定六厯鉤較紬績安所賴之昔者觀天家大率分見窟穴占隱物怪與臯唐甘石凌屑米鹽者略等故迄于天地多故即仰覘彗茀糾察抱珥自許有得而苟及孟陬渝次攝提乖方悉莫能究故仍留其事于司厯而凡大法大章有可以紀出入察擾正者翹首喑喑欠申而已夫象之不明觀者之失也機旋道行之不可以為法則九會之數或未講也朱先生少參分守吾郡留心于天文家言其所論著者曰坤乾曰陰陽曰竒門太乙皆有成書而尤于分天轉歷之術稱為至精蓋其得之于家之所傳與其往來遊歷之所探索殫且備矣豫井觀有年不辨早晚而先生不以豫固陋馳書使束册載幣立取豫一言為序子嘗窺舊厯與郡之士大夫追論三五皆云西厯最良元時西域有萬年厯早行朔方而郭守敬授時私取其説庶幾邃密故其儀象謂地輿圓轉竟與相合而明初靈臺亦有回回厯與大統參伍今保章時憲即西洋也先生論著雖半為先世指授而隨在參訂不遺一得三統多取之儒五部多取之史合散盈縮多取之博士所傳伏見存亡短長先後多取之司天者而至于圖象之竒推步之密邪正濶狹之異同發斂清濁之得失則多取之西厯之舊傳與鈞臺之時憲名曰天在蒼蒼者自有在矣顧豫有疑者古厯簡易而西厯煩重夫賓日在卯餞日在酉時次同也今則不于其所出之時而于其所見之時不于其所出之次而于其所見之次以為燕齊吳楚出有不同則向使經峽中者亭午見日可謂日出于午乎則何不别穴處之地而曰此日不所出之鄉與且日入亦殊而厯又不載何耶若夫候氣之至必穿上達石無間厚薄而以為隨地各至迂已儒生不習厯而先王協時首在正日且西厯所布較于日出候至有倍詳者因為讀夭在而敢為質之若是錢塘吳元符遊仙録序子與元符遇薑京兆坐中元符知豫豫不知元符也方是時豫避人潛歸舍京兆之尊人工部君者而元符試禮部出京兆門下躬渡江為工部君夀因得一見元符顧私念元符者姿形濯濯如臨氷壺有道人也既而知與宗友稚黃同巷居益知元符有道工為文章砥行不負向一見若他人纍稱元符善制義則未嘗見也且制義豈得稱文章哉及豫再歸而遇元符之弟瑹符猶元符也然元符已死又念以元符之文若行堂堂具天人色其不幸於年如此形固不足恃文與行且安據也暨豫止里門而瑹符録其兄遊仙記傳且彚所贈文詒豫為敘豫按其狀大略元符曾降神于鍊室書方療疾并道趨避其言質而可信且縛竹畫灰蹤迹左合其對鄉人故舊問無恙外多得隱券因傳其祕若有所為三華一元諸署掌者豫往遊二氏而特疑于老以為鼎湖燒藥崆洞受書求不得驗而求而至死則漸有託之髮脫形卸目光不墮為解去者故輔嗣朽骨談玄冡中嵇康離體援琴海上久無足信而近聞海昌吕先生鬼能著書吳江葉瓊章倚乩成詩稱璿宫侍書女則意顔氏子為修文郎宋康王舍人作水官騎魚不必皆亡是者與夫人之難于為仙者謂其背羣遺黨衣風吸雲修黃鵠之舉而終不離于壤蟲之蟄故不屑也乃若飭其言行而自有以底于道則雖曰為仙而實不異于為人吾向見元符而苐不知其為仙也向使吾見元符時知其為仙則私幸一見或有甚于當日者然借使元符能為仙元符不死其見吾元符仍無加于其一言一行而止則是元符雖為仙吾仍見吾元符之為人已也瑹符工文章其遊仙啓瑹符作某序贈陳别駕遷淮安司馬序自古有郡守即有郡贊所以二守典兵謂之上佐顧歷代建置有通名而無異秩凡治中别駕長史司馬一也既則分司馬别駕為二而以司馬為六百石位别駕上要其贊亦少異焉三韓陳君由典奏起家為淮西别駕其稱上佐有年矣今年秋天子特簡諸守贊有政績者念淮西别駕能遷淮隂郡司馬以典兵贊郡兼籌海防開牙于射陽鹽瀆之間淮西守以下暨諸邑長供張于郡東門外而索豫一言以為贈夫郡之有守贊亦猶地之有江淮也淮于四瀆為南條之一江漢既合而淮乃鍾之暨東江漸東而淮亦因之獨入于海君初贊淮西既贊淮隂雖猶是贊也而始終在淮抑何與朝宗上下有相須者耶且夫贊亦未易視也郡守承王化以敷宣于外而其副之者惟贊也故守以牧民而贊以佐守郡以按縣而贊反足以監郡禮曰四瀆視諸侯侯者守也以贊侯而參于侯則夫以贊瀆而列于瀆其理同也乃當君行時有執瓉而揚于前者郡守也有捧樽罍而傴僂于後者諸邑長也有持錢挾食提抱而扶服于左與右者民也民之言曰君功在贊郡而德在民民之思君德即郡之紀君功也然而君之功不勝紀也夫以君之皎皎著髙望也則流品于以澄也以君之公忠勤慎能合衆也則邦國不空也以君之廉清而無所于奢也則所謂襆被能自將也以君之摲煩而剸劇剛克有濟也則又遇事能斷者也澄而能勤清廉而能斷鑒流品合邦國而能務凛于出入機事淮西如此淮隂可知矣君伯仲皆仕顯其仲氏掌樞曹司校多所建立而君方以贊淮為推移他日移所贊贊國贊名雖同而其贊又異則夫三公五嶽其為相視更上者又豈僅區區淮海間哉丁大聲迂吟二刻序大聲為迂吟迂且吟也既而墨然不一吟蓋號呼躑躅之餘總咿唔豈能成聲哉去年三月灌園于西郊始出向時所為迂吟者視之泪浪浪少吟之輒悲哀動人且鉏鍤之暇仰首落日亦遂多所惋嘆因復俯仰出篋中築衣故時所衣仍坐上坐豫私喜得大聲一言而時之思大聲者亦願一再見大聲詩此迂吟二集之所為刻與夫言詩者紛綸于人然近世言詩仍推大聲猶恨今所言者不盡如吾大聲所言大聲曰詩本六義續以八體又曰詩以善變為上拘限次之沿襲最下蓋大聲所言直本風人近未及也昔有疑迂吟為不迂者矣憂時憤疾多激楚之音其于優柔靡曼和平嘽緩之節可謂曰殊然而邅回于刺促之間瞻顧于敏皇之際以人之可為而苐因文以見志以事之必不可為而故為沈吟輾轉紆徐以風之而且時有難言猶盤辟其詞一似言在是而意不在于是者凡此者所謂迂也今以能言之流而泄泄好退一若遲回却曲之必不可已而後杳然而間示以所欲語此非從容間誕濶逺而不切于事情者必不至此吾故曰大聲之迂吟以迂而為吟者也其又迂則以其吟也然而大聲于此將復有墨然不吟者何也閨秀王玉映留篋集序萃山林川澤之氣以生才才固未易言也歷塊而一逢閲十百年而間一二覯况閨房也者夫惟天能愛才故亦不急于生才乃生之而人反棄焉山林川澤其不如人意久矣吾鄉之有閨秀自謝道藴始然謝在當時未離梱域獨王江州以孫恩見害而謝亦抽刀挾婢登車殺賊及乎嫠居則間隱幔與士大夫談義已矣今吾卿閨秀十倍于昔然早見稱者王玉映也玉映為季重先生少女先生制文傳海內而玉映繼之中郎有女可慰孰甚乃七八年前豫亦得讀所為吟紅集者時先生尚在通家子弟爭相傳道暨乎後而稍衰矣遭家仳離即夙昔倚聲聞者猶以豫選越詩時登玉映作且群起詬厲在有辭説今玉映以凍飢輕去其鄉隨其外人丁君者牽車出門將棲遲道路而自衒其書畫筆札以為活記去秋鄉田燒自山隂道江凡一百里渠腹龜拆結袂而蒙暵未及稅而風雨驟發邑市衢巷皆漲牛馬暴涷豫既聞其事值有客抱三絃者托屋下其哀彈與風雨迸出豫乃作長句既悲閨中之在道而又自託于箜篌作諷申無渡之意其詞至今在也見瀨中集七古卷今渡江已久丁君且擕玉映詩示豫為序夫玉映固季重先生之女而丁君非他其尊人文忠公所稱以詞官而死于魏監非耶文忠為東林祭尊復能見概節其于王謝兩家正復無憾而丁君以三衢法曹所在乞食而玉眏且不得復為隱幔之歡於人意何如也吟紅集詩文多激切而留篋反之留篋獨有詩然其詩已及劉禹錫韓翃閨秀莫及焉留篋者豫為之名也杜詩分韻序輯詩家有分時分體分類分韻四則杜詩本分時者近有刻分體名杜詩通而至于分類分韻逮今無之此西樵分韻之所為作也古文無盡韻者有之易是也詩無無盡韻者有之頌之桓與般是也是故漢以前文間雜韻句而東方先生作據地歌後漢靈帝中平中京都謡辭即詩而反無韻焉自魏李左較始著聲類齊中郎周顒作四聲韻譜而其後沈約陸法言孫愐輩各起為韻學而詩凖於韻故三唐用韻較昔尤備况甫精聲律其為押合尤為三唐前後所觀而橅之者乎西樵沈陸之良者也其書法工擅一時凡六書四體已極根柢而韻則起收呼吸變化通轉輒能析豪系而定幼眇故與其及門黃大宗者判甫集而聲區之嘗曰韻本嚴也而甫能以博為嚴韻本肆也而甫能以拘為肆旨哉言乎獨豫有未辨者今之為韻不既分佳與麻耶佳無嘉音而唐劉禹錫送蘄州李郎中赴任詩以佳間麻而公乘億賦得秋菊有佳色則佳倡而麻隨之今少陵柴門一章其為佳麻者且五組也是豈佳即同嘉抑唐韻本佳麻通與且唐韻真文與殷分有三韻而今即併殷于文夫不併則已爾併即殷韻當在真而不當在文是何也則以唐人之系殷于真者李山甫賦秋戴叔倫詠江干陸魯望懷潤卿博士諸律皆是也少陵雖無律而于崔氏東山草堂拗體與贈王二十四侍御長律亦且雜斤之與勤則是真文二韻在今與唐韻絶然不同而苐習視之而不之察也至若東韻原與蒸通故翹翹車乘之詩弓朋一押而後乃不然然而東轉為屋蒸轉為職皆入韻也今未知東之與蒸在唐韻能通與否而集中别贊上人詩以職通屋三川觀水漲詩以屋通職其他若南池若客堂若天邉行桃竹杖引其通屋與職不更僕也韻之可疑者甚夥而吾之欲質于是集者不止此數而以吾所疑質甫所是西樵大宗必有起而剖晳之者吾敢以細莛撞洪鍾哉任千之行稿序古者取士先行其文而後乃授之甲乙故李華戰場杜牧阿房久行世也而一旦為主者稱則取之故省試諸體行在解先古云不得時則蓬蔂而行亦以明蓬蔂之猶有行也今則行文專屬之解者苟鄉舉有名莫不挾一卷相問謂之行卷而其落解者則目為藏義而擯不行嗟乎行不行未可知也千之當垂髦時即梓其所著行世世笑之及今而乃得以行稿稱夫千之驚才異姿少小嶄頭角入里孰驚里中兒偶舉于社則社之先生輒不敢即與之較短論長與豫同學于豫兄之門而豫詘之豫至今猶怖心也乃千之甚窮當明亡之際不苟隨世披榛拾橡于山澤者有年轉而學古學避人為詩歌古文又有年即降心從舉子業猶且蕭條寂莫歷風雨霜露明晦燥濕之異杳然謝人世人世亦相與忘之而後一舉而辨紆曲再舉而瞭圜方向使千之行稿不以其己行時示人人必曰是局局不可行者即不然見為可行亦且心隱之曰是當有幾微與行殊者乃以不行之文而不終于不行以不能不行者而不必即見其可行則向之所為不行者安知非即今之所為能行者也寶應王孫晉南遊詩序與王生遇淮市翩翩者王謝家子也既而見王生彈碁擊鞠馳騁射獵幽并兒也又既而與秉燭對榻縱談古今學術靡曼披離搖筆作詩遽能效少陵驚人之句才士也天下有難測如王生者哉顧王生與豫遊好豫詩回健筆效豫而豫亦好其健筆詩兩人者詠歌于淮市淮市見者皆笑之天下之知子者莫如王生而其知王生者豫也然豫卒難知其好射獵而善博擊夫王生非獨王謝家子也王生隨其尊大人宦七閩已而其尊大人死則寄居于故舊之宦甌粵者孤且貧也間遊于軍麾或溷市肆其徘徊慷愾不得已而出入于俠遊子弟之間至今讀其詩又未嘗不惜其數之竒而遇之坎也夫王生之以才士而至所至縱橫漸且與伎戲之流呈能角藝此有故矣人有以難測疑王生者吾請與之讀南遊之詩淮隂馬西樵詩集序詩無分地也而齊秦唐鄭風以國殊遂謂吳音靡夸楚音接捷非也淮南王招八公作流淫之章枚臯生淮不嘗與梁園諸君作麗賦乎西樵主淮隂風雅者幾二十年其詩雅詩也乃間作歌行殊有似乎楚騷者騷亦雅也曽謂雅騷而竟限之以楚乎夫詩分時不分地也其分時何也古以雕為朴譬之器追琢繁重先彛也今以俚為質譬之冕儉純者時也維文亦然先古文多飾謂之爾雅今文多質則嘗為爾雅之釋夫爾雅飾文也釋爾雅者質文也飾既為雅飾易之以質而不為俚乎則尚為古乎吾見人之知言古而不知言雅也西樵雅好古其為人為文為詩無一不古其古也以其朴也然而吾愛其能雅則未嘗不以其雅也所謂古器者雕之朴也若其聲律風格之變化則固有主之者也豫知西樵有年矣今見西樵于枚臯之里淡如也且其家亦貧然且酒湑我而鼓鼓我夫西樵貧士而鼓鍾簠簋不幾朴也而雅焉也乎方今吳楚一家聲氣無間吾將舉西樵之詩以為東南唱而西樵與楚人西之並稱二西何必西哉南朝有宫體徐氏詩也而與北庾為庾徐江南之豔推江總矣然與彼傖道衡齊名江薛此雖靡夸乎顧亦何須不為南也南士七律序少與南士習為詩時天下之為詩者百千家也亦既二十餘年復之為詩者未減于前而前此之為詩家求其卓然可稱名者百不一焉然則後此者之猶前此矣南士弟畜豫者阿其所喜每擕豫詩遊萬里外雖西極雁門南抵儋耳獨身挾持冰蟲不去而豫鮮阿私見南士詩無以異于見諸家詩也然嘗于髙會中稱南士為詩度越前人髙者岑參卑者劉長卿也乃聞者若若各得響應是豈天下之知南士竟無以異于豫之知之也與南士將北遊客有刻南士七律者豫曰四始五際各有攸嬗譬諸四序得候者謝漢魏無四言而五言之盛迄于六季唐無五言古而七言之盛則由宋迄今未有殺也今亦莫甚于七字耳人有觀五字古詩不辨良楛偶見七律即未經卒讀而淄澠驟分如劃刀者蓋振體明靡無取壯駴驅詞昭儷非假孤出就其興情之所至而藴文極貌苟有標格即截去雕繪自非調音如輾稍跲疐而即于泥者雖曰一體實衆體之趨也夫南士詩未易盡也豫嘗出遊南士思豫必尋之走四方當其逆旅靡悶闔户聨句或緣境附物動無留礙或比聲切實相觸爭上豫每度一韻輒為之妬不及迄于今其偶然見傳為世口實者其視七律猶十百也天下之知南士者即多于豫然以豫言而幸垂之後其于後之為詩者苟得稱名安知不又以豫言為響應哉傅生行稿序山隂傅德孚與沈子孚先同以詩文行天下稱江園二子云當二子居江園時好言大節每曰慕義如皇甫規文章如賈誼亦可矣故兩人者皆兢兢好學力行行文去雕飾一時自好之士皆歸之豫嘗題之曰兩龍躍雲津雙珠生浦源豈有誣乎惜乎孚先之死也今德孚見舉矣德孚以年少之才遭逢良時當必立受主知如賈生者苐德孚甫就解歌鹿鳴已即貽書問豫索子為孚先志銘其不忘孚先如此鄉使孚先尚在觀德孚之見舉較德孚之文踊躍歡忭其什倍於豫當何如者豫初與叔夜武孫較孚先德孚社義既與茂倫麗京世臣朗詣木弟較孚先德孚詩今獨較德孚文豫知德孚必有不怡于心者在也於其行文也而序及之西河集卷三十
