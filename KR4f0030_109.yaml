body:
  text: 西河集卷一百九翰林院檢討毛竒齡撰塔志銘洞宗二十九世傳法五雲俍亭挺禪師塔志銘俍公以義士而託于僧然竟受僧法于其死也仲子鄴偕叔子克堅季子魏既已受遺命翦其毛髮指爪衣斂之而瘞之先塋之傍顧此不壞身在僧龕也其法嗣智玹築塔龍居塢藏而飬焉乃續孝子所著逸亭公年譜自四十七嵗為大僧後别著為俍公年譜而丐豫以銘豫思童時從先教諭兄讀公考文所為仁和學異等者功令提學考士例分等六自一以下無出一右者福建許平逺先生名士也破例設異等居公不令與諸生齒鏤其文首城為榜樣將以踵及乃歷十一郡七十餘縣竟無能踵例而止嵗壬午鄉試推官唐階泰薦公卷第一主者抑之中副科豫時與試見公與同年生會湖上志意种逺歸而揖與語間及時事大感激為定交去越五年南浙舉大社合二十餘郡名士會于會城之東園伐鼓摐金極宴饗之盛時名同方社推公主之因與張梯徐緘尋公于市門見公與儈牛伍遮豨衣俯首數笇格子較計錙銖相見不交一言俟其數笇畢然後拱揖道故舊顧竟不與社又十年薑給事歸里與公壬午同年生乃邀豫訪公顯聖則公已居然僧矣又十年豫以一官羇京師而公已死譜所為涅槃者悲夫公名淨挺號俍亭即仁和徐世臣也世臣諱繼恩别字逸亭十嵗能文天啓中魏監亂政惡之作宦者論稍長補諸生擢茂才異等壬午副榜福王時舉明經首公公為文刺馬士英士英怒趣官旗逮公大行陸培爭止之當是時公聲稱藉甚四方士過杭者爭造公巷為之滿先是文社大起婁東張溥漳浦黃道周並屬公領袖公為社名登樓又名攬雲聚臨安名士于其中主東南壇坫凡三十年至是焚書埋筆札鬻羖市盆簝漿酪間或鞣馬牛之皮與鞄者雜作方伯張君就見之不得請以百金為公壽峻拒之惟門徒日來逺近從遊者僦隘巷居諸暨錢孝廉執贄請講易公倚市門口授之去既而嘆曰吾生時吾母夢老僧皤然杖于堂吾昔昔見夢亦如之此豈吾前因哉西湖愚菴受洞宗法公與之遊有契遂落染設三壇淨戒時年四十七初居花塢錢塘令張君建精舍河渚名雲溪嚴侍郎迎公居之禾中資聖寺名剎也嵗歉生徒皆飢公應請之禾躬持鉢乞米飯僧凡三年全活萬衆去之武塘修武塘慈雲寺創建鶴勒菴于北郭説楞嚴其中時設大戒夜夢伽藍神乞戒易衣謝乃以雲門顯聖為洞宗中興祖庭自萬厯乙卯逮今閲五十餘年凡嗣其法者輪居之越中士大夫交章迎公住三年增飯僧田畝特建祖堂供曹溪洞山列代諸祖于其中然後退居雲溪受諸方之請魏君副使舊有淡園供佛養公而錢君學使特搆緑溪園兼市全藏為公翻閲地公應之公以為生平稽古讀聖賢書將以天下為己任而既已不克徒託此優遊以潛消其壘塊不平之氣即與浮湛傭販何異且是亦有道吾將藉是為見道之具而大擴其教而集之成以示吾儒者之有用因內極其奧外極其象舉西來至今意言俱盡者而合三幡四諦而並運之以為摩騰以來特達之業而惜其以蓋代之才而出于是也曩時西湖諸禪剎皆有知識而宗派所垂各具妙衍惟天竺雲峰在隋時為真觀道場顧其後中落源流歇絶雖子儀辨才偶然知名于吳越王時及趙宋元豐慶厯之間而曠席既久且殿宇亦稍燬矣士大夫迎公者道路相望本欲徼公作振興之計而公亦慨然以恢復自任乃入其門無殿獨一毗盧觀音像金鑄長一丈六尺露處其中公乃居雲峰建大殿金輪寶欐次第完具然後樹齋房設僧寮鐘鼓幢幔置諸所應有期年工成時年已七十乃于甲子年九月二十二日説辭世偈更衣越二日端坐而逝嗚呼公遂以僧歸矣公幼著文賦大略載逸亭十集揮麈録十笏齋詩集十笏齋文集其已見于世如危論范蠡論西湖詩西溪賦散見無兼本則間有存者維時以寢疾憂道法不明著易象攄空軒傳略解明羲文周孔之傳黃帝岐伯之旨隂陽死生順逆之微進退盛衰之變其言一本乎太極而託意最逺及遊吳還見浪杖人與酬酢著答問一篇既又注南華淮南鴻烈太玄法言暨京房焦貢易通郭璞地理諸書其見愚菴時著洞宗剩語一篇頌古二百首又作金剛十頌并提金剛經十卷乃更著四書偶言周易雜論春秋尚書毛詩别解三禮異同考經濟指南博物辨唯識刪繁四教儀直指且作家誡修家譜一編而後落染暨落染後居花塢著學佛考訓并周易略解居雲溪著雲溪問易漆園博通參智證傳以舊有智證傳而又參之乃復著洞宗綱要源流頌其居資聖著華嚴頌梵綱戒光楞伽心印維摩饒舌圓覺聫珠楞嚴答問藥師燈熖彌陀舌相金剛隨説金剛别傳金剛拈心經句義法華懸談涅槃末後句共一十二種當是時公已棄文字而四方以文字請者不得絶間亦應之名溪流文字其在乞米渡江時賦詩名涉江草至居雲門顯聖輯洞山價祖廣録著世譜作五雲頌古六卷參訂人天眼目使五家綱宗瞭然言下于是居淡園有園居詩五十首居緑溪園閲全藏三年有閲藏偶録最後居雲峰賦山居詩四十首除夕詩十首天竺續八景詩八首其所在説法已經撰述者有雲溪語録十八卷資聖語録十二卷雲門顯聖語録十二卷分上下二集雲峰語録二卷至若雜著紛然陸續彚載則自雲門返河渚時有全録一百卷公生于萬厯四十三年十月四日卒于康熙二十三年九月二十四日世壽七十法臘二十四所授法弟子智琮等三十人子姓皆有文章世其家詳行狀墓志兹不載公與陸大行嚴侍郎汪孝廉孫處士輩皆同硯為文章各以至行大節顯于時暨死而皆得以邦賢從祀學宫而公以僧故提督學使暨督撫以下各具文迎主入勤公講堂所祀啓禎兩朝忠義祠末而録其行事于通志以表其人乃為銘銘曰誰謂道法孔釋同符惟不得已逃于毗闍當其避地寄情屠酤譬彼元鱓而膠于沙乃忽解脫作金精色不疑魯叟頓入慈室前身兜率所記歷歷何必臨水照影而出且量十笏還參維摩雖或有情如菩薩埵卒證彼岸延之多羅蜂臺鷲頂逌然以居所嫌枯拈比諸乾矢啓不二門屏絶文字十六觀禪悉棄于地安事琅函使馱白馬因徹內外擴拓其教集之大成以合衆妙仁化智化治國有效况本經術行此化導獨憐儒德為人天師文為行表言乃德基奪彼金紫作僧黎衣奚止歸竺道場光輝今此色身寄舍利此與無盡量同滿世界惟其名行早著四海有過此者瞻仰何已傳臨濟正宗三十二世蛤菴圜禪師塔志銘師不知其姓嘗自贊云出身無姓是也母氏張生師而啼一日至佛寺師見佛大喜嚮之笑會崇禎末獻賊破襄陽兩湖皆震師本楚族居荆州江陵江陵避兵者多東下散僦下江而師獨隨母之浙擇居蕭山之湘湖以湘名類楚曰不忘楚云師姿性超絶就童學不屑屑書卷鄰寺名隆興晉隆吉將軍所遺寺也僧明然具戒行師十六請母謁然落染然命習經論師晝習夜坐嘗中夜頮體爇木禮大士數百以為常既而慕三衣登具出參諸方時福嚴為諸方名師詣嚴嚴拈竹箆子示之有省去詣天目參大覺國師于枮木堂大覺者報恩通禪師也時未為國師見師大喜留之枮木堂鉗錘之凡十年備歷苦毒至有死而復蘇者師嘗曰吾能忘十年枯木堂哉當是時報恩欲付師而故有待也既報恩以虛空落地勘師師應聲答報恩復勘之師掩耳去之平陽平陽問幾時離天目師曰和尚道某甲站腳何地平陽曰汝還識平陽門麼師曰平陽若有門即道離天目會報恩赴世祖章皇帝召復携師入京侍萬善殿每于御前問答之際稍稍及師師微言承應輒當聖意時報恩侍者多湖人而師年最少章皇帝以小湖廣呼之暨平陽相繼以𢎞覺國師赴召師隨報恩歸平陽欲留師不得至平陽還山覔師于湘湖之濵呼師入室覿以機出章皇帝所賜金襴袈裟并白拂子手書列代源流于玉軸付師師乃留平陽有年俟平陽示寂後始以楚故鄉還湖湖通城令丁君蕭山人與師舊延師鳯山寺寺鄰寧州寧之龍安山有兜率禪院故黃龍分席也叢月禪師者曾受張商英之請大興其庭而代久而圯居人聞師至踊躍集千人走鳯山迎師遂于康熙癸丑春入院不踰年即伐山冶土率居人薦力者度故址營之前坊後寮而居大雄于其中革魚金板以次整設值西南弄兵者從巴陵來越蒲圻下雋而抗于郢城之南師拂衣東下仍止于蕭之湘湖曰吾湖人此猶吾故土也遂自號湘溪而題所著詩曰湘溪集既而湖中慕師者聞師歸渡江迎師住吳江黎川之羅漢寺一時學徒相從者如歸市然終以不忘兜率伺兵革稍間即往來化導若干年後命嗣嵩菴居之而自携一笠將朝臺癸亥辭羅漢由商毫渡河道京師暫憩翊教和碩安親王聞師名延師住西山隆恩師辭不得遂于甲子三月入隆恩安禪越明年皇上幸潭柘謂潭柘勝地當以知識居其間敕侍臣召師引見于玉泉行在賜飯命賦詩徹所薦含桃食之問得法所由且曰和尚于先皇帝時曾入西苑此時西苑所住者尚有人相認者乎師舉椒園所住容舒純素真牧諸禪德曰皆臣僧法姪行也又曰先皇帝御前李國柱常隨駕內道場者識臣僧今猶在御前上乃問宗旨甚契既而曰如何是道答曰以聖智行聖政者是又曰如何是心答曰乾綱獨斷謂之心上曰佛家以參禪為上乘儒者以明德為上乘是否答曰禪以覺見心猶之儒以明見德上顧左右曰原是一理答曰不惟三教即九流百家亦無二理所謂統江漢以朝宗也上大悅親灑宸翰書禪聨賜之遂傳旨曰和尚可能住此方乎師對曰臣僧以朝五臺來今尚未往也且臣僧母骨藏湘湖曾負之歸楚而尚未封土臣僧了此願乃敢遵旨許之復敕啓奏後朝臺師還山升座作謝恩法語見語録遂于是月辭隆恩入椒園啓奏西行出龍泉關禮五峰作二十偈還京憩萬泉值滿大學士以嗣君侍衛即世詣萬泉請師説法師以腹下辭不得既而病痢遷天龍精舍遣侍覆奏上敕御醫劉元辨疹視親閲療方時十月朔日次日復遣侍臣翟進忠問疾兼有留師化導之旨師手草奏謝上覽嘉悅至草一日再遣侍臣問疾賜參藥櫝食十一月朔師作訣書示左右為歌名咄咄歌示椒園諸法姪次日師問明幾時左右以三對師曰三期至矣至三日晨起沐浴更衣作辭疏謝恩略曰臣僧却染幸值龍興之際爾時已知瞻雲就日作化導計既而隨報恩國師赴世祖章皇帝之召得侍巾盂枉蒙顧問草野區區已願從披瀝久矣今皇上福庇環海行腳之人幸來京國特以九衢蕩蕩挂塔未定濫膺親王之請暫憩隆恩自謂焚盥之餘可藉此仰祝聖躬萬壽兼擬夏首朝臺禮文殊塔然後南還湖中以了未具何意皇上敕召慰諭留此化導還京候覆頓染脾疾纍蒙皇上遣醫疹視兼賜參藥櫝食而歸期頓至扎掙維艱誠恐溘焉朝露有負皇上汪湛之恩為此伏床稽顙惶恐申謝乃作垂問法語與示禪徒語語畢將逝時法姪元熹書記覺紳與嗣法居士顧元登俱在侍曰和尚可無偈耶復蘇索筆手書偈曰屙了喫喫了屙百萬人天嗅不多香臭十分原有價莫教後代有誵訛書畢微笑而逝時已夜分當戌亥之際暨明進遺疏上覽慨然即命侍臣翟進忠弔問奠以茶師遺言勿哭勿封龕舉火入塔説法且曰兜率湘溪吾住處他日掩龕于二所筮之師名本圜字蛤菴别號湘溪道人生于崇禎壬申七月八日示寂于康熙乙丑十一月三日世壽五十四法臘三十八嗣法兜率嵩菴元基大坑師亮元密行端元勤凡三人師逝時俱不在側嵩菴住兜率心動忽俍傖來京師至日值五七舉火若預定者其居士嗣法則州司馬雲間顧君昌洛師住隆恩時曾舉龎居士公案有契知為法器隨鳴鼓上堂説法付之易名元登至是隨寂問末後以何法供養老僧顧應聲答是日隂霾其所答有凍雲吹不盡寒雪欲飛花之句師甚嘉之蓋顧君老參也及遷天龍大司成翁公曾問道于師師重其品行而窺其見地超卓陡舉手所弄如意倣古德分芋事與之曰領取十年宰相去若劉居士元辨則贈偈以勵其志其他剃度弟子元導等約數十人豫以籍蕭山與師舊而黃門任君曾延師住别業故于垂寂時同往一訣乃以豫知師面屬豫志塔如右師三坐道場各有語録其所著詩有湘溪集湘溪别集朝臺十二偈行世諸凡參噭機緣及簡札可紀者詳見語録銘曰師説無生法乃至無有姓無姓亦無法一切惟身量以是受具足遍參諸方賢手覆天目雨腳踏平陽門當日帝王尊曾召舊禪德一時天龍幢並樹萬善陛聖智發威音與師解清淨師出大慧力陳説無盡藏因之兩覺師爭付正法眼紫金袈裟帔盡作心印觀乃以湘山僧逺住兜率地西行禮文殊南還瘞佛母念彼京邑巨投體作瞻覲以企足無所暫應國王請何悟聖主知召師與師語于海淀行幄命説相見偈師亦何因緣得蒙降恩旨當留諸巾錫化導兹方所或入住萬善或闢大慈寺尊為大導師亦復何思議遂發普濟願朝臺復來是以之報聖恩兼祝千萬壽具足妙相成聽爾拂衣者師乃展摩㬋頓欲空諸有不知何所苦詘指滅度日當在月三候作書别親故御覽遺疏慨以為妙禪悅遣侍奠清榠用首諸方供獨是師所生本在楚南郢蕭山有湘湖名與楚郢近出席在兜率兩地設思並我今占所寄莫如兜率便因築崇梵龕建此光明幢疊土斂骨骼鑿空流音聲是則無上德證明于此中此中亦安有藉此證明者傳臨濟正宗三十二世彌壑澧禪師塔志銘今皇帝嗣服之二十年西南再闢四方有道之士咸觀京師于時彌壑大師從開化來應和碩親王額駙尚公之請卓錫城西延壽寺會益都相國馮公修無遮大會請師設戒于長椿寺中京朝官假沐聽法者車駢轂疊豫隨總憲徐公宫詹沈公後參訊焉而恍有遇也既而師疲于應接遊嵩洛去時大梁開府王公留師住汴師固辭不得因于次年甲子赴大梁越一年其嗣法樹南忽携訃來兼傳師遺命曰師已示寂于大梁之相國寺以願遊二室命掩身龕于嵩山玉柱峰南古法王寺後而丐君以銘豫乃釁手展狀嘆曰善乎按狀師諱行澧字彌壑寧海胡氏子也祖鳳陽别駕父國學生生師而慧厭肉食尤不喜飲酒重九宴客父兄令侍席憎師不飲罰誦詩一句師應聲曰重陽九日菊花新座客大驚詢所由來師默不能對此即汾陽昭禪師頌中句也師洵口若夙記者嗣後名閥來請婚師固辭會雪竇僧過其居談禪師聞而樂之時年十七適父母齊逝遂以父母所授産悉歸之兄趨雪竇投石竒雲禪師剃染務力作雲見師文弱甘攻苦恐其或懈示以偈勵之師乃留三年辭往寶華受具足戒時木陳忞禪師居天童師往參忞留方丈聞舉禾黍不陽豔競栽桃李春句忽有省會忞應詔入都師辭往福嚴參費隱容禪師容問何來師曰天童來容伸掌曰我手何似佛手師曰瞞他不得容頓足曰我腳何似驢腳師曰不勞再勘容大笑命師典知藏而容忽遷化乃復參報恩浮石賢公賢問曰床腳下種菜你作麼生會師曰不假春風力賢曰鐘樓上念讚聻即呢字師曰也要大家知賢曰汝可住黃蘗山矣師拂袖便出賢乃命師領西堂事康熙乙巳吳中士大夫敦請賢公住楓橋法華遂以師應請席開法上堂時太傅金公躬詣師言下甚契稱莫逆會賢公以丁未示寂召師還封識衣器候宏覺國師即忞禪師也至啓封授師師仍住法華七年當是時嗣法樹南最有聲遂以法華授樹南别赴景山興福彭城開元之請開化禪院者宋惠元禪師所遺址也在彭城嵗久而圯居人聞師名謀請師會副使戴君總戎張君與師舊乘師住開元詣師聽講因于次年癸丑請師至開化逺近相望如慶雲在天􅑣從影躡不召而至師乃集方衆摶土翳木重樹梵剎佛宫僧舍有若海湧方是時師大開法席直闡宗風江淮嚮化者踵趾相接北方禪習之盛未有若此者也既而曳杖北上至京適城西延壽精舍以隘故延師暫駐為擴大計師重加締搆布金飾象遂改寺額與諸門下士砥礪其中凡二年值修復長椿延師説法一時禪德各趨走如騖然終以煩劇故去之嵩洛時癸亥春月次年復之汴應開府王公副使祖公之請自知時至於仲冬之朔晨起諭剃度弟子隆律等傾鉢金為其先師刻藏塔銘命書記書訣檀那散巾瓶杖錫諸物貽贈故舊乃囑門人隆示隆杲定以初八日巳時長往而令樹南名隆祚者作行狀遂于期至時書辭世偈云朔風凛凛天猶冽四十九年無别訣不將生死決去來萬里長空一片雪復自製封龕云嵩嶽嵬嵬聚曉風棲行隨處自安豐涅槃後有大人相百尺崖頭第一峰又入塔云不入蟭蟟大力王草枯鷹眼漫缺二字應思少室真風在一塔而今柱大梁書訖而逝師生于崇禎丙子四月五日示寂于康熙甲子十一月八日世壽四十九法臘二十七荷法者二十餘年六坐道場嗣法樹南祚毒符學孚尹峻旭菴玉桂輪朗咄菴永夫隱機曇紹杲霖沛沴晦嵓封自嚴律燕林榮共十二人守塔弟子天如澄聞性月二人剃度弟子數十人所著有法華興福開元開化延壽長椿語録并方外英華集行世嵗乙丑建塔嵩山玉柱峰而系以銘銘曰得離朱户而入紺廬造戒煩館服無垢衣乃以慧業證彼空相指水在中陟巘而上由此尊勝出領妙覺山石點頭天龍詘腳因五藴度立萬法宗錫飛海際杯浮土中爰憩二室以歷百劫三花晝風五岫夜雪天柱不折法王可依髙峰突兀千秋在兹西河集卷一百九
