body:
  text: 西河集卷一百六十六翰林院檢討毛奇齡撰七言古詩十二題松下芝萱圖謝庭艷艷産紫芝北堂萱樹生華滋長洲畫師解幽意畫師盧逸長洲人翩翩寫傍青松絲金冠玉韘間朱芾翠羽紫翹橫碧枝一種能釋壯士怨九莖堪作商山思煌扈在庭集衣履繽紛滿座饒文辭要知石上松鱗長便識人間歲月遲暮春二十六日張宏軒刺史宅牡丹初開預作催花小集歡宴竟日同馬廣文朱郡丞周孝亷楊生絃索女較書玉煙陳婉春風吹日上畫牆名花倚檻將生香張家舊種嬗洛下丹州越州難比方蓓蕾初發一相見油壁重重捲嬌面遊子將為贈芍吟主人預啓催花宴雕窗琢石前後通青娥雜坐雙顔紅綺羅試著甫開褽胭粉薄施如未融須臾雨至灑幃幕翠幛雲屏裹來薄小沐愁看鬢攏分新粧恐潄唇脂落髙歌幾疊夜色移當筵爭瀉黃金巵妖絲曼管次第作傾城相顧猶顰眉城頭吹角忽雨霽蠟碗膏毬置花裏赧面羞從泪洗餘醉眠嬌倩人扶起妸娜前後互相映中坐雙鬟典觴政燈前恍鬪晚粧新閣下莫嫌春漏靜名花從此當漸開主人邀客還重來雨餘不忍辭花去更向花前醉一回答和沈東園贈别作兼示王西園我來遊滬城便思梅花源梅花開時不得見行見蜀葵開滿園西園王子為我説維此園東有人傑築塢能留黃浦雲長陂每泛藍田雪良朋髙會如永和花間載酒常經過到門私喜無題鳯落筆還驚好換鵝相思久欲贈瑤草况與君家翰林好録别愁看夏雨寒何期晤對申江曉木義庵前紅藕陂圖來為汝方題詩長帆初挂海潮上握手反嫌相見遲薰風拂拂起前路寄語西園道歸去他日相思倘卜鄰當造梅花最深處紅橋酒散别曹明府東京名士曹叔通讀書磊落稱文雄十年相憶始相見載酒只看花樹紅平泉莊南啓髙閣倚檻曽經度黃鶴石磴空垂四面蘿雕欄新種千年藥當時試宰在睦州青簾髙挂滄江流懷組入官本慷慨角巾歸第何優遊迄今相對理疇昔每向嚴灘泝潮汐况我長為灘上人解纜將行泪沾臆榴花初發開錦筵美人雜坐彈朱絃欲知他日相思處只在紅橋緑樹邊春夜飲趙舍人宅同諸公作春城飛蓋度南陌夜聽歌鐘啓華席世族原推宣孟家滿堂尚坐平原客烹椒和芍斫巨鱗披襟共醉蘭陵春主人意氣拔雲漢是誰雄辨翻河津重門夜久待擊柝手把深杯莫教却醉看當筵月上時便見階前放紅藥青雲辭奉呈益都相公書事皇帝踐祚一十七詔遣求賢重經術廷臣內外交薦揚惟恐搜羅有遺失堂堂公府推益都泰階早建元臣模星辰照地啓遙矚仁夀格天開令符闢門撤牗進巖穴每遇縫衣肯折節一時名士歸杜淹無數髙文過張説嗟豫詘處東海濵十年奔走忘冬春少為吳市吹箎客老作安丘賣餅人何期閭里甫偃仰北府南司遞相奬蒯徹佯推東郭生鍾君誤薦西亭長秋風颯颯九月寒布衣草屫來長安挾書欲上苦局促懷刺未投空往還縵胡短後走落拓時向天街問寥廓掃去知為丞相門望中何處公孫閣先生大度括九有日布𢎞幬被廣畝迎來田竇不下牀却為王符倒屣久鳯咮龍鬛不易攀置身疑在青雲端虛懷只覺渤海淺溫語頓令寒谷暄逡巡瞻拜嘆遲暮折簡重邀酌青酤釜熟能傳鍾傅銘筵前許借蕭何筯方圜濕燥左右排就中鉶鼎加鹽梅佳魚總向天厨出美酒多從賜膳來殷勤厚意轉相屬百福千祥慢教祝銜澤深於灎瀲杯餘光照向參差燭獨憐布被甫覆踝日扯黃綿褁寒者庭前隙地僅馬旋翻為儒生貰髙厦只此闓惠非偶然授餐適館昭前賢杜陵果愜萬間志姬旦豈徒三握傳况當天子念寒士先料徵車給廪秭時徵車到都者廪朝廷喻度支議給米水部分將主父錢金門預受東方米聖君賢相遘一時嗟豫後至猶逢之謂豫瑣瑣倘不信請看今日青雲辭淮隂李貞女詩春城狹巷種烏漆秦氏樓頭閉朝日碧葉垂絲斷未連紅襟小燕飛難匹長淮嬌女年甫笄當窗便詠共薑詩行廬拖帳早相失單帨復襟誰與施淮流活活向東去三十春風等間度若問城南陌上桑但指山前女貞樹瞿山畫松歌和施學士生年不識慈仁松曽觀三鬛圖畫中今來習見轉蹙縮何如尋向雲門峰宣州學士顧我説柏視山人負髙節能于指下作怪形跛虎攣龍互吞囓祗須捉鼻誘其畫墨瀋膠漿雜鵝炙但吟小句緑窗間便寫髙枝碧山下時瞿山以畫松易詩營丘作畫不贈人空畫五葉長等身豈如蘸筆换詩句詠歌倍覺生精神大荒匱格有老幹一幹發作千年春苐恐地窄絹牀短手捫腳蹴非其真學士索畫強自呻我亦竊效東家顰他年築居儻與鄰連豫寫入清溪濵溪傍一松千萬鱗雪中集梅莊主人何使君邸第有贈朔風習習海雁鳴燕關千里同雲生會稽太守本亷吏歸却一錢舊有名蕭條獨上郡國邸將挾新書獻天子隘巷雙輪駐若雲當軒一榻清如水相從對酒并論文門生故吏還紛紛題詩不讓杜老句妙筆欲寫羊生裙珠繩宛轉傍東壁玉琯吹葭動寒色何處相看雪最多禁城西去梅花白題喬侍讀侍直圖天開閶闔鴟首明宫鴉初噪朝煙生侍臣入直每問夜路白便催騎馬行龍旗未辨槍壘色雞樹但覺枝柯清至尊臨御恍日出左右羅列當星熒東華奏啓六曹賾南下立傍雙柱橫終日槖筆但記事有時顧問還呼名丹詔偶頒識機密誰捧黃匣如橋衡我友少擅司馬賦當時曽遇甘羅城比之鸑鷟戴九羽飛集牗下相顧驚嘗寄鸞閣掌書命儼縶牛紖難升騰一朝入試得髙等遽膺著作承明庭對䇿固知郤詵善賜璽獨言李絳能東堂草制白麻淨北向撰册金版精內坊封罌瀉緑水便殿賞帶加紅鞓胸襟開來山月豁面藥傅去盤露傾每因進講入籞宿幾度課藝留延英春風吹吹苑花發宫門輪入隨班迎良工繪圖寫容色觀者有若睹曙星豫忝同事共筆札明將歸去呵蓴羹臨行開卷一展覿令我感激雙泪零丈夫生世貴特達安能縮結同寒蠅不見黃衣斧棖下有人戴縰從左升題松岩撫琴圖長松嵳峩幾千尺斜傍深林倚危石中有髙人抱膝吟雙顔尚駐桃花色當年任俠遊兩河紛紛趙李相經過劍光淬落若流水筆陳橫掃成陂陀東歸萬里謝侯幕散盡千金復垂槖醉向金華驅石羊間從海上看雲鶴我來把臂滬水濵畫圖相對清心神感遇不吟楚妃嘆知音要與鍾期親手揮緑綺卸巾幘何物長康好筆力寫置松嵓片石間相見何人不相識題松鶴圖為一聞師夀髙松百尺臨溪邉上有松子垂千年團團紅日松頂出照來萬里滄江煙翩韆林際舞一鶴逺駕長空度寥廓篩翅長疑白雪消低頭乍恐丹砂落間來自得杳不飛不臨金闕隨瑶池幽嵓松下起長嘯但見緑隂生素衣題燕市酒人圖歌酒人曽向燕市過玉缸銀海長婆娑興來殺賊且摩盾時去看雲還枕戈荆南十載等間度肘後黃金棄不顧但垂絳帳授生徒羞向長門賣詞賦平生曵裾苦未能酒徒散盡仍追陪草堂並道盱眙好與汝行歌歸去來將築歸來草堂于盱𣅿故云留别張中憲錫懌有感曲江先生負文望氣攝江湖有餘量好學長疏左氏書髙才不讓河間相當年厭處金馬門泰山太守由來尊拂衣歸向春申浦種樹營成裴令園我遊海上漫投刺把臂雄談快人事户外千回過客車懷中十載相思字方春初發桃李枝踏青挑菜時相㩦筵前張子碧山榼簾捲夏侯紅妓衣鄴宫髙宴具四美雜坐中間有史妠長調笙笛共筝竾不問清明兼上巳聽殘鶗鴂日漸長葛􅀈未試蒲葵香西陵草暗欲歸去頻把玉杯看夕陽平船將趂暮潮上為唱離歌轉惆悵綺席重開惜過情布帆此去應無恙謝公東墅一望遙何年相憶還相招當前欲别思何似不見垂楊幾萬條甲寅九月草七日同任青嵓張百修訪放葊蛤庵兩和上復過楊雲士齋看菊漫賦青嵓招我訪雲水偕之同看東籬花髙低錯出似攢錦紅白間開如剪紗自憐秋老嘆遲暮每見秋花便相顧佛頭樓子開最先今來不數黃金錢何使君夀天生申甫必有為世人咸望嵩髙山况兼賢哲多瑞應蒼龍紫宿居人間廬江夫子越州守治郡能使一郡安鳥棲獸宿偃平野魚符虎竹通嚴關九日開宴别父老黃童白叟號且攀礲石鐫文臥道左負筥擔囊留轍鐶惟豫投璧遭按劍夫子為我抽泥蟠晏嬰不責越石傲逢人薦引齒頰繁去年長至值初度飢驅吳會曽修翰今來攝提又看指登堂獻酒琥珀殷生人有心能感激鏤膺刻胃豈冥頑若言仁者夀何算請看春日方漫漫過益都相公三世兄躬暨賦贈從來雲閥推世德東京楊鄧西金張况當賢相饒令嗣八龍三虎雙鳯皇就中林立並皎皎能繼難兄佩刀早縣浦從教白璧殊盈箱不羡黃金好但看簡抑似韋布只與詩書共晨暮門生故吏趨滿前食脆乘堅恥相互即豫落拓寓京邸長過髙齋被優齒下士能尋商洛儒殊編搜及開元禮始知家學自有真寒風相對怡心神窗前草木陽和動坐看花開滿地春雲間張公孫伎席作清河主人好趨府傾蓋相逢道胏腑皓氣能傳趙勝名髙門開向春申浦暮春三月桃樹紅單衫試著臨春風樽前鼎食儼炮鳯巷邉車馬如遊龍東西捲幔覆花葉日上窗紗撲蝴蝶名士同披白帢巾美人競薦烏絲屧蘭膏樺燭入夜陳當筵舞作尋橦新畫裙繡帶盤旋處滿地花隂思煞人馮守同四十索贈敬亭初發棗花碧陵陽自煮丹砂紅持之欲獻者誰子宣城髙士馮守同行年四十負意氣嘗與干將較銛利相逢茂苑最有情當塗鬱鬱青雲生入春庭梅未開偶為同城姚士重孝亷作畫梅蒙以畫梅長歌見贈中憶西園看梅事率筆賦答朔風冽冽冰皚皚雪花倒地捲作堆入春一月雪未霽庭前未有梅花開樅陽才子客湘水最愛毛甡畫花卉紙上從教見早梅枝頭故復添新蕾停毫宛轉思美人一枝恍寄江南春誰知相顧起感慨翹首放歌如有神江南千里遘春月閣下梅花正當發獨立方傳韋相詩同遊爭結王生襪君家世胄不可當一門羣從超諸王春風吹度鳴珂里芳草生當朱雀航東觀禹穴渡江沚官閣相羇偶然耳但藉荒厨對步兵時寓其叔氏蕭山署中何須古驛逢梅使春空一望生羽翰君將獻賦遊長安薊門亦有梅如雪願把斯圖雪後看祝來叔荀王夫人夫婦六十偕夀少與叔荀共文酒市樓大道彈陽春今來漸覺毛髮改看君玉杖扶鄊人山莊花發秋正曉最喜閨中得偕老開徑方逢羊仲來齊眉轉覺鴻妻好錦筵雙進金屈巵後來年少推烏衣採薇劚术總間事但見滿庭開紫芝送同年陸義山編修歸當湖春風吹簾草色青蓬池日暖猶寒冰陸郎斑騅想南去開軒為倒雙玉瓶連年同館少適意時向西山望朝氣筆妙爭題海嶽圖史成快補河渠志時補草河渠志完始行當湖新水碧似煙君歸正值荷花鮮慚豫日誦張鷹賦羡汝先登賀監船平帆載去雙黛緑并折靈泉産名玉義山艱於得子二姬各産一男一女百年行樂能幾時萬事于今已差足潞河春漲下溜遲髙飛黃鵠還銜雌玉堂後夜如相憶但記雙添半臂時林官歌喜趙侍衛弟還里趙郎束髮上計車圯橋親受張良書殿頭對策首稱旨特令交戟環周廬林官赫赫近天仗外府佽飛逺相向羊祜方班七萃中劉洪已冠千牛上宫門入佩大橫刀籞宿園邊有賜貂領護早攀丹禁栁思親還渡浙江潮鳴珂舊里宴嘉客堂上朱衣未頭白騶馬仍來踏鞠遊緋袍看作斑斕色連江烽火動甌蠻時見戈船瀨上還莫道書生使東越便教射虎向南山越州太守行為許使君夫子作越州太守賢且明分銅領竹稱專城門排五馬總神駿江浸一錢清復清髙懷皎皎似裂帛手把殘編對賔客印篋虛涵海日紅書床斜映山花碧江東八邑留畫圖過江誰不知夷吾上林久已翔丹鳯大府方應見白烏即今荆楚播撻伐尚有雈苻想竊發但藉顔裴撫凍飢不須嚴助平甌越龍門教授感所私恩同掩骼兼埋胔誰言黃雀銜花日只在雙熊畫軾時過張吳曼草堂兼讀其所著梅花詩集有贈先生好學恥漁獵不向枯毫鬪給捷作賦真能嗣兩京記書何啻亡三篋梅花開落江水濵聮詩宛與花相親我來讀詩憶花好疏影暗香如有神草堂斜啓延海曙云是先生著書處萬軸緗簾幾樹梅慷慨留題不能去客吳門喜遇金副使巡驛感贈春風吹花度湖水畫船撾鼓橫半塘江南副史早行部正當乘傳來吳閶西河遊人武丘客醉後重尋鄭莊驛都尉新從龍里還梁生適在臯橋側當年大雪辭蔡州使君雙斾移文樓𨝍江釣艇不能上隋苑栁絲空自抽春鶯朝啼暮還徙又見開衙白門裏此地相逢非偶然一望煙波泪如雨挽甬上齊士虎營丘兄弟皆負奇兩龍並起無雄雌僧彌既死法護在與之相對長歔欷髙天熒熒日皛皛恍見當年好容貌氣盛時傾稷下談興來每向蘇門嘯讀書萬卷絶簡編決機俄頃如流泉許之管樂已不愧肯與嵇阮相因緣無如遭逢嘆不偶幾度髙齋種楊栁市門挾瑟且哀歌壚下㩦錢快飲酒修文有召不得違著書未就將從誰但惜周嵩尚有母那知伯道竟無兒先生之季與豫善每話難兄泪披靣若過山陽歌此詞落日寒冰倘相見讀何使君夫子渡曹娥江哭父卷子書後南昌亭邉日色黃伯倫臺畔環枯桑哲人乘風歸昊閶上為列宿揚星芒逺溯家世本汜鄊廬江之後來山陽先生早歲秉令望名同第五饒文章當時四友稱荀羊于今遺䇿𨽻太常太丘有嗣誇二方長者早駕天間驤南驅閩嶠東越疆已經奬異稱循良將迎鳩杖銜霞觴忽然日蝕東壁傍越人聞之心感傷有如秦相五羖亡童子出涕舂不相方行四制挽轡韁山公起復義不妨使君哭之心轉瘍試看東渡曹盱江長歌一字一斷腸從來虞殯能導喪哀吟不復調宫商我今欲和徒倣徨歌聲欲絶哀未忘烏歌為雙夀作金烏熠熠顧驕東公丹棗西王桃當筵進獻祝鮐背不用鼓琴歌緑腰蟠根仙李舊閥閲曽擅文章跨東浙為訪林泉憶素遊因思髙蹈追前轍閨中偕老同古稀賔朋扶杖相㩦持庭前兒竹當風長階下孫枝帶雨肥雙飛黃鵠舞秋節正值重陽酒盈榼欲識朱顔對靣紅且把黃花滿頭插雙夀詩君不見扶桑日出海月明東西相望相隨行中山有烏自銜羽每偕顧幽嵓生𢎞農丈人秉髙蹈籊籊魚竿有同釣龍里由來重朗陵鹿車自昔推桓少東湖花發水滿堤湖邉日日生光輝種將緑竹能棲鳯採得清荷好製衣只今初度共皇覽錦帨還同繡弧展書借簾鬚裊篆雲花從酒靣生螺碗清秋良日佳氣新門前流水如車輪笑他瑶島偷桃客即是金門索米人為沈表兄題夫婦行樂圖吳興丈人年古稀齊眉尚有衣巾綦東公西母共行樂一時爭看雙鸞棲丈人胸懷坦如矢上友黃農作知已初住東江花港中移在西湖藕塘裏沿湖十里種夏蓮紅蓮倒影清波間閨中畫入非無意好比湖波作鏡看李太夫人大夀昔者魯國上母夀宋宗坐賜朝堂中武昌太君就饗列丞相下拜王茂宏惟我夫子職副相暫管稼計留司農高堂白髮久迎養誥進五色祿萬鍾圜冬大臘獻花餤錦帨當筵覆琬琰蝶勝先春集絳幡獸罏著地圍紅毯登堂齊捧金屈巵門生故吏盈前墀添籌不用蕭何箸舞綵還披羊續衣獨憐庭下秀玉樹年少曽經入鼇署繞膝時從東觀還懷鄉正值江南去江南萬里風物清王師况復收昆明西來紫貝雙函發南望彤雲百疊生春陽將至日皎皎綵蔮銜翹拂青鳥但看天邉下玉書便起階前拾瑤草西河集卷一百六十六
