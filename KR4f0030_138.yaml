body:
  text: 西河集卷一百三十八翰林院檢討毛竒齡撰七言絶句一發采石天門相望楚江秋采石磯邉舊酒樓醉裏乗潮牽纜上不疑江水向東流小孤關下作小孤江畔海門關日暮孤舟自去還神女廟前雲乍歛秋花開滿宿松山伊州排遍清商新曲唱伊州才唱伊州泪欲流拂雲堆上看青雁回樂峰前跨紫騮水鼔子燕尾蝥弧鵲尾旗從征三十羽林兒秋來莫過胭脂嶺怕見閨中顦顇時逢黄大飲二十年前江夏黄相逢各訝鬂毛蒼閶門菰菜蘇州酒錯指夫椒是故鄉予與張四兄弟作雁序游久矣今來石陽遇令叔三先生于施公湖西署中値其初度湘潭王生索共題巻軸以賀倉卒書獻情見辭語清河先輩杖鄉年十月寒花照酒筵恰是西江秋泛後石陽城下米州船二少年曾與阿咸游苦憶黃公舊酒樓不道步兵裁六十它鄉還得醉扶鳩三先生近倚謝宣城未返山隂道上行六十年来最可念石陽重遇舊毛生四小春初見拒霜開同醉湖西幕府來願借使君亭下水爲君重洗百年桮送劉博白之任蒼梧萬里碧天廻君到天門瘴自開不識舊時賢使在雙山曾採綠珠來二新懸黄綬向南天獨上交州萬里船我欲從君游覽去綠珠井上燕山前種蓮號子青螺江頭種木蓮紅蓮種在白蓮邉大姑愛紅儂愛白相看總是一般憐晩泝章江上峽江口章江西上峽江開嶻􅑖山城峽口廻兩岸青林懸落日不知身自剡中來觀洧有感洧水來觀已暮春高梁千尺覆通津楊花陣陣飛如雪誰是當年贈芍人一公自雲門來過春雲熠熠海東生擬泛浮杯渡海行偶向五雲門下過便敎雲氣滿江城戴金索書詩巻留别書後毛子將行别戴逵留書新句慰相思空庭一片清宵月照見秋蛇綰草時江上吹笳曲楊桞青青覆淺沙西陵江上暮吹笳前旌已渡猫兒口後部還尋師子花妓墳葛洪井畔麗人家隔歲山前塟女娃幾寸綠羅衣上土春來開作野藜花章江舟夜題趙文敏文姬歸漢圖數尺吳綾凍女裁王孫幽意使人哀朔風吹角章江靜恍見文姬塞上廻蕭伯升邀甡春浮園度臘不果將赴蕭江覆寄見懷欲赴蕭江偪歲除燈前重寫别君書久行不道離家苦説到東歸泪滿裾二秋風相約泛仙槎許過西昌蕭綘家寒雨一帆頻夢見春浮園上雀梅花三東行歲暮役車休囘望西昌愁復愁此去思君還不遠蕭江仍在贑江流和燈夕詩有序友與當壚者會燈夕已當壚者他從遠矣次年是夕重貽詩和韵者友人之請矣或曰丘隨事碧雞坊裏聽吹簫紫嶠紅泉隔路遙萬樹銀花一輪月依然今夕是元宵黄家亭子黄家亭子傍東溪碧樹紅欄面面低曾繫幔舟亭子外藕花初落水禽啼二八月凉風起畵橈滿塘楊桞拂秋潮春還欲别王孫去思煞亭前紅板橋三西樵山人隔巷居黄園東去種栟櫚聽山堂好吾曾到竟日開簾讀素書馬西樵聽山堂在黄園左四翩翩江夏舊黄童只向東隣事馬融冰雪獨留綘帳下山茶開盡滿園紅此首贈黄二公子翰也題鳬亭爲樂六舞也茭花四月滿前汀對水柴門晝自扄幾曲湖光烟棹裏何人不識是鳬亭二鳬亭髙榻枕清虚亭下還留子敬廬鳴鶴在隂應有和只愁驚起石潭魚亭下曇廬爲令嗣功昭詠室送周翁赴令子和州官署是時十月値八十初度先生八十老林丘擬作淮南八子游蘋葉蓼花牽錦纜西風八月上和州二横江官閣蓼花生畵舫紅簾相送迎正値小春初度近彩衣應舞厯陽城秋夕懷友黄榆落盡薊門秋都尉臨關換罽裘只有嚴寒蘇屬國還持旌節海西頭題朝陽松鶴幛子瞥見浮丘仙驥才松枝掠羽雪霜開錦屛七尺朝陽影時有銜珠破壁來二衣裁白雪頂裁丹萬里長風動羽翰浮浮日影連滄海片片松花落紫壇興慶宫詞一作開元宫詞興慶西宫夜未央梨園新笛奏漁陽誰將凝碧池頭月吹出并州塞上霜漁山平賊凱歌四首江東千里巨藩開叠鼓鳴葭振外臺白日羽書三奏捷漁山小宼夜平來二節使行軍出鑑湖銅魚符間木魚符虎爪山頭馳牧馬雞心嶺下射飛狐三單車刺史舊行邊山郡飢來宼盜連䧏幡齊出蘭隂砦解劍爭歸瀨上田四襜帷昨嵗賜明光凱樂今朝奏上方誰道雈苻多竹箭悠悠旌斾返東揚寄京兆杜二游雲間二首西安杜預武昌侯曾向山隂鏡裏游長日榴花歸去晩尋君只在澱湖頭二青龍戰艦白龍沙玉鱠金虀醉晩霞却憶若耶春泛後淥波長映杜陵花送客入蜀西到成都未有期春江淼淼接天涯須知莊蹻三巴路不在秦王萬嵗池送髙公之任惠州嵩螺山下古龍川瘴裏花飛繞翠田前去陸郎須記得尉陀今是漢家年舟中聽祁兵憲歌兒桃花新水木蘭舟一曲春波水自流夾岸垂楊牽不住東風吹過白蘋洲二停船捲幔立雙娥按拍重爲宛轉歌只聽簫聲翻淥水那知山色似青螺元夕樟湖渡看迎燈口吟樟湖古渡暮登䑓火嶠星槎看渡來千條紫電江心轉萬叠紅龍水上廻古意五原烽火夜猶驚莫道王威不在兵但使將軍屯細桞何須年少請長纓凉州詞漢家天子射熊歸晝祀神宫夜有輝金馬門前留執㦸銅駝觀裏侍充衣二凉州一闋朔風髙彈成金屑紫檀槽出塞馬銜青苜蓿入關人載碧葡萄何紫翔女弟子鎦姬彈琴裁拂朱絃花又開洞庭秋思聽悲哀從敎認得鎦姬在猶道湘靈鼓瑟來二青鴉髻子綘羅裙紅燭燒殘夜未分忽聽一彈盧女曲階前紅藥墜紛紛黄開平四十初度文園丈人南澗邉千頭橘柚萬頭蓮秪緣誤食中山酒醉臥湘湖四十年二軒轅厯日記來無但見蘋花滿上湖不使山公爲郡簿頓令四十老菰蘆北新號子北新關前銀杏黄小船風起大船凉只愁日日秋風順吹殺樓頭新嫁娘二髙官大估坐樓船小艇嬌娘最可憐關前採菱關後賣也須出與鈔關錢同江右王猷定禾中朱彞尊越城汎舟赴姜國昌廷梧暨承烈啟埈三令姪南華山莊讌集即事輕舟共泛越江春句踐城邉採綠蘋右軍已作山隂客買臣本是會稽人二十里春城桞未黄青絲笮子拽波長城南載酒還城北尋煞祠前王四娘三春城日煖櫂歌廻乗興姜肱載酒來隔岸桃家舊亭子東風絃管使人哀四南華山館比逍遥句踐城南泛畵橈張説題名渾舊事闌前春水漲紅潮桐城孫中龍中鳯游越歸里荀氏如龍馬氏騋憐君兄弟本髙才抱郎山下時相見盡道機雲赴洛來二樅陽兄弟舊知名零雨還來賦子荆日暮江潮如乳白㸔君歸去呂䝉城吳門宋孝亷實頴游越將歸枉過相逢朔雪下江城歸去姑蘇草正生八百湖槡無限路君來何處不知名二舊㑹蘭亭未有期西陵潮上繫人思如何君返支硎日又是予尋阮裕時時予將東行題老遲畵幛圖畵新鮮見老遲琱弓玉鏃小蛾眉嚴粧不辨宫中様那道昭陽射粉兒桃花村馬湖西頭桃花村當湖一曲有桃根春三二月人不見桃花開時雙閉門二春桃花開馬湖裏三年桃花四年李女兒嫁時看種桃幾度桃花落湖水口號堪笑凌雲作賦才還從梁苑伴鄒枚成都司馬今歸去將到臨卭賣酒來二賦爲違時多散落家于避地益卑微春寒日暮淮徐路青草蒼茫何處歸長門怨玉殿金釭晩色新殿前少使繡麒麟夜來恐索長門錦要賜平陽歌舞人揚州看查孝亷所攜女伎七首内部新歌敎欲成幾年湖上聽分明醉來忘却揚州路猶道西陵風雨聲二新翻樂府最風流簇拍新歌拂舞鳩當日紫雲來錦席今朝杜牧醉揚州三金釵十二正相當剛寫蛾眉十二雙着就舞衣臨按鼓一時填滿碧油幢四氍毺布地燭屏開紫䄂三絃兩善才旦色末泥善彈二十四橋明月夜爭看歌舞竹西來五新歌敎就費千金歌罷重敎舞綠林年小不禁提趕棒花裙欲卸幾沉吟六青矑細齒綘羅單作伎千般任汝看獨有柔些頻顧影猜人不欲近闌干旦色名柔些七是處瓊花開滿枝瓊臺歌舞正相宜就中别有夭桃嫩開向東風遲復遲小旦色名遲些西河集巻一百三十八
