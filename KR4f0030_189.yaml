body:
  text: 西河集巻一百八十九翰林院檢討毛竒齡撰五言格詩五重汎宫亭湖效劉楨體奉貽周副使三首汎汎宫亭湖沿洄出彭蠡山川互盤紆雲霞散成綺念君蓬瀛姿滄波浩無紀豈無鴻濛期流濫自茲始二蒼鶂翔湖濵不與湖雁羣徘徊下洲渚藻荇相繽紛方其睇滄流豈不念青雲摩天厲秋節唼􅊱非所聞三熒熒陵上苕灌灌丘中樹苕花豈無姿纍纍且縈佇陵苕亦有姿樛木亦有枝願言保層柯眷此纎蔓施周括州南昌寓亭贈瞿生括蒼賢太守有友名瞿硎相將泛海嶠掇食瑤華英春風拂行斿秋水揚歸舲朅來度五嶺遘我南昌城太守指之言是將饗豐齡百歲方半逮一采榖石成方還平原里高眺雲間星與之佇匡廬延此天半青於臨川江上灘作杪秋廻迅商戚戚泝江湍江水激如筈挽舟上重灘深淺清見底宛然還新安粼粼水中石可以滌尠歡修林蔽圻岸雰霧相鬱盤雰解霧亦歛傾景浮清瀾短候苦修涉佳盼良亦難況兼凜飈落隂蟬徹鳴寒瘁葉愛華蒨枯流恧潺湲疇謂南中榮我獨懷癉殘寓物未更素中志隨節闌誰當假寒葭目以蕙與蘭詠史良夜不能寐起視星辰稀四顧何蕭條孤雁當南飛寒輝耀層林團露野草腓俯首思古人兩志胡相違柳惠事汙君三黜為世譏周武稱聖明西林採其薇二四海既混一六國咸歸秦不虞漢代儒猶自著美新草澤甫竊發郡國先埃塵三川既淪亡軹道寃不伸人生有義分各自為主臣季布哭項羽王蠋悲齊湣烏鵲自有侣毛髮亦有倫不觀山谷間尙有秦遺民施湖西白鷺洲講席贈蕭孟昉清霜肅羣木麗景廻芳洲開軒抽衆奥講藝延八丘揚鑣輯遐土抗旌逐良游先哲乆云逝紹聖良獨憂湖西早毓徳尙席來躬修賢智效麕發激爽同川流璠璵既奠陳笙磬將考求徒然昭俎實誰與羅饌羞彼美起伃負秩秩揚牲卣執經數千人驩讌咸孔周澄波挹源㑹叩鐸袪紛紏晨暮獲芳訊擬議開爰諏遂令鷺渚側絶勝鹿洞幽西江有謐學孑孑無前儔宣城嗣徽躅大義盜討蒐吾鄉連舜水溯泳靡自繇遷延奉筵几臬兀若贅􅂒緬彼素心士方合兼志侔發憤獨勷受豈不成千秋鴻筵罕時覿嘉㑹難再酧投分託謠詠聊以播令猶酬别徐二十二嗣定原韻熙飈廻寒原零雨載修塗西游阻長薄逝將復改徂振䇿厲隰草抽纓結江蒲山川浩茫茫念子情鬱紆迢遙故鄉陌各以貧賤驅殊方幸連軌登陟延須臾如何又越服惻惻臨路隅程生惄征縣孫子嘆遷衢行雖異豕鹿往與涕泗俱嗟君千尋姿譽我徑寸株垂天茂文羽謬許同鵷鶵何當把腹毳附汝南溟圖層柯䕃崇岡覆此下土荼平年伯壽詩泰山何盤盤海水何湯湯鳯凰棲梧桐鸑鷟鳴山岡伊予汝南叟起家承韓疆名閥共韋許奕葉垂憲章中朝歴南渡萃族移東揚翁本廊廟才委擇任紀綱􅌢名邁孫劭辟事同范滂在庭嗣賢哲入室成琳瑯陸暐見雙璧陳氏推二方迄今視鳩玉眺望龍山陽徘徊共賔朋羅列紛酒漿祈年重古稀鄉老尊三光況公攬徳輝貽此世澤芳蓬萊接良㑹水淺三為桑何如捧流霞一顧海水長將雛篇為陳庻常母太君壽秦稽接天姥逺在東南隅君子善養親顏色方令愉每云母聖善少小曾茹荼負土越三世持户無一夫辛壬鮮良日在襁恒呱呱㸐脂課完讀母口真卒瘏幸當項領成驅騁追皇途如何對揚切翻令温凊疎今値設帨日逺道承歡娛遙持一觴獻重以萬感俱東山有棲禽其名曰孝烏嗷嗷反哺乳將使尾畢逋一朝翔青雲借宿上苑株縱或報育逺敢謂羽翼孤不聞丹山凰五采備徳符產子游四海所羡能棲梧滄波正清淺山谷仍鬱紆他時返丹林百歲猶將雛奉贈徐春坊先軰兼祝初度一十五韻海嶽不易生鸞龍與杞梓況秉參鉉姿出入世所倚維昔仰蓬觀格澤曜衆美陟驚瓊玉暉君家好兄弟孰悟金馬廬偃蹇作後起豈有白髮翁而辱青雲友乃䝉鎔造舒謙順及庶士軒宇開上靈泰道方下濟投贈饒案玉斟酌逮酒醴高義薄矞雲崇情式波靡餘思發文藻掞天一何綺自昔抱圭璧瞻彼誦有斐矧當皇路清周道正如砥君子重所生願言毖攸始載詠崧高篇清風拂蘭芷送吳道賢南還大雅乆不作下里笑折楊秋秋雙鳯同變作釜與􅀈夫子懷儻哲特逹如珪璋氣雄闢雲海胷豁羅星房幽情本詰曲露技鮮葢藏有時起吟嘯觸節成文章劈流試劍影徹札洞箭鋩獨是鐘律減學者眯羽商聽聲略沙識造管用黍量豈協朱孔絃徒厠黄門倡君來唱樂府古調追虞唐情文接師䕫譜數註令羊拍散有刌度契注生豪芒鄭𤣥迷七均荀朂罷四廂何況元音乖但截中指僵念君季英裔生在周侯鄉高門乆擴大駿烈時誦揚四世嬗清徳五畝餘甘棠賜書簡增汗予杖衣裹瘡諸子列上舍羣從饒中郎四游及京圻一顧誇驌驦公卿争逢迎流俗罕頡頏其如薑桂性所至愁羶薌以茲幡然去有似鶴羽翔當其乘風行引吭鳴高岡倐然返遙海仍伏芝田傍長途絶篝笯濩澤無稻梁緬此凌霄姿一望猶倘佯何使君歸第詩霜鞠被平野秋蘭蔽江臯吾師本金閨攬轡渡浙橋文章布遙海意氣凌青霄五馬蒼梧行撫此僰與苗相如乆馳檄馬援增銅標角巾返東第卧轍環西郊何當散珠光白日還海潮題水閣觀蓮圖為查又微作敞閣臨廣陂倚柱薰風生襟同碧梧爽氣與流水清傍江有荷花呼童鼓兩槳採之欲貽誰獨立結遐想紀恩詩有序康熙二十八年二月皇上以觀河南巡臣竒齡初迎之嘉興城北既而軫念河患躬禱禹陵十三日渡江夜雪著曙滿江口趨走不及徬徨跪道左侍衞馳詢銜名去既則皇上勒御馬遣侍衛馳至跪所傳皇上問毛竒齡你病已好否對未好侍衛回奏皇上顧之去暨十五日還渡竒齡復送之望京門外皇上望見復勒御馬囘向親問毛竒齡你病已大好否對尙未好又問是如何病對是雙足風痺不能站立之症又問如何不調理對調理不能好及又問則天語過高艱于卑聽侍衛呼答應乃對曰小臣毫末何足當皇上垂問聖恩浩大小臣何敢當臣叩首謝恩遂首地三至訖然後控御馬復顧之去竊思臣濫叨主知侍從七載曾無杪忽有所補裨即請急以來又及三稔日為二豎所苦報稱無地深用抑損雖心懸魏闕而駑戀未遂何幸聖恩惓惓垂眷再三即大臣親切未易叨此異數么小病廢何以得此犬馬齒雖衰欲不鞭䇿僵足捐糜殘踵不得矣因為紀恩詩一章以誌感激匪敢誦揚聖徳亦以攄小臣幸遇之私云爾生平苦椎㥶輯足東山阿何期天門開垂老應制科天子親試者名制科丞相上墨業擇菜分侯莎至尊秉皓鑑指事斥女媧時鍊石上親閲予巻獨指摘語有御批票遂爾官親近日侍丹㰚欏槖筆紀鴻要作史愼細苛逡巡七載還日影甎邊過中間荷帝眷曾賜雕錦䋪瀛臺饗親臣座末猶張羅于時最堪念三省校士多即就部宴時宣予殿東坡閣臣相迎言所進書蚪蝌親攜至海淀歴歴經聖睋天語道才士褒詞勝温鍋時滿中堂傳予至閣門宣學上㫖謂所著通韻好有才小臣感腸肉老淚如逝波不幸五父殯告歸筮陂陀翕倐遘風厲三歲成巨疴迄今踞里門有鬼在膝䯊徒然仰天闕何由侍鸞和聖人省方俗南下將觀河愁聞沂沐濫厭聽宣房歌歛圭向苗山埋璧祀窆窩禹陵有窆石相傳藏衣冠處迎鑾樟亭東始得攀御騧皇恩尙垂恤駐蹕宣玉瑳平沙㙲寒雪驟覺光風和天顏咫尺間軫是何病魔拜手復稽首小臣患跛跎伊昔授筆札日夕傍玉珂東㕔抱襆被蟠戀如蜒蝸相隔僅三稔棄置同敗蓑巍巍萬乘尊猶認道上㹻土芥等手足温言重挪挱分卑尙如此情深可奈何所喜聖人出甘露垂青稞大禹所巡地夜半來神鱓況復麒麟生正在舜水渦則是一遊豫四靈紛㜑娑豈有扶輿升不即蘇廢瘸東南感皇澤擊壤遍稚妸何為卧蓬門啟口時呿呿集南湖即事揚舲出乍浦高㑹南湖濵春流漲前溪朝日吐逺津結歡共遐邇慕類忘新陳臨江接輕航大道馳廣輪平居既修逖積歲多風塵何期愬難遘兼得叙所親高筵倚長薄妙伎聨芳茵但憎酒車緩勿愁日馭湮遲之見没月將欲留經旬離懷未全抒良遇當再伸嘗恐歲時邁對客為懽忻況兼道路難避人多苦辛清明斷霜雪裹㡌如綸巾早行尙䝉頭雙髩已若銀秋日集城東何氏山庄積雨散伏熱新晴動秋陽涼風接單衣亭午到草堂疏沼澹雲影層樓翳山光分黄野禾熟帶綠江橘香蓮枯露錦鴨桑落餐綿羊魚笆截長陂蟲繭絡敗牆佳客授素簡主人持清觴談議得快節投擲當樂方良時有代遞高㑹非尋常況丁物變衰野行多悲傷人生苦離索逝者如滄浪好樂曾幾何蟋蟀又在牀泛舟泛舟來南湖日没夜氣侵北山有明月南山尙隂隂微風盪湖波躍躍如散金我欲看明月月在山樹隙上山看移時滿袖畵山葉虛聞水聲動獨坐心自恐下山問前舟露滿舟上頭送姜黄門赴都紫微曜層清列宿明天階興雲鬱文昌閶闔一以開君子秉亮節振藻揚九垓託身蒞華要握筆相徘徊藻合識魚在梧菶知鳯喈乍轉青𤨏闥復入銅龍隈暫言隔通軌遂得聨清裁敷文播朝列將以躋上台璠璵炤日月亮能積中懷明堂貯鴻寳秘此鼎與鼒祗念幽壑侣徒抱中林材出處既已異去就臨當乖結轡淩滄洲安能與之偕行將攀修衢與之詠康哉答張生見詒文鳥負翠羽揚輝集高丘東飛覔琅玕暫向洲渚遊清河有佳士意氣凌朋儔英年發鴻譽典籍披已優作賦類平子方略追千秋聞聲願瞻依常恐道阻修一朝整崇駕縱轡臨荒陬相從挹言議宛與江海流明姿映寒日高興乘清秋禪闗誦曇摩長嘯居上頭顧予贈佳什逺勝英玉投結軆近南雅敷文並商謳大道乆不作盛誼今難求殷勤諷來章聊以當泳游雙壽詩為徐克家兩尊人也高天敷崇文厚載揚丕熙膚華孰為材淑徳不可儀君子啓壽域逹人為邦基流徽及中閨壽母與令妻我欲溯自始因之風來茲南州本名胄北海垂華綏前喬鬱根株歴植蕃溉滋加以兩無慙克大卿長軌毗厥四有徳畢潤鍾郝姿偶當元㑹開周此星辰馳兩紀競緯絡二離爭融輝何用紱麟角孔庭饒青絲何用組鳯毛謝氏多彩􅬾東公授文章西母貽瑤琪南箕輸酒肴北斗吹塤篪三君羅門廡八龍侍堦墀平生稱俊及登堂拜賢懿亦有顧㕑彥醬酳工走趨我來扶玉杖玉杖修難持更為捧珠髲珠髲煩寳璣但進難老觴誦此無疆詩蠡城公讌詩有序姜侍御東游蠡城同人公讌于張春坊故宅酒半侍御出所擕伎童三人登塲㸑演皆殊姿妙藝相遞為旦色歌扇招風舞裙曵地坐客皆心醉如是三日徐二十二朱三各起為倡韻屬予和詩清風起長林高樹環深堂君子懷素心佳晤合兩鄉前屏列丹青下坐陪綺黄進此芳筵珍間以華燭光名優越數隊别部皆成行急管凌繁絃嘈襍踰衆常中酒出三姣繡帕朱裲襠千盤舞皆廻四目瞪若僵倚徙玉抛撇盼睇珠熒煌頰鮮勝鄭桃喉轉過謝楊鷄嘂換罏炭鴨睡添衣香侍御雖見慣亦復神思揚一日舘易設再日筵改張三日衆心醉瞀瞀都猖狂古稱殊絶伎間代始一章歌有緜子駒舞乃公孫娘今茲盛繁㑹曭㬒羅百昌良辰遘神觀過此安可忘兔園集時彥驄馬逢秋霜願言保修期歡樂應未央恭祝張母王太夫人壽詩海上鳯九羽庭前樹三珠方泉與圜流所蓄應有殊我友踵名胄伯仲同衾居微文成圭璋細行皆楷模在堂有老母本是烏衣姝其弟正義公夫人弟三元趾于甲申之變自沈柳橋謚正義先生湛身從靈胥䫲頷辭秭歸博謇慰女嬃季子逺從王季子張楞揭竿從王蹈海死荷戈走荒塗未聞行絶袂但見望倚閭只今孔巢子謂木弟南士也猶結匡山廬持畚偕隱淪負米為歡娛南弧星當明北陸景未徂歲寒辨松高風勁知草枯從來祝千春但得誦九如惟有母徳宏俯仰思踟蹰初入史館作昭代重文治翹車遞相因聖教開中天皎若星日陳詔令下郡國薦逹如崔駰䇿對賜著作不止能親民所念勝國史是非方未伸館錄既漸缺册府亦已湮因命合繩纂衆腋同補紉載事在集意辨誤需求眞記疎陋歐宋識弇誚向歆嘗恐大政略要使陳編新誰謂石室藏便若海谷珍代易少忌諱辭一均見聞野稗過苛激翻足傷人倫靖難詬聖祖易嗣憎忠臣幾有祕閣裁下與穢史鄰生平負末學往欲追龍門何幸紹前修濫把拙匠斤内府給筆札下使供柴薪當此委藉重敢不刪述勤從來尙記善所傚惟獲麟如何紊褒譏遺論徒千春蔡子伯庭前藝蘭忽一莖兩花過之有作三陽扇融和百草盡疏布庭前有幽蘭輝輝總銜露一苞發雙莖比莖坼兩跗翹然孤高姿團欒自相附初生本空谷不與凡草伍芳㽔托櫩楹雅意重囘互春風發新榮階草展故素顧茲埤麗情相期詠修姱二猗猗庭前蘭日出汎景光沙石蒔有時湯茗沃已長誰言擁孤標所見非同方至徳必有隣草野應共藏古稱君子佩不以幽不芳樹蕙既百畮搴蘺亦三湘相將得儔侣勿道殊衆常不見蘭澤間新花滿東堂答吳生方泉藴良玉圜流産明珠藏弆既已深表見良獨殊跂予薄蘭渚睠念菰城隅五湖􅕉龍盤八彩看鳯雛文囿挺珪璧徳器揚璠璵于焉景遐標所在饒令譽違時變涼燠溷俗忘哀愉懷哉進退艱徂矣歲月除碧葉被叢薄彤雲轉林閭庭昏接新隂春豔還舊居高調不可和佳步難為趨何當挹流波再鱠雙鯉魚西河集巻一百八十九
