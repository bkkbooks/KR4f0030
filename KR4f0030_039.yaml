body:
  text: 西河集卷三十九翰林院檢討毛奇齡撰序十六新刻聖訓演説序古酇長遂師各舉其方之戒令以時宣里門漢唐多尚名法猶有以講讀教授為治理者暨叔世而浸衰矣我皇上躬親教化首重訓迪謂大猷之世必先事化導而後可以維至治於不替因於康熙九年特頒上諭一十六條相率董勸而兩浙中丞陳公即又作為演説一書總講分講使顓萌愚稚皆可通曉已奉旨頒行撫司及府州縣衛所官吏凡月吉嵗正各集耆老於城鄉公所依式講授者約二十年會總制興公開府張公學院鄭公再三申飭且附諸律令以倣古讀法之制鄉禁國書相為表裏第司其事者祗責其成於長吏兼殿最勤寙而司鐸者不與焉餘杭訓導王君獨慨然興曰此亦學校事也夫孝弟禮讓皆本明倫而崇正學以端士習則條教之中儼然載之間嘗追隨講肆目擊諸父老攜持負戴側耳傾聽若惟恐語言之有盡而誥誡之難遍及者因損俸鏤版流布廣逺使煌煌帝訓昭如日星甚盛典也昔者文翁興學僅傳經義而蘇湖之教則又以治事立業為實學有用然且千古相傳遜為莫及有如是之上承聖謨下廣憲法毋論載籍所嬗可蓋經學而即此一講授間長幼造聽咨嗟感激凡夫有動於心而不能言欲發於口而不能記憶即欲歸而互相傳道使父告其子兄告其弟以之展轉於比酇閭族之間而不能達者而一旦開卷而瞭然此不可謂非當今宣教之一助也西江唱和詩序自國風有豫汝唱和之詞而春秋晉鄭大夫往往于所會之地彼賦此答此即履道聨吟松陵互和之所自昉也信安馮使君有事洪都偕吳子志上徐子紫凝髙會于章江之濵遂邀之同舟而歸于信安因之有西江唱和之作夫使君才士其為詩下掩王維上追庾信而一行作吏中道捐棄豫嘗謂使君裁弱冠為文為吏皆得以拔擢流俗超然直上浸假趂其時年專事一志其所到亦寧有量而使君仍兼為之而兼臻其妙才士之叵測如是若夫紫凝志上虎視臨安豫每僦其地而與之觴詠其風流雋上固無論已向在京時嘗追陪益都師相髙會諸竺壇經厰互相唱和以當休沐及從大雪遊善果歸酒鎗燭樹合毯于東堂之右間使一人唱韻一人把筆每一韻落則筆隨韻絶唱者未既而和者已就今豫集格詩猶存其題可驗也乃歸田有年兀坐􅀈􅀈不成一字而使君為吏猶能與二三友朋踵太傅髙致刻燭擊鉢以嬗其休風于勿替則夫讀其詩而寧無感乎田子相詩賦合集序向從胡氏東嵓王氏文叔見子相於吳山之岑爾時子相未弱冠也然往往為五七字詩登臨詠吟一時見者多稱之豫嘗題其篇而思其為人暨豫以應詔入都而子相方隨其尊人宦遊江南者數年迄於今豫請急里門又三稔矣錢唐馮屺章兄弟亟稱子相詩文為胥山之冠夫欲知其人者視其友向時文叔東嵓為豫良友而近居錢唐方與屺章兄弟為忘年交乃諸公所推先後若一則夫子相之為人固無容問矣獨是子相少工詩為古為今一如唐人之所稱格詩律請者未聞工他體也惟夫詩有六義其一曰賦故賦者古詩之流而登髙能賦大夫是期方今聖天子好文首重賦體作者林立少能有當睿鑒大抵髙之為長卿子雲之流失之蕪詭而卑之即降為試文遂使李程王起互起爭勝體裁之雜莫過今日而子相以鄒枚之能抒庾鮑之製髙不浮靡卑不檢劣隨所結撰而良材麗搆一往流曳體物精而狀意顯若所謂氣若駢珠詞如繁露者子相真賦才之雄也我皇上經天大文偶為儷語巡行賦物微示法則而世無敢為對揚者子相進而備承明之選尚書給札賢王授簡其摛文掞藻必有可以舒國華者而尚有待也若夫景運初開詩當初盛而流俗卑汚方且競變為佻涼弇鄙之音則子相所為詩前後具在其力追正始而挽隤趨端在何等夫子相非流俗人也家明府文山兄七十壽序豫氏無二族自周王第九子圉肇封于毛遂表之為氏而其後南陽平丘代有令哲逮靖康以還扈蹕南徙嘗散處于閩越之間故浙之姚江新安閩之玉融所在顯著即嘉隆後猶尚有新安司冦姚江殿翰與閩之起曹觀察後先齒序藉藉通往來其為譜記可考而知也豫于康熙乙卯遊閩之晉安遇文山於道山亭下彼我慕悅相持不能别顧不得譜記不詳其行輩但以容髮度長少第為伯仲實不知其幾何年也既而浙中丞請召至幕值豫滯姚江不得一見又既而其門下士何君為湘隂令迎之至湘隂道浙見過而豫以買藥他出仍不得一見今年春從中州還遘豫于錢湖謂曰豫七十年矣歲之首秋則懸弧時也子可無一言為贈詞地乎豫聞而憬然視其容轉而自視私念齒將脫髮秃種種膚之皴者多瘒瘃而文山齦完肌薄儼塗髹漆于髵鬢之隙行立顧盻矍矍然而反長于豫然後知老少之不足憑而向之度容髮而謬豫長者之甚可笑也昔楚丘丈人年七十自謂能出詞以應對諸侯決嫌疑以定猶豫遂負壯衒竒以為莫及而文山強且過之方文山少舉於鄉以文章名世越草年而筮仕營山嘗考其在營時優于吏治按察宋君舉良吏第一凡鄰縣有闕皆藉文山兼其官夫營固瘠邑又其地蜀漢相接當巴渝萬山之間曩時流冦所出入瘡痍難復而文山每坐理之然且興起文學其分簾取士多得名才所稱湘隂令其一也乃既經薦剡川湖開府已上其治行于朝天子嘉其能下部取召而驟丁兵革拂衣歸里其在今又幾何年矣夫楚丘帶索不出閭里老萊荷畚徒事畎疆而文山於歸田之暇過都歷塊交遊遍天下即偶然詘處一室而戶外屨滿凡夫質疑問難造其廬而咨以事者比比也倘所稱身居丘壑而經術滿寰宇非歟至于心思之敏鋭每當著筆一若迅雷之及物而江河之行地汪洋翕忽不可名狀憶豫在京時從益都師相作擊鉢詩互相倡和必倡韻未絶而和韻隨之以為快今兀坐搖筆終日顧盻不得一字蓋年為之矣而文山著書等身老而倍進今世所傳茱根集是也夫容色之粹材力之強心思之敏皆足以壽而文山兼之則其難老豈區區長豫為可怪也哉髙詹事天祿識餘序劉宗正父子領校天祿當時有説苑雜記諸書散行于世而後之為雜説者宗之如班令史之侍讀禁中而作白虎通蔡雍之校漢典而作獨斷是也嗣此則唐宋諸家短裁促筆不必盡出自祕府致長安舉人淨坊佛厰爭相寫記為銷夏之舉謂之夏課而元明以來山人園客又往往作稗官野乘以誇詡聞見故説者謂談議之盛至唐後始備而不知漢書藝文已早有雜説千家見諸書目特其文不傳耳江村宫詹以驚才絶學供奉內廷其所讀祕書真有非外人所能見者嘗笑儒臣進身偶職詞翰便自誇禁近足不涉苑籞身未嘗一踐闈闥兩目不經接內府圖書及金匱石室之祕入直三館持帔却足即宫門侍班亦不過暫立銅獸傍以互見其睫而宫詹日侍至尊掌禁中文史充􅺉負欐皆得而典校之其中偶有兼本為皇上所賜即拜命捧出故私第賜書即有為長安貴人諸藏書家所未備者是天祿領校惟宫詹為能職其盛顧時奉起居晨入夜出負星而趂暝亦何嘗有頃刻之暇可涉筆札而乃無書不睹一若陸倕之竪橱而世南之行笈隨所記録皆成卷帙何其神也夫雜説有二一則騁聞見以討遺軼即説苑雜記所自昉也若此者慮其誕妄一則誇記憶以肆駮辨即論衡獨斷所由著也若此者又慮其寡陋宫詹自侍從以暨退食所在有記若松亭行記塞北小抄與夫東西扈蹕金鰲退食諸書既已謹聞見而祛誕妄有成事矣今以耳目之餘廣為記憶其中搜微剔隱注疏考窒有駮有辨而皆于天祿乎得之因顏之曰天祿識餘則短裁促筆雖曰供奉之餘然孰非經國大文對揚奏記之餘事而且學山藝海非容齋伯厚弇州升庵之所能及者是焉得以識小者而忽之也而況其大焉者有在也重修平陽寺大殿募疏序平陽即平原也相傳其地在平水之北以水北曰陽故名平陽越王句踐嘗都之明崇禎間山隂祁中丞購之為别業而藏書其中其後中丞殉國難山賊據為寨别業頓毁清興宏覺大師者受世祖章皇帝之詔卓錫平陽構御書樓于上方而恢大其基名平陽寺迄于今已三傳矣嗣席者以琳宫被災重為修復而堊土刻木乏稻粒以給口食因擊板于途遍丐行路吾聞薪盡火傳者老氏之教也而釋亦有之當句踐都居稱霸東南之會不知其盛何等而千年以來僅見中丞之營建比之平泉乃忽為化城龍藏象宿亦云極盛曾幾何時而興而燬燬而又興薪有盡而火無窮也人之施捨猶是矣聞之嗣席者為天嶽大師師有直木堂集行人間今之以文字入三禪者人或未信其覆以豫言質之霞舉堂集序王子木庵自第其所為集自辭賦記傳銘誄書疏以及雜志野乘偶體諧説與夫論辨記述之自為義者合三十五卷名霞舉堂集以屬豫序豫受而讀之曰文有名家有當家有作者家夫名家秪如書畫家之有標格爾而金元詞曲每以平行協時族者為當家至于作者家則毋論當行與及格而必有作者之意存乎其間故漢魏六朝文不求盡凡散題間牘皆足自存而汴宋以後即文體巨細事類多寡必無所不具而苟其製有短長門有枯菀每零梬孑屑而不成集自非作者家經營部署羅絡而不遺求其以函册示世難矣木庵即不然其植物也閎其斂材也核其功積也千至而流效也四應而五達故其質皎晳其文青黃其為幹􅑷擢而其聲其色即雲興于樊而噫散于壑即之為無垠而放之為可到真作者也宋後集多而傳者少初以關石程紙數而既而銖兩無有古史藝文之所載必摲播四訖歷數代嬗習而後得以存其名然不可考也今其書甫出而孰文不擇詞國書不弆其文金匱石室之所藏未嘗編載其卷目而人之見之者皆寶閟珍惜而不可釋此非傳書乎豫與木庵遊約四十年每歲過湖墅必詣木庵詣必有新纂一卷出而相示及其讀禮也宣州施少參君方抵杭與豫約曰今當詣木庵寧得有撰著如平時者耶豫曰有之及至甫就坐而木庵出孤子吟見示乃相視笑暨豫官京師當會朝日少宰李公傳木庵書至發其緘則所撰今世説也時賢在朝者爭起問訊翻閲午門外各相歎異以為榮今諸所存者十之三也嘗曰生人為文得親為按第置諸几席食訖而翻之一如千百世後偶得前人集而為之品騭亦一快也豫歸田五年自視舊文如三伏之綿提起輒置而木庵霞舉堂集軒軒如也然則傳固有數矣劉氏水澄傳詠序自史漢有敘傳之詞槩括諸本事押韻成文而更生作列女傳遂贊頌而諷揚之此即水澄傳詠之所由昉也顧水澄傳詠原始家乘而家乘之體大抵襲廬陵眉州編年紀世取其明晳而水澄舊譜獨詳列記傳旁及志表有似乎扶風龍門之為史者今乃以史而為詩善善惡惡之幾間出以微言風物之旨使孝子順孫讀之而油然以興翕然以感是豈非敦倫敘族實有見之于性情間者所謂以情馭法以恩掩義非乎藎臣天才縱橫睥睨一切每下筆滔滔目無前人而敘事嚴簡矢歌舂容特于纂討呻吟之際兢兢業業可謂慎重獨怪水澄閥閲甲于吾郡自其先司馬公創譜以迄于今增修續修不知凡幾而藎臣以韻文一二槩括之使知劉氏所始六族五忠著于前代而由元迄今尚有名臣傑士忠孝俠烈可歌而可詠者其為保世亢宗之無已有如是也聽松樓近體詩序隋唐以詩賦取士而殷璠選詩由梁陳以及唐初則適當詩法極盛之際然猶云自大同至于天寶把筆雖多而灼然可見者十無其二甚矣工詩之未易也今習尚經義而鉛槧之餘偶押聲律即自以為駕王盧而邁江薛豈古以詩求而詩反難今不以詩求而詩反易哉亦曰工則難不工則易耳吳生征吉工經義其以經義冠試士屢矣一旦以揣摩之久舍而為詩會吳生以聽松樓文選行于時四方過問者車轂輻輳乃大起文會與江南北士公宴于吳山之麓生對客揮毫一時倡和者皆辟易去則吳生工詩既有成事是何古之以工見難者今以易而反見工與聖天子右文興學一時好古之士爭獻于廷吳生將挾其所學以遊京師而先出其近體詩以問世豫取而誦之近體之難工久矣毋論精深灝博咫尺難量而第就風裁以證大雅一如談藝諸録所云簡練以為思頡頏以為韻圜皎以為辭混沌以為質者而吳生皆足以幾之其以進于唐人不難也或曰詩以近為難不工近詩者則必不能為古詩故凡觀古詩而不得其優劣者也觀近詩而瞭然猶之為文者不工時文必不能為古文故觀古文而不得其通與僿也觀時文而瞭然然則吳生之工古文吾嘗于試文見之其工古詩則亦觀近詩而知之東南輿誦録序自子産誰嗣之誦興而漢晉以還若漁陽魏郡潁川廣漢率皆以輿歌巷諺流布史册故王祥太保而海沂之謠早著徐泗姚元之為開元賢相乃吳陵頌稱悉紀于石誠以民情至公感則籲而悅則呼非有誣也金大中丞由綸扉起家槐堂草制早已知頗牧在禁中乃稡擷經史嘗佩水蒼玉為天下宗師百僚長庶無一不就教恐後旋復以諳練經術仍出參觀察特錫袋帶揚鑣而分路為行省中書者約十年天子嘉其能徴典樞要佐七兵九伐之事兼使詰禁當是時六師張皇樓船之南下者藉軍司馬上卿轉餫行間供調百萬億收復昆彌廷臣上功者方擬以五都伯長專弓矢鈇鉞之權令宣布德意會七閩初定議應遣重臣填撫其地遂命公往乃海外蠻荒若髙華彭湖從來不臣其國者悉版籍而耕犁之重以兩浙介在甌粵為神州奧區天南半壁尤不可無搘柱者以厚其任曰惟公賢則是公之揚歷固已閲中外備艱大以迄有是也乃公甫入境須江水發水之逆阞上騰者湓湓洶洶浮天日而下爾時公未受事也即捐金拯溺賑恤諸昏墊而後以入告其于樹柵堰防離􅕞築西江諸塘以修復水利又其餘也夫為民去害而治可以興顧去害必先其大者浙右轉漕多閭左窟穴因緣為姦而關𣙜譏訶比之漢之大誰使然且方樞庇之翼虎而藪狼比比也公先剔漕弊而清𣙜稅使曩時陋轍一切報罷乃整躬率屬激揚風紀凡刑獄賦稅務為減損以與民休息至于教化尤所急嘗賔興入貢在閩與在浙兩主其事先設立講院養貧士其中月廪日餼飭紳士之老成者董之暇則率僚屬講訓讀法至于棘闈之底飭修塗鏝屋嚴朱謄而寬􅚍乙以迄供億之精科辦之簡姦胥不得赴行戶無所派以一事而兼百惠多有也夫民惡貪而公砥以清民不樂惰窳而公礪以勤民所願輸公故緩之民苦于侵蠧而公則譴之民田有時乾公跣祈之民之室不戒于火公拜而馳之夫民患惟盜而公是飭民所畏者兵而惟公是戢是民好惟好民惡惟惡如是而猶謂民之不能歌思而歡呼也情乎夫民實有心謳吟之來不能強其所不欲如必楔其齒而防其口是猶障風之吹而遏其響也然則後之紀績視此矣豫忝館職為公之後進敢述所聞而臚之為序若夫公之功德仍在輿誦豫又何能多為贅西河集卷三十九
