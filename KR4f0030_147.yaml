body:
  text: 西河集卷一百四十七翰林院檢討毛竒齡撰二韻即五言絶句二淥水曲淥水前溪漲横塘収碧㾗㧞蒲塘水上那得見蒲根朝來曲朦朧捲羅幙微坐若有憶楣際生曙光髣髴見容色史憲臣曰朝光容色相接生艷二宿露滋花葉殘星墜草叢東方纔放白西壁又生紅絶句絡甕纒絲苦青綃與絳綃如何春汛逺不及上江潮二宋子新秋意胡姬遙夜情金槽曾壓酒㸃滴記分明戯作麻姑獻芝圖并題為白母夀不向吴門去新從滄海迴翛然雙鳥爪摘得紫芝來聞蟬碧葉吟風細青枝吸露涼桃笙初睡起愁聴一聲長二嘒嘒臨粧閣微微曳晩風佳人雙鬢薄不復桂青蟲翻和宫詞有序旅悶咄咄一壁舊粘王龍標昨夜風開宫詞呼旅主人兒有文者屬截離翻接移七作五妄名翻詩兆熊曰已連勿連已偶勿偶見五律卷較詩牌為玅愛其給捷率接春風夜月露桃寒井諸字而略未成句予便為成之使渠唱云夜月開宫殿春風舞露桃承輪寒井外新賜錦簾高甡和云月殿承歌寵寒袍賜錦新簾前風舞夜井外露桃春守嵗何處懐家苦他鄕守嵗時長將一夜坐并作兩年思二守嵗逾終夕鄉思度萬山家人應蚤睡恐我夢中還臨川水臨川石上水是我清淚滴激激流草根宛轉看成碧二臨川灘上水是我清淚流一灘一日上日日上灘愁寺東廊見叔夜詩古寺經行處香烟滿上方同遊人散盡猶自竚東廊謝舒漢文贈佳履名酒翦毳紅籠襪傾雲綠滿杯覊愁如未解乘醉踏歌來劉珵餉法酒諸食物釀花開螘榼臛食進羊臐既醉應忘客臨餐轉憶君花橋舖碧草馬蹄遙春衫繫栁條看花長下淚不敢過花橋除夕有感作臘管莫教催椒盤次第開恐將除舊意看作望新來三月晦日姑洗將移管清江未浣衣如何覊客路又復送春歸二九十春光盡三年客路遙黄鸝江栁上啼殺是今朝施愚山先生貽書曰黄鸝江栁上啼殺是今朝千古斷腸語也刺促詞黄金長被毁白璧苦遭疑但詠流離子無歌刺促詞沐浴子沐冠棄蘭澤苴履藉蕙草蹴蕙徒自傷采蘭不言好山居雜詩朝日東林静新秋北砦清螃螂衣上落鳥雀路中行二溪静聞滴葉山空響落橡微風裂門紗宛在剪刀上三林菓堪時摘山家偏晩嘗収櫧需夜雨剪栗待秋霜四多難親朋少長遊内侍稀東林女道士替我製秋衣五楓落林蹔紅草疎路微白墻低落澗光門静入山色六杉路雲停過茅堂煖入來幡竿看日影西去又東迴兆熊曰西河每坐視日影東起西落見别集文序七前溪深林花轇結滿溪樹採花入林中始知有人住八女冠不出林忽採鐘乳碧昨日青苔間驚見履絲跡九夜夢同張五前溪一汎舟莫嫌猶是夢醒去幾曾逰十伐棘團作籬編茅織成屧種花不知名採藥當認葉十一落花流前溪溪石擁花住浣女不解愁素指撥流去送倪齒東歸有序送山陰倪齒將東歸憶齒之先有孝子仙溪公侍母痛心疾每痛叩頭嚙指流血出求代百計不足為療有道士告木心石當可自百里内外冬春晦明隆寒毒暘入溪山覔伐材者跪候之如是數年有伐桫樸木候之逮晡鋸聲急叩頭曰此中有石幸丐末人已果然疾由是療石圓如鳥雀卵中色正白著木處燦爛如黄金㑹稽陶學士大臨陶少司馬譜王大㕘泮山陰趙文學甸皆有記傳曾屬予序之未報也今送齒時自痛輕去墳墓羡齒之反桑梓地得孝子之意因末及之且誌梗概以為引者焉把酒驛亭西春風送馬蹄愁君歸去路草色正萋萋二我尚覊江表君先返越州故人如訊及道我賦登樓三倪子擁烏裘幡然作歸計碧雲生長途黄馬去蕭寺四君是仙溪後當還孝子闈王陽長在道送爾一沾衣過上陳店夜雪不能寐蚤行過上陳不知寒雪上盡是夜行人江南雜詩四首十里秦淮水曾經送泰娘紅船停淺瀨畫閣覆垂楊二聚寶門前路長干寺外橋市帘斜掛處山葉下蕭蕭三幕府重開後江亭飲眺還當時傳浪語安石卧東山四何處重相憶青溪小妹家種將烏桕樹噪殺白門鴉林下口號烏衣鎮西林林下路縱横相逢採薪女各自拾路行騎驢騎驢聞雞號日出清沙東初出沙路白再出沙路紅二黄頭小蹁驢日暮解宿處土棧横草門一歩幾回住八角井舖南八角井井上雙轆轤左繩扳大婦右綆牽小姑自浦口至頴城途中浦口將帆落江亭對酒濃日邉明橘柚江上秀芙蓉二秋黍銜風響朝林壓霧平紫游斜控去初過夀州城三馬上傾盃緑亭前獻菊黄殷勤無限意只記杜秋娘題陸售記年圖蓮葉裁為幘松風聴在林東吴推陸弟抱滕且長吟二碧樹移曉隂清神濯秋水誰使謝幼輿寫置嵓石裏題畫為櫟園雨過不放晴積陰濕林葉野禾生前圩蒸耳似馬巤二山抹如螺碧波紋似縠紅帆檣嵓寺外知在夕陽中蔡州宿除三年矣飲次感賦栢酒官齋宴梅花客舍情殘年除不盡三在蔡州城走馬引有序頴城西六十里櫟頭店宿夜聴琵琶絃徬徨不寢過請更彈數曲到明别去與同行相失於是躑躅作走馬引寫其聲馬上悲吟聞者泣而過謂失路矣頴州城西路路馬踡且跼歌苦傷馬心行苦傷馬足二頴州城西路路馬悲且辛只因長失路能感路傍人夀淮陰楊母楊母真女師幽芬蔽淮浦我今淮陰來不敢拜漂母二庭下王喬舄天邉穆滿車願持三尺釣上母楚州魚題張梧乘槎畫像碧樹難裁屋清泉好濯巾相逢圖畫裏知是汎槎人奉題王言憲使畫像卷子先生青雲姿挺若千丈松置之丘壑間矯矯成㳺龍二少小飽文史說劍五陵下草成西夏書取將大宛馬三幕府開江左長藩啟建康人歸朱雀里家本太平王四我來謁先生夜宿歸田廬高譚卸紅䗶誠有如斯圖五將採莊山金鑄成少伯像名垂四海間心在五湖上六不然買絲線繡作平原君袛恐赭脂女汚此𤣥錦紋七一顧神骨俊再觀意氣豪分明瞻五嶽豈是畫三毛日南至今日日南至日南當北還如何南楚客只在楚江闗題麻姑擷芝圖為駱明府夫人初度麻姑本神人曾到臨川山竹葉為衣帶桃花挿髻鬟二麻姑到臨川擷珮獻紫泥衹因鮑靚女能作令君妻毛甡行湖東旅主人孟君依新檄禁客宿其少婦鄧老秀請而可更為撋浣諸衣裝臨行徬徨繋之以詩瀬淺誰漂絮春寒有釣徒湖東鄧老秀為我進彫胡兆熊曰宋玉賦主人之女為我炊彫胡之飯七夕望牛女翻截銀燭秋光泠畫屏一絶與旅主人鄒君銀扇畫羅輕螢光燭臥屏天涼牽小女秋夜看牛星代答街燭流水銀螢光泠如織撲扇看小星夜涼臥秋色寄俞九十四文起久愜滄洲隠還期汗漫㳺天涯相問訊誰不識韓休重登釣臺懐大敬逹曰大敬先生號漁父東望家何在西陵潮欲來衹因念漁父重上釣魚臺二誰是被裘客登臺一望間天邉垂釣處應念故人還望南士不至望門入秦望日日如望秦白日寢落盡吾思漁丈人秋山送僧曙旭啓杉闗逢僧問八還白雲留不住相送下秋山與何八十七國仁飲次書贈但作他鄕飲從君不願歸衹縁行役久故國反相違二臨汝江邉酒巴山署裏雲十年纔此㑹莫道不思君長至語當壚鄧上長至還為客開樽淚欲流勿言添線好客路轉悠悠楊進士賦臣小盆松萬粒小松盆龍孫又種孫石臺開寸壁蒼翠滿天門就亭鸚鵡去而復返脱鏁辭雕檻銜縚返綠衣隴山千萬里何處可言歸鷄冠花每遇秋花發傷心絳幘紅故園深樹裏翹首待墻東留别駱明府我愛駱明府西游汝溪曲來時秋風生去時春草緑二明府文章貴今來政事清江邉看渡虎署裏聴啼鶯三我與明府游習習忘晝夜吟詩出竹中飲酒醉花下四王生依江表豈不懐家鄉春江碧灕灕念此江水長五一日辭巴山十日不能决睹見楊栁枝俯首淚如雪别黄吉有序巴城人黄吉給甡酒脯者四月日且時延甡所親友朱三徐二十二軰作郊游其家穹然耳臨行估馬匹齎糧送甡辭不得更為留兩日賦詩以别䇿馬去江闗春花照别顔臨行三繫馬不是戀巴山黄吉送甡至石牛渡天涯最難忘莫若石牛渡渡頭花樹紅是我别君處聴子規嶺外春雲合潯陽曉樹迷高安三月暮休聴子規啼臘月望夕喜旅客翻王建翫月絶句云合望月時常望月分明不得似今年仰頭五夜風中立從未圓時直到圓偶感其言且傷時暮亦為效作望明常夜立時時得頭風從今望圓月不似五年中二時望不圓月望時常月圓五明今夜合直得到明年吉州守除三首但守薪槃在毋令栢酒虚他鄉有限嵗又見此宵除二虬箭消殘夜雞鳴報曉春故園如祝嵗應祝蚤歸人三昨嵗留河外今來滯吉安年年隨斗柄此夕向東看將度玉山悶宿旅亭翻王之渙涼州詞閒遣白楊一萬片逺度何間闗不怨春城笛孤雲上玉山又翻涼州詞别鄧上玉山不須度闗門逺孤笛春城萬栁間片雲一何白舟夜翻張員外楓橋夜泊詩得姑韻落月寒楓外江城啼夜烏霜鐘天半寺愁客對山姑和送春曲芳草茫茫路春光任去遙生年苦離别不復上河橋二日飲江亭酒誰來歌送春歌時雙下淚只有未歸人天衣襍詠詩并序乃者久行思歸潛身渡江幾罹隙孽從張五宅轉投入法華山天衣寺中觀李邕碑感東晉曇翼誦念法華經有普賢菩薩化優婆夷娌變相覘堅道心遂椉六牙象翳空飛去因名法華山建法華寺暨梁武實徵恵舉不起昭明太子賜縷金木蘭袈裟紅銀澡瓶赤貝留犁子西域阿育王女鑄金銅維衛佛像輸供殿堂有張僧繇畫普賢菩薩變相供普賢臺門外半月泉照見半月有雙烏棲宿天衣杜鵑花異他常種逮明恵王重賜有千龍紫金袈裟宫妃繡字法華尊經并亡兵寇頼乾公從靈隠東渡卓錫茲地頓還故觀公見甡握手類逺公之遇彭澤休上人之逢鮑昭借宿襌寮為予懴釋晨暮鼓鐘因奉和乾公十峰詩并易他蹟名天衣襍咏詩覧觀云爾法華山靈鷲飛來迴高僧誦去閒南朝四百寺猶有法華山月嶺明月生西峰幽巖桂花發舉手拈桂枝仰頭看秋月普賢臺竹院狶筐杳金臺影幛微前山風雨夜如見畫龍飛望秦㠗秦皇鞭石至遙盻咸陽宫我亦愛山色悠然一望中半月泉池蓮池像月弦見月與池等如何落萬川虧此半邉影積翠峰寺古雲容合山深翠色多収將龍女黛綰作佛頭螺天衣天柱開吴越神宫肇晉梁金衣頒太子華藏錫賢王天女巖碧草緑雲鬟翩韆下天女朝散三壇花暮行一溪雨天衣杜鵑花只喚歸家好還憐去國賒琱壇雙淚落并作杜鵑花伏龍坳高座金輪轉當闗鐵鎻重誰持天半錫來伏嶺頭龍雙烏青山白項烏年年送雛去祇為戀丹輪雙棲貝多樹客悶同諸公翻李白少年行何年市鞍馬笑度金陵東游盡五湖肆春花落酒中又翻王龍標從軍行漢將在秦闗征吴人不還月明飛萬馬陰使度龍山寄趙明府三首種栁山城外看花江縣西風流賢邑宰人説趙棠溪二每讀棠溪文臨風起懐想廬山千片雲片片集几上三海潤迴波緑江深愛日紅山陽車上客流涕謝滕公月夜翻王建中庭地白樹棲鴉詩并作唱和露白鴉棲泠秋庭桂樹花誰知明月夜無地不思家二誰地夜無月花中白露明家人今在望庭樹盡秋聲三花月無家在秋庭知望誰露鴉棲樹白不盡夜中思四夜盡鴉不棲地白濕秋露花庭明月中人家望桂樹五庭明夜棲人盡思月中桂誰知秋樹聲露泠花在地又翻前詩原韻明月在人家棲庭冷白鴉望中思不盡夜露濕秋花二冷月白庭花今秋誰在家夜明棲露地濕盡樹中鴉西河集巻一百四十七
