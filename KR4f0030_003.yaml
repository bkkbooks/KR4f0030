body:
  text: 西河集巻三翰林院檢討毛奇齡撰主客辭擬為司賔答問辭有序詞一作釋康熙二十三年六宇蕩滌中外無事皇帝奮桓撥之烈廓清南徼迤及東澨畫地溟海之外版漲籍渤凡九垓八裔雕身畵頟諸國咸奉辰朔皇帝軫念民隱謂君有斯土撫育㡬三十年而不一周知其地觀覽其山川風物則綏要萬里何自通浹惟古昔王者當天下初定有巡行縣㝢省方問俗之制自三代迄今未之有改顧事頗煩重度支水衡坐費檢㑹且千乘萬騎慮無或鋪張盛大為司行奔命按王制巡幸諸禮自職方戒途太馭掌較以後凡車騎鈴鸞宫城梐枑以及壇壝堂房珪璧玉帛黄駒赤犢皆有儲偫然且句陳五校所在警蹕扈壘衞仗周環百里嘗考文中子言虞舜一嵗而巡五岳國不費民不勞者何也以兵衞少而徵求寡也然而語不古合民無徴焉我皇上以非常之原創非常之舉因天事天因地事地因人順人然而三王不竝軌五帝不襲治考建因革而禮制行乎其間葢一人順動萬人幸之之謂幸一人慶行萬人豫之之謂豫如必造眀堂而後可以覲后則輯瑞何期必設輶軒而後可以採風則觀方何待皇上納羣臣所言特練時日倡舉巡幸減從官省行軍採大禹四載之需折虞廷五年之典隨不逾萬人時不滿百日登岱觀河浮江涉淮經閶闔詣闕里所至問民疾苦父老扶杖兒僮婦女率負戴來觀鹵簿不譙有髙年者則抵錢慰勞之先為肆赦令薄海内外咸霑豐恩及所過州縣民廛市廬又皆有捐復寵賚芸鉏不變鎌穫如故市估行販及道路師旅駒驘楫筏儼返家衖何其盛也昔東漢光武巡游南陽置酒髙㑹召吏人飲食復其租賦以為美事而章帝南巡詔所經地無得設儲胥命司空自架橋道其詔有云方春所過無有伐殺車可以引避引避之騑馬可輟解輟解之至今史載猶嘆誦其言勿衰今車駕經行屏却供億州縣起居悉絶所餽獻即行在茇止亦竝無宫懸籞仗鐘鼔鈴柝之設而民之引領望幸者相屬于道然猶親視河溢立灑宸翰殷憂悼嘆不數瓠子即當釋奠宣聖儀物備至臨行惓惓尚復貽曲柄御繖以申向慕此雖金繩再出必絀帝俈為封禪起周成為巡狩亦豈有過誠恐諸儒不諳動循掌故將引虞書王制覲典祭義以及元嘉之儀開元之禮重相諮詢因設主客往復倣東方客難揚雄解嘲班固答賔戲夏侯湛抵疑之文擬為司賔答問辭以曉譬之庶後之君子可考觀焉其辭曰司賔大夫與四方客使集王㑹之堂理職貢之事主當壹是國信方物披圖眴節悉具紀㑹方斯之時華蟲各辨等卉越皆就位四方客使有詗于其列者曰古者聖王御世四海晏然則因而巡狩巡者循也民可循則因而巡之狩者守也為我守土者吾從而循順之然而動習矩錯著有法則曩時五載十二載天道大備升中吿至先為造類于是修職有其戒犯較有其義土訓夾車而問形掌道審言以詔辟定方眀于司盟布綿蕝而表位夫第以壇壝觀之三垓八通太乙環五穿蒲裹草上無風雨然且眀堂巋然以天齊主就其文而紀其事則公男升降中階阼階有其等后王遜讓天揖時揖有其數桓躬穀蒲以五擯四擯為節罇壘篚羃以一進再進為度其煩我奉常而需我掌故有前事矣矧宫城所舍晝樹筍簴藩籬外護夜振錞于或習禮以射牛或布幣以代駒設燔而炙玉檢瘞駟而陳木禺臨學校則執羽鷺祀丘壑則用乾魚然猶車駕之次考及同琯槱燎之末享逮先㕑故以登封而巡河則負薪擔石者有之以祠畤而幸學則說經講易者有之以師行而及游畋則耕定陶蒐涇潭者有之以祀社而及祠賢則封樂毅祭桓譚者有之是故銘石頌功徳古王未免陳風紀美盛聖主不嫌今皇上撫有四海治極三古聲教振開闢規制軼區宇百禮斯洽萬類咸叙承天搢斗紀節布度當八風恱豫之時乃順應而為四巡之舉則是西鳥東魚里禾鄗黍符瑞之應報饗之數無有若今日之富者此管仲所謂物有不召而自至者十有五焉然而出不盛車甲行不飾金鼓羃鼎不夕張帷宫不鼂御躬省方俗清問疾苦升禋岱宗灑澹河滸登習禮之堂探蔵書之府塞決水以石菑撤通天之權火然且百日之間而南浮江淮東至齊魯是豈古皇不足法與抑何掌故多未預也且吾聞鑾輅之南翔也行不除道耕不輟疆女不下機織市不易葢蔵兒童讙于衢巷估販偃于舟航然且皬髮黄口如葵傾陽或牽以犧或捧之觴輪蹄踵趾馳驟康莊則嚮使肆覲而輯圭玉報燎而坐明堂既審權于三市亦奏律于四廂治邸奉髙之側捐租崇邑之傍將不止紹神靈于軒頊比功徳于虞唐而又何事物之罕備考建或未遑焉司賔大夫廼斗然却立瞿然而改容肅然而正吿之曰子徒知三古之當遵而不知一王之制之自有章也且子亦聞巡幸之何意乎皇上以為六闔一統萬國來㑹則民后之情不可以不接中外之勢不可以不通乃或禮過繁而力匱制過賾而用窮費時日則機務不給多導從則供億不充此前古之所以易行而夏商以後遂間世而不一逢也夫創制顯庸務在獨斷因監損益貴乎折中故湯武用干戚不需揖讓姚姒有子弟未嘗分封彼夫劉氏之興二月而西巡十月而反東巡者限于時也後魏繼世北巡及中山東巡而止及橋山者絀于地也貞觀幸底柱以治河為封嵩而書之旂勒之石者介于事也建隆平潞叛以行師兼詢俗而先勞軍後捐租者阻于勢也是故游觀無定形巡幸無定儀省察補助無定經方行典禮無定辭必畫井田于郡縣之日則畸矣講車戰于騎射之年則躓矣倣垂裳結繩于刻書削契之世則欺矣施儷皮尺布于九圜六品之時則骩矣議守社捍牧于車書大同軌轍齊至之際則誖矣往嵗鬼方弄兵天討其辜鋪敦萃旅底于昆彌挺鈹四伐而未嘗傚征苗之師間嘗取士詔下徴車臨軒親覽特簡仲舒是本制舉而不必循選造之遺乃者甫馴龍馭先樹雞竿大號乍渙洪恩驟殫以巽風行作解雨觀何必崇朝遍彼泰山即其陟喬勿修壇壝金匱石䃭却之若遺黄蛇不屬白璧是瘞賜車勞酒羣呼天齊此豈禪禮所得庶㡬當夫觀河有事玉馬羣臣從者宰執以下咨嗟抑鴻賦此皓皓不搴葦茭但借禾稼升鹽斗酒彼安用者周之翕河遜兹盛事漢武築宫于斯為下爾乃九旗南指方江厲淮板􅀈黄蔑非龍艘材造舟震澤纜石呉䑓民之望之有如嵗來丹陽可駐黄金誰埋六代殘構視若劫灰惟彼故寢加以封栽卹殷優恪自古所希漢髙過湖祭周王祠方之于今豈得嫓之矧瞻闕里言觀罇匏登堂習禮為斯文昭爼豆未湮宫墻豈遥祗因重道景行孔勞臨行留仗羽葆翠幬奚止過魯祀一太牢且吾聞蒐狩之典不能常舉以旗致民載旜誓鼓苗田茇舍總類振旅雖曰從禽實比卒伍以是大閱嵗無一有乃當鳴鑾偶爾建鐸暫啓和門自有坐作車不詭遇獸無私獲笑彼司馬枉事表貉且夫儒生博士之言亦安足責哉在昔列王將巡有謂編蒲裹車勿傷山石掃地而祭席用葅藉則帝主聞之巳充耳而勿懌即髙世比徳欲效九皇頗采儒術上吿登封然且拘牽詩書扳引畦畤軒羲所垂夷吾所記大夫文學爭辨不己絀偃斥霸遂罷封議此真泥曲傅㑹無所考適之巳事也故以巡行之禮而苟襲舊文則無一而是彼夫職方行令修涂辟境而後之效之者非大治馳道則長開蕩渠掌舍治宿設藩置籬而後之祖之者非圜垣四面即離宫百區故板城幄殿丹靑輪軸此土方所擬似也昆侖神樓槍車鈴柱不可謂非眀堂之遺制也故五玉三帛極之為貢金獻幣籠香篚藥之端勞酺賜布類推之即為裝錢路餼以及軍工羽釋紫茸赤罽之所由以捐是以結綵樓演百戲實由行殿之陳懸始之布香臺排畵甕牽青繩閑赤楯悉從壝門之大次小次啟之故王人一帥屬而後且盡統其諸王百官與夫蕃人貢使之族羣后一表綏而近且増之以羽林車騎金吾鎧仗而猶以為不足然則禮當極弊亦何非率由之始所濫觴者而動言掌故斯巳瞀矣乃以法駕之出控神虬跨龍騵雨師灑道風伯清塵靊窿為之啓馭羲氏于焉捧輪材官不刷鬛騎士不解帉八鸞秩秩九組駪駪不百日間而東漸南暨所至若神浸假吉行五十必拘禮文則大旂金輅將有一年四巡即遄鑣急節而不能造其闍與闉者此真聖人行事法則兼至即偶然舉動有非臣民庸衆所得窺伺而戴高忘天履厚忘地挾莛而撞嵩髙把蠡而測海澨此神聖之所以難名而帝徳王功遂當獨有其萬世也西河集巻三
