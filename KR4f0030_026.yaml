body:
  text: 西河集巻二十六翰林院檢討毛竒齡撰序三沈肯齋典試江南序今天子十有一年廷臣請定各省主鄉試官天子念東閣制誥諸内史槖筆勞苦當預簡命而是年以諸内史纂修先皇帝實錄有成効於是慰賚之餘例予分遣沈子肯齋得予江南主試官實異數也先是受簡時拜命就道既已引嫌而交游親切亦有供張投贈歌詠其事者肯齋概屏去踉蹌乘傳既事竣江南人士萃然驩呼悉公悉明咸為天子稱得人慶然後中外遠近遽起誦述將以彚其文而推予為叙予思丈夫生不能為宰執得為主文官幸矣手持衡尺目眡寰海取斯文而升降之如鈇之程材而權之凖物斯已快矣况江南人文所歸也舂山搜玉無非至良且得失以實一溉從前時數倒載迴黄反綠之說何其能與或曰肯齋之致此非易易也肯齋之王父曾以故明萬歴丁酉從應天榜國子入解而其外王父姜大宗伯則萬歴甲子曾為江南主文官肯齋以為先人所起家地當益勤恪而外王父且同為此官是必不負材擇庶得後先相映稱為接踵且夫鬼神所時有也文運將啟端有造物者行乎其間一若啟牖其心胷恢閎其視聴而吾獨于其生平有厚幸者天下事豈偶然也哉昔劉真長為丹陽尹種栁㕔事而其孫瓛復來丹陽袁粲指㕔事前栁以為重見清徳咨嗟嘆息汲長孺與外孫司馬安同為洗馬嬗有亮節肯齋何如乎肯齋捆所錄文還京師將颺之大廷用為楷栻而以王父祀棠邑親渡江為文灌祠下姜司諫嘗謂予曰當先宗伯主文時肯齋彌月未命名也宗伯名之錫以銀鵝且曰苟繼我而典文章者人也嗟乎先之矣送夏少尹遷西和令序昔言游宰武城交澹臺子羽而人俗化漢潁川守韓延壽召郡長老設酒饌每與為論說而民爭愛之士之仕于其地者視其地之賢大夫士不與之踈其比户長年子若婦不與為怨怒而政可知焉廣秦夏君以司刑來為息少尹其為少尹不得已也少尹無他事而又加之以不得已日與邑士大夫游飲足矣安問為政哉乃廣秦固未嘗為政也而政成邑所當興力興之雖剜肉敝肌勿恤也客至無酒酤質衣而已邑所當裁有不闗邑令可獨裁者畢裁之縱無利于已猶裁之也吾知民焉爾吾勿計後來矣歳庚戌計簡小吏有行名者于是以廣秦為能遷鞏昌西和令將行邑賢士大夫與比戸民咸出郭供張于朝陽門外擔缾挈榼攀車而行一若不忍其去者予漫游汝南送君于途見諸士君子與其比戸者皆在也顧而曰此即廣秦之所為政乎古名人達士衆矣其出也每不樂以守令居故凢出為吏率飲酒賦詩登髙臨下以極其游娯之勝雖所向不得意乎然卒無廢事如懐縣有詩髙陽有酒降而武丘之伎環滁之亭皆是也是則無故人之曠然于其懐者必其不能復煩然于其事事不煩故民和民和故政清此無論邑之賢士大夫與其長年父老有識行者悉有以資之而即其浩浩落落所至無滯自足膺大事而不亂廣秦以濶略之懐處無事之地而又有大夫賢士以為之游有淮閭汝濮山林陂澤以助其勝宜其政之成而民之和也今廣秦行矣西和之山有仇池焉羊腸盤互數里一曲氐羗之勝地也下有飛龍峽曩時杜甫所寄居也予倦游之客不能復踰秦隴以丐築室顧華渭之區豈無良民秀士從容游飲如此地者他日政成而行焉知其所為供張者不加于朝陽門外時也贈汝寧金太守補任揚州序予去汝寧之明年汝寧太守金君以滿俸例遷諸道副史㑹其弟方伯補藩河南君引嫌請辭遂于次年十月補揚州太守計其為太守已十六年矣太史公曰為吏者長子孫此言繼世之優暇也後世銓法遲滯郡縣羅四裔而遷次鱗積無增秩之榮又無髙乗大盖加金賜紫之異其吹毛見瘢務得汰去以稍䟽其壅所不致朝遷而暮去幸耳遑問十六年之乆乎然且人之處斯乆者仍如傳舍因陋就簡為旦夕補苴之計其能務從容以冀長治亦鮮矣吾不知君之守揚者若何也苐觀其守汝汝故抏敝而君以恵政休息之家人其民稱天下長者其自言曰為政去太甚耳然而綱目之廢者舉之不設城府谿谷而米塩凌襍咨羣屬以利害掾曹從事有通達治理者以次延問嘗從夜分進窺其退食之堂燭光縈窓重簾自垂君手較文簿矻如也或曰墾廢土招流亡君政也其建小學則豢貧士有經術者授生徒其中客投其治者如同舍然一切陂梁城郛館廨日漸修築又不設畚挶費即故事宜入羨㑹璅屑悉以罷不問其見守汝政略者裁什一耳然則守汝十六年而勵精如旦夕有如是也夫不忽于終者不遺于始補揚雖暫乎其視旦夕有如此十六年矣昔者太守髙第擢不以限故能安乆任今毋論旦暮報罷即遲乆如君量其所遷祗諸道副史已耳然猶然砥濯如此揚州為東南都㑹古稱重鎮者莫過焉今軍興旁午嘗恐以盤錯之際無俟休息昔有為汴州刺史發河南諸道兵征冦河朔而奮揚徃來仍不失撫字者記不云乎一張一弛文武之道也夫苟能弛而張之則雖以天下長者轉而為神明何不可哉來氏論表策世業序韓退之自言就禮部試強顔為文辭類優俳者之所為歐陽永叔與人書少舉進士輒穿蠧經傳移彼就此必其後多所更變始能有立以彼二公彊材奥思率其所學宜無不得于有司顧屈情拂志大貶其生平以求一得當于所為制舉也者甚矣制舉之難為也雖然必其上之不以所學求下而下之亦不以所學應上是故然耳假使韓子為有司而歐陽子舉進士其兩無是語乆矣予鄉來三峰先生以家學起自舉童子科以及解省類無不以其所學應有司舉而有司亦卒以其所學得之余嘗退自思當進舉時未嘗不以已之所學為可得也乃曰是少諳練不足法或稍自簡摩希得當矣又曰亦甚阿移哉何必然夫以此却足者屢三峰先生每為文無所顧忌嗟乎丈夫貴自得耳董子不以天人自陳其所傳者玉杯爾已司馬長卿不以見召時為天子作賦則子虗之言幾不自全其一時應世之文又曷嘗不為生平所貴重哉今三峰先生其曾孫元成亦以家學起舉于鄉而以進士名天下其得于有司稱其所學而有司亦遂無有以其學失之者將復彚先生制舉文與已所著共一家言名論表策世業而元成予友也故屬予叙因念讀三峰先生文時歎韓子歐陽子皆不幸不遇有司及讀元成文且謂自今後更無可容韓子與歐陽子所嘆今已矣棄制舉乆矣但當曰董子司馬長卿其得自見于時者此有得于制舉者之明效也其為韓子與歐陽子之所歎者此不得于制舉者之私懐也天下事亦安所用吾私懐也哉鄉先輩嘗云先生舉諸生得且復失而其後亦竟以鄉進士老元成幼偃蹇進輒困有司其得且失亦屢矣乃卒堅忍以成其名此其制舉何如也海寧吕覺我先生傳序少受四書訓解師曰此海寧吕先生之書也既長習制義赴試因得從家兄受海寧吕雍時所錄行巻兄曰雍時者吕覺我先生之曾孫也且前此無行卷矣坊刻止闈巻合鄉試禮部而禮部參詳小試官分簾二十各錄所選士平生為文名二十房書先生彷其體加之鄉試名行巻且錄諸試卷與闈巻彷故今有試巻有行巻則先生之為也予初受䟽解謂先生必新安者流及聞是言更謂先生且兼有石簣震川諸先生制義進取甲乙不謂先生之不然也兄曰豈知之乎李唐以六韻取士猶八比也然而工六韻者李杜孟王其尤者也唐以六韻取士而獨失之孟與李杜今以八比取士而反失之先生是豈先生之八比猶未工李杜之六韻猶未善哉得失之數殊也故先生每試冠邑無算冠十邑者二薦鄉試而復失三膺使學聘衡文諸直省若南直𨽻若楚若豫若豫章若齊魯若東西粤若八閩凡八天下誦所錄文服其教由隆萬啟禎及今為年歳約五六十乃卒艱一第然且既艱一第而天下之稱六韻者首推李杜天下之誦八比者仍首推先生則又何與則是得者不必不失而失者又不必不得也癸丑冬予逺游歸距昔受書時已三十餘年而雍時貽先生傳來屬予為序夫雍時操鉛槧繼先生起藝林其為制舉文亦何減先生然猶賫志逮老斤斤輯先生遺書以補所不足吾今而後然後知先生之宜得而不得者盖其常也先生及門半天下一時官浙者自三臺使君下迄守令皆先生門下士故傳文為黄公石齋所作石齊者先生衡文八閩時首取士也特先生自惜所著書自四書五經䟽解外其所著書不止四書五經䟽解然先生特留意疏解傳曰先生沒後有方士許生受旌陽籙扶乩降神藏宫壇于紫㣲之山先生憑焉留其乩三年自悔前所行疏解未當藉畨于乩日改十餘畨向所受四書疏解則所改書也胡匡嵓曰東坡稱杜甫嘗見夢自釋其生平所為詩人苟能傳不必以違時而祕其所為而人之傳其書者亦不以其見違而諱之而其人之神明乃遂與所傳之書相終始焉豈獨先生已榕臺集詩序自宋人為集句詩取前人成語抽三抵四易以杼柚而後之學步者比比焉此猶構凌雲者欂櫨榱桷各有程材乃按部就班取之為一家之用司歐冶之冶者買金于堇山斸銅于耶溪合隂陽燥濕之精氣變化吁噏而後發之為蓮鈲花鍔之器盖以我敏給取彼綜貫難乎其言之矣榕臺李都官詩與文徃徃而工集句其一也即以集句論偶然感觸有所記憶雜組而成之亦暫焉耳榕臺集唐至千首已可怪矣又掇拾新巧匹配精卓雖使子曕舉筆而魯直介甫從傍纂輯無所過之榕臺顧何以得此哉或曰集詩有二道一詩學一詩心也榕臺學力之精輓近未有其于唐詩猶晡之于食而旦之于衣也所謂學也顧好學沉思與心知其義者截然不同不觀諸集乎合經史與子而彚之為文或傳或記或銘或誦必貫乎心思而通乎志氣是之謂集且夫為市者閭閻懋遷齗齗而訟耳推之三條之術五都之衢四應八達咸有條貫於其間而後估商翺翔各出所嬴財變易熈熈一若有王府關石為之平凖至今北方人亦謂之集然則集者亦集其學之從心者而已矣夫以榕臺之學與其心即不為詩若文其為詩若文即不集詩吾猶以為編摩之巧其操竒贏以為游未可量也况其所集如是也王自牧集杜詩序向予孤游無所遣也曾創為翻詩之法取前人詩一章磔其字押其字中之可為韻者平陂而就之輻輳相程已連者勿再連已偶者勿再偶也不然則又取前人長律劃句上下上者吾與應下者吾與呼也顧卒未嘗為集詩者以從來善遣心者多集前人詩窮偶極儷闔扇轆轤各極其妙不惟不能效也即效之必不能與肩併因屛絶勿為及讀自牧所集詩則嘆從來集詩者遜之逺矣自牧遭逄類杜甫故喜集杜甫詩當其目有所接意有所感友朋有所况臨山川道塗園林樓臺有所覽觀吾所欲言杜甫已言之矣特慮其言之單也從而複之其已複者又從而更複之就其意而得其句句在意間就其句而亦得其意則意并在句外豈無時與地與人與徃來眺望之相符者乎不必時與地與人與徃來眺望之相符而以彼嫓此以此儷彼不知者嘆杜陵該博人所應有不必不有而不知其纂裁之妙譬之匠者雜楩楠杞梓為器渥沐砥礲不聞求噐者之仍歸工于山與澤也紅女倚繡床抽青黄而妃紫緑串顰而五組之間或規矩圜方紝圖織字窮天地之能極知慮之巧而猶謂躬桑之婦之能經營繭繰之御之可以嬗譽則非理也苐自牧雖逺游宜亦不必有所遣而前人以遣心而為之今人不必有所遣而更上之倘他日者予所創翻詩諸法幸傳人間則世豈無相習更上如集詩者然則予亦何遣矣中州吳孫庵詞集序今人不必不勝古人而今之人有言勝古人者則姍笑之不惟姍笑之而已且從而誚之讓之即幸而遇知之者以為是果能及古人者也而人之視之仍不啻如今之人人無不以閭巷之人視予者則知予之本不能逮古人也而予之視今之人亦未敢有踰于今人者是豈予之識無以越于今人之卑卑者乎抑亦天下果無人而無有當于古人之賢名也若予見吳君則不然予初見吳君常人耳既而知為非常人又既而嘆為可及古人顧為古人易為今人難古人傳文一體耳今則必具體古人具體不具善也今則必具體而善古有詩無詞唐有詩亦有詞然如無詞者宋則有詞而無詩今有詩者必有詞即不必具善乎然亦未嘗不與善相期也吳君善為詩復以其餘者為詞詞又善因為之序之而記予之得遇古人者如此若夫宋人以詞傳若張先若秦觀若周若栁若晏同叔皆不善他體歐陽永叔蘓子瞻即善他體矣歐詞不減張而小孫于秦蘓則遂有起而誚之者吳君雖為其難與然安見難者之必不勝于易者與雲間蔣曾策詩集序昔之為詩者嘗有為正變之説者矣正居其一而變居其九盖紀治之音少憂離之什長也然則幽平以下之為詩多矣乃説者又謂自陳靈降而變風息夫定哀之治不登于古陳靈之亂有踰于昔然而又無詩何與昔天下之為詩恒少矣崇禎之末言帖括者詩不工然亦無正言詩者華亭陳卧子先生遂與其同黨言詩當是時先生仕吾郡漳州黄宗伯過之偕吾郡士人登㑹稽山顧座中賦詩無能者即他日索之座之外無能者維時則竊觀先生座中有所謂杜陵生者先生每指之稱能詩焉乃不十年而郡之以詩與人爭短長髙下詬訐攻辨者齗齗如市迄于今又不下十五年而郡之言詩者仍少即向之詬辨不已者亦復稍稍謝不敏去盖詩之為言始于志而發為詞無所于在心不可也必怫鬰焉而不得已也此如濕之蒸於錡而燎之抑于陶夫然後發為言詞而又懼其遺于才也不然懼其乖物也不然其所㭊者非其文而其所形者非其義也其所㭊與所形義以文生文以義行矣向之所為不乖于物者度物類事無所譎計而不足與風也已足與風錐角重刻繩懸以綴非温平其教容好其量也夫如是則亦已矣求之為已過矣又以為未極于宫與徴也其弦不可歌其石不可和也調之窳聲之訛也由是而天下之能之者鮮矣予昔交杜陵愛其言詩然不相見者且十年也今既見杜陵而讀杜陵詩稱善及其既也又讀杜陵之子曾策詩又稱善夫天下之望治亦乆矣治極于亂而無詩或亂進于治而又有詩然以天下之所必不能者而杜陵父子獨能之是豈華亭文物固自有殊抑陳先生之為教有未渝抑亦杜陵生家學原有得之于深者而使之然耶吾聞離騷之興逺異風詩乃說者又以為變風之息則離騷實繼之其㫖譎詭而恉不淫其文竒而其才可以怨向者杜陵稱予詩謂情文流靡有似離騷而吾亦謂杜陵父子其寄物肆志大者得之正則次亦不失王褒劉向之徒夫離騷變詩也然變而不失其正故正之變而詩亡變之變而離騷亦亡然則曾策亦持其不變者而已矣毛稚黄東苑詩鈔序東苑詩鈔者稚黄集中之一編也稚黄編文不一時復不一類各見指趣而此以苑名識所居也稚黄讀書東園矣東園者宋東苑也東苑之詩有云城東東苑潮鳴寺者其地風物蕭澹而人習朴可以懐古稚黄樂之故其詩不盡賦東苑然為東苑所賦詩即東苑名焉稚黄達於詩而能工研辯風雅覃析豪末要其才分詄絶足以神明其萬矱而凌厲於法故隨境所得驅遣百有雖體非一致而情同可安沈約稱王筠詩彈丸脱手不為過矣古文耐創始不好沿襲每有標寄必緣物造情因時設㫖不詭隨于人而損益經心使讀者得以進觀其志意之所存特前人多言苦吟即偶爾著書輒閉户深思絶慶弔酬酢襍置筆墨䆒其所著裁數篇耳今稚黄卧病有年歴盛夏衣重裘口語喑喑而集中諸編分班列部其為朝成而暮遍者且犁然也今人不如古彼亦嘗誦吾稚黄詩哉歴下張童子集序予與張黼遇淮上黼世家子也其先相國有文名黼述之不愧世家子然吾獨序黼所為文耳及讀黼子童子文則黼又作之者也童子又述之益復不媿世家子異哉其相繼而能文若此古有云醴泉無源芝草無根豈其然乎予與杜陵生友善其次子聖童也今少長矣予每憶其人并欲詢其所為文而張子與杜陵友張子之子亦即與杜陵之子友子讀童子文如見杜陵之子即如見杜陵之子文異哉其友朋之相契而能文又若此童子數月識之無數歳屬對近十餘歳而文集成凢此者與杜陵之子同繼此以徃則不敢量矣異哉吾不能以量張子者量其子吾又安敢以不能量杜陵之子者量童子乎西河集巻二十六
