body:
  text: 西河集巻一百二十六翰林院檢討毛奇齡撰賦瀛臺賜宴賦應制有序皇帝御極之二十年六幕旣熙萬象咸晳内有憲稽之治外宣班叙之文講筵通合語時闢三雍受社謹咸劉用申九伐將奏要荒之耆定進觀海寓之清寧然猶處治思危萬幾克毖居髙善下一徳相期緬兹九重宵旰之勞翻以百職後先為念君無忘幾康臣無忘喜起同有𢋫颺子為我蹲舞我為子坎歌何如僚采因借巻阿之釃酒暫臨曲水以浮杯大酺合樂偕來興慶宫前文喜開筵不在長春殿裏當此金昊乘秋之際玉衡指兑之時九龍門外梧樹長隂百子池頭荷花初落蓬臺萬頃金波與帳殿俱開閬苑千重紫水共樓船並轉畫橈齊舉還看水面鳬鷖錦纜同牽原是班中鵷鷺挂長綃于汾水不待為歌汎碧琖于昆眀非闗習戰乃以黼藻裳華之錫展兹吹笙皷瑟之情龜甲青羅傳于掌賚麟文紫錦出自司闈依然束帛之承筐儼發衣裳于在笥襭袍未覆慢教韋綬裁成霞綺難名苐遣封敖領去草頭鋪紫罽就瑶漿林下葢青油判將銀埒夏屋設公家之鼎秋蘭發王者之香乳中分䗶烹為龍鳯團花茶内加酥散作琉璃細眼朱虬堪入脯需賚同昌縹玉可當醪曾呈裴令乃敕酒正掌頒醹之禮大官習錫饍之儀鵝􅀈䴏髀排從錦帶羮前玉鱠金虀裹在紅綾餅内雖漢南之鶉雀不入腥肴而東海之蠵螺久淹葅醢肉泥流翠釡看調朔塞明駝肌雪落霜刀幾化秋林飛蝶况復大梁貢米舊號金鎗太液登鱻新批玉鬛炊彫享豆擷露稗之通莖聶鱠加鉶瀹河魴于在藻匪獨侍餕饗天倉之粟將使從官饜蓬島之魚爾乃醴設六清無煩監史飲過三爵尚授催籌謂堯仁之浩蕩一日非狂而舜澤之澶洄千鍾猶淺縱曰有偕其飲僅聞之大射筵前其如不醉無歸亦載在朝元詩裏戀三升之學士羞比王生擅兩美于當官誠如臧盾然且藕船十丈玉井留甘蓮露三危金盤獻乳簇蜂房于繖下洗象骨于波間擘園繭則清􅀈俱流嚥壺氷而沉疴頓减種同雁實頒之覲雁歸時窼覆馬蹄捧向馬頭載出此固上林之寳植罕到人間亦惟聖世有金莖長貽天際在昔鎬京燕飲詩誦嘉賓洛汭觥觩史傳盛事溯軒皇之張樂紀蹟于容成即陶后之斟膏授籙于籛子是以鄴館著抽詞之美柏梁誇儷句之能如澠有唱侯服尚興廻波作詞後王不鄙豈有珪璋韎韐同在游歌嚴樂淵雲竝叨讌賞而不矢音于髙岡稱詩于華薄將使衮裳筐筥無須采菽為吟陳饋分饎未見其桐作誦南國鮮鱨鯊之可麗北山乏杞李以相歡則是式金式玉在型民無醉飽之心而如阜如山疑天保缺岡陵之祝亦何以俾匡時之佐負鼎爼而説王功嚮化之民援土桴而歌帝力是用捃摭荒蕪對揚優渥借東頭之賸管紀西囿之鴻恩臣竒齡不勝踊躍歡抃稽首頓首而為之賦夫以台室冲嬴之㑹天街晃朗之辰六合八荒受治九州四海稱臣僸佅有同聲之俗黎羅無抗景之倫前年楚蜀俱定今嵗羗髳盡賓顥土之媪輿既闢明堂之王會應新爾乃君儆無虞臣歌訪落上法天行下導民瘼昕切求衣宵戒聚柝利在必興疑則廢格喜豢鵷鸞怒翦鯨鰐田董甾畬室務丹雘在宮在府一以振作聖心乾乾既勤且恪翻謂臣工勞者惟若從來官師規用木鐸溫綸諄殷有如砥錯將藉游豫庶展酬酢爰設酒醴相與宴樂時則攝提初指乎金方夷則乍轉乎銅律清露徐塗乎階除凉風時起乎天末皇帝御少皥之宮臨蓐収之宅將以理白藏調素節司秋啟駕顥正按法時惟秩成道在相月霜柯澄鮮清景渙發瞻上林之􅕜㙷兮睹太液之滄茫迤三洲之藻薄兮揚萬頃之波光石鯨偃而低掉兮湖雁飛而南翔顧隰荷之赩翕兮喜臯蘭之正芳嫓千葉于華井兮滋九畹于江湘佳人掩其翠葢兮君子發乎幽香雜鳬茨而暎蔚兮拔藏莨而獨存于是俯拾虹梁傍依璚樹雕航崜嶬紼纚廻互汎漭沆之流波向蓬萊而問渡旌銜鳯艦之垂竿有龍綃之布駕雲母以迎風輯榜人而擊素拂出水之菰蒲起前汀之鷗鷺林間敞殿齊明雲隙危樓㣲露仿祈年之在前盼函德而難泝總蒿宮之既成猶采椽之如故渚雖轉乎滄浪石未移乎灎澦任錦䌫之所牽望瑶臺而不知處爾乃葱綾雪麗貝錦雲明天孫剪就鮫人織成八蠶竝澣百䌰齊縈團花間綴繁繐相生繢或朱而或黑絲一縱而一横絢播龍鱗之彩纎如鴻翼之輕覆黄羅于玉箧開畫袱于金籯揭尚衣之記印罥長籖而署名襚以表乎貞素綺乃發其崢嶸溫比毳旃之荷寵來華衮之嬰較翠錦而自失何盤雕之可營若夫掌和受齊大官奉饍鬴有鉶芼之羮案設楚苗之饌割鞮海之鮮蠡醢藩園之斥鷃煎惟芍藥能和腊以萱蘇為薦接雲鴻于罼羅驚霧豹之芻豢象膏白以瑩霜猩脣紅而染茜矧鳯液之嘉魚為靈沼所僅見范鱗甫躍于梁詹餌依然在線分鰓雜蘆筍之枝切鱠落桃花之片爾乃採江陵之藟以為虀淅梁山之黍以作飯玉菽星攢金麩霧散擣嬰葅于紫海之泥濯籠餅若春江之練馬􅀈羊酪覺甘露之俱生雀舌龍芽雖厄水而無患况夫珠林塏􅀈布以氍毹銀塘緯絙青幢是舒太清之酒灑如珍珠瑶漿玉醴瀼瀼露濡金盤甫繼雜出雕觚居然大斗以燕以娯監正屢勸仰傳聖謨謂此旨酒好樂不渝有即湑我無亦可酤不聞晩近猶有賜酺金門下士幸非淳于張昭雖醉容止自如起拜稽首不掎不扶含芬咀滑拊躬而思皇恩灝淼真如江湖獨憐小臣何德當諸乃企淵淪之深廣兮嘆滄波之不測被翠幔與碧衣兮想瑶池之所植渺秋風之䬀䬟兮澹曉露之霢霂上有蓮房之戢戢兮下有藕枝之濯濯外備七星之羅胷兮内含衆竅之在臆詔其遍賚此臣庶兮匪止為佐是酒食一片固足消疴厲兮三漿可以解鄙嗇獨是菂藶之周通兮即汙泥亦不費拂拭宛髙節之多梗刺兮亦素絲之能直雖其心苦之自知兮乃根柢而見牙角苐湛敷之當矢報兮兼禕惠之不宿謹捆載而親捧持兮慢縮滋而破薏念此涓滴之難嗛嗛兮于眇忽乎何力乃錫予之有加而無已兮佇滄瀛而曷極湯泉賦應制有序臣謹按遵化湯泉在州北福泉山下眀萬厯間始甃文石為池分上下二層而覆以房塞則充之决溜而更之亦粤世祖皇帝嘗灑濯明徳而坐澡其中銘盤之後爰築宫焉今皇上純孝曾迎奉太皇太后養滌聖躬㑹康熈辛酉以仁孝孝昭兩皇后山陵之役敕扈從諸臣仰瞻其下併令賦詩勒之􅑐户臣竒齡于沙河迎駕之次不揣鄙陋亦拈筆為賦以慈孝並隆甘泉呈瑞八字作韻其詞曰毖彼靈水厥名神泉火生自地源通于天合徳在坎離之際棲神介丁癸之間名八柱之要穴實三輔之東偏控之而關塞可守仰之則園陵在焉葢陽氣之回原有黍谷星精之播隣于玉田或上瑩而為飛霧或下徹而成通川其灑之霎霫儼若霖霤其氣之羃䍥本非雲烟乃觸石而䨕注遂如湯之泳漩堪爛毛與瀹卯亦煮絹而濯弦手甫探則寒冽減身已溉而痱疴痊是固焦釜之所不能沃又豈神炭之可得而煎爾乃上轉翠華下承彩衛帳殿方懸巖阿未閟浴日池邉流虹天際虎躅泉來鷄籠潮至回沂上之歌修洛川之禊慶六疾之齊蠲喜百神之俱侍流惠澤于四噢之中播薫風于九環之内于是因山作宫就水為砌重門曲檻灑榻澡器兩湯供奉各有位置不翦不斵三古遺意鄙驪山之營陋華清之製減泛水之珠鳬却凌波之石芰祛醴泉于建武之朝决神水于咸康之世浮紋而綵繒揚其華拾級而雁鴻張其翅恍咸池之自温非神鼎而長沸固井冽之能春抑滋泉之多瑞至若虎鬚初射蟹眼未烹山含玉潤水作金聲路移仙蹕雲擁霓旌苔衣銖薄瀫被紗輕露緣嵓而乳墮日瀉影而珠呈沙白而星榆墜莢波頳則山桃落英永信馭金根之輦中安駕紫罽之軿問起居于長樂請湯沐于慈寜秉璿燭而瑶池汎雪褰雲簾而華渚流星翬翟舒光覺金壺之燦爛璁珩解珮恍玉液之瑽琤保養聖躬祓除久傳夫河洛澡溉明德混澣已接于蓬瀛遂使上谷流銀之窟漁陽灼水之潭炎質藏暉之壑䝉情出險之嵓石分幨而倍紫水洗髲以增藍勝盤盂之取潔比沆􅀈之能甘芹捲􅀈瓏之帶蘋抽瑇瑁之簪龍鸞之所自憇鱗介之所不潛扶輿因而上届和粹于以中含烟已消于銅浦汞遂積乎鉛嵐白􅈨漂而逺散硫黄爇而下湛王􅛫藥石之頌張衡珍怪之談蔑不遐慕溯洄近思游泳滌慮清神除煩却病測深淺之無端擬寒暄而莫定指玉酒以善誣謂英泉之難並滑如雍伯之脂清似軒皇之鏡經氷雪而彌和汰泥沙而愈浄能厯坎而守沖自虛中而外映况夫一人以錫類為孝兩宮以解澤為慈瞻上陵而臨幸詔侍臣其觀之搴五花之藻井挹三露于蓮池玉龍蟠而妖矯珠雁列為參差想日馭之每住盼天光而自思儼淑氣之頓至捐煩襟于此時何恩波之下浃似闓濊之旁施紫雲生乎玉牖黄沫溢乎金隄臨清流而湔胃俯崇岡而振衣雖子雲之獻賦無以嫓其光輝豈長湯之十六可得而盡其漣漪爾乃接浪雲川通神員嶠屯轉三河衛連五校綵仗常懸紅旃逺照觱沸一泉永無旱澇土蜧鮮躍天馬未蹈春風乍來人跡罕到導穿石之光發藏珠之竅時祲可以漸消民瘠于焉得療推國母之宏仁廣聖人之純孝豈徒遠飾游觀邇資聴眺尋源主簿之山試浴呉郎之廟氿泉上下攬新陽玉女之裳雲氣低徊窺姑射仙人之貌又况溫湯扈從不是離宮寳慈臨御全非濯龍幔城相接暫轉新豐殫心孝養以瞻肅雍上池可飫仙源自通維此泉水産在無終橋山上寢虔思有熊矧當嫄簡同啟龍輁遂褰鳯扆爰駕豐隆他時化浹煌煌東封千乘萬騎諸方景從麟游鳳至山髙澤容捧大安之輦聴長樂之鐘潄瓊漿于蔤􅐗採甘露于芙蓉搜銅井于幽薄駕漆船于遠峰嶂啟萬年之碧花開千嵗之紅紀岣嶁之沐浴欲簪筆而安庸西苑試武進士馬步射賦應制有序自古文教之興必有武備至治之世不廢兵革故黄帝設縉雲之官西伯拜非熊之將彀弓日下官可射烏征楛蠻中庭來貢鳥我皇清肇造方域廣被九有遂下郡縣以致四訖初間神武開國陟禹方行繼之叡文承厯紹堯出治毓聖德于少陽宣哲猷于元輔校文講藝之官既集班聫欵關聚柝之臣復走闕下然猶四征六伐遠過洞庭五壘三門長驅沫若日聞獻馘之令尚以拊髀為懐乃倣唐代期門之選六郡咸臻爰使諸方教押之英三班入試翹関既舉不用馬槍長垜能嫻觀其步射當此屠維恊洽之嵗值兹元英在朔之辰上幸瀛臺實惟西苑親觀較射以當臨軒恍旗鼓之在前躍闕二字而奮起盤旋金埒馬散桃花送去銅竿手攀楊葉海西侯之千里盡是名駒奚康生之八尺無非彊弩梅間貼鳥能驅紫燕以俱飛簳裏糊魚更望丹烏而釋步則是鷹揚所至雲滿三驄猿臂能伸日穿五甲毋論争先控鬛已過蕭梢縱使退而釋弸原非鏁換是固登臺九日不足誇戲馬之雄曲水三朝未可擬射堂之宴者也惟時衛士許載斾以咸觀乃命詞臣各抽毫而作賦于是時方陽朔律中應鐘勵節在水執權司冬文治既浹武功聿隆帝圖逺廓聖德謙沖嶽瀆效順荆蠻來同甫復甌粤旋収僰笻宣夜挈壺辨氣吹銅乃思召虎爰占非熊天人向背偏伍彌縫曰有武試馬步以通因開桂苑特啟蘭宮雲斿揭地星旌蔽空句陳五衛崇臺九嵏呉亭射虎夏后養龍平池浴日圜橋跨虹乃謂多士校武其中緬蓬瀛之瑶島兮闢太液之鴻濛建露臺於平籞兮接芳林于上墉飾欄杆之綺麗兮列草樹之青紅溯璿宮之窈窕兮合藻殿之玲瓏布修塲以檢校兮觀多士之蘴茸于是寓陳于人天之間閲技于巧力之際適干戚之乍揚敕韎韐之咸備騎士有公孫之徵校尉喜蘇建之至祛永隆䇿武之迂畧景祐授書之制原非尋橦舞鏇之觀絶異超距攀繩之戲跨蘭筋而驗其短長拭茨菰而較其鈍利使宰輔皆曳珮以從飭詞官亦槖筆以俟聴鼓鐘之既作爰載簿以審視乃控善馬云自月支渥洼以北越睒之西是羈是紲以驅以馳足如翻雪翼可乘霓騁流光于疋練按舞節于傾杯楚莊裂文綺之帔王濟拭連乾之泥散九花于黄金之陛逐八駿于白玉之墀曳緑尾則碧絲指地霑赤汗而紅蓮繞蹄霧鬛風鬃既已遇方歅于冀北流金噴玉恍將駕西母于黄池乃復彎弓似月發矢如祔省括而釋决拾以注矯並繁弱疾過灩澦幹分七材訂有三互電景髙駝雲氣肆布鵠小能飛熊堅可度朱組未奔銀翎已赴弦帶管以俱揚馬隨弰而善騖呉太史抽蘭不虛瑯琊王射梅無數驚鷲翼之乍來解魚文而遽去麋筋不足助其力烏號無所施其嗉但望日以穿楊儼方春之落絮燕角開則海鷂翻身鵲血濡而山猿却步仰㦸而發奉先自有其機飲石而没李廣不知其處又况分曹而入偕偶來前審固久視和容不愆獸堋逺列虎韔髙懸量當百步樹以萬旃香象作弭鵾雞在弮駿馬解絡嬌龍不鞭珠䋲繚圃金鋪滿埏箘簵牽合矰茀糾纒舍釋欲直持挽必圓縱不虛鏃發即應弦雖無七札已中連錢考鐘隱隱伐鼓闐闐簳含氣而得響羽乘風而作烟邁漢代材官之選勝熙寜鎻試之年于是六郡良家五陵俊彦解罫懸衣灑塵拭面如廻馬邑之兵甫罷龍城之戰牽紫駞而廵唐負青莖而下殿至尊含笑歡然式燕白虎鳴秋黄龍晝見星繞靈旄雲馳寳幔六武按節八風合變忻猛士之得人羡勇功之可戀且廻鳯闕之斿更啟爵園之宴較記註於當前每咨嗟而稱善西河集巻一百二十六
