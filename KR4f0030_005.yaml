body:
  text: 西河集巻五翰林院檢討毛奇齡撰奏疏翰林院檢討臣毛奇齡謹奏為恭進韻書事臣竊惟古王三重一在考文周官六書首重韻學葢審音定律一代之典文繫焉自古韻不作魏晉以降各創為律韻行世雖其間遞有沿革然因陋就簡往往標之作一代法式故唐用切韻與五經同頒科塲而宋造禮部韻略特照九經例頒行天下眀初甫定鼎即命詞臣宋濂等輯洪武正韻一書著為律令夫國家大經大法豈無更重于此者而於此急加意哉誠以同文之治大權所在不可忽也今天下車書一家滿文漢字昭然畫一上自章牘下逮券契皆歴歴遵守獨於韻學多未定者今所傳韻書共指為沈韻非沈韻也又指為唐韻非唐韻也沈韻與唐韻失傳久矣竊考今本係宋南渡後平水劉淵所作而理宗朝為之頒行名壬子新刋禮部韻略乃自元迄今不知何故竝傳為沈韻唐韻而遵行至四百餘年以訛傳訛從無刋正其是非者我皇上聰眀首出開闢景運於四征勿庭之日即為文徳修來之舉命中外大臣各舉文學而親試之一倣唐宋制科舊例分别等第悉授舘職較之有司鄉㑹諸科頗為鄭重乃臣等菲薄濫叨盛典即當日所試文韻或有失押重煩我皇上親為指摘如旗旂蓬逢諸字無不立加剔發升降甲乙是皇上生知天縱萬㡬躬親尚於學問嫌微所在剖析毫末而臣等以庸妄當之寧不自愧因於奉命修史之暇纂成韻書壹冊悉仍平水舊本而叅訂之擬名康熙甲子史舘新刋古今通韻其曰康熙者尊朝廷也猶之明韻冠洪武也曰甲子者記時也與宋韻之稱壬子無異也曰新刋新正也宋韻稱禮部新刋金韻稱泰和重刋皆是也其曰古今則謂律韻與古韻也亦猶元之稱古今韻㑹也第臣纂此書非敢自信祗以考律審聲古今所重謬承著作豈可私行因恭呈睿覽上求審定儻萬㡬之暇一經指析將見七政所照六幽盡發闢千古之妄定百世之準昭一代之典將見中庸之所為三重周官之所為六書互相炳曜以垂於無窮此亦補裨教化贊襄文治之一端也若夫考核多疏引據未備明知因端竟委全藉踵事惟是遭逢聖明千載罕覯當此堯舜之世而不使蒭蕘一得及時奉獻徒濫厠從官虚縻嵗月豈不可惜因冒昧呈進謹將抄謄所撰韻書分為十巻裝成肆冊共壹函隨本同上惟祈皇上裁擇施行翰林院檢討今在籍臣毛奇齡謹奏為恭進樂書事臣竊聞聲音之道與政相通故王者功成樂作則必辨析宫商考定律吕以求聲音之所在凡以為中和之氣所以格天人而和上下非偶然也自古樂淪亡聲音之不講西京以還于今㡬千年矣臣幼時聞臣父敕贈徴仕郎翰林院檢討臣鏡每言從祖汀州府同知臣公毅往從新建伯王守仁征寧庶人時所俘樂工得唐時五調歌譜其中稍稍言五音七律四清二變九聲十二管諸法無非皆聲音之事與舊朝所載樂書徒存備數者大不相同而惜其書在王師下江南時方馬遺孽各東渡焚刼而其書遂亡顧臣父臨殁猶執臣兄手嘆曰聖人生古樂興今聖人已御世三十年後當必有起而興古樂者汝其識之暨臣倖通籍謬叨從官嘗于侍班之次得竊聽殿上中和樂聲暨黄門皷吹今所稱丹陛樂者刻記其音節而未之析也㑹西南蕩平皇上命詞臣改定樂章時掌院學士曾以樂章配音樂下詢臣具議一通但論篇次而未嘗一及歌詠之法然臣嘗于入直之暇竊入太常乞觀宫縣諸法物親得跪睹世祖章皇帝所改塤篪二器并得聞樂工竊言皇上曾以籥􅐟器色中髙字未清為器不中法深嘆聖人聲律身度其能審聲知樂且因律辨器如此歸邸踴躍謂聖人既出先臣之言已驗惜其法不傳不能備述以當一得且日見皇上朝䖍夕惕萬㡬不暇或不宜以制作大事重肆溷擾故待罪十年以至乞疾終不敢有所妄獻而罷第乞疾之夜夣臣亡兄仁和教諭臣萬齡忽呼臣曰大招云二八四上樂之經也汝知之乎臣醒而記大招則原有二八接舞四上競氣之文而不眀其說或者謂鐘磬二八笛色四上可以正樂然究不知呼臣之意之何所為也今年三月臣就醫㑹城伏讀邸抄知皇上御門偶與左右儒臣示空圍之準指損益之理辟蔡孟三九之有差補遷固八生之未盡所云四上即一三也徑一不足而圍三有餘則四以上也所云二八即復八也隔八相生而至八而復還其始則二其八也聖人將出則鬼神通之皇言欲發則鬼神先吿之覺考律算數茫昧千年而先使舊朝之殘譜暗啓其機審律定聲運㑹將開遂令羣臣百姓天下後世並得聞皇上之話言以大昌其說此固黄虞並見之秋古樂再興之候也夫因端啓廸而必集羣策以共成之者王者之體也承在上之意而務推大而闡揚之以期至于盡為人臣者之職也今聖諭煌然宜有所承而微臣之職又忝在記述雖病臥里閻而心縣魏闕槖筆摛文未敢少諉因祗奉皇言而由繹之惟尺􅕛有不齊則于是無截管之疑惟宻率有不符則于是無累黍之弊惟相生之在聲而不在數則于是有四清二變五聲七律之調惟推律之可言而不可行則于是有十九宫二十四調六十律一千八聲之誤則是皇言一出而其聲已定雖微臣謭陋不足以測髙深之萬一而據所傳聞合之聖謨若于斯有相發眀者因于伏牀之頃口授臣男庚午科舉人臣逺宗把筆編次析作八巻裝成二冊共一函名為皇言定聲錄恭呈睿覽并鑒可否乃臣則更有進者從來創建之興闗乎運世曩者五㑹遞乘勝國在土準之鄒衍相勝之數則本朝以木徳王何則木尅土也若以劉向相生之數推之則宜用金徳以金者土所生也乃開國之初發祥東北於方為木於位為震於律為太簇而金以西行而與木相抵故商為金而太簇本木位而仍為商音則是木徳金徳正與開王之所基兩兩相合然而震為雷雷者聲音之發商為金金者聲音之成而太簇以人聲而綂隂陽該金木以兼綜乎聲音之要是古樂必興固開闢以來一大元㑹也至若皇上神眀天授原為開闢以來集大成之聖金聲玉振端在今日因將所録樂書謹匄掌院學士臣張英代為呈進臣臨呈不勝屏營激切之至翰林院檢討今在籍臣毛奇齡謹奏為恭進聖孝合錄事臣自本年正月十日接得府縣官吏傳帖恭迎太皇太后哀詔即隨將軍巡撫各衙門以下暨在籍鄉官一同設位叩頭發哀禮畢臣復于草次俯伏哭問皇帝陛下起居備知聖孝無涯求醫步禱感動天地爾時即有里巷人民北嚮號泣恭紀其事者嗣後百日以内咸遵制詔但漸聞官吏居憂商農輟業皇上日侍帷宫哀毁踰禮却啜卧苫唾涕見血傳諭終服斷以三年羣臣交爭堅不可奪暨乎步送郊園親衛舁校宫門幕居較過廬次然後諸王大臣暨各部院司寺衙門以及太學生徒跪闕舉幡合請即吉上念天地祖宗付託之重下軫九州四海民物之大斟古酌今勉從衆請是皇上大孝盡哀盡禮既不泥古又不隨俗百凡因革皆有確斷制作之聖與繼述之孝兩兩皆見然猶于四月七日躬上虞衞山陵奉安諸禮竭盡誠敬在聖人大孝方畏人知而至徳感物㨗于影響臣嘗于即吉之後朔望詣學聽講諭讀法外首宣聖孝以宏教化紳士翹首轉相傳導隨有揚頌諸詞敷陳嗚咽臣因衆哀慕謹為彚輯旬日之間漸成巻帙竊思大孝性成超文軼舜近傷太皇太后撫育之恩即追念慈和太后襁褓之痛苦心哀思原有未可以示人者且孝治所及不闗播誦草野俚諺亦何能仰道百一惟恐凟冒聖聽反取罪戾獨是周文維則久列詩章大舜克諧亦傳虞史况臣職司記述分在敷文當此孝治煌煌溥天哀感之時而不為之導揚極盛反加諱匿是冒昧之情輕壅閟之罪大也因臚次諸詞去其草野媟嫚者合得頌若干首賦若干首詩文若干首雜體詞若干首彚成一書竊名聖孝合錄謹抄謄裝潢共若干冊匄兩浙巡撫部院臣代為呈進伏惟睿鑒採擇施行西河集卷五
