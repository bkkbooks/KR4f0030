body:
  text: 西河集卷一百二翰林院檢討毛竒齡撰墓志銘十二吳徴君德配傅孺人墓志銘吳徴君孺人以康熙三十二年十一月卒其明年將筮藏于錢湖之濵徴君自為狀示豫豫曰寧有周季自為文而猶待問者翼日孝子毅裕復持狀造豫請銘以豫與徴君同文會且同徴京師故通家也然而徴君狀已具豫又何能益一辭按狀孺人傅氏金華義烏人監察御史公諱巖第三女也監察公與徴君父宫允公諱太沖同以天啓改元覃恩貢成均後相次成進士好之為婚姻時國家方多事監察公知歙縣拂衣而流賊破長安江南之建號者且大婚詔選良家徴君年十三搶卒飾館甥拒之而未婚也會王師下杭州幕府籍搢紳之有名者鉤止之宫允與監察俱在籍中兩家聲相聞忽監察慞徨叩宫允門呼徴君乳名某何在吾欲一執手門者辭以扶侍太淑人乘夜東去監察乃仰天流涕不還顧脫之走金華與督輔朱君合閭左破産四募思一伸螳臂而東揚不守有告者曰金華破監察公已殉難矣又曰監察有三子而二從之死問其家何在不知也順治四年其一子偕弱妹扶侍太孺人來杭州徴君母張淑人哭迎之乃始草草議婚儀御以柴車縮屋為油燎倩淑人兄弟作賔客告于祖堂以家之不造六禮不具曾孫某同新婦某一切為婚嗣孫某屬某以告告未竟徴君偕孺人噭然而哭左右皆哭不能止宫允公嘗曰吾新婦姼姼提提吾見每憐之此非舅禮故常也吾撫孤而已十一年張淑人卒明年宫允公又卒孺人哭曰今而後誰惜我者方淑人病時孺人有身將彌矣暨卒而族人姻戚以婦車來者孺人悉主之哭泣稽顙不少休或勸以身解不應已而殰曰項以下皆折敗云徴君少儻􅛅家無管鑰宫允公鮮留遺惟故第一區在圈屯中生平服御珮玩無所賸獨遺書若干車躬自輦藏之衣浣敝窮日夜讀書每書必自首迄尾丹黃之既才髙寡可而又以牢愁故不自檢嗜酒所得賣文錢應酒劵去以故孺人終其身稱糟粳焉康熙十七年上開博學鴻儒科司空薦徴君于廷巡撫復奉吏部咨以徴君應而孺人難之脫左手指環約徴君指曰以君之才宜何所不得顧有大不宜於時者妾有三言規願君回環而熟念之一有酒過一言直一不謹于結納徴君以為然既而三相公重君名取君詞業觀之皆曰可日飲之酒暨試取上上卷而既而斥之不知故相公再獻之不得歸而大病孺人具慰之病不已自庚申八月至辛酉八月卧牀畫空能作賦日數萬言與客倡和不少誤嘗魂行户外穴牆穿槅見市中物自言曾渡江至淮多所見然而倚孺人為命眠潄唾嚏頃刻不可離雖行厠牏必與俱如贔與屭繩牀袽絮皆敗盡而賴孺人救亦竟起孺人寡所嗜針縷筐篋非先人面賜不取凡先人所遺篸笄悉推讓姑姊女娣不受操作拮據蔬食衣履變裏色然而親䣊之來寄者惓惓然徴君狀曰則亦非尋常女婦所能及矣孺人生于崇禎癸酉之七月距今癸酉適六十又一子九而四殤二又早卒今存者曰毅曰裕曰亮皆能以誦讀傳徴君學亦孺人教矣女八孫七女孫三皆具狀銘曰猗嗟孺人閨房姿兩家同舉婚嫁宜青白相顧無我伊館甥且飾淳于竒千門入箭五馬馳驟丁陽九廟社移石頭繼破臺城欹倉皇跳身憐總持擁師蕭勃將往依何人劫公賣犢希護軍既死及子尼選窗玉女方仳離元同家屬從嶺回荆門迎者衣裝齎告廟奠菜扱地遲宛如荒政殺禮儀棗脯欲獻雙涕洟况當歸馬包虎皮嚴城闕處環長圍圈屯故第夜插旗倚弓樓柱刀挂扉惟有十架書潛移所痛太傅喪墅西五畝不保甘棠非畫宫受弔杞殖妻傷哉夭血淹裙縗公孫年大牧豕豨一朝羔雁填門畿上書徒受三相知翻然歸卧南山陲入秦早巳炊扊扅歸來何用藏牛衣蔡人惡疾身不離為君翻誦芣苡詩暮年舉案勝五噫況經訓子長停機銀臺竊藥奔未幾松城將閉哀無期愀愴一展孫楚詞簌簌泪落長河糜泉門遂古千年思門傍有文應鑒之清故年貢士正白旗教習候補知縣卲君墓志銘君諱方平少與兄解元奏平宫詹君逺平同文硯宫詹君與豫以康熙己未同時舉制科嘆前代貢舉以八比定鄉會試士子失古學獨豫家藝習稍寬兄似宏與弟真菴皆足膺是舉而似宏即世真菴尚困于八比無薦者其所云似宏者奏平字真菴即君字也當是時子益思似宏而并知君非常人思一見焉暨豫請假歸值君以食廩之早齒未踰服官而即以年貢行省第君名解京師越明年吏部同國子考取君官學教習以候補還里子于是時始得一見君于會城之東伉伉然論辨而思深髙盻濶目舉春顔而納之明鏡之中子嘗曰士有學問氣每視時習為不潔豈其必有加于人而人自辟之康熙壬申君以補及赴官學别親知造都相傳騎羸馬踸踔天街間習而安焉越三年其子忽捧狀踵豫而泣謂君以官學教習盡瘁死顧屬纊時遺言齒髮歸故鄉儻胝以石得某數言書其隂始翕睫焉豫驟聞而驚驚而躅其足嘆曰嗟哉有是乎生平劌載籍斷韋絶摘穿穴列代諸版竹固已無所用之但工于舉文其視八比若斤鈇之脫于鼻若長竿巨絙之披拂于懸跟與鏇腹而所至鮮效甚且齎志以逮死豫所與遊比比是而君復蹈之雖欲不為之表之而安忍矣按君卲姓仁和籍其先世從餘姚來遷髙祖𢎞毅公與弟泉崖公在明正德嘉靖間先後登進士而𢎞毅公以都官郎劾世宗朝時相豫杖謫戌即以著書終其身今所傳𢎞道𢎞簡𢎞藝録暨學史會同諸書皆是也乃君當幼時父翼雙公為啓禎朝名士受知故經略洪君屢被房薦而卒丁國變屏舉業課君學古學曉鐘初動遽以杖叩柂家僮開扉君起坐幔間默料昔日所授書貫串聯絡然後納履入問安歷詢諸所習泛應如響自經史古文以及列代諸名集皆標舉新異即應舉文字亦必務去積習而後已嘗曰昔人之精藴于古為然今復竊以為能是所謂厭人之糟粕而巳庸詎知天地間有無窮之藴乎其學如此以故君出試輒冠軍十八補諸生十九受廩食于庠越二十年以年貢考官學補正白旗教習越三年康熙甲戌冬十月報滿以知縣用而是月病卒距生崇禎庚辰六月二十日共得年五十有五配馮孺人前壬午舉人野渡公孫女今壬子舉人奉政大夫晉階資治少尹真定府同知同野公女子二長錫瀛候補縣丞次錫周郡庠生二子與豫子同文硯學古今學吾見世學之日增也或曰三世絀志後必伸吾見二子之伸也乃為銘銘曰古學以四術其次探七録詞賦併頌語亦自三古作降此代異製經與詞賦兼假欲廢詞者請觀三百篇不謂後儒劣就經使立義仍得倣偶詞長股以為儷前代取士微條作貢舉法聖明思變更屢掣不得決因之起制科超越三百年誰料薦未博于是多遺賢君家舊簪裾世擅古今學立朝峻封章教孰習禮樂青陽入武庫應世惟一編已食下士祿且復貢限年對䇿天安門教習八旗下清晨跨官驢傍晚宿學舍以兹得憔悴忽爾齎志歿所學不得伸瞪視亦何説獨是翕瞑者全在一石埋首丘異延陵諛墓徼伯喈君今有賢嗣崢嶸立子舍華表留空題將以俟來者敕授文林郎沂州郯城縣知縣金君墓志銘君諱煜字子藏金姓山隂人天啓乙丑進士太常寺少卿楚畹公次孫也太常曾以監察御史充院使提學南京天官家云學使司文命當文昌六府而與斗下四星相表裏故太常所生子曰樞曰機曰權皆取斗星名而以伯星仲星季星分字之仲星次子即君也君生有竒表目黃而通瑩如琉璃珠闔睫光外射且一目有重瞳子會命名太常曰草以木盛木以火榮理也吾名蘭從草而諸子之名適繼以木今木盛又生矣諸孫當火行而是孫目熊熊然揚雄曰日昱乎晝月昱乎夜日月者目也昱者煜也當以煜名之馬玉起者君母弟也君母馬太君為萬厯已未進士江西布政使司參議芝嶠公女與玉起兄弟皆以能文名玉起有客從嶺來善扶乩能降神言于庭忽言君前身乃南唐李後主也後主見馬太君詞而喜之願為之兒苐惜是兒所遭逢遂不能逺過後主得乎戌失乎戌志之志之乃呼玉起命縳乩以筆書一詞去太常聞其言惡之曰山鬼粗知書彼知後主亦名煜與是兒同故妄及之耳誰謂山鬼敢言事及翻陸遊南唐書有云後主字重光則與命名取日月義同且曰煜有異表一目重瞳子乃大驚然既已名之無可如何值大清興仲星兄弟俱不出君年十九已能讀十三經及兩漢三國三史并八書矣世家子弟多以保家門出試不得已始強受舉業遂于是年五月就童試有名為諸生八月鄉試遽以春秋冠本房明年戊戌試禮部聯捷計自童試歷諸生舉人以至進士裁九閲月耳于是始歸娶其所娶者為順治已丑進士兵部職方司主事童在公女康熙二年除山東兖州府沂州郯城縣知縣縣小而衝為南北通衢上自州城以下接宿遷清河車輪馬蹄日不絶于路本縣糧少又驛遞多曠逺每藉他縣為協濟而濟不以時往往需本縣賠墊及事過詣所濟領銀輒掯不發即發亦不能如數前後逋欠屢經臺使者議謂當設腰站于劉馬莊而地介兩省視之若秦越因之騎縣馬越站馬罷無補乃力請具題改設郯站于紅花埠設宿遷站于㟃峿兩所需銀計九千六百兩嬴皆銷之本縣無俟撥補而縣經兵燹後田疇荒蕪一遇暵潦即攜妻擔兒遁他縣既屢缺正供而君又以惠為政勿事箠楚甘心居下考而監司之隂鷙而饞者又惡其無所餽吹毛索瘢賴臺使憐之數與為平反而展轉益深誰訶者踵至乃終以負租褫其官其所闕額或抵兑或那用或開銷不準或民欠無可追以至站銀缿銀自二年癸卯以至七年庚戌凡六年之間鬻家産以償至一萬餘兩嘗飲酒數升涕泗被面嘆曰舉世皆醒何妨獨醉乃乘醉捉筆便為詩歌遇隟板賸紙及粉牆堊壁書寫殆遍其為詞悲涼妙麗漻然若哀琴然非其意也嵗壬申同年為京朝官者多貴顯念君貧不得志招來京師時吏部尚書熊君兵部尚書杜君户部左侍郎王君禮部右侍郎王君刑部左侍郎鄭君刑部郎中潘君館君于邸舍日飲以酒居三年以族人有居天津者過飲之夜起長嘆書數詩于壁遂卒君生于崇禎庚寅十一月二日卒于康熙甲戌十二月二十一日享年五十七先是乩神降庭時謂得乎戌失乎戌按後主以建隆三年壬戌正月葬元宗後始由吳邸正位號至開寶七年甲戌宋師下江南乃削開寶號降書甲戌而南唐遂亡今君以戊戌通籍庚戌去官而天津之逝則正在甲戌是戌得戌失兩兩正同至其所書詞有曰天津橋上望歸舟又是黃花水落秣陵秋以後主幽洛陽與君遊京師同一客殂而燕之天津猶之洛陽之天津其所謂招魂望鄉者黃花水落兩候適符也嗟乎異已君所著詩詞合十二種俱未刻馬太君詞有遂間堂集行世君每醉必讀一過子埴能文又善繼志乙亥春徒跣走天津負櫬南歸葬山隂之土井山而屬豫為銘銘曰嗟君異表實惟重光前身所自安定郡王亦越千載烏飛兔藏重以詞孽結習未忘捨筏遙海探環空桑獨憐宿慧博通舊章間著詞賦方駕齊梁翻以作吏如羇鎯鐺雄思傑彩同為銷亡古重緯讖其説不彰如何閹茂相符混茫燕京之客猶之洛陽天津遙遙千秋望鄉瓦棺土井兩相埋藏所不埋者此晝夜光誥封奉政大夫直𨽻順德府同知李先生墓志銘先生諱采蘭字秀揚世為濟南長山人以避軍籍遷新城之石家寨貧而耕田萬厯中仕版重科目讀書補郡縣諸生即超然人倫間會鄉舉諸生歷録赴試者道經新城衣篝書簏厭四蹄前來雖鳴金張黃解帑缿東西過皆避道左諸生角巾坐廣輪談笑慷愾陽陽然先生望見乃長嘆棄鉏而歸謂何宜人曰生此六尺軀不能讀書而弄鎡錤為先是先生數嵗時曾就學里門已讀論語未竟讀罷去至是二十一嵗取向時所讀論語迫視之茫然何方濵先生者宜人兄也為新城諸生有名迎之來具告以情方濵先生大笑曰耕田尚不給一旦徙去受儒術能得食乎且子何年嵗而可為是曰吾志決矣遂強留方濵先生于其家顧無書就市粥敗書糨綴殘缺而重編摘之讀終月以之食不能留方濵先生方濵先生終謝去先生乃益自發奮忘寢及食晝樵薪于山夜㸐薪以當膏鐙宜人親灌園佐之嘗對書膝牀口訟心詰憤悱所極設辨難甲乙反覆不得則視注又不得則視他旁説然後取舉文與經文對勘備觀其反正離合之迹踰月竊效之作舉文懷而見方濵先生方濵先生大驚曰有是哉是果子所為耶語曰有志者事竟成信乎傳有之思之思之鬼神通之自非憤發于心劌決其神明而洞開其元其能驟通之如是哉于是人共稱先生有志逺近聞先生如此謂先生何如人願一見先生里中小兒漸有向先生學者東武家請先生往教會寒沍以渡濰水裂其足先生乃嘆曰吾讀書未能榮親而反以父母之體行殆非孝也遂不往人多就學築書室舍傍既而學者日益衆先生以無師自傷故苟有教人每不憚身先劼毖乃學本心得指示親切其善入人如袒襟披箭洞其胸而貫其膈以故受教者輒有得去天啓元年先生始占新城籍補諸生髙等而其諸子受教者遂相繼起崇禎十五年先生仲子鴻雷舉于鄉大清興季子鴻霔以順治十一年舉人中十七年會試而鴻雷之子嗣真又以順治十六年山東解元至康熙三年而成進士先生曰當吾棄鉏時不過欲得明一諸生耳今為老諸生二十四年縱未通籍而子孫之通籍者有人于吾願足矣遂受鴻雷始封官以終其身初先生讀書中夜見有丈夫者指示之且云大禹惜寸隂周公坐待旦醒而書其句于門至是雖却試猶手不釋卷卒年九十五康熙戊午季子鴻霔以內閣中書典試兩浙家之羣從有幸出于其門者至是筮葬援通家之誼屬豫為銘銘曰以耕而讀前有兒寬後則有皇甫士安而先生乃厠身其間雖却農而仕者匡鼎最著而先生復矯蹇而不為之官是古稱豪傑之士無文猶興而先生真拔擢奮發而無假于羽與翰縱或叔皮之子文能逮父仲弓有孫不必慙卿長而士有微尚即返而仍藏之石紐之岡有莘之野而又何間然誥授奉直大夫都察院湖廣道監察御史何君墓志銘監察御史何大夫以巡鹽河東卒于官孝子方羇丱不能請銘尸部尚書梁公以舊堂上官為之手題其旌銘載之而南豫時職史局出郭奠生芻旌前視解纜行距今一十二嵗首矣甲戌之春豫赴義合肥孝子謁豫于杭州不值也既而豫歸杭以避病入郡孝子重謁豫捧狀扶服謂先大夫墓草宿矣而薦牲之石尚闕書焉當順治甲午先大夫始貢于鄉與先生伯氏為同年生嘗與先生主文會手銅槃歃血屢矣先生文章震環海獨不能為先大夫具鋟版之末時有介之者進而曰狀云大夫當贈公亡時值清興之初避兵始寧甫還里棺衾裁具不能致美好族父有川木俗所稱沙枋者價溢二百鏹大夫泣跪族父門不起遂貽之此已事也今其子苐跪不起先生忍無以應之乎豫曰何必然憶豫與大夫遊時裁弱冠王師下江東豫避兵走南山而大夫奉贈公居始寧嵁中渡溪採葵值方馬潰兵東奔者略始寧諸山遇于溪揮刃如雪大夫障贈公以膞承刃哀祈之兩膞幾斷豫嘗以孝稱之及大夫為户曹郎會康熙甲寅有詔撤三藩尚書梁公受詔使廣東撤平南王軍大夫偕行時為尚書司官至則王拜詔起坐序主客禮無一言逮夜環帳房館垣却刃服弦弓築矢于旌門鼓三下聞介馬聲大夫曰事棘矣卧起叩尚書白事耳語移時出㸐燭草疏鼓未絶草成詰旦王率世子奄笪公并諸將領詣館間瞛目露齒語􅊱􅊱來前未就坐齊聲訴啓行艱難尚書遽起拄司賔口曰止拜詔尚未竟而遽言啓行何謂也吾陛辭時上密諭留王謂王勞苦異諸藩當永鎮南疆而昨以通詔不可異故俟兹密宣今所撤獨平西耳王未行也曰啓行何也王錯愕各相視曰何信乎尚書曰脫未信手自裂其懷揣疏出懷間曰此覆疏也請視之王與諸將傳視畢尚書曰吾已宣諭訖可以覆矣叱具桉鼓樂遽拜使使負疏行王乃色頓下率諸將詣桉歡謝奄笪徘徊間王囓奄笪指曰幾負聖明遂謝訖張宴者三日越四日而平西反報至尚書顧謂大夫曰此行不辱命君之力也豫嘗謂大夫讀書砥名節得此二事其于子臣間可以慰矣然則豫之碑之者雖微請猶將為之況請乎大夫諱嘉祐字子受世居山隂之峽山明正嘉間有工部尚書者與其子刑部尚書同官于朝俗稱其父為老尚書老尚書三傳而參政繼之至大夫之祖以世父書臺公貴贈前朝監察御史而大夫之父贈公則又以大夫貴贈監察御史一時三世皆侍御人以為榮大夫由甲午拔貢知江西奉新縣事以尤異行取入京擢户部廣東司主事監督寶泉局癸丑京察一等稱職時本部江南司闕員敕大夫兼理會頒撤藩詔敕以尚書官屬陪使廣東及還用尚書薦進本部員外郎旋病歸起補本部江西司奉使監蕪湖鈔關使竣升本部山西司郎中值覃恩授奉政大夫其得稱大夫以是也新例年終令舉劾賢否以定黜陟尚書念使廣東功又薦奉旨改授都察院湖廣道監察御史巡視西城辛酉秋監順天鄉試明年特奉命巡鹽河東壬戌十月以病卒大夫治奉新不取贖鍰每嵗終移他所嬴錢解之曰暮遺且不可況晝劫乎豫嘗過奉新見民間每里各有倉詢之曰縣漕輸省者舊例設一倉縣城俟報滿統解省而縣所轄十二鄉在萬山中近省而逺縣解省逸而解縣勞且解縣則耗羡生焉大夫令每里置倉并選里中之耆老有望者專董之比收竣趣徑解省民大便至今猶稱之曰何公倉云大夫卒于康熙二十一年十月二十八日距生天啓四年六月十六日享年五十九娶劉贈宜人繼陳封副朱生子二曰偕曰載皆國學乃為銘曰於乎大夫峽山之英出即曜物如甫曙星當其友善負美子名洛濵修褉滄浪濯纓忽丁陽九與喪亂并奉父嵁窞避兵始寧江革背負潘綜手拯賊衆相顧皆以孝稱爰赴四科曰升一經初侍建禮旋厭承明百里授治三河表能與春比和如冰斯清禮教用浹金錢不行遂膺詔取為民曹卿年計嵗賦一惟公平雖當議租不使耗盈重以良使奉君命行應變不辱姦回皆驚因轉右司兼遷南廳繡衣飾節烏臺著聲執法殿上巡鹽河東瘁于官守奄然病傾溯其世裔嵬嵬門庭上承八座下接三丞今兹啓後詩書滿籯孝子雖幼方幾有成賢聲懋迹載之常旌搜其遺者庶視此銘西河集卷一百二
