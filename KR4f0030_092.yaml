body:
  text: 西河集巻九十二翰林院檢討毛奇齡撰墓誌銘二誥授通奉大夫廣西布政使司布政使顔君暨誥封二品夫人田氏合塟墓誌銘君諱敏字乃來别字澹叟曲阜復聖裔也其先在明初有以軍功襲錦衣者籍宛平為宛平顔氏君少為諸生與其弟諱斆字敷五並名㑹鼎革開科君出試中順治乙酉舉人當是時贈君鳴鴻公娶馮太夫人生君而卒獨楊太夫人生敷五者尚在堂而家貧時君已娶田夫人日辧菽水事楊太夫人不給君乃就新安教諭思匄升斗而臺使以君賢薦會己丑大比君于正月遷閩縣令將領憑乃復詣吏部堂請㑹試部以非例沮獨掌堂者奇君言許之時君弟已先一年中順治戊子舉人與其兄同試春官而君成進士授刑部主事進郎中海冦闌入内江江介士大夫多為所誤興大獄君典江南司江南臺使奏報下部屬君定爰書君披牘着曙不寐必求得其可以生者入報每力觧即迕堂上官不顧獄藉之成乃以一麾遷池州守池故宋包拯所守州也君至拜拯曰豈有繼公官是邦而敢負公者三年考第一民思君如拯竝祀之遂遷湖北按察司副使上荆南道㑹義王孫可望由西南來歸我兵迎勦者大將軍貝子固山以下皆牧馬荆南而以供億厚責君君為廣儲偫蒭茭糒糗一切支放皆有法軍無譁者既而遷本省布政司叅政分守下荆南道大經略内院洪公夙知君至是以君能題君貴州按察使攝布政使事時大軍進滇者必道黔値黔飢斗米錢十千前此轉餫每至黔以道險手牽足挽幾三十鐘致一石因改黔秋糧令折本色至是民不堪土司奔逃君請之撫軍仍改如舊賦征銀民便之不數月即遷廣西右布政使隨以轉左改陜西君赴陜至岳値弟敷五亦由刑部郎為岳州守楊太夫人正在署君不見有年急欲見楊太夫人趨而入楊太夫人出迎之遇之屏門牽衣啼遂留岳與弟共被伺色笑浹旬終以限嚴不能别竟奉楊太夫人西入秦時兩湖未靖慮楊太夫人或念弟每當令節田夫人必謀之君假弟家書從洞庭來道無恙率以為常康熈二年王師征西南大㑹各路兵分隘進勦而大將軍獨取道關隴士馬之集興安者日以萬至多不給君立疏險易别水陸措夫辧饟按程而應之事平上嘉恱㑹覃恩授通奉大夫封贈召回京改補適弟從岳歸仍共被事楊太夫人當是時君通籍才十餘年而九遷其官所至享能名且主眷位駸駸上他人處此鮮有能却足者君乃與其弟家居闔門色養者十三年康熈庚申君弟起四川叙州守而君以八桂亂大兵方南下議非重臣轄其地不可特詔君開蕃廣西時田夫人以疾卒不顧行大將軍頼公統征滇兵從南寧道入藉君籌挽得底定而大軍告㨗舊時定南王藩下官兵家口約數萬盡遣還京凡軸轤長年無正饟可辦君立出帑金僱募逮起發而後捐輸以補之乃以力瘁并病瘴上書乞身而代事者以薏苡危君君嘆曰吾通籍以來家居與游仕相半惟此國與家兩不能已今主恩究未報太夫人在堂不終事有弟在川而竟不能與一訣憾可知已遂不起君生于萬厯丁已正月八日卒于康熈甲子四月二十六日年六十八田夫人者世襲錦衣仰吾公女賢而孝善事楊太夫人而先君逝生于萬歴丙辰十一月二十六日卒于康熈庚申三月十九日君兄弟三人而伯早世生子二不禄因以弟敷五子伯虎為之後伯虎官監生候選兵馬司指揮娶顧氏太常寺博士雲門公女辛丑進士現任江西貴溪縣知縣啓祥其兄也女二長適丙戍舉人河南汝寧府知府濟之臧公長子現任江西贑縣縣丞炎次適荆州總鎭子淵馮公次子山東平度州知州庭棨子淵故涿鹿相公孫妾嚴氏生女一幼君世本聖裔而兄弟赫赫時聖裔在朝有太史天官大夫兄弟最名而君兄弟在外為方州大臣與之埒乙丑嘉平月將合𦵏君夫人舊阡而孝子伯虎介天官大夫拜予狀而謁予以銘銘曰覬禄仕娱親顔乃以王事而厠之戎馬之間雖持節三苖開蕃百蠻公之功在四裔而公之志仍不在一官是以白雲在望不無嗛嗛而有弟和恊且隔之蜻蛉之川庻子弟之子而内闢宫竉外奉几筵曰此君與夫人之阡也而于以大其傳敕授儒林郎山東都運分司運判俞君墓誌銘山隂兩俞君工文章謂易菴與余菴也易菴以儀曹郎死于官而余菴入成均殫志舉子業歴癸卯丙午壬子三科屢薦不得㑹八旗教習員闕余菴乃上書謂舊制充教習員惟恩㧞歳副四行而今巳俱停請得以官廕准例補四行選獲㫖授鑲黄旗教習創學規嚴鈐而厚誨之遴錄筆帖式夥于他旗大司成陳君少司成宋君咸異之薦為能將以正印官用部議狃成格不許値朝廷狩幕北沿途上書上特為慰勞敕所部議叙出常格外當是時天下聞君風采者相望冀一見至有傳簡牘致慕思者酒間各聚語得悉其事以為快予嘗與蕺山駱明府游明府君姊子也屬予作一詩寄之暨予官京師而君以都運分司山東聞其初至官有司例金錢為前官所格君直白御史臺曰分司有規例猶州縣有火耗也州縣無火耗無以養亷分司無規例則無以絶貪夫當此月進不給歳薪日减之時而獨有一人焉斷火耗黜規例挈母妻子女賓朋奴客及閤中幕下之效才者而相率為蟬為蚯螾能乎夫知其不能而猶斤斤焉惟規例是黜此非不情也詐也夫詐則何不可為夫詐則必求之于恒格之外而其為規例不可問矣夫詐則何可以受國事臺使善其言許復其舊制之半而其言亦稍稍傳都下乃予請急歸而君巳先期首故丘將𦵏矣君之子於予歸也造廬手君狀涕洟請曰歲之首冬謀筮兆于山隂葑溪之鳯凰山乞誌之按狀君世從剡遷累以詩書嬗其家大父兩谿公生六子竝餼庠而君父以成均聲于時生子三次即君也君生而警敏七歳就學善誦聞塾師講黄童事歸而擁衾思效之十歳能文下筆越尺幅十二歳以女兄出嫁隨父行揖讓禮旋折中規矩觀者嘆去間因母瘍訪醫不得療發黃素以下書精硏之遂洞見幕理幾以醫為世名又因相地得青烏法祕之既長修髯而偉幹言論慷慨凡事朒縮不能决君數言决之任天下彊奡不即絀者見即沮落生平尚氣重然信且諳于時事利害當前無所顧變故猝乘隨事㨗給即親戚交游有所干請無不令滿願去以故人人稱之初筮仕河東運判河東鹽池綿亘百餘里鹽盜來者以千數莫能攖其鋒君命蒯數軰伏要害盜至縱之去苐邀其最後者數人執訊之悉得羣盜名于是始籍捕無或遺者然故從末减翻覆慰諭令自新而羣盜之感激者爭為良民運城地屬安邑而門者縣𨽻也民間婦姑偶誖誶無暇訴長吏門者立馳報木板到門需求之縛其雞豚而傾其所蓄之缾與罌民不曰便君語安邑令使立徙去曰安邑自有城運城自有官何至煩貴役為既而議裁河東闕康熈十九年改補山東其所轄六塲延袤廣每塲舊有𨽻催趲名坐差而廵綽例按季換牌凡一牌繳費如千以為常君既除坐差而復革廵綽之繳費者每獲大夥私販則依律科斷其以一二十觔易米薪者槩釋之鹽艚自蒲關抵雒關相銜不絶君但于隘地設一人守之立串票註引鹽數目一存查一給艚司使雒關按票騐行而鹽政大治乃以復攝河東事至蒲㑹蒲臺歳灾縣令催科過嚴急民有竄者令收其族屬不分男女老稚悉縶之獄獄滿分縶之門堠民既巳飢餓而縲絏之後繼以朴掠死者道相望君捐金代輸而以焅虐責蒲臺令蒲臺令慙謝是年以覃恩贈其父如君官母張繼母董皆進贈安人無何以他事歸君嘗念其曾大母苦節术旌已格于例乃于初任河東時請之裕親王手書節孝貞操二匾額以旌其門至是歸將改祖宅為家廟而建坊以塡之且念其母董安人家無嗣曾于其故里立一莊名蕭莊置田如千為董氏祀産而未竟其業因于其歸時重至蕭莊將恢擴田畆作祀産而溽暑馳驟遂得疾以逝哀哉君諱鳳章字九儀别字余菴嘗顔其堂曰未能曰吾于斯道有未能也生于天啓乙丑十月六日卒于康熈丙寅四月四日年六十有二由鑲黄旗官學教習歴任河東都運陜西分司山東都運膠萊分司運判加一級敕授儒林郎配王氏封安人子二長雲溥附學監生娶王氏次雲沛附學生娶章氏繼娶朱氏皆望族朱即山陰相公曾孫女也女四孫五君博極羣書而工于詩所著有余菴集行于世乃係以銘其詞曰惟自命士入關棄繻况同東方慨然上書宜其判事環煎沮洳開軒衡論折漢大夫乃溯丕績劖之碔砆輕貲重信斯民所無况兼孝友閥與德符嘗痛大母苦節孕孤以故穉髪飽蚊戴烏歸為母祀亡于奔馳惟此葑溪山銜鳯咮孝思不匱乃生兩雛堂雖未能菴則在余伊墳然者先生之廬沈母胡太君墓誌銘山陰沈君筮仕得粤西泗城軍民府參軍自言亡怙恃雖遠使萬里與百蠻為長少王命也亦又何怨獨是母有令德故事矢靡踰五十已奉詔得舉行旌門建坊之典而家貧無貲屢乞鄉大夫謀告于朝而迄無主者今之官海徼恐從此違故鄉益遠鄉大夫之謀入告者當益紆滯夫猶之嬗後而上膺綸綍與遠播碔砆一也縱馬鬛搶卒得史氏一言以壽之于石則猶是顯揚之事矣乃于南行日介所親而謁予以文子何足辭母氏胡父孟昌公席閥閲為郡名士母夏太君能文母與兄俱從夏太君學以故夏太君寢疾母未笄也輙能侍湯藥衣袵不侻以孝聞年十九歸式菴公式菴公邑名士讀書等其身顧卓犖有大志嘗以食貧有太公在堂年且老已屢試又不售遂與母别褁糧至京師㑹崇禎末盜賊充斥四方來京者多游仕幕下遵化撫軍聞公才厚幣聘公公應聘而死母隨公三年生子一即參軍也太公春秋高然且遺子二長者弱冠次襁褓女一尚未字堂上餘一老而堂下之羅坐而環立者皆穉兒弱女啁啾然母乃斷肉食事織絍以膳太公太公所遺子與已子皆侍太公學太公赴舘請則隨之與俱如是十年暨太公死而太公之子與已子以嫁以娶皆視之母母悉有以周支之而其所謂小郎細姑妯娌先後之望之者匪一旦也乃參軍既長亦屢試不售别母赴都凡一年而母死母濱死時値十月朔晨起沐浴更衣請召親族至告曰予守身二十七年今幸無失墜可以見夫君于地下矣苐吾兒在京詘指曰後二日則正吾生兒日也吾欲以是日告别使兒遇生日嘗憶父及我遂于月三日不疾卒年五十六越十年參軍將之任急歸葬母而以墓銘告乃銘其詞曰賢哉母德孝于女居與兄同硯具觀詩書工侍寢藥兼滌厠牏以故歸公饋祀洗腆尊章悅懽兒女宛轉仰事俯育愼終追遠獨憐夫子屢泣牛衣遠應客幕長留邦畿春路草發秋林葉飛亦既抱子克嗣徽烈何以數竒雅竝前哲以兹氷蘖閱歳月日今者細賧受符西南君子涖止言冠其簪因念先德將誌墓林蟠螭于碑屓屭在石竁幽彌章泉冥不隔千秋萬春爰視兹室程贈君墓誌銘嘗讀顔氏家訓每惜士大夫輕去其鄉或忘所自出不啻泉明所稱昭穆既遠夷為路人者然而燕越源流惟責之肻構之子少為振興夫亦曰自今以後可無遺下治之思况記幽表竁尤繼世所皇皇者乎程氏自重黎之後有程伯休父者以國為氏至東阿程鄉各有世系而以河南二程故多冒河南族為門閥光惟余門下士清源君其先世自山右洪洞遷于清豐譜牒散失不倚附他族惟曰清豐程氏清豐程氏者自遷祖至清源君凡八世其七世則贈君也贈君之父以孝聞生贈君而貧贈君出就外傅受書讀讀過輙記憶不能忘推觧書義以此悟彼謂科名可即致忽慨然告其兄曰父耄矣貧不能奉養而吾兄弟皆守儒啖根呵流脫一旦有不及餐可如何獨奈何以難恃之養儉父體也遂請兄自讀身為估早作夜息出其智計以求當于白圭計然之術如是有年家遽起日視洗腆惟恐不遍食人稱曰孝乃贈君則聚其嬴與兄共之兄子女七人皆贈君任婚嫁自清源君上祖若父下及其子四世皆合屋居無分别竈井杵臼時推其所有以賑救閭左之不足者今清源君以邑宰起家治清源有聲嘗迎養贈君官舎贈君對食流涕曰吾不能以祿養父而吾受祿養每飯必捧匕箸上其父如養生者且謂清源君曰昔周磐讀汝墳之卒章涕泣求仕以為父母甚邇不可無祿養故也夫以父母為所必當養而急求仕者孝子之志也顧既仕而即以已之愛父母者使民愛已則又凡父母之情也以故清源君之愛于民有如父母康熈十九年五月二十五日贈君卒于治年六十有六其子清源君既扶柩還清豐乃以葬事馳狀來乞誌銘贈君諱世顯字配周為大名之清豐人娶趙氏先卒子二長道徴次維屏即清源君也孫若干銘曰自昔孝子多為禄任越三古後仕不可恃是以牽車服賈以待何期嗣業爰篤爾祉涿鹿曾遷卬駒于此揮弦其中百務具理則是何故父母孔邇乃嗟山隤亦曰哲萎梗陽之民如喪考妣孝思所至礱石莫擬惟此微詞歴千百祀西河集卷九十二
