body:
  text: 西河集巻一百十翰林院檢討毛竒齡撰塔誌銘越州西山重開古真濟禪寺傳曹洞正宗第三十世以揆道禪師塔誌銘師諱智道字悟通又字以揆杭州仁和胡氏子也母阮生師而孤㑹崇禎之季東南尚文事士子能通一經把筆為文辭母論仕與不仕即睥睨一切師已習舉義為人所稱自念處濁世中跼蹐若負鞿靮者每欠申不自安且驟丁喪亂杭故繁華地燈火笙瑟徹晝夜外户不闔忽兵革饑饉市里多流亡四顧蕭條當娶不肯娶適避難得痛心疾乃奉母居南髙峰下嘗過古洪法寺謁諸佛有省因發願誦藥師經一萬巻自懴時道林離愚者洞宗師也住靜與寺鄰師徃叅之無所得嘗與禪客語不契悶絶幾欲剖其心乃危坐一室越三日夜分風大作門扇忽自闔聲如轟雷師大驚汗下似有省徃見道林師呈偈曰倐聞門響若雷聲打破當前一座城驀地歸來重顧盼此聲依舊是門聲道林師不許但笑曰子從此悟入可通矣即于是曰令薙染字曰悟通順治辛卯三宜和尚講首楞嚴經于鐵佛寺師徃聽講并具戒喜之請侍和尚和尚更字曰以揆既而離愚還道林道林者蕭山河上店山頂寺也離愚初居之名道林寺又名兜率寺至是住靜久蕭山檀越重請道林師還山乃招師並還遂署師理監院事師乃變俗産為常住用且開闢道塲增設一切佛藏并種種法仗如是三年㑹道林師從弁山埽祖塔還示寂于北闗之紫雲庵師迎龕至道林建塔是時道林繼席者為鏡愚和尚鏡愚即離愚弟也同父亦同法仍命師監院如舊職至乙未和尚赴顯聖掃湛祖塔問師云一路以來還有竒特事也無師曰祗是黄泥伴石塊耳和尚云也只尋常師曰已多矣時顯聖主席者百愚和尚也百愚見師而竒之云此何人耶鏡和尚云此吾離兄之嗣也曰曾有囑否曰不幸兄已故而未遂也曰吾代為離兄囑之因以衣拂并源流授師越數年鏡和尚亦示寂付師以道林師不受避之臯亭獅子窟迎母侍養兼禁足三年康熈丁未蕭山諸暨諸檀越渡江迎師師辭之暨戊申迎者日踵至師不得已始進院開法説戒時蕭山東山有接引精舍師過而樂之乃復退院居其中既而聞西山有真濟禪寺舊刹也相傳唐武徳七年所建而中毀于火師過動心夜夣伽藍神來前醒而見之遂矢志恢復預建團標于殿前逮癸丑冬造方丈五楹甲寅殿成雜設講堂僧舍齋鍾誦板而刻木墁金并養䕶法聖賢于其傍每安禪說戒四逺宗之者如歸市卒酉兩縣諸檀越仍請師還道林乞長住法席師不得已復住道林且增修道林所未備者甲子道目和尚偕湖州當事縉紳各以啟至請師住弁山祖堂不赴乙丑退院至西山陞座一時問佛法因緣相踵于道未幾過東山慨然留之七月十七日晨起諭諸禪徳以法門鄭重授一應院事作書别檀越并以示衆午刻居士倪君設齋食㩦至饗師師坐食作别如常時既而曰予行矣拱手合目少頃鼻垂雙筯長尺餘已而收入于是弟子迎龕至西山歸塔越五年而屬予以銘每怪儒者誦讀循咿唔遇有講解如謳師賔白未嘗于當身有所干也師嘗見居士沈君誦首楞嚴經而示之以意以為楞嚴法界一切衆生心身之本也夫心身本是廣大無邊際而含萬有昭昭于心目之間非大徹之目離識之智未能此靈通矣世之迷者若大海之一漚有廣大而不能用倀倀然自投于籠檻鞿絏而不以為苦故世尊初成道時嘆曰竒哉衆生皆具佛智慧而不能證以是法界性說楞嚴神妙于以見諸法性相理事儒者所謂由窮理而至盡性職是故耳向非自證何能披其文見其法哉又與居士田君論宗鏡錄謂圓宗所示皆是未了文字自必性離始名解脫倘徒以識心求之則圓覺經云以思維測度圓覺境界如取螢火燒須彌欲求其燃也難矣故從來思維徑路不可入道不如少林云惟牆壁乃可入道果能于徑路絶處竭力追究若喪考妣則迸開光明如紅罏烈熖渙然冰消又如斫樹去根再生枝葉此時此際作何捉摸况向上一路極盡𤣥微去粗存細末後工夫正多也其言論親切如此師卒于康熈乙丑七月十七日距生明崇禎己巳七月十日得年五十有七僧臘三十九開法二十餘年為西山真濟禪寺第四代重興大師次為道林兜率禪寺開山第二世第一位住持位下傳法者二十餘人西山繼席者翊南其餘各化一方凡剃度受戒者所在多有乃為銘曰師本清淨妙法身無三毒無五濁業以此蟬脫汚淖中獨得勤向息慈地佛言救溺當出水嘗入漆室把火苣忽然風作霹靂響何人奪門使門閉一聲吼落天龍驚頓使甕裂桶底下非風非門亦非心此聲宛轉無覔處乃知不二衆妙門因聲得度幾有是遂于此日取尊勝立受五戒離壤濁從來捨俗非易事生龜脫甲牛解角果能離性見徳智何難就證無上道乃傳佛義得真印受取如來正法眼千江明月萬户春指示世間諸色妙雖遷慈室種種地東山西山非有二皆與道林兩相對同時埋影入雞足將收此入法輪藏以此文為妙解義若以此作文字觀因聲得度豈有是少林傳正衣優婆夷香林涅禪師塔誌銘師香林名無涅京師人俗姓鮑氏夫俞為鏝工早亡臨訣時謂婦曰吾賃工尚不給每減其口以養母今何能矣汝年小有貌請召婿于此而贅養之何如婦不許曰吾以指力養不足取之吾家之稍賸者諾而瞑鄰有惡少豔婦色强娶不得訟于官又不得謀壊其操婦所居者為西便門外之八里庄值燕九節俗聚男女于城西白雲觀設祠陳百戯相傳是日丘真人來降當邀之婦騎驢從母家歸徑觀前惡少望見遥指曰此仙姑也迣尾之人不之疑至月壇惡少挾下驢使羣少健者力持之蜿蜒草間將脫衣值慈壽寺老宫從西山運石炭來車徑壇西救婦而訶之羣少散走老宫乃詢婦所由彈指曰此終非久長事也去此保明寺為天順皇帝爺御妹薫修之所盍姑婦捨髪而匿身焉婦從之遂為尼初尼不識字不習禮拜苐挑菜釋米任雜作既而發願訟之佛前曰吾向食指力自晝迄暝今曠手度日滋罪孽且居此何為矣自今後請日習經課禮拜一過持佛號萬聲夜即趺坐勿令寐如是五年風穴僧有知識者以朝臺來京企脚于萬壽之番經樓保明主尼央老宫延之設齋風穴驟見尼呼尼與語頓有省既而少林國師請部印候㫖天寧老宫介尼見國師乃付衣焉天啟七年信國繼大綂例番宫人出有年大無家願為尼者送保明于是雲還師以宫人落染拜尼為師居無何雲還謂保明嘈嘈自出所畜金搆園于寺北數里而迎師其中䖍事之以師號香林而香山又適在前名見香園既而雲還亦刻苦有省師即以少林所付衣付之師遂卒時法臘十八合之世年二十一共三十有九康熈己未雲還建師塔于園介天寧僧普照者乞予以銘予嘗謁方丈見師懸象朱衣而杖錫垂兩目趺坐面如瑩雪其眉膴間猶不失閨閣中色而雲還年六十餘白髪種種指師象謂曰此曹某畫蓋武英殿中書而中貴私請之繪面者也傍一塔則瘞其姑者乃為銘曰師本無涅涅亦不緇譬彼蓮脫濁淖汚泥初用指力繼絶心想欲觀心印仍在指掌特憐保明安樂堂側就宫人斜建諸佛塔須知妙香不在鼻觀有聞無聞賴此見者傳曹洞正宗壽昌下第六代慧通浚禪師塔誌銘康熈三十年予送慈聖賢禪師入髙麗寺上堂說法爾時宰官士民若干人羅拜堂下皆言師得法髙麗其本師授法者尚在方丈思併作瞻禮而求之無有既而飯訖隨喜至浴堂見老衲垂白擁罏被壊絮翕目僂坐從者指之曰此老禪師也時觀者十餘輩皆敬而佇立不之警移時皆嘆息解去嘗考髙麗本禪宗天成二年吳越忠武王實倡兹刹勅名慧因至宋神宗朝有晉水法師者傳馬鳴大士之教疏釋華嚴諸經義流傳人間致髙麗國王世子航海來朝乞留侍沙門以受師法而于是髙麗稱焉至于今其所存法派自髙麗世子而後已十七傳矣其在神宗朝左丞蒲宗孟撫杭有以慧因易髙麗以禪易教之疏奏請勒石而其後宗教間出傳燈錄所稱懐祥義寧者則禪宗也師以烏傷舊族丁明亡之際辭家捨飾即以叅宗為能事曾學制于越州雲峰山真香禪院無所得去順治十六年得戒于杭州祗堂院㑹靈隠具公闡三峰之教𢎞開覺塲勸緣數百萬大興工作于北髙峰下其時監院者妙銓言禪師也妙銓曾與師司錢㑹出入典籌握䇿而既而辭去退居髙麗接祥寧之綂因以曹洞叅宗兼歴觀教與馬鳴龍樹諸法相為表裏乃復辭三峰而就壽昌所謂三緣既空則宗教不二是也乃師久習觀與客論太極五運徃復再四客拍案大呌師忽仆地康熈六年妙銓遂以曹洞正宗壽昌下第五代髙麗堂上五色僧伽黎衣舉授之師師乃于十六年髙麗堂上開罏傳戒一時禪徳多歸之越十七年甲戌六月十九日晨起僧衆聲鐘告觀音成道日請師禮佛師合手曰道果成矣翕目而逝閱世六十九越三年丙子十月廿日嗣法慈聖禪師等六人塔師于南山之十八澗而謁予以銘師名法浚字慧通乃為銘曰自昔五覺由聲聞通及列三乘分眼耳宗既不蹠有何庸填空苐借言說以警聵聾是以髙麗馬鳴從風范金立塔摶沙鑄鐘蕩蕩大海比之鴻濛雖分江漢同歸海東惟是觀音見道未終以聲辨色雖聰亦盲因兹炎夏宛然隆冬我今視響如觀豐隆觀音何在十八澗中重建天童開山義興禪師塔誌銘今天下禪宗之宗太白比之梁大同中之宗少室唐永隆前後之宗寳林較為尤盛苐溯所由來則但以宏智元音兩禪師為開山之宗而傳至密祖始大闢門庭為天下宗師而前此反無聞焉甬東三佛國舊原有諸佛化身應現其地相傳太白得名在吳赤烏年有義興禪師者實住此山侻其身而居歴晉永康間忽有童子侍其側拾薪擔水執桑門之役凡三年暨辭去詢之曰我非他即金天太白星也帝慕師勤息使執爨焉當是時事聞于朝因改名其山曰太白山而别名天童是天童太白並以師名而嵗久而未之考也康熈八年壽昌璿公結茅于寺南之右隖掘澗得石幢八稜如牘洗而視之則儼然有開山興禪師塔六字琢乎其間且去山數百步舊有塔基豈興禪師者既開天童而復息慈于此山道固無所不在與特舊傳師所闍維在四明山中謂師曾杖錫其地而既而西歸至今杖錫寺傍有太白塔名因亦疑師塔之在杖錫而既考郡誌則寺建于唐昭宗年龍紀之元其時有紀禪師者從天童杖錫于此因名杖錫而以其從天童來故亦名太白是太白者紀師之塔此真師塔也獨是師在當時初祖未入凡東南名僧率以髙坐講論相矜髙而師獨孤居山僻倚徙于岭巒蓊薈之鄉不見不聞一似初祖之面牆而東禪之坐碓者則是天童閫奥師實開之宜乎雞足之藏歴數世而彌顯也然而璿公翳剔之功則何可冺已嵗在庚辰因重建塔院且築塔其中而請為之誌遂作頌曰維是清淨身化作千百億枉名為三身究之不得一如何紫金藏留此不壊跡髮相等墨雲骨象變金色得非太白光結是大慧力藏室無幾延甃石不盈尺仰視六幕間鴻濛總開闢湖南淨慈寺舜瞿禪師塔誌銘師諱方孝字舜瞿江都王氏子也父槐卿母洪當師生時夜夢大士乘船來抱一兒并兩蘭付之因名雙蘭讀書一過便成誦年十四見婁東僧說法而慕之私念曰予何不為僧乎遂不食肉十七作贅婿雲間越三年國變其明年王師下江南江都潰師歸尋父母兄嫂不可得將殉之道逢一僧慰之曰以身殉君親固然然不云佛能報四恩乎且安見君家之非散亡并見俘者刀槊之下惟僧可免苐髠首而入營伍以求之未晩也師曰然乃盡發蓋藏以千金贖難民于旂而兄在其中既知父母死有兄在可以為後且世事已如此乃頓發前念投白雲院從雪石薙染次年圓具于天寧禮和尚師不騖虛名求力行即以本分事進請天寧曰子慧性非常然而未受金圏與栗棘命根猶未斷也是夏到古南參牧雲一見即器之使之看物不遷義未省去而叅焦山又叅能仁叅箬庵俱器之及冬詣臯亭叅豁堂先和尚而頓有省然未快也忽聞僧有舉物不遷義者而快然已呈偈矣明年元旦侍和尚陞座聆法語一若府藏俱脫者和尚遂付之自順治四年春圓具至五年元旦不一年而遽受莂聞道之速無如師者乃發長隨願隨和尚赴海虞三峰及此祖庭自侍司客司以至分座接納長隨者一十八年當是時和尚以他事搆難幾瘐死而師越犴狴救之其事祕不得而知也然而四方聞師名爭削牘延請師初不答既而聞婺源寳林席久闕嘆曰釋氏以擴大門庭為能事未有把茅不蓋而可以談白雲講家風者乃應去之萬山中刀耕火種以本色住山其來者以本色接之鉗錘之下不假辭句不輕作肻諾以故歸者如市座下嘗三千指置田畝修殿堂恢寮舍庋􅂒如是八年乃于康熈十一年繼席祖庭是年次壬子榦窮而枝始占者謂有中興兆焉先是兩湖巨刹南淨慈而北靈隠俱燬于兵靈隠再興當國家初開之際東南最富饒凡官斯地者多擁金銀瓌寳而具公啟募即輸刀輦泉堆貲累萬萬以故靈隠覺塲為之一新淨慈積圮久雖先老和尚以天龍撐拄此山然未能復也師繼席晩連年征甌海民間空虛半不能施米盂加之丁癸相仍齋厨咽沸水旋度六時而師不設募簿不更立化梆勸版不令沙門持沿途鉢長官至止者晉接談道義口不言布施事自壬子開法越一年而興大工首建天王殿嵬然挿雲既而築隨山和尚塔院比鹿苑焉至二十六年而毘盧閣成兼啟藥師王殿于其傍明年開浴堂越七年修大雄寳殿煥然還故觀是為康熈三十三年越三年而建鐘樓造來翠閣又明年復古宗鏡堂堂在山後由殿而閣而堂凡三層以次拾級一望山半無闕焉越三年為三十九年建凖提閣以前一年車駕幸方丈賜以宸翰建宸藻樓又建延壽堂凡三十年中度材而鳩工燒甓轉石覆之以布漆而丹黄之計所費不下數十萬緡而司庫枵然無神運無鬼輸何以至此予嘗入道塲觀師所為功住僧有言當師建毘盧閣時四壂之夯石而官以南山鄰省治禁不得採㑹上方伐松者發其根得萬石蟠互若蓮座然適足甃夯石無闕而閣無架樑臨安山村有連理木已度及之而村民不許中元夜合村夢僧百為淨慈乞施樑且云脫不許將自伐之矣逮曉而風拔其木村民因感而施之故上樑法語有云樹生連理之樑地湧積刼之石蓋實錄云是年秋九月師忽曰期至矣十七日陞座辭院十九日召嗣法䕶國溥溢至使之繼席二十五日以書辭部使行省諸當事二十六日說偈畢乃曰老僧三十年興建此山衣鉢蕭然矣一切封龕入塔諸事皆老僧自為之各留一法語至于開弔送龕等所行無錢不必也師示寂以前不輟工築且有黝堊待施者及示寂而無一錢或曰獨不記師生時夢乎大士乘船來普濟也付兩蘭者以兩蘭若相付託也然則師凡兩出席而彌天普濟必兩興道塲以託芬香天定之矣師生于前朝天啟五年正月十日距今康熈三十九年九月二十六日世壽七十六僧臘五十四坐三十七夏得法弟子靈於鑑化雨溢楚恒蓮等凡二十四人薙度弟子四百餘人受戒者無算焉前此己卯春上南巡至浙以聞師名幸其堂賜御書中極并書柱聨且即召師入行在復賜寺額暨送駕而上留之使聨舟以行然後别師于前途慰送還山一時觀者皆榮之苐知識習氣多梓語錄以行世且以此徼貴官之知而師並無有時嗣法溥溢嘗以輯語錄為請師曰學道在見地行道在機用未聞在語言也且今時語錄不止白馬解文殊獅象皆不足以䭾之矣亦思于此事有稍當否昔雲門出語如九轉丹尚曰吾不存一字矧下此乎暨溥溢繼席始從敗紙苦搜之輯寳林與淨慈語錄合二巻銘曰伊昔刹利開梵埏中有老覺名瞿曇三幡消入漢顯年始載語說來中原維時迦葉已再傳尚餘八百阿難仙從兹髙坐據法筵卑者流入晉代言初祖頓示直指禪宗教自此分兩端無何埋口謎囈間有句無句翻諞諞吾宗兆畫羲與軒孔孟相繼無間然其後多以講論偏異同彼我成拘牽髙山在望身未先誰讀魯論躬行篇今聞師語真不刋力學何必藉口便况師得法銳且專智珠皦皦當胸圓然且忠孝出肺肝破産救世兄得全從師廿載志願堅患難不棄相周旋比之獻地納槖饘於大節無豪犛愆因而福集饒衆緣祗洹法界龍蜿蜒雲雨四布江河旋珠宫寳藏蓋大千赤地陡湧黄金蓮普門大士曾乘船親手抱子付兩蘭婺源之北南湖南中興兩地豈偶焉今當慈息雞足邊九有六幕張空弮惟賸侍者磨塔􅝩居然一塔標重𤣥塔影髙出天中天傳臨濟正宗三十四世松居開山古山音禪師塔誌銘師諱上音字古山彭姓湖之邵陽人幼習儒業㑹流㓂䧟兩湖國隨破師念世事遷變不可定乃于順治二年隠南嶽之中山寺已而祝髪父敬吾母林跡至寺邀師還家師再拜辭曰能報親耶則佛祖報四恩其一即父母也不能比之㓂至時亡此兒矣父母執不可乃踟蹰曰請邇之因隨之歸郡有髙掛山山多嵓壑覓石屋居之出則省父母入則危坐如是三年嘆曰此身如木石不刻不斵非遇良工不可也徃參西山邃谷和尚已領戒矣忽思此事未易竟吾父母垂白安可待請奉養畢生而後决志了此事未晩也乃復還家承歡膝前者若干年至服喪畢始行脚遍參諸方歴兩湖及江介諸尊宿多器之最後參萬杉剖玉璞和尚和尚曰僧何號曰號鼔山曰何以不鳴曰鳴則驚人和尚復進師復答遂命入室使之典藏每以臨濟綱宗痛加錐札即古今公案無不一一勘騐之因付衣拂而師猶業業走吳越覘所未足平陽宏覺師奉召還山見師問何來曰南嶽來見讓祖麽曰見讓祖何面目師喝而平陽竒之屬留師師辭平陽贈以偈曰送爾返南嶽徑上祝融峰讓祖久相待炎日剛正中時靈隠具老和尚師師翁也與師語怪之詢其所由翁笑曰外㓂易禦家賊難防前門出虎後門進狼乃命師掌書記越一年師過錢塘長壽山見其山秀麗層巒複巘松風飀飀然迥出塵外加之清溪甘泉瀠帶左右遂以杖拄地曰吾菟裘矣遽辭靈隠翦茅住其間康熈四年檀越楊君顯吾王君麟長偕里中諸善信登山造謁初擔水運米給以資糧既而擴其居搆殿庭門垣寮舍廊廡以及厨庫籓溷無所不具乃䭾經鏤像于其中鯨鐘魚板四山相聞儼然一寳坊焉于是應衆請開罏設法在居士多有省者嵗戊辰正月十二日師謂王君麟長曰老僧世緣已盡矣欲化君下禇中衣一件以留記念何如王曰諾然不喻其何意也至十三日索筆作書别檀越及諸山舊友十四日麟長送衣至師甚喜是晩召衆入室衣其衣說法次日元夕至晩復召衆入室說法如常時既畢復垂問云虚空撲落成三片且道幾時得完全去衆遲疑間惟書記培以坐具打圓相師云畢竟如何培云正當十五解制師云却是十六衆莫解至十六日早起師曰老僧時已至矣乃說偈并自說封龕舉火諸偈且書遺語并囑兩序及䕶法檀越各數百言書訖復說偈曰生也湖廣武岡死也浙江錢塘且道一生一死何如地久天長合掌而逝時康熈二十七年正月十六日距生萬厯四十八年五月廿六日壽六十九僧臘四十四時王君麟長已省法受付預建塔後山奉龕歸藏而謁予以銘嗣法四人惟真衷徹莖培雪印仁其一即麟長秀也松居語錄二巻銘曰師本儒者留心簡編乍丁百六國運以遷南嶽是止北顧愴然祗念二老中途來還苾供庋下蓮跏膝前燃燈受記等目犍連及棄一切在天監年暫棲江介獨步漢南一缾一鉢到處滿圓竿頭更進逼兠率天乃登祝融炎火正燃藉以開鍜彌天生烟且營莵裘漫坐祗洹水迸嵓際松移嶺間穴虎受戒山魈安禪一旦時至拈花翩翩不生不死相忘無言特是三身化百億千何身可藏于彼岸邊西河集巻一百十
