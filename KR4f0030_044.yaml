body:
  text: 西河集巻四十四翰林院檢討毛竒齡撰序二十一淮隂張儀部農部二鄉賢祖孫合祀録序自唐貞觀中詔以左丘明伏勝毛萇鄭衆等配孔子廟庭後遂推廣諸儒以次增入然第取其有裨于學校者耳唯明以名宦鄉賢並厠澤宫分置兩祠於靈星門外則興秩之餘旁有祭啐顧其始猶不失邦賢祭社之義而其後浸濫而不可問也予游淮隂值儀部郎張公與其孫農部主事同時舉鄉賢自巡漕開府暨督學使君以下皆藉藉稱兩先生宜附廟祀敕郡縣吏及學校經師各執結給皷吹迎主以入凡鄉官坊騎三舍子弟咸衣冠捧輿由圜橋升令春秋三獻官竣事得以例分啐左右繼諸先儒之後猗歟盛哉今相距二十年予被徴來京師而農部之子吏部公偕嗣上舍亦父子同時膺聘赴都投牒之次見予于選堂之牗間重以予游淮之舊握手道故予方念吏部公父子聘幣一時稱勝事而公則復以其先人合祀一録令諸同舉者各為詩歌而屬予為序予乃嘆張氏一門之盛為未易幾也夫生莫重乎以名徴死莫大乎以神饗故樽俎在堂羔雁在戸世所難及而張氏一門兼之然且祖孫咸秩父子並摯數世之間懿美叠見嗟乎其于學校何如也夫居官能方有政可紀是之謂賢邁蹟顯揚克誦駿烈是之謂孝夫儀部與農部公賢以開之而在吏部公與上舍則又孝以繼之是皆不可以無詠予宿昔在淮曾與吏部公父子讌飲賦詩至今相傳有所為曲江之園雲起之閣者曾幾何時而吏部公安車來京將仍返故廬而予亦老病庶幸徼放歸之例獨上舍君與諸同舉者以纂修前史入承明著作之庭倘他日二張之傳成之文孫與同舉諸君則今日同舉諸君之為詩歌為文又安知不即為他日國史所嚆矢與介和堂續集序戊午之秋朝廷詔丞相御史二千石舉内外府州縣官暨草澤有學行者策試殿廷而待庵與予同在舉中會天子詰武事收復西川不即較六論留公車門待庵日為詩與長安舊游酧酢往來今詩集中所為帝京湯泉諸詩皆是也夫待庵少為詩暨通籍而截然不為自筮仕以來則間一為之至是而意氣坌涌搖筆如擢枝既已大具詞業呈門下兩省就試殿前而其後以取數限也吾聞漢重經學轅固被黜唐尚文賦韓愈受裁從來得失之數原未有定獨是習俗耳受必謂簿書親切載籍或逺幾見狎三善而工六義者夫天下生才無盡作者間出雖摛詞逞韻家叶戸曉而求其能當于是者亦復有幾乃自負名下裒然藝林而疏鄙庸劣茫然不解比興為何物即間有識者亦復浸淫流漫不能拘正始之舊而目數蒯𨽻手弄錢刀能自為篇幅出短長雜詠而悉有以軌于法誰謂懐縣非詩人也蘇潭張氏族譜序古者君子行禮以敘宗族族之所敘則禮從生焉故因孝以推之因睦以合之初未嘗不惇本䘏末而其後稍相逺也嘗按之族服之制四世而緦至六世而服已絶則親亦已盡是毋論棄徳曠宗塞源拔本者固于斯有淪遺之感而即以服推其因禮降而情殺者亦復何限然則族譜之設雖肇自有宋倘亦先王惇宗敘族之遺意也與今世家舊閥多著譜牒而時移代易廢棄多有苟非為其後者有以修之則三眷之親同于九等吾未見其能禪後也蘇潭張氏自宋時亷訪公來遷蕭山遂族于斯歴元明數百年代有賢哲已見之邑乘而曩時有譜創于元季亷訪曽孫暨明永樂間則郡丞公重修之自是以後闕焉罔載者越數百年裔孫純白由泰州教授歸里毅然以修譜為己任自隋唐以來方城曲江吉水新淦各為疏覈凡世系前後稍有同異必親至其地咨諏詳較務求殫晳而後已而乃越二十餘年而其書始成夫隋唐宋明為世已逺其為親幹族屬亦已長久根株之大茂木莽莽乃得收其渙散聨其乏絶使弈世衣裘臂指時地爵齒皆已彚存之數簡之間其竭數十年之精力不為不勞而成書以後予滯京邸亦復不逺數千里遣其子孝亷君持書至京索予為序夫上下千載縱横萬里其勢本同而前考之數千年而不以為遙近索之數千里之外而不以為逺則自是以後其為久長計而不得以因循苟且之端任其漓渙焉可知也益都相公佳山堂詩集序士有一言而足為天下重者宰相是也夫宰相不言則已言則必為天下重則所言不既難乎曰言當乎理而言難以理為言而言即不難惟詩亦然方其溯四始案六義博求名物旁及鐘律初亦殊覺其漫漶而源本既得循行習坎隨其勢之所自至如通波赴壑備極湎演皆足以見其根之所存予誦益都師相之為詩久矣方予誦師相詩時每嘆其言大而旨博義深而見逺絪緼闔闢渾括萬有渢渢乎大人之言也暨予以應召來京師會天子蕃時機無暇親策制舉得倣舊例先具詞業繳丞相府予因獲隨儕衆謁府門下適單馬從閣中出揭剥倒屣延入為賔客當其時先予居門下設食授室粲然成列者已不啻昭王之舘平津之第也乃予以受教之久時執經侍側見其所為大文者代言應制端坐而卓筆儼治絲然繅緒及而緵䌰成而即其氾氾酬酢日或十往返彼唱此和印符取照莫此之速則當誦師相詩時望洋浩嘆㝠兆俱絶又安知其如此嘗大雪中請沐歸取門下從游所為詩句繁而韻僻張燈伸帛師相口授門生筆追形之不逮聲且尋丈也文猶風也風發而􅦍嘘䬝􆅻力能載物夫然後垂天之翼挾而萬里文猶水也水盛而天吴所舉極魚蟲物怪吞舟撼嶽之竒包幕不失葢至言若桴皷而大文無方幅理固然也今師相之詩自樂府古體以迄兩韻分班定部類有成書其間上紹三百下及八代就其裁製皆足統源流而窮正變乃嶒峵博大動無細響上之為登歌拊詠之音次之亦不失三調五聲出納治忽之數自非義藴于中氣流于外涵容槖籥而羅絡紛賾于無盡則玉臺太一形于樸斵吾見其敝也在昔文教之興每與運會相終始故三代初闢渾渾灝灝漢唐開國猶不失扶輿之氣今聖天子大啟文明賢宰相百執各展其經緯以鬱為國華習俗偶岐易成頗僻而師相重有以正之巻阿七月豈止張蘇論撰已與明世相國甚尊無三省之分又無取旨降敇覆奏施行之異其為政事堂雖尚書門下莫敢參預獨内廷傳奉多假之中貴之手而今則録白書黄委之門下施行封駮移于六曹惟是君臣之間一徳一心諮諏善敗往往出一言以為天下蒼生之幸其獻納所裨有過于前代什伯者況乎文章喉舌同在司命豈無讀師相之詩而愾然思蹶然而興于道者然則敦厚之教風人不廢焉知師相之矢歌不即為師相之所為坐論者也姜武孫七十壽序唐白少傅居東都作尚齒之會其時少傅裁七十而其所與者若懐州司馬輩皆晩年相結並非宿昔往來之舊故少傅于履道坊懐諸舊游往往舉微之夢得子厚諸君形諸詠嘆而九老之數一不及焉甚矣得年之難也予弱冠與武孫先生為文友其同時鬱起能以古今文争長海内者累累也然必推先生為祭酒間嘗舉髙會少長畢集設賁皷于壇圻之左其首執銅盤而啐血以釁盟者必先生也曾幾何時而疇昔之累累者或散或偶往往游仕之四方迄于今其在者鮮矣先生年已踰杖鄉而膂力如方剛者古云松栢之姿經霜彌茂非與吾聞㙚墳之生物本異鹵磶而䎩耠之下其種易成江河之渫水殊于涔汋而能藴其道則勢易行方先生席世閥閲比之漢之韋平晉之王謝自光禄太僕以下司農宗伯各有表建為列代名臣而其家之先後世濟内而卿貳外而丞令不絶也先生獨晩成舉文試義傳譽滿海内尚艱一售至趨庭之賢先雋南宫而先生始以京闈舉也雖曰喬木久䕃必無改柯而先生終以至徳持之世嘗稱才人輕薄最易怙勢故古有多才鮮終之嘆而先生初專責已既期利物又既而根理氐性直極之知天之學將近世之所為以釋詁為講徳者而先生一反之其善席寵厚如此夫自古無祈年之法而中庸栽培壽可必得雖富貴所自有然而年亦彌卲焉去年秋先生之徳配史儒人以貳膳之嵗親朋為舉觴壽孺人并及先生重齊眉也今先生臻貳膳嗣子内史君就選人將之長安而以予為故交也屬予為文書之幛予思尚齒之會少傅雖為政而以年甫七十贏厠之座末降此而耆英而至道而真率在有宋累舉洛中者長不過七十次裁六十嬴耳予以六十餘年之交得與斯會不可謂僭而獨是當時故交如夢得子厚無一在者雖欲舉尚齒之觴不得也然則當斯時而得年如先生巋然七十不可謂易事也則夫由履道而至道而耆英而真率雖屢舉可也李丹壑進士館選庶吉士賀屏序宋人作春明退朝録多記早達而弇州繼之遂將近代早達者譜入三述謂之盛事然大抵成童以前率皆童科膺薦如蕭何草律以太史試學童補史書令史而魏晉相仍所稱童子郎者是也獨是科目之設隣于發覆雖年如子淵齒如項槖何所别識以故早齡通籍代不乏人而求其十六成進士者則自明三百年來所傳祗王庶子一人而他無聞焉國家崇儒右文景運日隆加之聖天子興復古學一時摛文掞藻之士翩翩蔚起意必有聖童畸質可為當代標人瑞者而學士李公其令嗣丹壑以十五歳舉于鄉十六成進士時康熙己未春官列名赴殿廷對策擢髙等遂得召問改翰林院庶吉士使讀書中祕以補舘學生三十人之列一時聞之者無不嘖嘖稱嘆以為極盛吾聞越睒之生蘭筋宿成雖紐紲未賖居然有籋雲掣電之勢鸑鷟産丹穴體備六象質負五采初未嘗巢阿舞庭而長離所燭菡萏興而文章見葢瑞應昌隆固神物所自鍾也然而崑丘良木滋以靈露威鳳雖奇宜畜嘉徳曩者任咸黄琬皆以夙悟力學卒成大器故唐宋分十齋教諭専朂異才而明時茶陵少師亦以十七成進士讀書中祕究之黽勉奮發肆情藝苑以致入參大政多所建白至于今鴻文鉅業追溯前事者尚藉藉稱茶陵不衰今之授舘學即公輔儲材之地也深嚴親近必用經術有學者上備顧問兼之册府鄭重並以大詞掌書命則凡經緯黼黻儲偫以須莫不預于是時朂之葢年少力學勉在青陽雖曰揣摩所由終而實則淬厲之所由始也夫居寵不驚履榮不衒達人之識而苟其居髙而益進于髙席厚而益期于厚則雖恢台日盛而卒無日中則昃之慮今學士致身祕閣稡擷經史既已躋玉堂之長然且周旋入直勞勩謙抑未嘗少縱即晨入暮出東第稍閒遽與天下賢俊傾筐倒篋談千秋之業而丹壑于趨庭之餘觀橅有素他日為天子親臣繼志述事恐茶陵聞望定無以過予故于彈冠之頃不為頌而為勉如此不然父子同朝世掌綸綍池上鳳毛古人所羨即以弇州三述觀之其為父子翰苑者亦復有幾吾又何為不嘖嘖焉星槎詩序予過上海與徐君西崖為忘年交西崖真才人也既而友西崖之友得星槎金君所投贈詩予愛之不減西崖顧西崖為此鄉領袖而其所與游悉能文有學之士其為詩與詞尚得追曩時黄門舍人遺響不與世移易故其惑於邪說而甘入宋元洿下坎塪汨淖而不得復濯之清滄之淵者惟此鄉為最晩夫近世之為詩甚矣乂爬刮刷猪樝鴨蒜零糟薉溲瀰漫紙上而調必轆轤不曉轉變語必起伏不識對待袒膊張齒以相習為嚎嗄咧喇之音譬諸京師之販傭終日嘂街而全不解鐘吕宫徴為何等則又宗元人所不屑道者直市儈事耳吾不意堂堂文苑為詞翰標指而反出于是乃星槎為詩即不然風流涵泳詞洽而氣清句必有聲字必有色寧為澹宕毋入褊棘此如吳中人士越布單衣而自足以據髙流之上世不乏傖人不與較也予向許星槎詩謂為文房夢得可當進步而星槎近入長安詩體容肆方超超乎淩厲而上而復以長安塵鞅難以久處將隨官浮梁者為西江游夫廬嶽之髙鄱陽之廣其為詩境當復有進于是者慎毋謂茅靡之習倡自首善遂謂廣大不足法也星槎將行以近詩屬序予告之以此并告西崖夫西崖則已知之矣寄贈周平山游嶺表序平山原名玉輪字秋駕吾邑多隠君子夫隠君子者非以其好晦而惡通也又非以用于昔而不用于今也必其才可為而不為徳可見而不見身可以用世而世不必為身用斯足尚矣今天下不出者則其才不足用耳徳不可以見諸時耳非然則亦身世不相副彼以是求而我不必即以是應耳非然則鮮有能隠者矣今聖天子旁招文學以地震求治思舉山林髙隠之士即已下其諭于郡國守牧與御史大夫以下而宰相復屬意吾邑趣邑令按名敦請使上應詔旨而邑之君子悉杜門闔壁謝去若避惟平山周先生以先在嶺表得免而其事亦遂已予嘗讀子伯南士送平山序知平山去時邑君子多以文贈而予值赴都不能出一言相别意謂平山者必厭予垢􅕹䠥􅍷隨計吏舉制科公車門下徼幸入侍以自比于公孫𢎞東方揚雄之列可恥孰甚而乃託諸故人貽書從嶺表數千里詢問無恙予乃知平山之意氣真而性情逺也夫訾利者慕利者也平山胸中無利故見利而不以為利且夫平山固未嘗晦也平山少以文章顯今復以經術知于時不能自閟往往為人入幕以展其才抱然則金馬門猶是矣故吾謂平山才徳可以見而不見斯謂之隠世嘗比平山之徳有似陽城昔者陽城以兄弟友愛不能暫離各不忍娶婦而平山則既娶而從其尊大人游其繼也復隨其兩兄以祿仕走四方所至獨身從合食共寢各留其婦于其家凡數十年而平山無子而婦以死也今其兄歸里而平山以再娶復别其婦作嶺徼行葢以隨其兄時官貧或不能計晨夕則又間出其才技為友人入幕藉其貲以養而其後主賔相得則一如兄弟之相愛而不忍舍也夫平山于友朋之間則又如是矣人惟性情逺則所見者曠不責過不及道廣能容而亦惟意氣真則友朋兄弟所在親切方予初友平山時裁總丱耳今相距四十年中間别多而會少惟恐形跡之間將復疎逺少親切而回思予故人向之所為親切者今復散盡而獨平山與子伯徽之南士數人僅稱白首而南士又死于路則雖書問千里諮詢無恙亦猶然疎逺不切而況出處之間與平山曰盍贈我以言因寄之且以示子伯徽之之家居者焉送登封令江南張君赴任序洛邑為天下之中而陽城又為洛邑之中夫陽城即登封地也在昔姬公卜宅既已食洛攻位定為東京而又封表太室端圭于陽城上下之間定其標而為之則之臺觀巋然使夫土中之實之必有所在此曷故哉誠以為隂陽之和道里之均必有其端焉而不可溷也今天下居重之勢久在東北縱不必如漢晉隋唐申畫其地顧古亦有云欲萭四方先規中央夫以天地之中而為之宰者百里南面深其溝而隆其堵料土中之民而井伍區畫亦重事矣予向時曾游二室藉隣州使君假我車騎遍求夫古之所謂步影與測象者浩然感興葢仰觀俯察人事以起特未嘗過邑宰而驗其治政之何如也今相距若干年予至京師會江南張君以謁選得登封宰或謂張君才大登封瘠不足以展攄其才或謂登封雖土中然故非形勢所在邑且荒僻非要害張君無可為吏治地而吾不謂然夫以邑長之尊寄一方民社之重銅符軒綏朱丹其車豈不惟材幹彊力是視而宿昔美為政者其在前古則稱單父以揮絃操縵為能事而近稱河陽則居然灌花蒔卉任娱目快志而略不為愧此豈真不足于政事而為是泄泄也哉葢和平者有功而彊毅者多割也今天下皆尚名法凡租庸獄訟進才絀不肖皆一以簡覈自效毋論庸庸者淟涊却足而即其勵精鍥志偶一過當皆足為病有如舉一事焉在張君長材逺思豈無一往奮發之概而徐而思之凡天下之可以益官者未必無少損于民其可以邀譽于百姓者未必不少夷于政治而由是以酌于中抑有為以補不及借調劑之術以行其催科撫字兩兩難全之意是即姬公所願聞而宓子之所相視而歡然者也若夫自服土中古有其説則先之以喜怒之和繼之以競絿之節張弛損益各得其宜隂陽調而水旱時遵其道路而可以幾無偏無陂之治此豈張君所難為然而未敢驟已張君將行京師善詩者各為詩送之而請予序之如此或謂登封古封禪地今天子方召文學將欲登封喬嶽躋七十二君之盛他日者翠華臨幸驗縣令之治必當同律準度為肆覲者所稱首夫政果能調又何患天子不見知哉西河集卷四十四
