body:
  text: 西河集巻一百五翰林院檢討毛竒齡撰墓誌銘十五陸三先生墓誌銘先生陸氏諱堦錢塘人梯霞者二十字也父夢鶴公諱運昌明崇禎甲戌進士官吉水知縣與其弟毖中公諱鳴時官兵部郎中夢文公諱明煃官理刑推官俱以文章氣節指名于世明季尚文社每府縣官人各彚其所在指名者板而刋之曰名士較榜帖所取尤為嚴重而太倉張君天如以庶吉士家居秉月旦輯海内指名與東林諸都講共採錄者合得如干人定為復社時杭郡唯公兄弟三人裒然居首而他皆不與人之造其廬者比之河津之有三門山曰此陸氏三龍門云吉水公生五子長麗京諱圻次鯤庭諱培先生其三也崇禎己卯舉兩浙鄉試先生偕兩兄合梓其社業行世而鯤庭君于是年中式一時購鯤庭行書并兩人社業並行之號三陸體當是時先生有兩弟曰紫躔曰左墄皆名士而年未成也人苐指三君繼三龍門後遂以三陸豔稱之予是年初赴試塲從祁君奕逺舉蘭里文社于湧金門外杭之名士唯徐君世臣張君用霖吳君錦雯先後至曰三陸君何在既而麗京鯤庭來而先生不赴次日訪先生于板兒巷予之見先生從此時始而次年而鯤庭君成進士官行人司行人曰三門又啟其一矣及壬午再試三陸君艱居國變王師收杭州下令鄉官在籍者各投名授職里胥到門時行人君避兵横山老母裘太夫人尚在堂夜起呼先生傍徨曰是地去横山逺將欲使汝至横山促之來非吾意不來此吾家門事且此隙所繫大死忠死孝未可以母命亂其意如之何先生俯首不能答詰旦而横山訃至曰行人君死牛鼻繩矣先生乃扶母告廟為位而哭遂奔横山收其屍投牒軍門曰行人司行人陸某身死取驗狀訖并詣錢塘學告大成殿右階下盡等歸而奉裘太夫人隠于河渚之駱家庄以圃以漁間受雞林估人請選舉文甲乙試帖并房牘名龍門集取其所酬金為菽水貲而伯兄麗京則賣藥苕霅間每月一歸省每歸必牽一舟奉母居其中飲食歡笑以為樂如是有年先是陸氏以文章為東南領袖先生之選龍門集繼先人志也㑹督學使谷君倣張君天如作明史紀事始末以金幣聘麗京作史論已辭之矣烏程莊氏輯偽史豔麗京名隂竊同時指名者曰范君文白查君伊璜與麗京作參定姓氏不告諸本人而標名巻端適周侍郎從閩還見其書不實畔亂無狀又不出自館局犯功令以告文白文白大驚亟偕麗京伊璜合為詞檢舉由烏程縣達府將入奏而未遑也烏程知縣吳君者以他事去官不得于知府且怨莊氏不遂賂首之部堂㑹皇上改元之嵗平章者怒甚緹騎四出逮知府以下籍莊氏檻其首者三君披鋃鐺就道家人無少長皆繫獄先生乃先麗京行倍道至都匄其舅氏裘公之都居者備極營救且謀納槖饘為刺讞地而家之籍捕者以不得先生覆追至京大索長安街適文白之子魏公呼寃于西臺謂檢舉有前詞不得罪議遣京朝官就浙按讞先生急南還時叔父兵部公以髙年在犴狴且無嗣前此裘太君生時議以先生為公後有成言矣至是先生曰此即吾父也焉有父在獄而子掉臂者遂詣獄乞代守者曰代耶律父子俱死無代法念君自來不異牖可也既而讞上上憐其無罪得不坐康熙二年五月獄解先生奉兵部公歸立為後越二年兵部公卒先生行三年喪禮而麗京自獄還輒鬱鬱不自樂每曰㡬以我故覆宗至是居公喪服除嚎咷拜公墓辭曰猶子不肖㡬使叔父死于牖今縱不能從叔父地下其忍陽陽居人世哉遂託以逺游不復歸先是三龍門公惟吉水公有五子而兩公闕然因預奉裘太君命以先生後兵部公而理刑公則紫躔嗣之至是紫纒左墄皆相繼不祿獨麗京承吉水公祀主祼器重大先生將尋兄稷苗而風刺于骨惟兄子寅旁求之見公于徽州已為僧矣牽其衣不即舍遂奉之歸乃為先生療風疾且日會鄉人道故舊示無去意伺先生疾稍愈頓失所在嗣後再覓不可得而寅於康熙丁卯舉郷試中式戊辰成進士然終不能再出門身死先生乃孤居里閈授生徒四方從游者如歸市自東西浙至他省多有景行不得前者同郡貧士覘閩中慕先生名乃飾為頃丑懐爵里投閩名士閩名士爭闢館舍執一經請委摯門下值莆田魏君虎上以北行經杭州造先生廬驚曰此真陸先生耶先生乃笑曰彼亦名士徒以貧故借僕名且安見僕非偽也初先生生時有文在手曰才人暨弱冠曾卜夢於于公神公餉筆一斗始竊自喜至是嘆曰才者材也吾將籍管城材多子弟矣兩浙開府張君運青者裘侍御本房師也侍御諱克美為裘太君之姪與先生中外兄弟以言事得罪居于家開府謂侍御吾欲延陸先生為國人師能曹丘耶曰能顧先生守段干節必肅以禮幣而先于門然後某從容導之開府如其言先生初甚拒既而諾又既而幡然以從開府乃大啟義學搆書院于萬松山巔集通省學士讀書其中奉之為十一郡之師每大㑹赴試者數千人惟先生進退焉事竣輯其所講四書錄顔之曰大成而梓以行世當是時世固重先生而兼誦開府之好賢能興教云予醫痺來杭就人問先生起居曰此三先生也杭多學人不敢以二十字呼先生而必尊之以五十伯仲曰三先生三先生不相見四十年矣前此二十年予避人湖西見麗京于廬陵城下問之從贛還也既而返南昌再見于吉水之水次曰拜吉水公祠也惟三先生不可見然而少壯出門垂老還故鄉曩時親朋並無一存在者而猶得見先生于七十之年不可謂非厚幸乃相見無㡬而先生以八十有三遽先我卒然且卒之之年計之即當時見之之嵗則是百年而一日矣先生初娶趙孺人賢而早卒生子二曰豐曰兆爵而紀孺人以賢繼之生子一曰正夫皆以諸生能文章當時羣從指名者長繁弨行人君子也髙才不試次寅麗京子進士又次冠左墄子以康熙庚午中北塲鄉試豐兄弟皆與之齊名而豐尤著銘曰從來名家出自禮官因義責實嚴于申韓當其盛時載書雞壇文章烜若氣節皦然降及末季猶以名先平輿品目界休引延譽士霧㑹大義日宣張霸曾子黄憲顔淵爵刺逺布盟詞髙懸君家前游實領百賢豹達五里龍開三門以是兄弟饒為文篇五常未著三賈遽傳懸圃積玉乃超雲間既入本朝門户改觀王蠋縊樹龔生抗咽賣藥韓休採薪百年乃謀養母終棲林泉何意不弔榮名招諐象齒忽拔蘭膏自煎叔縁伯及黨因鈎連五屬異獄三親同箯公冶圜土夷齊皇天將輸金矢兼謀槖饘籍兹呼救因而矜全于斯肥遯亡名變顔夏氏林慮焦先海壖鴻飛㝠㝠弋何纂焉仲死伯去孤居里閈爰授生徒鳴皷設筵授中國室進都養餐開府捧几侍御執鞭大闢講院萬松山巔明經四十習禮數千七十縣士咸呈簡編輿無歌鳯堂有銜鱣外市公超東家鄭𤣥某也半生匿蹟人間老而相見因思從前奈何頓别有如朝烟惟君大名千秋不刋亦惟有道無慚此言山隂金司訓雪岫墓誌銘越中以詞禪世者三人一吕君絃績一吳君伯憩一雪岫也雪岫為絃績館甥曽學古今文于絃績其治古今文不嗇餘力顧愛雪岫之為詞因問亦為之而與之並名當是時雲間蔣大鴻為蜀詞宜興陳其年為南渡詞各闢門桁以不襲草堂為能而雪岫則上自六季以下迄金元殆無一不有而綺霞詞稱焉嘗游嶺表與絃績伯憩三人者為兩廣都府吳君上客吳君故善詞而三人者以新詞與倡和角逐四顧無座人府中優僮充四廂樂部各能歌三人詞教頭曳長拍優僮扮演而民間效之凡里巷㸑色相竊歌新番院本􅊱􅊱稱盛事時都府以良日請召賔客呼外廂㸑色承應三人坐上坐都府把金斗約曰吾欲倣樂工唱涼州詞故事覘所演誰詞以卜甲乙及登塲則雪岫紅韎韐詞也都府擲斗令羣優實酒環獻讙譟達内外左右廂軍爭引領觀嘆以為豪云予歸田而伯憩死兩人故無恙也康熙壬午春絃績又死予以不得訃不能哭暨冬而雪岫即以其年死于官是時予大病㡬死未知也越明年孝子渡江持狀請所以題其墓者予乃為位于寄堂之門哭之延孝子就坐問故孝子曰亡父客年官湖學司訓而湖無官齋賃居于天寧禪寺之僧房甫入門恍然曰若吾故游者何也乃于長至後忽不懌命搨萬佛閣左石壁所刻馬祖像係宋元符年從江西靖安所傳摹者展對久之次日索清泉滌齒取厯書視云午時吉至午時遂起坐不語而卒是時頒白久及五日殮髭髯四張忽變正黒色汗珠顆顆起兩頰間不拭而䁧嗟乎是豈偶然也哉君諱烺字子闇明太常卿楚畹公之孫也生子四皆知名本朝龍興而諸孫多通籍者予嘗為君從兄郯城君誌墓門石深羡其羣從皆髙才好學以文章表見于世而雪岫尤最顧性孝每以父早世不及躬視養事為大憾而父伯星公則又以好善于崇禎之季賑救飢餓死而享其魂在天帝所予亦有文紀其事而君于先公所行必踵而傚之推所有以濟不足友朋之賴之比比也意廣喜結納座中罇酒無虚日而又以門髙譽逺天下之識之者衆嘗作觀文大社于龍山之麓築觀文堂以接逺近之至止者自浙東西以及三吳諸名下皆與通爵里訂氏籍而絃績是時則又以耆舊為前游實領袖焉君嘗之白門太常公曾以侍御史督學其地其所拔諸賢或通籍或不通籍尚有存者而君又復以縞紵與之往來一時投贄者塞衢路觀者慕之君美儀度意氣慷慨每與坐談具典午風概咄咄爭上絃績夙善諧謔當之蹇澁顧善于行樂每疏勝地為居游予嘗過其宅并過其所搆竹屋必有花草書巻酒具及座客斟酌詞意勃發其尤可念者宛委山邊闢廣園如干畝葺太常公所築亭榭而散植竹樹引泉鑿石于其中暮春雨歇黄沙漲天早食後登臺四望南鎮祠桃花與初日迸出灼然若朝霞之晃于衣因大書綺霞二字于石壁而以名其詞君生于崇禎十四年九月二十日卒于康熙四十一年十一月八日受年六十有二以前一年十月由貢士敕授儒林郎湖州府儒學訓導元配何繼吕即絃績君女也子八曰垓曰㙄曰堪曰圻曰埏曰垂曰坊曰均皆能文有聲某月某日將塟某阡故人毛甡者哀之其哀詞曰昔者三閭氏以英詞自文降此調六季變作江南春惟有崔蔡徒耀采驚殊倫用是屢施易五旦六間存少偕姜公子倣作蜀體新出走旋悔之棄置勿復陳山隂金雪岫時㑹西都賔觀文出麗賦諷㫖追楚均四家駭謠俗三峽傾河源偶以調笑弄雜入皷子絃因之譜技錄竊播勾欄間節度開幕府八部承賔筵獻觴走臚頭羅拜驅梨園嗟君本孝友晤善之子孫乃以鄉貢入對䇿公車門吳興舊學舍借作司訓官明經類匡鼎治事超胡瑗如何十閲月竟卒于竺乾應是再來者新巷猶故阡結趺且拱别面目如生前獨予年八十左顧誰比肩老友獨絃績亦既返我先賸此柴木質詎足金石堅我將賦招魂附爾宋玉篇老年戒為詞以此當偯言敕封儒林郎玉宗徐君墓誌銘徐氏為杭州右族其先人以舊朝勳爵從上虞來遷代禪簪紱越三世而門巷新闢即以衣冠著于鄉先伯兄司教仁和曾倡仁社于錢湖之濵徐氏與社者不一人而其翹然而最名者玉宗君也玉宗君寄籍湖州與其弟玉天君皆以名諸生為文壇要襋曾于甲午庚子間悞中副科慷慨不得志嘗寓其意于阜通之餘相視以時而趣日中以為業其言曰士人居牛衣困匪今矣顧逮今而困尤劇仕進無日本無學術之可見而仰有事俯有鬻關匪細也身安于蓬戸而子姓因之根苦則瓠苦亦何足怪獨是先人在寢應有妥侑夫盡物盡志非禮不將夫所謂禮者謂物也具也物具不足以將意則禮安所施是以禮有四舉曰恩曰義曰節曰權而必一營之于物然後其禮辦其志行其事備所謂一營得而四舉見焉故夫孝子之事親也樂豫其心不違其志意娛其耳目而安其寢食向非備物則敦牟巵匜何所充實枕席杖履何所撰擇稰穛蕡稻何所需桃李梅杏樝梨薑桂何所給又況賔朋姻婭盤盂饋饗車轂刀錯皆與在堂為周旋得之則愉不得則戚而極之養疾又極之送老縿幕錦帾薦車薦馬自非㢘者三之貪者五之料多少而通有無不得也其言如此以故自遷祖至今恢其里門雖曾遭祝融而故為完葺塈茨之又丹黄之其在扶侍則燂瀋斂襡執牀而舉几靡勿盡力而至其累營喪塟自飯玉熬蜄以迄荒齊苞載膋蕭膰㸑諸節無不彈其儀刑而備其名物世嘗于此觀禮焉然且父兄子弟後先妯娌熙熙泄泄雍于門而肅于宇至于婚嫁歡宴玉帛往來豐已而嗇人推有餘以飾不足其餘事也嗟乎若此者可不謂身名俱泰大丈夫哉舉世而窶貧也讀書居士林忝膺一命而家無儋石祭衣之敝而寢櫨之壊往往矣夫經財無贏必不能以攫却秕之粟而乃在野無亭林在園無里宅雕胡必不生于牆江鯉必不躍于水苟非揚一釡之金湧七年之榖欲其敦五教而洽百情安可問也吾讀君狀而重有感己君本四子而長嗣兄後次子瀾聞人也曾以年貢對䇿于長安門外司敎分水分水文學遂因之大起此固克有家而善繼志者乃不以予為不文介張君禹臣徒跣而謁予以銘禹臣云吾生平服君者三一侍親孝方太翁養疾時禮應禱司命井竈以及家廟而杭俗尚祠斗設星壇而禮拜焉君搏顙階下臚臃于血疣而不知痛也一遇物厚家不戒于火廬井銷爍庾廩盖藏多所失而時適斂租君反減其租以謝天譴彼受減去者相率上指曰天無親焉一持事斷王父母棺穴于蟻遷塟丁家山其擇地也腫胝趼足而後得之乃既塟而君兄弟家遇小𤯝且有牽訟于官者遂謂地不吉復議改遷而君執不許夫塟以安親也親骨受虫蝕不得已而發所寢今寢處已安徒以生人小失利而欲借朽骼以徼非分何可堅不為動及其既事寢而議亦遂息系曰君諱之璉字玉宗歸安縣學生也以子澎貴敕封儒林郎元配沈氏封安人生子四長瀇為長房嗣子次瀾次津次澎女二孫三女孫八先是君父紹川公生子三君其次也長兄玉衡公為前母蕭太君子及蕭太君卒而後君母王太君繼之然而君兄弟三人如一母子及玉衡君生子瀚已將成丁而玉衡君卒君其時推財與瀚且為瀚娶婦冀以有立而未㡬而瀚又卒君乃告祖廟而繼以己孫使長房不絶于祀固也特是家産本三析而已得其二不安乃商之王太君謂三兒儉徳好讀書治家無所贏六經不載人後禮三房倘生孫請同為瀚後而均其財何如王太君曰善乃集宗黨婣戚以母議為禮議定其友讓所及又如此君卒于康熙四十一年二月十四日距生明崇禎五年八月八日享年七十有一乃以某月日塟于某阡而系以銘銘曰惟士術學希聖賢降而詞業以舉牽君并善讀保傅篇首以蒼頡六法傳每作書勢成飛騫試事得失何足言誠惜謠俗衣啄專穴書鑽紙難逢年山深獸往魚赴淵時用知物同流泉勇能決筴仁可全無財不悦敢晏眠乃能乗暇師計然孝友任䘏從所便推甘讓肥共煖乾饋食何俟不擊鮮既肯堂構災無權況有嗣子能繼旃出車有鹿庭有鱣箕裘從此為冶弦相彼如斧如屋椽前列牲石載不刋壁銜鐟袵苞韋編春秋享祀年復年山陽劉勃安先生墓誌銘山陽劉勃安先生名士也予避讎之吳江顧有孝謂曰張元節出門其所投止皆名士得不敗倘至淮勃安可寄也及渡淮而山陽令朱君予故友也舍予天寧寺而飲食之因得匿姓名與淮人士相往來湖西施少參以入覲還見予所賦詩而驚曰此非吾友耶何以至此遂遍覓不得而淮城􅀢􅀢漸有刋章布府門者先生亟藏予而家無簃房設葦榻而張之屏牖之間家人厮養聲相聞顧日夕備酒脯潔㫖恭敬如是者一月且為縫綻衣乃去予嘗曰去家别親廟仰星而行牽衣者呱呱可謂慘矣然猶不若去淮之苦三往三復不能決盖有所感云先是郭君禹玉為先生文友貧而無子其所遺妻女以指食不給先生謀于其所親周君掄月給籔米至其女得壻乃止而桃源田子綖先生弟子亦以家難狼倉走京師遺父兄嫂妻四棺空屋中旗丁豢馬者覆其棺而埋馬棧于棺傍先生貸錢塟其棺然其諸生籍在學不試將削籍先生復貸錢懐之賂學師學師初受之及再試再賂學師幡然却之曰仁哉劉先生我亦師也先生既獨為君子尚忍受先生貸錢以充我賂哉倪天章者臨清名士也寓于淮予與先生時過之過必飲其堂堂前薜荔牆丹黄爛然每飲酣必面牆而立嘆曰吾所難忘者此薜茘牆矣及予寓蔡州聞天章割其堂與先生共居堂前薜茘牆兩家同之又既而聞天章不得志于其家人獨身出游暴死于馬陵家人以無子故不能留發其財散之獨以先世所遺宦游什器卷軸并書冊狼籍邀先生一觀且令先生擇所好取之先生不少顧既而并請以所居之堂損其值以貽先生先生仰天曰當蕭山君去淮時指此牆曰吾他時來淮仍當與君共飲此以無忘此牆今若此吾能獨對此薜荔牆哉蕭山予邑名乃急移他所遍搜其遺集而題其墓嵗時祭之先生一貧士而中外親戚并師儒相識往往仰先生周旋然且三黨多坎壈每以身後事孤墳孑廟厚集而遺于其人使其人逮死猶諵諵子姓一若逋積之不能了者豈天之好責仁人特畀此重累以成其名抑貧士數竒偏遘此耶先生本代州名族其先人六世仕宦皆以代州衛通籍而中遷于淮祖父伯仲猶以諸生還代州試惟先生與從弟雲中暨壬戌進士洛中始為山陽籍諸生而伯兄寅中則又以矯矯分所居寄籍揚州顧羣從在淮多貧者而揚州兄尤甚垂老無子夫婦飄然歸先生先生喜且泣曰吾兄弟少而合長而分今又合矣此連理枝也千文曰同氣連枝其是之謂乎因以第三子後之而養生送死忳忳焉嘗為子婦病治棺具而病愈不用羣從有婦死已給棺去而先生從外歸不知也聞有從婦死急向内曰何不以棺物與之曰與之矣外大父杜公與舅氏廣文公兩世以經術鳴于時先生嘗從杜氏學而已而中絶惟餘外王母董太君于堂時先生方喪母痛母不可見遂迎董太君歸養曰此吾母母也其後塟董太君于杜氏之兆率諸子共往曰吾何以使汝等偕來此絶墓也汝共識之矣鹽城王公為前朝護軍守府見先生少時有文名慕而妻之及歸而王孺人賢知書與先生同心先生之得為君子實孺人共成之顧鹽城水災王氏良田數千畝浸于水中官吏追呼無虚時公年七十餘生一子未晬而公卒先生先為經紀其喪命孺人攜其子及諸妹之未嫁者來山陽而身以營塟事重還鹽城忽清水潭決且霪雨浹旬日鹽城廬舍盡淹沒而棺為水漂不能救徒手而歸乃遺孤數嵗與其孫同時痘發先生大呼曰吾劉氏尚可無此孫王門不可無此子因併力治痘痘竟愈而復以他疾殀死其後先生易簀時舌僵不能言諸子請命初不答及再請則愀然巻舌言曰吾惓惓者杜公墓倪處士墓某墓其嵗祀法則久已命汝等矣獨汝外王母墳在浸中外王父柩為洪水漂去于心終不忘或于石塘祖墓傍畫一隙地治兩櫝而瘞其魂題曰故明某官某暨孺人某與杜公諸墓共勒一祀典而隨祖墓以祀之是吾願也嗟乎先生至死猶惄然于親故間乃至此先生諱漢中字勃安又字拙安少時舉諸生第一既而院試復第一食下士祿當是時試無出二三者康熙十七年貢于廷至三十九年始入選格敇授江南池州府東流縣儒學訓導曰吾老矣以疾辭不赴越一年卒時康熙辛巳距生天啟辛酉年八十有一配王孺人先卒子五曰仁朂曰義勉曰智勵曰信嘉曰誠務智勵為兄後而此四子者皆能以文章為諸生或餼于學或貢于成均先生既以身為教孝弟忠信而諸子能繼之以父為師以兄弟為友朋其意㫖諧合一若陶土之依模而冶金之就笵者予兒每隨計過淮必進謁先生于床下與諸子齒序如一家人嘗見先生蓄庋秩夜必三食諸子雖大寒至其時必羣起而環奉之嗟乎天之報仁人則亦厚矣先生貌莊而氣和于物無競而必不好諂即簡亦匪傲一切坦坦去牙角而每當大事則嶽嶽不可動家如黔婁而舍養親故且過于薛公之所為即有時遇盜蹠亦必以仲尼之誠待之予往誌墓無溢辭至于先生則筆短幅窄百不悉一然且年老詞竭墨未燥而淚已結于誌踈矣乃附以銘曰噫乎先生惟人倫宗才越公幹徳過祖榮矢將剸象羞為雕蟲展也好學而惜屢空氣當壁立言無雷同世爭買駿君方首龍奈何坎壈艱于遭逢爾乃篤行聿砥厥躬出入乾陽家門肅雍齒與道劭文偕教隆髙朋逺來如雲相從吳隠孝義裴楷清通訓足導物譚皆發蒙況敦睦恤時懐瘝痌雖乏恒蓄還輕素封好籍緩急力周貧窮所痛張儉曾投孔融掩漿牖下受書壁中嗟彼歸趙猶酬居嵩我獨恝然深慚此衷淮山峩峩淮水淙淙猗翹然者先生之宫西河集巻一百五
