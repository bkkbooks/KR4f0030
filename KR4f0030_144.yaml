body:
  text: 西河集卷一百四十四翰林院檢討毛竒齡撰七言絶句七題及門金公子看劍圖二首淮西風雪苦流連篋裏還留寳劍篇今日龍阿看出匣教人長憶十年前二神清洗馬耀霜提束髮從㳺愧放麑竹裏琴書猶在眼不湏重聽汝南鷄題㧬絹看竹圖長向吴中擬卜隣王家樓子竹溪濵練裙葛帯尋常見錯認平原是繡人重簡講官引見即事君王便殿早傳宣重簡詞臣入講筵黄帕覆牀纔咫尺親呼姓氏至尊前二曉禁彤雲捧日晴詞臣㡬度選承明桞邉歸院千門静聽得宫鴉三兩聲寄懐錢太史同年五年視草對朱扉墨汁看翻緑袷衣一自東㕔人去後海山屏下到來稀二新披初服總同鄉謂尤沈二太史也秋到江南橘柚黄詘指武丘西去路相逢應笑酒壚傍三上苑秋髙曉籞開洞庭白鶴好飛迴至和未就新唐史尚待歐陽撰志來贈趙司馬初度時正月十日将赴任長沙銀幡賜罷甫成旬又見雕弧絓彩新暫借春盤當夀酒錦筵雙挿縷金人二蒼龍乍轉照星沙夀酒䦨時已及𤓰為待潭州司馬至秦人三洞早開花依韻答隣友聴曼殊吹簫絶句二首新安江水傍烏聊春去楊花滿地飄縱使秦臺堪弄笛難忘吴市是吹簫二國士新書慢射聊杏園纔見酒旗飄李謩不到人間乆誰使宫牆度玊簫題姜實節歲寒圖雪裏尋君續舊歡金昌亭下重盤桓相看多少蕭條意恰好題來是嵗寒二朔風吹雪滿姑蘓濁酒傾來不用沽松竹院過梅樹下與君同入歲寒圖劉大廷俊客死湖北同人哭于夕照寺有詩奉和姜二承烈原韻玉河秋水下髙梁南望荆門道路長不見童鴻還闕下尚疑劉尹在丹陽二大隄南去慢徘徊招得巫陽且蹔回江漢湯湯流日夜欲于何處望歸來三一世才名擅越東休将時數問窮通醉來但説狂時酒醒後何曾識次公四修文天上誦彌羅古寺翻經柰梵何痛殺西華方衣葛夕陽亭下一相過三山驛送友之汀州同向三山理客装海􅔓先到柘湖傍楓亭荔子長汀酒一様傾來不共嘗奉和裕親王絶句六首即用原韻苦熱紅日歊歊麗碧空宫槐蟬噪夕陽中楚王自有蘭臺樂猶使廷臣賦大風得雨雷車初度雨初傾十日三時自有程此際一聞甘澤下何人不愜望雲情晝寢九叠屏風敞殿安桃笙卧去水晶寒巻衣侍女遥相待尚作前宵月下看秋聲西苑纔迴少女風便聼寒鳥呌雌雄夜來奏盡清商曲只在宫前㡬樹中秋夜雨空堦滴瀝暗心驚夢去猶聞决霤鳴總是銅池懸左掖却疑銀箭下西清射獵平原草色帯霜威出塞将軍號射飛風裏直驅沙磧盡夜深方向㶚陵歸楊青五十初度元月初四日憶昔閒堂對簡編子雲才藻正翩翩不疑學盡相如賦尚守𤣥亭五十年二裁度三朝賀玉墀故園東望一相思遙知畫矢祈年日正是銀幡祝嵗時題王武為吴山人畫武為文恪公裔其畫意即山人詩也但言李益詩堪畫不道王維畫有詩一幅生綃題不盡粉團芍藥與黄鸝二金閶邂逅朔風天不見吴生已十年却喜畫圖相對處草堂三月暮春前弔姜貞毅詩有序萊陽姜給諫埰以劾權相得罪杖戍宣州衛未至戍所而國破遂寄吴市逮死屬其子移棺塟宣州四方觀者各投詩弔之予最後至亦成五首并詒其子安節實節貞毅者學者所易名也曾披閶闔扣天闗垂死孤臣未賜環遺命一棺何處塟宣州城外敬亭山二叢叢馬鬛覆柴青壠上荒碑未勒銘大鳥欲來雲乍起昭亭何似夕陽亭三唱盡門生薤上歌道傍虞殯已無多殿廷若個能攀檻圖畫依然是荷戈公像有荷戈圖四吴闗不傍要離塜南鄭難為太尉墳回首故鄉歸未得可憐曾戍水西軍五長窺封事泪如流千里生芻愧未投欲向江南訊遺跡徳公兄弟在徐州謂兩嗣公也遂安方大明府有舊琴失而復得紀之以詩焦桐本是道山材彈向霜風聲最哀一自前溪相失後是誰相伴㡬年來二響泉亡後斷冰絲何幸重彈渌水詞猶是山牕初睡起東牆紅照夕陽時予詩謬為商景徽閨秀所誦題詩過情因用其原韻自謿兼以志謝其外人徐二咸清吾好友得貽與之複壁藏書二十秋空箱蠧盡有誰收那知長史南遷後猶有昭容上綵樓二㡬斛青螺傍鏡臺題成麗句百花開生平何幸交徐悱得藉三娘藻鑑才附原詩芙蓉露下小池秋金鴨烟消宿雨收讀罷毛甡瀨上曲都梁艾蒳滿粧樓綵筆翩翩傍玉臺頻将繡帙向風開可憐杜甫驚人句不數陳留曠世才和徐昭華讀瀨中集原韻有感秋霜如雪褁冰蠶石闕高時口重含不道羙人居洛水能憐才子在昭潭二欲唱迴波未有詞鹽車無復騁雞斯若非道藴眞才女若個能吟中散詩附原詩臙脂花落覆紅蠶獸頸初埀火自含坐對西河才子句渾如秋月照澄潭少小曾吟白日詞蘆中人去竟如斯溧陽浣女空相殉悔不先吟瀨上詩題畫為夀仙山萬仞接樓臺溪口遙從草閣迴因祝西池王母夀銅缾盡貯紫芝來書王編修母朱太君旌節錄後京陵有子母為師丙夜猶㸐白玉脂傳得一經長自嘆只因中有柏舟詩二東堂禄養度居諸鎮向蓬池鱠鯉魚棹禊在門旌未已聖恩方錫紫泥書過任丘清水湖作棗林庄前清水湖滿湖菱藕并菰蘆馬頭錯問任丘客誰賣松陵秋汎圖二湖水漣漣清且深長堤十里跨湖心行看堤上招商女但唱幽州馬客吟三碧栁千株傍水栽紅橋萬柱逐堤開袛應人在江南見那道車從趙北來王進士新婚詩瑇瑁堂前雙燕飛王郎初向曲江歸携將舊賜三宫錦翦作新娘百子衣二試佩開元賜宴錢故邀夫婿看勻綿但知藕葉生江上不道蓮花在鏡邊徐昭華乞試命題畫蝶喜賦二首四十年來老自驚新收門下女康成不知書靣縑花好試看階前帯草生二深堂樺燭照啣巵隔幔吟成畵蝶詩不是小鬟頻乞試那知閨閣有陳思秋杪重送秦太史假還山陰共入東堂已七年碧山南望意悠然羡君兩度還鄉井不藉青龍寺後船二秋花初發約同歸何事君先秋雁飛一曲鑑湖能乞與明年相待浣春衣和憶鶴詩長因賣賦結秋蛇右臂支離類凍茄何似繭園仙驥好只将雙爪畫圓沙時予病臂故云繭園葉氏園名陪諸公集宛平相公園林十二首有序時當二皡候届三商開平津東閣之門招鄴下南皮之客聖主重元臣親題光徳時字上親題席寵堂三扁額手書以賜詞人依上宰侍宴芳林集賢里北車過裴相家園細桞營南席設岐公别業藉片時之請沐許延景以賦詩潘生陪梓澤不廢廻谿峻坂之詞公幹在西園每慙菡蓞芙蓉之句因成短什便紀良㳺山庄請沐駐驂驒曲徑通街出巷南纔到射堂門啟處門紗映出一山藍二青溪百折洑流低不見桃花路已迷欲向巖前尋舊跡漁舟尚在洞門西三赤欄斜度暗杉闗樹底吹笙鶴自還行過摘星嵓畔望紅亭髙出碧雲間四丘壑新題集慶餘剛逢宸翰賜來初不懸宫左逰巖榜為有元和石皷書唐元和間賜李寛石皷書院扁額非韓愈石皷詩也五潞公水曲一陂穿華子岡從百谷連丹竈曉移修竹裏繩牀晝設石壇邊六小雨初過景倍清山堂設饌午烟晴緑腰唱罷彈俱歇滿耳惟聞流水聲七行㕑斮桂煮雕胡渌酒清漿瀉玊壺粉黍細摶梁父雪金虀雜剪碧紗蒲八草花續樹晩猶生石棧連雲斷復行怪道午橋光景别一花一石手經營九平門近市亘修廊西北高樓傍粉牆桂檻下臨光徳里桞絲低拂永豐坊十尺五城南逼斗魁丹霞麗日晃樓臺翠華若幸汾陰返定遣山庄圖畫來十一前林赤槿後烏椑􅣇􅣇流泉繞北陂記得籃輿曽養志潘生西宅賦詩時相公先人文貞公曽頥養于此舊名怡園十二石上窪樽就飲頻座中綺里髪如銀十年未得還商洛願作留侯門下人青未閣十景之二和徐昭華作郭外春山城邊髙閣起嵯峨城外春山列翠多只為倚牕描不盡尚留一半在青螺城頭夕照百尺珠簾捲落暉畫欄初換晩粧衣如何城畔丹鴉色偏照樓頭青鵲飛閶門舟集别施使君閏章有感當時惜别使君江清泪雙流滿玊缸今日金閶重話舊夜深紅燭照船牕二閶門夜汎酒盈巵後㑹兵戈未可期何處流連心最苦虎丘山下泊船時尹坪以琴譜并詩寄予依韻賦答時小妻曼殊將亡十五年前汝水濵為彈清角每相親一從君作蘓門客頓使身慚桞下人二正向朱絃哭素心感君遺我舊徽音如何遠道将離曲雜作商陵别鵠吟過姚江俞石眉宅東行不逐海濤魚為覔雙鈎一駐車記取龍泉山後路秋花猶覆子雲居題閩縣溪麋老人偕隠巻子誰謂藍田好避秦鹿門猶有未棲身何如負甑仙山下夫婦同為採藥人二黍臼閒從紝器排相携一上釣龍臺十年虛逐東方隠我欲從君汎海來題佟二公子記年圖公子善書畫并詩是圖把筆伸紙踟蹰未下鄭䖍三絶有誰猜一幅籐箋帯笑開未蘸墨潭先問取是書是畫是詩來二蕭蕭梧竹映清姿畫裏逢君最可思彷彿舊年湖舫醉孤山亭上畫梅時孟生南歸四月輕裝出帝都秋來我亦乞官湖到家若遇茱茰節同向山隂訪桞姑二天安門外上書遲頓折宫牆碧桞枝北闕敝廬休詠去箧中應載孟亭詩碧山庵團標八尺掛長幃雨後斜翻松頂暉山半沙門持鉢下碧天片片落僧衣病臂辭試讀棠村先生新詩呈簡禁城花栁日芊眠左臂書空思暗然挾得棠村詩一巻不須更詠鹿門篇二肘上生楊欲覆身春衣換去只懸鶉諸生薦逹雖無分猶是司徒門下人陳迦陵妓席予不得與因索題扇賦此時予以病臂赴部辭試用簡棠村夫子詩人字右手從來慣詘伸翻因賦洛坼如龜從今幸免娥媌妬何必低頭見羙人題徐髯畫像髯字祐植枓木長蘿掛紫絲溪山深處坐題詩試看石上含毫處何似參軍入幕時二挹水烹泉蘸澗芼掀髯抵石踞來高不知相對滄洲客頰上于今添㡬毫丁澎採芝圖葯園先生冠􅀈冠深林負杖斸芝還祇因相見還相憶手把斯圖看復看二獨向深林採玉芝林端駐杖有何思須知屬國南還日猶是顛毛未白時葯園從塞外歸故云集侯官荘明府園居即事數畝閒園迥絶塵丹花碧樹蔭通隣最憐薛老峰邊石偏對䝉莊座上人烏石山上有薛老峯正當園南面二雞䐢鼃炙酒如窪㡬局棋枰傍晩霞啼鳥不知山客去雨餘猶坐刺桐花西河集巻一百四十四
