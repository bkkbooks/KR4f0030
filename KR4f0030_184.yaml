body:
  text: 西河集卷一百八十四翰林院檢討毛竒齡撰七言排律泝大江泊桐君山下作大江直上泝新安為愛桐君繫纜看幾樹緑蘿懸露濕半林黃葉帶霜寒三時水嶼迷煙市萬疊秋山潄錦湍婺宿影含書閣曉浙潮聲傍釣臺寬帆檣估客歌黃淡橘柚人家翦緑團花種上城懷杜牧草環故宅問方干紫巗洞口雲猶閉烏相門前雨未乾丘壑儼然羞豹隱江山如此笑龍蟠望中未覩雙峰澗去後應過七里灘繡石障村真足羡仙棊布地有誰觀滔滔水國憑雙槳漭漭天涯負一竿那信戴顒還到此雙柑斗酒暫盤桓過上海訪任待菴明府有贈遙從滬瀆訪琴臺二月春風海畔回地僻乍驚新候轉官貧不厭故人來陶家秫向年前釀潘令花從雨後栽戍堞但教懸畫鼓訟庭真見鎖蒼苔祥鸞欲下知為瑞斥鷃相過不用媒客至歡然炊緑黍兒時苦憶弄青梅平津布被仍聨袵季子羊裘未振埃三載有懷方就日四郊作誦已如雷屬車私喜陳琳在高宴將為司馬開坐見徴書來北闕賦成祿養是南陔龎公豈藉銅章顯田鳯終推錦帳才同學暮年應見少青衫相對且徘徊贈周雪客大梁公子最翩翩執手丹陽柳樹邊三俊豈能遺顧彥一經長得嗣韋賢庭餘北海樽中酒家鮮司農肘後錢久别愧無蘭芷珮相逢正廢蓼莪篇南征濫入青雲幕北去還停白下船遮莫東田留舊咏風流終賴彥倫傳錢聖楨招集湖舫分韻得齊字冬晴佳氣滿湖堤况復賔朋儘可攜共道主人饒玉醴何期公子出金閨謂佟觀察公子伯仲也巖邊秋葉飛將盡山半朝煙收未齊曲􅓅並投蕭寺北𣟵舟先在斷橋西平臯坐去還留簟老友逢來總杖藜祠下幔竿搘緑漆道傍亭子築紅泥隔林見石蹲如鷺隱舵看山臥似猊風緊背嘗遮柳槅年高齒不任薑醯酒因談勝當脣落歌為筝煩到耳迷插漢露披青菡萏翻波日射碧琉璃樊成官籞方袪馬席換仙庖且臛􅏲主客豪都成鳯舉弟兄愚轉愧雞栖家稚黃會侯俱在坐晚涼錦帶吹逾薄夕照雷峰看漸低誰謂蒼茫歸路遠錢唐門外有招提三月三日臨江官署褉飲二首臨江官閣啓江濆上已銜杯對夕曛才子風流吟麗日使君高興入青雲沿流疑泛桃花下滿署爭傳蕙草熏舞柘偶然來捧劍披茅無處不湔裙諸公洛下隨王宰千載蘭亭想右軍獨惜暮春遊子淚每從佳節倍紛紛二桃花壓郡傍江開飲褉還登江上臺朝雨甫隨帷甸捲春潮似逐羽觴來前亭聽伎歌初發别座論文酒莫催日出花寒猶集霰是日午後雨霰階前草長為驚雷九龍原屬徴賢宴三日慚無應詔才何幸天涯重依倚將離未贈且徘徊臨平别潘廷章一十六年旅舍揀得所寄西陵曲哀思妙麗感生客心因為賦述且志鄙憶臨平村館夜蕭蕭春雨連江泊畫橈别去遽如雲外雁思深長逐暮歸潮十年遠道搴荷葉一夕高樓對柳條羈客懷家新篋笥美人報我舊瓊瑶西陵曲好縈沙路東海鞭難渡石橋苦憶潘郎才藻美相尋無那夢中遙客中寄薑司諫以京卿候補都下十載承華侍從臣還來闕下待絲綸早推當代端圭彥猶是前時諫獵人起草尚濡兩省翰看花時掃六街塵留賔夜永開東第少輔星高近北辰火藻繡成衣照眼山桃剪合綬垂身懷豫屢寄曹王劄知已誰操郢匠斤異地望回卿署月同遊記得客年春賀循久喜能逢晉張祿原來未入秦倘使故宮通碣石敢忘高閣在平津過汝寧奉贈金太守鎮一十四韻郎官出守本風流况復雄藩是豫州下吏盡如新息長專城原屬富波侯九田作賦推中等千騎看君居上頭招得牛醫來館舍夢將女子渡河洲高車拔地熊隨軾翠羽當風隼作斿自愧攀轅河上過真成躡屩潁中遊桑花製酒村前醉蒲葉如鞭澤畔抽宿堠頓驚茅店曉入關剛值木陵秋無才豈敢依羊陟入耳唯聞誦賈彪大府此中猶露冕思鄉何處更登樓晚來擇木烏無定春到遷枝鳥有求三老懷錢終自獻十年借冦恐難留他時列棨霜垂戟此日褰帷月在鈎但願屢攜青鵲印終然一御黑貂裘以詩代札懷復沈九嗣范祕書一從把袂分淮市幾次封書出禁闈結綬肯思黃叔度行吟空憶謝元暉憑誰極浦題青草愛爾分曹對紫薇仁壽鏡邊搖綵筆上闌花裏賜宮衣徒聞西掖鵷鸞隔又見南園蝴蝶飛太史藝臺行處少仙人蓬島會來稀安丘避地歸何得剡曲移家願屢違便有黔婁貧到死莫嫌方叔苦猶飢院中容昜推高第吳下終難定少微已分名王無自達暫逢賢守且相依時豫依汝南金使君署故交遠道還貽綺久在他鄉敢佩韋但詠玉堂懷友句不知珠淚向誰揮題無錫縣麗譙樓十二韻并呈吳明府吳關千里擁神京猶有層樓倚太清裨海近環分楚越大江東下控蠻荆雕楹疊起連虹度畫角重開映漢明一曲謳歌闤闠地萬家煙火闔閭城按圖復道年來聳懸鼓當門夜不鳴碧水有湖宜罨畫青山無錫自銷兵忩中鳥雀穿簾過棟裏雲霞入座生喜共仙人間著舄愁聽玊女細吹笙題來文杏垂秋露看去官花照晚晴落日暫登思縹眇凌雲欲賦氣縱橫彤廷久已無南顧彩筆何煩寫北征但得從君頻騁望漢宮高掌在金莖同諸公飲劉四廷冠柚園八韻素蓋西園集勝遊玉缸初發雁來秋當筵喜見環林柚滿案愁看剝石榴並坐佳人彈錦瑟十年羈客擁烏裘酒中惆悵孫馮翊天下英雄劉豫州意氣漸深交履舄主賔不住錯觥籌時聞薌澤同煙裊倒瀉金波漾日流欲上山亭舒望眼重翻水調換歌頭也知龍澗須遷飲爭奈鴉棲不可留春行自東城迤北郭到北幹山腳悵然有述春城無處不留連北郭晴光最可憐數里川原初過雨萬條楊柳盡生煙到來祠廟開山麓望去人家倚墓田荒縣麗譙傾未復空壇華表𥪡依然草頭喜見飛蝴蝶樹裏愁聽呌杜鵑半嶺行過皆舊徑隔溪流出是新泉頻縈道左將頺苑偶泛村南不繫船斥堠橫沙連大漠郵亭高嵿列諸天登臨悵惘違時俗詩句蕭條念昔賢燦曰古詩蕭條北幹園長願棲遲歸十畝不虞兵革歷多年新經無復聽松地故老猶傳伐木篇但得間行餘我在那知春色向誰邊奉贈薑掌垣內轉候闕歸里并覲幾年起草重明光十載恩書出尚方超級暫應辭虎陛鳴鞭久已振鵷行覲庭舞綵紆蒼綬里社簪花拂皂囊嵗減數千餘諌紙函留七十二封章霜蹄歸沭追張湛白筆敷詞過謝莊戲藻看魚分太液棲梧有鳯在朝陽兩垣舊第開丹幰五月新荷抱緑房幼度尚思朱雀里王褒曾返碧雞坊璆珂響曵中朝履襆被風傳侍女香一室競將窺武庫三旌虛起待文昌纘戎誥出尚書省祿飬歡承水部郎內寢自調瑶作膳上邽真見錦成鄉蜀車前負郎官弩衛國終登僕射牀他日早膺華殿詔為君重舉泰階觴遇高詠蕭江幕府高子相逢碧嶂春可憐白帢照花新同為江畔登臨客猶是天涯骯髒人官閣夜燈彈瑟調山亭曉樹接車茵文成鮑照還依楚窮似張儀未入秦兩鬢風霜交欲墮十年湖海一相親難忘幕下題詩日莫負城南載酒辰二宣城久念玄暉句江上裁聨郭泰船望去故園芳草外歌來寒食落花前青山築室期何日白眼看雲入暮天河內再遊成鳯舉金陵一曲恨龜年高有金陵行傳世定交愧乏公孫紵贈我哀如蜀國絃那得移家還就汝敬亭山下共流連宴崇仁官署同陳石麟進士劉尊汪懋勳諸孝亷呈駱明府茂宰官衙倒玉壺嘉賔雜坐佩錕鋙風流不數潘懷縣才子原推駱義烏江水天然開玉液地衣霜映似金鋪筵前高論騫鴻鵠燭下新籹舞鷓鴣疊幛盡書三壽詠時座張太夫人壽幛環林如畫十洲圖殘弦已墮天邊月寒葉還吹井上梧鄴下友朋懷宴樂茂陵車服愧間都感深厠末猶蒙顧醉倒階頭不用扶秋去宋生悲結軫年來阮籍畏窮途那知江畔逢良會仍是天涯舊酒徒厠之坐末為厠末元夕觀燈同徐二十二嗣定作每逢三五憶當年况復春燈在眼前曾向上元追唱和誰能此夕不留連江城薄暮開瑶市地主中宵列錦筵一道長衢鋪月色萬條寶炬動星躔爔輪熖轉爭疑電火籥花生并是煙挂樹密教朱鷺集穿街遙見燭龍眠千枝繡幛圍羅綺百變新聲入管絃妓宅飛香矜篤耨軍人合樂奏于闐環橋散立長明樹啓署渾如不夜天未有金吾防鎖鑰從看玉女下車駢光分衛玠停珠勒暗裏羅敷落翠鈿戴去鼇身橫碧海擎來龜足踏紅蓮沿流訝向波中見繞堞驚從天際懸神象舞餘間戞齒村童逐處笑摩肩但聽東邸留歡曲未和南樓應教篇潛入平津觀祕戲記于故國醉燈船良辰屢惜吳關杳好友多逢楚水邊斗轉漢回人散後踟蹰獨立倍凄然九日臨川獨酌有感并寄徽之大敬南士誰言霜雁經年返又見黃花九日開天半寒風吹木葉土中無射動葭灰愁登建武飛猿嶺深憶彭城戲馬臺前嵗曾觀旴水去今年重滯幕江隈已聞羊叔留碑待何處王𢎞送酒來蟋蟀詩中三致慨茱萸亭下一銜杯遊無江夏參軍興人負臨川內史才藥市神仙壺裏臥柳家嬌女陌頭回宅鄉獨對寒林酌故國疇將錦字裁不識青山從眺望可能皂帽共徘徊客於淮隂過漂母祠下悠然感興效長慶長律以抒甡仰懷之情淮水湯湯赴海門淮陰城下一孤村東流不斷長淮水淮上長祠漂母魂當日水濵來擊絮曾于此地餉王孫高情豈望千金報雅意難忘一飯恩志士有時丁晦塞丈夫何處假涼溫我行避地全無著人事它鄉安足論落日偶然祠下過傾臺依舊水邊存蘆花淺瀨沉沙岸蔓草荒碑臥土墩白日西馳風勢緊黃河南下水流渾關漕鼓發如鼉吼估舶帆收似蟻屯棉子綻包涼露色柳根穹接上潮䀶一時感爾名千古再拜呈豫酒一樽韓信尚憐無所藉劉安那復自言尊舟車官客從澆酹燈火鄉民效駿奔唯我遠懷煙水外踟蹰獨立到黃昏兀庵節嵓蛤庵同集淨土放和尚許各賦詩見懷奉答長律一十二韻遠師初住虎溪邊便集廬山十八賢雲外共尋溪口寺雨中偏到渡頭船解開經槖參堂轉罩得燈紗對榻眠擊鉢舊過祗樹嶺燒鐺新煮落花泉年多不記安禪偈夜靜重吟懷友篇宛轉説憑龍女聽殷勤書向獵人傳違時未得紆塵軫此日還留出世緣德士總教頻指月習生從此愧彌天翻來字裏藏金葉諷去聲中現法蓮為擬和章時隱几因知得句定忘筌門同臨濟原無别路隔恆沙豈易連縱有餘霞能問訊碧溪負杖在何年晉安朱氏新闢山園築臺飲次索題一十九韻初闢山園笏地開傍嵓高處築層臺一城煙火衝簷出萬疊雲山入座來書幌筆床間拂拭酒鎗茗碗費安排欄邊薜荔因風發窗外芭蕉帶露栽石榻就崖留枕簟壁㡡連檻羃樽罍鄰墻低見雙抽笋曲磴斜懸一樹槐吟罷呼兒頻洗墨興來招客共銜杯市將梁甫銀泥餅瀉盡榮陽土室醅釜底翻波烹雉汁盤間飛雪膾魚胎藍超洞訝丹花接歐冶池尋碧水隈天際撲還蕭寺影雨餘圖作米家堆靣當幔柱鋪空翠背觸垣衣落繡苔絶巘晚來堪倚徙隔坡時過得追陪每因適意多開牖不為逃名更鑿壞愁見碧霞徒散去間看白鳥自飛回十年隱豹難藏霧五月喧蚊好避雷境僻暝含衣上月地高寒洗屐頭埃披襟不減臨三島引領何須遍九垓但得名賢同嘯咏且留此地暫徘徊過雲門謁俍亭和尚同薑京兆蔣平階張杉二十二韻雲門高峙鑑湖濵乘興同來一問津慶緒久為方外友陶潛原是社中人到時山葉銷寒色望去蓮花結勝因千載門庭渾不改四圍丘壑宛相親行隨過客朝華藏坐見空王轉法輪高閣齋鐘敲處遠長廊粉壁畫來勻方開玉篋探三果願借金泉洗六塵驚拜偉長俍亭即徐繼恩也如隔世悔言智永是前身他方遠遁言歸晚何處相違不計春話向劫前頻似絮髮從剃後散如銀拂衣早得完婚嫁作賦猶能動鬼神蓋世覺場棲道一當年捨宅想王珉前朝遞勒黃絲字後院曾邀白㲲巾船載溪風憑往復石遮山雨最嶙峋樵風涇石傘在寺側門前牛馬馱經慣林下烏鴉念佛勤象寶鑄為阿育女龍牙貢自海波民秋深土鉢盛紅稻午過香厨供緑芹聽講喜追山魅至放生徐見水鷗馴宰官就訊同殷浩居士當參得許詢擲麈談玄殊自暢卓錐無地豈全貧曇關再啓知逾晉桃樹初栽為避秦但使下方能假憩誰言至德定無鄰奉呈益都相公生日二十韻黃扉曉闢日初暹瑞靄欣從帝座覘五會星辰雙闕現一天雨露萬家霑致君久已如公奭薦士從教識杜淹但典册書先國史每因講席領宮詹班迎龍鳯池邊揖名向琉璃碗內占平見台階揚玉燭驚傳宮漏下銅籖入朝每帶蕭何劍上殿曾埀鍾傅幨香草紉針堪補衮空桑負鼎為調鹽千盤鶴醮將安飾十載孤裘未是亷例簿却程追冦凖租庸變法笑楊炎分屏宛見三旌列搢笏多為百辟瞻上秩禮同河嶽貴下賢意比地山謙文隨泰始開林囿樂奏升平度里閻徼外問安爭啓幰車前白事不隨簾金鱗在榜應傳鉢寶軸盈箱盡賜縑撤到碧闌連霧捲判來紅押帶花箝圖形豹尾縱橫接篆迹螭頭顚倒粘肘後籙憑籛氏授海中籌共子房添年踰單豹才方壯位進非熊志未厭莫道耆英才視杖格天大業早能兼戊午九月豫謬以入薦赴都奉謁李學士蒙賜晉接兼屢有請召陪侍宴集謹賦長律一十六韻志謝東堂學士愛才賢蟠木何曾有物先時接𥪡儒鼇禁外晚開高閣帝城邊買臣無復將車興曼倩剛逢待詔年失學偶膺三府辟空羣竟遇九方歅虛疑白璧終投楚不道黃金尚在燕暗解蒯緱歸幸舍驚看芼鼎列長筵和成春芍芬于术摘得秋花小似錢幕後徐呼賔從出楣間高見御書懸近欄竹石皆仙署滿架縑箱有賜籖坐覯趨庭回玉樹行逢撤燭散金蓮春坊詩本徐摛授左相經從韋孟傳時大令新登賢書中席惠見高語任傾千葉漏醉歸難控五花韉感深嘉意增留戀賸有微情荷採甄幾度謬陪瑶海晏平時况誦柏梁篇彤雲遠覆珠幢下淑氣遙吹香案前但使聖恩能泛被從君乞放五湖船雪中入直史館即事十韻朔風吹捲御河沙早見天街散雪花苑外撲將千片蝶壇深噪過幾羣鴉遮成翠帳疑朝雨望去紅牆似曉霞誰賜錦貂還左掖獨騎羸馬上東華人逢玉署欣投璧身在銀河未泛槎隔院冰敲懸幕鐸傍簷糝落濕窗紗驚心鎮自燒青簡呵指真難草白麻渴至未傾杯底酪寒多先結硯頭窪宮臺嶻􅑖依天近輦道回環歸路賖一望蒼茫愁思遠東安門外即天涯王師收復成都詔集百官于午門外宣捷紀事十五韻凱奏初宣曉漏清王師收復錦官城春還玊壘堪傳檄水下瞿塘會洗兵已報王均逃廣漢先教鄧艾取陰平統軍不待徴龍武要路曾經過馬鳴劍閣雨寒朝出棧草堂花暖夜連營降旗江漢風俱動積甲峨嵋雪漸晴喻教久當開僰道樓船從此破昆明歸心似附千官影稽首猶聞萬嵗聲六詔烽煙將寢息兩階干羽自縱橫星纒太華看歸馬日出平臺好晾鷹聽去銀笳穿玉峽望來銅柱象金莖帳前有客能摩盾闕下何人更請纓劉闢不甘為副使韋臯豈便是書生恢疆大略需威克告廟雄文在武成欲識巴渝何處舞但看鐃吹滿神京寄贈柏鄉相公生日一十四韻元臣復辟已多年歸臥東山興渺然天子久思黃髮侶都人猶誦衮衣篇集賢里第需裴度通德鄉門屬鄭玄賜杖不因酬赴闕著書豈是記歸田兩朝盡瘁餘鐘鼎千聖相逢在几筵靜裏有籌還借箸間來得句已忘筌鉏苗隴上當牛喘煮藥階頭共鶴眠永夜看星嘗傍斗隨時掣電笑如椽談深總落珠盤裏詔密曾聞玊案前連嵗歉虞民力竭歷年高受主恩偏中山踏盡蕭何履灤水通將范蠡船廢劄欲焚開兩甕緼袍難值到千錢金籯遺得韋家教玉樹多于謝氏賢祗為赤松遊太早一觴長寄海雲邊西河集卷一百八十四
