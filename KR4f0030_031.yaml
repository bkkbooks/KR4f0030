body:
  text: 西河集卷三十一翰林院檢討毛竒齡撰序八樂天堂集説序孔子作易傳以旁行不流為樂天之實夫旁行者曲成也士君子讀書談藝本期出所學以道濟天下而勢有難為則必旁行之以曲成其意蓋天道固如是矣崔子遺山以文章名世而連不得志遂漫遊人間往往以純任自娛而乃顔其堂曰樂天一似借安居以俟命也者而余曰不然古者遊仕人國多藉友教士大夫為乘韋之先故東漢諸賢去古稍逺然猶受郡國徴聘一展裁畫今遺山久擅文賦兼饒經濟偶一舉足即縞紵四達真不減潁川當日羔雁填門巷者從容談笑治術犁然此正旁行不流道濟天下之正説也不然樂天知命與安土敦仁亦殊途矣以志在四方假浮家泛宅為漫遊計而反與安土者同其歌詠意固何為豫耄矣行道濟時有志未逮能假嵗月尚思登其堂而與之樂之童煒行稿序古無傳經墨義者故世謂制科所作與古文辭異信爾則是平津江都之策不傳于今也然而遽謂帖括章句之即為古文辭乎則詩又不當異賦賦又不當異䇿與論也特世之攻制舉者習燕烏揣摩之説以為舍墨義必相戒勿復涉一字即二三場䇿與論與表判尚不得與墨義同觀况其他乎是必得一研精古學者出而雪其語童煒自甲午公車以來縱觀二十一史并他所藏書人見之輒掩口去己亥既已魁禮闈以誤字仍斥落復于康熙庚戌冠庖經房對䇿歸里與邂逅于淮西客舍出其所為文讀之然後知向之所期兼古學而得為經義帖括一雪其語者煒是也煒為文不廢揣摩引繩削墨而要自有其渾淪之氣充斥其間譬之以長沙江都詘而為李程之賦五色依然一元具舉何其壯也人苦無才有才矣苦無學有學矣苦無時乃亦有有時而反無才與學者吾不知無才與學者之得比于無時否也而特是以不愧逢年者為煒喜即以振興制義為天下慶易曰觀乎人文以化成天下然則天下之待理吾于煒卜之程子曰詞麗而旨誇者應世之文也編詩書而不愧措天地而不疑傳世之文也然則經墨義之能傳吾于煒卜之傅生時義一刻序豫隨兄大干讀書于傅元升之草堂裁弱冠耳元升每宴會輒抱子出偊旅歌古人詩豫見之私曰嶷嶷者後來之秀耶然不料其能從遊如今日也自變遷以來豫焚棄筆墨者已八九年夙昔攻舉子業已矣即郡邑為舉子業者亦曰是家已放廢不復甘為時義為時義亦不當豫每遇元升宴會見其髮漸白然且勞苦道平生歡彼退雖語人兒能文當從大可遊豫聞之心驚是當日宴飲出拜客歌詩者耶然又自歉故人知我我恐以不能為時義者負故人也今年春以鄉里多故避之橫山乃復入元升草堂視舊時桃李梨栗園魚池竹都有存者元升乃率兒拜豫堂下豫起視之喟然曰嚮使豫弱冠時或謂兒聰明他日者將從豫遊豫必且恨以為安得此久處者也即既已久處無所覬望然一聞是語猶且恨豫安得七八年後猶然抑鬱無他懷也今何如矣子前此所從遊者史憲臣也豫不能時義而憲臣能為時義豫不能時義而憲臣且能以已之時義使子亦能為時義憲臣為昌黎豫為籍子為湜互持其教亦復何恨豫所恨者故人子弟日就長大豫倘久詘處豫恐七八年後其所為拜客謳吟者且不知其又何等也傅生時義二刻序夫車工造車而得以車名則必其車可見于天下而後閉門為有餘假使輪無可視輻無可驗輈􅀈輢較無可顧盻吾見其􅠶也曩時為髙文者率能出其文使天下見故方其未行即世已得指之曰此某君文及既行而果無所謬夫而後始得以専家目之今之為之者不求可見屣舄視不出閣若以為暗昧無可示者而一時孰師里朋率無容以問學相勸勉銷晦隱抑命曰揣摹其未行也墨墨然其既行也墨墨然自號為車工而究不使輪輻之可見于天下終生之肄業一技勿就嗟乎惜哉夫猶之貪天之工以為幸獲而有所挾以徼與無所挾以徼相去何等不持直而就博博之雖勝與無博同然且曰吾將逢時夫果秭鵙不見􅗍于春而知春廪霜不見下于秋而知秋是使皵檟不逢夏皵楸不逢秋無不可也吾生十七年而與傅子元升讀書于橫山草堂又十七年而又與元升之子四如讀書其中白石既旰朱顔已遲乃復幪首塗面選科舉子業既以四如一集序之行世更纍其近作次為續集夫以終生造車削衡規輻合二十餘年無一顧者而又令其徒挾持自好此與夫世之隱閉掩抑墨墨以幾者得毋有間夫春華未發幽蘭自芬秋潦既縮原泉始見吾不務為可行而務為可驗即使造車者終日閉門而其學自見于門外必欲進前而問曰閉門乎造車其行止也何如吾勿告也傅生時義三刻序射無所為羿也貴能彀耳御無所為王良與造父也貴能乘耳文無所為王唐瞿薛歸胡許湯也貴能行耳必曰文章佳惡多與遇違豈通論與然而色之美者必辨於目聲之善者必解于耳惟文無聲色是以不能有所視聽或青黃不分洪纎瞀然向使色與聲亦皆有命則未必青之不淆而為黃洪之不變而為纎也故曰物之憑乎人則物之不能自有其天也文章有其天故雖人事而亦實若有天焉主之豫與四如讀書溪山草堂已二年矣其前一年則皆攻苦之旦暮也自盥水啜食而外必質疑問奇窮極微渺凡時之人有持之以得富貴而卒不能稍得于字畫行墨間者吾皆有以使之得之其後一年則飲酒談義以文為嬉而其叔氏者揣摩家也每出其奇搆與之相角夫是以優悠春秋修遊止半然而未嘗不自得也當其相對角藝時兩人者顧之而嗥輒使池魚夜踊林鳥駭散近村之民且有纓冠而至者乃逡巡渡江相帥就刖此何為與今年冬豫既辭草堂將還故廬而四如咨嗟惟恐以薛談學謳未窮青技因乞選其文兼為之序豫思文雖有命然技至而命立人盡而天見故杜少陵云文章千古事得失寸心知夫惟文在千古故文之得失心知之而命之得失文亦知之向使王良執綏遇顔泰父而乘之當亦必無趙簡之殷勤與嬖人之斥落而伯昏無人立層崖之上俯千仞之淵從容決拾裂眥霄漢則禦冦雖善射亦必匍匐而不前搶地而若失文亦患不精耳苟進乎技則王唐雖遙接踵可至又何患乎射之不入彀御之不就範哉朱母史太君七十夀序夫稱愛民者必曰慈母顧慈不自已始也子有善上之其親况杜詩稱母而東海家則郝夫人之法反稱女師豈非其慈可效與朱子揆敘為宰楚州三年矣太夫人史太君在官舍年遘七十楚州民各起為夀豫思太君名族也門閥之盛踰于崔盧凡其自歸嬪以至纘婦其間克􅈺克順均勿具論獨念揆敘以天下才試為良吏豈無在庭之教為之先者且揆敘之蜚聲非一日矣方其北堂甫離而南遊未返其勉強剔厲太君之成子之名者無既也洎乎捧檄來前乘板輿以就釡鐘其成揆敘之治者又未可悉數也夫人之稱夀親者苐能養耳農賈車牛止用洗腆而一命自膺僅得藉冠簪洽比饋餉薰炙孰有如揆敘之以善事其親者况其帥楚州萬户而稱觴舞綵又從來孝養所未有者乎夫揆敘之愛民則皆太君之為之也今揆敘已報政矣向使當報政而馭民之無方養士之無術明刑弼教之未有其源撫字催科之各無所效以至城郭溝洫水旱盜賊皆不足以順天時而靖民俗于是而稱曰母慈無當也乃若休民而民安曰惟吾母養士而士奮曰惟吾母粟征力役之寬平有制曰惟吾母獄訟刑宥之輕重有法曰惟吾母以至蟲鳥時若邦郊無壘雈苻戢伏而猰貐不作曰惟吾母于是而猶曰杜母之慈非其母之慈則吾亦不信也揆敘方強仕年能事母即能愛民而太君七十且以慈子者令其子慈吾知太君之年與揆敘之善政俱無盡已楚州民屬豫祝辭而時方報政遂有採輿情以當饗獻者豫因用其説而書之于幛兖州趙司理生日序自後唐以兩使節推分屬諸路而其後有諸州推官然大抵紏察吏治審達抑滯如判官録事已耳今則専省刑獄而彈違糾慝一寄其權于外臺故獄訟璅屑衆致煩刻今天下刑平孰有不先之司理者哉堇溪之銅加以新硎我知其割也乃趙君之理兖也不特其政能也乃其操則玉壺也其直則朱絲繩也其胸有冰鏡凛凛然芙蓉之淬于塘也其與物喜怒春風之在堂而夏日之在牖也豫嘗遊河一觀其政而思之今兖人以君生日製幛夀君不憚涉千里請豫文以為君祝夫祝亦何常但期其所未至已耳豫不期以未至而思其所至兖人舊誦君政今其來也又書其政于版夫以提綱肅紀之地而濟之以矯矯風厲之資時之坐為委蛇者非其操持之不足必其劑割之未當耳匪然則又但加之刻核而綜理無緒鍥然多鑱思耳又不然或其五過之來誠未足與為更革焉耳有如是之湛以清惠以平也矯然以有成豁然以明明也豈非時與脂韋我獨為峻潔耶時與為達我獨與為立耶夫登琴臺者思父事之風過于公之門者思平刑之報今兖州名賢不止不齊于公也二十七州邑之所及其政迹可紀不啻家有碑縣有譜也人之仰君臺而大君門者衆矣豫辱與君知而兖人與君則實有愛戴之歡於來請也豫亦馳一觴告兖人曰人孰無情他日趙君之引年則其政為之也今日之夀趙君則情為之也政在人情情感其賢而願為之祝則祝之安焉若有請豫為期者夫兖固河濟間一都會也不見夫濟之清而河之長乎付雪詞第二刻序東海何良俊序草堂詞謂詞為樂府之餘而不為詩餘初亦疑之及詳其説則以漢樂府郊廟歌詞及晉樂所奏相和清平諸調皆𨽻樂録有近乎大晟所定而漢魏後五言即高如蘇枚亦不聞領于樂官故云然耳豫則謂樂府詩詞本一致而歌有不同使以詞按歌則詞不限聲三百章句故差池也以歌按詞則詞且限詞念誦一限唱嘆又一限也故張衡四愁張載限之徐陵長相思蕭淳限之悉依句綴字宛宛廓填而梁簡文春情曲似瑞鷓鴣陳陸瓊飲酒樂後周王裒高句麗曲似破陳子他如迎客送客夜飲朝眠其似填詞者不可更僕則是以歌按詞故樂府類詞以詞按歌故詞不類詩其大凡也且夫詩無成名矣關睢之後不名關睢而樂府所奏則鐃歌橫吹雉子蝶蝶各有名字限為歌例此不與調笑鬱輪相等埒乎又大凡也陸子藎思為樂府歌詞方駕齊梁其為曲子則縱橫元明間宜其為詞上掩溫韋下超歐栁合尊前草堂而一之從來為詞家不以過也特吾謂詞為詩餘不必更為樂府餘者藎思以詩文雄長海內者數十年其為詩體古今窮極工妙而後乃為詞及為詞而初顔巢青繼題付雪今則付雪又二刻也夫藎思但窮極工妙為詩而詞之渢渢乎不可迫遏有如此然則為樂府為詞皆其餘耳畫賦序會稽董子長薄遊京師以不怡于時著畫賦自娛上自庖犧下逮今兹窮搜極探旁及無象其按部繁而譬類賾遣言多遷而寄旨斯約該舉咸有歸于一致於是四望房皇寓書于河西客子亡名瀨中之毛甡而為之序若乃飾志微芒興情幼眇多所思而未達欲追叩而若失其迹羇乎形容而神縈乎廖廓即有耳所不及聞目所不及見得之於體按而遇之於恍惚于是略悉索之考求工攬披之頥悅斯亦書圖之所必稽丹黝之所咸藉者矣夫跖實之輩鏤目為虛抱景之流畫空非智故駴蒼龍而不御者子高之浮情也斥毛嬙而不睹者世主之庸見也故蕭屏以一顧而生華浮雲因偶視而成色何則三漏之形未嘗驗司空九苞之羽無能諦翔鳯也是故志有攸辟可使西施為無鹽會有攸乘可令駑馬為良驥非有定也故曰按圖而相馬君子謂之不識馬按圖而觀兵君子謂之不知兵何者飾形審象無當于昭曠之理也故霍光觀負扆而昧於復辟崇伯相九疇而遺于治水秦王審督亢而忽于機變漢臣瞻太丘而暗于功德况乎經營象先不逮前古規摹意起失之挽近力殫於毫毛而神疲於方幅以義而言烏暏其可然且緣情昭宣體物溜亮逺揆比興軌于大通假耳目為非真方物章於有幻儷揖讓于黼黻之施等辨訟于元黃之色雖復騁千目之精調五指之運揚八彩之華文窮萬形之殊狀而不為過也不見宋人之為畫者乎儃儃焉而進而藴其巧也施施而退而逞其神明也非衣冠之嚴而裸袒之適非趨速坐作之勤而從容俯仰之為得由斯以觀進乎技矣又况於進幾微而以簡淡為歸會形神而妙轉移之用乎哉然則精六法者不必泥三祖之稱拂三毫者未嘗袪百家之目鄙博望之難名笑東方之傲世許丘壑之可過謂雲霞之未蔽易寒暑于瞻望之間幻晝夜于晦明之際比辭類情觸物長志是雖謁展鄭之工巧屈偃通之才思畢顧陸之妙悟殫曹吳之絶技烏能擬其精靈通其變化者矣會稽倪孝子記傳序會稽富盛倪孝子仙溪君曽覓木心石療母心疾于是同里王大參陶侍讀趙文學輩爭為之記傳而世之聞之者尚莫得其概也按概孝子仙溪君有母沈心疾心毒而剜呼不可能乃以母氏痛湛于子心孝子若于是魂精幽越耳目泄敗似有見也當此之時有鹿幘丈夫能診視五色造門望氣告言維木心石可療時厄耳而木心石者木感月英孕而成魄木之灌灌世不能得也于是孝子思鋭力蹶耳營目馳窮冬春歷山溪而後得之中林之伐朴者也夫而後母疾以夷其概有如是者山隂駱子叔夜者倪氏倩也曽示豫記傳謂豫宜序而豫未應也豫避人巴山值叔夜為巴山令孝子之孫赤子者亦以訪巴山令故先豫赴巴山驟見豫即重謂豫序豫終以未應故于送赤子歸時為詩導其情徘徊悽愴亦略見以概然卒未應也今則駱子以為令得罪將罹不測豫計無能救駱子思駱子又無罪橫被口語萬一罹不測豫則無以報駱子命而駱子孝子也事母俞賢節同于孝子之事母沈其為賢節母飾志幽竁思欲以誦母德者世不止大參侍讀輩也則凡與孝子言孝必有可傳而駱子之言孝子豫不傳世無得知者則甚矣駱子之言之當思而豫之不可以不為之序也駱子謂豫曰前此無木心石也孝子之心惄于永疢其為方士者思以解孝子之疢也而告之然而咨嗟之聲浸淫于耳何則心也者以為神君而正位于火德者也火當炎上賁于太陵熱結氣會而中腕不平夫攻腠理以湯尉而攻藏會以金石此精論也拌隂陽水火之齊而隂齊石柔陽齊石剛即又已然之要也豫聞毒之深者不能效湯液疢之盡者不足濟草葉惟時孝子者淚若灌霤泛與睫接夫五石之強達于五輸酒酪瀟灑金鐡朴擊草木辛臭血肉轇轕方之五石斯為薄劣故爪膚不能割幕不及匪揚石英何其啜泣故石者木華之盤桓而土氣之噓吸也譺為砂礫散為礬汞根雲作母升氣戍蝀其乳化鹵變柔而得剛星霣雷墮靜而能動子不觀月華乎月為水精濫而生華木也者火之母也火母霩質乃感水精火水既媾隂陽成焉隂陽不成大寶不生故木胚在水石孕在木木石舍腠其體斯覿故外含黃色而內融真白中得水而為水之母外泄火而又為火之子也其味不毒而其氣不燷火得水而為和火成土而又為甘也以甘味攻毒鬱以和氣而淡其爊土以泄烈而水以沉焦心之疢也于是乎瘳今夫珠玉之生于山海皆必有所感而見其神明故明蟾映蛤而珠以生接水木之潤而譺者為玉何則芬華之所積也故海漚壅草葉而成石得水木之際故水木之際多成石由此觀之豈不昭然者與乃孝子躍然以興復泫然以思者此又何故夫鄧林之木不必其能感也即或感之目不徹其理視不達其窞也身之所經不能周伐材之工足之所至不足窮析薪之崦也而木感以石子感以心感木則淺而感神則深夫是以木心之石端在乎心而不在乎伐朴之中林駱子之言有如是者西河集卷三十一
