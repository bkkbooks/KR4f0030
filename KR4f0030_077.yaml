body:
  text: 西河集卷七十七翰林院檢討毛竒齡撰傳五吏一分名纂同郡循孝子節婦雜傳紹興府知府湯公傳公紹恩安嶽人生時夢神捧兒至而拜之曰吾紹興城隍神也既生峨嵋僧過門施之飯請名僧以指詘計曰當以紹名他日東方有承其恩者其在紹乎因名紹恩字汝承嘉靖五年登進士釋褐衣越布覆以父官參政時所遺絲袍終其身不之易十四年以郎中出知德安府旋改紹興甫到謁禹廟周視其欂櫨若故識者紹地春秋所稱澤國也水濫地在浸中水驟下而龜其腹山陰縣東南有浦陽江者為三江之一韋昭有云二江者松江浙江浦陽江也浦陽江上接金華浦江諸水北流百餘里至諸暨與東江合北過峽山東滙山陰之麻溪然後盡注錢清江而入之于海當是時浦陽已通浙苐口隘浙當髙時水反入浦陽而灌麻溪而錢清之入海者勢若建瓴則又傾泄而不可復止其所以既苦潦又苦暵者槩為是也紹恩至相浦陽上流恢前守戴琥所開績堰使浦陽之通浙者坦而易泄而乃塞麻溪以遏其來不使浦陽之水得復入山陰東南而於是相其尾閭凡在紹諸水濫則易淅泄則易竭者為水坊海濵將以伺瀦瀉而定啓閉而無如海波之澒洞而難為坊也初錢清下流原有二閘嵗久湮廢紹恩相下流仍得之三江之口其地夾兩山為浦陽入海故道下有石峽橫亘數十丈泅水者得之乃伐石于山依峽建閘石牝牡相銜烹秣和炭以膠之石之激水者即剡其首使不得與水爭下有檻而上有梁施橫坊其中刻平水之則于柱石間而啓閉之兩隄築土冶鐵而澆其根閘凡二十八應二十八宿隄數百丈而大閘之內又置備閘數重曰經漊曰撞塘曰平水閲一年工成共得良田一百萬畝漁鹽斥鹵桑竹場畷亦不下八十萬畝而紹興於是稱大府沃野千里紹恩之力也初紹恩築隄隄潰有豚魚千頭乘潮而上衆驚告紹恩紹恩曰此隄成之兆也在易之中孚豚魚吉利涉大川吾以誠信格豚魚尚患涉乎立令入水築人多怨讟又其時潮大至見者洶洶紹恩堅不顧且請禱于海潮忽下望隄而却以為神云後以次遷去厯官布政使年九十八卒論曰漢後言水利者率水工穿渠注填閼之流以漕以溉用能稍入餘稅濟少府錢未有鍾大利久逺惠一方民若紹恩者也循吏稍有益于民民得吏治一二年稍蘇息猶藉藉稱惠政以為罕見得紹恩是治而有不尸祝之世世也乎宜紹興祠之為湯君神矣明廣東按察司副使分巡廣南韶道殉節前紹興府知府王公傳公名孫蘭字畹仲無錫人中崇禎四年二甲進士故事二甲授户工二部主事時太監張彛憲奉新命總理二部其尊視尚書諸司郎以下皆叩頭行屬禮孫蘭羞之請改授他部遂以刑部主事出決江北獄進員外郎考選擢四川成都知府成都自奢氏亂後凋瘵又宗藩錯趾居宦豎往往索民錢激變嘗聚衆劫蜀府內江王呌譟將殺之孫蘭亟馳救衆見孫蘭至環擁雜訴孫蘭遽掖王同車曲諭揮衆散然後請擇宦豎之橫者與亂首同正法無何艱歸至十三年補紹興會紹興飢御史祁彪佳鄉居孫蘭與彪佳定賑救法預為分區使鄉官分主之籍記飢民之受賑者合萬九千六百零口立厰二百七十六所設散米給錢粥厰移粥藥局病坊官糶民糶官積民積諸事共二十六則浙東三府十九縣皆行其法所全活以千萬計彪佳遂著為救荒全書合一十八卷可嵗行之如官積先闢厫于秋收時征米每畝征升以時直給契登厫次年官出如舊直謂之官積民積計民田積米凡三十以上畝積五升六十以上畝積七升百以上畝積斗三百以上遞增而米藏其家不俟官驗明年計畝以時直糶米于本圖謂之民積其法如此尋升廣東按察司副使分巡廣南韶下車勦連州猺連故分巡轄也猺久為冦至是愈橫縱焚掠孫蘭統官軍進勦破三柵降之御史柳寅東以聞上喜將大用而獻賊狎至韶故與湖南接壤獻賊冦宜彬逼樂昌乳源而蘄楚諸王以避賊踰庾嶺孔兵譟而南南韶大震城不守其所轄連州守將楊守諌據州城叛降賊將導賊至先是孫蘭聞警誓死守即率府縣官為文告城隍廟以舊所用連州兵破猺冦者不足募民兵七百人鎔所束金帶為軍資奉撫檄監軍欲以嬰城至是連州叛所募民兵已調去而樂昌曲江所在設偽官行牌公座韶民驚逃手劍當門不可止飛檄請督府援兵不應孫蘭乃嘆曰連州曲江吾屬也吾屬失守守將叛而兵備監軍泄泄然既不能守復不能救將俟此為迎降計乎遂北面稱拜自經死臨死有勸之者曰賊尚未至縱連州失守猶可圖存何自苦如此曰吾知死封疆而已福王自立御史祁彪佳禮部管紹寧題請恤録豫祭廕論曰君死社稷則臣必有死官守者孫蘭真攀髯之先與當孫蘭巡廣南韶時本以兵名官且加監軍而分巡則又當五嶺之衝其為兵官者不能守其官而使其屬連州曲江守將叛陷即欲緩須臾之死得乎雖然使其稍瞻戀顧影徘徊其不致留此姑待以藉口于將有所用之者其亦鮮矣彪佳疏曰獻賊逼臨援兵不至連州失守樂乳告危能為社稷之臣請殉封疆之守諒哉是言吕孝子傳孝子名升字德升浙之新昌人少以孝稱顧性介當元世將亂奉父與後母避地居沃州山躬耕非其力所致不以養逮後母死父老在堂人無婦且多病出入起居必賴升扶侍猶蛩距然旦日盥櫛奉匕箸乾瀡鮮滑以次第進時時相衣褁增損行則承以肘即所卧處過傍舍才三四武非升在不往升偶離側必呼升如嬰兒當是時升非盛年而父復享上夀將百嵗稱百嵗翁以故升雖垂老猶日抱父雙足卧終其身不入寢室父嘗得瀝浰疾夜必八九起自蹲圊雪惡以及浣牏其間詘伸撋灑搔抓按抑竟以升體為其體如是有年方國珍據台州新昌亂升負父避鸕鷀山出覘賊為賊所得知其為孝子也留賊中與之飲不飲坐而泣賊哀憐之請升歌升乃為青天歌浩浩歌賊聞之感動送之歸升園有杏父嗜之鄰之豪者奪杏去值杏熟升乃市他杏以進父辨非已杏不食已而升轉就鄰市鄰復不與升不得已呼于天鄰忽病疽背其婦夢神曰以杏還孝子則已旦則其婦請還杏其感神如此洪武十三年詔舉賢良孝弟科升再辭不得乃曰臣老矣請以布衣返遂命布衣使山西稱旨強授職升辭疾歸二十三年詔選老成有學者復舉升升至復辭乃教授一室曰小小齋曰半村癯曰沃州耕者手著六經箋注及小小齋稿與從子不用歌詠倡和士大夫東西行必問小小齋至輒留信宿酌酒論文然後去不用别有傳論曰史稱賊不殺孝子又稱棲烏躍鯉能動鬼神良然哉顧孝有難易閔損伯奇為其易者此為其難者説在公孫杵臼之語程嬰已升子珮亦孝其先世曰蒙曰琰以孝旌人稱為吕氏四孝蓋孝亦有教云劉孝子遂安公傳公名謹山陰人洪武中父坐市民充吏法戌邊已赴貴州烏撒衛法府縣吏投充但許鄉井力田者而禁市民世稱吏農民是也時謹方六嵗問家人貴州何在家人以西南天指之謹望西南天拜且哭朝夕不輟已而年十四矍然曰西南天雖逺吾有身猶可至也天下豈有無父之身哉遂辭家人行會烏羅開思南鎮逺由烏撒以通卭蜀道路胸胸家人勸沮之不聽閲六月抵貴州踰月遇父於烏撒亭站父病痺謹泣告官請身替父戌法戌邊者年十六以上嫡長男許以身替時謹未成丁且伯兄謙早以督運死京師謹次子也非例於是歸攜兄子往顧兄子亦幼謹請以身與兄子共替不許則又歸於是悉鬻其家産什器竭所有三往百計謀所以歸父者雖其所以歸之者事祕不得而知也然而竟奉其父歸及歸家貧甚謹力辦甘旨晨昏必進酒供笑樂嘗曰吾今而遂安親之志矣自號遂安提學張倬上其事論曰孝子必遂事向使三往不父歸其能安乎遂安所以志也他書載孝子事甚備此即史館所傳稿諸志同詔祠孟貞女傳貞女名藴字所溫其先為鄒縣孟氏入宋有封信安郡王者判紹興府事家諸暨為諸暨人藴父鋋為明初生員嘗夢女官送雲冠繡裳于庭遂生藴絶慧讀書過目不暫忘會同里蔣文旭者年十七膺洪武二十九年鄉貢授河南道監察御史性耿介與方孝孺遊孝孺重之作味菜軒記以贈名大起時巡按湖廣以未娶託媒氏聘藴而請歸親迎值陳時政十二事中有昵戚殺平人一條忤旨賜死藴聞計大慟請于父曰大人昭信踐蹇修之言問吉以通是藴為蔣氏婦矣文旭之不幸即妾之不幸也願得一履蔣氏庭奉侍舅姑他日可以見文旭地下父母未許藴私念文旭柩歸必過已門乃密為衷麻而蒙以絲俟柩過從門間躍出裂所蒙服長號扶柩去終其喪三年既而文旭父母死無嗣藴服除後乏食分餓死藴父始憐之迎藴歸擇宅後嵓間構柏為樓令藴處其中曰柏舟之意也聚書百餘卷供晨夕觀玩足不越梯一步嵗時兄弟姪姒皆一至樓前問候去嘗見樓後嵓石間老梅盛開賦老梅詩一百首見志宣德六年巡按直𨽻監察御史蔣玉華翰林院侍讀黃文瑩等疏曰竊惟原任河南道監察御史蔣文旭妻孟藴未婚守志經三十三年今已五十有二矣臣等思叔世之婦甫諧伉儷遽誓白首乃一旦夫死而改絃易轍者往往而是即或終始不渝亦必激于夫情眷戀子女家世榮盛原可依倚未有夫存未面煢然一身家世零落了無可藉而矢心明節如孟藴者是即君子無所為而為之義也夫無所為而為者在女為未字砥節在臣為未字矢志是當與殷夷齊齊王蠋漢袁閎龔勝晉王裒唐周朴宋順昌山人唐義士共表異者奉旨旌其門建坊立祠於亞聖孟氏祠側年九十三卒論曰古有貞女引藴其為賡歌者與文旭抱志節無傳傳于此晉江訓導徐黼妻李氏傳蕭山徐黼妻李氏福建永寧衛指揮李正女也黼于𢎞治改元為晉江訓導妻周死遂于其地娶李氏為繼室未及一年而黼病當是時黼已遷閩縣教諭未往也私念前妻生一子甫數嵗非李氏出李氏年十八歸黼至是才十九晉江去蕭山三千里道逺氏弱度不能扶柩返乃于易簀時撫其子謂李氏曰吾竟負汝吾即死聽汝自斷吾敢望此兒為徐氏後哉李氏曰不然即不幸吾當扶汝棺撫汝兒以從汝于蕭山耳黼曰有是乎強起拜李氏李氏受之先是李氏嫁黼時其家謂黼家于官必不歸至是聞其死且喜且憐之將取其裝㩦李氏去李氏乃豫檢箱篋緘縢之而歸其􅀈鑰于縣逮李族人至明赴縣告之請北歸父母百計沮不可得不得已乃託之告别而扃于室李氏裂其裙自絞氣幾絶賴其嫂知之救免乃聽之歸逮歸集宗黨男女數十人送李氏上道放聲長號牽衣以行李氏以齒齧舌噤不出一聲福建布政使洪鐘移檄蕭山命縣官存恤之李氏歸葬黼撫孤以針黹自食其力孤死撫其孫孫死又撫其曽孫正德中知縣上其事于道豫之榜巡按至縣命縣官月給米帛嘉靖十四年用御史張子立奏詔旌其門給勘合優免如例年八十八卒李氏勤且嗇初甚貧後竟置田百畝為撫孤資自寒食展墓外足不出户所居闢重屋沐浴登屋去其梯盛暑必襲衣夜為女紅非罷極不睡睡覺即起或問之曰勞則寡所思也其愼如此論曰節本不易李氏更為其難者詩曰我心匪石夫石豈易轉然尚或轉之浸假將歸時長途漫漫牽衣未絶雖巉巉之石其不致兀臬鮮矣扶死撫稚仁緘資辭縣智斷親割欲勇仁智勇賢矣哉詔賜特祠崇祀貞烈竇孺人傳明詔賜特祠崇祀貞烈竇孺人者餘姚薑工部榮側室也名妙善又名妙惠世居京師崇文坊年十五歸榮榮中𢎞治壬子鄉試與同邑王公文成孫公忠烈同見舉有名稱三君壬戍成進士授鳳陽五河縣知縣稍遷工部主事以忤瑾徙興化府通判尋改瑞州攝府事正德四年江西盜起南贛賊執參政挾靖安華林東鄉饒南諸賊並起為亂而華林賊陳福一最驍破瑞州瑞故疲癖又府縣不得設兵備公既攝府事躬帥捕蒯潛出城將制其險賊驟入執孺人倪暨婢等使告榮所貞烈在别室急衣孺人衣來前語賊曰吾為官人妻尚不知官處所指孺人倪曰此婢也焉從知之賊見貞烈美且衣異固已疑為孺人及聞其稱官人妻信之遂釋孺人倪而輿貞烈貞烈泣曰不幸官在外必輿吾將安之可已則已不可已願得吾從人同行私顧所驅𨽻中有盛豹者髙安人素以願聞遂指之曰是人善事我願以從我賊許之先是賊入時貞烈衣孺人衣訖念榮所攝太守印留置卧間復入攫得之而投之官池至是呼豹前使近輿初語他語少間曰唶吾所以呼汝來者為太守印在官池官未知也汝能歸告之官乎吾即死官豈無以報之豹以齒囓指遂縱之歸時至花塢鄉有頃度豹行逺乃言曰吾以丐諸君吾口燋不可能假使前塗有井者吾思飲焉既而果有井在道傍貞烈已下車賊伺貞烈意見貞烈下爭為之綆貞烈從容勞之既而前若掎綆者掎綆踊身而入賊驚救不得悔且恨填井以礫既而榮入保遇盛豹歸告印所取之左都御史陳金右副都御史俞諫調廣西兵征諸賊榮隨至花塢于是起貞烈井中越七年瑞州府知府鄺璠髙安縣知縣翁素等上其事詔旌貞烈敕春秋祀祠其祠有二一在城東迎恩門一在花塢橋各置祀田而城東之祠則配祀髙安婦死賊者曰塞口熊氏女貴貞曰新陂張榮一妻蕭氏曰太平門黎玉亮妻殷妙慶曰雲岡況太學夔妻曰廖足貞曰坡山朱應恢妻曰陵上黃暖妻幸氏曰港西朱治一妻梁雁貞曰斜橋熊武六妻胡氏曰社山朱丑四妻熊以桂凡十人後賊尚猖獗南昌府知府李承勳同按察使王秩誘殺華林賊逮文成王公以都御史撫南贛勦之賊平論曰江西羣盜起而荆揚以震由前觀之猶崇禎之寇也雖野火燎原究至撲滅然勢亦危矣嚮使進討者稍能如貞烈之從容警敏設機變于俄頃之內則制勝倉猝又何至參政被執副使受害有如此甚也夫閨房致身自昔所難矧貞烈智濟其勇易衣在前擇人以早保主完印宛如素定難乎哉難乎哉榮與文成同邑同舉同劾中貴人同官斯地而榮以兵柄未歸且賊之蹶起瑞當首嚮遂不得與文成同其功名亦遇也夫西河集卷七十七
