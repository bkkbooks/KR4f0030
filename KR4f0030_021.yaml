body:
  text: 西河集巻二十一翰林院檢討毛竒齡撰書八復章泰占質經問書復泰占足下日以足下病逺道爲念問至亟解視謂病安頗慰然以今年比期近云不來赴比則是病仍未安也乃别示書冊令兒子逺宗檢看是病中觀僕所著經問一十八巻而藉之以較計者如此則病方増長焉能安矣因别令檢核合五十七條質疑義者二十四正訛字脱字二十一刋誤三其一辨時氣先後者已錄出俟考正索解者四則答有别紙餘各草草註來冊付去乃不揣鄙陋重申祝告必徼降心以從者造物不易生才即生之亦未易成就然且所生之才各不同生文人百不及生讀書人一大抵千萬人中必得一文人而至于讀書人則有千百年不一遘者是以文章之士列代都有而能通一經而稱爲儒博通羣經而稱爲大儒則自漢迄今惟西漢有孔安國劉向東漢有鄭𤣥魏有王肅晉有杜預唐有賈公彦孔頴達合七人而他如趙岐包咸何休范甯之徒皆無與焉即或博綜典籍胸有筐篋如吳之韋昭晉之郭璞唐之李善顔師古宋之馬端臨王應麟輩竝于經學無所預降此而元明則響絶矣然且天生此七人而六經得失尚未叅半詩書得者十之五三禮得者十之六左傳得者十之八而易而春秋而樂而論語大學中庸孟子則全無得焉則是二千年以來冀遘一大儒使古王六經孔孟所傳之學術全明于天下亦不可得也僕七嵗見隣家娶婦不祖而配既不告廟謁廟復不告父母見父母自爲婚姻而解之者猶曰不成婦不廟見嘗問之先仲兄而心竊痛之即私禱先聖前願此生得考註六經刋正謬説而至今未有遂也少好典籍記憶亦不少乃稍長避人垂老還鄉井而時不我與矣然憶僕當年尚遘數讀書人家有胞兄先仲氏亦學者也兵火後大病不能著書而上虞徐仲山多學爲大司馬公之子山隂張南士則大三張後小三張君之一也論經有定識每能辟鄭孔之謬乃不幸偃蹇而死死而其所著之書皆不得傳是豈造物果忌才且不欲使經學明天下耶僕雖不才門下尚多人然皆文章士也初得中州王引齋喜其有經學而遽已早世垂老得朱生鹿田則助我者也詩禮質難必多有啓發苐少年上公車門不耐索米近忽試仕邊缺音耗都斷而東陽李紫翔則長于春秋其作春秋諸紀傳久已行世今且爲潮陽令去所幸遇三章子雖劇恨見晩顧猶賴同郡且值僕東歸草堂可晨夕主客而一死一游關以西三年不返惟足下在家年富有學讀書最精密敏而且審其考覈各具專見能發房開覆闡前人所不及闡僕雖垂死猶賴生活而乃患喀血罹此大虐棲遲白門多日矣此非吾道之窮天之有意于厄之不至此自今以往但當求却病不當讀書何則讀書者致病之由也且苐求却病即是讀書何則病既却則讀書自有日也故却病所以順天天非無意生我而我可以病逆之乎且亦惟却病而後可以逆天天不能使我不讀書故但能使我病而我能不受病而使之仍可以讀書天能禁之乎僕書在案頭幸勿再觀即觀萬勿如所寄之煩而析核而且刻祗如古所云優游不廹逌然以自得可也至别詢治火一法則在春秋傳宋灾諸治法亦既完具聞賢伯氏都府公損其奉以多製械物此正與宋法具綆缶陳畚輂諸事相合即王君治火論君與僕舊識其言亦博通無可間但火地不同治之者必因地設法始爲有濟假如宋法有令隧正納郊保之民使奔火所此一語用之杭州便爲大害何則杭之火災半由游民劫火者所撰造也故僕議治火專用宋廣平刺廣州法陶瓦甓以改茨竹以杭屋皆竹墻也且截火四衢禁民救火而但用正徒之司救者授之符以騐出入防劫火也特其議已勒板而杭人不能用今且東歸有闕板矣蒙索無兼本俟謀另寄頃平湖陸生刻聖門釋非錄成一冊奉去并前項收到七月既望日距接問日越九日復王草堂四疑書來書略云先生天夀平格主持聖教每一言出則天地局蹐爲之一開顧伏讀經集巻首則可疑者四一云夢番僧到門寄以度牒二云以頭陀居士林骫壞名教三云髙笠僧授古本大學四云以曽髠髮爲頭陀獲罪功令遺命不冠襪沐浴竊意先生本聖賢再出或星嶽所降有之何至有番僧授牒之兆雖髙笠授受淵源難忘顧不必僧也若遺命不冠襪則恐非正命矣斯世多忮人即象山陽明以心性立教猶然以禪宗目之今以初生避難授道遺言四則皆歸之僧後將若之何先生偶未思及耶接劄具見相念之切且更拜裏言昨命皃子讀訖即惘然自失者累日足下愛我備矣顧此有遽難自解者先慈所夢明明告之大母質之先贈君先贈君即以此夢告廟命名何敢淹沫且非謂此見夢者爲所託之身祗其所貽牒闌以五虬因取郭景純詩竒齡邁五龍句名曰竒齡此即他日髙笠僧授學之先徵也授學大事番僧即遼僧也牒者大學文也若僕之髠首在崇禎甲申年是時方馬遺孽統亂軍東奔僕以一言爲方馬所讎將合江東軍執予殺之因匿之山寺屠去首髮非如佛氏所云出家且所云落染也向使不去髮則方馬得執之假欲辮髮則江東劃守人人皆方馬矣是以放廢之久衣緇者八年至順治辛卯讎者尚以抗試首官因有逆陀骫教之訟夫然後養髪遵功令候試此實事不必諱然亦無可諱也往僕居館中吳都官請作封公夀文僕却之而策馬至東便門作蛤菴和尚塔銘學人有疑之者僕曰此豈僧耶及僕爲蘗菴作丞相源塔院碑文江西羅生創言曰使不得已而爲僧耶髠首而已若傳法則非不得已矣今蘗菴以不得已之故假之爲僧而忽而傳法公然作臨濟宗師是溺之非假之也假可以文溺不可以文也曰然然吾亦不能辨其果溺之果假之也吾苐以已事較之蘗菴匪他前朝諫官熊魚山也魚山以諫罷官又以諫受杖午門因與同杖姜貞毅同戍江浙而未達戍所而國已亡貞毅留吳門而魚山逃之阿迷往者順治年偏沅提塘掛過關號報云有僧熊開元從阿迷歸開元是諱貞毅聞報長嘆曰魚山耶吾媿之既而魚山傳法在靈巖山靈巖距吳門與貞毅所居不逺貞毅欲登山詣之而每登輒止曰吾終媿之若是者何也若髙笠先生則尤可憫者髙笠固賀凌臺先生之都講生也關東創聖學以教生徒惟賀黄門一人世所稱醫閭先生者其孫字凌臺以不自揣量與生員徐一寧請兵髙麗不可得歸而伸螳臂抗順卒死非命此未嘗爲僧也今其都講以亡命髠首究不知爲何如人何名何氏苐以曽授一大學古本而追稱之然固僧也舍僧何稱乎且學貴記實反記僞乎且此亦何損于學耶至于僕之後命不冠襪不含斂則實以流離之故不曽視先贈公楄柎故痛以自責且亦以一王之制不能早遵而髠首八年總屬罪譴非敢效楊王孫任達王休徵反經也乃若僕之學問深媿不足然自分拂閩洛不拂洙泗倖傳後世則知我罪我一聽之顧定無有言近佛者以平日不喜言學苐言亦竝未嘗有一字䦨入佛氏或爲浮屠作文字得縱横言之然爲彼家説未嘗爲此間道也此猶賦山者儘言山水不得而強坐之咏物者儘言物人不得而妄認之也且世之闢佛者多矣僕謂無用闢且不必闢者南朝好佛佛不加増北朝欲滅佛佛不加減儒者一口一手闢之何用且人惟不識學故恐學有類于佛亦惟不識佛故恐佛有累于學僕惟深知學亦深知佛因信儒之與佛如水火如柄鑿如蒼黄黑白水火不相入柄鑿不相納蒼黑與黄白不雜比而相爲錯合試以其精者言之儒學善世佛法亦善世儒學利物佛法亦利物但儒之利物善世必由身及世由已及物而佛則舍身以徇世舍已以徇物人從之乎此必不從也何也人雖極愚鮮有無已見者也以粗者言之則生人大欲惟飲食男女居室而已以無何之人而欲其斷滋味絶牝牡去家園門巷而置之槁喪絶滅之鄉亦必不許然而其教不絶者此一等人非聖賢豪傑如蛤菴蘗菴輩慷慨託足則必貧老孤幼疾苦患難若所云鰥寡孤獨窮民而無告者要皆不得已而出此者也周官九職中原有閒民閒民無常事亦且得食人之食而遺人掌委積則凡十里置廬三十里置宿皆得以待天下之去來而無主者然且膠庠米廩或養庶老或養孤幼自老及少各有安設而乃王政不作不得已而盡納之佛教之中此未必非曲爲補救一良法也向使紛紛者既無常事又無常食羣萃而衆處則其不可問非自今矣僕生平耑見如此雖解四疑未敢一信聞足下著聖學防微一書專爲儒學之䦨入二氏者立一大防此是衛儒非以闢佛千秋絶業正如望嵗俟書成早付一本以杜流弊并候不備西河集巻二十一
