body:
  text: 西河集卷一百七十九翰林院檢討毛竒齡撰七言律詩六康熙十七年十月一日大學士索額圖明珠奉上諭各大臣題薦才學官人除現任員外著户部帖給俸廩并薪炭銀兩按月稽領感賦二首宣平初啓儲才賢便向金門拜賜緡烏節稻頒高廪俸紅籮炭凖大農錢花攢印帖看成錦日照絺衣恍挾綿誰道舊時含糗士還承介鍚在昌年二公車通詣近三臺月俸旋教計部開御牒宛從天上落皇恩高向日邊來饔錢誰是張安貴索米慚無曼倩才咫尺光華將啓旦敢言遲暮答涓埃午門謝恩恭紀嵳峩閶闔啓雙鐶帝闕遙看綵仗班伏地敢違階咫尺瞻天只在殿中間楓門劒佩朝方啓草野衣冠拜未􅈺但愧聖恩無可報遙呼萬壽指南山答景文上人過贈原韻三月春江初上潮浮杯何處渡來遙莫嫌陶令眉頻皺猶喜豐干舌未饒妙偈不從禪誦得薰衣時把佛香燒願君長在山隂住勿使中軍遠見招王明府之任零陵琅琊才子厭承明萬里遙分有庳城白日吏來花下卧感時泪向竹中生賦完莫笑陽城拙操潔無如鈷鉧清湘口題詩能北望雙鳬飛處是神京陳君六十樟亭十里比柴桑中有高人引興長白帢曉披花露滑紅泉春洗藥苖香門回髙駕同孺子庭下監州類季方邀得麻姑頻貰酒相看猶是舊餘杭奉餞汪春坊同年請假覲省還里二首裁向東朝作從臣每因問寢倍思親髙堂豈易沾三釜長假何難請十旬唐長假以十旬為滿所謂十旬休暇是也閭左枌隂虛閲嵗關前草色暗逢春如何白首懷歸客猶作青門飲餞人二初頒儲册下銅扉暫借朝衫作綵衣九列尚需三度轉十年能得幾時歸江魚午饌烹嘗美慈竹鄰墻過未稀苐恐曾參冠不定禁林重盻早烏飛贈邵吳縣平原邵續舊知名筮仕能分閶闔城甲第早膺三禮貴郎官上映一星明車過樂圃鸞初下綬拂金昌花正生遮莫東南烽火近吳門尚有水犀兵嶽州大捷奉和高陽寶坻益都三相公喜賦原韻六首荆門露布插雕飛聞道雄師己合圍下雋地翻留後斾洞庭波洗戰時衣軍分五壘真無敵洞阻三苖何處歸况有樓船橫浦入天南誰不望明威二湖湘冦盜本螽飛連破平江似帶圍夜水暗驚流劒影春花偏喜插弓衣人收赤子安軍鎮地入黃陵近姊歸但得東山堪勞士􅍆教零雨誦伊威三七校縱橫盡佽飛紅鞦新束馬腰圍熊羆但計踰銀甸蟣虱何愁生鐵衣羅子收來忘北顧楚軍散盡想東歸零陽此去降幡集何必強兵出武威四日望巴東鵝鸛飛江陵種柳漸成圍提兵真入移綃幕叩馬相迎有布衣三奏捷書當甲始全軍振旅在春歸從來廟算需賢相况復詩傳翟子威五桃蟲誰道善拚飛帝命原教式九圍尅日將軍齊捲甲連年天子自求衣葭還舊律知來復芭滿新田嘆曰歸從此征駹與朝笮敢言咫尺見天威六禁旅中兵總射飛長驅肯作掩羣圍行營夜襲藏刁斗轉戰春生換韐衣王濬乘風能越險薑維有志亦當歸裒荆自古需罙入誰道王師不在威張方嶽巡撫閩中來從奏計待鳴珂去路黃旗載駱駝斗北驟頒新管鑰天南重整舊山河建溪雲樹開藩逺閩嶠山花入幕多身到九仙須對酒年來東海不揚波夜集俞明府園亭次其小阮石眉原韻名園竹樹夜蕭蕭間對清樽向午橋屋角暗星疏帶雨欄邊流水曲通潮當筵酒暖杯頻瀉促坐談深燭易燒最喜君家饒二阮相從林下且招邀丁民曹分巡贑州河橋柳色映雙旌萬里虔南好計程畫館望郎初奉使建安才子舊知名樓船浪逐灘聲轉幕府花含瘴雨生他日鬱孤回首處待君還賦泰階平與汪廣文講學河汾年又年長安相遇見華顚空囊尚載田何易沽酒曾無司業錢絳帳經傳燕市曲青袍草映御河邊金門萬里雲霄近莫問滄江有釣船答贈萬州學正何君見贈原韻慢將春酒瀉郫筒金錯長懷嶺嶠東帝闕上書原有意王門操瑟豈難工人間居傍支公鶴時寓報國寺馬瘦行如鮑氏驄謝汝容臺能薦士風流還著玉堂中時分闈廣西其門人有入詞林者九日登善果寺後毗盧閣示同館諸公清秋黃葉滿林臯佛閣層層散白毫千里有誰還望遠十年此地再登髙香臺露下翻萸葉茗碗霜融沃筍膏誰道初衣難再著晚寒猶覆舊絺袍送何岱瞻還江隂覲省薊門楊柳弄春晴欲别翻憐邸舍情春泛白波分盞盡夜來紅燭照窗明西郊草映寒袍色東閣梅傳舊句名此去澄江若相憶延陵城下暮潮生二春城花落己埀條萬里江關去路遙别恨直追申浦棹離人初上御河橋筵前白帢留應少臺上黃金望欲消只恐河陽方覲省便隨敷奏上丹霄平原道中示仲山諸同行作客路秋光最可憐平原風物更蕭然山橋度馬雙流逈野店留人一榻懸酒斾碧埀丹棗下廟門紅閉緑楊邊却因顧陸相從晚每欲聨鑣未敢前征南大兵乘勝收復長沙奉和高陽相公原韻二首戰艦橫江蔽鬱姑材官百萬盡彎弧新收嶽麓時移障遽襲湘潭夜渡湖白馬關前鳴鼓角黃陵廟下禁樵蘇天南指日銘功遠何必牟彌布陳圖二南征彍騎本騰驤况復追奔似燎揚定遠自能摧虎穴護軍今已下熊湘雲車駕處城頭暗露布書來盾鼻光不信衡陽京觀美都梁尚有武成岡重陽後一日偕同館諸公集黃編修新宅分韻得秋字新第重為九日遊黃花開遍白檀秋集賢有會思韋綬買宅無錢贈馬周鴻雁盡從天際落茱萸還向酒邊浮主人初闢西軒好且傍斜陽欵欵留贈王君髙飛鴻鵠久回翔何幸相逢在帝鄉上客盤餐留北道故園花柳憶東莊平交世重朱公叔直道人推王彥方我欲續成遊俠傳為君重數舊高陽謬蒙益都夫子作六子詩見贈豫居其一且落句韻各叶本姓謹依韻奉答并謝二首嵇康空自友山濤十載深慚佩孟勞觀海始知環海大近天渾忘戴天高書窺東壁驚三祕醴設西軒笑二豪誰想芳洲舊鸚鵡尚蒙開鎖問竒毛二豈有長鯨掣海濤重煩傾注過勞勞孝亷但舉桓公雅子弟誰如龍伯高通德有門爭北靣朗陵故里在西豪可憐未掃齊庭日挾刺徒生紙上毛奉和宗藩博爾都雨中見懷原韻春街三月雨霏霏遙憶春星隱少微華館近天開處密宮車盡日度來稀蘭分壠坡縈青幔水漲河橋覆碧衣羞煞梁園倦遊客凌雲未獻賦俱非飲高太史宣城會館話舊有感和施侍講韻但泛浮杯渡芥堂天涯四望總蒼蒼論文自昔同官舍對酒何期在帝鄉幔捲露埀天際濕燭搖風入夜來狂相逢不解相思苦試看樽前兩鬢霜二宣州舊邸有間堂匹馬相過晚色蒼愧我十年長避地羡君四坐盡同鄉食甘莞菜知還健醉舞蓮花未是狂漏下莫愁歸路晚天街涼月白如霜贈河間守新賜幨車駕五騮銅符東領近皇州下車嚴似張平子按部親于郭細侯上谷雲連滄海動南皮花夾衛河流吳中人憶軍司馬長聽清歌繞郡樓寄贑南道丁使君南行節鎮重分巡棨戟初開贑水濵楊㒒不為徼外使柴侯本是部中人褰帷風動諸蠻肅落筆花飛五嶺春能向鬱孤臺上望遙遙京闕豈難親王給事分守浙東東南觀察古諸侯按節明州與越州曲蓋賜來函德殿高牙開近甬江樓西垣舊日能廷諍前路清風起棹謳若問衡文嘉祐事會稽竹箭不勝收使君曾典浙試二攬轡登車慷慨行臨岐猶有贈鞭情百城久向車前望十載長留殿上名畫閣入雲天漢近朱旗拂岸海潮生伊豫家在西陵渡門外蘆花相笑迎上以久旱躬禱郊壇立霈奉和高陽相公恭紀原韻皇雩練日宿蒿宮羽佾無煩召典同祗為三農祈泰畤遂將六事告蒼穹龍行甽谷迎猶緩雲起封壇饗自通旱魃歌成甘霤下須知尹吉在西豐送錢刑部提學貴州都官視學本含雞帝里春風惜解携五衛兵踰關索嶺諸生試待犵獠溪城連箐竹蠻雲暗巗畔芭蕉瘴雨迷一曲湘靈應聽去龍荒原在洞庭西寄周燾誰言琴氏好騎魚欲寄雙緘問轉虛坐客己傾江左泪聞君尚在道南居吳中著有張融傳花下刪成蒯子書當日章安兵未起趨庭長得過甌餘其尊人曾為台州司馬吳江陳啓源貽詩賦酬十年道路愧冥鴻長向吳江聽落楓畫舫未逢三若下高門只對五湖東冠時著作超承祚滿地兵戈憶子公何幸新詩能遠寄光芒百丈儼埀虹寄贈山東開府施君生日東藩鎖鑰衛神京開府雄連七十城星斗喜從天幕轉日華看向海潮生威行岱麓風彌峻操比齊河水更清一介書生能建節當時曾見庾蘭成二金笳開處動旌旄獬繡裁成鵲練袍賜履遠埀滄海闊期門孤並泰山高全齊萬户爭懸矢此地三公有佩刀哲士挺生真不昜肯教聖主念民勞送徐二十二嗣定廷試南還天安門啓控雙鐶聖主臨軒䇿奏還老景去留存宦迹夏雲重疊類家山城邊度馬人俱遠庭有銜魚鳥自間他日論文肯相待為君柳市重躋攀二青袍裁罷謁公車徐樂原來始上書萬里敢嫌雲路遠百年長坐夜窗虛固知道在難為報翻笑官間未易除思煞舊時同學者到今誰復共巖居題家司百聽月樓詩和益都夫子原韻金梯不必問孀娥夜靜猶聞水調歌穿槅碎投千片玉當窗寒瀉萬重波榆含星影拋錢細桂入秋來落子多自是凌雲遺構在不須烏鵲更填河陳掌院先生歸里欒欒素蓋謝明光欲餞青門柳未黃祗為山濤將負土故教劉覽暫還鄉銜車曉日當天井去路春雲蔽太行咫尺東山勞聖眷莫令同省久相望二車前揖杖暗心驚數載金廬共侍情帝座儼臨瞻斗近君行此去見星明韓山白鵲盈軒集濩澤丹芝傍墓生若問趨庭須學禮那能徒負后蒼名送裘侍御巡鹽淮揚獨乘驄馬下江都夾道爭看御史烏帝簡不殊李景讓官山重見管夷吾臨行舊邸金章露曾彈新參鐵面孤飲餞都亭誰勿避可知獬豸在當塗施鴻臚以禁方見示賦謝慢延三景叩崑崙碣石猶翻北海鯤未共馬生餐玉液恰逢羽客在金門銜花鳥下青絲仗合藥人歸紅杏村誰訝肩吾還入籍丹臺名姓本長存彰德别駕之任有贈兼詢吳文學鄴下新推監郡豪漳河水色照青袍車前周景初題字匣有王祥舊佩刀上黨雲連熊斾遠太行山盡雀臺高城東肯問韓陵石何處文章少俊髦出沐即事有感西郊出沐踐良辰回首京華又一春鴉陳噪來天欲兩騾車過盡路生塵年前悔作間情賦日出歡逢曝背人自笑褉堂相别久夢回還著白綸巾送平象九之任宜賔夜郎南去使車稀喜見雙鳬𤏡道飛巴郡雪消來白市蜀江花落覆青衣春田種秫抄雲起午夜橫琴帶露揮此去葉榆烽火靖掖門相望敢言違王時大授連江令銅魚初佩度仙關拄頰時看海上山農畝課成螺蚌外官亭開近荔枝間王喬豈嘆京門遠嚴助方平甌粵還假使承明猶未厭鳯城柳色儘堪攀上幸瀛臺登魚遍賜近臣恭紀和李相公韻蓬池初獻范公鱗敕使分魚賚近臣銀鬛散飛瑶島雪金梭堆作御盤珍餐同豢豹揮刀爼夢逐非熊理釣綸欲紀聖恩何所似滄波漭沆竟無垠二九罭翻波躍錦鱗魚征無復稅王臣天厨入夏猶頒鮪海谷何時不效珍龜臛未和徒頷顑鸞刀欲下轉紛綸江湖自昔相忘久誰道龍淵渺四垠周太史尊人明府公年伯六十來京師同館諸公各賦詩奉贈和韻三月鶯花滿上蘭藍輿迤邐到長安戴封故作西華宰韓愈曾為嶺外官授册遠探金簡麗趨庭曉過玉堂寒宮衣裁罷斒斕色猶作他時製錦看王光祿子舉茂才喜贈舟山鸑鷟紫田芝江左青箱數世遺可但茂仁稱令士果然王濟是佳兒下帷不計探花日在泮剛逢采藻時猶記帝京來覲省當樓新授鯉庭詩二東園日出露桃開佳信欣從鑑水來藻彩橫天驚鳯翮渥注墮地本龍媒杜林名閥推光祿漢室高文重茂才祗為德門饒世濟庭前早己植三槐春夜宴集益都相公邸第即席和韻同王舍人陳吳二檢討徐林鴻咸清吳農祥三徴君暨公子慈徹協一夜啓槐堂近北辰偶來休沐藉人倫筵前杏炙燒脣美庭下梅花刺眼新雅量儼臨千頃壑清談真隔幾重塵滿堂歌詠渾間興何必乘槎更問津二台階濶絶若參辰猶喜相擕邁等倫金檢祕書看後古銅槃高燭照來新行觴久接荀龍譽舉座欣無庾亮塵咫尺天衢珠斗近祗愁無力度雲津三春蘭泛景見光風坐聽吹陽出六同日暖賜衣宮扇下晚來置酒閣門東生徒雜列超桓傳巴蜀初開想竇融金管暫吹羽舞後可知調燮在三公四黃閣沉沉轉惠風柴車春夜許相同綸書早已頒池上絲竹何妨載墅東舞袖亂隨燈影散歌聲細入酒花融當筵親作來遊誦不是周公即召公送周在都任濟南郡丞肅肅秋風轉隼旟東行監郡綰銅魚時清且佐平原相年少能傳櫟下書郡丞為櫟下先生季子丹鳯飛時知賜璽青山到處好題輿選人尚有難兄在時其兄雪客方候選欲贈虔刀思有餘贈丁刑曹初看鳯翮九霄搏敬禮由來重建安赤館舊曾遮列宿白雲從此護都官荷花結芾經秋豔棘木當廳入夏寒况值中丞開幕後于公門第舊來寬李沮東世兄由韶州太守移任寧波重承露冕出燕關秣馬都亭霽色殷金轡乍回五嶺外銅符又下四明間行車春傍江南柳披牘時看海上山鄰部編氓懷世講相思長趂浙潮還寄山右方伯太原行省領方州况復開藩在晉丘經國不須搜粟尉安疆重藉富民侯編圖户列中條盡轉餉船隨砥柱流若問汾陰千載勝白雲猶是漢時秋馮二宿榮遷補國子監博士槐市南頭璧水連馮唐待詔尚英年漢廷博士官雖冷國子先生獨爾賢折角定教傾五鹿畫衣應早兆三鱣花前載酒如相過可有東廳月俸錢秦太史歸里一紙黃封下玉除春風歸興動鱸魚才名久己傾同舍筆札長驚跨石渠天上青簾新水棹樽前紅燭故鄉書甘泉此日多詞賦莫更遊梁賦子虛依韻答和彌壑和尚長椿寺説法見贈原韻騎馬宮門年又年思君長在率陀天因傳佛説來初地悔拜天書出望仙下座有人裁問道空林何處好逃禪當時王許山陰會不道重來闡太圜送沈客子還禾中京門曉日動行旌相送河橋百思生三䇿未經投北闕十年長憶在西平宮牆柳絮粘天白旅館山梔入夏清他日負薪能薦逹肯教亷吏抱虛名贈胡生少年能讀九丘書入洛猶乘下澤車沐髮碧于江畔草行文艷過水中蕖歌殘白石天將旦裁就青衫暑未除前路秋風應萬里期君先作北溟魚沈殊亭處士自倡村居詩遍和成集其所和多兩浙耆舊翻閲生感因其索贈亦用原韻續成一首水南水北總皆村何用辭家賦述昏烏有九苞方是鳯雞非三尺不為鵾投詩半是梁園客避地深于吳市門滿目舊時朋好在慢將存歿句中論西河集卷一百七十九
