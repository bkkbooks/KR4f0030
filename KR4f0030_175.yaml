body:
  text: 西河集卷一百七十五翰林院檢討毛奇齡撰七言律詩二題陳廣文長興學舍天半蒼雲散畫簷官齋習靜晝垂簾無錢不問蘇司業有酒長携烏子瞻下箬花從春後發前溪水向夜來添攤書獨擁皋比坐門外爭投問字縑陪天童鐸菴兩和尚立雪齋雨集食桃時天童有食桃之問豫不能答用長慶體和韻即事設食香林養大慈何期得遇道安師同來白雪巖邊坐正是黃梅雨過時山葛覆肌涼未解冰桃到口味方知當前不會無生法欲下殷籖遲又遲二空亭髙坐為宣慈況對人天兩國師豈是可中才過午曽經大內住多時天童曽住大內萬善殿故云雨來拂面空相覿雪後探心了不知秪為伊蒲香供好綏桃在手食嘗遲集劉謙吉進士園賦得髙枕乃吾廬同髙宗楫司理鄒嶧進士劉始恢喬萊兩孝亷韻名園緑樹映芳塘冰甕初開水閣涼興到客能尋逺嶼醉來我欲睡匡牀牆陰日下葵根暖檻外風生藕葉香賔主悠然成靜對渾忘此地是他鄉同周司理令樹施憲使男胡大以寧方二中通陳四晉明堵三鳯蒸夜集蕭伯升江舟分韻清江髙楫郡臺前永夜金樽雜管絃座客多才憐異地主人有酒似平川天星散映廬陵樹燈火遙來章貢船醉裏未能騎馬去風流思煞習池賢答和長洲陳太僕書懷二首原韻並向吳臺憶舊遊洞庭黃橘醉髙秋人歸東道除三徑贈到南金動四愁日上海雲回逺岫霜清江葉下孤舟伯通橋畔長洲路杵臼相將願未酬二衣冠東第舊歡娛兩市三臺望去孤天下事將憑管葛吳中人半在菰蘆寒雲雕障流逋戍細雨羊裘坐釣徒滿地江湖愁間濶欲于何處問鵬圖和方二中通韻并酬曽來拾橡到山阿喜爾攜豫嵓下過浦口再逢秋色逺天涯相見暮雲多寒駒只解霜中路飛鳥驚聞河上歌欲採芙蓉隨汝去大江風雨奈愁何龍泉李郡丞蔡宏詞偶集和韻西來紫氣滿龍泉髙蓋欣逢鄴下賢八俊久傳元禮譽千秋重較少君編寒花摘向初冬候歸雁歌成太始年羡汝天涯能有會雙車齊宿草亭前送别髙二彥彪送客江關花正飛關前弱柳折來稀兩年官舍同寒食一曲離歌共落暉碧草馬蹄憐去路紅亭酒色上征衣他時訪我錢王渡勿傍桐君舊釣磯朔方天挍神兵罷朔方雙鞬不復挂漁陽三秋白草緣關斷萬里黃河入塞長鐵柱分標滇外戍金書異姓漢中王從軍久負匡時略愁見開邉到夜郎文生卜肆繩囊紗帽守龜龜間臥青溪第一橋京易早年開碧檢市簾春晝下丹綃三街雨洗天寥濶四壁星飛海動搖正栻旋棊憑布伏縱談玄箸自超超薄暮飲龔氏别墅櫻桃廳院晚棲鴉促席留歡日欲斜醉裏關心三部伎牆頭照眼數枝花金樽細度低紅袖畫燭髙燒出絳紗車轂繞門流水去滿堂愁煞奏琵琶詠芍藥和韻花純白中紫層臺不復擬臨春尚有穠花倚檻新低列玉釭浮紫熖近前嬌女弄朱唇輕風吹合階頭影曉霧濃沾砌上塵斜折一枝爭語笑幾回妬煞尹夫人寄陸嘉淑平原分手贈青堂蕭賚孤居對緑楊百里信隨寒雁杳三秋思入暮雲長草花露冷生磐石蟋蟀燈深下屋梁京洛倦遊能再過城南尚有午橋莊奉祝丁太翁比部初度飛濤尊人也錦瑟髙堂娛丈人聨翩彩袖雁行新桃花水淺江門曉琪樹雲搖海洞春鳯誥重開金簡露鸞牙分舞玉階塵長庚同是西方宿瞻在秋官第一辰二東風二月栁條舒西第新乘廣德車玄澗玉華齊暮雪餘杭酒暖及春魚八龍並下盤中食三婦爭裁機上書暇日兩湖尋勝事仙人多少在樓居蓮公還住淨土寺飛錫還歸湘水東丹崖翠壁舊龍宫早開鐘磬浮雲外不盡山河寶鏡中珠樹臨壇垂雨緑金泉洗鉢落花紅髙峯萬仞前朝塔誰道重來有志公飲宿采鳯堂有贈芙蓉曲路晚生寒白帢重逢話未闌桂酒昏星留國士菘羮秋露餉園官長安購起千金賦南郡攜來雙玉盤羡爾才名成鳯羽髙飛時作錦雲看過大敬春城髙栁未垂絲迤邐城南問故知城頭啼鳥千般怨城頭一抄作風前病起尋人幾倍思青山隔郭來新霽流水當門似舊時相看欲採幽蘭去却恨花開遲復遲江上逢友人煬帝宫前老樹村宫花宫草與誰論君因伐輻來江滸我亦觀濤到海門竹路寒煙迷逺嶠茅堂斜日對雙樽漂流同是驚翔鳥瀨上聞歌欲斷魂重過祁中丞寓山别業中丞别業寓山莊垂栁依然覆野塘北寨舊扉嵓下逺寨一作柴南湖髙閣雨中涼幽欄石竹翻鴉子敞殿金花供象王止水可憐沉劒履重來疑撿碧霞方同薑十七梧過倪司農園訪陳二待詔名園緑水接朱扉坐對黃冠解息機安道幾曽矜善畫陳登終自惜初衣蘿橋雨過紅櫻熟麥壠晴薰白鷺飛轉餉司農愁不返逢君空拂舊林霏贈徐徵君徽之講學又雅善兵法久向南州卧碧雲百年沗作老同羣關西學術推夫子天下英雄只使君負俗偶然隨漢臘荒城誰得避秦軍春來喜遇東亭會倚杖行歌日未曛杪夏集金孝亷燾同中州許三禮明府河朔清觴映晝暉炎堂靜對轉霏微盤間雪水傾瓜果醉裏薰風動葛衣羌管倚吟翻碧浪林花散日上朱扉洛陽才子蘭亭宴不倒春缸不忍歸送人之耒陽湖北湖南水盡浮杜鵑啼歇過衡州幾重髙峽穿天下萬里平江入漢流念母徐生終去魏思鄉王粲故依劉恢台孟夏煙花隔鄂渚辰陽愁不愁中秋前一日集曲江樓分賦髙會羣登江上樓魚龍百戲繞三洲歌鐘響徹天垂幕火樹煙生月滿舟賦就明河堪永夕人傳來日是中秋滿門車騎傾吳楚無奈燈前送莫愁有訪戲作西崑體兩度城南問狹斜清江細路到來賖門前雨歇憐樗樹牆角春寒有杏花翠幕幾重喧鳥鵲銅鐶半面釘蝦蟆青驄舊日行過處還記西鄰第二家送劉使君兵備辰州朱衣雙導沅江頭外幕分曹護督郵持節遂行真刺史懷錢不受舊劉侯龍檣直下黃牛浦葭鼓橫開白鷺洲明到百蠻應弭服黔南自古重辰州寄李侍御南臺分察一車軺巡視軍鹽下浙潮漢代餉曽歸使𣙜越中兵又敗夫椒黃冠難返銅魚渡烏幕還留朱雀橋驄馬幾時間外廏可憐髀肉竟全消二江東雖小尚兵連獨撫鹽車近一年繡斧未巡新屬國霜毫猶記舊蕭然侍御有蕭然山行辱寄辭極悲離鴻夜戍遷龍塞布穀春耕呌鳥田直指荷戈曽下瀨相思長訊上潮船赴山陽呈朱禹錫明府小山仙令種花居卧理三年有治書太史已占臨穎鳯故人方乞射陽魚琴臺髙詠淮南操官舍長停泗上車佳客臨卭千載事願君還念漢相如九日雲起閣登髙分得鹽韻并序八月幾望集淮陰張吏部園各賦詩三章九日復集雲起閣黃花映酒清歌遏雲雖非復嚮時繁會而風景悠然東山釣史分韻牌賦詩時請摘去險韻勿許甡最後到日將墮應手抽牌得鹽韻舉座譁然曰果然蓋預擬相難也復有五古題一賦得秋菊有佳色髙雲千疊繞朱簷九日銜杯啓畫簾雜珮茰囊盛曉露滿堂菊影待秋蟾金盤初下冰魚鱠豔曲新翻阿鵲鹽倣佛臺前重戲馬雕鞍扶出醉厭厭朱明府放生池公宴同張纘孫查繼佐吳百朋俞之璧即席淮令張筵啓暮衙珠壇深處集髙車緋紗爛映池中月寶樹香生座上花醉合清樽交履舄風吹散拍繞琵琶主賔共擅東南美只恐嚴城噪曙鴉寓吳江塔寺巢雲房贈竺蘭聖宣二上人江觀雲開第幾重巢雲精舍幸相從庭前寶樹浮千級座上蓮華有數峯擲麈暗飛金鸑鷟談經清滴翠芙蓉我來正值秋風發真見前湖起洞龍淮陰道遇淄川張黻之江西有贈淮陰道上遇王孫家在般陽笠樹村朝雨旗亭分玉勒秋花幔渚共金樽使君雄劒探江縣公子倉琅下木門相送圮橋渾一醉髙文細與客中論一草亭同韻有序遊子嵗寒良朋宵晤霜月流地嚴飈襲衣共銜匏子之巵爭擷梅花之句一亭合唱四韻依成落落天涯一草亭寒風濁酒夜談經樽前燭樹光浮檻靜裏梅花香滿庭髙唱互為林下詠疏􅎉時度斗間星更闌誰㺯桓伊笛吹徹關山不忍聽江上餞周司理赴虔州星軺計日上虔陽共集仙舟泛渺茫山翠幾重銜晚照江流萬里瀉清觴安成郡裏紅旌發章貢臺前錦纜長合座聨吟愁思起朔風歌吹滿滄浪二王程漸近反難稽南上髙旌促解攜樽酒共留江浦外官艚仍泊郡亭西紅魚撇浪當筵起白鷺橫沙舞幔低此去風流應自惜虔南司理重濓溪寄贈施比部提學山東名曹外簡重文衡特指星麾厯下城炙轂漸袪齊辨士束茅先待魯諸生滄溟水漲春潮濶岱嶽雲開曉觀清漢代五經誰第一相看惟有舊施卿愚山督學山左逺辱書問并饋買山之資四韻代答獨坐春風草太玄故人新饋員山錢王郎不用吳奴米江革還披謝眺氊鴻雁荒途愁思渺芙蓉逺道寄來鮮側身東望相從晚手把英瑶倍黯然薑掌垣舟集即事三首畫舸橫窗捲碧綈黃門邀客泛清溪草頭烘日鋪茵暖水面攢山接黛低白苧歌來翻白鷺青芹煮就漉青泥隨波十里南塘路大禹陵前西又西二村亭崦路撤鳴騶換席移尊過别洲故國祕書懷賀監東川佳客重羅侯溧陽羅一丈在座林回日影開雲葉雨過山風滿壁油啼罷午雞重作伎橫溪簫管在中流三青絲暝色繞回塘嵓畔穿雲日腳黃水閣虹燈遮紫幔山城獸管挂倉琅迎舟快霽鳴宵鶴疊檻分星對夕郎一聲長笛重回首江樹江洲共渺茫寄施諲何處關山憶舊京草青還見闔閭城田連海上琴難學庾信江南賦未成陽雁再來逢雨雪寒花不斷繞柴荆天涯兄弟猶相望欲上層樓百思生西里先生贈任屏臣三丈西里先生白苧衣園花開落舊柴扉不關好酒長收秫時有髙歌戀采薇暮雨客彈飛雉操春江人在釣魚磯戴逵入剡將投老六十年來一少微二巨犗長絲展釣車伊人秋水傍蒹葭夏公鄉下傳髙詠許掾祠前是舊家座上琴樽銷永日圖來丘壑繞丹霞湘山多少滄洲意不及青巖幾樹花屏臣號青巖居士有記年圖下商氏牡丹臺經年後為雨臣內家闥花時仍得假一觀因倣劉兼光福寺牡丹詩體應和時其內家詩滿左壁矣昔年曽住牡丹臺三尺紅衣對面裁今日重尋芳草路一行粉臉背人開橫欄初下鮫絲箔新曲誰歌鷃濫堆數載洛橋尋勝去不虞還向此中來祁二兵憲舉子春盤細菜籠青絲又是金錢試浴時蘭夢偶徵烏鵲會桐孫再舉鳯凰枝夫人好比參軍婦遙集生為阮氏兒男子懸弧當有用勿教空誦鯉庭詩遊少林寺少室諸天天際開翻經一上魏王臺幽巖風靜三花落絶澗泉分五乳來漢禪逺留金貝葉秦官髙覆石壇槐歸雲迷却丹龍洞尚有間僧坐翠苔客舍贈建康胡公子以寧相從客舍久依依江左風流天下稀理事自應推伯始知名真不愧胡威霜髙一榻橫清漢嵗晚雙樽傍落暉慷慨前期何處問臺城南上舊烏衣題丁克振樓居庾公不向武昌居矯矯元龍百尺餘頻理詠歌臨大道長環泥水謝髙車重簾花散天邊雨兩岫風生几上書日暮空欄愁倚徙春鴻歸盡海門虛薑兆禎啓昆仲覲從兄侍御維揚官署法曹清夢豸堂開逺覲爭看赴洛才陽雁曉從京口下寒濤秋捲日邊來驄花並轡趨公府瓊樹髙枝接郡臺勿訝君家長共被繡衣清冷舊相推人日書懷寄大敬蕙葉椒花對酒尊珠幡寶勝綴春門幾年客卧山陰市七日人歸江上村風裏叢條粧燕子階前細草待王孫懷君欲作登髙會一望城南幾斷魂送駱叔夜北行離亭落木正蕭蕭又見長帆去影遙挾䇿幾年淮海路傷心再渡浙江潮寒風絶塞吹青雁霜月橫空擊皂雕叢桂故山秋正發一枝還擬贈河橋商公子席上作公子霖臣冢宰公嗣曉日曈曨甲第開青蔥玉樹照銜杯列侯幸識韋賢後吏部重看山簡來冠組乍交分簙箸歌鐘肆起近樓臺繞堂㶁㶁長濠水欲挽東流使倒回祁湘君催粧有序夫易占乘馬戒其盤桓詩詠集鷮遽如飢渴則唐女惜三星之遲韓姞驚八鸞之快是無故捲簾當勤去扇宜速也在昔雲安下降詔作催粧安樂成婚賦將移燭故鳯臺教北府頻迎鵲路怕東方漸曉雖復懷中石子種待踰年亦且池面冰花泮諸一旦矧嬴娘仙早容易將翔衛玠官髙較難久立固宜褰帷拂嬌女之眉却障索才人之詠矣夫祁湘君祁中丞之細女亦沈大行之少媳也祁雲爛然不需韓樂沈郎瘦去願贅齊庭當夫西施江畔紫炬星飛梅尉山頭緑屏霧捲牛女耀東書之壁中丞第左廂名東書堂鳯凰迓西里之賔乘龍載見瓊蕊旋開捧雁來遊穠桃預啓則有貴家上戚寶馬珠纓故第名姻玳筵綺席叔隗擾公子之親孫子以護軍為戲加之中郎阿大執燭調花顧婦謝家弄觴承巹則亦有東京才子洛城麗人隨綵騎以願觀覯祥雲而逺屆看施紅粉還陪畫額之夫私抱青芻竟秣雕蹄之馬既已輸翡翠于橫陳效烏鳶之切噪然而天上光遙人間夜短金莖垂素手露溢銅巵紅藕咽青鱗水浮銀箭曩者甡選越詩末延閨秀曽誇梅市甲于海內自忠愍擅太傅之聲夫人作京陵之範閨中三婦博學髙才庭下九嬪尋章摘句楚纕趙璧奕慶奕喜配援婦誡以著書英修嫣湘君姊樂諸兄之同硯固已軼大家之漢史駕伏女而傳經況湘君者貌擬桃夭才逾柳絮怨詩思父邁等吹笳秋月貽姑比之顧莵怨詩秋月皆湘君詩及升笄之妙年臨結褵之勝事羣相樂歡甡沗嘉與其忍令青銅鏡裏久佇芙蓉碧玉樓頭尚弛琴瑟則是吉甫乏迎蹶之章召公無嫁姬之誦也爾乃介爾奕喜索我催粧仍示湘君因之啓帳維時上官懷巨稱云有當于考功之褒陸暢謝伽瓶疇則加以內人之誚中丞愛女早乘龍徐著銖衣下碧峯紅粉久調金菡蓞青銅時對玉芙蓉屏髙喜見花雙樹扇底愁遮山萬重莫厭催粧徒聒耳漢宫待詔重吳儂二雙成促駕似流泉索我題詩畫燭前戶外分銜九子綬帳中低撒五銖錢故遣浮雲粧寶鬘旋將明月作珠鈿因爾天孫能織錦有人先製鵲橋篇三豸府沉沉蓮漏催吹簫爭引鳯凰臺憑隨帝子雲中度真見王郎天上來寶襪暗舒連理字璚鬟笑捧合歡杯粧成莫待朝霞起滿院叢花滴露開四萬條銀燭照都房陪列金叉十二行屢倩黛煙書錦字猶臨粧鏡著衣裳停軒别遣催花使隔􅚫羣扶新嫁娘恰是湘君太容與頻勞宋玉賦髙唐五紅絲久繫沈郎腰只待名姝贈握椒早嵗雲章傳赤縣臨時春水漲藍橋青虯啓馭調珠轂丹鳯銜書出絳霄太傅堂前饒好事拚為烏鵲噪朝朝長至寄懷吳江徐嵩數盡秋風白雁羣更逢長至一思君髙楓冷墮吳江雨半岫遙分笠澤雲孺子恥膺三府辟偉長時著一家文漢宫此際才添線不用鄰家刺繡紋同韻贈王玉映閨秀渡江樟亭西望古錢塘終嵗他鄉復故鄉綵筆題來當上已畫船載去又重陽千層羅綺波紋細十里芙蓉江岸長吳苑楚宫能遍厯他年青草恨茫茫晤雍陳二生東遊羡爾雄才洛下知玄亭相對暮冬時陳平自許能懷璧雍伯何曽只販脂幸舍橫琴圍燭短西園疊鼓奏觴遲浮雲一去空南北何處同尋黃絹詞西河集卷一百七十五
