body:
  text: 西河集卷八十五翰林院檢討毛竒齡撰墓碑銘二故明中憲大夫太常寺少卿兵科給事中來君墓碑銘君諱集之字元成曾祖日升以嘉靖甲午舉人官雲南師宗州知州有文名而君繼之早嵗通經稍長即能以詩古文詞爭雄藝林而厄于童試崇禎六年始以附學改學生廪食髙等八年禮臣請特科舉天下士每學取廪食髙等者設兩場試分經義論䇿硃其書與鄉試埒而君舉第一貢之南京國子監領已卯鄉薦庚辰成進士時房官陳函輝能文同房所收皆一時名下士聲大噪而館選數狹擠之改南京安慶府推官會天下多故獻賊破蘄黃流及旁郡沿江烽火接安慶君力搘拄之晝營儲峙夜率伍伯邏雉堞間顧兵民雜􅀈楚帥防江者駐安慶營日以芻茭不即給糗糒闕然洶洶懷亂心而前後撫軍擁幕府自大鮮所獻替君獨竭忠誠以告陰為調劑得遂所陳請以故羇縻之雖賊三薄城而得以不壞方是時二京臺省聞君名疏記其所為爭起薦之章凡十數上而畿輔踵冦留不下乃以壬午鄉試充南京同考官薦戚藩等凡九人平賊鎮帥者寧南侯左良玉也遇賊湖湘間不利且匱餉大掠而東舳艫銜于江聲言勤王師所至歡譟不可測君駕舟見良玉良玉擁􅪡具躡屣出接嘖嘖稱君為推官有名握手深結納由是下江悉無恙既而賊犯闕事棘南京拒賊者取君為兵科君不就先是鳯督馬士英以招永城賊募兵黔南道徽州兵飢剽食于婺源村民民拒且鬬殺傷黔南兵士英大怒特檄君往治欲以亂民律掩殺而君撫諭之覆言民殺劫人賊非殺兵無罪宜勿問士英心恨之而外憚其直顧無如何也至是君取召而士英方以故督入柄政反言君可用署以兵科將欲收之為私人而君恥不附遽改兵科為兵部後以他臣薦仍改兵科且並進太常少卿而王師已南下矣初君父舜和公亦廩食于學課君及君弟于儻湖之濵君嘗過念之曰此先公授書處也至是髠髮匿湖濵以著書自娛購古今載籍弆其中日與客論文及古今興喪得失兼近代掌故與夫身之所聞見者燃薪繼景娓娓不能已四方請教者踵趾相錯共稱為倘湖先生明制輕武士遇獸衣輒嫚易之視若蒯𨽻即季世用兵稍稍敢自桀而終壓于制不得遂方君為推官時安慶帥馬君投糧儲道以名刺以為鎮將與參政可平行也參政責易板不報既而參政驟開府巡撫其地乃修宿憾將置帥于法而君力解之且薦用焉至是帥歸命略地江東世祖皇帝嘉其能賜之以名且令提督江南兵開牙吳淞于是擇使拜書幣乞君況臨君以角巾往開轅迎君饗于堂膝地行酒臚列山海不可識人以為此國士之報云康熙十七年上開博學鴻儒科召天下才學官人可備著作顧問之選者撫軍以君應君辭之且曰吾年七十餘已嫗矣尚能為成君作衣補耶康熙乙卯君自為志銘以為他人莫能言且多諛也越八年壬戌君始卒又三年其四子燕雯以己酉舉人赴公車門值豫直史館􅍐分明史文苑傳得君名已起草去燕雯適詣豫具言竁門之石先公已自銘之矣惟是嘉懿未盡學者將勒文于饗醴之版比之顔光祿之碑靖節此非先生文不足重亦惟是先生與先公為忘年交文章親昵足徵信勿諛豫曰諾又十年乃始為此君所著書目備載明史經藉志其在經曰讀易隅通曰易圖親見曰卦義一得曰春秋志在曰四傳權衡在籍曰倘湖文案曰南行偶筆曰南行載筆曰倘湖近刻曰倘湖詩餘在雜著曰樵書初編曰樵書二編曰茗餘録君嘗曰讀易隅通者一隅之通也然豫是時方嬰城藏燈木樵每從塹隅旁通之自為志曰豫所著有某書及雜劇之兩紗秋風三疊而已案兩紗三疊史志皆不載以雜劇故也顧豫知君事君以崇禎已已赴童試縣斥之粘其文于門庚午再試再斥之然而府試拔第一時年二十七始附學于是作兩紗劇一紅紗謂以紗幛目眯五色也一碧紗則紗蒙其舊所為詩貴與賤易觀也夫通塞之難憑如此子六人皆以文名具劉氏補志兹不載銘曰君功在一方而名垂四涯其文可傳者則藏之倘湖之湄志而銘君自為之遺言軼事不可既于是乎有墓旁之碑然而遲之以至于今曰非諛墓辭汪贈君墓碑銘汪贈君以康熙改元之一十有四捐館舍去豫方赴徵車未皇弔也越明年豫以史局留京師又十年告歸始與贈君之子遊嘗從舊文社祭酒在先朝訂交若柴君虎臣陳君際叔輩藉藉稱贈君為人時用知物善推有以益所無與貧賢者往來不私其居出物鮮留吝而終以不匱今其人不可見矣而善子繼之見其子則一如見贈君焉以故豫與贈君之子交稍通即豫身所遇偶為他誤亦嘗藉贈君之子以補鏝其間豫因而好之乃距告歸又十年而後以修贈君墓謁豫為碑豫何敢辭豫按贈君狀知贈君生于前朝萬歷之三十六年當崇禎改元海颶發三日東洋水髙挾陂塘而奔而上江蜃蟄四起浲洞之出山者瀖濩而下山海相摶擊胔浮蔽江會贈君齎載歸駕所乘舟率長年拯溺每拯一人則量棄所載懼不容也及拯滿而載已盡暨十三年秋旱蟲南飛斗米五百錢冬大厲贈君賑以糜凡執厲來者悉納之或以傳厲告君不應乃飢活而厲亦無恙當是時國運方百六天變日至父老嘗言辰水辰旱土敗而民散則以洚水當戊辰而蟲在庚辰豫少每聞之而怵于心也然而天有災人則弭之國固不可支而閭里草莽乃先芘而依維之自明亂以後贈君每于故交之貧者倍相周恤家人戚友凡有婚嫁死喪者求即應之里中寒士每嵗除各贈以卒嵗之資如恆課然雖歷久不已夫天地生財莫之短長然而人每生于嬴而死于絀當夫五金在地過而勿視而一經筐篋則遂資之為口體服食舟車棟宇之具乃其嬴者嘗至揮棄而不足者銖銖焉此在平成俱有之而喪亂尤甚幸而挾詩書作長吏可矯語亷節陰相摲取而户牖之子家室單弱嵗時無以給祭祀進醵修艇每不足以自通彼夫豪奢之俗冬食萍薤晦布星月一飯十金猶歉于茹啖而有如儋石不充暫假升斗即以之摩腹而有餘是升斗之惠重于千倉一勺之濡寬于四溟也世有贈君吾知閭巷鮮飢溺已順治十六年於潛盜起劫君父于寨而索其資君至寨即羅拜還之嗣後凡在家在客遇有盜輒相戒勿犯贈君諱廷瑜字汝待徽之休寧人其所居西鄉名西鄉汪氏西鄉汪氏初以勳爵起家而既而甲第遍天下今徙居杭州顧在杭猶隆隆也子肇華次肇昉又次肇齡則世所稱善繼君者君有聲成均而肇齡以諸生入國子不墜其學諸子姓婚嫁俱具狀銘曰既豐于德而又不嗇於所藏斯進可逮物而退亦自臧乃通財化幣而推恩于鄉邦使閭里貧乏雖居亂而不及于荒則凡少丁百六長罹更革者而聞其言而不能相忘是君雖在地而其可傳者仍在人也曰君何嘗亡徵士徐君墓碑銘君仲山諱咸清上虞下管村徐氏歷世以科目為京朝官祖諱鄰萬厯壬午舉人僦居會稽父大司馬諱人龍與伯父諱宗孺同母兄弟同登萬厯丙辰榜進士伯父還下管而司馬公留會稽之稽山門家焉君生而慧一嵗識字五嵗通一經甫畜髮即能以官監生應鄉舉入場有文章名仲商夫人者大冢宰商公諱周祚女也國色與女兄蘇松巡撫祁公夫人俱能詩近世能詩家呼為伯仲商夫人冢宰公還朝值司馬公以副都御史巡撫山東見君于官署而愛之許為婚姻會國變司馬公以大司農起用被召中道旋返破産與兩浙巡撫黃鳴俊募閭左勤王不利南都建號者仍以公與馬士英同掌本兵而公怒却之提一旅歸與故總兵官王之仁屯之西陵名西陵軍王師下江東西陵軍潰司馬公踉蹌走海上家人東西竄暨稍定而君方重病且以國難遘家難意托落無生人趣及行嘉會禮却扇驟見商夫人大驚曰吾以是為王霸妻足矣乃就故居稽山門辟寢前廣庭構以藥欄設長筵當中發故所藏書散垜之而對坐縱觀暇則抽牘各為詩如是有年天台老尼從萬年來遙望見夫人合掌曰此妙色身如來也蓮花化生相好光明既而咄唶曰善持之善持之幾見曼陀長人間耶于是君與夫人約請各為課程吾當著一書銷此白日而子且從老尼請發願寫妙蓮花經三部以延其年何如夫人然之乃復自揣著何書吾研練經術久矣請合并羣籍而正定之以勒取其意與事之裨世用者筮之得屯之五曰小貞吉大貞凶曰猶之屯爾寧為其小者而已于是著小學一書慱取揚雄訓纂許叔重説文以及梁顧野王玉篇并後儒川篇篇海諸書以正字形取陸法言切韻孫愐唐韻暨宋祥符景祐間廣韻集韻諸書以正字聲而于是縱考十三經子史文集暨漢唐宋元諸大小篇帖凡有繫于釋文者悉旁搜博採以正字義自一畫以至多畫分若干字合若干卷名之曰資治文字而夫人齋蔬性不喜肉食至是斷之日給粥一瓷酪一瓷金菊湯一瓷焚香滌指以辰申二時寫梵頁三番計三部合計所寫字二十萬八千有嬴凡三年寫成會廣孝禪寺大殿工竣三目尊者君方外友也率僧衆披衣拜于庭乞施二部去供其一于殿極甍間周以朱木函而甃結之使風雨蟲鼠俱不得蝕而納其一于毗盧遮那世尊腹中綴以金銀寶珠而冪以錦紱撾鼓集大衆宣揚之其餘一部則送之天台萬年龍藏中以老尼從萬年來也康熙十七年上開制科令京朝內外各舉郡縣有才學而堪與試者道撫爭薦君君辭不得遂赴京先是閣中判詞頭照前代典例多用查議查覆諸字而髙陽相公精字學謂字書無查字縱有之不作察解此必原判是察字而北無入聲呼察聲如查故訛查耳訛字何可用因啓奏御前凡判詞查字俱改察字然終不解查與察沿訛之始至是應制科者紛紛至每至必合數十人謁相公門下君進謁髙陽相公徐詢曰察聲訛查有始乎在坐無對者君逡巡曰漢書貨殖傳有之顧查為在聲之訛非察聲訛也髙陽矍然曰何言之曰古在本察字爾雅曰在察也堯典在璿璣玉衡以齊七政是也苐三聲呼在為查以查與槎同漢書貨殖傳山不茬蘖即槎蘖也而字乃從草而諧以在聲故在聲為槎槎轉為查則是查者在聲之轉也猶之在之又轉而為裁為財也若曰察之轉則是乂也差也察豈能轉查乎髙陽遽色變乃復進曰察聲不轉查然而在即察也改查為察可乎曰不可老子曰其政察察亦惟察名不可居故以在字隱察名而轉聲為查若改察仍察察也然則查可乎曰可曰此則僕之所未聞也夫字必有義查字無察義而有在聲使徒以聲同之故而不顧其義則道可盜也曰道固不可盜而在則可查不觀在又為裁乎在之為裁察義同也然而裁之又為財則無義矣裁可財則在可查矣裁之為才僅義同也然而才之又為才則無義矣才可才則查可察矣髙陽􅍀然謝而起其後三相録試卷糊名然終不用益都相公薦于廷上曰有著乎曰有曰何著曰資治文字資治文字何謂耶曰字書也旁一相曰字書小學耳遂罷既而益都擬再薦不得君曰小貞吉吾向不為大而為小此屯也然而吉矣吾幸得歸矣初君到京時益都相公欲館君于邸會邸客將滿中有一客鄉人也作字補一書內有􅻓字注曰水雲角􅻓遂音妻而入角部中或以問君君曰呂覽曰水雲魚鱗未聞角􅻓也客大恨遂沮之至是欲再薦則同舍者再沮之君歸而逍遙仍與夫人相對坐戀花觀書越十年庚午七月七日微疾卒子東女昭華皆有才名越中閨秀舊稱伯仲商夫人其後伯商夫人女有祁湘君者繼夫人起而仲商夫人則昭華繼之既而昭華名藉甚過于湘君嘉興曹侍郎曰自左嬪蘇若蘭後文章之盛無如徐昭華者昭華壻駱生名襄錦乃為詞曰平原康樂席世勳兮將率妻子居之吳市門兮闔户著書其間情兮如何翁思復舉明經兮區區小學等曲禮兮食肉食肝不如歸故里兮特負畚者非鴻妻兮老萊童鴻反比之荀倩兮七月七日黃姑上天兮竁門虛左將駐此妙色身兮君有子過中郎兮千秋之室堂堂兮誥贈奉直大夫都察院監察御史張公墓碑銘張公諱鎮字庚生世居武強之王家莊初以子星耀貴贈户部山東司郎中其卒時相國李公為志其墓門久矣既又以次子星法貴贈監察御史會户部君以俸滿出為寧波府知府飾幣造請謂舍奠之石已礲墓左而獨不得文其陰念先生與任丘龎君同館同年而龎君之舉制科則實豫所薦士也今龎君有素書敬問先生起居豫敢藉龎君之請乞先生一言以大豫工祝世世何如豫不敢辭按公以文學顯明制重文事而輕武備及其季也盜賊充斥始飭督學使凡試髙等者必較射學宮以定甲乙然率具文耳公弱冠督學曹溶試真定已取第一及校射九中大驚謂此文武才超其等值崇禎癸未河北大亂盜賊剽鄉閭公乃集蒼頭設柝登臺四瞭且出竒計襲賊營捕賊梟桀賊苐聞王家莊兵皆却去既而京師陷公奉母闔土室棄文事武備不道每嘆曰吾兄弟三人皆以文章雄于時而豫以稍健思出知計為救時之豪乃終不得遂豈非天哉順治三年稼部圈畿甸莊田為旗丁屯將入境公策馬赴行幕畫地抗論謂武強土狹居民並無厲阡畝再易不足稼圈屯未便反復詰難千餘言稼部義之當是時畿甸圈屯數千里獨武強免公家素封自謂推財不能如田文居鄉行義不能如王彥方則家食何為矣乃焚所責劵詢族戚中無子女者為之似續而分資財以給之有不能婚葬者為婚葬修學舍鄉祠之圮發粟賑歉代償官錢之不能輸者元氏平姓婦老寡有操無資不能達于朝公集諸生告督學使請旨旌之并為造棹楔以髙其門上谷劉生因葬親南遊凡附身諸物楄柎俱具獨不得一美大槨巋然髙侈以陰娛其親徘徊武強界公聞之感其意立豫百金使買槨砥沐遊之通途致逺近來觀以為榮東明袁中書宦家子也不得于縣令縣令刳剝之不已羅織他事蒯捕數輩出家人竄走公坐賈人車迹中書所在而苫蓋之匿之車間驅而歸乃為舍養于旁縣營救備至伺事解陰為治資裝赴都值特開制科詹事府詹事沈君聞中書名薦之入試中上卷授翰林院編修時中制科者北直五人而編修居其一為之詞曰公以文章顯而不于其身亦有武略而惜不能救國家之屯乃散財肆志慷慨任俠而其志終不得伸吾所題者嗟乎此思賢之墳刑部員外佟君夫人石氏墓碑銘夫人氏石遼東人曾祖諱漢以滿洲籍當定鼎之先從龍入關生子三長國柱阿思尼哈番次諱天柱即夫人祖也為關東總兵官有名又次廷柱固山額真夫人父諱瑾即總兵公子以副總兵官守孝陵進都督僉事母李太君誥封夫人則故名將諱成梁曾孫大同參將殉難諱向堯女也夫人生最長其弟文郁侍御史文燦驃騎將軍文賢候補筆帖式獨夫人少有異姿且知書僉事公愛之密為擇配會大中丞佟公巡撫四川其子賦斌為刑部員外郎賢而有文遂歸焉當夫人歸時刑部君大父以宣府挂印大總兵家居中丞公撫蜀未能養也留君與夫人扶侍而宣府公卒中丞公聞訃將北還而奉旨留任守制君復以覲省從任所還發未及到諸凡視膳嘗藥以及含斂殯奠皆夫人一身主之其間豐約贏歉無不中度然且大母王太君春秋髙不能隨任日夕藉夫人進養寒暖勞逸審伺之不輟如是有年以故王太君臨終流涕曰世焉有扶侍之勤如吾婦孫者乎既而中丞公移鎮中州薨于官君與夫人偕奔喪所遺幼弟稚妹皆在襁褓夫人乃接受而鞠粥之以丘嫂而兼保母自毁齒垂髦以至笄丳未嘗頃刻離左右逮治粧送姑登車結褵而夫人始以瘵病終也夫金閨之子生長嬌稚不習家人事又所至名門巨閥兩家彼此各以富貴相矜髙誰則甘勤苦而􅈺法則如夫人者然則夫人亦賢已先是京師大厭時有師巫過門言某日當災至日地震以為驗夫人曰地震豈一家災乎此偶中耳斥之不與語及夫人有疾俗言師巫善祠神名曰跳神每跳師巫被錦繡念誦手擊神鞞腰繫諸鈴鐸而步搖之使聲與相應至跳畢覘神意當否不當然後扶病者徒跣至神前訴罪無不愈者或以強夫人夫人堅拒之曰死生在天豈一師婆能制之且吾生平無大罪自視瞭然乃欲以百年歸藏之身而徒跣衆前以延須臾吾不能矣乃于康熙甲子十二月初七日卒距生崇德庚辰八月二十日享年四十有六以覃恩誥封夫人子一時傑候補主事娶總督倉場馬公如驥姪昭勇將軍雲漢女女三長適湖廣巡撫張公朝珍孫刑部員外聖猷子枚次適佐領公畢拉子户部員外薩木哈三適內務府郎中張公萬祿子鼎鼐係以銘曰孝乎親而不惑乎神此庶士所難也而得之閨中之人雖豐碑華窆睪然墓門其瞭然歸藏者視此身西河集卷八十五
