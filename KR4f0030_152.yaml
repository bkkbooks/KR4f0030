body:
  text: 西河集巻一百五十二翰林院檢討毛奇齡撰排律揚州金太守修復平山堂讌集和曹侍郎韻東閣人何在蕪城賦未傳每游隋苑去只愛蜀岡前地擅江都勝堂成慶厯年風流聞舊守登覽挹前賢山逺平如掌牆低甫及肩折荷分四座種栁並三眠漸覺春風度還看歲月遷重來送原父三過憶坡仙廣牖通樵㸑空壇傍竺乾賔閒甓社酒妓散廣陵船何幸文章牧方從汝潁旋乗時聲籍甚懷古意悠然行部朱旂繞尋幽錦纜牽雲樓恢佛地月俸解官錢文杏安琱檻團花隱甃磚龍蛇遺字古魚鳥近人憐翠甸宜圖畫紅橋度管絃同舟擕郭泰開館得田駢我本平臺友忻觀鄴下篇淮西三歲别江介一星躔末乗陪常晩長筵醉不先旌麾開北府烽火阻南天良㑹他時少髙風此地偏到來追賦詠何似杜樊川從湖口入彭蠡舟次登覽書事水國秋程澹江舟曉樹凉晴霞滿湓浦破浪入潯陽碧水葮初老青天雁正翔廬峰横九嶂星渚並三湘撃确聽鐘阜懸花繡石梁閒僧太子寺神女大姑塘斷壁開連塢流雲過近檣洲平浮菼宅瀨淺折蓮房鼓角驚殘戍琵琶惜異鄉褰衣吹薜荔酤酒對柴桑髙詠慚呉客名山重楚疆臨流隨騁望我欲誦滄浪行次左蠡放船出南康已來舟中寄蔡五十一仲光姜十七廷梧張五杉并呈施湖西趙司馬駱崇仁何奉新諸公流浪還齊地蒼茫向楚隅何時經夏口此去是洪都鄉信淹江雁生涯寄水鳬仲宣思故國阮氏泣窮途早歲棲中露頻年詘負塗書曽降故將行獨後諸儒才淺人爭忌貲貧志亦愚山萁書有罪梁燕語當誅張儉將歸塞童鴻反去呉相君真解綬浣女果捐軀走險胡全跋昂霄尾畢逋有家憐季布易氏識陶朱讌序傾金澗詩成博錦褕宅猶留鮑照壻欲贅淳于北顧空騏驥南行覔湛盧浮名偕草木放跡在菰蘆彭澤宵經縣鄱陽曉渡湖清秋凉襲袂白日醉提壺避地依五老環波洗二孤籃輿邀栗里宫錦謝當塗每念同袍士還思舊酒徒探書登夏穴修禊遶春蕪不見三秋艾相思兩地荂風舷時轉側霜柳暗凋枯虛羡雲間鵠恒隨檣上烏懷人難命駕無道但乗桴緑水愁徒涉青天想共呼髙峰追白社寒浦泣蒼梧妄踞洪崖室還尋卓氏壚無端依水馬何處憶蓴鱸去國曽捐冕通闗不棄繻歸裝輸陸賈游仕愧秋胡最恨生多劣仍憐世善誣涼才宜刖石暗地豈投珠嫉翠連殘羽摧翹及棄樗狂書焚蒯子遺論毁濳夫分鮮金箱秘情甘溷厠汚張蒼三厯盡司馬一書無貿貿忘榮落悠悠度曉晡拂龜亡决䇿借箸昩前圖愁聽歌商女驚看秀木奴荒城頻鼓角末技厭吹竽抱璞思俱寂書空手自摸羈棲同燕雀輾轉似蜘蛛海濶從浮泊天髙趂逺徂留情追沅澧投老近番禺市舶諮梁賈仙山訪藐姑遄車需載輔相瞽頼匡扶猶幸逢知已先經宦此區剸魚跳幸舍漉酒濫軍厨兔苑嘗裁賦龍門願捧樞蕪文煩嘖嘖汎愛首區區南埜應過眼章流久浹膚固將憑永久且復倚斯須飄蕩廻蓬荻遭逢任轆轤時方捐苧葛節又採茱茰率曠知依棧穿林念守株草留寒蝶栩波逐細魚濡多淚啼猿狖難行喚鷓鴣孤懷誰告語長望起躊躇彭蠡湖達南昌將適廬陵訪施湖西途中有寄凡三十二韻久念廬陵勝還為彭蠡遊湖天廻逺日山葉動髙秋星子聨迎櫂康郎曲上舟溪吟過栗里野泊近椒丘烟塞抛魚罩霜籬醉酒篘風生朝解笮水冷夜添稠赭岸尋遺堞青山榜舊郵橋看三峽雨亭瞰百花洲玉笥懷丹牘珠泉掛碧檣鈴遮鴿浦旅笛傍龍湫漢將城臺迥秦人洞壑幽峰前紅嶂合江畔綵螺浮鼓枻横章口擕書到石頭虛名傳白社浪跡剰烏裘鐵轆翔雲鷁干將望斗牛故人今節度分守舊諸侯重鎭雄蠻服嚴闗控上游陳蕃推豫郡陶侃在江州但借卬亭宿無需禰刺投入吳忻見導避楚故依劉浙右曽分袂淮南值税輈經冬陪飲讌首夏約過求厯覽慚靈運相思負子猷因探梅尉岫始憶庾公樓何處嗚葮鼔先將釋蒯緱榻縁徐稺設坊定范逵留興到開仙室文成寫吉流層臺閑繡棨後幕捲青油我放同安道君廉過禇裒草堂貲有待蠟屐計安週西上呼黄鶴南行駕紫虯此間何路達為我一諮諏自南昌踰峽江入廬陵界再寄施湖西并諸幕府四十三韻清江猶曲泝溜水幾回沿甫入章中路旋踰峽口船回颿知幾日看桂又經年時轉青山外朝行緑水邊周郎雄鎭下漢尉舊城前虎踞横洲險鸞吟舞岫聨無書藏玉笥有驛住金川廬阜難回首洪崖未拍肩前程逾浩渺上浦正遷延疎葉穿楓塢寒苗映蔗山秋髙雲度煖冬近日行偏宿草紅晞露平沙緑浸天石攢飛鳥毳渦曲斂蛟涎枉渚難齊榜層灘只上牽磯封猶疊璧浪碎恍連錢妙景紆還望忘機醒亦眠長征鄰去馬偶詠效衰蟬篷暖衣從晾罏欹酒更煎霜棲尋蓼雀水食進槎鯿捲簟抽蒲莞添衾愛木棉琴聲浮浦藻劎氣解氷蓮寂莫匡君隱昭靈屈子篇丹虚慚羽服賽起恨神絃髙德屏藩業才名幕府賢安危煩重鎭優暇即神仙地已成維服民猶解倒懸羣方追嘯咏我亦誦旬宣獻瑟羞膠柱剸刀痛着鉛自當依謝尚敢曰寄劉焉寓擇郗公舍披餘謝眺氊逢迎隨浪蕩奔走任風烟特是忘歸矢天涯縱轉旋未知誰税駕江畔漫流漣風急愁來雁波澄看下鳶年華空冉冉流水自濺濺此處祠梅福吾行媿魯連孤游標鹿豕健舉負鷹鸇汎梗憂中斷枯花憶故妍天章徒似錦菼影笑如椽規我曽遺襚隨時悔佩弦寧終浮玉桂逝欲採香荃洲鷺漂逾白川螺轉最圓懷人兼寄志游泳自蒼然投寓天衣寺謁乾公和尚同張五杉用宋之問韻祗苑開山峻王城入路遐層臺連萬壑到寺識三車中藏遺金葉前人誦法華南朝傳聖果東渡守毘闍化雨飛千界神天感六牙國王呈瑞像太子賜袈裟代草燈彌煥巖空覺未賒十峰環處聳雙澗度來斜寳誌重飛錫曇摩又泛槎龍潭融佛乳珠樹散天花下士行多劫非時害有瑕周顒來不意張儉返無家翹首瞻獅象甘心逐麏麚忍將同草辱羞復道蘭奢詎悟依孤獨居然啓七遮隨時聽梵籟是地見恒沙蓮室仍栽竹桑門暫獻瓜山田過夏雨林洞臥朝霞勝蹟標秦望同游在若耶相逢留白社去住兩無涯送蔡漢舒北游我厭東歸轍君摇北去裝渡江梅雨暗入夏柳條長寳帶蟾蜍白金臺駿馬黄乗時開韞櫝利物重干將緑草愁南浦青雲羨帝鄉只憐流蕩久不忍上河梁早春殘雪麗景春偏早閒庭雪尚殘風微融地濕日薄過林寒柳絮沾還墮梨花落自乾碧流波底凍白見草頭瘢興盡山隂久吹停黍谷難陽和窮巷起應有問袁安奉贈嚴都諌十韻髙座入文昌天官駁正郎開圅勤對闥起草靜焚香翠殿春摇珮青娥曉近牀題詩留籞宿諫獵過長楊國士稱堯闕家聲在禹航燕臺新讌㑹呉地舊文章别計開南粤前身事孝王依蒲通禁鎻連葉誦齋房讓士逾劉寔邀賓類鄭莊木門天上路誰不望倉琅擬艷詩東井匏瓜爛西鄰棗樹完苦心經蘗塢無力度桑乾黄鵠翻雲逺青溪得路難秦家愁織錦班氏怨裁紈莞蒻承牀薄芙蓉掩鏡殘食禾根可共結膝履嘗單白帽門前杳烏頭樹裏寒嶢闗如得返辛苦望燕丹哭沈生功宗詩時事有長短交情無死生同君埋草澤先我返蓬瀛器大如顔子才髙過禰衡登臨廻北顧詞賦本西京早歲方懷策終年竟請纓人間金殿阻天上玉樓成鵩為長沙至麟來曲阜行痛心君鳥逝轉眼我驢鳴庭有雙親養田無一子耕桓譚多緒論朱穆但空籯屬誌羞孫綽臨尸負子荆今朝發哀次何似武昌城姜埈曰孚先病中囑其弟乞西河誌又貽書西河云能如王武子哭孫楚否故末云送邑明府韓公櫬歸遼陽蕭縣花齊落樟亭草正凋櫬歸遼海月䰟斷浙江潮化鶴思華表飛魚戴石橋桓伊哀引曲周勃泣吹簫河北迎長旐江南賦小招如何薤上露不與泪俱消螢聨句古寺見秋螢甡流輝映晩庭向明還澹澹僧成珙入暗更熒熒㸃亂因風轉張杉光凝似火停拽來投竹路甡旋去觸蓮屏拂座侵衣袂珙黏絲綴甋瓴散縈花底露杉添作水中星每恨臨開巻甡翻宜炤誦經上方千個白珙後夜一林青布彩連行蠋杉微文媿負螟那堪同腐草終歲但飄零甡秋雨聨句髙閣雲初合甡平林雨乍齊聽來松葉上張杉吹滿竹橋西宻灑當牕暗甡斜飛入户低冰繩懸急溜杉瀑布下回溪沾翅墻留蝶甡梳毛檻聚雞珠銜花底泫杉碧瀉草頭泥烟斂微峰露甡湍翻故道迷斷雲斜漏日杉複彩曲成霓濕鳥飛還住甡風蟬喑復嘶罏開含篆獸杉欄捲壓簾犀晩炤移梧甃甡秋隂間稻畦擕尊重待月杉何事轉栖栖甡奉贈萊陽宋公分司寧紹十韻北極中垣啟東藩左轄開旬宣膺八命節鉞近三台漢使分章出汾王上考來通侯符顯秩重地授雄裁繡轂臨江滸金牙控海隈丹書懸宛委紫氣滿蓬萊廟佇巖廊器庭輸竹箭才龍門留到陸兔苑共鄒枚朝鳳翔雲表春風動草荄南行懷郇伯頫首重徘徊壽李翰林母太君商夫人十六韻大海環銀嶠遥天種白榆崧髙連北斗婺彩耀東隅仙李圅闗逺生商景命殊前庭吟柳絮雅㑹乞蜘蛛閥閱逾騶馭門䦨啟豸塗李大父為都掌院母儀班孟範女史郝鍾模案舉同鸞曜堦陳繞鳳雛花塼開錦繡粉署布氍毹舞列金閨彩籌添玉女壺漢官驚曼倩吳苑笑麻姑萱草摇蘭渚薰風起鑑湖紱麟遺繒縷食鱠是菖蒲端午後初度夜露仙人掌朝陽帝子梧畫屏懸雉茀綵蔮動魚須東觀延新籙南山有令謨誰傳三祝語獻作九如圖將逺行時賦得復堂堂曲一百二韻有杜陵蔣生白魚潭張五城南蔡五十一夙喻我意可寄觀堂堂復堂堂當歌秖自傷曼聲來北部掩面似西凉折竹吹生簳燒銅作熟簧烏鹽新世曲紅子舊時粧紅子一抄作丹的鄴下哀盧女閶門住泰娘佳人稱絶代有壻早專房篋底菱花鏡江邊竹子箱堂深棲紫燕車左繋烏羊刈葛牽蘿蔦餐魚重鯉魴青衣為鳥使黄粉貯蜂糧宅傍丹鷄井人歸朱雀航秦家多種桂蕭巷有垂楊三豔推中婦雙緌美孟姜斑斑通玳轂扣扣致香囊聘出鳴珂里燈纒碎錦坊渡江迎晉媵入月見呉剛夾路煎龍腦連盃注鹿腸纎腰懸茝珮洗手進桃湯假髻如盤捧眞珠用斛量百枝分菡萏比翼坐鴛鴦獸纈葡萄錦龜擎翡翠床金莖盛露乳玉草縮天漿帖展三花樹篝餘五木香搜鈿裝鳥毳翦蕋落蜂芒織貝剛縈脾裁瓊似截肪貴官彈錦瑟賤妾獻明璫蛾翅塗膏白鶯衣寫額黄螺紋闐幛柱璣粟綴釵梁扇褁齊紈小襦閑魏尺長抛毬花剗㡌度埒紫游繮豐草迴修帯明霞絢下裳流蘇雙宛轉絲履五文章褥合三千縫釵隨十二行金鶯啼錦陌銅雀起清漳碾玉安重轑雕楹飾兩廂承塵浮井藻剡土樹沙棠雲滿留裙沼風生響屧廊交歡聨屈戍避影入清防壁帶銜多寳庭懸墜八琅牽鈴翻拒鵲搦管叶求凰拊馬羞張敞雄雞鬬賈昌穿鍼朋柙啟博珥一鉤藏技士偷宫譜神君授禁方春花延四炤午食近三商窈窕還京洛繁華過建康定情河内相好色汝南王橘實垂遥岫蒲生㧞野塘山螢徒熠熠溝水漸湯湯平逺將軍去廬江小吏亡才人隨養卒嫖女背尊嫜口苦茹成蓼顔醒酒似糖子難藏蔓草余竟處幽篁渺目同波漫攀髯類㦸張丹湖遺宓氏白芷怨娥皇束素魚誰剖張羅鳥自翔南行饒夜露東望失朝暘寳袜抛三暈銀河罷七襄漢宫無史妠越俗擯毛嬙巷有妃舂黍家留叔食糠服將巾藉履色以白為蒼獨鶴憎羣蹠諸鳩嫉衆芳凉颷閒暑帔遲日寘懿筐閣下悲鸚鵡車前泣驌驦歲華渾未駐歌豔亦何嘗幐壤全無臭裙刀不用鋼約衿譏好楚緩髩笑迎唐缾墜䋲難續珠燒灰易揚同心分縷結割體判珪璋鐘皷捐傍舍蠨蛸布近塲送郎黄蘗塢辭母白雲鄉門幾留單闔舟無刺兩檣登車思礰碌唾井顧滄浪相見中書苦驅來司馬狂徐娘暌上郡宋玉絶東墻箔鮮同功緒釭遺四壁光杼投機絞下器碎酒壚傍脂藥傾新甕衫褠掛舊桁獻夫存旨蓄為客煮彫􅀢草碧勝荷紒萱紅奪蕙纕善懷方襞襀宛步却鋃鐺屐畏擎奴子衣嫌捉小郎帟維張四角詩句讀中央頳尾游離簁元禽去頡頏棄妻疑得路眷主痛沉湘暮雨迷神女天星墮樂娼寒房瞻顧兔側室聽鳴螿結綺園中柳彈筝陌上桑懷金調故隴蘓玉㑹空倉黄鵠追陶寡青陵謝宋康旅葵從榖熟苦李代桃僵鳳失生何匹熊來死可當持門行自健夾轂問難忘去故悲摇落尋眞暢杳茫綘芝紛外苑紫蕈折中溏鈿覔元妃合酥空長史觴扶摇翻北嶽妖麗入西荒羅郁裾成霧麻姑髩有霜三神方汗漫九寡重徬徨紉袺終雙度升輪且對望采蓮逢阿子撲棗返王陽上調區遥促中工辨苦良可憐千萬歲持此誦無疆西河集巻一百五十二
