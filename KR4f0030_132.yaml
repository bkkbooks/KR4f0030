body:
  text: 西河集卷一百三十二翰林院檢討毛竒齡撰填詞二浣溪紗碧玉蒲芽短短針雀羅波底刺當心拔蒲歸去水淫淫楫染緑苔疑掩袖幔漂紅露似湔襟晚風吹轉北塘深其二溪女粧成出若耶芹絲蓱蔓逼流斜青苔石上浣新紗愛把單鬟梢竹葉羞將雙臉近荷花緹油前覆夜來車其三軟緑江波鴨子清日遲逰女遍江城紅橋度燭緩相迎細馬隔裙穿鐙子平船素手撥簾旌大堤春日往來情其四嬌女新籹村艷濃四枝鬟插石榴紅出門還怕隔溪風石鏡暗飛山後鵲荻屏銷畫水邊葓西施臺館碧波中其五緑滿南園乳雀栖重花疊葉不通飛小姑獨出採薔薇珥底珠兒徒刺臉帶穿貝子恐磨衣行行立立自尋思其六叢鬢輕籠象格紗麴塵巾皺翳朝霞愁聽江閣按紅牙簮管枉鉸銀蓋葉繡牀空釘白團花遊絲飛絮近天涯其七水繞空江葉繞枝竹郎橋畔豆娘祠佳人邂逅最堪思燭近只將遮幔子風前長自斂衫兒梨花初落酒闌時巫山一段雲篠壁含煙淡椒花滳露稀風吹細雨曉雲低十二碧峰迷神女祠前泪清猿峽裏啼瞿塘新水麴塵微行客自依依其二寒雨蘿衣濕晴雲蕉帔開空舲峽下近陽臺誰向夢中來叢笛江妃廟孤舟新婦隈山花石竹不須栽看作小姑叉女冠子上元少女誰授玉函金筥倚香壇畫帔藤花淺雕鐘橘乳寒南宫除牒子北斗動幡干猶見春歸燕似青鸞其二玄都清曉坐間碧堂紅草女仙家玉鉿量星豆金􅀈煮雪花駐顔丹作粉繫肘籙垂紗浼浼溝頭水盡胡麻其三上清仙夢恍到十三春洞玉顔紅月下隨王母花前别寧封黃巾濳解佩赤舄緩弛弓稱名多誤聽為呼儂其四仙房寂寂戲採瑶林珠實是何鄉紅尾梢花犬青衣覆石羊鮫絲裁綬短鵝管呷笙長倘得逄燕使問昭王其五平明受事堪惜玉笄初侍小茅君薄霧籠青鬢輕煙曵䌨裙鳯銜琪樹藎虬使玉堂雲恐逐童男去思紛紛其六碧簫初弄暗想秦樓雙鳯幾多情玉鍥分蘆節金箱貯棗餳蕉花含祕閣松影落層城誰搗元霜盡見雲英其七短花長葉到處翠軿相接洞中春衣炷熬丹錫脣脂瀹水銀盤囊間繫虎塵尾笑遺人總隔蓬萊路也生塵其八金巾姣好長佩玉砂瑶草受清虛粧鏡殱山鬼香奩撿道書緗眉遮羽蓋素手滌仙厨每當三五夜望蟾蜍其九赤城紫府間貯元瓏妃女小仙才節擁藍絲葆冠抽緑玉叉蜂房融日粉蝶夢繞天涯何事劉郎去不歸來山花子蟬翅宫綃傅體寒琵琶掩面夜歌闌插得鈿頭新撥子是紅蠻隔舍紫姑星會淺開門烏臼雨啼殘曾卜金錢今始驗拆和單其二小院風搖九子鈴臨河長對牸牛星欲上玉機愁杼短織難成擲縷燭翻嬌鳯出縈絲泪盡濕花生誰道錦文無樣子看回程春曉曲小屏山上西江曲深處落梅寒簌簌曉鑑菱開赭粉紅殘燈穗卷香脂緑草頭階剗襪衩金花裏碧鈎幡勝玉繞鳯雙簧蠟炙新蚤春驚破霜溪竹菩薩蠻含桃著雨花如雪井邊吹落春雲葉鸚鵡結叉樓新娘半上頭裁衣翻樣子壓線盤金篚十五小裙腰能留線幾條前調山雞栖罷烏啼樹迎人燒盡柑紅炬復鑰下銅魚車前一幰除褥花嘗對縫羞見雙鴛控漸減玉罏煙人眠故未眠前調宜城二月鶯啼蚤羅敷十五雙鬟小錦帶約桑鈎使君南陌頭連錢嘶日暮共返宜城渡莫是看羅敷羅敷自有夫前調輕雷鹿鹿宫車轉晚涼偷弄邠王管雙甲小蠀蛦黃鸝處處啼春風吹欲遍盡作西清怨暗裏換歌頭伊州似石州前調一株栁樹千條葉桃根巧向梅根接花塢暗相通新花隔幾重寶函春信杳水漫紅魚小半格軸頭絲環環無盡時前調日黃不上粧山面露圓難綴珠簾線種得鬱金花將來浸木瓜枕屏山六扇上有江南岸岸盡是吳關關前人未還河瀆神楚雨歇殘陽滿庭新月瀟湘松花濕影墜山黃帝女花竿廟旁瑶瑟洞簫來極浦風吹桂酒椒漿夜半煙寒翠斂幾人能上髙唐其二丹殿俯嵯峨洞庭秋水湘娥深房鬼火暗青蘿嗚咽神絃自歌文木漆光絲纒腹蕉花影裏婆娑祗為相思美子燈前一斂雙蛾採蓮子風起蓮江皺緑羅舉棹並船歸唱採蓮歌年少畫屏只見金鸂鶒舉棹不信雙雙水鳥多年少細萍點點釘花船舉棹荇線飄飄縳畫竿年少折得小蓮羞並蒂舉棹紅靴鈎入錦裙邊年少更漏子棗屏深樺燭冷復壁照人雙影魚墜管獸銜環一牀衾枕單更漏咽樓頭月偏射小窗明蛤紅幕掩鵲橋低銀河又向西其二小檀槽新捍撥彈就夜堂秋月銀箭斷玉叉涼燭槃紅泪長寒角動霜風送驚起金微殘夢關戍柝女郎砧城南秋漸深其三幔鈎繩復斗穗寒夜美人半睡雲掩絮月朧明枕函亭釧聲蠶燭耀飛蛾繞門外烏啼難曉燔蕙燼隱紗籠罘罳劃碎紅其四剪鮫絲量獸錦寬窄燈前自審鈿尺短錯刀殘晚來多少寒園霧薄林花落水面星搖池閣山犬吠草蟲鳴曲房魂暗驚其五井梧隂庭樹暝寂寂畫欄人靜蠟子熖蟹衣筐鄰家夜績涼芭蕉露零如雨記得暗中歡去宵漏盡曉鐘催碧窗殊未來木蘭花令曉鶯娓娓流粧閣日上燭吹紅繡幕束將方帶玉芙蕖褁就半韝銀芍藥尋花露冷胭脂薄花底暗翻叉子落誰開鴛錦抱輕雲誤使丁娘枕前索小重山春殿香銷鎖碧空夜涼宮漏悄咽銅龍銀河瀉地水漴漴粧初洗殘粉膩溝紅雙鳯宿梧桐小桃金井上露華濃長門枉自閉重重珠闥逈時拂玉階蟲其二芳草茸茸翠輦遲昭陽初日影散彤墀銀幡綵勝戴雙纚金錯小翦出萬年枝御苑落花時祠前祈百子漢家池承恩唯有臂紅知中宵夢頻起視胭脂其三黃帕銜鼇結象牀捲衣長拂面侍君王衫襟深惹御篝香綃幛影隱隱見鴛鴦别院罷霓裳衆中新賜著殿頭黃年來獨繫絳紗囊江南路四十杜秋娘其四鳷鵲髙翾負日溫春氷融太液細流渾懶調黃子漬香蓀羊車近竹葉滿金盆十載見承恩踏青隨例出望春門却收銀鑰暗銷魂梨花落深殿又黃昏喜遷鶯榆葉裏楝花前燒盡白􅈨煙嬌龍自走不須鞭最喜是鶯遷歌羽歌舞羽舞人在掌中飛去霧絲裙子本蹁躚何處更留仙其二杏苑北曲江西殘雪尚依依輕輪輾絮著人衣拊馬夜歸遲蓬宴遙蓮漏淺紅燭萬條深院曉來唯聽乳鶯啼移上緑楊枝臨江仙澧浦紅蘭開日暮美人徙倚空亭幽巖春竹雨冥冥長思公子愁絶翠雲屏碧水尚傳瑶瑟怨棖棖夜鼓湘靈蒼梧南去晚山青楚江遷客憔悴不堪聽前調秋藕絲裙春樹面龍安寺裏為家時來空館倚欄斜欄前新水日日浸桃花素手自撩金索動腕繩輕約紅紗東風相見各天涯道傍愁思散作日邊霞前調髙閣近花紅影合繞牀還種青梧西施嬌小似無夫黃金梯滑不見有人扶茭葉菱根遮浦暗含情但採菖蒲金閶門外夜啼烏女墳前去寒燭照東湖前調晚渡潮生野火靜叢祠深對江波垂鬟接黛一青娥寶冠珠絡花帔貼銀鵝估客往來爭禱賽隔船吹鳯鳴鼉山低如帶水如羅螭頭黃絹隱隱畫雙螺前調睡架荼􅐘紅刺軟霧中恍蔽輕紈幾番覔釧坐花間香山未暖石炭搗煙寒薄絮裝衣縈背胛空懸辟凍金環武溪雪淨尚征蠻杜鵑聲杳莫是未教還竹枝十二峰前竹枝十二灘女兒嘈嘈急水竹枝渡來難女兒瞿塘看似竹枝桃花馬女兒只少裝成竹枝八寶鞍女兒錦江春水竹枝白浮浮女兒擔水嬌娘竹枝踏水愁女兒洗面好來竹枝清溜裏女兒洗足當尋竹枝濁浪頭女兒雙帶子紅藕香銷暑殿涼玉梭橫枕墮叉長東樓賦得新來怨中夜看沉龜甲黃黃甲龜沉看夜中怨來新得賦樓東長叉墮枕橫梭玉涼殿暑銷香藕紅其二君在教頭歌昔昔妓看垂手落摻摻裙襇半將遮屐點柘竿長是拄腰纎纎腰拄是長竿柘點屐遮將半襇裙摻摻落手垂看妓昔昔歌頭教在君其三樓髙是處盡烏啼栁外煙同翠眼迷流水落花春寂寂浮家一檻近前溪溪前近檻一家浮寂寂春花落水流迷眼翠同煙外栁啼烏盡處是髙樓其四春缸玉酒細鱗紅怨鳥啼花隔數重銀子蒜垂簾押靜新開背面兩鸞櫳櫳鸞兩面背開新靜押簾垂蒜子銀重數隔花啼鳥怨紅鱗細酒玉缸春其五誰向粧亭亭後别望中煙雨帶帆開絲回漫水藍如襖黛繞橫山青似煤煤似青山橫繞黛襖如藍水漫回絲開帆帶雨煙中望别後亭亭粧向誰其六紅荷短間白荷長細細風來細細香濃露滑篙聨艇側同來到處問家鄉鄉家問處到來同側艇聨篙滑露濃香細細來風細細長荷白間短荷紅其七寒雨江汀隔斷橋去時當似不來潮蘭浦憶人愁渺目漫漫夜夢合花梢梢花合夢夜漫漫目渺愁人憶浦蘭潮來不似當時去橋斷隔汀江雨寒其八鳩浮白水踏歌虛鬢捋蟲珠雀畫裾樓上捲裳龍女侍溝前御宿卸粧初初粧卸宿御前溝侍女龍裳捲上樓裾畫雀珠蟲捋鬢虛歌踏水白浮鳩甘州遍青槐路迤邐返長楊暮雲翔銀魚立胛金鵝仗帶曾騎黃馬射黃羊歌肆側酒壚旁調鷹牽犬歸去愁殺羽林郎花剗帽往往賭毬場暗風揚薰衣透縷隔巷細生香其二金槌去長䇿棗紅騮五陵遊純鈎蒯繞縵胡纓曲氷梢獵獵似星流兄執戟弟長秋射飛逐沒嘗見便殿賜衣裘年正少花發醉娼樓錦纒頭幾行歌舞一曲遍甘州其三甘州遍羌笛又將殘聽聲寒黃花碎葉雕戈鐵馬茫茫飛雪滿燕山邊角靜戌衣單紅閨萬里夢斷都護請生還堆帛逺風急墮旌竿望長安甘泉鐃吹何日達蕭關其四秋風起展轉事長征出邊城彎弧鵲角佩刀犀首趫趫斥突願擒生收敕勒捲攙槍夜涼頻擊刁斗空磧答遙聲轉戰苦車騎未成名塞魂驚琵琶孤冢春草日青青西河集卷一百三十二
