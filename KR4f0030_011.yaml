body:
  text: 西河集巻十一翰林院檢討毛奇齡撰劄子一史舘劄子奉總裁先生劄具日者搜討崇禎朝死事諸臣因實録闕失長編未成慮其間定多洇滅不傳之人許任意搜討不拘分限題目遂于某月日草得四川成都府郫縣知縣趙嘉煒死事一傳已經錄史生寫付收掌房奉鑒在按久矣初按嘉煒係敝鄉紹興府山隂縣人原以國子謁選于崇禎十六年授四川成都府郫縣主簿爾時獻賊冦成都次年國變實未審其赴官後作何等也順治之末其子麒尋父于郫郫無一民存相傳為獻賊殺盡而隣之灌縣有都江堰夫向應泰者云嘉煒守堰死于賊其齒髪抛撇不可問矣獨其地在堰傍其子拾由土懐之東歸曾乞某為誌而瘞之先塋之傍當時所據者有董處士所撰行狀成都府知府冀應熊所撰死事記依其文書去但怪嘉煒本簿郫而死又在灌且死事年月多不合及入史舘見四川所解新修通志載趙嘉煒係浙江人由監生于崇禎十七年知郫縣事五月賊陷成都時嘉煒督修都江水堰賊執之不屈乃投江死遂踊躍為作傳翻以其子所詢為不實其云知郫縣事則必簿郫後以冦亂故為行間所授官必有依據不妄故授簿在十六年而此云十七年知縣事正當遂草死事傳載其知郫時視堰于灌㑹冦至巡按劉之渤總兵官劉佳引拒戰不勝謀决都江水灌濠而賊襲水堰因于八月三日死堰間此取通志暨行狀死事記而襍採以成文者今相距匝嵗忽有人自成都來道其子麒與作通志者有舊妄以簿為令而其死事所在與月日俱謬因復查新修成都府志原載嘉煒係縣簿守堰而投河以死其狀記所載月日仍叅錯不合且或沈于江或射于堰皆不可定竊念崇禎之末記注未備而四川又丁草殺獻賊殺川民名草殺之後民無孑遺任所揑撰無從批駁儻不細為之稽覈則指白作黑終成誣史因再三研勘凡為令為簿在郫在灌守堰決堰未可懸揣而冦薄成都在十月四日成都之破在十月五日若八月三日則賊在重慶未入成都之際向于誌銘中亦疑及之而近核諸書究竟未合因先為檢舉請駁原傳以存疑闕至若死事諸官不問髙庳簿苟能死何必縣令或當予以傳略改成文具善長之意或但從闕疑暫懸其事以俟再考總藉裁酌月日奉史館總裁劄子月日在假纂修官某劄奉史舘總裁老先生即中堂張先生閣下某以不材承乏史事曾經分題起草為紀傳大小二百餘篇自啟禎以前凡已經􅍐擬草本無不一一完繳在按獨是先贈公柩舍曽為亡伯兄教諭仁和時障土江滸未返東浙遂于康熙乙丑冬援遷𦵏之例乞假在籍每思事竣還舘而雙足痺發跪居偃蹇恐未能隨待班次遂匄地方官轉文到部延療里閈者迄今又三年矣日蒙皇上巡浙躬吿禹穴先遣侍衞馳問某西陵渡口踰日回駕復面承慰問道傍犬馬搖尾戀戀即思强起殘廢一策駑鈍而旋立旋仆扶服未決因思史事垂竣中間實有不愜于心思一湔滌而未能者誠恐還舘無期一旦溘死朝露賫志未達抱此終疚敢伏床詮次逺奉閣下竊某初間􅍐分傳題在𢎞正之間爾時分得正徳年大學士梁儲一題私心自喜以為曾讀通紀藏書諸野史每愛其風采駿烈不媕不激善為規諷以引君于道眀代大臣必儲稱首因列其草制齒劍沮居守斥護衞四大事以為柱欐而次求其備不意遍查史窚按之實錄暨一切記載則知此四大事者悉屬亡是且不惟亡是而往往反是如疏居守反曰沮居守復護衞反曰斥䕶衞者爾時踟蹰再四即欲不為立傳但當于帝紀一存其名然細考其人則曽于作㑹典時不附逆瑾遷邊軍時不附江彬其在政府亦每有疏諫多所補救此原非黨濠倚宦與陸完等可以比似因仍為立傳略載實事起草付抄已上之總裁而不謂其說之不盡白也一則上此文時未經叅駁無容立辨一則此時以道學一傳齟齬未定遂置諸傳于不問一則總裁去就如傳舍然其文之得失可否竟無從考訊猶憶某在史舘施侍講閏章謂某何以草梁儲傳與舊史乖反某曰所乖反者野史非舊史也曰有說則可曰夫豈無說而謾為之乎曰雖然當有以說之次日朱檢討彞尊詢某于午門班次曰梁儲為秦府請地草敕一事此大事也聞君作傳乃竟削之而不書何居曰某敢削儲事哉顧儲實無此事即此事故有之顧在嘉靖三年武宗大行梁儲去位之後而以為儲事寃乎曰有是哉不當慎耶雖然盍辨諸迄于今相距八九年實不知是傳之取舍何等也特念千秋信史所貴核實故曰不遺善不諱惡又曰勸善懲惡比之賞罰况老先生以左董自視每見考析同異剖決疑似其謹聞見而較豪末不遺餘力萬一狃于前文因循怙改不則好言長厚下筆毋苛刻毋毁成說又不則謂此傳生色恐去此則史文減觀不如留此為傳述之羙凡此依違姑且調停之說其于史皆有害因條列四事而妄為辨釋如左伏惟主鑒據野史載儲草制一事在正徳十二年云秦王惟焯奏請潼關以西鳳翔以東諸河堧牧馬地謂髙皇帝時原以賜臣先王樉者江彬錢寧張銳皆受王賂為求上上意許之兵部科道執奏不得上震怒促草敕廷和冕稱疾儲曰如皆引疾若國事何遂承命上制草曰昔太祖髙皇帝著令無得益藩王地非吝也藩王地廣則士馬衆多士馬衆多則奸人相蠱誘不利于宗社今以王請之勤朕念親親不忍拒姑以畀于王王得地後宜益謹侯度毋多養士馬毋收聚奸人以聽其蠱誘是將不利于宗社不有髙皇帝訓當此之時朕雖欲念親親不能已王其慎之上覽制大驚曰若是其可虞耶亟已之遂抑勿與其載在通紀列卿錄梁儲本傳以及名山蔵李氏蔵書諸書甚詳雖語詞不一而大略相等嘗怪大政記不載其事且編年年月則又各參錯不合及細考實錄則由正徳十二年間前後推查以迄于徧竝無秦王請地之事夫藩府請地予奪必書如晉府請屯田徽王請莊地類眀眀可按况此時當寧藩請復䕶衞之際闗繫匪小豈有已經兵部科道盈庭執奏中堂草制宸斷獨止之一大事而實錄不踊躍全載之者及窮究其事則其事在嘉靖三年實錄中有云先是秦王惟焯奏始祖分封之國欽蒙太祖髙皇帝敕賜潼闗西鳳翔東㳂河灘地牧馬髙原山坡牧羊今被豪民劉仲玉等占種已而仲玉等亦奏祖額徴糧民地被奸人揑作荒閒投獻秦府俱下户部議移撫按查勘原賜牧地已有河灘今秦府實欲侵奪民地乃反稱舊賜夫潼闗西鳳翔東渭河兩岸有華隂岐山等一十七州縣如王所奏近河牧馬近山牧羊則一十七州縣之地盡屬秦府矣而可乎上曰已之此實録文也則是野史所載儲事正竊借此事而影射以成文者其云秦王惟焯即秦王惟焯也其云始祖分封之國即先王樉也其云欽蒙太祖髙皇帝敇賜即在髙皇帝時所原賜也其云潼闗西鳳翔東即潼闗以西鳳翔以東也其云㳂河灘地牧馬即諸河堧牧馬地也其云兵部科道執奏即下户部議移撫按查勘也其云已之即上曰亟已之也祗以嘉靖之事而移之正徳以居民所爭中外大臣所勘之事而移之梁儲為不可解耳向使嘉靖一事正徳又一事則嘉靖既載正徳何以不載向使正徳既請嘉靖又復請則撫按勘語且書閣臣敕語何以不書且據書儲事在正徳十二年雖其年非實錄然自十二年至嘉靖三年其間相距不逺不過七八年已耳既有前事則互訐之詞查勘之文縱使史官失記而公府詞頭部司卷額必不盡失豈有彼此援據絶不引及以為成案反逺述髙皇分封之詔近遺大行特止之敕世無是理大抵請地只一事嘉靖之請即正徳之請正徳未勘至嘉靖始勘葢眀季判事遲緩每有延之數年暨數十年者秦王之請在正徳之末撫按之勘在嘉靖之初則記此去彼書法如是觀實錄開語即云先此則其請非嘉靖年間公然可知大抵彬寧暗持公斷不決遂遷延時日而至是始判而黨儲者欲移為儲事以為請在正徳可以假借而不虞不與之判實錄直書之嘉靖年耳嘗考儲生平他無大過惟復護衞請居守二事頗干公議而當時為儲傳為通紀諸君如霍韜陳建等皆嶺南人同鄉未免左袒而韜與楊廷和則又以議禮齟齬似欲抑廷和以揚儲故造為草制草敕阻居守斥護衞四大事以張之其造草制事正以文復護衞之失而不知國史具在欲葢彌彰者若其阻居守則儼然有請立儲一疏載實錄中此與勸草敕而曰爭草敕復䕶衞而曰斥䕶衞正同而好事之徒尚欲狃成說以怙悛改以為其事生色不忍割去夫煌煌信史而但取文飾曰生色真不解也據野史載儲伏劍一事在正徳十三年云上自稱威武大將軍鎮國公朱夀巡邊下内閣草敕甚亟廷和稱疾獨促儲上坐左順門待之儲固不草召詰之對曰敕者君所以賜臣陛下為君乃自卑而列于臣臣反草敕得以臣而名其君是逆也臣是以不敢上怒手劍立曰不草齒此劍儲免冠解衣帶伏地涕泣請曰臣即死他日陛下猶憫臣若遂草敕他日覺而怒曰臣儲無禮臣名君顯戮臣罪不可赦上擲劍起遂不令草敇是行也儲即家召客出歸對客殊不言齒劍事按實錄十三年七月八日帝將幸宣大令太監蕭敬傳旨趣草特命總督軍務威武大將軍總兵官朱夀敇是日復召内閣大臣及九卿科道官至左順門諭意衆皆泣諫不納則是草敕一事其在左順之召不止内閣凡九卿科道諸官咸在固未嘗獨促儲也且衆皆泣諫則凡九卿科道諸官無一不諫儲亦止在泣諫中又未得獨伏地請齒劍也若其云鎮國公敕則在後此宣大回時實錄載敕進威武大將軍公爵名鎮國公且賞楊廷和蔣冕毛紀等以為運籌定議協力成功賞銀伍十兩紵絲兩表裏廕一子錦衣衞世襲正千户廷和等疏諫不納是廷和亦在諫中而曰廷和引疾則不曉總兵之敕與鎮國之敕是各一時耳至于廷和引疾實録無考惟廷和視草錄則云七月八日召文武百官集左順門校尉十數輩至家宣喚立作數往返且云即有疾亦當往騐終不應則是廷和引疾其語不謬但錄又云命内閣即門上草敕厚菴免冠辭礪菴助之至晩乃出則是儲先免冠而冕即繼之泣諫者滿朝之事草敕者閣臣之事故二臣獨免冠其先以儲者則廷和在吿次即儲耳免冠非解衣泣諫非伏鑕二閣臣與衆朝臣俱在非獨促儲此時屢諫不納故次日諸司禮及近侍三四人復至閣趣草敕非不令草敕若其云帝手劍則荒唐極矣但儲既泣諫既與冕免冠辭草敕次日復爭之于閣則據事直書亦何不可而必揑作此烏有之事此是何故及反覆窮究則儲初亦錚錚持不可至揮戈難挽後亦姑與為依回此雖不足為大戾而愛之者必諱之觀視草錄又云十四年正月批馮清奏㨗本内亦令作奬厲威武大將軍語廷和不肯散本官張銳力强之不得儲反受其本强廷和且云每日文書房散本官送來尚收之我送本反不收耶廷和笑云惟公非散本官故不收仍從儲手中取之還銳去及南征時又令草威武大將軍敕廷和又不肯而儲强之曰只寫敕與鎮巡也罷此閣中鏁屑實錄不載而視草錄則顯然行之于世然且其言有據世不敢以其言為非而于是謾為此事以飾之而不知揑造之不可也揑造則何不可造也揑造非史也髙岱鴻猷録亦載儲爭草敕事憲章錄形容尤苦王氏史料俱駮之且謂廷和以回話薦劉春事出閣他日遂有寫敇進者此寧非梁公耶又云大抵方霍嶺南諸公持論多左袒而不察者遂附和成說真誣史也其辨甚確但諸書所誣伏劍事指十三年帝幸宣大時事而史料所駮廷和以薦春回話出閣則在十五年南征時事不足以伏其說大抵數次草敕皆屬其人祗此十三年七月八日帝幸宣大之敕既免冠辭又爭之于閣似乎斷非儲草然亦不得不屬儲者是日左順之諫既書不納則已不容不草矣次日復至閣趣草爾時廷和既引疾毛紀久在吿惟儲冕二人在左順免冠泣諫至晩才出而次日冕發痰疾亦註門籍惟儲在閣司禮諸監及内侍羣鬨至閣中逼草而儲獨爭之不得夫曰不得則已草之矣曰獨爭之不得則惟儲草之他無與矣故九日草敕而十三日帝即行則以草敕之人而反曰爭草敕夫誰欺之况後此草敕者皆其人耶據野史所載阻立儲一事云禮部尚書李遜等廷議建儲居守朱寧隂受濠賂謀入寧世子司香太廟江彬亦欲立所厚逺藩各有所主儲厲聲沮之曰奸人之謀足聽耶上春秋鼎盛何患無子召外藩子萬一有他吾輩斧鑕矣遂寢按此事實錄不載而憲章錄名山蔵諸書載之甚詳史料極辨其無有至詆為三家子弟文飾之說其言甚確第史料云朱寧張銳或誆寧邸賂而江彬則絶無之乃黄佐所為儲傳反獨稱江彬而不及寧銳是同一小人或有或無不必深辨第儲有必不可欺謾以罔世者查實錄十一年三月儲疏以儲嗣未定請擇宗藩近屬之賢者置之左右以豫為根本之計略云陛下樹子未定宫坊尚虚宜早擇宗藩以充甲觀夫儲嗣者天下之根本而親賢者朝廷之屏翰也親賢可入侍則宗社有憑而覬覦以息縱曰聖躬錫祚主鬯自在然盤維屬籍在所不廢則夫裕萬年之傳而慰四海之望宜莫先此不報則是勸立儲者儲也親為疏草創之于先而反曰召外藩子萬一有他則自訿自駁豈有此理惟勸立儲反為沮立儲之說以蔽之以為可以掩衆人之口翳天下之目而不知手疏之昭昭在實録中也然則為此者亦苦矣據野史所載復䕶衞一事云世宗入嗣言官連疏劾儲黨逆濠復濠所請䕶衞屯田請召置獄正罪儲曰予惟致仕而已終不辨人曰是將罪公終不辨攻詆者縷縷儲亦不校遂致仕歸久之乃知與護衞者非儲實廷和當制所為乃正徳九年二月十九日也按實錄正徳九年四月初四日復寧府原革護衞及屯田初寧府護衞天順間以寧靖王不法改為南昌左衞𨽻江西都司宸濠曾賄瑾矯詔復之瑾誅科道力言改正至是濠復上請費宏執不可而尚書陸完受濠賂遂准與之初五日給事髙􅀢御史汪賜等奏護衞不可復天下諸藩革護衞非止寧府將來比例何以處之况寧府不法已見副使胡世寧疏縱本有護衞亦宜革去况可復乎下議不覆至初七日南給事徐文溥又以不覆為言旨云復護衞屯田已有成命文溥妄言凟奏本當究治姑貰之十三日陸完覆奏反謂科道論奏亦先事深慮乞俯從羣議㫖謂護衞及屯田業已斷給矣毋復奏擾六月初一日濠請鑄護衞并經歴鎮撫司及千百户所印凡五十有八詔予之此復護衞屯田之始末也歴據實錄則當時爭之者費宏予之者陸完而不言票之者何人但票旨在閣則在閣之臣自廷和儲以至蔣冕毛紀均有之所超然物論者獨費宏耳乃當時言官所論不在廷和并不在冕紀而専専劾儲則豈票之者真儲耶若在廷和則儲何難置喙而曰終不辨人以陸完視儲而儲肯不辨則竟以陸完自居矣且言官已請置法而儲之不辨者反曰吾致仕而已萬一可言官之奏而竟置之法則安從致仕若果屬廷和則黨濠大事也不惟言官不肻舍廷和而劾儲即舉朝亦不肯也不惟舉朝不肯即冕紀與宏亦不肯也此是何事同在閣為之而使一人受劾去豈為人情不辨黨濠較之不言齒劍事相去甚逺而欲以謹厚緘重之說前後文飾則其所以文之者正其所以實之者也且二月十九日此時逆濠尚未請也濠之上請在夏四月四日科道之參奏在五日南給事之劾覆奏在七日陸完之覆奏在十三日濠之請鑄印在六月一日而謂二月十九日廷和票㫖則焉有濠未上請而閣先票㫖之理故廷和自記有云寧府復護衞屯田予與費鵝湖極力諫止時權倖有賂主其事者竟得請去後謀為不軌予與敬所礪菴請遣官賫敕往諭獻還護衞亦無及矣忌予者謂寧府本不反因削護衞故反何耶其云與費宏極力諫止吾不敢信若其與毛紀蔣冕敕還護衞則實錄有之正徳十四年五月廷和用蕭淮奏遂議削寧王護衞并屯田令獻還舊敕使至淮而濠已反則是廷和方削護衞而必以票復護衞之㫖歸之廷和原屬疑案况其所與削護衞者但云蔣冕毛紀而竝不及儲豈廷和當時亦有致疑于儲者在耶若史料辨雙溪雜記謂大璫獨請廷和入票㫖以為讎口固屬快論但此不必為廷和辨祗就當日情事究之請者逆濠主者大璫爭者費宏予者陸完票之者廷和儲冕紀等而言者之劾之者惟儲則瞭然耳右四事據聞攄見未敢曲諱考辨未的尚藉駮正第其人則實有可傳者去此四事儘堪摭記則又何必回護此四事矣如正徳改元儲以翰林學士進少詹事遷吏部侍郎因充纂修㑹典副總裁官已轉左陞本部尚書而以不附瑾摘㑹典紕繆降右侍郎及瑾誅而後枚卜此大節也其在政府則帝每微行儲必疏諫時大起營建内官監請興太素殿及天鵝房船塢諸工儲力請停止上惑于邊將江彬欲調邊軍入京而以京軍補邊儲固執不可至太監劉允使烏思蔵賫送番供議倣永樂宣徳年差鄧成侯顯舊例統錦衣衞官一百三十三員應付廩給口糧馬匹車輛船隻及過番物件動支長蘆兩淮鹽課七萬餘引儲疏諫反覆繼以危詞雖言不見納然意亦􅈤矣至宣大之幸七疏聨入南征隨侍繼以入奏其在十四年冬帝駐留都預遣魏彬傳諭將以眀年正月即南京行郊祀禮蓋欲借卜郊以緩振旅也儲疏諫忳切帝凡三諭儲三疏上遂寢其事今錄其首疏略載于此疏曰南北郊儀不同即以配位論南則仁祖為配而太祖次之北則太祖為配而太宗次之夫仁祖配位係太祖躬自奉安太祖配位係太宗躬自奉安今欲移北而南之則將以二祖一宗并配位乎抑亦遷仁祖于北而奉太宗于南乎臣聞國君遷都然後移祀此皆不得已之甚者今忽議移祀意涉不祥况郊禮甚嚴即帝牛之養必三月滌今其期未有及也且大祀齋戒首戒刑喪况兵尤刑之大者今興兵討逆尚未班師而欲乘兵凶以行大禮臣未見其可也若欲妄議増損則祖宗成法列在三重是必裒集衆論諭吿多方夫然後著信從而昭法則而欲以倉皇搜討則又誰敢云云則欲搜其實事以為傳未嘗闕也某自幼失學拘牽文義今又病廢漸多褊見即有猥璅思一宛轉通達而未經面命無由決釋祗胷抱宿習竊以為文章重事必不宜順情隨俗聽其姑且因不識進退冒昧具劄以匄裁擇須至劄者西河集巻十一
