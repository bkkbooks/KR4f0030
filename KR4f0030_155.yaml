body:
  text: 西河集巻一百五十五翰林院檢討毛竒齡撰七言古詩巫山高君不見巫山叢叢高挿天前臨蜀道迴長川君不見巫山窈窕似好女朝見行雲暮行雨朝朝暮暮巫水濵碧蘿紅樹荆門春幽嵓生風吹雨色迷却當年夢裏人夢裏迢遥渡三峽十二峯頭暗雲葉風起難留巫氏家山前那遇荆王獵荆王巫氏相遇稀春禽暮蝶爭飛飛天半無雲粧緑髮風中有雨濕羅衣羅衣緑髮等閒變誰語荆王使相見若為淫澦蕩人心判作琵琶蔽君面琵琶峯畔雲影長湯湯淫澦流瞿塘共言臺下棲神女共道丘中伴楚王楚王宫裏細腰女爭望陽臺起歌舞不惜高峯化作神但恨春雲變成雨春雲蕩蕩流滿山椒花紅映青苔間南行若箇知才子空使春雲江上還七夕曝衣篇明雲初起芙蓉殿半月將開五明扇青女當秋看又來黄姑此夜期相見璇車自出絳河濵芝葢遥迎紅粉人錦石抛時通錦字鍼樓啟處有鍼神星橋熠熠百枝動雲路迢迢七香擁夜半秦王欲捲衣天邊蕭史先乗鳳六宫羅綺張玉臺千盤錦繡開雲堆暗香畧動知風發好影頻移待月來千頭飛雉壓花綉九子盤龍帳中覆珠帔垂將露滴餘仙裙留向烟飛後此時穿線最難成此夜乗槎最有情幾看鍼孔雙絲度裁問支機百思生支機載去連太液幾處衣樓耀寒碧不疑綵女夜能舒翻似天孫曉來織别有豪華富貴家金箱玉篋寳鈿車爭道紅綃如閃電爭言紫幔似輕霞紅綃紫幔不曾襞更有娼樓望靈匹玉指泠泠展素衣翠帶盤盤廻錦瑟重有佳人怨秋暝雕鵲塡河暗通徑只將雲錦連七襄只將月帳為五詠七襄五詠處處新錦雲帳月家家春誰憐畵閣懸衣外復有長竿摽布人擬古意贈襄陽李調鼎明府過訪大江日夜緑春草日夜滋美人渡江來正値花開時花開灼灼滿江渚白舫青簾舊明府載得襄州郭外雲吟來秦望山頭雨東京元禮本是仙孟亭歌曲襄陽船恨無明月眞珠佩解送春風大道邊集東書堂即事兼呈祁五祁六兄弟棲烏遫遫起高樹大星落落流通波平船刺河冷著曙早來如此良㑹何晨光滿檐花滿谷窈窕虚堂映修竹牙籖三萬甲乙殊仍列中丞舊書軸當軒進酒羅綺黄朱花夜池華燭光苦吟哀嘆愁人腸銅笙玉管藏曲房東山高洞乆傾謝新墅難迴紫庭駕春日曾彈市閣間落月誰歌墓林下相看每惜良㑹稀庭前又見朱花飛冰巵清接露華墜蠟槃横繞珠繩低烏棲未棲烏欲啼洧川楊花歌洛城東行洧川裏簌􅉡楊花墮流水不似龎湘送我時西園但折緑楊絲洧川渙渙採蘭去不見蘭花見飛絮垂楊十里春書隂駠馬驕嘶不能住春船三月洧水多下江千里行難過漫天撲地楊花落馬上躊躇空若何搓挪行秋高夜明天雨霜黄河水流東湯湯丈人暮年戍疆塲家中老妻夜徬徨小兒三十羽林郎丈人去時呼阿唐黄河水邊倒枯楊根株垂萎枝葉颺行人撫枝徒增傷好枝無根安用長白日澹澹沉黄河清霜入水同流波行人早行過滹沱心思故鄉悲如何馬足凍折車㜑娑辛勤慰悦徒旅多前飛鶖鶬後鴐鵞荒城投泊愁網囮城邊當壚雙緑螺入門便酌金叵羅秋風野池吹朱荷酌酒不飲當聽歌歌成一曲新陽阿聽之雙淚同沿渦少年苦貧但搓挪何為逺行心煩苛打虎兒行有序禹州民朱兒救父打虎史使君廷桂奬勞之予識之禹署打虎兒乃在汴梁之禹州禹州城外朱家樓小兒十一隨父耕深林有虎斑毛成飀飀黒風吹草根乗風攫人誰敢攖小兒不識虎乃亦聞虎名虎來小兒怖欲啼掀唇見虎銜父肢咆哮草際風來吹兒啼向風不得父把杙打虎截虎路三尺童子五尺杙打虎落毛傷虎臆虎驚顧兒舍父逃深林風草皆無色禹州刺史呼小兒裹之以帛飽以糜予時在署識兒面耳髪穉弱眞兒嬉問兒打虎虎何似舉手張齒作虎勢假虎隱幔恐小兒小兒復怖將啼歸當時見虎得無怖此事我亦昧其故禹州刺史省得知是日小兒知有父男兒七尺傷父心天寒辭墓行求金安得棄鋏抱長杙與之同日還深林我所思打虎兒入少林書事嵩陽宫前山翠濃西行縶馬金牛峯新鶯啼歇緑楊裏潦水倒入清溪中春寒衣袖晚來薄細雨濛濛灑幽壑林杪高穿雙樹行巖前時見三花落崔嵬紺宇本金布上界鐘聲出雲霧殘碑萬垜讀未成暝色空廓坐來暮山深寂靜鮮人語松頂微聞住春雨深厨野藿供晩餐竹牕新月明前塢老僧趺坐爲我言北朝舊是祇陀園精藍洛下總稠襍此中絶壁無攀援嵩丘相峙藏貝葉列祖持衣寡言説阿閣翻經降露華中亭斷臂飛寒雪聞言憬然動我心恍對秋潭卧冰冽夜夢胡僧折予指不記前身迦葉子難尋澗底三昧泉且飲當前八功水蘧蘧却枕蝴蝶飛晨光養樹㸔熹微滄滄赤日上瓊壁大室少室爭光暉出門欲問來時路策馬悠悠何處歸游石淙游石淙石淙不可渡倚翠屏兮有雲躡流泉而無路流泉激激上有臺叢嵓疊石嶂中開嵓前合㳫流霞起石上玲瓏㵼水來玲瓏細水㵼危石絶壁叅差望來隔觸溜微牽莎草紅翻漚似覆蘋花白當年侍宴碧澗隅金輿玉漏開雲衢離宫祕苑游仙女石畔嵓邊到帝姝儼流泉之調瑟比鳴鳥于吹竽今來獨上雲錦闕俯瞰長河跳流沫碧草薫開帳殿烟青蘿捫待珠宮月珠宮帳殿不復留青蘿碧草緑溪流望美人兮何處悵獨立兮山之幽山之幽兮水之曲春色芊眠兮水波淥㸔蝶舞兮中林聽鶯啼兮深谷鶯啼深谷栁暗催銜衣蛺蝶及春來只有流泉無旦暮年年石上自瀠洄桃源圖桃花灼灼開千樹不記當時問津處明霞一片連白雲中有漁人捨舟去捨舟欲入志未違桑麻千頃迎朝暉武陵溪上東流水時見桃花片片飛九月十九日登淮隂城東程將軍塜層雲盪晴空凉風薄枯草我登淮隂城秋衣振縹緲淮隂城東有高阜九日初過又重九閻君父子好探竒邀我登高共飲酒籬頭黄菊堆酒巵風前重把茱萸枝雙攜銀榼墜鸚鵡頻開鏤椀燒蟲􅏲飄颻千里試一望射澤鹽陂減秋漲烟浮蒼藹到海平日湧黄河向天上紫霄高闕凌貝宮霓裳羽節吹長風圮橋再見赤松下淮王自坐丹霞中前臨巨塜近千尺半倚城根半葦陌水落難知王氏墳道傍猶睹滕公宅閻君本屬唐相餘稱言此是將軍墟神堯定鼎畵麟閣程氏高勲析珪爵曾留淮海鎭徐方因釋金龜塟繁弱千秋甲胄掩黄土猶抱旍旗走風雨介馬嘗隨龍虎號銜花近見牛羊舞秋風酹酒瀉玉缾幽思還視飛鴻翎昭陵西望乆寂寞鼎湖南去愁青㝠銅笙一曲倚鞉竹戲馬臺空散黄鵠把酒頻㸔琥珀紅拂盡殘碑不堪讀朱明府禹錫生日作梧桐生朝陽不與樲棘羣鳳凰翥高岡燕雀徒紛紛我行淮隂謁朱博正値朱絲紱麟角闗令長看柱下書豳民自奏公堂樂當年束髪珮玊琚皎如初日開芙蕖行文澔涆薄江海結交磊落塡車輿須臾挾䇿動天子一旦聲名滿燕市買駿時登百尺臺懸鳬竟下雙飛履臨淮百里著竒績前邁于公後師伯雨後甘城叠翠錢花開射浦臨瑶席嗟予自視四十年長途索食䝉君憐蒯緱不唱苦寒月絮袍解贈嚴霜天此地有漂母向曾飯韓信君豈一飯恩淮流本無盡淮流蕩蕩到海濶種樹忻能解人暍况有含桃墜宿紅眞藉臨卭買消渴氍毺錦段要素情方春為汝聽啼鶯持桮欲勸山陽酒只看東流淮水清卧龍山太守歌卧龍山前春草肥卧龍山頂秋雲飛不知太守是何氏唱殺卧龍山下兒卧龍山高起東越上有黄堂過天闕云是當年句踐亭望若雄虹駕雌蜺高門鎧仗排虎獅有人坐中如母慈摩頥撫頂善鞠育一顧三復千回思去年官兵戰東海白日蒼黄徙軍壘嬰兒奔走哭上城慈母從容為分解今年官兵鎭海磧日負長刀走如簀慈母週全最苦辛旦出餔糜袵安夕嬰兒無知乃有心口能作語還能吟龍山井頭掛銀綆綆絲知淺尤知深君不見井邉枯魚苦摇尾竟入井中食井水採蓮曲採蓮花花高葉復遮誰家採蓮女移舟徑入葉中去不見採蓮人但聽葉中有人語葉中語不可聽水漫聲將斷風多響易停欲將花紅比花頰欲將翠袖聯花葉可憐葉溜珠欲傾可憐藕斷絲難接絲難接珠欲傾可憐蓮蒂並頭生竝頭花蒂根中出比翼鴛鴦水上行鴛鴦飛自逺荷柄曲還擎擎將荷柄出荷浦何處相逢採蓮女蕩槳難教水鏡明分房不道花心苦亦有江邉解珮人蘭橈桂楫傍江春折荷恐刺手濺水畏沾茵逢人如照影連榜似比隣不愁風起湖難度只恐江高堤易湮更有堤邊游蕩子揮鞭摇曵垂楊裏一時菱唱逐堤遥幾處蓮歌向風起蓮歌菱唱起江沙蕩子歸來近若耶爭向堤邉馳玉馬何如江上採蓮花蓮花復蓮花花葉何葳蕤花摇知手摘葉動識舟來花紅豈可染葉碧詎須栽栽花不採摘花葉自摧隤採蓮須語蓮舟伴及此蓮花江上開和載花船詩并序渭南令張萬青納青谿姬美其既姬疴屬女弟以迎將望來舟而瞑目令為之神傷作載花船篇闕里孔孝亷示予并屬和章勸君莫唱楊栁枝楊花飄落無還期勸君莫上桃葉渡桃葉青青在何處君游渭陽値春月遥望江南栁如雪誰家城角種石榴不見平船住花埒白楊深巷野鵶曙十字南頭小樊素門前脂石解笮行花挿文魚駕船去鬱金香汗染絳雲瓦棺玉樹埋紅裙緑珠井上冰初結紫玉湖邉日漸曛昭陽女弟死相屬眼見花間繞銀燭鸞弦既絶難再牽幸有蠻絲細能續漳河銅雀飛復飛大姨既嫁娶小姨只今張君作新壻清江重載花船歸我行江南望江路舊日烟花在何處西陵松栢風雨來但見青驄繫江樹凉秋月沒星代時珠房多擘秋蓮枝君能載花對花語道予曽和花船詩登白鷺洲高樓値施使君留蕭江有懷石陽城邊白鷺洲萋萋碧草環洲流層樓百尺俯寒潦有客獨登樓上愁樓前寂厯衆山暮萬里江流自來去天半横吹贑浦帆雲中恍辯䖍陽樹我來眺望九日餘芳洲猶採紅茱萸遥山不斷故鄉雁沿流時羡清江魚故人乗興乆舒嘯千載南樓鮮同調看月寧分佐史牀臨風空著參軍帽相思渺渺縈素波秋花開映波中螺凭欄欲作登樓賦不見夫君奈若何夜分聽江聲浩然有故鄉之思我家住西陵慣聽西陵潮凉秋八月江闗高西陵潮上時巨如波底長鯨號細若寒風來落葉相飄颻西行渡江不聞此曽宿嵩山少林寺寺傍長松踞溪水千樹萬樹香閣邊夜來聽聲不得眠宛如秋潮耳間落坐起行空林但見露華薄山頭月弦清漠漠月弦漠漠清欲流此時思鄉生暗愁迄今渡湖渉江水去家已是四千里江水滔滔向東去凉秋水削流不住日行無潮夜有風侵舷透幕吹漴漴水波欲瀉不得瀉摶激持回卒難下中流起澎湃圻岸忽頺蕩孤舟本已在波浪到此那得避衝激横流溢洲渚直下礙沙石初駴驚飈動地來既道鴻雷向天坼狼頭鹿角相迸奔白月初落天星昏天星欲墜雨颯颯推篷仰天星仍見水嗑噆洪波雖歛水尚躍舟中徹夜聽水落又如溪邊松習習響萬壑不疑身在大江裏萬里波濤去無已望中方擬過瞿塘夢裏忽憐歸故鄉歸故鄉聽江水江水有時轉故鄉何日返故鄉欲返不得遂夜聽江聲忽流淚憶昔寄華亭呉山人懋謙到武林并憶沈翰林憶昔華亭翰林夜飲呉山堂滿堂灼灼華鐙光豐罇巨罍排幾叠妖絲脆竹分兩傍嚴城伐鼔下魚鑰高雲沉沉墮烏鵲把酒論文四座傾薪槃蠟樹交花落東飛羈雉鵲西避今來已是十年事君游京洛我自還羡君辭賦留燕闗翰林乆作大梁使至今尚滯鮦陽山羡君獨登黄金之臺攂鼉鼔左集漁陽右檀土挾鳳扳龍恣徃來展蒯遵銅並歌舞劉生意氣不可説司馬文章更竒絶君今貽我尺素書自數詩篇滿車篋呉山童童呉水深君來仍宿呉山岑渡江無檝兼無櫓還憶當年沈翰林西河集巻一百五十五
