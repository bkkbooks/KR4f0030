body:
  text: 西河集卷七十六翰林院檢討毛竒齡撰傳四忠一名四傳周文忠公傳公名鳳翔字儀伯山陰人以大興籍為督學左光斗取生員第一崇禎改元登進士厯官司業許士柔者祭酒也為翰林時曾撰故左都髙攀龍誥文有年矣至是謂失當降其官調之鳳翔曰臣故翰林也例翰林撰詞苟不當則閣臣竟裁之否則駁囘使另撰而士柔于十年前初擬之詞未聞駁囘使改撰也今忽曰失當是以閣臣之罪罪士柔也且誥詞非不當也當崔魏肆燄臣節幾盡含血負肉誰不畏死樂生而攀龍首以身殉皇上既憐而褒之中外相望以為褒忠奬烈不知宜如何鼓勵今徒以中書科先入寶簿及其子世學不諳事理之故反指摘誥文遲其贈卹夫褒諡之典久奉于王言而綸綍之詞未頒于尚璽使泉壤悲殊恩之久稽而輿情咎載筆之有失則是以世學而累士柔以士柔而累攀龍恐非陛下褒忠奬烈之盛心也不報既而遷諭德充東宫講官是時賊勢迫召對平臺問滅冦之策言論忼愾上為流涕會軍需告急議税民間間架錢鳳翔曰事至此是宜收拾人心時也尚可括民財以摇國勢耶昔賢謂民心一失不可復收國勢一傾不可復振正謂是也尚書倪元璐亟持其言亡何京師陷有傳駕出狩者鳳翔思扈蹕倉皇奔探見賊據殿坐而魏藻德陳演侯恂宋企郊等各帥百官入朝賀鳳翔至殿前視之大哭急從左掖門趨出百官皆驚怖不知所為而賊苐顧之不為問庻吉士張家玉者鳳翔會試所取士也抵賊書詬賊賊縳之夾兩刃脇降不屈且其言辯愈侃侃賊怒甚曰是何物子急取其父母來刳其腸觀之家玉心動乃陽為好言謝賊賊舍去歸而詢鳳翔鳳翔拒之曰安有此事而問我者吾父母猶在也夫吾不能為二親生矣家玉出鳳翔作書辭二親其詞甚哀書畢再拜慟哭自經死其題壁詩有曰白頭二老哭忠魂蓋痛之焉南都僭號諡文節贈禮部侍郎祭葬封贈三代如其官大清順治九年追卹前朝殉難官贈禮部侍郎祭謚文忠初鳳翔為司業時監進溢米則諸生廪也鳳翔獨不受儲之得數千石賑飢民靈璧侯家奴辱諸生鳳翔撰封事侯徒跣拜大成廟伏罪不聽必捕其家奴付刑部乃已其清峻如此其後張家玉起兵廣州抗王師累破龍川博羅連平長寧諸縣退屯増城轉戰凡一年力屈死明少傅兵部尚書前巡撫蘇松都察院右副都御史祁公傳公彪佳浙江山陰人也字幼文年十七舉于鄉中天啓二年進士授興化推官瀕行跪其父故參政承㸁請敎承㸁不答或問之曰不見夫誨泅者乎􅀈壺而扶甕人藉以肘終其身不能泅一旦挾諸清泠之淵翻壺却甕􅑷其身入水而泅成矣今者入官則翻壺却甕之時也彪佳去果以賢能稱嘗出撫亂兵斬其渠徇于軍門崇禎四年考選擢御史時京營操兵遣七太監主兵政彪佳激切諫久之巡按蘇松預以十革十四申九詢檄下屬革者革其弊也申者申其所當行也詢者詢其何者可行何者在所革也乃據屬所答覈之定黜陟會蘇州無厲名打行亷其稔惡可殺者四人械于衢集鄉三老詢之曰是可殺否鄉三老曰可即又詢諸觀者曰是可殺否觀者曰可于是掄大箠箠末量五寸積一寸半每箠十易操箠一箠至死騐之陳其屍而宜興鄉官陳一敎奴客播虐怨家刑牲焚其廬劫肆其屍墳彪佳先捕諸奴客正法平衆心且盡追還所佔掠男女田産而奏奪陳氏父子官然後治諸怨家之為亂者時彪佳回道居上考而舊輔延儒與陳氏僚壻怨彪佳執法陰嗾中官駁彪佳下其等降級上親索筆改罰俸當是時人憾彪佳寃而猶幸上之知彪佳云彪佳為人修長潔白風度奕然而遇事敏斷時乞病家居猶立賑灾法賑東南飢寧紹台三府十九縣皆倣行之乃以病假過八年自劾請照過五年閒住限例而詔起掌察召對賜茶餅會吏部呉昌時破計典任意出入彪佳遇于朝面折之叱昌時陰陽攬權要骫法疏叅昌時昌時故叵測而彪佳是時又以疏留掌院劉宗周為上所忌至是疏入恐從此重得罪人人為彪佳危而上疑昌時謂彪佳言是既而昌時敗彪佳循差例刷南京卷國變諸臣援宋髙故事擬以福王為兵馬元帥彪佳曰監國本朝故典也何逺引為議遂定未幾有傳正大位者彪佳抗言曰甫監國而遽登極何可且羣帥勸表未至即有忠如陶侃者尚以不預定策為恥况其他乎然是時邀功者駕言本兵史可法有二心可法懼雖是彪佳言不敢持遂以蘇民變謂彪佳素德蘇出彪佳安撫蘇州彪佳所至設先帝位率衆哭即諭以大義且言中原已無賊國有長君使人心得安乃揭榜于路曰叛逆不可名忠義不可矜毋借鋤逆報私怨毋假勤王造禍亂斬丹陽亂民三人以徇先是蘇民以鄉官項煜從賊剽其家而嘗熟亂民遂借討叛名焚鄉官時敏宅燬其棺之未葬者而暴其陳人彪佳至捕其為首者斬之而嘉定華生家奴客為亂合他姓奴客同時起縳主杖之踞坐索身券所至數萬人彪佳盡捕之斬數人餘悉掩獄令曰有為原主所保者貰其死於是諸奴客家皆膝行摶顙匄原主赦免遂募士為蒼頭軍親敎戰適興平兵攫丹陽市錢浙兵勤王者不平鬬而傷軍民大譟城閉彪佳率蒼頭馳治斬興平兵興平伯傑夙憚彪佳名至是忌之揚言且移兵丹陽以哃彪佳彪佳却以牒復約會傑于大觀樓時傑踞𤓰步大觀者𤓰步樓也傑謂彪佳必不至至期風作傑笑曰祁撫不至有辭矣頃之隔江帆起破浪頃刻達岸傳呼曰祁都堂至矣撾鼓入傑聞之大駴衷甲出迎及門見彪佳角巾單衣攜胥𨽻各一人又大喜手揮部士去勞且拜坐語久之起指江誓曰公鉅人也公在傑敢越尺寸以溷公者有如此江乃屠宰饗彪佳彪佳一舉箸而别既而士英憾彪佳適劉宗周劾士英阮大鋮謂彪佳同為之嗾其黨張孫振劾彪佳二心阻監國正位為潞王地彪佳不與辨袛疏辭定策功所陞都察院右副都御史竟去大兵下江南貝勒以書幣聘宗周彪佳彪佳沉水死死時别家人駕言應聘將渡江宿所構山園夜開牖望南山笑曰山川人物皆幻形也今山川如故而人生已一世矣詰旦家人失彪佳所在見柳陌淺水露巾角曰是耶葢入水端坐云後唐王僭號贈少傅兵部尚書諡忠敏俞御史傳公志虞字際華浙之新昌人登崇禎七年進士授四川順慶府推官故事推官為巡按耳目卑而要每新到官奸胥于此覘夷險即甚簡易亦先為煩苛令可畏憚而志虞平平且曰此地當奢氏之亂獮薙民苦兵久矣誰謂治蜀必嚴者乃大發滯囚釋積繫開司獄放去獄為之空無何流賊入成都道經順慶鄉官請集民堵禦而志虞不可曰冦之深入必有大兵追蹙之以民迎敵徒棄民耳吾堅城以待正恐追軍之尾此當不逺也已而果然會重慶闕推官調志虞往民哀留不得乃令志虞兼攝之十五年行取召對平臺親策安邊弭盜數事條對稱旨授貴州道御史乃復上輯盜練兵選將任賢屯田十餘疏遂奉使巡山海居庸兩關故事先東巡山海巡畢報命然後復西巡居庸而志虞于十六年十月東巡已竣乃于十七年三月赴都將西出而闖賊警至吏請志虞行曰官出使則無與他事即使前途有梗者可假此避也志虞叱之曰人臣不為王事死而借王事以生乎不行十九日城陷志虞自縊其子泣救之曰未知聖駕在何所探而後殉未晩也志虞不得已姑唯唯然已不食坐露地不入室處二十三日賊出梓宫于東華門志虞匍匐往撫宫而慟賊詢之曰此關院也舍之去入夜遂縊于新昌會館衣有紙云死固吾分吾不死于院而死于此者吾已在巡且恥院中有此官也南都尚書張㨗請贈卹贈太僕少卿諡節愍而以其在巡比之身死封疆者復與衛景瑗朱之馮三人同賜祠祀明左都御史蕺山劉先生傳先生名宗周未生而其父秦臺公亡念之號念臺起東其字也少無衣綿外家為之製縘袍拓落如襏長猶衣之嘗從外舅學夀昌走烈日百里攣一足萬厯辛丑成進士授行人故事舉人入國子始預謁選宗周急禄養冀以舉人得早授就國子試乃釋褐而太夫人逝服闋以薦起原官疏東林學不報因告歸先是宗周於服闋之隙曽講學東林書院東林者宋楊文靖祠而顧選郎與髙大行講學其中後所稱東林黨是也時選郎已死朝士從大行游務持清論别流品而小人不便攻之宗周負清望政府之銜東林者思借以引重且擬處宗周選部以奪其志及疏入而攻者四至時宗周以行人告歸御史韓浚糾其後且欲中以考功法考功郎趙士諤訟之免熹宗初政盡起廢籍諸君子諫官惠世楊薦宗周而大理卿鄒元標繼之起禮部主事自二十四嵗釋褐至是已四十四嵗始一遷凡二十一年時客魏將亂政諫官言者相繼去宗周起九日拜封事糾魏進忠客氏進忠忠賢也時多言客氏而進忠之糾自宗周始進忠銜甚然終以勢未橫傳旨杖六十輔臣葉向髙力救改罰俸於是遷宗周光禄寺丞未幾遷尚寶少卿又未幾遷太僕寺少卿宗周以一嵗三遷未安且客魏勢轉盛疏辭三上不報以病行故事三品以下無辭官禮宗周獨辭之太宰趙南星重宗周起宗周通政會副都御史楊漣劾忠賢忠賢怒盡逐東林諸君子宗周甫疏辭即革職奪其誥命於是大興鉤黨獄緹騎遍天下御史惠世揚被逮辭連宗周王侍御業浩救之乃止崇禎改元忠賢誅給削籍官誥起順天尹宗周集諸師儒示聖賢為學之要諮三老嗇夫興利剔弊所屬奸胥有乾沒帑金狀論如律勲戚家人及豪强不法抑之絶中貴請謁盡驅伎童優女焚權家所畜戯仗炫服武清伯奴客爭道毆諸生直入武清第捕得之搒掠加三木示長安街會王師大入邊所屬老少奔都城乃請撤九門諸税發内帑賑給平糶立保甲法其法十户為甲甲有長十甲為保保有帥十保為鄉鄉有伯由鄉而坊而城而畿各以五為數而攝以官一戸客奸九户舉之一甲容奸九甲舉之不舉者坐適遵化失守而近輔之流移者日千百至廷臣慮藏奸議勿納宗周曰此京兆事耳遣屬籍姓氏居業記以篆符宗周騐符入分挿之而聨于保甲發贖鍰設粥僵者使就火室道殣給藳其閭左單户令富民互相賉時王師攻德勝門督師袁崇焕抵之不勝上不視朝而中旨辦布囊八百内官進馬騾宗周曰是必有以遷幸之説欺上者夫與斯土為存亡者京兆也疏請臨御自卯至酉跪午門不去諭遣之乃集京兆官屬暨鄉大夫士父老子弟于城隍廟設于忠肅公位哭而祭之布死守之誓衆皆哭王師退宗周瘞戰亡將士自德勝門凉水蘆溝諸處瘞骨三萬標以柳榆乃復陳善後之策曰選有司撫流亡聨保甲練民勇已下部而宗周於保甲之法尤加申飭曰籍曰政曰教曰禮曰養曰備曰禁輯書以獻乃復裁京兆冗費一萬六千餘金而大興宛平費額尤甚悉裁以舊籍權貴無敢難者於是陳祈天永命之要為更化之端其旨在除詔獄捐新餉而要歸于化門户意見語侵輔臣時上方持法切責黨人無財賦以佐軍興而宗周所言適中之怒曰必捐新餉則軍需何措着奏宗周覆奏謂遼左額兵額餉原自相副若縁邊州縣各選土兵自三百以上至千而止量給食械為兵餉給為農餉懸何至如新餉五百餘萬之多哉且京兆裁冗萬六千金抵之續𣲖萬二千三百金而有餘推諸天下猶是也且陛下修德廷臣孰敢私其利者上終以為迂責之宗周疏乞歸越五年上以體仁在閣久專務刑歛致民窮盜起且念前此置相不得人乃大破資格進大小臣工親試之且推在籍堪任者廷臣推禮部尚書孫愼行侍郎林釬并宗周而愼行道死陛見有日承旨范仁誤傳令宗周先見上不悦論仁城旦及見而宗周以修德舞干為禦敵計上顧體仁曰滿桂之敗宗周在朝也此時能舞干羽耶因相釬改宗周工部左侍郎宗周乃直陳時政思轉亂為治其要在抑宦侍不使侵政去市井言事若陳啓新者而下尺一以招流亡上怒甚輔臣因爭指其隙上反改顔曰宗周直臣不度勢量時夫盜賊遍天下而欲以尺一勦除何也會推閣員三推皆不報上意在宗周而究以迂濶且謂宗周學有餘而不足於用遂止既而體仁修黨人隙擠文震孟諸公去循吏如成德申紹芳輩皆得罪宗周復請告自起用至是凡百日瀕行貽體仁書數之會王師再入宗周在道聞復用中官監軍馳疏諫中官恚甚羣詬之而體仁復指以為黨革職越六年復起吏部左侍郎甫就道復改都察院左都御史召對文華殿退集御史于庭嚴飭之臺中肅然乃申巡城職掌察九門官吏不法設鄉三老揚髙皇帝大訓即以鄉老行保甲法咨五城御史著為令無何上惡諫官姜埰言已下吏議而行人熊開元糾輔臣延儒縳開元并埰付詔獄宗周思救之時上方召對或傳中旨斃二人獄宗周昌言曰刑人于市禮也焉得私斃諫官此不可不諫衆許諾及對竟户部尚書傅淑訓頓首請釋埰開元上不納餘無言者宗周直前爭之且曰言官可用即用之不用即置之縱或得罪亦當敇法司擬議而遽下詔獄是朝廷有私刑也上怒曰司衛皆朕刑官何公何私且朕不得自問一在廷官乎宗周爭不止上大怒乃曰吾固知開元疏有主使也宗周免冠廷臣為宗周謝僉都御史金光辰特申救之上怒甚目為朋黨敇革宗周職而光辰亦降調外次日有舉人祝淵赴公車疏留宗周上益怒坐淵妄言朝政下吏議而宗周以掌憲六十日去甲申之變宗周荷戈號跣呼督撫討賊而南都新建以原官起至丹陽劾輔臣馬士英責其不討賊而變亂新政士英怒會浙撫黃鳴俊提卒入覲抵京口與防江兵爭道閧事聞朝廷士英遽指宗周與鳴俊懐異將入清君側為廢立計宗周入朝不聽見士英乃修黨人隙特薦逆案阮大鋮知兵既而起大鋮兵部右侍郎宗周糾大鋮不報拊膺曰吾不可復居此矣遽歸王師入浙將軍孛羅遣書徴宗周會宗周絶食死死前一日門人王毓蓍自沈柳橋上宗周書曰毓蓍已得死所矣先生早自決幸毋為王炎午所弔宗周得書呼其字嘆曰元趾吾講學數十年得子隨之足矣宗周幼學外大父南洲章公既而師事許孚逺分别理欲遂與同籍劉永澄詣髙大行攀龍受古本大學及歸魏給諫大中造講既而同總憲鄒元標講首善書院至避璫難輯皇明道統録始遜志終陽明涇野大抵所學由刻厲而漸就涵養嘗曰吾今而知主靜之要也崇禎辛卯由京兆請告立證人社同郡祁彪佳受學是時弟子日衆乃著第一義等説九篇輯聖學宗要以濓洛關閩姚江為合一學及為少司空每於在官頃記所獨得曰獨證篇于是辯太極之誤闡大學誠意中庸未發之旨大抵一中和兼動靜合本體工夫而要歸于立誠晩年著讀易經説著易鈔既又著經籍考遍輯十三經諸子史傳之有裨于敎者其言逾博而旨逾謐夫道一而已矣宗周家會稽蕺山稱蕺山長居貧食不兼蔬入官寓朝房嘗起少宰道乏食臨朐令以十金餉受之至前途得故人所遺金趣遣還令及罷總憲歸不能行朝士歛贐餽之不受其後赴南都以冠服久敝假冠于從子之宦者歸而還之笑曰吾不可掛他人冠也其介如此西河集卷七十六
