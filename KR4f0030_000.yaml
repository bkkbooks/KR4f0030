body:
  text: 西河集别集類六國朝提要臣等謹案西河集一百九十巻國朝毛竒齡撰竒齡著述之富甲于近代沒後其門人子姪編為西河合集分經集史集文集襍著四部凡四百餘巻其史問以竒齡有遺命不付剞劂語見經問第五巻景泰帝條下餘亦不盡行於世此本為康熙庚子其門人蔣樞所編但分經集文集二部經集凡五十種已别著録文集凡二百三十四巻而䇿問一巻表一巻集課記一巻續哀江南賦一巻擬廣博詞連珠詞一巻皆有録無書其中如王文成傳本二巻制科襍録一巻後觀石録一巻越語肯綮録一巻何御史孝子祠主復位録一巻湘湖水利志三巻蕭山縣志刋誤三巻杭志三詰三誤辨一巻天問補注一巻勝朝彤史拾遺記六巻武宗外紀一巻後鑒録七巻韻學要指十一巻詩話八巻詞話二巻外附徐都講詩一卷本各自為書今析出别著於録其當編於集部者實文一百三十巻詞七巻詩五十三巻統計一百九十巻竒齡之文縱横博辨傲睨一世與其經説相表裏不古不今自成一格不可以䋲尺求之然議論多所發明亦不可廢其詩又次於文不免傷於猥雜而要亦我用我法不屑随人歩趨固當以餘事觀之今亦並録於末云乾隆四十四年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:bc9eb8c2bd223aace6d6e1c88b2c374ed6d48e20442089fdaee50ee45f5d162d
