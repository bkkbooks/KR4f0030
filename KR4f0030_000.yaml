body:
  text: 西河集别集類六國朝提要臣等謹案西河集一百九十卷國朝毛竒齡撰竒齡著述之富甲于近代沒後其門人子姪編為西河合集分經集史集文集雜著四部凡四百餘卷其史問以竒齡有遺命不付剞劂語見經問第五卷景泰帝條下餘亦不盡行於世此本為康熙庚子其門人蔣樞所編但分經集文集二部經集凡五十種已别著録文集凡二百三十四卷而䇿問一卷表一卷集課記一卷續哀江南賦一卷擬廣博詞連珠詞一卷皆有録無書其中如王文成傳本二卷制科雜録一卷後觀石録一卷越語肯綮録一卷何御史孝子祠主復位録一卷湘湖水利志三卷蕭山縣志刋誤三卷杭志三詰三誤辨一卷天問補注一卷勝朝彤史拾遺記六卷武宗外紀一卷後鑒録七卷韻學要指十一卷詩話八卷詞話二卷外附徐都講詩一卷本各自為書今析出别著於録其當編於集部者實文一百三十卷詞七卷詩五十三卷統計一百九十卷竒齡之文縱橫博辨傲睨一世與其經説相表裏不古不今自成一格不可以繩尺求之然議論多所發明亦不可廢其詩又次於文不免傷於猥雜而要亦我用我法不屑隨人步趨固當以餘事觀之今亦並録於末云乾隆四十四年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:d76cfddcf36510782cdc3980e624e9effc3a251501bb877488afc7aec4d7d81b
