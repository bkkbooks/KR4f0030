body:
  text: 西河集巻四翰林院檢討毛奇齡撰主客辭二抵謘有敘辭一作聖孝臣自通籍為侍從叨處禁近稔見皇上事兩宫至孝達旦御門必躬候慈寧起居敬問安否其間伺意承志真有眎聽在形聲之外者且宫政國典屢見諮請幸湯御沐喜絶創倐于康熙二十六年凔冬之仲太皇太后神躬違豫皇上親侍寢疾抑膚嘗藥簟不去地撤御省饍履未違闥乃于臘月朔日步詣圜壇請損聖算以禆慈夀是時一聞祝吿左右驚怛臣民于焉震動天地為之變色至誠所格動有成效遂小釋疴􅂒暫安袵衲爰有祠官上請報謝以資福祐而賔馭有數宫車晩及五行咨其失節三光忽而改度皇上哀毁踰制孺泣無候三日以内水漿溢米俱不入口背苫而首凷拊膺喀血其于須材視含附身藉幹之具靡不畢誠畢信勿之有憾而殿攢以後哀切尤甚爰有滿漢大臣内閣大學士以下同辭啓請以為聖孝純篤超軼千古真史策所不載往牒所未聞然而先王定禮哭踊有數立為中制不令或過誠恐以死傷生翻骩孝道况乎履萬乘之尊蒞九有之廣其為義制豈可與大夫士庶同年語哉且皇上自侍藥躬禱以至帷宫菆木既巳鰥目灼體手据足踐今復哀感不巳屢至惽仆萬一聖躬稍有未安天下臣民何所托命因俯降兪㫖姑為慰勞然而孝思所極哀出自然深悲積中發不可遏縱欲强制力墇而情不能己夫哭而不曲非故嘠也飦粥不下咽豈辭啜也羣臣方貿貿不知所請而上復傳諭謂朕覽自古帝王居喪持服俱以二十七月易為二十七日惟魏孝文帝行三年喪朕平日讀史至此嘗羨慕之非欲邁古賢君祗念朕八嵗世祖章皇帝賔天十一嵗慈和皇太后崩逝藐兹冲齡音容記憶不真未獲盡孝至今猶憾藉聖祖母太皇太后鞠育教誨以至成立遽遭遐棄五情潰糜因此大故回思早喪怙恃益増痛絶今兼行往事持服二十七月少慰罔極之痛然祗朕自持于宫中其于㡬政毫無曠廢并不令臣民持服民間一切俱不禁止于是和碩康親王等與在朝大臣互起諫止大約其說有五夫以皇上一身為郊壇宗廟社稷所寄託每當饗祀必鸞輿親蒞以竭蠲敬故郊焉而天神格廟焉而人鬼享儻凶不兼吉一旦以太皇太后之故使郊廟神靈稍有遐曠則太皇太后必有恫乎其在天者其不可一且夫君臣一體也皇上獨遂服宫中而天下臣民聽其即吉此即傅𤣥所云有父子而無君臣者三綱何在若中外遂服則普天遏宻旦夕感慕經歴寒燠屏塞嫁娶重違皇上一切不禁之㫖其不可二夫皇上奉養慈寧三十餘年并侍疾以來三十餘日前後思維一無所憾則于服制之末順常表飾原可少慰况以皇上純孝其在當日晨昏定省承顔伺笑何一不曲體幽隠而獨于慈闈遺詔一如曩制之語反有未遵是于事死若生之意有未全也其不可三孝經載天子之孝與諸侯卿大夫士各有不同是必徳教加百姓政令施四海然後謂之要道謂之徳本而不在乎衰麻哭踊之節也是以一月即吉揆理度勢實有不得不然者誠以乾為陽為天為日小有黯黮即照臨之下為不舒矣至尊一日不改慘則四海臣民一日不和而况連年累嵗禮崩樂闕當此太平玉燭之時豈宜有此其不可四且皇上天亶好學博極墳典每有講論無不貫穿今古剖抉微賾今細考天子喪儀三禮莫載是必天子至尊因時變制有不可一律定者故殷宗諒隂之解在尚書大傳鄭𤣥杜預所說皆卒哭除服所云三年諒隂竝無三年服喪之文蓋三年達喪與心喪同故漢章至孝其于眀徳太后之喪不淹旬而從吉宋宣仁太后時在廷諸臣皆一時儒者其議太后喪儀竝依漢制則是準經酌史竝鮮終制其不可五進此五不可而聖鑒咨嗟百不能易中外堅請始有如期釋服宫中自行之㫖誠以皇上生平㝡惡虛飾一言一動必躬行實踐無取辭費意志所定倉卒難挽然且嚴寒隆澤未返璿宫五臘三朝尚依帷殿再三泣請終不可得至于啓攢之夕攀匶哀號乞駕便輿愀然割紖乃自攢次降步送之至郊園殯宫顔悴足疲哀感衢陌每當八校更披六佽換舁之際必哀號長跪掖衞墻側因思自古人君從無親送輼車之禮即眀代孝宗極稱賢主然猶祖奠午門銜哀而返至若天子居廬全無其制而皇上于塗殯之餘又復幕居乾清門外比之庶人廬處尤為寒冽乃至答諸王大臣一則謂據奏元旦請朕還宫人主宫殿原多可以因時移蹕若在庶民遭此大故所居止于一室又遷避何所還宫斷不可行再則謂朕遭太皇太后崩逝欲持服二十七月之志甚堅諸王大臣及各官士民等再三陳奏詞同懇切不得己勉從所請但衷猶歉仄因幕居乾清門外以盡哀誠今乃又請回宫不過以朕躬為念耳人孰無祖父母父母為子孫者皆當盡孝何分貴賤今距釋服之期為時甚近若從所言以致他日稍留遺憾恐非人臣愛君之意于是諸臣惶感莫敢進諌但于釋服之時仍合和碩康親王等及内閣大臣九卿詹事府科道六部各衙門以下披瀝伏闕㑹諸道制撫及外國朝鮮暹羅諸王共勸即吉而太學諸生及京畿民庶數百人各舉幡跪天安門外以為郊祀大典罕有時舉宗廟之祭亦未親奠我皇上致敬盡孝必躬必䖍儻三年之内或以宫中服喪之故祠官代饗則是玉輅不至于郊壇奉璋不及于廟室將使大禮有所曠也如慮其有曠而内衵凶衣外披吉服是飾虚也且從來朝㑹踰月一行皇上懋勤大政昧爽臨朝九重森嚴萬國觀聽浸假待漏之際綵仗己陳廷朱衣方入陛而回思至尊在内尚將有衷牡麻而脅絰帶者何以為情况屬國來王在古昔惟九賔導相觸首稱慶而已皇上則宫門御苑賜宴賜衣雖極疏逺必有勞賚萬一以持服之嫌門宴不施宫頒未逮何以合萬國之歡慰四裔之慕况靑宫睿質已成宜行嘉禮啟祥毓瑞全在内廷借使宫中遂服則持節授冊將安蒞事且夫慎終追遠應莫如祭㐲念太皇太后升祔之典必除服而後可行當此春夏遞施時祭伊邇則禴祠合享當亦追逺之思所㝡急者凡前後所奏窮極援引上乃不得巳勉從衆請然猶衣棉束綈覆以羊裘寢處齋房履縢不解雖經吏部諸臣公懇易服兼乞還宫而終竟不許遂于四月七日躬奉龍輴步送郊亭扶侍墻幬不離左右比至寢殿又復降步然而哀號之情較昔尤極自六宫嬪􅀈以及諸王各大臣封妻命婦攀援偯曲聲震林莽是日靈雨宵零重雲晝掩塗蜃封魚一切如禮皇上哭行饋奠宛在初喪同軌咸來房皇霑灑乃于是月十九日奉安禮成次第即吉夫以三年之喪在三代君民久未行者而一旦以天下共主毅然欲舉而行之然且嘗藥步祈居廬哭位深幕次之悲哀望山陵而徒踐極隆古以來歴漢唐明所未有之孝而皇上悉萃于一身古云王者以孝治天下又云聖人行孝必擴之而充乎天地溥之而横乎四海前以歴之千秋而有餘後以施之億萬世而未之或過是固軒黄以還超文軼舜之一人也臣請急在籍一聞哀詔疾趨省㑹同將軍巡撫以下擗踊號慟百日之内時申悲慘因累詢太皇太后違豫以後奉安以前我皇上無涯之孝播諸里巷雖道逺未悉不無乖誤然而東南士庶動哀慕之思每聞一節便羣聚閭門反覆傳說彼吿此訴兒童婦女無不感泣去者推之薄海亦猶是矣憶臣侍班時當羽翊南巡之㑹曾作司賔答問辭以寓頌今復為此文妄名抵謘蓋不藉主客恐無以發抒所由導揚未備因往復假借以附于解嘲抵疑之末使後之觀者庶以知起居記注之外猶有史官存信焉如是者爾于時典喪大使從長樂官屬日與大行丞庶儐頒布禮事歴瞻我皇上聖孝逾量自慈宫侍疾袵衣翦爪求醫禱祀以迄上賔以後歛廞塗輴掩菆奠寢諸節一一刺心雖非常之孝超越今曩實有非庸愚所能窺者然而中心仡焉廼于奉安之次從容避席而請曰竊聞喪有五服禮有四制四制者五服所從節也故出門之治以義掩恩奉公所行義由禮起夫人而眀之矣誠不知國家頒恤為制若何天子居喪其儀奚似三代闕王禮之書周官乏大喪之記主故無所稽典喪不能議然而漢唐以後尚有舊文紅纎之詔居然相遵三日而黼可負及旬而衣以純斯百王之良法亦列代所共聞而乃瑤殿愆和璇宫違療徒跣在郊咨洟過廟開織室以引懲禱桑壇而罔效蒼靈銜乞算之詞金匵閟事神之吿雖復顧額問影求醫翼全保林節纋世婦張綿痛瑤光之被地比虹流而麗天吾聞豎吿未安寢不浹席者文王之溢情也長樂侍疾衣不釋結者漢帝之殊行也乃以久恃之年驟丁鮮穀角柶楔齒燕㡬綴足樂人建旄以朝升秦女巻衣而夜哭官輸纁戴之金人奉㨗盧之玉委襚衣于廂東設駔珪于牖北方冬却凌人之冰浹日鑿參庭之木既倚幕而卧苫茅翻咽嗢而屏飦粥當此皇情迫裂之時聖意徬徨之際猶且視飯薦笄經營備至沐床設席相視出涕修喪祝之儀起勸防之廢給栗材于上林搜東園之祕器遺奩傷玉鑑之空撤座哭珠簾之墜夫以屏饍之過勺飲不入口者而八筐熬稻必用親啜以全哀之公腥肉不入室者而四塗魚腊于以齒決則是葛茀雖韌不足以罥其綆縻榆瀋雖多恐無能喻其流血而况槨衣以淚近而轉濕黼翣縁手扳而不支望旌銘之骨刻翻旟旐而魂迷澤過優則銀海為溢恩彌重而金鳧不飛是固期門諸校侍鵲䑓而倍深其痛司常之士奉龍帔而不能無疑且夫人主之身非淺鮮也羣臣頫賀動輒呼嵩四方朝集必稱萬嵗何則凡以祈昊天而保永命也今乃以方雷未忘有㜪難續遂欲效桑林之禱法金縢之祝類晉儒之焚顱近唐臣之進籙得毋于體有過降與若夫後王之行又安足法哉夫三年達喪在昔有之不始于殷商也三旬而釋服亦自古有然不仿于漢與唐也如必待髙宗而始亮隂則陶帝無遏宻之文湯孫無奉歸之誥矣必漢文而始短喪必唐宗而始易以二十七日則魯人之暮歌不足譏滕文之居廬為無可疑矣徒以行古之意起自晉武終喪之志決于魏文周主有持服理事之令宋宗創宫中遂服之論遂欲兼數王而施數事則漢唐一統反遜偏安列代賢王盡輸諸主矣且夫漢文之孝端在何等唐宗事親早見史乗當文帝侍薄后之疾下哀矜之詔使天下有罪者不逮父母太宗居竇太后喪極盡哀毁往往居慶善之宫念所生之苦一觀覽間必涕泣如雨此與謁原陵而哭鏡奩營太廟而悲故璽者亦復何憾而乃限三寸之絰改廿日之䃾却臨踐之制而勿用刪國恤之篇而不疑此豈故為是戛戛哉夫亦勢有所不己也故仲路不除孔子非之趙孟又降楚子知之薛宣甚賢猶以弟修之持服為可怪漢儒多禮尚以趙岐之去官為不宜是以翟公丞相也匝月除服自言不敢踰制張華度支也逼令視事但云道在從時葢當其奪情固將釋桓焉之服而加酒牢苟惡終志甚有劫解𢎞之䘮而收廷尉者彼以為國家絜量各有畸至君父相較原非比埒况乎身為天子撫有萬方膺祖宗付託之重受天地民物之大猶兢兢以節文是持豈云通禮獨不聞義制之治乎天子無喪儀辟所尊也五禮去國哀為其難與倫也故如䘮無哭踊之節亮陰非衰麻可申如必帥天下而共持服是謂荒國事而塞民務儻大君獨服而天下不服是謂有父子而無君臣而乃儗魏周之行類晉宋之仁泥殷宗之遺跡略舜禹而勿論達孝統繼述之善臨䘮徒哀戚之循此羣臣百姓不能無一時之爭而天下後世且將共起焉而多所詢也于是九儐之末有咨嗟而興者曰豈謂是哉信如子言所謂眀乎事不眀乎理知有一不知有二者也夫知其可為而不為者庸人也知其不可為而必為者賢人也知其可為而為之知其不可為而猶為之而仍不為者聖人也夫三年之喪亦己久矣漢唐以後時不可行天子之尊勢亦難詘兆民罕與言庶臣皆不欲故以諸士之喪大君命歠則歠之而獨不敢自撤其食在廷之制至尊欲奪即奪之而反不能自遂其服誠以孝先百行憂歉三年服從恩制喪以禮全弱者不可却强者不敢前賢不必過聖無所偏故足傳也世徒見長秋典喪少府獻服司常建弓旌校人飾車轂吏民有三日之臨宫御減終年之哭而獨九重之内首有餘創三月以還面猶深墨遂以為士喪之制將補君儀開元之書尚存國恤斯巳畸矣且子亦知慈寧之神聖果何為者耶皇上以為北樞有命實誕軒黄東渚之祥因生皥帝光烈擅天后之稱莊憲居母師之地然而捫天鍾乳曽養聖躬教織濯龍還裁帝帔是以豕牢有太任之思龍見感唐宗之異所為漢室勤儉惟太后所遺文母思齊實曾孫之庇宜其念承纘而興哀懐恩勤而出涕矣乃孝感所觸更饒痛疻撫今追昔情不能巳當日慈和賔天睿冲嗣服問饍情殷奉觴時促龍輈頓駕蟾馭早卜灞上之祓未行蘭舘之遊不足脂澤之田未嘗借貧人湯沐之邑不以乞外族一旦弛練裙之弓弦脫磨金之指鐲大使己撤其衣裘小王誰教其誦讀有唐顯慶所為諷女則而感霜晨眀代孝宗因之祠奉先而泣風木爾乃近開慈𡑞逺憶容車泣縈新綍哀尋故褕天闕築夢熊之館泉臺掩褓鳳之襦想母儀之髣髴過閟殿而趦趄縆月夜墜以長偃􅀢雲晝凝而不舒將謂藉齊疏以報罔極實非更禮制以示有餘蓋欲申呼昊之私非此莫慰因之發原陵之夢或可兼攄此固聖人㝡苦之用心抑亦王者善全之令謨然猶發言盈庭持志不得下審民情上立人極俯仰古今咨嗟太息其制行之始未嘗不堅而從諌以來不欲自愎將使一時有所遵萬世無可惑隆古所以賴聖謀詩書所以誦孝徳也子第知夫皇上之詔上援古制下引近主遂以為效宋宗法晉武而不知聖人神孝出自天然雨降九闔江流百川哀生于㝠漠淚發如涌泉寧不念幅員之廣巳過蠻渤平康之治且邁堯年而乃近引一方之元魏俯取偏安之趙宋哉特以為三年之喪漢後未􅈺即此數主猶復足重故云然也若夫羣臣所爭固非得己聖心轉圜依然獨斷人但知皇上之釋服為卒臨而不知聖人之釋服不釋心也人但知皇上之解憂為除服而不知聖人之解憂不解孝服孝叶也夫大孝之心不在衰麻至聖所行豈限時月髙宗三年不言皇上之不言何止三年大舜五十而慕皇上之慕思何止五十皇上以為天下甚大四海甚盛必終國恤則上下未齊必遂私服則吉凶難竝故惇宗將祀必隨時以制宜班朝治軍亦因情而立行臨䘮則極哀而不以為踰蒞祭則盡敬而無所於病斯所貴乎孝也故孝有節文又有權制三日而食三月而沐此節文也跛者不踊偃者不袒金革不避纎老病不止饌此權制也節文與權制總名為孝故及今所重在乎知要向使當堯舜之世五嶽不盡地四維不踰域政教所及惟此甸服雖共主在朝而各君其國但垂拱而端居即達志以通欲故持服甚易也今則南踰瘴海北極窮壤户版億萬皆隷官省即使堯舜復興其不能行也審矣且也歴代之主名為臨政實近居攝祭享不親朝㑹不接明堂無王㑹之文狩岳鮮方車之合入學授經視為故事端門聽政偶爾一及是以宫府獨處皆足自給而今則匕鬯躬承珪璋親受朝集之貢獻匪一方九賔之來同遍九有黄𦍕白僰竝赴京門東雉西狼全歸闕右書無程石而猶繁人不梯航而自走則是哀樂不同致饗恤不竝行桐竹之扶不瞻榱桷枲牡之束難升殿廷况乎酬百譯之金勞六軍之酒布綵仗以迎辰駕鸞輿而肆狩則夫皇上而行服與魏宋殊即皇上而不行服亦與杜預傅元之所言相刺謬葢其所以行止者别自有在而非天下羣臣所藉口也且子亦知躬禱之有說乎子第知金縢身代似屬過禮焚首減算以為迂闊而不知河圖有賜算之文洛誥進祈年之訣夫天子之孝得算二千嗣王敬天卜年八百君之所素知也今皇上聖孝嵬嵬將必登大夀踰耄耉與江河比長以山嶽絜久是皇上一祝而天地鬼神實佑之將欲錫之千聖之所期三皇之所有而豈僅區區呼嵩祝嵗所能狃哉且子不觀浙河之間乎方春之時水波不揚叢壇里樹甘露以降在昔羲軒之世王者行孝則萐蒲生于庖甘露溢于唐暨乎三代援神著契則龜龍達河流水無恙今兹之瑞亦正相彷夫二鳩之巢一魚之躍皆闗孝行故曽子之冠上有棲烏劉殷之樆下有蔵廩孟哭雪而神筍抽王袵冰而錦鱗泳粲荑葇于枯蘖起温泉于寒井梁王作孝子之賦曰地出蛇珠晉史列孝子之徳曰天降神媵按之士庶歴歴可驗由斯以談則上天降祥正自無己方將駕疏仡軼循蜚同無窮之徳視之天地而吾子抱鰓鰓之慮刺刺不止是猶較天星而播熠燿之光窺大顥而引蠛蠓之氣也西河集巻四
