body:
  text: 西河集卷六十翰林院檢討毛奇齡撰跋新刻五浮山人詩卷跋歐陽永叔讀班氏藝文志暨唐四庫書目計其所列謂秦漢以來逮今其著書不傳磨滅散漶而不可稽較文之不足恃言之無能為久長也豫曰亦賴有傳之者耳向使漢不志藝文唐不為四庫藏書輯目亦焉知古人有著書若是者乎是故司馬長卿無書黃憲不著書相如傳長卿已死家無書黃憲天祿閣外史明正嘉間吳人作然而世能誦長卿文至今思叔度者謂如子淵是豈千秋萬世前可授以口後可接以耳哉以文傳德以文傳功亦以文傳文也文之不能傳者衆矣吳江鈕鳬溪先生生明正嘉間隱于湖與山人孫太初者為吟嘆遊號五浮山人所著有五浮山人詩今其詩泯矣其孫孝亷君曽于萬厯中刻其遺稿而未甚著也四世孫斯來謀之顧子茂倫會茂倫撰明詩乘遂以五浮山人詩當乘詩之一且輯諸記載評隲以引其簡嗟乎茂倫其傳之者乎世不乏以文傳文如茂倫者獨是前人幽光子孫揚之豫固未能讀先世書然豈無先人遺集如山人詩可得當茂倫所傳者也聞斯來而愧可知已史書巖猶奕堂詩跋山居苦藿食􅦍噓非時一行作吏便倉黃簿書口絶吟歎書巗尚能為四五七言詩耶雖然書巗有摯性為親捧檄即迢遙祿養猶自抱歐陽閩人之恨故嘗發諸辭而一時驅蟊貯榖飫人澤地而外潘枝陶栁皆嘯歌也心間故政暇政暇故文富不猶奕乎遊歌自安勝所用心其謙之矣間嘗慕全齊之區謂一登泰岱下俯歷下可瞰今所謂白雪樓者輒藿食不逮書巖雖視已所歷猶奕然然既吏齊地則進此而翺翔六宇即一唱三歎但呻吟黃金白雪之句亦豈有量哉相溪外集跋相溪參公演法于湘湖之沚人共聽其法豫初過而惜之法何庸演與暨公辭湘湖㩦所著山居别記并古本大學一貫諸書丐豫為敘豫以公為不二門不宜立文字即立文字亦不宜遽及吾儒格致并聖門曾氏子一貫之學此與夫唱演教法更復有異而公且津津而不能已公嘗為儒矣少家于苕之相溪相溪文章為天下稱而一旦以兵革之後去家捨飾即就證無上菩提受寶壽師法則是公之為學其以繪而返於素非夫以素繪者也夫以繪為素而欲其繪之不稍存焉得與則夫公之居不二而僅為演法其猶非公之心夫集本名寶壽外録其名相溪豫更之韓燦璇璣圖跋璇璣規運也方則扞矣自蘇蕙以錦方行世而五代迄今僅有偽為規圖以為西來所傳者燦復多其字數極盡其致然則燦其繼蕙而興者與蕙錦若干字得詩若干首以有扞未盡讀也燦圖若干字詩若干首讀而盡之其字數繁簡讀句通塞則規簡矩繁規通矩塞理固然者豫嘗謂蕙不遇滔其遇滔也亦無不得志於滔則不能有斯錦向使燦不遭詘抑雖鬼神實好事亦不能藉燦有斯圖矣何歸三贈遺草跋唐人以詩制舉然流覽眺望贈寄簡答皆是物也文即不然窮年矻矻雖獨居一室猶若有刮磨勘核者伺其旁况往來贈答何所用之嗟乎使杜陵必以省試體傳而昌黎諸公必以禮部諸試文示之天下則三唐無文久矣豫讀歸三文自愧莫及即匪獨豫也天下之人偶見所作亦孰不三歎稱勿逮者蓋其為文譬則錢體成圜鈎形作曲總心機之妙而形為蒸變以故置思若連絲摛詞似繁露近之可代縞紵而逺之將託為英瑶金錯之用文雖非詩有詩情焉今世為詩者必歸杜陵為文者必歸昌黎而窮年矻矻乃不知昌黎杜陵之制舉有如此者詩云將以遺逺道吾欲取之為歸三誦也籋雲集跋籋雲文類有道者也其為言神氣散上入理泓然不習于世亦不喜為世習世莫得而名之豫聞籋雲居吳門時曾問字于文文起先生之門一時名士若管園雪楊維斗輩皆後先爭雄今諸君久謝去而籋雲猶棲遲人間布袍繩屝意興盡矣顧籋雲少時曾以稗官家作齊諧小説盛行當時及其既而悔之盡捐棄夙習一變其風雲抵掌之技故其文孤髙自行鮮有近者夫以談天滑稽自喜而至一進于蕭條間淡遊俠少年不事家生産轉而為置貯候時出物逐什一之利此其為利亦豈有過之者哉陽坡詩跋陽坡詩遊覽居多焉似非詩勿遊者亦其習也顧豫遊西湖無詩小至夜與陽坡集湖西幕陽坡刻燭授簡比之梁園之有鄒陽遊非詩亦勿豪能者豈嘗域于習耶昔者戰國多遊人擔簦伏軾而是時詩亡學士皆挾辨以行然而孟軻孫卿道古稱先雖習辨勿習于辨焉陽坡汪文節公後兄弟舉進士陽坡者宣州治中勝地也寄庵詩跋道人無所住著視世皆寄與張子生寄意同况其為詩乎故詩則寄之尤寄者也雖然道人啓不二門耻立文字雖曰寄不宜寄於詩何為拈五七字而吟之諷之曰子不觀草枝之寄於瓶甒者乎徑寸枯菀陶笵者不問也慧公詩不減休上人豫向與之遇天衣今寓靈隱頃讀其詩其為蹈丘山而泛江海者無盡也題曰寄庵然則慧公之所寄可知矣陳老蓮詩跋古有畫詩無題畫詩顔真卿贈張志和詩五首志和依其詩作人物舟楫煙波鳥魚以答之唐人謂李十郎詩畫人爭為畫是也元後多題畫者沈隱居另有題畫詩為一集老蓮畫多不題間有題者付之去亦無稿本薑綺季老蓮老友也與晨夕處遇有題輒記之久得若干首彚為一卷老蓮見之喜而為之序自豫選越詩付此稿來今二十年矣老蓮死二十二年綺季與豫各出遊亦不減十四五年友人有請刻老蓮詩者仍付之去世但知老蓮畫不知其詩顧陸雖無詩亦傳况有詩乎惜豫與老蓮交晚見老蓮五年而老蓮死乃不及為詩令老蓮畫之如志和也薑價人文稿跋歲九月與薑生渡江薑生出所製文稿請豫辨首豫視之清空漻然一何與秋之為氣殆相似也憶豫在暮春修禊山隂與薑生詠歌朝夕致歡且樂也其文亦率多是時所作今廪秋變衰登山臨水而文亦對之有寒色豫所為文大約多得之歲寒道路之餘他日起凍僵而呵之匪風偈車或得變觀如春陽大道天下事豈可料哉朱參藩文集跋自古文章以専家名者大抵無所倚藉自樹櫨構故亦有門户區分之論實則體雖殊而旨無二也昔人稱漢文如矩唐文如規大概或然嚮使詘賈朝為遊覽自足記西山鈷鉧有餘而起昌黎栁州日備顧問安見不足疏積貯陳兵事哉介庵朱先生分藩吾郡于受事之暇間為詩歌其于古無所倣而動與古合為文亦然豫嘗誦之宛如日月之麗天而江河之行地燦乎其離也浩浩乎無所區畫而坎以達也浸令先生者日侍承明其因時論議當必與西京諸子爭課後先即不然著書天祿石渠之間龍門扶風或轉為稷下而乃直指西北埋輪東南登車攬轡與天下蒼生謀治安事是豈事功之竒將與文章分位置哉夫事功文章倫不同而理同漢魏與唐宋文不同而文之旨同先生以事功兼文章其不為古文而自為古文亦曰兵事積貯姑待之以俟自見耳夫先生豈于賈朝有歉耶文社跋文之有社以文社也而世之社者不以文鄴下冠蓋梁苑宴集佚遊已爾夫文社非古也國有六鄉鄉有五社所以興行也今易行誼為文章既已非古而况行誼而文章文章而佚遊江河滔滔其有既乎然考之周禮司徒之職族師春秋祭酺書其孝弟姻睦與有文者夫文社雖非古然以族師敦社事而至以文藝與孝弟姻睦同類並舉則文雖非行猶興行也以之名社亦猶行古之道與里有以八子為社而字以文者豫既繹其義而并記以言秋吟跋江園二子詩既行海內其一沈君則大逺先生之猶子也曩從冠山寺壁間讀先生詩時小阮已噪于人至是始嘆為先生家學相嬗有素詩雖小道不授受不工也則又嘆先生懷才于文章無所不備而猶自吝于行世今年秋乃輯其為詩固請豫序豫曰此即先生之志也王褒曰蟋蟀俟秋吟夫方春載陽不能以時鳴及乎秋而啁哳西堂聽者每自深惆悵之私焉先生以有用之才乃不能乘時進為世用而秋而變衰當其時能無吟耶且先生授猶子以為詩而乃使猶子先行其詩豈非有所俟耶秋吟本二集今合行之月日某跋西寺語録跋居石頭多年而不知其路滑者衆矣况復得不滑耶世傳道林在西寺時王許決論嘗至相苦而道林從容解之因得不屈今至公所居正西寺也至公語比之林公天空爛然聚花而雨亦安有苟子元度之不可解者惜世無王許諸子因不得不語然亦幸世無王許雖有語亦不致相苦如當日西寺時事然則豫雖好辨聽師語一如聽無語語與默同并不知默石頭路不滑師曰滑豫終謂不滑可也北窗詩跋避世而行歌與避曝同故蔣生為詩名北窗詩有所避也昔祖士少企腳北窗得天際真人之想蔣生非真好間淡者豫與蔣生交有年見蔣生時少知蔣生浪遊人間能睥睨一切王侯貴人宜假其未盡之才得馳書巴蜀奏語南粵而兩未之見獨挾其窮巷寂莫咿嚘北窗之什豈真違時寄志者與生平慕班仲升不専讀父兄之書而乃徼馳驟之功以為名當此世而不急于馳驟徘徊行歌寧為固毋為超吾知其有所避已若夫詩之工則新思幻眇紬繹清則外似簡刻而中懷融暢近世好言詩當知之已𤾂遊詩跋豫訪梁溪錢徴君徴君亦訪友未還也其門有吳州程爚者嘗往守其廬豫過之見程生焉夫徴君訪友北行去其廬凡若干年矣程生嘗往守不忍去則夫程生之為人亦可知矣昔者吳州程柄者豫友也豫每思見之暨豫走瀨上亡名凡三過吳州不一留即或留曰我王彥也是以卒不見是無論不見也苐見亦卒不得道名氏不知為何人而爚者柄猶子也今豫得自道其名氏顯然遊于世而不見徴君也然而見徴君之弟子不見柄然見柄猶子是一見程生而且見徴君并見柄也程生年少負殊才嘗往來訪友所著詩滿筐篋今其來守徴君廬自皖江也乃輯其近詩名皖遊詩夫程生亦訪友浮沈往來而其不忘徴君廬如此傳曰溫柔敦厚詩教也又曰詩以導性情夫不忘舊厚也夫厚性情也夫厚有性情程生惟勿詩已耳詩可知矣西河出遊時大敬指壁間王烈名曰子名王彥字士方他日天涯相問訊者王士方耳馬生詩跋詩者藝文之一體也然能當于是鮮矣三百篇無越風而漢魏以降惟謝客傳詩至今他無聞焉馬生詩與謝客不類而慷慨激昂磊磊多氣其猶烏鳶採蕺之遺乎豫避讎乞食方思走莊浪嘉峪之間蹙蹙不得達馬生尊大人挾竒策歸河西軍凡燉煌幕府開邉略地必下馬草檄而馬生以少年趨庭萬里往來如平平此在強有力者所難為而馬生能之則其為詩豈猶然尋常掇拾者乎梵公書輯跋古今無相襲者不苐書法也而書法亦然王不襲鍾鍾不襲中郎即王不襲王也蘭亭曹娥迥然已顔公家廟碑與麻姑壇恆山蹤迹判絶即草書家若懷素上人幾見千文自序諸書有因仍者乎豫嘗惜董宗伯書似不能轉變各出形模而合萬若一至其臨舊書又何強也夫鷹化為鳩不為鳩也樂人抵掌而效楚相又不似楚相也夫弦匏以不移成拙而染夏以失染見棄兩無得焉臨清倪之煌曰昔無合手書宋人淳化帖贋成焉耳不如考金石而集之為當豫嘗疑其言今信之也梵公輯近書而有合乎其旨也故于其輯成而記之于端蘋書第三集跋少年與元公讀書溪山草堂爾時元公便為詩豫方習和之未就也及甲申以後豫乃廢舉子業稍效為呻吟然恨不能與杜甫同時親見其為詩今又稍棄去矣而元公方自示其所為詩且俾豫敘然後知向時溪山讀書之未易得也向不嘗為溪山吟耶泳魚于前池深林鳥鳴當雜花初生碧草環橋之際每為嘽緩慢易之音互相唱歌今兹所吟抑何噍于聲而殺于氣也杜甫好言愁摹畫悱惻而元公以甫之詩為其詩豫見元公親見杜甫矣曰蘋書言寄如蘋也元公逺遊與豫同而為文過之周秋駕閩遊咏跋求詩于山水而不得也求山水于詩而得之得山水易得詩難也求山水于詩而得山水求山水于山水而不得山水得詩難得山水又難也豫故曰隴人生隴上不知所謂隴上曲也即征行者過之隴水流離覩之生悲顧欲求其記一辭而不得也夫世之見山水者多矣惟不得山水故終無詩然或有詩而人之見之反不得山水故終無詩然或有詩而人之見之反不得山水焉周子遊閩還著閩遊咏豫見之得閩山水也而周子則先以得閩山水者得此詩不然極東南皆閩人也世之遊閩者又衆也來式如易占跋貧者賣漿值天涼讀書數十年而值亂離其情同也當斯時欲覆漿而不可也然欲衒于市而又不得也故其所言􅀈􅀈然不見條理蓋亦昧所去就矣然嘗見前人有卜居者心煩情敝不得自決是以極盡辭説而後之人讀其辭索其趣則其所去所就仍亦瞭然不失尺寸式如當亂世避兵野祠而野祠之人有來占者為解説與之占之以其占之為易解也名易占原其始由失所去就瞀亂則肆言其生平所盡見人情物貌佹僪錯雜而與裔裔焉而自世人觀之則吉凶得失其分明在言辭間其以是為去就者之所歸從矣易占初成合百章既成續二十八以六十有四推而偶備內外也自跋一合一百二十有九時順治丙戍越二年始來示則曰跋之已丑五月日跋顧侍御合集跋漢陽顧西巘先生言滿天下天下之推詩古文家者必推顧先生先生以其學進之蘭臺嘗冠豸冠按廣漢矣今又按吾浙白筆之外詩卷存焉豫因較之䡾䡾者先生之涉園集耶槆書耶滄然以深者山中吟耶豂然者以寫耶營營而後平既戒草耶摐金伐革峩峩然應制矣其燕臺手鈔耶揮絃于浮山橫水之間其清涇然先生探梅耶愛以健鵝城詠耶燭燭乎承明之庭內徴草耶諭卭笮以華文驅碧雞之膠膠則入蜀詩出蜀詩耶宫閨省闥山亭驛店搜殘掇賸録遺耶喟然曰嗟乎吾今而乃知顧先生也先生襟懷若白雪峨嵋蕭疏而意氣之發蜀江春水流灕四來雖簮筆臺端鋪張宏象而殷勤補獻之思勿釋焉故其遇于物如條風之瀏瀏于青蘋而放乎海谷觸物感會宏且多也古之論詩者莫如舜之告后夔其曰詩言志則性情者也曰歌永言則聲與調與氣與格也今之言性情者每遺氣與調與格而言格與調者則曰性情刁嘹耳先生豈其然耶昔有以雍州參軍為侍御史者曰御史供奉赤墀下接武夔龍先生以武夔之職繼夔稱詩嗟乎盛哉先生謂豫曰不可居吾部而不一敘吾全詩也因重為之跋月日某跋嚴中丞集跋天下無名山水而不竒者也且無神物不竒者顧亦無大文章不竒故山竒于華水竒于河人竒于神禹文章竒于墳典以下然以竒遘竒則竒益生如神禹導山水作金簡玉字是也中丞襄之竒士也少有竒行聞其撫贛南也有竒迹今既歸東陵又復有竒節懷竒如是故遘竒山水遇竒人而竒文生焉古云竒文共欣賞又云語不驚人不肯休則夫竒文者欣在是驚亦在是中丞之文得毋同我者見之而賞異我者即見之而驚乎而遇賞勿加喜受驚勿加恐則中丞之為人也集刻人作文誤少時讀漢中記記鴻都坂之竒謂峻崿千重躡萬尋之壁既已拔峰而登矣私意當必超隴過華而復瞻前嶺即又倍過之是真能言竒者吾讀中丞集而有懷是言修柏葉橋募簿跋春秋傳曰水涸而成橋王政也而釋氏以修橋為八福田之一故宋蔡忠惠造萬安渡橋矜為竒功而其間勒石記名即浮屠與焉下此可知已崇仁之有柏葉橋舊也南自豐淦北達閩粵以梯以彴而乃建于昔而隳于今輜車躊躇褰裳不前夫使黿鼉不能架而烏鵲飛飛銜尾而無用則雖周穆不足以涉荆而天孫至巧其技安施此釋氏之子所為顧斯橋而憂從生與夫釋氏之所以異於吾儒者亦徒以禍福之説有殊焉耳夫禍福無恆而釋氏徼福于未然儒者見禍于已然是無論除道成橋在先王之政固然而即以福田之説推之吾未見坦坦之非福而傾偃之反為福也况往來車徒繩牽木負利害甚析而瀕于害而不瀕于利古先王福善禍淫之説倘行于時吾必以是為溢禍之涾池也已崇仁縣令儒者也好言王道柏葉之修令實為政焉故于敘募簿而為之告之世之養福者共傳此文重修鎮潢橋跋光州兩城跨潢而北南貫以石橋曰鎮潢蓋隘津也戊申之夏淮西水災潢河隘而馳橋壞于水先是橋本比舟笮以濟名為浮橋費繁而濟緩且不測也有明萬厯年間守是州者始更為甃石而今兹之壞守州者實咨之夫兩城之有藉于斯橋久矣民以城為蔽城以橋為貫而橋傾城隔筋骸不通且古王不嘗云設險乎前者流冦之來實合兩城為守禦恃以無恐今未雨勿戒而烽臺相望臨河而岐萬一廢弛未復遇一旦有梗倉皇瞻顧何以濟之此非秦皇所能鞭而公孫所得據也苐昔之守州者創之于豐豫之年而今之守州者將恢之災荒之際則修艱于造斯亦攻築者所宜念耳守既捐俸倡而監州以下暨紳士助之於是載簿書將以記事而屬豫以跋跋如右任王備詩集跋王俌有三絶詩一書一其一則鋟摩之技也能扼三寸鐵畫石作八體書勢精良而結捷雖李程以下莫過焉然而王俌往匿其所能自甲申後間示書法莫見其所為詩者而至于鋟摩之技則折鐵詘指而閟不傳豫從臨川還王俌忽貽詩屬序豫得之喜曰此又一絶乎及豫翻較則見有所為漫憶者出遊詩也其詩多得之荆山笠澤之間以憶而得之故名憶有所為愁吟者東園詩也王俌居東園幽愁憂思積晨夕所感而鬱為吟則名愁吟今而後吾始知王俌之不欲見其絶有以也豫出遊無詩暨還舊廬其愁有過于王俌者王俌東園在郭東去豫廬百步爾其半在野垣之隤于耕者久矣中有陂塘雜花覆楹間豫倘久處此當日從咏吟其中王俌肯盡示其技乎吾將買一石使書是文鋟之摩之以與是詩而三焉浦東詩跋嘗讀唐人選唐詩自極玄又玄以外私歎今人稱李杜以為極則而唐不爾也唐人且不必神景與開大也然則世之必神景開大必李杜也愧矣浦東全君之為詩也為唐詩者也為唐詩而不必為神景開大之詩故其詩清而逺雋永而多致有似于極玄又玄之為詩焉雖然極玄又玄之為詩則中晚人之為詩也中晚之為詩夫是故逺乎神景逺乎開大也夫中晚為詩而遂逺乎神景開大則生乎中晚千百年後而必為神景為開大也愧矣建大悲閣募跋佛家以乞物為行惠之功故以物豫物而物無不利向使如來挂偏袒不施一錢欲以建祗洹精舍開利生之門不其難哉吳淞庭柏渡胥江來年已六十矣生平𢎞願祗期建大悲閣禮懴其中而遲久不就因丐豫一言以為善信勸豫思大悲懴者乞福并乞慧也合檀那之金錢而各報之以福慧雖愚且貧宜無不踊躍恐後者况以富益富以智益智人但知乞物而不知物之有乞于大悲吾未見有求而不應者也而况所求止金錢也哉不然庭柏年已老縱得建閣其為居幾何而謂庭柏為利已而為之乎是何所見之不慧與書何氏册子自跋豫不善書然似善書者以豫能言古之為書者也且識今之以書名者癸已寓何氏何氏自銘索豫書乃復出佳紙良墨且索且壽豫曰使以豫之書為堪此者也韋仲將曰得伯英筆得臣墨又得臣手始可大龍蛇而細蠅蠁豫則無以手也使以壽豫書蘇子瞻猶謂魯直不良不工書而得人之精紙良墨以藏錦袋必攫取之况于豫乎豫其舍豫書而貸今之善書者以償其謂之何曰雖然其跋之豫曰豫方舍豫書而又俾豫書之雖然豫懼夫他人書之而有類于洮之與汰之也遂書周雪山集跋夫登髙山者穹隆轇葛上之而栗一何其艱而及其習也遂遂然以御風行俯視岞崿猶波濤之洄澓于平地者也覺其瀜洽不覺其岨峿習夷者忘庳習髙者忘危而已周子雪山為古文辭率攢藂磧硌一顧萬里雖捫地欲就而雲關在望頓絶凌歷乃三休倒景驟接夷曠浩然若長風之信行羽翼之生肘遂遂然其為文雖自闢其境而盲左以下腐史以上時時就之左撫屹崒右絶澒湧此譬之登天台者冥觀萬象同體于自然昔人云皎皎之子自獨立雪山之謂乎豫夙慕天台雖相去止三四百里然未嘗一登故亦不欲言天台之竒及讀孫興公賦知興公作永嘉守時初亦未嘗登台也圗台狀而為之賦台豫然後嘆曰倘世人之知天台無過豫者方豫至海陵時未見雪山也雖相去止六七百里究未嘗一過然讀雪山集則又嘆曰倘夫人之知雪山亦無過豫者故人或詢雪山何似豫必曰幽回冥奧似荒忽不可近故興公亦云舉世罕能登陟王者莫由禋祀然而釋域中之戀暢超然之情既契誠于幽昧履重險而逾平天台雖竒不同體自然矣哉此則豫之知雪山者也王石庵墨園小草跋苧蘿佳山水居其地者率能比詞儷句咏吟自娛石庵其一也石庵與豫友來北沙遊北沙嘗指苧蘿謂此叢坱者幽鮮競爽如石庵詩今讀墨園草北沙豈欺豫哉作者滿天下源流蕩然能循流溯源雖涓滴未絶而不壅于波瀾石庵之以微而見之于其著也小草歉文耳就其歉而極觀之苧蘿其綿綿之網矣采山堂古樂府跋魏後擬漢鐃歌者皆易其義類更其詞轉變其音聲所仍者獨名耳今則襲其義而比其文短長而橅之故迄今無樂府即有之以古樂府為樂府無樂府焉夫詩為樂心聲為樂體達心者君子也徴聲為工故苟能達心則言之而促而舒皆能成聲必曰平陂有度三七有節是曲于阿工而反棄置吾達心之辭使漢唐以後樂府一變而為填詞不可慨乎且夫樂府之變為填詞也猶曰此變者也今直稱樂府仍填詞焉樂録云鐃歌數曲其文相雜不復可分也今必并其雜而故擬之向使晉人札牘必如今板碣之所摩則此以札往彼必不解此猶然結繩之世也夫樂府本于騷騷本于詩詩之義情阿曲而文昭晳蓋必有所遇于中而假以達之故其旨長其辭磊砢播之聲而聲成焉漢工能歌長短魏工不能歌三與七乎采山沈舍人所居名也舍人為樂府與豫説有契也故於其屬豫跋也跋之楊童子稿跋維則以童子隨二親遊四方其嚴親好結客車裝所稅即戶屨滿焉而其慈親則又以書畫歌詠應購不給微論童子失學幼未入孰繼不接于序即欲于都亭稍間紆徐執經而不可得也乃童子為詩駢娟好麗有慈親風而又時發其年少爭上之氣躍躍俊勇間為賦為七為歌辭為記為序隨所抒弄皆成章焉夫古無不學而能者而童子實能之童子其夙悟者乎漢曹世叔妻隨其子轂為陳留長因賦東征而其子之文至今不著今童子之母即黃皆令也皆令能文童子又能文見之者謂童子過陳留長矣夫以童子之才未嘗學問但加以年歲即以其文章詠歌遨遊四方宜無不足以自見彼四方之人習見童子未嘗攻苦為誦讀率能以文章家名世世固有純任天質而可以有成者質之不可以自棄如是也而况乎學之也九蓮山彌陀寺募造佛像疏跋金剎者佛之所居也是故五金布而像教生焉嚮使青蓮下承藻井銜之而中無華鬘之形容得乎山隂天樂鄉舊有九蓮山彌陀古寺中湮者久矣一聞師起而恢其剎紺宫梵殿鐘鼓鈴鐸重尋故常而如來之像闕如爰復為募之或曰佛豈在像耶且何處非佛而必于是豫曰否昔西竺佛生身長丈六尺而黃金色故後漢明帝夢金人丈六者飛至殿庭而然後迎佛則夫佛之入中國本以像也此如日在天然天下何地非日之所照而人構宫室必穿户鑿牖使各得其光以為吾室中之日如是且夫人有日見日而若不見有日者豈其目則不可見哉亦曰生乎心者觸乎目見固不在目也夫生于心而可觸乎目則觸乎目而不愈生于心乎一聞行僧也其專心像教似亦可信且其侣靜修與豫遊故乞豫言之若九蓮山山川之美羣山萬壑必有𢎞忍鏡臺生乎其間倘能略其迹而見其心乎則吾何必執像教以教之矣西河集卷六十
