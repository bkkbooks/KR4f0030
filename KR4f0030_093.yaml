body:
  text: 西河集卷九十三翰林院檢討毛竒齡撰墓志銘三誥封金太淑人楊氏墓志銘豫過秣陵金觀察署觀察每言其從弟孝以失怙事王母如其母往欲録賢節為王母旌而未逮也暨豫官京師觀察弟司馬由學士為豫官前遊時相往來倍知其從弟國學工文章善事王毋蓋晨昏冬夏無間焉越明年司馬授節鉞出撫七閩而觀察以致仕北還會其從弟承重居王母憂觀察乃為介持母狀來謁銘按狀母楊姓順天大興籍父鴻臚丞夢叟啖以松而生毋念金氏世婚相其諸子中有茂才君者以為賢而許之為繼妻顧茂才君高才通經術遠近造請者不絶于閭且意氣豪上無暇理家人事一切皆責之母母司鐍鑰啓藏室無錢貝啓篋無繪帛絲絮啓橱窖無粱菽膏膳充什器者苐所在牣圖史堆垜狼籍母大喜以為家清白不事封殖益勉勵勸為學會茂才君女兄夫曹君亷訪崖州以臬事重非茂才君掌幕記不可迎茂才君往而茂才君死母乃撫前孤一如巳出力教之以京師俗奢飲啄煩恐一婦持門户或不給乃遷之易水杜門絶囂賾謂可以教子且嗇費也既長子豐以翹關授北直馬水路遊擊管都司事封昭勇將軍死于官母撫次子復與諸孫皆成學次子為茂才有聲而諸孫鍈與鍹皆以國學授監郡向所稱孝孫能善事王母者即鍈也鍈嘗曰先君司漕時曾飾饗食製衣帔以進王母王母拒之曰我守寡存孤四十餘年食不甘口衣不文體凡以傳清白而揚世德也今汝甫自立而即以溫甜易我志耶其儉如此夫母以節為儉而為子姓者即能各行孝以上承母志可以觀巳母生于萬歷已酉月日卒于康熙甲子月日年七十有九以覃恩誥封淑人子二長豐次復孫五長鍈豐出次鍹次鑣次鏓復出次鎔豐出女孫一豐出某月日葬于某阡銘曰西京著姓曰惟金張乃其世婚惟潘與楊淑人緼德秀于閨房是以請繼得亞少薑截髮勸學陰教以彰况當訓子敢違義方惟此洗馬陳情孔皇雖無式閥尚覲養堂豈謂螭首作幽竁光慈亦無竭孝何渠央圖史千軸誰為鋪揚煌煌夜臺當識是章敕贈內閣中書舍人高君暨敕封孺人丁太君合葬墓志銘中書舍人為宰相判官入掌制誥與東館相表裏豫從編纂暇遇舍人高君與語君每嘆祿養之艱雇賃馬僕僦居三市傍斛水百錢致太孺人就養榖薄不給將仍歸故閭與兄弟家食者居所稱養堂安在焉豫嘗悲其言且為歌河上之歌以為詞翰不可近居官亦然既而高君以艱歸其明年豫門人蔡生君分校京闈所得士也持君札及狀告以某月日卜葬其贈君暨太孺人于其鄉之新堡村而丐豫志石豫聞君兄弟五人皆能以文章才技見稱于時其長君善文膺壬子鄉薦詞義風起蔚然為晉陽通儒次即君也君以丙申中禮闈試選授綸閣其在官精于書命有文帥之目諸季力學居學省見名而其一復出其餘技從甲子翹關升于司馬君之兄弟其各能自立如此顧一一皆贈君教之贈君嘗以身董訓不足延邑中之堪為師者經營槃槅辦朐䏞惟謹甚有粥太孺人珥飾以典膳者而太孺人亦兢兢其教諸子一如贈君之教之贈君嘗臥牛衣中踟蹰不起及見諸子輒欣然顧太孺人太孺人來前輒相慰每曰教子一經而已籝金何與焉其在今君方營葬事負土築宫而其所貽札痛悼咨嗟仍以家計庳薄無財不悅為憾且曰里居之艱艱于長安則甚矣贈君與太孺人之教之善也贈君諱登第字步雲祖千始占籍于山西太原府清源縣南鄉之新堡村父春生二子次即贈君君由太原府學生以覃恩敕贈徵仕郎內閣中書舍人而太孺人氏丁亦以是時蒙恩封孺人兩家望族同里居早為婚姻而贈君以康熙丙午冬先逝當次君舉鄉之歲與太孺人甲子冬卒相距二十年始得合宫于衣薪之藏所謂一與之齊終身不渝非耶贈君生某月日卒某月日太孺人生某月日卒某月日子五長聨元次聨璧次聨芳次聨璋次聨桂女一孫六女孫十二銘曰伊惟梗陽左恆右河踵于吕後在陶之阿方山孤竹施為女蘿誕作以室爰成厥家相彼丹穴曽生五雛各長羽翮蔚然而華鄉推國舉右垣是居以其餘駟為龍驤科今者壽堂開諸南谺金鐙有熠玉版可磨煌煌朱篆如螭如虯千鼂百昏尚其佑之台州教授何公墓志銘台州府儒學教授何公既死之四十二年孝子之裕之祚始以庚申之中春卜葬城南蜀山坂時豫居京師孝子馳使賫書狀請豫志石豫與孝子交三十年孝子每述其先人遺事流涕雖遲久猶能記憶其百一况四十年間鄉之人亦多有道者邑當郡上流而泄民無宿炊其所通官河則宋丞相史君所鑿渠也彼時以葬親逹鄞自便不顧邑形勢弦流而奔越三百餘年閩人陳君宰豫邑坊其渠枝之曲而南接水故道而後復北而之渠當是時築巨梁故道名大通鎮以浮屠而創三重之屋于渠坊之間曰文昌臺豫少時猶及見之顧誰則任其役者任其役者公也公産本殷厚而以任其役而破産之半乃邑東接郡西與北則襟江而扆海崇禎元年秋北海塘圮浸城及雉而汨夫城之室廬溺以萬計其明年西江塘又圮幸預備不為患然巳漂矣公請邑大夫力任經度修翰兩塘間甚至鎡肩畚手日出笥中金破産復半而其役始竣豫親承災患嘗與鄉之人竊嘆公隱德謀志之而未有間也既而會稽太宰商君以還朝夥頥取自便毁渠坊而行邑人無敢抗者夫人居鄉多相形相形則盈絀生盈絀生則盈者易矜而絀者必至于忌且又易較較則勞逸見勞逸見則勞者不甘而逸者必肆其蹈藉而不之顧以故遇公事而能任者少迄于今西江再三圮十倍他日而泄泄連歲至有取私決自便且致大壞而不之救者夫止一坊而邑大夫創之公成之然而權相開其先庸太宰毁其後止一江塘而鄉人築之鄉人圮之其賢不肖何如也夫四十年間而其為興廢如是也公諱汝尹字克言又字太衡由貢生授台州教授其先自浦江遷于蕭山數傳而有御史善永樂中效嚴助故事巡按兩淅又數傳而復有御史供奉世學則公世父也公端性豐頰善讀書以經術自命少受知于提學使蘇君以文鳴于時生平重然諾好推豫排解導地當世稱長者生于隆慶改元六月卒于崇禎十年十二月子四之禎之祺早世之裕之祚與豫友之裕讀書如其父家藏書數萬卷而自幼食貧曰公所貽如是乃系以銘銘曰公生七十年而侻其身又四十年而始就于穸與窀謂公才高而未嘗列陛而陳謂公擁世資而豫兒以貧公之生有利于鄉而既死而鄉人思之雖歷久而猶感于神曰此公之藏也而益以見公之為人誥授通議大夫江南提刑按察使司按察使金君墓志銘君姓金氏諱鎮字又鑣其曾祖諱杰誥贈光祿大夫巡撫福建等處地方提督軍務兵部右侍郎兼都察院副都御史由紹興遷京師生子四季諱大濓以君貴纍誥贈通議大夫江南按察使司按察使加贈光祿大夫巡撫福建兵部右侍郎兼副都御史則君祖也君父諱晉以君貴纍誥贈江南按察使司按察使如君官加贈巡撫進階光祿大夫與母孫氏纍誥贈一品夫人生子三而君次之少有夙悟與兄釴庚子副榜貢生考授知縣弟鋐壬戍進士由翰林院庶吉士纍遷兵部右侍郎今巡撫福建有三珠之目嘗舉國門大社四方名士集京師考鐘伐鼓冠蓋屬于路而君以兄弟三人束髮主壇坫觀者榮之崇禎壬午君舉京闈試領解會興朝搜京闈見舉者授以官遂于順治改元授山東兖州府曹縣知縣旋艱歸補河南陜州閿鄉縣知縣覃恩敕授文林郎併贈而是時巡按巡漕巡鹽諸御史交薦君改鑾儀衛經歷司經歷隨升刑部河南司員外郎奉詔陳言得優旨乃于康熙十三年進本部郎中會上方愼獄復矜恤之典分部使循行郡縣以君使河南恤刑自本年十月至十四年四月凡七閲月計所全活約一百一十人矜疑半之援赦又半之以是年秋七月冬十二月兩遇恩赦多肆宥回部考核紀録一次旋以覃恩誥授朝議大夫併贈遂于次年轉河南汝寧府知府時淮蔡多盜兼無年民田荆榛道殣千餘里前代真陽西平諸遺蘖根株未清往來雈苻間而新蔡李樊與泌陽郭三海據平頭寨相結以起民爭逃村墟丘落皆虛君一意撫字除苛細下墾土之令生聚教訓示民以自新取為政去太甚一語書之訟堂而親統鋭丁勦李樊除其根株一切勿引蔓會清理藩産躬驗丈尺而海上投誠兵適安插真光之間凡開屯升稅極意調劑令民兵相安至于興利除弊及一切津梁祠宇宜毁宜復者皆受整理當是時君勤于簿書每夜垂簾㸐二炬于槃屏息刮目左右伺户外耳察蠮螉移時聞內有扣奩聲始搴簾入晝接民事與男婦對語絮絮若家人子顧好禮名士東西往來投刺入吐食跕屣迎之啓傍院宴飲貺贈日不暇給豫嘗過淮西館豫于署堂躬率諸子設厨食撰捧衣履為豫治裝歸而未有厭也夫人牢落去鄉里望門相投惟恐不得當而為之主者見挾刺前輒撝去即或不得已行人請介為之一禮接而顧盻他屬詞意多怠忽既退而無復有餘思去而恝焉比比也夫是以所至落托至有困道路不得歸者然則君何可及也君治汝十六年以覃恩誥授中憲大夫併贈而巡按巡鹽諸御史與總河部院俱有薦乃以督催所墾地暨徴輸有效加一級共紀録三十二次會其弟補河南布政使司布政使君回避改補揚州知府值撤藩兵變長江上下風鶴相驚而維揚適當其衝城中相震恐一日三徙至有爭門而奔者君力為慰諭且以威怵之始安然而兵馬驛騷君處以鎮靜嘗招名士遊宴修復平山堂作文誦之乃事治而民得不擾遂升江寧驛傳鹽法道副使遽以優薦兼署鹽運司事升江南提刑按察使司按察使以覃恩誥授通議大夫併贈值大計入覲召對令敷陳時事時所對有二其一請定盜案嚴減之例謂江左連年災盜賊多有三載之中題報八十餘而其中飢寒逼迫可減者衆如一時窮困被誘並不傷事主或得財未俵分或于事主家雜取棍械護身原未嘗携帶器仗皆宜敕部分别量減永為定例至捕役營兵豢縱勒財以致先取贓物然後報官甚有指稱打點代行錢令行劫償還是盜有時盡而捕盜之盜反無窮也如此得實宜從窩盜律一體重擬則犯盜者少而民得安矣其一請定旗下買人及獲盜審訊之例謂江寧京口二旗買人多有無籍者自立賣契旗主但送上元江寧丹徒三縣用印而並未行文原籍察其真偽多有展轉掠買而不之知者嗣後請三縣用印官將所買之人申報巡撫巡撫按季報部隨即行文原籍出示招驗其有可疑者令旗主還契追價其用印官不報照新例治罪至于旗下逃人奉有承審官夾訊之例獨旗人為盜被獲難以刑訊其狡賴展脫將何底極嗣後旗人為盜倘夥證甚明贓仗已確許承審官徑行刑訊則姦宄畏法而盜風息矣疏聞稱旨時君以足疾被議上不聽敕令回任然終以勞勩筋力小敗至明年引疾又明年卒時康熙乙丑十月十二日距生天啓壬戍十一月二日年六十有四配何恭人山西平陸縣知縣幼卜公女子三長夭次敬敷官監生授北城兵馬司指揮候補主事娶胡氏誥封四川提刑按察使澄宇公女都察院右副都御史貞巖公妹次敬致官監生候補國子監典簿娶王氏文學德公公女巡鹽兩淮監察御史千里公從女女四長適奉天府府丞定菴薑公子坦次適山東肥城知縣廷處何公子琮次適明宇陶公子鞏縣縣丞頴發次適衡州府知府愼伯談公子宜振孫四兆璋兆珩未聘敬敷出兆珂聘黃氏廣東海陽縣知縣崑瞻公子乙丑一甲進士翰林院編修硯芝公女兆琚未聘敬致出女孫一許字翰林院庶吉士芷岸沈公長子敬致出君性厚與人以和而好文豫在淮西時嘗索豫書唐淮西碑欲以韓愈假文昌二文並勒隂陽面假文多誤字未較遽去及君還籍邀豫于京邸距向勒碑時一十八年尚道其較誤諸字一一指數之而請豫為跋當其為觀察公家事了率子敬致築樓于秦淮之濵名餐勝樓聚書其中以自娛至是為豫道其事兼請豫賦之未有以應也曽幾何時而君子敬致且述君遺命而遽以志請嗚呼可銘已銘曰嗟君之族肇于西京奄至寶婺三賢以承由越及燕從再遷興蕃如椒聊大以鶺鴒獨君歷仕克用明刑始自欽恤終于亷平以故敷奏庶云得情蘇公用譽釋之可稱乃以清談得江左名修禊汝水張筵蔣亭一時佳士如鶩斯趂人生適志交遊足矜不見鳴鳥尚求友聲今君後嗣如螽薨薨彼家人事亦又何營我思良友爰題佳城念君冠珮于斯藏焉西河集卷九十三
