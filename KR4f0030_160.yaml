body:
  text: 西河集卷一百六十翰林院檢討毛竒齡撰七言古詩六題畫薰風乍起午夢長石榴花發薔薇香枝頭好鳥最宛轉啼破一聲枕簟涼誰持并剪剪江水繪出青黃與紅紫醉卧間亭日墜時幾度含毫思無已奉和葉掌院夫子亭下雜花原韻先生有亭最爽塏倚檻如坐春風中况當三月艷陽發夸條蔓枝匝地紅綷䌨不用金錯翦􅀈韘豈與凡葩同始知大匠貴自得巧者不若拙者工有時薄醉坐花下門紗旒裂遜馬融豈徒紛紛隔階覷宛若女樂填廂櫳裛衣發藻光愈燦搖砌擢秀神所鍾寧題丹棘作野客不使翠羽稱殊翁論化羞比漆園蝶吐飯偶集蒲盧蜂情間有觸便生興道大于物何不容長安花少客無賴蒔場藝圃真難逢但留階戺一顧盻煌扈安辨淡與穠子房門下多薦逹當時尚有東園公和理椓杙歌并序卓㚤閩中僮徽之曾與之渡湖思不可得王雙白言見在金陵儀鳳門能寄之徽之起製歌令王歌授名曰理椓杙因而屬和言卓㚤當理焉只在石頭城下住莫過長干小橋去但恐年年細草生不識青溪舊時路桐花綏綏夜雨多三春又盡花如何可憐同在罝罘側猶自城頭理椓杙雙珠篇有敘頴川鄰宣公晚喪子哭之哀然曾用佛蓮花經一奩供楣間至是還經甡以內家過慰並為文祈之逮再過公褓一兒攜一兒出拜曰君記之乎舉此六齡矣誰家老蚌生雙珠大秦明月皆不如圓泉璧水産有殊老翁垂白多根株前年恍逐隋侯趨今年又入鮫女廬小珠焜耀照里閭大珠灼灼盤中居暮年有子稱商瞿我翁得此豈晚乎畢逋共哺頭白烏龍門百尺孫枝扶老人得子草得荂况復老健強肌膚漢家禱嗣張玉弧靈池百子宫臺孤採蓮西海蓮未枯蓮花今且開東湖雨餘花底珠漊漊羅三行有敘羅三百駢杭州教歌頭有稱名甲午集紹興東昌坊羅三率孌童十六人按歌酒酣執酒起為壽慷慨言曰羅三非優人盍贈我長句歌使人知羅三苦沉淪也甡唯唯乙未復集紹興九曲里祁兵憲第諸伎畢奏羅三復引聲乃悲懷激揚顧笙笛絃索均失執歌竟為言寧得憶贈句乎甡時頗失意聞其言感動驟起援筆丐兵憲展絹憶唐元和白居易與元稹作霓裳譜歌惟恐湮失歌句中且藏譜數猶可按切影響今亦略溯緣要便可尋按故益多曼吟耳周秦以後古歌絶漢代延年尚能説逡巡魏晉中再亡杜夔左􅗬徒倡狂開元神武興法曲高頭教坊譜相續華原驃國雜甘涼立部聲喧坐歌促金元起創㸑舞辭因之變伎歌參差九宫分譜限南北一十九韻音調微明興一代本無樂鼓吹鐃歌苦交錯優伶㸑弄習轉深南曲浸繁北浸落相傳南曲始吳下梧苑風流宛如乍吳儂創調潔古歌翻出新聲美無價當年絶唱稱崑山松常折嗓浙齒頑張藝朱美魏亮父至今嗣續猶艱難杭州羅三重意氣誓欲尋原奪高第攝聰絶慧通鬼神一雪從來品題異依聲按律節奏竒宫商相接復相離涵融便捷鶯語澀急決噭嘹鶬鳴遲聲沿板定寸為􅠊韻七字三前與後新生故死黍粒分迫度緩稽肌理輳一聲將發坐客定數變將終動神性流離遷客涕泪傾窈窕新娘怨思迸搊筝摘阮徒自豪吹師失管絃工逃吳中談如并張燕到此不敢爭鳴號東昌坊頭合歌板首坐毛甡泣何滿哀吟失職貧士情那問終趨共前緩羅三歌罷拉瑶瑟手把金巵揖甡出自言不是尋常人耻作當年李協律生平好酒名酒徒結交滿座皆屠酤上之不屈古王者其下詎嫌今大夫千金散盡獨長嘯故作歌吟雜啼噪孌童十萬蒲伏前不足當豫日調笑毛公落筆能有神悲能寫哭怒寫嗔貌豫令豫使不朽至今豫作忘言人昔年聽歌及寒食桃花滿樹風前拆歌來倐忽又一年今夕聽歌是何夕今歌既歡且復苦坐者停聲立停舞寒蟬數弄咽栁條孤雁一聲墮江浦洞庭秋風剛葉下去春在晝今在夜霜繁露白月欲明竹斷絃弛鼓初罷宛如花底摘生葉少婦繅絲自成節嚴鋼鍥處銀鍔涼冰甕開時水晶裂又如石齒決金薤刓核吹蘆擘風籟屏高燭短坐嘆愁昔日梨園近何在蹉跎相失淹嵗月非我能忘棄前説我亦沉淪年又年憔悴相看總離别東昌坊裏九曲園高車駟馬填前軒聽歌滿堂勿相問此中惟見毛甡寃毛甡沉淪本無極那復羅三又失職羅三當復歌此歌莫道聲繁歌不得憩螺川胡推官虞胄過訪因贈策杖登嵩高遙望天中山羽翼不得前薄暮空來還南行入匡廬逝將上衡嶽浮舟渡螺川遂憩川上閣螺川濯濯古司讞山木清秋曉行縣云是天中馳檄來知我窮愁且來見天中岞崿産異人振衣獨對清江濵宛如嵩高上登日鬱然相望真嶙峋嶙峋萬仭動寒色玉井冰花映天白不向空廳列鼎書長懸孤榻留行客我曾讀君文嘆君似長卿金門獻賦後當入承明庭今來江上作司理讞獄如君復有幾伯始從教博似雲胡威只是清如水越人久作汗漫遊橫江又見紅螺浮清秋一飲郇公酒醉看朝霞江上樓題秋山讀書圖送舊京鄒山人還紫微兼詢沈耕嵓徴君晨星漠漠東陽路斜傍雙溪晚來渡耕嵓何在高復高云是秋山讀書處秋山嶻嶪跨紫微相看同著靑荷衣王孫逺道怨遲暮春草欲生歸不歸題抱甕丈人濯足圖為顧有孝徴君君不見彭城畫工有竒技薑肱擁被終咨嗟又不見華陽高士善圖畫籠頭齷齪空隨車羡君孤處笠澤中世人誰得窺君容儼如岌岌千丈深巖松置之茅屋長蓬茸吳山之長水之冽浩浩溪流白如雪瀠薄高隨萬里風沿洄皎帶千山月君來抱甕畜畦水日傍清泠思無已新蒲早薤紛渺瀰碧芋青蔣覆溶㵝躊躇落日猶倣徨頺然濯足清溪傍觸崎激石共奔迫浩歌睥睨投滄浪瀟瀟隱見溪流長醉歌行同周司理令樹飲于廬陵作贑江冽冽吹朔風司刑官艦沙棠紅廬陵古署倚江郭漉酒夜傾花樹中中原才子薊城傑佩劍爭看截鏐鐵草屩牛衣共繡茵銅槃獸火飛寒雪司刑自言苦志乖江高不道能重來秋鷹脫臂朱電削神鯨掣浪青天開聞言坐客醉起舞我亦哀歌勝梁父紞紞城頭夜漏長起視明星落如雨謿胡東嵓被竊詩并序甲辰首夏胡子東嵓從郡歸夫何暴客者伏隱東嵓之室竊資以奔西河毛甡聞而笑之曰東嵓有十盜而無四封向氏探其前而司厲不得揭其後東嵓殆困哉雖然銀船雖化鐵公尚存篚篋久罄何曾豫壁間之兒杼柚其空不能贈梁上之子幸青氊之未亡何赭衣之可問所懼者未揭篋而縢已絶甫穿牖而垣已頺竊裝者祇覆其書懷璧者但看其舌似兹寠士之形將來主人之憎于是慰其薄失而謿以放言東嵓先生家四壁夜有何人壁間匿杼緯機絲總是空瓶麻罌菽悲無色從來胠篋羞擔囊野廬賔客徒相翔但將國士虛無意説與河東王彥方雨夜斷橋聞笛聲和丁起曹楊花飛飛落江渚蘇小墳前夜來雨平船兩槳何處尋東風吹落楊花深前湖水滿欲歸去草暗裙腰濕花絮斷橋西上繫錦舷何處一聲徹雲路初疑江徼吹胡笳旋聽索索箏琵琶野塘無復折楊柳春山自有落梅花咿啞水靣斷還接反覆分明訴天末龍吟潭底水淺清鶴唳寒灘雨嗚咽紅樓高對十二重夢回三峽流漴漴隴頭萬里碧天外武陵一曲清宵中我聞桓伊夜吹笛愁煞清溪赴都客扶風夜聽洛下吟尚在平陽里中宅杭州千頃西水頭新聲吹出伊涼州樓船簫鼓日無盡長笛一聲愁不愁贈商繪商生太宰之幼孫風流卓犖隨諸昆珊瑚寶鋏映明月蘢蔥佳氣開朝暾永恩樓髙百餘尺旦暮登臨藉遺澤玉樹還榮謝傅庭朱衣自繞韋公宅生裁二十意惘然蹉跎深悔終軍年手持一編已了了心中萬事空懸懸自言少孤遘荼苦雛乳低飛罹網罟析理難教兄子知無才不為家公數輜軿冠蓋耻追逐日對遺書冀能讀池上需為彩鳳吟燈前私啓青箱哭我之從遊商雨臣王孫矯矯其兄倫慚豫不盡柳下學多君猶慕相如人從來琥珀謝腐草惟爾中情最堅好縱使成連到海難却憐侯氏求玄早君家兄弟定無敵良友為龍驥為匹荀文未獲侍諸宗商子終當棄三術丈夫有志百事能少年何用哀無成高樓百尺且長嘯會看萬里風雲生留别劉琯兄弟昭華兄弟雄楚州一時藉藉稱諸劉論文偉麗過鮑謝興酣意氣凌王侯西陵遊人看秋柳邂逅逢君大淮口拂麈高聽真長談刳匏直飲公榮酒層冰落落解棹歸嚴飈吹折黃綿衣他時若問江南信只看春鴻向北飛别戴大金黃大世貴淮隂城南有飛雁遊子窮冬返鄉縣雪滿孤舟戀戴逵波連千頃思黃憲寒風截截霜滿裾臨行出入還躊躇傾樽不盡此時語開緘頻訂他年書淮流一曲下江滸渺渺長帆去西楚何處思君最愴神三月江南楝花雨送沈九嗣笵同薑啓赴都紈綺遊上京翩翩盛裘馬丈夫貴立名飾志取相下懷珠恐迷時抱櫝以待賈所念在得朋唱高和靡寡徐樂論甲兵歐陽䇿風雅歐陽受詩章句成上書欲共嚴徐行漢京力學五十士惟此乃得當賢名扺掌不為辨士策拂毛直作驚人鳴三街九市五衢道列轡聨車並騕裊時向尚書省裏行誰來丞相門前掃我本羈遲子羡君似飛鳥橫雲一去幾千尺送汝將行動顔色江館留題夜火紅揚州去路春衫白桃花初開柳葉新春江細草波粼粼作歌當飲餞欲别還逡巡到京若問嚴生薦勿道行歌朱買臣古歌酬贑南嚴撫軍過訪挺之抱偉略武也多髙懷悠然滄浪興却遇子陵來子陵汗漫走荒谷越女灘頭種山麓衣懸貢野春繭絲目斷湘南舊叢竹手把長竿生鬱孤城頭啞啞聽啼烏仲秋既望得蕭行人嗣竒訃適向陽將歸過别各抆泪哭以長句并寄孝子荃以使者行促援筆煩亂無所次序八月既望白日微坐客向陽將逺歸為言夜夢頗凶惡故人信音傍烏鵲荆門剝啄野花墜忽傳合肥訃書至行人蕭君六月死有子哀號數行字白日在上客在前分明絹素疑雲煙星軺曾餞廣陵驛回帆寧返浮槎川詢之四月乃還棹五月居廬病難療太君先赴白玉樓痛殺王戎死親孝天乎蕭君君果亡行人更作修文郎顧榮璧軫已推絶庾公玉樹真埋藏生平有心感知己邂逅曾逢故都市鳴驢動地幾失聲化鶴沖天恨無翅遺書數簏過孔融嘗吟君賦秋風中桓談自能惜遺軼平原何用憂窮通但道棘人漫哀毁扶杖觀棋鎮爾爾我欲貽詩寄慰言使者旋行不移晷中心煩亂寫無句頃刻封將泪如注欲晰當年知己心更問將歸向陽去黨太守挽詞薤上露一何晞城頭望烏欲飛烏飛不飛呌將曙月落城西白楊樹不見車驅鎮海臺但見旌搖汜橋路汜橋西去江水清翦錢懷送何為情舒城黃母胡太君挽歌辭有序夫謳來斥苦莊生引紼之章歌在挽留漢史吹簫之節則辭銘未盡藉以申哀碑碣難忘用彰遺德無他母儀已極顯融史誦必開幽竁也黃母者龍舒黃畏菴先生之母平子先生之大母也閥閲攸傳本嫻家訓英華所鍾餘及閨則故謝家栁絮詠之庭前姬氏葛覃習諸壼內不惟扶風之誡旦晚堪型抑且德曜之光後先難紀宜乎經貽子而有丸熊之風硯與孫而具戴鼇之慶矣乃當先生出宰西陵憶太母咸來湘水潘郎西去共傳板輿御母之文曹氏東征猶有農野安民之句雖萊蕪介吏貧自生魚奈潯陽哲幃力能封鮓以故人之稱之者可謂使衆以慈而已之推本之必曰伊豫有母無如月蝕中閨星流古署玉棺降于鄴下白帽裂之南徐陶侃自亡母潯陽二客欲沖天安石未還山江左遺民如喪妣故既禮奪苴麻節哀邳國權移金革屈職山濤然而靈旗搖曳于江令之祠丹綍牽援于許公之宅龍門雖逺芻前奠酒多人馬鬛未加石上留題有字返舒江而會葬發哀者定多武昌名士之車渡浙水而停綏留殯者豈無杜曲驚人之調况乎洛陽賈誼久著膝前江夏黃童並推孫子歌鹿鳴而嗣服騁龍駒于再傳是則百藥因大母命名文若以小孫起譽猶且心摧洗馬不育于母而育于劉腹痛元卿不慈于親而慈于祖四齡哺育口授毛詩十載艱難躬先顔訓彼撫琴長慟本多罔極之思乃負栁將歸又有陳情之請則仁人孝子安少蔡雍罔愧之辭曉蓋晨輼可乏袁子難行之唱哉因作哀歌各成長句塗車且勿行芻馬且勿追勸君搖大鈴聽我歌挽詞君不見尸鄉從人惜朝露白日婆娑郭東路又不見潯陽處士怨空水湛湛春觴夜浮緑人生修短安足知芳名要在能留貽不見舒城黃母今還歸輤帷縹眇江之涯江東士女咸哀思不減伊吾執紼為歌詞問母何以竟得之母之扶桐倚車者曰蕭之父母躬導親輿蒞兹土墨綬垂來挂綵涼清泉煮就遺羮苦方春山縣花滿堂後庭有母來稱觴冰魚自貯雕盤獻綵鳳還銜紫誥翔雕盤獻膳接晨暮綵鳳飛來倐飛去人云東海亡所師我亦西州哭何怙冡孫平子對我説四歲慈幃舍呱嘻情苦難教李密陳心慈早為元卿竭流離十載兵革間旅茅斷舶荒煙寒毛詩口授甫了讀蜀帽手縫猶未安我思太君初太息更復聞言重唧唧賢哉有母長若兹萬載千秋似一日君不見將歸召父不可求一時臺使爭相留又不見膝前孝亷最憔悴不作陳情亦流泪為商生贈吳太保詩鑑湖八月秋水融金塘十里青芙蓉越中遺老盡耆俊其中尤健推吳公吳公少小射猛虎羽獵曾經負強弩奪得翹關第一人望重燕城數千戶金書鐵劵纍代傳中朝司馬前名賢紹衣兩世公再振鉤陳羽衛相盤旋東宫出傅長宴見至尊復召南薰殿晚食嘗餐䃾帳糜朝陽親賜雕輪扇豫之內舅公難兄同官先作金吾公公之難弟懸豹尾侍御南臺掌文史鳴珂舊里三棨列相見還留半牀笏悠然故國山澤肥共返金塘看新月沉沉甲第繞鑑湖花間畫戟垂朱弧酒酣耳熱尚拊髀青天白眼誰吾徒生平負氣喜壯節每嘆袁絲少竒烈信陵何處訪夷門越石終教解縲絏公家事業留史編公家世緒長聨綿獨難志節永皎皎秋霄健翮爭攀騫君不見芙蓉八月鼓蘭棹七十吳公似年少古薊門行少年結束從邉遊腰懸寶帶金吳鉤新隨強弩出懷衛躍馬欲行雙泪流青天銀鶻渡榆水昨日羽書來薊丘烽煙四起塞垣動朔風一夜關城秋燕兵索戰破紫嶺漢將近前踰白溝此去定追朱鬛馬臨行不換黑貂裘但隨強弩後何日大刀頭羽檄起疆場神兵下朔方誰言無所恃大將出中堂驅車揚風沙拔劍銷欃槍北經月支窟西扺樓煩王薄暮宿南亭朝行過東光戰陳踰驃騎軍營作護羌寒風效矢急白日同沙黃殺氣薄寒鐵敵運猶枯楊可憐流蕩三城戍復有招來六郡良突騎不收司馬節擒生羞逐羽林郎採花判結于闐女醉舞新成石國裝但教塞外春風發那道城南秋夜長西河集卷一百六十
