body:
  text: 西河集卷四十六翰林院檢討毛奇齡撰序二十三馮司冦見聞隨筆序見聞隨筆者司冦馮先生所著書也一名兩渠傳大抵紀闖獻始末而二賊分列尤詳于獻賊入蜀暨夔東割據以後蓋是時神州陸沈天下之能言其事者寡矣會天子開館修前代史書詔徴獻賢所記識者在京朝大小了無一應獨先生所著裒然捆載為一時所未有夫西南之變亂極矣自茶陵喪師蠶叢失守夔南萬里喋血者數十年而先生歷仕適當其地由推官以至巡撫中間所厯瀾滄路賧山川風物傍及古今興喪得失之故無不托其前聞而驗所近見即記載附會必從考核辨定以取傳信故先生之書其為前史所取資者叢薈無算而是書其一也豫承乏史職􅍐題給札適得土司盜賊諸傳因獲盡讀先生所著書知先生留心國事所在詳審諸凡廟算曲直戎律修短地勢平陂技擊疏核征繕堅隟傳發紆促軒軒乎瞭若指掌至若野稗之訛舛評隲之偏頗抑何其考析不憚煩也自漢唐迄明代有盜賊初不過販鹽撒豆呼狐盜驢如刁子都瓜田儀許生吕母以逮青犢白騎長垣寃句之輩究至竊地僭號貽禍數世亦云已劇然未有琢喪人國痡毒萬姓樔揃血肉屠殰胎卵如禽獮草剃焚山竭澤似此甚者此本循蜚以來一大混沌而巖廊乏䇿閫帥失制一切簡稽搢挺號矢撝奮不早為撲滅坐致此極而中外大小合一時八比之士旦暮以門户齮齕狺狺嗷嗷以至于敗亡而徒使有志君子把筆流連咨嗟感嘆而究無如之何也後之讀之者可以觀矣張邇可蕉園詩序隋唐舉士合經問詩賦為一自宋熙寧間議罷詩賦祗以經問大義舉試而後詩賦經義劃然為兩然猶有二場詩賦四場子史之旁及於經義論䇿之外而不謂明制盡去之也蘇軾嘗曰楊億以詩賦入官使億尚在則忠清鯁亮之士也孫復石介通經學而迂濶誕漫不可為訓夫自唐迄今其以詩賦為名臣者比比是也詩賦何負于天下而必欲去之旨哉言乎豫與張子邇可以經義投契者二十年邇可為經義輒踞髙勝眇然無倫輩其試文行天下天下人慕而效之豫嘗謂使仲尼以經義設科則邇可入室當不在顏閔曽仲下而進取尚有待也今邇可忽回筆為詩賦取唐人詩一册遍觀之既而復遍觀宋元明之詩落筆為五七律為古詩汗漫酬應皆入微妙同室居者不知其能比聲能押韻而同學二十年為文章並未見其有謳吟諷嘆形于筆墨而一旦信情揮斥裒然成集鄉之老師夙儒皆瞪乎其後拱手甘讓邇可而邇可直溯吾鄉先哲若秦系若張經者而踞乎其上邇可其文之梟雄者也邇可曰吾早嵗食餼雖限年亦將貢于廷矣吾不能仍以經義與諸子問長短明年待我于公車門下子盍論我詩且序之豫思明經進士同以文售或詘此伸彼各有時數然總為經義已耳今則止此二途矣若制科所以待非常之才舉不可再邇可安于一途何莫非文章之驗顧邇可之意則以為經義品目恆不如詩賦之通則以經義之品目在內詩賦之品目在外經義之品目在一人詩賦之品目在衆人夫品目在衆人則公在一人則不公在外則公在內則不公邇可之舍經義而為詩賦亦將以求諸公也乃邇則欲向京師以行其詩夫京師為文章之藪非明經進士則制科人也豫赴制科時邇可為詩送豫重以茂陵多病莫頌子虛為囑夫豫本弇鄙不能為賢哲導揚即使能為導揚而既經制舉則詩賦經義去取一例豈無金玉在前兩目有異賞賢能在朝八統多畸視者又豈無雞斯之馬其來有時襄陽之詩其稱有數者又豈無衆人之仍如一人在外之一如在內者邇可亦惟信之于天下之通與後世之傳之者而已矣江上吹簫閣集序江上吹簫閣集者為真州汪君學先作也學先名家子弱年以文字為贄得麗人揚州綺羅珠玉兩相晃曜四方過之者則于是有投贈之什今集中所載是也特是麗人才士未易解后即解后亦定有造物焉為之媢之況千金買笑價重時年成都貰酒無俟典裘為歡娛此其適願有異于尋常什伯者則因而賦之固所宜有顧其事已往矣學先來明湖重出其集以謂豫序豫視學先年甚妙方照映巾飾而其事已在十餘年前即集中所載多老友半已雕謝展卷一過不覺三嘆況豫在長安亦曽以豐臺芍藥泣綵雲之散今頽然就老驟得觀斯集以觸􅔊于懷此如霧中看園花積雨後見初日之出于林病起泛舟老人相對説年少時事盛夏焅熱中望長林鬱鬱于清泉之上雖欲不見獵而心動焉不得也何氏宗譜序蕭山兩何氏一居芹泥橋一居城西崇化里兩家皆廬江之後而源同派别其在明代則皆有御史臺世其門而俗稱何御史家則惟城西何氏當之豫從祖教諭公為芹泥何氏贅壻而豫大母則城西御史公女孫也少時大母嘗為豫言御史公復湖事感激流涕暨豫稍長作蕭山三先生傳則御史公之子孝子公居其一焉第其家式微丁衰祚涼乘輪之後降為草衣豫歸田以來偶以訪舊過其家詢從前衍系悉漫漶不可考悵然而返今其裔孫長仁搜先代遺譜力為修復較其闕軼而補其未備裒然成一集以請豫為序豫思城西何氏自宋南渡後歷紹聖咸淳諸朝顯仕六世皆以科名爵秩榮于時即在元代猶有以祿養為世稱者乃入明三世而御史公父子即又以非常名迹振踔鄉里爾乃繼述寥寥遽至中落豫初避人歸早已為孝子爭鄉賢之祀直揭臺使送主入學宫以為盛事暨入史館即又探孝宗實録討其所記孝子事為之立傳頃吾邑無賴仍跨湖塘以圖侵占而豫以景行御史公事挺身爭辨得復舊迹雖曰何氏者豫世所自出然亦以邑有前賢則生其後者當觀摩其行而表章其迹故如是也況為之子孫而聽其沈泯而不之顧豈情也乎後之為譜者其亦視此焉可已李侍讀卧象山人集序往豫來京時慕諸城李漁村之為人既而從李學士師宅誦漁村所著卧象山人詩愛之又既天子試郡國所舉文學漁村在選中因得于是時交漁村且得與漁村同受館職且同入柱下為史官乃嘆漁村非常人今之人未有如漁村者也其為人慷慨厭世苟薄以龎達自居其與人交不沾激戀戀多布衣歡其視得一官如贅疣之附于身而獨以文章與山水為終生簿領嘗思卧象山不得見對酒躅足曰吾嚮入卧象視如室房每出一步數顧若辭家人然今羈此有年惘惘然使我為無家之客何哉昔元稹在長慶中與白傅齊名其為文無以大加于時人而當時推之上自王公以下逮妾婦牛走無不誦習其所為甚有假其文以賣于市者漁村文過人人亦以此知漁村然而相顧豪許卒無能拔擢出衆中申其特達以超于恆見之外是豈今人之善嫉與毋亦燕見習處狃視而忽之實不知其文之果可以禪後于今何等也吾聞卧象山為諸城勝地分九仙之派而别為岑扈與琅琊諸山相表裏然而洪荒以來未經翳剔而漁村實開之一似巨靈之所劈而五丁之所鑿者其自題為卧象山人以是也夫山水久在天地孱顏相望與人境未嘗少隔而荒忽幼眇歷百千萬劫未之或開而忽為開之若此文何獨不然猶是文賦之末方幅揣量别無能軼其萭度而漁村縱橫倜􅛅以尋常而得啓闢之致詩歌婉附具風人風文激亢不可下而至于記事絶去回隱言核而指直然而文采爛然如巨估操良金廢舉五都而龍海蠻窟之藏畢陳目前古所稱記載之文須通五志者其于史文猶是也是豈尋常所易及耶夫文之有境界猶山之有岡巒也文以通見稱猶山之以竒見名也請觀卧象其自賔日門以至元潭中間所歷若雷軌太極䦒霖柱三天井與夫扶雲瓏塔凡丘澗迢遞峰嶂層疊指未可詘至有束山如煙築石若幹道厄㠔之水使之夾闕以拗其􅘝瀑之勢其奇也如此幾見山澤嶙峮産物布氣具神變之略而猶得以鴻濛掩之也觀文者可知矣沈客子詩集序豫評客子詩目為才子且期其所到當在王維錢起之間而蹉跎契濶不相見面者約十年當豫識客子時其先子西平公治西平有名而豫以蔡州之客與西平君遙相往來亦嘗讀西平君詩疑其驚才絶豔不類循良吏而西平君則竟以勞于吏治而死于官豫喜客子能繼武其文章行誼足世家學因以交西平者交客子蓋豫之所以期客子者别有在也今客子在京師會其婦翁與豫為同年生客子寓其寓而仍與豫通往來道平生歡豫急索其詩讀之疑其詩小變一似回北樓之筆而為宫體詘輞川之製而辦西崑者夫美人無凡飾良馬無劣步李丞相斯即偶然與師宜次仲相為戈波頗牧老成或降而與韋虎吕姥周旋戎行亦安至使豎子庸下得以藉口獨客子以不世之才膺繼述之重所期誠奢而所造誠大第區區詩律一端原不足較長潔短而即以詩論西平君亦曽以妍詞麗句爭雄藝林乃考其治迹方實沈守躬尚坐廳事收民間束麻擔草以代二稅親較量贏縮若傭販然與婦子兒童嘈嘈几案間猶且課麻授績銼草備秣以充之典枲置驛之所用使西平數百年荒殘破壞之邑而漸致生聚夫世有不必讀舂陵行而亦可以寄元者西平是也客子可以思已趙象九生德配金太君賢孝册子徴詩文序自劉向作列女傳范氏倣之為史傳之一嗣後作史者沿以為例今天子敕修前史開東華之館命詞臣編纂遺事豫每惜明史官記事不足其載列女祗採托題旌諸名而列朝為實録者又各異其體順成𢎞正間間書事迹而嘉隆以下則但具名數且有具名而亡數具數而并亡名者嗟乎其為闕軼何等也豫少時早聞山隂趙先生名嘆先生以文章行世而不得志于時家有老親思丐升斗為祿養入伏成均習四門書業而京闈秋試誤以禮經中乙科之首遂拂鬱死都下明副榜為乙科今以舉人稱乙榜誤也當是時先生同舉者皆東林後進與先生肩隨為文社爭鳴一時而皆以是科取中今通籍中所稱薑侍御滙思何吏部昭侯金觀察幼鑣薑京兆二濵葉清豐蕃鮮皆是也夫生人惟儒生最艱當其力學本欲籍進取為壯行之地乃垂白在堂枯魚銜索旦夕厪念亦既已指名于時而一旦斥落其同時爭雄者皆先我揚去不幸而冒犯霜露身羇逆旅去家鄉又逺將自此冥冥永不得就子舍縱孩幼在抱未知能成立與否此時之望婦而不能得之于婦者而苟其得之則雖誦之為薑詩之養親蘇武之守節程嬰公孫杵臼之存孤皆未有過也乃金太君以名家弱息為先生婦備極勞苦其奉事二親較謹于先生在時而加之以和雖其家教本嚴不假嚬笑而下氣怡色必欲曲得其歡心而後已曰惟恐其念亡人也其育子之閔自􅈱􅈱以迄就傅中間婉戀畢至而其既則督課極嚴必欲其誦讀繼先業嘗泣曰汝先人所賫志者何事而可泄泄耶會閩海初定朝廷方命將詰戎張皇撻伐太君遽遣其次君又裕從軍海上稍效其所學以慰先志于地下卒之甌粵恢復武功耆定而又裕得身拜一命早通籍以無負所遣至太君之操作組絍經營饋食抑搔寢疾刲股投糜以及含斂之誠信哺乳之艱辛又不待言也夫斷臂戮鼻閨中之變而尋常貞志養親教子則又平平無奇卒不得自比于女宗庸行之列而以觀太君雖卒于近年原無庸載在前史而本朝旌典亦復以郡國彚舉尚逡巡有待然其迹則可槩睹也孝子又裕恐母烈不彰來史闕軼因屬豫序之而以丐當世之能詩文者歌詠記載以為傳述嗟乎太君與先生俱不死矣當先生易簀時曽見夢于太君曰吾病矣來與子訣因相視涕泣無一言太君醒而疑之逮一月而訃果至是先生之不能忘于身後也夫不能忘于身後而望之太君然且望之太君而迄無一言以俟太君之自悟若是乎太君之承先生者如是其不可道也若太君者可以當列女矣先生字象九代有顯仕為宋理宗後詳見太君行實及志傳淮安周母靳太君七十夀序淮上多名士其最著者莫如周左台先生豫以遊淮晚不及見也然猶及見先生之子喬嶽與之定交而拜其母夫庾衮兄弟不肯登陳凖之堂以為拜母同子其義甚大而至于鄰人褚德閉門養親衮每造拜之而不少歉何則以其賢也喬嶽兄弟比之伯仁仲智而母則比之伯仁仲智之母豫嘗謂喬嶽者匪獨其父賢也乃其母亦賢母也迄于今已三十年矣間嘗為人誦母賢必稱善教其稱善教者必曰知書然徒虛語耳惟周母者七嵗誦孝經八嵗誦論語毛詩九嵗與其兄茶坡先生學為文茶坡先生者淮名士與先生並稱當時所為靳周二子是也第先生設教多就人延請嘗留諸子于其家使受母教故母之教子則實能授詞訓義與人師同而諸子之受母教一如人人之受教于其師此其事當豫遊淮時而已知之顧豫自遊淮迄今其所交遊者雖甚簡慎亦不下一二十輩中間升沈得喪不無互異而喬嶽兄弟則日以文章行誼名于人夫人能事親兄弟友愛雖閉門養潛如褚德者猶足來庾衮之拜況文章爛然足以嬗後其聲名足以震世江左髙流必詘指伯仲第一則天下誰不想望風采以為是母是子所願見惟恐後者況母齒無恙也豫嘗數淮上君子孝友醇謹吾不如二丘瓌瑋卓犖吾不如楊簡霖嶽嶽饒經術風流四襲吾不如蔡子子搆而諸君皆出自先生之門登堂受母教至今猶能道先生在時與母講藝文互相發明使諸子與門人各述敘其説以為程法其為教如此今年首冬為母七十辰親朋皆稱觴為夀而大丘學士為廷尉在京小丘即豫同年生與蔡子子搆皆馳書屬豫一言豫嘗登堂拜母辱厠之同子之列者也聞之淮上君子廉母之賢將欲以韋母絳帳故事聞之于廷著閨闈之範而學使胡君則又預從而榜之里門明年喬嶽當詣公車使得設養堂京師令丞相如王茂𢎞者望而下拜則豫之修庾衮之好者固三十年前事也而進此而三十年猶是也況乎其受母教者瑜珈皈戒放生儀序皈戒放生二儀者柏亭法師所撰儀也其儀一為祀先并度孤而一為放生大抵本瑜珈教法以密部真言為利生之精幽可接鬼神而明得達于蟲裸因之使神天魔羅下及怨鬼皆得依三皈五戒以受我普度而胎卵脂膏並被解脫此賢首立法所謂以自證為利他者顧前此無其儀且其教亦中絶久矣慈雲柏亭本參不二門而既而咈然謂阿難迦葉同受師教而少室以不立文字直嗣迦葉致白馬翻譯棄之若遺屨之絇惟恐不斷所恃隋唐以還賢首澄觀以華嚴宗旨遍設義疏稍得繼馬鳴龍樹諸法有所云五教十六觀者今何如矣乃歷抽諸藏日記十萬言垜羣經于輪而旋觀之且加義疏于其間越十年工成嘗以易太極之説詢後秦僧肇所論而隨扣隨應自晉唐以後趙宋以前凡華嚴疏義略及儒書字句者無不洵口成誦如數珠串斯已竒矣至瑜珈密諦其語株離如婆蘇訶喇本非梵譯所通者一經訛錯莫可指證而師能一一正之考微析眇以之召神明而通幽讃非毗盧化身何以有此先教諭同錢君向若倡立仁社原有祀聖掩骸施藥放生拾字贖難薦祖度孤諸條而豫以歸田之暇重請師主其事師特為豫撰二儀而創為斯篇嘗考唐師澄觀為華嚴四祖生開寶之初歷九朝七帝皆為國師及貞元之末上遣河東節度使迎之來京開罽賔般若三藏丐之翻譯烏茶國所進華嚴梵夾此與師之譯真言亦無以異乃澄觀長年當長慶寶厯間為相國齊抗著華嚴綱要為南康王韋皋著法界觀為僕射髙崇文著燈鑑説文為節度使薛華拾遺白居易著七處九會華藏界圖心鑑而師常不偶不能遇帝王師相名人學士如唐七帝及韋皋齊抗白居易輩而僅僅為豫撰瑜珈二儀此則豫之每見稱愧者已儀凡二卷仁社諸子如錢君向若徐君聖修沈君輝東周君雲子魯君民懷皆重師所撰合錢而梓之以屬豫序因直據其事而序之如此西河集卷四十六
