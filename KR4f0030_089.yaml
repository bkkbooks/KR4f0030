body:
  text: 西河集巻八十九翰林院檢討毛竒齡撰墓表四浙東招撫使故明工部員外監靖南侯軍徐公墓表公諱凖字式平㑹稽人當崇禎之季士人爭以八比取科第而無益人國相顧淪禍敗不可救公既被試忽集平時所為文熟視曰是何物于治事何所與吾學在是否既而曰天下從此壊矣碎裂之别婦至京師其弟有從事倉曹者好博負博進博徒合少年登門追償轝一尫者坐上坐譟且罵公怒批其頰應手而斃公突走出門不反顧裂行縢裹腓至山海關登髙長望偵者以為奸拘之寧前寧前者王師下遼陽而明兵㨿之為守禦地也自營薊連衂後王師鋭甚不可當幸養晦不即入藉為榰梧㑹調上機事開府馮君有指畫詞不能達掌記數易草不得公在羈中以數語達之開府大驚曰誰為此者衆遽以公對遂引入請為幕客凡機事必以聞如是有年楊君嗣昌撫永平虛恢自用于寧前諸官悉婢視不一屑屑而獨于公多許可曰竒士竒士嘗由閣臣出督師勦獻賊于湖會公歸里即家召公行嗣昌湖人欲敺賊入川而迫而殱之使湖故鄉無一賊故巫䕫上下疏守禦使賊得輕入而既而官軍䠞賊後公曰勿䠞也夫賊易入亦易出苐并力攝之而疏其防保無繇他道出者嗣昌迂其言悉力追䠞而賊果繇他道返自雲陽至䕫一晝夜行四百里且留衆于鄖而自以輕騎破襄陽殺襄王及諸官屬而全湖以震于是嗣昌乃自材一軍上下往往誦公言而恨嗣昌不能用繼督丁君聞其事搜公于行間購得之引與計事顧事不可為會闖報獻隟綂羣賊來湖遇官軍于水坡間敗績督府單騎走公與同幕十八人皆縳送闖營闖令洗之洗之者俘獲無少長皆斬也于是奴賊曵十八人雜衆跪抻項刃齊下公私念何至死于此紿奴賊曰汝能縱我一謝闕乎奴賊曰官耶曰然喜而解其縳送公闖前賊例凡獲官有賞其所獲官磔而殉諸衆不曹斬故官每被獲寧就僇必勿言官而公詭言官信之至是闖詢曰何官曰慚愧苐參軍耳參軍何官耶曰慚愧參軍司幕府文書而未嘗為官闖念幕府司文書必有才可用而是時河南李信每勸闖勿殺文士收人望因付賊目李之綱之綱與語大悦縱談天下事慷慨無忌脱械飲食之夜則校其足而覆錦于牀公問故曰我敢疑公哉曩者王命監一俘如公才縱而遁之㡬誤我大事吾特前車之惴惴以有是也公曰諺曰利所都旅亦家此間利吾安歸乎之綱乃餌公以貨盛供御且擇俘婦之姣者以羇留之因告之闖闖令與計事公攬鏡必挽髭嘆曰參軍參軍今入賊幕哉崇禎十六年正月一日天文生楊永裕謁闖于軍門黄冠野衣捧圖䜟以獻謂闖宜建號改正朔闖悦使見公公心恨之不與語永裕還見闖曰以臣觀徐生此野鷹非終􅀈者闖銜之會再破襄陽永裕勸闖改襄陽名京設官行間武臣自元帥權將軍以下有差文臣自上相左輔右弼及六政府以下有差乃以永裕為侍郎而授公以官公力辭永裕曰何如果如臣言闖立召公公醉語不倫闖杖二十次日復召公公復醉又杖四十公曰此其時矣會官軍破賊寳豐及唐縣郟縣間倉卒拔營走公即挈故蘭陽令山東來儀與之騎陰覓保寧王于他營不得乃夜與儀兩騎遁邏者訶之公手執龍文大牌指儀曰此右弼也有公幹急策馬去時儀受賊官右弼龍文大牌者出入之符蓋預購得之也苐是時賊雖他徙然名城殘破一望七八百里間皆曠無官司惟土寨據險隘自相固結白晝行殺略雖竊奉朝廷名號而獷虓與賊等公晝匿草間夜輙望昴星東馳如是有日及至河操舟者窺客裝有無以卜生殺公故侻衣臥得渡抵歸徳故督師丁君家居見公而勞之公備陳賊中事計擒通許太康二賊官丁君令其子解賊官入京而使公伏闕上十陳冦情疏葢公在賊久日察其機事并用兵虛實設策疑信及守禦攻取分標立營諸法詳記之為官兵滅賊地而事勢已去且中外諸官其拘牽轇固牢不可破公深痛無如何然既已疏入莊烈皇帝驟見之大駴時漏已二下即命兵部堂上官次日于演象所面詢機宜公曰賊勢燎原人心瓦解非望塵而奔即倒戈以叛數千里名城如無人數十萬甲兵惟束手而已然則奈何曰國家兵力既不足而統馭方略似又無足為挽囘計者夫藉攻勦者惟人與饟耳今兵耗于邊饟亡于甾夫人而知之乃或大破宿習多為權詭以亂之且稍分事權使便宜可行意則庶或可救夫文臣原無學術在中在外皆伯仲之間而彼此牽掣綂兵者必受命督師監軍督師監軍必内承廟算馳奏方略一往返間而敵之形勢變矣前之所籌後不足用況乎漂焱叵測如此賊者今幸其設官司分土地遲回關隴為今之計當亟為用間使其自相猜貳以賊制賊縱或無效猶得藉其瞻顧以小緩其東向之勢不然發機已亟京師其正鵠也廷臣上其議復退為用間十二策中有速取楊永裕妻子及賊諜蘓二之在永裕家者當取之作行間用上初尚未信及見此遂飛騎往南都取永裕妻子果得賊諜蘓二並囚之來京信公言實值保寧王從賊中至上召見得公不屈狀益重公敇吏部授公職因授河南開封府同知贊畫軍前會閣臣李建泰督師西禦賊請公同行上許之親餞建泰及公于大明門甫出都所隨羽林軍忽散走無一留者建泰駐居庸躅足狼狽公曰事亟矣羽林鳥獸合亦鳥獸散此無足深怪者苐國家已無力募藉募亦但如羽林朝合夕散不如再請命整師且迎且待某當先往河聨絡故督河之土寨可用也及抵河而都城破遂倡義結河諸土寨勤王與故督丁君已刻發而南都稱號者以詔至即移師至江南仰天曰事不可為矣雖然吾總無所歸浮沉焉苟有利于人吾猶為之時閣部史君鎮揚州已留公幕中而靖南侯黄得功與公在寧前有交向史君乞公史君許之遂題公監靖南侯軍㑹興平伯髙杰兵留潤州與兩浙勤王兵競道相讐殺公力為疏救而靖南與興平有隟至是復爭鎮兵大閧公復為調之靖南乃移鎮無為州公在無為軍遷廬州府同知奉命聨給西江進工部員外時馬阮用事諸鎮鉥内亂思一湔滌乃合東平廣昌興平靖南四鎮為公疏而列靖南名居首請誅君側姦靖南以語公公知勢已去外患侵偪恐徒清内變不及竣翻藉為口實乃詭為儒者語令解之悉力外禦事已寢而寧南侯左良玉復飛檄率兵南下清君側靖南翻奉命西禦遇于板子磯忽報王師下江南靖南戲下有刦靖南迎降者靖南自剄軍遂降公在降衆中當事者聞公名趣授之官公曰天命固有在苐吾敗軍將也雖努力難以自効多為人恥笑辭之避潤州越一年會江東民徒抗王師畫江而守公知江東事必敗敗則千里無噍類矣吾族鄰親戚皆在中何可不一救時綂兵向江東者有内院佘君久知公言于貝勒王招公同行公許以自効曰江東必破破則苐勿殺吾能招之此皆吾民也王唯唯及破大軍皆從績溪下而偏軍亂流由西陵聨舟至蕭山空城屠無所施舎而趨錢清至太平橋公預遣父老具牛酒迎拜馬前曰願勿殺公故為詢曰此何地耶曰太平橋曰自此當太平矣請封刃王曰善遂拜招撫使往招故閣部朱君大典于金華大典不受招闔宅自焚城破轉而之衢衢守將越人初不知兵之已臨也公在途被刦所賫符信書命俱失去比至無所憑苐言孤城旦夕危矣决趨舎而守者不信遂殺公公死三日兵薄城守者出降以殺公故盡殺在城官吏之降者公友吕公故北捕通判改衢州敎授收公屍公性孝友為人忼愾不矜飾好與人財與人言必盡其肝膈博學善文下筆數千言而恥為八比初名士竒惡流俗畸致改名準取以儆也體肥白好奢衣不再撋嘗曰吾行年五十當不知死所矣至是騐公卒于順治三年七月廿六日距生萬歴三十二年七月十日享年四十三子嘉慶以父難廕官辭不受女適吕洪烈則余友也其孫源曾以國子遇予于京師及予歸出所為狀拜請表則其狀為洪烈尊大人北捕通判公所撰即當時收公屍者乃為表而系之以銘銘曰公習于五典稔于七録而耻以八比名好談天下事善用竒計而自式于準與繩當國家興喪之際驅馳四應所至常有效而無所于成曰此時數固然也究之為鄉邦為里閈纓冠往救而不能自庇其所生嗚呼此徐先生之塋也而為之表其行敇授文林郎仁和縣知縣王公墓表康熙三十二年知仁和縣事王公以疾卒于署卒之日囑其子曰予承命知此土已盡職死節官下顧青衫出門今以白木還念無可為飾木地者蕭山毛太史僦居仁和羲同里工文而知予其文能嘘枯而不能于媚人苟還骨故地棺無朱緑應藉其文以飾之而子泣曰諾會予甫東渡大旱渠底龜坼舟壅格不得行暨歸而哭公于署則已踰月日駕柩于車出關將以詰朝解舟紼去乃故㰕其舟孝子扶服登岸間適同里丁君以訪故來杭其尊人與公同出自瀏陽劉公門下世誼遂介之詣予寓亭泣拜述公言請所以表其墓者予泣詢其狀而無有也因抆泪就坐敘其語以表以狀公諱庻善字衡麓湖廣黄陂人也始祖彰卿公明永樂間仕太僕寺卿由豫章遷陂家于陂之石陽城閲十餘傳矣公祖之遇入成均有名而伯父鴻臚公立偁與父國子公立份俱以文章聲于時而鴻臚公無嗣以公嗣之會陂當明季獻賊蹂躪蘄黄間破産禦賊家中落暨鼎革而豪民巨族且有妄占公産者時公年十三從容對簿于提刑之訟堂亷使李君竒公言試以文公倚訟桉援桉間墨筆迅書立就李君大竒之留公讀書于官署中苐公少孤事母黄太孺人孝每疾必告于祖請身代人每以孝童稱之康熙癸卯登賢書以一經冠于鄉計車數上家貧不能給乃乞署秭歸教事俸滿遷杭州仁和縣知縣會天子南巡出水衡所掌綂為儲偫不費地方官一錢而仁和為兩浙首縣帥諸司起居自車駕所到行在止茇以及楫筏橋道梐枑鈴柝之設晝夜搘畫雖入官伊始未嘗一諳宮府事而動合法令所至無誤臺使深嘉之乃于下車之會相視所治謂仁和省會地比户闤闠四民皆街居交利而計其嬴日以財貨相主賔舉目無禾稼與循良吏興農勸功之意絶異乃首興學校創葺大成殿延諸生試之其後庚午領解者即首取士也于是漸及估販及官府工作若所云工與商者調其爭平其儈牙簡覈其木石銅鐵黍角絲枲諸物價大略治之以不治曰為政去太甚而已假有刧訾者斷還之負責者償之質子女鬻家口者則贖而完之如是而已其一切璅屑俱置不問他司有所索不應即不諒者或指為慢事急操之漸至徵于色發于聲而究不之顧嘗讀漢史嘆循良為政痛百姓苦吏急寧為寛平彼刻轢是視者亦何嘗不念及小民之艱然且假公亷不發私書問遺請寄俱一無所聽而究之嚴酷所至重足一迹不至生民不盡禍不止是曷故哉大抵煦煦嘔嘔祗及之霑體涂足之民而市籍商販給衣浹食即目為輕薄動加摧抑則愚者相顧稱快既而漸及于文儒以為衣冠侮人當辱之大吏則時之不為儒者稱之而至于郵亭鄉官以及士大夫之家居者吹毛而求疵文致之故曲其法以明直而椎魯無知為之嘖嘖以為平政者如是而不知斯世之猜禍遂不可底何則裁富以悦貧則富亦貧詘尊以立威則威愈酷也公之治杭無是已公賦性和厚而不善于修飾處已潔清而不為皦皦之行遇士大夫必以禮而相對落落自朝至昃公家事棘棘偶有間即推桉飲酒或賦詩一章以遣其靡煩之意嘗和臺使觀海詩臺使愛之時屬吏多篇獨取公詩附之石公治以慈勝而至于弭盜則不遺餘力城北湖市為舟車輻輳地嘗患盜公捕其渠朱新者梟之而城北以安至鄉之大鎮如喬司如塘棲皆居積坌集而盜每陰行其間公遞鉏其渠曰丘二曰趙三而雈苻無乘間者至若苕之積逋甌江之大砦攻剽近境公悉密捕掩殺之而杭之四境逮今晏然至于近旗之民因縁無厲至有鬻身入旗者公悉禁絶之而為之贖比比也公生于崇禎四年十月十七日距康熙三十二年八月二十八日卒春秋六十有二會是嵗亢早公晝跣走烈日中夜露宿以禱大瘁稍間則文簿堆垜秉燭不能給又日伺上官執板奔馳之其有不合意指者遂引躬受不韙抑鬱成疾哀哉卒之次日四民皆市哭予在越聞訃有杭人客越者相對哭不止予詢之曰有所舊耶曰無有徳之耶曰無有然則何哭曰吾哀夫公之至于此而民安之也公配陳氏又周氏皆封孺人子四長堦庠生陳出次式緒國學生次式載次式域周出女七三陳出四周出孫三長文鏊國學生堦出次文鎮次文鐸式緒出其所娶所聘所適所許皆名族乃為表之其詞曰以公之首斯丘也而歸其身其歸之者形也而浙人依其神蓋公之處已以介而治人以仁雖抑鬱死官下而其志未嘗不伸曰此公之生平也而并以告之桐鄉之民西河集巻八十九
