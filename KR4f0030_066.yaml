body:
  text: 西河集巻六十六翰林院檢討毛竒齡撰碑記五陳氏家廟碑記古廟祀之禮自天子九廟外諸侯大夫以漸而降而士庶則或二或一或祭于寢夫一廟止禰即已不得及其祖而况無廟而祭之于寢則祭禰之外更有何及然則髙曾之祭惟諸侯大夫有之而況由髙曾而上者也今則諸侯大夫士皆不立廟其立廟則皆族屬衆多者為之若鄉社然而其所祭之數則無分祖禰高曾凡始祖以下祖禰以上族有死者皆入焉吾聞漢無廟制自魏晉及唐亦漸以官階差次為世數升降之等彷彿乎古之立廟者而其後不可考也夫族之大者原有子姓通籍可等于諸侯大夫及士官師其立廟亦不為僣而獨是三代以前世爵世祿故立廟以世而今則父為大夫子忽為士子為官師孫忽為大夫則朝而増焉夕而減焉時而廢墜即時而修舉楹桷成毁既不勝其煩難而肸蠁出入亦茫然無所依據吾故曰禮由義起制以情通在宋諸儒亦早有祭禰必及祖祭曽必及髙之説則合祠比祀夫亦孝子仁人之用心然也山隂陳氏其先世自石晉時為朝太尉再傳宣教郎三傳至記室參軍實始居山隂北塘之下方橋而遷延入宋有登進士科為樞宻直學士者將立家廟于寢側而以制未定因捨所居書院為下方禪寺乃終宋之世至紹興嘉泰嘉定諸年則毎為秦太師韓平原郡王史丞相輩歴請立廟而士大夫無朝命不得私建且恥踵其事于是立廟之制遂至今無仍焉順治初年其二十五世孫有仰南君者曽捐金五伯兩為立廟記而逡巡未逮暨二十六世孫子修君于己未春復捐金五伯兩以踵其事而于是諸子羣從其起襄之上為妥侑下為惇叙以次昭穆以合族姓其規制一仿于昔自堂而室而房而兩翼而廡而門而齋坊庖㕑及省牲展饌視滌賛盥之所皆已備舉且釐定祭器壺樽鉶鼎豆籩筐篚勺羃諸物皆有繩檢將以是年嘉平奉神板于堂而乞予以記嗟乎夫孝子仁人之用心如是已乃為之銘其詞曰皇皇饗廟惟神攸棲執膰縮醴代展孝思古者祀數限于尊卑以故廟祀親盡則遺今合先後分帷同粢千秋萬䙫永勿替斯吳江泊蘆菴碑記吳江當太湖之委烟波四暨其中多隠君子者遺世負俗不得已而遯于緇黄之間假水草自蔽結瓢鏝堵以自安其身若所稱泊蘆菴其一也顧泊蘆之建肇自前紀而千仞太師承先人遺蹟恢宏舊觀自乙未丙申以迄壬子凡五年而工成自祠殿場宇下及寮宿以至芳㕑薉坎之屬各有位置蓮莖鷲羽華瓔覆之其六時盂缾之扣食者聲徹水裔豈非浄居之優游者與乃師自求法以來操履上輩曽質所見于福巖老人福巖老人亟可之將舉大鑒迄今所秘而不與者而與之于師則意為師者當演法出席據祗陀自尊即不然而出其所學漫游中土亦得如道安毗耶之可以自見于斯世而乃棄去不屑獨歸而與斯地謀折鐺焉此曷故哉吾聞泊蘆在兩麻之間界東西草蕩人有至者非舟檝莫渡其所處亦僻矣然而蒹葭在前鳬鷖日來憑軒而觀則菰茨菱芡垂手可探儼然世之為隠居者毎望之而愛其心之閒與志之有所在也丁巳秋介吾兜率師謁予為記而予以事未應至戊子春遇兜率弟子于申浦之上遂書稿去予思泊蘆者泊于蘆也昔者大覺世尊以旅泊三界為度世因縁惟所處無着遂謂之泊然而以虛附實以動附静故舟可附岸而岸不可以附舟今乃舉所處而盡泊之則是虛實之難齊而動静之罔據也夫人生世上為渥為泊又豈有定哉其地有宿蘆予嘗為文記之而泊蘆與隣他日予從海上歸當特過兩蘆且以視其泊之者何如也是為記記曰松陵之濆麻水之濵禪宫獨啟離于諸塵有師處之如祗陀園方師力學能杜五門辭彼授受絶諸聲聞飄然避地作旅泊因以斯自度有如世尊樹茲棟宇環為丘樊户牖所向烟波是隣蓮蒂坐象菱舟渡人我欲折蘆宿蘆之根蘆碕有盡斯文無諼半樓記王子鴻資挾其文以遨遊天下自燕齊代隴以暨荆鄧甌粤嶺海之外率驅柴擔簦坦坦如衡術者凡四十年曽歸而築小樓于隘巷名曰卧游而卒之舍而去也予嘗作卧游樓詩以留之暨其後從五嶺歸慨然念故里不可去乃復買宅于沂川之間環沂舍傍築層樓其中前可瞰城南諸山而北幹一峰適當北牖且隣園之藂薈而翳蔚者松楸木莽晻映左右于是判樓而分受之顔之曰半而人或疑焉夫以鴻資之足跡幾遍天下其目之所通耳之所接心思意㫖之所周知固將以二室為奥居百原為行唐蓬丘滄江為洿池林囿而乃局局于櫺軒之末櫋幔之細是必有説顧吾聞逍遙萬里不越搶榆當其肆志寥廓游心浩蕩可以窮天地之大斥萬類之廣而及其退藏一室飲食偃仰不過肘之所布與趾之所量而止夫鴻資風塵在衣顧之將澣豈真好窮大而忘歸者哉今鴻資薄游海濵而予以訪舊之餘與之晨夕葢嘗飲予酒而告予以將返而居是樓也遂述其撰事而乞予以記夫暍者望叢社以傾心勞者睹藳砧而思憩何則情固有所安也今夫人身居廣厦層臺累榭尚以為隘而苟當躡屩之為勞驅車之已瘁見棟宇而願安焉此亦何暇問其地之或廣或陿而況時事紛糾未能百全吾游于天下而知天下事之未可以意量盡也鴻資雖所至特達然秦趙越貊行或未遍山川雲物覽有未備詩文溢寰宇而多所散去黄金滿行槖而不盡收拾然則天下事之不能全者有如此半矣若夫一枝之棲可以娛老一椽之遺可以裕後則斯樓雖褊是亦得半之道也鴻資曰善請飲君是樓勒其文而嵌之于壁滿聽樓記予至宣城偕張公荀仲訪東渚先生不得觀張公所畫東渚草堂圖而思之夫宣城山水甲天下既已登敬亭溯雙溪觀柏視麻姑之勝亦既快心娱目而顧伈伈焉重有懐于東渚之一圖亦可怪矣既而先生築樓于草堂之傍顔曰滿聽相傳樓成時有鵹黄栖于梁緜蠻而啼同里施侍讀為之題之而其家舉人淵公復為之繪圖傳來京師京師好事者且為之歌詠其事予少游倪文正園有庭軒然以其橚爽之在楹也風生刁調經耳而滿名滿聽軒今相距四十年矣先生是樓之名適與相合豈釃酒伐木與鳥鳴求友其情有同然者與方先生從沈徴君游正值徴君與文正同時頡頏相與持黨人之事而先生以髙弟子周旋其間迄于今讀先生序徴君遺集未嘗不嘆先生之毗輔嚴而步趨正也夫聽亦何常目不睹鄧林之柯足不踐板桐之隂而劉􅊩卉歙求之而條然又求之而飉然情之所之一似風起于青蘋而河放于泬㵳者況間闗啁唽因時而更故有聆燕竽之音而以為齊笙者矣世不遇文正世不識先生之效文正而見草堂之圖而思之聞滿聽之名而歌之記之他日聞聲而起相為應求安知後之倚音者不猶之今日之傾聽者也吾耳屬之矣重建仁賢祠碑記仁賢祠者鄉人為先吏部作也古無鄉人立祠祠鄉賢者嘗考漢朱邑為桐鄉吏暨拜司農天子賜黄金百斤使家置祀而邑以為家人祀我不如桐鄉民葢自信桐鄉之有得于已也今則官祠皆故事上以是哃而下以是謟其不足取信明矣獨鄉人稍公難以勢奪亦難以利誘然而自漢迄今雖更里名如王烈閭師争畫像如陳寔父子卒未聞立祠而為之祀之葢鄉人易與易與則多求鄉人又易形易形則多媢故有髙車駟馬歸馳里中里中人忌之至相與共事則往往苛求而極于怨望吾不知遂之人何以得于先吏部先吏部亦何以得之于遂人而合錢于缿合材于涂合筋骸手足于閭左子弟而構以祠飾以貌于嘏于祝題之曰仁賢倣惇宗殷禮而載在祀典雖曰公之徳著之里甲凡邦比版藉出入租役一切輕重髙下律之官府之八成而未有稽者而公力清之祀法有功徳于民固當祀然非公之生平實有以感人之心而中人之隠亦安能致此迄于今祠稍圮矣公之孫㑹侯為祥符令已經取召而忌者中之所稱祥符民思之如桐鄉民者慨然念祖徳而重為建之夫祀典有二祠于功徳所以勸善也祠于祖考所以廣孝也今仁賢之祠在鄉人創之為勸善在後人建之為廣孝均得之矣族孫竒齡拜祠下而系之以歌乃為系曰公諱一瓉遂安人官吏部文選司郎中歌曰婺之山兮幽幽公之出兮駕雲虬婺之水兮差差公之來兮浟然以思為公作廟兮建華榱靈旗上下兮山風四吹惟公疇昔兮感鄉閭鄉人戴公兮願為尸之陶土甓兮築堂簃孫為祖役兮子為父來紅粱兮烏黍風飄飄兮神靈雨為採明粢兮薦筐筥春祈秋賽兮長此終古嘏稱降福兮祝告以䖍膋蕭四達兮年又年蒸禋如故兮昭事不諐几筵重飭兮貌廟鮮宗功可述兮祖徳以宣吹簫擊鼓兮彈神絃苾芬孝祀兮通後先執籩捧豆兮有如鄉人婺之山兮婺之水碧雲如衣兮白石如髓惟公駿徳兮堪與之比山水可移兮徳不可以徙廟有葢兮石有底勒嘉名兮昭萬祀寧州龍安山兜率寺重興碑記佛書載兜率夜摩宫殿在諸天以上璀璨𢎞麗可居能仁故名山法地有所創建每借之以顔其刹如梓潼分寧皆有兜率是也顧分寧兜率倉于隋開皇之末山名龍安其地由豫章西山而西去豫章逺而龍安委迤反與鄂之下雋之畍相為犬牙則又去分寧逺葢山之興廢其不可按者亦乆矣湘溪蛤菴禪師本楚產而遊于越㑹吳越用兵師乃傚浮屠奉親故事拂緇負母避于湘湖之麓者若干年後累遷上輩自福巖報恩平陽諸宿歴伺勘驗究之平陽報恩交欲傳法而卒受傳于平陽撫期之雄出而振錫有何足怪獨是師乆在越毋論浮杯四達非所依戀而即其兩赴京師隨大覺老人説法御前幾欲留内庭薦福若所傳萬善殿者而猶然却足惟以湘湖之一曲為念則其不輕于應物如是也乃其初以越中故人出宰下雋延師于下雋之鳯山寺而下雋去龍安較近惟時有兜率之僧名師亮者承隠賢静師之後稍葺元明以來兜率之既廢而漸復者建堂五楹奉鬘華而藏貝葉將以次翦闢冀還舊觀而詘于時之未有合也康熈十二年癸丑二月住僧師亮同龍安䕶法匡君鼎雄君竒遇萬君正瑛陳君欽􅕔等白諸當事共賫禮幣迎師于鳯山擇日入院乃大建旛幢漸興工役當斯時兜率之既復而稍合者已駸駸乎有其基焉㑹兩湖用兵諸旗張皇四出悉駐荆岳而下雋當平江臨湘之間為荆岳衝龍安近下雋烽火相接戰守所必争適師省平陽負錫東渡暨還而前途梗塞不可通乃往來湘湖自稱湘溪道人者又若干年雖其間三吳巨刹各來迎師師亦曽一應吳江黎里之請然非其意也丁已之秋龍安兵稍解其住僧檀越堅請師往將驟完舊緒一光前席其勸駕之篤倍于肇事而師亦乆念寳地之當急復遂于榛莽之餘毅然許往于是増視延袤就其髙下庀徒量材遂事有日乃使謁文于予為紀石用予三入西江未嘗一過龍安不能詳兜率遺蹟又記誌荒略亦無從考覈故實以備因革然嘗聞兜率初興有司馬頭陀者來相是山預記若干年後必當有聖僧先後相繼開演故自隋唐五代代有徳士而延至趙宋則臨濟雲門兩兩分見其在慈明之後者則曰無證曰志恩曰從悟而在匡真之後者則曰擇梧曰景常曰維顯前後記驗歴歴不爽及其既亦少替矣今師之重來曠世接跡雖曰人事然孰非山川爽睿實有以啟之也哉葢祖庭興復端藉大力自非挽繂日月開掲天地具鑒道之能而擴劫摩之㑹者未易勝任故師念湘溪而今以當日之念湘溪者轉念兜率夫亦以兵革之際興復倍難遂不憚矯願力屈事任以有此役也考之宋宣和之末兵興旁午中外戒備而朝士張君商英尚有追謚兜率悦師之請以其運漕隆興時曽從兜率座下一言有悟故也今師之道法不減從悦而兵革之連且異曩昔法寶當興豈無商英其人踵其事者吾于兜率有厚期矣寺址訖各具畛域前後殿堂門廡寮舍各具規畫程功餱廩民物人力簿書嵗月各具計數例書之碑負而綴以銘銘曰惟此神宫名兜率陀招提象之以安騰摩有如祗園對此恒河庭生苾草座成蓮花乃者龍安亦有斯寺闡兹五衍開自六季白馬遷經黄金布地彷彿曹溪掬水嘗味云俟時日當出化導為天人師𢎞佛祖教是以數世能攝衆妙相繼説法具大辯才星羅寶殿雲滿香臺鷲羽旦拂優羅夜開領其中趣比之西來無如象教稍墮後葉道岸傾崖慈航失楫曠然前期丁此浩劫何幸大師早授𢎞法迦葉一嬗大鑒再宗逺恢臨濟近嗣天童日月並徳山河比功馴象騎素傳衣賜紅初住湘湖中棲黎里曽隨大覺入見天子辯晰八正在醮園裏爰請法駕整是道席將邀舍衞興我兜率寶樹牽身金花捧足復太子園修利王國不悟詰武兵來洞庭龍安烽燧間于荆衡湘溪一曲雖署師名終還初地言完化城増累疏浮薙蕪崇槁旛為風生圭作影表丹甃蟠螭赤桷飛鳥矛㦸戈鋋棄之如掃修水東流夏汭西折祝融堆霞彭蠡泛雪鶴不争山龍請避穴縱復兵行江漢有截安以金輪鎮之寶杵普濟禽蟲廣喻徒旅門闔四流燈燃一炬珉石堅貞永樹其所家貞女墮樓記家貞女者祥符知縣㑹侯女也貞女已成婦三日而猶稱女或曰昔荀爽之女為陰瑜妻雖既死而稱荀氏女或曰祥符民父母㑹侯曽上貞女事于臺以父母故女之貞女許字方翰林渭仁之子奕昭方毛故世婚比之羊鄧而㑹侯與渭仁又以文章相親好其訂為婚婭故無所負獨是奕昭乆病瘵當㑹侯以被召來京師予見奕昭于㑹侯之寓疑其肌清而損容澤不外著恐不年而㑹侯再任祥符其明年夏奕昭就婚祥符官舍則負病往自京師達祥符千餘里鞍轡道路病愈劇㑹侯初難之然既已至此無還理乃遂于病中強為脱褵甫脱即就外舍當是時其病中之扶侍起居嘗藥和㱃雪垢撋薉其重有累于貞女者不待言也至病革奕昭泣曰吾此來百悔亦何及矣雖然吾敢以三日誤汝終身哉女曰子不讀芣苢之詩乎其夫有惡疾雖未婚猶不忍去也況三日耶既而易簀女不食父強之始食初女少時以食蒸羊致病中死法乆斷不食至是忽食之以為得速死也㑹㑹侯以卓異再被召將赴考選而謠諑適至㑹侯居平頗鬱鬱女伺父不懌陽為好容施施然如尋常初欲自材有二傅婢同卧起及是稍懈嘗坐私室淚縱横被面母至強拭曰不謂小寒遂嚏唾至此時二月易冬服女僮請擇其撋澣者曰吾能再御此耶女僮怪問之隨亂以他語康熈二十年三月六日日暝登樓呼女僮執燭隨後示不疑行至牕欄將閉牕委身而墮樓去地二丈許下甃以石􅑷擲之將必靡碎而肢體不壊惟口嘔閼血眸子黒白溷數日一若有鬼神維䕶之者噫異矣祥符鄉三老感㑹侯者為㑹侯勒石頌去思而并上其事于臺表之雖女年尚少未當旌然而靡他可知矣祥符紳士皆有詩而予為記之如此且以告夫後此之為詩若文者五賢崇祀鄉賢祠記古者祀邦賢于社韓退之曰鄉先生殁而可祭于社是也其後社禮廢而州縣祀社不及鄉里且亦無復有祔祀者惟明制建學自成均以下遍及州縣較前代之建置無常格者最為周悉于是哲配遞降由廊廡以外特設名宦鄉賢二祠于宫門左右當欒公鄭鄉之祀原其始非不鄭重而其後稍冒濫也夫惇宗大典要在事功然或祔于廟或享于大烝而鄉祠以賢賢則無問出與處而惟賢之祠不特事功當在所略即顯晦仕止亦何足為邦賢較而明代中葉多取宦達者填于其中既則漸及于贈君于封翁又既而貲豪者皆得以夤緣而簒入之故以至重之典而輕于鴻毛相傳啟禎之間長洲陳太史請别搆一祠祠言游季札而禾中魏給諫至有捧其先人主矯然而出于祠者武林有五賢皆明季隠君子也隠君子而何難于祠顧非賢之難而祠之為難彼隠君子者勢分不足以動有位家貧不足以將禮幣其子姓將必達顧猶未達不足以致往來請問之好然而一鄉賢之一國賢之天下後世均賢之自㑹城一府二縣三學舉人沈佳及貢監生陸寅三學生員王丹林等合二百二十人各發憤蹶起毅然以古道自任懐公揭上之學使㑹學使王君由翰林春坊來改道為院出微尚􅍀然念時俗之有非思一反其習遽以其揭下府縣取給取事實即同巡撫趙君敕府縣官迎主入祠于是五賢者同時為神木府縣官敦請到門五家子弟各捧主鼓吹迎于途城之士大夫各冠衣詣祠下再拜自院使以下各致祭于是好事者競為詩為歌為圖畫為五賢誌傳記其事以為此近代二百年來所僅見而五家子弟復不以予為不文而屬為之記當予見五賢在崇禎之末維時己夘庚辰間修里社之廢而集鄉之文人學士以為社在五賢立社則有所為登樓與攬雲者其人尚氣節以東漢諸儒為宗而其為文則精深奥博破陋學之藩而一歸于古予時以總角附敦盤之末同應鄉舉因得交于五先生五先生視予則少長而肩隨之乃驟丁國變五賢皆盛年而遺落世事闔土室以儉徳避難間有寄于釋屏于山林託跡于交游之幕以為生者獨予以亡名走四方不相見即見偶然相值道故舊序坐頃刻不謂入都裁幾年而五先生者即已騎鯨上升與鄉先達周旋于黌序之間如是也夫予見五先生于崇禎之末不謂其至此也向使五先生者不即遭世變不處出而用于世不祀于社當必祀于廟享于大烝必不止于是雖然以視予出者何也五賢者一汪渢一陳廷㑹一柴紹炳一沈昀一孫治也思硯齋記予少時聞父老言合肥許中丞守吾郡時臨去郡别父老于錢清江指所攜硯齎咨曰嗟乎此吾守此郡以來所得物也吾不能有裨於此郡而乃攜此去吾媿焉是言也吾嘗聞而感之暨予入京距前事若干年讀施侍講所為思硯齋詩輒掩巻曰是物已失之耶即又嘆亷吏之所遺不能下逮于子孫一物且然及見公文孫今户部君生洲先生毎道其尊大人思硯事且屬予為記然後知公之亷贈君之孝思與户部君之表揚駿烈俱不可及也公嘗夢東坡于郡亭手授一硯亭枕種山麓種山者則越大夫文種所瘞山也東坡曽守杭去此百里或往來游居俱不可考惟是夜甫見夢未及明而即得一硯于蒯隸之手以為曉受公命種竹亭下巖窔之間應鍤而出公取澣之則儼然勒坡像于背一如夢中所親見者葢公之去郡而不忍釋以此也乃公殁而硯已亡矣孝子思之作思硯齋晨夕居齋中以誌不忘夫思其所嗜思其所好事親固然然而在前之人無故而忽授其所好者于漠漠之中而後之受之者亦復于漠漠之中忽若適還其所好而去古人之投報類如是矣乃東坡當日愛硯之切求劍灘之石誤以為鳯山妙材價過龍尾而其後復求龍尾于方君彦徳則又甘為作詩自懴其失其愛好如此然猶不能守而棄之種山之麓而況公之偶然而得之而欲即傳之世世不無甚惑顧其子思之其孫又從而記之比之手澤桮棬𢎞琰赤刀觸之于目藏之于心瞿然惻然歴數世而不可解此其孝思何如也夫㢘于官友于古人與孝子順孫之慕其親而展轉揚顯以求傳之于後者皆可記公諱如蘭前朝中丞初為敝郡守生洲先生諱孫荃曽授翰林庶吉士于予為同館前輩今視漕通州所稱户部君者西河集巻六十六
