body:
  text: 西河集巻一百十五翰林院檢討毛竒齡撰年譜文華殿大學士太子太傅兼刑部尚書易齋馮公年譜謹按先生諱溥字孔博别字易齋山東青州府益都縣人世籍臨胊明洪武初徙實遼左遂為遼之廣寧人數傳有閭山公諱裕者從賀黄門講學有契悟中正徳戊辰科進士復還青州家焉後仕至貴州按察使司副使則先生始祖也閭山公生五子長惟健字汝强别字陂門舉人所著有陂門集子子咸舉人以徳行聞於鄉孫士標崇禎庚辰進士仕至閩海道次惟重字汝威嘉靖戊戌進士仕至行人子子履隆慶戊辰進士仕至㕘政孫琦萬厯丁丑進士禮部尚書諡文敏所著有北海集經濟類編諸書又次惟敏字汝行别字海浮稱海浮山人舉人仕至通判所著有山堂辭稿王弇州所謂北曲惟馮海浮擅場者也孫瑗萬厯乙未進士仕至遼東開原道又次惟訥字汝言嘉靖戊戌進士仕至江西布政使内陞光祿寺卿所著有詩紀風雅廣逸諸書則先生髙祖也又次惟直早卒曽祖諱子臨字仰洲隱居不仕皇清誥贈光祿大夫文華殿大學士兼刑部尚書祖諱珣字璞庵仕至陜西漢中府同知皇清誥贈光祿大夫文華殿大學士兼刑部尚書父諱士衡字于平仕至浙江湖州府孝豐縣知縣皇清誥贈光祿大夫文華殿大學士兼刑部尚書萬厯三十七年已酉先生生四十三年乙卯先生七嵗就外傳越一年丙辰先生八嵗孝豐公取左傳國語及秦漢唐宋諸雜文命先生讀先生初難之塾師謂非幼學所宜孝豐公不顧也已而塾師謝之去又二年戊午先生十歳孝豐公延先生外王父白公諱采者授先生書白公為諸生有盛名顧性頗嚴刻先生讀書務領㑹不事攻苦白公督責之時太夫人在堂憐先生為涕泣請貸于白公白公嘆曰汝之子吾之甥也吾愛是子寧必不如汝顧是子頴悟非常而使之優游以就狎習非所望也久之先生誦讀忽有解取孝豐公所給書經左國以下皆卒業了了又久之先生乃發憤窮極經史旁及外氏六通五覺十秘九府之書目追手錄以至俯仰觀察推步占騐竒門遁甲三命六壬諸學皆親為圖畫張之屏幛以求必得又久之棄去故先生學如左海元元本本隨處流見而未嘗輕于一用天啟五年乙丑先生十七歳娶夫人房氏十八嵗丙寅補益都縣學生時提學使者為夢原項公頗簡重不可干以私覆試日執先生卷亟稱之且謂先生曰幸自愛他日非凡器也二十二歳庚午孝豐公筮仕得湖州孝豐縣知縣留先生守家先生往來定省者凡數年崇禎元年辛未先生二十三嵗子治世生二十四嵗壬申孔有徳反青州戒嚴二十五嵗癸酉補廪膳生二十八歳丙子孝豐公以治最行取入都時司馬公春秋髙孝豐公不欲仕遂謝病歸無何孝豐縣典史解錢糧京師與户部書辦博為厰衛人所持其書辧誣服云非博也實典史解錢糧來賄我銀八兩耳事聞孝豐公以原任堂上官詿誤入都辨白先生往來都下者又二年時四川花君上苑廣東宋君兆龢亦以詿誤留京師與先生游覽唱和無虛日㑹刑部尚書鄭公三俊者君子也謂孝豐公曰典史賂書役毋論其事之有無藉有之與縣官何與汝苐歸吾自為汝白之勿復累也於是先生得隨孝豐公歸里三十嵗戊寅先生以累赴鄉試不利賃城西藥王菴僧舍讀書其中住僧璽文者髙年有行見先生禮佛從坐驚起云老僧甫入定見東方紅光熊熊雷聲硿䃔然悸而窹不知是公至也先生疑僧諛已頷之時僧舍淺狹惟門前列數松長且茂中有磐石可坐一水從南來直流數里當寺門先生每盤桓石間以觀流水璽文忽告云願公母坐是也曰何也曰不觀在傍土地祠乎夢以不安告而匄予言之先生曰此世俗習語耳安有是也且夢亦何足據哉數日復來云如是者三先生曰果爾亦壘一牆以遮之至今祠前蔽一牆以是也時錄科青州舊例學使將案臨府縣先試之而上其名知府錢君良翰者紹興人也由進士起家閲巻拔孫文定公廷銓第一先生次之又次則今少司寇髙公珩也大言云三人者必以是科中否則不復相天下士矣是年大兵破兖州又破濟南擄其藩王去青州戒嚴三十一歳己卯先生與孫髙二公同舉於鄉報至先生方熟睡家人呼之不醒太犬人大驚令扶先生起以水噀之亦不醒舉家傽徨時先生夢登泰山似有召者擁雺氣蓬勃而上迴視十八盤天門厯厯如平時所見至則張蓆殿懸錦繡於門衆樂齊作鼎鬴漿醴俱設元君親揖讓酬酢成禮將退適聞雞鳴海中紅日如車輪涌出遂輾然寤寤則鼻息猶酒氣焉三十二歳庚辰先生㑹試下第值王父司馬公卒孝豐公髙年哀毁得怔忡疾是冬葬司馬公堯山祖塋側三十三嵗辛已孝豐公卒時太夫人遘重疾方愈聞變一慟亦卒兩䘮相距祗六日先生哭晝夜不止亦氣絶如屬纊然醫者云是哭泣傷藏耳五氣結轖匪藥可療俟其偃蹇一二日當醒也已而果然是冬葬孝豐公太夫人於雲門山之新阡三十四嵗壬午大兵攻青州州人懼城陷皆挈家避城外先生云出城將安之且家口露處安所得食生死俟命可也既而出城者皆被害而城内無恙三十五嵗癸未先生守制不㑹試三十六嵗甲申即大清順治元年青州人殺闖賊偽官時先生在山中不與聞既而户部侍郎王君鰲永奉命招撫山東駐劄青州城時闖賊前鋒趙應元㕘謀楊王休尚擁精兵五百餘詣城詐降王君受之左右執不可君不從應元等至即馳入察院縛王君斬之且據王府以恢復為名招集亡命數千人張偽諭遍撫屬縣越十七日大兵至陽與賊講和遽入城屯北門城樓是夕斬應元等并其頭領數十人遍搜城中賊盡殱之城中人多被剽鹵先生以勞敝熟睡未覺也大兵越門過一若不見有門者及啟門則門外之屍滿矣三十七嵗乙酉有司敦請謁選先生至京師既而歸三十八歳丙戌㑹試中式時以乏資費未放榜即歸三十九歳丁亥復行㑹試先生至京補殿試得二甲授庶吉士四十歳戊子讀書館中四十一歳己丑散館授翰林院編修四十二歳庚寅四十三歳辛卯先生奉使頒詔江寧并蘇松常鎮諸府四十四嵗壬辰㑹試同考得張暥等二十三人四十五嵗癸已陞司經局洗馬兼修撰未㡬陞侍讀四十六嵗甲午陞國子監祭酒舊例考課撥厯出咨給假皆有獻先生悉禁之惟按期課士親閲試巻務使學術一底醇正㑹秋試錄科或謂每科監元必以當科中式為勝今搶卒恐未必得先生笑答曰安知一顧無良馬也既而以全椒吳國對巻置苐一果以是科中式戊戌廷對第三人四十七歳乙未四十八歳丙申陞侍講學士四十九歳丁酉轉侍讀學士考四品滿賜幣二羊酒各一五十歳戊戌是時世祖章皇帝屢幸内閣一日指先生謂諸大學士曰汝等以何者為翰林朕視馮溥真翰林也五十一歳已亥陞吏部右侍郎新例學士皆兼内閣銜不得復陞侍郎故先生以侍讀學士佐銓焉是時尚書為孫文定公廷銓左侍郎為石公申先生到任日二公皆以目眚暫假值各省學道缺部郎不副以知府補之已經吏禮二部㑹同議放而給事中張惟赤妄以徇私劾先生有㫖命先生回奏先生奏略云臣初任吏部此事同禮部公議非臣一人所得私也且徇庇何人張惟赤既能發覺亦何妨指名題叅而故為懸揣之詞以快私意何以服衆世祖章皇帝云吾固知馮溥不為也置不問五十二嵗庚子京堂三品以上官自陳忽奉嚴㫖黜去滿尚書科爾坤及兩侍郎而獨留漢官在部先生偕孫公等上疏云部事滿漢同辦今滿臣得罪漢臣安得免臣等無狀伏候皇上一體處分有㫖著供職不必求罷㑹滿堂官缺將以漢官考滿官未便復疏請補滿堂官奉㫖令先生等得考察滿洲大小官員而先生等復疏辭謂漢人官員臣等不辭嫌怨自行考察若滿洲則素無生平苐令其人當前猶不能别識其面目而記其姓與氏也况得而定其優劣哉奉㫖㑹同五部尚書及都察院考察此一時破例其重先生等若此五十三歳辛丑世祖章皇帝升遐皇上幼冲登極四大臣同秉國政有御史李秀者旗下人先以京察被黜而怨之至是夤緣復故官遂列四欵叅先生謂先生為故相劉正宗黨人其主銓選時尚書孫廷銓目昏不能視文書侍郎石申多病不進衙門而某以一手遮天部事徇私任行改易舊例其言皆荒謬無實據先生一一面奏奉㫖謂李秀誣奏大臣肆口横詈殊不合理著嚴飭行五十四歳壬寅五十五歳癸卯先生給假回籍五十七歳乙已五十八歳丙午五月入都七月復補吏部侍郎時四大臣欲各省差大臣二員設立衙門于督撫之傍以廉督撫吏部滿尚書阿思哈侍郎太必兎議設衙門於各省東西一切書役蒯𨽻人員聴其招募頒與勅印等項先生執不可謂創造衙門費將不貲内之傷度支外之勞民力毁房壞屋勢必不免且國家設立督撫皆係重臣今又不信復遣兩大臣實逼處此東西相望而稽察之甚無謂也夫權太重則勢相軋勢相軋則當之者碎保無下屬仰承左右譏苛為民害者時太必兎䝉古人性暴無禮聞見先生語則大恚瞋目起立張拳向先生先生徐應曰雞肋何足安尊拳哉夫爾我等也既係公議汝必不容吾兩議何耶且議之可否自有聖裁豈爾我所得而專主之時四司滿漢官皆恐懼股栗率書吏人等環跪先生前請先生稍貶損從滿議先生曰國家大事非汝等所知也堅執不可疏遂上上是先生議其事得止其後太必兎反修好每事就先生商酌然終以夤緣得官伏誅先是先生入都時諸翰林以新例有五部員外與翰林較俸陞侍讀者母論翰林俸不能較且部司雜處彼此不安又翰林論俸不論資即前後倒置亦非所宜乞先生改正先生許之至是盡改從初例焉五十九歳丁未㑹試主考得黄礽緒等一百五十人時建育嬰㑹於夕照寺收無主嬰孩貰婦之乳者育之就其傍買隙地種栁萬株名萬柳堂暇則與賓客賦詩飲酒其中是年長孫肅生六十歳戊申陞都察院左都御史掌院事先生首具王言不宜反汗一疏謂當慎重于未有㫖之先不當更移于已奉㫖之後以是時盛京缺工部侍郎多規避已㑹推奉㫖不旬日而三易其人故首及之次有廣東盜賊充斥總兵宜嚴加處分一疏是時首相為班布爾善惡先生言直但擬㫖云知道了上取先生疏閲之即云此二本俱説的是何以批知道了令改票因得㫖云這本説的是該部確議具奏時逃人法最嚴先生疏根本之計終及逃人大略謂初年所逃皆係八旗戰爭所得之人故禁之當嚴今天下承平日久或係投充或係新買或係入官似此人等即在地方有司尚難稽察愚民無知鮮有不為其所欺者此非敢于抗朝廷之法也臣以為若逃者係舊人則當用舊法若係新人亦當稍示寛典使督捕詳議分别以為定例此亦本治之一端也又疏謂國家重兵多在閩粤但各處駐防過多恐轉輸易困古者防邊之士不帶家口及期則換今皆攜家而往約略計之十萬之師便有百萬途中口糧人夫及到地方一切養育之資無一不取之朝廷故藩王提鎮其各處貿易雖曰擾民其實不可禁止也且室家重則難于轉動夫兵隨將轉將到便行使一旦他處有緩急之調而此家口重累之將與兵能符到即行乎則伍籍定額所當與軍政計通變也又疏請有司初授不當限年近見吏部選人進士舉人以及廕生等項俱論年分進士則壓于厯科揀選之餘舉人則待之五科不中之後非遲數十年之久不能預選保無有老耄昏聵不堪民牧者乎如其有之則自上京領憑赴任道路貲費不知凡㡬及履任而上司以昏聵去之即或姑留嘗試事敗聴叅而地方被害各案覊留至有老死他鄉而妻子代累者矣是官與地方兩受其病乃吏部雖有臨選面驗之例而叅摘未嘗多見也廕生應得州縣者部例准十八嵗選授夫天生人才少年早成者自不乏人然上智不常有保無有童心尚在操刀使割者乎如其有之是以知識未諳之人使之驟膺民社之重内不得不聴之主文之導引外不得不聴之衙役之指使及既敗而官與地方兩受其病乃吏部但有計年授職之例而考試未嘗講求也臣請勅吏部當截取投供之日照兵部考驗弓馬之例畧試其身言書判取其堪授職者以次銓除而不堪任者則予以應得之銜頂帶休致其幼稚不通者或停其授官寛以年限待學成再補或照品改授佐領待練習世務照常陞轉則遲速老幼均得之矣又疏請申嚴内外職任之要務謂六部堂官于事之合于例者照例行之持守必堅于例之不符于事者據理行之擔當必力惟于疏内題明公私自見若各部司官滿漢同辦其賢否進退總在本堂鑒别之内乃京察六年之後陞遷轉易計其時堂上執筆所註之人半皆素昧平生之輩懸揣定評勸懲何處臣謂宜倣外督撫糾劾之例一年摘叅一次則賢智盡勉而愚不肖無所容矣若夫朝廷之委任在督撫督撫之委任在司道總覈錢糧者藩司之責訊讞刑獄者臬司之責惟守巡各道乃承上發下之官皆有激揚表帥之任倘或私收餽遺詭其踪跡以明亷實政廢弛文其告條以欺衆官吏之貪汙不問百姓之疾苦不知迨有司敗露乃急補一揭以避平日徇庇之罪今大計在邇臣謂宜首嚴此輩以儆官常即督撫尋常舉劾果係揭報始列其具掲名銜或别有訪聞不必定列府道公揭以為此輩掩飾之地如此互相覺察則賢者不敢蔽不肖者不敢容矣又嘗因遵諭陳言請寛刑税如曰省刑者非謂其犯罪而姑寛之也古者罪人不孥今一事而連數人或數十人此等人非其本身犯大罪也雖事終亦必省釋但其候審之勞盤費之苦至有本犯尚未完結而牽連者先朝露矣且問官貪懦不即審結多有遲至二三年或七八年者縱或未死而抛家失業棄妻離子可矜孰甚乞皇上勅部嚴禁諸凡案件除叛逆外不得牽累多人其無益証佐槩免提究有寛限者即治督撫以才力不及之罪則刑可省矣且薄税者非謂其應納而姑免之也古云二月賣新絲五月糶新穀言在上徵收之急也今者正月即開徵矣慶酬未已追呼已至舊逋未償新貸又起而有司之不肖者更設重刑以懲之臣前有緩徵一疏部覆未准乞皇上再行酌議夏税定于六月秋税定于十月上緩國脉下寛民命則税已薄矣其餘敷陳時政有闗民瘼者不可勝僕即密疏入告尚有請禁三藩貿易酌議三藩買馬諸疏其稿不存然載在政府可稽也六十一歳已酉六十二嵗庚戌陞刑部尚書先生甫到部即有愚民犯法日衆朝廷教化宜先一疏上嘉納之未㡬以年老疏請骸骨不許六十三嵗辛亥授文華殿大學士有首薦原任光祿丞魏公象樞兵部主事成性一疏又以嵗豐榖賤有宜廣行積貯一疏上俱嘉納之六十四嵗壬子先生復上疏求去有曰臣今年六十有四筋力衰憊機務何地堪此昏憒臣前任刑部時㑹以老病乞休未䝉俞允今相距又二年精力愈衰不得不冒昧再凟天聴上曰不肯相助為理耶朕豈不知卿年高但六十四嵗未衰也俟卿七十乃休耳六十五歳癸丑武㑹試主考冬十一月吳三桂反時閣事旁午先生早入晩出不敢言去六十六嵗甲寅六十七嵗乙卯夫人房氏卒六十八嵗丙辰六十九嵗丁巳七十嵗戊午福建平時先生以䝉上許可又上疏求去大畧云禮曰大夫七十致政今臣年已七十矣臣向所以不即請者緣時方多事皇上宵旰不暇臣何敢以犬馬餘生為自便之計今四方漸次平定皇上盛徳大業與日俱新而臣以衰朽之軀溷玷朝右此臣所夢寐不寧者也且皇上曽許臣七十乃休息壤在彼不許七十一嵗己未㑹試主考得馬敎思等一百五十人時兩廣平朝廷徵天下文學之士倣古制科例名博學鴻儒先後詣闕御試賜酒饌優禮選取五十人皆授以翰林官餘髙年者間授中書職銜遣回籍闢門之典于此為最但是時上親閲巻訖糊名付閣下覆閲先生審慎甲乙所取盡名士一時伏先生冰鑒是年五月先生嬰熱疾乞疏益切上遣翰林滿學士喇薩里就家問病且傳諭調理稍痊即出供職不必求去及小愈先生復入閣面奏請乞上親留先生仍遣還宅調理俟强健入閣七十二嵗庚申四川平七十三嵗辛酉雲南平先生復求去上曰朕知卿年髙顧朝有老臣不綦重耶因以其疏還先生不許七十四嵗壬戌元夕前一日上賜宴大臣及詞臣講官以上於乾清宫許羣臣至御座傍觀鰲山燈上親賜先生巨觥命釂先生不能飲遂大醉及先生捧觴稽首登臺獻觴旋下臺復稽首候釂上止先生曰汝老矣登降不便即在此候釂可也及出上命二内侍扶掖又傳令先生家人輩用心扶侍到家是日上命賦柏梁體詩上首唱云麗日和風被萬方羣臣各續成之既而上東出闕祭告諸陵先生日入閣不敢怠暨上歸先生復上疏請奉㫖卿輔弼重臣端敏練達簡任機務效力有年勤勞素著倚毗方殷覽奏以年邁請休情詞懇切准其原官致仕馳驛回籍遣官䕶送以示眷懐及先生謝恩上賜飯復傳㫖云卿自今後無有職掌可常至􅌡臺一看越數日先生至􅌡臺上令人引至上所御閣東小閣内賜飯訖命先生遍遊西苑遣内侍二人扶先生登舟厯諸亭臺及曲檻迴廊巖壑之勝内有御書曲澗浮花四大字迤邐登陟至浮杯亭上遣侍臣攜酒菓隨先生令每至一處坐飲三爵力倦且稍憩勿遽出游畢告歸即以酒菓送至家先生遂有微臣去國戀主一疏内列五事一曰皇上不宜費財二曰皇上不宜遠出三曰皇上勿輕遣官四曰臺灣不宜輕剿五曰闗税鹽課不宜増額上嘉納之上遣翰林院掌院學士牛鈕陳廷敬侍衛二格到宅頒賜御製詩文一軸内云内閣大學士馮溥贊襄密勿著有勞勩乃以髙年數請歸老念深箕潁頓謝簪紱悵别之心聊書四韻環海銷兵日元臣樂志年草堂開綠野别墅築平泉望切巖廊重人思霖雨賢青門歸路遠逸興豁雲天康熙二十一年八月廿六日御筆又印章一方上勒適志東山四字又墨刻昇平嘉宴詩一册次日辭謝上遣中書舍人羅映台䕶送到家京朝官數百人同餞之彰義門外祖帳相望十餘里京城小民有牽車泣下者時值太宗文皇帝實錄告成賜銀幣鞍馬加太子太傅一時榮之七十五嵗癸亥先生家居西河集巻一百十五
