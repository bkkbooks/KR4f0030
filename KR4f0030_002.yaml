body:
  text: 西河集卷二翰林院檢討毛奇齡撰頌聖德神功頌有序惟是皇清嗣世撫育方夏東越溟海西薄栁谷南底于窏汗而北極之莽䍚無垠之地其在水居者雕額畫臂率為良民版畫其波濤而租其魚蛤其在甌脫居者大幕以南皆保塞稱藩環嚮為屬國自是而外雖舟車未到人力鮮達亦且仰天地之恩昭日月之信風聲逺播同量一器獨是瀰迤以西汙裸么小若所稱厄魯特噶爾丹者倚恃荒昧託迹榛曠與喀爾札薩脣交齒互不思睦鄰恤族內奉約束而乃自舍厄狹頓駕夷陸侵陵我㰚衛暴殄我藩服東西爪揃罔顧禮義皇帝不忍加誅屢飭以法俟其湔滌勿追夙染乃復鼠穴自大終致負固伏念皇上曽駐蹕喜峰登臨慷慨賦黃土崖大石磯二詩以宸翰書之巖間兼諭侍臣謂是地皆前朝戍屯烽堠相望我太祖太宗創業宏逺夷夏一統致蒙古四十八部皆為臣僕朕每過此地未嘗不念丕顯焉是埏紘萬里無非締造遊豫所到猶厪先烈其可令螽蝝肆喙蚉虻鼓翅漸至如此夫無疆厯服匪易嗣也前人之光不可以遏且佚也况乎古昔聖賢經文緯武雖揆奮有人亦復手秉白旄身挺鈹鐸以故黃帝親戰于阪泉而文王北伐畎落躬承盧矢以彼神聖何難命將出師髙居深拱以操制勝而乃安不忘危勤思勘亂忘萬乘之尊習三單之效哉誠以君不親將皆叔世浮文而非古王毖戎之本意也是以廟謨盈庭貴乎獨斷征伐之權出自大子乃遂張皇六師大申克詰羣策不足撓衆諫不為沮集虎賁而縣豹尾肆類于上帝昭告宗廟遍望諸山川百神禡牙而􅤀纛練日鑿門以恭行天罰先遣撫邊大將軍由沙河抵塞尅期並進越歸化歷烏蘭河朔遏其歸路以會大軍于幕北而羽林佽飛從獨石同時出關師行三十里屣克勒隃蒿齊涉敖漢越烏朱目秦凡蠻夷君長外藩諸部王可汗貝勒貝子公台吉等先後會朝以壺漿簞食迎于馬前其他北庭薦居去胡來王者悉環列跪道左觀軍容不輟乃絶大幕進拖林調兵穀車餫使武剛冰糒不絶于路雖鹵舄之地每乏泉水而靈源疏鑿所在湓涌會飲馬川西忽得故明成祖勒銘紀功之石于水崖灌而視之有永清沙漠之句上曰真永清矣遂于中夏三日直搗其境犁其庭掃其閭鳥逃鼠􅋟四竄之巴顔烏喇而西路之遏其奔者迣擊于昭木多鄂爾渾河之間以比干環盾大破其勃盧之陳擒其子炮焚其妻孥追殺三十里斬首鹵二千餘級生得數千人乞降者以日至鹵獲馬牛羊驢騾釜鍑械仗無算乃大展皇仁任其零騎數十人負創而奔而我士卒無離傷者皇帝乃駐蹕黑魯侖河封拖諾之山禪之土喇遂班師焉先是禁旅初行時兩浙官民念七萃勞苦旗門逺闢不無宵旰跋涉之艱乃宿衛纂嚴眺聽祕謐行間消息不泄于外因晨夕引領北向以冀布凱驟傳管侍衛內大臣暨大學士祇奉諭旨而和碩康親王亦遂有啓請頒捷之奏流抄到浙浙撫臣榜之通國官民大小皆歡抃踴躍男女聚族轉相慶告遂于康熙三十五年六月十五日撫臣率司道臣以下會將軍都統暨鄉官士民數萬人焚香稽首賀捷于軍門旋請史館官詳敘膚功頒示兩浙立石于東海之濱而以臣故職史官屬抽筆作頌以俟載事臣伏思太輿誕大廣運靡極三古至今亦惟視君國大小以為修狹是故功德大者地亦大功德小則地亦小乃自五帝三王以後漢魏迄今其歷國巳一十七姓而大一統者亦復有幾即漢唐元明四代嵬然式廓而唐以藩服僭處中致歉損曽未有德髙日域功蓋月􅒸如本朝者既巳提封萬國奄有八極而皇上復恢擴而張大之不憚躬親安攘以葆此逺塞一時之勞萬世之利聖德神功莫可紀計宜立石四裔以為我子孫億萬斯年之法因不揣鄙陋謹擬為東海立石頌文以垂于勿壞其文曰粵自三古長此六服徑輪廣袤視功與德漢唐元明盡有厄塞晉宋偏安比之列國惟我皇清闢土浩濶西隃崦嵫東近日出雖復繼世兼創始謨再奪昆詔三開葉榆甫復東越旋收畨禺聲暨南服教訖海隅遂擴疆宇至于彭湖物皆安居民樂終産恩肥土城澤溢朐衍綱紀百飭聰目四逺桐生本豫禾偃能反浮苴以南並我保塞豈惟籬􅀢原屬經界肻容小醜暗為蠱壞造謀籍兵作邊鄙害皇仁有容諭至于再是雖渺末漸不可長無庸受脤徒命將往帝德神勇聖世懬朗藉此晏安習以鞅掌武丁南征王季西壤師中丈人百國所仰豈如叔世髙居稱朕不計大鴆而縱小蠢文法是崇兵革不袵諫即牽裾甚者割紖以致叢脞或就削弱珠崖徒捐金墉巳却蕭關烽火幾至宫闥所以古王最重撻伐河魁二百太乙三千星門大闢靁車陡牽銅斗獸警鐵騎蟬聯白澤逺導朱雀在前是以初發雲興百萬繼且飈起如日斯旦箕張翼舒虎攫龍戰小醜伏聽早鳥獸散因之番長逺近來謁飾彼玉具賜以匹帛覩兹軍容相顧翕舌道旁觀者莫不太息乃轉車粟亦載釜鐎一鼓傳餐千軍共醪縱遇磽舄兼履不毛畫地成井沿山生蒿壘若棋峙旗以電合九代既齊三校咸發投石于林抽刃出柙觸甲鱗碎近輻瓦裂巖谷顯漏木柴僵落譬諸泰山不壓卵石嵼土迸陷瀚海坼竭何必聲罪歸曲直責以是摘莽任彼升陵帳絶烏鳥士摧豕熊右衛聯校前軍折衝廟堂之算乃在軍中爰度梓嶺轉破苻離陳以槖它駕之豺貔鹵其人畜俘厥子妻巷尺寸堪此鋤夷遽收因杅翻遇軍曲男悸􅋟影女孕墮殰潛山匿水相向而哭受降之城何啻三築伊昔明祖親巡緣邊三犁王庭至飲馬川勒石天山比之燕然一沈水崖一升山顛文詞昭晳符讖不愆永清而已他何有焉獨是虞帝七旬苖格髙宗鬼方三年始克何如神武指顧頃刻厯候三月恍騁八極祗我朔暨巳及祝栗蜣肱蟣胏奚足介棘惟兹方域九有以宏內備簫勺外毖戎兵金盞勿闕玉燭以明自兹以後泰階升平皇皇八柱勒功德銘萬方齊瞻四海永清西河集卷二
