body:
  text: 西河集巻一百十一翰林院檢討毛竒齡撰事狀武林處士吳先生遺狀􅝩當先生易簀時其子寳崖方成童未能舉先生行事而狀述之也顧寳崖夙慧能以兒時交海内士海内士爭欲得見寳崖訂縞紵去以故先生之逝少司㓂髙公太史唐公憲副曹公以及家明府孝廉輩競相為傳誌著其生平比中郎之于有道而屬予以狀鐫之􅝩予嘗訪寳崖過先生所居載墨舫者相傳先生故居杭馬坊里俄有鄉豪者侵其居徙之武林門柳間顧好施贏金隨手盡既已營新址度木陶甓僅樹楹土中腓其磉錢匱不能繼掩樊而卧親交之徳之者爭醵錢决樊助成之今所稱載墨舫又稱墨艇是也但當時以載墨名緣先生嗜翰墨如曩時所謂寳繪者而弆書畫于其中乃聞先生所珍祕搜宋元名蹟暨近代邊吕文唐輩凡值佳好不惜多其金購之已積累成軸盥手摩挲以為生平適情事無過于此偶裝潢無厲竊衒其一急貸金贖之不使闕因為顔其居志勿復忘而無何有者忽過其所居負之而趨先生笑而曰夫物之得失有如此畫矣夫先生之儻䓪壘落不為世芥蔕如此先生諱盛祖字宗彦别字適情常自稱墨舫主人則志所嗜也先世家新安有將仕郎遷于杭始為杭人髙祖忠一公為獲鹿縣簿有聲祖玉成公兩以舉文中乙科先生岐嶷受書目兼行下年十九而孤負薪事母慨然有髙世出塵之思俗人雖與交不知也父書以遷居散去重購千餘巻劉覽經史暨諸子百家之言每有論辨輙雜題上方顧未嘗彚輯任其零屑所著文無兼本今存笥者獨幽夢軒雜詠詩百首而已髙司㓂嘗曰先生詩在陶韋之間詞左揖和仲右揖改之而唐太史亟稱先生所著桃源圖滿江紅詞依其韻和之夫桃源圖者即載墨舫中所弆之一也今其圖何在而詞至今猶嘖嘖人間世嗟乎其所著足重如此然先生之視其文與視所弆畫則一而已矣先生生于明天啟辛酉五月八日子時卒于大清康熈丁巳六月十二日未時年五十有七性好山水居近西子湖當風日暄妍嘗携諸子遊其中或駐舟柳塘藉草而飲或挈榼蹠山麓自歌所為詩響振林木望者疑為神仙中人晩復闢草堂于斜橋之西雜植花蘤張油幕其旁自題旌聨招所好賦詠不徹宵旦以為常配李孺人生子二長陳琰即寳崖也娶王次芳娶沈女六四適名家子二未字寳崖舉茂才第一嘗遊齊人有指道傍金謀發之以告寳崖寳崖笑不言其同行者却之曰寳崖之先人嘗居馬坊有主于居者遺黄金一囊去追之不及其後客還來取金封識儼然夫金投其家而不之取也况道傍金哉夫先生之介其為世誦述如此誥贈翰林院侍講學士高公崇祀鄉賢主隂事狀公諱厚字古生先世餘姚人以遊學徙居錢塘少博羣籍有聲藝林間崇禎末中原冦興公絶意仕進受生徒講學里門先徳器而後詞業言坊行表為後進領袖東揚逺近多宗之嘗居䘮過哀毁三年未嘗去衰絰人勸以勿過公曰先賢子羔為吾宗所自出三年泣血當時不以其踰禮而貶其賢吾嗣吾宗賢幸矣事伯兄如父所遺猶子三女一公為之嫁娶親黨有貧者恒膳之或給以産鄰里有所乞無勿應會越大饑郡守王孫蘭司李陳子龍令所在設粥厰公特立厰於里門貸錢燒糜全活甚衆且復儲槥栁掩胔骼以廣徳意臨歿書忠孝二字呼嗣子以勿忘君父為囑所遺詩二巻文一巻格言一巻朱陸異同論三首康熙二十五年以子貴誥贈奉直大夫翰林院侍講學士二十七年廵撫金公提督學政王公廵鹽常公從士民之請崇祀杭州府學及餘姚縣學鄉賢奉主入祠後學史官某謹撰事狀而勒之主隂二月朔日謹狀敕贈徵仕郎翰林院檢討先君竟山公崇祀鄉賢事狀一本賢事母何太君孝家失盗什器一空慮太君知晨起急貸銀買什器補設如所盗物一若未有失者太君下樓失足磕去膝膚肉公頓㓤己膝膚肉填之立愈後太君葬湘湖公移住墓鄰盛靖三宅三載不預家事一本賢席先岐山公舊業有大屋一所在北幹村章堰時兄弟三人小有分爭公立讓屋與兄弟自賃下岸小房居住今季子檢討所居即是也一本賢身無二色有寡婢遣隨姑嫁婢不肯行詢之曰主人賢此間無暴客見犯故也一本賢少與陳咸五讀書亡銀廿兩疑咸五取去遂成大隙時北嶺廟吳道士能巫蠱術名下煞可致人死因下公生辰干枝于地鎮煞之公夜齒㦸逮曉有告之者急詣龍虎山見天師天師解之以未滿七七得不死遂請天師符持歸為䕶宅終身或謂此讐當必報公笑謝之曰煞可解怨何不可解也相好如初一本賢少諳音律其先汀州司馬聽齋公孫啟吾公極善等韻兼能擊鼔作等韻聲使隔墻聞聲知翻切字或曰即諸葛鼓之遺公盡其技著先天字母之學名竟山等韻錄一巻又曾受起吾所藏涵虚子譜唐五調曲二首笛色工尺皆近代音律家所未有者見檢討所輯公樂說名竟山樂錄凡三巻一本賢長子仁和教諭為推官陳卧子先生試取第一季子檢討為太守王雪肝先生試取第一二公敕縣給榜送公曰今之太丘公藏而不懸曰不敢也及國朝初知縣黄畏菴先生迎公作鄉飲正賔仍以此四字給榜不得已懸之舊居後燬于火一本賢事蹟略載浙江通志孝義傳中餘不備錄附錄府蕭山縣儒學廩增附生員等公揭為誌傳已紹興載其人享祀宜膺其典公請崇祀鄉賢光爼豆勵風俗事竊聞國憲攸垂典莫隆乎饗徳王政所載禮莫大乎尊賢是非出學校而始公毀譽至鄉邦而後定惟積行近聖人之域斯崇禋表至徳之師伏見已故誥贈徵仕郎翰林院檢討毛公姚江舊閥餘暨耆英五世紹忠襄家餘碧血六經傳殿翰代嬗青箱趨庭聞詩禮之風亢宗勤閔曾之行幼敦孝則曽廬墓于湘濆長篤友于實推居于章堰目睹襄陽㓂亂長棄毛錐身辭江上行間潛歸鐍室囊有遺詩步芳規于萇享里名君子追淑徳于荀陳推至誠而及物不媿兒童慎幽獨以褆躬無慙衾影非公不至標子羽之清風有難必排尚彦方之髙義郡給太丘之榜讓而不懸縣崇桓傅之賔領之猶歉以故義方成教長君授司理以改鱣堂燕翼能貽季子進承明而登虎觀數世門生多推籃轝繞庭孫子半在公車浙江通志錄事實于孝義傳中越社遺編列姓名于耆英表内况思榮之載錫孰禋祀之可遺謹籲公情原非阿好伏乞鼎惠鈞評俯從輿論推惟徳是親之意𢎞教人以善之心敕縣吏以敦迎紹邦賢之崇祀庶幾楷模足式允生􅓺序之光冠履長存永沐蒸嘗之澤日提督浙江等處學政兼翰林院王講官起居注右春坊據詳本賢鑒重君宗行髙模楷枯王裒之檜栝墓繞慈烏推薛包之田園庭交讓木踞藝林之髙目睹戎馬而傷心見機拂袖長辭幕下之羅吹律成書堪作枕中之祕惟汝南之月旦儗人必于其倫斯太丘之品題定論允孚乎衆况且王家龍虎早擁風雲兼之謝氏琳瑯漸成珪璧凡此家門之昌熾即皆盛徳之儀型學校既有公言爼豆亟宜崇祀仰該府行學遵例迎主入祠仍取給冊事實報姜司諫治外事狀姜司諫君用治吏起家世祖皇帝持召諸治吏二十三人各予兩省官令入諫而司諫君稱首于是君得謇謇為直臣凡五年今皇帝踐阼念其勞以列卿詔進君乃乞假覲省水部君于堂鄉游而其友毛甡以避人故主君家㑹守越者來請君諫書兼錄君為吏時事取其大都一二則可為典者而屬甡以狀謹狀君自言曰治内者綱也治外者理也綱以制理徃用意科以列紀徃用事事之所在而政舉焉意之所至而法以張焉君筮仕司教在浙之温温于漢為東甌王國其地北當海而環山可藪多㓂君以司教攝瑞安縣事適㓂至時㓂輕瑞安用少嘗之君帥鎮兵之守門者數十人驟殺而出賊遁時戊子五月六月賊大至渠劉姓有名環城以營餘盡伏仙山間君帥衆登城未固稍為補苴裂衣標于竿闗舉門礟發城之南端城久敝也震之崩一角衆大恐君乃復撿諸門礟得㝡大者遍搜城硝炭及七十斤盡實之大礟中闗舉城中山發之以稍仰踰賊營不甚傷賊然賊乃大恐却之環數里外君乃歛民家􅟍瓿凡百餘丹紙泥其脣以脣四嚮架陴間賊望見瓿驚以為列礟不敢近然賊且尅期必三日下又益召諸賊衆甚恐君時登陴瞭望示無懼意安衆心而隂募丐僮裂竹衣方寸作告警牒覆以縣符綯履之蒯繩使夜出之丐經賊營而請于郡三日郡兵至乃合諸門兵殺賊賊又遁君遷元城縣令縣西接衞河自衞輝達内黄河受淇及漳及沁下與滹沱直沽合多水患而沁時暴漲入衞東下湯湯縣故附郡郡之恊守者率鎮丁隨郡坊築于衞之上流思遏之而留君捍城君躬先負芻結芻于枋之木間以板以障城賴之燥而上流坊築者不得成水怒且奔勢洶洶居民大恐忽一鎮丁狂言曰予河神也予方請帝命將瀦爾城而元城令姜君仁長者也又善治水必姜君親禱予瀦可免趣煆琅璫環首項間當是時民固已望君至是聞狂丁言望益甚踵請于路君夙不肻神且慮中狂誖不應顧民心宜慰也乃命潔于社設水土神祠之若禱社者竟不一顧狂丁水平順治壬辰畿輔饑且人心未定往往輕去其鄉遂多流民及其嚮諸郡而各不内也則流益衆方是時立逃人法㝡嚴凡去旗歴人訟匿勿出勾稽者得之十家坐故他郡來無名數悉不敢以内而流者貫于道僵如毫毛鄉民既鍵户居即叢祠社宇亦閉以土流者多仆櫩下君憐之召集諸父老諭之使留父老曰如逃人何君曰可辨其擕子婦者耳三窟于環逃婦也否則留而以却其獨行者則且可無慮且獨身易生也且夫郡亦饒閒田各任而亞旅而教以墾土待年升科是公與私均利也衆曰諾于是留者以萬計井里皆滿既而督撫亷其事下其式諸郡使傚行之流民以安及其既也流者或不得于其所主又其勢不可以去初以饑來附既或飽而生其心則或自指為逃人覬與所在胥吏等倖相認則坐主以法不然則亦押子婦還里可自便于是有檢舉稱逃者時特設督部府司逃事君每聞稱逃立為文押赴府使不得瞻顧為奸然猶懼審詐則狡者猶得押還自便也君復移之曰審詐得還縣還縣則嚴治以罪或從解喻之而于是稱逃者亦竟以息論曰司諫饒治蹟即此觀之亦管樂之材也或謂司諫對闥時多行仁以意如預積貯以備荒政緩並徵而甦民貸傷心宅流告以祥刑目瘝士窮促之揀選皆恵愛也即其他戢兵弭盜調銓佐儲無一非實効而此悉不載獨載其治外者時復有催科法㝡良至今西北俱效之見别錄趙孝子遺事狀予與山隂趙甸游慕其為文嘗兄事之既而丁國變髠頂披緇更其名壁雲今畫題稱壁雲甸是也甲寅甸死其門下士劉世洙已為之傳名趙孝子傳予採其遺事而狀之甸九嵗時其父游學歸大雪不能舉火出古畫一幅命甸詣友所易米不得其人悵然甸閉户乃吟詩曰吾家有古畫其價重連城不易街頭米歸來雪滿罌父聞之笑曰有子如此饑亦何憾哉甸幼執爨下灑埽澣濯以餘工讀書既而念所以治生者嘗為姊描繡床至是請試為之遂與姊對床繡針刺精妙每持以易米人爭奪去曰趙家繡鄰兒誚之勿顧也夜讀一樓文日進甸母性嚴小不豫跪請備至嘗出妻數月感悟始返里中稱趙孝子程節母事狀程母氏吳休寧商山女歸程自康年二十二而孀居思以殉程毀瘠絶奉既而率其孤饍姑于闈見姑中身方嗛嗛食菰而甘乃泣曰吾死誰食吾姑哉遂努力晝夜組績指敗繙四子書視兒讀讀頃復組績如故崇禎庚辰嵗大饑姑已八十卧病初覓姑嗜百計購所難致而身與孤屑柳榆及病久而姑嗜衰也夜分視藥背不藉茵衣絮彌月解澣而繩髪縷結如是一年既而病棘乃號于程之栗曰吾無以療姑矣吾將饗姑肉倘能籲天得延姑三年者吾以匄汝遂刲臂和汁進强啜之甘啜竟竟愈三年始卒臨卒姑曰婦孝事我吾死後吾隂遣婦孫之孝婦一如婦也後九年母卒西河甡曰如母者正旌典所稱節與孝也而未旌雖然旌之矣母之子名斯敏者乙卯舉孝廉與吾邑來給諫遊吾嘗思其賢今而知為得母教也斯敏曰吾兄弟三人各冠婚次與幼皆不以累長則皆母自操持之母禱姑而神既能假天而遺命勿事禪誦其善持大體如此嗟乎賢已斯敏以狀屬予傳予自以不文仍為具狀乃狀西河集巻一百十一
