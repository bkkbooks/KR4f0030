body:
  text: 西河集卷一百一翰林院檢討毛奇齡撰墓志銘十一自為墓志銘先母張太君夢番僧持度牒來懸于堂其牒四邊以五螭相銜為花闌醒而生豫因檢郭璞遊仙詩有竒齡邁五龍句名竒齡五嵗請讀書無師太君口授大學已訖讀問其字何等太君買市雕大學一本令循所讀自認之一再周無不識者時以篇首后後厚三字異形為問太君曰後先厚薄音諧義愆后與後同歸德不前總角舉諸生一月中取小試第一者四爾時先兄萬齡先在學有名人呼豫小毛生值明亡哭學宫三日會稽山賊紛紛起市里奔逃豫竄身城南山與同縣沈七包二先生蔡五十一仲光為四友文集卷有沈七包二先生諸傳闔土室聚南北唐五代遼金元史暨諸書其中縱觀之順治二年王師下江南杭州不守山隂鄭遵謙乘間起閭左括民徒為兵劃江抗王師時餘姚熊給事孫副使同時起兵不數日寧波台州金處溫五府皆鼓衆相應適武寧侯王君之仁保定伯兼鎮海將軍毛君有倫原以備倭軍寧波聞變挈其軍而西屯之西陵與民徒相合名西陵軍保定者子族人豫族譜中有毛裕毛祚曾于景皇帝時以兄弟同科登北平榜者其祖也時故明諸王爭渡江江東民徒已共推故魯王為監國統諸軍軍而保定至蕭山訪同族之居蕭山者移檄購大小毛生出豫于土室啓之監國授豫為監軍推官豫力辭之隂與沈七行行間覘諸軍所為不道不足與計事且天命已有在沈七著辨亡論見意匿不復出會鎮東將軍方國安以江南新下收敗軍東奔踉蹌渡江而馬士英奉故福王太后奔杭州竄國安軍中名曰方馬軍與西陵軍相峙而居大司馬徐公犒軍西陵公名人龍即徐仲山尊人也曾題豫監軍不就其題詞有年遜終軍才逾公瑾諸語國安邀保定共迎之保定以咨豫豫曰方馬國賊也明公為東南建義旗何可與二賊共事請絶之國安聞豫言會出戰敗于朱橋以保定坐視遷怒移兵向保定搆辭及豫且有指豫譏兵事者時江東軍著大帽沈七作大帽謠和云將軍愛蒼頭不若愛危腦危腦小易收蒼頭大難保又諸軍每出戰必半渡返因作少年行末云少年欲渡江江面多少路接岸十里長五里不可渡豫被獲幾陷脫之龕山時保定弟有俶為靖南將軍軍龕山名龕山軍就之住一月復還西陵清明節山中白桐花生保定家人夜召豫春雨移帳桐花間豫與朔客觀星者危坐天收雨星見出帳四望咨嗟曰事已矣滅燭流涕會故唐王亦僣號福州客有以漳浦黃宗伯道周蠟書招張杉者張梯張杉張㮙兄弟皆名士㮙死于兵張杉持示豫邀子南行且曰方馬軍可勿避耶豫曰生死命也且行亦何能為亡走山寺寺僧為豫屠首髮衣緇匿坑中王師破江東戮山市之留髮者豫以髠首免歸覔家人于褚里太君撫豫首泣曰吾向夢僧寄度牒生是兒今竟然矣時東南新定文士野處者踵前代積習好為社每社髙會數千人撞鐘伐鼓得與者為名士否則無所齒于衆豫品目過峻且好甲乙人所為文先與山隂徐緘同邑何之杰為三子他以文見質多却去會選郡人詩鏤板行會稽王庶常從賊中歸投豫以十詩豫録其四乃以右丞司户評其篇實譽之不知其得罪王庶常名自超有夜走鄆城及哭周介生赴西市詩而評之云云聚怨家歃血布張置羅與同邑舉人以文社被黜者集親串怨隙聚謀謂豫逆抗命今又抗試且以頭陀居士林骫壞名教罪當死讞者察其妄不坐值順治辛卯浙三舉鄉試同社章貞登賢書偕同籍舉人昌言毛生在江東抗命時義不受職故當時奪其籍今不試髠首特無籍耳倘能豫之籍以旌其義是人必能慷慨為朝廷效命豈甘鬱鬱自廢棄乎提學翟君是其言立還舊籍令辮頂待試而怨家洶洶會布政司使張君以從賊歸命為今官搆者謂豫評文時曾及君六等定罪之狀援偽朝典例君大恨提學張君阿伺君意指仍奪豫籍豫少好為詞至是無賴取元人無名氏所製賣嫁放偷二遺劇而反其事作連廂詞謂可正風俗有禆名教提學購得之誣謂放偷縱從賊也賣嫁者歸命本朝不待聘而自呈其身也狂生失志訕上官不敬上之制府下寧紹分巡王君籍捕之制府以為寃釋置不理怨家讐憤不得泄瞷豫姻戚有負責于營而相訐者忽攫豫于途謂豫當償擁豫將渡江鄰人識豫者追之至西陵渡口篡之還次日購道殣橫所篡處指為營兵毛生聚人殺營兵宜重典籍捕四出鄰衆千人爭渡江鳴寃營將疑其事檄寧紹分巡王君廷璧雜治怨家復羅織私之分巡遊客許君名三閭者中傷之遂援重典案籍捕逮友人蔡仲光急過曰怨深矣不走將不免指壁間所書王烈名曰請名王彥字士方吾他日天涯相問訊者王士方矣過吳投顧有孝家值豫病有孝賣書買參藥食豫夜送豫渡湖遂寄宿楊明府宅明起速客忽座中附耳或指或視一人直前抱豫曰子非江東小毛生乎相向哭時有詩云晝行蘆中遲夜行瀨上淺江東舊知豫故呼我王彥又云座中有客向豫指此是江東小毛子去之靖江旅亭近關者有搊箏客住東廂過門聞箏聲中心惻惻不能行遂止宿焉豫世于樂律有神解家傳竟山樂録四卷先忠襄子副使當明嘉靖間得寧王所藏樂録于王文成府中有雞婁鼓譜及筝笛色五尺曾記其一節至是客彈有誤處微指之客大悅邀住十日瀕别請為豫償諸房蓐錢豫曰豈以豫為賣伎者耶謝之去先是出門時仲兄與三泣送豫謂曰古賢處憂患者必知易汝知之乎豫跪而受言及過吳丐朱子易義一本于顧有孝家每竊讀茫然曰三聖之學如是乎于是筮所之遇節之需乃以已意自斷曰節者止也需者有待也節與需皆坎險在前而不可行然而節三當互震之中已將震動而乃動而得乾三則出險矣剛能出險故不敗非然則需矣致冦至矣乃急行而躡者果至遂匿海陵越一月曰可出險矣經曰利涉大川往有功大川淮也淮可往過淮淮守備張君與豫舊一見即邀豫過飲西嚮坐客目攝之中酒牽豫于旁舍勞問則故保定弟靖南將軍有俶也具言保定死武寧已殉節而已以亡軍幸免詰朝將攜豫至彭城舍養值山陽令朱君禹錫故善豫聞豫至止為豫開館驛擇日請召諸賔客宴飲為歡而吏部張公偕今檢討鴻烈父子闢名園于東湖之濵八月十五夜水亭隄榭張燈布幔雜設妓樂及色藝㸑弄而集寓淮諸名士凡數十人賦詩遊飲于其中酒再巡清歌間作絲竹幼眇豫倚醉扣槃賦明河篇凡六百餘言及旦則淮上諸家傳寫殆遍湖西施使君還自京師見之驚曰此必豫友毛生者也使君名閏章見詩題云但知王烈是名人不信毛萇本才子淮人從此物色豫豫念需象云君子以飲食宴樂今出險已宴樂矣過此將失位急舍之去于是之齊之楚之鄭衛梁宋間嘗登嵩山越數峰逺望悽愴不能上曰吾力衰矣芒芒者安歸乎會稽薑黃門故友也名希轍時內升在籍為言于中丞蔣君將雪其事讐者借他隟重陷之乃復之禹州州使君豫邑人也延署中署為故懷慶王宅後有白雲樓最髙楊花飛飛登其樓大醉手拾楊花不能哭作白雲樓歌已而邑人至者多知之去之嵩山匿道士土室中夜起倣徨少讀經稍長讀史史自唐以後無可問者而經則六籍皆晦蝕易春秋為尤甚二千年來誰則起而考正之青春白日銷亡盡矣惟毛詩可記憶者璅璅作問答散録成帙稍不可記憶即已之且念生平無建立事功既無可期而乃德不修而學不講假寐而泣忽有人告曰何不之嵩陽問之豫曰諾仰首四顧無一人夜半辭去止少林僧房踰月過廟市見鬻書者旁一僧髙笠取大學一本教豫鬻豫曰是書亦何異而教鬻之曰書有異耶曰有恆書不能讀讀異耶豫聞而驚且憶昔所告動心迹其所住于嵩陽院南則遼人而寄于此者曰豫非僧也天啓之末全家死于兵獨身刑髮而竄于金州之海濵少受學于義州賀凌臺先生為醫閭先生之孫賀欽義州人官給事講學醫巫閭山下學者稱醫閭先生凌臺授禮記大學即古本也泣曰儒者無實學于今八百年矣大學不云一是皆以修身為本乎身統心意而該家國天下于其間北宋祖陳摶之學髙談性命而略于事為周惇頤程皓皆陳摶門人主隂靜立無極以孝弟非人性窮經籍為喪志不尚氣節而薄事功虛而無用其敝也近乎忘身南宋宗程頤之學就事物以求心性究之事物無一得而坐失心性朱熹從李侗私淑程頤格物理主形器注詩易四書離騷參同契輯儀禮家禮十七史究卦變太極皇極律吕諸象數而不考事實不求真是一往謬誤其敝也過于有身夫格物者量本末本諸身也黎立武曰格物者格物有本末之物倉頡篇格量度也但度其本所在耳致知者審先後以身先之也致知致知所先後之知故古本曰一是皆以修身為本即接曰此謂知本此謂知之至也誠意則辨理欲而明善以誠其身易曰間邪存其誠誠即善不誠即邪故誠意者但分别理欲為誠身之本正心則驗存亡而心存則身存心亡則身亡修身全在存心孔子操則存孟子求放心皆在乎此但正心而曰存心者以心不在焉為不正則存即正矣心在事物則存乎此者勿移于彼心無事物則存乎中者勿馳于外久之則心有主而無所違矣乃于以修身則凡有禆于心意之學吾學而修之有禆于家國天下之學吾學而修之凡詩書六藝經術經濟無所不修故為體用兼備之學此大學也豫為受學三日去特豫幼所學為朱熹改本誤以格物窮理為正學首功遂以研索典籍詳究事物為極事遇有言心學者輒唾之今始知統該于身覺中有根柢而外鮮遺落涉艱履險皆泰然焉已而應湖西道之招即施君閏章也經竇家濆有紅字李店蒸不托食客鄰棚賣漿婦目豫不輟豫就問之則故保定伯家婦也軍散時失身于此已若干年矣因坐棚下言保定家事各流涕遂解身所衣罽衣勞之去時作詩云錦帳雙鬟貌似花河陽軍散各天涯可憐紅字三家店不賣青門五色瓜乃赴湖西住一年初湖西有舊講堂王文成講學處也外有白鷺洲使君新設講會于其中時楚人楊君恥庵從東來率其徒講文成之學使君與之辨詩辨禮辨尚書皆不能詘豫辨而詘之使君以為其學疏遂以新安之學抵其隙謂學在事物不求之事物而求心性非空門乎恥庵不之辨少頃午食使君曰子淵不遷怒何易昨怒官庖闕供具責之宜也今治魚留乙而又責之則遷怒矣恥庵曰若此者可得求之事物否豫聞之大悟即下拜歸而惺然坐通夜不寐乃以使君將移治辭之轉之崇仁崇仁令駱君歡留之其鄰人黃吉日餽豫酒脯且邀豫故人朱三徐二十二遊飲北城巴山間凡數月臨行估馬匹齎糧送豫至石牛渡再拜而别别詩有云天涯最難忘莫若石牛渡渡頭花樹紅是我别君處乃復應淮西金使君之招留之三年先是豫在淮淮人有知豫毛生者豫曰雖然豫毛甡也即所更名又曰豫瀕死屢矣幸而生甡者生又生也又曰吾生十年瘍五年兵戈者十年奔走道路二十年能再生乎所謂甡者亦冀夫生之者也會赦屢下而救豫者日益至黃門薑君慨然謂當事者曰毛生幾嘗與族忤特以無所用落落故讒得輕入耳今年四十餘老死可惜幸學籍有名吾當以原廩生籍上之成均使知愛羽毛願效則謠諑自免乃以竒齡名援舊廩籍例輸資入國子謂之廩監嘗居白門夜卧夢黑衣持銀鐺來前曰當行矣有丈夫者止之曰是人辛苦亦備矣生平學未了請留此以了吾學曰雖然亦何能了今當籍一物以應之少頃見一緑鸚鵡項被鎖去鸚鵡回顧而泣旁人指之曰此子魂矣遂大病會稽徐允定贈詩云莫愁隴上飛鸚鵡夢裏應吞五色雲後西河在館中甬東葉天樂作上林鸚鵡詩寄之其答詩有云三尺紅縧空自繫不如還向隴山飛少時與大理任君出賈生治安疏角讀之各五過成誦自見夢後苦憶必不得即再讀至十餘過不成誦康熙十七年是年與張杉客上海任明府署未回上特開制科天子親試者謂之制科俗以進士科為制科誤通考特分制科進士科兩門制科如漢武䇿試董仲舒公孫𢎞類是也或曰進士殿試亦天子䇿試故亦可名制科則殿試起于唐儀鳯間然唐自儀鳯以後直至宋朝仍别開制科未聞稱進士科為制科也敕吏部遍咨京朝官自大學士九卿科道以下及外督撫司道郡縣各薦舉才學官人可以膺著作備顧問者入應制試名為博學鴻儒科時福建布政使吳公興祚已揭薦首豫會巡撫楊君病故不果行而分巡寧紹台道許公𢎞勳力薦豫于兩浙撫軍陳公暨布政使李公凡十一郡所薦合得數百人僅遴取六人入告謬及豫六人顧侍御已辭免惟魏副使徐林鴻咸清吳農祥五人赴試豫三辭不獲有三辭揭子見本集是年戊午舉鄉試撫軍將監臨回避而慮豫不行乃以覆部咨文當驛入者故令本人親齎之遣官吏持咨到家從門中投入竟去不得已就道相國馮公知豫至預飾厨傳辟館相待而內閣學士合肥李公設榻邀豫主其家時四方應召者堵長安市即王公邸里幸舍皆滿城東萬柳園馮公休沐地也擇日開宴遍請諸應召者來令賦詩豫為作萬柳園賦時同賦者十餘人獨以豫賦與宜興陳生文並稱之生名維嵩內史喬君萊工賦者也然喜事與同舍曹君禾好臧否人物喬君佯寫豫賦作已賦以示禾何如曰此非君作也然則誰作此曰必江東毛生者也值試前數日右臂忽瘍發腕脹如瓠五指不可詘特詣冢宰暨掌院學士驗病求免試冢宰執不可選郎楊君淮人也朗言曰是人免試則此舉為不光矣又曰此必藥誤之耳洗其藥則指必可詘蓋疑為偽也及試日挂臂至午門請弗入學士曰苐入脫果不可為已之未晚也有何難焉遂詣太和殿受試晌午司膳者強豫把金筯指小詘時故云賜宴是日得陳太士醫驟愈故以為偽完卷上幸霸州攜諸卷以從親坐帳殿閲至十餘卷風起遽止豫卷在閲中且夾一紙籖翌日盡付三相公暨掌院學士訖閲及呈入以豫列上卷上忽問曰媧皇補天事信乎蓋以豫卷中有匪鍊石之可補一語故也試題為璿璣玉衡賦衆未對間馮公進曰淮南子有之上曰徒記事耶則楚詞天問早及之何止淮南苐未知傳信何如耳衆相顧駴伏叩頭退乃倣前代制科例上卷比進士一甲並授館職因授豫翰林院檢討充史館纂修官而以勝國之史未修開明史館給筆札令纂修明史􅍐題得𢎞正兩朝紀傳及諸雜傳先後起草得二百餘篇先是制試時上精于韻學兼以韻押定甲乙凡旗旗逢韸剖析極嚴豫因于修史之暇據臆所見稍加以考識著韻書十二卷名古今通韻進之御前時區别賢否特召同館百餘人試保和殿中閲卷者置豫文先後之間上親拔之相距三十名注卷面曰拔若干名值乙丑會試欽點豫同考第一領十八房考官唱名午門外入鎖院分簾閲春秋房卷及放榜得進士一十二人是科上頒題進士一至十皆送上親定而春秋居二至殿試傳臚仍以春秋一卷為一甲之二二卷為二甲之一上以是科春秋房得人隨命詞臣攻春秋經者投名作春秋傳注是時房首甫教習即並與編纂皆異數也先是豫入鎖院時上幸南海子攜豫所進通韻者隨御幄行覽之稱善遂發其册貯閣中令本官繕疏從通政司并書册奏上已有日矣及撤棘謝恩賜宴禮部畢閣臣遣供事官宣豫至閣門將入閣滿中堂望見豫坐起道上欽覽所進書大喜謂有才學著繕疏另上指示向漢中堂領書册宣旨明日通政司上書并疏上乃留其書復降旨使宣付史館并敕禮部知其事方豫出亡之前一年先太君死暨避人淮西則先贈公又死時先兄以推官改仁和教諭厝兩棺于杭州之六和塔而先兄又死豫請假遷葬值言官以修明史未成阻之甚力上獨重孝治可豫請暨葬則畚土負石身親事凶功得痺疾兩足䏺脹不能立遂乞病在籍越三年上南巡至浙以躬禱禹陵渡江豫扶疾迎駕于西陵渡口上臨升御馬遙見豫遣侍衛馳馬至前呼毛竒齡皇上遣問你病好否豫答曰未好答畢叩頭謝侍衛曰有他奏乎曰無有上升馬去暨還仍送之望京門外上控馬直前呼豫名問病何如曰未好也曰何以不調理曰調理未好曰是何症曰是兩足瘋痺不能起立之症上復有所問豫以聽卑不能悉苐叩頭曰小臣微末何足當皇上垂問皇上恩厚小臣何敢當上慰勞去有紀恩詩見五古卷越二年而病遂劇豫族自周王子圉分封于毛遂以此受姓然未詳其繼也相傳魏時僕射玠曾家陳留而其後宋靖康末有侍御叔度從陳留南遷謫居餘姚為餘姚毛氏逮明而福建都轉鹽運司同知貞偶治别業于蕭山家焉先是九世忠襄公吉當明正統間以兵備副使殉廣東雲岫山賊與其子雲南參政科從子刑部郎傑各有成績紀史册餘姚毛氏稱一時極盛自刑部公一傳為湖廣按察使副使憲湖廣道監察御史巡按廣東復再傳為順天府治中文炳河南滎澤縣知縣夢龍三傳為雲南布政使紹元福建興化府同知子翼嘉靖已未榜眼翰林院編修惇元而髙祖貴州石阡府教授淵勦許龍保苖賊有功祀貴州名宦髙從祖福建汀州府同知公毅與參政編修皆一門羣從當是時毛氏以科目登仕版者自順成以後嘉隆以前約二十七人至祖岐山公諱應鳯其從兄鳯鳴舉萬厯丙子餘姚鄉試鳯起借嘉興籍舉萬厯辛卯鄉試第一從弟汧借秀水籍舉崇禎丙子鄉試而餘姚仕籍至是亦衰先檢討竟山公諱秉鏡以邦賢崇祀學宫浙江通志學宫崇祀志皆有傳餘見本集事狀卷與先太孺人張太君生子四其季豫也長萬齡辛卯拔貢授推官改仁和教諭次錫齡髙隱不仕又次慧齡早世娶陳氏以無子娶下妻三初買淮婢不冝子遣之去既而娶江寧林氏女名繁條攜之至江西死及官京師娶曼殊又死曼殊張姓見墓志第六卷暨請假歸則又娶杭州馮氏女子三豫出遊時懼豫不得還以兄子珍後豫未成丁死有葬銘在第十卷既而以其弟逺宗繼之康熙庚午舉鄉試第二先是從子逺公舉康熙丁已鄉試從孫文舉戊午鄉試皆蕭山籍而兄子文輝舉癸酉鄉試與逺宗皆以仁和籍見舉則以先教諭官仁和時所借籍也及子六十七生一子呼老得錢唐倪璠贈名一數月識字時豫方注易能以指作卦畫四嵗死豫生年早衰嘗奉先太君避村舍太君令誦壁間字時暝不能視恐感太君意信口誦舊人詞而竊書所誦于其後及旦太君視之曰妄哉兒吾令之誦壁間字而乃越右而及左何耶至四十餘嵗驟得心悸疾健忘而眼忽明晳時尚滯淮西醉中卭首讀息夫人碑無一誤者豫少病痬病痎病蛔絞而老而皆愈當方馬被誅時其餘孽尚留蕭山之管村豫避居巖壤為賊兵所截不能歸其鄰俞亮者寡婦子也無食謂子曰計賊三日當徙去吾倘得八溢米則母子俱活不然母寡子獨盡此矣豫貯米數合不及八溢并槖底乾糒盡與之而自食竹萌三日幾死因得蛔絞疾而其後亦漸漸解故人謂豫健未死不謂其不起也方豫病劇時前數日感皇上恩厚不能報每叩頭簀間會同年大司成汪君霦書至曰嶺表楊生進沈韻原本上疑其誤特令政府出君所進通韻本與之參對上知君如此豫讀之一慟幾絶豫少失學于凡學無所窺見獨鬯于音律孩抱時聽客搊彈能辨其和謬康熙癸酉上諭羣臣以徑一圍三隔八相生之法子曾作聖諭樂本解説皇言定聲録及竟山樂録思進之太常而阻者甚衆會上復南巡于行在進已刻樂本解説二卷大學士張公傳豫至行在朝門頒諭奬勞并敕改誤刻字而宣付專行于是音律之學稍得施驗特聖教未明且五學六籍久晦于天下豫稍有論辨而諒者寡也祗豫所為文偶見于世則世多稱之少時華亭陳子龍評子文曰才子之文其後豫出遊則多有論序豫文者顧甚煩不得而詳也杜陵蔣生曰蔣生生勾吳文物之都父事言遊兄事季札瑜昭榮卓一往傭劣而獨于西河毛生多所慕悅每憂思結轖熱病內發針石不可灌潄不得遽發毛生文一再讀之霍然而病釋種山僧超睿者董旡庵也旡庵之言曰蓋自西河氏出而越水越山頓為改觀此何如人者然而幼丁亂離中遭困詘甲兵徙走垂數十年嘗衣緇山中遭厄而廢其所嬰患或致籍名網羅鉤捕延繫細君躅足東西簿比雖破柱幸免而嗣子逮斃凡其所遊歷與所遭逢窺其文往往而見也乃偶然酬應思若江河遇有訂證博極殫晳古所稱潄滌萬物牢籠百態蛟龍翔而虎鳯躍比于武事可謂雄偉不常者乎桐城存齋何先生曽為文曰夫天之生才使之漸漬停育于名都大區而又洊歷之于坎坷湮鬱之途以激為要眇之音恣肆其旁薄駘宕之氣雖遭逢世妬而沉滯久則寄托益深跋涉多則究晰益密夫然後尺土之埋不得而掩焉山隂徐緘曰近之學古為詩文者擬步而後馳省括而後釋琢磨繩削浸淫擩染始猶陽貨之類仲尼久則曾雲之肖祖父西河無是也苐觀其波瀾之所蕩汨氣焰之所陵轢針縷之所穿穴芬薌之所淫泆其于古人如養由基命中于百步之外既已達脢貫革矣其餘力所及猶能摩腹拂脊射麋麗龜又如卜式已出私財助邊數百萬為縣官賑流民復數百萬而其廩庾緡錢之貫朽紅腐者尚鱗鱗沈沈不可資量會稽薑黃門曰雖然事亦有未易知者夫世之因才而獲困詘者有矣木文而戕之甘其井而使竭焉顧未聞并惡其文木與甘泉矣且夫煎桂者以愛膏也焚象者以利之齒也浸假棄液而擢桂憎之齒而焚象摧其珠而刳剔其蛤與蚌此則古今來所必無之事而西河獨有之有之而惡其人者安知不并惡其文而屏之毁之而事有不盡然者夫秋霜之殺茅不擇蘭杜也而澤已芬矣震霆之撲物不必盡朽確也然佳材或免矣夫以西河之才與其學雖在數世後聞其窮者猶起思拔濯掩卷太息惟恐不得當況生逢其人與之寢處周旋朝夕以言詞心思相聽命而振拔湔祓豈無一覯人能以才詘而才無之詘也此如李將軍者其才氣為漢代無敵乃不能取軍功侯然而孝武惜之孝文又嘆之以一人之窮而不能不得于兩天子之知也此之謂才矣今西河之窮逾于李廣天子之知十倍漢主人亦有言生平得一人知已可以不恨今天下知西河者孰有如皇上者乎匹夫之賤當天子之知而又值聖神御世超堯越禹經文緯武掩蓋百代之一人而幸蒙睿鑒此則刳剔之所不能加秋霜之所不能殺也合肥李相國師曰西河不可及者三身不挾一書册所至籯笥無片紙而下筆蓬勃胸有千萬卷不可及一少小避人盛年在道路得怔忪疾遇疾發求文者在門捫胸腹四應頃刻付去無誤者不可及二讀書務精核自九經四子六藝諸大文外旁及禮樂鐘吕諸瑣屑事皆極其根柢而貫其枝葉偶一論及輒能使漢宋儒者悉拄口不敢辨不可及三至其理學則豫固未能窺其涯也間嘗以其詩比之少陵以其所為文擬之吏部覺少陵與吏部俱無以過且即以其學而較之唐之孔仲達陸德明小司馬李善宋之劉攽洪邁王應麟馬端臨輩而諸公所著西河皆能指其瑕而摘其纇然且才不能相兼杜歉于文韓遜于詩而才又不能兼學韓杜歐蘇典籍稍疏而孔陸劉馬輩則又徒事博洽而無所于著作而西河皆有以兼之有臣如此是亦一代之儒可以少報主知矣特豫有大痌于心者往者陸機入洛已踰壯年即庾信去國亦居然在強仕之後然猶哀嘆其遭逢而傷其淪落況乎少秉大節長亦思有所論建彼文詞小道何足比數而乃德既不立學復未備曾與仲兄與三相訂生平與三名錫齡明亡時自沉泮河救免終身不出試即癸酉舉人文輝本生父也將統著九藝四子諸書因以補禮與樂之所未逮且廣輯唐後諸史芟其蕪而苴其闕何意丁年遭難垂老登朝及還歸而仲兄逝矣禮堂凄然誰可質問朝暘未親而西日已落不亦悲乎友人收豫所存稿合不下四百餘卷子囑留十一而餘俱去之惟詩與賦為友人所刻甚多大抵雜佻蕩之言與俗浮沉即以此諧俗故飲酒披猖每多不檢而詞則淮西金使君按題而索坐為雕鎪靡慢之音雖屈宋寓言不無寄托而學人無賴未辨六義恐或以是為籍口如此概不可録獨經學數卷若易若春秋若詩書禮若論語大學若孟子此即千聖相傳之用心也然而存此亦鮮矣愛我者當為我惜之豫出處未明不能于朝廷有所報稱徒抱經術幸遭逢聖明而未著實用致空言無補于心疚焉豫死不冠不履不沐浴不易衣服不接受弔客銘曰少不死于兵長復不死于刀鋸之刑又不死道路公然出世而赧然而登于廷其得歸全亦幸矣雖然乃虛此生西河集卷一百一
