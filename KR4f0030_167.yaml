body:
  text: 西河集卷一百六十七翰林院檢討毛奇齡撰七言古詩十三飲金十四烺園看草花同薑九廷幹吕四洪烈羅大坤吳大棠禎張二錕即事櫻桃初熟梅子酸草花爛熳開東園叢叢日下好顔色青黃紫白藍緑丹燔炮盈盤酒盈斚履舄紛紛集前榭龍澗何曾在洛陽辟疆不復稱吳下當筵插得花數枝短簫橫笛吹差池最憐垂老看花客醉倒花前花不知奉謝分巡許元功使君夫子薦舉抒意康熙建午之一月朝廷下詔求俊良蓽門蓬􅓅有佳士不惜中外交推揚大臣御史中執法爭捧徵書覆黃牒江東節度文教優璧馬干旌日三接殷勤但問章句儒兼咨著作通羣書上鋪聖德下華國束帛誤投窮巷居蚉虻翕翅傍椳櫑只羡鴻飛度遙海礐石難將白璧求駑駘不用黃金買使君奬士多過情品題一過增聲名滕公按劍知韓信文舉封章薦禰衡軺車旁午詣縣舍再拜倣徨謝車下主父無錢那入關王良多病難隨駕結髮受書通一經妄思載酒窺書城手讎三豕久不定胸貯五龜全未能弱歲出門覔衣食老大還為道傍客吹箎半世罕見聞解鋏三彈有誰識方今聖主真好文東觀學士如雲屯朱鷺作歌奏司馬白麟有對來終軍以茲荒謬厠其後毋乃強合蕕與薰郡國限年恐致詰安平進賞將焉存生平慷愾感知已挺刃願報國士恩祗求厚地掩薄劣莫使庸材負賢哲不然甡豈石隱人何必躬耕待三節菖蒲花發伏枕餘病中猶改金銀車倘能鑒此陳情疏豈敢還呈却聘書别馬廣文作龍門百尺中天啓廽視天孫碧雲裏藻影翻成北海魚桃花瀉作申江水傳經自昔推馬融果然絳帳來扶風當年賦笛已擅絶只今秉鐸猶稱雄春風吹花繞書屋長啓清樽倒􅌬醁香飯晨炊苜蓿寒菘羹夜泛芹絲緑簷榴初發紅滿枝歸舟欲渡千回思龍門多少溯從意半在鱣堂對酒時桐城姚孝亷文焱見贈感賦皖江才子系有虞十年獻賦升公車虛懷早授京費易健筆欲著梁陳書名髙四海久推重到處人爭識麟鳯袁氏通侯半在門王家雋士皆羣從秋風吹潦江水清畫船逺渡來西陵但知花縣看常棣時訪其弟明府蕭山那道橫江採杜蘅新詩璀璨似珠玉不惜間題寄蘿屋車下還招季布魂酒酣重擊髙離築鄉人刺促去住難暫將短景投吳關髙軒在望欲御晚翹首半天珠斗寒介丘吟為姚明府作生平不敢入燕薊金臺空復求乘黃潛登太行苦服軛道傍何處逢孫陽從來美好善謡諑啼鵙一聲隳衆芳誰知負局有𢎞量鎔成冰鑑如秋霜㩦之日月且增耀照見瓦墟皆有光皖口舊家聮譽望吳興才子多文章漢儒初試考功法唐相自饒應變方壠草春耕勸田叟鄰烽夜靜降甌王試淬干將欲鳴匣爰收竹箭方在房世人誰可與儕伍惟此乃得當門牆清秋銀漢甫灩瀲新蒲獵獵生野塘乳燕學飛爭去壘枯螢埀死猶棲囊泰山􅏭嵲倚天半梁父介丘羅四傍結根萬仞得所託浩然一顧天風長西湖將軍歌秀江橋下春水生緣橋幾曲春花明燕山大將開幕府千里不聞枹鼓驚當年挾策上金殿幸奪翹關走飛電仗下看披雕錦衣宫門却賜花菰箭十年宛馬塞上騎親隨部曲漁陽兒桑乾風雪控弦去猶聽阿嚲當橫吹龍驤南下定三蜀遂駕樓船遣楊僕湖東既鎮後湖西每見投壺理軍曲從來名將不嫌老羡汝當年立功早躍馬雖稱矍鑠難擒生終逐嫖姚好揮戈橫槊二十年生才四十春風前桃花叱撥紅照眼擁麾江畔疑神仙宜春臺髙秀江緑時共登臨看黃鵠記得前年江上亭共點酡酥倒􅌬醁是時春雨細如注幸與將軍倚庭樹落絮遊絲濕馬蹄正在袁江最深處袁江草長花復開清江水漲空徘徊思君重憶亭前飲那得紅船載酒來戊申三月旅亭夜讀東原宗元鼎所著新桞堂集中有三詩專賦豫瀨中事觸境生感因為長句寄去隨筆無敘憶昔行瀨中曽經射陽渡欲託東原宗鼎家風雨江關暗前路從兹奔走二十年每過隋苑心茫然名山不厭少文病破浪只思元幹賢前年白下遇難弟謂鶴問因宿街西瓦棺寺龍躍雙埀海內名雁行單作天邉字思君但讀君著書因之遙識東原居芙蓉一畝共兩畝楊栁千株復萬株深堂楊桞想佳句初日芙蓉豈虛譽如何念及瀨中人不道瀨中從此去當時鼓枻渡水鄉蘆中無復傾壺漿孔融兄弟逺難覔道傍獨立空倣徨潛行宛轉過江右記得湖東鄧老秀擊絮偏逢水漲時裝衣正值花開候逡巡流落淮汝間酒徒死盡誰能傳感君記事最慷慨使我泪流如涌泉春深三月返江沚垂栁紅橋夜低起為讀東原詩一編三乞鄰燈酒家裏陳掌院夫子生日作在昔郡國應制舉集賢學士居殿傍已徼詞業進祕閣尚未程試留東堂執經曾向馬帳度遙見天邉白雲暮龍沼桐扶和嶠還鼇峰土負山濤去只今三載彈素琴紫芝産地烏棲林立朝久動荃宰戀移孝逺邀宸眷深藝臺重掌入親近詔遣黃門賜存問玉案親書第一班金華坐進登三論當年兩省薦拔人今唻幸步清都塵分將黃紙當廳展擷得紅蘭滿座春老成端作後來式守正時時見容色進賢必欲辨驪黃斥偽何曽雜儒墨文章能起明宋衰昌黎之後無雄才講筵高出陶虞上草制全從典誥來圜冬暢月設弧矢正值王師渡滇洱六詔軍書奏玉除三雍文教開金齒大臣嘉績動簡編泰符高映蓬池邉第看天紀回星斗安用嵩高誦歲年南山篇奉祝平太翁年伯七十初度載問次山尊人也君不見南山之高高入雲上連閶闔開天門仙人環珮紛錯落日月光景相絪緼阿翁七十好容貌欲與南山等崷峭名法能傳韋慶成高懷不數岑公孝牆東寄迹追少微行遊嘗著青荷衣風生南塢椒蘭發日出東園烏鵲飛即今初度誦皇覽矢絓寒蓬射來逺神授方函啓緑文賔隨曲巷開朱􅚫華鐘綺席次第陳清秋八月真良辰邀來閣下彈筝女舞罷庭前戲彩人庭前戲彩皆神駿千里聲名逺尤震馬氏由來重五常江東自惜推三俊南山􅏭嵲高復高稱觴進履多賢豪欲知綵紱垂麟角但看趨庭有鳯毛李方伯生日黃星熠熠臨江陽漸東漸西瞻景光鳴葭疊鼓樹六幢云誰開幕今藩方三韓家世遼海長從龍舊澤傳芬芳蟠根仙李枝葉揚惟公筮仕肇龔黃分司偉伐留西江晉階總憲肅紀綱三河萬里百辟良羣推觀察非尋常嘉名特達書御旁帝將簡之補衮裳惟此吳越稱巖疆東南克詰撻伐張非公不足領上襄只今羽檄猶旁皇軍需自給廣武糧伊昔蕭相當漢昌關中餽餉連戎行中原開府杜與羊嘗恢宛洛屯江湘矧茲甌越空陸梁不煩朝食揮欃槍自慚垂老依梓桑猥蒙薦達登帝閶車箱盈轡馬曵韁持觴不前應見諒高天尚見青鳥翔願隨青鳥同相徉一聞上人畫鶴索題自笑生來有仙骨年年相對鸑鷟棲談經拂麈擁高座儼若仙驥橫天梯竹林鸚鵡靜無語寶塔雁王他自飛不隨丁令較去返豈與支遁相因依間堂落筆起長嘯此間亦有凌霄姿金學使曽陷賊中歸命途次感寄浙河東下海濤坼曽啓龍門浙河側取士能如嘉祐年論文不數元和日機衡在望鮮軼才諸生並得乘雲雷醫師雜採及馬浡孫陽一顧皆龍騋誰知世事多反覆倐見烽煙起南服楊僕方隨下瀨軍趙他幾篡番禺牧王威赫濯恢七閩杜陵陷賊埋風塵青天見日撥雲霧今來重會三江春文昌熠耀動銀漢長夜漫漫有時旦百里相過不得前遙望雙旌泪如霰暮潮行别朱公子簪原春潮初漲曲江邉遊子乘來申浦船水上桃花新帶雨城頭栁色正含煙主人邂逅欣相見邀我南樓啓歡宴黍酒傾餘緑玉盤芹羹泛作黃金線逡巡入夏歸去遲宛如家室相因依林鳩喚婦循簷下海燕㩦雛出幕飛長帆欲挂轉鐵鹿將向江頭别朱穆幾行愁雨為君傾一曲離歌倩誰續嗟君家世本畫輪聮翩華閥傳來新伊豫何幸託杵臼廡下定交如有神吳淞東去極海涘一望錢塘正瀰瀰他日相思欲寄書但看西陵暮潮起奉謝何使君夫子有感從來治郡稱第一廬江太宰何敬容即今於越踵良牧軒軒五馬如遊龍山前文簿啓來碧花下印牀開去紅竹符初發罷征調誰謂東山有羣盜傍邑先傳諭冦書明庭且下求賢詔龍門高峙渺百尺頓集平原舊時客自慚階草漸飄零差向園桃比顔色負芻長自困泥塗豈料終逢晏大夫白璧儘教三獻去黃衣銜得一環無當時乞食渡淮浦無數淮流溉胏脯結襪交為國士歡投竿只道王孫苦十年側促懷舊心使君千騎方駸駸天涯壯士今還在仰視滕公泪滿襟桂樹生玉芝歌為薑定菴京兆作君不見庭前桂樹發素秋連蜷偃蹇枝相糾蟾蜍原向根底宿鸑鷟儼從花下遊忽然華幹産芝實玉筍漸看膚裏出三秀煌煌映列星六英燦燦承朝日豐脣麗肉白雪姿靈根翠羽生華滋墜露空濛如雨散吐雲繚繞似煙絲嗟君奕葉挺奇秀謝氏當庭耀清晝夾道朱輪有嗣英高堂白髮方長夀當年左掖曽草麻甘泉前殿揚朱華芝房一歌未絶響函德九莖還薦葩今來子舍奉甘旨暫借商山斸仙餌流膏沆􅀈成酒漿瑞彩斑斕作金紫弧南一宿秋更明下應瑶草相敷榮不信但看桂樹上團團唯有玉芝生崑山徐母顧夫人夀青鮦畜修鱗不復生凡魚丹山産鸑鷟逈與羣鳥殊即今東海擅華胄有母賢名比仁夀徐藻原傳內子文顧家本是閨房秀清洋江畔采緑遲春能濯繭秋鳴機教兒嘗秉和熊志相士仍吟弋雁詩以此諸君奮皇路各向長安獻詞賦上苑爭傳花一枝當軒種得珠三樹慈恩寺裏曲江春兄弟皆為領宴人散膳羹遺東閣早留甎日愛北門新今來錦帨懸高闥畫蔮重重加緑髮但看殿帔賜朝霞儘使宮衣舞秋月君不見雍丘宋氏兒臚名相讓還相追娛親江夏遺綵服到今湖橘猶含緋又不見閬中陳堯叟兄弟三人兩殿首其一曽為知制臣尚恐慈親杖橫手猗嗟我母年六旬居然邁宋兼超陳且隨吳下稱觴客還慶庭前戲綵人贈襄平李廣寧司馬赴兖州任城司馬襄平豪腰懸鹿速金寶刀英年妙筆擅文史翛然意氣干雲霄鳯毛燦燦成五色逺向丹山趂飛翮望嶽重登杜甫臺題詩應在匡衡宅淮流浩浩到海廽雙旌南下蒼雲開他時載酒行春處無數桃花傍澗來相望篇送陸少參督餉江南從來執法推鯁直前有陸杲後目山相臣初避道路去內戚不上街樓看何者參政儼宗邸為使直指爭往還將施赤棒先白簡此事乃在順治間先皇駐蹕御南苑親召副相連臺班特令出衆宣口敕謂此不負柱後冠方州節鉞久未振請借高峻風人寰中朝豈是厭汲黯出刺乃欲重薛宣鼎湖龍去年又年此翁歸卧江楓寒今來循次遊長安殿中多薦識靣官五都列嶽未為薄六路轉餫將誰􅈺東南惟恐竭民力天子乃遣專事權公整往足肅吏治清亷不用支官錢我今相送思贈鞭臨風如泛丹陽船長干釃酒興自逺西浦輸粟心長間計臣應受鵲袍賜賔從但從牛首觀莫言是地少風憲曲巷舊有王僧虔太微南下四星濶相望儼若居臺端到官莫厭芻粟㕓待君仍在螭坳邉王二光祿生日夜飲有作先生矯矯秉大節弱歲論文在於越薄宦朝看海上雲層樓晚挂山頭月京門對酒連歲年醉來長向樓前眠愛間不畜雙鬟婢上義能輕五庫錢只今內府待入直門下還留孟嘗客况有當前羣從賢王家子弟烏衣宅樓頭開宴值早春燭紅酒暖春盤新恍然禹廟看花後夜雨停舟鑑水濵甬上段長史枉過闕候值其初度奉寄此詩甬江樓畔花樹明灌門有路通蓬瀛慶元使君曵黃綬行部雨中來永興單車緩軸去呵雜肯為牆東繫朱鬛解珮慚無吕氏刀荒亭未設休源榻君家仕宦多似雲鳴珂舊里聲相聞鳯毛已布庭前綵驥足還留海上軍清和四月值初度弧矢應懸郡庭樹一觴欲獻未能前但望金峨海傍路題畫君不見丹山之穴千仞高上有朱鳯聲嗷嗷八方攬德久不下一朝奮翮求其曹朱光向日耀五采翠羽順風揚九苞低昻宛轉起雲表萬里相過向蓬島華池阿閣何處棲但見將雛舞來好春花滿岫露滿枝啾啾百鳥爭羣棲不分夏鳩并秋扈後羅孔雀前山雞簫韶不作至者鮮頴上金臺望中逺種得梧桐蔭未成採來竹實香猶淺高堂展絹采色新就中威鳯當麒麟誰將東海仙人宅寫作瑶臺天上春題周斗垣先生採芝圖商山漠漠環清溪溪邉輪囷産紫芝丹柯翠羽滿林谷絶勝三秀生銅池丈人採之嗅逾馥飢可餐之比梁肉獨坐幽岩白日長時見松隂下山麓洛中遺老百歲餘春來曽釣磻溪魚煌煌韡韡山前錦盡是當年綺里書王生之雲中白羊城邉白雪飛桑乾河上黃塵稀丈人拔劍不得意西入塞垣何所依當年相遇共文酒朝向蕭江折新栁為君送作錦官遊同上溪南一回首淹留劍外春復秋更從嶺表尋羅浮木棉花發棲紅寺椰子杯寬泛白漚今來燕市負意氣屢上金臺騁騏驥拊篋誰憐樂毅來哀歌能使荆卿避去衣短後纓縵胡重逢擊築隨屠酤層氷千仞方浩浩雁門千里跨飛狐自言碣石館難再將逐蒙恬望榆塞射虎從教太守驚椎牛尚有將軍在薊門歲暮雪未乾嗟豫索米留長安青門欲餞苦不得天街栁葉誰堪攀從來臘盡會春曉况復高名播來早若過新興肯望鄉鉛粉樓前有春草寄祝江南方伯生日芙蓉初發清江滸曉看天星照平楚關內蕭何夲近臣徐州荀羡將開府前時鵬奮湖水濵西陵相望多烽塵但瞻武庫歸南省並道文昌近北辰今來甲子喜新遘正值長庚轉秋宿方嶽能吟史克詩在朝共進申公夀秣陵九月佳氣新大功坊底羅嘉賔清樽欲獻無由達思煞秦淮對酒人送孫孝亷還里去年八月桂子黃看君雕鶚爭翺翔今年秋節又三五慷慨送君還故鄉君才卓犖世所羡曽在含元膺召見司馬高文有賜金王褒出使嘗乘傳芙蓉十里江岸長將歸且醉當壚傍滄江暫見蟄龍臥雲興霧捲旋飛揚河橋衰栁不堪折月滿當頭白如雪他日相逢杏苑中仍向花間看明月汪錞選郎善事毋值典試關中得夀萱二字碑洞摩勒以歸時太夫人八十遂預製扁額臨二字于堂以為慶索為此歌潘居色養重鼎飪况入東曹倍謹凛秩閣頻遺赤館羹彩衣時覆仙郎錦驅車試士出渭橋秦碑漢篆關中遙色絲未得諳雙纈緑字宛如銜九苞北堂日永秋尚早滿砌丹萱正姣好石闕呈來古籀殊畫梁標出旌簾曉蒼龍乍轉花滿櫩銀幡未賜開春筵稱觴長跪進夀考恩綸照映相鮮妍養堂不用啓京邸紫帔金章錫來喜瑶島羣看詠白雲宛向中庭奉甘旨曽參見肉思養親從來孝感偏能申請觀額上丹砂字好慰堂前白髮人桐城方栲舟又申父子枉贈簡和北風梢槭銀杏黃寺門雙樹塗嚴霜龍眠高客作寒旅回首一看江路長當年地甲冠雲額門十朱輪户三戟舊業金張總墜貂君家兄弟真連璧十年獻賦厭計車曽膺監郡占刑書天時人事忌太盛好女善謡能嫉豫浮雲曖曖水沈木孔雀剸金不辭辱逺戌嘗經紫塞還穹廬暫就黃花宿今來訪舊遊永興將車季子方趨庭嚴城蕭寺苦寥廓有鶴帶雛梳羽翎翺翔千仞下視小况當鳴和臨秋曉韋賢父子一經傳徐氏詩篇六朝好謂豫失職志不平天涯一見旋留情同為斯世沉淪客那惜臨觴感慨生長歌贈我最斐娓揮毫書滿元興紙愁心百折和來難把卷踟蹰不能己范母錢夫人挽歌詞夫人家本錢王裔閥閲崔嵬紹蘭沚紫燕長回朱雀航丹輪時度鳴珂里閨中日出臨繡牀刺來黼黻多文章因吟栁絮過庭下為採葛覃歸道傍錦屏初啓射烏雀正值當階覆紅藥司馬談公實我私侍郎修謇曽為妁于歸帝里舒綵函尊章簽判來淮南在堂相繼赴幽室苦捐珠釧埋金蠶夫君文譽播禹甸十載登壇領羣彥自脫牛衣上計車每銜鶴牘升金殿慨然攬轡佐惠文命留司法南康軍日周外犴有紅粟私顧在房無綺裙但聞平反始置酒况復平漕并履畝綰綬恆兼旴水符分章遂佐新安守鵝湖鹿洞講席開曽同論秀掄奇才經傳韋母朱帷下文似曹昭東觀來最憐大澤釀遺蘖道藴抽刀白如雪能令降鹵偃前矛那道歸藩擁高節戈船北發經險灘軍輜下瀨浮來難長年四顧督郵怒先生掉臂歸林間蕭然一望復何有餉饁如賓在隴畝井畔新栽阿毋花橋頭再種先生栁趨庭繼起皆鳯毛烏衣子弟真賢豪陶門有教比鍾郝伏女授經來賈朝誰知一旦馭雲路桂旐蘭旌逺相赴天上爭看製錦來閣中尚記題詩處車前執茀鈴欲搖道傍虞殯還吹簫碧玉樓中月皎皎白楊樹裏風蕭蕭螭蟠石闕類雜組竁島玄埏似幽府我欲私題哀誄詞又值城南下寒雨依韻答徐生我剛見贈長句兼送其客益州生年徒擁漢官尺不度江天萬層碧但挾康成車後書誰窺孺子門邉席君家奕葉擅雅騷館亭驛壁長揮毫明星貫胸影歷歷飛泉倒峽聲嘈嘈回思昔日煆栁下曽誓乘車并乘馬不謂伊人已殞霜頓令斯道如長夜多君兄弟能自見各赴隋宮與梁殿但得文章慰世思不須俯仰看人靣衡門寂寂時緯蕭雖居市里同漁樵避人時過雙流澗作客還登萬里橋豫也甫賦歸去來相逢把臂方徘徊湖山皎皎宛在望此中尚有孤山梅忽爾所思在逺道春江轉棹心悠哉勒銘自掃峰頂雪題柱將披石上苔此日情親誼不薄且送平原赴京洛他年卜室想比鄰願佇吳山待君築天姥詞祝吳夫人生日朱鶉拂羽吹南薰荷花滿池開緑雲華堂清晝懸錦帨嬌絲脆管來紛紛夫人自昔稟修婽曽佐盧龍舊司馬雲閥同傳玉篋書繡牀再弄金釘瓦兩家勳伐奕葉通往來車轂如遊龍只今繼起餘三秀尚攬青氊賦上宮從知珠樹生瑶圃赤文重啓藏書府若欲仙盤挹紫霞但祝秦屏似天姥西河集卷一百六十七
