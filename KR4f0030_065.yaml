body:
  text: 西河集卷六十五翰林院檢討毛竒齡撰碑記四重修雙關廟碑記雙關廟在京城四并園南祠漢忠義前楹而兩神並席如聫璧然相傳其一從城南來丙夜據此而城南之祠虗焉其後三楹養大士像則比丘尼靜元者實為之靜元故前朝宫人相傳萬厯間當福邸出藩之際有尚寢局掌設女官送之城西見道傍小女姣而晳擲以金罌遽抱之入宫即靜元也其後隸坤寧答應凡若干年而以宫人入道迄于今老矣積向所賜金搆椽習誦而猶懼為勢所奪也在昔洛陽伽藍半屬尼寺而何充以大家婦女祝髮者夥因捨所居宅以安尼衆今靜元自飾所居未嘗藉長安貴人為之化主而丈室自安一巾一盂無與人事然且上陽白髮老入空門即廬江捨宅猶恐棲息之不足而尚忍奪之忠義有神神倍則呵護亦倍也靜元徒不住介鄰嫗之有道者稽首請書石遂書此月日紹興府太守今遷兵巡道許公見思碑記守視古侯伯而周官建侯不越百里郡所轄地封堠壺柝每千里而一闢其間生牧教訓錢貨獄市嵗會課甲乙煩不能紀況乎頒銅領節凡當帥兵鎮團練所有事者規模宏且逺矣然讀漢循吏傳住稱吏米鹽靡密得民歡心故所去見思何與公守吾郡者滿一嵗察廉為寧紹兵巡副使民思之自郡逮各邑鄉官郵亭爭勒石紀功德而吾邑所標石在西城之郛因砥確摩鋭屬載其事邑於郡為八邑之衝右翼全會遮莽而負濕軍興往來所被最棘公下車甫數月會撤藩兵變近郡之響答而影傅者南闌甌江東越句章章安之間烽火接海涘導邑界飢寒無厲揭棘矜胄茒介襏赤其腓而馳所至蟻附􅑣擁麾臂長嘯漲山谷如毫毛遂於鎮兵失利之次追奔薄郡城城閉先是公已戒閭左民徒户設油燎給木械至是慰之而戢鎮兵之以奔還者城中估販無朝夕儲穀驟貴諸豪家乘急鬭其嬴民無所得食皆張拳洶洶公急捐帑藏賑民民定然圍者益急門兵突出如刀劃水城端炮石逮盡勢已無可如何公登城諭之皆呼曰吾良民也官兵不禦冦而冦我吾何為哉雖然吾不忍負許公許公子我願得一見許公面請死公露其頰于堞間衆驚認曰公耶皆投刃相顧泣曰安敢負公遽散去而邑藉以安既而會城兵大至貫邑而東邑子婦走避者如鳥獸散公發帑犒遣乞毋驚民而身請入山撫賊賊見公至皆曰無負公自山陰至諸暨至虞至嵊占業若干其以籍降者若干而邑又藉以安迄于今公辭郡事始矣當甫辭事時台衢用兵方未巳邑車騎徵發以及軍儲餽餉専芻秣兵間間關險阻悉責之邑之里畝之民公私驛騷嘗解台餉至郡恐勒里解甘給解費乞郡亭轉運遂于餉額之外羡輸若干公立督解發而還邑所羡且著為令令勿以輸挽煩邑民邑民受羡散斗斛于衢每給一户輒大聲一頌公至百千乃已公嘗曰守所以子吾民也吾嘗乘髙車訶途而驅施施坐政事堂而傴僂偃伏鳩形而鵠面者皆子姓也今有子姓飢餒或衣帔藍裂出不耀于人長者輒引為已羞況弄干戈蹈不測彼豈嘗甘為之哉而身為長吏而不急為之救拯子民之謂何且政務濶略第去其已甚而至于為民之際雖一絲一粟必得使鄉部書言可為之區處而後可已曽見長者治家不為子姓計纎微者乎況積微轉成巨也故其為政類如此公賦性恬淡而見事最敏因間于治理嘗手植桃李郡署彌山被畝間造一小舟載書其中每行部則卧舟以行嘗至蘭亭慨然思右軍故迹修其亭去公名宏勳由世爵恩蔭為今官今現遷副使當公遷時督撫嘉公能請遷行間副使以覘其功民聞之爭渡江乞留自親王部堂督撫以下各匍匐入呼曰願還許公親王以下皆動心因仍留寧紹兵巡以慰民志雖所去見思如未去者毛甡為記記曰見公之碣以知公之事亦惟民思之以至于是兩浙開府中丞陳公轉運碑記兩浙開府中丞陳公由藩方特簡加授節鉞不數月稱治夫開府之制合治兵民而其後督理軍撫理民也今則東南用兵天子重撫任使統軍容顓誅殺一復古節鉞舊事于是公得便宜置開府僚屬招募壯勇刺以為廂軍遂設行幕樹六纛于兩牙之間論者謂安撫之尊加于九牧公實始之乃公則有以撫軍為撫民者自夫諸道驃兵咸集斯會白晝張弓刀行掠入市或挺劍􅀈撞門剽私室蓋藏公令捕至遽戎服立表下各以軍法徇諸道軍諸道軍咸懾去由是檄金嚴流移諭使來附修城堡穀繕甲械作攻守法凡門下諸生有能言扞衛事者禮之一切硝炭莝棧筋膠芻束勿煩估辦且密亷行間有陳鹵僮婦悉贖之以給主者公之撫治如是也獨是諸道安撫與諸路轉運相為表裏曩時軍興往來特重糧道而唐宋以後未免以用兵稍劇别設諸路轉運而于兵行之處則更置都部隨軍諸使然要之皆在官也今台州兵餉分委各郡而郡人轉輸有運米一石而給運至十餘金者有七八金者且有斃于炮石死于險阻者古稱粟行三百里則國無一年之粟而漢武挽輸動至萬人率十餘鍾致一石以今觀昔得毋有同情者與乃公勒官解不令擾民至有私𣲖里役者嚴為檄禁且給買平值分别水陸以限雇運大揭榜示于郡縣俾絶其壓𣲖里役給買失值強勒長雇蒙上剝下之弊是何恤民已至與父老苦兵久矣纍卵之勢不搖而傾況綰徒負輦衆有戚色能如是之槩以官而民力緩然則轉運祗一端而其為治者且十百也公名某由恩選起家歷任大使為今官嘗舉尤異廷賜袍帽以嘉其功今復考第一爰為頌頌曰惟公授鉞控制雄關開牙建纛在吳越間平輯百辟俯循諸蠻分寄在閫就拜于壇啓茲幢幕總其師干神斾鵲羽雕戈虎鞶編蒲藉民仗節詰姦亦越陽九章安兵起賴公常武鎮斯浙水馳鶻伺敵秣馬厲士諸道響應爰集其所戢兵用威馭衆以禮其惠愛民逾于父母至若師行首重督餫三軍負鐎千里餽餕曩者挽輸使有常分中都給粟外鄙行陳是以元凱引漕于晉河內軍需責在冦恂今則輸發下于諸郡但雇官夫不擾民畯費無畝鍾飢鮮道殣舟車連營徒輦繩峻猶懼下吏蒙昧不問飭諸鄉亭榜示以徇憶昔羊怙開藩襄陽衆為立碑峴山之岡望者涕泣觀而倣徨唐有行儉鎮之西荒將吏勒石于碎葉傍君曰文武民是乂康我公嗣興與之相望礱堅抵鋭民志乃章庶其拭之思公之功張推官勒石記自昔推官之建理軍事也今即官以刑雖稱佐獄猶専官焉紹興衝壤也民之良者與莠頑雜居加之甌越用兵獄市四起張君自中州來興剔利弊達幽散滯嚴出入之科苞苴者不得行請謁無自甫期年而獄市息人皆曰張君哉張君哉又曰張乎出我以生乎吾氏張矣又曰人亦會有遇耳吾獨不得當今日而覯祥刑之治乎君不見張君哉于是父老感激謀勒之石夫是石也尋丈耳使以紀君之功耶則煩不勝紀也且君之隱德能名言乎使泛為誦耶則又未可厭父老情也吾乃舉其略為父老告夫推官非第諸州察推也以內臺刑讞寄之外臺而外臺又寄之諸郡推官是推官臺史也是故以為省讞則為臺使者慎庶獄也其在郡則為小民撤寃情也然而民情之寃孰有如誣命者耶殺人抵命律也而越俗善誣謂之誣命誣者始用橛繼用蔓橛者決也決則情棘而驚決以起蔓慢也慢則緩結證而延縲以致于斃夫以刑官之尊而又加之臺臬之嚴重緩急相煎烈濡等也君則拯橛以緩陰鞫其真而不急豫之勘驗其救蔓也即以橛或抵或坐片言折焉無使滋蔓而誣詐者以屏焉何其能乎且夫刑之逮人或名勾提其法用殷著者主之為勾頭而從以無厲伺事之巨細而夤諸吏所以買勾然且一提出而無厲諸勾從之以薰以灑以詬以慰每下縣而縣之添勾者搆其間設科圈錢曰見面曰常例曰船飯曰偏手故理刑爪士酷于虎衛而越為尤甚君易以勾牒緩名風而急名雷編紙而飛提即不能而第責之縣之上不親勾也又其能也獄訟非一方也褁糧候讞荒其耨弛其估任胥之利便而先後庚甲尅簿不必理懸版不必序君則隨訟而隨以讞之庭無宿版案無宿簿又其能也獄訟當已讞已得生矣然讞必有刑刑必有贖是雖數鍰以上必囚縶以候于盡夫獄吏之尊可攖乎罪止金作無死法而得死刑寃與君則輕者捐鍰重者押外且有立起解赴者未也追賕之根株而無以給也擇犯者所親可代償者而脅以抵之枝其所枝乇其所乇君每斥不行未也夫察推為外臺行察察郡中豪強為厲者而上之臺臺未嘗鞫得其情也法之已原其初即察推亦未嘗果行察也胥以為察之已懦也而強之多藏也而目為得罪人情乎而君輒禁之未也臺讞駁核動輒再三姦胥藉之以為利而請謁所至兼有朝定而晡更者已讞也驟而覆讞求其剛正不阿守成而不詘難矣而君每讞定屹如山立雖百參駁不少動夫息姦誣知也慎行察仁也戢役胥勇也減贖鍰撤監候惠也速結讞絶株纍斷更反明也又武也既仁又知既知又勇既知仁且勇而又進之明與惠與武君足傳矣君名某由進士起家為今官神告記康熙十六年三月安西估魏丙貿卉布上海市中夜就旅主人宿醉卧風雨大作失槖所藏金三百兩盡先是旅主人俞甲相槖金估布料其數而以他事入鄉屬其季俞乙守舍至是捕驗賊不以穴入而以門出謂乙盜金乙不知所為經于梁出舌力救得蘇上海令任君素善讞至是疑之方庭鞫時卧一垂死人箯間刑無所施而估失金盡哀號有如窮猿獨念此二人者生與死未可知然且必根株其人掠肌膚析骨肉以求實即得實而推求之下所傷已多萬一不得則自今以往其為無何而受害者將不止二人也踟蹰久之命舁去獨詣城隍廟禱于神請以實告而留捕隨往者使待命于神寢宫俗神祠得置寢宫殿後羅列帷幔楎椸巾盂屏几如生而虛其位時十九日捕夢伏寢宫下私念此位中當得神至而久不至少選有幼婦出呼曰神已詣縣去矣留衣賜汝遂右手抱細女左手挈衣與之及接視則裙襴也歸以告君君是夜亦夢神幞頭緋衣前戟手云已得賊而君未知耶其云神詣縣者正以神來告是語也質明則估又入報夜分時賊已還金一百兩投旅舍去君是時方疑乙慮罪或姑還金至得捕語則俯首再三仰而曰夫賜衣而得裙襴則非衣也非衣者裴也豈有裴姓其人者耶捕叩頭曰似也閭左有裴愛無厲不事家人産其人僦旅舍傍而得出入于其舍即欲得裴姓此當是君曰然然則其抱細女者抑可知矣夫細女愛女耳吾聞納音之數陽姓從左今左非衣而右愛女其為裴愛無可疑者雖然吾懼以私臆入人罪使蹤迹之無實復命捕詣神再候命既則捕復夢伏寢宫下見一吏呼曰神至矣至則實其所虛位已而復入見前婦出持敗褌與捕而以米筐遣少僕隨老僕攜去乃復告所夢于君君曰是已仍與褌者果非衣也敗者已露也米則八十有八禮凡出老者先之今少者繼出意者賊當敗續出金八十八兩遂收裴拷之得實其狀云風雨夜先入舍匿盜金至十九日夢神敕還金因先投舍金一百兩今續存八十八兩在泮中餘各有所遂泅泮得金定招伏而追給餘金所未全者邑人張錫懌曰晉史載成都令察姦如神唐順陽劉君神于摘發而李果宰洛陽獨曰古今正人能達鬼神則又何與君秉性正直往合神聽且誠于格禱祗以一念好生之隱委曲求實致鬼神聰明亦委曲核實以告之若其解斷明晳能抉周官掌夢之袐雖君實多學然亦君清潔寡嗜欲神啓其智有如是也當君初蒞時為七月二十五日越三日而火燔民居是日大風作燎如揚箕君竊念甫下車而災及吾民豈吾實不德耶徒步拜火所泥銜于衣時正焚輪間風不息而火息嗟乎神已君名辰旦字待庵蕭山人由丁未進士為今官觀音庵送子記上海城南有觀音庵邑人祈子處也朱公子簪原曽禱庵歸夢丈夫子冠裾來前生一子慧甚易期而死復過禱則夢甲士排户入擁一兒至曰送官哥來及見則前兒也既而果有娠將彌矣丁巳三月十三日豫過上海主簪原家因豫與其尊大人司刑公有舊故也甫入門即聞內歡譁聲怪之既而主人出迎豫于堂熟視錯愕亟詢其故則曰內人適産兒耳于是起賀然未知其錯愕者何等也越數日作湯餅會酒酣簪原始語豫夙昔祈子時所夢丈夫子者其鬚眉軀幹暨冠服儼然如君然已死及再祈再娠則居然前兒也然而君入門而兒生豈君實有神能化身為人抑亦大士者重君姑假君以示信耶豫思古有愛其人而願為子者自注唐白樂天愛李義山詩願為其子豫愛司刑則為其子姓固亦無怪然豫儼然生人也昔豫避人時曽寄居法華山中許大士捨飾而未償也迄于今易十五年其證明乾公已死維揚而豫忽病痁見大士呼豫前出紅紙三寸令讀讀竟怖甚以為已死逮寤而紙中字眯如漆室獨記口語云許捨飾而久逋之何也今又一年而湘溪蛤公命豫誦法華普門品以延其願然則豫之神為大士所役久矣世固有飲食日用而離竒變幻如平平者大士欲示神且假生人以示神其幽明相通本屬可信況仲春祠髙禖為祈子始事而詩言寢夢史記載吞鳦躡迹其為竒誕有過于此者吾感大士之神而告夫世之供大士而祈子者之當有驗也因從簪原請而為之記之康熙十六年五月日記西河集卷六十五
