body:
  text: 西河集巻十六翰林院檢討毛竒齡撰書三復何毅庵論本生祖母不承重書月日書到兼䝉下質貴戚朱氏如贈君王夫人死有疑於其孫承重之服可否取决某適對客不能裁報且生平最諱論禮稍㦯轇轕恐蹈三家叔孫之誚故在舘聚草偶諮禮制輙口噤不應以為禮無一定且卑末何敢議也乃明問殷切必欲剖晰以為鄉市一閧之解無巳則有説于此某嘗謂漢晉言禮彼我樹訐祭則七廟五廟䘮則三月二月角立門戸累世莫解而今人不然苐挟宋儒禮一冊奉為金科前不必稽典籍後不必問令甲可謂安閒自得大省詬詬而不意閭門近事復有此齟齬之舉則請束緼為一商之據來云王夫人為己故運副朱君如君曽生子孟君而孟已早卒今其孫則孟之子也孟既卒則孟不能為母服而其孫承之孫當代其父為所生母服則因而承重夫亦何疑難之者曰朱元晦著家禮云齊衰三年嫡孫為祖母承重而不及庶祖母其不宜服一又云齊衰不杖期庶子之子為父之母服若承祖後則不服今運副無嫡孟以庶長而為嫡則其孫當承祖後而不承父後其不宜服二又朱家禮作妾為家長族服圖苐為子報服而不為孫服無報則無承其不宜服三凡為此説其于嚴嫡庶之分奠為後之制可謂極矣獨不思嫡庶之嚴為後之重凡以為襲替地也商周世爵祿自天子代嬗以下内而君卿大夫士外而公侯伯子男無一非世爵世祿世爵世祿則傳嫡不傳庶立長不立幼于是乎兢兢慎慎審重於為後不為後之間以為襲替從此基也今則天子而下父卿子庶父民子公即有累世仕宦祖孫父子並在朝宁皆各為進取非闗嫡長何嘗謂為後者官之不為後者民之而斤斤鑿鑿守為牢不可破之成例試思彼為後者何所後於祖若父不為後者何所不後於祖若父且亦安所為後也古禮而難通矣庶人廟祭不限五七聚族而饗不辨支庶而獨於此䘮服刻為限制必使之從短而不從長從薄而不從厚真不可解且朱子家禮朱氏為之不能使他人之不改之也今本朝之制與明制同而與朱氏禮則絶不同朱氏斬衰三年但服父而不服母今則父服斬衰母服亦斬衰也即庶子為生母服亦斬衰也朱氏承重斬衰但及祖父而不及祖母今則祖父承重然祖母承重亦然也即庶孫之為庶祖母承重亦無不然也特是承重二字禮文無有吾但以為父後為祖後者言之夫子之後父孫之後祖孰有過於天子諸侯者耶然而天子諸侯之為祖後者皆為父所生母服三年䘮嘗考春秋十二公惟荘公嫡子其餘皆媵娣子也母以子貴其薨與其𦵏無不稱夫人稱小君而其後父之子無不服三年䘮者然猶曰非為祖後也若文公為僖公之子而僖之生母成風則庶祖母也成風適薨於文公之世與朱孟之母卒於其孫之世者亦適相合乃成風之薨書曰夫人成風之𦵏書曰小君成風之訃直吿於天子與列國而天王賵之𦵏之列國如秦人亦弔且禭之故晉祠部郎中徐廣議禮謂父所生母魯文為之服三年之䘮體尊義重非祖所得而厭也是以漢文所生母為薄太后亦以景帝二年始崩而景帝以後祖之孫服三年䘮天子朝臣並居重服即東晉安帝崇帝四年亦以太皇太后李氏之崩尚書僕射何澄等議謂既稱太后禮宜從重安帝服齊衰三年百僚悉服期於西堂設菰廬於神武門則又設凶門而施栢厯焉則是孫為祖後者其于父之所生母皆三年也故予謂挾朱氏禮一本不如考春秋三禮并列代儒臣之所議直服三年似于情于理庶㡬允愜而予則終有未安者以為承重為後皆封建時禮而非今之所為禮也古封建之時則天子諸侯各以其爵而傳之子孫謂之傳重而子孫從而受之即謂之受重承重者以傳重受重而誤稱者也故禮無父没為祖三年之文惟䘮服傳則專為天子諸侯言之以為天子諸侯之祖父皆君也君䘮敢不三年乎今世非封建家無傳爵祖父非天子諸侯而公然曰承重曰為後曰服三年是為僣逆獨不有祖父母應服之期乎祖父母應服期而為繼祖母為父所生母皆應服期則服期禮也乃朱氏禮云庶子為祖後則無服夫無服者不惟三年謂并其期服而亦無之也夫并無期服則孟不幸為庶長既巳降三年之服而為杖期然已不服而死矣今其孫又承祖後并其所為不杖期之服而亦無之是子既未服孫又無服視其仲庶季庶各有生母者皆各有三年之服而獨此一母之子不幸為人後而遂至為子為孫不得有苴麻一片加之于身其為蔑恩害理畔倫傷化莫此為甚而不特此也夫制以情通禮貴體騐在朱子當日斟酌輕重豈盡荒忽而特未嘗身為體騐而通之於情夫治䘮所重莫如喪主喪大記所謂喪可無後而必不可以無主此其説夫人而知之也乃其所為主者則一以子若孫為之訃之所稱哀子哀孫祭之所稱孝子孝孫者亦夫人而知之也今孫為喪主既已無服而喪主之禮則又一一而責之於身假如喪主視含視含者必號咷喪主設幎設幎者必擗踊喪主奉饋奉奠奉饋奉奠者必號咷哭泣手擗足踊夫以緦麻俱絶之人而號咷擗踊藉藁㨿苫巳為怪誕而至於書訃此非他人訃而主是訃也聞有為遷就之説者使他衆子之有服者書名於先而帶書孫名于後曰率孫以既不稱哀且又無服可稱則不得不止稱曰孫然以從父率從子而曰率孫豈有此理而至于書主此非他人祀而主是祀也書哀孫乎不書哀孫乎曰不書哀孫如所謂率孫者書孝孫乎不書孝孫乎曰必書孝孫主仍署孝孫名以他不得奉祀也則是以無服之人而主訃以無服之人而奉主乃以主訃之人而不稱哀孫且即此不書哀孫之人而又書孝孫周章繆盭䟦左㚄後無一而可者也且未聞開喪之家喪主無服而欲使吊人唁客披疏衣盡偯噫者朱子當日或亦未嘗通騐焉而不知其不可故至此中庸曰非天子不議禮今一王之制赫然可考儒説沿誤不止此數但就明問所及而璅璅如是若謂妾于其孫無報服而遂謂無服則嫡祖母亦未嘗於庶孫有報服也若謂嫡母為子服三年妾不然則彼原云嫡子當為後庶子不當為後也此皆後儒之私禮也夫後儒私禮何足為訓某久思東渡一承教言而病卧未逮使還率復綿漫無次援筆惶恐辯毛稚黃韻學通指書頓首鄉示韻學通指一書以行槖褊小十年途路未經攜討昨語次諮及歸渡繙簡義覈而博舉例通約留世書也特其中有未能安者思面受審定而舉足榛棘積閼成滯又其義未敢以終隠因假咫尺一發冐昧據作唐韻四聲表謂韻在收尾而其所為收尾者則專在穿鼻展輔歛脣抵齶直喉閉口六條夫此六條本周徳清中原音韻括一百七韻為一十九韻而後人探之為歌訣者毋論歌訣與韻義本不相屬而即以是訣求之亦惟穿鼻抵齶閉口三條有合于宮商羽三聲之訣喉齶舌齒脣為宫商角徴羽穿鼻在喉閉口在脣故尚相合其他展輔直喉歛脣則皆從前所未有者毋論一百七韻中其為展輔諸條全不必合而即以東冬真文數部核之既攝以穿鼻而仍無當於東分于冬庚分於青之數攝以抵齶而究無解於真不為文寒不為刪之説則是通汎無紀聽諸自然而不可為領要者况隋韻甚繁冬尚有鍾陽尚有唐庚尚有耕有清蒸尚有登則即一穿鼻而宋韻有七謂東冬江陽庚青蒸皆穿鼻隋韻且十有二也加鍾唐耕清登且夫韻之分限亦甚寛矣蒸通東冬而反謂不通於庚青江通庚青而反謂不通於陽唐則穿鼻之説既已不騐而至於支微本通則反以支為詘舌微為噫尾而判然二部則是六條倘行但利於三聲一十九韻之分合而大不便於四聲一百七韻之通轉者而以作四聲韻表是以盜為守也且四聲有入此通音也中原音韻派入聲於三聲原為偏音偏不可為據而穿鼻抵齶諸條仍無入聲則仍是中原音韻三聲之偏音而欲以領之四聲得乎且穿鼻抵齶諸條呉江沈氏為度曲而設非韻本也即或韻尾所有亦任之歌人而無事考索猶之古之為詩者但審商調羽調清平善平之出入而不求之遍序簇拍契注送聲之當否何則非所務也故韻學要務祗有喉齶舌齒脣五條而竝無穿鼻歛唇展輔等六條喉齶舌齒脣者正聲也穿鼻歛脣展輔等者聲之響也聲不同而聲之響同猶形不同而影同薪與膏之火不同而光同也求影者必於形求光者必於火求韻者必於聲故三聲通響可設六條而四聲正聲則必在喉舌之間東宫也喉音也故宮入東韻而四聲等韻亦即以公為宮音若冬江則猶之東也推而至於陽而庚而青而蒸猶之東也皆通喉而入於鼻也真文元寒刪先皆商音也則皆抵齶者也抵齶者讀字畢而舌抵于齶葢作樂者以此為歌音作詩者亦以此為字音如樂苑思歸樂商調曲也次章多舌音而謂之犯角如意娘本角調而誤入商調則為變角是也魚虞蕭肴豪歌麻尤以懸舌而為舌音讀字畢則舌懸于中即角音也支微齊佳灰以就齒而為齒音讀字畢則舌齒相就即徵音也至侵覃鹽咸之闔脣讀字畢一合脣而羽聲終焉聲祗五音韻祗五部其為反喉抵齶諸條不過如此信如通指東冬之辨以東韻為開口魚虞之辨以魚韻為縱脣吾不知開口縱脣之説古有是否即以陳暘樂書核之暘本荒唐然有曰聲出於脾而合口以通之為宫聲出於腎而齒開吻聚為羽則是開口縱脣正與合口聚吻相南北而不之知也且中原音韻三聲無入而今以穿鼻六條攝之猶無入也至無入而强以入韻參屬之歛脣展輔之條藥既不可為歛脣物與月又不當為展輔而即其所分屬者悉周章兀臲而不可為據夫四聲之轉宫􅀈貢榖本秩秩也四聲之序東冬江真屋沃覺質又甚次苐也以質為支入誤故真之為質而文之為物元之為月寒曷刪黠先屑陽藥與夫庚青蒸之在平陌錫職之在入其繩貫之序又未嘗稍變也至侵後四韻為閉口緝後四韻亦為閉口更無論已故四聲等韻在入無居驕交巾皆乖嘉鳩戈歌諸韻而四聲所譜亦無支微魚虞佳灰蕭肴豪歌麻尤一十三韻之入故屋沃之轉角猶東冬之轉江也古韻原有通轉因韻書誤載宋呉棫韻補以為金科遂至大謬今由東冬江推之支微齊佳灰魚虞尤蕭肴豪歌麻十三韻通轉處從来不曉窻轉讀蔥角轉讀六是也漢劉熙云窻聰也魏張揖廣雅竈窻謂之㻠隋曹憲音釋以窻音䓤則烟葱非俗音也通指謂禮失求野誤矣若漢書角里先生原不作甪不音六亦非叶音物月之相通也則文之轉通元也大雅詩是絶是忽四方以無拂楚詞山曲􅔍心淹留兮洞荒忽忽拂稍轉耳非叶也其又通七曷八黠九屑則文元之轉通於寒刪先也碩人長發皆是也且物與迄有二部矣廣韻獨用而劉氏併為一者以平併文與殷上併吻與隠去併問與焮皆獨用而皆併之故然則明以物為文之入迄為殷之入也若藥之於陌則陽之於庚也大學人莫知其子之惡莫知其苖之碩碩之讀若轉而即得也且藥轉陌而仍轉錫職猶之陽轉庚而仍轉青蒸此尤較然者上去通轉凖平而得之惟入稍異故略指其概其屋沃覺通于陌錫職質物月通於曷黠屑則又在四聲相承之外者耳若以屋韻有宿宿又音秀而遂謂屋承宥韻陌韻有易易又音異而遂謂陌承寘韻則沃韻有蓐蓐亦音耨沃何以不承宥質韻有戍戍亦音絮質何以不承遇且屋之暴猶之號之暴陌之莫猶之遇之莫而屋與陌不兼承號遇何也夫易音異而陌不得為寘猶虹音降而東不得為綘蜺音臬而齊不得為屑也如曰沃字從夭故沃韻承嘯則質字從貝質韻可承㤗乎如曰北人呼六為溜故屋為宥之入則北人呼屋為烏屋又為虞之入乎且古多通音原非聲類使以中谷詩暵其修矣遇人之不淑矣修淑相叶為宥屋相承之證則陸機賦云妍蚩混而為一兮孰云識其所修必𦕈世以遠覽兮夫何殉以區區修區相叶虞之証又承宥矣假以亷范謡云不禁火民安作作與火叶為遇藥相承之據則陳琳客難云太王築室百堵皆作西伯營臺功不浹日作與日叶藥之據又承寘矣且其以今所行一百七韻為唐韻為禮部韻為陳州司馬孫愐韻而以舊所傳二百六韻者為沈約韻且又以一百十四韻者亦為愐韻則俱不然甡家無藏書沈孫二韻書實未能有然憶在潁上曽窺北平辛氏行笈得古今韻書數巻大約沈約原韻倣齊周顒四聲韻略而著為四聲譜祗一巻今已亡矣若二百六部之廣韻則本隋時陸法言所撰切韻而唐天寳中孫愐復為刋正更曰唐韻然其書亦亡宋祥符中仍得法言舊本叅以他書因被以廣韻之名且仍稱唐韻而實非唐韻故晁旡咎亦祗云廣韻為法言所作而愐加輯者廣韻目上平多三鍾六脂七之十一模等一十三韻下平多二仙四宵八戈十一唐等一十四韻上多㫖止等二十五韻去多用至等三十韻入多獨術等十七韻即切韻分部也宋禮部韻亦同冬今韻冬鍾併為一部冬韻内鍾字後即舊鍾韻也其韻有與鍾同用四字係唐人律韻作標識者餘倣此若以是為約所傳韻則全乖也至若今所行一百七韻則宋理宗朝平水劉淵合併廣韻名壬子新刋禮部韻略而今遵用之此宋韻非唐韻劉韻非孫韻亦宋禮部韻非唐禮部韻也夫唐無所為禮部韻也若夫一百十四韻者則明代江夏郭正域所為韻經而謬以歸之楊慎千詬萬詈則諸所引據無非桃僵李代者亦可怪矣且夫二百六韻者猶之一百七韻也其云冬鍾灰咍則仍止冬與灰也韻有分標而用同一部故律詩有同用而無同韻猶之古詩無通韻而有通用劉氏祗就其同者併之已耳故一百七韻非今通之部而二百六韻亦非舊分之書如據劉孝標行行且游獵篇陽唐合用王眘七夕詩歌戈合用為不用沈韻則李白蘭陵美酒詩陽唐合用賈至汎洞庭詩歌戈合用亦為不用唐韻也且中原音韻惟三聲故參屬緝葉諸閉口於他韻以掩其穿鼻抵齶俱無入聲之弊而通指張之反謂元曲有曼聲故無閉口古曲無曼聲故有閉口則書曰歌永言禮記曰嘽緩慢易之音作而民康樂樂志有緩歌列子韓娥曼聲長歌唐郊壇聽雅樂詩韻長飄更逺白樂天試樂詩慢拽歌詞唱渭城皆慢聲也予謂古曲詞簡則歌必長今曲詞繁則歌必促此正古有曼聲今無曼聲之辨而通指誤以宋詞慢調為慢聲輙謂慢聲實始於宋則是以詞之短長為聲之短長矣且古歌之曼有明據者清廟登歌一唱三嘆四字作一闋而維清十八字為象武之樂晉清樂倚歌有女兒子僅十四字唐霓裳羽衣曲即婆羅門也一絶句耳有散序有中序有拍有破桂華曲試問嫦娥更要無裁七字而一字數轉故白樂天聽都子歌有云一聲格轉已堪聽更聽唱到嫦娥字則其詞短而歌長亦可騐矣且歌促於北而緩於南南曲有閉口入聲而反緩中原音韻無閉口入聲而反促則是古曲曼聲實亡於北聲之有變實不繋於入聲之無閉口而通指欲以是為徳清解嘲豈可耶且歌字有聲未聞字甫出而詘然止為閉口也諸此瑣屑無闗大雅而立説所係則似未可為漫然者况著書實難甡埀盡之年筋力耗弊卒未能勒成一家而五兄撰述等身動比宿構流聞接布古人罕見惟慮細碎不撿為名山小隙且欲自附於殷源籖問之列因妄申臆計以徼主客儻或公羊不肯耳目實短冀少加慰喻起所未逮記疏甚悚西河集卷十六
