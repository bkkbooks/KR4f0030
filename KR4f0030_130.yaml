body:
  text: 西河集卷一百三十翰林院檢討毛竒齡撰誄文家烈婦誄文有序康熙二十九年十二月二十七日遂安方公子妻毛氏以殉夫身死其舅氏編修君與豫同館同籍而其父明府君則又豫同譜弟也當豫官京師正值公子就婚烈婦守志之際在庚申四月維時目睹心怛曽為文記墮樓事示京師屬文者暨乙丑之冬豫與編修君先後南還而烈婦亦扶夫柩室歸里門距守志之嵗又踰十年烈婦年二十七矣乃請營高丘矢與同穴絶食草日畢命一旦嗚呼哀哉夫以同里閥閲厯世婚姻論羊鄧無顧我顧伊在王謝皆佳兒佳女既百年之有定真兩小之無嫌爾乃兩家宦迹各在天涯三月婚期移之夏首止逆女於燕河之北議館甥在汴水之間臨川內史應過郗氏成婚稷下淳于甘作齊庭贅壻借河陽之花樹暫結交廬開彭澤之酒樽充為合卺無如嬴女多姿蔡夫有疾星橋初駕便言河鼓將摧蟾鏡方圓忽報藁砧欲碎徒設芙蓉之枕相視猶虛任歌芣苡之詩守而不去倒玉樹於瓦棺之內折金叉於鈿盒之間茂陵何在誰為上封禪遺書函谷未還猶似聽鈞天雅樂用是志切儀雙理惟從一賢名如謝藴自合嫠居夫壻是隂瑜豈容再嫁是固然已徐而思之彼夫驅車吳市祗重時年解佩湘臯勿需嵗月然猶神女以三秋為刻麻姑惟千載之期至若樂羊遊學一嵗遄歸秦掾新婚經時始别商陵操别鶴同居者尚五年罽國獻離鸞比翼者匪一日豈有片時莞蒻便覆黔衾三日羮湯僅嘗許藥計寶帳拖身之日正靈絲續命之年褵暗解而身未分明鏡欲開則眉仍鎖結而乃餐茶未既臘毒頻施樊姬不擇肉端為腐腸向母反攘羊恐其留舌吞秋胡之金而不死懷荀氏之刃以自戕然且地出窮泉天無生路貝州婦本無賴絞頸車簾皇甫妻亦何為懸頭欄楯偶見星河之燦爛且乘傅婢之迂疏憂時倚柱漆邑長號入夜登臺楚符不至千秋金谷居然墮向樓前數仞青陵竟爾投之臺下肱三折而未絶魂九死其奚遷計無復之故為好語自昔下宫之難全在立孤授室之誠不嫌負子既有嗣僃三從之列可皈空具八覺之依况復溫生有夢難免思鄉連尹之尸未經歸椘魂離湘浦月到處堪愁柩在華山畿何能遽返姑秉燭伴鄰家之績豈携琴效陌上之彈持齋逾百日譬如還侍太常却愛斷三塗不過仍如處女詎意息夫人之居室終日無言賈大夫之如臯三年不笑靈輀南載宛然車轄來牽虞殯東歸尚用吹簫為節執丹紼於牽絲之手幕紅墻於却扇之人乃復疏麻作帔已過三年擷藻陳羮又經十祀樗里子之墳塋未造夏侯嬰之石室安存請營吳市之西門少釋殷楹之左殯急求吉兆移時聽白鶴歸吟遂有佳城不日協青烏相法乃言季武子之西階固當返哭然而平陽侯之北郭原有同埋考夫合葬之禮文加以同棺之遺命昔固有之今所願也於是捐仲子之餐因而受翳桑之餓形容盡毁何嘗愛楚國纎腰肉食都捐猶自令條侯閉口顧婦本張玄之妹因之致辭左嬪以太沖為兄於焉相勸生如露水誰能百嵗長存庭有桑榆何忍半途相棄帨襟裁小絓已誤終身豚饋有全施未膠半齒痛辛壬之幾日比丁癸之無年膝前方朔吐哺裁周泉下仲卿牢羞有在當視尊章之奉養無嫌丞令之多言而乃痛至摧肝褎如充耳女􅎐來北渚徒令頞䫲陳詞淑媛上西山翻共夷齊却食爰授兒以范喬之硯且報夫以劉令之書生辭愛嗣不能織屨長安死别舅姑一似屠身淮市乃於除夕之將臨坐令仰天而長逝嗚呼哀哉原夫一齊著禮祗為生倫兩姓成歡不皆死義然而忠臣多殺身之節賢閨饒殉難之文惟恐伯姬貞行厲之不終長舅謙恭幡然而改是以梁高行之刺體君子無譏楚昭妃之喪身前賢所重蓋死生大事患在因循貞淫之幾分於俄頃自末學以偏畸為戒庸流惟陋簡之安塜中小吏未免過情綿上慈親目為矯性以致孝子鮮剖肝之贈令妻無斷臂之旌帷房多曖昧暮齒皆孀術序有常型捐軀非訓是使狚兒飾面得冒榮名精衛填河長懷幽怨雖或風俗之有殊抑亦教化之未傋也某忝居下史遍閲前文范蔚宗之新書劉更生之舊傳懿行媺節代不乏人如烈婦者誠亦罕有將欲追諸往昔傳之後人鋪揚聖化以勵末俗因托其實行疏其苦心倣前代遺編而敬為之誄其詞曰石英之村婺星之里有美一人於焉鍾止中郎好女太史髙門崔盧舊締潘楊世婚未頌椒花先吟栁絮既擅研黃復工織素乃隨父宦逺過滎汴忽聽鳴鷮於此奠雁何悟洗馬渡江而疾三日未周百瑞交集顔敗叢蘭冉歌芣苡寶扇誰開金匱難啓從此生别遂成死期揚雄投閣蘇秦刺肌最難堪者少得羊錮聞羶便危偏啖不吐乃幸保傅多其捍間孤立趙氏身隨阿潘爰把素縿且扶丹􅓅梁鴻去吳杞殖在路逺相牛眠近聽龍耳小吏新墳貞娘舊塢將瘞銅劍忽卜金叉周公合葬齊階並埋瞻顧傍徨早夜悱惻黔婁有餐揮而不食嗚呼哀哉秦臺鳯散吳市鶴歸自茲遙夜兩棺相依嗚呼哀哉天上人間幽恨何極我為此文雙泪霑臆嗚呼哀哉塜號並翼山名比肩千秋萬世試視此間嗚呼哀哉原評曰烈婦峻節不可無此文傳之時西河歸田後作載方氏家乘中皇清勑封禮科都給事中前工部郎中薑公誄文并敘康熙十一年六月二十七日皇清勑封禮科都給事中前工部都水司郎中薑公卒嗚呼哀哉惟公以故明工部郎為太僕之曽孫光祿之文孫宗伯之令子而今司諌之嚴父也公為工部郎時督視北河河水暵竭漕軍愆期動責渠使公移諸南河疏理穿貫衛河有水可用灌救苐以溉畝所瀦坊庸私密公力請總憲躬按蘇門周視機要手啓閼閘凡發三板頓浮千艗時當事用公疏請衛河之傍專設分司轄斯濟運以剔漕害到今賴之而衛鄘巨家水田減漏棷怨良䇿飛語􅑣至遂乃得罪今者以司諌君貴優遊閭里近三十年揣摩金石淪湎辭賦恤餒問疾鬻孤嗣天國稱遺耉人詠耆英如何神察殱此民望春秋七十有五偃然遽逝嗚呼哀哉惟豫小子與司諌君遊同侍言笑謬蒙下逮一如等倫均於宴歡忘其貴齒每丁間日酒食醉飽兒童賔客虞虞衎衎暨豫蒙難罝之田舍諸妄領會並為拯訴誰謂夀享勿用毁傷自昔先哲每因後生銘德纂績以表旒旗今公贈終豈得無誄嗚呼哀哉用為辭曰皇矣工部於惟國楨名垂海寓生應星精喬木既折泰山其傾影駒載駛陽烏不明聞訃相偯登牀皆驚逺隨鶴弔親當驢鳴猗與先乘踵之嶽靈上邽天水判由齊庭尹姞周代袁楊西京司空邁迹太僕是承疏貽光祿史著春卿公生紈袴有繼錦名皂羈天驥紗盛夜螢曽遴藝圃甲乙論程世聆月旦家為笵型初逰蓮幕參畫中丞繼遷虞曹分司水衡張秋奉使冬官受成衛河肇濬肥泉底平桃花為浪楗竹如楹挽漕獲濟封碑作銘亦越家造能傳一經育茲國器居然兩鉶風揚玉樹氣接金莖掖垣再入平臺七爭佩紱總赤依蒲能青勝彼張湛稱白馬生是故京兆虛席以迎方欣祿養纍加恩榮龍章早賁鳯書頻徵誰知一旦乘雲上升嗚呼哀哉微聞伏暑晏眠桃笙牀環子姓庋列瓶罌吟詩説偈伸蕉展藤俯仰遐憩無疾而崩又何遺言從善如登是詎易致當有夙行因思疇昔恆承歡情動如風拂靜猶淵停看花蕺阜載酒蘭亭一時遺老首推耆英臨池慷愾更饒軼能大將籠鵝細且綴蠅况奬善類好扶替陵方甡厯坎力為救拯至今莫報中心怦怦嗚呼哀哉若夫宗䣊以孝友令撫孤紹絶春秋養嬰嘗覓遺婺為續螟蛉曽是不德恆懷歉誠惟其孺慕終身不更偶談先哲紛紛涕零久思所嗜尚視無形以是推極無非可稱嗚呼哀哉今當錫表大彰封塋後人奕奕于焉嗣興皆可慰藉無庸屏營特是徐孺長思黃瓊蕪文列旐以當著銘嗚呼哀哉西河集卷一百三十
