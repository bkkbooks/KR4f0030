body:
  text: 西河集卷三十二翰林院檢討毛竒齡撰序九硯鄰偶存序韓退之陳言務去而柳州于龍門文題之曰潔夫龍門文亦繁矣而僅以潔稱文豈在侈言哉西昌蕭孟昉以豪詄自喜其意氣卓犖交遊滿天下且披閲萬家日鋟先人所祕書行世疑其為文必恢竒汗漫潰然于羈繩檢括之外乃蕭條髙寄峻削而清嚴若惟恐點墨之或纍我者一何潔也豫交孟昉有年矣當豫見孟昉于廬陵講堂相顧慷愾天下事亦何一足當吾所為今距十餘年而沈淪往來重合柴車于長干雨花之間慰勞無恙又若天下事皆非吾所得為者夫天下之去煩難而就簡淡者豈少也哉雲霞燦然歸于太虛百川下泄根本自見孟昉家有别業其先奉常著書處則春浮園也亭臺花竹甲于江表乃蕩無一存而孟昉于通德舊門别為營構名曰硯鄰今硯鄰偶存則所為文也天下大矣四裔渺漫望之無際而一身所當不過萬里然且萬里所致極車馬紛紜驅騁揮斥之稠沓而究所棲止仍在一室若所稱硯鄰非與夫以天下之大四裔之廣極驅騁揮斥之稠沓而所存者止硯鄰然則硯鄰之所存之文抑可知己青門文稿序向從蘭陵文選中讀邵青門文嘆其豪上雋永昱昱有氣纍串其所學而意旨龎厚薈然發乎詞超然乎近之所為文者今年秋避人吳市則遙題其所寄像所稱青門五真圖者其貌有五其人蓋可得而見也既則吕子絃績擕其稿來曰此青門君之文也盍序之夫青門者非即其先人邵平所隱居而種瓜者耶天下為文家不少矣方其操觚特達與世抑揚必爭相容衒以求得當乎其時及其既而文與時會大者能見于朝廟小亦得播之鄉國閭巷之間使觀者有以考其詞而論其世此所貴乎文也自非然者必文不足以乘運或有文矣而連會偶不足以達之斯善藏已耳焉有少習鉛槧既已重有聲于人而藐焉棄去遊遨乎四逺返而遁于圃人以自託夫所為青門也者吾方讀其文而哀其情之有難通焉乃人亦有言曰豐乎遇者嗇乎詞文有所達則時有所違是故同一文也而應世者目文為時不應世者不目文為時然且習時既久即未嘗應世而亦若有時焉移其中者此無他誠以今之為古文者即皆今之為時文者也夫文無成法隨在可見而時則以成法紏畫其間不豫文以文而豫文以法然且曰入乎此則是出乎此則否夫必立意以造喙析股以建體吁吸其初終而曳銜乎首尾者此他文之所通而帖括之所守也故行文百變帖括居一而乘時之家專守一得即拘文牽義撿行攝墨苐恃其孱胸而已可自附于古昔大家之列此宜超世肆志者之所不為而世爭稱之邵子之青門自居其有遺世之思乎夫天下無難為之時有不為之志邵子方丁盛年時際可為即以其才其學出而應世雖南説甌蠻北平大夏亦何難急于自見而掉臂勿屑宜其時之塞而文之通也乃人有言曰文之有法猶文之有體也文不能舍傳記銘誦以為體則亦不能舍規撫萬度以為法顧亦有法與體之未可限者周書誥通乎誓史遷傳序似短長家言張衡思元賦即離騷也阮嗣宗奏記與箋啓何異任昉為王文憲集序或以為傳或以為志韓退之作諍臣論仿佛乎答難解嘲而東坡賦赤壁微近于記蓋合歌行引曲吟嘆篇誦謡辭鹽詠而要之皆古詩合傳記銘誦漢魏唐宋縱橫出入要之皆古文也夫圃無疆理而溝塍以分瓜不飾青黃而五色以判人不必有兩形而屢貌之而屢肖以像青門之文其隨地可見如此友勝集序兑之彖曰君子以朋友講習夫兑為麗澤不其文與然而所藉在講習則是朋友之助之不可已也顧君子之友先謀後遊小人之友先遊後謀蓋合志同術並立互下必相稽以賢相觀以善而後同心之言可以布華文而成麗澤否則種木不擇地徒蔓焉爾豫少慕結納甫束髮即願友天下善士爾時承啓禎後門户餘習每一髙會百千成羣甚或召集十五國有聲應者按籍而勒名舟車蜂合山澨皆滿所至飲酒食肉纍丘填壑而分場而列幔者其考鐘伐鼓之聲震懾逺邇要其初本以求友而浸淫泛濫物盛而衰迄于今天下之蒙禁令而受錮禍者且二十年也夫切靡利鈍本無多人在昔四友七賢三君八達其數可稽而推而極之梁園鄴下緑池素蓋自誇盛大究其所稱連榻而止耳夫博交者馳虛而審友者責實夫人而知之矣今何生卓人輩讀書論文雅有同好將欲合里閈交遊為他山之攻抽詞比牘月有較時有會礲礪真切不涉浮薄蓋一雪從前社事而更為斯集子嘗曰會友以文而他日謂門弟子曰賜也好友其勝已者吾聞諸子之所會則皆論文之事也其所集者則又擇取其勝者也向者西園之彥不名為社而名集今豐狐之腋集以成勝邴原友盧植陳蕃而德彰郭林宗友王憲符偉明而名著王元之友寇萊公王文正馬公樞密而譽問以顯諸子非其遺乎若夫黨人之餘垂老放廢其諸遊處者已不能無時過難攀之感而乃復為諸子輩序兹勝會即欲不笑于善士而豈可得也余淡心娥江吟卷序淡心遊越時豫方入蔡淡心之扶杖命楫登高臨深與越人相遇于盤盂鼓鐘之間豫不得而知也及其後豫讀淡心詩而乃知之信然則豫之入蔡默無一言後之人其能知豫之出入廣桞食飲于羊圈牛蹄與淮蔡人亡名一相見哉然則無言之必不勝于有言也人有泛江海而來歸者詢其江海之所見無有也其行也拳攣樓櫓目不接瀺灂即接之苐演演而已夫是以終無所言而或者過之憑陵感興歷記其山川雲物之奇古今事迹之異與夫鰍蟲蟹魚黿鼉兕􅖃之汸洋變幻然後知向之不言之非也淡心所至輒有詩纍詩以萬而區其所至各為篇帙讀之而得考見其所遊與所詠也乃淡心入越不及與豫同為詩洎豫入吳而始屬豫序其所為詩越人序越詩亦復何辭苐豫之入吳仍不能如淡心之入越祇讀其為詩光明轢落能隱人千百恢乎其中而遊刃乎外則向使豫入蔡時縱有詩能如淡心哉詠江海者見木華郭璞之賦而悔之以為雖有言亦猶之無言夫有言猶之無言而况於無言也娥江越之一名也王憲鄰遊草序與憲鄰相别有年聞其東來惟恐顛毛乍改相見不識既窺照自審而又轉憶其言笑顧盻宿昔慰勞之狀然後操舟一從之至其詩文之來前則暗中能索不待辨也及豫見憲鄰而形容粹然仍如城北徐公者獨新詩之美較勝疇昔驟讀之幾至不辨則假使豫未見憲鄰時僅見其詩不幾反失吾憲鄰也哉夫憲鄰之為詩久矣方豫以避人渡淮而憲鄰勞之惟時賣餅淮市未遑出而偕憲鄰倡且和也及其後漸聞憲鄰詩流傳東南間窺其所貽什意旨厚矣其詞抑宛麗有法私嘆淮里自枚生以來代嬗藻才豫所見憲鄰其一耳今憲鄰來越豫復渡江而憲鄰東西瀏覽不能忘其地而為之賦詩豫向不嘗渡淮也哉江畔壺漿歷掩勿露而由江溯淮淮人士之哀豫窮而進食者踵相接也憲鄰漫遊于吳山越水之間豫不能相從適館授餐一切有闕而僅僅以山川清虛供其盼睞可謂薄矣然且勝地無幾盼睞有窮而流連不舍重假諸題咏以藉之生色夫憲鄰之有厚於斯地如此則即使豫不見憲鄰詩僅見憲鄰而憲鄰之詩其為進形容而稱勝者豈有既哉淮隂戴龍質詩稿序豫以避人之淮隂淮隂友人爭邀致其家而進以食豫嘗有札致友云韓王孫一漂母耳而豫之為漂母者無算正指是也特不見者十年幸得一見感生於神明喜達于色景大夫見宋玉曰不虞復見故人不虞復見楚山之碧豫亦曰不虞復見我龍質且不虞復見我龍質之詩之美蓋歡欣之極急不能傳則悉舉而委之無如何焉雖然語有之曰愛其人者及屋上烏豫愛龍質即宜愛其詩不問其詩之當與不當而一以愛之而豫于龍質則反有推求而不能已者曰此其所以為愛之者也懸黎之美者罕矣當其占美必追摩拂拭若惟恐砆與珉之得見攘者而初求其瑕繼指其釁夫而後孚信特達一出而天下之英瑶孫焉今天下孰不好指人之詩而求之于無可指而後人之好與不好亦且一見而中其所喜夫乃見其美也龍質不自好其詩然為詩已久今所存者出遊詩耳當豫在淮時龍質好豫詩嘗編豫所為詩課其子弟暨豫去淮而龍質索豫書一卷置之懷袖且貽札曰日誦毛詩宛如對面其好豫詩如此然則豫之好龍質之詩豈以云報哉夫豫食漂母之食而至今無以報也而謂能報其詩乎東昌倪天章遺集序方豫避讎時鼓管渡淮淮之君子爭褁飯飯之而其載之車而藏之壁者則犬章也天章以東昌名士亦不得志而居淮驚翔之鳥同集于瀨其意氣相得豈顧問哉獨未嘗以文章之事相切磨也昔趙太常避安丘注孟子七篇其自為詩約三十三章而安丘孫生了無所見顧兩人俱傳今豫之在淮本不能有所著明而天章贈豫數詩耳千秋萬世後其誰知豫與天章意氣相得有能如昔之太常與安丘者乎乃天章以不得于家人還歸東昌既而又徙之彭城憂死于雲龍蜿蜒之間豫在途聞之倣徨哀哭以為天章既客死生平意氣盡矣且家産散落詘然身後其無所留遺抑可知也苐恨其常時所為文不能早為之撰定使可傳世而淮安劉勃安者君子也其交天章先于豫而意氣相得即與豫同當豫在淮時與之飲于天章之亭亭前薜荔牆髙裁數仞霜棲而葉紅每飲必酹曰吾敢忘此薜荔牆哉其後天章以居居勃安豫作詩思之而未有寄也今勃安輯天章集而貽豫屬序夫勃安之為天章則得矣而豫饗其成而加之以序然敢無序耶蓋文有以序顯者王仲寶遺文若干加以所撰述七志諸書而至今所誦者惟彥升之序則文之有賴于序也序有以文顯者滕王輯子山之集親為作序故子山集中有所為謝滕王集序啓者而當時不傳其序而傳其所序之集則序之有賴乎文也天章豈藉序以顯文者哉獨是前賢感恩既報之當時而身死千年尚惟恐書史之遺其名而託諸夢寐而豫以貧賤之身溘然逮死不能為良友所藉而又無文章以為之傳述則其把筆心痛者也戒定寺乞米飯僧疏簿序戒定寺僧元公既已修復戒定寺功成乃持鉢之四方乞米飯僧矢以滿千石為願或者疑之夫僧者生也以無生為能生故資生之具一概不設而苐以禪為滋味故佛初入山僅食一麻一菽無所丐施而經云僧家雖飲食而味在禪悅今朝營晚餐春募夏饗是以食為纍也且儒者不云乎不耕而食此釋氏之所以見袪于道也而公方乞食有説則可公曰不然僧之必耕而食固也然有寺田則耕無寺田則乞寺亦惟無田以有此乞也是故僧之食于人亦猶人之食于農也且吾嘗見有得食而自私者矣終嵗勤動力田而逢年初未嘗不自食其食然而內不惠于親外不溉于人近不逮于寡婦而逺亦不顧夫道飢而死者則亦何賴乎有是食矣有如髙言大共衣博而遊曷嘗不藉人之食然而取之不刻與之不割拾鼠壤之餘粒給鼯腹之有數而且以其所得者即隨手而散之他人既不竭人力而又不自私其有有人如此此毋論乞食迦葉太子已行循城托鉢阿難不免而猶之不耕而食乃苐貰大官之祿擇其六百石以上二千石以下可以脂身而豢槖者而瓜以濟人是亦秀民之善者也豫笑曰辨哉元公將之吳而吳有故人可與告斯語者因書之簿以為勸若夫儒者之乞食則飢來我驅吾嘗乞食于瀨中而未敢道也甘露亭募序西陵臨漸江之東長波涾湤往有驚豗謝惠連詩所云西陵阻風是也顧其地西通錢唐海水兩接圻􅜌之或壤而或汨者彼此相嬗聞之梁開平中錢氏武肅曾築捍塘于候潮通江之門潮汐東首咸奔西陵幼時父老言八月十八日觀濤于望京門樓水之跳者能沾衣裾今則平沙斥鹵彌望無極夫地遼則間以亭使夫往來輪蹄可藉託足此即古長亭短亭之遺製也乃官程負弩估騎導節典制所略而浮屠以利人之念起而承之彼長江澔風雨四來操舟之厄于洶涌者與提壺牽車之顛連于褰裳與望崖者非茅茨覆蓋何以克濟然則亭者崇伯之九仞而大夫之一輿也然而名甘露何也今夫施飲者利人之一也昔有苦吳飲而名為水厄者矣夫同一飲人而當其急則為甘露不當其急則為水厄今之翼然而高峙者豈少也耶登臨未巳輒棄去勿顧而獨于是亭徘徊焉非秋霖戒塗則春江難涉非乘障欲留日𣟵在地則升亭四望浪高于山其去其所苦中其所急一亭之憩誠不啻暍之于蔭而渴之于飲也則夫甘露之名亦殊有甚利焉者况其為夏水冬湯者耶豫止是亭浮屠清源者請豫書幛為行路勸豫願行路者之思其急以成其利遂書某月日楊園藝菊詩序古菊無異色月令稱菊有黃花而周官載王后六服有曰鞠衣即黃衣也色紫者名馬藺耳陶隱居謂白菊治眩而抱璞丹法亦用白菊然大抵甘菊入藥與今之菊種異焉惟唐人作白菊詩其摹畫纎麗有似今種而宋人為菊譜則云有以香得名者麝菊是也有以色得名者錦菊也以像得名如所云孩兒菊者是也或以葉得名即金絲菊也故洛陽劉氏譜菊得三十五種而吳門范村東陽諸圃各誇所植約得七十餘種而漸而廣推至百種備矣今楊子雲士好藝菊其為種不越數十而擇其株好而色殊者且區蒔得法漱溉摘掇嵗勞而日瘁涼秋花發莑茸滿堂觀者數百里爭造其下一至再至悉流連把玩而不能去于是有貽其詠吟以志勝者久之成集而命豫序首夫詠菊亦難矣體物瀏亮古人所重而今則習泛設之詞鮮形似之語試與觀楊氏之園叢葩若屏攢卉過錦雙紋百鐸高下層疊毋論菊種稠雜難以遍擬而即此以觀雖使元亮抽思安仁結體猶恐未能窮形似之妙而苐令詠菊之煩多于藝菊則亦有菊者之勝也或曰菊等蘭杜不伍凡草雲士所種蓋以自况故種不貴多而貴佳豫每欲區别其種之與俗異者續為之譜而系之以詩然而難之茹大來詩序山隂二茹子皆以古今文詩詞名能于人豫嘗與小茹子遊亟稱其兄大來今文為已所未及夫小茹子以今文取科第久矣然猶謂不及大來則豈非大來之文其所詘者猶優乎况其為優焉者也先施不以不嫁而無容也况美心為窈美粧為窕不止作青廬之飾而匠人入山相木手無成鐻雖隱深未衒或不蒙見者所許而中心悠然養其神氣而足以自見然後削為鐻而驚之如神吾未知大來之文其能加于人者何等也而即以其詩觀之四始六義治之有素乃思心窅冥恍棲息于義得言忘之地若善刀不試而解中窽會隨所觸而圜轉四應登臨酬酢皆成詠歌是豈大來之詩不欲急見其所長而所長卒莫過與豫嘗溯大江道潯陽蠡浦思西上灩預南窺昭潭一抒生平所欲觀而徘徊中道遂致兵戈滿前竟不能達大來訪友瀏陽回舟夏口其間賦大隄而弔蒼梧所稱青蘋紫蘭者寓目興懷諷嘆成帙則以視小茹子宦遊儋耳行吟海上其及與不及又未可知公輸墨生其果能彼攻而此却否也陳德宣山堂近體詩序邑能詩家賾于郡然自唐賀監後無傳人焉即初明諸君子若任處士張助教魏尚書輩先後間出各擅時譽顧欲與高張何李方幅齒遇而不可得况其他與豫少時得讀曹文學體升詩私謂其五七律當頡頏宋之問孫逖王維之間而究其集無兼本後人不能存司馬長卿即有書空居而已至若包淳博沈七與豫同時爭上為著作相繼徂謝今人間不傳一詩詩亦豈易言乎德宣與何卓人遊卓人亟稱德宣才不可及方有事制舉而以詩為餘事然已率能如郎士元劉禹錫輩豫覽之嘆曰良然哉夫明月之璧獲于魏野驔魚之駕取之在坰然而求馬于魯郊搜玊于大梁而世不再見何也以生材之本無定也故神物之生隨地可見必謂苧蘿皆美婦而惡溪無潛魚豈理也與邑故乏傳人然當多才繼起之際豈無奇文特出超越前進若賀監以上者倘假豫以年吾見德宣之能名也德宣好賈山至言故以至言名而山其堂然則山堂不僅以詩也西河集卷三十二
