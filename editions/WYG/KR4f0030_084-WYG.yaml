body:
  text: 西河集巻八十四翰林院檢討毛竒齡撰墓碑銘一故明大學士前兵部職方司郎中厯九江道僉事孫公墓碑銘順治三年王師下浙東職方孫公以抗戰不勝蹈海死死時海未靖未能浮海而問所殮也越二十八年康熙乙丑天子命諸旂渡海剿彭湖逋冦盡翦撲而版畫之于是寧波上下初界于海今皆入附而比于藩落公孫監州君踰海尋公死所得公揭櫝于滃洲之間遂啟櫝以歸而葬之燭湖燭湖者公里也先是公入解知縣梁佳植夢公坐上有狀元額而公當兒時屢夢狀元與之遊私喜自負謂先達自忠烈公後有解元會元而無狀元即從曾祖榜眼耳應待已以具其數而既而不驗及監州乞銘自言啟櫝時有張信墓在櫝傍蓋有明開國登殿試第一而葬于滃洲者也然則公之死豈偶然矣公諱嘉績字碩膚浙之餘姚人自五始祖燧以右都御史巡撫江西死宸濠之難追贈禮部尚書賜謚忠烈而名臣代興髙祖墀尚寳司卿與兄都督堪弟禮部尚書謚文恪陞皆以孝稱子是墀所生者為上林苑監鏊與太子太保吏部尚書謚清簡鑨南京禮部侍郎鋌太僕寺卿錝太子少保南京兵部尚書鑛實兄弟行也鏊生如游少保文淵閣大學士謚文恭是惟公祖時公之從祖尚有光禄寺卿如法池州府知府如洵皆以名進士蟬聨而起而如游生應本工部郎中應本生公公以崇禎丁丑進士授南工部主事改遷兵部職方司郎中方是時以氣節見每立朝剛果不阿不附其于大事喜負荷無瞻顧意已卯五月烈皇帝知其才召對觀徳殿詢武庫軍器大司馬口蹇不能對公一一指陳上悦賜綵繒二匹糭一盤公跪謝食糭竟敇再賜再食之捧繒而出會髙太監起潛乞世蔭公格勿與起潛怒上方閲尺籍起潛假以隟中公遽下公獄時黄公道周以廷諍予杖敇獄吏屏一切服御意叵測公推已所有䖍事之且從而受易政府楊嗣昌指為黨取同獄黄文煥文震亨等雜治之詞連及公公卭首抗言曰昔夏侯勝在獄中受經子黄霸不以為罪獨柰何寛仁之朝而苛乃出漢世下大司冦忠襄徐公故知公遂出公于獄而轉薦之已而起為九江道僉事命未下國變公狼倉歸里不自量與鄉官熊汝霖破産括閭左揭竿稱孫熊兵會故魯國避紹興拜公左僉都御史進大學士劃江而保者凡一年力竭不能支且天命有歸江枯王師渡公遯之滃洲忼愾嘔血遂不起公以順治三年六月二十四日卒距生萬厯三十二年九月十四日享年四十有四配陳氏封夫人子延齡中書舎人孫六長訥州同知即葬公者次訓次諤次誠諸生次謐次詮因系之曰古族氏稱金張惟世徳袁與楊三公禪皆貞良盟王府紀太常國恩在誰報將公之興以職方斥閹豎清軍防繒賜綵經受黄用未既國已創傾大厦扶修杗雖昧時不自量謂車轢可臂當顧其心猶可諒鹿逐秦犬吠唐聖浩蕩能恕狂不觀漢釋蒯通乃數盡孤臣亡蹈海死亦可傷彼殮者洲之傍所與居殿首張翳鬼物知興喪今來歸瘞舊疆燭湖水何泱泱公之魂翺以翔但假此留公忠故明户部尚書原任廣東布政使司左布政使姜公墓碑銘公姜氏諱一洪字開初其先餘姚人曾祖工部公遷餘姚之南城祖行太僕公以他嗣徙杭州歸宗而父光禄公由曹郎出為知府贈光禄寺卿移家會稽至公兄大宗伯即以會稽通仕籍焉公二十三嵗登萬厯丙辰進士越三年辛酉謁選請就敎職因以武學敎授遷南國子監博士陞南禮部主事調南吏部考功司郎中皆閒曹與同官魏仲雪申青門為文酒會三君皆丙辰釋褐且同以學博起家今又同部好之自稱曰南銓三友已而改江西副使分守九江道駐節饒陽當是時海内脊脊所在徵民兵加饟凡鋭意功名者率以揚厲擊斷催科督役為能事而公獨捐去苛細一切以寛簡治之令有司從尚徳敎察鄉民孝弟力田者核其實府縣敦促赴道治次第立堦下公乃出㕔事降階勞問賚金帛奬厲鄉民入城觀無不相勸為良民者苐饒俗多溺女女少士民或中年不得配又惑子形家言停舊木不葬下令溺女與殺子同律停舊木者與暴棺棄屍者同律里隣不舉坐居三年大治乃遷河南禹州分巡道右叅政值霪雨河决民大飢流賊犯隣郡飢民多揭竿應者縣捕之急逋逃滿道路公曰此良民也飢不得食故為盜耳奈何復驅之速罷諸捕卒設法以賑民稍稍還里賊逼葉縣及鄢陵見所在有備不得入于是賊帥老回回分犯河北巡撫知公能應變以軍事屬公公乃遣老弱張幟分布要害而自將捕卒千人前行賊詗知公能舎之去會巡撫樊公以艱報將舉公自代公已遷福建按察使閩吏習輭緩公一以勤慎自持八屬肅然凡滯獄疑讞立為之决囹圄皆清遂遷廣東右布政司使故事布政惟左筦賦税右第伴食徒兼清軍名無職掌粤襲承平久軍丁多為諸司所役凡衞所存空牒給餼而已公力清核得千餘人别立隊伍訓練以待用既而進左粤素饒沃而布政又財賦所自出公準量平衡約受裕與却羨而塞耗官吏輸餫者朝至夕發完納甲諸省入覲舉亷卓會推䖍撫以政府格之不行前後在粤凡八年歴丁丑庚戌兩薦至壬午撫按竝疏舉奉㫖候京卿缺推用值艱歸甲申國變江南柄用者推公太僕卿不赴㑹唐王入閩僣位號公亡從之連進吏部右侍郎户部尚書是時國家方南闢閩所賦者悉鄭氏所有獨雲貴廣西諸道賦裁足給軍唐王仰賴惟廣東一區而䖍撫復便宜截留之版圖所計雖尚及七省而司農無一錢公措置盡心力恐民匱遷延間值王師踰浙唐王使鄭氏守關自將兵三千從延平移之汀州命公前行峙糗糧以俟而仙霞兵潰唐王走公四顧無所得馬初坐肩輿行既而散去徒步次興國榔木村去贑百餘里時相隨止二僕枵腹足盡裂公仰天嘆曰嗟乎天意有在雖偷生何為矣遂赴水死時丙戌十一月六日諸生鍾國士見而哀之與榔木菴僧了縁為含殮如禮越一年公二子南奔得公殮因載歸葬故阡而屬予以銘公長身白晳廣額秀眉為人簡重有徳量或以非意相干未嘗小怒至大義所在淵停嶽立有確乎不可拔者言不妄發發必婉而中見事敏而慮事密艱巨不沮至璅細亦未嘗厭薄故所至不動聲色而事事就理配王氏封夫人係舉人敎授鼎和公女男二長天植貢生娶陳氏吏科給事中陞太常寺少卿襄範公女次廷梧庠生娶祁氏巡撫蘇松殉難贈太傅兵部尚書謚忠敏世培公女女二長適兵部尚書峩雲王公子貽模次適户部尚書殉難贈太保禮部尚書謚文正鴻寳倪公子會鼎孫三長燦天植出次承燕廷梧出乃為銘曰時天水後代為王臣徒席世寵誰報國恩謂當集菀而丁于屯何以自處惟有致身緬稽古昔殷有三仁大者遜荒小者臥薪雖昩時命未度周親其道固僨其心則純蜀之伯約思邁等倫惜乎其志田横之島從者二人榔木之村彭咸若在相從水濆東海烏喙西山草根何以招之南方之魂敕贈文林郎家明府君暨髙孺人墓碑銘予修明史作先忠襄傳嘆忠襄以死事崇祀嶺表且名其地為忠襄里報䘏何厚然猶藉後人侍御恢大其祠而香山子姓有為茂才者復于明崇禎間訟所侵祠地給帖勒石後之有裨于先烈如是也既而天子臨軒策士于天安門外見貢自香山者詢之則前訟祠者之孫也予方慰勞間而香山選人由舉人授丹徒令以兄弟行來見且手狀再拜將表其先人之墓而謁予以文予拜讀之始知向之訟祠者為予族父行而對策者其孫謁選者即其子也夫子偶感其為人而其子其孫一時竝見然則孝思之不匱與情感之自通兩有然矣公諱濬字孟深其先由浙人入湖從明開平王定江西以世職調守廣東之香山縣至髙祖茵尚以茂才襲百户職祖鳶封文林郎與父元鈺皆以茂才廩于學而父有足疾公生純孝日侍父疾不出户當五嵗時能治母陳太君喪暨十五父亡公泣必見血每遇禁日終其身易服而哭嘗以父在時疾不能赴讌會公亦遇讌會不赴終其身公幼慧試童科冠軍其于諸嵗類亦然繼母麥太君生遺腹弟􅀈公撫之如父而身敎之弟亦慧每試與兄爭雄長且貢于廷而公益推甘與弟如兒時顧公性狷介當明崇禎間從父可珍者浙令也行取有名浙人多宦粤者自方伯下以令故人人物色詣公公不見即請召亦不往及身所受知當事自外臺迄州縣皆重公索公竿牘不可得時公弟及公次子定周皆以文章知于時公各戒䠞縮毋請謁嘗云生人惟躬行而已其次讀書外此非吾有也又云人自敬天念祖而外當約以持身寛以待物又云自重者無辱知畏者鮮禍憬省則寡過謙虚則受益以故鄉邑無賢愚皆稱長者里中有悍子迕逆公頻往諭之卒為孝子少嘗與隣人黄亦亨善亦亨子被賊鹵貧不能贖公亦貧賣宅傍菜園代贖之有先世所遺田庄數百年物也豪家忽佔去公不與爭獨訟其先世崇祀忠襄祠地被豪佔者閲州縣數年必請復乃已久之豪慙悔退還公嘗入山覔葬親地夜行多虎見前有光曜如燭導之數里及得路光滅人以為神所佑云公配髙孺人髙孺人者名家女也幼讀書能通女箴列女傳暨歸公與公合徳宗黨多稱之順治九年山賊起破城殺官剽庫藏平南兵驟至巷戰孺人覘事迫恐及辱念所生女已適郡司馬蕭君子茂才而所居同里急呼女至衽衣顧宅傍井齊投之男新周崇禎改元以茂才守忠襄祠者縋城入覔母見母死亦慟哭而湛于水某月某日合兆于某山而表以碣康熙癸亥次男定周請書碣定周順治丁酉科舉人即新授丹徒令者乃為詞曰惟是懿哲先以峻行讀經談義曰惟方正孝乎惟孝友弟為政施之鄉邦必共與敬以是孚達早播桑梓比之王烈在孝弟里雖復文翰卓犖無比次仲書勢鴻騫鵠跱世所珍匿皆其技末獨此躬修如星如日言成標蕝行萃科律況當家庭皦皦大節中閨姱􅨩言容徳紅披帷吟誦有林下風如何于毒與尤來通慨然致身瑩于寒冰所羨子女俱秉令敎女既殉母子亦死孝旴江是浮汨羅可弔不媿忠烈世禪廟貌自古至徳為裘為箕誦芬揚駿俟之後時凡銘貞石汗簡之資繼為史者尚其思之刑部廣西清吏司主事沈君墓碑銘君典江南試撤棘招予于烏衣自言入衡鑑堂時見按側賢書例鐫從前論秀名應手開揭則先王父玉梁公名籍出所揭版蓋故明萬歴丁酉以國子從應天榜入解者既而飲于堂堂例題名列典試先後自本朝開科逮今為一石植至公堂右而故明自洪武庚戌劉誠意為主文官始迄崇禎壬午為一石植是堂側乃就坐仰視則適刺萬歴甲子先外王父姜宗伯公名怵然動心予生于甲子是年宗伯公適撒棘歸值予彌月已命有名矣宗伯公曰以予闈中見是子非是名也因改今名且曰是子宜嗣我然嗣我于此已耳遂取宴時所饗銀鵝佩之以為劵今予忽覲王父籍而外王父所先鑒不幸左騐然則予數止此乎予笑慰之次年招予于京師不果又次年君轉都官又次年計至時予方游吳門哭于旅又次年而君之柩自京師歸始就哭于喪次于是君子五杲出狀請表碣不敢辭君諱嗣笵字康臣别字肻齋自唐成徳節度使由蜀遷越為越人厯宋郇國公元昌平提領公下至明素庵公徙山陰之隆興里君生而英敏四嵗就王父索一硯竒之弱冠餼于庠例諸生補餼者輪年貢舉倣古者天子之制諸侯嵗獻貢士于天子謂之嵗貢明初嵗貢者為正途科目次之而其後科目重而貢且輕也今三途竝用貢所考選與科目無異君猶不屑當貢及棄去援例入國子就北雍試一試獲薦再試拔進士髙等君素擅書法至是凢南宮主文參詳小試官俱素聆君名且工書各屬意君擬廷對處君及第而廷對巻偶誤墨不撿洗以容刀傳臚賜出身拔授袐書院撰文中書舎人第一時新例以内閣親切地勿用貲郎特遴進士有才望者充之君首應是選會上兩宮徽號貤贈遂以纂修世祖章皇帝實録充史館收掌官五年告成且開代紅本悉經撿㸃賜金幣加級壬子典江南鄉試先是天子念東閣制誥諸舎人槖筆勞苦當與簡主文官而是年適纂修實録有成効遣君遂用為例既而復命嘉其能内轉乃以資格稍遷刑部廣西司主事君自文林君贈君厯世鼎食少豪侈不撿揮金刀如流泉結納天下賢長者且游于聲伎後房充陳供具服食不能嗇既仕而家産散落鬻所居廬為入官釡庾家如單寒而君不纎悉芥蒂益刻苦自厲自國子就試暨入官凢十年思還故鄉江南試事竣計去家千里而近撫環輙泣曰吾入都時親朋餞于郊且有贈以衣裝者今歸而無一錢為襍報資縱人不我責吾能􅀈然行鄉里間耶遂不歸君篤于友愛仲弟華善病貽書憂勞既招華江南同臥起時友人毛甡在座比夜必飲飲必着曙向與甡飲家采山堂甡善歌君吹洞簫和之能曲折倚其聲至是置一笛比夜必數弄倚歌至一月乃罷嘗泣曰吾􅄠種種吾入長安後求兄弟友朋如此會鮮矣君好學尤好過人嘗與同郡徐緘張梯姜廷梧及毛甡為詩文角勝中秋夜苦吟作明河篇數千言輟筆而血嘔自太陵出漫銅盎臥病㡬死比文戰不勝鍵户揣摹有日者告星過癸卯後當不利君惡其語益發奮必以丙午售後入秘省與同舎郎汪君相倡和爭去恒體今采山堂續集則當時所為詩也汪君嘗語君勤于酧應比辦事之暇有以詩字索者輙應不苟其主文時凢退巻皆親閲至遷刑曹例以新遷者視獄晝簡囚𨽻夜宿犴狴外三月而代名為提牢時朝審秋决諸重囚日未得蔽而滇閩適亂囚且溢獄君驅伍伯供𨽻事食寢不給會天寒囚饑貸錢市衣米散活瘐衆而君卒以是瘁死君嘗曰吾畏親獄少時過訟亭聞敲骭聲輙驚悼累日夫以慎獄之人而親獄宜其痒也君所著采山堂詩集八巻續集十巻擬樂府一巻文一巻其試策雜文集不載銘曰謂才足恃科目以㡬何為入官厄于曹司召公是似郗家見竒惟生與死鏁院而知只憐官貧生不能歸死而慿者墓門之碑西河集巻八十四
