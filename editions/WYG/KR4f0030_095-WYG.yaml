body:
  text: 西河集巻九十五翰林院檢討毛竒齡撰墓誌銘五傅母陸太君墓誌銘歳乙丑奉天子簡命分校㑹試領十八房考維時所首薦者則傅生也傅生以春秋經先多士天子親䇿之已賜出身將入保和殿赴舘選適陸大君訃至使者投其從父太常公邸覬稍緩一日令無誤選期傅生忽察得大慟臨至午門匍匐出披髪徒跣望星而南奔京師見之者皆以為孝暨予請沐歸傅生流涕迎馬前謂太君巳小祥將卜葬于梁諸之原有日矣請錫以銘按太君陸姓山隂宋右丞後代多名臣崇禎間有以進士為邑宰知時不可為而掛冠去即太君季父也太君歸贈君為繼室當初歸時贈君母袁太夫人巳疾棘太君甫施帳即侻衿佩入侍疾連晝夜不寐凡九閲日每嘗藥泣曰吾不事姑以􅃵湯而事以藥痛何如矣既而袁太夫人終不起太君喪盡禮然究以不得生事姑終其身志憾焉太君嘗卧起外宅兒不戒于火家人東西竄不知所嚮獨太君趨贈君所亟呼贈君暨傅生先行而身遽入廟手捧廟主從烈熖中出一切籯笥皆不顧觀者稱之贈君初娶王太君而亡傅生者王太君所出也是時年十二太君鬻之如已出稍長為延名師督之學以所居喧卑築别業居之今所稱橫秋别業是也傅生學稍就太君以所生二子隨傅生學每朔望歸覲必詢曰兩弟率教否傅生應聲答則喜否則以督責隨之杭俗不事蠶獨袁太夫人性好蠶然太君歸晩未之見也太君每思姑所嗜自以不得生事姑聞太夫人性如此每歳辟蠶室躬率子婦入室中䖍祓而事之事畢即以所獲繭與絲饗之先姑隨散諸子婦以逮臧獲廣姑惠云太君生于崇禎辛未七月二日卒于康熈乙丑三月三十日年五十有五子三長光遇康熈乙丑進士即傅生也娶江繼娶呉又繼娶沈四川按察使心泉公子龍驤衛參戎君育公女次牧太學生娶張繼娶邵次光昭太學生娶張繼娶張福建漳州府同知顯侯公女女四長適嚴渶次適茅應茂前一甲第一名内閣學士見滄公其曾祖也次王臣望次朱裕德皆候選知縣孫四乃系以銘銘曰猗彼晉淑嗣服維姜獨憐入侍姑淹在床進此苓术如調􅃵湯焚乳致感摧躬自傷曰修饋祀以孝饗彰縱値造次猶臻帷堂伯姬尚在捧主以翔但因佐餕恒懐躬桑原蠶不替園繭並將嗜好有素孝思難忘至于訓子廸之義方燃膏績室鬻書巾箱螭篆其額牛眠在傍穹然何為維夫人藏陳太孺人墓誌銘予承乏入史館作𢎞正朝傳􅍐題得先忠襄名氏夫世德駿烈本難誦揚况煌煌國史將垂及萬世而以後人而為之紀述雖子姓之幸然非先公實有神曷克至此㑹忠襄諸裔有刑部郎孫以大名主簿解車京師則予兄弟行也因詢忠襄事兼搜討忠襄長子亷使征土司思陸遺蹟惋嘆久之越一年主簿弟同兩弟國子判官以太孺人訃來踉蹌將南歸急走予邸再拜哭泣口述太孺人遺事而請予以銘太孺人氏陳前朝布政司使諱廸女也其兄充曾為呉淞驃騎將軍守平望有功太孺人少倚閥閲又習視開府豪奢未嘗事操作聞其來歸克以儉自持弋綈不厭且能以禮得尊章歡心迄于今其先後姻戚在堂羣從與夫臧獲竈下之養尚能道太孺人慈愛所至有禮每刻于檢身而和于御物惜予析處不得而知其詳也苐予觀諸弟在京皆篤實友愛相顧怡怡然或為上轄或為叅幕或就學四門而索米九市無不處之以其宜而持之以其厚大略得太孺人之教居多從父嘗曰吾身游四方而貽徤婦以持門且能代予為嚴君者太孺人也又曰予以幼具羸疾積十年不愈太孺人親侍醴熨以衣著席薦窺伺體驗一如子媳事尊章者卒至羸疾霍然而垂老彌健然則太孺人之賢何如矣太孺人生于若月日卒于若月日年七十五子四長士宏直𨽻大名府滑縣主簿次士奎國子監生次士學出繼次士遴考授州判官孫四女一銘曰是太孺人之阡志之封之以無泐乎其文王徵君墓誌銘君諱攸寧字公遠先世氏謝以後王為王氏初家山隂之住墅年十四隨伯兄僦新昌長潭兄命入沃洲山販炭㰕舟嵊南門㑹王師下江東江上兵從西陵來潰且奔爭門殺所居民而略其稚且艾者君巳隨衆竄獨念炭在舟舎之畏兄貴巳守而不去慮不免乃擇叢莽之近溪者晝伏莽瞭舟而夜守之時嵊民被鹵自十四以上二十以下鮮遺者而君以警敏免且不失一炭俟稍定鬻炭㑹稽市利倍兄大悅使下上行販三年祖姑之子周繼芳以進士改户部主事𣙜北新關素愛君㑹君奉仲兄之禾詣關繼芳乃留君使典商錢而令仲兄獨之禾及繼芳還部厚贈君君悉以上兄且尋兄于禾而奉之歸時君已娶婦兄乃用君所贈貲立盡忽挈巳妻去苐予君夫婦以匕箸使自居當是時君痛已少孤不逮事父母鮮所顧恃又失學昧先世所傳詩禮之緒且交游少其于親黨士大夫之方幅齒遇乃復以貧故不能得兩兄歡心深刻責入市買書執問于所親之學者久之忽有悟乃卜居南鄉之鳳凰山環水而堵以漁以佃家稍豐即所學亦日進乃遂與士大夫講道論德務躬行而間為文章以自娛當世稱君子焉久之兄復謀合爨或曰指斷可復續乎君曰吾惟不能續故求續也豈有願續而不聽續者又久之兄復挈妻去君痛自悔責謂事兄無狀致有此乃事兄倍謹又久之復來然兄巳病遷居于玉屏山側親執湯藥如事父仲兄死其伯兄僦新昌者亦折閱致病挈妻子從新昌來住君宅君讓巳所居居之伯兄既病又以貧不得志性懆急善詈君夫婦承順之朝夕婉伺竟其死無忤色康熈十四年三月十五日君卒年四十四子緒思有文章名當君卒時宗戚里黨皆㑹哭于社既喪言及君皆􅉡􅉡泪雨下是年州縣已薦君不及其後族弟光祿君亦孝友敦行誼多推解于世稱君子與予善因率其子請誌石而系之以銘其銘曰孝乎孝友于兄古有之惟君陳伊稚弟衒火薪估而士敦人倫曰禮教萃厥身臂與指斷復聯彼喬者君之墳貽邁種與後賢敕贈文林郎家明府君暨孺人方氏墓誌銘明府君以子貴占閩縣籍其先閩之福清人也自宋南渡後由陳留來遷分處淅閩歴明嘉隆間有民部觀察兩公先後繼起與越之侍御殿翰暨睦州司馬三衢司冦一時鱗接皆以姬所出合譜通叙而府君仲子若孫則皆由閩縣公車占籍而起于是族之稱鼎盛者必曰閩縣毛氏往從大梁周司農許讀府君仲子文山君詩嘆近代詩格能鴻明亮闓直入三唐壺域者惟文山一人而合肥龔宗伯至以揚雄宋玉相期待且聞其筮仕西川撫循有法當獻賊草薙之後而與民休息天子嘉其能巳經行取而以他事拂衣去其才高其遇致可惜也乃予過八閩自閩中丞下漸至輿皁嘖嘖稱文山至德足鄉里法且能救灾捍患為邑大夫扶掖所未逮比之太丘彦方而文山則正丁營𦵏將遷府君與孺人柩室歸之福清曰此先志也因以子厠從子行屬予為誌嘗讀魯語謂宗族稱孝鄉黨稱弟事本至常而聖賢論士必及之以為是根抵所自出也府君兄弟三人各以讓産為世指名而文山兄弟繼之聞府君課文山兄弟誦讀必述祖德道家世艱難至語及先人遺事必垂涕反覆以為常以故文山兄弟皆肻堂肻構能世其業倘所稱古之為士非與至于輕財仗義撝斥所有為他人贖子及婦皆餘事也府君巳占籍閩縣而不忘首丘其推而上之凡一本之所出猶是矣府君諱一森字應立别字位東生于萬歴庚寅月日卒于順治辛卯月日以覃恩贈文林郎年六十二配方太君賢而有助後府君五年卒生于萬歴辛卯月日卒于順治丙申月日贈孺人年六十六子三長獻瑞閩縣學生先卒次即文山也初名獻球順治甲午科舉人授四川營山縣知縣今名鳴岐季用鑣侯官縣學生孫五長翼坦康熈辛酉科舉人次廷對府學生次廷奏國學生次廷講廷諫俱幼曾孫七方文山兄弟葬府君時以閩海多故兵戈相尋距府君死時巳三十七年而予隨諸親黨後執紼于官亭親見文山兄弟伏柩室傍哀號如初殁者嗚呼孝已是為銘銘曰肇稽姬穆以子圉封典年而降僕射是宗越兹庻譜于陳留通判牒楊左連支甌東人曹既長使憲則雄西臺南省親如同堂乃者贈君孝友竝稱推甘饜苦培荆比棠巳袪叚蔓毋亂晉行以故哲嗣三珠在庭克嬗詩禮還追冠纓業誇二阮猶存兩馮獨羡仲子文章宗工繡褓吐鳳珊竿釣龍翺翔左海徘徊南宫彈琴朗池燒丹大蓬錦宫花發甲于巴充天子逖聽書之扆屏將行取召而歸鄉邦所藉寵贈上明府翁北堂笄蔮以珈以瑛頃因虞殯將還先塋佳山鬱鬱開于香城紫雲新闢青碑舊銘善爾合祔于斯承之誥封淑人張母章太君墓誌銘余從子舉鄉出聞喜侍讀門下其于江陵司徒公則主貢所自出也嘗聞從子從司徒公大令令麗水君歸江陵讀書于江陵之桞間屢稱章太君家居程檢有法一切卬取俯拾絲黍不貸而内而鍼管外而桮盂速父潔客無大小必躬事􅇶惕而㸐膏畫荻所在尤警㑹滇黔用兵王師之撻伐與四方之輓輸者咸來荆門居民鳥獸竄不災而殣司徒公以冏寺羇京師里帑無嬴財廪庾穹然而太君檢損諸日用廢纂組絶烹剝炰割推服御所有餘與囷箱之稍可繼者以施以給凡癃􅂒惸獨不能嗑食往往藉太君延飼喘息以幾于存活如此甚衆以故諸子各率教無帬屐之習在寵知畏而太君則益督教之嘗親入蠶室舉澡瀹緼練以下及洴澼之細示諸子曰亦知衣被所猶來乎必具物積功以次層累而後經之緯之以幾于有成學亦猶是矣予嘗聞其言而旨之命從子書之暨子官京師而公之大令適以選人筮鄉之麗水稱麗水君予餞之横門以為鄉有賢大夫梓桑之慶而既而南歸則麗水君方以憂服歸江陵而以予通家且能累太君之行而屬以誌也予何敢辭太君章姓江陵人幼慧通劉向列女傳司徒公就塾必抱書㡘過太君門太君父見司徒公愛之即以太君許字司徒公而太君父卒時太君有二弟提抱一切家人事責之太君不即歸而司徒公父贈公曽為司徒公聘馬太君特以馬太君羸弱不宜子故又通媒氏委禽聘太君暨馬太君歸而太君繼之一切家人事則亦惟責之太君故馬太君卒而太君勞勩終始不得徹嘗以不解主中饋自憾及主之而精洗逾等楚俗本尚儉而太君未嘗以奢教然而炊菰煑雪萱蘇蓴芼遠過大庖而至于犓腴鱻鱠醯鹽餖飣凡為賔供者率和齊調浹以極于其法以故予在京師于請沐過司徒公索司徒公饌啜饜飫摩腹而司徒公于退朝之隙遇有烹炙必折簡邀過相顧饕餮以為常蓋飲之食之而不知中饋之教之有由也方予南歸在康熈二十五年之秋而麗水君聞太君疾早于未訃時即抱牒愬臺使君願乞終養臺使君不即許而君復彊之麗水距杭州近千里朝夕匍匐至形之寢處每夜夢歸闥往往隔垣一方聞太君聲而呼之而不之見也夫至于聞聲而不獲一見其寤寐之形可謂巳切而太君于設纊時手書遺誡貽麗水君曰毋上傲毋下陵務使居世皆長厚名夫以君之粥粥若處子而猶以傲為戒以君之治麗水撫字忳􅀈視子婦如一家人而猶懼其陵下以君之敦龎不佻惟恐以鍥刻予物而猶督以厚太君其眞賢矣惟太君賢故君孝古人云非是母不生是子有以夫太君生于崇禎乙亥九月二十一日丑時卒于康熈丙寅十月二十日戍時年五十有二以覃恩誥封淑人子二長毓瑞拔貢生見任淅江處州府麗水縣知縣娶王氏戊戌進士原任河南光山縣知縣諱起岱女次毓蕚江陵縣學生早卒聘胡氏見任翰林院庶吉士諱作梅其兄也孫二長錫蕃次錫爵女孫一俱幼乃為之銘銘曰自昔南郡首推陶桓曰有湛母以教子傳惟兹太君克配賢哲幼誦女經長飭婦節歸之司徒爰奉蘋藻持門訓寢如掌邦教以故顯嗣賢于黄童登朝試仕卜章安東乃以道遠養堂未築執板告歸望垣而哭伊母之慈怡然安之子果式榖請從此辭特憐母德指難詘述䘏災拯寡浹雨沐日鶴飛何所龍蓋何求佳城鬱鬱將延千秋懿績既彰恩綸未巳蔮被在公禮宜從子惟是子孝倍徵母慈貞珉有盡汗簡不遺乃展筮祥兼兆卜食焉審百興視此片石西河集卷九十五
