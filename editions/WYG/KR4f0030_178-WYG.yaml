body:
  text: 西河集卷一百七十八翰林院檢討毛奇齡撰七言律詩五長安雜感奉和髙陽益都兩夫子春游原韻十年裁與計車偕帝里蘢蔥氣自佳三省愧膺新薦引九河無復舊疏排園花盡日開成幛江橘何時返渡淮秪為晩依丞相府長騎欵段過天街二紫陌丹山未易兼羇棲徒使嵗時添游魚欲逝翻吞沫乳燕初飛只傍檐故國望成千里隔新詩裁作兩頭纎及崖何限追隨意静裏曾聽解妙嚴得姜京兆奉天貽書感賦却寄薊門相望一登臺尺素忻傳遼海來九百峰前雲散盡十三山下雁飛廻帝鄉草昧時方闢官舍沙寒晝未開為重陪京根本地故留廣漢救時才二麐符逺佩出闗東鄉信長從黍谷通行部早廻寧逺塞題詩多在廣陽宫喇嘛水下雲間白韎韐花翻雪後紅獨恨馬周應詔晩長安對酒與誰同枯梅生花和韻横牕老幹久嶙峋忽見幽花剗地新殘蘚暗含紅蔕淺枯苔生繡綠花勻湖山未許歸和靖谷口還應見子真縱是東風能遍物却憐流滯幾經春七月廿一日上御瀛臺賜宴汎舟兼賚文綺表裏蓮藕恭紀四首芙蓉便殿接蓬萊秋氣新從太液廻篽苑賜來三島宴瑤池捧出萬年桮隄長畫鷁銜波轉水面金鱗入饌來醉飽載歌臨抃舞尚餘湛露滿罇罍二滄池詔許汎仙槎雲際廻看帳殿賖畫􅑳開時翻桂槳琱臺深處見荷花衣光翠落波間練纜色晴分海上霞游盡蓬瀛千萬頃金盤親嚥棗如瓜三玉虹髙駕啓朱函早見瓊林有賜緘幸拜㡛人新鳯錦渾忘學士舊鵰衫攜筐入白煩中使束帶簽黃署細銜欲被縷絲恩莫紀五緵十䌰倍摻摻四上林賚菓減封題藕節蓮窼乍出泥鎬飲已歌蒲與藻柏梁羞賦栗和梨槃留白雪遮羊胖盃覆青銅散馬蹄蓮名馬蹄盃三載金門沾湛久今來誰敢厭茹藜雲間曹玉少五十五月一日燕市忻逄鄴下賢髙軒重見綵弧懸游同荀況經年久荀卿五十游齊生在田文五日前蓮葉裹書還幕府榴花當燭照歌筵何時海上尋仙去與子相期三泖邊送陸使君出守思州彤幨萬里使羅施路入湘門春到遲金齒再開蒙氏地銅符初下長官司蠻溪馬度天邊繘番戸龍迎雨後旗此際炎荒行陸賈牂柯南去使人思禱雨禁苑銅池散綠陰鑾輿親禱泰壇深九重自有回天力四海寧無望雨心日下土龍鞭麥隴風廻石燕舞桑林盛朝霑德如甘露何用巖阿起夕霖為朱使君節母費太君旌表建坊贈詩女陽亭畔婺星懸喜見髙門有賜旃大節宛垂千載後遺孤生待十年前陶家坊為延賓建韋氏書教阿母傳誰似使君懷祿養至今猶誦白華篇劉民部尊人入鄉賢祠曽坐臯比授一經騎鯨飛作斗邊星伏生故享鄒平廟劉向應祠尼父庭黍進蜼卣成式穀香含鷄舌見寧馨須知享祀從殷典不在旗常早勒銘金生西行金城萬里惜分攜仗劍爭看洗鸊鵜偶訪傅𤣥來隴右頓從柴紹出闗西胭脂嶺下河流駛鳥䑕山空木葉低前去臨洮知有意新詩應向馬頭題贈直𨽻分廵呉使君使君司通省刑法驛傳係崇禎朝興化相公之子京門右鑰鎖重鐶幕府猶開鉅鹿間部吏逺趨清苑路廂軍近控瓦橋闗提刑位出三司右擁傳人從百譯還好繼前朝名相業外臺節制本清班别陳生赴濟南幕欲上旗亭多所思燕闗惜别暮秋時十年書隔陳琳幕幾度車過董相祠岱頂尚留天半賦汝南曾和雪中詞春明此去如相憶須記宫牆碧栁絲趙中丞開府兩浙新開幕府壓江濆彈事中朝重惠文禹穴豫呈金檢冊浙潮初罷水犀軍殿前露簡看如雪梱外霓旌盪入雲何幸東南煩鎖鑰嵗星重傍斗牛分二文臣節鉞古來難况復雄闗似奠磐南省坐教中憲肅東甌開後外藩寛賜衣真見鸞文曜避路猶驚驄馬寒莫道還臺鄉思逺故園金碧在長安開府京邸有金碧園擬金馬碧鷄之勝思故鄉也贈瓊山令金徽初試韻初諧萬里南天渡海涯茂宰自能瞻貝闕漢家無復棄珠崖陶公山獻波羅税黎氏腰懸瑇瑁靫肯向炎方重回首春花早寄日南荄丁驃騎赴登州靖海衛有贈初拜輕車駕上襄梨花先㸃綠沈槍營連北鎮沙門逺劍指東牟海路長充國定能籌轉運孫臏故自守都昌閑來莫向闗城射恐有鄉書寄雁行沈萃址入蜀徒聞蜀道上青天誰識臨卭有令賢曉店散書綿竹頌春帆髙送錦江船五丁道可通金馬萬里橋難聽杜鵑應念紅閨相憶苦莫教人滯酒壚邊沈君内人為閨秀祁湘君靖海侯德配王夫人生日龍額初傳邑號新百年長遇帨堂春銅屏射雀留神臂玉軸裝花寫誥身觴獻蠻姬銜翡翠閣前夫婿畫麒麟麻姑莫問蓬萊水環海今來已絶塵時臺灣新破二二月花明玳瑁樓藁砧今日果封侯瑤池宴已通三羽横海軍還領十洲綵翟翻衣奩影動金泥拭匣鑑光浮當筵儻進如川頌試看滄波萬里流送春日偕同館諸公集張毅文太史宅分得毫字御苑纔開露井桃春光又復去東臯肯從盃底辭􅌕淥且向花前換苧袍天半結雲催夏雨座間騁辯析秋毫傷心九十無多賸指下薰風莫漫操時榖文于酒闌鼔琴故云滇南大捷志喜四首幾曲鐃歌奏太清樓船無復戰昆明三川終破呉曦壘八甸重開莊蹻城神䇿新軍横鐡渡蒲蠻舊版擴銀生天南萬里烽烟靖從此台階一望平二龍川闗險控諸蒙銅柱當年紀戰功青海故能通徼外彩雲仍自見南中前軍夜入擒元濟降將時無似竇融江畔金沙堪洗甲木瓜花映綠波紅三虛象滇陽習水犀窮猿何處覔林棲金城但築盤山下玉斧長刳大渡西露布馳來真倚馬赦書頒處喜銜鷄南人自此應無反安用徵兵過五溪四星垣振旅拂旌旄南詔碑前解佩刀大將兵摧神石裂長官司據麗江髙俘成宗廟看陳矢凱獻端門有賜袍金馬碧鷄如可祀王襃拜使敢言勞顧侍御生日執法星髙麗碧空綵弧初絓柏牀東名標柱下三台近人在香山九老中春雪尚餘霜簡白朝霞長映繡衣紅金門倘遇東方朔莫道花間好避驄二九霄獨坐重臺端共看鵬飛簸羽翰烏府自頒王儼敇豸衣重領杜林官封章曉入清宫肅甲子星週法曜寒幸值聖朝多雨露不須仙掌潄金盤題陳生博古冊子和王司農韻春暮楊梢解刺天碧幢閑使鬬茶錢風流只記張思曼朗鑒何如顧彦先鐘缶燒殘還自弄蟲魚註缺不須箋燕臺雖少探花㑹也有柴車到集賢夜飲提壺不上曲江頭學士官居對殿樓長樂鐘當晴後響短連酒是夜來篘宫中廊下酒家名長連短連園蔬不厭茭菁薄筵燭將低菡蓞收坐近西軒看月上有人花底笑藏鉤金古良將歸春還凍澤未全消又見東風入栁條好友最難燕市别思歸翻恨越江遙才髙逈若雲中鶴興到塗成雪後蕉古良善畫但使官湖能乞與相期應在馬臻橋胡廣文之任温州中原十載共爭雄此日方傳吾道東落筆賦成天闕下横經人待射堂中芹絲到處依池碧芝草生時映帳紅但向吹臺尋故磵可知甌越舊來通秋日早朝宫井鵶翻露未晞輕寒先入侍臣衣玉罏香散朝成靄金殿花生夜有輝鳯輦陳階銜翠羽馬􅀈傾椀賜珠璣每朝畢各坐賜酪自慚陪從無文采空見蛟龍繪兩旗宗藩輔國將軍博公同滿州徐翰林並以詩見寄依韻和答小院含商暑未除終朝乗馬尚斑如懷人漸近三秋節佳句忻傳兩地書病起渇逾梁苑客夢回思逐賀湖漁誰知興慶坊邊月猶向城南照索居七夕用前韻秋花裛露被東除月殿穿鍼巧不如向夕慢陳庭下菓連年悔曬腹中書寒歸金馬愁仙吏水漲銀河笑澤漁思煞故園機織者晩來長自對門居贈椒園和尚甘泉西上敝琳宫中有髙賢似逺公説法不離雙樹下置身長在五雲中平臺花氣秋來迥御苑鐘聲夜自通獨惜裴休難問道空搖珠轡日華東送姚聚中還湖州楊栁河橋送客還十年詞賦滿江闗髙門自啓菰城曲佳句猶留松石間有松石間詩集行世下若人逢花􅦆鞢前溪風定鳥綿蠻上林春色年年好不用端居賦采蕳上已易園修禊奉和益都夫子原韻二首時陪游者皆同館前軰二十八人曲江修禊已三年勝飲無如栁下偏地曠儘教油幔接溪廻不礙羽觴傳㳂隄草向春深發夾路花從雨後妍陪得蓬山舊仙侣到來滿座盡雲烟二良㑹何須絲竹偕春風此處逺塵霾東流水色清堪戀北地晴光淺亦佳髙栁隔簾抛粉絮新蒲刺水簇金釵洛中禊飲年年事丞相同行豈易儕張梧南還秣陵憶别十年前帝里相逢倍黯然玉案未酬新綠綺時貽我漢玉未報柴車還褁舊青氊花開曉店迷行騎栁放春門慘别筵此去但能隨謝尚不須頻上估人船時隨陸少叅歸江南二青郊綠草散平蕪别路愁聽谷鳥呼幾見戴逵還剡舍重看李白出當塗難兄三載仍留粤謂南士也賢主千秋半在呉欲典朝衣餞歸客杏園東去酒誰酤奉和扈從登封應制四首有序時維肇甲候屬升辰承六幕之清寧慶三能之效順翠華安指東都望幸多時綵仗將臨夏諺為歌已久因整恊時之駕先酬肆覲之觀鈎陳簡肅無煩五校蘭錡柴望精禋不事三壇茅脊所過祀名山笑玉檢探符之陋隨時省方俗斥金泥封事之繁惟是問族之貞淫間修五禮就民相慰勞暫遍羣神聿開千百年未有之恩頓釋七十君厯傳之妄念兹輸輓築楗石以塞决河攬我提封登髙丘而望逺海謹誦卷阿之什䖍賡將享之章才慚應劭難傳西漢官儀職本蘭臺敢效東封著頌嵯峨方嶽望東廵何幸天門扈近臣磴道曉雲廻海日石壇秋草遍山春鑾旗翻作中峰電鄗黍祠還上畤神千載玉泥留檢處今來沾盡屬車塵二帳殿重重倚障開山呼相應似鳴雷九旗總向巖邊出萬乗疑從天半來升氣下窺青檢合禋河西眺白龍廻盛朝功德真難紀勒石慚無作頌才三東方雄鎮䕶神京豫日宸游減禁兵霜繞幔城嚴未啓花開輦路笑相迎晴看御馬林間度夜聽天鷄海外鳴九㸃齊州渾一望可知六宇正澄清四鈎陳羅列動星文佳氣蘢蔥繞聖君騎接百靈巖曲穏龍躔三觀嶺頭分春還个左乗青輅時見封中起白雲問俗省方千聖事百年父老幾曾聞潘生南歸限韻秋雲夾日雨雪雪游子將歸轡重銜别曲慢調新綠綺征衣還著舊青衫亭廻通潞看題壁家近前溪認落帆若賦閒居肯相寄雁鴻千里不須緘二南湖水盡見菰茭愁向青門折栁梢曉雨送歸梁上燕秋風吹動海門蛟河陽官閥同潘岳鄴下襟期似石苞盡日天街同對酒能忘出宿在東郊長安中秋朝廻晝漏報新晴坐待金波灔㶑生闕下芙蓉開旖旎樓頭鳷鵲見分明當軒河影經秋白傍苑砧聲入夜清手把醁􅌬愁未倒醉來恐起故園情二西風吹葉下金溝海畔虹生雨漸收庭樹影摇冰鑑冷筵花香入玉杯流天街燭散千門静碣石雲開萬里秋為侍講堂歸騎緩晩來東閣重淹留湖南丁中丞生日三湘重鎮古羅田萬里星沙啟幕蓮才過庾公還夏口人如王濬在西川浯溪伐竹當蓬矢蠻郡椎銅作酒船指顧弧南將啟宿崧髙長頌五雲邊送沈五栗士本進士歸里同研淡墨註髙名騮馬雙騎出鳯城衣栁漸逢宫巷曉看花剛及御園晴開來榜目誇龍虎歸去川原見鶺鴒一自容臺陪宴後蕭疎長負故人情是科予分闈同宴禮部寄河南驛鹽道三河節鎮擁朱旗鳯詔新裁五色絲萬竈授鹽齊仲父千秋置驛鄭當時開牙艮嶽飛雲斾行部梁園奏雪詞欲指冰壺遙作頌由來清德畏人知贈送洪使君巡撫江南中丞初拜璽書行獨坐南牀舊有名此去開藩跨建業臨岐賜宴在端明襄中羊祐方開府海上盧循早罷兵千頃烟波環震澤看來不及使君清二巖疆瑣鑰重呉中萬里車書澤國通侍御呵來驚赤棒元臣饗後賦彤弓平推庚甲王程緩上念東南民力窮特賜九花天廐馬瀕行莫認舊青驄金鎏南還把臂京華又一春柴車欲駕泪盈巾戴逵豈是王門客阮籍終為林下人到處題詩銷旅寂行無餽贐恨官貧河橋相别知何幾白首垂垂總是銀二相期同返舊巖阿豈料君先䇿去騾老入侯家猶謾罵醉辭燕市重悲歌收禾嵗晩鄉田少落葉風吹客路多只有雲間沈學士長懸一榻待相過寄閩中提督張君西平勲伐冠雲霄特簡趨庭領騎曹烏滸降旗迎谷永文臣拜節重韋􅆏島中盡𨽻新開版腰下猶懸舊賜刀不道西清頻入夢到來還隔海門濤時予客福州秋祀社壇候駕秋行陰祀詣三壇仙掌髙垂玉露寒百辟奉璋迎仗外六龍扶輦下雲端風廻天半聞仙樂夜見星流繞從官一自太和初獻後愧無金奏頌咸安書王舍人冊子舍人為内廷供奉賜宅西内仙池中禁杳難親解玉坊邊一舍人詞出御牀封過宻衣從宫鏡照來新花前白事先東閣斗下丹星近北辰虚薦雄文似司馬有誰還賦上林春奉陪李學士禮玉皇閣醮壇同胡編修袁舍人顧孝亷即事玉皇案下舊仙官親捧琅函禮醮壇受事籙呈三殿切步虛聲徹九霄寒朱輪滿院皆雲侣丹竈烹泉有露團賭墅圍棋渾漫興今來俱作洞中看題方編修健松齊詩限爻韻名園幾度罷誅茅猶見長松翠影交太子有城頻在望方干故宅那能抛欄邊蘚斷驚虫蝕石上泉流為馬跑誰識桐江風雨夜尚留龍吼聽櫹梢二緑野園林枕石嶅編修為崇禎朝相公之孫風光佳似孟城坳七株偶向巖間植百尺翻從雲外捎如此江山龍未化舊時林木燕曾巢地曾經兵燹故云平泉多少丁寧意肯向金門戀斗筲送平將軍守建昌衞龍驤銜命重南征閫外蓮花早列營豈有黄騶能䧟陣忻逢白馬舊知名䕶軍臺接章山戍轉饟船隨下瀨兵莫道元戎難就拜麻姑壇土築方成宋尚書新進太宰初裁九格掌人倫三典名曹踞要津司列位髙紆紫紱長名榜定勒紅銀廷推徐勉真清士朝有袁昻是正人欲問開元新相業梅花先報鑑堂春二台衡久已冠文昌啟事嘗登帝座傍褚炫端居能節儉崔生用士總剛方賜來金鑑含霜薄懸得珠繩引宿長愧托清流陪後乗時從畫省借輝光送漳州胡别駕還郡漳南上佐計車旋携手京門思黯然别榻尚施花嶼側佩刀重掛栁營邊行時馬傍春雲曵歸見珠飛海月圓誰道清亷少人識胡威譽望正當年施二公子歸里楊栁河橋㪚曉烟相携苦憶十年前洲邊講學逢官舍燭下題詩對客筵驛路計成新歲月江南歸向暮春天還家若問青房李朱仲園頭未賣錢太夫人命以李熟為歸期依韻奉答益都夫子見寄之作時夫子以禪語開示故及之空言詞賦擬相如豈有文章重石渠國史未成羞碧檢越人何意戀朱餘從知白馬原非馬不用騎驢更覔驢數日朝㕘都廢盡只縁新接冶湖書西河集卷一百七十八
