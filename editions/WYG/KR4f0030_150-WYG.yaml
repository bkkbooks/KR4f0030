body:
  text: 西河集巻一百五十翰林院檢討毛奇齡撰排律同任明府赴張宏軒州守牡丹飲席和明府韻潘令丹花宴裴家緑野堂春袍青似草午飯白于霜是日先飯後酒故云錦石遮修幔琱欄倚靚粧叢多揚鳳彩苞淺露蜂黄上客題雲錦佳人散國香時有妓在坐當筵愁易起惟有醉為鄉和待菴看牡丹南園原韻别院移芳宴叢臺簇異葩樽傾若下酒人坐午橋花淺暈含朝旭分紅鬬暮霞葉添官綬縷瓣翦妓衣紗翠幄香偏逺硃竿影易斜醉來裁麗句誰得似任華霍縉雲之官有贈仙都新作宰蒼嶺逺之官桃樹分三隘蓮花折九盤縣符星瀨急民力蔗塘寛地僻聨甌越山虗抱井榦驅鯨頑自化種秫課仍完妙令稱强項收人貴挈肝才名羞短馭家世重長安郡本開嚴助人如望李繁王程方峻切努力渡河干平津宅九日髙舘成良宴閒堂靜舉觴清秋逢九月佳節是重陽地煖全開日天寒早降霜遥山楓葉紫對檻菊花黄菡萏裁為幛茱茰結作囊登臨追峴首蕭灑過柴桑隔歲依淮郡連年滯楚鄉芳亭懷内史戲馬憶前王返國鷹猶擊還林艾復張孫嵩留屋壁漁父掩壺漿詎意茹荼苦重聞漉酒香違時乗短景度難逐長房座整龍岡帽歌廻江夏牀醉餘生感激只為戀平當天寧寺香刹倚岧嶤琱壇聳碧霄石龍環勝地鐵佛認前朝閣岫憑欄豁江雲到座遥齋鐘縈野竹禪榻覆甘蕉榜復先賢蹟門停過客鑣登臨懷未極春雨正瀟瀟埈曰閣岫閣㫐也同諸公游竪相寺出郭尋初地髙原隱法堂三車懸寳樹一徑入幽篁竺閣圍龍象山門繋驌驦天神長捧鏡佛獸自銜香清淨真名刹圓通古道塲唐咸通中更名圓通寺江山連楚豫興廢厯齊梁妙偈袪先劫殘碑誌太康傳衣從善子竪相得空王倚錫登金檻翻經到石牀四禪留塔影八水動湖光華蓋炊烟繞幡竿食鳥翔籖投支遁室酒載逺公房灌莽簾俱碧瞿曇面正黄甘蕉髙向日苦菜軟經霜萬象成虚觀諸賢散上方孤鐘催晩色歸騎帶斜陽白霧穿林迥青山夾路長何年捐世網重與載慈航戲聯白傅題東武丘寺詩有序閉旅寺孤游一日如一歲寺僧童妙喜敏姿而效吟倣初學八比法舉粘壁白居易題東武丘寺六韻回互起對為上下偶雖稍訂童句故亦童粉本耳武丘虎丘也香刹看非逺自呼白句靈丘到自遥童對龍蟠松矯矯童呼白句虎去路蕭蕭自對怪石千僧坐自呼白句寒峰七級摇童對海當亭兩面童呼白句池以劍圍腰自對酒熟憑花勸自呼白句臺荒恨草銷童對寄言軒冕客童呼白句勿忘此招邀自對二化徑行還近童起祗園入始深自對白句金生蓮片片自起玉立竹森森童對白句寳殿三車㑹童起靈池一劍沉自對白句塔懸天外目自起山在寺中心童對白句講下呼龍聽童起詩成倩鳥吟自對白句慢尋蓬島去自起此地好抽簪童對白句賦得宿烟含白露示旅寺童兒湛湛籠烟滴霏霏墜露涵清光隨練合白影散珠含夜氣䝉瀟瀣山滋夾彩嵐長林迷警鶴隔葉臥冰蠶望去思原上行多畏召南朝陽旋欲起瑞藹莫忘探江樓望月分賦試眺雲間月還登江上樓波光頻映壁簾捲似垂鈎暮鵲當牕度寒星入浦流憑欄愁鏡破拂水見刀頭吹笛闗山道清歌胡渭州涼秋明永夜俯仰思悠悠詠春雲聨句換韻春至占天景雲開見物華自來從緱氏國行過楚王家寺童移草如馳蓋縈花似障紗自浮車翻羽翼嘘蟄起蝦蟆童日暖同烟散風輕帶雨斜自陽和方布氣輪囷望無涯童送兩浙臬憲移任江南聖代推司臬周官念凖人東南稱要地觀訪重台臣外輔承三獨中朝遣四巡豸庭江上啓驄馬路傍新夙衛思羊祜雄藩借寇恂行郊曽露冕當道早埋輪遥海清鯨鰐荒城剪棘榛四時分雨露八越淨烽塵玉節移廉省金笳起畫轔九霄翔鳳肅十道使星神祖席摇青斾迎舟轉白蘋舊時需似歲此際感如春下澤淪丹轂鴻名動紫宸暇游如有興幸待武湖濵郡守憲朱公行敝縣枉問并召舟集呈贈良牧光天寵分藩澤國春内廷需侍史出使是王臣舊德傳東海華文掞北辰褰帷行郡縣憑軾渡江津方岳三丘麗陽和一道新里先徐穉訪人喜賈琮廵隔巷迎干木同舟並角巾遥來珪璧映那棄薜蘿紉牛鼎仁人粟鯨紋上客茵自憐長附驥不敢避懸鶉奉送張方伯遷少司空赴都蕃服三年最台司八座雄旬宣勞牧伯綱紀頼共工民賦東南重王居中外崇蕭何停轉餉神禹作司空夏土遷屏翰冬官宅㑹同南行留召父北部返毛公時轉蒼龍宿身歸𤣥武宫督郵需驛傳賔從滿艨艟車騎臨江滸旌旗閃道中離筵人似雨别賦氣如虹廷翽卷阿鳳家懷中澤鴻尚書元凱績宰相李筠功繡脱犀鞶緑工裁雉尾紅願從舟楫便早為濟江東上浙撫軍壽至德生乗運元功體應辰司麾咨北䕶把鉞授南廵要地兼吳越名都壓海閩殿邦需大使開府重親臣召虎分藩逺岑彭建節新廟中方制筴閫外暫推輪妙術安江甸真心與浙人股肱來岳牧嘯詠淨烽塵㦸纛行營簡戈船下瀬神六幢齊引玉雙鬢尚無銀上齒期師望中原藉寇恂願言隨獻醴長得似兹晨入塞曲為陳左軍作薊北新班旅闗東早陷圍秦城金鑰啓漢將玉門歸龍斾朝雲捲狼山秋草腓沙塵埋馬勒風雪滿戎衣左顧遮鵰落前行指雁飛開疆舊地濶返道故人稀全節還平樂論功拜武威普天饒戰事暇日定邊機西塞呼鷹疾南山射免肥封侯知不逺相與俟春暉宫中樂詞璿臺興恱豫琱輦起廵游粉黛三千女金銀十二樓秦封増式廓漢主富春秋西海張波幔南山轉霧斿銅烏棲殿桷玉樹夾宫溝爪士嚴鸞衛神仙指鳳洲諸王隆慶第方士樂通侯甲舘排瑶帳靈池集翠舟殿前新射覆花裏舊藏鈎五柞紛馳獵三郎醉打毬舞裙雙帶子歌曲六幺頭監御傳供奉才人換㸃留射生懸虎韔宣賜出雞裘宸興隨時發皇恩浹露流昭陽同進幸團扇莫辭秋吳調昭君詞詔遣良家子更衣自下朝征行威塞域寵禮賚宫􅒼闗吏開邊驛單于叩渭橋甘泉花滿樹灞曲柳垂條玉輦看辭豹金鈿勑賜貂寒螗遮鬢薄去馬抱鞍嬌沙裏隨鳴雁雲中逐射鵰臙脂顔色改烽火黛烟銷北度踰甌脫南看負斗杓星稀通夕落草短及春燒苜蓿宫名逺葡萄帳影遥愁逾當日侍形減舊時標上舞三朝奏閒絃七曲調吳聲纔一弄雙淚落瀌瀌河亭妓席有贈得遲字柳氏茱茰女王家菡萏池秋星迷渚鵲夜色動河麋叢鬢撩雲幔雙瞳瀉酒巵鈿銜山竹葉裙褁石榴皮善舞勝謇姐能歌似雪兒桐絲牽腕帶笛孔拭脣脂屏短眠難穩杯深飲較遲花欄偷照鏡蓴鼎醉翻匙五斗聞薌澤千條爛燭枝玉釵明似雪知掛阿誰緌雪朔氣銷寒日同雲合暮天亂鴉鳴集樹野牧凍歸田村斾摇風急簷絲有霰先梁園方作賦郢下擬調絃枯柳驚飄絮遥山儼帶烟林虛低舞蝶衣冷細裝綿㸃地融還濕飛空斷復牽撒鹽時宻宻浹水故濺濺閣敞塡鏤瓦牕髙綴綺錢映奩憎粉潔貼鬢助花妍崑玉為嵓秀齊紈布土鮮不愆常歲月頓改舊山川放眼増遐曠渾身似洗湔清光舒短晝結溜挂長櫋枝弱鳩巢折塗荒馬跡穿層柯交愈晰棄笠覆終圓壁削時傾糝篷摧屢扣舷平沙疑炤蠟逺塞且吞氊候近青雲吕歌傳黄竹篇愁吹闗隴笛思泛剡溪船好景懐童齒長貧願瑞年酒傾三雅外裘敝數冬前望隰欽劉繪登臺愧惠連蕭條窮巷裏誰與共髙眠奉祝馳黄尊大人生日杖國諸宗父閒居百歲翁敎兒聞海内垂老避牆東江橘承筐碧園花插鬢紅倒探金簡字時憩玉津宫至德師鍾皓祁年重鬻熊崧髙原有誦長此播清風登宣城徐司寇山樓眺望同張荀仲施次仲梅古愚三先生作傑閣成髙眺名園接勝遊天低宛水暮風落敬亭秋丹嶂横欄聳青溪繞郭流雙橋飛練合萬井亂烟浮翠竹迷南磵寒花映北樓玉臺徐氏業髙郡謝公州洞壑棲雲志鄉闗落日愁登臨傷極目揮涕滿滄洲奉贈來十五集之給事東省推司諌西垣重議郎攀龍歸舊服鳴鳳起朝陽獻納開青𤨏艱難引皂囊船軍規武事帳殿坐文昌赤堠淪官渡丹函反帝閶角巾申浦楫故第午橋莊好遯祠黄石尋眞爚紫房秋蘭遺楚士暮雨詠吳娘張湛辭朝馬陳登對客床談經隋五庫作𨽻漢三倉焚草罏皆白懸冠鬢未蒼傳家踰七郭有子邁諸王庭煖花絲細門髙柳線長屢從看鑑録長得近衣香徐徴士初度之作陶令嘆歸去正當五十時偉長今著論又厯九秋思繞室栽叢桂登山賦紫芝干雲開意氣烈日炤鬚眉久擅南州譽羞傳左衛詞百年纔得半努力紹前期贈汾州董司馬六十初度授節膺南服驅車轉介州百年方外辟六十薛城侯岸幘開金鎻移床泛玉舟刀傳王覽佩琴向子牙求渭幕緋魚曉汾闗白雁秋蘆花生九月三節為公留吳二太保初度中府推三事南司近九重青宫環衛虎黄錡䕶眞龍埈曰錡禁旅㦸門也一本作綺神策留丹禁天兵罷紫墉金魚垂野葛繡被臥山松甲第連雲逺雕盤拂露濃秋堂懸桂子朝日艷芙蓉石匱經辰啓金書異代封鴻文貽顯嗣開烈肇神宗門映三千履歌傳十二鐘弟兄齊列㦸少小獨追鋒負氣卑田叔前籌過耿恭違時嘗磊塊杖國正從容小鳳庭前下名花谷口逢百城圖畫裏長對舊罏峰施公視學山左歸過湖上有寄三物開齊地雙旌返敬亭迎恩需北闕假沐過西泠歲序逾人日春船載使星鵬來雲路碧龍到海潮青城郭連蕭寺樓臺出晩汀水邊聞錦瑟花裏集朱軿擬過黄金刹同傾白玉瓶髙天廻馬首小雨阻鴉翎望眼遮羣岫傳心有六經幾時從泰岱為爾賦滄溟同南士訪愚山寺寓作為訪施夫子因尋古戒壇髙雲横海上新水漲湖干把袂風塵苦登樓雨氣寒五經游自載雙鬢醉還看佛寓分龍藏人逢盡鶡冠題詩抽玉簡剔燭換銅槃暮鵲驚喧客春鶯待使官只愁明夜月相憶在長安奉和姜太翁虞部東池别業原韻金谷分花磵殊亭下水闗空簾啼鳥靜曲渚散鷗閒朝日穿林迥春雲繞座還環橋牽紫幕倚檻見青山緑野行吟外蒼生想望間幸逢開閣便及爾一躋攀次揚州八韻八月隋堤柳三秋揚子波南朝曽作鎭大業舊開河螢苑銷花草瓊臺尚綺羅雷塘宫北舞水調竹西歌髙斾京漕粟長船蜀估鹺重闉如合璧交埂勝連珂京口雲生晚淮南木落多蕪城吾有賦騁望意如何渡𤓰洲次宿明到髙郵將達淮先呈朱禹錫明府北涉蕪城路前逾𤓰步州晩雲移古驛朝日到髙郵湖鸛翔烟淼風鱗蹙浪流椐榆村埂濶秔稻水鄉浮露重沾牕幔烽多閒戌樓撈魚童子罶賣藕女郎舟蓮渚翻黄梗蘆花辨白頭勞歌増客思土語亂方愁茂宰安淮服神君動楚謳横琴鳴素節深閣臥髙秋地以蠙珠重人因桂樹留登臺林下友乞食漢時侯余亦千秋士來從八子遊涼飈衰柳内誰識過邗溝送淮安俞使君陞禮部赴都淮水開鐘鼔河橋解驌驦五年司讞吏四十客曹郎綬映林花綵詞成山桂黄仙門將戞玉官邸早含香驛騎搖旌斾湖民餞鯉魴客途無所贈相送在朝陽閻園雅集贈劉昌言進士二十韻八月正良辰閻園集上賔平臺張翠幙阿閣展朱茵過楚隨狂客依劉作主人敦盤貽好逺几席見情親踏徑通嵓細憑欄摘樹新星枰沙嵌玉花甃水流銀作伎飄華琯圍棋俯角巾西垞銷陌柳南沜響風筠度曲縈三疊飛觴轉數廵孝標思亹亹公幹語恂恂促座聨瑶璧趨庭駴鳳麟二令嗣皆孝廉有名名材跨二陸下食驗諸荀石甕開重釀晶盤貯五辛炰將餳作澳炙以蠟為薪鼎熟寧濡指羮翻恐滅脣撃鮮如陸賈投轄過陳遵絳燭環瓊砌青油却畫輪銅籖驚短漏繡被笑平津啟讌曹公子裁詩石季倫頽然徒醉倒只有一毛甡陳虹縣席上作陳海士先生以别業延客甲館重筵客髙門駟馬來幽欄花影動叢樹桂枝開楚甸聨豪客淮南集賦才熊羮浮鼎鼐蟻跡滿樽罍籥舞屏鐶轉歌翻燭樹廻月華移别席露氣釀新醅仲舉三宗譽元龍百尺材鳳城摇彩筆虹縣有琴臺暫把中林臂長留北海杯通家延李郭外苑盡鄒枚銀漢縈中夜黄星映上台主賔歡既醉吾欲咏臺萊謁于廬陵作既攬名山勝重聞茂宰賢文章行海内花樹滿庭前江雨長隨轂山雲自拂絃孟嘉從事日劉竺入官年縣譜方垂楚家聲本在燕傳經踰魯郡獻賦重甘泉綵筆雄千古髙門啓再傳分毛跨鳳沼飛舄繞螺川荒郭皆留茇他鄉願受㕓每懸孺子榻喜泊越人船水落烹魚釡霜枯釀秫田西遊雖浪蕩東道借遷延劍合交為氣砂成令是仙柴車眞趙壹懷刺豈無縁登取亭并序泝贑江揚㠶到廬陵城下有亭翼然亭下瀏水泠泠施使君碣云前二年使君酌泉而亭之是之取爾乃名取又據酈元水經注贑水經石陽有金井水廬陵晉石陽也俗名金牛泉井牛形譌耳或云有仙人騎牛渡水謬矣乃亭瞰螺川川畔白鷺洲横亭勝處妙矣予登亭慨然念使君因為賦詩落日秋風裏悠然登此亭到來雙澗白看去萬峰青粉堞環髙嶂香山映翠屏章流方浩蕩金井故清泠引興廻江郭探奇問水經千秋從倚檻薄暮喜揚舲野寺横天起寒花帶露零騎牛知𣺌漫采藻想淵渟枉渚浮螺子芳洲濯鷺翎此中擕不盡因見使君馨楊園聨句有序毛甡與淮南名士作晨夕游臘月游楊園亭臺雅勝友朋好合因請聨句環相限韻頃刻而成策杖尋幽壑擕尊渡野塘張礽褘堤開楊柳幙徑轉薜蘿墻周􅀢良㑹追金澗名園是辟疆甡步方通草閣香已拆梅房劉漢中合屐廻山徑抽琴到石牀童衍懸崖留墜雪枯樹落寒霜戴金瀬淺魚全伏天空雁自翔黄世貴平臺虚掩幔曲閣靜飛觴施有光對酒躭思僻看山引興長蔡爾趾遐心通埤堄髙韻起篬筤世貴飲勝杯浮羽歌豪曲遶梁金開欄調野鶴汲水煑河魴衍峰轉流雲碧亭銜落日黄礽褘歸人爭晩渡夕鳥下斜陽爾趾客藉應劉美詞凌鮑謝香有光閒堂分履舄暝吹起笙簧􅀢一水横烟鎻干村帶霧藏漢中驪駒方待駕明月早相望甡旅主人好射每邀觀飲以舒孤悶因吟為贈四海媿懸弧閒看校緑蕪銀翎拖筦笛金鏃綴茨菰暗響星流急紅標日暈孤專堋河朔將穿幛子南夫偶發皆停鵠單棲莫射烏平郊還燕飲何必繼投壺奉贈嚴都諫賢母江孺人夀華閥多賢母黄門善養親曽參真令子嚴助本親臣夏日丹花茂朝霞綵袖新麟孫東壁顯鳳誥北堂春仙女餘杭酒嘉賔丞相茵張筵懸錦帨千載重兹辰垚曰時方貽在𢎞文院故有東壁句贈夏丞才子方趨府仙郎舊請纓家聨梅福市人在白公城緑草當㕔長青雲拂綬生客投金錯麗官比玉壺清遥海推龍臥空壇聽鳥鳴潁陽春色轉同有故鄉情題汝南郡西堂牡丹官閣分朱檻名花長緑叢深房含曉露修榦怯春風薄粉勻綿白輕衫疊縠紅苞藏金𤨏屑瓣剪玉玲瓏簇葉同雲䕶留香待日融重英欹宿蝶曲蒂小懸蟲傾國來宫裏姚家擅洛中自傷流漫甚不敢近墻東寄贈姜京兆一首首善稱三輔雄圖啟八垓須知天府重應借月卿來地轉髙丘黍庭安夾道槐訟田留傳舍走馬過章臺主爵分中尉清都接上台張王如可繼賴汝救時才聨續元稹詩三十韻一首并序汝南蔣亭閱唐元稹㑹眞詩深鄙其事并笑樊川所續不足因謂元稹非續詩也即其詩耳杜則眞貂之末矣擬晚食外重戲續之㑹張杉尋予蔣亭與金公子敬敷共留倡偶故知所偶必愈不足私慶生平既無此事而古人遭逢乃不幸偶類于是可以為恨或曰其友人有索為之者云夜色隱虚櫳杉春星度逺空人摇墻外杏甡燭畫水中蘢暗理雙纒錦敬敷曽挑百尺桐長顰抛鏡靨甡小語隔屏風擷珮思公子杉裁詩付伎童柿奩香襲襲甡花路影濛濛鸚鵡窺金鎻杉鴛鴦繡綺襱慵粧疑宿蝶甡拾帶儼垂虹欲度迷蕭寺杉相期在上宫似曽邀代北敬敷原未嫁湘東翠鈿殷勤卸甡瑶環宛轉通愁聞金釧落杉嬌藉錦衾䝉皓月穿丹槅甡香雲散緑叢横波流枕纈杉微火住薰籠怯甚衣頻攬敬敷啼時粉自融馨含江芷細甡蕋拆露桃豐靚飾方留臂杉朱襕宛在躬河流猶灧瀲甡曙影漸蘢蔥桂樹停輪久敬敷蓮花下漏窮窗鷄號不斷甡園繭緒難終何計酬良㑹杉無言是隱衷褰回簾額淺甡結去縷心同寳篆消寒獸杉明螺觸暗蟲髙唐風乍霽甡遥海日初曈帝女還湘浦杉靈妃返岱嵩庭梅銜履碧甡溝水墮脂紅淚滴徒滋草杉腸迴似轉蓬塡橋思渡鵲甡别曲有離鴻夢斷知難續敬敷波長豈易冲綿綿千載恨杉長在此宵中甡單學博七十有贈至德標荀里髙名著鄭鄉徴車花滿路書帶草垂堂鳩女安琱杖蛇魚象繡裳諸生虚李謐有子對陳亢七十稱中壽三公憲上庠自今耆舊傳不獨在襄陽來母孫太君初度南牖朱鶉啟西王綵鳳飛母儀傳錦帨官誥出金扉篋理樞臣疏庭披柱史衣八龍皆令子七誡踵賢妃叢樹羅青桂新枝擷紫薇其孫膺秋薦季子新受舍人忝隨榆舞後稱祝敢言違沈九秘書典試江南于撤闈日邀予過叙率爾有贈聖主求賢詔名都選士塲人間朱雀里天上紫薇郎盛事追嘉祐髙文領建康方山占地氣斗野辨星芒棘舍軍旌赤風簾官燭黄鏁成監試局判就至公堂置酒楊家第栽花陸氏莊先茅酬臼季上駟頼孫陽獨是淹蓬轝曽經共板床多年忘撤幕無計誦阿房孰意裴君舊能憐劉子狂樽前疑夢寐宦後惜參商是地逢龍躍彌天看鳳翔後車凉日度别幕錦雲張綵筆披南國朱衣戀帝鄉暫將邀笛處私挹令公香重過任四辰旦書館因憶王十六先吉韓十七日昌並于此館同受書家兄門下今三君皆先後通籍而予獨羇遲于此徘徊睹觀遂有斯詠楊子居猶在黄公壚已非故人通籍久游子到家稀幾度移書幌重來訪釣磯花前低置榻竹裏暗藏扉緑水圍丹竈青苔繡石畿時乗爭獻策夜讀記添衣北面師盧植東頭坐陸機回看著書處唯有暮雲飛黄母生日山鳥飛烏鵲河魚躍鯉魴中閨生左妹有婦比周姜擷佩湘東碧從夫江夏黄起家膺隼羽入陛擊貂璫黨錮成王國靈均返帝閶黄忠端公死璫難覆巢餘破壘漆室置懿筐窺壁知名士張帷助小郎最憐懸帨節猶得傍端陽西河集巻一百五十
