body:
  text: 西河集巻一百翰林院檢討毛竒齡撰墓誌銘十思舊銘王諱孫蘭字畹仲無錫人壬戌進士由刑部郎中出為成都知府艱歸補紹興遷廣東按察司副使分巡廣南韶道崇禎十六年獻賊破連州孫蘭死康熙癸亥門生毛甡仿古作思舊銘其詞曰昭陽協洽元英之首明故中議大夫廣東兵備副使王公孫蘭殉難于南韶之官署嗚呼哀哉兵摧畫邑脰絶桑枝官守滎陽身煎柳火彭府君能殉賊太守何功周將軍乏援兵梁王不救以致睢陽之死為厲鬼豫州之出犯妖星况復聴山既邈孰與調商削石云亡無能為質醉裏過西州之路哀來却内府之漿苟有同懐誰無私臆乃感兹疇昔言念當時對䇿春官人誦公孫之學起家秋士文無屈突之辭旋分益部之三刀遂領東方之千騎奬循良于越國假節鉞于韶陽績著湟中猺獞授首風生嶺外羅甸歸心當百城相傾陷之時以片石補東南之闕夫何獻賊逼臨連州失守湯楊繼叛梁化將降堅壁五旬縱斷指無乞師之計孤軍萬里以捐驅為却敵之謀三呼殺賊再拜投繯箕尾歸天丹青入地南還憲使空餘馬革之屍東土門生長抱䑕思之泣痛山陽之吹笛返嶺表以聞琴招魂有賦藉夢巫陽哭墓無文書名隧側因為銘曰蜆岡嶻􅑖羊城崔嵬五嶺是蔽三山以開維此長藩控彼南越楊僕樓船孔戣節鉞三瀧猺歸百僰羌逸何期冦流由蜀而出亦踰五嶺既破二禺云誰作虐曰惟獻忠桂陽不固曲江復陷兵澌若流城空可闞況有二將相繼負降由此擣虚類梃以撞儲峙餱糧料簡乗馬竈減勾沙壁撤清野徴兵不來乞糴無力惟有一死足以退賊下作河嶽上為星辰諸猺畫像羣雛覆巾惟我夫子越州刺史揮斤撫絃逮予小子羈丱受知弱冠相失夫子知我空用唧唧所幸恩䘏予于聖代既肆豐埏復表幽竁謹陳鳥臆附之牲碑蕪詞不章以抒甚哀故明靖南將軍徳配李夫人墓誌銘予避人淮隂淮守備張君請召賔客西鄉上坐長者目接不語及更衣牽予暗中認之則故靖南將軍兄有俶也次日過將軍委巷夫人曰何不載叔之彭城同就舍養予以故人山陽令挽留不果越七年予游淮西得夫人訃聞且曰將塟彭城之雞鳴山恐丘首無日久且失也乞誌之予曰固然夫人籍京衛氏李祖克詔父榮為衛將軍稱世衛李氏少夢神授之筆既長適靖南公靖南公本餘姚毛氏景皇帝時髙祖裕髙從祖祚以兄弟同舉順天庚午鄉試因𨽻籍焉乙酉之變靖南公偕兄保定伯有倫移定海軍同武寧侯王君之仁軍西陵渡夫人在帳中時南都初敗馬士英奉太后奔臨安既而竄身鎮東將軍方國安營稱方馬軍夫人曰士英逆賊也棄君來此此地難與守矣武寧軍軍西陵君何不移軍之龕山逺方馬軍乎既而吳中吳易陳萬良輩各以偵諜從龕山渡隂為聲援欲引龕山軍從海寧入夫人勸之行西陵軍潰保定公以入護監國相失全軍歸命而靖南公偕夫人止海寧既遷淮又遷彭城編户夫人力也夫人以監國恩封一品夫人年四十六康熙庚戌若月日卒子衡非夫人出銘曰惟夫人之能賢兮饗軍鬻釵鈿兮惟夫人之善見兮如乗錦車又如張繡繖兮避老萊兮君子與偕兮如何孟光兮噫兮反先亡兮吕母之冢傍兮惟夫人之藏兮瘞水盞子誌石銘水盞子者越器也其器不知造于何代亦莫按其製相傳隋萬寳常析鐘律能叩食器應絃後人即以水盞入樂或曰古有編磬與水盞同古金以鐘不以鉦今以鉦易金雲鉦即編鐘也編鐘一變而為方響再變為鉦水盞子雖不必以瓦然由變而推則易石以瓦或亦非無然者與陳詩云坎其皷缶史記秦王為趙王擊瓦缶而莊周子乃皷盆而歌雖或以節音非以倚音專聲赴奏有如柷然然而猶瓦為之明興平伯從子髙通畜婢住子能叩食器為幽州歌筝師搊筝在傍能曲折倚其聲姑蘇樂工謀易以鐵不成乃購食器之能聲者得内府監製成化法器如干則水淺深分上下清濁叩以犀匙凡器八而音周强名曰水盞子順治乙酉王師下安平江都隨破家人之在文樓者皆散去住子投射陂死康熙甲辰予遇通于淮隂城託鎮淮將軍食食頃懐二盞出供奉器也中􅠊水級叩之泠泠然語其事而三嘆鎮淮將軍命瘞之淮城東唐程將軍咬金墓側如瘞住子者而使予誌于石其文曰編竹為簫編石成磬方響不傳水盞可聴破十六葉更為八瓷中流深淺髙下因之玉邸漸安犀槌自撚戛即函胡挑將宛轉試斟渌酒遙倚素曲半袖縈錦五指琢玉既越㽔板亦邁徴弄中曲擗扑能使神動吹角出陣鳴笳在疆北鄙好殺南風不揚烏啼失林雹裂震地官渡戰亡安西軍潰已奪都尉將邀昭妃錦車翠幕驅馳何為昔者杞梁妻赴淄水朝鮮有婦墮河而死或援箜篌或形操暢彼美善懐與之相向身同波澄技乃響絶殘金斷絲方寸不滅爰歸黄上仍歌青臺英雄粉黛千秋同埋昭華之琯藏于幽隴元康阮咸乃閟古冢皷缶無路招魂有詞彼美而在尚其依斯瘞珍誌銘兒珍三先兄子也予出游時恐從此不得歸是以後予督撫以下分守郡縣籍捕疊出珍隨母被繫東西簿較瘁矣予歸而珍以瘵死予嘗曰生平可幸者三一行文無宋人論習二無負郭田作衣租食税男兒三不為繼子慈孝兩隔盖有所感也今兒服瘁死而予於慈養闕然兒憾可知矣三年前除夕珍死母抱呼曰吾與兒罹殃亦極矣盍俟汝父歸而死可乎越五日珍果甦問之曰吾感母哭哀將俟父歸然則予之歸日正兒之死期也哀哉珍七嵗後予十八嵗死銘曰瘞者珍翳予之後人西河集巻一百
