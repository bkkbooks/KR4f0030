body:
  text: 西河集巻七十一翰林院檢討毛奇齡撰碑記十兩浙開府中丞張公去思碑記古使相之職原以㕘知重任加開府議同合外臺垣翰而統轄之其受轄多者初不乏五州防禦四路招討諸名而要其最重則莫如以一使而遍厯數圻如李西平之六遷大鎮栁仲郢父子之九易名藩為千秋盛事葢地大者恩多而遍厯則澤廣也大中丞張公以詞翰起家更御史執法提刑觀察進為江南行省者十餘年乃以文臣領節鉞于閩海之間朞月大治天子念兩浙巖疆必藉公一綏理之于三十九年之冬移鎮杭州一時十郡七十五州縣無不靡然嚮化浙東西數百萬户悉登之春臺而安于樂囿天子嘉之謂治有成效惟是西江地瘠不得鎮撫如公者不足以勝兹任因復使駐節南昌此其倚公之功徼公之德可謂深至而不謂民情之未諒也夫下之従上原無向背祇以逺近為親疎故曩時方州分牧但以梁州遷漢陽而兩地爭之魏民之留伯長者願其在秦即不願其在晉雖天閶萬里未能呼叩顧其為何武之去思謝公之遺愛則固所優也乃十郡父老咸礱板琢石號呼集軍門願有所以紀公者而公辭之謂我何功德而煩紀為曰不然今夫父母之于子也鞠鬻焉顧復焉雖欲報而罔極焉而苟其頌之者必枚舉而件計之曰某時一衣某日一食是滄海而涓涘之也且夫皇天后土朝夕履戴未嘗有朝露之可稱春風之可誦也又未嘗有土膏之思地澤之感也然而履戴如是矣況乎公務克己不期衒外其絶苞苴却簠簋呵流飲氷而人不必知也其朝而輟沐夕而廢寢日孶孶勤政而人或未之覺也然而民安于甽估安于市吏端而儒良農錢漕粟既斥其贏餘而防兵關𨽻又别無攔索横征之害以致貪墨解綬駔獪絶而姦民散待化之速何其神也他不具論即以捍患一節言之浙潮之澒洞其來舊矣今且江門不扃集浩汗之水而奔之城臺之坳撞闉擣匼將曩時華功曹所築數千年之塘一旦傾毁欲盡而公力搘之月費斗金㓤肌肉所有運薪轉石闕即補而圮即築不費官錢不藉民力不設立䕶堤一軍捍江一使而期年之間安全無恙誰之力也然則公之不言而躬行均視此矣聖天子鑒公之勞將欲播公功而大公績必使天南鉅省皆遍歴之而後已是豈無瞻言而遽出于此故曰輿人之誦而太常之紀因之勿謂峴山一石為無所憑也公諱志棟號青樵山東濰縣人康熙癸丑進士由庶吉士授監察御史廵視兩淮分守冀寧道遷福建按察司使江南江蘇布政司使進福建廵撫移任為今官客堂冬夜説經記康熙丁丑卧病杭州之客堂適日將南至長夜如嵗每升牀苦魂夢易醒撐兩目達旦侍者謂昏時略飲酒邀客語數頃入更而瞑或可㡬一覺㑹兒子逺宗兄子文輝下第従京師還而文輝子詩以十嵗通經適過江在坐因呼詩前使説經予曰髙子曰禹之聲尚文王之聲何以言之曰以追蠡何謂也曰謂夫禹之聲其鐘懸之追有若蠡也用之者多也城門之軌兩馬之力與何謂也曰涂軌淺而門軌深非門馬獨多力也用之者久也曰豈其然乎豈其然乎夫涂軌之淺馬力少也門軌之獨深者馬力多也夫以三門而合九軌之馬以為力則真兼人之撞莛矣故同在一日之間而九軌行一門軌三之九軌行三門軌九之文王得其十一禹得其十九誰謂禹之聲不足尚文王聲乎夫以禹時而較之文時相距者越八百年其亦久暫之極致矣而乃舉一同時而同行者為之比儗然且曰用之者久夫門軌則何以得久也夫匠人營國方為三門即為九涂城門之軌與經涂之軌未有一日有先後也即行車之頃國馬繕關公馬給賦兩馬行涂畢即行城門其相接受轍又未嘗頃刻有參錯也而一深如此一淺如彼髙子之言得此倍顯儒者可謂不善説經矣逺宗文輝各訝然曰有是哉夫子之于經也儒者日有説而日夢夢也逺宗曰詳二語孟子第解追蠡非考擊所致猶之城門之軌非馬力所造使徐悟年深積久之意並未比及九軌較用多少畧一比及則門軌用多九軌用少髙子之言得矣予曰雖然經第示以意而不眀言其久與暫也儒説雖不善抑亦經本非切喻也古人示學有宛諷有罕譬罕譬者切喻也經言第宛諷而吾輩切喻以眀之可乎皆曰善少頃逺宗曰舊穀先腐舂抌之多與又頃之文輝曰夙霤早泐滴瀝之倍與既而予曰故井易竭綆缶之奢與時已入更後因命孫詩合書之次日逺宗臚其説遂為之記重造餘姚縣學文昌樓碑記隋志以文昌天府為選舉之所自出故凡科目家多祀文昌而特是幽禜所享端必假重櫩複屋俾幽也而致于顯況魁南第四尤為文命所昭融者乎吾姚學宫在縣治東偏曩時巽方原有文昌一樓超于宫牆以為故城卑隘是必翹然拔起足以標文巒之秀然後新城在前無所壅蔽而惜乎址之跼而瀕乎圮也今韓君邵君輩擬擴故壂架以重樓而祠司命于其巔使文光四射曠逺無礙凡都講以下同𨽻學籍者各自捐膏火之資以共成焫烈豈非勝事或謂文昌宫星未列祀典且非頖宫官祭所必及然而周禮以槱燎祀司中司命而王制祭法皆以司命為五祀之一夫五祀則士大夫所有事也不讀九歌乎登九天兮為民正夫欲藉登進以啟崇嶐而不于司命九天之登加之意焉非所聞矣因于落成之際書其事而記諸石行在東朝並賜御書睿筆記康熙四十二年上南狩至浙駐蹕杭州予以在籍鄉官隨制撫諸臣候安于行在朝門謬䝉至尊垂問曲賜慰勞兼敕予與侍講學士徐倬誥封侍讀學士陳之闇三人年老令起立奏對予謝不敢并命在傍同館官掖予以起是日諸當事并在籍臣求御書者競開一摺子啟奏予獨無有上遣侍衞出諭毛奇齡應一體賜書着伺候既而至日昃各退朝去未頒也眀起趨候侍衞先捧御書一道呼奇齡拜賜訖然後齊出昨所開摺子諸有名者御書十餘道一一頒賚㑹皇太子隨行在東禁亦召徐倬陳之闇并予三人入慰問良久且不令行禮各賜睿筆一道屏聨二條拜捧趨出此則專賚予三人凡内外大小臣工俱不及者夫御書睿筆人世罕有奇齡何幸以衰老之年得遭逢聖眀濫承異數此固應寳之世世瞻仰無斁不待言矣特是予别有感者生平以避人流離道路遇晴霽則喜渰翳則戚至暮年衰落日近隂霾則望晴尤甚故乍歸田時自號初晴既而曰嗟乎予晩矣更之曰晩晴凡碑版屏幛書册箋牘應署名處往往以二晴雜署其間然而世人知之皇上與東朝未知之也今展讀宸翰為初夏登樓所製中有處處晴花風拂起句既已有初晴二字而東朝對聨則儼曰晴香邀步澗花發晩影逼簾溪鳥迴公然以晩晴二字題之聨端一似筆下有神隱鑒乎臣衷之所願望而一聖一睿其賜字所及偏能于無意之中暗相脗合此豈偶然之孚契也哉然則予之大病不死得苟延以見晴光天錫之矣因拜手稽首而謹紀殊恩以垂不朽翰林院檢討臣毛竒齡恭記新建黄山雲谷寺蘗菴和尚塔院碑記蘗菴和尚塔院者前朝熊魚山先生埋骨所也先生名開元湖廣人中天啓五年進士由知縣行取考授吏科給事中以疏劾權相罷官歸九年崇禎壬午詔求直言敢諫者起先生官改行人司司副召對中左門重以劾權相下錦衣獄杖午門一百不死因于次年之八月謫戍杭州當是時賊騎入都門先生甫至戍所而國已亡遂北向號哭竄之匡山之東林寺聞其已為僧而未審也越數年相傳西南有僭號者待先生以都察院左都御史而先生辭去走之阿迷提塘官掛號忽于某月日叩偏沅軍門有僧熊開元行脚従阿迷歸報以聞于是湖人藉藉稱先生已落髪歸其鄉住祝融峰云既而蘇州靈巖山有作務頭陀苦行備極楚毒自順治癸已至康熙癸夘凡歴十穀熟而中忽有省三峰繼公者勘驗之遂伐鼓告衆授以衣盂即先生也或曰先生為僧本有託而逃非其實或曰先生性誠篤每為一事必務究根柢不肯姑試故其進倍速若此者吾不得而知也乃先生既開法以素行頗苦自號蘗菴蘗菴居呉中曽受丞相源雲谷監院之請住之三年呉中屢邀之不忍去且令築石函其地指之曰蘗菴埋此足矣已而卒于呉歸骨于三峰之左山而黄山學人爭之謂師有成命安得悔且石函具在也虚此何故移詞至呉中呉中人無以應先是師居黄山時金太史子駿師友也有女道超以童身來學已得法去至是挺身前密具資糧跋踄數千里以航以車迎舍利來歸藏于舊所築石函而碣其前已廿四年矣康熙已夘平陽鐵夫大師従焦孝然山來建旛茲刹見蘗師塔而咨嗟謂石幢巋然露立烟雲間不棟不茒急顧監院等吉等慧正悦正受謀所以覆蓋之而逡巡未果越眀年鐵師乃發願旋為開工相木石所須琢于山而陶于壑植屋三間中蓋所藏而養師像于左楹并聚生平所遺箋奏語錄合罌瓢錫杖而雜實其中靣懸琉璃燈晝夜燋灼舊所稱光眀幢者設司香行者執司之肇其事于辛巳春至壬午之冬始落成而謁予以文予惟蘗師為三峰法孫鐵師為平陽喆嗣要之皆天童第四輩也其相接住持互為輝映雖先後而實伯仲然且道法嶐嵸各出其鱗爪為斯山建開大之業一燈逓照可謂難遘獨是予修眀史時深痛蘗師與萊陽姜貞毅公同忤權相且同杖同戍而一戍宣州一戍杭州貞毅𦵏宣州敬亭而予居杭州不能奪蘗師之骨而𦵏之杭州之呉山雖予輩之弱然亦地靈之有幸有不幸不可强也乃蘗師言事捐軀殉國在前朝壬午而迄于癸未而逮今而塔院之成仍在此年是雖㤀情如予者猶不能不相顧興懐而況山川陵谷轉眼變易即此六十年間而前為魚山後為蘗菴此中所藏其為宰官與僧伽洫乎其未有分也然則巋然雲谷何異杭州蘗師有靈抑亦可以自慰矣時康熙四十二年癸未五月日蕭山毛某謹拜手記西河集巻七十一
