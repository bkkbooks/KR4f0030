body:
  text: 西河集巻七翰林院檢討毛奇齡撰議二増定樂章議康熙二十年副都御史疏請釐定樂章播揚功徳敇定嘉名以光大典奉翰林院禮部㑹同詳議具奏㫖著禮記曰王者功成樂作又曰其功大者其樂備今大功既定樂律未備自宜速為釐定以揚功徳第查順治年間世祖皇帝曾命詞臣製郊祀廟祀諸樂詩工歌已久但未能遍及此外尚有大饗四郊太廟諸室四孟朝㑹燕饗上尊冊立中宫東宫諸禮俱宜有樂即郊祀廟祀中已有樂章者如未全備則迎神登歌三獻望燎諸節次再加查理雖其中責任有三安排樂次禮臣之事釐定樂詞詞臣之事宣布鐘律太常之事然要須有儒臣統之如魏杜䕫晉荀朂宋范鎮眀樂韶鳳等方有要領且殷因夏禮損益可知雖曰五帝不沿樂然因革損益多襲前代如魏初權用漢樂晉初權用魏樂其中相沿不改歴歴可指故及今釐定除所已製不更製外相應照眀樂先飭禮臣開列樂次如燕饗九奏有九樂曲五舞曲類繼飭詞臣譜造樂詞如九樂曲有炎精曲皇風曲是詩詞五舞曲有四邊靜殿前歡是曲子類終飭太常準被樂律如樂曲是何宫何調用㡬麾㡬簫㡬笙㡬瑟舞曲是文舞武舞用舞士㡬人歌者㡬人類且應㑹推一監定官總領其事以便稽覈至若祖功宗徳武烈文謨宜譜樂章者限有四處一郊祀配位一廟祀列室一文武二舞一鹵簿鼔吹配位列室但頌列祖功徳惟二舞鼓吹則兼譜當今功徳在内此則酌古準今不泥不隨庶㡬如臺臣所言者若夫立樂定名則諸曲諸舞自有襍名但恐無特立一名如大濩大武者或概名之曰大清樂而已臣愚淺陋未敢擅越第據妄臆附議如右謹議封禪巡狩不相襲議康熙二十三年同館官疏請封禪而吏掌科員有謂當行巡狩不當行封禪者予以為兩俱不然乃為之議愚聞古王不襲法聖徳不襲治一代之興必有一代之制作以眀創建矧時移勢易沿變不一斷無有包犧之政可行今日者言者謂皇上聖徳神功逺邁前代當法古封禪之舉以紀功徳而或則非之謂封禪非古僅見之司馬氏七十二君之言且其時行之者則始皇帝與漢武也秦與漢不足取法當上法堯舜直以虞書五載巡狩之制及春舉行其言頗辨然愚謂兩不然者封禪之可疑夫人而知之矣然猶有書之封十二山周詩之嶞山喬嶽為之左騐特信從者鮮耳至煌煌巡狩雜見尚書周禮王制以及後漢元和北巡之詔唐開元禮所定巡狩之儀與夫宋真宗時有司斟酌省方吿至之文似古今重典莫此為㝡而愚謂亦不必襲其名者三代以前皇帝清問無日不與民相見而不稱為巡狩其正稱為巡狩者惟舜以相堯覲后與春秋所載周之後王車轍馬跡一二語耳外此而禹幸㑹稽文入西落無廵狩名即東漢賢主嵗有遊幸而實非巡狩晉議巡狩禮而未嘗一行唐太宗每行幸則併巡幸之名而去之然則古制之當行不必巡狩即行之而或得或失亦不止封禪也且夫巡狩之名何為乎王者以為封建既行則各君其國各子其民保無有犯文奸制私瀆禮常者以故考正朔較時日審律度權量以與羣后講五禮于方岳之下孟子所謂巡所守班固所謂循行守牧畫一逺近者于是乎在此所名為巡也今則天下奉一人為共主而一人亦視天下為一家車書文物曾無同異毋論三載考績户口年齒皆得而周知之而即其東漸西被自日出之鄉以至日入咸池蒙谷相距數萬里其中言語侏離踵趾不通者無不梯山航海來享來王日崩題蹶角以修職貢又安有律禮之未同與守牧之當循者是雖欲行之而非其義也且典禮璅屑彼此周章當時所傳有大不足為今取法者雖曰古昔繁重後人簡易不必倣眀堂之制習職方之戒修講徳問道捐租賜粟之令而坐而言之起即可行然猶有必不可已者試問珪璧牲帛梐枑蕃扞帷宫帟禁筍簴坫洗諸禮既名巡狩何一可闕推之而千乘萬騎電掣雷動禁戒儲􅀈措置非一他不具論即孝經稱宗祀文王于眀堂而開元禮設髙祖神堯皇帝神座于圜壇之東是一舉吿而有司戒備逾于郊祀即考之載主妥位之儀註而有未詳者然則典禮雖可行實不必也夫古無襲事前人所為有不可行于今者結繩之後必易書契鍼砭之餘自有湯熨井田不行于郡縣之日車戰不講于彍騎之年白圭倣疏鑿而隣于曲防魏晉法受禪而流為攘竊先王陳跡其不宜襲也久矣我國家開天受命事事創闢驅除海㝢而無征誅之名樔蔑諸畔悖而不必有聲討之跡日留心穡事而無藉于親耕雖安不忘簡閱而未嘗曰春必蒐而秋必獮親賢禮儒進能絀不肖而四門寂然無所于闢如溺如湛較勞于神禹然而舟車橇樏不煩進御雞號入講昧爽負斧扆而不設萬㡬無曠之一言䖍事兩宫日屏息伺志氣而竝省文王世子問寢視膳之節服儉減賚予而澣衣不矯弊褲不飾親發水衡賑畿内飢饉而不足者不必曰補不給者不必曰助登西臺北鎮升中吿䖍而初不以旅平望秩遍記昇平既已河清海晏神物屢見于四裔而未嘗改元聲名洋溢天下人頌聖文神武而不必上尊號威行薄海内外蠻貊君長日朝貢闕下而不立眀堂王㑹之文召學士以制科親試振興文教而不泥于璧雝授經含元策士之數翠華時出歴郊圻封守并繕垣塞而曾無有幸回中幸甘泉幸東都西京勒功紀徳鋪張揚厲之事則夫今之所行又何一非開闢未有巍然為萬世所法式者而必飾巡行之名倣燔瘞之制問登封吿至之禮摹秦漢之規以蹈于唐髙宋真之陋愚竊為言者不取也擬不許武官起復議康熙二十四年言官疏請武職大小内外諸臣當一如文臣守制不令起復奉㫖下議武官起復倣于周制金革之事無避一語然當時稱為權禮故臨軍事始起復事畢即否孔子答子夏金革之問有云君子不奪人喪亦不可奪喪可騐也但其事沿革不可復考隋唐以後惟李愬為慈母議服蕭希甫為死母追服夫慈母尚議服死母尚追服則凡父母之必製服與在當時之無不服更無論矣近即不然金革重大則恩以義掩所由來久自今伊始或臨軍或在汛宜起復者必令統之者如將軍提督軰題令奪情則方許起復否則如文臣一體守制且即其守制者亦必新舊交代眀白始聽去若身有公事若部軍押仗旂官轉餫諸務非事竣不行則庶㡬忠孝兩全恩義各得古所稱弁絰從事不減苴麻者此之謂與謹議擬北郊配位尊西向議康熙二十四年太常卿疏奏現行事典中方澤壇位北向而設西向為一配近南西設三祖配位仍以東東向為二配近南又東設西向為三配近北于是從壇四位五嶽五鎮以次分設亦始于西向而訖于東向是穆昭右左不無未安奉㫖下議時翰林院掌院已有専議某以為仍行舊事不宜更易擬議如左議見經集巻擬喪制以日易月議康熙二十六年十二月恭逢太皇太后上賔年喪持服二十七月且獨行皇上特諭行三宫中不令臣民持服下諸王大臣各官集議臣請急在籍未讀全諭且原無議禮之責即本衙門同官亦未嘗私相諮决以備採擇特臣聞諸臣所奏援古証今執為不可就其說非不甚善然尚有未竟其義者按三年之喪古皆三十六月自漢文遺令以日易月遂改為三十六日其令中所云大紅十五日小紅十四日纎七日謂持大功之服十五日小功之服十四日禪七日合之則三十六日故翟方進為丞相遭繼母憂亦三十六日而後除服應劭所謂三年者三十六月當易以三十六日是也嗣後魏晉唐宋皆遵其制則宜皆遵其月日然不知何故又有二十五日二十七日十三日之異如後唐莊宗三日改慘十三日除服此為太簡而班固王肅皆有二十五日之說故王彪之謂三年喪止二十五月即改日亦當十三日而練二十五日而除服以致唐張柬之謂古制惟二十五日反以王元感所爭三十六日為謬獨顔師古主鄭康成王淮之說謂當以二十七月改二十七日而于是著為功令三日聽政十三日小祥二十五日大祥二十七日除服則自唐迄今未之有改惟宋制小異仁宗英宗皆二十七月釋服然猶七日入臨至七七而止至于即吉則臨朝釋服而宫中不然故世謂漢景以後其不以日易月者惟北魏文帝北周武帝二人而實則有宋二宗能陰持其服較之魏周之終喪者更有通變此皇上孝思所極不得已而出乎此雖曲折苦心未嘗欲效夫二宗之所為而跡偶類之而不之顧也第不知三代以前人君之居喪果屬何等即或謂三年通喪不指持服諒陰之制與心喪同又或謂既葬除服多至七月卒哭致事不越百日則易日之制自古有然而究之諸儒臆說不可為據葢三代以前天子喪禮原無成說周公著儀禮但有士喪禮而無天子諸侯之禮故周禮有五二曰凶禮而唐初諸臣以為天子凶問非臣下所宜定因刪去國恤一篇而于是易日諸文益無可考矣皇上純孝性成超越前代其于禮文尤復淹貫惟恐三年終制則上下均服有妨民業而一人獨持又失臣道誠有如傅元裴秀魏舒杜預所云故稍更其說以為既非同持又非獨服則二者之病宜皆無有因有宫中隂行之說而羣臣復引裴傅之所言而又爭之宜乎皇上之堅執不許也臣以為三年終喪不可行于外朝者皆不必言而即其隂行宫中者而試思之夫所謂卒哭而復王事者正謂王者之親視事也庸常之主名為視事而實同居攝是以持服宫中皆得以隠閟自行鮮拘礙耳我皇上宵衣旰食何事不經于宸歴而内㐫外吉勢有不可夫國之大事在祀祀與喪不竝行也世主端居宫中未嘗親饗六祈九祭不戒禁籞故吉凶内外可以互舉皇上明禋昭事親捧祼鬯浸假大祀中祀禮當齋戒而其所齋處正在宫中一如漢之所謂齋房唐之所稱齋大同殿者其間明衣禮帔應絶縞素則其所謂散齋四日致齋三日者于此七日中將易服而後以齋乎抑即以齊疏入齋宫也况臣下私忌不得與祭故盧邁攝祠但處期功之喪即聽還舎以為饗徳絶所忌也今在庭期功盡斥陪祀而一人之主鬯者升壇吿至甫改憂服何以饗徳且朝㑹甚重世主經時經月祗一御門而大朝則曠然未之舉也皇上每日御門經旬蒞殿則當鷄人三號之際綵仗陳庭鸞馭與百獸齊列闕下羣臣方黼裳待漏魚貫而進而當其時宫中尚欒欒髙處其所間隔者祗此重門而忻慘異致諸臣縱無道豈敢自安况更衣而出足未離闔而鼓鐘噌􅀈既已先聞不俄頃間而中和之樂作于上丹陛之樂作于下則耳之所受與身之所被何不倫也况夫飲食宴饗賞功勸善廷臣加饍重譯勞酺其間賜衣錫綵授筵陳鼎或在北宫或行西苑皆非宫中所能避者故臣謂三年終制三代可行而今日必不可行以為幅員之廣陿君國之分合政治之煩簡有不同也若宫中行服則世主可行而堯舜必不可行則以皇上即堯舜其親政親事與世主之所為親政事者斷有别也然則以日易月使堯舜在今日亦未有不若是者臣管見無狀不知進退但據臆所及而陳之如此臣昧死頓首謹議湘湖私築跨水横塘補議康熙二十八年八月湖民孫氏私築一堤西至至湖嶺東至窰裏呉横跨湖面水利衙報縣申府府發公議湘湖灌田一縣之國課九鄉之民命均賴之自明初迄今著為令甲載在志典並無許絲毫增損誠重之也頃者湖民孫氏擅為築堤以截湖水䝉發公議爾時某在㑹城調治痺疾原不曾與然漸查東城舊宅亦並無隂陽生到門相傳豪黨賄賂阻抑甚為可怪夫以湖之利害闗係重大在當事先賢則有楊顧張趙為之主持在鄉官先賢則有魏文靖張尚書軰為之恢復豈有身列薦紳實生其地而漠然不相聞者然且奸邪衆多反駕黨論以為公呈其為黒白尤宜早辨此所以扶病捉筆急為補議者也按此堤之築否百可一第所否者祗云非制而可之者妄謂無礙故紛紛耳愚謂是舉有四害有五不可何謂四害按湘湖之水通管九鄉田一十四萬六千八百六十八畝每畝止得水六絲八忽一抄水面多寡所爭在毫釐之間故凡放水時即湖外之竹笱土埂皆令撤去以為截一笱則阻水三寸截一埂則阻水九寸今公然蔽湖而截之則九寸之水勢必加倍其害一也湖之有跨湖橋也即湖民先軰孫學思强築之者爾時當事鄉官不與之争以為湖有上下上湖南洩下湖北洩彼此可分而橋適當分界之間似乎無患然而築橋之後父老痛恨切齒至今嘗為謡曰孫學思築湖堤湖堤長害九鄉葢以一湖雖分上下而上湖為孫氏淘土塼埴其水深下湖為葑茭年逺壅積其水淺以淺身倒注之水而又横隄以截之則下湖之水咽而難洩况堤之又堤是一埂之阻將不止九寸而下湖水常少上湖水常多其害二也放水則例惟恐偏枯故凡為湖納粮之田當按其時候均其緩急以便贏縮舊制下湖之水分為數等如第三放東斗門溉昭名由化等鄉得水七釐二毫一絲一忽放二十一時六刻止第二放金二穴溉夏孝寺庄等村得水一釐三毫二忽放三時一刻止夫開放之時如此其促而出堤之水如此其緩則不特下湖上湖水有多寡而即下湖之中其時刻多者尚可望堤内之水紆徐而下若三時一刻而即行閘止則水未出堤而湖口之防已閉矣將見得利之田竟成虛受其害三也且水流則葑草不生前此下湖之葑以跨湖一截致之今又加一截則渟蓄不行葑與土膠而孫氏復取埴于湖如淘濬然淘濬右涵則葑土左露窞汙所止既鮮瀠洄而奔注不能即反生轇輵又况秋前推草秋後放水孫呉二姓皆互立竹簽以為界限彼此盤沍使其閼處不得竟泄遲久不疏遂為平地其害四也且夫孫呉之為害也自明初以來歴歴可指在洪宣時有呉子信之害在成𢎞時有孫全呉瓚之害在正嘉時有孫肇五之害初則文靖淸之既則何御史清之又既則張尚書淸之然且御史父子以身為殉其禍烈如此今其族富其丁繁沿湖而居易為侵蝕稍一疎縱奸占百出不可者一舊制湖址以金線為界一交靑土皆為湖身而今則孫氏竟住于青土之中豢魚畜鳬種荷採芰已非一所稍欠者無倚傍耳一有堤可倚則以漁以佃漸次成勢不可者二且惡不可長也涓涓不絶將成江河其言甚可鑒也此湖利弊自嘉靖以後平安至今亂法一形將釀大患據水利報文已稱石巖諸處竟有效尤相繼起者此變亂之兆不可者三况湖豪奸宄不測而又加之以勢家大族有風水于湖中者隂為指使而陽竟助之如駕為公呈之楊氏蔡氏皆風水家也湖中兩山無非墳墓此端一開將東圏西鍤無賸地矣不可者四况中尊至公洞析水利而郡尊甫蒞即有非常之譽起于四境此真東南幸逢之一㑹豈可使賢守賢令相際之時而舊章之變自今日始不可者五具此四害五不可其宜存宜廢宜築宜毁當事薦紳必有能辨之者若夫専擅之罪變制之罰舊有定例未敢擅及兹但補申臆議以俟裁擇某月某日西河集巻七
