body:
  text: 西河集巻一百六十三翰林院檢討毛奇齡撰七言古詩九寒食直史館奉和同年李漁村太史兼呈同舘諸公春城日出鴟尾紅下馬入直柬華東忽言今日是寒食愁入萬條新栁中陽春初過一百六日趂車塵苦追逐大道時聽賣野餳宮門無復傳官燭溝頭水漲花尚稀早寒猶著春前衣庭槐幾見火新改故國六年人未歸同儕相顧起愾忼此地前經設東厰今史舘即前朝東厰地李太史是日有詩故云斷烟祗為惜亡臣殺竹何堪謝鉤黨鄉園日夕風雨賖沿門幾樹春桐花明朝畵舫門邉住好入春山焙早茶送同年尤侗南歸東堂著作誰擅聲一時並讓尤先生羣公隔舍争問字天子殿前長喚名今來慷慨賦歸去家在東湖最深處堂上重裁薜荔衣門前自種垂楊樹吳中築室志未成集賢坊下還留行堪憐五載追隨意頓有千秋萬古情予向渡湖時更名王士方宿竺蘭聖宣二上人房去今二十年後予過上海聖宣貽書兼索書舊日所題詩句感生於心賦此志謝并呈蘭公代訊昔有王士方曾經擾精舍雨後潛行菰葉中病來借宿蓮花下其時髙座有聖宣上人佳句繇來傳烹葵時餉白雲塢拂軫夜弹流水篇秋風一别過湖去從此天涯隔晨暮歲月難教古寺留夣魂猶向長橋度蘭公垂老能著書不知舊客非文殊毛甡廿載尚淪落時代士方傳起居只今海上望雲日欲訪巢雲舊禪室常恐紅顔今昔殊對面相看總相失䝉君貽我緑綺琴并邀一寫蘆中吟愁心欲記當時事幾度含毫泪滿襟宣德窑青花脂粉箱歌為萊陽姜仲子賦君不見宣皇宮中脂粉箱青花素瓷出上方陶模笵埴好形像燒胚㸌膞非尋常曼身穴腹判兩截一道坎中周四旁融脂瀹粉恐膠結洄漩複壁流温湯宛若麗華鬬粧罷宮溝淺膩縈苑牆何年此物坐棄擲竟置姜郎硯塘側隔盎微聞金粉香開奩尚帶臙脂色摩挱日劇但把弄未審甄人定何用賈人欲認不辨名盧女相看宛如夢連昌宮監老不堪落花時節來江南見此忽爾驚嘆息云是先朝舊承值曾賜昭陽繫臂紅玉凾脂粉在其中盤間花貯甘泉露鏡裏衣穿仁夀銅良人少使望春樹百子池前早祠去額畵銷硃㸃暈重指尖碾玉當窩處由來摘揥最煩紆惟此當牕好勻注紫水開脣恍瀉丹紅綿撲粉如飛絮因之瓦甒獨見親珠椷寳柙皆非倫履箱銀鑰擎奴子鈿合金釵付貴嬪誰知世事頗難測金狄銅仙雨中拆拾得皇孫繡褓錢抛來魏后緗紋尺昭華翠琯摧井榦道傍團扇遮彌寒庫名宜聖總散失獨留金盌傳人間承恩當日授佳器前後紛綸尚能記花箱雖好何代貽知為宣徳年間事我來吳㑹當嵗除東湖水落西流魚姜郎酒後出示我令我抱之長欷歔黄鐘土釡本反覆幾見桑田變成谷半世紅顔委道途上陽白髪誰膏沐箱空脂盡粉未調當前若個真娥媌君家陳寳世無算為汝一歌宣徳窑汪主事以藍羅裙子束纎腰畵巻索題紅羅衫子身材窄裹得長裙楚絲織麹末飛為海上塵蔚藍染就春潮色䦨邉楊栁空拂衣手中紈扇釵頭璣請看雙帶廽環處長抱纎纎知不知錢編修所藏司馬相如玉印歌漢庭司馬梁園客早嵗為郎晩馳驛因慕邯鄲舊相賢借取高名註屬籍當時原有摹璽書大者礱石小琢玗螭首龜膞總啣帶碧文緑籀皆施朱相傳觧玉刻小記四角中央搆名字檄使填將喻蜀文酒徒印作當壚契于今相隔年又年不虞此物留人間土衣苔繡半斑駮銀鉤玉筯還新鮮截肪徑寸覆玦紐何必黄金大如斗錢郎得此真罕希毎與秘書通繫肘㑹當天子好古文相如已是同時人尚書給札令繕賦落筆殿前如有神遂登著作入金馬名在何須更相假對䇿姑令董仲先容才久為亷頗下長安秋盡寒欲來驅車一上昭王䑓酒間出示争把翫令我懐古生徘徊前人意氣不長在况復微文等光怪何物雲英䕶此符厯刼千秋不曾壊龍門遺册嬾未収圖書堆垜能生愁我今欲借文園篆一惹桃花紙上油雪中陪益都相公請沐善果寺即事奉和原韻長安佛寺稱最麗洛下伽藍鮮殊異請沐長從丞相游祗惜香山逺難至上冬十月大飛雪禁苑層層凍雲結捲幔驚看花絮飄㸃衣化作緗紋纈朔風吹攪勢轉濃特尋古刹烟嵐重封將塔上千尋荔寒到門前幾樹松香厨設饌飯尊客啼煞慈鴉日將夕更上毘盧閣上觀萬里山河一時白晩來頮水丼露盤椒蘭被軆能忘寒何期太子浴堂内竟作春風沂水看我今逝欲埽塵幭到處追隨傍車轍縱使宵深歸路迷敢道足寒傷馬骨題袁孝子負母看花圖東園花發好顔色白髪欲看行不得負母能傳江革心娱親自竭曾參力春花已落不再攀高堂老去扶來難只今負手花前子長把斯圖帶泪看葉主事歸黄州有贈宮槐初落秋雲飛天街雨來塵漸稀金門待詔苦寥寂索米欲炊饑復饑黄州進士子高後十載通籍猶羇遲郎令丞博許就薦高文足匄聖主知誰審司事去取異清河轅固翻令歸長安苦寒兼苦熱走馬流汗食不肥炎歊退後喘稍定頓覺晨氣侵絺衣緑楊橋畔有故舘雪堂竹樓皆莫幾逝將去此作請澣後㑹重與春明期人生出處貴快意出貴急决處莫疑何為鬰鬰守冰坎天寒日暮空嗟咨時呼翰林為一條冰故云題方田伯躬耕養母圗先生把筆如把鉏擷芻負米行江湖偶因嚙指得心痛幡然歸去南山廬春田過雨緑初漲隴上炊烟喜相饟叔豆應披王覇衣耘瓜尚荷曾參杖髙堂白髪負日暄江魚水荇堪承歡抄書過市當晩讀綯閣近山防早寒廬江孝行本千古他日登堂拜賢母重展斯圖對酒看莫望南山愬辛苦相逢篇為李公子作豪不馳玉勒馬俊不挾金彈丸所貴結交重然諾久要不負平生言錦袍燦燦振長袖李子相逢宛如舊肝膽嘗傾劇孟前聲名不在劉生後當年把臂意氣遥酒酣同射西陵潮追隨燕客且擊筑歸來吳市還吹簫只今奔走困前路謝爾清光展雲霧觧得吳刀持贈予價值千金不相顧世人交友只在錢舊游散盡心茫然隴西公子幸無恙與子共賦相逢篇題曹石庄滌硯小影吳中高士曹石庄建安詞賦超劉王翛然植杖坐林麓尚著秦人舊時服書成欲換道士鵝春池灔灔環清波小童持硯濯波去清影滿前如影何送同年范太史還吳門秋風颯颯南雁翔昭文才子還全昌横門一道軟塵發令我黯然懐故鄉軒車數隊駐栁下野祠設幙留供張啣盃徐起贈鞭䇿意氣厯落不可當華㕔分草登左榻山池賜􅅅出上方况握竹管記前事髙踞柱下稱三長其如温飽非所志曼倩日餓東郭僵亦知史局本異量兼荷制舉羅非常璽書曽答太子令侯相争道申屠剛縱令种郤使覆對猶㧞仙室冠望郎而乃掉轡古薊野從此覔路秦餘杭我家東浙鮮剡宅回憶北山空草堂他時得返越州去為汝一停吳市傍花飛渡口遇慧曉草深墓下尋真娘買隣縱未近樂圃訪友定能通野航朝霞幾縷開上谷流水百道傾高梁故人分手自兹别縶馬欲行看緑楊書馮二世兄學正巻子穭葵結葉蔓河渚曉露啣衣當秋雨為予欲取茂陵人同看城南賣薪女長林嘶去駵馬嬌百金裝出珊瑚梢揮來代作定情物相門之子真賢豪明將入學教國子年少能傳四門史昭逺從來善觧經公超所至應成市予方就飲學戴崇閒游重覔山桃紅不疑老作金門客仍在成都酒肆中翁司馬之任黄州以詩留别有贈横江舘前江水清臨臯亭畔春花生黄州司馬甫到郡八縣一州官吏迎都亭飲餞䇿去騎争羡當塗好騏驥人如仲舉入官時郡是東坡舊游地天涯邂逅意氣真相看本是同鄉人多君惜别留賦詠愧我出游忘隠淪昨聞巴水大破賊萬里江流盪胸臆倘能汎艇過黄州便可相期在赤壁詔觀西洋國所進獅子因獲遍閲虎圏諸獸敬製長句紀事和高陽相公古皇慎徳開四譯内被綏侯外蠻貊貢物區為王㑹文共球載在賓庭册河鏐畎翟獻上方兜離僸佅陳明堂三靈既應百神洽般般之獸皆翺翔康熙戊午十七載神武聲名播遥海五畤從教白澤來千門真見黄龍采鴉翎習習負矢飛鷄斯之乗歸林支諸方執䞇儼相列東漸溟渤流沙西于中有國名古里曽渡瀾滄作海市魚眼看波射水紅鮫絲織浪翻雲紫地當申未産獸雄金精傑出毛羣中銜縧餙組獻天子裁貝作章辭禮恭從容檻致射熊舘不為珍禽為懐逺虎落時看接上林鷹房秋到移南苑廷臣侍從欲賦詩皇恩有詔徐觀之圎目昻鼻有筋力懸星掣電無雄雌獨憐耏髪未巻曲曵尾紲紲若散絲衣被欲成鞠色見牙齦不使鉤形施爾時羣檻柙諸獸木壘槍樊列前囿熊羆避路不用當虎豹攀欄有時吼青鸞赤雀相對栖豪猪野馬争游嬉張昭見此不動色朱亥在傍何所思聞之有熊狩暘谷獲得狻猊比牛畜漢時安息亦獻斯形似麒麟但無角從兹郊祀播樂章射烏格鹿非尋常鐃吹已陳朱鷺曲徴歌還及白狼王何如儲􅃣未完緝詔遣求賢共來集東堂甫布網羅成西域剛逢旅獒入招摇乍啓禁籞開白麟有對皆奇才請看太保巻阿賦恍見文王靈囿來朱運副七十南陽朱季絶凡俗曽破黄巾苑河曲車茀題來錦字紅商船載去滄波緑居平忼愾能任天但行直道歸林泉洛陽若有耆英㑹誰謂張燾非少年玉㻬篇為黄母作鹿門先生好讀書百年之範閨中居手披文史衣佩琚穿針不纈雙蜘蛛當年太僕扣闔閭夕陽亭下悲欷歔黄瓊終為黨錮誅曾贊夫子呼階除迄今講學河汾廬練裳木屐相巨儒席門猶過王公車缾有美酒盎有魚時當初度獻玉㻬攬之日月同居諸庭前又見丹花舒醯雞篇贈藍漣閩江豪士藍公漪白晝踞牀銜酒巵有時裸袒抱銀甕翻糟蹋滓眠清醨人生慷慨貴行樂百嵗促刺能幾時不見東隣有王者罔誕擬作劉安辭西家小侯亦何用㧞山驅土填海涯以兹感激俱作達日事餔潄唯恐遲長恨書簏非釀具欲使畵簾當麯衣良朋總在履道里妙地絶勝髙陽池醉來倚壁且塗墨興發對人長賦詩一花兩葉倍精爽千言萬字皆離披髙堂名父過八十口能啖肉手不藜閉户尚作擘窠字小如畚簸大若箕承罌捧缶作丼㫖花前月下恒娱嬉子父相對指白薄八斗一石何足奇顧視越客忽大笑甕傍那得來醯鷄山中再宿小溪淅淅覆草裏大溪㶁㶁長松間高岩雨聲到松葉一夜冷徹桐君山山中寂歴無近逺再宿始知路深淺瀟瀟衣露若散絲松牆日出歸來時中秋後風雨連日䝉馮老夫子賦苦雨吟見懐依韻和答毛錐處嚢不立見空道南金與東箭日上師門苦未通况復相違比牆靣憶昨三五侍帷幄酒花燭樹紛厯亂那知月沒靉靆生豐隆屏翳起鬬戰衢巷水大車馬沒檐溜衝階有泥濺連朝瀝漉喜蹔霽尚有絲雨似襪線安得東海天鷄鳴攜我飛騰到日觀秋高雲隙収斷虹風急嵓前送歸雁忽讀夫子苦雨吟令我口齒重潄盥情親恍續謝客愁調警似聞楚女散晴雨燥濕亦恒事讀書所貴在合變只慚才劣和轉難不及劉楨賦公讌奉贈李公子鄉舉入試長句海上五旒鳥三日生綷毛鷄斯有良駒蹋地騰雲霄廬江才子擅宿慧數嵗能通秘書字人世驚看豹彩光兒時不好鳩車戲䨇瞳皎皎鸞鳯姿清神宛濯秋河湄攀楹早著鷗鳥賦對客自吟梔子詩行年十五舉進士獨對春秋觧㣲義擢科不藉賈童名上殿竟随楊億試黄紋袍子短稱身紫騮騎作紅麒麟君家奕葉掌詞翰玉堂仙李嬌青春從今直上紫霄去萬里風雲起前路欲問慈恩誰少年但看春官乞詩處又和益都夫子雪中游園口號原韻雪飛滿園夜若繡誰云夜雪不到晝况有季彦後來秀追陪几杖四座春招携總是平䑓人抽牘授簡真良辰冰凌結花不即謝入林恍坐萬花下祗訝入夕花未夜斜陽􅈝射雲隙開傍檐鳥雀啾啾來坐花肯向花間回奉和益都夫子雪中游祝氏園林原韻三輪出游忝陪從燕山一夜雪成凍遥尋古寺塔樹深近見平林酒旗動孰期名苑環木坪幾曲層軒繞松棟欄邉花竹娱晩晴盤内蔬蒲擷午供寒鳥偏教谷外啼冰凌故作枝頭弄酒傾百杓輸阮宣裘敝多年過平仲墮地陽烏欲射難有月如弦那能控戴公子生兒適大理君遷京兆信至秋風瑟瑟玉露滋庭前桂樹生新枝朱櫩噪去烏鵲侣錦堂抱出麒麟兒執手命蘭已擇日探丸拜麻當此時筵開湯餅雜三雅滿座朱衣正瀟灑有客能傳京兆書阿翁已走章臺馬男兒倜儻似長文儼然頭角生風雲當筵况有清都信不試啼聲便識君過宗藩輔國將軍邸第留飯兼䝉賜詩賦謝長句擁彗不入齊相門挾刺不謁長史宅紛紛花栁看滿城那有停車道相識掖門東去蘭坂長五王舊第環宫牆平臺逺屬諸國邸複道自連興慶坊瑶林玉樹蔽階戺帝室名駒總千里講易能踰沛獻賢好詩不減元王裔風流大雅真絶羣愛予曾誦予為文毎稱予詩文皆成誦相逢倒屣宛如舊入座縱談驚未聞金杠璧帶掛珠幔日射牕螺恍流電百軸牙籖夾畫欄一庭花影翻書案繁肴錯核難具陳紅肌紫翼青絲鱗湖筍盈柈如切玉山粱作飯似傾銀逡廵授簡發毫素示我新篇出雲霧麗句曾開瑪瑙屏清音漸啓金笳路長吟短詠皆有情黄麞罷舞鸎停聲西園徒厠賔客履梁苑竟慚枚馬名御溝春水晩嗚咽暝色重重暗林樾惟恐漁舟難再尋坐對桃花不能别夜飲梁尚書宅有贈宣平門前吹朔風大車小車如轉蓬縵冠挾刺向何所為謁鉅鹿司農公司農文賦早名世高起龍門似司𨽻七序傳為梁氏詞一䑓寫出尚書字藝林雄視四十年走趨幕下多豪賢愛才不减天倉粟列屋曽無月獻錢見予倒屣設餐飯竹席蓬屏坐來晩燈前分牘避逡廵酒後高談驚近逺山茶花發紅滿牆夜看賜劍皆文章司元本是中樞宿欲返天街一望長西河集巻一百六十三
