body:
  text: 西河集卷一百四十翰林院檢討毛竒齡撰七言絶句三送金二敬敷覲省汝南官署紫游金勒控雙鐶公子思親江上還十月丹楓吹似錦看君西度朗陵山二汝南公子本翩翩覲省將歸醉别筵君去若逢袁夏甫莫敎徒歩府門前題畵東溪草閣吾曾到傍水寒生山樹秋今日畵圖相憶處春山澹澹水悠悠中州張興嗣寄示南遊詩有感賦贈丹陽不復問劉惔少室山前掃石楠一自君歌傳洛下頓敎人憶望江南二幾曲梅花傍女墳當壚猶是舊紅裙武丘東畔題詩處毎見花開便憶君息縣雜詩淮河東下古揚州桐栢山髙一望愁自笑濯纓三過早涓涓不斷是溪流二伏波城下草斑斑銅柱功名海上還若欲逺遊餐薏苡城南尚有濮公山三毛甡北走大河濵隣女三年尚盻臣不是故園相憶苦爲誰腸斷息夫人四溪山曲曲法堂開白日長從塔影廻曾與老僧溪上别清鐘送過石橋來五柴車到處苦流連官閣開時只晝眠愛殺風流夏少府長擕樽酒出花前六翫花臺在舊城西臺畔粧樓一徑迷爲憶故園長不語莫敎花外乳鴉啼與臨川王君褉飲有贈永和三月褉堂前看泛桃花年復年今日持盃翻記得王家内史在臨川題墨牡丹畵一枝初向洛橋分漠漠春山淡淡雲恰似漢宮新賜浴風前試着墨絲裙題畵有序周侍郎藏畵頁中有春林薄日前山雨來茅堂臨流䕶之修樊何人男婦筍輿油蓋次第散出題者疑爲冐雨問友之圖嗣題者笑之詎見擕妻問友朋矣逃林不深移家更往差相似耳然西滸古姜無須舁出楚鄉萊婦何爲雨中豈其翦蒿西墅課韭東田者耶村父拾明月三家識者環觀而佑此可莞顔耳擕家出郭翦蒿萊雲薄初看日影廻齊上筍輿山雨下午橋庄上晩歸來留淮西金使君郡樓三年晨夕聽伎多陽陵西巴之音有吳中舊部亦蕭散不整大雪晩宴江南新伎至觀之生憶因爲賦四絶句并雜歌侑時座客童煒尹坪韓肅皆有和詩朔雪髙吹懸瓠池郡堂留客夜彈絲分明身在江南路伍相祠前酒醒時二淮西雪夜酒筵紅太守風流過馬融看到舞闌樺燭下敎人思殺石蓮東三十載尋橦看未眞每聞吳語便傷神座中總是江東客何處還尋顧曲人四此首專贈伎童唐郎也順郎十四學琵琶十五新聲遍海涯家在九龍山下住生來洗面是桃花客中送陳無名入燕作相逢衣褐在淮西走馬關前日欲低此去一尋遼海雁何時同聽汝南鷄二寒風落日醉當壚燕市還尋舊酒徒君到安州若相憶爲予重寫慶卿圖喜遇俞汝言汝南官署是日微雪當湖對酒快論文十載相思看雁羣不道朔風吹雪後汝南官舍又逢君二籃車遠度蔚州山聞到靈丘觀射還欲贈青琅愁雨雪爲君西望雁門關三中原相遇朔風寒萬里同看隼影盤此處掃門煩長吏只因客臥有袁安四五闗木落露河秋雪裏逢君在蔡州莫怪陳蕃長入坐汝南太守最風流九日飲雲間朱司馬使君官署三首雲間司馬古朱家九日開樽罷晩衙只道茱茰堪解阨爲予縫就臂邉紗二維舟三泖度清秋古署黄花泛玉甌家在滄洲看不見何須更上郡東樓三落日東吳古郡臺登臨須借大夫才獨憐漢苑騎魚客也向秦山戲馬來飲泊石門贈同行王丞初度桃花如幔棗如缾莫向吳門問阿經載得餘杭山下酒與君同醉女陽亭書畵頁後千尺冰荷散似銀草堂習靜總無塵他年若買吳中室願在墻東作比隣山陽别沈秘書時各泪􅉡􅉡下不止後辱貽四詩中有云九日淮城悵别筵舳艫西送雁横天濁河浪捲臨岐泪濕盡征衫己四年予誦之愴然私顧所著衫猶是舊時因重爲搵泪賦詩自嘲匪云報章耳上苑秋高雁影寒帛書何幸寄長安今來衫袖重重濕不是當時泪未乾二一别淮城書漸稀故人相憶在金扉他鄉四換黄花節猶着山陽拭泪衣任屏臣七十裁廻甲子度春風又見園花嵗嵗紅幾欲移家歸海上還來避世在墻東二先生七十正懸弧長對青嵓舊畵圖恰似渭陽歸載早海鼇百尺掛珊瑚有伎童將歸過索予書絹抒筆志感渭城將唱不堪聞醉後還題白練裙懸瓠樓前雲漫漫石羊橋畔雨紛紛二三載行歌汝水春故鄉東望轉逡巡如何細草沾茵處又送桃花靧面人汝寜城外送伎童還江南并序伎童唐郎吳中有名安西潘將鎭紅水者奪之以行汝寜金使君爲贖留之蔣亭三月送還故鄉予恨沉淪與相似而猶不得歸似有感焉予初贈詩云家在九龍山下住生來洗面是桃花伎童得詩請名靧花至是使君憐其慧以慧憐字之予友張杉者尋予汝上聞其事似恨不及送亦有和詩見乎情詞彈遍琵琶九曲詞蔣亭東去雨如絲明年待我夫椒下應是江南花落時附韓聞西詩溪雪裏相逢曾幾時今朝别去栁垂絲何當夜月黄上重唱新翻白苧詞譚開子詩亭對酒重歌拂舞詞荆桃花下駐青絲春來怕見東栁况是亭前折栁時張南士和詩不若爲送别賦新詞東冶亭前折柳絲獨恨靧花人見風流思殺按歌時有贈偶向丹山採石英擕來長劍是星精他時海上桃花發看汝餐霞到赤城題周在浚記年圖不羡紅絲繡公子不羡黄金鑄大夫只羡淞江三尺絹冩作東吳年少圖二髙松百尺拂春雲濊濊泉聲石上聞豈合丹青圖嵗月祗應丘壑置夫君秦淮老人秦淮髙閣擬臨春中有仙翁髩似銀話到黃奴行樂處尚疑身是六朝人同朱曾蠡登燕子磯飲燕子磯頭江浪開江風萬里逐人來臨流一唱横江曲能使荆門水倒廻夜雨同朱曾蠡江寧郭宿逮明羅坤送酒資至石頭城邊夜泊舡清江夜雨不成眠只有羅坤解相憶平明送到酒酟錢簡江寧主考棘院重闗閉夕曛故人相隔在青雲但聞裴令膺知舉可有劉生試雜文何之杰以舟居記顔有贈菰蒲淺碧漾清秋一葉蒼茫水際浮不道滄江歸卧後依然擊檝在中流二何𦙍求爲棲遁身春江渺渺問前津須知此日揚㠶客仍是當時破浪人三新從解劍渡江天瀨上曾乗漁父舡何似故人雙槳去柳姑廟後浪亭邉即事有叙宿竇家濆賣漿婦連連目予問之曰非毛氏小郎乎曰何以知之曰妾故保定伯家婢也向屯西陵渡時主嘗饜郎郎不解食生炙鳬索胹淘之妾以笑被杖寜能忘乎予聞之憮然因就飲解槖中金餉之去伯籍北平毛氏同姓故嘗食其營大兵下江東全軍歸降爲提督京營標官守京城西門家遂散失婦善擘阮汾州人錦帳雙鬟貌似花河陽軍散各天涯可憐紅字三家店不賣青門五色𤓰别朱生開元法曲有誰傳秋雨江南罷採蓮淮水濁泥初凍後停船一别李龜年二桂樹叢生淮上秋西風髙會曲江樓水亭誰唱伊州調記得蘭陵朱粹修三寒風縵管脆如絲欲别歌予桂樹詞此去江南望江北淥波青草繫人思秋日登江樓有懷茫茫落日半銜山萬里江流徃復還獨上髙樓愁望逺秋風九月穆陵闗二大江東下日西馳渺渺江樓接海涯隔岸秋風吹不住白狼河北雁來時逄陳老蓮季子飲贈江上逄君蘆荻秋樽前落日重淹㽞狂來滿眼滄洲興思殺江東顧虎頭渡錢唐贈戴山人錢唐髙士剡中才日暮銜盃江上臺萬叠寒濤通夜白依然雪後見君來贈柳生有序栁敬亭説書人間者幾三十年逮入越老矣楊世功曰敬亭將行不得大可詩且不得一會祖道似恨然者予時病彊起將從之汗接下不果可往敬亭書至云如相會者早間世功言及相會惜言相會祗此是時寓沈康臣宅發緘皆笑後二日敬亭止梅市予與康臣遂赴焉再說書聆之感于心然實病不能賦詩也口吟二絶以贈行扶病來看柳敬亭秋花開滿石榴屛一聲河滿尋常曲説到傷情不忍聽二枚生未作梁園賦吳客將行越水濵怪底觀濤能解病原來君是廣陵人晩宿江村即事行行暝色起江沙借宿江村野老家夜月炤來東隴樹秋風吹發上田花二村田漠漠晩烟稀野老提壺坐釣磯日落牛羊從嶺下月明烏鵲傍江飛伯調將西行疑予留妓飲不爲供餞馳詩劇謿因妄爲答謿焉史妠盧姬並有名髙秋野寺坐彈箏一從掩袂辭巴里不復當筵唱渭城黄河客舍見故人書名壁上黄河滚滚向東廻下馬重衘客舍杯忽見新題雙淚落未知故友幾時來二寒燈孤館淚潺潺萬里波濤夜自還上馬欲行還又住故人名字在墻間九日示趙八十四弟楚王宫外菊初生九日衘杯淚欲傾君去登髙須盡醉愁君東望永興城古决絶詞有序古决絶詞者毛甡爲朱三作也三爲巴城妓小小所暱忽正白旗他使者購小行小通三不得㑹大霪雨江漲流溢從漲江解舟滔滔去斂小帛囊貯錢一枚燈心草一枝箸寸許線一條作十許結屬他妓送者貽三且曰他日當哭我江流間矣三傷之因爲作此詞時同游者六人有和焉銀瓶挽斷井中絲嫋嫋曾無决絶時只有巴山城下水滔滔東去最堪思二巴山城下送娘船夜雨猶彈蜀國絃不道曲終歌决絶新來翻入綠珠篇華葢山清江百里繞仙闗華葢山頭村賽還橘樹蕉花天半路洞簫吹出暮雲間送客送客春城柳漸低千條萬縷市亭西從今勿折長條贈恐有歸人繋馬蹄雨後觀牡丹即席和愚山韻春燈幕府夜漫漫細雨清樽傍藥欄莫道名花容易見十年三度客中看漢苑行綵燕初翻百子池宫花齊發萬年枝但知上苑寒歸早不道人間春到遲二秋風歌罷栢梁材上苑春回承露臺朝來殿使探鶯去日暮宮官試馬來寺館夜看龔中丞香嚴齋詩集臨江孤館寺堂東蓮闔花闗閉晩風祗爲中丞詩句在東堂燈火夜深紅聞沈九北闈捷音聞道金臺收乗黄故人聨轡驟康莊秋風十里長楊道中有山隂舊沈郎二清秋烏鵲度巴陵上國賢書今又升聞道舊人推記室已將新體用吳興雨中送沈築巖還姑山春帆東下雨潺潺千里江南送客還此去應逢寒食後杜鵑花發到姑山西河集巻一百四十
