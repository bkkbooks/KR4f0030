body:
  text: 西河集巻九十八翰林院檢討毛竒齡撰墓誌銘八敕封邑大夫劉侯德配葛孺人墓誌銘邑大夫劉侯將之官别予京師詢邑中利害事惟審且言先王父曾以尚書郎𣙜使北新浙舊游地也太孺人扶侍久將賦東征而孺人之御潘輿者鬻簪鐻以從惟恐水程日不給不受餞去既而鄉胥來京稱大夫到官帡車者以道􅂒殞于官舍則孺人也邑之德大夫者徒跣而將事其子婦裂帛且接踵至予私為拊額以為大夫裁下車即己感人若此越三年予請急歸而孺人帷輁還廣川又一年將殯于舊宫之傍而誌以石予惟上古首婦教房中鼓瑟毎播之邦國西京以還尚有述閨中遺跡申以頌詞如劉更生父子者故東京毋儀獨冠前代而國史亦遂起例作傅傳列女布之藉氏何則隂治者陽治之佐必曰内言不使出徒拘語也今則宫闈乏女史前代后妃既眇無賸懿而稽之民間節孝終歳所上自成𢎞以前尚載實錄而既則列氏焉耳又既則氏且不列但曰某歳所上合若干焉耳而于是閨中之跡即名氏且不得傳况其他矣今孺人顯德既以彰彰即微屬猶將誦之而大夫不以予不文屬使書石予何敢辭獨是大夫所為狀情文甚備略不能損加于其際徒飾靡言無所用猶憶大夫自言曰予之不能巳于孺人者無他孺人以名家息女來為嗣室先之者曹孺人也曹孺人以名家子婉娩有則而孺人繼之相形之際每易軒輊且曹孺人巳有子及晬而孺人哺乳以息女而婦而母迄于今孺人舉子三合得四子而家之人不知孺人之非曹孺人也曹孺人之子不知巳非孺人子也孺人本弱質首不勝鬀乃甫殯而遭先王父觀察公喪邑祉車乘經紀走趨者塡衢巷加之四方㑹弔日饟食贈珮無暇而儒人身承之至先大夫内翰公相繼喪葬自元頳呼復以迄絙窆一切苫草中所不能顧者悉責之孺人孺人哀毁之餘持簿算典管鑰出内伺倥偬稍間猶必日三詣慈闈慰問無恙往往升枌榆脂膏跪起佐餕使尊章在堂必忘其偯慼而後以巳也乃水陸扶伺間關數千里一如太孺人之扶侍吾太恭人者而盡瘁以死哀哉當孺人病時値大夫行車至鄞去縣四百里而遥家人謀追還孺人急止之曰公家事未了何有婦病且徒亂人意無益所不能即瞑者以未獲終事吾太孺人耳其明于大體如此狀有曰孺人授室後善典家政雖室老歴練皆遜出孺人下一切組紃修洗晨昏寒暖能先志承意佐大夫所不逮處妯娌若姊姒教子女以禮御下寛嚴不相過無少長咸愜愜滿願去其事大夫能順正不妒如是可以佐外治矣孺人以康熈二十二年閏月十三日卒距生順治十三年六月二十三日得年二十有八子四長宜振曹孺人所出也次麟振又次儒振又次名振皆孺人出而曹孺人所出者聘户部員外郎李公諱孔嘉姪湖廣衡州府通判諱廷亮女孺人所出則長者聘内府中書科中書蘇公諱俊女次聘候選同知申公諱元翰女餘幼未聘女一孺人出則許字提督浙江通省學政按察司僉事張公諱衡之子拔貢生諱澧子系曰孺人氏葛直𨽻景州望族庚午科舉人拔苑公諱上林女孫也父本初公諱潔以廪生早世拔苑公憐女孫之孤大為治奩具而孺人却之其言婉而正見狀中乃為詞曰猗矣梱德堪君子齊不厭華燭為之嗣曦方衛叔寳遺冰清姿山簡雖傲重為妻之乃者持介屏飾以造鹿車來歸有似桓鮑獨憐少姱頓責慈母結綳翦髦不異哺乳以是條發四衢一柎彼繩繩者惟君子女况兼明哲相夫有光尹姞而降斯為令望既閑洗腆爰修烝嘗不止饋祀勩于喪葬所幸君子為百里后佐之陰教比諸室友先人舊游有丹陽桞大家東征用是以賦何期扶侍脫簪鬻鐻舟車間關筋力以罷下車之雨甫霑其旂四境裂帛如喪厥妣君子清節斯世罕希然而偯者必歸中治代乏彤史内德不紀煌煌懿行曷敢或遺頃還輁軸于廣川涘佳城鬱鬱有椐有杞爰為闢之磏石載事金缸熒熒銅椀泚泚其石可泐其德不劘徐徴君墓誌銘君諱芳聲字徽之天啓丁夘與父晉台公諱明徴者同時舉鄉試主者斥君取晉台公巻為書經冠晉台公曰吾冠一經無所媿所特媿者吾兒耳當是時君甫弱冠自學使君下凡大小試必苐一四方人至蕭山無遠近必挾刺至君門其投刺必先君然後及君父與弟而蕭山人偶出境有問名者自君外無他及太倉張溥集天下有名士為一社至東浙每不愜巳而得君名大喜指示衆曰此蕭山徐徽之也長洲揚廷樞金壇周鐘嘗選天下社文不得君文不敢選松江陳子龍為郡推官將入境即以札授君邀一相見其他仕紹者如無錫王孫蘭宜興蔣星煒華亭錢世貴金壇周銓皆造請每見忘主客禮且亦不辨其宧此土也君每出市市中人聚觀嘖嘖偶與人語聽者皆屏息耳可察蚉䖟聲顧君語不輕出出必中倫脊有條有窽既巳㑹古今切理絡乃從容抑揚而出之巨如挺洪鐘而細若抽繭有叩必應無跲躓無嘷嗄咽嗢環而聽等之觀塲惟恐其盡同時出門者鮮與偕即偕亦鮮與肩併歩履卓犖顧盻端且肅所過處人各自視若形穢惟同里翁德洪才地頗相似而儀䫉略等每與行人謂之雙璧即君亦惟與徳洪親好與之行山隂劉先生講學得君兄弟喜曰吾見二程矣其同時學人首推張鼇黄宗羲及君兄弟而四顧蕺山之學合婺源姚江不名一氏而君與君弟則專主朱氏守朱氏章句不輟崇禎十七年闖賊䧟京師君帥諸同學哭孔氏廟三日既而隱潘山稱潘山野人闔土室不預世事遇親朋死喪輒出弔慶則否嘗曰讀書貴有用痛巳具經濟才不之試當以言嬗後因著兵農禮樂諸有用書而尤詳于兵嘗輯兵書數十巻自運籌指顧以及制械造器開屯設竈諸所有無不簡覈以闢從前之虚言兵者嘉興徐仲威鄉試赴三塲慮策及兵事夢關忠義謂之曰蕭山徐生善言兵爾盍師之醒而矍然以為蕭山徐生向于講次曽見之此朱子儒也未聞其知兵也及至蕭山見君與言兵大驚向所見者君弟耳因述忠義語請師君君亦以忠義語有感授之盡他人雖勤請勿授也君初與翁德洪蔡仲光何之杰張杉友善及德洪以義死同邑毛甡周晉民每過君君善之作忘年交甡善音律嘗就君講五音七始九聲十二律之學歴十晝夜大有契既後甡受聘應制科君留甡不得乃為文一篇授甡寓切劘之意甡佩之至都都人士問君者踵至嘗謁益都相公于私宅之後堂升階見左廂朱扉大書蕭山徐芳聲字徽之蔡仲光字子伯十四字于扉中㑹天子恢復西南疆大赦詔徴天下山林隱逸之士侍讀湯斌侍講施閠章各以君名薦之益都相公益都相公將上之適部頒舉例當由外入責之郡縣官蕭山知縣姚文熊益都相公所取士也公特發書幣遣文熊親造請到門而君與仲光竝却之乃巳既而君卒君高祖母李氏節婦也巳建坊旌門名所居里曰貞節里君臨訣嘆曰吾得卒于貞節里幸矣時康熈二十六年七月三十日享年八十有四以是年八月十九日𦵏于湘湖之井山隖㑹毛甡歸里君二子請誌墓不敢辭君娶陳氏繼顧氏皆無子最後納側室高氏朱氏生三子高所出者長安仁娶蔡氏太學生紹榮君女次利仁娶陳氏本學生員景文君女又次志仁係朱出未聘女三長適候選布政司經歴呉任聖陳出次適仁和學生員何任炎即伯興季子次適山陰太學生金㸁高出銘曰君志在百世名在四海而殁而藏于一抔大之經術小之文字俱未之試而奄然于故丘後之人多下馬酹酒者而吾獨掛劒而為之泪流曰此貞節里中人也而他又何求呉文學暨烈婦戴氏合𦵏墓誌銘呉與戴望族而為婚姻呉氏有子四歳讀通鑑括錄數過成誦五歳能論列代史興亡治忽并人物臧否七歳通詩書易春秋左氏傳國䇿史記漢書及諸子之名者八歳習舉文九歳應試家人抱納之辰授題已即繳卷提學使憐其幼曰是能勝衣巾乎待之次年再試文益工遂補錢塘學生員當是時呉氏子聲藉甚目為聖童且曰此非天所錫不至此因名錫字天與而比隣戴氏女十歳矣父死女哭泣過哀幾失明鄉中人以孝女呼之曰孝女不當為聖童配耶因聘焉十六歳合􅈟十七歳病先是天與十五歳試于鄉以斥落憤􅀢倣李賀送沈亞之下第詩以見志至是年十八偕其弟鑰同赴甲子秋鄉試天與既自負弟亦年少相繼起以為必得乃竝就斥落則益憤吟孟郊再下第詩一夕九起嗟句曰吾何用起矣晝負枕臥書空百餘字或强飲醇酒不自適慷慨既而屏舉文鍵其户出所讀漢魏古文賦兀坐矻矻又所居山齋過寂僻朝暮林莽多草木蒿弇之氣浸滛薄蝕遂致病越三年病劇死當天與病時戴侍湯藥不税衣賣所飾珥環祈佛禮斗籙冀以少濟知不治請死天與前天與曰吾未死而汝先死以待之是以死促我也戴泣而止至是天與將屬纊呼弟鑰曰吾察汝嫂將必死我死囑家人伺之脫必不可奪則聽之耳天與死戴果泣不止以首觸柩碎首血被靣家人環伺之絞以巾刺以裙刀凡求死者七最後仰金不得死母慰之曰兒素以孝稱今母在兒死何也曰兒在家死父今死夫命也兒不孝兒不能復事母矣乃宻壞玻璃乳缾吞其亷斷腸嘔碧血數升死距天與死時凡四十二日今喪家所稱六七辰者鄉人趙佩等五十八人與杭州府仁和錢塘二縣三學生員王大成等四十五人齊詣府縣公掲舉烈婦府縣以其掲上之督撫及提學諸使督撫提學諸使復下之布按及府縣取給并事實題旌建坊而以呉戴籍新安由世業鹽筴來杭杭之商籍自新安者合紳士楊大生等一百人復舉之廵鹽御史咨請㑹題而先給榜額懸其門且捐金辧物親為文祭于柩堂其親黨同籍復合錢搆祠于西湖葛洪嶺之陽而以次年己巳四月四日卜葬于祠側使來請銘予聞自昔言婦道者曰從一而終又曰一與之齊終身不改然亦言從一言不改巳耳未聞其以死也即或不得巳有奪之有侵且辱之則必矢死以明其靡他然亦矢志則然或不必即死即死亦先示以死或戳鼻或􅋇靣或斷臂割髮不必其竟死也乃未嘗奪之而矢死矢死而必于死且必于竟死無乃太過然而自陶唐以後趙宋以前凡忠臣孝子弟弟信友往往為非常之行過情之舉以徑行其志進無所顧退無所忌無一不與烈婦之所為相為合符夷之遵父伊之見祖王子之致身泰伯虞仲之讓弟左桃羊角哀之死友皆是也自不偏之說起審身度物動多絜量左顧右盻惟恐或過于是以伯竒為從親豫讓為任俠霍子孟為不學田叔都鄧攸為畸行郅君章荀巨伯為輕于殉友以致忠孝亷節舉足有礙雖以二宋之慘烈君亡國破而講學之徒無一人為之死者幸而其說不及于閨中耳予少入鄉學學師說孝行埋兒刻母不一而足初聞之惕然既而慨然又既而中心怦怦以為世固有至行如是者吾何為不然歸而述其語遍告家人至有語及而頥㦸言未畢而淚巳傾者而先教諭兄講學日久聞予言而惡之謂少年誤學是非正行不足道埋兒斷嗣出妻傷恩刻木虐隣臥冰毁性凡有一于此即為不孝而况從彚之不觀有明之功令乎傷生滅性剜體廬墓得加以罪而子方奉為至行過矣予聞之爽然而失隤然而自廢迄于今五十餘年卒不得為孝子為弟弟者一言之誤也觀烈婦所為可以返已天與以康熈二十七年二月十三日卒而烈婦即以是年三月二十四日殉之皆享年二十有二天與之父孚中君嘗謂人曰烈婦十六歳而歸吾子二十二死吾樂有子者十六年其樂有子婦裁六年耳乃吾子以二月死而烈婦之死以三月三月以前吾痛吾子三月以後吾痛吾媳是吾痛子祗一月而痛烈婦者且終身也又曰烈婦每求死則每救之然而多一救則多一苦至苦極而罔救矣哀哉乃合為銘銘曰初謂孝女可配聖童詎意修文之婦而竟以烈終其生同歳其死時又同今又同穴曰惟一之從葛山之麓西泠之東中有塜焉樹之以梓桐惟鴛鴦栖之以雌以雄其朝夕相隨翺翔乎西東者或分而合或違而從所不可分違者惟塜中駱明府倪孺人合葬墓誌銘君駱姓諱復旦字叔夏山陰人義烏駱賓王後也九歳能文里師疑其偽面試之題曰因不失其親君開比謂論交者不爭一日而爭百年答比則又謂論交者不爭百年而仍爭一日時大竒之順治四年府縣牒諸生不肯赴督學試者君名在牒中出試取第一㑹明年南郊禮成奉太祖高皇帝配祀覃恩敕府縣各拔貢一名督學以君應辛卯廷試取上上巻授推官君遽歸不受甲午新例改知縣己未赴都世祖章皇帝復命試身言書判且分州縣為上中下凡兩事入一等者授大縣君四事俱一等上悅引見太和殿賜茶賜宴賜𤓰立授陜西三原縣知縣三原本繁劇而君以安靜治之貧苦不取民一錢日與薦紳諸生為文字交講道論德而諸務畢理直指嘉其能薦第一令兼攝涇陽藍田諸縣當是時君有太夫人孀居生君甫五月而孤寢荼茹蘖若干年思以藉升斗稍裕晨夕而其食貧者如故也君每入長跽觳悚伺太夫人意太夫人意安之嘗曰有子為清白吏足矣以故君在署與家居時無以異㑹三原有奪水利者君峻却其賂不聽奪而巡撫反之謂奪之是并奪縣印覆帖後廵按以聞上乃逮撫并及君部讞坐撫罪與君無涉然終以君受脅故革職先是君被逮三原民遮留不得爭進米肉奉養太夫人于署而涇陽藍田佐之至是君還將奉太夫人南歸而太夫人以病死太守胡君倡同官治裝各捐俸而三原涇陽藍田三縣民設缿于五達任寡多投錢合三百萬以餉君君取三之一為輦櫝具就道而三縣民復負戴牽引送君出潼關返康熈二年君服闋太宰孫君疏君寃請還君官政府初難之既而察君果無罪議復職補江西崇仁縣知縣君至招羣盜散之務與民休息一切詞訟不為理獨募修城郭創復縣治堂并官廨書院與邑之亭障橋道有關繋者巡撫董君薦苐一値撫州新知府至議増解餫費每兩五分先置酒壽諸邑諸邑唯唯惟君持不可中酒出遂以逋賦䧟君獄八年己酉遇恩詔赦免獨其所逋賦出君獄三日責令償君自顧無一錢請再入獄而民爭輸金五日報完當是時民以赦君故相慶各貰酒飲酤每觔増値錢一文人謂之駱公酒云十七年上開制科副使許君以君薦廵撫巳彚疏將入奏而君力辭之越七年卒君生而俊挺儀狀卓犖目光如流星每顧盻輒閃閃動左右語言歴落善辨縱譚古今事聽者辟易每讌㑹遥見君至軒軒如㑹稽王來爭避席踧踖當牢愁閴寂時與君對輒如十百人充閭氣頓熱爞爞然所謂一人隱數人者顧性忼慨喜友朋少讀李膺郭㤗傳即慕效自喜越中當順治初年好為文社每㑹集八縣合百餘人鐘鼔絲竹君必為領䄂進退人物人物亦聽其進退不之難嘗同㑹稽姜承烈徐允定蕭山毛甡赴十郡大社連舟數百艘集于嘉興之南湖太倉呉偉業長洲宋德宜實頴呉縣沈世奕彭瓏尤侗華亭徐致遠呉江計東宜興黄永鄒祗謨無錫顧宸崑山徐乾學嘉興朱茂晭彞尊嘉善曹爾堪德清章金牧金范杭州陸圻爭于稠人中覓叔夜既得叔夜則環而拜之越三日乃歃血定交去配倪氏封孺人婉娩相助為理方君知崇仁時有老舉人逋賦粥其孫以償孺人聞之惻然請出巳釵鈿代償其逋及君罹于理孺人慮不測則太夫人苦節將終不得聞急遣僕遍告君執友并門生之巳仕者掲之兩大中丞范君特疏題請奉俞㫖給銀建坊其中申請反駁諸費皆孺人貸親友償之君不知也生平好佛自奉儉茹素苐積所有餘行施捨事至于君結客門外屨滿則太夫人與孺人皆能莝薦截髮以成之可謂賢巳君生于天啟壬戌卒于康熈乙丑享年六十四孺人少君一歳而先君死生于癸亥卒于庚申享年五十八男二長彦驤邑廪生娶詹事府少詹事禮部右侍郎印趨丁公孫女户部主事伯弦公女次彦驄國子生娶庚子科舉人候選知縣子御王公女女一適湖廣湘陰縣知縣栩巖史公子國子生璣皆孺人出孫男一士濙彦驄出君長于詩文所著有溪山别業詩集山雨樓集駱叔夜詩集其詩朗雋落筆有才氣博大而卓犖越中為詩者未有及也初予與君同被薦而予獨赴京聞孺人之死馳弔之既而君以遊山東便道來京予與之盤桓且賦詩送之暨予請急歸而君巳死越二年二子驤驄將合塟君與孺人于故阡之傍來請銘予何忍不銘銘曰以君之才得主知而不為世知以君之治兩見之劇邑而不能竟其施君之性情在友朋而交遊結納遍于海涯君之學問偶形之文字而謳吟詠嘆為之而不盡其詞所可恃者涇河之碣㶚滻之石與汝水之碑雖復琴臺寂寂其合祔者猶得曰民之父母于斯唱隨誰謂亷吏可為也而不可為吏部進士候補内閣中書王君墓誌銘君以康熈己酉舉于鄉庚戌成進士是年即考授内閣中書舎人不即補歸而家居越二十年死死時其子壇以西山之麓君嘗徘徊焉顧而樂之將以其地為瑕丘而以予密友知君恐一旦還京朝不能待誰則能傳君者因再拜涕泣請予為銘予思君舉鄉時君之子壇同入試人疑壇中式而不疑為君暨壇以辛酉副榜貢于廷領八旂教習者三年考授縣職今其歸又四年所矣君尚以吏部進士棲遲家庭間不少動其澹于仕宦如此前此予在京値王師平滇黔西南再闢朝廷受其俘獻之九廟頒赦于天安門外凡覃思所及中外見任官均有貤錫即未任者許援例納粟請誥敕而君以例請予難之曰君仕自有在何難延一命需之異日而遽出于此君堅請不輟當是時君葢自分以家居老矣然又恐失時不為將過此以往不再遇稽先人贈典不孝雖後悔亦何及因汲汲于此乃既膺錫命而即以鄉人之請捧牒迎贈君尸木祠諸黌宫使春秋有司例享之以上躋于邦賢之列抑何豫與君賦性遲重深醇簡愼言詞不妄發不為巳甚毋務為新竒可喜之行初若悶閟焉無所短長而既而思之未嘗先人然爭先者無以過雖重緩究未嘗以重緩敗事凡機事之來必鎭定有先見從容暇豫初若無可恃人卒以此恃之顧尤惇倫類族饒仕宦一門郡從多以意氣相矜高君處之泊然嘗以立家廟鳩工庇材君力任其事自始至終雖盡瘁不以巳遇邑有大事水旱修築君素不欲先人者獨挺身先之其教子弟以身授不動容色慈逾于嚴而子弟之速化者纍纍生徒負笈如坐春風中善飲顧不喜豪飲每飲少年任氣者舉觶揚斗翻缾罋讙噪霑灑狼籍君未嘗不飲飲不三五啐不釂釂而繼進不三五謝不受受不三五舉不及脣及他人以醉去或欹或側而君從容踞席飲未艾也君生平以文章名少與予同硯游于先教諭之門先教諭每課文日三義見燭収其文擇其不完者黜之預儲從人之給寫者而寫其完文以進緘名坐中庭㸃閲閲竟甲乙之錄簿然後遣都講開緘而第其有名者于是榜于庭鱗次給筆札受奬若大試然當是時惟君多第甲不乙孝亷韓君者次之若任君廷尉則甲乙半予則乙九而甲一及赴試而君果以第一為諸生餼于庠每歳類必高等嘗謂詩文不一規而少學之人隨時轉圜初奉唐明為指歸而既而厭之于是有創為宋元之學者舉凡宋元之喭形穢貌噭嘷不堪者而反襲之為金科全失三百以來温柔敦厚之㫖因選漢魏六季而唐而宋而元而明諸詩取其可法者彚錄之共四十巻名古今詩統復集諸古文將比其例為文統不就卒時康熈二十七年十一月十二日距生萬厯四十六年十二月八日享年七十有一以康熈二十年覃恩敇授文林郎内閣中書舍人娶蔡氏處士敬雲公女敇贈孺人生一子即壇也繼娶來氏前福建布政司使馬湖公孫女敇封孺人生四子曰圻曰埴曰垣曰垍壇以副榜貢生正藍旗教習考授知縣娶蔡氏庠生大敬公女君與大敬為密友大敬死君為經紀其喪事與都尉趙君檢討毛君請之督學使迎其主入鄉賢祠繼娶丁氏見任廣西南寧府經厯亮生公女圻庠生聘蔡氏候選州同德輝公女埴聘夏氏前吉水知縣梅梁公孫女庠生寅公公女垣聘呉氏候選布政司經歴以重公孫女廪生仲榮公女垍未聘女二俱來出長許字廪生征吉呉公子次未許字孫二長仲旦次仲華未聘女孫四長許字陜西鳯翔府知府起莘丁公曽孫庠生天叙公子次許字太學生公恊傅公子次許字庠生廣榮陸公子次未許字俱壇出乃為系曰君諱先吉字枚臣别字毅菴王其姓也因為之銘其詞曰江東舊閥首推烏衣况嬗駿譽青箱是期誰謂蓬轄沙行需遲安徐靜重乃德之基所惜晩逹緩于從時衣沾豹霧書留鳳池有經可授有文可貽孝友婣睦鄉評庻幾彼丹文者千秋之碑只憐椷書用乙者辭西河集卷九十八
