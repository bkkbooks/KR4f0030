body:
  text: 西河集巻一百六十九翰林院檢討毛竒齡撰五言律詩二趙司馬任長沙久擅矕龍譽新逄展驥秋驅車遵嶽麓司馬重潭州青橘湖邊酒黄陵廟下舟湘南十萬户乍見一星留題黎城令去思畫像同韻像坐石手持一杯驅虎曾留治棲鸞舊有名彈琴懐趙亮畫像對方平坐隱壺闗石杯銜潞水清披圖遺老在誰不認黎城贈移居一牖長開甕雙輪且載書陶潛方卜宅晏子又移居野隧通流細隣牆鑿照虚東西花外路何處少來車二在昔傳遷教于今識處仁到門無雜客是巷有居人藥竈分精饌花堦當繡茵清談饒徃復張鏡在東隣樓雨作石榴賦答友見訊依韻顔淵嘗負郭王粲已登樓君自歌山木吾方賦石榴烟霏林外動雨氣檻邊浮不道游梁返從君又唱酬送孟逺之京梅雨大江平朱花驛路明三年溟海客五月永興城白紵留歡曲黄金市駿名舊京屠狗在到處有逢迎何紫翔女弟子彈琴請賦纎手落珠盤躊躇軫未安停絃分黛巧拂指墮釵寒月露低紅幕春波瀉紫瀾龍唇和鳯足都作錦心看月不道他鄉月今宵偏倍明大江通夜落高閣近天清暝樹千重遠人烟一望平鄉闗看漸渺愁聴暮鴻鳴游俠曲三首結客平陵去從軍灞滻游黄金懸代馬紫艾飾吳鉤睥睨傾三輔縱横過五侯揮鞭何處宿西北有高樓二白羽闗弓勁青芻飫馬肥名成排難久恩在報仇稀花氣風吹鋏珠光日照衣長懸三尺組願取右賢歸三劇孟原多義劉生未是狂徵歌輕百萬縱博便千塲醉狎平原客書平大夏王從游新子弟半在鬬雞坊少年行久宿金張第新隨趙李車銀鞍珠騕褭寳帶玉蟾蜍翠羽遮蘇彈鮮花插妓裾平明馳委巷只為問専諸二六郡齊推轂三河舊擅塲傳家中衛尉拜爵羽林郎紫燕穿雲疾青骹掣露長東隣碧玉好休嫁汝南王才子車騎梁園貴風流鄴下推鴻名驚海立藻語掞天來漢賦黄金重江花綵夢迴傾城爭慕悅幽思滿琴臺麗人絶代曾聞唱専房舊有名春雲花底豔朝日鏡中生金屋憐藏慣銖衣愧織成生來懊惱性不解茂陵情二十五盧家婦千金秦氏娃尚衣歸玉輦修幔繞銅街獨繭分眉縷雙龍入鬂釵高唐新霽後雲散滿天涯徵說曰街或作堦誤沈約賦銅街麗人和張纘孫慕曾吳百朋馬駿程淞於倪之煌草堂宴韻得秋字曲院薪槃合清樽花榭幽淮南叢桂晩天上白榆秋對酒逢三益分鯖過五侯射陽新月影看入玉杯流賦得秋字贈倪之煌知爾能千古思君歴九秋相逢公路浦猶着子陵裘凉月浮洪澤寒風動楚州千金亭下過尚擬飯韓侯碧玉碧玉南園裏春光事事新緋花嬌映面黄蝶小隨人露重滋裙繡風生約領巾三朝并五日何處少良辰同客飲歸金鑰下嚴城官街一望平客難騎馬去月似逐人行花犬驕還吹桐烏棲欲驚樓頭有紅燭為汝一相迎飲程淶進士久念瀛臺客忻逢淮水頭花間開露席醉裏解霜鉤譽重三都賦風高百尺樓寒城刁斗靜長憶漢通侯贈程淞淮水下甘城東游遇少程文章遺世俗意氣重平生結縞傾湖海閒門繚杜蘅承明獻賦客尚自愧難兄二十載思君久三秋遇汝來論文枚叔里把酒伯倫臺紫鷂横沙起黄花繞砌開蘆中有窮士相見莫相猜張新標吏部初度曉日啓曈曨金樽琥珀融嵩生懷甫相人望屬山公顥氣當闗紫秋􅆶渡海紅内庭饒部伎幽興滿絲桐二繫紱開華屋縣弧就綺筵鳯毛飛綵袖雁足踏冰絃淮水長流地張星本在天漢庭尊弊吏一倍惜君年飲黄園過宿馬西樵聴山草堂雨夕名園飲隨君宿草堂暗星流地濕夜水到門凉熖影牀頭短交情夢後長曉來湖口望烟霧正蒼茫二地僻烏啼早林深日上遲竹垂猶帶雨花煖漸飛絲曙色當虛牖朝烟散逺陂東湖頻放棹不敢忘前期贈王孫晉四首汝本佳公子英年擅妙才賦成天漢繞筆落海濤迴蕭寺停花駠蓮堂共酒桮凉秋叢桂裏藉汝一徘徊二斯世難為偶伊人可樂群文章傳有日意氣看如雲孤榻憐秋晩登臺感夕曛年來抒史傳只記信陵君三大雅將誰屬名材有是家揮斤逢郢士鼓瑟戀瓠巴良宴千秋賦寒城九月花登高雲閣後吾欲上君槎西河有雲起閣登高詩并序見七律巻四家世錢王裔移來隋苑人三秋登北固二十度南閩譽起推黄絹文傳對白麟天涯漂泊裏念汝早風塵家人隨行者歸待海陵續寄送汝還江滸浮家泊海涯榴開憐晝永草短恨春遲淥浦停雙槳青衫綴五絲渡頭休錯聴喚買豆娘兒嘉模曰前詩云渡頭喚買豆娘子正是我來江上時故有落句見七古巻蔡子搆有代答詩憇一漚亭漲水浮千頃寒亭對一漚近城朝雨暗孤榻暝烟流碧樹横前檻朱花蔽逺洲湖南饒古寺鐘磬日悠悠懷鳬亭答寄久客思家切懷人惜會孤幾番迴北轍只是戀東湖逼牖生雲莽閒亭狎野鳬從來乘興事多半在菰蘆蔡爾趾劉漢中黄世貴舒章倪之煌童衍戴金舒起鳯集一漚亭和爾趾曲渚環幽榭臨流近野航樽前雲鶴舞城上草花香水漲分隄帶歌清繞竹房今朝良讌㑹能慰客愁長集閻修齡若璩父子即席東第邀群彦西園集酒徒清缸開玉露畫槳待珠湖角綺梁王賦烹鮮陸氏厨謳吟相間發不忍聴驪駒嘉模曰珠湖即東湖時查伊璜同赴飲嘗曰即事可念者莫如畫槳待珠湖五字二白帢聨深幛黄花插近筵賔朋王謝貴父子庾徐賢水調翻銀管冰漿瀉玉船淮南秋色遠對酒正蒼然施男所著名卭竹杖賜教却賦都嶠蒼梧使卭山博望枝荒經徼外得新語槖中遺碧楮繙銅鼓紅藤緘石脂東觀饒祕笈惟有長卿知施長卿石渠講易寄呈伯兄六十初度時余滯淮困甚猶知歲游來倍念兄違時驚甲子徹夜望長庚故國雙樽啟清天一雁鳴淮南叢桂樹長是傍霜榮二好學曾觀國流年竟杖鄉俟兒生繞􅂰有弟去他方天日經秋烈淮流到海長只憐三載客不寄一清觴書楊方孝亷巻子因贈長泝臨淮水非闗羨釣魚願從伯起學最愛子雲居擲麈譚名理揮毫寫道書交游湖海士為汝久停車過桃源作栁色驚春至桃源傍晩過茫茫垂白日滚滚見黄河野戍迴鴻雁飛塵暗馬駝當壚多美醞不醉奈愁何將渡湖寄戴金蔡爾趾劉漢中黄世貴倪之煌舒章王宏昌劉琯藉爾為兄弟渾忘在客塗對花長共飲得草自相呼晩歲慚鉤黨春山别釣徒荒雞重問渡涕泗滿前湖宿州道中逺樹低天碧春烟着地生乞漿林下意折栁路傍情聯轡追徒語迴鞭惜馬行輕風吹短裌看過鄼陽城春店春店荒雞早寒闗曉度遲一竿看日上百里任風吹野火燒禾秅村烟掛栁絲巾車徒邂逅南北總無期旭日旭日鋪平楚春冰瀉曲河東來趨早集南去近朝歌鄉窖同炊黍烽臺久荷戈登高逢令節竟向客中過日日日日見日出朝朝行暮春鳥啼懷故國馬首戀鄉人旅唱吹山莞亭餐供野芹魚臺空渺渺無地可垂綸和黄二翰過訪寓亭原韻羈客空亭靜憐君捨棹過大都清興合只覺野雲多菰草浮紅寺萱花映綠波開軒相送晩暝色上林柯自梁歸道淮和黄二之翰辱慰原韻梁苑清樽在曾從司馬游淮南歸棹近復為故人留招隱青山暮懷君桂樹秋流離多誕節誰與賦旄丘王生索甡贈字攬勝時求友逢君喜得朋鴻文垂皎日白帢耀層冰慷慨追文度風流薄茂𢎞芳名千載事誰不鍚嘉稱毛甡懐歸適陳二給諫賦梅桞度江春詩屬筆寫情兼寄江南舊游諸公臘盡流澌動春還淑氣妍風花籠草樹愁思滿平川梁苑收殘雪隋堤拂曙烟江南與江北相望各凄然二羈旅蕭條候芳華次第開春光何處度梅桞日佳哉風景他鄉暮烟花故國催芒芒江口望應有賦歸來調執隨并序三原杜蒼舒攜僮執隨游山隂駱明府叔夜館之宴溪山别業酒酣各起口占調執隨詩約先成得飲執隨乃下拜捧酒為壽焉高館醉春風相逢明下童燈前驚越豔花底見秦宫濕葛裁衣白含桃漬齒紅越人歌未了愁殺杜陵東嘉模曰李賀黄頭郎詩石雲濕黄葛濕葛本此歌不作吟越人歌見說苑種葛篇種葛逾前坂生蒲滿上津日高懸馬的波細蹙魚鱗啼鵙生名趙栖烏家姓秦青溪逄小妺不是秣陵人逄吳廷楨白下最念延陵裔相逄白下橋懷人貽綠綺久客在烏聊吳女壚邊酒秦淮雨後潮獨憐長乞食吹笛不須邀曠野曠野猶行役荒城減送迎向風人語咽映日馬蹄横同父皆蒙難依人敢敗名短亭青草發相顧若為情發滁州度闗山嶺秋杪方回轍冬寒又在塗日斜融凍草夜起剉霜芻紫罽新車幔烏衣舊酒壚闗山千里道一望總荒蕪二下蔡趨程緩南滁就道閒宵燈停館舍曉月度闗山林裏回車斾沙頭聴馬鐶依人方未逹嵗暮敢言還清流闗謁闗將軍祠夫子汾川秀風流世所師闗山縈峻嶺燈火照神祠集木鵶飛後垂堂虎卧時同為亡命客下馬一相思陸雲士曰啞啞飛鳴翔而後集見答操書又當時稱將軍為虎臣五六是借境作㸃注法闗山即清流闗非姓江上答許君未築吳中室還為江介逰紅檣浮永夕白苧發清秋貰酒三洲渡題詩萬嵗樓他年許元度相憶在同舟雲間雜詩避地過三泖探竒到五茸乗潮環白馬繫艦是青龍越客追范蠡吳人識顧雍渉江秋正好不為採芙蓉二婁水雲間縣華亭谷口磯文章如積玉人士愛單衣海鶴聴來晩江魚看漸肥只憐流蕩子無地可言歸三自昔雲間俊嘗推二陸才只今兄弟玅又見董生來董含進士俞孝亷兄弟各以詩文名世對䇿開金殿成文號玉杯如何龍躍久猶自困蒿莱四清士看誰在佳兒本自超謂徐致逺及子寧也書篇留北海父子著南朝有客吟芳樹延賔過逺條玉臺餘藻鑑好句待君標五蹔憇横雲麓還浮上海濵三江開夏后别浦念春申吹笛難歸楚無衣尚在秦西州當日路慟哭是何人華商源日西河兄弟俱少為陳大樽先生所知故有落句六處州賢太守歸卧西郊廬周使君茂源郊居隔歲方貽劄經年自著書趨庭饒孔鯉去郡解銅魚誰念籃輿内東方千騎居看雪即事和韻飛雪滿層阿樓頭鳥雀過暗雲長接地凍水不翻波落絮抛朱網凝華積素柯江山千萬里凴眺試如何宿吳氏江園感舊之作碧樹叢叢暗紅欄處處通柳遮雲外月荷度晩來風幔捲驚栖燕江深見下鴻迢迢銀漢影偏向畫樓東簡婁縣黄明府時新析華亭為婁縣鼓枻逋兒興開衙仙吏情人逢吳地勝縣本漢時名夜雨青龍艦秋霄白苧城到來剛九日不敢問淵明贈周綸公子何年少才名世共諳門間推玉樹天上識瞿曇倒屣驚河内分居在道南著書纔滿篋已自過桓譚時過示文集甚富答張五彦之吾思曲江叟垂老隱滄州狂士歌衰鳯隣人諱盗牛貽詩如越石賣藥即韓休慚愧吹簫客千金何處酬奉答東嘉陳玠客游見寄仲舉真名士驅車賦逺遊文章傳洛下家世在東甌楚頌湘蘭暮鄉書海鴈秋它時秦望月應對謝公樓東嘉陳玠未經披覯曾夢予靣以示于友宛然有似知已不隔遂有此事辱貽詩記述㑹其將歸奉答代諗苦憶青山外貽詩紫水傍前期要范岫掌夢藉巫陽海國蛟龍滿甌江道路長願君還故里勿復向西堂平野平野白漫漫中原朔吹寒髙雲鴉背落積雪馬頭看堠舘冰虀薄村田燎火乾千秋淮蔡路相顧在征鞍早度荒莊舖亭鉦侵曉發旅酒隔宵沽路白兼霜濶莎紅帶日鋪冰連狐跡淺木落鵲巢孤冉冉荒莊度傷心又歲徂津橋遇雨圩岸初成道村橋數問津雨絲颺里旐泥水浥車輪碧玉壚頭女紅氊馬背人衣緇全改素不用滌輕塵秋早秋早嫌霜薄村寒惜酒濃沙程長換勒土堠自懸鐘翠鴇行高垜僵桃接斷墉天涯無匿作來徃欲何從馬上馬上踟蹰起傷哉搆此生潔身逄緯繣早歲困戎兵偃仰時逾邁縱横計未成可憐骯髒久仍負佩弦情磨盤嶺早隊驅長磵前行俯峻鞍纓槍移樹小鈴鐸隔坡寒雨隙分鴉路天低上蟻盤王陽時在險泪落不能乾憇潁州城東廟計程來潁上此地去河中路僻州城白村孤廟壁紅土蘓擔婦㸑路樹表神叢多少栖遲意行行荒郭東贈金燾孝亷逺游春草生江渚王孫正逺游高文驚五嶽折簡走諸侯栁下青絲轡花間紫綺裘相逄韓别駕莫便醉楊州和張廣文游白雲山作客至山容勝春回澗道晴斷崖留雪跡虚壑受風聲天逺看鴻度林長信馬行前岡題字處冉冉白雲生寄張七梧江寧幕府四載留河内三春傍海隅未逢曹子建長憶阮元瑜名重雲間鶴飢隨幕下烏不知殷羡札曾得寄来無金黄門五十張湛馳嶤闕王褒使故鄉蒼龍環北斗鳴鳯在朝陽婺水呈丹籙秋花映皂囊黑頭看入相五十省中郎客歸蒙王余高招集新宅同徐芳聲蔡仲光何之杰文􅕩朱玉貞并令弟宗高分韻洛下懐歸日譙東築室年湔衣從久客把酒後諸賢接檻藏幽壑當堦引細泉斯遊如可紀應續永和篇二仲寳微言著方平相見踈烏衣逢舊侣碧椀冒新蔬啼鳥開簾靜觀魚出洞虛酒闌探石室多有未藏書雲間董進士含招集以解維不赴蒙寄見憶有謝高館方開宴前湖已問津多情羅薦席無分接車輪鄴下行王粲蘭亭待許詢至今聞嘯詠愁煞蕩舟人懷董含自别雲間去三年度汝溪蔣亭方二月吾憶董膠西蕙草春前寄蘋風醉後題見寄詩有捲簾黄雀雨吹㡌白蘋風句雙緘思不盡長使角巾低二結識空區宇誰能逈出群長辭季布約為看董生文暮雨婁江樹春風上海雲思君獨不見歸鴈自紛紛萬竹園沈九主考席同周玉忠虞相羅坤馮肇梅令弟華范客邸迎秋爽名園入畫隂樓從天半出池傍竹邊深接軫皆聯璧傾桮宛㵼金大都乘興地翻見子猷心同諸公登雨花臺及兹秋日爽一上雨花臺城郭千重起江山萬里來青天迴浩蕩黄葉下崔嵬六代繁華在看君作賦才游佟園同沈嗣范主考令弟華范周玉忠羅坤姜燦佟園佳麗地臨眺及秋晴山啣虚閣逈水映畫廊明草樹長林茂樓臺隔谷成祗因仙客到雞犬笑相迎遇張梧江南幕久别還行役重逢倍慘悽聞抛涇上宅仍挈鹿門妻謝墅千秋築郗家一幕栖雛隱家室俱在幕白魚潭自好勿徑住青谿别鶵隱江南有謝東冶亭邊酒西州路下吟人從秣陵别情比大江深秋氣迴長蕩天涯惜寸隂瀨中重在望何日好投金沈秘書夜邸聴伎二首暮雨過黄葉秋星出紫㣲臺城方漏下官舎有烏飛酒色侵人面燈枝匝伎衣天河都瀉盡未覺按歌稀二樺葉燒堂燭桐隂鏁院齋賔車藏左轄商市散前街舞罷調辛饍歌長換子牌最憐聴伎處門外是秦淮吳􅀈符日估散街前伎圍燈裏全非汎冩至門外是秦淮則神思俱動矣登牛首禪寺牛首恢龍藏空山展妙臺金花三界落銀杏六朝栽磴入雲間渺江從天際迴登臨雙闕上懐抱亦悠哉二紺國三乘竺丹梯百丈蓮獻花來衆鳥嵌壁掛諸天山靜經聲遍峰高塔影懸懶融如說法願叩白雲邊贈江寧守吾欽龔渤海還遇杜荆州清如建業水操比秣陵秋署有遷鶯木家傳買犢謳誰言䇿士賤不用過諸侯二領郡需亷吏分符儼上卿堂高雲滿坐車過雨隨行㧞韭從任氏披裘似晏嬰内庭頒手詔惟恐厭承明晴雪朔雪看晴霽忻然北郭行路寒冰未折竹動糝猶傾曲渚凝潮黑隂崖背日明幽懷如洗濯襟帶有餘清冬行薄日融霜野嚴飈凍水陂喜看山頂雪誤踏路傍枝沙鳥連隂聚檐茅帶澤欹蕭條松栢意惟有歲寒知日渉日渉荒園趣時來問舍情槿花看午落茭蒂及秋生野雀空倉聚隣雞高樹鳴採桑春候早五馬待經行旅病司游翻杜詩有露下天高秋氣清一律散撮輳疊勿仍連偶因觸病字亦成三首雖乖大雅殊遣抑懷獨歩疎檐菊應驚宿雁鳴新秋逢再病遥夜倚孤城月下燈猶接天空露自清雙帆看不至南北旅人情二旅臥人猶病山空魂獨驚孤燈懸宿照雙雁下秋清鳴杵高天露新書遥夜情倚檐看北斗應接漢南城三孤月接高城秋空天漢清鳯書懸不至牛宿看應驚旅杖逢人病山燈照夜情踈檐新露下猶自杵雙鳴附陳康侯詩城病應高杖倚氣接夜檐清秋至人逢菊山空月照南天看北雁雙宿不孤鳴獨歩懸燈下無書自旅情臘日發章門戲翻李頎送司勲盧員外詩呈姜侍御欲發章門晩文題薦臘新漢郎今侍史仙女夜歸秦下雪澌陽月添鴻度早春揚雄長草賦似憶道周人二柱下今歸發鴻文似五千長門題夜月女史侍秦仙春草添新臘河流憶昔年新章雄建立早晩薦人傳附陳康侯詩春雪色宫門晩揚雄薦賦新鴻歸已度臘草發似傳夜漢新流地河澌早下秦文題五千者柱史故仙人贈日者顧生詹尹端龜日君平賣卜年春風吹斗角河水下星田皂帽欹孤榻青囊檢祕篇數升清酒在那計杖頭錢西河集巻一百六十九
