body:
  text: 西河集卷一百七十二翰林院檢討毛竒齡撰五言律詩五北征二首南浦歌難斷東山望轉親素絲方薦璧斑髩已如銀據地憑方朔東方朔有據地歌将車共買臣誰憐千里驥垂老入風塵二乞病書誰上登車路自分驊騮難作隊羔雁枉成羣小草經霜出枯蘭藉火焚周顒歸計在休作北山文題陳節婦卷子東海波難逝南山烏自翔嫁衣長在桁􅄔緯不盈筐玉樹當堦綠金釵墮井黄羅敷年五十無復採春桑清明日彰義門送客丹禁分題罷青門送客行鄉程悲阻隔佳節遇清明帳飲風前緩車塵雨外輕鳯城新栁色欲折不勝情傳臚侍班景運開科舊天門放榜新九重忻得士三唱換臚人陛仗排雲曉宫花照地春慶雲成五色喜氣徹楓宸送單贊府之任休寜姑理松間詠無卑栁下官青袍還舊服白舫上新安霜後民田熟雲來鳥道寛黟山千萬户總作洞天看二玉闕依連嵗金風送及秋簽書憑贊府宦跡羡徽州亭敞堪棲鳯刀懸俟觧牛鄉心和婺水同向浙江流同諸公集家明府㑹侯邸舎分韻得花字禁苑度歸鴉開罇對燭花羊􅅅烹芍藥龍劍合鏌鋣書辦三墳博歌看兩髩華陶家有宗誼相顧感長沙集家明府同諸公賦鹿脯分韻野脡分難得仙厨劈最宜盤空方決齒裘暖不須皮得草呼朋急包茅誘女遲平原遺帖在誰與共臨池集韻牌即事高㑹開三雅裁詩抗五都分題標綠字就坐擁丹罏狎雀遷林牗看蟲結井梧他鄉相對晩那惜嵗將徂喜梅庚至同施侍講韻客館綠草發酒市青帘開春色幾時到故人千里來公儀有儒術梅福本仙才駿骨當時重黄金更築臺再用前韻贈梅庚上國逢春至横門喜旦開花看酈亭發人自北湖來逺興同仙尉高科却茂才帝鄉能攬勝一眺華陽臺送汪令之任淄川為邑當齊地之官到祝其山環羊叔里花發鄭生祠玉匣開丹篆金堂展素絲陶潛行縣去剛及早春時二歴下初為政陽坡舊有名綬花隨鷊轉書薤近庭生目送雲山逺心同海嶽清興來能種秫不礙魯田耕長安春雪初霽飲閣學李夫子宅分詩牌集字同顧二舉人魏大員外禁曙初融凍城春已放妍堆山斜作練着檻細流鉛獸撤含灰凹鵶翻落糝圓南隣追勝屐望盡白毫顛奉和髙陽相公除夕入閣草制即事原韻制為專簾草車從過闕停曉含樺燭彩春入栁條青册府迎三朔台階轉六星東風方及物論燮本無形二餞臘金門外封函玉案前椒盤兼饌美桃板綴花妍幕北来王日荆南收盗年彌綸終嵗意應向此宵傳謬和高陽夫子除夕草制原韻辱䝉賜詩仍用前韻詞過奨誘因復依韻奉呈二首時己未臘月三十日翠柏傳方始寒蓬轉未停送年憑酒綠垂老脫衫青北闕迴陽景東方愧嵗星四時看再造草木自含形二日次行將盡天階望不前松盆驚嵗晩花餤待春妍運際風雲㑹恩深戊巳年昌黎安蹇劣敢藉上書傳贈䢴上巴君曉樹能棲鳳秋河看上魚人垂高士傳家有太常書鄉酒隋宫逺林花帝里疎隔江如有贈吾欲採芙蕖金黄門五十張湛馳嶤闕王褒使故鄉蒼龍環北斗鳴鳳在朝陽婺水呈丹籙秋花映皁囊黑頭看入相五十省中郎晩宿傳是齋贈駱佳采作即徐昭華外人也開巻烟雲集當軒花樹明贅為齊地客少擅義烏名永夜看揮麈掄年及請纓閨中有徐淑莫忘述昏情贈禾中盧使君南服諸侯在東方千騎臨楷模需子幹經術重盧欽徳比崑山玉清辭昌邑金伯牙臺畔過誰與道知音盆桂和韻顥氣三秋爽丹葩四蔕含幽香聞月下佳賦詠淮南屏隘襟逾擴盆低手可探不須分作釀待飲幾回酣同枚典簿集梧隂草堂梁苑論文候西園對酒時朱櫻堆似火碧鯉鱠成絲雨過收雷逺雲開度日遲㨿梧看病減枚叔有新辭送陶丞之官試仕趨伊洛之官入澗瀍雲山開縣道河水灌鄉田朝雨催行􅚫秋花㸃贈鞭驛亭無酒𣙜留醉便門前䝉隂道中城隱斜陽裏旌連古驛中林霏開北道山勢萃東䝉草閣侵雲綠氊車度野紅因思作藝日羽畎舊能同殿試和李中允作制䇿恢鴻典臨軒展睿裁天人齊奏對雲漢自昭回綵筆爭花發罏香引篆開封題天語近不藉鳳啣来元日同諸公集曹舍人宅限韻上日尋良宴高軒集勝亭嵗筵籠暮靄天闕聚春星缾汎椒花赤詩題柿葉青獨慙元旦㑹未設戴憑經二帝里人俱集春杯客共銜相逢稱夀履雜坐間朝衫麗賦推曹植新聲度阮咸五辛盤正美勿復嗜酸醎奉和聖製閱河隄作天子念河決親詣龍淵宫隄與江流接源從漢使窮東漸咨伯禹南徙笑咸通聖藻方貽誦誰能掩大功二覆鬴初成道宣房早築宫白魚圖自獻鼯䑕飲俱窮竹石分菑楗芻漕輓㑹通河平膺爵賞看比徹侯功看菊夜飲别館丹霄近閒堂綺席開星辰天上合車馬日邊來絳樹迴歌扇黄花汎酒杯東籬遺興在宫漏莫相催答寄梅東渚二首盡日懷東渚因風想北樓書来燕市暮人坐敬亭秋九市驚三絶雙金起四愁思心逐河水直溯大江流二春到宣州麗花開宛水寒游仙真漢尉良友是都官雁度忻留字鴻飛感漸磐草堂寄傲久猶肯憶長安北行入兖州界同王明府作城僻人烟少山行客路幽晩天低魯地秋色遍徐州峻嶺盤蹊度清泉夾谷流同行王别駕不為海沂留詠菊四首陳中丞席上作紫袖西施繡頰凌丹閣蛾眉掩絳紗粧遲當晩日袖薄翳朝霞翦帔分仙侣和衣入館娃東牕頻倚笑尚見一枝斜崧曰時座客十三人五人為詩初傳是作至和衣句座客皆失色及畢主人命優人捧觴代花謝兼折花四枝插車後歸鶯語黄籬􅀢金衣散玲瓏寳樹齊窺人同葚熟宻葉隔枝低織素還穿影㩦柑當聴啼秋霜砧杵後恰有憶遼西金穿宫本是瓊臺種還疑上苑分銅鋪啣殿月金椀貯宫雲共輦雙絲轡穿針五組文平陽歌舞在閣道正斜曛蜜輪油壁驅来近羊車望轉迂傍㰚遮蝶翅隔􅚫落花鬚漆扇迴轅下黄支蔽道隅夕飡同墜露一様釀蜂酥送劉勃安還淮隂不見劉真長于今二十春酒披燕市月衣落御街塵家室真堪戀音書莫厭頻眼前相送者豈是盛年人二未遂東山志還為南浦歌高情薄俗少良友舊鄉多懷璧驚投店堅冰好渡河淮隂城下栁長記聴􅎏婆崧曰搜神記以琵琶為􅎏婆寄何毅庵有感時避人之長沙未歸驃騎聲名在廬江譽望賖南臺餘柏葉東閣有梅花庭下趨三俊屏深萃五車楚人謡諑巧切勿滯長沙任黄門舊宅齋前新産芝草同友賦贈綠野臨流遠丹芝繞砌開風為三秀發雲䕶九莖來攬珮商山聘賡歌漢殿才鶴啣新簡至五色詎須裁二舊里藏書處忻看瑞草生華文如霧合煜質本星精籞苑應同産仙禽可代耕高門餘慶在長見玉田榮赴臥龍山堂觀燈宴作和姜太翁韻星橋環曲幛火樹敞高筵一任連宵雨長如不夜天酒深看鳳舞山靜似龍眠幸捧仙翁杖閒堂景倍偏貽縣令江縣桑枝秀山城栁色新賈彪真似父鄴令宛如神俸薄稀隨吏庭閒少訟人置身琴鶴侣早晩得相親二十載忘兵革今來烽火傳戢奸甞秉鑑調戍自揮絃操比横江石貧無綰綬錢閭閻凋敝久端藉宓生賢北行即事客病愁來劇徵書老去多扳鱗瞻紫闕載馬渡黄河魯殿雲中出郯城雨後過公孫方應詔其奈兩生何客福州訪許不棄郡丞園居䝉留飲􅁆日即事書壁閩嶠三千里師恩四十秋蘓子瞻憶歐陽守潁日約客賦詩嘆曰師亡後四十春秋無繼此矣予少受知郡丞大父平逺夫子故云通門傳北海舊路感西州好客罇還滿文孫硯獨留到來清興發倚徙聴鳴鳩二名高甞集履巷隘不容車近榻花千朶當階水一渠鳴榔呼土附池上擊板聲則魚集結袵採軒于海上烽連後猶餘萬巻書三敞閣山頻入閒園春易過樹深時鳥變草暗晝蚊多鮮膾調紅粉香􅅅煑白螺座多名下士相顧一高歌時鄭宫坊高徵士陳孝亷蔡進士藍山人諸公在座四海畔探金鎻堦前倒玉缸巻蕉深當杓次日摘蕉花片作巵侑酒臥樹老横牕壁幔晴猶濕鄉音醉更哤座上多操閩音閩南饒勝事思煞釣龍江客寓南園答曹明府見貽原韻春風吹滬上春思復如何雲牗通蓬海花堦似馺娑道書愁後解佳氣晩來多千里相依者桐江舊釣蓑明府曽宰桐廬故云過沂州作兼寄州守邵君纔入沂州境清思滿客懐周官通浸沭禹貢並徐淮秋雨行彌促春風志未諧封軺無意度不欲近官齋送林戸部使學河南使帟東封轉星曹北斗懸名高班鷺日文變景龍年雲路瞻司命天書奬進賢中原推轂重應贈繞朝鞭二授簡搜儒術驅車出帝鄉九徵剛矢效一顧鮮留良客盡誇梁苑文曾貴洛陽三花開少室倍覺掞天長夜飲家萇倫宅畫檻臨秋爽丹花滴露濃泉明懷舊族杜位感吾宗庭樹年前種家書醉後封夜闌方秉燭月色正溶溶福州訪陳紫巖舉人西園亭子即和其初還故廬原韻二首東越名賢繼西亭别宅居傍櫩留綺石隙地種嘉蔬客屐穿林迥園花着樹疎長春宫未廢游讌近何如二華闥名猶舊朱門望總非隔橋通水罩入座負垣衣津繞龍還合倉空雀苦飢雨餘天一碧為看藥苗肥高固齋徵士陳紫巖招予西園亭子雅集仍用前韻同鄭幾庭宫坊前軰蔡思齋進士暨陳越山許不棄藍公漪諸子邀賔季倫澗載酒子雲居煎餅堆銀線淘􅅅攪露蔬談深意氣浹醉後禮文疎應念東安客松齋定不如唐秦系予郡人曽寓此地東安種萬松自居故云二論世分今昔繙書騐是非花光明入牗海氣濕侵衣香爇思俱㝠膏饒腹易飢南閩春又盡何處逐輕肥飲陳越山齋有贈同鄭宫坊高徵士諸公限韻勝友連辰集高齋委巷通魚梁雙甃碧鸎粟一枝紅削脯加春膳炊彫愛晩春道山亭下路總在醉鄉中二螺水環晴郭鸞臺接故居其尊人舊官省中進蒸和稻屑帶釀濾花鬚特覔佳酒以蓮鬚為釀歌動牕前鳥談贏海外書穉兒能下食誰謂鳳毛疎和韻錢徐生克堅之益州幕尚有涪江興毋嗟蜀道難家因啣蕨苦溪近浣花寒途記縁愁作鄉書帶醉看慈闈春漸轉何以慰晨餐二名重游梁賦装摇入幕情戍樓依晩泊江水向春生高㑹偕賔主他鄉有弟兄益州橋畔月萬里一相迎送曼殊有序曼殊病中每夢阿母促之歸乃貎以木衣装送奶奶廟且送青娥去言隨阿母歸荷花開作面菊葉翦為衣泪盡中途别魂離何處依他時香案下相待莫相違二豈有登車意原無唾井情因身長有病阿母鎮相迎寳髻山桃挿香骸土木成傷心未開閣生放小蠻行秋杪陪羣公集同年馮太史宅觀菊分賦得潛字秋日照高檐秋花帶露拈官貧門自掩客至酒頻添軟菜經宵凍疎衣減夏炎故園三徑在何處覔陶潛二清興招同舘晴牕對曲㡘篋中三豕渡花底一蜂潛下食飢逾美深談慣不嫌滿頭思插去搔首白彡彡題何毅庵宅碧帙晴還展青山老更親春迴龍澗櫂晩着鹿皮巾結珮常遺客分門在證人劉蕺山作證人社以毅庵為都講詩書饒萬巻庭下有珣珉紺上人赴崑山葉太史繭園請席聨句時宛陵施少叅臨安丁禮部䢴上吳刺史吳門錢明府尤司理蔡茂才俱有和詩金谷龍鱗澗張杉珠林燕子龕中軍新見請甡高坐舊能參解筏當杯渡杉投詩滿藏函臨岐餘眷戀甡相顧把優曇杉二送汝歸崑阜甡看君繫草鞋法傳迦葉玅杉詩比惠休佳初地從招手甡三江宛入懷朱門曾遍歴杉可似住茅齋甡雪中集詩牌飲李閣學宅翠嶂雲俱合平橋路未乾鶴歸棲院靜客至換衣寒翦毳凌晨散涵暉向夜殘坐看東閣啓同厭大官餐葉公子守備清源公子飽文史剖竹出東齊天際掣鷹隼腰間瑩鸊鵜陶山雲欲滿濮上栁初低長嘯清泉上風流似鎮西二書生投筆早驃騎奉恩初鉅鹿方開壁聊城有射書春風餞行幕遲日發輕車自笑頭將白無能佩玉魚曼殊病汝本雙成質秋來一病深燈前衣戀影身後語傷心惜誓留金合延醫賣鈿簪北南歸未定魂去那能尋二但厭心長捧誰知病不甦無兒年頓盡恨母日來呼初娶時夢大士取盎中花見與故同館陳太史贈名曼殊及病則曼殊自夢一嫗携兒至曰汝本吾家物我擠眼汝當隨我去其兒曰家去罷不去阿母么喝黛椀誰書刺予乏書記每晨必寫刺􅁆板銀牀想挈壺曼陀花一朶看向日邊枯奉和杜相公元日即事原韻二首輯瑞朝正後端圭祝聖餘陽回鄒氏谷春滿叚干閭荆楚調兵檄貞觀奏治書蓂階方啓莢誰謂禁花疎貞觀唐年號出易繫有平去二音二王春瞻首服相業繼當陽柏子懷貞切椒花引興長祈年如召奭作歴授張蒼苐與朝元宴何須引奉常益都夫子賜示閏中秋詩屬和依韻二首三五今宵月曾從秋半開彩鸞驚又至顧莵喜重來桂樹長臨鏡茰花待舉杯齊紈將棄置皦皦似新裁二西風吹未斷南吕琯猶開疊詠袁宏在聨槎海客來雲留天柱月酒宿幔亭杯誰使瀛洲老還将水調裁徐通政贈公生日綠錡垂弧日彤庭賜杖年賔筵張座右朋酒醉花前石匱天邊字荆溪雪後船恩綸方累錫應有鳳書傳二東國誇遺耉南州隱少微内臺銀作構上柱玉為扉海鶴鳴瑶席山龍畫舞衣一陽吹律後漸見綵雲飛集同年米贊善宅和韻逼檻㧞山雲幽花入徑分亭虚巖作幛石罅水生紋秘笈閒中發清譚靜後聞隣園延眺晩高樹掛斜曛西河集卷一百七十二
