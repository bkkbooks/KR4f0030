body:
  text: 西河集巻五十一翰林院檢討毛竒齡撰序二十八勤郡王詩集序詩者文之一體也世雖好文必不能按體而具為之獨于詩則為者十九豈篇短易成抑好者多而趨之衆哉夫亦以詩能達景無問身所值身所不值而皆得見之詩能移意不必思有所及與思有所不及而諷詠焉而皆有以遇之且夫人之遭逢亦大殊矣或悲而離或歡而併舉凡登臨游讌感寄觸發其為事不一而其為情也屢遷乃一展卷而無不得夫乃嘆詩之不可已矣予歸田以來老不能詩日有事于書易春秋禮樂其視門外事若泉壤之相間隔忽有客從長安來賜我以紅蘭主人之詩拜而讀之一若瞍而明充耳而復聰喑啞而剪剪然諞諞然景所不值者值之意思所不能通者通之彷彿置我于二山之間平臺之側西園冠葢之地嗟乎何其快也夫予之思主人者匪直今矣紅蘭之名遍于㝢内然卒無能覿其休而睹其盛少時以避人奔走道路勞瘁之餘每思及長安輒以為天上人間逈不可到即登朝以來宻邇禁近居然入蓬山瀛島之間而一落江湖􅈝絶夢寐而乃使崦嵫匿影重登扶桑非筆墨有神焉能至此今夫友朋往來偶不相值初以為雲散雨歇而忽通一介越數千里道而授以片言猶必感奮流連視為難得而況以天潢之裔桂山蘭坂之英攜天上人語而振之蠮螉呦嚶之穴有不喟焉長思慷慨焉而嘆興者乎方今聖人御宇文教滿海外天章雲漢昭然在人予雖老去固有誦揚之恐後者獨是丁儀之文陳思所定而庾蘭成集則滕王實為之序予少嬗文賦垂老棄置乃卒不能定其集以邀主人之一顧讀主人之詩而媿可知也静念堂稿序曩者猶子驥聨謁建禮歸自言游諸王之門平臺曼館往往曳裾于其間嘆長安風雅總歸帝室舊所稱好學賢宗為世指名者不一而足予深感其言自傷老去即欲如當日朝回過積善坊邊偶一駐馬而不可得也今猶子物化予亦倍老華胥之夢自分永不能再作而静念主人倐貽近年所著詩而屬予校定予思國風與二雅不同皆以時地所居處而于焉分之王朝為雅列國為風此非好為是區殊也誠以風雅有體詩雖言志而崇庳之體即現乎其際今有談京國行事而不要之以大體也乎髙文典册廟堂自别而況鹿鳴四牡皇華杕杜無非介弟姬旦分子召奭之所作如所云因一事以紀一詩其目二十有二者此非閭巷老人所能道也乃静念主人抽思迪慮隨心之所之而指顧裁通辭采畢發第出乎性情而止于禮義遂使閭巷所不能道者而道之而中人之私開人之隠此不止如前人論詩徒以時地分正變已也十年以來不能作詩而祗能讀詩今并讀亦不能矣予受主人之詩而深有感也因為校其篇而序之如此若夫五王宅畔候問歇絶縱徼冠葢亦定無能出一詞以紀其盛者而又何風人之足云臆言序俗儒習八比不通一經其能稍窺六學者尚猶難之若躬行之士則千室一鍾矣且聖教衰歇行方萬正斂手足以敦踐履遂稱罕有苟求之身心性命之際而能道所見則萬室不一逢矣吾不知吳子殷書其為人端在何等而乃介所知而投我以書曰臆言大抵上闡三易原本象數雖珠林玉闕多所旁及而究歸于陳邵之學好學人也既而推之言行之間日用出入教家治世皆有繩檢且慇于勵俗而急于勸物篤行人也而至于原始至于原性則實實言之一若有所見于中者予童年講學稍長棄去暨游嵩少而得受聖教于醫閭先生之後顧追隨影響每欲自疏其所見而究不可得而臆言能言之此非豪傑之士乎或曰無極太極先生之所疑也道徳五千文先生所麾而外之者也陳摶邵雍之學雖新安所遵而先生則歴辨之而未之許也今一舉而盡反是曰不觀夫鬻脂者乎盜蹠鬻之為濩樞也而曽參鬻之以養老粢醍麯蘖妺邦用之為長夜之歡而文王用之可以備洗腆而供饋祀道一而已映雪堂賸篇序西河自言曰吾生平有三幸一不為繼子一行文無宋人論體一無負郭田作衣租食稅男兒夫宋人論體則亦何害于行文而惡之若是以為好翹人過吹毛索瘢有害心術故翻成案變亂黒白有害是非搖脣鼓舌抵掌言事有害文筆自三唐以前並無此體而宋人倡為之而害不可道人有以論文見示者隨手還謝曰非所好也乃一見元襄先生文而怪之三復三嘆曰此非天地至文矣乎議不骫于正而中人之綮浮薄者既非所道而迂儒繩檢率膩􅯞而不敢近出其知見實可以上下千百年史事而惜其書之不盡傳也先生在明季試必領衆早已食下士之祿吳越間士望而歸之者如影響而終以避人之故隠居當湖遂不屑以文自見今幸與先生之子游急搜其文而全巻已亡即賸論一體亦復零散而不具如是予既悔前言之過而􅀷嘆名山大篇其滅没于斯時而不可考者將不止是文已也因為鏤其篇而又序之沈瑤岑集千家詩序自集詩法興而繼之者集古集唐集三百篇集陶詩杜詩集樂府詩餘長短句而獨無有集宋人詩者則以宋人詩之記之者之少也葢不記則不能集不記則讀之者亦不以為集之者之巧是以集詩萬首莫如泗上施助教然除所記外漠漠而已如此則與自作何異焉今人好宋詩而皆不能記蘓黄楊陸掩卷茫然予嘗取千家詩示之曰一團茅草亂蓬蓬此宋詩也沈子瑤岑乃取是詩而集之驟讀之而驚既而頥解又既而心曠神豁拍桌呌快事猶是孩䜿所誦諳于心而熟于口而乃曳白妃黒移子而換午耳目變幻一至于此今人好刀大食百辟豈有畸製乃雜取莊山之銅歴山之金冶百以為一渙然若氷釋爛然若芙蓉之出于塘今人亦好裘剸豹以為襜㓤貍首以為袪綴千羊之皮以為三英五紽而浮光集翠千純百結之名其價什倍然則集詩雖小道其亦足以見其裘見其冶有如是也張介眉八十序當湖有蒹葭圍聚家而棲于水鄉之中菰蒲茭菱四嚮而環之以鬱為名人髙士之所都居詩人所謂蒹葭蒼蒼在水一方者一若為斯鄉詠焉第是詩本招隠之篇而序詩者謂秦襄繼霸不能取岐西之地以復周業因慨然以道阻且長藉之興懐舊之思豈其然與介眉張君為當湖望族而舉家居圍圍之中亦多他望族居之而張氏之居圍則甲于湖雅坪學士曰吾家南陸世與張氏為婚姻介眉吾親家其子子益吾婿也而蒹葭蒼蒼毎欲溯洄焉而不可得即間一至之而媿其為人夫以雅坪賢君子出處不苟生平多大節其于世無一可愧而猶抱嗛嗛則必其瑰行異軌大過乎恒人而乃詘體焉而居于是夫是以每溯洄而嘆莫從也今介眉年八十矣當七十時學士贈以文載雅坪集中不十年而學士乃先我反真予以七十八年之友未能溯洄一相從者而亦贈以文嘗嘆乆為人作夀序而自檢其篇八十者裁八人九十四人百嵗者一人耳上夀之難也如此學士文有云張氏之世幾百嵗者二人踰九十者二人幾九十者三人夫向之幾百嵗與踰九十者今百嵗餘矣即幾九十亦幾百嵗矣此無論其皆存與否而上夀之易則又如彼是豈隠者多夀抑亦身居之蒹葭之間而逍遙溶㵝天即以仙人之日月授其人與夫文獻之重也乆矣老成典型當鼎革之後易于放佚而介眉以肥遯之軀閱世長乆舉年時所見所聞興廢得失皆足鑒往昔而儆後來加之多識大小前朝之掌故嘿識胸臆此在聖天子下省髙年猶當造門而憲乞之而況子姓登朝其為賜鳩賜玉者方未艾乎少時聞里有長年毎就之聽百年間事往有聞神廟太平貴家往來諸遺蹟以為咨嗟而今則啟禎之間能言者鮮矣夫鼎鼐簠簋奩匜舟刀苟雕陶冶漆在宣成靖慶所製即什襲拂拭尊為寶祕況人惟求舊誠有如蒹葭之詩所稱懐故都而嘆興焉者則以老成之尚在而稱觴百里相繼恐後夫豈異事而苟曰十年以後誰為贈文則又予之詠溯洄而茫然者也髙雲和尚四居詩序佛家有偈而無詩偈也者揭也揭其㫖而已非為詩也自中峰以詩為偈而偈乃一變然而所揭之㫖仍在焉髙雲工為詩及受法為平陽弟子則棄詩為偈而既而居山居水居市㕓居舟楫則又重仿中峰四居詩而以詩為偈夫為詩為偈是亦何所于分别而以予視之以為四始六義靡一不備者而明眼者見之則又曰三門八正無少欠焉夫釋無文字乆矣天童直指一傳至三峰而旁及言語然而平陽與三峰則竟以江漢目之雖同宗于海而岷嶓之見未嘗亡也今平陽一傳而文字之盛遂為古今所未有予不㑹佛法而老年註經遂厭文賦為宿孽而髙雲寓書于予謂葛洪井畔當邀予話三生事葢夙契也夫予不為坡而髙雲應現實有如源澤之悟三身而得化身則其慧業結習固有疇昔之難忘者予讀四居詩而并為及之魯緗城詩序予避人還真州值山隂沈九康臣以丞相判官主文江南藏予秦淮之複壁間其時潤州司馬魯君謙菴造戈船江濵與康臣同學且同官每以文酒相唱酬而不敢與也暨予還里閈遇謙菴杭州相見慰勞而康臣以都官郎赴玉樓去予方悲故交淪落鄉里後進無復擅詞業如曩時藝苑與謙菴三嘆而既而江東同志無不藉藉稱謙菴諸子有學而次君緗城尤工詞賦往以五七言長城争雄于時時之唱和者率相顧咨嗟以為莫及是何平陵之裔多才士也夫世家名閥豈乏賢儁然挾其所到多以仕進相矜髙求其一二有學者卒亦甚罕今謙菴以粤西觀察進㕘知行省開藩于五嶺之南而緗城赴覲與諸同學登臨感慨合離分併往來之頃饒有篇什予年七十後己不能操筆為詩其故有三一則江淹才盡筆豪脱落一則揚子雲方草太𤣥悔實學不早概從廢置一則鍾期既逝雖髙山如故而聲音歇絶康臣亡後便不能無黄公壚下之感而近觀緗城諸詩有不禁酒傭之技癢者第崦嵫迫促仍如避人複壁中雖欲為唱和而仍不能也蕭山令鄭侯生日序越浙而東出者曰蕭山其地丁句餘甌海之衝土瘠民貧尹之者非具管樂之才秉夷叔之操皆相率謝去開府憂之㑹天子南巡簡供億之官蘭溪今鄭侯以能名徴之掌太馭鈴欒扈軍前較之除道者設帳于衢數十里刻日而辦不費民一錢開府註其勞值蕭山闕員東曹上選格已有人矣開府曰此地繁非是君不勝任破例請調侯蕭山部臣厄于例格不下天子見侯名特降中㫖曰可命至浙蕭山諸郵亭鄉官齊渡江謝開府軍門而蘭溪民大怨集父老子弟數千人譁曰何為奪我官撾皷兩轅間開府初勞之既而出上諭曰敢抗耶蘭溪民不得已咸悻悻去阻江扼官渡百計謀所以留侯者不得乃以數百人送侯至蕭山脱侯袍鞾號于途而返侯自奉調後詢民疾苦先去其害馬者大抵以行所無事為休息根本除催科之外訟堂晝闔獄市不得作而究之官無廢事民便之然而過于砥操絶苞苴屏餽問辭饗謝宴並不受鄉官以下一蔬一菓而薪米出入官值卭于民是地無閒田贏賦可隂資日用而一切耗羡杜無遺隙幾幾有枵蟬槁蚓之患士民聞者無不惻然其念之顧無可如何至于重文禮賢恭敬而下士其于試事無所苟又其餘也夫四民者士民與工商也四民並重而士與商居其二宜無所軒輊其間而輓近之弊重農而抑士且重士農工而抑商名為損末而實于本無所益蕭山本産鹽之鄉牢盆煮海而盜販充斥害國禍商并累司事之考成而漠不相闗者尚復以紆繆之説故為撓挫而侯力持之其于四民之輕重無偏畸焉嵗之秋仲邑人以侯之生日以幛稱祝而乞予文書幛間予曰中庸推至誠每以不已不息為悠逺博厚之徴謂夫諴民有基即乆安長治所自始也然而上之得君下之治民中之信友必要乎誠身而極乎明善以為發乎邇而見乎逺功建于此而效成于彼可乆之業端有由致而君之治民既已所在有成事矣爾乃上自天子次之開府儀同及㕘知行省提刑觀察以下而無所不獲然且塾門之老所稱郵亭鄉官者即朋友也朋友雖甚疎而偶為賔僎即備言其事一往可信此豈旦夕間事哉千秋百嵗于是乎徴矣特所慮者侯資俸已􅀷在黼座既知其名而使相以下又必以明試之蹟有所薦引祗恐黄麻之下即欲集父老子弟一如蘭溪之留侯又豈可得哉西河集巻五十一
