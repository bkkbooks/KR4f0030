body:
  text: 西河集巻一百六十四翰林院檢討毛奇齡撰七言古詩十戯贈徐曼倩畵扇徐生妙筆似魏華又似趙昌能畵花東家嬌女白團扇乞畵牆東落花片紛紛蛺蝶趂滿林我亦見之生愁心故人有子得如此何用滿籯純是金紫庭篇奉贈張庻子史舘總裁初度自昔至人生有為河游龍蔡山出雲紫庭五象不恒見含華苞徳離人羣清河夫子本峻閥户排三㦸門十輪况揚世徳誦芬烈絲綸入掌推金昆櫝傳鳥䇿結碑版字譯馬䭾増典墳舘草詳略總新意庭花燦爛皆奇文伊予薄學恥操瑟外郡不知枉薦纁入都挾刺但局促登堂納履争紛綸盈柈飯落麈尾屑列鼎氣函犓膳焄微言要㫖均有㑹窮蒐極撿真難聞恭逢天子重文學議修前史藉討論首推東觀作楷栻如平有凖直有紋又如杞梓任裁割一一得施大匠斤憶昔浙省論鄉秀曽發䇿問如所云明史諸按互得失對者不若問者神爾時予以避人去恨未考辨似向歆今膺編纂得主者宛然弟子師河汾長嬴既至遘皇覧天門日出烈若焚張星儼在翼軫列公子時見倉琅根但識四矢冐綵箙那知三鳥拖青裙江左舊族本最重淮南有文當自尊千秋得志苟長在世人安用徒紛紛贈王舍人赴常州幕去年同詣公車門有司藉藉推公孫雄文博藻騁偉辯開牘殿前驚至尊須臾授職令著作不及郎官並丞博獨憐垂老軼清河但入中書詠紅藥天街對酒冬復春高梁栁色侵衣新師門相倚頓分袂令我黯然傷逺神蘭陵酒熟野花發此去江南好時節那堪羸馬夜歸來空望金䑓一輪月買田陽羡心自閒莫嫌蓮幕春風寒他時憶我新詩好應在荆溪水榭間奉和崑山葉掌院夫子題翰林院壁用東坡清虚堂韻翰林院前堆北沙翰林院裏通南衙填㕔衆制但分草列舘一區長種花崑山夫子秉文府授易逺探七十家日繙縹册傍銅鶴幔掣鈴索驅饞鴉敕令掌筆定前史羙刺不雜萎與葩秪慚諸子濫藉氏昫紕収穢煩鉤爬從來道潤鮮塵渇菊苗蘆菔不换茶况傳五教警聾瞶隻手肯䣃懸田撾秋風院落久穨塌驟見補葺翻嘆嗟時新修院成學人績學有如是請看壁上揮丹霞輓歌詞送盛廣文櫬旐還里君不見潁川陳仲弓公卿㑹弔縗麻同又不見南州徐孺子獨抱生芻走千里由拳夫子學術明早年兄弟同成名漢家應辟推楊震秦代通經重伏生偶然曵杖歌延佇遂賦雄文玉樓去堂上鱣魚躍未能墓傍大鳥歸何處生平感慨不得詶空吟華屋還西州天寒執紼錢塘路滿目江濤涕泗流金匱仙人歌贈陳子太士有序陳子太士與予共文㑹者將二十年曽登選樓甲乙諸試帖墨義雜文示天下天下人争奉為金科玉律疆估藉之起市門利既而撝去得葛洪金匱術遨遊長安予被薦就試試之前三日右手病痺而潰于熨腕脹如長瓠五指僵矗告吏部不聽告監臨掌院不聽隔試一日將夕矣遇太士于途驚曰何不早示我令至此急市藥二升許濩之令濯自温至凉再濩之指漸有文至漏一下又濩之漸皴次日赴試㤗和殿腕仍發痛如艾焙暗下而指詘可書因勉書完巻出出則病亦減是雖天固厄之然太士醫療之神何可沫也踰月予從諸君後䝉聖鍳取中且用古制科例授舘職因感太士術作金匱仙人歌謝之詞頗不叙致其意昔者葛洪得神術著書金匱稱仙人千載以後鮮繼起肘後有方空復陳潁川才子擅文藝月旦時賢等操契海内皆知伯玉名樓頭只許元龍憇學深二酉通九淵夢隨鴻術游鈞天長桑與客意氣合種橘啖人淮海間天街二月花正發忝詣公車向高闕斵手徒令拙匠嗤寸心久為貧交竭時當召試入玉除大官將賜蓬池魚九重前箸欲借挾一時左手難空書公乘交臂頓有省迎鳯坊邉酒初醒煮藥惟燒王質薪澣肌不用蘓躭井深慚手指重五斤非時能詘還能伸多君九折作良宰惠我一劑真有神上醫醫國本恒理况有高文比秋水他時金匱獻書成當復逢君杏花裏送吳明府超遷觀察之閩溟魚十歲不掉鬛一掉直上天門間從來神物有異量豈與世數同往還夫君百里本寄跡要使殊才破庸格司𨽻何妨拜茂陵通侯久已稱褒徳一朝治行天下聞果然第一推番君聲名特達播閶闔頓令平地生風雲丈夫入世貴倜儻攪轡登車氣何爽望去雙旌擁􅚫輪行來八察加亷訪東風二月度七閩溪花海樹郎官春嚴生自足開甌越何必平津觧笑人慰尤司法䘮婦作秦嘉垂老上計車閨中無復紅羅襦長卿獻賦不歸去那得有婦留空居㷀㷀白兎走且顧南北東西隔長路挽鹿難追司𨽻驄隨鴻先傍要離墓金刀劃水斷不成悼亡賦罷顛毛生從人但道婉娩節使我頓増伉儷情當年司法北平右共識使君自有婦今來被召入帝京不道寒房夜炊臼桃林闗前桃樹新東風吹作灤河春相尋倘認盧龍路應遇金䑓夢裡人項學士招沐益都相公萬栁園同諸公即席朝上金商門暮宿永寧里翠帔結烏頭黄塵障驢耳同鄉先達項槖師嵬嵬副相居黄扉見予落托頗矜惜往往引手相扶持連朝待漏趣入侍看倚金鑾判封事御饍盤分錦菜􅅅宫衣袖惹硃花字旋從請沐呼飲間便尋杜曲城南端紅泉舊有昇平宅緑野新開裴令園長樊介隴辟廣畆種得垂垂萬株栁九列頻教汁染衣三眠不用枝生肘青絲碧縷布作帷今來正值東風吹珠軒玉勒請載過名賢豪客紛追隨紅橋初度入磵曲木末空亭接林隩平原漫衍馬埓長旄澤蒲栘覆朱屋霜摧雪壓葉漸疎猶然鬰鬰園中居官渡城邉朝繫馬永豐坊裏夜藏烏藏烏繫馬兩不見短榦長條拂人面蓊薆難分㶚上營風流那減靈和殿間堂四座傾酒巵行厨炙鹿還烹蠡庾公撤幔欲理詠潘岳隔筵將賦詩寒飈襲袂日馭短重向枝頭覔睍睆澤在何愁玉醴枯情深頓覺霜裘暖先生意氣豪且真相從彷彿游雲津他時得返柴桑去望爾還尋栁下人冬日過上海署故人任明府製衣衣我感賦丈夫生豈易衣食終年在道披練裳朔風吹林下寒葉垂老欲住江湖傍故人為宰在滬上呼我再過聽絙桑薛城留客有布被莱蕪滌釜無舂粮顧此短褐不至骭惻然為念范叔僵自視兩袖頗飄薄但看七尺真昻藏割氊何足贈江革解襦不敢衣顧郎冰絲急付凍女剪鈿尺便向當身量生平旅食就仁祖前歲婦褌辭豫章惟此繭為伯夷種况逢衣自膠東牀貧士被服允無斁良友致意安可忘只憐連袵坐相對反于官服加輝煌少小誦讀并不出嘗恐行路分左羊十年衣褐蔽廣栁一雙葛履投嚴霜多君力學早通籍脱麻更著宮錦黄今来為吏解衣我宛如當日東書堂陽和乍轉稍暄煖我當刺擢還故鄉入林服此快游飲落花滿袖春風香答贈湯右曽長句嵯峨閶闔平旦開馬蹄撲撲飛黄埃湯生年少好容髪與之相遇長安街雙瞳炯炯負意氣手挾干將甫磨礪鉅器知為王儉才請纓未遂終軍志他鄉各恨相見遲贈予長句如哀絲酒徒慷慨和未巳令我聽之心骨悲從来知已老彌寡擊鐘無聲且擊瓦感君任俠過季心空道微文似司馬宜秋門前霜葉黄觧衣但醉當壚傍吳姬十五正年少新滴玉糟蘭水香孫侍讀初補學士復將還養于其生日歌以贈之射州學士孫叔然早年草詔蓬池邉乞歸養父三十載登朝緑髪方鮮妍山池宴罷出就舍二月含桃摘盈把倚案羞裁五色書當街且控三花馬綵弧初絓還養鄉鬰洲山色仍相望臨行欲致留君意郢水坊南酒正黄寄黄州向君予修史時録史監生向在江之父也石陽城西江岸春龍丘高士方山巾讀書蘭浦水長碧把酒雪堂花似銀金門獻䇿路中斷緑髪紅顔有時換華頂難同禽慶遊栁邉且共􅄞生鍜趨庭皦皦白玉姿燕䑓石鼔來題詩文章久為成均重筆札新從翰苑知圜冬史舘毎入直輒向芸牕見顔色因道家公舊有心能使羣賢逺相憶楚江東下繞臨臯赤壁于今戰未消誰觧此中閒歲月有人家住緑楊橋送趙郎中㩁使揚州曩者始元舉文學盈廷辯難惟㩁商茂陵魯國各持説但欲搘拄桑𢎞羊今來待詔給筆札方值征輸事遏伐大夫文學相見踈誰敢著書論鹽鐵司庾覆錦稱望郎懐香握草趨明光延清詞賦韋氏學二妙有誰能抵當星軺奉使㩁䢴上畵舫紅橋截春漲豹尾朝懸估客鹺鼉鳴夜度官艚餉揚州此去風景殊繞朝不用攀行車闗門紫氣時時見為我重詮道徳書題暢心閣冊子王二光禄别業王生本是烏衣郎家藏司馬金翦章草堂開向衆山裏高閣下臨湖水傍春雲出軫入帷幔朝雨盈塘接南㟁檻外長町裂苧衣門前漲水浮花片沿湖東上一堤遙跨向湖心有畵橋唼􅊱波間翻雁鶩參差沙靣長蘭苕種來隔浦荷千頃看去當風栁萬條晴光繞樹鳥雀噪縳得芒針好垂釣載酒嘗過阮緒家到門總是王猷棹談經抽牘并論文山根紫筍方穿雲劚還烹就雜茶荈玉帶有泉天下聞相傳此地即蘭渚上已曽經集王許千秋尚憶禊賔年三月定傾留客雨今來同作京國臣高梁屢見桃花春敝衣但濯龍池水觧帶難揮馬棧塵夢中攀得鄉井樹欲賜官湖乞歸去狂客新祠久未成務觀舊宅知何處十年奔走無宦情相期空負南山耕多君猶有逍遥舘毎欲題詩三嘆生䝉内府席學士高軒見過隨于報謁時留飲感賦三十五韻帝城春暖栁漸舒烏裘百結懸柴車王門何處堪曵裾徒然懐刺隨屠沽北宫才子金馬廬曽披錦字紅綾書從龍起自豐沛墟虛懐善下愛腐儒春行漸訪干木閭自慚十載沉江湖浪隨嚴助思上書惟恐操瑟非所須欲行還住多趦趄到門挾帚但埽除俯首不敢繫履絇何期門吏禁走趨居然倒屣迎王符鼇扉宛轉闢綺疏邀予並坐紅􅉊毺清談揮麈間有餘腰間尚掛雙玉魚御河流水烹滿壺攢盤苑核兼山蔬楚苗之食隴阪蘓間寫馬酪傾乳酥宛如水底蟠珊瑚酒間誦我文未踈蒭蕘曽採東園株鸞鳯五色狎野雛從來薦達稱子虚枉稱予賦同不如方今築舘招燕都千里共披駿馬圖丈夫知已無處無醉醒何必懐菰蘆送趙棠溪歸西江棠溪趙子真天才千里馳騁如龍媒曽因借箸宰吾邑滿城萬户皆嬰孩今來相遇薊州路早向長門賣詞賦黄塵撲靣風捲衣蘸墨揮毫有神助春光初動栁拂波故園花發思如何掛帆通潞欲歸去酒徒市上還悲歌天涯去住總為客請飲杯中壯行色此去無愁良㑹孤前路何人不相識益都師相請召同舘生西堂讌集用陳檢討即席原韻命和從來珠履羡黄歇好客高風久淪沒但道公卿善下人有誰肯結王孫襪况予落托久不前那得簸揚似糠麧何期夫子亟引手不使出官誚六蝎坐令蓬虆傴僂人頓入玉堂造金闕季秋望日日將卒諸生講論燭未跋突開絳帳通酒漿恍為戴崇設肴核炙肉分􅀈入豆新霜葵軟齒嫌匙滑當筵酌斗如挽河那顧中宵有星孛須臾銀箭落如雨帝閽已閉絶鬼謁苐恣雄談未肯降轉使深盃不停罰我今納履將欲發世事紛紛慢相訐人生好㑹能幾時日月東西嘆倐忽不見貧兒甫釋褐便得登壇仗旄鉞何須把定三寸豪只賦天心與月窟朝來爽氣滿西山吾且支頥拄牙笏西堂讌畢仍用前韻擬宮怨詩益都師相詩先成命予援筆立和其後長信宮中秋雨歇昭陽殿裏星初沒秦女朝來未巻衣班姫夜久將弛襪憶陪阿母學針線頗厭小郎食糠籺苐向釵頭綴玉蟲幾曽臂上填朱蝎誰知一旦選良家􅃍絏黄羅赴天闕才人下比厮養卒永巷隨行覆足跋每開温樹使探花但食金桃便藏核我今欲織龍衮裳桑壇浴繭如脂滑祗恐繰成五色絲朱紫青黄變為孛古來九嬪掌婦儀不使三宮盛女謁同車宜謝璧門行退養甘䝉掖庭罰况當邢尹甫見憐豈有昭儀敢相訐春花秋月如等間暮雨朝雲總翕忽茀服華袿拜罽茵何須繡黼提章鉞莫道飛蛾善築牆莫言狡兎能營窟官家如㸃上陽人恐有佳名再書笏膠東道中寄周生六十初度拒霜花發紅滿枝畵屏金鳯䨇差池汝南高士遘花甲弧矢在囊酒在巵廻思夙昔擅聞望藝苑鷄壇屹相向第五名垂驃騎間中郎文在司徒上閉門高卧三十年東堂有弟留花甎潯陽自負達人譽洛下共稱之子賢與予意氣頗相得論議當前快冰釋菜蕨猶存澹泊心艨艟不費推移力周生毎談名理故云自憐歲暮淮海行馬前挹水長清清只因早向膠東路時見長庚徹夜明宛平相公初度奉贈七月八日往者開國主文教前有宗伯後七兵燕許一時得父子袁楊數世皆門生伊余被詔待官邸親謁尚書集賢里堂供先皇舊賜書園通後夜新添水春雲繞屋花繞牀豈期絲竹還東庄翟公在籍甫終制曹相就家趨辦裝槐㕔入坐署堂押百職班迎敢相躐鼎耳環看總赤文詞頭待判加黄帖自來䇿拜重報胙况復新參本名輔題冊重思母后恩探符特赴陵園路三年槖筆為史官私書不敢投任安感公冰鑑炯相照使我墨花寒未乾始知元宰受帝禀手摘星辰類菽荏不信試看河漢間昨夜天孫布雲錦西河集巻一百六十四
