body:
  text: 西河集巻一百四十五翰林院檢討毛竒齡撰七言絶句八懐友雪滿空山夜未分燈花初落酒微醺不知良友何時别野寺鐘殘一夢君陪益都夫子長椿寺觀劇奉和原韻春色融融起化城楝花風發坐來清當軒一奏開元曲滿院如聞上苑鶯二香臺深處敞朱筵梵唄時傳兠率天花外莫驚歌吹發謝公舊墅近東山三沐日追逰古道塲宜春妙伎進多方慈恩原有金錢㑹錯認新聲奏太常東朝房閱廷試巻左闕門通曉禁春晴牕日上水流銀桂林多少名材在誰是東堂第一人二芸臺應召共鳴珂聖主臨軒事網羅争道目中無五色掖門花發彩雲多奉和李使君行衛即景十詠原韻重重春色鎻長橋萬栁參差覆石壕欲上隋堤南去逺教人空憶廣陵濤右衛河傍桞堤汶水遙從天際迴商船半向夕陽開長帆一帯秋光裏寗母亭邊片片來右汶上帆來風迎翠葢碧亭亭響滴荷珠静夜聴恰是梅崖讀書處藕花香畔誦金經書院與古寺相接梅崖使君字右書院荷花拏攫霜天龍虎姿林間石闕未銜碑儘教釋氏經行後猶似宣尼手植時右南林檜晩風吹雨送江舟傍渚斜臨百尺樓過客莫歌囉嗊去有人望逺在樓頭右津樓瓠子長流散澤陂朝來顧免眼迷離誰言東郡驅車日不是南樓理詠時右曉月陂寶地紆回水一方白沙紅樹兩茫茫岸傍一座金輪塔長帯鐘聲伴夕陽右塔岸鐘聲鳥散空林静逺鐘雞聲茅屋曉烟封遙看天半瓊花發知是髙唐第幾峰右平岡望積雪荒原凸凸似龍堆薄暮携笻去復來自昔坐看雲物後寒葭吹出萬重灰右灰山纔過東村日欲斜停車到處問桃花看來紅廟支竿䖏便是黄公賣酒家右東村酒帘吴冠五自上黨還重赴渭南雪夜宫鶯啼滿枝平臺水色緑差差此來不作横汾賦只為新看上黨詩二上黨詩成天下驚春風重送渭南行王孫無限天涯路愁見車前細草生題金十四烺畫像栁絲垂處綰成縧緑汁還堪染布袍欲識胸中羅八斗何難頰上畫三毛二京洛重違已十年披圖相對笑依然園花開盡東風裏猶把殘書坐石邊數過任黄門邸舍看菊留三絶句志感秋到園林歇衆芳罇前相對一霑裳老來自信無顔色誰道秋花晩更黄二紅白高低一色栽䦨干上下幾層排屢從西掖看花去可似東籬載酒來三三過閒堂倒玉巵團團不落使人思秋風幾度催霜盡猶自低頭戀故枝題沈客子春山絲竹圖記年坐擁西園絶代姿風前吹竹又彈絲縱教痩盡休文面尚似東山年少時二為聴吴興舊妓童身披鶴氅坐當中宛然人在天台路萬朶桃花夾面紅同館茆君以母訃奔宣城仙姥新遺七誡篇芸臺有子泣花甎衹憐化鶴無由到難奠生芻在墓前二翩翩丹旐引雙鬟愁見臯魚江上還欲望故鄉何處是白雲飛滿敬亭山奉題張學士賜金園圖有序康熈二十年張圃翁學士請假歸龍眠以上所賜金割其半買園搆四軒其中名賜金園同邑姚耕壺繪圖傳之越三年上召學士仍入供奉暇日出圖索同館為詩予賦八首續畫巻後買山何用費追尋洞壑長銜聖澤深但得繪成千嶂碧不須還散二疏金二浮峰東下水灣環彷彿鷗汀傍鹿闗當識此中横榻處有人紗㡌坐花間三圖成誤筆㸃垣衣賜號逍遙看去非日侍禁林還記取李公嵓下好開扉四黄金築室四軒通不羡編錢馬埒中南沜岸移春漲緑西廊壁掛夕陽紅五還朝無俟乞官湖遙指東山意自娱當日汾陰陪祀去可曾詔繪草堂圖六芳塘低處着䦨干村女提壺近井榦只恐君恩難遍及故留圖畫與人看七平泉築館莫嫌遲況值黄金未鑄時籬竹巳抽前度笋山花又發隔年枝八前軒竹樹手親栽嵓畔春風度幾逥一自西清重詔入畫圖一日百囬開題畫松為姑蔑使君生日瀫水東流皂葢逥九龍山峻比徂徠長松偃葢垂千古疑是東方千騎來二謖謖風生五粒鮮郡樓開處起朝烟他時廊廟搜樑欐看汝長榰天漢間題蔣生畫像册子青桐花發最髙枝一縷茶烟裊似絲中有杜陵三徑客金雞石上坐題詩二月旦新從入洛還重携仙驥扣仙闗竹山芹澗應難覔何意相逢巖樹間為雲間沈白書賣文字約後蕭寺兩書當百鎰長門一賦值千金慢誇此日朱提貴載酒籠鵞何處尋任青嵓七十曲巷蕭條近市廛白頭遺老尚依然尋花曾飲鄉人酒扶杖相過又十年二裁逥甲子度春風又見園花嵗嵗紅幾欲移家歸海上還來避地住牆東三先生七十正懸弧長對青嵓舊畫圖恰似渭陽歸載早海鼇百尺掛珊瑚夀友嶻􅑖金門寄此身翛然吏隠得仙真何年再與西池㑹笑對桃花萬樹春二層巒縹緲度雲璈玊露遙分碧海濤日出曉霞紅爛熳有人闕下獻仙桃汪園水亭觀荷同佟二公子靳吉明府張文學于康曁汪傅二進士即席水亭開處晩荷鮮水面紅橋似輞川賀老段師俱在坐可能還唱想夫蓮時座末工伎樂者九人皆老供俸也想天憐原名相府蓮憐蓮字聲之誤二荷花傍檻巻成巵樹裏殘陽欲墮遲怪底新歌吟未了西園公子正裁詩佟公子詩先成送佟公子鍾山赴其尊大人江南行省和靳允安韻莫厭河亭暑退遲秋風又掛布帆絲懸知阮緒寧親日正是崔從出鎮時二多君作賦本天才況復船裝書畫囘公子擅書畫詩三絶此去登臨儻乘興停船一上妙髙臺三但向河橋嘆執袪深憐一載對門居回思當日相逢處尚有孤山道士廬四白門秋到雁初鳴落日浮雲看上征應念故人難遽别雅琴休作雀飛聲時有皷琴者在座董生杖履圖縫荷躡葛興翩翩帝里相逢豈偶然我欲邀君桞市去杖頭添掛百文錢二虎頭妙筆費尋思襍綴衣麻並履絲别有示人阿堵在青青兩眼向天時闗中沈君為覲親晉安值亂未逹遂客死吾越其子扶柩西歸過别挽之以詩先生家世本秦闗萬里趨庭客未還一自巫陽招謝後靈旗長駐㑹稽山二諸侯愽士老平津曽向天街振履塵到死難忘甌越路先人兵備在南閩三遺書萬卷好重編有子賢名過彦先無數道傍虞殯者為君時誦露晞篇同姜京兆寓繆修撰園吴江徐崧枉過闕候有詩見謿依韻奉答并以代訊名園晝鏁不曾開門外輕車碾緑苔自失吕安河上去從無太守雁門來二梅花初發武丘東兩度尋君古寺中聞道談經曾不住我來何處載郫筒沈篤人母陶太君夀錦帨垂垂罥繡椸宫袍初試舞來遲遙知綺席傳觴候正是泥金報喜時二朱門旦啓勝朝霞流水街填畫轂車一自春風張錦幔滿庭開作武陵花三東皇西母鎮逍遙長見青裙戀翠翹只為金門饒曼倩當軒一奏白雲謠題李木庵太史早朝圖宫鵲初飛曉禁開常叅班裏幸追陪一枝樺燭籠烟近認是蓬山李嶠來二金華入直早涼時長探牙筩索口脂今日畫圖相盼處教人頻詠上官詩藩伯李公從貴州遷浙于其初度飲次賦呈四首從違馬帳一趨丹羅賴朱旗相送難何悟紫微環照處重開行省到臨安舊以方伯為中書行省名紫薇署公初從杭遷黔故云二屏藩髙啓浙河清河上應留三過名當日驛樓題詠去到來惟有碧紗明三槐堂相憶嘆華顛建節龍番又七年圖就五湖還有待鶴飛莫近畫筵前四鈴閣斜臨湖寺東兎葵長掩夀王宫祗因前度劉郎在尚見桃花雨後紅丁禮部舉子苕華終喜出藍田隔巷忻看佳氣連為赴葯園湯餅㑹桂枝先發巷門邉二莫嫌三羙不同期老蚌生珠尚未遲不信蟠桃須晩熟請君一誦播州詩劉禹錫贈樂天詩有海中仙果子生遲句東華門遇瞿庵和尚感贈蓬池萬頃接天開曽作紅樓大辨才却自曇摩歸汎後謂平陽也禁林不見此僧來二東華日撲軟紅塵雪後長思鑑水春忽對沃洲山下客恍然身遇故鄉人題方山子畫像冊頁十年相憶在江湖讀盡樵雲百種書方山所著書名今日相看同一笑南髙峰下舊精廬二一巻楞伽石上排日髙雲影落香臺分明一個方山子畫作維摩入座來題張鞠岑吏部年伯採菊圖記年淮干一别意慅然十載相思㑹面慳何事虎頭纔寫照便令張緒記當年二先生髙臥在東山乘興東籬採菊還此日旁求遍天下有人圖畫入嵓間三東湖九日共題詩座滿黄花酒滿巵畫裏不知年嵗改看來猶是醉吟時題丁灝秋江獨釣圖秋風嫋嫋竹竿長紅蓼花開傍夕陽一自洞庭垂釣後至今不復咏滄浪先生新從南嶽還故云二七里灘前楓葉紅桐君江上釣臺空身為鄴下文章客也着羊裘臥澤中送黄徴君虞稷䘮母還里黄香辭辟不嫌頻只為髙堂有老親誰道徴車二千里頓亡帷舍百年人二北闕何須再上書見星前路舍臯魚聖朝教孝原無極忍使泉䑓更倚閭時有謂徴君冝䟽辭故云三寒風梢槭下林柯此去冰堅好渡河痛煞望鄉行哭處蔣家山下白雲多四生芻一束路漫漫送子將歸欲别難只恨毛生亡母後依然捧檄在長安易亭贈楊筠和董四瑒楊桞垂垂覆逺汀楊烏方註太𤣥經相過永日開罇話能使薰風滿易亭二縁城一徑桞凄迷桞下談經手重擕苐弔忠文過茂苑那知楊賜在闗西忠文係維斗先生私謚筠其孫也平太翁初度載問次山尊人也芝葢如雲棗似𤓰秋風八月桂為槎原來河上神仙宅只在懐州刺史家二著書何必向凾闗避世牆東也駐顔不信但看樊仲父火珠橋下九還丹先生所居名火珠巷三先生寄興瀫溪邊暇日長吟東峴篇八月秋花開似錦萬層羅綺滿前川四近見耆英在鑑湖閒來挾瑟且提壺庭前自有三珠樹座上寧無九老圖高士母夀莫問三山與十洲長離應向碧梧留海門紫氣横千尺中有君家文選樓士選文行世二清防華燭接明星七誡由來抵一經莫怪髙堂將八十逹夫五十早知名西河集巻一百四十五
