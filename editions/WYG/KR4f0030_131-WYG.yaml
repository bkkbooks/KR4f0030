body:
  text: 西河集巻一百三十一翰林院檢討毛竒齡撰填詞一原調本稿雜列今照詞例列小令中調長調因析隋唐題特作一巻名原調其中菩薩蠻小重山等徵近宋調者悉分列之南歌子鐵鑊生梁子銅樞種棗花楊栁正藏鴉閉門春晝静是誰家前調茜染墻頭草烏飛陌上桑三十侍中郎自矜拖紫綬茜花香前調蕙幌春前雨花竿晩後虹解珥墜青蟲去年曾借宿宋家東前調蕊撲鴉頭淺鬟梳蠆尾輕鏡裏未分明勻殘紅粉絮掛簾釘前調髙屧宜墻窄長裙愛襇多風起動江波隔江風更急奈裙何前調舊苑羅羅在新教畧畧成殿上暗呼名鍍金黄甲子墮銀筝荷葉盃䨇槳紅船欲度荷路向前溪葉摇傾下露珠子菱刺又牽衣其二五月南塘水滿吹斷鯉魚風小娘停櫂濯纎指水底見花紅章臺栁楊栁枝莫教折留綰衫前散巾結袛恐飛花上紫綸認作摇郎髩邊雪前調花漏深春睡醒二五窺蟾半邊影燒殘蠟淚泛銅盤一尺珊瑚沁心冷南歌子燕尾捎輕霧花柎涌落潮朝鮮計吏附書遥三月隋堤楊栁暗河橋前調驅馬東郊道提筐南陌頭桑枝欲盡且移鈎日暮蠶饑歸去好難留前調蠟暈眉間粉裙縈履上珠陽雲樓上教歌殊吹煖鳯梢䨇籥卸脣朱前調澁杼嫌經密殘絲畏鑷欹織縑織素總難期獨對支機彩石有誰知前調溘匝箱金斷青紅鈿暈殘狂夫塞下幾時還時見𤨏牕蜿蜿墜䨇鐶前調掬溜愁蘋捲投竿喜藻開蓮舟櫂女夜歸來争照水中髻子落金釵漁父詞籊籊銀鈎掛竹竿珊瑚車子鐵連鐶蓮葉渡蓼花灘烟波淼淼幾時還其二菰葉菱根罥網絲曲榔單板立鸕鷀前浦約隔江期江長浦濶暝歸遲摘得新河沒時霜繁月已低錯驚銀槅曙起來遲扶上髩梢隨意綰亂絲絲其二日滿檐蟲飛逐檻邊紅衫腰後結洗粧鉛指拂額黄時轉側鏡臺前其三欲上牀卸頭留半粧殘膏銜獸頸且縫裳晶環繞指先知冷偎誰傍其四漏盡移還將繡譜披碧牕連鎖下響朝雞坐得畫裾千百褶夜何其瀟湘神湘渚頭水北流麥天風雨緑崖秋蕉葉緝紗仍染緑荆門紅樹好生愁其二卭竹枝生古祠叢叢峭壁鷓鴣啼朝雨過來還暮雨不知神女幾時歸蕃女怨呉娥窈窕初拂舞堂下春雨栁垂鋋花轉轂煖翻紅燭只憐却舞汗衣乾又春寒前調胡騰起作石國語愁殺蕃女􅄢鞾尖銅帶軟蹵踏宛轉廻頭忽憶舊安西兩眉低憶江南江上路横曼小長干日炙水花紅灔㶑烟浮堤草緑綿蠻髙閣尚春寒其二江路逺草際暗塵消紅藥園深朝墜露白蘋渚淺夜添潮人醉畵欄橋其三堪憶處曲巷試單衫菱井啄泥懸社燕桃根熨火種春蠶風景是江南其四風景好菰葉滿横塘碧帶帩頭騎馬客紅釘屐子攏船娘兩兩見鴛鴦其五臨大道金碧遶天涯出郭危樓雲作埒抱江小檻幔垂沙記得那人家其六前浦去何處最能留黄鳥換枝啼不歇落花細逐往來舟微月上汀洲其七粧褁淡時世在江淮裙襵緩韜䨇籠襪髻根鬆貼兩梁釵驅鴨去還來其八頻悵望耶水與梧宫誰浣素紗窺越女因歌白苧號呉儂總在石蓮東其九歸去好長聽子規啼紅藕城橋風脈脈黄梅江閣雨凄凄愁思望中迷其十江上市帆落度橋來兩岸娼樓懸水栅平船擊板暝烟開漁火夜相猜其十一芳草軟朝暮藉車輪鸜鵒蚤寒調婢子琵琶夜雨賽姑神愁殺浪逰人西溪子二首稿中低一字列或疑非河右作俟攷襡襣對襠一抺帕􅀈兩頭八撮抱腰身牽帶孔持帶孔卸到燭光浮動煖烟濃瀉輕紅其二碁底紅編履子低􅀈砑羅如水夜填時重解祙重束祙坐久欲填還脫忽見月如鈎使人愁思帝鄉撥捩遲歌挑舞又催半折紅衫遮柱柱初移慢揳銀彄絃急恐難支不念中宵起上絃時其二紅帉紫帉藍緑帉翠㡌玉鈴珠串壓金裙垂手正巾徐步毯毛深未分倐見煖風吹繞一堂雲其三霓裳羽衣譜未詳玉貎何人無力繞珠璫曵得鈿纓纍纍履蹺裙自揚猶自曲終徐立聽聲長浪淘沙仙橘山前看橘花單衫裁就橘山蔴春江空作揉藍色浪裏淘來那得紗其二杉木為􅑉竹作檐江潮能苦雨能甜連朝只飲檐頭雨翻道江潮錯著鹽南鄉子蕉葉領橘花翹紅藤篾子束裙腰私念鵕雞顔色好從誰道裁作大郎頭上㡌其二藤菜煖荔枝乾青蛉河畔碧魚餐願絞桄榔皮裏肉炊烏木暫與小郎充晩腹前調埈曰此前後句調各異然不分二體見歐陽舎人李珣諸作賽起祠叢木棉花發野椒紅記得丁郎山下路敲銅皷九孔紅螺扇遮舞前調盧橘催酸風生蔞葉瘴烟寒自賣明珠歸極浦心苦白氎單衫著秋雨甘州子銀牀金井曉啼鴉簾額上襯紅霞同心梔子夜開花和露折來斜無好意送與謝娘家其二織金衫重懶提筝䨇扼臂卸來輕平頭吹蠟炙銅笙葉底弄鶯聲無好意喚與順郎聽江城子赭門東上海潮青古西陵雨㝠㝠越王宫女著履在樟亭亭下教兵遺竹矢秋日晩墮鴉翎前調日出城頭雞子黄照紅粧動江光采蓮江畔錦䌫藕絲長欲問小姑愁隔浦長獨處久無郎前調江深不畜伺潮雞春和出户遲浣紗稀䨇橋釵子瑱粟綴紅泥裁得荷花新様好羞比著嫁時衣楊栁枝花蕚樓前楊栁枝美人翦綵自尋思千絲萬絲誰作様翦來總似一條眉其二白蝶愛翻輕粉絮黄鸝偏上縷金條䨇眉葉葉慿君看無奈低邊是細腰踏歌詞園裏花成子梁間絮作泥風鳶移柱線雲母貼牕衣漫摘髩邊箆上有閙蛾兒其二網户粘蟲翅簾旌壓栁條整釵時對鏡結襻屢廻縧漫折井邊桃上有合歡梢天仙子蠟炬乍開紅芍藥枝頭又噪星橋鵲還疑蕩子蚤歸來蛛網錯勾眼角昨晩下堦裙帶落前調玉繭牽絲纒寳帔當胸繡出承恩字朝朝獨自捲衣裳蜥蜴尾長繞臂誰識牀頭有龍子前調珠雀五層宫髻直紅縧盤委花磚級太平天子用恩多草露潗裙褁濕猶許蜻蜓上裙立前調墻裏花枝墻外影嘶騧緩踏飛花冷隔墻見得不分明金甃井銀絡綆井面看身見斜領前調新殿前頭騎馬去射生籍裏名初註紅襠垂鐙手垂絲廻盼處風繞絮羞抱夾金鞍子住前調此下舊有賦題今缺魚網劈來螺粉滑臂痕細壓金條脫背人寫就兩行欹花勝纈銀縷結纎指斜封惹脂沫前調蠡城為王郎記事城上春雲城下雨倩人留壻傾春醑偷將壻祫障春寒烹雪黍炊玉杵調壻鄉音隔牕語前調鍼管紅抽丹鳯鋟螭頭金錯裁䨇枕誰家白苧夜歌來人未寢霜又凜誤翦葡萄紫絲錦前調斑簟紋生䨇腕纈夢中欲笑開嬌靨醒來記得許多情檀獸􅅡釵燕熱侍婢相看那能說長相思長相思在春晩朝日曈曈熨花煖黄鳥飛緑波滿雀粟銜素璫蛛絲斷金翦欲著别時衣開箱自展轉其二長相思在秋節複斗垂垂怨蜻蛚錦紋砧素絲鑷夢苦見參星關深落榆葉欲識夫壻寒花堦映微雪遇陳王枇杷花裏誰家院近叢壇青漆左廂開繡戸坐䨇鬟著地畵簾飛燕燕當堦碧草映蘭蘭車輪未必成三角扠住門邊那得還其二阿侯十六南隣女對門居相視欲申無限意口中朱朝起青烟縈獸爪晩來紅燭透蝦鬚牙箱實褁氷蠶繭骨裏相思豈是虛其三金斗熨開魚子襭襯紅裳銅瓶注煖獅頭炭理黄粧頻呼小玉因聲巧欲寫泥金恐恨長那見瑶臺成粉幛果然銀漢是紅墻酒泉子風攪紅簾愁損隔簾人影倩秦娥纒越檾唱呉鹽黄鋪白鎖春相望髙閣魂驚難上那更堪花滿桁栁垂檐其二可惜春歸換得好花成葉啟金箱疊絮褶熨單衣銀鈎翠籠南隣女日暮採桑西去怕秋胡回道路返遲遲其三寧掃空牀怕見滿欄月色寫金鍼縈象尺坐燈涼屏欹漏月燈猶悄坐逺影兒較小為孤單長伴曉似䨇䨇嬾䣃頭糺糺珠臂繩宛轉轆轤上那知䨇穗條夜夜空垂帳楚雀縁釵橋胡蜂咂衣桁製得嬾䣃頭殷勤與誰唱定西番校尉新開疎勒旋右地返輪臺未歸來奪得燕支萬里草青春已廻誰道于闐還有野花開其二月落武陽碑下控鵲血挽牛螉看烽紅夜半軍中女子皷聲寒不雄恰是深閨人去夢魂中醉公子是誰過上苑試馬歸來晩䨇鐙武威銅櫻桃馬頰紅百枝燈並起解馬歸花裏花底碎金箆珊瑚錯燕泥其二杏園初試酒挾彈遮楊栁醉裏困金吾教姬倒玉壺綬絲如鷊子翠帢團團刺花片綴衣巾衣花看轉新生查子緑㮈匝茱㡡皂角穿蘿屋犀槅釘明螺眼底分朝旭沅浦長淇水曲處處難追逐欲見有何由簳蠟成紅燭西河集巻一百三十一
