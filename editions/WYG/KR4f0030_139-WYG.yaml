body:
  text: 西河集巻一百三十九翰林院檢討毛竒齡撰七言絶句二上海縣新年樂詞爲任明府作官舍辛盤列繡茵桃符又換一年春令君本是潘懷縣能把椒花贈故人二玉厯初從翠幕開三陽齊向斗邊廻朝天散後賔朋集恍有春風度海來三裁成方勝五花鮮各佩潘郎月進錢祗爲鶯啼仙署近春花挿滿印牀邊題壁十里隋堤看柳花旗亭南上玉鈎斜紅螺杓子葡萄酒醉殺揚州馬佩家馬佩舊院妓名時避兵居揚州申江守歲詞申江守歲夜筵開夜半休啣柏子盃嘗恐客中愁不斷一年未盡一年來甘泉宮詞漢苑通天拂羽旗平明駕幸集靈池紫衣使者持瑄玉候祀甘泉泰乙祠二建章前殿擬蓬萊玉輦金輿發漸臺侍臣竊聽神君語道是甘泉好會來三黄帝青靈駕栢梁甘泉宮闕舊林光黄金欲就黄河塞自有靈芝產殿房四漢家十世大蒐田百子池頭禱嗣年不享上𤣥祠泰畤從官那得賦甘泉重和絶句有序予既和戴花船長句復彚集諸詩見示重和四章從友請耳韵亦因之燕子樓前雙燕飛舊時桃葉渡頭稀只憐尚有秦淮水載得花船緩緩歸二水滿春江花滿舟秣陵西去使人愁渭南亦有昭陽觀花裏重尋女弟遊三嫰柳夭桃不用尋可憐兩槳結同心橋公重説周南郡漳水空留銅雀吟四蘭橈桂楫度江雲欲採芙蓉染絳裙帝子再來江水上可憐阿姊是湘君韋使君美人彈琴髙張紅縵洞湖濵蘆藕苗間一美人靜撫流徽堪念處十三學得漢宮春飲馬城邉曲燕臺北望薊城山飲馬城邉驅馬還前度錦車休出寒將軍近在草橋關二城邉飲馬莫辭遐將採燕山二月花日在陣前誰見敵薊門關外盡風沙誰一作難盡一作有西海曲萬里昆陽水上浮紅螺紫貝結爲樓未有唐䝉開􅈎道從敎馬援在交州二虎威門外撞華鐘白嶠烏蠻並舉烽夜㸃水軍三十萬雕題繢出海中龍絶句馬當山下小姑神獨立江心不計春上江水來下江去朝朝風浪好愁人一本作江鳥啣魚飛欲盡晩來風浪好愁人清芬閣方夫人初度樅陽大家舊能文髙閣嵳峩映碧雲七十年來𤣥覽賦慿將千載誦清芬奉答白門向逺林枉過闕候贈詩春山十里野櫻開朝採櫻花暮未回蕭寺也知向秀到蓬門不道逺公來代摇船號子小婦摇船襖子紅早行湖北暮湖東連朝怕見風潮惡湖裏雲生愁殺儂二小婦摇船江水深晩來江路好難尋分明記得雙橋宿日出相看在皂林送宋臬臺由紹興道赴任杭州十四首東南觀察古諸侯玉節臨關擁上游藩府舊曾開八部千艫萬舳向杭州二金幢百里曉雲開浙水東流去復來一道星飛吳子國羣公帳飲越王臺三明時栢府外臺臣浹日楓宸中眷新久使南行勞叱馭誰知東郡早埋輪四鳯凰山下豸堂髙憲使西行仗羽旄兩岸桃花廻錦纜春風徐渡浙江濤五清霄鶚度壓江濆遥海鵬飛簸曲雲漸水豈因吳越限使星不逐斗牛分六越東八察元才子浙右雙旌李鄴侯轉運倘能懷左臂金章犀帶鏡湖秋七褰帷露冕導江沙攬轡登車問海涯全轄名都一十二望風解綬是誰家八兩行豸節駐錢唐萬仭龍門起故鄣明聖湖光同皎鏡紫微山路比秋霜九望京門外挽金車鎭海樓頭展玉笳幕府政成多問字春江相送共侯芭十三秋熊軾望來遲十里樟亭繫去思惆悵過江羊叔子東風一路野棠碑十一提刑大使玉津宮舊日刑官是大馮二到兩丁何足羨試看今日廣平公宋玉仲先生舊爲杭州司理十二錦棹春江西上時吳山相望鬱叅差他年紀績能懷古應到錢王武肅祠十三白羽青絲間虎符豸堂驄路隱龍圖時至謳思連十郡暇來賔從滿三吳十四使星才發會稽山獻石懷錢滿市闤只恐内臺相望久浙潮一日兩回還過徐十五茶肆出張六四丈隱居所贈絶句云丈甚惜此詩必屬毛甡書筆藏之爲慰臨書亦賦二絶句附後南州髙士縣西街長掛官茶舊市牌欲向黄公尋故侶却憐宋子在天涯二垂老張融未卜隣同時徐穉亦長貧新來寫得相思帖曲渚停舟錯認人爲錢唐王生題畵竹碧篠娟娟倚翠苔髙岡雙鳯羽毰毸空庭月落誰相顧知是當年子敬來題仇英畵幛二首南朝蕭寺暮雲間漁父滄浪鼔枻還樹杪亂流遮暝色不知何路向前山二屏間長見十洲圖珠樹瑶林近有無釣艇欲歸溪路暗碧天空掛水糢糊寄寇詩有序白門妓寇眉故撫寜侯曾購以千金寵之侯被俘北行鬻婢妾于豪家并欲强致寇寇曰予奚事此也且鬻予數金耳請得歸歸則丐諸侯故人得千金未足重爲妓繼之侯由是免張荀仲先生曰寇非無知者語及故侯家事輙慟哭王雙白曰江以南遥情似寇亦罕予時寓廣陵寇將來或曰寇復不來擬寄之莫愁艇子載琵琶慢向青溪摘藕花舊日侯門君記否廣陵城下邵平家張二丈七十初度自咏小像松菊圖索和清河居士臥東籬松菊閒吟酒一巵猶喜春前方七十勿嫌秋老探花遲二庭前松菊自行歌畵裏柴桑雙鬂皤散寫新詩編不盡可知甲子記來多口號孤舟殘夢帶霜開十里山塘雞唱廻幾處隣船棹歌發悠然客思夢中來伯兄雲間歸攜讀章大司馬閨淑有閑香奩詩因作時七月七日秋棠花發鶺鴒還攜得金箱劉令㛠此夜曝衣樓上望萬重錦繡滿雲間即事綠蘋翻葉水生紋青雀低飛日漸曛南莊風來北湖雨太守祠前一别君姜公子希軻誕兒太傅堂前玉樹新香襕繡褓石麒麟從容伏日傳湯餠爲有朱衣拭面人適伏日招飲二丹山九翮鳯凰車五色銜來掌上珠夢裏熊羆驚莞簟君家舊有渭川書從軍行蘢城積雪炤蒲離壯士從軍建羽旗此去渡河剛二月燕支花發到車耆二將軍夜獵向南山暗把雕弧射草間聞道甘泉初備寇五原烽火逹蕭關弔喬公故居皖水茫茫繞碧渠青天環映石樓虛漫嫌江北無春色只在喬公一故居樂六舞功昭父子邀集鳬亭予以别集未赴閲日復爲詩見招兼屬訂日率筆酬意鳬亭一望水中遥細藕長蒲阻畵橈落日滿湖人未到爲予重上赤欄橋二東湖深處藕叢青邀我重傾白玉缾今日南園明日醉也須後日到鳬亭楚州除夕三首羈客天涯値嵗除楚州城下舊精廬薪槃燒罷紅燈暗翻盡頻年篋裏書二客嵗將除夜漏長屠蘇酒煖贊公房只憐故苑椒花頌不共天涯一漫郎三爆竹明朝嵗復新桃符又換一年春淮流不斷東歸夜猶有淮隂度嵗人元日蒼龍初轉斗初廻僧舎初銜栢子盃四十年來殘嵗月不堪還向客中來頃以家冗獲咎暫去鄉里枉荷山陽令朱公極留三却三挽臨行感激念其亷材惠民而未嗣因寫鬻兒圖留贈并爲作詩看花三載住淮南白鹿銜花傍兩驂最是淮民善相祝春田綠草種宜男二淮南有子盡名朱淮水應生照乗珠不信但看銀幛子野棠花底鬻兒圖北塘席上送潤公之鴛湖寄朱彝尊二首錫杖袈裟古善才北塘深處重徘徊如何龍象波中度不見羊車市上來二臨湖曉閣北塘深五月荷花送道林百里波光長似雪可能乗興到山隂宫怨裁成紈扇擬修容曾賜昭陽繫臂紅一自上皇巡幸去空留春燕鎖南宮二金井鵶栖玉殿秋鴛鴦樓上夜藏鉤生來不解君王寵夢去還尋女伴遊吳宮怨吳王秋到便生愁長作姑胥百里遊縳火炤龜還上海牽旗走犬過長洲二百尺銀釭獸爪垂梧宮夜闔萬重帷浣紗溪上東隣女聞嫁西家椏角兒何水部小妓小小蠻雲宮髻新紅絲初拂舞衣塵呼來只向屛間住怕惱司空坐上人二上宮碧玉攏頭新短袖單衫染麴塵敎就曲房揚袂舞好娛官閣看花人三慢上蓮花舞柘枝偶傳清響最堪思自憐繁簿無佳句也遣名園聽瑣兒張司理陛秋水園席上作秋風吹雨照龜臺白藕紅菱水面開博望南還重戴酒天河眞見使星廻二南徐軍鎭海門青十載分巡舊理刑歸假不忘三徑樂雨餘秋水上空亭錄别次韵南風吹雨一舟輕百里隋河載雨行恨别涇園沈公子陽關只唱第三聲二裁向嵩陽看落雲青楓江上又辭君此行將到衡州去只恐衡南少雁羣姜十七宅食魚得湖西節使施公書并有所貽率然代意成二絶句江風吹暖石芙蕖午幔清樽鱠鯉魚時開篋子頻頻看爲有湖西節使書二湖西節使擁旌旄尺素殷勤問紵袍怪底魚梭能破壁銜來金錯美人刀題影幛玉樹蘢蔥照綠苔鴛鴦湖上石城隈是誰寫出滄洲意錯認麻姑渡海來過張六四丈草堂看菊作梁父行吟七十年草堂居士興蕭然重尋舊院秋花裏知在横河古樹邉二西上横河舊草堂尚書庭院菊花坊門前銀杏如相待才到秋來黄又黄溯宣城青溪過響山作宣城城下泛清溪苦竹黄茅兩㟁低行到響山山盡處清猿野鶴一時啼登寄雲樓懷愚山謝眺髙樓倚夕曛樓頭長寄敬亭雲我來吟盡雲齊句那得臨風把似君送友之崇陽二月春風吹客裝故人西上古崇陽武昌門外新栽栁何處相思不斷腸客舍客舍桃花井上飛主人小女善縫衣只憐千里江南路換盡春衫未得歸鎭江城下作毎度吳關增客愁江山無恙古徐州萬嵗樓前雲乍合千秋橋下水爭流同徐二十二嗣定朱三驊元馮大之京商二十八衮黄吉出巴山北城晩眺口號巴山城外晩生烟一望寒林興渺然何處野祠延佇久黄坡西下北門前二丘樊幾疊暮樓鴉楓樹南頭舊狹斜落日巴山歸路晩與君同醉杜秋家三朝天門外路漫漫錦樹丹楓醉後還最是望中愁不盡一重雲樹一重山姜九榦畵寒鳬聽雨圖見寄五月南湖泛野鳬田田荷葉間青蒲雨中多少相思處寄作寒鳬聽雨圖雜詩汴水西園値暮春雍丘古道駐征輪道上久無盤埒馬園中尚有看花人平臺漫感司馬西行狗監猜鄒陽新上一書回可憐千載賢王客不爲平臺賦雪來清豐江梨花清豐江上馬頻嘶萬樹梨花曉渡迷記得瀫溪寒食後落花如雪過溪西爲張公子玉樹贈字并詩菁蔥玉樹映朱扉太傅功名世所稀欲問比來江左事謝家子弟在烏衣題畵冊茅屋遠開修竹外板橋初見杏花時前村野老爭相過流水灣環幾度思題櫟園藏畵頁子溪山羃羃路綿綿不到雲門已十年認得數株黄杏樹辯才墳畔寺橋邊西河集卷一百三十九
