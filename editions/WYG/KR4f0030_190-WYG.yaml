body:
  text: 西河集巻一百九十翰林院檢討毛竒齡撰五言三韻律漫作好古不捜隱離居敢患貧憂愁損道徳思慮苦精神釋餌還垂釣行歌以負薪扶南曲歌詞三首瓊欄開寳瑟玉柱動金絲流臉廻羞際含嚬送態時坐逺聞聲細彈多入弄遲嬌歌金屋裏妙舞玉堦前笛煖如含蘂􅝩花似踏蓮春風時度響夜月更流妍試馬環俱墮凭箏袖有紋花隂齊却扇草短故翻裙後苑饒行樂千秋奉聖君答寄䢴上劉雨峰逺貽公幹膺時譽劉生受世知文傳豪士賦家近漢王陂貽我雙瓊玉臨風解珮絲攬勝高三楚興懷及九秋披襟揚子渡振筆大河流何日尋劉表荆門駐桂舟暫憇北幹村接得剡知勃安子搆天章昭華龍質并勃安令子書問悵然累日避地懷終悔還鄉憇舊廬三年游子痛一紙故人書道逺誰須友天涯尙念予遙劄從誰寄探懷看復驚語多思宛轉感至記分明聞道朱銓部于今返上京答大敬綠白不相宜寒匏苦自知百年雙鳯羽三嘆五羊皮只羡梁鴻案何須蘇氏辭戯贈贅壻歸里春雨絲絲落清江細細流鹿車歸故里鵲羽度中洲婦已工鞶帨人如解贅疣客壻為家壻新姝即舊姝岐陽驅吕尚稷下返淳于帶笑遮紈扇擕兒見舅姑九日九日匡廬下征帆尙未開但看青嶂立不見白衣來兩年彭澤縣眞負菊花桮贈送吳明府千室能為宰三年未有家傾城來祖帳載石上仙槎歸早須栽柳行遲正及𤓰詢王三雅禮消息不得不見王生乆傳聞又逺行兩􅂈芳樂苑一上岳陽城懷袖三年字烟波萬里情五嶽游難到三亭使漸稀臨淮吾未去横海爾安歸朝露沾天下秋蓬捲地飛旅寺萬里江關客三秋祗樹林竿旌心極逺衣線淚融深日畫朝陽影時聽晩磬音即事綠縷搓園柳紅裙擘井桃樓前廻馬勒池上理鴉毛隔囿山逾翠當杯興轉豪東墅東墅聽箏後南湖盪槳時荒園啼鳥雀高閣閉罘罳草長尋春晩花深下日遲寄南士白魚潭春嶂開紅藥秋潭跳白魚人傳平子賦家受石公書何日同相訪山隂道士廬立秋夕裁與嘆徂暑又復詠招商那得秋衣換空看露葉光晩雲停乍薄夜氣坐生涼新律移天道清颸度客闈河間星女煥林下暮蟬微自恨同梧樹先驚一葉飛漫興且飲南鄰酒頻尋北塶歡山花猶晩發壚婦耐勤看夜月來朝景秋風起歲寒襍詩古寺依山勝名園接水遙野橋穿樹杪村女弄桑條風定絲難墮江空日愈搖游峭石山亭峭石横江口臨崖置草亭大江來泛泛叢樹覆青青鳥雀江邊噪烟雲亭下生同諸公飲維揚劉孝亷宅綠柳覆隋堤金尊泛竹西屏深歌扇小語細燭枝低人是愁中遇詩從醉後題聽薛婉絃索不道雷塘夜還聽趙壁彈江高飛雨急衣動落星寒一撥三囘住非因識曲難七夕盼織女天上佳期少人間别恨多一身長作客此夕枉臨河未許穿金線誰當停玉梭隔歲投銀渚終宵望綵雲平橋烏鵲散故國女牛分何日乘槎去天邊一問君同徽之西美以重自湖寺晩歸過大聲園湖近來幽訪城高上夕陽鳥聲春到雜人影暮歸長欲過新營墅先停古道塲對酒偶成寄友題書嬾看天作問遲新游多未識前事每經思不耐聽歌後無如對酒時將行示家人莫謂將離逺相牽淚滿衣時違遺世晩貧乆住家稀試看庭前草年年上掩扉小苑小苑連山起平欄入水浮花低時觸㡌藤蔓好維舟黄鳥墻隂囀紅箏座上留蔡以敬處士郊園桃李三年盛湖山一卧長種蔬逢好雨送客在殘陽何日還鄰汝西郊舊草堂西洲渡吾愛西洲渡當壚候客程橋門映水直釵柱壓花横春情問深淺波面綠痕生重過清江訪施湖西宿石溪寺作去歲去湖西清江草色齊今來尋碧嶂江雨又凄凄何事留江郡逡廵上石溪祗為經年别難忘千載情不因歸國緩豈是愛江清朝雨隨人至春雲滿寺生雨過春城暗雲深古寺開毛甡留榻處盧肇讀書臺山色門邊起江聲城外來西子西子持紗女羅敷賣酒家衣紅因染茜足濕為澆花江上商船繫門間闔扇斜晩春郊行綠水前溪漲丹花出郭稀柳邊門影靜日下雨絲飛村店重沽酒山亭一換衣同南士宿西資僧房古寺清秋暮羈人共夜闌桫欏雙樹静梵唄一聲寒龍定開鐘鼓烏棲下井榦重經弋陽山水不盡江山好重經歲序更萬山午雨歇一路夏雲生豈有浮家戀長隨估舶行綠水灘仍漲青山黛自浮新禽洲上出舊寺夢中游一日重經意千秋萬載愁八月十五夜懷人涼夜静無烟清宵一鏡圓自推瑤海上長挂畵樓前不共佳人望于今十五年中秋夜眞州望月懷張五客解州涼月中秋好天涯一望愁關山堆雪滿河海盪金流何處同相憶眞州與解州觀競渡每恨浮江日重看競渡時數舟迎甲士兩㟁走童兒斾影雲間起簫聲浪裏吹棹發驚波逺龍過激水遙記觀淮海渡似弄浙江潮厭甚流華競悲哉樹錦標斜日爭飛鷁清灘起和歌樓官張席綺漿女濕衣羅誰信三閭在中流喚奈何山家青山低北寨碧水到南庄夜虎仙人杏春鳩帝女桑村烟浮谷口林樹見潯陽半卸頭效宫體詩佳人最可憐莫若半卸頭開函雙釧落束髻一釵留紅裳嬌不卸停燈憶逺遊半上頭誰家小女子半作上頭來髮短鬟猶束鈿低額未開私問釵茸小何得作重臺七言三韻律西林橋畔西林橋畔最堪思石路參差接野祠畵舫過時波似縠油車散盡雨如絲為送佳人渡湖去曾來橋上立多時題陳左軍别墅幾曾射獵藍田外但見樓船横海囘偶倚水亭臨水曲便裁花檻對花開春深繫馬花間樹日暮呼鷹水上臺社山村雨後動朝暉山北山南有報祈野老擕錢皆盡醉嗟予割肉未懷歸勾龍布穀祠前舞新燕尋巢屋裏飛送張杉赴晉州幕三首張子西游秦晉間朔風吹雪度江關驛亭柳葉誰堪把幕府蓮花爾自攀腰下羊頭三尺鞘近前雙紐是刀環使君擁篲解梁州才子輕車汗漫游管記肯同阮瑀幕依人還向仲宣樓計程傍臘過河水何日乘春下隴頭鍼線密縫慈母意韋絃兩佩故人心長淮雪霽冰魚合臨晉風多塞鳥深每欲下帷留郗子可堪倚馬送陳琳九日登四望臺北幹山頭野菊開登高載酒且徘徊故鄉猶遇重陽日新磴能通四望臺況自舊游人散後十年不上此山來飲壚下作流落天涯年復年酒徒招我醉花前廬江小婦偏能美洛下名姝實可憐呉寵人前歌碧玉蕭叢臉際似紅蓮山隂余氏女避兵南鄰就家母論諷陶潛詩且出手書陶集相示母以命甡曾與班姬較石渠可憐避地到荒閭暫為老母高堂客偏愛淵明處士書翠帶縈㡘抽綠草臙脂畵字艶紅蕖雨歇口吟黄梅雨歇在村西裁見晨光鳩復啼江郭幾重林裏霧柴門一線屐頭泥春潮渡馬浮來濶曉閣懷人望去迷墻桃為東風所落旅舘緋桃似早霞春風昨夜度來賖起看枝上留殘蒂最恨池西聚落花布席不須開左幌登墻空自戀東家淮寓謝友人各餽淮酒玉瓮銀缸慰客懷依然進食在天涯深慙屈子醒何用但作劉伶死便埋終歲無家難去楚一朝有酒竟如淮黄媛介入越感贈漂泊明湖又一年寒花相對意茫然三秋病入蒹葭路八口貧隨書畵船南國乆無劉妹賦東征應有惠姬篇重過楊橋湘湖風起皺生潮十里平山一望遥坐趂涼風過湖曲重隨枯柳卧楊橋紅亭東去人猶在白鷺西飛影未消即事龍岡南下大江隈一日江頭醉一囘堤邊浣婦堆紅粉竹裏村酤泛白醅貼水浮萍隨棹合中流野鴨近船廻書亭壁二首有序縣城西十里永興道到江為縣人送行地曾于此送二客不能忘今茲二十年後物改人非送亦匪舊孱躬經行觸憶生感聊占小律書亭壁云爾望京門外長亭路鎭海樓邊古驛臺􅔉􅔉朝陽從地起浮浮春色滿江來當年送客躊躇處無數桃花雨後開城西舊有三清閣道上分排幾處祠遍地草花紅漫漫參天楊柳碧絲絲曾來閣上凭欄乆正是祠前送客時與美人著棋代語二首礱晶作子玉為盤直直横横仔細安纎指㸃來紅甲冷清瞳溜落碧波寒袖長翻却重排易手快停將欲換難明星朗朗布東廂就裏聰明無過娘珠串乍連懸作結玉欄不斷打成墻沉吟慢理眉間粉懊惱將輸臂上璫代美人答粉豆紋楸解寂寥眼清心格又條條守𤣥便已知吾勝失彩何妨乞汝饒阿嫂􅉬行猶有待嗟君虎口不曾超謝友赴揚州幕水亭高瀉玉壼冰六月逢君下廣陵作賦參軍推鮑照辟人太守有陳登竹西歌吹應難歇幕下圖書愧未能孔渡驛寄䖍州周使君三首䖍陽雲樹鬱蒼蒼萬里秋風雁路長重到臨川尋内史每從南郡憶周郎去年曾在章江夜十八灘前再舉觴聞君長向崆峒望我亦將尋嶺嶠來寒歲兩經安吉路清秋一上鬱孤臺雖無蕙草江邊寄應見梅花郡裏開篋中尙載燕都草川上遥看贛浦雲酤酒輙思紅舫醉裁書猶有碧蒲紋願因孔渡知津吏寄與䖍州賢使君遇蕃仙采山堂作何處秋風度桂枝王孫遲暮不勝悲可憐花院人逢日正是亭臯葉下時嚴助上書須及早劉伶飲酒莫敎遲龍安嬌女曲二首左家嬌女鎖金繩來拜龍安寺裏僧踏索誤翻銜食雀隔牕驚聽撲紗蠅欲登鈴閣行還住羞入珠龕喚不應嬌女初來禮佛牙額頭剪髮尙垂髿從瞻白象能銜菓只問黄金好鑄花游人指顧爭相語云是墻東刺史家壽張母金鳯為寇霞作裾萱花五月北堂居自歸桓氏曾提甕為念王孫只倚閭時張宦游未歸拜母可通雞黍約稱觴願獻榖城書泛艇春風泛艇若耶西細草繁花處處迷近㟁水牕紅槅小滿墻村女綠鬟低林邊獵火飛春犬竹下炊烟唱午雞小艇小艇紅油一棹横平橋水滿綠紋生樹欹不礙斜穿入花底偏宜仰卧行山舘再停應有恨鄰船一笑亦多情丹旐詞二首蕭蕭古樹落朝星駟馬城西悲欲停仙姥乘雲還昊闕使君扶櫬到江亭引將丹旐廻樊口送去哀風滿洞庭荒城松栢晝生隂松下誰為丹旐吟執紼行歌虞殯意褰帷上道使君心陳芻不盡川原草却賻還辭暮夜金九日登樓示王生登樓何處送將歸縹緲長帆帶落暉對酒漫愁江樹逺捲簾時訝塞鴻稀偶同陶令探黄菊最愛王家有白衣奉贈華葢山鄒尊師二首清都仙觀華峰頭高峙金銀十二樓紫玉欄邊晞綠髮碧桃花下卧青牛何年示我三門訣共向蓬山頂上遊華葢山人八寳􅃣紫霄宫府自盤桓虎衣嬌女彈金瑟龍節仙官降石壇何年賜我盈箱藥使我乘風生羽翰暫投湖墅吳氏園喜倪内史璠姚文學際恒對酒即席賦贈二首高㑹正當湖墅曲良朝剛及暮秋天可憐張儉還鄉日猶是黄公對酒年流水尚環佛閣後垂楊仍在市樓前豈為慱文思巨濟每因讀易想姚平游來不記亡三篋老去何曾擁百城此際喜看行秘在相逢莫惜酒盃傾六言詩短歌行并序輾轉日復日日廹人逺修游之期難矣誰為為之離丘蔓草生花南近溪流若耶吳宫美人東家曾過前溪浣紗朝日陽春麗華相逢宛轉輕車可憐中道蹉跎前溪日凋朱荷斜日秋風奈何誰為為之若何破陣樂詞商調曲漢兵西出蕭關十里旌旗蔽山列陣如雲既破分弓却月能彎鎧虱自飛銀鎖介馬長銜鐵環金闕賢王欵入玉門大將生還僧舍除夕答沈傚見懷原韻繞屋數竿修竹臨流幾樹梅花客程無限幽思僧舍依然舊家栢椀暗浮綠醑蓮燈深罩紅紗且留今夕歡宴安問明朝歲華嶺外梅花未寄江南柳色將舒故園春信難到客裏殘年又除鐘磬幽尋僧臘辛椒儼傍齋居憐君念我意氣浩浩淮流勿如行横山過華嚴寺溪北溪南佛寺山前山後人家望去千村紅樹行來一片丹霞湖上吟西子湖頭盪槳陸公祠下當壚不是盧家少婦也勝青溪小姑雨後山桃舒蕚風前堤柳垂條正月看將二月一橋行過三橋送客梁父城邊走馬袁公浦口揚舲送君十里五里同上長亭短亭西河集巻一百九十
