body:
  text: 西河集巻五十八翰林院檢討毛竒齡撰引迴文集引迴文者詩中一體也幼時製雙帶子喜遷鶯詞故作迴文體以示狡獪既而悔之然而才人伎倆何所不有璿璣雖不可再而五七字間偶亦顛倒是亦文心縱變所有事矣張子東亭每以是體為倡酬動輒盈卷聞舊刻已付鬱攸近復合格律二詩并樂府絶句彚為一家言才人豈可量乎山隂閨秀張楚纕工是體曽過始寜徐大司馬傳是齋中把筆作迴文古詩而予門徐昭華者即司馬公女孫也為題其篇曰曲江比下筆流水作迴文書十字訖即輟筆觀者訝之曰是㡳言何為不置可否盖不疑其亦迴文也予恨老去不能復作詞如幼小時事而題筆又艱未遑猝應祇逺述舊聞以留此集中作一佳話旁觀者或亦諒之陶簠指頭書畫引凡書畫以指而必有具古用刀今用筆皆具也自心書意畫之説起有畫腹者有壁掃作字者有用指戴為虎爪文者有以頭濡墨寫草書者有脚蹴手捫成潑墨畫者而具亡矣陶簠曰吾安用具哉得魚亡筌行千里者棄其行縢吾請以指頭行之天下有攘工倕之削折逄門氏之弓與之相遇于中原而以爪觸堊以飛蓬相抵擲而猶有藉者此非一指頭禪乎吾見之喜而為之書徐克家涉江草引毛甡游江表不得已也徐子亦不得已而游江表乃以十年來所不能逄之故國者而日相遇于荆闗楚水之間登臨唱酬積其所為詩名曰涉江徐子其有繼騷之心乎當徐子居越時鷹揚藝林與薄海賢豪爭雄長假使魏太子仍開鄴園徐子非徐幹哉越二十餘年而不遇太子冠切雲之冠紆遲南荒涉江云淹回水而凝滯兮豈非其凝滯有足悲者與建安諸君子並起辭藻嘗自謂能比蹤騷雅而既而中落致令孔璋擬相如而不得也所傳者偉長一家言耳毛甡當勞憂之餘損其所為心惟恐思煩情敝驟致隕落故于其感興而輒棄去此如醉裏聴蠅聲波間翫花色嗒然而已矣徐子獨流連興㑹于情之所至而文隨之雖猶是偉長論世之思乎然以之繼騷有何憾焉季跪小品制文引韓愈為毛頴傳人皆笑之獨栁州刺史嘆為竒文此則梓人槖駞之所由昉也苐今之為文者好持大體動以語句之偏全而分為鉅細彼其心思質木摶折無象遇危言正舉猶且趦趄囁嚅格格不下苟一旦頰頥將承齒牙未盡足欲步而過却目方馳而若留涓涓初下江河具來鱗爪未全風雲頓起則雖素稱哲匠窮極窈渺孰不相顧咨嗟拱手謝去然則文之有大小亦猶心之有敏鈍也季跪為大文乆已行世而間亦降為小品嘗見其座中譚義鋒發齊諧多變私嘆為莊生淳于滑稽之雄及進而窺其所著則一徃譎􅀈至今讀西遊續記猶舌撟然不下也技之小者非巨才勿精向使季跪所作非四子書題為時所習亦但若向之所為續西遊者則安知世無見毛頴而笑者矣重修息縣恊天祠右廂觀音閣募引息之治東南有恊天祠古也祠側樹碣志明萬厯間重修而不詳所始及搜廡下斷石得宋元祐辛夘雷跡碑記雷車之文剝蝕隠隠然後知其從來逺也但祠舊有左右廂而中丁兵灾左廂則先成三楹右廂闕然觀之者左右臂不齊如偏痺焉住持開悟者戒僧也禱之恊天前謀廂其右且因而層之下祠火神而以其上為觀音閣火神以戒觀音者所以感與息連歳不登地蕪穢未治居民良而苦瘠雖好施乎將曷厝諸然而語有云累黍而成尺累土而成室當明萬厯間有長吏鄭君者實為率修而士大夫和成之今之長兹土與士大夫之居是邦者毋論善作者善感睹兹偏痺有不興鍼灼之思者乎則為累黍而累土焉必也予游息與息之士大夫交遂以交息之長吏知皆賢好施者且假寓兹祠凢三十日知住持亦賢可施予因應住持請而為之告之如此懐山書言引懐山相對時若深山道流絶無音聲及其發之也而洋洋然傚晉代清談能作數十萬言懐山口授僧開手書不自知其手之狎而板之續也徃見懐山有書言錄既而得見其歴游所記布棊測象議若潰捍又既而窺其裝則遥篇曼冊穴紙而編焉于是懐山彚其帙請為之叙予嘗疑步兵中散既淪鑒埋昭以嘿成為道似不得寓詞託諷致與物忤及觀其夜中不寐起坐彈琴流連于安樂利貞之間慷慨于代謝差馳之故寄言蓬池眷念山阿然後知其情深也懐山志懐天下事其所可語者語之其不可語者手劃而心開已耳爾乃跢跦道路一發其情于談天指日之間是即不必與物忤乎然何致所在謇塞竟與廟中之金狄共銘背者哉聞人山人印章譜引杜預作峴山碑一樹之巔一湛之淵惟恐其不傳也故山雞見影而喜緱山之雉必留其跡而後去回道人過巴陵使巴陵市人圗其形容盖工其工者遺其斵理固然矣聞人山人工印章自鼎鐘秦漢以逮唐宋皆能心憶而手追之且復譜所勒以傳于世一如古人之編韻而集氏焉者何珍惜已甚乎世人好古文每欲變殳𨽻而襍以篆籀予甚疑之山人皆慷慨魚睨棄置勿道至其把鐵如柱號呼䃲礴恍前有岣嶁後有石鼓極離竒譎怪而不舛于法以彼其技宜隨所摩畫當無所不得于世而復乞予言以為之引亦曰非予言或不足以動巴陵市上人也合置社頭張十一郎官二祀田引月令擇日命社所以祈也而良耜之詩秋而報功今社無祈報矣比社則苐遴歳之良日不分春若秋設為社祀而吾邑首社則猶在元夕之旦吹笙設燔婆娑而饗之此豈元辰擇社之遺與顧八蜡與社表裏而田坊水庸則嘗列之六七之數今無蜡并無坊水庸也邑瀕海近魚禾稼是憂考邑有䕶堤侯張十一郎官者在吳越王時其父亮為刑部尚書而侯以任子起家宋景祐間錢唐水淫侯由工部郎綂捍江五指揮使䕶堤有功因侯而没乃祠之今俗稱張六五侯則十一之互文也夫祀典能捍大患即祀之况侯死而所在能神則生其後者殷其禮亦以明報而社祀在首春之十五日侯祀在末春之六日里中人有秩其文奠其典例而預合其錢以為祀田者夫猶之通報于祈而在春則暇而可行在秋冬則不暇而不可行而以司糓抵社以侯之䕶堤抵八蜡之二但舉夫春祈而若竟忘其秋報之意夫亦神惠廣廣丐其所施而不敢自名其何以答也則夫合兩祀而置以田豈無義焉何孝子傳竒引人不識申包而識伍胥不識京兆三王而識包待制不識孫賔石王成而識公孫杵臼則以爨演之易傳也古來正史所未詳者多藉之稗官而稗官又闕辭人騷士咏嘆以傳之所稱鼓子詞非耶今其詞又不可得而傳竒雜劇登塲㸑演較之咏嘆之播揚感發尤㨗故予每欲以近代軼事或有裨于世而不盡傳者皆假是法以傳之而未之逮也鄉之先有何孝子者其事已見于故明孝廟實錄及府縣志而惟恐新史未採浸乆失實予向已為傳傳之復擬作長短歌句編記其本末若謡若諺彷彿古焦仲卿妻以當夫調笑鼓子諸詞而近觀謝氏所為傳竒且有先我而為此者人雖不欲以孝子為伍胥以曹大理為包待制以王鼎叅政為公孫杵臼不可得也夫㸑演之感人甚矣今有家不悦于親出不順于朋友冠裾回慝秉性忮害似非保恵誥誡所能引激而一旦過勾欄見忠孝節義遺事目觸而心悲初絢于眶既而溢于睫又既而涕唾垂頦雪前襟而觀口訟心愬一若身處其地而必欲為之較量而不可已者豈其人則善變哉誠觸之者有殊而感之者有異也時之為傳竒者苐極合離而正史所載則又懼以演義失實致掩本事有如此之愷覈而詳明者乎昔元詞以十二科取士原有忠臣烈士孝義亷節諸條不盡崔徽麗情也讀孝子傳竒而不知其有裨于世也則請過勾欄而觀之可已修建十種功徳募引佛乗多名目四流五衍六度八正不可稱數而其近人情而可舉行者則惟十種功徳為良云夫功徳以十計合之則已細而分之又甚煩然而九功三徳先王已先佛言之故空門非空而功徳所建則空也而實行焉如曰行不捨之檀唱無緣之財可以資萬有而利百物是匱守也恒公空門之賢者也以十種功徳發願修建予按其目福國報本也修圮橋修路則除道與成梁也接行旅者郊里之委積以待賔客也放生不殺蟄不妖夭也施老孤先無告也飯獄者恤獄也賑饑濟渇藥疾一則懲荒一則救暍其一則掌醫政令以治六癘也設槥而掩骼除其骴而給其器也凢此何一非王政之大者而王者不行而佛氏行之佛氏不必行而恒公以佛氏之意果行之人不知佛獨不知王者乎夫大功不獨成大徳不獨舉學士好言大同而王政之行必操之自上惟佛家求助即使卓地得水開盂指米猶將藉之給孤之施與波斯之捨則夫君子耻獨為九功三徳何難各分之而載半去與東亭文稿選引叔氏御先與予讀書于城東之東亭初未嘗不思有用既而俱不用乃予以亡名棄筆墨如敝屣而叔氏避人山阿不忍以不用之故盡捐其技于是輯其平時所為文選為一巻予受而悲之古有不必用而預為有用地者伊吕是也彼其視天下之事一如已事初何嘗有用舍之可分而用而行之一不用而摩厲以須此其人即獨處一室猶然家國之是謀而君民之是計也是亦何藝文之可自遣者而不敢傚也乃亦有不用而即自甘于無用嵇與阮是也以彼輕世肆志惟恐文之有耀於其身而務為緘嘿以終流年盱盱墨墨舍雕而刋華所稱達生非耶然又非吾所欲處也夫田父以作勞而談徃事學士以無用而弄筆墨譬之獵鳥禽者材官蹶張既無所從施而又不忍自棄其翹闗之用于是拈絲􅀢矢徘徊于林莽以仰飛鴻而左右射此即在旁人見之猶不能無沉淪之感與牢落之思而况其與俱而與棄者也然則世之妬其技而不早為用之者亦獨何矣殉難錄引崇禎甲申年石介云人有死物有盡其氣烈烈然亘萬古而長在非殉難諸公之謂耶死者澌也人孰不死死而即于散獨諸公炯然在天地焄􅀢悽愴雖僅竹册所記述相對奕奕即欲與天地同其開閤與日月同其顯晦與江河同其通塞不可得也少時與兩徐子游每聴口道諸殉難事輒心驚今二十年來失足濁淖汙泥中中䧟者屢矣讀小徐子所輯錄得再聆曩時所稱諸君子者槭然動于心嗟乎諸君子不朽矣小徐子亦不朽石介不云乎在晉為董史筆在漢成帝朝為朱雲檻在唐為段太尉擊朱泚笏為韓愈論佛骨上表予謂在宋為文丞相正氣歌在今為小徐子殉難錄而已矣小徐子勉之竹册所紀述神靈憑焉慎勿輕予以增損而務為傳信可也重修文昌祠引自文昌一星位天樞上躋三階而排太一宣布經緯而後之行文家必稱曰文章主云然嘗攷他書蜀之梓潼有神名北郭生實掌文昌職貢舉司錄事故更名文昌曰梓潼君而文昌化錄又稱張氏孝仲張弓挾彈彷彿古髙禖氏者而彈音同誕誕子者禱之要其神即文昌也然則文昌之為神舊矣城東有文昌祠舊在漢前將軍祠右以世之祠將軍者必偶以文而道家每稱將軍受帝命監試闈事與文昌典桂籍實相左右以故士之膺鄉舉里選以文進身者嘗並祀焉而其後以兵燬也近年以來時移事易舉夫所見所聞均非其舊而苐當髙臺既傾曲池既平之後猶復有神祠廟貎幸還故觀即其際已不能無流連今昔之思况祠禖祈禄尤生人之所不能暫已者與祠舊榜梓潼而梓潼當西蜀亡時無所因依遂神游崆峒飄颻不歸今蕭山雖褊而神來最靈崆峒遼逺非神所安也且文昌位天樞上雖天街煥然明星仰首可接又何如攝衣而親承之為愈矣邑人修祠者已立簿書而屬予為引某月日某引百步寺募齋板引埭之南有山曰筆峯其椒之隂有紺宫嶐嵸曰百步寺寺所始不可按也僧曰舊藏寺谷間而其後中廢而遷道左去故址焉近年以來復建其寺于故處而聚其徒以居又曰吾故處安在哉吾可徒處此而坐使面壁之學同于面墻因鍵白板獨鍊五門而閟之迄于今三年矣夫寒嵒幽壑本已寂歴而又閟之以𤣥闗獨叩之地其有所得吾不得而知也苐其事方圓而其願已滿則因功証功固將闡八正以究三乘而假使摩竭啟室大集其徒而利導之而香積之飯不施伊蒲之餐不設縱有般若其何以濟昔者祗陀舊林如來受供凢無漏以下悉得食波斯施飯而阿難無分遂有沿城托鉢之憾今其徒坌集未必皆無漏也持鉢來前得毋有無分而興悲者乎予嘗寓埭上一詣其寺知其僧類有道者而居士黄君則又有金剛講㑹曾請予序之而今以募齋而重為請也故既為引端且書其板弁首姜尚父行書續刻弁首尚父再挾策隨計車走魯及齊宿清泉之浦為文若干篇心思要𦕈穿土達石就其所到可使清浮下陵而風飈上舉制義之絶事也徃時尚父闈牘并行書為天下所稱其受尚書一經者則又私相傾倒以為秘本予念其生平每嘆文章貴獨行耳揣摩無為也揣摩而遇不失楚人量權測情之㫖其不遇裘敝而已矣尚父文非其騐耶今尚父逡廵計車乃益復倔強為此續刻古云啾發投曲徒感耳之聲因勢合變徒偶時之技夫宫商善徙時數遷而不易其音審飭易更工屢移而不渝其器豈非黄門之佳弄英雄之竒技哉王阮亭詩集弁首徃在湖西與施君少叅論輯天下諸名家詩指所一折為新城王阮亭既已購阮亭所刻集闔石溪佛寺畫五日程遴錄標置略當就緒㑹以他事去湖西遂不果决暨予暫還臨安重與丁儀曹論踵其事而未得也今年春從汝南還道經呉江訪顧子茂倫于維舟之頃因得重讀阮亭所為詩盖茂倫方輯山左四家集而以阮亭詩示子掎引者也予徃讀阮亭詩時嘆阮亭詩軼氣凌上曠情絶物環彪被炳雲族霧散擷枚馬之麗藻抒曹王之風流亦既上擬安初下陵開寳當代詞塲罕有其匹今乃知其鬰于情者深萃于文者備也夫世所謂情逾于文者謂其披質無華導思寡藴經露之色刋諸賦詠探幽微于一隙揮萬有為無事自恃筋力鮮章程矣其或文不逮情則必修詞靡曼無當體要哀艶兼工難于中曲夸徃烈之有餘飾今思之未至徒逞妍文坐得躓理豈有才髙意略舉體流美情深婉約而詞㫖䟽亮兼怨雅之能極崇庳之致猶謂潘陸並羙無尚平原顔謝同稱勿推康樂未敢出也夫茂倫者人倫之雅鑒品目之善裁也其評阮亭詩猶夫翰林之于士衡上人之于客兒也使他日者從山左諸家而廣推之當復標置新城鋪揚海内夫譜詩于江西者非江西詩也吹香詞弁首屈平宋玉不為散文也假為散文必能為子長之史賈誼之策平原與康樂不為詞也假為詞必能為温韋之小曲周秦之曼調盖才不必其兼通而亦無所於偏致東不責之西方不棄以規也今天下多畸尚矣習散文者斥儷辭好詩歌者憎曲調已即不足而嘗訾人之有餘猶之饜辛椒之烈者翻嫌芍藥不善和襲蕡蔴之䟽者必謂纂組無所用有是理乎吳子伯憩工儷辭既已克揚壯采頡頏雕龍繡虎間乃復遺其弱采為喁喁之音壯弱不同同凖于艶此真挽鑿山為琢脂傾陸海而流膏者與唐時温韋稱才子而韓栁李杜反不與焉以其獨能艶也伯憩掞華披藻艶才特絶世或以喁喁少之予謂伯憇所歉者非是也伯憇世嬗勲爵志在有為平原以不嗣遜抗為憾康樂以祖徳未述致嘅其生平紆鬰應自有在若夫棄柔情而譚正則非謝陸所難也閨房粉黛賢豪寄感夫不有望暮雲而動京國之思詠瓊樓而起宫閨之嘆者乎西河集巻五十八
