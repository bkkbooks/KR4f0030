body:
  text: 西河集巻一百二十二翰林院檢討毛竒齡撰辨聖學非道學文聖學不明乆矣聖以道為學而學進於道然不名道學凡道學兩字六經皆分見之即或併見亦袛稱學道而不稱道學如所云君子學道小人學道葢以學該道而不以道該學其在論語則曰君子學以致其道而在學記則曰人不學不知道如是而已惟道家者流自鬻子老子而下凡書七十八部合三百二十五巻雖傳布在世而官不立學不能羣萃州處朝夕肄業以成其學事袛私相授受以隂行其教謂之道學道學者雖曰以道為學實道家之學也故隋書經籍志明云黄帝大道但傳之其人而不立師説惟漢時曹參薦葢公能言黄老而文帝師之于是有道學一派倡始兩漢而魏晉以降六季最盛如陳書儒林傳載梁簡文甞置宴殿堂集𤣥儒兩家之士先命道學互相質難此正清言肆出道學盛行之際然猶𤣥儒兩判無溷雜者是以道書有道學傳專載道學人分居道觀名為道士士者學人之稱而琅書經曰士者何理也身心順理惟道之從是名道學又謂之理學宋儒言理始此逮至北宋而陳摶以華山道士自號希夷與种放李溉輩張大其學竟搜道書無極尊經及張角九宫倡太極河洛諸教作道學綱宗而周敦頤邵雍與程顥兄弟師之遂簒道教于儒書之間其説詳見予河洛原舛及太極遺議諸文又佛書禪源詮集亦載太極圖名阿犂耶識相傳周濓溪亦受之了元禪師者今遺議不載至南宋朱熹直匄史官洪邁為陳摶特立一名臣大傳而周程諸子則又倡道學總傳于宋史中使道學變作儒學凡南宋儒人皆以得附希夷道學為幸如朱氏寄陸子静書云熹衰病益深幸叨祠禄遂為希夷直下孫良以自慶又答呂子約書云熹再叨祠禄遂為希夷法眷冒忝之多不勝慚懼是道學本道家學兩漢始之厯代因之至華山而張大之而宋人則又死心塌地以依歸之其為非聖學斷斷如也向在史館同館官張烈倡言陽明非道學而予頗爭之謂道學異學不宜有陽明然陽明故儒也時徐司冦聞予言問道學是異學何耶予告之徐大驚急語其弟監修公暨史館總裁削道學名敕明史不立道學傳衹立儒林傳而以陽明𨽻勲爵出儒林外于是道學之名則從此削去為之一快當是時予辨陽明學總裁啟奏賴皇上聖明直諭守仁之學過髙有之未嘗與聖學有異同也于是衆論始定即史官尤侗作陽明傳其後史斷亦敢坦坦以共學適道取學道二字歸之陽明特聖學何在則終無實指之者予謂聖學之中原該道字初學聖人衹謂之學學聖既成即謂之道學者道之始道者學之終既非兩途又非兩事且並無兩功夫第從事于此而學在是道即在是焉是以聖學聖道只在忠恕雖子告子貢多學一貫祇是學字惟告曾子吾道一貫則全現道字然而道在忠恕學亦在忠恕忠者中也執道心以去人心恕者推也去人心以推道心此本堯舜禹湯相傳之道當時所稱道經者而聖門諸徒則皆受之以為學是忠恕二字合之道經十六字舉千聖百王賢愚治亂古今一貫者而祗以精一允執成學者之事則聖學之該聖道概可見矣然且允執之中全在去人心盡屏其自私自利之心以推其道心是道全藉學而忠又全藉乎恕道學忠恕總是一貫是以曽子忠恕曰吾道曰夫子之道一何鄭重而子貢以學該之祇一恕字如子貢曰一言而終身行一貫也道也曰其恕乎則祇恕也且以不欲勿施八字示之曰學恕已也又曰我不欲人之加諸我也吾亦欲無加諸人恕也而進乎道也曰非爾所及也恕固可進道而時則未也須學也乃終以博施濟衆為聖仁堯舜推忠行恕立聖道之極而夫子終以能近取譬歸之強恕謂忠之必藉乎恕道之必藉乎學有如此道學則不然並一道家而各立名目其在北宋曰主静清静教也曰立極無極之宗也曰涵養用敬則養以毓其氣敬以定其神葆祕之事也世無審動静探主宰且葆秘神氣而可云行聖學入聖道者至南宋云格物窮理則又竊儒書名目以隂抒其萬物之奥聖人至賾之道教其並非儒學早已顯著乃一聞聖道夫子之道而相顧茫然徒以萬殊一本當之夫萬殊一本佛家之萬法歸一也且亦籠統何着落及聞忠恕二字宜憬然矣乃猶疑借端曰此不過借學者盡已推已之目以著明之夫明指本心明明以學道一貫直本之堯舜以來共推共執之道心而猶曰借端是于當身且不知而欲其知道知學得乎況博施濟衆正推已之極為子貢終身行恕之終事並不髙逺大學明德必至新民中庸成已必至成物論語修已必至安人安百姓孟子獨善其身必至兼善天下即學記記學自九年大成後忽接曰夫然後足以化民易俗近者悦服而逺者懷之是博施濟衆正聖道之成為聖學中所有事而乃以子貢徒事高逺斥之則毫釐不知學道者故曰道學非聖學大須辨也然且以能近取譬亦作借端謂如釋氏説如標月指月雖不在指上亦欲隨指見月須恁地始得夫推心取譬求進聖仁亦甚平易切實何至如指月怳惚盡付借境况忠恕既借取譬又借一身所有並無着落七尺男子直等之隣人之醯已屬怪事又且指月之解出自圓覺經脩多羅教不惟道學兼唱佛説及其唱畢久之又云二三子以我為隠乎吾無隠乎爾翻然出席如此行逕直是佛氏舉動以宗門而行道教聖學掃地盡矣若聖道聖學諸書一貫論語一部無非忠恕之道且無非恕學其在前文已明白可見矣乃以大學言誠意忠也其止善去不善而無自私自利之心則恕也此即學也乃即以其學為絜矩推心度物極盡忠恕而明徳新民由身心意知以推之家國天下道皆一貫然而只一恕字曰所藏乎身不恕曰所惡乎下毋以事上無非恕也中庸亦然至誠忠也由明善致曲以推之動變即恕也亦即學也于是成已成物盡已性以盡物性天地位萬物育何者非一貫之道乃其學則始于忠恕曰忠恕違道不逺又只是恕曰施諸已而不願亦勿施于人且隨以所求未能鋪排恕字至于孟子則萬物皆備一貫也道也反身而誠則忠恕也然而強恕而行只是恕字葢學也而道在其中焉自孔孟不作道學專行聖道聖學其不明于世者越七百年于兹矣今一旦指出上自堯舜下及孔孟始終本末到處一貫時時可見人人可行無借無雜不疑不惑學以致道庶幾無媿後有學者其亦從此而進求焉可耳辨忠臣不徒死文忠者事君之則也論語曰臣事君以忠以者用也謂事君則用之然而何以用忠則經無明文惟春秋傳曰凡忠者于公家之利知無不為即謂之忠一似用忠不一凡所為之事苟利君國則無論大小難易無往不可以見忠是以韓詩有云以道化君為上忠以徳調君為次忠而春秋傳又曰楚子囊臨死一言不忘社稷便可謂忠故忠臣已事自唐虞至春秋不多概見乃由龍逄比干外經傳罕有祗左傳稱季文子相三君妾不衣帛馬不食粟推為忠臣論語問令尹子文仕已不喜慍舊令尹之政告新令尹而夫子特許其忠夫苐家無私畜與不私其官不忘諸官政亦初無化君之大衛社稷之重而六經表忠以此推首則夫事闗君國隨地見忠其不擇細小并無一定斷可知也乃不學之徒誤讀子夏所云事君能致其身語而謂為捐軀夫致身者服勤致死以身許國之謂也而捐軀也乎且誤認見危授命殺身成仁為忠臣之事夫志士仁人隨在立名凡君親兄友與一身名行皆是也而止忠臣之事也乎乃後儒無頼竟鑿然以必死歸之忠臣如魏徵有云但願為良臣不願為忠臣語一似忠臣止有死者夫忠臣不必死前亦既言之矣然而間有死者則必厚係于君事與國事而不得已而後死之未有君死亦死徒死其身而于君國兩無與而可言忠者禮記明曰為人臣者殺其身有益于君則為之殺其身無益于君則不為也葢死君死國至不得已而死之謂之殉難不謂之殉死其殉難奈何一曰死諫龍逄比干是也三代忠臣此為最著也然而韓詩以周公相孺子管仲相桓公俱不必死因有以伍員伏劒為死怨而汲黯戇直反得與東方諷諫同享忠名是死亦忠不死亦忠伊管不死不必遂逺遜逄干下也一曰以死衛君齊無知弑襄公徒人費禦賊而死于門嵇紹以晉帝蒙塵挺身捍衛而端冕而死此死君之無可議者顧公叔文子衛侯親許其以身捍君可不謂忠司馬續漢書極稱楊仁忠勇能持㦸以嚴衛宫門苐文子與仁未甞死也若夫齊逄丑父以貌類頃公而代公死漢之紀信假漢王之車以代漢王此皆身代君死者其亦忠矣然猶曰此必君佞幸與齊孟陽代諸兒同故左氏與漢史俱未稱之至于晉愍受毒登床哀號宋欽褫衣抱持哭泣此死君難者豫讓圖趙氏不憚漆身高漸離觸祖龍甘矐其目此為君復讎者然而晏嬰不死君難家語稱晏嬰忠臣張良復讎不死人尚稱張留侯始終忠于韓者凡此者雖皆殉難而死皆不得已而後死豈曰非忠然而有不死而亦仍曰忠以為無益于君則雖死不死固有懸殊而其為無益則無以異也况夫國事多端殉難不一齊莊公襲莒而杞梁死之魯師戰乘丘而縣賁父死之此轉戰而死于鬭者然未嘗與我戰則克者有等差也張巡守睢陽而百折不回李𤣥通管定州而屢誘無所詘此保地而死于守者然不必與開疆辟土者分同異也是故忠臣大節最重託孤荀息立奚齊卓子當濟忠貞然而季友之忠厯立般立閔而此身凝然不少動至散輔諸公子亡臣狐趙輩不失為忠而召忽殉難夫子反等之匹夫匹婦之諒其死重有益而不重無益至于如此至若宋人文信國謝枋得之死雖止一身名行不闗係國事然大節所在不是徒死正是殉難與齊王蠋之死燕師漢龔勝之死新莽之召前後一轍特是魯連不帝秦王裒不事晉不皆身死且祗名義士不名忠臣此與殉國難亦微有别者向時從六經諸子求一唐虞三代忠臣國亡身死者而必不可得無已庶或以夷齊當之然殊不相類按夷齊避紂久已歸周並非以商亡作殉死計者祗因諫周不合幾被殺身則義不可留因逃首陽然且採薇而食並未求死即死亦有為而死與今所云國亡身死者大别且此正是義士不是忠臣又且當時未必死論語祗稱餓首陽不稱餓死其曰死者郭象曰莊子之誤也乃自宋以後皆謂忠臣必死且無故而死並未甞殉難而祗是殉死謂之徒死夫父子不殉死禮有明文滅性傷生等之不孝若君臣殉死則三良殉秦詩人以婦寺目之未有徒死稱忠臣者而乃禮教不明江河日下無論在官在籍祗君死亦死國亡亦亡但知以一死塞責全不計與君事國事毫釐有益與否此則唐虞以後宋元以前並無此等不待言也然且身不在官名未通籍以無何之人苟非韋布即是襏襫目不見君王足不履殿陛亦復棄父母抛妻子以覓一死夫事君以忠謂事君則用之幾有不事君而亦用此者不讀孟子乎以顔淵而救民飢溺亦有何害乃論者譏之至比之披髪而救鄉隣之鬭題之曰惑夫惑者在本身為狂惑行事迷亂而在旁人則為駭惑以為凡事有分伊何人斯可妄作至此今無端求死以生前限分必不許其得共事者而今且捱身而入公然身死則其為狂惑為駭惑宜何如者乃今作表忠記者多載此等且更以用兵所在不幸冒刃者皆稱忠臣如此則長平之卒盡國殤矣顧作表忠者假冠予序恐觀者不諒謂顛倒名義自我輩始則寃抑尤甚故予于通辨之末一併及之西河集卷一百二十二
