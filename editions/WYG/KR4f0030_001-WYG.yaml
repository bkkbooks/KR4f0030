body:
  text: 西河集巻一翰林院檢討毛奇齡撰頌平滇頌有序自昔建武致治寵午奸兵貞觀昇平髙羅畔命大抵殷憂啓聖閟毖成功雖極盛隆猶不乏潢池盜弄升陵竊發之變獨是阿􅕌一倡亂而天雄成德綿蔓數世小波甫聚冦而應運化順環轉百出從未有鴟義撟䖍初逞卭僰犯顔逆節還擾江漢就其悖罔極之僭據而一敗荆湘再釁澧岳繼殄黔蜀終絶昆詔數年之間禍盡揃其敉寧耆定一若焫蓬沃炭飈奮霆擊桓桓􅡟虎旣迅且烈如今日者葢皇上神聖威武克詰無外四征之奮超于前古較之殷宗之于鬼戎周季之于西落罙入三載退修十䙫尚有餘勇是以廟堂之算奠之在中而師武臣之力擴之在外雖曰祖宗社稷實式憑之要之一人瞻言動在百里凡夫謐謀邃慮宵旰剸決真有非子孫臣庻所易窺者葢鑒之者宏而燭之者蚤也夫逆之佐命非有呂散之舊也其乞援來歸又未嘗有申包之泣温生之痛也祗以孌嬖被畧倉皇奔救鼷竄狼顧計無所復遂假羽校以自資而僥倖成功苴茅滇土寵畀親藩重緣外戚其為非分亦巳久矣從來非分之福居之不祥况復豺豕為心狠而易嬴初藉林樾以蚺䗊而既而私振其䯱髵以為隴漢之得原可望蜀九錫之進不止卣鬯遂侈然自恣以致無所忌憚外竊既久不受中撤故量其不臣之心撤亦反不撤亦反撤之則反速而患小不撤則反遲而患大患小則拔之如犛毫而患大則撼之如丘山自然之理也故夫智者先事而謀愚者昧時而動夫昧時而動則彼逆之所以失者視此矣先事而謀則我師之所以克者有在矣故夫小蠢初萌秦涼蜩應及乎既煽甌粤蠆發卒之長轡逺控四收八伏欽明萬㡬潛授妙畧先埽雍益預定閩番然後謀力雲㑹指麾風集并敵一嚮絶其瞻顧王敦貿武昌之形漢宏失荆南之勝洞庭既破則三苗南竄劒門大入而劉闢授首外有脣破齒缺之慮内有􅀈灰冰泮之戚然且挺走苴蘭徘徊蒙氏越碧鷄之關閉昆明之堞魚遊沸釡燕息捲幕一旦鉤援四接臨衝徐起揚旝于葉榆耀甲于洱西譬猶駭鯨觸網奔兕開樊賈林計盡不能為策墨翟帶解無以自守於是破之如吹翰決之若潰壑刎田氏之首有何面目俘鍾相之族并及幼穉彼自以為嚴營締壘則逺徼可延收殘嬰漏則險裔足恃而不知王師折衝天南豁闢大荒屏息一如卧榻寶林之煩枝附金甌之鮮缺失祠兵振旅動輒有效一至于此今夫頤指神攝往見機栝上聖之明也善計逺畧審物量勢周通之智也皇上以㡬先之見為馭逺之圖推心置腹長共功名第有虎包戈載之心原無鳥盡弓藏之意但懷康侯授館之忱終鮮釋將銜杯之念而乃捐棄休嘉自貽狂悖不度德忖力揆理達務恃鬼倀之能前忘天命之有在豈有淮南左吳之策而納隴西王元之計曽無朱浮聚糓之奏而動賁赫陳兵之吿不思朱鮪指河之誓而失張繡降漢之賞此乃下愚不悛中風自絶而猶謂柘南可以避天譴瀾滄可以滌穢行究至韋臯渡鐵橋而南蕃已拔狄青出崑崙而儻猶盡破何則悖逆之罪彰而鈇鉞之誅凛也且夫前代平蠻多在奕世麓川南詔不𨽻版服今者皇宇清寧聲教四訖東漸西被朔南蕩蕩九野有宴安之娛八阿無拮抗之異越裳肅慎稽顙來王古里天方蹶角入貢而百粤之尉佗既蔑西南之莊蹻復平則是要綏流蔡山陬海澨苟在受化無不延頸歡呼謳吟唱嘆矧職叨侍從親聞凱奏而不為之紀鴻功誦顯績非其誼也因于康熙二十年十一月十有八日宣捷之次謹簪筆稽首忻抃舞蹈乃為之頌其辭曰於赫帝命肇開皇基德被四隩功垂九圍近畫埏海逺致狄鞮武烈文治恢于無涯亦粤紹厯懋纉前緒威足内敉仁不外拒巳歸馬牛將柙刀鋸蠢爾小醜反視而忤初慕莊氏思王昆明繼隨杜􅌢稱兵澧陵江漢南紀伏莽縱横瘈犬漫噬枯條覬生遂有朋狡效尤而起隴益輔車脣齒閩海譬昔河朔安史田李次第樔絶儼臂折指乃禀王伐鋪敦楚疆鷙鳥欲擊姑為翺翔眯者不察謂可頡頏居然羊陸相持荆襄塹長豈恃湖險莫傲渉擊夫差水鹵魏豹不虞毒卉展轉剽盜敦固據郡桓乃竊號爰整六衞旋開三門金戈鐵馬蔚如雲屯淬刃澧浦積甲巴山鏃鏑大注旍旝以翻有謂巫䕫蜀漢門户廟策先勝罙入其阻鄧艾既越姜維不武南走卭僰倖以小堵頓撾銅鼓立渡鐵橋降斾草偃亡軍煙銷彈丸昌糓藉之周遭折箸環帶何足與豪彼營螺脣我關龍首雉堞崩剥漸不可守聖鑒朗卓如劍在手挺鈹搢鐸勿使或後五壘既備九拒􅑈希灌膏束草總不得支圍開一面詗令自疑樵蘇俱盡于何奔馳前者少游羞悸而死今兹懷光亦復自殺族屬少長皆俘于市盜驢之災乃及孫子聞之淮西吿捷錫帶華州露布傳彼光泰今者皇威擴于無外天南萬里宣布德意言勒碑版爰銘斾􅓚飭我九伐奠此庶邦泰華雙峙溟海四瀧千秋萬祀以思戎功聖恩頌并序康熙二十七年十月日恭遇太皇太后上諡升祔伏讀恩詔深感我皇上推恩之廣自親王公主奉恩將軍固山格格以及民勲國戚京朝各省諸大臣俱有寵賚中外文武大小各官俱有貤錫然且祭吿嶽瀆遍祀羣神宥過釋諐恤孤養老緩成均之考隆憲乞之禮一切恩䘏備極優渥至于歴歳蠲租均霑九有今復免征兩浙山右全省正供暨江南湖北諸大府租賦之外兼及庸調此真曠古以來希有之鴻被也詩云孝子不匱永錫爾類以云永錫則真永錫以云不匱則真不匱矣微臣無狀調疴里門親䝉浩蕩之恩上戴如天之德歡忻抃舞可無頌言前者聖孝格天遍傳下土曽偕諸里巷臣民競為詞賦以當謠誦今鴻恩覃敷淪肌浹骨敢製聖恩頌一章以續前烈匪云報獻亦以身備史職誼應紀實將以使後之考德者可按焉爾其詞曰翳昔天后龍盤鳯銜曰呈顯謚肇自漢䦲光烈慈壽歴代所占况兹徽德無美不兼既具六輅久達四教居則端闈升乃祔廟奉七所祈縮鬯以報致其精誠上展純孝乃因錫類重為推恩不翅漢文及民以親覃布廣逺開在聖孫溥天之下誰非皇仁始由親近加之賢勞諸侯伯子以祝以鞉鼗同匪用瑞錦賚之英瑤内周蘭坂外暨塗椒晉莊分弓召虎拜敕誥翦五花蔮覆十色三等百叚同此貤錫雙闕刺地九陛如天木鳯銜紙金鷄戴竿黄氣大布青衣鬨然覆盆可闢幽谷不寒爰念邊屯言懷堠戍春提羽戈夜挈抱鼓輪臺是矜彀騎以撫澤共簟醪温比纊絮遂徧山川馳祀嶽瀆並走羣望不愛牲玉沈燒瘞薶兼報先俶堯禹祠陵帝王寢谷旁及先師優入聖域諸儒賜席博土加衣旬省月試姑紆其期明倫憲乞饋食洗腆髙年重帛中壽二膳况當養老國之大典四民無吿於此並贍至若租賦正供秩然中夾庸算全通丁錢而乃汜濩連歳釋蠲或全或半過于漢年更厪河汾深軫吳越西近堡塞東接溟渤免爾常征并解襍役謂民維艱予以全活甌餘曠土不藉宿麥石紐閒農但用鳥穡大禹胼胝虞舜黴黑抱如傷情緩躬稼力縣無置倉湖可觀收補助之德先于巡遊則是聖恩汪濊靉靆配地配天如江如海井里衢巷踊躍歡喜擊壤鼓腹如古時事猶且南顧􅍮鄖江黃順流而下極之丹陽㑹當洗兵如初沐瘍并錫嘉惠被此一方是使民氓解澤甦困僻户窮壤誰不感奮兒寛帶經老萊投畚凡有血氣願效尺寸况臣鮿秒生于水鄉躬浹霡霂身親湛汪捐糜頂踵何以報將頃聞草樹甘露瀼瀼姚墟舜鄉産麟于嶠天德所施地靈悉效蕪詞不文匪敢輕䜈但紀永錫以彰聖孝西河集巻一
