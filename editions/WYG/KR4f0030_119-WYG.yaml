body:
  text: 西河集巻一百十九翰林院檢討毛竒齡撰館課擬文三江考三江之為名久矣其在經傳則雜見之禹貢周禮職方氏爾雅國語水經註史記吳都賦吳越春秋諸書而特其所為註言人人殊卒莫得而指定之夫讀書通大義自昔已然况古今山川陵谷遷變耳目踪跡未必悉合泥古者無所于通而揣摩臆度之見又未可為據然而大概可睹也考禹貢有曰三江既入而孔氏為傳則曰自彭蠡江分為三江而入震澤夫彭蠡未甞分為三也且彭蠡亦未甞入震澤也周禮有曰其川三江而賈公彦為疏則曰大江至尋陽而合為一至揚州入彭蠡而復分為三而後入于海夫公彦雖不以三江之入為入震澤然而彭蠡在尋陽之南幾見江漢之分至尋陽始合而大江之合至彭蠡又分且聞彭蠡入江矣未聞彭蠡能入海也至若禹貢導水則復有東為中江東為北江之文而漢地理志附㑹其説遂以呉縣南一水東入海者為南江蕪湖西一水東至陽羨入海者為中江毗陵北一水東入海者為北江夫毗陵北一水即大江也夫仍以大江為三江之一既已不倫而又其所謂南江者則經無明文徒以北江中江而推類言之且經之所稱中江北江無非大江今但以北江為大江而中江不然則又何也乃若郭璞註爾雅則以岷江浙江松江當之夫浙江松江固矣岷江即大江按周禮職方氏其在荆州則曰其川江漢而于揚州則曰其川三江夫猶之岷江江漢一江而既以表荆復以之表揚不其紊乎乃若吳都賦註則以為松江婁江東江而宋儒註禹貢因之夫松江似矣而東江則自昔迄今必無其地且史記正義但云婁江入海已耳亦未聞入海之江有三也不善讀書者泥于禹貢之文曰三江既入震澤底定則必震澤之定有藉于三江之入而後可夫文無定形或對舉而分標或連稱而轉見彼我叅合亦各有義如必以既入為泥則禹貢兖州有曰雷夏既澤灉沮㑹同青州有曰嵎夷既畧濰淄其道將必雷夏澤而後灉沮同嵎夷略而後濰淄道乎抑非乎夫事不証今仍當考古夫三江之説于今已不合矣請即以古較之夫揚州之域其地甚廣其為川為浸為澤為藪亦甚不少如必拘既入之文而限于一地則職方氏云其澤藪曰具區其川三江其浸五湖假使具區為五湖之始而三江即五湖之終則猶之五湖也五湖太湖也揚州何地職方氏何掌周禮何書而問其澤曰太湖也問其藪曰太湖也問其川曰太湖也問其浸曰太湖也不幾小揚州而笑職方之陋哉然則如何曰韋昭曰三江者松江浙江浦陽江也夫揚州之水亦有大江其言彭蠡則已該大江之勝矣而于是南及松江則震澤之下流也而于是又南及浙江浙江即錢唐也即水經注所為漸江者也而于是又東及浙東之水曰浦陽江浦陽江者與錢唐異源而殊流者也其後雖同流然其殊者自在也葢浙之入海力大身雄其為水長亘千餘里湯湯下渫歸于尾閭此易曉也松之入海則呉淞支流分而為婁雖其入海處蹤跡未明渺不及浙江之萬之一然猶易曉也惟浦陽入海則酈道元水經注南國頗略遂訛為入江不知浦陽者發源于烏傷而東逕諸暨又東逕山隂然後返永興之東而北入于海其在入海之上流即今之錢清江也其接錢清之下流即今之三江口也故明世紹興知府戴君湯君導郡水利則上遏浦陽之入山隂者而使之注江下濬浦陽之入海者而使之注海其在錢清相接之口名三江口其在海口之城名三江城置衛名三江衛建閘于其上以司啟閉名三江閘其尚名三江則自古相仍㡬微不斷餼羊名存夫亦可以為據矣至若水經注記臨平湖則又曰湖水上通浦陽江下注浙江名曰東江則疑庾仲初作吳都賦註所稱松江婁江東江者未必不即指松婁與浦陽而後人誤釋之而求之呉淞之左右母怪乎求之千餘年而終不得其地也要之浦陽本獨入海而由諸暨而山隂而蕭山其中經流雖多沿革而入海之道依然如故此可騐耳若非浦陽則岷江松江婁江皆吳地也國語曰夫吳之與越仇讎戰伐之國也三江環之夫松婁則焉能環越哉且國語又曰與我爭三江之利者非呉耶若非浦陽則盡屬吳地而反曰吳將與我爭吳地之利是妄語也且不聞范蠡之去越乎吳越春秋曰范蠡去越出三江之口入五湖之中夫惟浦陽為三江之口則蠡之去越將必出浦陽而入海由海而入松由松而入湖國語所謂遂乘輕舟而入五湖者是也如以為松江婁江則松婁者五湖之下流也豈有出松婁而反入湖者古文具在而學者貿貿究至堅持其説必欲執三呉水利以註古經夫水利焉能註古經矣九江考禹貢九江不知所在乆矣其在趙宋以前皆以彭蠡為九江如班固地理志于廬江尋陽曰禹貢九江在其南而司馬遷史記有余登廬山觀禹疏九江之説則以彭蠡在廬江之南廬山在彭蠡之側故云是以應劭謂廬江尋陽分𣲖為九而鄭康成則云九江者廬外之尋陽也雖廬江尋陽舊在江北而其所為九江者則或曰廬南或曰廬外總之彭蠡焉已矣夫禹貢揚州既有彭蠡既豬之文而其在荆州又别有九江孔殷之句則彭蠡在揚九江在荆分明兩地况禹貢導水于導漢下則曰東滙澤為彭蠡而于導江下則曰過九江至于東陵東迤北㑹于滙夫江之迤北而㑹于滙者即漢之滙澤而稱為彭蠡者也先過九江後㑹彭蠡前後秩然況中隔東陵斷難溷為一水者此後儒之疑所為紛紛而起也苐原其始誤自秦漢郡國借水為名厯代沿革遂致貿亂按九江水名原在荆州而秦時名郡相傳在西陵鄿春之間正荆州境也至漢髙革九江郡而孝武復之于是漸移之壽春若所為潯水城者然後有尋陽九江之説則揚州境矣然而猶在江北也自劉歆謂湖漢九水入于彭蠡謂之九江而新莽信之因改壽春之九江為延平郡而以豫章為九江且改豫章之柴桑為九江亭于是九江之名在江南焉其後東漢九江仍還壽春而晉改九江為淮南郡至元康之初復設江州名而割揚州之七郡荆州之三郡以𨽻之方是時其設名江州之義雖不必專以九江而秦時九江治在鄿春實荆州之境晉復設江州之治于江北在鄿春界内他時所稱蘭城者此即九江蹤蹟之見端而永興以後忽移江州之治于湓城且分廬江之尋陽武昌之柴桑置尋陽郡又置九江上甲二縣于郡内至隋改郡縣則直改尋陽為九江郡而于是江南九江雖至今猶不易焉則是九江立郡原在荆州而或東或南漸移之揚州之境遂以為郡名水名俱在彭蠡而不知禹貢九江實在荆不在揚也乃宋儒註經既知其非則宜虚懷考析實求其所在而不究根氐不辨沿變務出已臆以妄為慿斷于是有胡祕監旦晁詹事説之輩創言洞庭即九江以洞庭為荆州地也乃問其所以為九江者則雜引山海博物水經地志諸書而究無實據乃據桑氏水經謂洞庭受水有微澬湘沅澧漣漉沬瀏溈􅀈諸名合之為九夫微􅀈諸水名有十一以十一名而割其二名以合于九數不可也即别引地志以為水經所記各有參變惟沅湘澬澧四水相同而他志所載别有元水漸水辰水叙水酉水以合于九數則禹貢九江其上文曰東至于澧夫既以澧為九江之上流與九江異名别出而復雜澧水于九江之中則仍是八水並非九數且巴陵之上有三江口矣其名三江者以大江為西澧江為中湘江為南而皆㑹子此故有此名則是澧湘二水皆獨行入江可與大江相等稱此非元辰七水可得比列者况酈氏所註㣲澬諸水皆先注洞庭而後入于江亦後此之形而非舊時之水道也且夫地名無臆測者禹貢曰過九江至于東陵所為東陵見在也今以洞庭為九江而東陵無有遂以臆測曰洞庭之東有巴陵焉其西上為夷陵夷陵者西陵也夷陵為西陵則巴陵自可名東陵此毋論夷陵在澧水之上與巴陵逺隔未甞相峙不得以東西對稱而即以巴陵言之今之岳州即古巴陵也在秦楚為長沙郡地而自漢至梁皆名巴陵惟隋改岳州而至今因之然而大江在其北洞庭在其南其在北者相隔祗五里而其在南者則相距數步已耳舊云相去五十步假使洞庭為九江巴陵為東陵則九江即東陵也曰過曰至何所間别且導江所記較闊于漢其自沱以上道里修阻不可畢計而自沱以下約五六千里而後至于澧即澧至洞庭未必果九江舊地而苐以洞庭為九江亦已五百餘里矣未有九江至東陵纔跬步者夫至者自此而達之彼也至于者則行之行之而後積漸以及之者也故自朝至于日中昃則自曉至暮我自南海至于北海則自南至北若謂左足所經至于右足此在孺子猶嗤之而宋人註經其于彭蠡之非九江辨論極析而至此而皆茫然何也夫天下有明明厯厯顯示其地而人顧不之察者孔安國云江至荆而分為九則在荆下也江水至荆下而自分九𣲖故桑氏水經曰九江在長沙下雋西北夫岳州在秦漢本長沙郡地而岳之巴陵武昌之崇陽通城皆下雋地也九江在其西北則江水分𣲖正當在荆州之東岳州之北以迤至于黄蘄之西之間故張僧監作尋陽記列九江之名有曰申曰烏蚌曰烏臼曰嘉靡曰畎曰源曰廩曰提曰菌而樂史寰宇記與李宗諤九江圖經雖與僧監所記九名相同而曰分流于江鄂之境則正云荆下岳北鄂陵江口諸地故張湞九江圖名稍不同曰三里曰五洲曰嘉靡曰烏土曰白蚌曰白烏曰菌曰沙提曰廪然其曰九江參差隨勢而分其間有洲或長或短百里至五十里始别于鄂陵終合于江口則正言大江之自為九𣲖而分之合之故唐陸徳明曰九江隨水勢而分而杜佑曰是大禹所疏桑落洲上下三百餘里皆厯厯可指數者葢即一江而分之為九如一河之為九河而其後水道變遷溷而為一亦如九河之仍為一河是不必以播九河與過九江疑其異文夫播九河者是禹疏之使為九曰此九河者本禹之導之而播之者也過九江者是大江原分為九而禹之導江從而過之曰此九江者則禹之導之而過之者也未分而導之則為播已分而導之則為過又何疑焉故賈躭九江則又曰江有八洲曰沙曰人曰九江曰葛曰象曰烏曰感曰蚌此八洲者曲折而與江為九雖其言不可盡信然雜九江名于諸洲之中而且連江為九則亦可騐其九江為一江所分而非别有瀦澤焉斷可識矣間嘗考之經文又東至于澧過九江夫澧者今澧州也以澧水從此入江故名其地為澧州此在今荆州之東岳州之西葢江水自蜀至荆已五千餘里又越數百里而至澧州則在荆下矣故顔師古曰澧水在荆州今𨽻岳州境而實與荆近自史記作東至于醴醴澧通字而漢儒以醴陵當之誤以澧之源為澧之流是非澧入江與江水所經之地固無容深辨者乃大江東流越五百七十里而至岳州即又北流經岳之臨湘而後至鄂州之界所謂江夏蒲圻者皆鄂州境也然而從岳至此又五百里矣然而九江在其地則是東至于澧過九江自至澧之後凡一千餘里而後經九江而過之也乃經文又曰過九江至于東陵向使九江為洞庭東陵為巴陵則跬步之内曰過曰至世無此理然而何者為東陵曰東陵者廬江之東陵鄉也水經曰東陵在廬江金菌縣西北而酈氏所注則又曰江水過下雉縣北䢴水自東陵來注之所謂下雉者即今武昌之興國州也言江水至鄂而廬江東陵之水則自東來注之則東陵在廬江明矣故今黄州與麻城黄陂皆漢西陵地而西陵在黄東陵在廬上下相對名稱厯然此與巴陵之臆斷為東陵有大異者且自鄂州至東陵凡六百里厯江州尋陽今改為徳化縣者而後馴至于廬江之東陵則道理相去上下相接周齊均等而然後東北而㑹于滙焉所謂滙即彭蠡也故曰彭蠡之非九江此不待言也若宋儒傅寅云東陵在荆州今𨽻鄂州則誤以下雉興國為東陵而妄指之下雉為東陵之水所注非東陵也葢惟九江在江鄂之間黄蘄之上則秦郡治蘄春晉郡治蘭城即蘄春界内水名郡名亦得相證即黄州有九江城在黄梅縣内為九江王黥布所築亦隠隠可考見即推之宋儒所引楚地記巴陵在九江之間洞庭之淵非謂洞庭即九江也言巴陵北負九江南俯洞庭則其地在兩水間耳亦彼此相脗合自宋儒註經動輙改竄初辨彭蠡之非九江既謂彭蠡非江漢所滙後且謂東滙北㑹必經文有誤夫彭蠡之非九江此漢儒之誤非經誤也彭蠡非江漢所滙則夏時至今水道變遷或非近今所能測也至于東滙北㑹則漢滙而江㑹之經文秩然乃以不解經之故而遂欲改經引鄭樵邪説以為東滙澤為彭蠡與東迤北㑹于滙俱屬衍文而其後元儒如吳澄輩阿意承㫖竟改東迤句入導漢東滙澤為彭蠡句下萬或以東陵九江求之不得始而改九江為洞庭改東陵為巴陵又既而改敷淺原為廬山改東㑹于滙為居譙之湖而再求不得勢必并九江東陵而盡刪之禹貢幾何堪此割剝故予之為此説者非好辨也以為此固有在焉而非可以臆說斷也臆說者改經之漸也西河集巻一百十九
