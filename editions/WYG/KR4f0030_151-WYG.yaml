body:
  text: 西河集巻一百五十一翰林院檢討毛奇齡撰排律從大江口將入石頭作并寄金二公子敬敷北瀆新軍府南維古帝鄉波濤連楚越形勝在齊梁紅寺浮江濶青山出岸長磯摇飛燕子風便逐龍驤鉦鼓來呉㑹宫臺入建康曉雲生海谷秋雨過㠶檣吹笛邀桓叔揮兵想顧郎石頭方在望對此轉芒芒汝南金太守席書事一十二韻不揣下里同座上諸公和得東字别幕連雲起髙軒傍晚通樽開官舍北客至日華東飲勝追河朔游歡過鄴宫琱欄翻藥紫甃井墜榴紅葵煖烹鳬汁漿寒潄馬􅀈行厨藏竹裏置席在花中几潤衣沾露槃欹燭有風翰林清作聖太守醉為翁弦下開新照梟成得故雄時曹學士博投得六緋興能追庾亮序已讓王融擇木飛宵鵲談冰愧夏蟲當筵無好句空道和儀同贈曹爾堪學士鄴下曽傳賦淮西始御車視餘金殿草載滿玉除書過日看華省浮雲蔽直廬夜郎流李白茂苑病相如慢世悲持㦸隨時避接輿東堂猶喚鵲北海定遷魚紅藥吟眞好黄童記不虛學士强記一過終身不忘如何相對晩此地詠茹藘奉送張使君之任和韻皂蓋江城守青衫水部郎手擕工市劍腰有㑹稽章旌逺翻逾赤堂髙望正黄蠻鄉需教化漢制重循良馬竹遮秋嶺鞭蒲出晩塘使君千騎去從此向東方呈郡司馬孫使君才子生虞阜郎官使越州家垂吳地志名在晉陽秋岸幘為司馬操刀佐解牛髙牙分建隼廣路待鳴騶綵筆題江館青山映郡樓辟來書笛茀詔下賜緹油宦蹟先甌末鄉思近石頭治中雙驥足身外一狐裘鳳德原卑攬魚珠豈暗投避讒違衆女遊説及諸侯就道時觀海還鄰暫首丘孫陽纔一顧何以慰驛騮過訪無錫縣呉興祚明府有作時已遷行人將次赴都上宰當初試延陵第幾傳起家由北海劇邑近南天人地踰彭澤君才過潁川銅章新長吏綺里舊神仙客履懸珠日軍儲散錫年種花官道裏流水縣門前吳女爭桑訟參軍賣蔡眠校開通市塾税起傍湖田碧鳥長銜綬青蒲好製鞭鄉亭方執板㕔事早揮絃徐稺南州榻袁生下渚船宴修單父鱠俸割沈郎錢天子神為眷行人命稍遷題名金柱右典謁玉堦邊求友曽遺紵懷君似攪綿愛餘申浦樹清乞慧山泉過艇留吳芮登堂拜薛宣井桐看翥鳳溪葉笑懸蟬坐列尚書席馳觀太子牋只憐華省彦對客尚烹鮮别閔衍官舍聨吟早閒堂對酒濃汶陽歸未得安邑去何從過市偕仙尉尋山到麗農青裙縫薜荔錦柙繡芙蓉日下廻鳴寉天邊老臥龍别君淮蔡路愁思轉重重送夏明府之任西和結綬遷龍峽除書出鳳城家人留傳去縣吏到門迎遶郭春田坼前闗曙鼓鳴彈琴邀子賤酌酒送淵明餉婦攀車軛翔禽擁斾旌横雲飛舄過就道典衣行隴水天邊杳淮山雪後晴未昬官堠静到日印床成亭下辭孫楚筵前醉禰衡秦州回首處應看柳條生呈郡别駕張公寵命銜方國雄詞播海溟人間推别乗天上見張星驥足方行地龍門恍建瓴題名來鑑曲載酒過蘭亭畫軾朝看下嚴闗夜不扃銅符分作瑞玉海著成經攬德同威鳳希光及暗螢萬間垂棟宇一道倚簈篂赤日堪藏簡黄絲待勒銘錢投江水白案繞郡山青龎統多聞望王祥富典刑大臣親吏事强半在僉㕔沈棻明府治西平有名欲徃從之不果值予南還以縑紵見貽因寄并謝一十二韻毎念郎官重因思陶令賢長人唯省事出宰已多年舍樹平鄉訟收茅作税錢香分欒社酒清聽武城絃鼓角弛亭下兒童戲縣前閒看飛雉過病藉落花眠君治雄淮服吾行去楚天將尋青草渡願賦木瓜篇望去雲山隔貽來縞紵鮮感深螺趐澤思殺㶏陽田故國鱸方美髙枝鳥自遷他時稱八友應附隱侯傳奉題孫藩處士巻子偃臥方遵渚風流似過江家居推第五國士竟無雙草際藏珠匵花前啟玉缸千秋垂巻軸三十棄旌􅓚履宦兄如渾其兄為孫沂水使君躬耕人姓龎學成王佐器何必待為邦郡太守平冦有贈畫㦸開中府朱旗展外隍威行三郡蘖兵勵九秋霜杲日横江浦妖星隱暨陽牙官環綵幕田馬耀金裝露冕專師祭單車典教塲股肱營地逺黼黻陣雲長虎翼交鸞彩魚鱗擁雁行紅巾朝授幘斗米夜舂糧東海依滄薛西堂紀潁黄干城眞足寄愼固在封疆大敬宅牡丹江上棲賢里城南處士家春風三月雨晩日一欄花覆地垂枝重當堦散影斜叢苞含粉絮巻蘂蹙衣紗葉潤沾黄蝶臺空落紫霞早涼丹蔕合晝煖碧油遮清興同欣賞閒情任麗華誰言招隱地定為詠蒹葮少與包二秉德蔡五十一仲光沈七禹錫為鄉遊道古論文視若兄弟今包二死十四年沈七死十八年矣獨蔡五十一與予居人間世予又瀕死道路曩時交游文章悉亡兵灾憶包二尚存集數巻未行世予泊舟餘干城下為賦此詩向呂游河内陶劉散澤濵十年生死路萬里去來人抱痛同沽酒虛懷薦負薪繁花孤館暮宿草隔江春司馬無書上黔婁到死貧一吟懷舊賦涕泗滿青蘋亡劍篇哭姜坦并序姜公子垚買兩劍牝牡以一佩弟坦比神物也予出游公子垚擕寳刀并一西入晉陽坦年少為天帝召去悲乎哉莫邪安在耶予傷公子之死有似亡劍二月初九日泊舟南昌府豐城城下感華事即傷公子之佩一劍以死亡鐵英也著亡劍篇越國有神物干將與莫邪霜鋒飛毳羽寳鍔泛蓮花龜縵爭三楚龍阿聚一家隂陽分日月水陸斷蛟蛇坐見飄揚近行隨拂拭加百年開地氣一劍失天涯薛燭臨罏慟風胡抱器嗟鐵英傷魍魎玉柙掩泥沙漁父江流逺徐君墓木賒清霄思蜒蜿終夜哭蒹葮函石銷牛斗溪銅涸若耶豐城投泊裏何處問張華閨中春曉得量字有叙壚婦早起忖夜所縫衣有裁衣句揀唐試題成之耳五夜金微塞三春玉洞房梁間飛宿燕花下理朝粧抛瑟方收拾裁衣再忖量星芒銷太白日影射流黄昨歲收疎勒今年徙樂浪早行知漸近切勿誦東光賦得起晚誦經遲謿小尼師也西院女沙彌春眠曙不知聽迷傳板候起失誦經期幔捲身還倚壇深步懶移潄脣看上日開巻立多時記慢成篇少心慵下字遲偶然思夜夢坐弄念珠兒賦得鳥散餘花落聨句暝鳥分飛後張杉春園返炤初枝空摇未定甡花落漸無餘散毳連英下杉零紅逐翅虚喧停飄去静甡踏久墜來徐㸃絮曽銜雀杉鋪鱗似鱠魚芳華誰不惜甡流盼轉踟躇杉空梁落燕泥聨句翠幕辭春燕張杉雕梁墜宿泥􅝩花長不掃甡文杏舊曽棲草腐懸絲細杉塵銜剰㸃迷墮看銀豆碎甡行汚繡裙低故國盧家女杉空房竇氏妻雙飛何日返甡夫壻在遼西杉杜陵杜杜若㑹宴駱明府别業杜曲舊名家相逢在若耶風生欄外馬水濯劍頭花翠幕看紅藥金尊泛紫霞春遲三月暮日落半輪斜澤畔吟陶令丘中戀子嗟醉歸應秉燭莫問早棲鴉同施參藩王使君温别駕張司刑屈明府暨諸公游慧力寺幕府乗春出琳宫攬勝遥山川開法地賓從滿僧寮騶馬同獅舞珠幡夾斾摇樓臺横碧嶂歌管遏青霄瑞竹籠烟靄仙芝似火燒築亭依壠樹瘞鶴表山椒寺山名瑞筠後更名紫芝築亭是日施公瘞鶴亭側樹銘刹映銜林日江流别浦潮霞翻紅隔塢花落碧垂條嬌鳥從人語飛絲接地飃道心來對境慧力想前朝洛下追游淺人間歲月銷蓮生棲竟晩草長隱誰招遁室陪殷史他鄉寓鮑昭雲深歸路杳還上使君橈宿雲門廣孝寺呈三公與南士分得灰字東晉標靈刹西王竪法臺山環雙樹入門傍五雲開丹檻連峰落清溪逐路廻竹房懷舊蹟蓮葉得新栽林下尋支遁橋邊遇辯才安禪聞不住妙義見如來石乳傳甘露金堂認劫灰晚風吹擊鉢秋月濯浮杯佛課稱三寳吾生賦七哀離家還楚豫入社羨宗雷五術超凢諦諸縁盡聖財罏烟分𣺌漫燈影共徘徊齋椀擎黄葛經筵坐緑苔宵深鐘磬寂相對果悠哉題宿道林山寺兼贈離上人紺殿開丹壑金臺敞碧梯人來支遁室虎界逺公溪雙樹晴林迥三天曉閣齊龕花閑鳥雀旛影掛虹霓峻澗盤檐曲明河到地低心廻空磴外目極大江西講啟祥龍下神藏怖鴿棲香壇縈白氣佛壁畫青泥鐘動飛龜組經䭾散馬蹄雁王留寳塔魔女墜珠筓九品分華藏諸門斷壁題付衣聨杼柚掬水咒闍黎入夜廻廊靜尋春出洞迷道塲雲寂寂仙嶂草萋萋蓮葉擎獅口松苖養麝臍缾深闐貝粟紗暗罩玻瓈方井規裁衲横梁欵杖藜琱㿻供石飯甘露洗山虀𤣥義非闗解黄拈欲止啼殷源籖未下願得叩招提途中喜從丁儀曹得周侍郎亮工分藩覆書感紀成篇尺素來千里雙金授八行丹雲披海郭白雁度江鄉置驛丁儀部裁書周侍郎髙函分四庫妙牘並諸王起草連鈎軸安花押篆牀懷人從漢隴譽我過齊梁地隔彤騶馭天髙朱雀桁呉臺空繋練蔡澤未持粱羈客逢殷羨司農念鄭莊三年懷袖裏漫滅可能忘奉送姜侍御起復歸臺漢制優方進蒼生望謝公直情完讀禮移孝可成忠棄繡踰鑚柳含毫似轉蓬思親淄水縣釋服竟陵宫㧞棘應驅豸無廬合避驄恩沾春草緑淚減暮花紅卜子推琴縵山濤擲土籠廵天看撃隼獵地待非熊持斧三臺厲鳴鞭一道通星軺回薊北祖軷遍江東轡攬鄉闗外詩題驛路中後車隨澤豹下客逮梁鴻自分漂流苦難追行步工送程攀細柳書刺摘新桐已見徴桓傳無須憂阿戎公還多廟建我輩且途窮鷁發逢春雨烏飛逐曉風長安應近日從此望曈曨山樓對雨同南士桐音暨姜生兆熊得絲字黄菊濕東籬高樓對酒卮窮交來魏相賢主是姜維幔捲侵寒早林深入午遲重隂垂埤堄細雨亂罘罳合坐秋霖唱遥山夏后祠登臨愁思起時繞玉壺絲垚曰楚詞綱戸朱綴即罘罳也城闕俱有之見考工記舊誤註作屏遂有疑宫殿獨用非也秋晩新晴登桐音山樓飲宿聨句髙閣快登臨甡憑欄敞積隂斷雲歸逺岫張杉斜日漏疎林近郭驅沙馬甡横塘散水禽山青絲霧斂姜兆熊砌紫繡苔侵濕竹流寒碧杉叢花簇碎金牕晴光巻帙甡絃燥急鳴琴鑑水浮霞動兆熊宜城待月斟暗催雙樹䗶杉響起萬家碪避俗廻青眼甡論文愜素心趨庭慚孔鯉兆熊開觀啟劉歆養澤成元豹杉耽書類白蟫逢時違北轍甡待價重南琛道洽寧分席杉途窮賴盍簪頻年遲好㑹甡一夕侍清吟蘆葉吹笳斷兆熊蓮花下漏沉歌生披别緒杉醉去理塵襟雁過秋聲杳甡星廻夜色深山牀還似昔兆熊應共伯淮衾杉甬東李屺源西淵有贈十載蓬山隔三秋桂樹前裁留闗令史又送李膺船倒榼呼金液輕裝載玉篇才名摧虎豹家世本貂蟬交謝塡門轍貧無負郭田幽尋豪士鍛醉共酒人眠羽服來員嶠香壇訪竺乾將車元季美獻紵友朋賢逺道班荆楚清江採木蓮行頻愁驪馬歌苦類烏鳶爾達為廣武吾懷是謫仙相期棲息逺分手倍悽然贈清江屈明府百里郎官治千秋茂宰情嚴闗雙舄迥古縣一江清歲課増遥服春田勸耦耕揮絃存子賤漉酒似淵明人誦黄門賦天分都尉城綬連芳草結車碾落花行邂逅承嘉顧周旋識令名誰言荒邑小已兆泰階平贈張法曹特簡出彤庭秋官一使星子房真有學張釋本明刑授第升三策成家在一經龍媒驚廣步鵔服負修翎曉日涵冰鏡春花映玉缾神羊游外廐屈莢指當㕔西倚曹為法南行訟可聽髙才分竹傳佐郡接簈篂羈旅難投李清江偶聚萍聞聲來茂郡招飲過芝亭藉草連身碧看山到眼青天髙雲自合春去雨初零好客傾􅌬醁尋仙採茯苓曠懷如可共吾欲望滄溟集臨江黄氏園用佳字夏雨歇山齋清樽倚樹櫰丹花飛曲牖碧水上空階地僻無常客風生動逺懷髙歌殊自遣小住最為佳樓隙雲如嶂盤中酒似淮馳箋呼趙璧謾語襍齊諧遷坐踰龍澗新莊彷鹿柴誰憐黄叔度把臂在天涯逺懷詩織錦經營短從軍道路長懷人傷晩歲思伯怨朝陽地隔新烽火天低古戰塲閒房收鏡冷渫井墮釵凉有字排鴻雁無書致鯉魴寒風催擣素落月射流黄蒼水稽秦使青陵謝宋王城南秋草斷隴首暮雲翔絶塞依𤣥莵空村徙白狼深閨徒有夢只解渡江湘游仙詩避地追遐隱登山訪列仙重門五府外方駕十洲邊蓬島環宫闕茅君有洞天海波傾紫液石火燒丹鉛授冊三門訣分符六甲篇雲車推曉霧羽蓋散春烟芝籙長懸肘松喬可比肩靈童占藥好姹女勝花妍四序如三月終朝竟百年家藏釀酒甕人佩剪刀錢華頂成閭里淮南鑿井泉母來桃作饌虎守杏為田驅日將投杖乗虹甫着鞭辭家憑野鶴遺世共秋蟬東望招徐福南行挾稚川帝鄉千萬里一舉遂翩然擬艷詩聨句畫閣緑楊邊張杉東牆度日妍花明上巳候甡人在艷陽天簾捲翹紅袖商徴説粧成壓翠鈿重奩函寳鏡杉雙帶結金錢遥靄籠修黛甡輕雲作半肩香生緹縵舉徴説影動步摇偏壁煖塗椒粉杉牕虚撲栁綿博山時起麝甡深院乍聞鵑凝望移雕檻徴説含情理素絃朱枰閑握搠杉紅版墜鞦韆逺道思盧女甡離宫貯絳仙幽懷應比玉徴説皓質詎施鉛楚國愁窺宋杉陳王賦感甄最憐貽菜日甡長憶破瓜年蕩子曾留玦徴説從軍久控弦聨鑣依勅勒杉徴曲到于闐海燕棲懸榖甡蟠螭隱甃甎王孫歸未得徴説春草又芊芊杉埈曰楚人懸榖囊于梁故梁名懸榖見廣州記定交詩為胡以寧方中通堵鳳蒸異地聨車轂雙江對酒尊班荆逢國士獻紵識公孫龍劍蟠星斗鸞吟起谷門擔簦同汗漫戴笠自寒温木落求鳴鳥冰澌值化鯤舊游三俊譽端頼數君存宛陵汪節母詩髙節標南國賢名擅北堂封碑新炤日冰鏡舊流霜兩髦詩堪矢千秋人未亡鉶羮蘋葉紫庭樹桂枝黄著誡追鳬弋傳經貯蟹筐最憐譙國裔猶上報劉章汪為文節譙國公後其孫觀進士燦孝亷遍乞詩誌月身牟尼羅漢詩并序西域伽毘羅國月身牟尼羅漢者趺坐大航頭夜行從寧波歸遇甡暨從子逺公並舟自稱羅漢菩薩華音朗然時苦蒸鬱罕風羅漢仰視言是當有風從東南向來已果來又言月爺將有闌已果有紅闌䦨月邊且言伽毘羅國西竺國稱大西天多羅漢菩薩結果者能驅山塡海掣風雷雨騎獅象豺虎衣火蹈浪不食生熟物即食勿禁也其不為羅漢菩薩者為王為卿相士官民賈商其所居有金樓銀闕銅鐵瑶石諸宫臺殿堂一由旬外望見金光明色耕畬六榖巨米顆碩具紅黑黄白四覈稌黍薺菽無較量賈車渠瑪瑙琳碧氆氌罽𤨏伏金剛刺蜜珊瑚琉璃諸物鉛錫赭堊桑漆麻紵各等器仗珍怪鳥獸鳳凰獅象翔行道路有芬花異果丹青普徧一山延外便聞香氣且多李蓮羅漢發願進中土經厯百餘國土凢一十萬八千零里虎棲狼役踰罽賔蔥嶺經小西天回回哈宻入伊吾廬度婆息足渉流沙界朝五臺山屠去首髪其未屠者繞華鬘頂有似黄雲唐世呼菩薩鬘矣已屠羅漢結束肩胡孫藤搤臂鑌鐵兩彄環金剛寳念珠子三匝于頂所衣名達磨衣今所衣繡偏袒則大都統爺所供矣懸一鏤金瓢子挹水自諸王公卿貴人下皆有供養曽賜息椒園䝉賜金錢施與行路與牒勿受一絲一縷隨地更易本國所居名雷音寺其進中土時日十五歲首矣朝華二室岱所謂朝四大名山者也岱華卑狹西域入天不可望矣今朝海不得渡縁禁海也都統以下軍府遣兵士䕶渡江設菜菓烝饝人各饗軍府所齋耳指所坐航頭曰國亦有之其道西洋浡泥者用此舟或詢羅漢菩薩到天童見今國師耶不應羅漢菩薩何耶屈右足胝上指右手拄右頥立胝上作觀世音像又屈右手從脊拽右耳環云羅漢像復大笑作梵語數千言皆不解甡曰甡請從羅漢菩薩游耳曰予識子子不識予矣再請笑曰汝不從襄陽靈炤女兒游耶終不解後撇然負藤去佛國名天竺胡僧號跋陀百年來内地數歲見恒河鉢有黄龍繞經無白馬馱偏衣裝七寳番語誦三摩坐向尼拘律行為悉逹多周天踰海谷踏雪上岷峨挈履隨雲度懷甎作鏡磨但留獅守塔那用鳥為窠妙羽思雕鷲新花記曼羅趕將行地牯送去聴經鵞持咒能移物安心便伏魔錫飛分瘴癘杯渡偃鮫鱓入世三洲遍還鄉萬劫過中原希德士是處有檀那未示西來意仍看東逝波神州吾欲徃負杖意如何贈蔡山人岳陽金匱傳神術青囊揀秘書桑公池上鵲涪父漢時漁斸藥歸林莽懸壺向市閭五金權造化九鍊到清虛杏廩朝司虎銅盤夜罩魚横梁依鳳堰小巷是蝸廬爾邁淳于後吾尋華子餘膏盲符晉夢湯熨去齊墟丹訣從羅絡黄熊快翦除橘踦三樹鶴苓破五門豬蟾杵憐長動蛇珠媿未儲那堪司馬疾時御濟陽車贑州周司理令樹回任舟次上洛名材馭清江司讞船孤心懸北闕薄宦返南天好客追梁苑移家去廩延賜錢周舉詔力學少卿篇黄鵠憑髙羽朱絲鮮曲絃初銷刑鼎日重命甫侯年郡樹崆峒外官臺章貢前金灘留信宿皓月向誰圓西河集巻一百五十一
