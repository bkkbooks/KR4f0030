body:
  text: 西河集巻十翰林院檢討毛奇齡撰揭子奉辭徴檄揭子月日帖子稱本府上奉寧紹台分巡道憲照布政司來文凜遵上諭于康熙十七年月日吏部咨開徴取博學鴻儒以文詞卓越才藻瑰麗者召試擢用備顧問著作之選謬註甡名徴名係原名奇齡且令所下縣具文敦請伏讀事理不勝惶汗夫天下不崇實學于今三百年矣帖括一興士之厠身進造者率以此為科第之階空疎揣摩習矣不察今天子實心右學旁求天下博學能文之士以備顧問以充著作倣古制科例隨所薦引召試擢用此非聰明天亶首出羣物何以得此此雖異世相聞猶踴躍興起以為難得况身當其時將以親預其盛事而猶趦趄不前自甘窮老必非人情顧事有未可一概論者夫上以名求下以實應自然之理也奬引過情抜十得五依違之識也夫既求博學則苟聰明不如應奉博記不如張安世一覽能通不如楊愔陸倕邢邵夏侯榮皆不可漫應是選而况文章才藻堪備著作誰則如潘陸之榮茂鄒枚之敏麗揚雄司馬相如之閎達賈誼晁錯董仲舒匡衡劉向之昌明博大而况其下之又下者夫無潘陸馬揚賈董陸倕邢邵應奉夏侯之人而以應其選是罔上也若以為必無是人而任舉一軰以當之則又過自菲薄非所以待天下士也夫堯舜在上䕫卨不揚孝武之世難為徐樂今聖主賢臣嘔喩滿朝弓旌所至吾必以為有超世特達之資殊尤絶蹟之士可以當殿陛之諮諏臨軒之揆䇿方不惜使者封軺郡縣勸駕而漫蔑及甡是使天下笑無人也豈可也哉昔唐宋制科原有宏詞博學茂才㧞萃諸名而究其所以應之者非疎淺庸劣即荒昧寡學夫是以重其名而未嘗不惜其實也豈有皇皇大廷特詔選士而可仍蹈其轍者且夫孔融之論孝章恐其憂疾韓康之薦隠之俟其毁忘甡貧困之久嘗得心疾偶經勞瘁間日便發雖曰駑駘下賤苟足使伯樂一顧可増價十倍然病馬棄野筋敝力耗終無所用甡草野學究不知進退冒昧辭謝伏望詳察謹此具揭須至揭者再辭徴檄揭子節奉院司道府諸臺憲檄徴取博學鴻儒以文詞卓越才藻瑰麗者列名在按謬註及甡徴名奇齡已經扶服辭過具結復去今䝉駮照該縣原有博學鴻儒速行延請再及甡名檄下之日紙牌木帖疊促經管頓首頓首甡本無學幼時讀賈誼疏數過頗有記憶而旬日忘之家無蔵書借讀于邑之有書者後且賣舊所貽書以給衣米即易經左傳漢書楚詞戰國文諸書俱不留一巻間借讀他史及列代諸有名文集讀一過又不得再三讀其胷中無學亦已可知若夫才之庸劣則見諸撰述不待問也今諸臺謬奬及甡不過謂甡平日曾作詩數章雜文數十首謂可以應明詔當昭代盛典夫文無妍醜惟世所好甡文不為世所好其好甡文者則皆其暱甡者也夫暱甡者不足為據今諸臺雖未嘗暱甡者而及甡則必有暱甡者為之道之夫愛憎之言可稽乎儻諸臺謂甡能為文而譏之者謂甡不能何以解之且才藻則實不足也傳云上臣以人事君而漢蓋勲傳謂選賢實所以報國今聖天子聰明天亶曠覽古今而在廷諸臣則又皆陸澄博覽王彪多識之選日者明詔所及曾答一在京故人下訊中但及草野倨侮祗堪曵尾已耳尚未嘗以空疎得罪為念近聞皇上召問精深奥博難于對揚甡生不見兩觀足不納階陛引首局步業已心慴又加之無學揣腹記憶展轉潰亂萬一天顔咫尺奏對失錯此非細故也夫有才不薦猶狐白而反衣之也薦非其才是駑駘而題之以乘黄也二者皆非所以報國昔者山濤薦士士無軼才然猶有陸亮之誤為時所譏吕正獻薦多名士然猶以妄薦常秩為終身引過何則薦鶚百不容薦鴞一也况乎茂才無行張勃坐削方正槃辟何武受責其有累舉主匪淺也昔者韓退之譏博學宏詞試文謂偶一誦之即顔忸怩而心不寧者累月宋楊龜山嘗云宏詞之試近乎以文字自炫者則是昔有是科即有是弊其舉不必當當不必舉已非一日然但論文字得失已耳夫文無可憑退之之忸怩安知非取之者之色喜者也獨是博學極難即歐陽永叔善為文章猶有同時劉攽日調笑其不讀書者諺曰寧薦布棊勿薦盧醫蓋日者布棊休咎未分故雖謬為薦引而譴無所施今之為試文者稍稍類是若學則如醫者之效疾苟薦一不當其譴立見甡少丁貧困中經流離憂勞過度心嘗怔忡不特長大問學了無可稽即少時記誦明在心凹每當疾發便暗䀜瞀貿浹月累日展轉怳惚有似狂人今則病且日作矣周官稱學古入官孫卿有云儒術誠行則天下大而且富夫儒術之有禆于國有益于政事如是甡雖不肖豈真無志于國家政事之大而遲暮錮疾上之不能如仲尼之對國事千轉萬變而不窮次之不能如邢邵讀書積經史在前限日讀竟而無所或遺下之不能如陳烈先生總無記性猶能閉户静坐自觀其身心終不使疾痛稠襍之足以漫攖其智慮乃徒以心悸魂擾愔愔翹首之餘妄膺勸駕是辱國舉也夫既非博學何有鴻儒况鮮才藻兼多疾病伏乞臺下俯鑒微衷轉文申覆使甡無冒昧赴舉之嫌諸上臺無舉非其人之辠甡伏床把筆荒亂無序息喘待命無任狼狽敢再具揭須至揭者三辭徴檄揭子日奉縣帖知諸臺檄徴不容病辭且不需府縣執結案名㑹請遽行照知此非縣文轉覆所能達意因敢冒昧頓首直揭臺下凡臺下之所以堅持絞急不肯甡辭者必以甡之辭為謬漫不可信也夫世亦誠有欲得而故為辭者且夫下士貢身不如避人躁進之有失反不若退讓者之有得則辭者或即所以為得之之地故薛戎為李衡所辟三返始應世每稱巧于用讓而甡則不然甡本汚下依人乞食曾無介行之可以自見又此事雖奉明詔旁求若渴然究非山林聘召安車束帛之比即强顔固辭無所明節且拔茅連茹薦引滿朝旬日之間動累十百即四軰敦趨仍不過一大科赴試舉子其見擢與否全未可定忺然就之不為多拂衣去之不為少曹出曹入何闗進退若以為必辭而後得則與甡同辭者皆業䝉見許萬一甡同在許中不㡬已失然則甡辭之必無虚假亦可驗矣第甡辭如此轉文如彼然且臺下必持之如是其急者得毋以甡為果其人耶甡幼受書義頗閑帖括其在前朝即能以垂髦之年與老師宿儒爭長膠序然而通不過一經試不越七藝窮年矻矻無暇他及又且稍為媮惰則其所為一經者茫然荒落往徃臨比則第摘其文之可為題者口誦心記是亦苦矣迄於今猶然漫無所成而荏苒逮老至若為文則偶效八家間為序記徒以有類帖括便于勦襲初無博聞彊記之能纘聖述明之技可以窺遺書于壁中效河汾之著作乃欲上陳堯禹下引龍卨隨五聚之班記三亡之篋是欲驅失明者而使之觀䇿無足者而使之走也夫幽蘭在谷人有佩蘅先施匿形里多飾色何則専見者不察也今里中鉅儒未蒙見舉有同舉者反聽辭去時同邑來給事以同舉聽辭區區一甡好醜誰辨且臺下奬譽喜于溢實昔龎士元人倫海内每所稱許必令逺過其才而謝朓推孔闓謂此人聲名未立不嫌過譽凡此皆昔賢愛才好士勤于長養之意無所或怪第以甡自揣有萬萬不可應者昔者漢武之世文學濟濟其時之應賢良詔者毎舉不下數百然而今所傳者一則江都再則平津其在二人之外聞者漸罕今朝廷方春趣舉既秋召試計所薦列合不下二三百人乃其間擢用多至十一少不過十一之半則是進者之數逺不及退者之衆然且退之之中其為才與學無一不十倍于甡者况甡又鄙賤無階于廷其在京邑足蹟所不到在上無布衣之交在下無迴車却扇之雅或夜光相投庶蒙物色以兹沙礫其誰顧之昔劉穆之為丹陽尹有所薦達不納則不止今再三之凟非所宜然而甡之孱弱又必有不足當丹陽之薦者則其不必妄為連類也明甚又且貧無資用此地去京師三千里一出一入欲如主父偃久留不能如買臣之自將計車以匄口食則又老不可得展轉旁皇必至流落夫以専見之賢當過情之奬求之退多進少萬不必一得之遇而又泰山孤竹無所依恃褁衣褰裳難還本土恐臺下仁愛定不出此况達視其所舉臺下縱不畏廣陵之罰然舉不得當有累賢達不可不察也夫學不可以强求病不可以强去凡甡之所以兢兢致辭者一則無學一則有病無學之人諮車所不臨多病之門吉士所不顧然且必兢兢如是者誠恐一不見諒則他日徴書之下重多違復必有以言之不早為今日罪者倘必不然則封軺四出㨗者先登朝廷縱愛賢豈真能載此支離偃蹇之物哉聞之漢代方正之舉有以槃辟雅拜為罪者夫形模過度步武過嚴尚以為罪豈有抱釁床蓐憧憧擾擾啓手足則拜履為艱延視聽則聰明未辨體執冰炭心震霆電而可以趣治行勸車駕吿無罪者也要之病于學病于身俱不可舉縣文病結具在惟藉慈察公請何孝子崇祀鄉賢揭子某等謹以公請鄉賢事具揭臺下竊見先朝𢎞治年間有蕭山何御史舜賔之子何競因恢復本邑湘湖水利顯報父讐其孝著于一身其功則在闔邑見今郡縣志書暨史館所存先朝實錄彰彰可驗不謂鄉賢一事尚未舉行查先朝縣志嘉靖三十六年曾經祠祀尚有宗師畢公知縣魏公先後批詳及諸生里老等執結存在而其子孫衰微仍就湮沒思得邑有先賢而隠晦不彰長吏之過也既以彰顯而仍就湮沒生其後者之責也竊見先王教孝久著禮傳復讐大義已載春秋故齊襄復九世之讐宣聖不以為非梁恱張瑝為父報讐朱子綱目特為表出今孝子遺蹟實存志傳先朝朝議原附奬例即古今孝子集凡一百有六人孝子名氏已紀其内而鄉賢一事至今未舉何以教孝且天下未有孝子而不得當于賢名者也又况先王祀典舊有明文以死勤事則祭于國能捍大患則享于社孝子力復水利父子身殉在國為死勤之祀在民為捍患之祀竊見時俗祀事孔増究其所由實無足紀徒以子孫通籍稍膺寵賚追功上徳力有可為或其家本無貴顯第贏金錢一經請謁便蒙濫冒凡若此等猶且優優洋洋得以無何有之人生無利于民死無益于國妄自侈大嵗時享獻公然受之而不以為過豈有徳闗教化功在人民一邑萬族日食其利而鄉人尺木反不得預其列者就使其子孫未衰猶當比户比族共為請乞况子孫已亡也竊見臺下任持名教力挈綱紀凡讀書論世闡微發幽既已見之行事竊以為孝子祀事實闗大典苟有籲請宜不使宏功鉅徳久抑地下敢獻孝子事蹟書冊并此執揭倘得採取蒭蕘即賜施行澤及先進教行後起某等幸甚通邑幸甚頃者朝廷纂修明史伏見聖諭煌煌首重孝行太常所載亦尚功徳竊聞史舘諸賢已經備搜孝子實蹟􅍐題立傳惟此崇祀一事將與國是鄉評共垂不腐為此鄉官士民等連名具揭須至揭者請毁私築湖堤揭子蕭山本澤國而地墝易涸因築湘湖以溉九鄉之田其間開閉有時蓄洩有候刻石則水有尺有寸奏之朝廷著之律令勒之碑版赫赫如也無如湖豪孫姓者聚族而居世為湖患在昔元明之間孫呉二氏佔湖為田而永樂間清之隨有孫全者復行侵佔魏文靖公以尚書致仕親為恢復越至𢎞治間孫全呉瓚兩家對湖為婚姻共起填湖為陶窰之基文靖門人湖廣道御史何公挺身爭理致孫呉二姓以賄殺御史于路其孝子何競為父復讎始奏聞朝廷置孫全于辟清出佔田若干坵地若干畝瓦窰房屋無算敕知縣楊鐸為之勒石此事載𢎞治十九年孝宗實録并府縣志書甚詳然猶怙惡不悛又有孫肇五者于正徳年間復為築堤賴何御史門人張尚書公再為擴清然後得復如初是一孫姓之豪佔而歴成化𢎞治正徳三朝之訟經魏張吏工二尚書暨御史父子以及門生三世死生報復之力始得稍清然猶御史父子飲恨至今其土豪之為害如此及嘉靖年間孫姓有為中書者忽造跨湖橋于湖中以通孫呉二姓往來彼時鄉官懲御史之禍不敢出言且以此堤當上湖與下湖之中駕言上湖洩水在南下湖洩水在北而橋為界限不甚為害一時聽之實則上湖以淘土陶甓湖窪而浸下湖以葑草壅塞湖淺而碻而橋復為之阻之故至今湫口之水不及石巖九鄉不均未嘗不痛恨于孫氏為橋之為害也今孫氏以淘湖之利合族巨富而人丁又衆圏水築塘種荷蓄魚甚且為陶窯為佛舎漸漸興佔向時令甲凡湖中之土以黄線為界而今則為黄為靑不可復問此正當籲吿伸理大為清復之際而土豪怙惡不吿官不謀衆公然築堤而横截之則横甚矣所賴當事賢明嚴敕正法而奸詭百出以二姓之族而駕為九鄉以孫氏所造之橋而詐稱先賢以兩家相通之路而指為通衢以姻婭貨賂并墳墓風水之豪黨而妄名公舉之衆仍不吿縣不謀族公然謀議以為可行可怪尤甚第九鄉百姓初無公詞祗澇湖一鄉蔣陳二姓先為具控者以則水有寸大凡竹簿截水則每一竹簿阻水三寸土坊截水則每一土坊阻水九寸澇湖最磽去水九寸則此鄉絶水沾溉不及故切膚之呼較衆獨先然而衆不繼至者非觀望也以為當事賢明既能敕法則雖欲譊譊而可不必也乃不意屢發公議而𨽻不散帖里不知㑹隂陽生不到門鄉官不集議繆以已成不毁朦朧姑且之辭誖謾以覆無論此堤之成為禍不淺而即此行事詭祕神奸百出萬一稍遂其意則前此跨湖之築祗屬孫姓猶且駕出多人東支西餙况儼奉批行則自此以後公然官築矣將見種荷蓄魚之外或圏或佃為房為畝誰得禁之至于勢成則雖兩尚書之挽回御史父子之身殉寧有效耶國課安出民命安救以此思之實為寒心况孫呉二姓外實有不肖黨惡為風水貨賂起見者近聞石巖定山結黨窺伺隂具畚鍤以㡬乘隟其存毁之際闗係匪淺倘能徹底澄清歴查舊志䂓仿制度一一開復剗其埂塞其穴毁其所侵之窯與舍凡夫種菱者植芡者堆草者􅀈魚者槩行禁絶赦其已往之罪而開以自新之途則去惡務本極為長便即不然而毁其新築加之以應得之罪則小創大懲亦足補救如故為輕縱茅靡波委養癰釀禍邑雖乏賢哲焉可謂魏何之後必無其人因于補議之餘并為此詞至于應得罪名則前朝天順間早有邊遠充軍之例且限日勒令修復如踰限不復罪且加等詳見湘湖水利志某揭如右申請覃封俞太孺人旌表事狀揭子某年月日紹興府屬鄉官某等敬以山隂縣覃恩敕封駱母俞太孺人事狀申請題旌具揭臺下竊惟坤儀效順經授黄裳隂教匡貞史迴霜簡故閨闈足法西京詳子政之書工徳可師東海習茂先之訓况緯婺不恤而髦特是求在明廷金帛之賜自昔有之即髙門表敕之條於今為烈伏見山隂縣覃恩敕封駱母俞太孺人者生員駱元裕之配原任三原縣知縣駱復旦之母生於華胄克秉淵心長自名門夙嫺禮範少稱博士嘗賡柳絮之吟譽起尚書不藉葛覃之解是以伏生口授罔媿朱脣左妹髫年遂彰彤管然而鳳凰既協孔雀是占十八于歸以舅姑宦游依之自出髙堂逺宦無容珮帨承歡入廟新嘉那見羮湯伺色倚渭陽之乘馬偃南園以讀書隴頭臼冀敬至攜鉏廡下梁鴻親為舉案洎乎鮑宣起挽車之思樂羊成斷機之學孺人曰大人在京寧忘侍養乎辭雍歸省勸過陽城捨養入京戒來歐子於是脫簪就道決意從親歛袵趨庭始稱有婦雖間闗萬里朱顔黦馬足之塵窈窕三河綠絮藉烏啼之月顧其志存定省望斷長安心念尊章强投京洛即其婦道之昭豈非君子所罕以單傳寡嗣預為内妾正側竝孕各舉一子爾廼徴蘭燕市燕姞初來饋鯉桑乾桑弧纔設東方憐三日之生塗山啓四辰之泣先生遘疾剔臂罔效痛柏舟之鼓棹褰繐帷以垂絲縱復刲股和雷子之糜解體效貞妃之木猶且晨星自墮於幕中白日不揮於戈下况翁遭璫難外補沛中夫倚殯宫獨留京邸力請于翁扶櫬還葬營逺櫝之歸鄉使靈芻之赴壠鬻紃解珥難以言傳苦志窮神豈可名狀廼先隨徐郡繼返長蘆誓撫孤兒毅還鄉井收先人之遺業僦石池之數椽潛閉家園課兒力學紅燈夜半書聲與織韻齊鳴紫燕春回曉夢共朝雲俱盡控著簪於椎髻繼晷為膏紐葛襁於斬裾衣嬰作飾及兒就外傅漸博交友孟氏截流黄之錦陶公剉薦席於床以故過江子弟願識王恬北地賔朋雅知庾信歸月旦於許子之評定聲名於伯騫之語苟非朔婦之遺孤那得西平之有子時先生有弟爭産孺人付于不較矧其推財行孝曲合荆花束緼調爭細全𤓰蔓凡居家之謹心皆為人所難受故義方内著士博五經筆落中書賦成三禮三原君獻賦初授司刑尋改邑令騁金臺之駿馬授仙苑之飛鳬節推新授改例攜琴陛見初辭特恩賜宴池陽道逺王陽猶叱馭來前原上花繁潘岳喜板輿同載華池之清水可飲太白之孤標是方潯陽嚴閫教不作封魚京兆有慈親自多平讞不意科臣與撫臣互訐間有詿誤終致昭雪即或時隣錯節范母起行路之哀究且事至完珠王孫副倚閭之望是則二十四嵗未亡之艱以迄三十八年育孤之力雖共姜再出遜此畸徽鍾婦在前讓兹茂範矣伏見臺下士徳儀刑人倫坊表俯念此賢名久著早被榮封苦節堪憐宜旌華閥某等人各有母不匱是懐友曰顯親登堂均感倘得采輿情於中閫申茂舉於外臺俾知大節之琬琰無私至徳之碑銘可恃則髙旌所被日月同光榮奬攸垂士民皆慶也為此具揭須至揭者西河集巻十
