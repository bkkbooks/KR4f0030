body:
  text: 西河集巻八十翰林院檢討毛竒齡撰傳八列朝備傳凡屬史館所分題而與史文有異同者謂之備傳呉寧呉寧字永清歙人年十一補府學生永樂十八年以春秋中應天鄉試宣徳五年成進士上御奉天門親發䇿問退而御武英謂從臣曰朕䇿士不尚虛文欲得忠鯁能抗言者賦䇿士歌示讀巻官讀卷官勉奮爭先摩索得稱㫖三人一廖莊一劉實其一寧也時寧尚年少越五年始授行在兵部武庫司主事㑹正統改元陜西凉州鎮臣以西番囘囘特哷諸族薦居内地徙實兩浙海上寧憐其貧奏給以月饟大者月四斗小半之因著為令已進職方郎充副使持節冊封楚府通山王暨妃周氏却餽餉還部言于尚書鄺埜曰北部衛拉特額森意叵測京衛兵單殘猝有豕突何以為禦宜留山東河南二都司暨江北直𨽻衛所儹運官軍𨽻五衛操練以備非常而以前所調湖廣南京征楚川凱歸之兵使撥充輓輸去埜然之奏行其言十三年福建沙尤賊大起命都督劉聚為總兵官而敕寧同豐城侯李賢簡南京驍騎實軍伍寧閱尺籍盡發諸權勢所隠占者人人賈勇往賊平㑹明年也先破獨石犯龍門洗馬諸城至秋大舉上親征鄺埜扈駕行留寧佐侍郎于謙理部事寧招募報効人王敬等五千名分撥留守五衛附之操練仍督向所留𨽻京營者授以兵仗使并力防禦已土木失利寧慮犯畿甸急陳備邊十事於謙奏留山東更戍都指揮衛頴等請遣廷臣分巡江南北選募鄉壯及巡漕未回官軍持械登城而檄河南實操官舍軍餘暨海防兵悉赴京演操鞍馬鈹盾不給者敕禮兵工三部廉取民間所畜偫償之直九門要地守以孫鏜雷通等營諸軍郭外而徙郭外民入内凡通州倉糧及諸厰馬芻給軍自運取有不盡則焚之毋令飽敵赦諸將之才勇而繫譴者如楊洪等謙次第舉行遂進謙兵部尚書而以寧為右侍郎佐謙掌樞務皇弟景皇帝即位也先復入謙出戰却敵于德勝門外擢項文曜為右侍郎而以寧掌部事寧奏雁門為西邊咽喉所設關隘數十處俱通人馬乞敕都督孫安等増陴濬湟墐墻闕而令指揮石彪孔明于代州伏衆為援兵值福浙鄧茂七葉宗留廣之黃蕭養及貴州苗獠所在蠭發皆屬寧居中調度命將征討也先挾上皇從紫荆關抵都城景皇帝遣寧出城與謙及諸將計議還及德勝門敵驟至門扄未啓敵充斥滿前居民悉奔潰塞路而寧大坐霖雨中指揮顧盻意氣閑雅敵疑寧有備不敢近寧乃復入時畿南民多南徙大臣有請詔天下勤王兵者寧獨不可謂如此則人心愈駭事愈不可為莫若露布告官軍得勝通示海内庶安天下心至敵之得勝而驕驕必敗無容慮也已敵遁解嚴寧乃出慰勞嚴緝京師無厲子弟得乘間者且責山東河南諸撫臣使益儆備而發帑賑被冦諸隘逺近以安明年景泰改元寧力主迎復不合乞骸骨優詔許之及上皇狩回寧乃曰微臣心事畢矣杜門却賓客絶口不更談土木事其後謙羅禍而寧不及于難寧素饒氷鑑初在兵部時謙與寧厚嘗囑寧為女覔壻久之以兵家兒報謙從之聞者駭愕及謙赴西市親屬賓客各鳥獸散獨兵兒冒死收葬當時所稱錦衣千户朱驥者也其先鑒如此張瑄張瑄應天江浦人也字廷璽少貧喪母受書于姊氏李侃之妻稍長即受書于侃正統七年乃與侃同登進士由部屬出知吉安府吉安俗尚巫刻木像神丹漆而冠衣之聚衆送迎導以橫簫瑄途遇大怒叱收像投水中而寘首事者于法無何瑄遘重疾衆哀泣請曰此神祟也禱可免瑄復大怒不許既而疾愈㑹大飢瑄申白不報遽發廩賑乃建祠祀忠節葺文廟修築府􅅟治橋梁道路以救飢者吏部考第一陞廣東右布政使時廣西流賊越境冦屬縣連山瑄督官軍擒殺賊首莫文章等遂築城堡大治兵凡陽江縣賊周公轉新興縣賊鄧李保等嵗久不𠞰者悉𠞰之時兩出師征大藤蠻給綵段銀牌以旌軍功瑄累受綵段十一疋銀牌十四面特賜瑄大紅織金雲鶴衣一襲銀錠寶鈔無算乃造預備倉六十二處修理陂塘圩岸四千六百六十二處増築廣州新㑹等府縣城垣一十二處民賴以安成化四年轉左布政使明年以滿九載當赴京軍民千餘呼譟走鎮巡匄請題留詔許之至八年始奉敕陞都察院右副都御史巡撫福建初瑄所屬州縣多無宿糧瑄命各建倉勸民出羨粟貯之以備荒政㳂海官軍因事裁減支俸三十餘年而遲久為例貧無以生瑄為盡復之閩安鎮出海口二港元時用鐵纜橫截港口而其後遂廢也瑄命所司造鐵纜三毎纜長百餘丈兩岸樹鐵杙維持之中駕二十筏小港如制而纜差縮于大港由是海冦逺跡不敢近至山賊久逋如林壽六魏懐三等皆以計擒之而福安壽寧諸縣地隣江浙多竄聚者瑄捕其賊首葉旺葉春餘盡散去朝廷以為能降敕褒之乃劾去鎮守太監金勝之暴橫不可制者未幾遷河南巡撫首薦按察使何喬新副使陳選改置河南餫倉于彰德水次㑹汴梁飢設法發官廩賑粥于城四門外及各鄉寺觀出官庫衣布查關廂空屋土窯可投止者流民存活者不啻萬數十四年改南京刑部左侍郎以刑獄繁重不得決添廣東司主事一員而親決諸要囚旬日即遍問擬皆如律毋枉十八年進本部尚書二十三年年七十有一遂致仕瑄知吉安時巡撫都察院韓雍威望烜赫屬官皆望塵羅拜瑄不少詘然雍甚敬之暨瑄為布政廣東地方多盜瑄等皆戴罪殺賊而雍復受命提督軍務瑄事之甚謹人以為瑄禮貌詘伸皆有權度獨其師事李侃終身不改侃官至都察院僉都御史潘蕃潘蕃初姓鍾字廷芳嘉興崇德縣人從父京師占籍留守前衛中順天鄉試已而登成化二年進士復姓授刑部主事歴郎中山西沁源王與知州金澤互訐久不得解蕃徃治之核知王左右李成撥置直坐成死雲南鎮守太監錢能攫金蠻部而指揮盧安輩復讇附之幾啓邊釁蕃徃正盧安輩法并請治能聞者壯之已而出知安慶要路者不便改鄖陽時鄖陽初開與陜洛壤接流民多歸者蕃盡撫之土著成府㑹四遷至右副都御史巡撫四川兼提督松潘軍務因上五議請擇守備免徵解折鹽課理屯政嚴禮法常單車行視松茂邊人畏服莫敢輕出嵗罷假道金以千計仍戒守將月出行邊諸凡捍禦撫輯積五嵗而朝廷無西顧憂乃轉南京刑部右侍郎無幾改南京兵部又無幾陞右都御史總督兩廣故嶺外尊鎮撫臣威重自韓雍開府後莅其地者率建牙吹角列㦸擁纛軍門沈沈然被組練而夾甲帳者幾萬人其戈矛子弟紈綺相錯起居護導者無算蕃量留數人僅給麾下使令向相㳂自衛者悉遣征發其與諸將大吏約凡科條如舊無事更擾有以密封白事者一切禁罷之至其節制特嚴一號令出即大將不敢喘息方面官下稍違約束必召軍正治以法不少貸㑹黎冦符南蛇等肆禍海内聚衆號數萬蕃前已授方略至是親統兵逆擊大破之生獲首酋磔于市於是論功進左都御史而思恩知府岑濬與思州知府岑猛以叔侄為土官争地相讐殺濬攻陷思州猛窮走軍門乞援蕃諭濬罷兵濬不從且據地反蕃㑹奏請討密計其所居道里逺近險易調集兩廣官軍及土目諸兵分六哨以進濬大窘伏誅餘者殺降殆盡而豐湖十三徭冦及惠州古三仔唐大髩等憑恃獷戾阻兵肆亂蕃督率部兵左右掩擊殱古唐二渠而餘黨盡散凡五年間計前後斬獲共一萬三千有奇且節縮驛傳省冗費不貲又奏裁其冗官二十七員請改思州設流官陞河池縣為州而割歸德州使𨽻之南寧以控制海徼嶺表大治值正德改元蕃與中官忤乞去不許召拜為刑部尚書而瑾復憾蕃蕃再乞去于是命乗傳歸里初岑濬既平蕃議以思恩改設流官而岑猛失守府治則宜降同知時尚書劉大夏議獨相左乃奏徙猛平海衛降千户而思州亦從改革及蕃去而猛不行據思州叛瑾遂用此為蕃罪逮蕃及大夏下獄將論死姑從減末戍甘肅瑾誅詔復官歸里凡六年卒卒之日屬其子曰吾貧不能喪衣裁被體庳其封毋先為𦵏期吾不拘隂陽以卜趣避晴日無雨漏下窆可也其子收涕從之至嘉靖十八年用御史傳鳳翔請乃賜祭𦵏于石門鄉先是蕃從兩廣軍門陞尚書歸無宅稅他人宅居而隘毎與鄉人飲必露坐花下醉任所之時有詩曰尚書歸來無第宅稅地種花兼種魚舉網打魚魚換酒花前醉倒老尚書蕃得詩笑及被逮鄉人同游者皆相送蕃械繫拱手就道觀者流涕論曰名臣惟清節與經濟不能相兼故汾陽嵗入不下二十餘萬而張氏無名錢遍滿都内然皆不以此損望蕃獨著績南服赫赫都府而至不能治其居與其葬此何為者也古尚書多田不入政府而蕃反從此去官雖宵小實為之然亦足以覘世變也夫吳洪子山附吳洪字禹疇吳江人也年十二為生員同學有訐教官于學御史者洪曰師可畔耶不署名成化十一年中式進士由南京刑部主事歴員外郎郎中陞貴州按察司副使舊例南部無遷副使者遷之自洪始未幾改廣東巡視海道革海舶貢獻例人德之尋陞福建按察使將行海防將軍以犀珠走間道餽洪謝之其人曰公將行之官而顧餽此其無所干亦明矣夫區區之心凡以為有不忘于公者在也且行者餽贐古今通情是亦何損于公名而必却之洪曰君不知洪耶雖百珍珠何益徒利之耳苟知洪則何必是卒不受去洪在福建多善政提刑有法㑹建寧延平潦民飢輒便宜發粟賑之而汀漳軍餉缺急取征商之羨賑汀漳軍既而遷太僕寺卿進工部右侍郎入視部事逆瑾誣尚書劉大夏罪下大臣議洪頗非之時部長缺資望已及洪瑾故勿與出為南京刑部尚書寧河王鄧愈之後兄弟争所賜田宅詔南京三法司覈之其兄倚瑾求勝洪不報瑾怒勒令致仕嘉靖改元進資德大夫正治上卿卒贈太子太保子山次子巖同登正德三年進士而巖以參政先洪卒少子崑登嘉靖十七年進士㝡名山字静之以進士授刑部主事歴員外郎郎中諫武宗南巡跪五日擢山東副使四遷而陞都御史巡撫河南初河南運額兌在小灘久之民勿便正德初移之臨清民又勿便乃移兌回隆而運官受臨清重賂呈御史奏勘山堅持之成化間親王居河南者纔五府已而漸盛自郡王將軍而下幾數千人嵗入不足以需常禄山請以嵗運之贏補所不給時伊王素庸懦宦䜿保金等肆虐不法而王反􅇶之山疏正保金罪使王自新臨漳王府將軍祐椋者招納亡命奸法軌時侵掠民間即祐椋至無不惴惴恐罷市肆閉户竄匿前後諸撫臣至莫敢問山疏免為庶人于是宵小被劾者争遁之京邸搆山短左遷山浙江參議已復轉參政進南府丞仍以僉都御史巡撫四川再遷至刑部侍郎進尚書㑹翊國公郭勛撟䖍播痡諫官上其罪下議議首䑕山憤然曰人臣有直節無遂垢以勛之惡即令驟誅之猶以為後而尚皆咋舌义手雷同豈稱法吏意哉乃陳其不軌論棄市黨附者有等獄上久不報洎秋當報囚而勛竟瘐死獄中帝怒詔山去山聞命即行道卒初山使山東時有塞井復渫民為謡曰彼泥者泉弗浚而復錫我則福及為福建按察使吏民懐之以其父洪嘗居是官也為之語曰鳳之棲兮其雛來儀民具是依蓋既歌其惠又美其世濟云論曰明時父子官尚書者不過一二十家然第世其官耳至于世其德則十不得一二焉洪在官多治行而山能繼之觀其父子去官時皦皦前後宛如一轍史稱身斃而名立又云鸞凰代匿而弗傷其彩洪山則有之矣白昂子圻附白昂字廷儀武進人天順元年進士為南京刑科給事中劾户部尚書張鳳不法自南京械至京詔獄人以為能既而歴應天府丞陞南京大理寺少卿進都察院左僉都御史兼管操江仍巡捕㳂江盜賊𠞰巨冦劉通受其降衆于太倉學宫進本院右副都御史尋陞南京兵部右侍郎鳳陽皇陵白塔壽春墳圮與平江伯陳鋭治之㑹東南嵗歉興大役初賦工者計費若干萬期以七年竣事至是二年竣省初計費之半且以贏錢賑恤災民民反獲濟遂以𢎞治三年改户部左侍郎河決金龍口漕運多沮昂奉敕徃治初至河南從上游相度水勢慮水趨張秋發卒數萬自陽武封邱祥符蘭陽儀封數縣築長堤捍之遂導河自中牟決口至尉氏縣下潁川經塗山合淮水入海於是修汴堤令髙廣如一樹以萬栁乃命郎中婁性于宿州濬古睢河入運道命主事謝緝築蕭縣徐集等口復自魚臺歴德州至吳橋修古河堤自東牟至興濟鑿小河十二道引水入大清河及古黃河以入海毎河口作石堰則水贏縮以時開闔由是河竟不為害而漕運以濟當是時髙郵之甓社湖震蕩覆舟有知州毛實者請開復湖于東岸以避其患昂時正治河于倥偬間立令開渠五十里名曰康濟雖衆争之不少動其彊果如此乃以署掌院事進右都御史陞刑部尚書歴加太子太傅致仕卒贈太保謚康敏昂性尚圓通而遇事機警然尤長治水知州毛實亦以善治水為昂所知實餘姚人成化進士嘗補知霸州以霸為九河之交舊多水患乃自黃岱口至清河口共築堤九十餘里以防桑乾河之衝自莫金口至苑家口共築堤三十餘里以遏中亭河之溢皆受昂指云子圻圻字輔之年十八中應天鄉試明年登進士由主事數遷至浙江參議時有承瑾㫖議開處州銀坑者圻執不可不得已請以贖金充内帑匄免事得寢鄞少年為日本館甥隨使入貢鄞人執少年使大噪圻曰中國亡此人何損治體而乃以璅璅啟邊釁縱逸去長興有田嚙于水凡八十頃而稅仍在民民病甚圻為奏免轉福建參政汀漳盜起圻率民兵至大田驛相拒二十餘日㑹鎮東官軍至合擊之賊解散去進山東左布政使遷應天尹遂擢都察院右副都御史提督南京糧儲上便宜七事皆切時務時京儲嵗入一百二十七萬而所出者反至一百五十餘萬圻以為根本重地儲蓄減耗所出多于所入何以持久請革冗費冗食劾武臣逋負不法坐辜者若干人旋以母憂得疾卒子悦字貞夫初以廕補國子生後推廕與弟登嘉靖進士歴官尚寶司司丞論曰洪宣後為京朝官者多視南京為散地而昂圻父子則皆以南京著功地固未可限哉明時河患與漕運依倚嵗費度支水衡金錢累幾千萬而迄無成效以觀之昂雖復王延世之塞決河何以過矣周季麟周季麟字公瑞寧州人也成化八年進士授兵部主事清禁軍及圻内山東西邊軍得健卒八萬歴員外郎郎中𢎞治初陞浙江參政武康山羣盜起躬徃招之遷河南右布政使嘗曰為官須稱職既至籌國計搜剔隠蠧豪釐不取除嵗解外嘗貯銀四十七萬餘兩撫按交疏薦凡七八上乃以甘州警進右副都御史巡撫甘肅至即勒兵戰斬賊首六十四級捷聞先是哈密忠順王中絶其所立王毎為土魯番王速擅阿力所擄部落數千人來奔甘肅𢎞治五年有安定國王者冒哈密族請立其姪陜巴守哈密時阿力已死其子速檀阿黑麻嗣王仍襲哈密擄陜巴去于是邊陲不靖者有年矣季麟宣德意并脇以威阿黑麻慚伏遂于十二年夏送還陜巴并所擄原給勅印詣甘州季麟受之乃請立陜巴給以原勅而還前所留番使寫亦滿速兒等諸部帖伏即陜巴之族凡曲先安定諸國亦慕義來享當是時帝悦甚賜季麟金綺奬勵加等第季麟久病胃至是以苦寒創甚然不之顧也北庭小王子擁衆數萬入河套徃來波羅賀蘭間季麟厲芻秣捍禦不為患因劾總兵官恭順侯吳鑑怯衂罷鑑而以武安侯鄭英代之時西安設防冬民兵五千以舊警偶召民城守而嵗久為例季麟裁之毎嵗用千人春秋番而罷四千人歸農獨勢人有役民兵者稱不便未幾閣臣薦季麟召還調薊州薊州草場御馬監京營牧地與民田接畛侵蝕往往争訐季麟考圖籍據景泰間奏案改正疆界衆愜服然權貴侵蝕者不便十八年武宗嗣位以病寒乞去既而瑾憾之搆以他事奪其職罰米千石瑾誅例復官未用乃以正德十三年卒贈右都御史謚僖敏孝宗嘗問劉健謝遷曰周季麟何如人對曰季麟好官論曰季麟論處官無分大小務稱其職故歴官所至皆能有功而卒以守正為僉人所抑官不竟其用惜哉明三百年多文臣用兵而季麟以畏寒之軀黽勉邊陲間觀其處哈密一事張大國體濟以德威使諸番搆禍于此暫息其以方之魏尚之守雲中李勣之督并州又寧有憾焉附録黒分省人物考周季麟傳稱土魯番之叛臣速檀阿麻按阿黒麻即速擅阿力之子繼阿力為王何為叛臣及考哈密本末知哈密有臣馬黑麻叛去歸土魯番是誤以馬黒麻為阿黒麻矣又稱國人擁立陜巴為哈密王亦非也陜巴係曲先安定國王族屬冐稱哈密族而尚書馬文升誤信之遂立為哈密國王因復啓土魯番之釁若國人所立者為罕慎非陜巴也又云陜巴之弟安定國王干奔按陜巴為干奔之姪實録明載人物考之舛錯如此彭清巡撫都皇明實紀論哈密功甘肅總兵官都督御史周季鳳而下陞賞有差則誤以季麟為季鳳矣誰知我是伯楷耶傳載哈密與土魯番搆兵一節云西陲結怨者四十年考是時𢎞治五年去成化九年始事之時不過二十年傳不深計耳賀欽賀欽字克恭義州衛人成化二年以進士授户科給事中㑹陳獻章被徵來京師聽其論學嘆曰至性不顯寶藏猶霾世即用我而我奚以為用即日上疏解官去執弟子禮事獻章既别肖獻章像歸構一室懸之朝夕瞻事者十餘年𢎞治改元用閣臣薦起陜西參議檄未至而母死乃上疏懇辭且陳四事一曰資真儒以講聖學二曰薦賢才以訪治道三曰遵祖制以處内官四曰興禮樂以化天下大略謂師友之臣當求真儒檢討陳獻章學可大用是宜以非常之禮起之使任内閣或經筵官而内官驕恣裁以祖制如内府監司局庫衙門載之祖訓内官條中察其職掌不過灑埽供奉關防啟閉而已近乃參預機要干犯政令非招權納寵叢奸府賂即邀功啟釁流毒邊徼甚至引左道以蕩上心進淫巧以盜府庫此其陷君誤國蠧政殃民既已鑒諸已往尤宜毖之將來内不可使職掌奏牘得預政事外不可使鎮守地方掌握兵柄至若奉常正經教坊俗樂㳂革去取尤宜慎重疏凡數萬言奏入報聞正德四年逆瑾括東田東人驚恐而義州以守臣貪故思變至是先發聚衆東西劫顧相戒曰毋入東街驚賀黃門欽聞之身往諭曰公等吾鄉人也今不幸至此良苦然吾竊為公等憂鎮城兵不即至耶如之何衆初洶洶既而有省呼曰願教之欽曰惟不殺人而已守臣激民變民無辜今不殺一人待命是良民也良民何畏焉未幾有言鎮城軍果至者衆復譟曰賀黃門無嫚語環跪欽里門欽曰吾固知有是也雖然汝仍不殺人誰則殺汝是在我而已衆散去遂定邊將有誘殺邊人罔報功者按之不得實一見欽即慚伏曰他人可欺吾敢欺賀先生耶欽學以為已為本方見獻章歸閉門静坐有來學者輒辭之曰已之不治何以治人既而從游者甚衆然于是人人知為已之學其後薦引相屬終不起卒鄉人祠之凌溪釣臺其所隠處在醫無閭山下號醫閭先生子士諮能傳父學嘗陳十二事論王政不報辭疾歸終其身不仕附録永賀欽義州人屬遼東諸書皆作遼西誤遼西在今平府且籍貫無稱古地名者不如直稱義州為當中稱白沙為新㑹縣歴事監生諸書皆然按是欽疏疏在𢎞治元年而白沙于成化十八年已授檢討則此時不宜稱監生矣近觀史竊所載改稱檢討遂從之西河集巻八十
