body:
  text: 西河集巻六十四翰林院檢討毛奇齡撰碑記三新建東來禪院碑記城東便飲庵不知剏于何時相傳明萬厯間結團瓢路傍覆路以茨而施飲其中其後稍門焉而為之堂易茨用瓦作亭桓三間内祠武安今俗稱闗王廟者葢其舊也桑門慈公自六嵗薙染即已隨其度師蓮臺住持此庵天啟乙丑創觀音殿于故祠之後公實首募逮崇禎十三年武安祠圮則公改建之公之繼蹟亦勞矣祠本北嚮臨渠而衝凡往來而道過此者絡繹蹴踏梵井不潔公乃割祠亭堵以甃甓轉觀音大殿使負祠别為三重南其門由門而入而地藏而大雄其一即觀音也堂殿清肅法象映曜佐以廊廡寮舍井厨樊溷之屬自順治乙未為大雄至康熈癸夘而地藏成猶憶創斯殿時先君子太君早為信施而其後始合募也乃落成之後更名禪院顔以東來按初祖以東入中國稱西來矣今院剏于東而其來有自彼以西而來則其所來者不在東與且夫往來安有定也公名某字慈光郡之餘姚人精嚴戒行嘗從法師受諸法髙坐演説且勤于院事自創建外歴置常住田若干畆燈油田若干畆桑園静室各一其徒衆林立皆有名號是可銘銘曰惟師繼蹟實惟蓮臺乃以東土紹彼西來祗園既啟寶坊以開開山者誰尚其傳之重建隆興寺碑記自漢明于東都門外剏精舍以處摩騰而世之為伽藍因之顧開山卓錫多據勝地而其後歴刼不毁至有毁而旋興者豈亦有神物持其間與隆興寺在金泉井東去城西一里負蕭山之麓而前撫支渠舊傳晉隆吉將軍所建歴唐宋而元而明興與廢互矣然嘗考將軍無隆吉銜而南陽隆姓至今不絶則意將軍本氏隆而以表寺者乃其後更名接待募田飯衆而在宋乾道且有力請于朝使仍還舊額則夫初事之難沬豈待問哉特寺廢于元復興于明其自至正以逮永樂中間年嵗相距不逺而永樂以後不知又廢于何時而逡巡變易漸至經數主而不之正也徳師明然從􅄔州來由西吳渡江處于湘溪者數十年既己修復浄土西方諸院巾幢相映鐘鼓遞答乃復慨然以隆興再興為念㑹其地為丁氏别業丁君大聲者夙嗜苾蒭且與師為方外交因師請次遂盡捐故址半為信施而師亦稍償以募金之半順治十六年預訂信約至康熈建元有六度地立程簡材陶辟凡舊時亭檻細杗纎杙翳于荒埒者概從徙置而近城居民獻力薦貨稍稍應募遂于無射之月陳梁立棟爰䜿寶坊自後院始工由漸而前衛之廊廡且礲且沐以潰于成然後丁君手勒捨牘付嬗不朽大抵繚垣中外圃塲竹木皆為寺有則丁君履道之施固不可忘而師以繼蹟為開山之業非元度再來未能肩也師初過别業夜夢五丈夫者胄而前交以所住曰為汝守若干年矣師猶豫五丈夫曰此本公故居而寧忘之耶後果如其言師東陽人八嵗薙染既長歴參知識文句蟬脱自處尊勝或欲授信拂而師不受其所度弟子多披伽黎湘溪蛤庵其一也記曰蕭山之麓湘湖之濵舊有招提奕葉以湮考其攸始晉之將軍紺城初建蓮峰肇新既更接待漸就荆榛何幸大師重開祗園因方丈地䜿不二門青山白社中還璇宫雖其所守不無鬼神亦緣長者有如珣珉黄金布地白象承輪凡所繼蹟等諸開山歴劫有盡𢎞功難泯後嗣興者視此碑存甘露亭施茶版記佛家以布施為功徳茶其一也夫徳貴相忘一茶之餉予者不見恵受者不見感然而心脾之沁莫過焉望京門内舊有禪院名茶亭以㰕舟去門近路縮飲少今則數里増一亭臨江之亭所藉最亟風雨昏暮假以延憇飲者尤衆比丘清源既募以建亭復發𢎞願為施茶募冬湯夏水相嬗不絶夫醍醐甘露稱為至味故晉史謂甘露仁澤也又名天酒今一茶之餉比之甘露其澤溥矣而善信以隨手成之則是未央之降不足竒而楊枝之灑為已勞也亭成于諸當事大䕶另有載石此専記施茶姓氏以次臚後為永永勸某日記吳江宿蘆庵碑記夫初地有二一曰精舍如祗園之布以黄金是也若是者助衆居之一曰浄居如古徳之煮飰于草茨是也若是者自得者處之松陵惺公少而落染歴㕘諸方者二十年既已浩然有得矣乃好為獨處不欲受大鑒以來諸宗記莂還歸北麻結庵于鳬水之南一時善信共成之始自乙未終于己亥迄于今又二十年矣其間治綯飾墁増團改標滙畜水虫為放生㑹各有建制而獨其命名有曰宿蘆若類乎蒹葭之詠在中者及詢其所自則以公㕘諸方時凡報恩平陽各欲授公以信具而平陽過金粟已示衣拂公便遯去故平陽贈公拈舊案云佛祖位中留不住夜來依舊宿蘆花遂以名庵則是公之為古徳而不必為助衆有若是也夫比丘好修非云自足故入㕓隨手原欲以入世行出世之學而公獨夷然去之若凂一似甘心于草茨以守其所為廣嚴家風者夫同一出世而自得之處仍不同于助衆之出則即一出世而出處分焉陸佃云蘆即葭也髙者為蒹宿蘆之避法不猶之蒹葭之避世哉湘溪蛤公從麻來砥石索記蛤公為予言當公從楊山落染時摩頂者五人四受記莂而公終堅不肯受公志可知矣記曰誰謂道人而有其家吾為之詠詩之蒹葭或曰不然如彼𤣥沙但持瓢笠不着袈裟焉知所處南麻北麻三間茅屋一片蘆花崇祀何太守義愛祠版記何公治郡之明年民愛之僉曰何公愛予夫予所不得于天地父母者而得之于公如潦之下澤如徂暑之啟向如勞者之就息于桓東林樾之間渴之趨水提抱者之于煦嫗蠛蠓蠁螘之于靄然以渰于是天有愆時曰公能回之人有不得意曰公能慰之國家兵刑甾祓繇斂征尅馬牛韭豉之日瀆于其境曰公實能捍衛而保䕶之㑹公遭大故將去越田父輟耒工估罷市肆女下機織讀者散編摘而却術序争趨督撫號跣請留自㑹城泝江匍匐金衢戈㦸之間督撫憐之簡古四制獲門外之治斷義以權且郡方用兵得倣三代弁冕服金革遺事而公故辭之而不之受也于是民愛益切謀祀公義愛舊祠貌公像而勒版其側夫為民師率無過守令顧令親而守尊故居髙逺睞俯而摘發唯神采激越是尚而從來吏治循良必推兩漢以彼其時凡英君偉輔盈廷卓犖何難取為吏而矜張之而咨嗟奬勸一則曰長者再則曰長者哉誠以吏在親民慈恵者多功而操切者寡要也公治本至誠其愛民一如已子興實利去實害剖悉情隠煦煦然無訶斥擊斷有懐匿弗得白使緩上之其引譬諄諄惟恐傷民意而丁寧告戒即弗悟不忍遽絶其愛民如此此豈古之所稱長者非與夫公實愛民而民之愛之有何疑焉若夫臨大事忼愾不囘其御彊兵驁吏必振掣不少借下至㑹羡緡算城梁館廨郵置坊築諸妄璅屑必不容干以非分以恵愛若此嚴毅若彼世所傳勸農興學簡訟䘏獄戢兵弭盜招流贖鹵却縑辭肉皆公之緒事而非所記也按吾郡循吏自漢劉公後在宋推范文正公故祠名義愛實愛祀二公而民以為義今且得我公而參之嘗嘆守令勒銘多用民諛而我聞在昔以閣臣二十人分典大郡宜無所不得于民而其後還閣惟二人政績得記之石然則貞珉之未易冒矣公諱源濬淮安人由建寧府别乗入覲值甌閩兵變遂留京改為今官嘗謂公曰覲君免亂痛父去職此忠孝兩全之道也今且騐其能得民因為頌頌曰相彼錢江曰惟祖榮亦越清白文正以名於赫我公逺用嗣興若耶之水倍為清泠蒞郡無幾愛如所生耿純却任山公直情銘勒有盡義愛未央庶幾永祀以昭徳馨重置掩骼公田碑記宋元豐間陳向以朝官為開封界使者請斥官地塟無主稽骸八萬餘具毎三千為一坎環以溝洫什伍其坎而圖表之畫地之一區葢寺貌佛令住僧一人掌其籍此即漏澤之制之所由昉也今其制不行而漏澤故址浸圮于佃兵燹之餘其為暴露者多矣明崇禎間郡南郊有擊竹庵守者恒鑒白之道使者鄭公為掩骼㑹大抵醵錢作社集枯藏朽而一時邦賢若都御史劉公司農倪公開府祁公左庶子周公共成其事而其後稍替也今恒鑒弟子圓行愍先業之隳募諸善信遂合虞君咨牧吳君飛羽金君自昭劉君孟雄姜君汝皋輩同為信施置公田如千畆就城闉山麓堲其坎而覆以龕坎如干骨地如干坎嵗給工役畚鍤四向捃拾道路之不藏者穴龕以下畆鍾所息出入惟記如是有年康熈甲寅剡川上下山㓂竊發延燎不揃遂至薄郭時官兵驅殺多所俘鹵而城南居民有在鹵中者二十餘人圓行傷之嘆曰埋死與救生一也遽鬻田請贖而是時驅殺之餘血肉糜漫然既鬻田去知已無可如何山隂何君調之為鹽運司判官算商于揚圓行匄姜京兆書持鉢竟往謁君于真州而告其事君慨然予金如干且握其手曰師當再來歸復置田如干畆重為掩骼而請記之石昔都御史劉公為京兆時值崇禎初畿輔方不戒于兵督師崇煥敗績洎罷而公瘞陣亡將士自徳勝蘆溝諸處埋骨三萬葢戰争之際瘞掩尤亟故後魏汲郡賀蘭荆州皆以戰鬭謀藏骨法而宋汴多事所由元豐之制較詳于後來者也今太平有年而東南用兵遂已及此此豈可視諸君之助為細行而委之釋氏而不一思復漏澤之制某記修復福清禪院碑記向予觀梅西溪時已從徐氏庄直抵安樂將欲過福清而不能也或曰福清在安樂山之隂左接永興其地環九龍而負層崖當西溪之勝故游西溪者必過福清而其後從秦亭還仍不一過今年秋周子子鉉攜西溪僧來謁予為記曰予方游福清而福清院主介香城院主以記文請因詢其所遇及所知見然後知福清之從來逺也按院創自唐貞觀建元以竹院名而僖宗中和間有禪師性空者居之改名傳教種竹萬餘竿遂為勝場歴傳至元天厯復䜿殿堂于萬竹中間以雜梅一時游者多為詩鐫其堂逮明萬厯之末則尚書陸公太史馮公以及了凡袁先生訒公嚴先生徳園虞先生輩共為䕶持䖍請禪師桂峯駐錫其中重開浄居恢復舊業而以師從天台來福庭清涼與之相埒遂易今名若其竹則未知其與舊何等而不謂數十年間之興廢已疊至也今律僧自慧偕其徒濟生竭蹶匄募仍還故觀凡殿堂寮舍趺蓮承藻魚蠃鐘杵巾盂幢幕燦然一新而梅花而竹仍獨擅西溪之勝且其地四界自兵火後半為有力者占佃而師盡復之夫佳山佳水原足係人之流連況儼然初地歴唐宋元明累刼不毁而又加之以十里之梅萬竿之竹當西溪之地之勝向非慧公師弟力為修復其為天下所懐思而不得見者葢不知凡幾也然則師之功可少哉吾他日乗興尚當入西溪重抵安樂以窮其所謂福清之勝者而記之以是傳是齋受業記予避人時以詩傳人間人争誦之愛予者至為予鏤板使行逺㑹七閩兵變閩中造紙畨者槽厰俱廢板為之枯人之誦予詩思得一印本傳觀日貽牘走使取索不應予友徐仲山曽得予印本藏之家其女昭華者好之請于父曰吾讀唐後詩不恰于心獨是詩者􅐞然若有㑹吾思以學之而不知其為何如人也父曰嗟乎此吾友西河者也其人窮于時流離他方吾方欲為文招之而若好其詩他日歸吾請為若師女曰諾其後予歸里而仲山貽予昭華詩予讀其七絶大驚以為吾向學唐人詩時偶有得庶幾類于是今不能矣而若人能之吾不信閨閣中果有是仲山曰是人已師子故詩頗類子而子翻未之知耶且安見閨閣中必無是也未幾越中果有疑昭華詩非已作者聞于昭華昭華怒乞其父招予請自試予時以他往不赴貽試題二一擬劉孝標妹贈夫詩一賦得拈花如自生則摘范靖妻詠步搖句也時昭華未嘗為古詩學為之其製效原體而下句妍婉與原詩埒葢昭華天才也乃仲山復貽書曰以試題遙示是豈吾父子意哉夫閨閣亦人耳少苟誦讀與男兒何異而必謂閨閣中當有偽向使吾家無此女將不得復張吾門緒乎哉顧事有實然不可謾也他日倘入郡尚俟子過我了此一案又一年予入郡過傳是齋傳是齋者仲山尊人大司馬公所居齋而司農倪公贈名者也其上為青未閣昭華向居之與其母商太傅女名景徽者曽為青未閣十景詩流傳人間予嘗和其二而未竟也今齋與閣皆為仲山著書處而予過是齋昭華出受業謁予為師既罷仲山復請試以詩時予方就飲甬東仇石濤在坐㑹昭華為其祖從母范郡丞夫人作畫幛予喜其畫蝶遂命題畫蝶五絶而以坐有甬東客限以東韻語未絶而詩至誦之一座稱嘆予喜而和之且為二絶句記其事夫天下閨閣多矣貧寒者既鮮誦讀而大家帷幙易于掩翫且嬌稚好閟自女師保傅外鮮肻執學即或執學而非女齒卑幼與通家世好如予者則亦不足為女師夫是以粉飾者多而洇没者亦復不少顧吾聞在昔唯伏生之女以傳經為晁家令師而班氏居東觀朝士各請受漢書閣下衛夫人授王逸少書法若韋氏宋母則以絳幔授生徒封宣文君者而閨中受業千古未有唯予以老大陋劣為昭華師然則予藉昭華以傳矣昭華有夙悟始寧山川唯徐氏門閥代踵偉望而昭華尤獨擅山川之秀仲山曰昭華幼不喜針刺及問名後其家名族也姑遣喻昭華習女紅略習輟去暨歸而小姑攜繡床令繡曰不習也無已請小姑繡吾學之可乎及成以所學繡與小姑繡共呈其姑令辨之姑指昭華繡曰是最善其慧如此予暮齒無嗣流離還里門其詩文荒落不足傳而昭華枉師予昭華必有以傳予若夫受業則昭華已能詩多才予敢有所加于昭華哉昭華兄曼倩外君駱子佳采皆侍予執猶子禮其所試數詩暨予詩已載别篇附畫蝶詩渾蛺蝶翻飛去翩翾綵筆中雖然圖畫裏似覔花叢餘見詩話巻何使君九日龍山張别記何使君以外訃至去官人之留之者湛舟塞路呼告于兩臺使君兩臺使君憐之許題請起復而使君從甬東還走辭過曹娥江痛娥以弱女能殉父死而身為刺史乃不能以終制去慟哭書哀詞一篇投之江徒跣遂行于是兩臺使君諭止之隨例報憂先是郡署有亭在龍山之顛其亭當郡臺而敞可四瞭名曰越望即唐時望海亭故址也今傾廢有年而使君方修復之㑹九日將落成僚佐咸集而民之呼留不得者請得于此日一見使君作張别狀時使君以候代既為位納弔後尚棲郡署乃應父老子弟請慨然登亭與之告别自亭以下毎一坡置酒一盎施以杓而佐之以蔬時集者數萬人蔽山填壑使君拱手持盃及脣而不釂初與僚佐語建亭事坐中嘈嘈及從容言别民皆翹首屏息耳察蠮螉已而慰勞父老子弟争持盃再拜呼聲遍山麓及其既而各請垂訓伏地流涕至不能仰山下逺近望見皆太息有泣去者予時以外邑不能赴聞其事輒恨以為千百年無此事而今偶有之然又不得親見越數日而人之傳之者藉藉若睹夫人居平隴畆比户相對初亦不覺其可親及其背而思之即或偶然邂逅相視嚄唶未嘗有金錢相留遺酒食相厭飫而傾葢而親既乆而相憶又乆而執手咨嗟不能相别即别而終其身記念不能相忘者比比也況乎深上下之情而浹肌膚之愛者哉昔鄧攸去吳興與父老子弟連舟並行話别三日而白傅去蘇與杭則張之武丘之路湖水之濵其一時流連之情皆形諸詠歌而見之記載今吾郡太守與父老子弟相告别者前有劉祖榮今有何使君然則龍山之張别其可已哉一錢之江與九日之亭争先後矣郡人士各有詩歌及賦序傳之而屬予以記因記使君名源濬即淮之梅庄先生今治郡以慈郡人又有稱何母者西河集巻六十四
