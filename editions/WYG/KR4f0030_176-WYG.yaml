body:
  text: 西河集卷一百七十六翰林院檢討毛奇齡撰七言律詩三西園書感河中之水莫愁家不數南鄰張麗華相逢恰是三春裏連人看當一園花斯時挾瑟彈流水此日傾罇繞落霞誰信平臺詞賦客十年漂泊在天涯江上逢何永紹樅陽才子郢中行江上逢君詩倍清客裏梅花冰雪候天涯樽酒弟兄情髙談自擅司空譽就辟何慚驃騎名他日吕亭相望起莫教春草負生平同衞㕘軍登萬嵗樓㕘軍髙興發清秋落日同登萬嵗樓北顧尚驚雄塹立東來不斷大江流京門斥堠連平楚吳㑹車書領上游一自建康王氣盡凭欄千載總生愁泗水亭漫興去年折柳淮河曲今日看花泗水間此花此柳應長在他日他年何處攀風起宫臺來古縣雲開芒碭見空山千秋城下蕭條久不信春光天際還寒食渡江吳闗千里燧烟通掛去長帆返照中三月暮春行海畔兩年寒食渡江東風吹官柳城邊緑雨後山花壠上紅惆悵故園年少在鬭雞蹴踘與誰同風雨渡鄱陽湖鄱陽東滙大江隈渺渺層陰曉未開萬頃波濤連地湧一時檣櫓自天迴山浮星子蛟龍起雲滿湓城風雨來莫道南溟苦流滯此中尚有濟川才同諸公陪蔣斐集蘭亭青龍江畔舊鴟夷採蕺還來古㑹稽車馬共臨遥渚外衣冠髙㑹夕陽西風摇修竹歌來緩桮汎春潮坐欲低猶是永和王謝客禊堂千載望中迷飲宣城王博士宅喜遇丁禮部澎時禮部還自塞外謝朓髙樓不用攀開樽只對敬亭山為看秋色停征屐喜見春官佩賜環遷客九章詞句苦思君十載鬢毛斑獨憐決起搶榆鳥也滯江湖乆未還寄酬海昌陸宏定不向山頭擷紫芝空令腐草蔓桃枝風霾菁磴吹霜薄日斷茅堂解凍遲陸賈自無干帝語毛萇空受獻王詩天寒衣帶從來緩深愧加餐慰素思送丁四六世弟北游鴻鵠將飛怯羽翰登程猶自惜衣单受書共憶聨牀苦古調誰歌行路難薊北黄雲驅季子山中白髪老師丹前途剛值東風厲客舍雞鳴慎蚤餐海東與北平韓子晉懷舊作曽無候騎至回中屢有旌旗向海東去節王烏難繕塞懸金魏絳又從戎營連白晝龍城暗鐃發清霄鷺羽紅燕頷猿肱愁未見封侯重數漢諸公木弟桐音伯調奕慶諸子集東書堂各有詩見懷悵然賦之茫茫逺樹一江分潎潎流泉兩岸聞愁思自能依落日故人不用賦停雲潯陽地僻追三隠林下名髙愧五君滿目黄蘆圍水宅幾時歸雁好同羣施大公子彦淳生日作清江緑草炤青袍二十趨庭一俊髦有弟共分荀氏玉憐君先佩吕䖍刀經傳碧嶂星俱動候近朱明天漸髙自愧修塗長擬附春風萬里鳯凰毛客中禊飲值朱三驊元生日名賢乆集楚江濵不道相過又暮春三月良辰稱上已百年初度在庚寅殊鄉未負懸弧志躍水誰為捧劒人故國蘭亭重吾侣莫教嵗宴轉傷神寄廣州使君使君五馬去南天皂盖彤幨領郡年亷勵乆推吳處嘿風流何似謝臨川行春人在珠江裏來暮歌成桂樹邊五月南征吹笛杳嶺頭誰遣一枝傳枉䝉王公過問闕展侍且遺減菴二集捧讀因寄王子洲中搴亂流越人無分賦同舟尋來禹穴探前史載去東陵是故侯夜雪幾因興盡返明珠不惜暗中投君家自具名山業擬報千秋思未休寄傳宗孝亷尊公江園東風吹日上江汀野老江園酒未醒最喜道傍無剥啄且看膝下有寧馨三春柳葉穿鶯語百尺桐花繞鳯翎五十年來蓬島興幾時同醉草𤣥亭寄何奉新兩度西江採緑蘋南昌城下幾逡巡共稱子賤真賢宰最念何充是舊人牛斗星寒酤市暮龍溪花發訟庭春歸來倘覔柴桑侣應有扁舟到奉新寄送周司馬赴雲中平城司馬詔初頒萬里南天引斾還星使蚤辭牛斗郡雲州髙入雁門闗王程供帳三春後客路滄波一棹間徒寄相思當飲軷䖍陽花樹望中斑二從來刺史重雲中此去應垂佐郡功異代賢王猶講射君家太尉本清戎白羊山映春田緑金鳯城連夜燒紅暇日題輿増騁望可能還顧舊江東酬麻二處士乾齡聞君髙卧古稽亭邂逅江臯草正青一代曠情同蠟屐千秋遺恨在過庭當闗候雁天邊盡滿眼春雲海畔停莫怪和歌忘蔓草毛詩廢乆恐難聴施使君臨陽講堂作臨陽采藻誦于胥喜共羣經載後車斾裏蛟龍全拂騎堂前鸛雀重銜魚韋賢自領諸儒學盧植終傳刺史書壟畔遺編方倖託敢言河上有先廬李賛善歸覲曽參詔許下銅樓賜傳還鄉擁桂斿江橘蚤垂南苑露陔蘭長樹北門秋蓬池鯉鱠遺羮在粉署磚花愛日留賚得纈袍當綵服何須不作錦衣游舟過金山昔年曽取中泠水正值梁王北顧時揚子驛前雲漠漠潤州城下草離離千秋鐵鎖横江險三渡金山破浪遲當日妙髙臺上路岧嶤不見使人思客中元日金雞唱盡曉鐘天元日他鄉倍可憐隔嵗總成虛度月今朝重數未歸年梅花香煖開官閣藍尾桮深醉客筵誰道故園東望逺春風萬里蚤回旋長至長至長留樊水濵三陽又見琯灰新登臺誰似書雲客舊館曽攜添線人道逺屢違江下信律窮終度斗邊春他鄉風物年年改欲折梅花淚滿巾送王五文璜游成都臨湘西去一孤舟髙溯瞿塘上益州萬里橋懸秦棧樹七盤闗控蜀江流郫筒春酒招山館錦堞秋花繞郡樓君到若逢裴節度草堂雖好莫淹留漫感芳草生時憶故居洲中帝子尚愁予遺人千里雙鵷珮誤我多年尺素書桐苑雪花春乍煖叢臺雲氣晩難舒可憐只住空潭曲盻殺琴髙赤鯉魚途中襍感一首與茂倫幾見濡須春水生逢人不用悔微名悔一作晦無材濫著吳都賦好辯難降燕將城車輓嵗連横海粟戈船春發下江兵摩天鴻鵠翻飛杳隴上何人敢輟耕吳陵望月呈姜侍御吳陵望月獨登臺萬里清光冉冉開海樹叢生秋雪落江門一片夜潮來人逢枉渚袁宏放嘯起髙樓庾亮才只有南飛烏鵲侣月明繞樹不曽迴即事為病校書作銀牀斷綆有誰收人病還歸江上樓皓月近雲行過疾空欄壓水坐來浮開奩夜起燒殘蠟捲幔涼生墜曲鈎滿院穠花開不盡一枝迸作露華流塞上五陵年少喜擒生長在居延道上行天馬幾時來絶塞秋風一夜入重城黄花戍裏明戈劒白雁闗前捲斾旌祇恐城南留少婦月明中夜怨長征同雲間吳山人沈翰林游紫陽洞横江髙堞倚天梯曲磴盤空極望迷雪盡兩峰寒雁度烟臨萬户夕陽低層巖裂石分丹壑一竇穿雲滴紫泥坐對瀛臺仙仗客何年蓬海共招攜海昌沈亮采陸嘉淑過黄大運泰文園登髙峰刺史園林曉未開一時雙玉照人來共登髙嶠風初霽坐看寒江水自迴山木接天懸畫棟溪花散雨落蒼苔雲間兄弟東陽友誰是文園作賦才漫贈陽平樂部錦雲標中有真娘似阿喬曽下吳宫教度曲重逢隋苑聴吹簫雙瞳夜剪巴江雨一笑春生揚子潮杜牧未來韓判去可憐二十四條橋垂虹橋投顧有孝居曉風吹雨到吳江百丈垂虹似飲駹新水茭花横夜艇故人椐樹倚秋牕龎山初日摇珠塔震澤迴波灑玉缸田舍乍逢皆衣褐肯教季布徙他邦龍江闗眺望建業重闗控上游龍盤虎踞舊神州荆門西扼江流下越徼東連海氣浮故國山河天塹合夕陽宫闕石城秋登臨轉覺鄉闗逺日暮蒼茫涕泗流李瀠孝亷游越歸過别不值賦寄有作才名十載重江都二月春風到鑑湖柳下荒祠來解珮花深匹馬去當壚迴程暮值寒潮迥逺道天低海嶠孤我欲西陵送歸客長帆不見浪糢糊梁溪黄君游越天涯冰雪老黄香皂㡌相過朔吹涼月旦久傾豪士駕風流今識丈人行鄉亭酒濫淹游屐官寺花寒駐客裝探秘不須尋禹穴玉函金撿鎖蒼筤黄君到節使君下榻適在徐渭里中寺有渭題詩壁黄本慕徐睹畢恍然因屬記事羊裘短劒涉江來自比山陰狂士才客舍車裝留下里官庖鼎肉餽香臺南州人去餘青草東壁詩題掩緑苔何意宣城懷謝朓樓頭佳句為君開贈任孝亷雲蛟計偕我歸江左還投筆君向長安又上書從此雄名髙帝闕況同令弟在公車時其弟新登賢書蓬池泛雪看留賦柳汁盈條好染裾他日内廷能召問莫言臣里有相如友人北征駿馬翩翩赴薊城吳闗折柳送行旌良時宣室君才壯落日河橋客思生曉店商歌迷玉樹春盤仙露滿金莖三街九市千門啓只待雄文賦帝京初春送人還吳江并呈沈進士自南顧隠居有孝王孫歸去草萋萋極望吳江芷葉齊曉騎獨驅沙雨外春帆遥墮海虹西車書越徼通金馬戈甲閶門罷水犀誰似隠侯詞賦客顧榮琴瑟鎮相攜客邸别故人子傅以成逺游西風對酒曲江頭數頃芙蓉掩畫樓健翮蚤成應萬里飛蓬不落已三秋蒼生久恨王夷甫佳子當如孫仲謀渺渺長帆雲路杳山中叢桂幾能留中州吳文學寺寓蒼蒼山木曉流丹訪剡歸舟路渺漫時作洛中新賦詠重逢鄴下舊衣冠江雲龍轉空臺靜塔樹鴉棲古寺寒念汝諸昆曽締好十年回首盡􅆖鸞夀李少宗伯西湖春官旅第啓艨艟萬頃湖光照七松東國甫侯生岱嶽西征天子重河宗麟游大澤蓬丘近鳯舞秋山輦路重繩祖曰湖上西山有龍飛鳯舞之目為宋擇都地當日老成看漸減唯公雙鬢削芙蓉醉後送少年逢君醉墮黄梅雨送子晴登白馬橋去路雲銜初落日横江風急晩來潮蒲囊永夜呼袁彦葛帔前塗遇孝標我欲援琴歌伐木天涯四望淚瀟瀟送徐十五緘之揚州與舊刻異嫋嫋長帆浙水濵停帆一送柳條新鄒陽不愧名園客阮瑀還為入幕賔赭口雪消迷賈舶渭城歌罷醉離人東風前路催花發愁到䢴闗是暮春西園讌集和吕錫馨張修崖韻西園飛盖集名才知是曹劉鄴下來繞座哀絲揚妙曲滿堂髙燭炤銜盃青蕪夜合車前草叢樹風生井上槐倒盡明河人未散城頭烏鵲自飛迴六安黄曉隨𣙜使自杭還京有寄樟亭一别萬山凋隔㟁思君對海潮伏枕黄梅愁永日閒房紫槿發清宵天垂雲路開吳嶽人與星車赴洛橋緑綺南金無限意莫教雨雪望中遥來太僕生日圉師早嵗謝天闗十載王官首未斑坰野駰魚林下度瑶池駿馬雪中還臨江軍散依新壘洛社賔閒老故山當日趨庭隨九牧曽平五校扣金鐶姜琦曰來方伯平白蓮賊長公太僕與焉贈别欲採江花贈别離芙蓉吹落晩秋時自憐此地牽裾早却恨從前解珮遲山岫暗摇潮欲上帆檣不動㟁初移相看多少留人處不獨垂楊幾樹絲送葉襄還歸吳門東尋禹嶠度清秋嵗晏吳闗不可留樽酒道傍遮落日片帆江上惜歸舟雲横虎阜鄉程近雪滿鳬城海路浮祇恐愁心如細草春來彌望在長洲贈闗上榷使君東南財賦挹流波縹緲星查下浙河山澤舊看行部逺闗門今見著書多春風市賈連甌越曉日梯航接海番自愧經生少文學漢庭心計久蹉跎送王之珽之閩中蒲帆初下楚江津又理征車度七閩甌越宫臺雲外曉郎官山樹望中春千金自載南天使萬里還隨下瀨人少小請纓終有待釣龍亭畔慢傷神華亭蔣隠居六十谷口青雲浦口魚杜陵遺老自幽居經時不用公孫學避地還傳尹氏書碧海放舟寒嶠逺瓊臺吹笛早梅舒莫言玉洞金光少六十年來見有餘二十年兄事杜陵生有叔賢名過始平杜陵生大鴻為隠居猶子築室近開三泖路藏書髙並五茸城風迴鸞鳯調金瑟花下珊瑚啟玉罌不道𤣥瀛洲畔客今來才有杖鄉情即事江舟歸度板橋西灧瀲江波逐望迷髙閣近垂紅杏小横塘深覆緑楊低晴風午幔聴啼鴂寒食春城罷鬭雞前去使君能盡興習家池館在清溪登山陰朱相公東武山居同吳二卿禎徐二咸清商十八命説作台師公府領三旌賜地還留東武城開閣虛延賔從入築沙髙是相君行環巖露䋞凌遙廓絶磴秋花繞太清十載謝安勞偃卧天階相望本昇平二相君治第並滄洲齊郡靈峰起壯游海内羣思師尚父山中曽卧富平侯崇臺萬井搴珠箔曲檻層霄蔽畫樓回首華林行樂地白雲長繞舊宫溝東武山從齊郡飛来故稱靈峯劉駕部宅即事新河門巷水澄鮮駕部風流不記年幾葉鳴睢開府後一行雛鳯過庭前歌屏綺合珍珠履酒甕香分翡翠船舉目龍山如罨畫支頥有客意悠然葉燮同侄舒崇宋思玉游越寓玉虛道院江東三俊早知名嵗暮同來勾踐城節使開樽官廨冷井公留榻道壇清秦屏雪後山花凍禹穴烟深古樹平莫問舊時朋好在十年采苦竟無成舟過漁林闗望沈功宗墓落日漁林放棹遲故人宿草望離離深憐子敬琴亡後恐負橋𤣥車過時江濶市亭環廢井闗長賈舶近荒祠難尋下馬陵前路腸斷膠西君不知登吳山蘭若同張孝亷岧嶤紺闕快同登直上吳山第一層樹杪寒濤翻北郭帆來古渡是西陵中天化雨迷香象落日秋風對季鷹我欲逺尋蓬島去何年東望海雲蒸春江湛湛春江覆緑波夕陽江上奈愁何人家菰菜新晴少浦口楊花薄暮多野霧行舟迷逺渡晩寒歸鳥聚髙柯到來三載隨漁父不道還為澤畔歌軍城早秋闗門萬里羽書稀大將防秋出武威髙天殺雁角弓厲平地坐人毛馬肥雲連城障頻移斾風起沙河早授衣但語蹛林休再㑹漢家新解貳師圍送賈明府入闗中安西萬里舊咸闗上客雞鳴早度閒地入郃陽逢雪盡春來杜曲看花還漢京乆踞三秦勝蜀道難通五丈間君去若能尋馬季莫教東市浪追攀送别大江東下水瀰瀰送子江亭酒一巵塞上黄花隨定逺山前紅草是將離荒雞淮浦殘星斷匹馬燕闗落照遲我本無家君又别海天長望使人思西河集卷一百七十六
