body:
  text: 西河集巻二十四翰林院檢討毛竒齡撰序一快閣紀存序士有所見重于世即偶然游詠世爭傳之計然有湖望諸君有村下及揚雄司馬相如輩彈琴載酒無所定適後之人猶必按其蹟而歌詠其地此猶龍見于淵龍去而淵以名焉然而傳之者與有効矣西昌有快閣猶南昌有滕王閣也滕王不足存是閣而王勃以一序存之若快閣則有宋黄山谷先生所登臨也前時沈太常實為斯閣而先生以試宰泰和偶成一詩其後和之者日積嵗累遂羣然以是閣歸之先生夫文之能重地乆矣當先生吟詩時初不意後此能和之也亦既和之而祠祀碑碣記載乆逺遂有輯之成書者則又不止于和之已也而惜乎闕軼不傳宣城施愚山少參分司湖西悉舉徃蹟已廢者次及快閣且為修祠記書之石蕭君孟昉者邑人也賢且好義毎襄所欲作因復搜前書已闕者重讐覈而續以新輯名快閣紀存予兩入西江三登滕王閣卒不得登所謂快閣者曩者甡羇吉州蕭君屢馳書招予度嵗春浮園則其先太常公别業也即欲于是時一登快閣而雪深足寒卒不果前今其事已徃矣讀快閣紀存輒浩然若登快閣者然後知予之不得登快閣不足憾也乃予則又有感矣考先生之號涪翁也以曾貶涪州也其稱山谷也則又以知舒州而樂舒山之山谷標所慕也乃涪江有亭名涪翁亭舒州亦有亭不在涪江也亦名涪翁亭先生以愛山谷而易涪翁為山谷今人必重翁而且標舒谷為涪翁然則斯世之必無所已于翁也有如此亭矣而舒亭涪亭欲求如快閣之片言隻字而了不可得則夫後之傳之者之大有効于前人也獨快閣也與雍丘張氏世徳紀序余友丁子葯園自禮部典河南試其所得士有曰張君榮廷者居雍邱其制義為一時選文家所稱選文家例稱名則嘗稱之曰張君榮廷或曰張君榮廷者世徳家也攷之張之先有授昭勇將軍宣武衛指揮使曾以明之𢎞治間輸金二百鎰助邉正徳間官軍勦流冦過雍邱又輸金若干自正徳逮嘉靖數十年間歳凢四饑四賑之每賑出粟千其子亦以助賑故授兵馬進指揮使服三品服自是以後皆世有盛徳稱世徳張氏而首之者宣武公也宣武公名廷恩字世榮顧張君六世祖也今張君名榮廷人皆諱其祖而張君獨不然何與吾嘗觀李獻吉所為宣武公碑知公有用世才懐仁抱義負彊幹饒術智而不得展也以賢智如公當國家多故而阨于制舉無所于起家也寵之以爵父子䝉國榮而徒以虗位相長其鄉人無實報也因歎國家用人徒以制文進為失制而公以丈夫賫志韜徳勿使彰秉國之􅂈也抑亦其時使然與然而蓄厚者流必長理也是故張君曰吾非不知諱也吾先人莘城公慨世徳之勿彰而故襲前名以期大之也今張君稍顯矣張君將厚其所施于時而豫為養潜遲回公車予薄游汴南遇張君于潢河之濵見其容貎者恂恂也而言論駿發意氣犖犖然有似淩雲且率其嗣子令毋忘世徳為念夫張君豈僅以文章顯哉張君出世徳紀命予叙予則述其徳之可大者如是而已李獻吉曰宣武公居西岡嘗如杞還見路有野馬奔而噬人人遂駴塞不得行時公袖鐵錘下馬直前將擊之馬張齒鼓鬛懸蹄向公公驟揮錘碎其顱上馬而去夫有徳者必有用張氏之世有盛徳而不屑屑為無用如此張孔繡適吳筆記序張孔繡將適吳記途之所行由貝丘達渡河而迤南凢朝暮行止目之所逮足跡意志之所周知削木以藏凢得若干板及距淮遇西河毛甡于千金亭出示甡讀之甡乃曰人特重去其鄉耳既已去之而舟車房皇惘然隨所徃已矣亦安知道路中乃復有山川風物耳目睹記如此者也孔繡有心哉杜詩云經過老似休言將老則所經不可再也傷哉言乎予避人有年原其所經本無所取適于心又勢跼􅐲不能暢然極髙下然且退休于床思前時汗漫蹶然興起每欲目極而足追之而怳不可得也則又恨當時不健㨗不即屬記憶悲哉觀孔繡所記可以免矣孔繡世家子代有文章其先大父曽相懐宗朝有名先曾大父儀曹公文絶似子長其集為三百年來行文家所罕見孔繡以有本之學彊于記誌宜其文之著也吾聞孔繡所居在笠山之隂孔繡自號為笠山村叟又别啟石谷藏樓焉夫其有得于游歴雖家居猶游也况游哉予友杜陵生游人也不見者有年讀記中有贈孔繡詩知杜陵尚在齊也夫此之至齊則猶孔繡之至此也孔繡且游吳吾將游齊與杜陵生相見于笠山之下以待孔繡一削木矣俞右吉三述補序俞子負用世才而不用于世乃亦不欲為世用然且讀用世書自朝廷典禮文章制度品節凢夫一切為世用者考㨿沿革下逮枲絲醯醢塼埴築削之舉廢無不博極其始而殫晢其末為有用也予遇俞子于當湖者十五年漸聞所著書自詩歌襍文外更為填詞靡篇曼音相習為無用間嘗疑之既而遇于河乃得遍觀所著書且復出所為三述補者顧而曰予之為無用類如是也昔者弇州作三述曰盛事曰異典曰竒事彷彿唐人所傳卓異小記自洪武逮萬厯之初凢二百餘年而其後未能及也今俞子自萬歴以來終于甲申補其六十餘年間所未備者嗟乎有明三百年典禮法制文章品節昭然與古為升降者大抵選舉過苛而品秩過宻過苛則無踰量之舉過宻則必無卓然尤異之觀今所述猶烺烺也昔者鄭桓公武公相繼為司徒春秋美之故漢以三傳司𨽻四世太尉為極盛而魏晉以後則或如謝氏之代為吏部王氏之代為御史中丞皆盛也而竒寓焉顧晉宋重門閥唐後雜聲望代相襲也明則無是矣且夫儀典亦因時耳初無一成之矩可畫守也故漢文賢主也尚以入粟者為廷卿而宋泰始初捉車𨽻馬盡授郎將至齊主用商閹為開府儀同唐宋以來其于優人作將軍内侍加太傅者尤比比也有明典制每于曠軼之中得守常之義雖曰異典然恒法因之且其為竒事則初無一人而九選一士而八科者也宜乎尋常拘撿之必無可述而可述者又若此在昔唐人記遺事述開元天寳曲江杏苑探花題字諸猥𤨏事不過侈游觀宴飲盛世娛樂之象而聞之者輒徘徊感動至于流涕今所紀者雖隣于無用然以世家大族典文制禮當時移事易蕩然無復可存之際而忽有人焉鋪張其盛而稱道其竒津津焉不可止者且從此可以得典禮文章品節制度之遺意嗟乎其為無用何等已新刻銅圖石經序銅圖石經者宋天聖中禁方書也範銅象人分布腧穴于其身而畫之竅之且製經三卷播之石案圖考經其諸視夫藏絡也亦猶視夫肌髮也暨其後而石已泐銅已漫矣明正統中復命礱其石範其銅官醫守之且加詳焉今則銅再燬石再裂醫院所守已蔑略無有友有􅈓舊本圖經三卷授予叙者喜而歎曰此得非長桑所遺者乎人者生也醫者衛生者也軒轅甫火養天下而即與素女俞跗輩解難醫療至今讀内經素問諸書未嘗不深歎古皇之衛生逺也顧古皇禁方率皆去湯液醴灑而或為鑱石或為撟引且砭且鍼且燎且熨因五臟之原剝解㣲細故急能生人今且湯與為蕩丸與為緩悲哉醫乎然而鑱之無其形撟之無其義形無與圖義無與經雖欲解其肌而爪其幕其道無由昔者扁鵲能視人五臟癥結洞見祕奥顧其脉絡猶在也扁鵲能見人之裏而吾則因象以見其裏扁鵲能抉人之奥而吾則因經以抉其奥吾由圖經而進之將以幾于見垣視臟無難而又何爪解之璅璅也乎雖然銅圖石經者勒石者也銅則猶未也今天下莫不好生而湯液多方至鍼燎常不得其法吾勒之以傳世豈無範銅而起者乎長桑俞跗不絶于是矣贈吳江顧徴君初度序自古稱傳人非功名即文章耳富貴不與焉雖然㣲富貴則亦安得有功名乎哉乃吾觀許劭之遯平輿也身居草茅且能㧞人市肆擢人賔客王澄在僻巷四海人士皆經澄即文又其次已予少時即知吳江有顧茂倫先生移年而名聞益甚大抵志氣邁徃身長七尺餘妙擅經術且能出入古今文章其任事幾也無所遺力以故人士皆歸之乃先生初入㑹稽予以出游不能從又移年而予以避人易名氏投先生廬先生以家人禮待之又移年從南昌還值先生初度復得以賣餅之餘過從先生特先生未老白髮毿毿填幧中雖生人早衰豈亦有不得意者存其間乎夫達志氣者道行也經術明者猷裕也任今時之事定古人之文其神明逺也今夫人身長七尺餘俯仰慷慨可謂能達而又賢士無多人聴其節目文章足以傳後世世稱長乆誰則過者吾即以許劭觀之劭平輿徴士耳其兄䖍為郡功曹行烈可紀而劭且過之至使袁紹不敢以車服相見嗟乎劭何必不以功名顯哉至若王澄諸昆安豊太尉輩卓卓人譽然澄何減也芹沂何氏宗譜序何氏宗譜創之六世侍御公侍御公慎考索經世緯齒詳近而略逺推其例可以為法而特不能為後來借也世之修譜者夥矣名家著姓類竊史傳為記牒光初亦似可聴信究之遥遥相接多所混冒况通顔合閔尤近習之壊乎舊傳韓誤為何字音轉也顧王符論興氏九則不及雙聲而􅄞中散易奚為􅄞亦一音而訛焉耳考之堯時有何侯隠蒼梧山實始氏何即或謂禹後有何為杞姒所分然亦不必在六國韓後初得氏也無亦逺者當略之而無詳者與若夫近代昭穆以紀以綱表倣諸史而宗合諸經譜之可按具在也故何氏在蕭凢六世而侍御公始為之譜則前此已闕也又六世而經察公續為之譜則後此又宜慎也故何氏自浦江來遷肇居西河及其既而始遷芹沂乃其間門閥相仍入三臺者數世列諸曹寺者又數世然總曰芹沂著有辨矣自史宬散亡館錄缺佚啟禎以來固無與傳信而隆萬舊史其最著如王元美者猶且所在荒忽即以侍御公論十歳舉聖童廷誦大誥髙祖嘉之此為蚤達釋褐除監察御史代廵浙江如嚴助朱買臣故事此為異數而元美作史三述凢異典盛事自矜蒐採其於公前後所遇總未之及是雖元美實陋然亦足徴史傳之難據而家乘之益不可以已也甡先運同公與侍御公同學而先教授公則侍御公女孫夫也既忝世誼而何氏知名士則盡為甡友故因静子所示譜而序之如此若夫後此者之又有譜則從此推之矣桐音集序毛甡與姜桐音交桐音䝉難甡未之救也山隂張南士為之救之及甡以避讎故徘徊草澤則桐音實藏之日與張南士纓冠徃來以出之于阨故予每讀桐音詩愧生于心非愧其詩愧其人也雖然桐音匪獨其人也方桐音之未䝉難也刻詩名待删集流傳海内予與張木弟實為序焉及既脱于阨而又行其詩名詩鈔也則木弟為之序其詩精深有非可一辭盡者今木弟已死南士者木弟弟也南士嘗論桐音詩云桐音匪獨其為詩也桐音故公子也方桐音席世門緒其先大人司農公故為粤藩伯曩時宦粤者多槖中金而桐音食貧三十年盎無贏糧斯亦已矣乃乘輪之裔一旦行遯草野頻處虞羅獸擭中人不急其急而急人急乎此與夫貴介自持者旁人能伺其意㫖而已并不識妻孥之有疴癢其相去何啻百倍予嘗聞其言而感之今者甡藏桐音家桐音輯甡詩且亦自輯其所為詩甡讀之起而歎曰使桐音公子也無所交于甡而甡善桐音詩是為希譽桐音故甡友也甡不能出桐音之阨而桐音能出甡之阨如是而甡善桐音詩是為阿私希譽不可阿私又不可也乃甡所歴亦多矣讎甡者與愛甡者比比也善無如桐音者即歸而復見我閭里朋友隂與為周旋弔甡累累因而援甡者亦累累也詩之善無如桐音者則鄉使甡不與桐音交桐音未嘗知甡起而驟觀其所為詩亦必以為此夫人非常人也則鄉使桐音以貴介自持不能下于人亦不能為好友緩急起而誦其詩亦必曰此其詩非夫人詩也惜也木弟已死不得與共序其詩而予以困阨之餘欲序其詩而不能如南士之論之也則予之并愧其詩者矣金子􅌢詩集序韓愈云學焉而得其性之所近談道家彼之而予獨有㫖乎其語者聖如有姚不工抑鴻而崇伯之子以傳伊吕用師興至鳩方姬旦始修禮樂豈其聖則有異哉其性所近然也是故挽彊者不能使斵扶輿者不能令算技各有之而為文何獨不然嘗論今人治詩以唐為歸而今之不能唐者唐進士工詩而今之求進舉者戒勿詩也唐無詞曲詩工宋元有詞曲詩不工今之為詞曲者不少也故今能詩家必概置帖括不屑屑調詞念語一切靡狔始足臻神景開大而近于子􅌢有未騐者子􅌢為制舉制舉工為詞詞工進而為文賦則文賦無不工若其詩則為之有年矣世皆知其工是豈非其得于性者有獨近乎屈平近騷不能近典誥文江都近對問扶風班氏近史又近賦其他六季諸賢或近俳辭或近諷句要有至不至耳近即至不近即不至子􅌢詞傳人間有年向曾㩦其詞箧中有疑為張先作者今將合輯吾郡詞為一集而預以詩示世世謂子􅌢得家學其大父京兆公外大父馬少參公皆有文名母太君静因集名遂閒今其舅氏馬子玉起詩類劉隨州若弟子藏則所稱進士工詩者也先後規橅互相師取學固有進而但以所學之多進窺其所得之近時有豢奔鶉而畜擊鷙者因性就學不能兼良而龍麟所生變化莫測然則昌黎所言者以觀子􅌢大概可覩也包吕和書畫册子序吕和於畫無所不能而尤長于畫墨竹自喬夫人後凢吳鎮顧安文同萬濟李篔嶠謝應芝輩諸體蕃變悉能追其崖略而接其閫妙當時謂之包家竹專所名也先是吕和初畫竹時錢唐僧曉公者師元時上竺僧若芬墨竹性嗜錢也比畫限錢若干擇其肉豐而好均者幕且薄却之吕和受其技徃徃渡江代曉公畫入錢堆垜悉歸曉公而自為畫不取一錢既又以曉公畫踈劣遂變曉公畫游諸家間人于是不稱曉公而稱吕和今吕和死若干年矣其畫亦多不可見予向與吕和之兄飲和為忘年交謂吕和畫易得未嘗取索及其死而悔之然猶以為其畫多在人間苟購之當不盡亡也今飲和繼死而予亦逮老流離道路者若千年吕和子公度忽持其父書畫册來予捧之甚喜吕和之畫猶有存焉若是者乎即又甚疑曩見吕和畫其可珍者夥矣兹豈其自逸者與且其生平所畫竹猶渭川也今竟無一節何耶急詢其故則以是册為他人所得散漶脫落而後乃購而歸之公度則又甚慰吕和有後其能不忘其先人手澤以有此册也夫世家大族藏珍匿弄舉凢遺軼者何可勝紀雖天地神物徃為㝠㝠所􅎱嫉其傳與不傳固自有數然亦子孫不能守故至此公度能嗣其世學復能旁搜其所遺以留為勿替吕和畫雖亡其不亡者猶在也公度勉之吕和詩與書法皆不减畫且更有絶技能挽五石射百步外向就觀之纍纍然若貫也嗟乎公度所述其不在此冊者固己多矣青嵓吟稿序唐宋以來吾郡能詩家首推吾邑故前人輯詩有自武樂迄𢎞正嘉隆逮啟禎者既已遴為兩集鏤布海内而迄于今六義之士罕能言之甚矣詩之難傳也青嵓先生工文章自申酉以後徃徃為詩雖其始類有所託而因情寄興展轉益工殆所稱義起言中境生象外者與論詩者謂詩如其人青嵓性冲容遇物無迕宜其與敦厚之教和平之聴兩相肖焉顧青嵓不欲以詩示人其趨庭善述惟恐積乆未章先臚其什一以問于世夫傳文之有賴于後人乆矣青嵓代嬗家學自原禮公後逮其先子文林公中間以詩著聲者比比而是兩集所載可按也今青嵓詩出而前人之詩青嵓悉有以承之青嵓之為趨庭者即又有以繼之詩固難傳雖然夫詩豈難傳也與鑑園詩序王子懐從游于亡友北沙之門與沈子孚先傅子徳孚爭以藝文相雄長自孚先早逝北沙旋殞徳孚困于公車獨子懐者猶且行吟鑑園為鑑園詩則非感歎不可也顧前古詩人多達官貴公上自誦獻下逮贈復其間宴飲游歴寧無賤貧者相為厠足而唐自鹿門而外明自四溟而外傳者寥寥豈非誦美不可忘感嘆難以繼與北沙獧介自持其為詩多孤憤之言每偕其及門互相激唱以習為隠深然終不能出所學以見于世子懐為詩若有日進于和平而漸忘其鬰紆者獨是予之選北沙詩在癸已歳既已略見其概于越詩之中而予選孚先徳孚詩為江園二子在乙未嵗今江園二子或存或殁介于顯晦者己二十年而予以出走之餘乃復為子懐序鑑園詩詩雖和平然欲不因為感歎又豈可得哉來元成春秋志在序舊􅈓一篇不同今不載向時學左氏春秋未學夫子之春秋也既乆而學公羊氏糓梁氏焉然不知夫子之學何等也授春秋者曰春秋者有按而後有斷也夫子之春秋斷也其諸家按也故諸家之學尤不可以不亟也既乆而學胡氏學則胡氏亦斷也然而授春秋者曰夫子之斷不可學則退而學胡氏馬彼胡氏則斷夫子之所斷者哉既而思曰胡氏之春秋豈夫子之春秋哉前代以胡氏學立春秋學而春秋亡夫胡氏者以私意而窺春秋之㣲者也其意深其詞激其為文有憂患主于悟君而論世以維持于所謂名實也者循法起例而春秋之㫖蕩無存焉然而學在是矣故夫胡氏之所學亦春秋也特夫子之所為春秋則終未學也然授者又曰夫子曰吾志在春秋夫夫子豈有所為春秋哉志在馬耳故夫夫子之春秋魯史也左氏則左氏也降而公羊氏糓梁氏則公羊糓梁氏也又降而賈逵杜預何休范寗則賈逵杜預何休范寗故夫後之有為春秋者亦即後之所為春秋者也惟夫子無春秋則後人皆得以夫子之春秋為春秋惟夫子之春秋不預于左氏公羊榖梁氏之春秋也故夫後人皆得為夫子之春秋而不為左公榖賈逵杜預何休范寗故夫來子曰吾志在也此以夫子之志為志者也故夫來子之春秋亦即夫子之春秋也而來子之為春秋在焉然而予嘗曰夫子之春秋夫子之不得已也使夫子當大用安所取魯史而志之夫來子亦豈欲取夫子之志而志之者哉然而授春秋者曰莊子曰春秋經世先王之志也予曰不然使先王經世不有其事而有其志非先王志也且使夫子有經世之志而夫子徒有其志而來子又徒有其志非夫子之志也西河集卷二十四
