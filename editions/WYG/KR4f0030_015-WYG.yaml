body:
  text: 西河集巻十五翰林院檢討毛竒齡撰書二復沈耿巖編修論大學證文書某復某不量作大學證文一書非謂於古學有所窺見袛以本文同異不無擬議因竝列其文以俟後人之取擇而書辨通博多所發揮且未嘗以尺寸見示但于講學之日密鏤其文以為與某論證文書遍布同學遲之遲之然後以鏤文下寄則似乎有意暴某過矣但從来主客相難必先通彼我之意使客指瞭然而後徐折以主説今足下所難似乎不通客意者客意且未通何有于辨如某論朱子補傳正謂即事物可觀心性而朱子二之故某原文云使格物所補或如程子云格物者莫若察之于身如朱子平日云格物者以反身窮理為主而必求其本末是非之極致則反身即修身為本求本末即知本知先求是非即明理别欲又何一非聖學要功而以曰正事曰去欲一啓後儒之紛紛也哉乃曰天下之物曰即凡天下之物不無稍汎故曰世有即事物必觀心性别無講事物以明心性者此正是鄙意而足下乃以事物心性不分兩截嘵嘵致辨則先昧客意矣且某列原文極言格致正以為修齊治平之事原裕于格致誠正之時故此時格物必如宋儒黎立武明儒王心齋劉念臺輩確言格物即格此心身家國天下之物致知即致此誠正修齊治平先後之知則直㨗了當竝鮮疑義惟其不然所以咨嗟也而足下仍以事物心性籠統説去既不㑹大學原本與朱子改本之殊竝不審朱子格物與諸儒格物毫釐千里之謬但云事物心性不分兩截問其所以不分者則曰欽明文思堯之心性有然而心性之實曰九族曰百姓曰萬邦濬哲文明舜之心性有然而心性之實曰五典曰百揆曰封山濬川命官考績夫以事物為心性之實則心性根荄反在事物固屬未合然其云事物而及九族五典諸條則九族即家百姓即國萬邦即天下慎徽即齊時叙即治昭明時雍與封濬命考即天下平是仍以家國天下為物以修齊治平為事此正某所引元中子及心齋蕺山諸説而以此為朱子致抵則試問朱子格物是格本末之物致知是致先後之知否夫析理如擘肌如櫛氂毫如割原蠶之絲貿者分之擾者理之䝉昧者繅揃之使言之有要聞之有㑹行之有捉搦是所貴乎論也如籠統如鶻突如不了當如半明半暗如似是而非則彼我之情原未了徹諸家意指全失審量而欲以一言之下渙然冰釋難矣且夫持守涵飬先儒原示為大學首功其不能責之小子者非私言也足下謂二童灑掃其恪恭者即為持守亦即為涵養而浮動者則否則試問此持守者為持守灑掃乎抑别有持守乎如持守灑掃則恪恭與浮動者但以勤惰分優劣耳未嘗曰恪恭者灑掃而浮動者即却而去之也至于涵養則未聞習慣灑掃謂之涵養灑掃者倘以為灑掃習慣則此中涵養自然可加則又另一事矣葢論有頭緒朱子謂小學中涵養純熟則于大學格物特自能分别理欲則竟以涵養用敬之功責之灑掃應對之際未免於學者功力有所難循故以為言若仍如足下所云則灑掃習慣便欲其分别理欲則仍是孩提神聖囫圇鶻突之詞而足下乃遍引胎敎始生與稍長成童諸學刺刺不休則少儀幼學自古有之何嘗謂孩提不可敎耶凡論有鋒頴必須相當今人所謂對針也夫孩提必須敎足下知之某亦知之某但曰孩提必須敎特非涵養耳而足下仍曰孩提必須敎則驢頭馬嘴矣至于僕謂小學者書計之學非小子之學亦厯考兩漢以後所記小學諸蹤蹟而後言之非謂三代以上原無幼學夫伏氏書傳所云致仕之臣朝夕坐塾門而敎出入之子弟非幼學耶特不名小學耳葢小學者本天子諸侯世子之學故大戴禮記以小學為太子所學之宮而王制所云小學在公宫南之左則諸侯世子之學而士庶小子不得與焉有謂天子之學小學在外諸侯之學小學在内固已非義而至於八嵗入小學亦惟天子之子有然降而諸侯則已十有三嵗矣伏氏書傳所謂十有三年而入小學二十而入大學是也則毋論諸侯而降士庶之子竝無小學即有他學如所稱里舍塾門者亦未知其年齒何等而槩曰古者八嵗而入小學此是何説且未聞天子之世子與諸侯大夫之元子猶然執灑掃習應對者也必曰小學之節灑掃應對至厯引經傳以至于陳仲弓陶元亮門生兒子将車舁籃諸事非不該博然而認朱作墨指雄為雌未免失據然且繙引匆忽以譌亂真夫文王世子未嘗有小學文也疏義所引特以東序為大學而旁及之而足下謂小學之名見于王制與文王世子此必見註疏鏤本誤以小樂正舞干為小學正馬氏通考坊本誤以小樂正詔之東序為小學正而又誤之者也夫鄉縣鄙酇里社黨塾皆有幼學足下謂載籍所傳除小學外竝無其地與其名此由未深考而至于漢明建四姓小侯之學正諸侯之學唐髙祖建小學與宋寜宗置諸王宮學則皆使皇族子姓與功臣子弟就學其中此正天子諸侯之學而漢唐以後或因或革不可蹤蹟惟就戴記白虎通與漢書藝丈食貨二志考之則小藝小節端有定指故食貨所志尚曰五方六甲書計之事而藝文則專指習字蓋以三倉爾雅方言枝甲皆屬字詁而宋立書學則專習篆草三體文字而兼及説文字説及爾雅博雅方言五書則爾雅博雅五方六甲所謂書數方名者皆統之以字學蓋小學所用本為天子諸侯之學而小學所習則為字學故後魏江式所云太子八嵗始入小學而保氏敎以六書者此真截然之言無所岐指而世誦其文而不之察也至謂後魏孝文曽立四門小學引以為抵則亦知後魏立學始於平城爾時以書籍未傋專立之為蓄書之地故嘗改國學為中書學則正與字學書學相表裏故孝文于遷洛陽後立四門小學以大索天下遺書而其後置小學博士員四十人此正小學即書學之証而足下漫引及之則亦思當時博選天下儒士以實其中者學士耶抑兒童也論古須有本亦須有識某之淺陋世所共知祗以鄙意未明必藉往復故疎妄及之尚匄髙深益我未備慿復悚息與王履菴進士辨樂字書僕于字學原無考索間倣碑碣徒豔書寫曽未遑於四體六義有所研按特如来㫖謂樂字句下便乖字理則不謂然樂具絲木以云器也然悦心曰樂且用表姓既不闗器何所需木夫字之下曲者楷書勢也若以篆勢則不特木不句下凡字中直樹亦安有下曲之橜如鉤鋩者乎今楷書類句下此何説乎假謂木根入土不宜曲則水流至地獨宜句乎且門具兩闔未聞左樹而右橜也同以契合而旁引偏墜罕有取正此在王次仲鍾元常輩初造楷者不一見及而今人及之亦可駴矣且古篆𨽻草四體判然右軍論書謂宜有八分章草入楷字中此論書冩形似則然非謂於句畫波㸃中當從説文如今人所云也前人制作後無不易四體既判楷絶于篆譬如黍已為酒無復黍情布已更錢寜備布象今為篆文者不庸泥古作草書者未聞按楷而獨於楷法推詳説文律以原委則試問大篆從衡何不假古文之蟲跂鳥飛草聖抑揚何不假佐𨽻之砥平繩直是必裁網幘者象雞斯製兀椅者法茵席然後可也秦苻堅饗羣臣賦詩姜平子詩云丁字直不曲堅問其故平子曰臣丁至剛不可以曲且曲下不直之物豈容上獻遂擢髙第明焦竑譏之有云荘子云丁子有尾若直不曲乃古下字也堅與平子正不識一丁者耳予謂焦竑學古不深强解人事夫謂丁子有尾者非尾曲也即以古篆説文觀之無丁子而橜尾者也禮記解云人在一上為上人在一下為下則明下本從人與丁尾别耳且古下為未聞為丅今人字學不如古人而一橜之辨則必在王次仲姜平子上然則次仲之造字反不逮今人之得一橜吾不解也再復王進士書接復甚具且謂創者之略不如述者之詳語甚次第且凡事有本雲礽之本髙曽雖大懸逺終有肖處誠然誠然然而天下有通方之識不拘於墟者如樂從絲木為事從白為聲源本瞭然此通方之識也謂樂之本不下曲絲不右㸃則拘墟之見也篆鮮㸃矣衞夫人王逸少下皆耑心㸃畫今樂備絲木人但知木不下曲而不曉絲不右㸃抑何漏乎夫許慎撰説文自為篆體王次仲造楷法自為楷體體本兩截勢非一致且造楷所始其同在東漢者如師宜官梁鵠魏武鍾繇輩皆是也謂創建草昧而踵事增華亦誠有之然豈有作者反不知源本而數千年後獨能得所由來之理無論漢魏所傳迄于宋元其鎔金鑿石彰彰目睫無一如説文所云若今洪武正韻六書正譌諸字書者即以其自所深信如木之橜者言之往往矛盾如木不曲末以為根也若杔之為乇則亦以草根入地故象為乇然而曲末何也枝出為柯以其直也故斧柯名柯亦以其直乃柯反下曲至枓之為爾雅云下句為枓此亦何難于一曲不曲何也夫楷之變古不特句畫有殊而繁簡全别故衞恒楷書勢曰蠲彼繁文從此簡易又曰隨事從宜靡有常制故游之為㳺則逗草聖於中方祕之為秘則借行書於示左字偶從略則損聲為声而不以為减字偶好冗則增至麗而不以為侈何則楷體然矣故古人作楷不特臨文為然即偶然折白俱與今異呉薛綜為僕射與蜀使拆字曰無口為天有口為呉説文呉下從音而乃曰天此與造楷時未甚逺也至北魏孝文覆習字曰三三横兩兩縱若以曵橜概之則羽中複曵皆左戾也左戾非横且習下從白豈有見三横而遺一戾者乎則豈孝文甄琛李彪王勰俱不識字必待之今之為字書者乎至若羅首為罔而隋帝以羅羅為四維恭下為心而晉童謡以王恭為黃頭小人他如梁何敬容署名稍異而陸倕譏之有云公家苟大父亦大此以敬字大押左容字大押腹故云然耳夫敬左從􅀢非苟也容下為谷不聞為殳口也而敬容書之倕讀之而兩無所過且石晉與宋有避敬字諱而至易敬姓為苟姓為文姓者矣使據説文則敬左非􅀢敬右并非文也乃文彦博之氏文敬易之矣世之遵説文者徒以正韻所限制舉攸繋故用兢兢而不知者遂以為楷法宜然因羣起而咻之甚至踵為字書增華不已而不知楷法之亡竟亡於此天下之以制舉為文安有文以制舉為字亦安有字也再白三復王進士書三凟甚矣然而仍有不得已者僕惟不潔觀今字書且不必援金石㸃畫自鍾王以下逐一左騐以為略引大抵必得了了而來㫖墨守仍據字書且謂㸃畫小變豪氂千里便便可念僕有喻于此昔有見厝薑于木遽悟薑木生也爭之稠人之中至親騐斸土而終不之信其執所始見一何固乎夫謂木木已已分於杪末偶一不辨便入他字此在字書則然而僕必不以為是者已已與已一字三讀初非于字有三形也己之闕左已之絀右亦偶為表識然耳實則三字同音亦并同義尚書傳訓异作异亦作巳人已之已原通作巳矣之巳而劉熙釋天云巳已也言陽氣畢布已也毛傳亦謂十二支之已以陽氣始於子而終於巳已即已也故呉才老謂辰巳之巳亦讀如已矣之已則已音同已而周頌於穆不已孟仲子作於穆不似則已音又同已然則三字之同義而同音如此其形之不異又無論也至若木之與木吾不知木為何字即以為麻片為木則讀書不識木未為不可也若謂木部有􅜨此明明以篆文入楷大無理矣書有古今文有楷篆體勢既殊㸃畫遂判故古以居為凥今楷既為居則尻督之尻縦混於凥室之凥而不可為非古以羔為羙今楷既為羔則美惡之美雖易之羙羊之羙而不以為誤何則字已變為楷猶之結繩已變為字也故囬者面也今以囘作囬而目之為訛假以囬作面而不為狂乎丰者害也今以丰作丰而題之為繆倘以丰作害而不又為怪乎葢古文簡略每多借用而今之為字書者值古借字即指為本始而反以字之專見者為後之所踵如木部有未未可借味而反謂滋味之味為增加木部有朱朱可借株而反謂根株之株為添設則是讀學記兌命而反可廢尚書説命之文觀石鼔文其魚佳可而反得改毛詩其釣維何之句此猶見胚殰之未成形而遽思摩既生之毛髪察根荄之無附䓲而反欲薙草木之枝柯非愚夫即妄人也且其所為未與朱者則又皆弇鄙無理之甚者也按史記律書云六月于十二支為未未者言萬物皆成有滋味也今遂為滋味之味亦祗作午未之未而當去其口則白虎通云堯者髙也風俗通云已也者祉也豈髙祗為堯祉亦祗為己乎抑亦祉與髙皆後起之字而在所去乎抑非然乎夫六月為未月而月令亦即有其味辛且史記云伊尹負鼎俎以滋味説湯未嘗去口也若朱之有株則釋名有株檽張儀説秦王曰削株掘根又未嘗去木也苐知倉兄填兮之為兄而以怳為俗文則楚辭愴怳懭悢為俗之首矣苐審於乎小子之為乎而遂以呼為變製則周書嗚呼大學於戲為變之棷矣故凡如来㫖所謂毫釐千里者大抵多見之部從之間如云祗祗苗笛者予謂楷法有異音而無異形所謂通字是也部有衣示而祗止一祗故右軍書聖也以禊為稧以筆為茟夫禊從示也若從禾則禾稈也茟則俗所為草木花者而右軍通其部而不以為過何則楷法如是也故字書之鑿所以備文書法之通所以正楷若復墨守不下便便自夸以為薑仍木生非草生也則僕亦得執字書草部以訐之矣又白不備西河集巻十五
