body:
  text: 西河集巻七十四翰林院檢討毛竒齡撰傳二先一名越州賢傳吕訓導傳訓導名不用初名必用字則行紹興新昌人也十三歲應元至正鄉舉未午而岀院主文者竒之索其次塲文不得既而知其不終試時不用講學念已宋忠臣億後不當仕元世因改必用為不用字則畊每以疾居石鼓山未聾也曰吾聾遂自號石鼓山聾學者宗之皆稱為山聾先生及山聾子云不用傳孔孟之學而故以文豪嘗與天台陳東之㑹稽王宗成廬陵曾伯曼金華宋濂青田劉基為文友㑹基以青田冦起奉其母避蕭山包與善家不用與之游時基罷㕘謀征海已喪師乃復將應達實特穆爾之聘時人漸薄基謂基何人先生乃相結若此不用笑而頷之洪武初基首薦不用不用辭之曰吾已不用矣既而再薦不得已姑以明經行修辟授本縣訓導時兵革初靖士不識文藝不用疏六緯四籍諸史之學授生徒且身為率先一時芔然嚮化是時居珠浦之里遂稱其里為善政鄉鄉人嘗相語曰即有不平叶蒲姜切莫入善政鄉後引疾解官累辟不復起乃以遷居東窌山改稱曰窌西牧所著有牧坡稿得月稿力田集行于世論曰不用精理學新昌餘姚山陰會稽蕭山多能言心性自不用始若其文則汪洋乎李杜渢渢乎翺翔班揚之林景泰中祭酒蕭鎡曽頌之而惜乎不用雖然已用之矣明左僉都御史恭惠楊公傳公信民本名誠以字行新昌人中永樂十三年鄉試授工科給事中使江西疏諫五事正統八年遷廣東左參議髙雷亷諸府盗起信民親統兵進勦斬其渠盜平按察使郭智行不法信民劾罷之既而黄瀚代其任其不法乃甚于智信民復具劾而瀚受智指還訐同詔獄既而直信民坐瀚罪去當是時廣民赴闕為信民奏辯者凡萬人無何英宗北狩詔以信民守白羊口有功黄蕭養之㓂廣東也圍廣州數月守土官不能禦賊但閉城毋出入鄉民既無所逃匿而城中民出覔食輙為賊殺民苦之羣思信民在不致是會賊下令毋殺楊參議家口有縋城者必詢曰非楊參議家耶以故廣民在京者伏闕乞信民上乃遷信民左僉都御史往撫之信民晝夜馳及至從賊營中藩輿前呵之曰舊參議楊公來賊驚愕環輿願得一親見公面騐其眞信民乃撤藩坐露車賊見羅拜泣下曰是也公在奴何敢爾今請伏椹質聽公所為信民撝賊却十里外開城發庾廪給民佩木牌縱使出入賊見牌曰此楊大人所給也不敢犯既而遣吏齎檄入賊營撫諭賊大喜簪花設宴約曰請聽撫信民復單騎出城遍慰諸民之逃匿者賊衆見信民皆倒旗伏地各泣下訴狀信民坐諭之是日降者數萬人未幾信民將題請議安揷驟病死廣民縞素號哭不知所為賊亦統衆入哭祭而于是廣州復圍其後董興討平之上乃思信民諭祭諡恭惠論曰二正賊多以撫誤信民故能殺賊者至是獨用撫其信之者深也勦撫貴務本董興以勦勝究之根株未靖賊禍延蔓者且二十年廣人思信民奏請立祠宜哉家忠襄公傳公諱吉字宗吉餘姚人少舉生員教官以贄薄扑之公不平起碎所衣衫辭先師出乃以儒士中正統九年鄉試故事中式不由生員者謂之儒士入塲既而中景泰五年進士授刑部廣東司主事例十三司分理在京諸司刑獄惟廣東司則并治錦衣衛卒錦衣故虓横而是時衛長門達尤縱惡日陰持司事卒付司司好遣之無敢以怒容加者公獨治所犯如他犯卒大憾至詈公曰毛葛刺公嘗遇門達西街諸官避馬去公過之以一手舉鞭達愕然顧左右曰此非刑部毛葛刺耶於是百計求公過無有會公以病誤朝叅下衛衛卒聞之譁且走報其長曰毛葛刺至矣掄巨杖及彊有力者待公公至杖不過十五骨見適有僧同繫傅以良藥得不死既而例復職循次陞廣東按察司僉事時嶺外多流賊而公以分巡嶺東督戰守陰除其奸宄可為患者嶺東民仗之於其將去鳴鼓控撫按萬首拄地願借公一年先是程鄉民有羅劉寧者倡亂為官軍所滅其黨楊輝逃贑之安逺陰集餘㓂于江廣之界會官軍征廣西不及勦公不得已招之暨公去而輝等復聚張幟肆剽殺雖急借公返題留而賊勢已成方是時輝據上下寶龍峒其黨曽玉謝瑩者一據龍歸一據石坑次第㓂安逺并福建上杭破之于是將尅期攻程鄉公還任立召縣官料民壯并檄旁近官軍得七百人褁糗倍道行即日越三站而舍度去石坑近辯明掩至坑賊有負米入坑者覺之出三千人陳山下官軍見賊衆驚却公乃呼譟抽刃先官軍行官軍涌而進公連斬二人力戰自辰至午賊敗走追之生擒曽玉及其徒二十餘人斬首三百級既而乗勝連破龍歸及寶龍諸峒獲謝瑩前後擒斬計一千四百有餘而公士卒無一傷者狀聞未報會髙雷亷三府苦賊殺請公往往則數百里間無民居分守都指揮官嬰城賊或十許人或三五十人驅脇子女百千過城下無敢問者時海康知縣王騏能殺賊為衆所嫉公至雷賊劫大體村移都指揮出擊之不應再檄再不應公即督騏領民壯躬戰賊所賊敗斬首數百級奪回被擄子女無算既而賊分三支來攻呉川縣公諜知其一近河即命騏乗小舟出賊不意破之斬賊首六十餘級而二支已遁至是朝廷嘉公勞陞本司副使降勅奬諭委以全廣軍務使便宜調度而騏亦得陞本府通判成化元年賊從惠至韶冦翁源公被新命遂帥官軍二千人兼程進斬獲百餘級賊西奔既而新會復告警時王騏已戰死公召都指揮焦用指揮孫璧帥官軍三千人民兵倍之至火嶝與賊戰賊走斬獲二十餘級乗勝追至雲岫山去賊營十里而舍時二鼓召諸將曰賊營前畈而後箐敗必入箐明當分兩哨陰據箐後而我以精鋭衝畈前可盡殪也遂期曰雞鳴蓐食當進兵是夜雲霾無月星後期不得已三哨竝進賊果敗入箐公命潘百戸者帥精壯千人據賊營而賊多遺財狼戾官軍爭取之賊俯瞭見官軍爭且譁以為可圖遂擁衆馳下刺潘官軍亂爭營門出賊迫之右哨指揮閻華者力戰公命他指揮援他指揮不從華馬躓被刺諸哨潰竄公勒馬持刃呼遮之不止從吏廖振請公走公叱曰事至此走將安之且予可先衆去乎且殿且戰賊合力趨公公猶斬數人刃折遂遇害先是嶺表無殺賊者惟公與王騏協力騏大理人正統貢士由胄監出知海康縣至官即日以忠義激其民遇賊輒擊民賴以安獨守將惡之乃以力戰先公死至是有司聞公事及騏贈公通議大夫廣東按察使諡忠襄而騏亦得贈本府同知初公出師時布政以犒銀千兩委懷逺驛丞余文者㩦之軍中自出師至是已約用十之三矣文憫公之死貧無以䘮密以餘銀七百兩付公僕歸是夜僕之婦忽出㕔事據席舉止如公狀呼左右曰請夏憲長來夏憲長者按察使夏塤也家人驚走告左廨經厯時僉事胡榮急來視婦瞪目拱手曰非也頃之塤至乃起揖言曰吉以身死事無憾獨是吉生平清白公所知也今吉死而余文以所羨官銀七百兩密付吉家是欲使生前清白之身而反含垢入地也而可乎願亟還官銀無汚我言畢仆地甦明日其子科具詞捧銀還官而文坐監守自盜以原情免罪知縣陶魯巡按御史葛萱上其事且請祠祀大學士丘濬等核之予祠子科由廕監生登成化十四年進士厯官雲南按察使其捧銀還官時年十二奇齡曰順成之盜盛于南服然皆守撫養成之嚮非𢎞正儒臣為之掃除則蔓草難圖何翅綏㓂然則公之忠勇其亦先守仁而興者與論語曰德必有隣王騏從吉討賊先公而死其于臨難致命之節有同契焉世傳却金事以為怪異而致忘伍胥杜伯之有前烈則亦未入宣室哉附録䝉忠襄事載諸書甚備然總無異同惟浙按察使曽簡所為墓誌不得見所見者丘濬傳柯潛墓表方獻夫祠記及其子科所述優免帖文耳若帖文又云丘濬楊守陳劉定之皆有文記其事則亦未見忠襄死于雲岫山賊營諸傳皆然獨墓表云賊黨二萬餘自他所至遮官軍歸路前鋒閻華戰死公被害而優免帖文又云兵科抄出廣東監察御史凃斐據新會申文某統官軍與賊對敵斬開賊排柵放火燒毁賊巢烟起不見賊伏四面起當陣殺死副使某等因各有不同今從丘濬傳分省人物考云楊輝程鄉據上下寶龍峒似程鄉亦賊名矣楊輝本程鄉賊耳又墓志有平海冦李斌一事今以不見墓志不敢載僕婦請夏憲長時傳稱呉希仁來視而優免帖文稱胡榮今從帖文祠敇有生前盡節死後却金諸語見建祠公議因不見全敕故不録入忠襄官止嶺東而勦賊在全省者以天順八年所降敇中原有凡廣東所屬各府州縣地方但有流賊土賊即便同總兵巡撫三司等官設策督調官民人等相機勦捕其領軍官員不聽調遣者逕自參奏拏問治以重罪凡勦賊良䇿隨便施行則其權已重于巡撫矣以一人之力而勦全省之㓂以伍伯之少而禦萬千之衆位微任重寧無敗乎予承乏史館分題偶得先公名即以此文㸃竄付録史生故有附録數條今并記此明少傅謹身殿大學士文正謝公傳公遷字于喬餘姚人成化十年鄉試第一明年會試第三殿試復第一遂由修撰陞右諭德充經筵講官二十三年孝宗嗣位以官僚恩陞左庻子兼侍讀御馬監少監郭鏞請豫選女子入宫或諸王館中習禮誦書為冊封諸妃地遷疏爭曰伏聞陛下用内官言欲預選后宫以廣儲嗣誠善但山陵未畢諒陰可哀陛下富春秋中宫得人則其餘嬪御以貫魚進未晩也臣聞九經之義逺色為先陛下嗣服伊始奈何以宫闈細故為首德累帝善之時帝方嚮學遷務積誠以開聖聽每進講必先期習誦如在侍及講從容詳警甚稱帝意𢎞治四年加少詹事兼侍讀學士憂去八年詔以本官入閣辦事時尚未終制辭之服除始拜命十一年皇太子出閣加太子少保兵部尚書兼東閣大學士賜章服十六年加太子太保禮部尚書武英殿大學士孝肅太后崩禮官舊擬與孝莊太后竝祔太廟至是遷請别祠如周祀姜嫄禮立奉慈殿祀之時承平日久政令漸弛内官驕縱成習遷思豫遏之故于皇太子出閣首疏以親賢逺佞勤學戒逸為皇太子勸且裁抑諸内官立科設禁將以是廓清近倖而勢未逮也帝大漸召遷至御榻執遷手受命武宗嗣位加少傅兼太子太傅遷于是時即乞去薦呉寛王鏊自代詞甚切摯正徳元年逆瑾等八閹號八虎亂政言官劾下閣遷與閣臣健堅持必殺瑾等會尚書韓文帥百官伏闕論約遷等中持語泄事遂敗遷等連疏爭不允遂乞去先是遷力抑近倖凡瑾所欲為皆遏勿與時内府各庫及諸倉場馬坊各司内侍多作奸集賄而御馬監軍士自以禁軍不𨽻本兵空名給食遷既已條奏請禁復勅曹司搜覈開覆必逐事布飭而後已瑾等衘之至是憾甚下遷疏令去然猶以顧命臣尚頒敇給驛月廪嵗𨽻臨行賜金幣衣履如故及既去而吏部尚書焦芳繼入閣嘗憾遷舉寛鏊自代而不及己瑾又以閣議時遷嘗訾謷刺刺切齒欲甘心于遷遣偵四出伺遷事無有會詔舉懐才抱德餘姚周禮徐子元許龍上虞徐文彪應詔同試吏部中有文用恭顯語者瑾大怒詔獄搒掠剟刺械之戌鎭番而以四人者遷鄉人其草薦舉詔則健為之矯旨黜健遷為民而逐遷弟兵部員外郎迪子編修丕削籍榜禁餘姚人竝毋得為京朝官五年瑾誅詔復職致仕至世宗入嗣言官始連薦遣存問起弟迪叅議子丕復翰林官遷乃遣子正入謝疏曰臣猥䝉孝宗知遇顧託之重思圖報稱乃不自知其力之不足既而格心無術輔導不效引身退避杜門省愆自分與草木同腐幸溝壑未塡得覯聖明如臣衰朽亦荷軫恤不加之負國之誅反錫以優老之典顧慈恩厚效死何時惟有一言少資獻納仰惟聖性睿哲本屬生知而聖德成就當加問學是必謹一暴十寒之失而後可積以日就月將之功夫一日萬幾未易周通而一心萬化惟在知要若夫軍民利病政治得失則所司者能言之矣疏聞帝温旨慰勞蔭子正中書舍人嘉靖二年復令有司存問五年用楊一清薦起于家進少傅戸部尚書謹身殿大學士然遷以老疾即求去嘗在舟中繕二疏不上而帝待遷厚每天寒免朝叅除夕賜御製詩以郊祀賜織錦大帶及以病告則太醫賜藥餌并給酒米而遷竟以疾辭去十年卒年八十三諡文正諭賜祭葬遷器量𢎞達而處事敏決每中機要火篩㓂大同遷為決策驅去而部計以邊警加饟毎議増南折銀三分之二遷力沮之然警亦尋息荆襄流民激變遷撰旨區置急令附籍附籍則流者自止時編户約三十萬會有阻其事者忽中止而餘衆遂叛其審要如此遷為晉謝太傅後致仕時居東山第四門著東山誌子丕亦以解元登進士及第厯官吏部侍郎贈禮部尚書世其家論曰𢎞正間多名臣而遷不務為赫赫自處方幅衆莫之撓故忠誠敦慤始終不渝此當時誥詞所稱清白之操百鍊愈精剛毅之氣萬人必往者與遷在内閣與劉健李東陽同官顧健敢任事而資遷之謀斷東陽善文曲而遜遷之亮直出處可否不激不阿夫其抑昻于二君之間者槩可暏已附録趙諸書載謝文正會試薦第一因本房是兵部主事瑶名位輕故抑置第三而墓志稱主考丘文莊賞之拔置第三則矛盾矣世但以文正兩踞第一而會試稍抑故為此説耳然文正子亦解元探花而會試第四亦是僅事餘姚薦舉入試文用蕭傅恭顯語刺瑾故瑾怒下詔獄謫戌而史料云四人上疏求用天下無未試求用者况止求用則瑾何必一怒至此兵部侍郎吕公傳公獻字丕文浙江新昌人成化進士授刑科給事中孝宗登極擇可使交趾者賜獻一品服應詔獻至交趾頒誥諭宣朝廷德意交趾悦濵行相率為餽饗至捧珠貝塡槖中獻不受人未知也龍川土官趙源者索交趾金錢使者上其事曰天使回禮有餽遺猶峻拒不受趙源何人乃黷貨無厭一至此上聞其言訊之然後知獻却餽狀而宣之于廷太監李廣擅選富兒為駙馬受賂廷臣莫敢發獻劾罷之時京師雨雹日食東南諸省皆大疫又孝陵灾獻抗疏陳闕失會夀寧侯張鶴齡兄弟倚宫掖勢燻灼每游宴後庭出入無禁忌前後李夢陽羅玘皆得罪去廷臣久嘿嘿獻乃反覆極論上怒詔杖三十下鎭撫獄既而以言直釋之遷禮科轉應天府丞復改順天武宗耕籍獻為執事官率保介趨蹌儀甚備上顧之曰是官善行禮寧不可作禮尚書耶時瑾用事獻無賂不調雖上諭置不問久之進為尹又久之進南京兵部右侍郎劉六㓂江介凡三過南京以獻有武備不敢入既而致仕論曰史嘗謂清畏人知然未嘗不知獻則有之獻厯官三十年無贏財止構一室榜之曰清白贈太僕少卿原雲南道御史狷齋謝公傳公愉字如卿上虞人嘉靖進士授浦城知縣行取擢南御史武定侯郭勛奏請復天下鎭監愉劾勛妄奏勿議復天下快之尋使雲貴疏論兵部尚書張瓚刑部尚書周期雍大學士翟鑾皆相繼罷去獨論嚴嵩㝡激切上不用然亦不罪愉時嵩為禮部尚書值其自陳時愉以大臣巧辨誣罔痛責之且言兵部尚書張瓚貪而優柔以本兵而壊天下之兵禮部尚書嚴嵩貪而狡狠以掌禮而壊天下之禮二臣雖不同其欺君誤國則一也宜其莫逃聖鑒而任用不衰必陛下眞知其智識足以集事取其才而略其德耳乃嵩以貪墨非聖主所惡而日益汚濫一時臣工亦復以亷靜非聖主所尚而競為貪婪風俗下趨嵗異而月變欲望世太平難矣今夫郡縣小官犯贓或三五錢或數十貫必繩以峻法而大臣狼藉鉅萬置不以聞眞所謂縱豺狼而搏雉􅇠也疏凡數千言嵩見而憚之會愉自雲貴還臺一時稱古之遺直薦留雲南道嵩亦百計要結且啖以美官愉不顧既而按四川聞邊警遂上疏曰堯舜誅四凶而蠻方率俾今之四凶則郭勛胡守中張瓚嚴嵩是也陛下已誅其二矣何難盡屏之以全堯舜之功哉不報會愉以母老乞歸未允嵩乃乗京察除愉名愉歸奉母所居室㝡隘名狷齋世宗崩詔録前言官未拜命卒御史周𢎞祖為特請于朝贈太僕少卿其疏有曰臣嘗輯録嘉靖以來章奏見原任監察御史謝愉所論武定侯郭勛及禮部尚書嚴嵩皆人所不敢言者乃為逆蕃父子切齒中傷退閒之後且不知存亡下落未識彼省撫按亦曽舉及本官否夫如此忠藎際此明聖而使與草木同腐朽而不得被一命之榮殊可惜也論曰誰毁誰譽三代之直道而行不其然與愉之劾嵩𢎞祖之薦愉皆古遺直而愉自名狷惟直故狷朝有如此臣而不能用嘉靖之業可問耶張中丞傳中丞名元冲山陰人以嘉靖進士授吏科給事中拜命而泣或問之曰吾祖為是官曽以直諫萬貴妃擅寵賜杖吾父逢禁日必出血衣陳祀之且涕洟曰子姓有為是官者其毋忘此血衣哉吾今為是官是以泣蓋其祖以𢎞本科都其父景琦則以部郎知桂林者也時嵩初入閣元冲首疏嵩心術不光不宜在帝左右不報先是九廟災上刻意營建曽以木工郭文英有技愛之加工部帶俸右侍郎至是工成廕其子文思院副使而文英嗛嗛復請辭已所受俸改廕兄子乃復以其兄子為鴻臚序班元冲疏爭之謂文英賤工本以繩墨斧斤之能奔走冬官忽遭逢廟建致濫名器以無何厮役而帶俸竊銜其為非分已甚矣今復冐叨恩廕在文英者慚悚引咎不暇乃復敢狎恩抗求自處非法小人之貪肆一至於此且文思院非他文英出身之所也工技必各安其業而後有濟今文英既已踰越而復不使其子弟安于其業此何意乎上怒不納會織染太監以上用羊羢未給請尚衣孟忠齎敇儹造而元冲復爭之謂嘉靖元年既已停罷中使儹造厯至二十年間始遣尚衣李鉞偶一督辦然即已徴還此在神聖愛民其為防微杜漸者如是其至而小人罔上重溷聖聽其罪可殺且内官之出必有京師巨黠投充家人名色于其奏帶常數外増一二十輩依附撥置需索騷擾甚至輘轢司府箠縛官吏此所係匪細也上益怒不納然卒以其言直轉外為江西叅政既而進廣東按察使巡海擒海賊徐碧溪何亞八敘功賜白金大計考天下監司第一補江右布政轉左尋以右副都巡撫江西時閩廣流賊犯境元冲疏請便宜統叅議趙鏘副使陳柯暨指揮屠塤杜喬廣東都司孫敖浙直冠帶千户龔綸等各領兵堵勦日有斬獲遂驅賊出境而其渠犯贑者殺官吏劫倉廪焚掠贑撫得罪内官與政府憚元冲直畏其入用并囓之勒回籍元冲少從王守仁游與同里錢德洪王畿徐珊共闡明良知之學而元冲尤以氣節自勵曰人之生也直守仁嘗稱曰吾門不乏上知之士至于忠信質諒無如叔謙叔謙元冲字也又元冲嘗讀書浮峰山寺守仁顧而登其巓嘆曰此山卓絶不羣叔謙似之為題浮峰書屋而去嗣後學者遂稱元冲為浮峰先生論曰元冲祖父皆名臣以𢎞以建言得罪而景琦為郎忤中官謫判始知桂林元冲其繼志而興者與姚江之門有二一以領會一以踐履元冲與畿珊同學而元冲冲然已西河集卷七十四
