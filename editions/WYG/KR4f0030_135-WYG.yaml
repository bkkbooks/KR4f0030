body:
  text: 西河集巻一百三十五翰林院檢討毛竒齡撰填詞五少年㳺汝南官署七夕作看看又是銀河清淺織女乍停機不知何事今宵殘醉還聽汝南雞庭前𤓰果粧成巧暗裏絓蛛絲記得年前小礬山下乾鵲夜來時前調過淮城口占有序予去淮久矣康熙十七年徴車入京從淮城下過遂駐馬流涕占此詞馬蹄纔發陽平門外望裏是淮安可憐此地曾經流浪一十五年前曲江髙㑹知何處秋水晩生烟惟有垂楊千條萬縷還挂酒樓邊二行來但覔旗亭舊蹟下馬駐城闉請看當日淮流如故雙淚落征輪淮隂市上諸年少相憶總沉淪誰料衰年徴車北去羞見市中人前調題陳檢討小影傍有侍兒坐蕉簟弄笛十年苦憶元龍顔面夢寐恐難親不虞相見長安道上并見在傍人停毫一顧踟蹰久欲待按歌勻碧鴨消時紅蕉坐去何處不傳神南柯子題胡明府小像江縣看花後山城種栁時布袍竹杖鬢如絲今日畫圖相對繫人思前調題寄史蝶庵巻後水漲芙蓉粉烟含楊栁絲幽人家住五雲溪行過東坡書院孝侯祠篋有中封帖吟成東去詞荆南相望一相思恰又晩村花垜夕陽時前調淮西客舎接得陳敬止書有寄驛館吹蘆葉都亭舞柘枝相逢風雪滿淮西記得去時殘燭照征衣曲水東流淺盤山北望迷長安書逺寄來稀又是一年秋色到天涯惜分飛答呉江徐菊莊見憶原韻楓葉呉江長橋畔别去年華又換聞在湖南岸蓮花幕下閒庭院幾欲從君秋過半寄到新詞讀遍何處尋還雁暮潮但見平如練朝中措平山堂續詞有序揚州平山堂傾廢久矣康熙甲辰冬十月予過揚州值太守金君從故處建堂命予以酒且勒歐陽修朝中措原詞使坐客續其後予思歐陽公贈劉原父時平山欄檻方盛然猶睠念手植若有感于春風之易度者况距公千載而興是堂其藉于世之為原父豈鮮也因被醉書此詞附坐客後青山猶在畫欄空人去夕陽中不道十年重到還披此地清風蜀岡無恙堂成命酒一聽歌鐘未審後來太守是誰能繼山翁西江月續東坡詞有序此予續東坡詞也東坡憶歐陽公而為是詞予復憶坡而重續其詞雖然予豈能坡哉太守金君重勒坡詞與歐陽公詞並列故予並續之云爾聞道歐公當日賓朋載酒堂中後來三過有坡翁長使林花飛動此事已經千載我來重挹髙風眼前莫放酒杯空恐是東坡殘夢虞美人九日同姚庸庵張徳逺左䕫友諸君汎湘湖登越王城和庸庵韻平明載酒登髙去湖畔停船處幾株烏桕未全紅猶喜黄花開遍小橋東長江一望環如帶放眼千山外開罇更上越王城多少夕陽江上晩來情前調過江寺和友江郎祠外中秋月城角吹將徹十年長記此宵中豪客相過深巷有微風今來君宿耆闍下又值中秋也題將麗句最紛披恍見當時桂樹晩依依前調題畫為李都官夀是誰畫出潘家果百琲珍珠顆羡君原是柏梁才記取桃梨橘栗李榴梅玉缾金鏁琉璃甕且作和羮用須知仙樹本蟠根欲借花前一醉石州春前調早行口占秋風槭槭敖陽路草屋方垂露當壚夜起數金錢獨對寒燈此夜不成眠廿年岐路今方息又是徴書急栁梢斜挂月朦朧不信還來騎馬月明中前調己未四月宣城施少叅寄雲樓下梅樹忽發二花值是科殿試榜發同邑孫子立􅈋楚芬以一甲同授館職既而又發二花則少叅與同邑髙阮懐並以制科授館職一時相傳以為草木之瑞非偶也舉人梅淵公繪為瑞梅圖寄至京同館各為詩頌之于和少叅詞書圖卷未敬亭四月梅花發正值清和節慈恩寺裏曲江邊新舊郎君争占一枝先紅羅欲寄無由寄空寫泥金字樓頭長贈碧山雲恰取花枝中半兩平分前調題天台採藥圖為淮安劉六皆比部桃花又發臨淮渡錯認天台路行來莫笑太奔忙知是赤欄橋畔舊劉郎平明入直迴西寺幞被雙娥侍含香誰問夜歸遲只恐桃花回首望中迷前調為劉比部題天禄閣燃藜圖圖書萬軸牙籖滿辟蠧燒芸暖果然子政是前身羡煞當年天禄閣中人白雲司判西曹事薇省曾留字胸藏氷照宛如犀絶勝西堂終夜對燃藜小重山自涿州至琉璃河達京和同行韻三首草店雞鳴酒未醒馬槽聽齧粟漸無聲燈前􅏕面促装成車塵起疑在霧中行渡水石橋平秋風聨轡過涿州城鄉關回首暗心驚遥天盡愁見一雲横二貰酒前庄日漸低鞭梢斜掛壁卸征衣同行三俊喜相依埀楊下長許控金羈河水碧琉璃壚頭風物美近京畿徴車欲度且遲遲沉吟久三輔故人稀三閶闔嵯峨天際開賔門方四闢重招徠將車纔到莫相猜諸王邸誰道買臣來九市共三街彩雲遥起處見蓬萊秋風歌詠柏梁臺承明内原有掞天才前調題呉江女士沈關關為顧茂倫清繡抱甕丈人濯足圖欲繡平原幾度思園蛾初作繭絡成絲前溪水滿雪消時波紋起緑似小桃枝投足散漣漪夜來開繡譜度鍼遲一㾗青影暮烟微銜絲細不用洗臙脂前調失題畫似為人題像詞朱顔緑髪畫圖中丹砂長飫酒醉溶溶前身王母舊青童干將佩花鍔散芙蓉羽嶠有誰從蓬萊剛水淺渡蒼龍他年笑入杏花叢瀛洲近折取一枝紅前調過舒漢雯中書官邸有贈當日吹篪兩渡淮感君長貰酒醉髙齋十年分手各天涯頻頻望紅葉喜當堦髙詠謝家才綵毫裁詔罷鳯池迴徴書白首苦相催平津第勿厭故人來明月棹孤舟題呉江徐檢討孤舟垂釣圖甫里先生何處是家住近垂虹亭子著罷新書開門閒望但見一湖烟水放棹偶然垂釣餌人道是松陵漁史若問羊裘投竿何所應在白蘋洲裏千秋歲和王丹麓自夀原韻青幡纔換又是春過半聽啼鴃聲將變能令歲月增真覺黄金賤更那顧秦王有女將衣巻但赴芳林宴一任花零亂年半百休三嘆文章堪自信富貴非吾願君不見比來世事皆如幻臨江仙題畫姊妹相逢何處是朱欄斜倚雙桐坐來委抱鬢籠鬆畫裙欹履窄金釧隔紗紅寂寂春園人不到看時多少朦朧緑坡生草細茸茸銀猊閒戯逐翻向緑坡中前調申江署中題麻姑獻酒圖為丁夫人初度三月暮春春雨後申江初放桃花忻看錦帨掛官衙名姝如謝女夫婿是秦嘉製得香奩粧百福珠屏爛若朝霞麻姑曾過蔡經家仙厨將進酒圖上見來麽前調徐東建納姬自題臨江仙詞即用其原調并韻嘲之何處玉臺堪倚鏡徐陵原有新題今來同住巷東西門迎桃葉渡人勝苧蘿溪散擲明珠安有價無錢多買臙脂只愁初製夏侯衣茜裙裁剪未簾外杏花飛前調夀姜綺季五月榴花開似錦一尊長對花前看看又值杖鄉年蟠溪多夀考綺里本神仙雖則東方能玩世無須金馬門邊君身何事不堪傳吟來忘歲月筆下有雲烟前調田公子二十生日海上青螣看負角丹山鳯翮初成男兒二十建修名陸機剛作賦方朔正談兵自愧蹉跎多去日羡君先請長纓南箕不用詠三星錦筵香薤發官閣早梅生前調賀徐公佑明府舉子客舎燈花開似錦寒屏有夢惟魚新來喜得弄麞書藍田秋産玉碧海夜生珠繡褓畫幱初試浴遥看紫氣充閭君家原有舊鵷雛他時湯餅㑹啼聽是何如前調祝蔣文甫夀洛下久無同甲㑹試看江左耆英年來七十誦黄庭孫芝千朶艶兒竹萬條青怪道探書多緑字閒堂代有傳經桃花染得綵衣成杜陵誰最好吾愛蔣元卿糖多令詠窩絲糖有序梁尚書上元席上出窩絲糖供客云是崇禎末宫中所製外間無此也西山静室有老宫人為比丘尼尚能製此糖每上元節必餉以銀椀合子其製如扁蛋外光而面有二凹嚼之粉碎散落皆成絲尚書乃唱糖多令詞命予和之擣盡筁頭泥春蠶已蛻衣片餳褁作彈丸兒不破彌羅三寸繭誰解道一窩絲粔籹漢宫遺餦餭久未施開元宫女尚能為今日尚書花餤㑹銀椀合使人思菩薩蠻題蔡天聲桃花流水圖記年溪流雨過增新漲春山處處桃花放中有武陵人花前一問津幅巾裁白􅏩坐聽溪流咽寫入畫圖中桃花映面紅前調淮上閻牛叟娶姬作詞索和原韻釵頭勝字裁方幅定情彈作鶯蘿曲聞道薛家來燈花夜自開清淮一别久誰解雙垂手佛日㑹摩多香山老去何二買金欲鑄䲭夷像頻年憶汝江湖上何處採名花西施不及他白頭吟自在詩寄錢刀外恰似遇桓伊聽歌輙喚時前調索贈有序客上海數月歌妓玉烟者又名玉嫣解佐酒日日在坐張南士有贈妓詞妓甚愛之因索及予時晩春新月生剛作伎罷遂出便面書去其詞後闋各隠玉烟玉嫣字雲鬟綰就青鴉小春山畫得雙蛾巧衣翦杏黄羅紅牙試按歌錦屏香作霧慢把金樽度玉煖起烟絲申江春去時二榴裙縐褶花千襇地衣紅襯弓鞋軟銀箭下來遲當筵舞柘枝玉櫳華䗶裏新月朧朧起何處最嫣然花前一笑間行香子即事晩色烟和鳥散庭柯聽街頭擊鼓吹螺酒闌送客夜火星羅幡幢引處看蝶演似鶯梭法輪常轉五方何處現維摩試問禪那作天魔舞于意云何香壇行過隨嘯咏且㜑娑蝶戀花客上海過楊生玉衡聽妓作寂寂暮春楊子宅昔在烏聊今在申江側座上綵雲迴錦席門前幾樹桃花色乍雨乍收櫩溜滴坐擁雙鬟為我彈瑶瑟醉後倚歌還弄笛醒來微月當牕白鵲橋仙即事有序邑甲聘戊女有彊委禽者明府姚公斷歸甲合巹訟庭其斷詞駢麗世多稱之既而訟者争不徹太守何公復斷歸甲時予方從兩公游兩公並命予為詞紀其事東牀先訂西家願宿何事穿墉穿瓦縱教彊委後來禽却不道子南夫也明府風流使君瀟灑兩斷可妻公冶莫言河漢鵲橋乖看合浦在訟庭之下天仙子賀生子韋氏雙珠真可喜芝蘭欲在堦庭耳春園况值有鶯遷人道是天仙子曾見宣尼抱送此里號髙陽從此始鳯毛麟角紛紛起我來正值浴蘭時看取靧金盤裏半是桃花半雪水青玉案山隂金母隨夫宦南海三藩之亂與夫子並相隔流離數郡百折不詘暨轉徙歸里已五十矣其子乞予文為夀予不能應書此詞巻間東揚不用占星婺是家有真賢孺曾隔兵戈遥海路合州城外雷陽驛畔多少仳離處千山萬水歸來暮看膝下人如樹但得朱顔能久駐蟠桃花發蓬萊水淺誰道流年度喜遷鶯荷風乍煖恰紅版橋頭驪駒唱緩待詔公孫彈琴司馬挾䇿争游上苑萬里鵬飛在望看翠幕傳金琖况前路有漳臺花栁酈亭絲管迤邐攬轡處大道秋光不覺長安逺丞相延來通侯載去戸外車常滿他日玉堂堪繼喜大小皆賢阮裝衣待來年紅杏為君裁剪前調寄贈陶燕公移居奉和何毅庵張邇可原唱韻隔江人逺一别幾何年髩毛都換但卜柴桑難尋句曲到處堪留堪戀衣上黄塵不落望壠首浮雲變猶相憶在廬江舊第芹泥橋畔可念書畫室半榻琴簫幾樹花零亂人寄南牕詩傳北郭莫道未還東苑我亦西冷借住須有日烟霞結伴隣居好看牆頭過酒那時相見百字令客滬上為王鴻資初度秋風乍起桂花時又是東亭初度四十年來彈指頃閱厯山川無數倚馬成文磨盾草檄殺盡中山兎侯王以下一時趨走如騖誰道梁苑歸來故人官滬上歡然相聚有弟同行勝小陸共作平臺詞賦弧矢髙懸長庚何在遥指星明處壯心未已莫言歲月遲暮前調寄夀施愚山少叅六十林花初放捧霞觴遥望敬亭山色繞地珠繩箕宿轉光滿謝公樓側闕里遺賢石渠繼世曾講諸儒易廿年節度一身髙寄如客督學齊魯之間湖西作鎮到處稱申伯天下山川游覧遍無數文章堆積前遇呉關今過甌海千里長相憶纔週甲子為君重數疇昔綺羅香用原韻答贈甬上錢蟄庵見贈古鄮名家彭城遺胄所至公超成市文傚元和詩以景龍為體論學識雅似顓孫羡經術精于楊起苐無如棄世逃名竄身長向瞿曇裏君家厯世仕宦况祖禰忠孝名傳黄紙每輯殘編尚見淚㾗如泚尋歡㑹偶在申江嘆孤游有如樗里又誰知廿載相思見君自此始萬年枝梁司農師六十續娶臘盡春還御河氷未泮苑枝如沐栁又生稊雙雉朝飛遫遫花甲週時花燭啟寳帳粧成百福由來原有尚書三娶東山名族萬年觴卜道從此天長地久鸞弦終續華蔮披來副髲有珈皆玉池上歌添黄竹好探去金桃再熟那􅍆人笑桃花洞裏劉郎初宿西河集卷一百三十五
