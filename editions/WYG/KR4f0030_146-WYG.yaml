body:
  text: 西河集巻一百四十六翰林院檢討毛竒齡撰二韻即五言絶句一王孫遊桂樹他鄉少王孫故國稀天涯春草遍處處待人歸排遍曉月三闗落秋風萬里來將軍開馬邑戰士下龍堆舟行望九華山溜水下江闗輕帆天際還望中雲欲滿知是九華山晩泊二首晩泊大江沙烟生紅蓼花船頭鳴賽鼓船尾飼神鴉二紅蓼垂牕暗青楓接岸平村翁迎舶語還問下江兵無題燈下裁逺衣堦前墮秋雨為惜藁砧名遲囘下雙杵苧蘿村西子吳宫去溪邉少浣紗緑蘿相伴女空自貎如花二苧葉風吹白蓮歌水面寒前溪花滿地不敢過溪看陳肇曾孝亷歸閩詢周六玉輪夫君歸閩海應上越王山東吴年少在為問幾時還漢宫曲漢苑高如斗天星出似𤓰後庭千種色前殿九衢花二羽騎長楊苑靈臺太液池六宫新位號最貴是昭儀摩多樓子三秋行保塞八月詔移軍近見沙如雪遙看陣似雲二八月天山雪沙塲蚤見寒迴看雲盡處秋日滿長安江行聴潘六絃子不聴桓伊笛翻催趙璧彈三絃纔一曲看過幾重灘飲陳吉孫宅適紫蘭當筵盛開客有寫生者率題其上共就陳遵飲當軒樹紫蘭問誰圖茜影留向醉中看二灼灼流霞杯臨風映芳蘂移之上雲屏滴作紫泥水看伎曲水園頭伎扶風帳裏名中州馬端肅家姫一看西子舞重起故鄉情龎湘蔓草生西苑殘花滿洛陽清涼臺下過尚有一龎湘北行口號春風生馬頭春雲生馬尾不是春雲生知是烟塵起二羙人乘騾車相顧烟塵中新花著輕霧胍胍花影紅一本作對􅆕烟塵合高車錦幔斜分明輕霧裏一顧道旁花早起勿作還鄉夢徒增逆旅情中宵驢鐸響早起趂前程為趙司馬題五雲移棹圖曉日䖍陽樹秋風贛水船片帆横北斗看入五雲邊二綵鳳横天去蒼龍倚棹開漢庭雲滿處知是趙熹來古意醉裏能留客愁多冣滯人誰將三婦􅃩歌作大郎神上田花青青上田花朝日揚花英路逢折花人見花不分明二折得青梅枝送郎渡河滸花落子始結郎今未知苦輪臺歌大漠三秋草輪臺萬里楡天邊新屬國塞外古單于綵花歌莫翦昭陽綵良人本麗華能將半面色散作四時花兆熊曰漢女職有良人號塞下燎燭照秦闗將軍夜臘還寒更刁斗静飛雪滿陰山二金矢玉花翎沙塲舊有名一歸光禄塞三上李陵城古塞下烽火甘泉月旌旗㶚上雲漢王能奮武偏召李將軍小長干曲小小長干下相逢擊絮人春風吹緑髪春水濺朱脣二風發南湖裏蓮舟去漸稀阿儂因有約須趂暮潮歸題張君畫像紫石環修竹丹罏煮玉蓴葛巾相對坐知是曲江人查繼佐客淮復買小鵶頭自隨短句為夀或云嘲焉并命鵶頭歌之莊生本蝴蝶日日宿花裏醸得黄粉兒欲寫白毫子兆熊曰李白有淮南小山白毫子歌仙人也二小草莩俱緑寒花蒂亦香鼓鐘淮水上水落自湯湯三團團桂樹枝能令八公還捲幔拂螺子分明見小山四淮王是佳名碧玉是好影後園金井牀前頭素絲綆五舊部能吴舞查舊畜女妓數部新人解楚歌楊家龍舸過無復唱開河六擘破真珠樹分成結緑釵漫逰無限興只看酒如淮絶句買得長門賦盛將綠玉箱春波涵太液浴盡野鴛鴦採芝三首欲向商山隠還尋瑤海來玉田三百畝衹見一花開二深谷原無種齋房舊有歌九莖連四葉葉葉奈愁何三玉殿披圖晩瑤林驂駕遲願將三秀草移取種銅池羽林郎扈從獵長楊彤旌豹尾黄當車能搤獸道是羽林郎宿傅一新溪上草堂招憲臣竹短溪亦淺月明山正深草堂前夜雨思汝到如今錢清江和韻兆熊曰此唐張仲素春江曲韻也宋王兵部錢清江掘石亦得此韻故稱和韻觀詩意謂錢清江已湮耳三月正陽春中流共採蘋妾居江下久不記上江人來生過訪余適游陵下不值却寄泛水尋瑤牒登山啟玉書到門無鳳字去路有羊車二挾彈還清洛横琴過大陵蒹葭難倚玉展轉媿毛曽嘲採蓮者傷其遲暮不能已而坐得困也緑水浮來淺紅蓮採去遲衣牽殘梗刺櫂結野菱絲古别離緑殺門前栁空言似畫眉自從折栁去螺子不曾施覧鏡詞漸覺鉛華盡誰憐顦顇新與余同下淚只有鏡中人二皎皎金鵲光熒熒紫菱色為理雙雲鬟垂首作轉側江行絶句三首欲上􅮶磯廟空憐神女嬌長江秋晩後日日有風潮二彭澤江邊石行人説馬當片帆吹浪過不復數瞿塘三采石横江浦當年起戰爭至今江上路尚有舊軍營聴吴歌有感少小經吴㑹吴歌一棹行五更殘夢裏啞􅥆兩三聲二落月寒林鳥明星野浦雞榜歌遙倡和春思隔江迷三晩嵗雞塘路秋風鴨嘴船吴娘纔引曲雙淚枕函邊露觔祠行露多蔓滋委身貴能早修黛揚緑烟羅裙裹青草二日炤銀書榜沙銜石闕詞髙郵州上路争認露觔祠上滕王閣避地尋江表看山到豫章何王登此閣千載在南昌重登滕王閣栁色春城霽風光南浦新憑欄愁騁望猶是賦詩人白洋河道中燈火春宵盡鞦韆上已過馬頭殘照裏又渡白洋河予經歸徳城女墻塌地埏埏如丘樊與同行者下馬賦詩睢陽一丈城半為賊所拆我今過睢陽城板髙五尺二汴水方流漫黄流怒未平張廵空塜側截截半竿城晦日村店開紅杏溪橋漲緑蘋途中逢晦日思煞故園春途中絶句未上楊家集先過棗樹林棗針能刺手莫繫白花驔哭江陰楊生抱器無成日多情憶去時君山明月夜何處不相思二水落看予度霜清别汝寒年年驥亭北花發滿䦨干達曰楊别業在晴沙名驥亭楊白花楊花不如人隨風任東西願敎雙燕子銜作梁上泥長安道長安十二衢日日走車馬那堪主父偃日走車馬下二九曲環秦甸千門啓洛陽宫前馳馬巷城北鬬鷄塲洛陽道洛陽故都城轆轤絓長綆但見白玉欄不聞緑珠井仝諸公集吴錦衣宅雷雨邀妓不至髙㑹錦衣堂春宵雨萬行油車何隠隠只在葛山陽二東海安期夜西堂道助樽燈前雙舞鶴不復下雷門三玉􅕸春前雨金吾殿上才天街曾勑燭呼取念奴來咏雲嘲友捧日遮嘗滿隨風結轉濃終朝嫌似狗何日好從龍塵但恨車前少猶憐甑裏稀日光流壁隙一道雨絲飛同聲歌懐友作繡帶粘香薄紅綿着粉銷願為羅袜子長束謝娘腰二團扇函秋泠屏山掩曙寒願為銅鏡子早晩自相看兆熊曰同聲歌云願為莞蒻席在下蔽匡床願為羅衾幬在上衛風霜咏枕記事代友四首弱莞流雲薄香羅刺面新小鬟時抱與真見洛川神二繡裹封花絮湘紋浹粉膏不知結束苦看取抱持勞三誰作通明製裝成八寶餘中郎多秘語藏就一函書四警夜擕來苦逰仙夢自疑芙蓉繡兩面那得並頭時題畫幛緑幘粧野花青􅀈倚山石欲煮黄鵠羮舉頭看秋色題畫像渡江圖水瀫看成線荷花巻似杯道人何處見記得渡江來二道人欲渡江荷花滿江沚坐將花片來影落一條水遙題梅聖占像何處逢梅子蕭疎一布袍相看無語笑白眼向青霄題畫孤桐抱山丘榮期坐其側為有清風來泠然枕危石病起贈李君自愧無金骨終年苦鉥膓少君良厚意飲我葛陂漿二七十懸壺叟函闗舊著書只今懐玉蘂猶識李公居三誰療糾宫襍應憐洛市還火珠橋下路方籥九還丹李住名火珠橋漢邊思漢軍屯句注邉馬渡陰山羽書飛上郡烽火逹蕭闗二蘓武持旄節夫人下錦車甘泉呼保塞非復舊休屠隴上歌不見隴頭水但聞隴上歌歌時雙淚滴可是隴頭多採蓮曲蓮葉將衣緑蓮花比面紅採蓮蓮已盡别有採蓮儂二採蓮愁日暮舉手攀荷枝荷珠如淚滴是妾憶君時醉中語妓調宋三吹笛唇脂落彈絲腕帶寛背人重料理莫倩宋三看蘭溪棹歌春水碧泱泱春蘭覆水香中流不用棹直渡浦江陽泊牛渚有感夜月横江思秋風牛渚情舟中無謝尚誰聴咏歌聲江行無題落月石帆隈孤篷曉未開㟁浮移䌫上知是早潮來二泛水浮新葉流波漾束薪可憐江口月不共故園人三水國蒹葭老江城橘柚香烟中同醉起惟有櫂船郎四山雲低復起江鳥去還飛借問舟中客何時可得歸五風起泊江臯江聲徹夜號不期鄉夢逺猶聴浙江濤送黄媛介令子歸伊舅氏王粲登樓日曹昭作賦時將歸無限意只在渭陽詩囉嗊曲染絲作帆繂收拾帆子迴鍮石裝篙頭下篙莫輕開二君買西地錦應須到蜀城蜀中春鳥語語語自分明估客樂朝望襄陽商暮望真州估不如隨販兒朝暮拾錢數二鐵鹿須東下蒲帆莫上牽那知上江女也望到家船稍婦稍婦立棚子蕩稍清江濵故自稍輕㯭迴頭不看人二夜起風水惡早梳弄船子聴歌如有猜微笑入烟裏書壁有序遇桃二枚臯里中從珠湖㑹也重九日復集雲起閣曲江主人扶醉再擕榼蹋歌同過桃家乞書二絶句于壁菊琖分燈暗葦門繞路斜烏啼深巷裏巷口是桃家二燭下憐紅粉霜前墜白榆官街戍鼔静愁煞夜啼烏西河集巻一百四十六
