body:
  text: 西河集卷一百二十九翰林院檢討毛竒齡撰詞九懐詞昔屈原放於江潭見楚南之邑其俗好祠而善為哀歌毎祠必師巫男女婆娑引聲歌神絃諸曲以悦於神而其詞鄙俚原乃作九歌十一章變其詞大抵皆憂愁幽思中心靡煩而無所發不得已託兹神絃哀弹之以攄其抑紆之情其聲橙橙聽者生故居之思焉予避人之崇仁寄宿於巴山之民家者越一年過客祠華蓋山者不逺百里舂粮負之巫者吹簫度深林前去且行且吹聲斷續呦咽不忍聞思故鄉越巫與楚相埒而詞鄙尤甚士君子猶歌之當晉武惠時予鄉人夏統以採藥入洛洛王侯貴官爭物色之欲强之仕統乃歌土風三章以見志聞者曰其人歌土風不忘故鄉當不願仕矣遂争致酒醴而去土風者一慕歌祠舜也謂舜能慕親也一河女之章祠孝娥也以孝娥為旴江女也一小海唱祠伍大夫也大夫不良死而屍於江哀之江也者海之小者也雖其詞不傳不知何如然亦神言矣今蕭俗祠神尚有伍大夫而舜帝與娥不與焉且其詞不記不能如仲御之能引聲而故居之思則未嘗忘也因憶鄉祠當嵗終巫者祝神名甚夥皆不可考而其有特祠而略可疏者名凢有九雖其名多互異展轉訛錯亦且以意考証并述所傳聞定詞九章以逺附於九歌之末縱詞不逮原歌聲間奏必不及仲御而憂思紆鬱前後一轍爰仿漢大夫王褒舊名亦名九懐曰吾懐之云爾歌也乎哉水仙五郎蕭山俗祠水仙神毎嵗秋節上湘湖水仙花開湖邉人家家祠之其神有五一名水仙五聖人又名水仙五即相傳是鄉有兄弟事母孝傍湖而居當水仙花時其母思魚餐戒勿擾水中花五人念滿湖面皆花定無可取魚者乃各衣鵂鶹之衣入江水取魚以潮至並漂去因為潮神嘗乗白馬於水仙花開時還故鄉望母故上湘湖傍有白馬湖是其蹟也杭俗祠三郎神其祠在候潮門外江塘邉一日神巫於祠時大怖言霍霍五郎當來看三郎矣湏臾潮至壊廟一角問是何五郎莫欲奪其廟否曰蕭人嘗祠我無廟吾廟在江中不須也按伍相杭人亦稱伍郎此五字當是伍字之誤伍相為吳主所殺煮之於鑊盛之以鵂鶹之衣而游於江伍相大恚乃侻去鵂鶹衣當潮上時改乗白馬坐於潮頭吳人望而認之曰此伍郎也今為仙矣故紐書曰伍胥死吳人呼為水仙或曰靈平死楚人亦呼為水仙蓋水神之稱云前江兮風生滄波浩渺兮江門不扄須臾水上兮風雷并排山而至兮遥天晝青砰磅訇磕兮儼樓船之進兵銀戈組甲兮紛縱横驚濤築壘兮立海以作城若有人兮推之行一間黿鼉兮擂鼓天吳謼譟兮馮夷舞前敺海若兮後逐水母蝦官鱉卒兮不知比數中有人兮騎白馬二間早潮初落兮晩潮又催江流上下兮無竆期潮有信兮江有涯望夫君兮君不來三間江流兮不住朝從此来兮暮從此去望夫君兮何處所四間春日兮西馳楊花撲地兮漫天雪飛江烟羃䍥兮江雞啼平沙草煖兮薰人欲迷迎神不至兮打漿遲五間榴火兮將燃着單衣兮無綿迎神不至兮潮欲乾神指水仙為期兮今告予曰不閒謇予將先期以要君兮謂荷花為水仙六間水仙兮奈何秋霜未降兮花開滿湖神騎白馬兮張靈弧解鞍歇馬兮在前山之岨神之來兮待日下七間水仙兮芳香秋風淅淅兮花開滿江神騎白馬兮靈弧張西山射虎兮東山射狼神之來兮山月明八間泉清兮酒旨斫龍斮蜃兮炰鱉鱠鯉神左顧兮不躋齒但聽清歌兮颯然以喜金槽玉捩兮銀甲指琵琶三奏兮神醉止旋風來四壁兮神去矣白馬將行兮花猶在水水滿堤兮花滿沚望水仙兮思無已九間沙蟲王八蜡總百蟲之祀蕭人以祠蜡為祠蟲非也於越都海涯其地為水蟲之國而越世王之當句踐伐吳敗歸吳兵追之保棲於西陵之山而築城其巔曰越王山以其有城名為城山俗名越王城方是時句踐意僨命婦人采苦葉為藉卧於其上懸膽於梁而仰即含之乃合義士五千人滅吳而瀦以為池歸令義士着錦衣散游江濵一日風雨集義士悉化為沙蟲句踐鳥喙有蟲像亦死名沙蟲王蕭人就城處立越王祠相傳祠物凢三獻及列豆菹醢鱐腊皆水産或曰錦衣義士豈化蟲蜾或亦曰水國之王應長魚鱉也云爾若有人兮披猖脱介馬兮渡錢塘左持弓兮遺矢右帶斧兮缺斨望深林兮延佇爰託足兮髙岡聽烏號兮心驚毎左右兮顧望右滔滔兮江水左演演兮湖湘世䠞䠞兮安之將還歸兮故鄉一間巑岏兮崒嵂磈磊兮崛岉中有巗窔兮可以為室二間葺茅為蓋兮繚以蘠傍阿築闕兮羅修篁搏沙甓土兮環之以城三間方春兮采薪春花滿谷兮正愁人人擷花􅞉兮吾樵棘榛晝當坐薦兮夜以作第與茵使我賤體兮不得伸四間前山兮采苦春花滿山兮不入筐筥取此苦草兮絓庭户朝出啣之兮入亦不吐使我心兮苦兮苦五間天開兮空濛乗虎豹兮駕豐隆左抽吳劍兮右秦弓恢疆辟地兮奪黿鼉之宫驅斥萬里兮覇江東紛紛甲士兮如沙蟲散游江濵兮類初晴之蠛蠓裁蟄發兮飛爞爞君王千嵗兮長有此邦六間迎神兮何所東溯十洲兮西極三楚傳言傍海兮進樓艣南開甌粤兮北冦齊與魯句章汰沫兮何處所迎神不采兮心獨苦君不聞西陵兮有風雨七間五木兮都梁雜肴蔬兮進山堂山城石豁兮猶有女牆有鳥長喙兮來啄糧蛆菹蠣醢兮請遍嘗薰蒿滿屋兮風悽愴靈旗還海兮車㽞宅傍吾與君兮共樂康八間女巫兮紛若身被錦繡兮首帶瓔珞目含江光兮光射乎林薄願與君兮共安樂九間華鐙兮明燭遥夜如晝兮千枝間發樂倡遞奏兮宛不知夜漏之滴雞將三號兮神屢出東方欲明兮樂未畢十間下童下童者夏童也名方邑人年十四遭大疫父母伯叔羣從十三人皆死方夜哭晝負土塟十三屍三年訖功遂廬於墓傍年十七呉帝拜仁義都尉遷五官中郎將人争附之名其所居鄉曰夏孝鄉年雖大以孝童稱因曰夏童及晉元帝時江陵有祠明下童者以下童聲同遂以吳聲明下童採蓮童曲詞誤作此神迎送歌而雜以神絃今其聲猶存毎隔屋聽之哀然焉蓮葉兮田田初出水兮如錢朝迎神兮塘之邉一間夕宿兮塘下思夫人兮盡人之子蓀何為兮獨勞苦二間陽烏兮髙飛思夫君兮下棲為君愛烏兮棲君之衣三間野獸兮騰騫思夫君兮來前住君之屋兮就君喙眠感君兮而獸自馴四間迢迢明下童千里還相迎早潮發瞿塘暮潮到江陵五間江陵荷花開吹笙過江渚迎神歸湘湖花開吾思汝六間奈何許勸君進酒黍沙豘雖不肥煏之可為脯勿食浦子蓮蓮心苦下童七間奈何節勿採蓮蕅葉葉面珠泪多葉根蕅絲結珠泪有日乾懐絲那能絶下童八間江使君江使君者梁㑹稽郡丞江革居官甚清而有惠政徵拜都官尚書瀕行將渡江囂然一身值風作舟輕濤涌不能渡還取西陵岸石數十片填之始行鄉人搆亭於江邉名取石亭過者祠之唐天寳間有客將南泝婺州已僱舟見有神鴉集柁樓心竊疑之傍晩老翁求附至此舟舟人招之翁曰是舟明五更開後當有甾忽不見舟人乃祠江使君宻取亭傍石蔵舟中夜半開舟風果作舟人臨把柁輙作送聲云江使君舟便帖然後人依其聲作和聲曰江使君去復来風發當復来片香兮三焚符官入奏兮上天門須臾風起兮神降爾庭東方千騎兮羅甲兵旌旗蔽天兮夾鈹以行君不見形兮試聞人馬之聲屏息兮而喓以嚶一間椒酒兮三澆女巫進舞兮奏雲璈天開巨􅀈兮靈旗飄舳艫銜尾兮風行如潮長綃絓船門兮樹之以兩旄闐闐擊皷兮在舲牕之窔君不見燒紙船兮隂風四來二間謇修還兮致語使君㽞兮江渚一葉兮如屨不能来兮不能去三間車前無八騶車後無伍伯漂漂上江亭前頭風波惡四間我欲迎使君睹此滔滔那能息使君倘能来但願江流變成石五間菊旨兮蘭芳羅六食兮進三漿留使君兮成享爰以躋兮公之堂六間雕壇兮砥廡逼丹霄兮為此棟宇㽞使君兮居處䑓有九成兮宫有九柱七間湯湯兮流波留君不住兮當奈君何長㠶欲絓兮錦纜拖相風下指兮神鴉過神鴉未飼兮君不可以去江使君八間江波兮瀰瀰留君不住兮君何以為相風斜指兮前舟未開紙錢抛去兮神鴉迴神鴉雖去兮君當復来江使君九間苧蘿小姑西施住蕭山之苧蘿村其地在蕭山城南二十五里前有苧蘿山山下有紅粉石斜傍溪流相傳西施居其間章懐太子註後漢書引故越絶曰蕭山西施之所出孔靈符妄據異説謂在諸暨者謬也舊唐書又誤以蕭山為諸暨所分亦並無共事詳見蕭山縣志刋誤施亡後鄉人思之為立祠溪傍以其為鄉所出女名小姑神比之鍾山蔣侯妹稱青溪小姑之例時苧蘿南去界水鄉有浦陽江環繞西南而從其東北入海俗名西小江江岸牛頭山與苧蘿遥對居舟行過者紆廻山下不能去長年把柁見北風生輒歌曰牛頭苧蘿一日三過蓋思之云其後宋淳熈年敕封施為土榖神曰苧蘿村土地先施娘娘村人禱賽者日益盛明萬厯中邑祠城隍神於九月廿三日為城隍慶生日集廿四鄉土榖神而游之於途毎鄉扮尸聘色妓扮娘娘神教官應君偶被酒不敬妓作神言取酒盞擲其面血出隕地㡬斃知縣劉君代請罪久之始得起後以鄉中室女扮其尸暨崇禎末因國變罷㑹嗣後無復有游神者山村兮苧蘿西去兮誰家沿門兮溪斜中有人兮浣紗溪邉桃樹兮時落花一間花落兮溪濵細草生兮如茵風吹莞葉兮翻羅裙青苔石上兮吾思美人迎之不至兮徒延佇乎東隣吹簫歇兮但嚙脣二間朝不語兮夕不言神欲告兮弹紅絃聽鳥啼兮處處看花落兮年年三間年年兮嵗嵗倐而来兮忽而去桂酒兮椒漿欲留神兮不知處四間時仰盻兮朝光黄沙漲霧兮山頭渺茫村人賽社兮過前庄神旗未樹兮晴沙晝揚神之来兮衣􅀈黄五間擊鼔兮敲鞞朝日出兮似臙脂薄雲遮日兮山前雨飛村人賽社兮過溪西神之来兮濕衣六間小姑本明姿生長此村裏今作村中神事事得較計七間牲畜共粢米滋養藉神力風吹苧葉翻兩面有顔色八間岧岧牛頭山下江通苧蘿感兹相通意相望以作歌九間朝亦望牛頭暮亦望牛頭三朝復三暮牛頭望如故十間張十一郎官張十一郎官者宋䕶堤侯張六五老相公也名夏邑之隖里人初以父亮為吳越王時刑部尚書入宋歸命遂由故任子起家授工部郎中稱郎官既而海溢􅄓風發錢塘蕭山堤總壊相公充䕶堤使者統捍江五指揮使䕶海堤有功封䕶堤侯乃以䕶漕當决河覆舟旗丁繞河覓相公不得翼日有大黿負相公屍浮於沙巫者狂言相公已為神其屍歸塟於蕭山之長山牐而立祠牐傍負山壁為楹面海滔滔毎雨歇見神燈數隊沿山而歸宋景祐間禮部請於朝封英濟王蕭俗呼十一為六五呼官為相公以侯王故呼老相公至是呼老相公廟邑人来祠者呼老相公㑹毎嵗三月六日係老相公生日各鄉賽㑹總在三月間鄉集若干人殺牲設酒醴樹神旗張葢坐屋子船吹銅擊鼓到廟間有神巫導念迎神還船歌侑之飲食終日以為樂及入城則燈火滿街矣曩時民殷富毎鄉設賽㑹田掄租割胙以争勝為事今其田俱分賣不可考矣父老相傳祠盛時相公神最靈江塘首㑹家嘗殺神豬先以豬肝奉其母其婦從旁竊食之及到廟神巫呼使前宻云汝以牲飼母孝也婦何得竊食歸當詛之其人大驚謝去當是時神顯赫如此撞天闗撅雷鼓男旁招女拂舞冬贈堂春弭拊来無方去無所雲為船烟為馬一間白烟霏霏兮碧水洋洋鴟龜曵銜兮以堤以防芻龍初駕兮茅旗畢張西行弱水兮東通扶桑彭咸何在兮氷夷久蔵銜木不可以塡海兮鞭石不可以為梁逝將􅀈浪兮逺放之無何之鄉斯世既不可與居兮聊逍遥以相羊二間鹵兮斥望衍圻楗石為甾兮海不溢三間山之曲有神宅神燈歸来兮夜雨如漆四間刳羊剝豖薦腥膻兮芟毛薙土築堂壇兮祓除釁臭具湯盤兮金􅀈玉笥蔵衣冠兮四招以茅願神之還兮蒩舘包肉無敢先嘗兮春秋饗祀長居此故鄉兮海水可竭神不可以忘兮五間北嶺將軍蕭之北幹山舊多種松深林如神居山頭有嶺名北嶺祠厲將軍神於嶺間或曰神以驅厲名或曰此秦人厲狄也隨項羽入闗歸塟此山稱將軍以祠在北嶺稱北嶺將軍相傳山前创地得石穴骸物俱壊惟顱骨尚存大如車蘿即將軍墳云宋徽宗朝睦州方臘反將寇杭州艤舟於蕭山西江之濵吏民恐禱將軍神忽東北風發壊其舟夜半見甲士列岸傍中有巨人介首衣虎豹皮長出衆數尺驚不敢近知縣劉韐上其事封武佑將軍暨元至正間東南寇起西陵烽火徹晝亱有賊從中來者云賊思分遣寇東浙以江岸有兵故止然實無一兵也漁船涉帑者深夜見神燈滿江岸如列營然以故賊終不敢渡時青田劉基奉其母避兵蕭山值縣修將軍祠基為文紀事勒石祠左北幹村人毎嵗於正月初四日祠將軍至今不絶元陶九成載元時至正某年大旱禱於廟得雨俄有降乩於廟者云將軍自言吾有徳於民民不忍忘我俾血食於此㡬千五百年矣蓋祠久能神呂覽曰五世之廟可以觀怪神之至則近於怪焉翳北山之崒􅙣兮種落落之高松合千章以為屋兮連五釵而成叢上拂飛雲之窈窕兮下蟠曲藟之菁葱逺觀紅廟在樹中兮近乃識乎將軍一間松門兮如椽甃玉趿兮挂朱櫋黄􅀈為斾兮白狼為㫋頸披銏鍜兮臂介以釬紫茸飾鐙兮琉璃鞭勃盧之刺兮鋈金之錞二間西行兮秦闗羊腸萬里兮環如曲盤將軍一去兮復来還江東父老兮猶知令顔千秋扞我兮戴將軍之恩三間松風兮颼颼將軍之出兮駕靈虬松風兮颸颸將軍之入兮靈旗蔽之不見將軍兮使我思四間松花兮如蕡新開社酒兮醉將軍社樹兮松椏社糕三獻兮松隂未斜請拂將軍之㡌兮簪以花五間連年累嵗兮禾未登楊枝三起兮蠶眠不成烏鵶攫肉兮䑕覆罌鷄雛失伏兮牛羊又眚生年何㡬兮遭時甲兵官吏到門兮驚又驚六間但願兮今茲倉庚鳴兮桑葉肥耕牛叱叱兮長負犁空村啞札兮惟聞繰絲桔橰掛左壁兮清泉滿畦高楊歇日兮凉蟬嘶秋霜未降兮先授以衣新收禾黍兮足供神之饎王孫遊兮皆来歸七間蕭相公蕭相公行九少時讀書雲峰山或授之法及長為吳越王時詞官掌文史事旦日在朝夜輒還家宿其家人竊聽唧唧疑房有他男聲妻羞之伺其行時見蹋雙鵲去即屐也乃匿其屐不能去事發棄官住雲峯山巔邑有旱澇能興雲致雨且能以咒療諸疾一日城有疫癘者請召至將入城忽失所在鄉人思之塑其像於各廟院潮神之間以其無專祠故雜附之非潮神也毎臘盡嵗初鄉人召巫讚年祠者入夜讚蕭九相公以三巫婆娑一巫司唱念擊鷄婁鼔二巫男女各一無女則以男飾之作相公與夫人問答念採茶歌攢摭蕭人鄉俗鄙語他縣所不解者呐呐為笑樂其舞男女各旋轉其身若旋風然名曰罡頭旋以神曽蹋雙鵲又名喜鵲罡頭旋相公失名望雲峯兮崔嵬扳蘿捫葛兮與雲齊獮猴為家兮狐貍宿棲深林如幄兮邈不可以居願無忘兮君之閭一間七寳兮象牀九光如晝兮照修房下莞上簟兮湘屏四張君之居兮無相忘二間来不聞兮去不知靈芬欲告兮拙言詞空弹寳瑟兮吹參差三間蹋空而來兮蹋空而去靈芬欲㽞兮不能住徒秣其駒兮枉縶其馬四間鷄婁兮鼕鼕爇螺甲兮熒熒釃清泉兮乍汲煮香稻兮方舂把蘭芳兮舉步避苔滑兮歛躬五間歛躬兮進舞烟蛾側促兮不勝楚倐而鸞翔兮忽而鵠舉紅􅀈逺颺兮儼翻風之羽履墻窄略兮不踐土東西遥曵兮莫知處所蓮花鏇兮等急雨請君看兮胡旋女六間左昻兮右低隨風上下兮烟霏霏下貼土塊兮上拂天池緩看翻蝶兮迅看雕隼之飛霎然而罷兮不動衣風生滿堂兮如神来斯惟明神兮能鑒之七間荷仙荷仙者俗云即荷擔僧相傳来蘇十八都有雲門寺即僧宅僧毎出人問曰念佛何用曰成仙耳因亦名荷擔仙今神巫讚年祠終亦讚僧如曰昔日有個荷擔僧前頭擔母後擔經是也但僧與俗何渉俗安得祠僧且僧安有宅即荷擔僧亦安見為蕭山人舊以問之先檢討先檢討曰此賀監也監吾邑人少名知彰取知微知彰義也字痺生癉者彰之反取彰善癉惡義也舊居來蘇鄉鄉有周官湖嘗請唐宗乞周官湖而宗以鑑湖與之今周官湖俗訛稱周家湖正在来蘇鄉與雲門寺相近則荷是賀之誤擔僧是癉生之誤荷擔僧宅是賀癉生宅之誤其曰仙者知章為飲中八仙之一名酒八仙又為道士俗所稱仙官者也且夫知章唐學士一且髙蹈逺引却其官歸里㧞乎世俗之浮游者則亦仙矣擊石兮硿硿神之来兮有風試看燭梢兮摇摇兮一間吹簫兮唔唔神之来兮先以雨女巫噀水兮如霢霂之下二間乗船来有芻舷騎馬来有紙鞍君来騎馬似乗船兮三間皂㡌来是朝官黄㡌来是羽官君来皂㡌兮又黄冠兮四間嘆西堂之不扄兮人不能違笑東舘之無闌兮誰則能辭之以歸君今来還兮豈非仙兮五間朝行齊魯兮饑無餐暮行吳楚兮席不能以蹔安期朝暮暮兮徒辛酸君今来還兮嗟乎豈非仙兮六間城南有秫買千斛兮城北有窟為君築釀室兮濁者為泲清者為酃渌兮七間迎君前湖移之還南塘兮左有桞姑廟右復置道士庄兮請君飲酒在此庄傍兮八間採菂為核縮藕以為漿兮荷花百里風来聞香兮如歠沙落又如飲烏鄉兮晩来微醉聊宿之荷之間兮謂君酒仙又謂君荷仙兮九間荷有蓋兮蓮有房君有友兮名釀王分茅錫爵兮不如守此醉鄉吾欲並祠兮君之傍春祈秋賽兮祠有常千年萬載兮長持此觴十間西河集巻一百二十九
