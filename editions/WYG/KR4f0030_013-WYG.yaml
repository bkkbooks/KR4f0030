body:
  text: 西河集巻十三翰林院檢討毛奇齡撰館擬判棄履判甲吿婦夜半棄覆訴云觀燈雜蹋故春元列燭士女皆行夜半傳柑細君何在天津橋逈星流火樹枝邊安福門髙人在炬光影裏因傍香輪之雜蹋致令珠履之陰遺在婦非失足長途于甲則畏行多露𤓰田未納何為踏地歌来蓮歩相生竟在凌波襪底本異漳臺之賣難為楚國之搜人非東郭誰憐雪跡已盈街行近西家羞見月光偏炤地豈蔡琰之訴夫而跣足如皇甫之下士以捐屝雖未罹乎官刑亦宜申夫閨訓巫樂被戲判潁上東北廟甲女樂神懸跌于楯陽幻欲墜乙怖其真引手援抱女責其有戲心不伏下蔡古縣潁川舊封人為雞骨之占俗尚牛王之祭叢壇石上三物斯陳野廟欄邊羣巫進舞将樂神以婆娑之態因懸姬於絙索之間騰身赴節恍然濯燕銜花撒帶盤空往似晴蜺吸露蹴紅繩而倐下勾寸能留粘素􅀈于髙頭履欹欲墮故為躍之而色顫遂貽觀者以心憐伎臨炫處總教過目皆迷人壓看場竟爾迴身就抱樓前驚墜粉惟恐珠投掌上把長裙空愁仙去睹目招而不解雖援手其何為但有愚情慢從戲論爭髙粱粟稱名判行唐婦嫁山隂縣農勸夫種髙粱夫執是粟至詬有女来歸家在臙脂河上乃夫肯播耕於宛委山前傍桑陰於秦氏之園分杏粥于西施之里烏犍初下坂夕陽未墜好鋤藜斑鳥乍呼林春雨欲来堪浸榖勸三農于有事賴百種之均敷青秧雖未發而各有其名黃甲俟将開而早區其處乃有鄉邦􅀈諺粱粟殊呼夫婦唱隨北南異舉求田非作宰夫請秫而妻請秔取婦豈尋兄一疑黍而再疑稷但思質從已造名任人加僧院稱蘐花為平慮未便乖張詩箋疏菉草為王芻何容詬厲應誡稽唇之過潛銷反目之諐孝㢘略傴受毆辱判舊題得甲孝亷詣公車歸遇乙故人于里門乙便長揖甲略傴去乙起顧不平牽甲還故處搤甲項内胯騎之使向後出甲告乙毆辱甲幸上公車徐歸鄉里張憑作孝亷了無新義平津為博士便逢故人由其胸次全卑故爾睹瞻甚偉車前盤辟不思貧賤驕人道左逢迎妄謂将軍揖客一命傴而再命僂稽首誠難爾佩委則我佩垂折腰何用身愧龎徳公亦使望塵下拜豪豈任城子居然捧手來前自非酈生之説成必致灌夫之怒起若夫乙雖稱鹵性實快輿情吏果强項胡為入我褌中人苟直躬奚難出之胯下籧篨不善俯且倒行而逆施之凥尾亦能髙何前倨而後恭也自侮人侮毆之宜爾悖出悖入辱何足云蔡邕棄妻判舊題大昌縣令係進士出身斷部民棄妻比擬蔡邕吏吿不可令責吏吏不伏原稿無係進士出身五字今從舊題補八維巫娥之近縣嘆有女之仳離挽車無㡬日空留棗樹在東家唾井有何顔但采蘼蕪於山下碎寶鑑於分奩之後墜銀缾於㫁綆之間野鶴孤飛人方倚戸江魚雙躍妻未還家誠多鮑永之迂踈當辯秋胡之輕薄甲久通仕籍早授文林帖括可研摩已成進士簿書能省覽不廢入官但矜季路片言㡬壞中郎一世拽當場之傀儡鮑老無情彈孤館之琵琶蔡邕不孝致使功曹之坐嘯反糾掾吏以行違太白入東井端為渇耳孟堅無選賦豈其愚乎吏既直前有詞令當謙退自省井田判舊題得縣申嵗十月八人里胥從婦人相從夜績每月課四十五功聽其歌詠行人善之狥於路按察禁之太師以失職致詞原夫閭師之任女事比長之載婦功井制已然地官為烈故遒人狥木不避宵分籥掌吹豳應勤夜作乃涼風乍起促織籬邊縞月初生索綯門外陳人麻總不曾持向三條齊女燈光嘗使畱餘四壁合同巷辟纑之侶較斯鄉課績之工一里有程期恐良辰之邁往諸胥膺率作遂永夕以徘徊紅花染甲擘去成紋白苧盈筐望来如雪每限之以二十九晷當計之以四十五功然而陶家獨處尚有哀歌漆室相逢寜無永歎痛孤婺之作苦未敢援琴悲寒女之善懷因之輟杼藉此窮櫩之宴笑調兹長夜之歡娯鄉中監正原非竊聽狂夫路上行人即是采風使者從歌詠而勸以勿壞庶有善乎謂燕樂而禁使不然失其職矣當念太師之鼓舞勿援按察以紛紜西河集巻十三
  hash: sha256:8899ea0243769bf3e54f8b20079437cfd733adedf85f42c93159562a606039f3
