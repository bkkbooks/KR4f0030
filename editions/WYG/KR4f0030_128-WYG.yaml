body:
  text: 西河集卷一百二十八翰林院檢討毛竒齡撰賦此桂枝賦集之第三巻也西河出遊後桂枝集已亡失不可得矣唯呉江顧茂倫家藏此第三巻今匄錄之連首卷共十八篇分作兩卷又遂安方氏呉門顧氏復貽三篇并録于後書堂賦伊南沙之浩𣺌兮麗嵳峩之石城擷芳丘之蕙華兮采尚湖之香蘅播清芬于北麓兮揚駿烈于中楹綣春秋之長爼豆兮用以祠乎先生考先生之多懿則兮羗獨遺此令名逺以闡三古之墳籍兮近以紹百年之典型􅌢隱徳而勿使彰兮進虚谷而勿使盈鍾世績之紀平原兮述髙蹈而嫓乎東陵但纓冠宿烏鳥兮感在原有鶺鴒既敷青氊而讀易兮復啟絳帳而傳經邑近言游之宅里兮家有包犧氏之蓍莖宜盛德之昌厥後兮乃受詩禮而獻諸彤廷夫何明綸之既已飾竁兮又饗祀而為此銘也豈翳苾芬之靡所于方兮亦好修之徵也重曰虞山之峥嶸兮先生之髙與之衡兮南湖之清兮先生之節與偕澄兮唯兹廟貌為書堂兮春蘭秋菊祀無疆兮千頃樓藏書賦乃詣温陵黄子俞邰于秣陵之故城登千頃之巍樓觀其先人海鶴先生所藏之書六萬餘巻判為六部曠然興懐惕焉有悟夫其經史異林官私殊列堆垜盈㕓稇載連轍四類已啟五庫未閉緹巾重袵華匱遍揭𤣥錦為囊青緗作帙牙籖直垂繡帕横結帘捲入雲忩映如雪舊軸新縢間色以别是以複斗葢大文瓻盛小積勢焚輪周視縹緲紅菱之紙未濡白蟫之魚欲掃筐衣分董仲之帷書帶有鄭𤣥之草隔牆之燈影難明繞屋之月光初曉既已抄文竭北海之螺雕木罄東家之棗白驢以負箧成疲黄犢因掛韉而老小史之掌故多年太乙之星精在夘適仁夀之棲遲入嫏嬛而拜倒乃始遍觀於蓬萊之府游神於宛委之墟税老聃之遺宅過共王之舊居羣玉飲仙官之酒蘭臺攬侍史之袪廣宗正之七畧兮増惠施之五車合當陽之外庫兮廓河間之前除既遴九種於石渠兮復聚八萬於金樓雖張儀畫掌所不能記兮曽蘇秦刺股而何足以資於是挍用鈆黄題分朱紫旁置巾箱中装羅綺飾鐵摘與金欽炙湘蘭與沅芷郝隆之曬皆厨蔡亮之觀如市王仲壬多户牖之標張司空無米鹽之徙發金帛而採於淮王貫丘索而知為楚史雖復一嗤二嗤四部五部咸陽之火未焚天禄之藏如故史䇿有一家之成易象無九師之蠧得總龜於祕府之餘辨亥豕於渡河之誤猶且睹兹殷繁遜為極盛幽經不傳怪籙自賸閣下芸生杖頭火炳北堂鈔録東觀訂㝎田氏名樓白家投甑李充校有萬篇皇甫請非一乘杜元凱之無所不該齊王攸之有求必應折竹寫之多所遺懐餅讀之未能竟河東之箧真亡柱下之言難罄豈况議郎練達徵君雅􅀢豫州之辨慧非常江夏之博聞無恙去紫㡌之髙山兮寄烏衣之深巷渺千頃之在懐兮凌百尺而獨上似馬遷之承談兮儼子歆之繼向傳御史之緘箱兮發中郎之祕帳慨江陵之多燔燒兮痛砥柱之又覆溺經亂離其獨能存兮過史窚之遺冊嗟生平之好典墳兮近書淫與書癖未能入集賢之三館兮幾曾登侍中之重席擬客作之去無門兮鮮官書之可擇任流浪而罔所遇兮徒望名山而求索何期偃蹇此南邦兮竟徘徊于東壁世無仲宣可語兮覔桓譚而不值苟閉户其在何年兮撫横欄而嘆息九月九日觀戲馬賦且九秋之將暮登髙丘而覽觀修迅商之故序爰藉飲以為歡乃望鄉闗之邈邈兮俯平原而有嘆夫何散爵酒既盤兮别命作伎輟優弹兮是以遷坐亭臯薄致粔籹顧盼廣衍將以戲馬視其傍有材人陽阿之女焉執其列有驎駒銅爵之圉焉於是望者偨俿趍者繹絡左右燕䀪前後鴟顧人既圜􅉹車亦輻輳相迢迢之永埓兮審漫漫之修塲預周營以量步兮徐控鬛乎以行繞素踦之蹴踏兮飾葱鐙之煒煌旋扶女以試上兮宛罄控之不良身㣲軃而抱其鞍兮人在前而曳其繮渺前溝之難卒越兮且却足而若驚於是結絞􅀈束匼匝約綵旛刷朱鬛下女歛髾倩􅀈裹裛脱華袿而易裲襠兮卸紅裳而表以袴褶爾乃按勒欲前翻抑使後攏鐶拉鐵拔摋傾奪横舉盤辟而作其怒樹骨猶挺歕沬類布乃釋轡而縱繘頓撒踠而擲胯鬱跳踃之未追迅漂騰而驟去儼風雨之乍来恍波濤之急下焱揚倐忽非目能睹搶捍凌越接息而到騁便嬛之妙技兮奄踰曳乎驚騶摩倭髻而側植兮拔雙跗而倒投歘竦擢以鴻翩兮遽翔羊以鵠游錦標揚而譎坐兮珠竿偃而傍招邁風追與景躡兮疑電激與星流心徒憿乎岌岌兮耳但聞乎颼颼任當前之景詭兮曾不假乎逗遛乃率爾而奄逝兮亦霅然而中収或藏身於曲鐙兮或緤足乎長鞦偶偏倚乎半胛兮更分懸乎兩鈎旋通臂而舞雙帶兮遂俯躬而搴百旗當夫迴身而若漼折兮忽鳥集以驅也及其震踔而近摩跌兮又孰為之扶也爾乃紅游頓掣鬱怒未息驤首浮雲蹋足西極膺門生風汗溝出血怵心摇神驚魂墮魄熊經其觀鹿駴而格回視婉孌眉有㣲澤揚鑣擗摘恍飛翮者蹠地未幾復將驀者任千之曰戲馬如畫使舞賦失其麗史憲臣曰截然而止妙在不止陸藎思曰怔魂動魄中細按之仍是目接神授西河艶情乃爾王丹麓曰能于古賦中見紀事復見演説委委曲曲親切不隔體貌神變心力㣲緻亘古創事寳鑑賦汝南劉使君持衡于兹猶鑑監物應而不藏動得不偪光景有曜型模畢見有負局之竒兼容成之觀于其行也指璿臺寳鑑以為之賦乃若軒轅擊槖之時黄帝捧罏之際召龍神而下之謂𤣥㝠之可恃洞庭有夫夫之金畢方起熊熊之燧晞日月之光儀察雷霆之髣髴蚩尤装炭于其傍祝融摩笵於其列爾乃就諸翕闔縱之駴躍溢為波濤揚於煇㸌初視之如芙蓉之發於塘既視之如列星之旋行一照而江海得其清霽兮再照而天地亦為之低昂至若水心濯濯火齊熒熒壺氷欲泄盤露將傾驚霹靂之閃似蟾蜍之生鬼神因而悚視魑魅于焉變形燭之垣間既不隔蝕之泥中亦不㝠遂使光涵境中明起象外毛髪不私圜方無礙已洞隱而燭㣲且窮工而極態動佳士之低徊增美人之盼睐鸞鳯拂舞乎其前蛟龍盤旋乎其背日去珥而長懸水浮光而不碎因觀察之紛加故砥磨而有待况乎仁壽宮前之鑄凝隂殿上之銅邁咸陽之舊製擅明光而愈工薰金烟之煜煜兮洗玉乳之淙淙瀹珠膏以為之淬兮擷晶旃以為之礲順西庚之多蓄徳兮藉東冶之有餘功繫鞶組而揚珮帶兮琢琲璣而賁其形容逺瞻國史之留青兮近照宮衣之賜紅又况廣陵素書赫連墨篆氷華有紋雪色如練五日是成千秋可鑒歴試臺閣時荷顧眷既不疲于御物復不昧於自見遘妍得妍兮遘蚩得蚩我獨何心兮惟物之來鉅以見鉅兮杪以見杪我獨何心兮唯物之照豈獨背負圖書影飛烏鵲阿房星明耶溪水涸鳯摶廓外之毛螭展蟠頭之角圓規之望已成長夀之名可樂縈桂樹而能明拂菱花之不落松聲賦是以亭亭山上鬰鬰溪邊潁川驛畔張良廟前長松千尺偃蜷連騫恍龍蟠乎道左似蜺飲乎通川就而視之則青針乍長紫蘚初蝕節帶霜皴膏隨露滴茯苓盤其根蔦蘿施其枝上凌清漢下薄回谿崇柯羃䍥曲􅆬低迷喜映日之成葢每牽雲而作衣則有青蘋生風赤峪延籟風繞枝中聲流樹外唲唲焉鼪鼯之在林咿嚘焉山蟬獨吟漸轉而增揚􅀈􅀈焉如松根斷石千年而火發兮㗵吸焉鼎溞溞其沸淫爾乃草裏泉鳴竹間兩響蜀布春裁呉絲夜紡接殘息之呦嚶潄芳流而偃仰其或筝􅌙暗調竽笙間發銅脆能銜絲長可糺雲間有贅壻之臺海上去從師之楫嘆吹笛之無從悵援琴而自合至若沙崩頽岸堰决荒堤唶寒朝涉呼凉夏畦烏號澗底鼉吼江涯車轉蓬而颺逺矢拖翎而過遲舵有揚㠶之駛馬如拽練之飛薛御囀喉于鄴下孫登長嘯于山陲又况噫氣蓬蓯摶颸梢槭驟聴嘌呯再聆嗃呷商山之路既賖㤗岱之封難接緬九州之遥遥望百川之渫渫恍西陵之上潮聴未終而嗚咽抽思賦唯憂思之鬱鬱兮獨永歎而増傷思蹇産之不可釋兮願還歸吾故鄉悲夫秋氣之觱烈兮盼修途之孔長睹兹六幕之難與居兮欲淹留而未能㠑兮岌崒兮屼山髙􅀈㟅兮以崱以屴隈兮隩兮伊虎豹之室茫茫兮逺渚溟濛渺沔兮溯此極浦往既多風兮來又多雨伊龍蛇之都居兮𣺌不知其所處矰戈遥布兮罝羅四張任蹇塞之遍天地兮又安知予之相羊擣申椒以為糧兮春桂花以為黍苟椒桂之饒遺粒兮受之以筐筥朝涉予于淮汝兮夕予濟于江湘苟予情之信芳兮雖僻逺亦何傷寧不知去故而争就新兮何不變此態也誠不忍循俗而為詭隨兮猶有曩之志也夫苟同轅而不異軌兮又何必離此伴也乃驅袤而忽馳廣兮又何以為此援也少歌曰吾思兮美人依風穴兮上崑崙晝噉珠玉兮夜餐以珍層臺萬仞兮繚金銀吾思兮美子嘗乗雲兮去来駛身披薜荔兮首戴蘭芷君不歸兮奈何此倡曰長行瀨中嘆無衣兮棲遲此鄕三年不歸兮無冬無夏但視草生與草衰兮路何北南指星馳兮身居此地腸能九廻兮景短夜長邈予還故墟兮煩冤流滯所賴此抽思兮神游四荒周八垓兮古昔賢哲往以此娯吾志兮吾今效之抒為言詞兮獻嵗發春𣺌無期兮聊假白日度年時兮秋雨初晴賦惟兹西役道出江下兼旬霪霖阻于逆旅時值秋節天漢傾注一日而二十四風一月而三十六雨曜靈挽不來萍翳推不去櫩隙殆將百窺門前不出一步壌道不得平前村幾時赴衣被漫漶神思湫溼沙市夜沉城漏晝滴聴蜀道之鈴鞭夷陵之石痛故鄉之凄迷盼長途而嘆息爾乃夜雨暗収朝光乍起屋角熹㣲牀前晻􅀈林柯之響暫停瓦霤之鳴亦已陽久伏而邅廻日將升而倚徙隔江驚漁唱之來枕畔有鵲聲之喜於是霏霏龍燭逺與烟連團團鷄子恍在霧間犬因疑而思吠蝸將避而屢遷西壁之棲霞未定東牕之漏景將圓遂乃斜啟林扉大開江閣逺浦蒸烟奔流赴壑眉小礙以㣲舒體頓輕而欲落槐宮有趨燥之移江浪起負暄之躍攬蘋蓼則滴水流枝搴芙蓉而含滋在萼於是驛馬散步林雛試飛莎雞鼓翅鸕􅀈晾衣半岫掛機頭之練長塘簇屐齒之泥筝解潤而柱緩笮懸㠶而䌫低水盈溝而土蜧滅跡浪映壁而金蛇作輝况乎廟社稱竿酒旗換布折禾耳于中田决溝唇于當路黄綿慰炙背之翁繡闥謝掃情之婦蛛網破而絲短未牽荷溜傾而葉乾如故又况金風凄絶白露泠然秋晴可愛尤宜曉天宿雨歇漢陽之樹新烟生綿上之田時屢淹而惡伏夜方長而厭眠銀牀動則轆轤發銅闗啟而舟車牽草蟲宵吟不斷山蟬夜嘶復連廟市啟攤門之路村酤索開甕之錢客境唯乍游為可樂主情以初見而相歡又况三載淮西兩年江介前月洲邊今朝浦外恨王孫之不歸悵美人兮安在過江州而太守難依入西川恐使君不待天涯酒保那便知音複壁餅師著書可怪吟下葉之詩思湘蓴之菜竿未曝而衣紕河過滛而橋壊惜牛渚之窮游辜幔亭之雅㑹縱令雨畢長途日當亭午光紀凌寒元英起素一陽吹緹室之灰八載換雕時之絮緬短景之易馳惜流年之虚度健松亭賦有序武疆之傍有名園焉花竹臺榭雄于新都贈公方先生為遂安相公仲子曾于崇禎之末避㓂鄰郡得括子松于黟山許氏之舊園植之齋前朝夕灌剔薆薱而橚爽累經冬榮不厭春徳康熈甲寅常山開化㓂起園復燬于㓂所有花竹無復槎枿松獨無恙予同年生方君渭仁以制科試授館職遂於誦芬之次慨然念先烈未沬而手澤尚在因搆亭而楔之名曰健松葢取唐詩松凉夏健人之句也然亦曰松公老健可永芘吾宇乃自為之記而屬予以賦賦曰夫何長松之離離兮稟上崖之清神甫鬱鬱乎在澗底兮遽亭亭乎覆康干之門天風起而吹其枝兮野雲裛葉而纒其根上分五釵與三鬛兮下蟠四荒之與八垠固其礧砢饒勁節兮抑亦崔錯焉而多蒼鱗吾知支離之得為叟兮又何必天蟜之有如人乃張湛所不得而植于庭兮自非鄭遨之可栽于軒獨移樹于方干之故居兮云遇之元度之舊園爾乃扶蘇偃蹇蒙連卷兮攢欒欐桅詰詘盤兮團可為葢修可為旃兮其影如屋其聲如波瀾兮皴皮溜雨霜􅆬摧湍兮龍攣虎跛猊攫而鯨為翻兮不繫馬羊以待棲鳯鸞兮志在丹霄而苐託跡乎青巒兮何有夏貢又何有乎為秦官兮若其枝繁葉拏輪囷偪側柯類青銅根似白石仰欲扶輿俯若戴幘見之徂徕名為柜格時化青牛毎憇黄鶴超然欄楹表出林薄朱衣披其巔寳劍掛其脚家鄰仙橘之山人在桐君之壑儼雲霞之自来恍風雨之間作此固非培螻之所能生兮又豈匠石之可得而量度然而方儲種此亦有年矣朝夕摩挲得此茂骫膚理條暢骨骼􅋂顗本性勁直乃其節爾曲池既已平亭臺既已圮盎無服食之粒墓有拱把之梓南州之樹早已下垂東平之枝亦又西靡乃復㓂起樵蘇兵加翦伐喬木摧為薪擢莖截如髮建木之影俱消鄧林之茅不茁五陵之蔥蒨顧盻已非八公之草木驚怖未决何石楠之端正猶存豈樟公之仁壽不殺毋乃髙熲所倚世勿能移萊公所種人不忍拔宜乎見橋柯而興俯仰之思睹梓桑而起敬恭之節夫几筵勿越者孝子之永思然也播植勿遷者先人之手澤存也况乎有元輔以開其先有太史以繼其後開者作之繼者守之推斯旨也可以永久是故齊武留舎南之桑劉尹蒔丹陽之栁錦衣以禪代而辨其榮枯羽葆亦逾時而卜其安否吾聞樗櫟之在澗也本以無用得全散木之置地也多以不材見棄而兹之哲匠不施其斧斤虞人不加以摲薙匪溝中之刳剔無道傍之鍥鑕材非梨柚未嘗稍殞其纎榮質即楩柟不敢争収為重器是豈上黨有木焚之不隳拘尼之材翳而不敗哉葢貞􅆬之或殊而孝思之有異也鹿車臺賦有序昔東京鄭𢎞出蒞方州忽遇兩鹿隨車而行或前或後有如夾輈于是觀者咸相起賀卜其徵休則曰三公兩轓畫鹿其間𢎞故入召領參崇班今者中丞某公開府三呉山河帶􅀈冠于睿符八牙並建六纛咸啟風和雨時擴治千里乃者閒暇車過藩鎮彤麾分道白鉞如陣前驅末呵蟲蟄以震獨兩鹿者出自涂莽驂轂儦儦驤首就路武冠甲仗驅不得去竟隨車而還轅儼争道而歸幕遂留蘭楯之間從之栢臺之下因是有感於心爰為行臺錫此嘉名題曰鹿車屬吏為之抽牘賓從因而賦詩借三旌之先闢俟兩轓于後來某也不才亦為之賦乃若麟符屢授貘屏乍設茜斾熊飛柘袍鵲襭加獬豸于元冠集鸞鳯于髙闕巷已逐夫虎蛇扇能驅乎蚊蠛出門無訴寃之鴉在囿有含生之蟨璽方獻而鳯來圖將皇而馬出仁禽下應夫宮懸天廐上追乎太乙此固勝祝烏之楯郎過却鷹之樞宻宜其黄鵠舉而風雲以隨大鵬飛而海水皆溢若夫呦呦之食天子饗賓甡甡之友以俟羣臣飲白雲之汁戴七星之文名在丹臺之上生于紫水之濱饜腊者長年齒佩質者宜子孫雖羨門之當豢亦籞宿之可親是故毛具章衣皮縁藻線角帶銅牌蹄環寳篆既包體以為儀亦摇尾而作扇含毫成茀禄之斑蹋地作蓮花之片漢王㨗足而得之鄭人藏身而不見是豈斑龍之有神抑亦仙鹿之善變吾聞麐之來也一鹿引之羣鹿從之鷄斯之馬將駕而鹿游乎其間葢神物之出百靈在前山澤有曜仙驥可牽故宜春之鹿遘唐興而出芙蓉之苑塗循之獸懐漢徳而進太液之池况乎撫舞鶴之舊市廵鬭鷄之長陂一出而蛟龍並翔再出而麟鳯相隨者哉故夫御史在臺烏號于棨侍中入陛蟬集于冠神雀布鱣堂而闗西入拜鸜鵒銜魚袋而少監改官張氏封侯青鵲化印文之石望之作相華蟲立車較之端况乎筮仕虎林驅車龍海使鮫島以揚威樹蜺旌而布采雄藩作呉下之封幕府鎮平江之塏自宜即鹿無虞標枝尚在跂跂斯奔俟俟而會傍彼兩轓誠有如畫因之隨車返于官廨張月在前營室以待乃美輪而美奂兮誠可游而可娛喜燕雀之能賀兮更鳥䑕之攸除闢堂前之旋馬兮徒車中之載書且疏畦以種竹兮復通渠而灌花至若坐有華茵筵開綺席傍列鼎鐘前連棨㦸有鹿當前分蒿而食彷彿善警其角外格或背負夫印牀或口銜乎書冊但尋祗苑之花不觸西昌之壁假臺柏為朝餐藉幕蓮而夜息襲杻陽之佳名追鹿洞之遺則又况賓載鹿車談成鹿嶽澆旨酒于鹿腸啟修樊于鹿角指囷鹿而百室盈開涿鹿而庶邦屬篋有鹿首之瓊則名玉在懐庭有鹿蹄之草而寳劍在握是將進㤗階而覘其有異瑞兮又何如作斯臺而與萬物以偕樂黄桂生紅桂賦有序大夫望海之樓符使専城之署種淮南之叢桂先賁禺而試花滿林黄雪忽絓彤雲萬叠金砂偶噴丹屑八樹得之以為竒四民望之而成瑞維時坐客呉江顧樵抽牘作賦百里命和夫古有和詩而無和賦顧肖材形物同于頌聲授韻摛詞方之律體但知諷有主賓誰曰倡非予汝因承來劄稍綴成文儻示通都勿􅅓學步何南方之珍木兮經汜谷之冬榮飫朝來之墜露兮欵秋髙之緒風邁臯涂之窅窊兮駕岑嶺之菁蔥爰挺質于天闕兮遂分香于月中於是移種郡亭植根官廨宛委山前蓬萊閣外樓名飛翼長存堂貯清泉猶在爾乃日映團團風生飀飀霜娥所栽呉剛是守黄糝為糧金鵞作酒塗蜜餌于方橱摘松花之盈斗祗陀金粟難名玉洞仙蔴無偶僅此東堂一技已勝寒嵓十友夫何鮮支如纈有朱梫生其間焉髙櫰作筴有丹芬匝其榦焉吾聞弱河紫蘃實大如栗羣仙之所餌也慶元紅屖殷于甘蕉中禁之所移而植也故八柱之盛四色均備三種之次以丹為最今以十洲之英詘之作専城之長五都之伯進之領九列之㑹固宜爍丹砂于上林錫朱綖于在陛矣而乃黄帕之捧三鳯廻其顛黄麻之宣五花判其側布衮衣而藻火潛移埀繡裳而絺絲頓易欲祛黄霧則天半為之生霞將祀黄脽則山城為之標赤坤貞效土順毎以丹棗抒其誠兑氣兆金行尤藉朱絲表其直則夫嘉禾雖共頴徒羨多荂縱使麥穗能兩岐猶嫌一色西河集巻一百二十八
