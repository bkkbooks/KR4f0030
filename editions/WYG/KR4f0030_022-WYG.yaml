body:
  text: 西河集巻二十二翰林院檢討毛竒齡撰牘一寄劉勃安蔡子搆黄剡知諸子韓王孫一漂母耳猶千古慕之吾淮隂滿城皆進食處也昨去家園時潛行蘆中天星暁傾自謂惻愴已過然尚不若别離此地之慘則此地踰家園逺矣廬陵乍還不能復道淮他日天涯海角願聞蹤跡仝好皆知我情二與朱吏部名士作吏部惟公爲山公後一人惜近世無薦引事故念不及叔夜然叔夜本非可薦引者夙在山陽走不擇地然猶斤斤辨索食所由屢返幸舍苐穿井貴中渴過山陽者不僅毛甡而惟甡志感過秋浦者不止李白而惟白見德作吏部亦視此而已長安故人無恙聞碩人釋褐西樵舉北闈婁東大宗雲子俱訪友都下想時相見此悉係山陽舊游故并詢及諸嗣好是慰三與故人初意舟過若下可得就近一涉江水不謂蹉跎轉深今故園柳條又生矣江北春無梅雨差便旅眺苐日薰塵起幛目若霧且異地佳山水終以非故園不浹寢食譬如易水種魚難免圉困換土栽根枝葉轉顇况其中有他乎向隨王逺侯歸夏邑逺侯以宦跡從江南來甫涉淮揚躐濠亳視夏邑棗林榆隰女城茅屋定謂有過乃與其家人者夜飲中酒嘆曰吾遍游北南似無如吾土之美者嗟乎逺游者可知已四復汝寧金使君使君吾嚴中丞也舊稱杜子不得于中丞僕謂必無之鄉使有之要亦杜子中酒耳今知果無是也天下豈有真名人不委曲諒一窮歸者哉武孫來復受尊記傍徨如去家時開而摺摺而又開者無僕數使君于我厚矣向道養窮士如釋矢决則邇之釋則逺之今知不然譬如繳矢近則欲其可逺逺則欲其可近僕雖寡情豈能暫忘此一綫耶賢季開藩中州早知使君當引嫌昨聞潭屬仍寓貴治可稱田使君在郡似一家人苐不審何時赴都要當車下一把彗耳淮西二碑稿近始索得段稿亦欠善本讎對各多書一本用備討擇想當屬之後任者不具五寄丘學士避人淮市得與伯仲結獻紵之好雖星紀屢易口記心明未嘗忘也學士不歸館分監武昌比之東坡居士棲雪堂時特滔滔江漢將使逺勝蘄黄間則别駕之功耳貴門生史君擔簦造謁正西門官柳逺繫人思之際江東毛生非生長在淮者一言淮人士輒如故鄉宗黨父兄子弟之不可已順風相詢並無所事賢季并諸仝志悉道此意六復譚八開子壚頭别樂工偶爲不恬豈有所溺此猶衛洗馬渡江王伯輿登茅山不必不然耳而從者以作達見嘲豈知我者耶驪珠集附去苐一巻中好語若芳草如當屐齒生句最可念譚八新詞佳處亦正似此作達者當如是耳俟寄七與開子沈藕庵今之陽城吾慕其服官此君子也詩亦在滄渾上乃欲賜校名篇與盲人論色何可希謝之秋風又起江東步兵想同有歸心今尚如蝸蜒負廬行與住俱桃符一換定無在趙之毛生矣開子異姓兄弟爾來又日親不知他日何以分去預爲念之八答周廣文昨歸已著曙頗困廣文先生喜作達此是學問不任性處苐欲重過聽妓則不能古長安狹斜大抵詠少年游俠一輩以踽踽當此甚覺不合蠻人非不好食酪恐勉强咀唔終無定味况僕又抱中山之泣者耶昨妓中稍長善盼者是趙代佳人惜技未盡善然僕以爲只此一聽已是了了若再聽反􅉬足也廣文先生能如張禹自畜妓樂僕當效戴崇就觀不然吾南人學問有牖中窺日而已何如九答姜生兩年兩地思不能隔則不可隔矣切靡道理足慰逺旅但來牘不泛微及僕向時逃禪之説即有未敢承者儒佛水火明矣縱歉儒行亦豈有假途苾蒭倖邀捷得之理特愚以爲今之學者一意向外惟恐循習之久稍于本分不暇有顧子失母之病反不如荑稗之有秋此亦憤言如是耳不惟不敢立論要亦幾曽按騐作取路已經語他日總須務此今未敢謾也然乎否與此間理學推孫徴君張仲誠二人大河南北從若影附其所著亦甚與姚學脗合苐未見蕺山所著故徴君輯道一錄自先儒迨今有蕺山名氏而無其書能寄學言聖學宗要甚善率付無緒十回楊監郡暑雨入郡定謂與郡使君竿牘使云買書窮官客有閒錢耶文稿全近八家不棄蒭蕘已妄加㸃註豈謂過下猶辱𤣥晏人有羨毛嬙之貌者自謂能益其妍于是琢玫瓌之飾割文錦之帔濩脂薰木過市而人争豔之嬙乃歸謝而不知其貌使然也他日者里婦起而效爲之則却走矣尊文自佳而欲加僕文以行則里婦將竊笑矣願熟思而已十一寄蔡子莊去時見譚南村仿彿道從在許下後有人自滎陽來云在睢州使君坐上近又聞返陽翟究莫得定耗昨大敬書來欲因僕蹤跡并促南轅不可得也今促書又來矣家人四目盡懸北樹足下自揣所遭與僕全别遊遨有興興盡則返耳况所至不越河南北嵩汴箕潁足跡已厭又此地僕曽經過春風不出谷便塵土滿衣游子何樂而十年一息漂然作忘歸之矢此何見乎天涯兄弟各已老去鄉壤雖僻究爲魂魄樂思之地僕惟未得食蓴耳足下擔囊歸里何所不得仲御不專美于前矣北平趙君僕曽遇之張給事所其人質有文采聞與過容城講學甚善若韓君游俠僕未親睹足下喜暱頗雜有似道廣實則不然總之足下精醫學定當審候此時此疾不在逺志在當歸耳何如損鑒十二寄復上蔡張先生宻邇講堂尚不能一委摯若非絶物則其無志可知也向夏明府去時藉其便經寄所屬題楣不見再索定知已到但大中二序前所傳示私謂己抵精藴今尚有參本是何義理之無盡也僕素失學實不知此中節次何始何卒即近年稍知讀古本大學然尚以捉摩未定觸手胡突頃讀爲學次第一書知窮理力行之先原有立志存養二節江漢既導而後可以疏沱潛堂構既成而後可以闢門户宣聖之志立不惑曽參之貞積該通皆是義乎行路唯起程一節最難技學有頭緖便可精藝次苐既得聖學不墜矣向在施湖西講次有楚人楊恥庵者单言立志此是知止一節先儒已道過但繼之存養則是定後得静安耳就正無日若到得立志自當直造廡下以究指趨憑紙扶服十三回董子長在淮不通一札及遇敬止知早在都下裁欲寫問已著曙將别矣手記頃及宛如當面特怪伊鬱之情尚見行墨燕臺不乏購馬者且以陸生游公卿間宜聲名藉甚乃猶作趙壹哭泣何也意者丈夫磊塊不可宜于人必所至窮困乃爲豪耳新賦上儷漢魏下掩晉宋沈愽絶麗抑何妙也珠玉在前反屬糠粃皇甫士安文欲使相形見劣耶西山諸詩領到鄉人在長安者煩道近狀不莊十四與曹受可何景韓王干之諸子接教以爲丞既有㕔事耳暨覆劄來始知仍在賃所也無㕔事作㕔事記其愛夏公乃爾耶即此意足傳矣昨夏公瀕歸僕詢其得復㕔事狀彼覆云子不云賃事堂于邑居之民遊于邑而爲之賦詩乎此僕爲夏公詩序語也啓之爲作一笑夏公即此道意捉筆悵惘十五回陳子淮西官驛于風雪中送上征軺迄今匝嵗矣貽詩久未酬和他鄉寥落兼託食于人何暇更及辭句札示以作詩之法在性情不在聲律甚當但聲律何一非性情性情所至即有聲無詞尚能動物幾見吹蘆噏管中必一一作披肝瀝胆語耶此甚明著者近聞康臣别有論議此君于此道頗了知不致差别僕偶承明問因一及此勿舉示人耳詞一首奉懷意欲酬風雪滿征鞍之句幸勿少之十六復杜陵生聞有新安之遊金使來知又返兩水苐不暁今年企脚何所僕倘相尋當不出三江五湖外否前接大敬書知貧士蓽門已非所有故人一載不相見輒如丁令還遼陽所見俱别况忘年之旅耶僕在外無書閲借書又不便便亦不暇每遇作文輒倀倀移時便置去家中舊爲文燬無一首此事已矣足下盛誇僕文賦誘我耶抑亦爲他人道與或後有所試而譽之也僕文賦僅免制舉氣耳其于古人畛界滂洋無所窺西人截竹一節便誇得竹及過㑹稽見竹數百里蓬蓯䙰褷拂雲霞翳白日始知向所得祗一節也僕文不近是乎假使僕得息肩一所屏絶人事讀書一二年爾時得足下左右之或有可觀耳鄭世子樂書久無從覓彭詩亦未見嗣寄更悉所言十七復沈九祕書臨安西巷與陸弟對門居者浹月比見輒念令兄天上人爾時便擬作長安道詩及再遊淮蔡則神思惘惘幾欲半途過蘄黄遊方外去今又兩年矣頃尺一來開展躊躇且以足下所遇猶嘆遲暮有仕學兩淹語視僕何如耶垂盡之年銷于索食朝陽夜月過如雅飛其無所覬望明矣吾鄉夏仲御買藥入洛與洛中王公無布衣之好賈公閭倚太尉貴猶且就舡與語各欲挽留之而不可得今長安不乏故人宦遊名士且逺過公閭以僕應故人招亦未必不遂勝仲御然以仲御之名洛王公之重挽留之而終于必出則何如本不入之爲愈乎愛僕者念此可耳賜詩沈著迥過流輩苐難于擬和長句非律法惟䋲準之因白附悉不遂繁詞十八覆何戸部不見二十年故人天上榮問日増非不能尺素道故顧自視無好顔色徒見勉強不謂足下能念及也向在豫章逺蒙分俸尚未報謝數年之間益復流浪足下乃稱僕文有名并慶得子古來名必起都下故以相如之才尚屢赴長安而後名聞于天子僕褁足都城兼不好交近貴論文則名日銷落然使文不自振即長安僕僕亦安所用愍皇帝使使徵張西銘文能如相如乎此僕深自揣者至謂得子則子虚之甚益騐所傳皆訛也僕東西無著生子之人且不能得安從得子去年京兆書來傳足下誕馨此實有之從來福之隨人如浪之隨水層叠而至故曰吉人無单福以此反觀則僕更可知耳因覆不悉十九答南士以言感人其術猶淺况以言忤人耶田叔都讓兄辟召佯瘖雖恐灼勿變也後在田舍夜雨其友張子平者假賊踰垣持刃迫切猶然喑不出一語子平抱而泣以爲真也予初亦佯瘖忽老母呼之即應曰諾乃知喑不出一語亦大難也予生二十九年矣自三年不能言外能言者已二十六年吾言亦久矣家人憤吾言并毁及吾所爲文與詩而愛我者亦且同忌我者之必欲使予瘖廢而後已嗟乎謂予無術固甘也不知者乃謂予言妄足賈禍不如瘖廢則何與子平持刃者適相戾哉南士吾子平也辱詢及是以又言總之負負無可言者餘左二十復曽副使柬末駱崇仁猶崔秋浦者也向朱吏部宰山陽時視吾猶崇仁然要皆甡友耳若其他不乏晉接縂知甡者惟定陶魏文學兄弟湖東婦鄧老秀此間黄吉漠不識魏齊而遂能解相印偕去何以得此二十一示楊生復修趙尉稱胡法曹理學中人向就語但道得階級兩字耳學問如司馬君趨孟達説不得到忽得行到吾願生勿計程就步而已二十二答友是非本在人而謂人能是非夫身非鬼而欲瞷人室非蟲而欲蠱人之膈能乎足下行故無惡而僕又不喜臧否人物因亦不信人之有臧否且人不得而臧否之也足下自騐而已故有謂盗可設燭者害盜者也謂嫫母之不得就鑑此似愛而實非也何也形故不在鑑也謂迴目不見尻而凢言尻穢者之有所嫉則䁥其所穢也夫謂瞽者之可蔽以其色而青其藍朱其紫者必欺瞽者也謂人必欺瞽而并絶相瞽者之告以色瞽自欺也二十三寄揚州太守金使君揚州佳勝地得使君居上頭元龍永叔豈復有前徽也中春遣使過而阻于兵行今則日尋山鞠窮矣西陵道傍從戈甲中送乾公赴天寧因寫拾柿當憑君傳語之意其知之乾公今之惠勤與永叔相見自有投分他日天寧卓錫水即六一泉矣嗣君正夏爭勝三十四與張文檒頃惠我甚謝腿癰大事不可出門且需謹慎囑切囑切校正具見明敏我近昏憒而講堂諸人竟是寥寥吾道能傳者惟張子矣諸處已凑字命改再須仔細檢明再改若魯頌奚斯作我亦想起但不記出自何書註疏無有惟再示知容面不一三十五寄圭峯十重圖與張文檒我辨太極圖説祗以無極尊經爲道家一𣲖而未言本之禪宗此全藉推發之以暢其説是圖宜祕不可失西河集巻二十二
