body:
  text: 西河集卷六十八翰林院檢討毛竒齡撰碑記七萊陽姜忠肅祠堂碑記萊陽兩姜公既己建祠于虎丘其明年學者將推所自出立兩公之父忠肅公主于祠之誃房㑹商丘宋君開藩來吳元旦謁祠下謂祠隘誃祀不敬乃重為􅀈挶别構一祠于兩公祠右相望百餘步顔之曰忠肅公祠從學者請也先是兩公之祀中丞湯君實主之以為貞毅廷諍得罪戍宣州乃甫出都而國亡宣州亂未逮也不得已退居吳中而其弟貞文即又以黨人難發亡命于句章章安之間歸而謀其兄奉母來吳因之授生徒講學學者思之歿而祠其地宜也若忠肅者見危授命然故萊人也足不出城市生平未嘗來呉車轍不及于雞陂鶴市之間然且前朝䘏典既賜祠祀而乃復􅤀俎于此吾亦疑之間嘗緬想當日貞毅下詔獄濱死旦夕而忠肅以城亡不詘闔門殉難者二十餘人方是時臺省交章請釋貞毅歸奔喪而貞文上書乞以身代獄使兄得東歸一拾骸骨而朝廷未之許也其後貞毅以杖戍分無還理而貞文即復以故鄉難居奉母東西馳夫生死之際人所難堪况一門罹難以瘡瘐拳械之身箯捆就道而家之血肉漫漶漬草涂地者且不能歸一省視猶且國亡君喪不得效季生反命之哭埋骨戍所推其情豈不欲丘首哉自詔獄聞訃以迄于死豈不念父哉即貞文豈不欲偕兄歸哉不得已也夫不得己而不可以歸者或可以来不得己而不能以一見父者父或可以使之一見則夫崇祀于此夫亦曰神眀往来戃怳者將在是矣生相離死仍可相聚矣故曰忠肅之祀凡所以慰孝思也祠忠肅猶之祠兩公也且夫至德亦難繼矣人第知兩公大節皦皦在人而不知忠肅實有以啓之忠孝㢘節萃于一門非作之在前何以嬗後况忠烈之氣充塞天地下之為河嶽而上之為日與星凡有血氣皆得而瞻之事之夫忠肅豈萊之人哉祀于萊祀于呉雖祀于天下可也若夫學人之意則將以祀子淵者祀顔無繇祀貴推本夫豈無義哉祠三楹中祀忠肅而以其誃祀蘗庵和尚蘗庵和尚者前朝行人熊開元也行人與貞毅同入諫同戍而無子附于此曰貞烈之友也亦慰之也後有諫草樓則正貞毅所依憑者若傍有房曰思敬貞毅之仲子曰此吾齋居也過廟思敬記固有之且吾敢一日忘敬亭山哉敬亭山在宣州貞毅𦵏于此康熙二十四年祠成越三年貞毅之仲子疏所載事而屬奇齡為之記記曰公諱㵼里諡忠肅萊陽人以崇禎十六年王師破城死是年登萊巡撫曾化龍疏于朝贈光祿寺卿賜祭𦵏賜祠兩姜公者公之子一禮科給事中埰一行人垓也公尚有二子幼者従公死長者被創後亦死乃為詞曰維四嶽實封齊族世衍大于萊公之生以嶽基亦曰宿當張箕砥忠孝傳禮詩有經教無籯遺仲子㢘作諫司碎首血塗龍墀以為戇將死之弟大行觸􅉬􅚣名己列奸黨碑天地裂梁棟頽公秉節值數奇城既破樊不支口􅀈銜胸刃剚家耆死二十餘為鬼雄真人師司諫戍宣州治搶厚土扳長離徒招魂將焉歸嗟有弟奉母馳同授學東武陲身𦵏戍魂祀斯推所自為公祠以教孝并立義瞻仰間深人思陳修肴薦眀粢風此世垂後來重建碧山禪院并剏置食田碑記姚城西北陬有㸃碧山修崷碧色望之如㸃因名㸃碧相傳晉龍驤武士逐孫恩至此㸃兵山下因以名山碧之為兵俗傳之訛也予族居姚者綿亘十里而散其㸑火于諸村之間合名之曰十里毛村㸃碧其一也曩時族人有託蹟釋氏改號石愚造庵于山間名碧山庵以為村人祝福㳺憩之地而址偏宇隘道廩不給時興時圮泉州慈勝師曽以募縁従平陽來族叔經一大功等共十二人迎師山間為修復計而師力承之越三年拓地恢宇繚垣結閣為堂為房為厨為坎且為鏤佛而止客建幢設鼔一切具足舊有食田八畝自耕自穫今續置四十畝而贏雖栴檀化主不可暫忘然師力亦瘁矣儒者闢佛謂不蓋而處不耕而食不力而娯游以嬉師自誅茅辟土以及塼埴釫鏝而外皆任其手足胼趼胝拆即致所助田甽亦必水火銍刈以自為作息然且發願利濟將以食夫逺方之至止者而村人士女並得以嵗時伏臘相羊焉以遊于其地其以視夫漫居而苟食以自安于娯嬉者何似已因為記記曰一㸃微碧百丈精藍彌天可致量地自安師主化導旋開泜洹獅音可誦鳥稼以餐慙予焚魚未歸碧山緬想屹崹宛然躋攀黄雲數頃青螺一彎髙風克繼千秋難刋重修得勝壩天妃宫碑記古以得勝厭北字京之門京師北門名得勝門北關之壩皆是也特京門迤北直抵塞垣故舟車絶少而此則臨安以北通潞以南水陸並發然且水倍于陸相傳眀洪武間祠水神于壩以為官艚估舶禱賽之所意甚善也乃未㡬而稍圮矣成化辛丑鎮守浙江司設監太監張君實始捐貲恢拓髙其殿欐而擴其垣廡使當日之奉觴獻豆灌薦拮挶者坦然可効駿奔于其側然猶䫉神立嘏按簿勒石令列朝鎮巡以下凡仕其地皆得補苴焉以傳于勿替而後且陵夷而莫之顧也夫捍患之祀急于祀功今天下河防為甾耗内府金錢不减疇昔至官軺往来若册封贈弔通使溟漲者日蹴波蹈坎出入澒洞以濵于不測此非神保不為功况商船峨峨其為越三江而跨九河未有量也曩時經理之費仰之在官故順而易就今大吏小僚率皆躬勵㢘潔朝不謀夕而踴躍好事曽無多金如中官者以為之領袖則苟且補苴非合并羣力曷其有濟因具疏設募各為小效使微塵秒末積為銖兩是修是葺以稍還故觀不可謂非衆擎之有埤也若夫神名天妃舊傳秦時李丞相斯于登封之頃出玉女于岱山之巔至今祀之所稱神州老姆是也特以地祗主陰故妃之而以所司河海為職土之雄逮宋元祐中俗稱莆田女子契𤣥典而為水神此則後人所附㑹者康熙甲子同官汪君曾為册立使封琉球中山馳波傾檣㡬于不免乃禱天妃再而舟竟以渡其神如此因于其饗祀而續為之歌歌曰翠羽帔兮雞翹駕靈虬兮渡洪潮青山作幛兮碧烟為旓神之來兮雲旗飄吹簫兮擊鼓南塘風來兮北湖雨眀粢在豆兮殽在俎靈巫酌酒兮醉代神語舳艫兮相催官艚既濟兮商船後來沙蟲逺避兮黿鼉迴負檣銜檝兮鳴鉦以隨浪不使漰湱兮風不使喧與豗鴉不噪兮人不甾神降嘏兮福孔偕修復平山堂記平山堂踞維揚之勝岡巒竹木蔭映四野相傳六一守揚時公事之暇率賓朋讌集歌詠其内是以逡巡數世皆歴歴可紀而其後不能繼也夫天下興廢多矣考之六一去揚其距建堂時相去未逺然當婺川劉公來而六一送之其繾綣故蹟屈指年嵗戀戀于所為庭前手植而叮嚀浩嘆一若彈指之頃早有古今盛衰之感生乎其間暨東坡再來三過平山乃復徘徊憑弔託諸夢寐猶後此者也蓋物盛則衰隨事興而廢踵理所固然而第當循環逓至則湮廢己久將必有人焉為之興復而方其極盛亦遂有起而持其後者乃堂介浮屠左右蔽虧始未嘗不相為倚恃而其後堂既毁而浮屠獨存然且故址昭然遲久未復予嘗過其地而悲之今太守金君自汝南來遷重守是邦計之有宋慶厯間相去甚逺且治揚甫匝嵗即復遷江南副使倉卒引去又其時適當六師張皇禁旅四出之際揚之疲于奔命往來芻秣者日不暇給乃登臨感慨毅然修復于所謂平山堂者是豈僅為是游觀地哉蓋亦有感于前人之所為而興而廢廢而復興汲汲以成之惟恐後也予鄉蘭亭自永和修禊傳之迄今數千年間廢日多而興日少當君守汝時汝無名蹟然猶考淮西舊碑勒段韓兩文于碑之陰陽而覆之以亭蓋古今賢哲風流相映非偶然者第堂成命酒賓朋歌詠己非一日而予以訪舊之餘續游其地不朞月間一若賓主去留後先頓異者昔人所為登斯堂而重有感也堂以某年某月成越一年乃始飲于堂而屬予為記葛山石幢勒石記清化廣利僧買葛氏之山與田而𦵏親其中復畫其賸地盡捐之為僧俗義壠而以甃以甓道其坎而覆以石名為石幢考之儒者之惡佛動謂佛氏無父母不可訓間嘗窺佛藏怪目犍連以慈室之長穿地求母而經載四恩其所矢報者首惟父母其次第在傳法師長與國王施主之上是佛未嘗遺父母以為教也今僧以暴親之故買山負土以躬承凶事虆梩掩蓋凡期年而𦵏以成可不謂孝焉乃掩骼埋胾王政攸重儒者以古王不作往往置義壠為補救之術而僧復自親親而推之以及于衆捐其地以瘞夫無主之骸之委于道者此利濟之心倘亦親親及物之意與佛氏以比丘為乞士乞慧養性乞食養身一身之内無所不乞而今以石幢工煩益復乞錢以成之則是孝于親澤于衆復不憚以身之所乞者兼為人乞而欲以髙語孝弟空言博濟之徒利人之所乞而以為奪不得也地在天樂鄉四十二都所謂葛氏山者連山碪與田共若干畝值共若干兩康熙年月僧交值𦵏母自母墓外皆義壠僧名德揚字宗標廣利寺住持也後凡繼此者視此石通𤣥觀崔府君祠禱嗣記丁禮部以六十七嵗舉一子其前一年亦既舉子矣而未育也泣曰吾己六十六年矣今而後能再舉哉夜夢轝轎行由巷而門拾級登覿神于中庭而列炬焉詢之曰崔府君祠也拜且起見槃舉一兒置神案間私念此兒儻抱與誰則受之頃之有盛服而拜于下者小妻也喜而醒以問左右左右曰有之此間崔家巷有崔府君祠當是也及至巷不是入其門不是登其庭不是見庭所䫉神俱不是再拜而出居無何以他事至通𤣥觀觀傍有神祠則崔府君也自入巷至觀目甫接而心記之而由觀而門而庭而神則歴歴皆昔所見者即案舉一槃尚坐一兒于槃間遂禱之而歸而婦有身及彌月而生一兒所謂六十七嵗舉一子是也乃予甫歸沐亦六十六年矣其前一年生一女而育之年老難再舉禮部曰崔府君神可禱也因告以夢且曰府君以壬子日禱之當應雖然宜有以酬之予曰吾將為文記此事以代酬可乎曰可因禱之而彌月而亦舉一子恍神授者予思古祈子詞原有釋老降生宣尼抱送之説顧三代所祀動稱髙禖予不知髙禖為何如神而嗣此或祠子母唐皇甫觀察祠九子魔母為生一男是也或祠神嫗齊張敬兒拜三公為妾祈子于新林廟嫗是也母與嫗職孕則祠之宜府君何如神而所司在是按府君諱珏彭城人唐磁州刺史也少曽舉孝㢘為淇縣令能捍水灾以生有異政死而為神相傳安史之滅神實祐之故在唐世己早有䕶國威靈之封祠之河濱暨宋髙南遷禱宿祠下而神助以馬俗所稱泥馬渡康王者是也故宋祠府君一建顯應神觀在西湖傍一建白馬廟于呉山之麓以為白馬顯應當兩祠之名勝之地以答之杭之有府君祠實自此始若夫崔府君巷則展轉分祠雖至以巷名而非其舊也然而禱嗣何也考通𤣥觀志府君之父諱讓者五十無子禱嗣于北嶽夢上帝賜之雙玉因名府君珏而字以子玉實隋開皇三年六月六日事也神以是日生暨南渡祠此則髙宗張后夢府君饋羊而孝宗以丁未年生因以府君為列朝祈子之神累封䕶國顯應昭恵王逮元嗣統復封齊聖廣佑王敕遍祠天下視之五嶽暨眀代錢唐少宰李旻亦五十無子禱于府君夢賜之棊因生子名棊乃厚德府君而别祠之今通𤣥之祠是也祠近白馬廟而觀地髙敞可饗神少宰李君白之杭太守滁州孫君太守孫君又白之參政蔡君乃于嘉靖壬子構祠三楹于觀之東偏而大鴻臚錢唐張君亦以禱嗣故親刻神像而供于其中然則禱嗣而應固神所従来而禮部所云禱以壬子則以壬子所構祠而不于他祠于通𤣥者則又以通𤣥之祠為禱嗣設故在此不在彼也然則府君之有神豈獨禮部矣自宋眀迄今凡禱祀者無不應康熙庚午五月日記重修卧龍山越望亭記越望亭在龍山之岑相傳前守湯君曽于眀嘉靖間修復此亭因名越望歴八十餘年暨崇禎之末海風􅂒然遂發砫而檼以傾迄于今又三十年矣山陽何公于守越之眀年登山四觀隱見瓴甓于叢棘間遂従井儀右拾級而上得識亭故址重思修復而郡值多事四隣之露鶻而震境者日再三告且山澤逋雈苻飢萌思因緣伏莽方陰為解散而民力未固恐興作滋擾擾逡巡又久兵之往来而鴟義者敉之民之無告者慰之乃割俸經始子來之衆不事鼛鼔合工而程材遽仍舊貫築基于垣間而補其齧榰柱牙角累重櫩而翼之亭成乃集僚屬飲之酒酒半言曰而亦知夫修亭之意乎昔越臣范伯以生聚教訓撫國都而建樓窺呉顔曰飛翼彼固有所用耳然而漢唐以後元眀以前其為因革亦既非一而時毁時復彼豈真飾游娯恣眺聴哉夫仰觀雲物俯察土方意固有之而非其實也間嘗于聴事之暇一登其亭慨然興居髙臨下之思焉況山川風物終古猶在而官居若寄欲以一時之跡可以紹往昔而待來茲此昔者羊公所由登峴山而泫然悲乎且吾聞種山居中其上應南斗而下臨井垣凡閶闔之廣闤闠之賾皆一攬可盡今試逺觀四郊近視五達其或臺城宫室烟火相接鷄狗鳴吠並徹于逺邇則熙熙攘攘望之色喜而苟其愁嘆之聲聞于上顛連之色見于下則憑欄惄然百端咸生是亦有官者之所當為考鑒者也若夫亭之為名以代更易昔有稱飛翼為望海者矣唐時觀察率賦詩是亭皆名望海而入宋而更名五桂則或以植桂得名而其既亭廢而桂亦亡于是有建樓而仍稱飛翼者矣嘉定之汪綱是也有建亭而仍稱望海者矣嘉祐之刁約是也前守興廢經歴凡㡬而後乃越望以傳蓋是亭為一郡所望而守是邦者即于焉望越是毋論望之而或得或失如前所云而即以湯君觀之彼治行相傳其有造于越為何如者而登其亭而思其名是亦景行之一端也衆曰善請書之石是為記嚴禁開燔郡南諸山碑記古建邦立社必審察地道以為經營卜食之本如宅洛者瞻伊闕都渭者料太乙況吾越為計倪范蠡所相度者其陰陽向背必重為可信眀矣相傳郡治為勾踐建國之所其地祖鵞鼻宗朱華乃由陳伽嶺穿茅陽殷假諸山而蜿蜒盤澓分條舒幹踵為斯治其間羽飛介伏迴翔偃䕶有似真龍故以卧龍名其山載之誌書凡府㕔縣署城隍祠廟以逮薦紳之第宅士民之居廬實憑且賴以故越中宦蹟邦賢較勝他郡非無故也眀季崇禎間居民無厲者開鑿陳伽嶺山燔其石而燼収之以灰以堊民多灾傷郡守王君與推官陳君立為禁絶復恐山籍奸民耆利再鑿隨将籍之蘭字自十二號始至二十六止凡若干號捐帑估贖追由在官以杜姦慝其先事豫防可謂密矣至國朝初年舊禁稍弛徒以修葺禹廟之故偶假開燔而一時道府㕔縣相繼解綬土冦之延蔓而伏莽者頓起剽殺村市為虛其徴咎之不爽如此乃奸民乗機發鑿于前而土豪之射利者遂大開于後燎原不揃㡬至燬室按本朝申禁一在順治十一年爾時盜偶開鑿而當事發覺遽行敕止一在康熙十年爾時以公作所需致薦紳士民同起請命不數月間旋已報罷今則盤踞焅烈不由公作夫竊據官山為己利盜也椎埋剽攻發蓋藏毁道隧大憝也今以大盜為大憝而其所為民賊者又非止一家一室之為禍乃猶相視施施不加嚴剔夫鈹木之榦而欲延其英刳人之項背而欲其負府藏以生無是理也況盜官擅利比之鑄山其為官刑方大耶文學某等以其事白之邑邑白之府府白之道使君道使君命勒石永禁垂乆逺且以告後之守此土者石凡二一植府治一植盛塘之上埠邑令髙君郡太守何君道使許君皆有名氏勒禁末張水部雷琴記琴者樂器之一也特琴德甚尊其器不盡列于樂官故自三絃至九絃大樂雖備而師延拊一絃之琴京房製十三絃琴以定七均則但藏内府而考擊之數不及焉幼時謁眀代諸王于杭州見潞王北徙出莊烈皇帝所賜琴付北使去其衣琴爛然有若雷錦潞王泣指曰是雷琴故宫人以雷文刺衣而惜當時之未及啓視之也水部張君得琴燕市中其上暉下準齦頟長短悉中古法池有宣和印嘗疑為汴京故物及膠敗木豁姑蘇琴工為析其肌理而窺其中則鏤款于臟曰大唐雷氏製而其下即附以宣和養正之記然後知水部所得實唐時雷琴而宣和之印則収藏家所為款也夫神物顯晦亦各有數顧非其人勿歸水部古情則古器歸之風雲之従蟉抑又何怪獨是雷氏為琴時覔琴材于蜀山松雪之中經營心苦而後斲之以成器而傳之宣和五六百年間其中什襲珍重不知何等乃或存或殁迄于今又五六百年一為天子之所不能私諸王之所不能保者而一為水部有之此其遇合豈細故與古以琴倚歌如絃鞉然虞書所謂搏拊琴瑟以詠是也雖學士操縵不用唱嘆然皆自為歌如舜歌南風仲尼歌龜山猗蘭皆無若近代尊師端坐揮手但以有聲無字為絶調者水部雷琴詩已遍人間浸假取其詩而播之琴一人長歌一人揮絃並如絃鞉之倚曲而有聲有詞彼此相應則斯琴有神焉知不能發古音如堂上器者則雖謂雷氏琴即樂官琴亦可也琴者樂器也西河集巻六十八
