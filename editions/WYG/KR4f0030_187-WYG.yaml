body:
  text: 西河集巻一百八十七翰林院檢討毛竒齡撰五言格詩三有感為雲錦詩并序曩者傅長虞謂素絲有杼寒女難工郭泰機以寒女衣絲未經秉杼兩皆失言夫機絲經緯寒女之能事𤣥黄黼黻貴工之授裁寧有素絲皎皎當户無機秉杼未工衣裳燦燦惟夫秦川好女日對流黄河畔諸姑時支彩石亦既煥文章于黼裳啓經綸于筐軸而七襄不尚于敝綈六繪不加于敗枲雖王肅有妻蠶絲可續而石崇之婢澁布難縫越葛徒勞不施蓬首魏尺雖美未量寒體是以每睹記夫當機輙有傷于雲錦煌煌雲錦叚本自貧女織貧女不為衣札札空費力文采煥經緯裁割被珪璧豈知機上人抱杼每唧唧丹絲與素絲各自理容餙織錦得被素誰為理刀尺蒼天絢雲霞當牕散餘色流炤貧女衣一顧三嘆息江橘何纍纍江橘何纍纍葉妍貫亦嘉遙林布冬榮葳㽔遍江涯南金冶成色東珠綴為葩青時已結綠丹者還流砂宛如層隂中參差㸃輕霞我食南中橘數載曾無家自慚徒作頌不能復懷沙區區飛蓬姿何由間修麻逝將抱長耒種橘藏金華便與王鄗遊勿羡子母𤓰重經上江過小孤山望高良作晨颸解流潮朝暾坼遐沚中流辨孤嶼相越尚百里流峭去榜逆颿廹來洲駛忽泊斗巖下遂至洪澤裏三江憺前期九𣲖殊昔理矚異物不延時遷景為徙滌水掬流清搴花摘葉委羇孤汎無常流浪詎有已寧當越前峰去逐高良子寄祝淮隂蔡母徐太孺人初度淮隂有賢母教子如子輿朝探玉笥訓暮讀金檢書結交滿人間曲巷多停車況當草元成家有問字廬我嘗客淮隂拜母戀階除雙髩映霜雪兩頰開芙蕖俯首聆教言一似訓子愚今逢設帨辰逺隔天一隅殷勤寄霞觴彷彿同追趨丹山九苞鳯噦噦能將雛坐待羽翮豐文彩横五都送姜京兆之任奉天朔風吹長旟旦日耀嚴裝君子奉明詔叱馭遼水陽嘉績著圻甸賢聲比張王念茲根本地曾見蛟龍翔因假兩省貴爰展三輔光高江蔽鴨綠大府開熊黄隆冬播𢎞澤能令草不僵私惜離子舍何以慰高堂忽當廸新恩子弟皆騰驤時其弟與孫皆舉于鄉獨予託末契願服前車箱一攬山海勝再觀邊塞長苐恐冒霧露以此留傍徨郵亭張飲餞予亦持清觴臨岐無所贈聊獻胏與腸賔雁倚南日翽鳯鳴東岡相期䇿榮名還視湖海傍總憲徐公以掌院兼史舘監修奉贈一十四韻古稱中執法但畏上殿爭自公入南司郡國皆澄清率屬謹鎻鑰以實不以名峩峩總六察見事真風生從來陳正志能感聖主情何況彈新參動使羣寮驚朝陽有翔鳯忼愾時一鳴君子秉至徳緘嘿豈所營特念蘭臺官舊本通承明以故東觀書仍得藉鑑衡太微當嚮曜所麗惟四星秋高肅禁令不止象火熒主憲得正士視履歸章程誰言唐子方僅在著直聲奉贈許使君夫子兵巡閩中往者吾夫子秉鉞開秦稽正値朱買臣闢地東甌時戈船出漢浦下瀨通金崹雈苻並竊發守者誰與治夫子擐甲胄白晝曾登陴羣盜跪投㦸涕泗垂頰頥今茲簡節度方重東南陲誰敢輕綏要而撤蕃與維乃以烏坂北六羽標幢旂仍屬㑹稽郡同在天一涯自昔惠愛及願借相因依何幸歲星被照曜無兩岐小子徼鶚薦比之漢孔禰況望南鐔州劍氣長追隨分班侍九陛親見賜襲衣苐恨出國門未得持鞭箠此行藉保障端賴張以弛莫謂海波平前路猶瘡痍錄别詩上海縣作修景返北陸日馭揚赫曦游子思故鄉嘆息將東歸伊昔來滬瀆春花滿前墀主人出美酒式飲歌庻幾出入並車轂言笑同嚘咿啣鹿饗苹草得食還相遺朱明變新候丹蕋舒故枝縶駒有時解結心何能移況君乆仕宦閲世經嶮􅇖慷慨已投分從容且隨時古人輕三過言救溺與飢顧予亦何為茫茫向天涯越人盟車笠旦旦申素詞今茲念崇情信誓安可違薫風吹廣術中道惜解擕願言愛景光千載以為期康熙二十九年越郡大水䝉郡使君李公盡力疎救稍得安堵贈之以詩於越本澤國春夏水􅐓洞洪流擬懷山濩氣且啣棟先是坎未發大禹早見夢謂有洚水至晨起決坊壅三江廿四閘一闢二十洞使君先數日夢神禹告大水至因預啓三江閘以待之浹日風濤生蛟龍偃衢衖公乃披髮救仰天大號慟云此實予辜豈應罹民恫疏堰斷魚笱掘地展龍峒所幸急胼胝猶得厪播種苗山有神經大者載禹貢使君肯随刋千秋仰鴻絧北征秋風生前塗白雲興山阿車徒既況瘁我行勞如何夙昔戒于役行行遍江河東觀越甌蠻西顧接岷嶓煌煌舊京洛褁足不敢過何期奉明詔良馬紕素紽縣吏趨里門徵車敢蹉跎朝發長淮流暮宿清濟渦廣畎化黄熊野寺名青駝常恐冒霜露無以答諴和所期遘明良尚與賡載歌奉召赴都經泰嶽遙望有作朝日汜暘谷孤光動天門鴻濛啓青蒼仰見喬嶽尊鬱若顥氣接下與浮雲騫羣峰爭嵯峨拱列同星垣我欲凌絶巘俯視周大寰奮迅鮮羽翼屼峍難攀援從來聖神出升陟柴以燔五玉覲國后三觀窺河源今適遘王㑹將䇿明堂文下詔召博士因之及公孫自笑圭蓽士敢為封禪言神功發眺聽博議開渾元但當入林丘揮手長松間二夙昔愛天孫層霄踊雙足俯仰志不遂高卧滄海曲結念周八荒扶輿乆脱輻垂老始被徵一憇梁父麓崇嵓倚重雲白日繫匡谷欲吸沆􅀈漿顑頞慚滿腹我有雞斯乘躡嶠如駕陸入林招洪崖望海誚徐福折取東峰枝間與夸父逐歴嶮理自明升逺象以矚何為盻修塗展轉愧寥廓贈駱崇仁四首馮生令丘陲安仁宰河濵灉沮非横流聊以涵永鱗君子挺珪璧既授文府珍發跡方西游改服亦南隣廣路縱攬轡遵邁以上春上春子行邁徂暑予出宿孤羇遘𤨏尾竄身渡淮服嘗恐秋節厲揚飈及蕭燭囘躬就南離遐憇臨汝曲臨汝渺遐憇將訪彈琴闈春草碧如沚愁心復懷歸重來訊芳躅修組揚清暉譬彼秋晨日新炤光襲衣豈無周周羽中道慰予飢寧隨鴛鸞翔不與燕雀飛飛飛隨鴛鸞燕雀難為羣與子辭同林三載垂離分子為守官亟予為履險殷崇庳兩相接益以慚譽聞寒啇振長薄廻飈蕩高雲庻幾惠秋蘭聊與揚令芬太末見山花發春而林無宿葉秋栟未解葉春櫻已舒蕚不疑碧樹中􅑈見山楧落南中饒榮陽百物鮮疎索何為逐流飈吹吹怨寒籜别蔡大敬五首朱陽當末垂遘患避人侣慘慘中夜别惻惻不得語高柯靜吟颸星墮亦如雨行將出蘆洲與子且延佇延佇不得去行子辭故鄉明星在天端晨夕互相望我今辭子去不知從何方飄蓬追驚風風發蓬益揚飄蓬隨風揚飛飛㑹有極江流去湯湯赴海自止息伊予獨何辜坎􅇄乆失職號呼仰蒼天天宇為傾仄傾仄天影動黯黯夜將旦躊躇别子去方寸已凌亂蘆洲積涼露棲棲有雙雁哀鳴至天明一雁獨離散離散在何所渺渺行難尋生死不可知遺此經寸心南遊漲水濶北渡湘江深倘遇洪崖子惠我蘋藻音雨雪曲雨雪凍關城戰士乆從行邊風開甲滲沙日耀戈明銜冰和糗糒燒火熨旗旌不須吹木葉萬里作寒聲和春寒曲楊春汎初景庭卉謝薄寒如何越三變尚自愁風湍灑澤易沾洽逾灌翻殫殘暫窺已亡緒改序誰能安深林閉楚雀當牅披臯蘭風過雲不停雨止空還溥自聆索居苦復嘅行路難依人喜遐附換服憂中單一聽春寒謠三復增長嘆壽方母七十樅陽有名閥奕葉嬗忠孝所藉母聖善恒凛冰蘗操當其遘陽九夫子秉高蹈申包泣秦庭元節走海嶠惟母三朂之不啻棄畚蓧況聞覆巢警闔室薦荼蓼蒼天共夷齊並受滂母教少小友哲嗣託契序長少恨未拜堂下俯仰作視傚今來簒前史開舘奉明詔逝將表孤忠因之傳有道維母年七十壽考徳彌劭三漿釀庭除七誡著梱奥他時簡汗青千古仰徳曜一觴寄南雲海鶴舞嶛峭送姜二承烈舉京闈未第南歸相如薄園令少且以貲仕姜生游長安嘗挾監郡刺歴世嬗仕宦惟恐失貤賜以此往借資少慰尊顯思時方就試預以資例援監郡貤贈一朝薦京國挂籍註名字有子先解褐同詠鏁㕔事其子同試春官有名連年滯東觀藉爾通講肆頓思還故園使我䘮倚恃成都昇仙門歸馬如赤駟為郎莫嫌遲晩歲得世濟武騎豈所安孝子終不匱里巷非常居筆札有餘視春明望還來酌酒待小次此日不再得擬舘課作此日不再得反景淪空桑扶輿復東馳漸辨顥與蒼晨氣稍解散奄忽見末光誰謂歲寒子稽煖非愆陽善道固多術力學亦有方當其送元㝠惟恐迎勾芒須臾日月逝進退兩不臧生苟好自衒物以材見戕況復嗜膚理覆粒徒䑛糖所以古賢哲幽谷能深藏疾視澗水下靜聽蘭草芳南金匪為堅西鏐豈云剛鋭進倘速退中途反囘徨明去光必滿源逺流自長請觀大道行坦坦如康莊尼父造闕黨孟子收匡章小草能自挺荑稗總在塲因之起黽勉兩目如望羊譬諸斷乳兒戀戀何能忘頑者必以振懦者亦以强任彼江漢流可以一葦杭時俗厭菽粟不復耽尋常方寸偶出入難騐得與亡先儒賦此詩惻惻多心傷謂此一念間所辨在聖狂禱祀詞為李使君作太祝掌六祈祠官重七戒禳禜與疈辜所事在罔害君子謹至治灾恤當儆㣻匪為敇壇壝祇以念畎澮齋宿徒自責散致鮮遺􅢚精誠一何深祝告豈能代邇者當旱澇徒歩凛禱賽神明果來通相覿在夢寐徂徠篇為兩浙中丞作使相夾樞省曾坐文昌臺中年仗旄鉞遂歴三重階赤手搘半壁顥氣横九垓因之八寳幢頻向東南開早歲嬗駿譽清論超王裴席㡌脱門下賜宴排江隈昻藏騁天衢迴若龍與騋集賢借仙職冊府需英才海山舊屏下陡坐鼇背􅏠聖朝重治術天牧驅黎斄暫寄赤棘遙重使丹纛廻虎績著方嶽詰禁留戎陔有時秉芻輓持節洱海隈比之韋若劉轉餫踰江淮旋令闢甌越下瀨同風雷開疆逼扶桑溟渤生黄埃論功方刑牲宛與帶礪偕何期移高牙兩浙儼具賅名都本煩劇草木皆炱㶼幸藉一天沆浹此萬户孩丈夫砥勲伐所貴居陮隗出握九牧組入植三公櫰譬彼乗鳯鸞羽翮争􅂒毸治進虞共夏徳並伊與虺老成推壽耉其背尚未鮐不見千尋松蚴螭生徂徠青黄并追琢鬱作樑欐材方其湛雨露偃葢通雉䍙誰知廊廟間千載同巍巍贈俞文起七十結髪與君游乃在桃源村青陽感初節意氣如朝暾説劍事薛燭吹笛隨劉琨一朝㑹百六幡然歸丘園君同抱璞隱日抄金匱言而我亦何為賣餅投齊門壯年俱已逝綠髪生華根老鴉松頂落乳燕枝頭翻今年乘離月値君考齒尊田豫讓官日充國征羗年諺云七十稀君如日就暄況當丹竈熱服食能飛鶱我持一罇酒汎之以蘭蓀願君保令儀千載同歸元康熙二十八年皇上東巡㑹稽躬禱禹穴臣竒齡迎駕于五雲門外紀之以詩皇情軫民依南狩省方俗豈曰展豫遊將以逹衆欲無如江淮間洚水濫渠瀆馮修恣潭􅘍安得奠四隩聖人曾下視七州啓哀告一時抱殷憂兩面動黴墨于焉導胡蘇不止楗園竹疏鑿三載餘創痛已漸復所嗟未成功重煩駕轣轆仰惟前王賢神禹治海谷鴟尾示逺啣應龍兆先畫隨刋遍諸方輯瑞㑹羣牧抑鴻下沉菑灑地澹􅘝瀑其事隔混茫千載嗣芳躅親禋苗山宫躬禱石帆麓神獸方獻珍金匱將啟櫝不憚鞭虹梁豈為駕海屋何幸茲一方竟得先五服聖皇每巡幸宛轉念民瘼不須登塗山爰載石紐録四嫂八十少小侍兄讀事嫂如事母沐髪溉膏瀋膠齒釋粔籹迄今四十年滄桑變寒暑依然屬小郎坐語相爾汝予老入禁近日暮􅁼主父幸嫂尚强健鬂墨齒未腐兄嘗勤國事有志不得吐所恃子若孫聨翮並鵲舉王者貴夀考子姓酌酒醹況當傳一經奕世能嗣武清秋有治蘠道逺難寄與但翦青荷衣暫作堦下舞湖西施使君行部臨江予獨留吉安守歲獻春過行署告别遂取使君原贈韻率和二首放溜出山峽乘春下江畿晴雲盪洄波江草日以萋伊予念行役三䙫未能歸所藉覯明牧蓬稗相與依歲徂滯枉渚悵若信誓違獻發將東還言别䄡彤幃生年寡知音調苦和益稀過此一揮手涕泗沾裳衣二曰予阻遐薄冰雪嘗苦寒豈不惕搖落感此知已難捐糜解食缺裂帛酬衣單相去三百里恍與同樂歡陽飈發長塗昕日明前灘逝將謝此去歸泊遥天端君為山上松方春積榮觀予視路傍草出地猶殫殘前期逐流梗㑹合隨波瀾願因林間棲寄此雙羽翰古意二首贈友作好鳥翔何方衣帶胡離離一鳴經崑崙再鳴登咸池舍景絜芳淑濯濯揚令儀紛飈起前塗𦕈在天一涯高騫絶廣逺結志還卑棲顧瞻挾鶵侣戢翮兩不遺東園有高岡上有青桐枝與之攬徳輝千載無窮期二南山有一木素枝綏摩挱云是千歲松倒生施女蘿輪囷復􅛡砢望望風節多歲寒薄冰雪偃蹇不改柯初視播五粒再視揚九衢三視鬱層壑枝枝散三花借此枝上隂可以蔽逺遐蔡石舟生日少小屏鉛槧與君事琴書避地東蜀間溷跡樵與漁中間苦奔走相隔天一隅三秋鮮良訊四海皆友于聞君訪名山所至淹柴車有時就記室託志偕阮瑜于今四十年方歸南山廬朱軒棄勿顧華髮看漸虚行行遍天涯剩此狂者軀性僻捐晩食興至圖春株故交㪚已盡舊巷行復紆惟有王覇妻相將守門閭世事等蕉鹿物化同溟魚幾見抱白璧而羡金與珠況曾友浮丘間道隨方儲天地亦云寛不廢居且諸漫言去日多歲月誠安舒喬松在高岡霜雪總不渝西河集巻一百八十七
