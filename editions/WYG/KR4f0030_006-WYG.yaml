body:
  text: 西河集巻六翰林院檢討毛奇齡撰議一歴代樂章配音樂議康熙二十年十一月十三日翰林院掌院問查歴代樂章之配音樂者臚列成議本月十三日承令查歴代樂章配音樂者詳覈舊文謂樂章之見樂録者斷以已議某譾陋不能指析就裏且私宅竝無蔵書難藉考覈但據臆見所及臚次成說以報明問竊謂歴代樂章無不可配音樂者其樂章分部全昉乎詩而其所配之法則舜典詳言之若其歴代因革是非得失則歴代史書樂志自能備載他書冗雜皆非所據也大抵樂章分門祗有風雅頌三部而以重輕為先後則其一曰頌其二曰雅其三曰風如樂部有郊社明堂太廟小廟諸室及雩祀先農先蠶朝日夕月太嵗百神諸祀其樂歌宜準乎頌葢思文為郊祀配稷之樂我將為明堂配文之樂清廟維天為太廟樂載芟良耜為社樂髙山載見昊天執競為分祀諸室之樂閟宫為小廟樂清廟維清為歌詞桓勺般賚為舞曲門部秩然西漢至武帝始定郊祀廟祀樂歌如祠太乙于甘泉為祭天祭后土于汾隂為祭地而其樂章則司馬相如軰所為乃其詞全不頌天地祖宗功徳祗以齋房赤雁諸瑞應詩實之惟廟樂名安世樂詞有體要然其名安世樂即房中之樂在詩為風在漢後樂府為三調相和歌詞諸樂専以此祠廟已為不倫而後漢眀帝即又改名郊廟之樂為大予樂夫大予之名則何所據且反以雅頌樂名為辟雝饗射之用則風頌倒置門部紊矣魏初令王粲作樂章原屬未備嗣後則得杜䕫所傳古樂四篇一鹿鳴二騶虞三伐檀四文王遂倣鹿鳴作於赫篇以祀武帝倣騶虞作巍巍篇以祀文帝倣文王作洋洋篇以祀明帝則全以雅聲作廟祀樂矣宋鄭樵曰清廟祀文王執競祀武王皆是頌聲今魏家三廟全用風雅可乎其曰風者以騶虞伐檀雖雅聲實風詩也晉初權用魏樂比之周室之稱殷禮止更定樂章而宫懸如故第其樂章則較漢魏為整備有夕牲迎送神饗神降神諸歌而六朝因之宋加登歌及頌太祖配位之樂並五方帝樂齊又改為肅咸引牲嘉薦昭夏嘉胙昭逺休成及諸祖宣烈配饗凡薦豆呈毛升壇還殿諸歌又較整備但周頌升歌祗歌清廟徹祗歌雍祗歌二詩漢初此意猶存故迎神曰嘉至皇帝入曰永至皆有聲無詩此後歌愈繁樂愈襍其去古愈逺若梁代樂章則武帝自為之將南北郊眀堂及太廟三朝樂歌盡改名雅如皇雅諴雅類則頌聲盡亡且即以雅詩為天地太廟君臣人鬼通用則失之尤失矣北齊北周大禘圜丘五郊諸祀皆用周禮九夏之說多以夏名隋亦因之不知諸夏本雅詩用之朝㑹宴饗國語所稱金奏肆夏天子所以饗元侯也且其詩已亡全不是頌後儒誤以思文執競時邁三詩妄實之耳至唐則概改曰和有豫和順和諸十二名宋則概改曰安有髙安静安諸十二名而歐陽修修唐書樂志誤以宋時十二安次第與唐相準亦以豫和為祀天順和為祀地永和為享廟肅和為登歌以次分用而唐時所傳樂章自中宗以後凡昊天五郊二丘太廟社稷先農先蠶祈穀雩祀朝日夕月蜡百神昭徳皇后廟隠太子廟九宫貴神諸樂歌皆雜列豫和肅和雍和舒和諸詩每祀皆有其名但不全用耳且尚有福和昇和歆和延和同和寧和諸名在十二和之外與樂志不合而宋十二安以祭天為髙安祭地為静安祭廟為理安天地宗廟登歌為嘉安云云而景祐中又改定其名増誠安儀安等十四名後又増淑安柔安諸名為皇后禮儀而英宗光宗諸朝又代有牴牾如正安曲為太子王公出入而有時用之為郊壇亞獻乾安曲為帝升降而有時用之為夀王上夀至建炎初則盥洗升壇進舞望燎皆奏正安八壝升降還位盥洗皆奏乾安全無定凖明則參酌乎和安之間郊廟用和朝饗用安多不過九曲皆太祖親製之雖成祖世宗亦多更定然皆用詩詞與朝饗雜用金元曲子稍别至今太常亦尚有沿襲其文者此則頌詩一部為歴代郊廟樂章之所隸彰彰如也至于元旦大㑹冬至初嵗小㑹饗射賔客及上尊上夀食舉與黄門鼔吹軍中短簫鐃歌諸樂章則𨽻之雅如鹿鳴燕享瞻洛朝㑹四牡遣使天保上尊出車奏凱車攻大閱斯干作室湛露元旦大㑹彤弓重臣専征其門部本自備具故魏初食舉奏杜䕫所傳鹿鳴四篇大和中左延年祗傳一篇以為元㑹之奏所謂東廂雅樂而晉後各造樂章名為四廂樂歌梁更為三朝雅樂歌則皆名雅惟唐初朝㑹元日冬至慶賀皆奏破陣樂慶善樂悉有歌詞而其歌者則每雜先代清商巴渝入破排遍水鼓子婆羅門諸曲髙宗時有清樂有燕樂開元後有散樂于是分雅俗二部皆非古音至宋則列朝朝㑹及御樓回仗上尊冊寶諸樂章皆短歌唯六變一曲稍曼然猶五字長古詩也逮元明而全用曲子凡朝㑹萬夀侑食諸樂雖亦有聖安治安等曲然别有曲名如水龍吟新水令沽美酒千秋嵗類其詞㝡俚初尚有本曲音節至後則音節亦失較之唐之俗部猶下之矣若横吹鐃歌則本屬二樂而合用之雖舊云有簫笳者為鼔吹為朝㑹燕饗乗輿鹵簿之用有鼓角者為鐃歌為祠兵振旅飲至凱旋之用然其說未確漢作鐃歌一十八曲魏後則各取其調以誦羙功徳列代皆然使用之鹵簿與軍中馬上則鐃吹有之從未有歌其詞者是雖有誦美而亦安所見故眀王景擬朝㑹樂章亦倣鐃歌為嘉禾進黄河清諸詞是鐃歌亦朝㑹燕享之樂宜與四廂樂歌三朝雅樂同列觀唐樂亦有清商巴渝諸樂皆有歌有吹可騐也若横吹則軍中鹵簿本皆通用然與朝㑹燕享反無涉漢和帝時有隴頭黄鵠諸詩梁有企渝瑯琊王鉅鹿公主慕容捉搦諸詞多用北調故唐時軍中樂承北魏北歌名真人歌皆馬上之聲取其雄悍其樂章名有曰慕容可汗吐谷渾部落稽鉅鹿公主白凈王太子企渝類多本六朝而詞不甚傳若宋時則合黄門軍中而全以詩餘調為之有導引六州十二時三名凡車駕出入朝饗冊寶及命將出師皆用之元明則全用曲子亦謂之鐃吹曲然皆𨽻雅部至于風部則即周之所謂縵樂散樂者漢魏後有相和歌詞吟嘆曲四絃曲平調清調瑟調楚調大曲清商曲詞江南樂上雲樂諸樂章而唐名清樂有法曲道曲商調天寶樂曲新曲如凉州伊州甘州類皆用五七絶句而宋時清樂則概以詩餘雜體為樂章所稱大晟樂府是已明則教坊承應如鼓子詞雜劇爨弄凡宫中所奏皆是特前代清樂亦多奏殿庭後魏孝文取清商樂為燕饗之用而隋文亦更造樂器審定律吕名清商署唐時如勤政花萼諸游幸李龜年以新聲雜進而宋時賞花釣魚亦每以新詞被樂皆可見也此則樂章之大凡也至若樂章配音樂則舜典詳言之如曰詩言志歌永言者則但作詩而吟詠之以成歌是也曰聲依永則遂以歌而被之五聲或為宫或為商皆得以聲依之而于是曰律和聲則合十二律以和其聲或合黄鐘之宫或合夷則之商而于是曰八音克諧夫然後以金石絲竹八部樂器倚而成曲則以樂章配音樂者一在審聲一在定律一在制器所謂審聲者何也凡有字必有聲如宫聲宫字吟在喉間便為宫音此字審聲也至通句吟之倘徴羽字多則宫字之轉須入輕清以從徴羽此為句之審聲而合觀其詞或為宫用或為商用倘為商用則又將酌之重輕清濁之間而使宫不函胡羽不狄殺而歸于商調則又為曲之審聲此即樂記所謂聲相應故生變變成方謂之音者葢調雖一定而曲有轉圜所謂以有定之調押不定之音是也定調之法詳竟山樂録乃宋儒謂協律祗以首尾定調如闗雎闗字是無射調字則結尾亦用無射調聲收之葛覃葛字是黄鐘調字則結尾亦用黄鐘調聲收之七月流火七字是清聲調字則結尾亦用清聲調聲收之信然則起調用字收調用聲既已不倫且起調之字亦多有不得通處如庾信創周樂章為五聲調曲其宫調曲以氣離清濁割一句起則氣字非宫音而魏徴虞世南為唐造五郊樂章首章名黄帝宫音其肅和章首句曰𦕈𦕈方輿則𦕈字亦非宫音全然不合况唐詩中如甘州羽調伊州商調嘆疆塲宫調之類其首字皆不如所言葢起調與收調皆當審聲如甘州羽調則起調之聲當以羽始而結尾亦以羽聲收之但論首調不論首字庶為得之且協調有不止首字者如樂苑有思歸樂本商調曲也而次首犯角如意娘本角調曲也而誤入商調若祗論首字則安有全首誤犯之事乎且詩之配樂不同有先詞而後聲者如唐李賀作申胡子􅓋篥歌賀但作詩初不自知入何調使朔客吹之謂合善平弄劉禹錫造竹枝詞亦祗作詩按其音中黄鐘之羽是也有先聲而後詞者如魏杜䕫播鹿鳴騶虞四詩先有調法遂作於赫巍巍四詩以代之漢鐃歌朱鷺上陵一十八曲原有樂錄然後魏更以楚之平戰滎陽等晉更以靈之祥宣受命等是也有調同而歌異者如呉聲西曲同是清商調詞而呉聲為呉音其歌緩而清西曲為楚音其歌狄而急是也有歌同而調異者如宋鼓吹曲同用導引六州十二時三曲名而大饗所合為黄鐘宫山陵所合為正三調神駕還宫所合為大石調是也有歌調同而詞曲不同者如横吹梅花落有五字有襍言而江總為七古散樂清調平調有單章有複解而李白清平調為七絶是也有曲調詞俱同而樂部不同者如七月一章時為豳風時為豳雅明君詞一首時為閒絃昭君時為上舞昭君是也有一句而數歌一章而數歌者如清廟一唱三嘆則一句而歌四句唐詩入破三疊則一章而歌三章是也有曲調之中有倚歌曲調之外有送聲和聲者如孟珠青陽度為倚曲採蓮每句送舉棹與年少二字歡聞歌每章送以歡聞否三字襄陽蹋銅蹄和云襄陽夜來樂神功七徳舞和云秦王破陣樂是也有無詞之樂而不歌有有字之樂而仍不歌者如宋儒謂笙詩無詞六朝東西廂作樂皆有先後襍弄而無樂歌宋導引曲給之鹵簿則不歌明鐃角引聲俱有曲詞然未嘗歌是也其配樂變化不可一例而要之以文成曲以曲成調以調成樂全在五聲五聲不備不能協律故自周迄今調有時闕而聲終不闕如周禮祭祀祗用宫角徴羽四調而無商調然商聲自在也隋唐以後定二十四調但有宫商角羽四調而無徴調然徴聲如故也其無商調則以周王木徳惡商金之尅其無徴調則以徴屬夏火忌陽火之洩而要其聲則歌曲所及無時不周故司馬君實謂近代無徴音并無角音而朱子非之謂無徴角調非無徴角音也若謂隋時無宫聲以其無君明末無角聲以其無民則皆屬附㑹不稽之談雖見之史書而倍徴其妄天下有五聲闕一而可以成調者乎且亦何能闕其一也若夫審聲在定律舊以十二管定五聲之轉五聲配干十二律配支既有定位復為旋宫國語所謂立均出度者而郊祀廟祀大饗朝㑹則各以其宜施之如天神用圜鐘地祗用函鐘類漢時李延年略論律吕為八音之調而張華荀朂軰多所論列然當時所傳四廂樂歌祗用黄鐘太簇姑洗蕤賔四律而不及其他至隋唐宋元則用簫管定律去其不能協調者于六十調中減為四十八調又減為二十四調而二十四調之中又并其髙宫與中管者而減為七調此即國語七宫之說而今時用之然則今時之去古樂未嘗逺也自儒者不察妄論律吕必謂古時宫調與今不同不知五帝殊時不相㳂樂唐虞金石原不可考于今日况定律在聲既得其聲則金石雖變其聲則一如必拘于古而妄議今樂之失則唐時分雅樂俗樂番樂三部初未嘗不貴雅而賤俗及其後番樂㝡難習俗樂次之雅樂㝡易遂以番部伎為坐伎俗部伎為立伎樂工肄業者坐伎不通然後發為立伎立伎不精則使習雅樂此豈賤古樂而貴輓近哉誠以雅音失傳雖有絃鼗行綴肄習其間徒應故事而不必有所用心故也故定律之法自司馬班固京房以後歴代儒臣皆有論說而皆不可行如律管長短班馬不同上生下生諸家各異杜䕫紫玉不能鑄鐘荀勗張華終昧管􅕛隋萬寶常善講尺度而律法不著宋范鎮房庶單辨黍粒而施用全乖至魏漢津竟欲量徽宗中指以定黄鐘則可笑孰甚昔人云智者造律明者聽律愚者算律自宋元至今儒者論樂動輒算律全不曉以律作度量而反欲以度量作律辨秬黍考管􅕛準尺寸定絲毫著書盈尺而皆無一可禆實用故驟繙其書而算數滿篇毫糸秒忽觸目皆是者其書必不通夫黄鐘與宫聲圜取皆應雖有定音亦屬大槩原未有膠固泥執强立一聲以為此黄鐘者夫樂以人聲為主假如歌者矢聲既從喉出契音收韻亦復重緩不可謂非黄鐘之宫而被之鐘石與一定黄鐘稍有參間則將硬守一定任其參間乎抑將圜轉取應變調而從其聲乎此甚明之理也况同截一管長徑厚薄皆已齊一而聲多不齊同冶一鐘銅齊觔兩皆相準一而聲必不一妄云黄鐘之絃其絲八十一黄鐘之鐘其銅十二觔究之蠶繭燥濕硝炭强弱勢必不等况繇此而太簇之絃太簇之鐘以遞相準求其次第圜轉一如其算此必不得之數而欲以此定律此豎儒之所以見笑于神瞽也葢定律有三一用金石一用絃索一用簫管杜䕫以金石定律京房以絃索定律荀朂以簫管定律而予謂金石必不可定律者夫樂之有五聲七均十二律也非謂一曲可用一聲一調可用一律也一曲之中而五聲相逐七均相轉十二律相周始可成調若用金石則金止一聲石止一聲百叩不能變亦何以知此為黄鐘此為太簇此為姑洗蕤賔哉故六朝得周景王無射鐘樂官以無射笛飲之不相中反中夷則又西廂鐘有古夷則鐘以夷則笛飲之不中反中南吕是二鐘與笛皆下二調求其故而不得謂是宋泰始中使張永鑿去銅多故其調嘽下夫鑿去銅多則其聲當益輕清乃猶下二調則不知未鑿銅時其調之相去何許而反云去銅而嘽下以文其不合之故此大謬也故杜䕫鑄鐘在晉已不能用而宋時李照楊傑専攻鐘律乃先儒謂李照為景祐造鐘太常歌工病其太濁歌不成聲私賂冶官暗減其銅齊使聲稍清然後略叶歌音而照卒不知楊傑為元豐造鐘欲廢王朴舊鐘樂工不平一夕私易其鐘去而傑亦不知然則金石之不足憑如此故胡瑗阮逸改造鐘磬處士徐復笑曰聖人寓器以聲不先求其聲而更其器其可用乎乃說者謂以絃定律當勝于金京房造七均琴彷國語立均出度之說其琴用十三絃第一絃乃全律之黄鐘也以後十二絃則由黄鐘起至應鐘每律為一絃欲取其聲則分刌其絃而柱以榰之如瑟然當時即以此為定律之法且五聲七音皆見于絃從來論律不及七音故隋時製樂即牛𢎞何妥蘇䕫軰自稱淹博尚驚疑其說與鄭譯爭辨即鄭譯初間亦不曉七音且考之樂府鐘石律吕皆無變宫變徴名色故七聲之内三聲乖應及得龜兹人蘇祗婆彈胡琵琶者其人從突厥皇后來入中國聽其所奏一均之中間有七聲問之曰西域習傳調有七種以其七調較之七聲㝠若合符于是以七音之說而更立七均均立一調遂為七調合之十二律每律有七遂為八十四調其調至今用之則是諸調之作皆從絃始可知也特五絃之琴必加二絃始成二變既不能使七音一氣環轉且絲有强弱時有寒煖氣有燥濕一絃之張早晩各異正聲變聲隨時取準即欲取準亦必藉管笛之吹以定之故京氏七均琴本準黄鐘而范􅈌云絃有緩急并有清濁欲定黄鐘非管莫準則是定黄鐘者仍藉乎管又何如直用管而不用絃之為愈也葢定律之始在管黄帝使伶倫伐竹斷竹兩節之間以為黄鐘之宫而虞舜作韶以簫定律謂之簫韶故八音之器各有變製而管獨不變今之管即古之管也其小變者曰笛即古之篪也其兼乎竹者曰笙即古之笙也朱晦菴謂管律以中聲為定但講周尺與羊頭山黍雖應準則然不得中聲終不是也大抵聲太髙則噍殺太低則盎緩以此求中庶㡬得之而蔡元定謂欲求聲氣之中莫若多截竹筩以擬黄鐘之管更迭以吹則中聲可得此為直截之法故黄鐘九寸原屬後儒臆說不必即與古先王樂律相合必不得已而用其法則截十二管而以黄鐘之管定十二律之中聲旋即以每管之體中定每管之中聲中聲既得則取十二管通之其黄鐘管以中聲為宫者即以中聲上一字為大吕之宫與大吕管之中聲相合則即黄鐘一管中已具有七管之宫圜轉相應而其他五管則從此加進不必全用大抵人聲有限其至髙至下至清至濁無有加于七管之外者葢樂止七宫宫止七調調止七管如國語伶州鳩對樂但稱七宫而隋後八十四調止用七調此自然之數非有所矯揉而後然也至于制器則統以八音虞書戛擊鳴球篇已略盡之如云戛擊鳴球搏拊琴瑟以詠者球為石琴瑟為絲此堂上二部器也下管鼗鼓合止柷敔笙鏞以間者管為竹鼗鼓為革柷為木敔為土笙為匏鏞為金此堂下六部器也如是而位置亦見矣漢後屢為増益八部秩然如方響水盞不越金石筝筑笳篥仍是絲竹􅩁簧土嘂無非匏土雞婁板拍依然革木况後人所製反有絶勝前人者雖宫懸與登歌鼓吹諸器皆有象數位置凡簴案多寡東西次第歴代爭論紛紜不決然亦但約略大槩不必穿鑿如郊祀廟祀則皆有古制可考不甚相逺惟雜樂則各自増減如晉後四廂金石用之大樂而清商三調則雜弄㡬行樂器㡬種歌絃㡬部送絃㡬部皆歴歴可記即明代承應攛掇亦明載笛㡬板㡬戲竹㡬韸子㡬杖鼔㡬且宫懸㡬面鐘磬㡬簴或左或右皆有一定然亦稍作按騐略為部署而其事畢矣是何也則以所重不在此也宋樂志云論樂者不論聲而論器今太常雅樂器具在也試入觀之其鐘磬塤篪之形羽籥十戚之制何嘗不古而聽者不知為何聲作者不知為何樂寧不知今世所傳之器之適用而昧者必謂古為雅而今為俗雅者當尊而俗者當擯則試思大輅起于椎輪龍艘生于落葉其變使然也古者以俎豆食後世易之以桮盂古者簟席為安後世更之以榻桉雖使聖人復生不能舍桮盂榻桉而復爼豆簟席之舊也且孔子曰放鄭聲亦唯其聲可放故放之若論其器則鄭器猶周器也亦安有舍周製而别為溱洧之鐘簴也哉故以今器而奏古聲即為古樂以古器而奏今聲即為今樂師延播鼗鼓未是那詩泰始拊泗濵原非大夏苟欲用管則但多取今管而審其聲之協律吕者即欲用鐘亦第多鑄今鐘而擇其聲之協管笛者而由是而推之絲匏土革隨器審音亦隨音相器而樂庶㡬矣所云以樂章配音樂者亦大槩盡此矣至若樂章有舞曲則舞時所歌也其在舞前與舞後者謂之階步其在當舞時者謂之舞歌故漢有武徳舞歌詞六朝配廟皆有樂舞歌詞北齊有武徳昭烈文徳宣政文正光大諸舞周有山雲舞皆有詩唐奏武文二舞有七徳九功上元而宋眀二舞有元徳升聞天下大定表正萬邦車書㑹同諸舞皆有詩然皆倣武樂六成為之特舞曲則郊廟大饗三朝可并用與樂詞不同其他雜舞若鐸舞鞞舞皆所執器如籥翟之類而皆有詩如巾舞以衣拂舞以袖鏇舞以鏇杯槃舞以杯槃戴竿舉榻舞以戴竿舉榻今樂府有鞞舞歌詞巾舞歌詞杯槃舞歌詞及蓮花鏇舞歌戴竿舞歌諸詩皆可騐也但其所舞亦皆有定數雖庭陳百戲然亦非漫列者今天下大定功成樂作考訂鐘律正在此時第太常舊部未經諳習凡一切篇什增損簴植沿革宜因宜改不敢妄論祗就明問所及樂章之配音樂者而竊議如右謹議西河集巻六
