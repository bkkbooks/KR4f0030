body:
  text: 西河集巻一百五十七翰林院檢討毛奇齡撰七言古詩三上已與故人他鄉既度清明節客裏重逄上已天當此暮春將盡日不知歸國是何年可憐修褉蘭亭侶正値流觴洛水邉洛城游騎行春晩曲洧晴沙盪日曛客子採蘭紆紫珮女兒贈藥洗紅裙途中製得甄神曲讀與陳王不忍聞㑹川吟君不見㑹川􅣇􅣇東南行千艘萬艫輓漕粟朝光未動鉦鼔鳴滎澤既已堙沇河不可量通塞寜有分浩嘆㑹川上㑹川樓觀雉堞高前臨闤闠穿長壕平欄斜抱濟上橋欄邉紫蔕花千朶橋上青絲栁萬條千條萬朶花共栁狂客樓頭舉桮酒紛紛車馬爭水流疊疊芻糧過丘阜樓中有女貎似花長裙八幅裁朝霞持桮善唱採蓮弄能使江南客心動大官駕舸􅀈球樓捲珠箔巾車并明駝幪紗映雙目鳴鉦伐鼓上都去滿目川光起烟霧更有東西估客豪鈿篋金箱不知數娥娥紅粉最可憐朝朝暮暮娼樓邉酒酣襍坐理瑶瑟斜陽散落紅簾前令我舉首心茫然君不見東㑹川夜飲倪之煌一草亭放歌并示劉二漢中王二宏昌十日九過草亭坐一日不過思殺我檐前况復梅花開啾啾鳥雀啄蘂來蠟盤燒燭閉柴闥駙馬巷南街鼔發㕔罏着火淹酒紅菜瀝菘羮下匙滑蕭蕭風起短袂寒醉歌一曲那呵灘屏前積水見星墮暗中孤雁號雲間罇浮琥珀燭光度起看梅花繞涼露東邸賔筵恍舊時南鄰主第今何處相過莫使相見稀劉生斗酒能忘機只憐王子清江去三過草亭人未歸登天門山望江晨登天門巓俯瞰大江渚江渚浩浩環石根細激嵓花散成雨嵓花灼爍當水闗秋棠石隙青苔斑盤旋曲磴越叢莽峭壁直下波濤間峨嵋山亭倚博望與此東西屹相向世人相視稱天門我來已㩀天門上天門嶻􅑖朝日開峨嵋窈窕烟霏迴小鬟十五共追陟前凌縹緲超塵埃青天萬里瀉空濶欲上天門躡天闕慿將峰頂看浮雲不向波間捉明月横江江舘千古愁􅮶磯牛渚思悠悠振衣獨上天門望惟見長江不斷流白雲樓歌有叙游飲禹州州署楊花飛飛望白雲樓為嘆興白雲樓高接天雕甍玉柱相鈎連上看挾飛鳥漠漠翔雲烟下看垂溜懸飛泉慿欄欲數城外山卧聽潁水流潺潺郡王夙昔居其間啓禎之際藩府稠郡王十七留禹州當時各請建飛樓敕地命名巨細分博聞為最次白雲白雲者誰懷慶君仙人樓居饗王孫嶒峵金碧日月昏鈞天之樂歌管翻青娥紫袖抱瑟彈逈若細雨吹雲間聽者若寐欲寤難天陰晝晦歡宴促蕩蕩城門烏啄肉一從流寇亂中州萬瓦千楹總陵谷白雲樓今尚存下有斷坦上有軒土中金絲盌井邉玉絲琖一絲直萬錢萬絲十千貫摧碎棄井邉土澁石錢滿闢樓植瓦作州署重鑿青天入雲住山頭日出揚曙光風裏楊花落飛絮使君拾揚花飲我樓外亭通池引曲溜激激樓前鳴持觴一望樓頭絮幾欲登樓百感生贈隴西羅生金城河北飛黄雲隴西豪士天下聞結交意氣重然諾令人不數平原君白臚赤鬣騁寒磧却到徐方作賔客許汜難同下邳樓羅侯舊有東川宅凉風吹劒水一行南遊莫宿陽平娼四維原是雷塘侣只問塘西十八娘飲廣陵舊城酒壚同胡五舍人張十四判官醉後作黄花開盡朔風起買酒揚州舊城裏沿城數里有狹斜十五當壚對梧子溝頭水淺不照衣開元才子旗亭稀江南雁歸不識路日暮且來江北飛㩦條兒宿謝墩書感謝郎東墅春融融春鳩日啼高栁中小蠻朝粧裹花葉開箱自揀春衫紅烏衣桁南綠波繞簫鼔盈船度春曉不惜聽歌都䕶哀但道彈箏貴官好過江遊客遊且吟草堂無復留山陰小蠻空上江南路欲賦江南傷客心結交行贈卞生利南結交亦已遍那知有若卞利南洛陽劉生騎黄驔當此匿影不敢前毛甡居都亭鬱鬱抱足眠東鄰有阿侯十二學得彈箜篌酒徒載酒挾雙枕將買箜篌誘我飲先期桑下逢金夫踟蹰那得石氏珠卞生利南未識面驟雨衝泥似銀箭白騾氊葢油裲襠奪却黄金擲珠串爾時在座酒未巡忽㩦鴉髩來如神毛甡素矯蹇詎敢當此情酒徒相顧喜且驚毛甡辭讓不得成平明相約訪卞生乃在南城之南曲巷裏前對市門後臨水水亭深深出水㡳水波浮動嘗有風四顧乃在菰茭中横欄複閣水面通閣中紅袖千芙蓉生平與少年相逢白鼻騧不意厯此都乃過卞生家君家最易知易知復難忘但唱結襪子莫歌團扇郎結襪當結君團扇徒自傷自傷仍欲渡江去謝爾要予種桃樹白魚總駕蓮藕船且醉城南狹斜路重集閻園醉宿賦贈劉昌言進士暨始大始恢二令君去年來此園荷根出水枯葉寒今年來此園雨餘又見荷珠團此園乆别亦可念况復園中主人面春風送我入洛陽上已清明不相見新禽啼遍蝴蝶飛畵梁乳燕捎紅泥蒲葵滿徑草花落執手慰勞還歔欷坐我桃竹茵飲我木瓜酒西亭懸葛巾東厨滌粱籔石枰分踞恣酬酢樹裏斜陽散幽壑暝霧初開華燭明留我溪南最高閣閣􅃉翳月光燭明照深樹我念主人情流連不能去流連高閣月樹涼捲簾欲倒黄金牀主人本是金閨客將赴長安曉馳驛有子承明獻賦還同向天衢展飛翮我念主人不能去主人好我且還住空園寂静漙露華落月幽清滿江路園花開盡當復開江南歸客猶能來夜深相對情無已更盡亭前酒一杯灌湖聞笛灌湖西路風蕭蕭湖心晩來生晩潮孤舟回泊漣下橋横橋枯柳垂長條忽聞橋畔笛聲發逺趂風吹乍幽越入耳疑聽塞上鴻回頭不見闗山月我今將上黄鶴樓烟波渺渺思悠悠樊山再啓謝生宴蘋溪重汎洪崖舟此時一聽桓伊笛能起千年江漢愁秋風來辭寓居吳陵後遷九龍岡作二首秋風來兮吹客衣芙蓉閣邉秋蝶飛我行呉陵不得歸故園八月荷花稀荷花有紅又有綺可憐不作游子衣秋風吹吹墮流水秋風來兮吹客裳九龍岡邉桂樹香我行海陽過江陽廣陵八月秋濤揚秋濤雨來漲官閣可憐不得還故鄉日上西陵看潮落宴秦郵逢故人將歸膠西廟前見新燕秦郵亭邉折野桃相逢故人解黄綬可憐細草抽青袍盂城幾曲假行幔甓社一湖横小舠北來寓客有王謝南皮佳賦推劉曹高舘尚縈紅叱撥美人正抱紫檀槽飲酣促坐倚酒樹氣合欲行遺寳刀白晝翳雲翻碧落春風吹水漲紅濤仲宣避地登樓好枚叔為郎去郡高今朝聽歌不盡醉明日看花空自豪江行感懐石帆山下秋風起燕子低飛渡江水越客乗舟趂上潮倒泝江陵幾千里龍江闗徼下水遲可憐五馬浮汀涯江南王氣總銷歇山前幕府空逶迤我將浮江拾蘭葉西上峨嵋看飛雪夜汎長江無限情獨坐江波望秋月艶曲呉姬二十粧正濃横江甲第葡萄宫鬟垂倭墮鬒雲黒天開曼臉新花紅屏前屏後不相見欲顧還憐掩團扇翠黛遥分雨後山湘裙低捲風中練金張家世五侯宅大者侍中小執㦸門左鴛鴦飛未連坐中桃李看成碧陽春麗日照階戺曲幕重簾兩相啓錦瑟斜牽寳篆明銀牀背樹銅盤紫夜來明月海底珠江魚尺素天邉書五都宻意投宋玉茂陵多病懷相如沉沉夜漏發魚鑰先遣雙成恣驩謔赤鳳青鸞婉孌殊女師太傅然疑作烏啼著曙火䗶黄風吹雨霽愁山陽喟音宛轉屢哀歎歡情失據還高唐瑶袿綵服九華帳不是人間是天上漢女燒珠减怨思曹王撫枕増惆悵扶桑有木西有枝雙鶼到死猶相思竹竿嫋嫋溝頭㑹挾得錢刀當對誰集宋中即席贈梁園諸子夏城西望春雲輕大䝉小䝉花欲生晩來飛雪灑寒兎誰著梁園舊時賦茅堂風細酒復香江東才子還遊梁故園賔客乆寂寞魏生雖老猶康彊東過太丘里曾訪練公子公子亦逺遊空看鄼橋水我今將上商丘驛一宿侯生著書宅四憶堂前吟未成無數松楸繞南陌當年侯氏嬗耆舊更羡忠貞練司寇中原遺跡總草萊况復微文落人後菁花被地􅐘葉開座中猶是梁園才茫茫一望傷心處只有梁王舊雪臺投寓長橋蘭若聽竺蘭上人彈琴我行太湖傍不見太湖水長橋蜿蜿如斷虹横卧青茅白茅裏天風騷騷吹客衣我行不住增心悲湖邉蘭若種蓮葉中有竺師作蓮説香氣吹開一片雲涼隂堆作千年雪飄颻擕我入深處湖口相逢宛如素笑彼漁郎花底來憐予窮士蘆中去秋庭日落當夜陰竺師為我彈鳴琴青天澹澹湖水深秋蹌初作元鶴舞􅀈􅀈再起蒼龍吟我聞黄華子秋風生古道客子時一聽日夕傷懷抱又聞走馬引躑躅荒山曲草根纒其魂蒺藜傷其足豈如竺師之琴悠以閒上有千仭之高山下有萬里之波瀾客子聽之心連連竺師為我記其然須知我意千重逺只在君彈一掉間桂樹謡為劉進士謙吉尊人雙壽射陽湖畔清淮隂團團桂樹環深林大枝駢榦翔緑禽小枝千蕋千黄金大枝小枝高雲深高雲熠熠滿庭户前列層城後𤣥圃葛葉裁裙拜木公桃花靧面隨王母木公垂老髪未皤西來王母能高歌嵗星掩映動瑶闕􅄔光燦爛縈青螺雙雙相對驩如何君不見劉伶臺下有劉子七十高堂共甘㫖舞袖新披宫錦袍稱觴况挹仙厨醴人生有子貴如此君不見劉家桂樹漢代栽淮南千載猶花開集淮陰舊城醉中送白門任金吾北行鳳凰臺上金吾子醉藉寒風卧淮市列㦸曾扶春殿前幽居近在秋花裏蕭蕭蘆葦徹夜鳴悲歌一上韓王城黄河倒浪赤鯨動青天曵日孤鴻驚茲方卑濕不可住欲看燕臺築金去短帢還羈一飯亭長帆竟掛三洲路我同衆客解佩刀㩦罇共餞青龍橋花宫百八總寂靜呉姬十五猶妖嬈我欲勸君酒漫歌折楊柳楊柳垂細條霜花著人手霜花撲簌淚滿裾相思常寄加餐書竹竿籊籊任公子莫向長安只釣魚春日同史使君遊潁上過張良洞作鈞州官署曉日紅披衣騎馬遊城東環溪斜度石橋濶春風吹入幽嵓中嵓前有花下有水巢父由來此洗耳當日張良未報韓側身學道長居此玲瓏破壁啟雙洞旁有訾仙抱醯甕洞閉長留碧海雲嵓傾不下丹山鳳使君慷慨起開鑿重見幽棲舊丘壑二月良辰天氣新士女同來種紅藥我慚巢父對水流使君立志需封留鳥啼花發水漠漠山空日静春悠悠流連襍出酹酒醑將共使君返州府女伎能為楚漢吟且向嵓前再歌舞洛州寒食二首洛州城東李花白遊子他鄉遇寒食晴絲百丈􅇢馬蹄留滯嵩陽歸不得道傍欲折楊栁枝手把長條三歎息洛州寒食栁葉明春衣駠馬城東行遥天風息鳥啼緩薫人日暖蟲飛輕女兒欲上鞦韆板愁殺江南孤客情於黄申光禄宅豪飲楚州多賢名首推光禄君譬如鶚在霄矯矯離人羣我來楚州甫三日便向甘城訪遺逸叔度能傳外史書潁川曾進通侯秩罇中酒滿座不空酪漿傾出桃花紅金砧緩切鹿頭鯉銀匙細攪熊蹯菘酒酣有佳客清歌理蟋蟀呼彼座下人吹笙鼔瑶瑟吹笙鼔瑟揚素歌盤中㵼酒如懸河大官庖廚乆無餗我愛樽前舊光禄河隍司馬吟贈王司馬河隍司馬金閨客家住蘭州大河側入塞驚聞竹箭聲沿門盡漾桃花色東流近海瀉入淮鹽溝鐡樹難疏排龍隨九畫驗神術魚山屢塞眞竒材臨淮千里慶平土誰識陽平舊明府濩澤帆檣任徃來江都父老還歌舞夫君係屬本右軍嘗書白練羊欣裙力持鐡帚埽輕霧高懸銀榜如浮雲生平文酒過五絶况復肝腸對冰雪廣武城頭發浩歌金城闗外驅寒驖我尋舊友淮水濵慕君高誼高嶙峋枚臯有里皆佳客劉安滿座盡仙人曉衙初啟幕烏煖淮海相逢在秋晩嵗宴難聽越客吟晨炊又値王孫飯秋風瓠子天馬來從君一上劉伶臺大河積石從天下河水東流亦壯哉楊童子歌有序楊進士才瑰童兒九歳文諷俊妙玉膚色持觴隨楊君後相驚神也坐語新叶燦燦妙理書媻面長句與之思少時亦自見頭角今就暮落故鄉故人子李焜李曜長大蹉跎無復識知近狀見童兒不覺生有羡意未請字曰楊童子楊家童子方九齡錦襠朱㡌垂銀鈴清神皦皦濯寒玊眸子瞭若秋雲澄當軒傴僂出拜客騏驥銜花鳳梳翮滿堂一顧嗟嘆生出席驚看墮雙舄逡巡行酒有神矩屬對吟聨盡好語胸中了悟懸鏡光言下相通似桴鼔坐來咽項當酒巵欄邉羣嫗思攜持羊欣未長衛玠小何物生此寜馨兒我聞關西楊伯起學術能明號夫子數世皆生倜儻人皆與楊童妙堪比又聞揚雄誦綿竹有子童烏出塵俗楊童今且勝阿烏况彼非烏總碌碌醴泉有根草有本進士楊君擅材分竒文海内爭頌揚事親庭下能温問宫袍初著春宴稀高堂念切曾馳歸三年重對董鼂䇿至今侍養藏庭闈楊君孝親宜有後嘖嘖楊童豈常遘銜君美酒復羡君不惜長歌為君壽楊童子真罕稀手籠金鎖金花枝他年把筆㸔花發願冩毛甡座上詩西河集巻一百五十七
