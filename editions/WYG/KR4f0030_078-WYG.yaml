body:
  text: 西河集巻七十八翰林院檢討毛奇齡撰傳六二一名崇禎撫傳明正治卿中奉大夫兵部右侍郎徐公傳公名人龍字亮生其先人卜居管谿插折管于地管生遂定居焉是為上虞下管徐氏徐氏自明洪武已卯迄崇禎癸未多由甲科登顯仕齒序不闕以故郡之稱望族者先之獨以其一經第髙等為易為書為詩為禮記而第闕其一曰春秋公父鄰首以春秋中萬厯壬午鄉試而公繼之自萬厯丙午舉春秋第一遂與其同母兄宗孺同以春秋成丙辰二甲進士而于是徐氏一門得備五經髙第者自公父子兄弟始公嘗曰吾嘗為婿于陶文簡先生之門稍學為文而文已日進吾復安事吾微文也哉㑹中原用兵每出入劉覽或臨貺輒留心兵事特公成進士時值神廟以視朝日少竟輟館試僅改公工部主事使荆𣙜𣙜未及竣而遽有湖南督學之命以為公能為文湖之士大夫争請之乃公之試湖一嵗一科未嘗啟客幕較文獨身攜僕日閱卷千百皆竟閱試之明日榜甲乙無一失者其所甲士應舉多中式先是湖北文盛毎科得解額十七湖南雜猺獞荒略僅得十三以為例至是湖南舉四十九人爰有謠曰龍德何盛兮鳳德何衰其所謂鳳則以湖北學使者顧君名起鳳也獨其初𣙜荆蜀冦樊龍等殺撫據蜀江漢震動公與楚撫日議戰守事甚具暨受命督學悉力文事顧中心刺促嘗以武備為念故事學使者使車僅止義陵凡義陵以南辰沅郴靖諸地皆就試率官師子弟行縢結屩從無一按其地者公毅然請往或難之公曰豈有乗使車而中稅者自桃源南入連山接嶺争髙競險頽垣牽木間以叢篁初偃轝行至有挽轝不得前者步趾裁通其榛梗㝠接藤盤筀錯之間屢絶供應或勸公還不許然公毎度一關必徘徊相視詢其形勢及度辰龍關徒行則盡得其要害其後𠞰臨藍大盜預知其險易廣隘以是也乃公凡所至居人驚喜以為開國來無此事者逺近争來觀及試則惟辰郡與盧辰二溪能為文句至漵沅則俚歌傜諺雜成之靖川與峒彛相半能通論語一章者即舉茂才時辰苦黔難文士皆從繕應門公拔其一二稍俊者蠲之且風之曰是朝廷之所以重士者也士無地無才苟能讀書通經術則朝廷方舉而用之亦何至趯趯䕺篁間哉士人聞其言皆感動且有嘆息泣下者自長沙終衡遍歴五千里凡八閱月而試成再試如之尋遷分巡湖南道參議㑹璫難大起公大收士時有策問數題侵璫為璫所銜因乞予終養凡十二年崇禎乙亥服未闋即起嶺北分守道服除拜命公乃増拓贑南五城以舊城庳隘冦屢陷遂増南安城髙廣各二尺興國城髙三尺拓安逺城七百餘丈龍南城八百二十六丈寧都七百五十九丈諸増髙與興國城等圮者更築朝廷嘉其能已遷蘇松兵備道按察司副使而䖍民留之詔可于是三臺合舉尤異而大巡劉君復特疏薦公邊才㑹郴桂賊起其渠劉新宇李荆楚等分據牛矢蝦塘諸寨以數十萬賊累陷衡灃茶攸湘潭祁陽之間凡四省瓖接如吉袁詔藥寧永所在告警獨䖍以公在多戒備無犯既而圍長沙復攻衡州兩藩之封于其地者呼救闕下上怒命兩廣江䖍㑹楚合𠞰而檄公監軍舊例監軍非分守任僚佐皆難之以諷公公不許時沅撫陳君首請議撫公曰兵未動而遽議撫此冦之所以窺我也夫先𠞰後撫行軍之常縱愛民不忍加斬殺亦必厚集兵威摧堅陷險力足以死之而後得以情生之苟不先用戰而謂驟可以撫者未之前聞沅撫然其言遂斬桂守所誘賊曽冬保等若干人以徇公乃陽言楚兵當𠞰我何為先之且暑不興師盍散馬俟秋風生長嘶而前時六月二十一日天雨夜晦㝠忽下令鼓三入牛矢寨賊不虞兵至大潰焚其寨牛矢為桂陽賊寨之冠聞牛矢破諸寨皆膽落先是文吏極輕武弁公督學湖南為甲子科武闈總裁其策問痛言文武軒輊之弊武士皆感激及至䖍首擢游擊將軍謝良志及㕘將董大勝嘉其壯勇常引之後幕計治盜事間或脫所絓食刀以賜志良至是以志良為前軍大勝繼之志良遂自效乗勝連破數寨曰佃裏曰銅梁曰猴寨曰蝦塘擒賊雷天召蔣明宇等其帥劉新宇則脫走者三而後獲之遂以七月從臨武與楚兵合于是㕘將大勝以偏師繼進其所破寨曰茶山曰香花嶺曰竹坳志良復從木灣鵝王寨黃沙寺轉入并破二寨曰芹寨曰姜山生擒渠帥劉紅鼻劉思榮等八月與粤兵合既又破髙獠紫獠二源并搜擅源山破寨一曰石門其餘走羅源者願輸萬金犒軍中以求免𠞰不許㑹大勝自藍山還道經羅源公指授方略破殱之大勝以數騎追獲李荆楚于大板沖自六月至九月凡四閱月破寨三十八生擒賊帥十有八人斬級萬餘撫而歸者無算公嘗謂䖍撫曰兵無分制分制則其勢扞格而不可行今合兵四省統制惟一蓋必規畫定而進退不疑號令一而期㑹不爽儲峙專而飢渇不貳䖍撫然之遂悉以機務屬公使便宜行事故公得專意肆志以至于成捷聞初已遷公武昌道晉㕘政至是上特召公至京賜對故事道臣無特召者召之自公始時嗣昌以起復執政兼本兵念公曽官楚冀相引重再拜執公手指所坐曰以此待公公初上應召戅疏譏時政與嗣昌忤至是見嗣昌墨衰絰在坐連矚之愬言已十二年予終養事忼愾激切嗣昌眙􅌓不知所對遽引退旋㑹朝房議邊務嗣昌議増兵内防公謂有進禦而無退守畫宫而守之是欲閑腑藏而棄榮衛也且未有増兵而兵可用者嗣昌怒次日公復上疏力言驅之室中不若拒之門外其利害難易相去甚具上御平臺詔公對初及守贑賑饑民事公曰饑民非可以槩賑也夫發帑則病官開糴則病民臣先示之以發帑之意且過稱廩庾豐裕兼可給糴使富户之閉糴者争減値出而後定規畫取閭師之識饑户者别之約為三等矜寡老病者賑力耕而餓者貸之不責子能自全者平糴而于是全活者衆上素寡言時同對三人皆無問獨問公全活幾何公曰以十萬計上色喜及對他事畢退上猶顧左右咨嗟曰活人至十萬亦㡬矣時嗣昌在側遽曰䖍户版幾何而動言十萬此罔上也上嘿然久之然終嘉公能諭吏部遇督撫闕推用遂超拜都察院右僉都御史奉敕巡撫山東登萊東江等處陛辭賜銀兩紵絲表裏遣中使四人扶肩輿出都觀者榮之及至鎮嵗飢題免積逋銀四萬七千兩捐本年租増修昌邑濰縣諸城改築平度州為石城一如守贑之五城者孔兵引朝鮮船至旅順鳴鼓吿急公方治文書展卷不輟密檄津門山海之為犄角者乃令標將余國祚預貯火筒以焚其船至夜襲破之獲大銅礮三十餘架東海之覬伺者自此頓息特慮流冦橫勢將阻漕且臨德之間毎邊兵闌入以妨轉輸意欲疏膠河故道傍通海運既已親歴相視見有成畫疏入嗣昌銜夙怨謂漕非公職嚴敕之初公撫鎮時屢以他事奪公俸至是奉嚴敕知事不可為自陳奉職無狀請告歸無何嗣昌以督師死衆望公起㑹兵部増設右侍郎備邊關制督之選廷推公為副以覘上意上見公名即報可疏辭不允甲申復首推公户部尚書時倪文正司計力薦公可用故事官計無浙人者上特用文正今復用文正薦特㫖兵部馬上催公入京至淮聞闖變慟哭草檄討賊劉忠端見公檄曰信矣遂詣浙撫黃君同舉義以應𢎞光朝士英兼本兵公仍為副毎同堂坐機事一決于士英公不平求去且毎在堂公正色危坐士英踧踖不自安遂分部事判兩堂命公督理駕庫漕運暨公諫罷朝語侵士英且極言安寘四鎮不宜以廬鳳淮揚祖宗湯沐重地遽予之擁兵自衛之人夫帶礪之盟俟有成績即事在急遽争先歆賞亦必策以自効使恢一城則予以是城復一地即授以是地當前激勵未為不足乃兵未即動而遽刳内地以畀之江南尺寸土可勝刳哉士英惡其言諷臺臣劾公無可劾乃使御史何綸論公耄失拜舞儀勒致仕時公年六十有九矍鑠進止步履無少悞者江東監國起公工部尚書及閩中僭號以武英殿大學士兵部尚書起公遣公門下士閩撫吳君春枝賫詔諭促公入閩不答杜門却埽者七年臨卒流涕曰吾頗知兵事且官兵當國家需兵之時乃不得効死為國家用毛甡曰公既優文事又擅武備顧文事已騐之督學而武備則在守贑時偶見之何也豈時實使然抑亦用之有異與考公守贑日粤督張君鏡心雅重公毎移書䖍撫王君之良以為此事非公獨任之不可後沅撫陳君亦一切聽命于公故雖事屬四省而統馭聯絡如出一人故一往有成功後四鎮之出人自為政即一同堂決機者尚齟齬不合欲其命將出師制勝廟堂難矣予少謁公于行間值公從江上軍還知事不可為忼愾累嘆憂見容色予至今能記之公仲子仲山與予游以予知公事屬予為傳第年譜稍闕而余君若水所撰公狀則旁及璅屑反有為記註所不能備者嘗讀守䖍紀略留䖍紀實監𠞰隨記及召對記諸書知公規畫神敏不減文成而其後卒不得竟用以至于棄置而隨國以盡夫文章之不易見子世亦猶是矣自記禾此徐氏宗譜中傳文也史館所徵書早有其稿故中徐中允草公列傳即以此文為藍本特予為盜賊土司諸襍傳而公平郴桂諸賊因崇禎年少實録且是時長編未備遂致缺然因記此以志餘憾明提督雁門等關兼巡撫山西地方都察院右副都御史忠襄蔡公傳公諱懋德崑山人七嵗讀大學能通其意二十一嵗中萬厯丙午舉人是時公氏陳天下争誦陳維立文維立公字蓋公系河南新蔡遷吳而祖贈君者曽袝姑氏為陳云公嘗讀陽明傳習録嘆曰道在是矣是故學日精而文亦日進已未成進士館選者欲邀公置館首公却之不與館試乃以第三甲除杭州推官立讞盜讞命清獄法刑平臺使者能公頒公所條定兵事關政鹽法驛傳鑄錢救荒諸大政滿六年行取第一崑山相公同鄉慕公名急欲致公門下處以吏部公拒不與通部已擬公給事中遽改擢禮部主事時忠賢建祠京師本部堂上官帥諸曹謁賀公中道歸三殿告成首忠賢功在京官以次進級公獨掲吏部辭無功不受㑹使封光澤王請行使畢還里榜其室曰不隨室崇禎改元忠賢誅復補本部歴員外郎郎中出為江西按察司副使視學政凡學所試稱得士于是極昌明陽明之學刻傳習録于白鹿洞標洞規八條纂真朱子録以申朱王合一之㫖創書院禮請鄉大夫力學者主之日與諸生往復其中著筦見臆測若干言大抵統良知合至誠要格物致知而以知及仁守莊莅動禮為階程以發憤疑問深造自得為功效次第自陽明以前周程以後兼綜條串而正學昭焉既改嘉湖兵備進布政司右㕘政兼按察司副使屠阿丑者湖盜也踞湖有年陜西道御史謝君疏丑剽攻轉入叵測請設隘浙直界地増㕘戎置兵而合浙直諸廂軍𠞰之已經撫按覆奏而公曰賊可縛致必黷兵擾民何耶且海冦劉香游船屢來萬一迫而與之合勢無及矣密捕窩盜家貰其死散歸湖濱約曰有捕至湖者第舍之假捕卒為估賣兒先後踵至屇期而烽生丑義兒沈千斤者有驍名捕分趨賊營沈左右救力敗遽趨沈沈大創丑奪氣遁捕卒散估者扼于隘互持陷水澤中追者生擒之盜平督撫上公功廷臣皆薦公知兵無何以艱歸時公已復姓民留之哭曰還我蔡公服闋補井陘道進左㕘政甫三月而調寧前初寧前道闕員已除有人而遼撫方一藻特疏薦公公恥關寧總監髙起潛之當㑹疏也疏辭曰寧前重池臣不諳兵事未敢任也夫知小而謀大者凶萬一試而不效臣不足惜如封疆何哉且臣與監撫有何生平而謬謂臣知兵不報公乃與家人訣曰吾不顧矣于是選間諜寛文法革濫冒備修軍政貸商錢以濟軍餉時祖將軍大壽鎮邊久士卒頗橫公交歡將軍嘗與語乗間蹙然曰將軍信令行于時而反有不盡行于幕下士者將軍何嘗令幕下得侵民哉今將軍愛民甚而幕下士反之某請為將軍治違令者大壽大喜遽戢士卒而起潛以制府自大公貽書曰職與貴監相見之禮㑹典無考天抵髙下從義起耳然而貴監稍傲則為凶德職稍卑則為詘節與其執凶德而臨詘節何如職伸朝命之尊而貴監嘗受親賢慕士之樂為兩相得哉起潛不能難當是時山東河南北直𨽻名城失陷者不一公初守松山再禦寧逺抵掎于開元定遼之間宵甲者六十餘日而八城以完廷臣議松守功在文職應叙者一撫一道一判遂加撫一藻兵部尚書加通判朱廷􅀈按察使僉事各廕而公獨勿及反謂公清修弱質宜調腹用或曰閣部嗣昌以公不附其款議故抑公以示意云先是詔以災眚言事公極言省過莫如改過而治平之要則在硏大學明德為内聖外王之學究之天心之復係皇上一心之通豈有聖心朗若中天而朋黨不消災眚不弭制敵不勝之理疏上上以為迂而執政多齟齬奉㫖切責至是調濟南道濟南甫殘破公攝兩司使及三道事日撫創招流舉諸廢墜有泰安知州好斂知不免因公生日懐金帶入壽公提所束帶示曰吾十餘年一銅帶耳且此何地而能得此州大慚立解綬去却泰山香税羨金如干修泰安城大冦李青山為亂公𠞰之平遂于次年遷山東按察使隨進河南右布政使公具文乞休而撫按以規避格不上適河南饑斗米三金人相食催科無所應而闖賊流言降城免征民日夜望賊至公曰此非催科時也檄停征抗疏自劾落職七級㑹山西巡撫員缺上特命公而召見于中左門賜膳問撫綏之要公初言山西與河南界河則先當防河然餉宜亟也臣所部兵已缺餉九月而災荒日告臣今往撫當先使窮民有食耳又言學無大小而為治之要必從大學提綱挈領而衆目畢舉又言臣今往撫願使民不為盜而臣無可見之功不願殺良民以成一已之名上悦賜表裏銀兩壬午春公至山西榜其門曰願聞已過求通民情于是興屯以足餉防河以禦冦建干城社以招來智勇之士復講學于三立祠大冦王冕等先後為亂平之别録作王綱及五臺交山諸冦寧武鎮將許定國援河南兵叛而薊將任國奇等統譁兵盡入晉地公密授機宜且𠞰且撫亂為之定是年九月京師以邊警徵天下兵入援公已應徵而遽有扼防龍固之命按龍固三關居内禦外轄之保撫今敵入内地反居外禦内其間山勢綿長凡千五百里各設烽臺扼關隘馳騁堵捍敵不敢近自十月設防至癸未五月撤防凡七月以罷勞請告㫖未即下而闖賊已陷河南將渡河公禦之蒲澤不得渡乃西向潼關先是公防河時止扼其界河南地若垣曲若平陸若芮城僅南河數百里耳至是秦督孫公傳庭以十萬精兵守關天連雨士饑弓矢不張而朝議督戰甚急一戰而潰三秦皆陷于是河西之界秦者南自芮浦北迄保德延袤二千餘里所在可渡且河冰通馬車賊初渡大慶繼渡風陵公兩以奇計擊敗之賊稍却會髙傑統潰兵入汾州攻剽公甫調戢而賊西破榆林岢嵐告警公急上疏以為賊聚而攻我散而守是以一往無堅城也自今以往請分發禁旅并調真保大營諸兵合之晉衆背關一戰尚可有為否則畿輔以西恐成破竹之勢矣不報初公在平陽留巡按御史汪宗友守太原至是太原警宗友馳羽書促公歸保而晉王亦請救備至使者相望于道公不得已分所部三千人以千人自隨而留二千人守汾州平陽平陽大懼相驚以冦至道將以下皆棄城走既而賊不至恐得罪乃反迎賊渡而平陽陷公先遣部將馳救復自為後應將行而晉王及官吏士民數萬人遮留馬前不得行嘆曰賊之得至此天也乃為城守太原計而宗友先促公歸已巡他邑去既而聞變思委罪于公以自解免反劾公不守河而自歸太原有㫖解任聽勘且命郭景昌代公而以閣臣李建泰督師援太原皆不前先是公在寧前拔裨將應時盛于衆中忠壯能折衝至是時盛以副總兵領中軍事與材官叚可達皆隨公因諷公當循例出境候代而公辭之曰吾死封疆耳且此時何時而藉口解任以圖自便縱令代者至吾猶將共死于此君言誤矣率衆哭誓于關忠義之廟甲申正月晦自成聞降者交誦公乃遣使持牌招公公立碎其牌斬使竿于堞樓自成怒悉其衆五十萬薄城下公豫瘞大礟城下賊營燒夜發延火中藥殱賊數千人益大怒肉薄之時賊營蔽扉矢石不入公命部將惠光祚縋死士掣扉投之濠而南廂報陷中軍時盛力射之不退賊遽冒扉鑿甕下公命材官可達用火掲其蓋發萬人敵直甕口縋爟凡發四十有一殱賊千餘而東南角樓所貯火藥器忽自裂樓為之燬一稱叛將張雄先伏人焚樓火藥次日風霾作拔木發屋晝晦守陴者不能立公預草遺疏藏衣間而中軍時盛者馳歸手刃其妾并幼子持矛登敵適新南門守者與賊通毎白事鞸皆前向方議調他門未及調而賊已入公北向再拜授遺疏于贊畫知縣賈士璋曰臣力盡矣願間道奏天子引佩刀自裁而諸將奪公刀擁馬西行欲刼公出走公叱不可遽下馬徒行入三立祠時時盛持矛巷戰赤突手殺數十人尋遇公于炭市乃同材官可達已先公馬斫出城回顧不見公復斫而入從公入祠下公從容拜先賢自解袍帶縊祠之東梁身輕不即死時盛脫鐵甲覆公肩氣絶時盛亦拜公東向絞以弓弦一時從者十餘人皆自殺自成購公尸離其首棄之海子可達廉得之斂瘞于新南門外東崗私題曰雲怡公壠雲怡者公别字云福王時以禮部尚書顧錫疇請表賜謚忠襄予葬祭建祠而袝以時盛㑹柄臣士英修怨錫疇而媚士英者并劾公失守且有指公未死者以故下䘏典而贈廕不行初公還太原寧武鎮將軍周遇吉者公所薦士也貽以書曰公忠義性成吾與公同心破賊豈顧問哉萬一不然即賊得渡河願與公約公死守寧武以扼其北吾死守太原以障其東兩地牽掣則畿輔得延以俟援集此睢陽之烈也至是公死賊從保德渡者圍寧武城二十日城陷遇吉貫甲運槊躍馬入堅陣手殺賊豪百餘人掛矢滿甲大創而死其妻蒙古人也綏冦紀略作劉氏帥蒼頭百人先縱火焚其居而跨馬挽弓衝斥亭桓間自辰迄未所殺傷過千人矢盡赴火死蒼頭無一降者毛甡曰予讀三事録嘆材官王永魁等能同時自殺而太原民數十萬既從公死尚有遺民傅從髙等尋哭公屍于殭屍漫野之際非公之忠誠素浹于心何以有此然則感奮成仁不止門生故將也公全晉拒守已經二年向使公在平陽則賊不必渡賊不渡則太原不必陷公一去就而全晉之存亡係焉顧公事如此而國是未清猶有格贈䘏而快私怨者公仲子方炳所由狀公實而授予述之如此夫匹夫慕義何處不勉公獨講學而藴之平日授命致身肇于愛敬知之良將與文成比烈矣吳梅村曰賊以三道渡河下流由蒲坂趨平陽中道由延綏趨汾晉上流由樓煩趨寧武既破延綏則不得不返顧根本豈得以去平陽為公咎與西河集巻七十八
