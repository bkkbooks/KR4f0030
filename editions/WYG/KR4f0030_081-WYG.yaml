body:
  text: 西河集巻八十一翰林院檢討毛竒齡撰傳九列朝備傳李夢陽李夢陽字獻吉生時母夢日墮懐以為吉也名字之世為開封扶溝人其曽祖戍慶陽死家焉而父正為周王府教授仍還開封夢陽束髪就河南試不利年十八乃以故籍走試陜陜場且閉夢陽大言曰塲無解元何為閉也主者竒其言試而納之遂中𢎞治五年鄉試第一明年舉進士連中授户部主事遷郎中嘗治關立通商法痛格勢人求勢人不便搆下獄尋釋十八年應詔上書陳二病三害六漸不可長凡五千言其言神機三千五軍三營兵數十萬至正統已已纔數十年間僅㧞得一十二萬為十二團營而今則料衆北代不彀三萬腰鍵弓矢不全騎士牽露骨馬官不恤其軍豪勢侵蝕食之増而用之寡是兵害也且夫騰驤四衛者非今所謂内兵耶外官既不稽其數而征役不調富豪而氣驕夫以内官之貪狡而率富豪而氣驕之人其為害可忍言哉是必查往年李玉事例仍置總兵官㕘掌内兵而禁團營把總號頭等俱不得置私人而後積弊可徐銷也又言莊場之害曩時直𨽻抛荒田地聽民開墾未嘗起科今輒指之為官田皇親家聽無賴投獻而朝廷復允其請占其田土犁其墳墓摲伐其樹木民則何堪且薊州牧馬草場與百姓争阡競畝尺分而寸剖之百姓連年坐勾攝轉相牽聯廢本業以尺寸之地失黔首心乞勅户部查景泰六年勘官馮諲奏内事理以前項田土仍給民徵租但以空閒草地牧馬便末又言貴戚驕恣之漸夫皇親至戚也然必以禮防之者則保全而使之安也今陛下至親莫如壽寧侯所宜保全而使之安者亦莫如壽寧侯壽寧侯招納無賴罔利而賊民白奪人田土擅拆人房屋强擄人子女開張店房要截商貨而又占種鹽課橫行江河張打黄旗勢如翼虎夫川潰則傷衆萬一法行陛下雖欲保全而使之安焉得乎此非所以厚張氏也書上侯奏辯謂夢陽罪斬十其㝡著者斥皇后為氏時張皇后寵有權皇后母金夫人日夜泣帝前帝初令回話不得已乃下詔獄掌詔獄者牟斌為夢陽具牘議罰俸左右請杖之不許金夫人復請帝帝不懌曰張氏謂張家也張家皆后耶推案起帝初與劉健謝遷論夢陽謝遷曰夢陽心無他所謂欲効忠於陛下者也至是帝語劉大夏曰或謂我杖夢陽推其心欲殺之耳吾能殺直臣快左右心乎當是時天下賢孝宗而慕夢陽之為人故事館閣習文翰夢陽以諸郎倡起號召為詩古文詞館閣笑之顧夢陽所為文鳳矯而龍變旁若無人同時何景明邊貢徐禎卿朱應登顧璘陳沂鄭善夫康海王九思號十才子而夢陽則更以氣節超諸郎間嘗遇壽寧侯大市街乘醉數侯過襍罵舉鞭梢揮擊之落二齒侯隠忍去正德改元堂上官韓文毎退朝輒與曹屬語閹等而泣夢陽進曰公大臣不除君側奸徒泣何也文曰吾亦思除之耳夢陽曰除之則何必泣夫閣中皆顧命臣公所知也今言官劾瑾等閣臣持其章甚力將必除之特其機未釋耳公誠能手疏帥百官伏闕下争則勢成勢成則機釋機釋則一發而殪是合諸公卿内外比掌而拊一䖟也過此勿再也文曰善君為我草疏然疏勿文文則勿省勿長長則勿竟草具文懷之入㑹語泄中變健遷並辭去文坐落職而以疏草為夢陽所為謫夢陽布政司經歴勒致仕既而羅織夢陽事械繫之論死賴康海救得免語具海傳當是時天下人人稱夢陽顧夢陽益喜自負瑾敗起江西提學副使甫到官與總制陳金約曰公治軍夢陽治諸生無相尼也舊例監司五日一㑹揖御史所夢陽不往日教諸生砥氣節毋許諸生就上官謁諸生謁上官雖都御史毋跪伹長揖上官毋許加諸生者時御史江萬實與諸生迕夢陽拽黒縲帥諸生親往鎖萬實㑹淮王府校争諸生於途夢陽途笞之淮王奏聞適以所奏下萬實按狀夢陽乃訐萬實雜奏下陳金金檄布政司鄭岳勘之夢陽疑岳袒萬實因復訐岳時逆濠重夢陽甚而岳以迕濠濠為夢陽執岳吏令報岳子沄與羣吏通贓奏聞繫沄掠治而參政吳廷舉謂夢陽侵官亦上疏論夢陽掛冠而吉安知府劉喬嘗殺一諸生為夢陽所持亦互訐劾喬乃手偽疏一通示萬實曰此非公劾陳金疏耶夢陽偽為之將以惡公於陳公而復示金疏以激怒金金乃還所下不復勘驗更遣大理卿燕忠出治諸生數萬環廣信獄忠至召夢陽入團手据案罵罵已且誚且讓謂夢陽未講老氏無學問不知雄而守雌遂還奏夢陽欺凌僚屬挾制撫按勅冠帶閒住還里而岳喬以贓私削籍充岳子沄戍廷舉擅去官罰俸夢陽嘗作書上座主楊一清曰陳士賢曲庇諸生諸生有為盜者舍勿問也敖静之拳毆唐御史唐御史憤死楊繼宗罵贓官不去口雍世隆為按察使途辱知府為都御史時鞭㕘將當時數公人莫加惡名焉夫激濁揚清之中當寓扶陽抑隂之意使知朝廷有不可罔之法天下有不可詘之節古今有敢為之男子無能逃之法吏夫然後懾伏勢雄繫渙散而冺亂階也夢陽既家居賔朋日盛嘗從汳洛少年射獵晉邱繁臺間自號空同子海内慕空同子名多造廬請顧時時以侮嫚謝去五年御史周宣論夢陽親濠逮詔獄大學士楊廷和刑部尚書林俊解之得免乃以為濠作陽春書院記削籍先是夢陽有甥曹嘉能文章以御史諫武宗南巡廷杖其負氣陵轢人嘗謂其似夢陽至是以抗諫謫四川茂州判過夢陽相對慟哭同為謁逢干廟詩以見志子枝進士論曰聞之燕忠責夢陽曰方君彈壽寧侯時斷螫搤猛動至尊之心及其為韓尚書草奏忼愾抽筆氣陵朝宁庶幾李元禮范孟博之流而惜乎不講于道也㫖哉言乎語云鈲以礪缺夢陽砥名節矯厲太過遂流為悖慢而不之覺坎􅀈終其身悲夫明初金華諸子開藝文之門蓽路藍縷而夢陽景明繼之大起古學鬱然為文章當時已遂有蓋代之目乃自是以後振焱揚波非不甚盛然終明之世究無出其右者舊傳𢎞德集空同子諸書後彚為空同集六十六卷所當與李杜栁韓争雄長矣附録反夢陽與鄭岳相訐時濠左袒夢陽擠岳者而年譜稱燕忠出勘承濠風㫖公且不測獨何景明上書冢宰楊一清乞為申解遂得閒住此欲出脫夢陽比濠一節而故稱濠擠夢陽年譜之護衛過當如此欲官康海吏部侍郎海力辭免諸書稱欲官夢陽瑾吏部此是因海而誤之者瑾此時欲復官夢陽則未可知然非吏部也年譜記夢陽甥曹嘉以諌謫四川茂州判官而名山藏謂抗論楊廷和喬宇彭澤因列廷臣五十八人為四等坐貶昌邑知縣兩不相合考空同集有送甥謫四川茂州判詩豈昌邑之謫又在茂州之外與姑記此以俟考定仇鉞仇鉞鎮原平泉里人以傭卒給事寧夏總兵府總兵者愛之使之襲仇指揮職掌其兵遂為江都仇氏既而戰甜水河有功陞僉事正德二年用楊一清薦充遊擊將軍五年寘鐇反都指揮何錦周昂指揮丁廣等從之殺守臣以討瑾名舉兵鉞駐大壩聞變將東行時反者預撤黃河渡船於岸西以拒來者而㕘將楊英屯河上復盡奪船歸東岸使反者不得東鉞東西望間無如何顧念妻子在賊中遂從大壩歸垂􅌢覲寘鐇詐稱病發急分所將兵𨽻賊營掩宅卧于是賊時時就計議㑹興武營守備保勛家陷賊遣蒼頭泅入駕言楊英等合諸路兵將渡河鉞聞之大喜乃謂錦廣宜急出守渡口遏東岸兵勿使渡且橫城堡近河聞有決河灌堡者非固防之恐倉猝未可狃也錦愕然急偕廣傾營東出昂獨守城鉞又稱病亟昂問病鉞猶堅卧呻吟言旦夕且死蒼頭驟起捶殺昂離之鉞乃披甲橫刃提其首躍馬出門一呼諸遊兵壯士坌集遂圍安化府擒寘鐇而城外兵聞之俱反正縛錦廣獻自寘鐇舉兵至此凡十八日敗先是遣將時議以鉞為副總兵既而傳鉞在賊中悔之將追勅未幾捷聞勅署都督僉事佩征西將軍印鎮守寧夏及論功封咸寧伯嵗禄千石與世劵七年霸州賊趙鐩等冦河南橫甚命鉞討賊稱平賊將軍鉞督副總兵時源等涉河而進敗賊七里岡乗勢四追斬獲四千八百餘人乃擒鐩于六安州無何山東賊劉七等從河南流剽入湖廣復命鉞進討時賊已㳂江下至鎮江退保狼山鉞駐兵鎮江而令諸將劉暉郤永等分軍並進與賊戰大敗之賊自崖趨下將奪舟官軍乗之七溺死進侯増禄千石八年大同警復命鉞以平蠻將軍禦之未至警息先是鉞從江南還即乞去前後凡十三疏至是以病歸時帝好武毎御豹房召諸將入侍鉞辭不入十五年世宗入嗣以言官薦起鉞提督三千營掌前軍都督府事卒謚武襄初鉞歸田間剽者指之曰此仇游擊庄也斫而入鉞暗中注鏃無一虚者子恩病孫鸞嗣侯以罪誅有傳論曰鉞傭卒起家以功封侯偉哉雖狐雛緼火扑手易滅然而智略逺矣惜乎嗣之者之隳其績也世傳鉞有謀審于料敵自從軍至侯大小數十戰未嘗不利邊人毎言鉞一出而綵繒佔倍言功賞多耳至若辭疾屏居避勢晦跡以終全其名則雖古名將何加焉附録世諸書皆稱仇鉞江都人惟趙時春為仇鸞本末敘系甚詳時春同鄉人與鸞頗密故知確為平泉里人第他書稱寧夏者亦有之至若楊廷和為墓志稱江都實録亦稱江都則原狀既冒姓其無能改正不足怪耳實録作鎮守太監季増少監鄧廣而昭寘鐇殺守臣代典則稱太監趙弼無據今略之西以絶來者不記實録稱賊撤黄河渡船于橫城岸官兵奪船一節惟昭代典則稱廣武營指揮孫隆焚兩壩掃捲河舟盡歸東岸使賊不得東仇鸞本末又稱陜西總兵曹雄靈州㕘將楊英盡收黃河船濟師歸靈州二書不合攷實録敘靈州奪船功則官軍奪船洵有之但其牒稱副總兵楊英遊擊史鏞率都指揮韓斌陳恂尹清鄭廣吳山韓逵李完韓連蘇勇黄正鎮撫温良副千户郭春凡十四人並無孫隆名若曹雄則陜西總兵以擒寘鐇之次日援兵始至安能奪船故知二書所記皆謬也城門擒寘鐇大謬斯時諸書載鉞殺昂後皆云鉞奪鉞與寘鐇皆在城何奪門之有奪之而不及六安之墓志載鉞討趙鐩賊止言先聲降及討劉七賊則反云襲破之于六安是誤以趙鐩賊為劉七賊矣六安是趙鐩與七無涉時趙鐩賊中有劉三者亦指名豈誤三為七故然耶涂禎涂禎字賔賢新淦人𢎞治十一年進士知江隂縣舉卓異第一遂擢監察御史巡長蘆鹽復命時瑾用事御史有獻割没銀者因以責禎禎無有瑾怒下禎獄然猶望其獻也遲之禎終無有矯㫖杖三十戍肅州衛永逺以坐杖重未行卒先是下獄時江隂民痛禎願合錢贖禎如御史所獻銀數禎不許遂遇害王承裕附王恕傳後承裕字天宇兒時即重厚如老儒七嵗能詩成化二十二年舉于鄉始婚自著婚禮用中呈父擇用之𢎞治六年登進士時父恕致仕即歸養授徒于𢎞道書院正德初歴諸科給事中以正直名有時政先務勤政任將等疏逆瑾用事以上書罰米三百石輸邊八年陞太僕寺少卿奉命點視京營馬疋十一年進本寺卿上偶降㫖大閲用戰馬二萬疋皆應命時以為能既而陞南京太常寺卿嘉靖元年以憂闋補任無何陞户部右侍郎却其舊例公堂銀千兩貯庫言官論禮部尚書席書賑濟不明往勘當上意欽賜睿筆清平正直四字六年陞南京户部尚書奏鈔關商税羨銀解京查累嵗逋租至一百七十萬石而還收貯所羨銀凡四萬八千餘兩七年致仕卒謚康僖論者謂能繼恕業一如范忠宣之嗣文正者承裕體肥澤廣額豐頥性孝且友能悦親養志教人以禮為先凡弟子家有喪祭事必命率禮而行所著婚禮用中與論語蒙讀談經漫語諸書共若干巻合詩文集行于世伍文定邢珣徐璉伍文定字時泰松滋人父琇官貴州㕘議文定年二十以𢎞治十一年進士授常州府推官剛直好斷與提學御史抗諸生羣捶之幾斃猶曳衣襬行鑠鑠然正德初陞成都同知以迕瑾追誣在常州時勘魏國公徐俌争田失實逮繫詔獄勒為民瑾敗補嘉興桃源賊冦開化檄文定與指揮他知府追𠞰于江西之淫田指揮他知府皆敗被擒而文定獨能斬賊首及其黨一十二人而全其軍未幾擢河南知府計滅河南賊張勇李文簡等乃以江西吉安多盜調吉安到日即奉贑撫王守仁檄擒永豐冦賴招壽而大茅山洞賊方熾隨𠞰平之宸濠反文定已城守值守仁還贑道吉安文定帥健兒迎之峽江控纜請曰賊悖逆不道自取樔絶明公舉義旗相嚮何讎不克第燎原之燔利于蚤揃明公何不即起兵吉安先此大事守仁初西行尚思還贑整軍旅而後聲討及聞其言大喜遂與乗夜返吉安閉門草檄集兵食繕甲旬日而具文定吿社設孫燧許逵位為文哭之動衆心舉兵至樟樹知府邢珣等各以兵至合八萬餘人號三十萬分隊七令各攻一門而以文定為先鋒攻廣潤門時濠去南昌守未固砲門門者走遂攻門入既而追濠及樵舍濠反兵鋭甚㑹知府鄭瓛逃歸自賊中詣文定營語狀文定乃乗夜帥所部先進徐璉繼之時濠舟蔽江面前後數十里文定進戰不利舉砲以風逆燎鬚灼左臂衆却文定遽引退賊乗勢追之至黄家渡賴援兵解去乃與濠隔江而軍濠舟聯岸為方陣營時北風烈甚忽反風有請火攻者文定不應既而請者衆文定怒曰風善變南北未可定而欲狃赤壁成事以擾軍政何耶衆不敢言文定乃密啟守仁為火攻具募舟四十艘填藁灌油勒竟夕辧預分隔江軍自下流潛渡繞出濠舟後伏之而更以他軍補隔江軍平明火發諸舟乗風入文定帥衆隨之頃刻薄濠營先夕濠令人誘降惟不赦守仁文定二人餘待以不殺至是縱火人人殊死戰濠舟膠淤沙舳艫聯絡倉卒不得發又篷笮多葦竹火及輒爁烟焰蔽天地焚死無算而伏兵復起鼔譟邀擊其登岸逃者濠大敗乗他舟遁既而就擒論功推第一進江西按察使閹人張忠帥禁兵討賊賊平無與忌其功因見脇跪不跪執而撻之乃乞歸嘉靖初起廣東右布政使以平濠功陞南京都察院右副都御史久之乞歸既而起兵部侍郎右都御史雲南土司鳳朝文反加兵部尚書督雲貴川湖四司軍務兵未至而朝文死時芒部多不靖文定欲乗勢𠞰之四川巡按戴金力言其不可遽降㫖罷兵召文定文定復乞歸卒當文定勤王次樟樹時贑州知府邢珣臨江知府戴德孺袁州知府徐璉各以勤王兵赴吉安軍其後論功惟文定授副都而珣與德孺與璉三人者皆以陞左布政使致仕而德孺死于水邢珣字子用當塗人𢎞治六年進士嘗為户部員外郎以忤瑾褫職為民及起南工部㑹嵗歉宫寢營建輸辦不給而中貴人敕織造􅀈衣樂器累費數萬且督趣甚緊珣劑量供繕悉準以法中貴人無如何正德九年出知贑州府贑壤接閩廣嶺㠐險絶有劇盜滿總焚剽為害久不能制珣下車即親詣峒穴推誠而撫諭之總率衆歸降且願效用他盜翻藉以抵禦于是立古鄉社約大新學宫修復鬱孤臺㑹都御史守仁檄𠞰橫水桶岡浰頭諸賊調官民兵萬二千人分十哨以珣領之是時將進兵議先桶岡珣獨謂桶岡諸巢為賊境咽喉而橫水左溪實據心腹今湖廣徴兵未集賊不為備不若出其不意速擊橫水而然後移之桶岡蔑不濟矣守仁是其言遂破横水進桶岡時守仁隂遣人説賊使降賊猶豫間㑹大雨珣冐雨進兵賊潰走乃以平賊功陞俸二級賜鏹金文綺十四年濠反遣使賫重貲誘滿總等兵助逆總執使戮之將其貲幣詣府珣大喜慰勞㑹守仁偕文定起義兵吉安珣即日部兵與總赴之次樟樹時諸府兵徐璉戴德孺等皆至同抵南昌諸兵入城縱殺珣立白守仁令禁之既而戰樵舍文定先進不利返之黃家渡珣倉皇馳援率滿總執大旗麾兵進刺其渠帥追斬數十人賊勢稍却然後隔江陣文定以火攻直入而珣擊其左濠擒陞江西右參政世宗入嗣首議賞格㑹有嫉守仁功者嗾言官論沮削其世劵嵗禄而一時勤王諸臣斥廢殆盡珣陞左布政乞致仕既歸口不言功有問者亦不答嘉靖三十年南昌人立報功祠于學宫之左專祠守仁而以珣曽白守仁禁殺得配祀他不與焉徐璉字宗獻朝邑人𢎞治十一年進士由户部出知袁州府濠反守仁偕文定起義兵吉安璉聞謁守仁歸而召民兵五千人與臨江知府戴德孺贑州知府邢珣同以兵㑹吉安軍從之下南昌遂躡樵舍時濠勢甚盛璉師寡守仁署璉為衝鋒官與文定俱文定先衆擣濠軍璉繼之不利濠乃懸重賞厲士盡發九江南康兵以益軍守仁隂囑文定為火攻而令珣擊其左璉與德孺擊其右濠敗璉所獲賊計一千二十八級守仁疏其功次文定進㕘議既而論功陞左布政使候缺逾年乞歸後守仁受封白璉功文定進右都御史亦請以已位讓璉時尚書霍韜等復奏論璉功未酬帝命御史王鎬核之以實聞俱不報璉退居後絶口不言功所著玉峰集羣書纂要共若干巻論曰文定以文臣𠞰賊不減守仁而勤王之舉則守仁實賴之雖守仁忠果自有成算然初下南昌繼擣樵舍卒之火攻制勝隂定計議于俄頃之間豈懸瓠之捷非李愬不為功與邢珣徐璉同時並起偉伐未酬均就閒散夫功立而忌生事定而謗興在守仁已然矣附録殊伍文定墓誌稱濠薄兵江上安慶被圍文定士卒死戰賊􅟃漸遁乃夜引兵入省城則先戰樵舍而後破南昌誤矣且稱守吉安時𠞰賊反遺桶岡永豐諸賊而為南京都御史時則反稱其平海冦皆屬不合今考正邑人一作武功誤徐璉為西安朝徐璉墓誌稱䖍州知府邢珣同以兵㑹䖍字是贑字之誤西河集巻八十一
