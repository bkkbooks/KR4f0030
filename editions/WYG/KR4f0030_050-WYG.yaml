body:
  text: 西河集巻五十翰林院檢討毛竒齡撰序二十七新纂蘭亭孤山二志序康熙丙子皇上萬幾之暇偶書蘭亭序及舞鶴賦二通而在廷有請之者謂蘭亭本右軍修禊所記當奉御書勒石于紹興山隂之蘭亭而以舞鶴賦勒石杭州孤山間以宋林處士曽有放鶴亭故址在孤山麓也當是時蘭亭孤山諸名蹟乆已洇塞而宸翰忽及山川煥發觀之者皆有登臨慷慨之思焉予友王君草堂目睹茲勝因之作蘭亭孤山二志以備稽考其費編摩成一書已三年矣嵗在己卯恭逢聖駕觀河南巡駐蹕杭州三月二十五日在籍諸臣朝行在畢㑹各有進獻賦頌册子敇黄門收入而草堂以草莽臣亦得將二志抄謄逐隊呈進此真異數為古今史册所罕覯者乃越二日而掌較官屬索草堂名甚急遲乆不至值予詣扈壘大學士張公宣予至行在朝門傳諭奬勞兼出草堂所進書敇其改行謂既名為志自當先事蹟而後題詠況兩人之集祗應附後非本志也遂付予轉授傳諭改去其諭之宛委昭晰至于如此夫草莽微言上邀天睹斯已竒矣乃褒嘉之餘重以訓迪陋巷窮士一旦被都俞之盛儼若嚴父師之教弟子此在後世聞之猶感慕嚮往以為難得而況躬逢其際者也草堂從此可自慰矣方予捧册還草堂時微問其故草堂曰予纂二志時欲倣常璩作劉先主志因以兩人世系文字列之在前而既而更名蘭亭孤山而仍不之正睿鑒如電霆早已燭及敢不稽首改正以報明詔曩者東甌初闢和碩康親王還師江干㢘草堂文行之卓蒙賜蟒衣草堂謹閟之篋笥不事焜燿而今復為天子所見知特賜嘉與將成其所著以嬗于不壊一何慶幸嘗觀草堂所著書尚有四書疏解聖賢儒史朱陸異同并大學孝經諸辨證皆有闗儒術可以嬗後安得盡獻諸當宁而為之正之李生試文序李生白山抱卜夏之痛效楚人作哀子詞而讀而善之請與之游因見其人狀貌非凡發言多驚人而尚困有司阻下士之試每見必訝然意者長于古文未必不詘于今文也與及觀其試巻然後知伯樂之難逢而鹽車之下之所由泣也司衡者日衰矣主者寄其目于人而以肥自利間或借名採訪下及寒俊往往濫被之輿臺皂隸公乗姑布之子而欒郤之後必不一顧亦安知世間有錦心繡腸下筆如繙花而龍沈蠖屈猶偃蹇有待如白山者耶白山名家子世嬗學海其王祖我存先生以太僕卿為啟禎名臣著書數百巻所傳乾象輿地禮樂算數諸册為天下宗法而王父工部公早登建禮其闈房諸牘衣被海内今白山起而承之陸平原即不入洛亦安敢謂世徳駿烈必無誦揚況春郊不終蟄也錢先生者白山之九方也憐其才惜其遇梓其所試文以問世然則天下亦尚有知己如先生者矣於其成喜而序之李白山續刻試草序向白山刻試草成愛而序之且以不遇知己為憾乃未幾而都運李公知之三試其文于籌商之堂拔取第一又未幾而上其名于學使者學使者又知之取民籍第一未已也取商籍又第一夫都運公本侍從名臣初以第一人解南宫而學使對策為臚唱第一以衣鉢言則白山之第一或不僅止此小試而即此小試觀之蘓氏子謂淳于髠曰人有賣駿馬於市者市不知也伯樂驟見而顧之其價十倍今不既見伯樂乎然則價亦何可量哉續刻成喜而又序之盧樹侯詩集序三古詩與文並傳漢制科無詩而三唐兼之宋初遵唐制而既而去詩當時争之者如蘓子瞻輩僅曰唐以詩取士而賢人君子未嘗乏也其為言止此而已然猶有文也至明則不惟去詩乃於文之外又别有所謂文者而於是詩與文皆亡夫使詩可亡則詩不宜列一經且不宜以此立學官取士夫既以詩立學官取士而謂士不得為詩可乎惜當時議貢舉者言不及此若夫文則上自朝廟下逮閭巷凡鐘石旌常碑板竹册以至移告質劵柬札簿牒之細皆未之學於是通籍以後悉請召記室明明僱賃而不以為愧曰吾所學無是而已盧子樹侯恥其然自趨庭受書以迄出郭負笈為今文為詩為賦為古文為雜文無不􅊥其郛而入其奥不為詭隨不任朴畧不好務通侻而趨一切其寄託􅀷長而譬類廣逺燦燦乎質有其文焉予入館時日步趨西寧先生以為楷橅嘗謂髙文典册能為國家職紀載之事者惟先生一人而樹侯繼起如是漢人以詩傳韋氏是也唐之以詩兼文者張蘓父子是也進而三古則不可量矣夫樹侯之必不止以今文為世稱可知也吾縱不敢以宋後詩文目吾樹侯也然又安敢以漢唐所傳者為樹侯限哉重修北渡橋募序北渡要津也扼南北之隘以導其往來其諸舟車之恃有橋也猶之腹與口之賴有吭也今吭亦稍哽矣從來國有大役則必邦大夫主之邦賢佐之井里小民羣起而趨之走之今邑有賢父母為政而薦紳先生復相助為理亦何患大役之不驟底于成而猶有進者曩者泉州瀕海城東洛陽江漂没行路太守蔡襄為建大橋以渡之後所稱洛陽橋者是也其時奏請水衡并捐月進又且合平海諸邑而共為匡濟然猶官錢居其半募錢居其半今其橋砫尚勒僧衆名以示奬勸記載可睹也然則茲役之重有藉于募之也夫復何言西泠唱和詩序老不能詩況能讀人詩哉顧唱和詩即不然唱和有興㑹唱和則于詞于韻皆可比絜焉而見其短長夫老年寂寞遇有興㑹事即趣之況短長品隲尤予生平所願聞者乎司成汪先生同官同籍向與之唱和而畏而避之今暫稽鄉邑門庭清疎日與其門生兒子作唱和詩予受而讀之既而掩巻不敢讀其故有二一則唱和之體始于中晩而糜漫于宋今世不争為宋人詩乎吾懼其以皮陸之濫觴而及蘓黄也一則短長比絜踟蹰未決吾既已避司成矣顧其所與唱和者匪他人露湑山侖皆當世名下士而趨庭二子詩復争上嘗見楊公侍郎和其所和十寒詩而嘆為莫及萬一短長之間仍稱司成在知我者謂我為暱而不知我者即謂我為讇夫暱與讇予則何敢而既讀其詩一何超中晩而更上之也一何相顧寡短長也子不必恭父弟不必讓于師也時而棊置上與下若一也時而入平林長松與短栝無參差也幸而老去不能詩不然其為畏避者何多也嗣音軒詩集序古來談閨門之盛無過班謝兩家然而班昭續父兄之史而其夫曹夀全無文章即隨其子轂作陳留長曽賦東征而為之子者並無一字傳于人間謝道藴與羣從唱和及其婚江州則天壤王郎世當惜之然則班謝之所為盛固班謝之盛而非昭與道藴之所為盛也人莫大乎有家庭之樂而家庭之樂尤莫大乎父母舅姑夫妻子婦之相歡故内則講扶侍之節其在飲食則臐膮醢炙必求其精在衣服枕簟則衿纓縏袠牀柂衾襡之必求其備甚至樂府歌三婦或美容飾或工織作或援筝操瑟以娱于丈人之前卒未有起而談藝文者而苟其北堂几案長幃短榻抽書而授牘承頥接欬以與寢饍相周旋則雖三婦三息綰銀黄而拖繡紫亦何以過故吾謂班氏一家以叔皮為父孟堅為子而又得恵姬道藴輩以為之姑婦則其為一家之文必更有異而惜其不然也予向讀柴季㛠詩嘆季為沈君漢嘉之配秦徐夫婦鬱乎可觀既而與其子方舟君游則已輯為沈氏一家文凡門庭内外裒然成集而柴夫人詩則儼在其中焉又既而讀繡帙餘吟一卷則朱順成之詩也順成為方舟之配與柴夫人為姑婦前後暉映予曰太姒嗣徽音此其是乎又既而果以嗣音軒詩集屬予為序人有好友能文詞即望衡對宇不厭屢從而苟或兩地相隔則聞聲相憶雖復千里命駕不為過而乃近處之房室之間以朝夕相規摩則其為友朋之樂已越尋丈而況夫妻子婦之聚于一堂此亦生人所希覯之事而沈氏有之予年近八十友朋凋盡偶有質難出門復入門茫茫安之聞沈氏當日中之際不無稍仄柴夫人已厭世漢嘉居窮巷忽兩目不見物而方舟夫婦每侍坐談義遇漢嘉欲有讀輒夫婦遞讀以當目及即漢嘉性耽書日願十百讀而子婦之侍坐者亦十百讀無厭此亦家庭一盛事矣若夫順成之詩則詞質而意達有似乎杜甫之言情者柴夫人詩多凌厲有似太白與順成之婉而摰各有所到予門有徐昭華者㑹稽女都講也頗工詩是集成當貽一本示之胡國期詩序能詩者不必能文而能文者必能詩李杜無文而昌黎眉山其詩並為世所稱葢銘頌賦誄以詞為文故古善文者往往著有韻之語于散文之間況舉文八比尤以偶對為章程者乎胡子國期從予游每見其舉文劌心鉥腎託其身于𦕈漠無朕之鄉而乃由窈㝠以達髙明淺者􅀷之直者曲之疏通者假羃䍥以彌縵之使尋常畦徑為之一開以是而為詩其大者入于杜陵之奥而偶然結撰亦動以盱眙昌谷為法鉤隠剔宻而不屑屑于任華彭伉之末嘗為長律百十韻推挽頓挫世之舎單行而窮比步者莫敢先也昔有操瑟過齊門而門者叱之謂王好者竽子操者瑟瑟雖工非所好也而其人亦即趦趄却步而懐瑟以退予謂亦其瑟未工耳苟工瑟則洞庭張絃通于嶰谷夫猶是五均七始九歌十二管之各以類應而舍嶧山之桐吹雲門之竹亦必有鳥驚魚駭感神人而和上下者夫聽師曠之彈而尚疑其有遺器必非知音則讀國期之文而尚疑其有遺詩可謂之知文者乎曰未也讀書堂詩集序初僦杭州時辨論禮經與汪司成君主客于錢湖之濵其時汪次公無已每有質難厠其間以司成君廬墓讀禮而為其子者亦復就廬講習以抒其晨昏之情皆孝思也今司成服闋還京其長公無亢扶侍邸舍而無已獨留家門如所稱讀書堂者則凡克家與持門其為任較重于昔而乃應舉之餘復出其所為詩以示予取正曰詩與禮總讀書所有事也予聞夫子教伯魚曰學詩學禮夫亦以讀書所重首在詩禮顧學有不同學禮惟講習而已無自為禮者而詩則可自為之故夫子亦曰女為周南為召南吾不知今之為詩與古之所為有合與否然而為二南為三百為漢魏六代為三唐宋元明其時固殊而其所為之不同亦已乆矣三十年前予選越人詩而杭人為詩者不一家其時重標榜赫然于人然且守雲間歴下諸胚膜定為成法謂入此則是出乎此則不是向使以今所為詩使昔人觀之必瞠目撟舌駴為異事觀者遂以定今昔之優劣然使在昔佳詩陡出之以示今人亦必嗛嗛然相顧以起何則氣志未通則胚膜不相接也外氏謂生人自少至老形貌有殊而中心不殊故善為詩者毋問在前與在後而讀其詩而作者之心宛宛相屬則雖起王子安讀琵琶行必以為善而使履道坊人各仰首而讀滕王閣詩誰敢不俯首稱莫敵者初讀司成詩而動于心今讀無己詩而又動于心此其為詩必有不與世進退者記曰無體之禮氣志不違夫以氣志為禮與以氣志為詩其胚膜不同而心則一也無亢無己南北各處而不違于孝前時學禮今學詩而不違乎學司成父子各自為詩而不違乎氣志之合讀書而已矣雖然讀書者匪直詩也然詩可觀也嘯隠偶吟錄序奕公以息慈之年受平陽記莂為乗門髙足弟子予羡其聞道之早每以聖門之子淵目之乃平陽所期極其逺大嘗招之繼天童之席垂手東方演彌天大業而奕公多方辭去棲遲于錢湖之嘯隠者凡若干年予就醫㑹城往往造其室見所居穹如即敗椽改葺榰柱嵗月依然廓落無四壁安見所為一塢白雲三間茆屋者而奕公處之泰然然且閉户不出致絶粒啖柏如休糧僧而饑癯不形貌澤而神融宛宛有太虛之在吾躬浩浩乎空空乎豈非吾儒之所云戰勝而能肥者與自少林以不二法門直指心印將從來十六觀禪一切埽盡以為一真不立何況文字而平陽狡獪往往以神通游戲偶拈句子而從之者效之遂或以湯休之業唐突圭峰者不可勝數乃奕公視一切所有總若塵土而徧欲實諸所無亦以文字為游戲夫以奕公之才向使讀儒書智髙于身而力多于髮以之為學事為世業為儒門經術計藝未知與鄭𤣥盧植輩相去何等然且勤息于彼而屏跡于此猶能出其餘資于不二法門之外回偈為詩回梵字作師宜小楷世之為詩為小楷者無以過也然則奕公之所到豈有量矣奕公居嘯隠錄偶吟一巻見示凡詩若干首佛家所謂大海之一滴者奕公請序之因序西湖蹋燈詞序往作京師蹋燈詞而京師無燈惟廊房百餘家各燃燈兩櫩間並無山棚露欄并棘盆綵竿之見于街陌而九門喧然蹋終夜不徹好事者遂各為之詞以紀勝事今杭州燈市不減曩昔獨西湖無燈馬君逸千乃作西湖蹋燈詞六十首傳于人間豈亦京師蹋燈之意乎孔子告子夏有無體之詩無聲之樂以為心存禮樂則不藉聲容之發而皆得其意西湖固勝地又值燈節則凡樓頭紅燭塔心佛火與夫漁炊嵓竈船星隄月之相為照映皆足當九枝百炬而逸千一一而摩畫之東棖西觸情思滿前此豈南渡以來上元紀事之可相彷彿者幼時宿湖濵三門不閉笙歌燈火中外相接今不可得矣邇者聖駕南幸宫車先後從三竺還蘓白二隄皆籠燈樹間晃朗如晝雖京師安福門觀燈迎仗無以過此此則西湖之所當蹋歌者也逸千亦進而補之乎何氏二童子擬應制詩序何氏二童子者何曽園東部之季子也東部擅世學其長君慎言既以藝文噪于時而晩得二子先後競爽觀者謂其有三珠之瑞焉特東部宰桂東時攜二子從予嘗聞其名而未之見也康熈已夘上觀河南巡駐蹕杭州㑹東部君以内召需次已攜二子還江干迎駕之餘朝賀行在二子因得隨父老往觀擬應制詩若干首將懐之進獻而以年幼未能上趦趄而罷予乃過二子出詩讀之一何髙文典册超等倫也杜甫有云往昔十四五出游翰墨場讀者每嘆其夙悟而既復有詩又云憶昔十五心尚孩健如黄犢走復來則未有童心而能以翰墨為馳騁者得毋所言非實錄與今弦石年十五韋江年十四實能挈筆伸紙揮灑顧盼于座客之前湯湯涌涌然且大篇短章皆成榘矱羽翼成而文彩備此非健犢往來所能到也在昔天子巡狩賜髙年粟帛而童聖兒哲亦得間引為鵷雛鸑鷟表人國之瑞惜二子趦趄未能有先之而使上聞者然而夜光之珠終不可掩杜甫不云乎丈夫生兒有如此二雛者名位豈肯卑微休吾將拈其詞為二子贈豈有過焉就正篇序猶子逺公偕計車行者十七年兩為南省首拔士而詭得復失遂操筆為歌曲遊于酒人出入王門間幾不得歸暨歸而悔之乃復俯首為舉文鉥其心劌其胏腸必幾經頓挫而後快然而出之故文窅然以深復曠然以解世之謀篇者莫過焉夫繳鳥者得鳥而棄繳意不在繳也柴魚者既取魚而漂其柴而不之顧何則以所求不在柴也今以入林臨淵之暇進無所得退而修器猶復就傍人而較器之利鈍一似沾沾乎繳與柴而不忍釋者夫亦以矰繳雖細傍觀極清葢必魚鳥之見親而後傍觀之利鈍于以出也結網者忘筌之前事也丹井山房詩集序予以殘年住杭州思得宿好者與居因僦竹竿巷與老友顧侍御君為比隣而侍御君辭我去已七年矣吾早知侍御君有後杭人無大小皆能稱顧十八郎第甚弱不得而與游也間過其所居見其户外屨日益滿其先人所藏書日益増多榻案間瓦漆銅竹諸器物日益完且好其吟篇寫軸日益富七年之間仍得安居竹竿巷以游娱其中非東隣有人不至此昔人謂阮嗣宗與王涼州游既而與其子安豐為文酒之友世所稱林下諸賢有阿戎者十八郎非其倫與今年秋以文戰得勝將攜其文游長安而以所著丹井山房詩示予㸃定予廿年不為詩故亦不能閱人詩然而好與惡心所知也少時出游必載已所為詩與世相唱酬比歸必捆載盈車篋而後返爾時心儀者豈伊乏人然而五十年間傳者益少雖詩固難傳然其跡亦陳矣丹井詩上追初唐而以中晩為門户雖資州棗強松陵東野亦復窺其樊而闖其奥然且推陳出新若惟恐塵言之殢其筆者予嘗謂文章千古事原不宜妄逐時好而性每喜新老年減滋味雞猪魚羊日溷乃公可厭聞明季白門有盒子㑹每月節勲坊貴官以鮮味相餉有沙菘土藕銀餅法鯽諸物每一念及輒饞然朶頥思厠身其間而不忍去何則以其新也吾讀丹井山房詩而喜其新而不可厭也因漫取其篇而為之書之丹井山房者侍御别業在葛洪井傍非竹竿巷居也鐵庵詩序古文無言時與景者日記游覽記皆漢後之作也亦無言情者寓書贈答序皆近代製也其専言時與景與情者在三古以旋惟詩耳然則賦詩而能静領節候體㑹境地終其日閒觀性情以與世往來宜在釋氏而自唐迄今傳者多有顧求其顯著一時與李杜王岑争先後者卒亦罕有則以寫景搶卒便涉疏俚造情喭朴反成鄙弇也鐵庵和尚為平陽付法子弟而下筆為詩如湯休如靈一如賈浪仙辭致結屬韻句纍貫就其體撰而皆得其言情言景之趣劉夢得有云片言可以明百類坐地可以役萬景此其是與鐵公住平陽與越人游越人無言宋詩者今將歸淮南行脚道路亦定無有以弇鄙疏俚之習汚我念誦惟是淮南舊游地且多勝景而其中人士亦往往與予有疇昔之好他日能憶我未免有情當復記其所游覽而示予讀之日南和尚増釋感應篇序無所為而為善不必有所為而不為不善世有幾人下此則第以有為之學分别善否雖夫子不答南宫括佛氏言因果即是下乗而要之福善禍淫與三緣五覺之説彼此並行惟道教言太上者則不及焉自趙宋理學祖述老氏濂洛大儒皆以華山道士為之宗于是談道教者小變其習諱為我之學而講大同因之有感應一篇流傳人間而宋史之輯藝文志者遂編入之迄于今天下之舍因果而談感應者非一日矣越州日南和尚繼弁山之席闡導諸方將以不二法門絶一切因緣而乃較論感應篇以示世世遂疑西來心印降而為道士無賴變言禍福之所為而予不謂然少時聞二氏之學輒起攻訐而既而誨之三教本不同而同歸于善雖道之所謂善或非吾之所為善而其為感應之善則無勿同也易不云乎積善之家必有餘慶積不善之家必有餘殃此為隂陽言之也性也繼之者善也中庸不云乎禍福將至善必先知之不善必先知之此為至誠言之也道也明善所以誠身也伊訓不云乎作善降之百祥作不善降之百殃此為凡為君者言之也治也合天下而同歸于善也然則三教無異同道術無大小以此見性以此誠身即以此治世善之為用亦大矣日南自作百善圖以為修一善心破百種惡修百善則惡亡矣夫以有善無惡之性修為善去惡之身進而治盡善無不善之天下吾未見以善為事之為禍事也吾未見以善為言而猶曰非吉人之言也然則道書何害焉西河集巻五十
