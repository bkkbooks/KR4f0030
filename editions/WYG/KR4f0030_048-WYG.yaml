body:
  text: 西河集卷四十八翰林院檢討毛竒齡撰序二十五重刻荀恱漢紀袁宏後漢紀序六藝家史家失傳久矣皇上搜經學之在章句外者侍衛成君應詔梓經解數十百巻而隋唐以前抄括無有祗一子夏易傳而侍衛原序尚三嘆為宋元間人偽書則他可知矣襄平蔣蘿邨梅中兄弟嗟史學之闕謂自典午後八書南北合成十史而五後十國五十餘年間寥寥數䇿僅傳歐陽氏史得一失伯將取扈氏盧氏梁漢周三史所未傳者合之十國編年諸書以備五後因先梓馬令陸游二南唐書行世而以為未足復溯自二漢紀舊唐以迄宋遼金元逸史之全將循次編補匯成大觀而惜乎以他事沮也余嘗就蘿邨梅中聆其談議謂兩漢二書皦若日月逈非二紀之可比顧各有相發荀豫前紀作於漢初平興平之間已習見班氏成書而應詔減省創立五志以補春秋考紀所未備若袁虎後紀則先於范氏所作五十餘年其中多范氏所刪取而不盡錄者二紀之當具比之易之有荀九家禮之有熊氏皇氏所應重標其書為逸史倡故不憚亟為梓之如此至其所讎校則初購善本於吳門宋開府署得明嘉靖間姬水黄氏所勒本續得宋版前紀於項侍郎宅又續得明南監本後紀於吳宫允宅互相參對補其漏而更其譌疑即闕之不妄填一字起自乙亥冬十一月訖於丙子夏六月㑹其尊大人由兩浙行省左移參知從杭州寄居吳門中間多曠月凡八閲月工竣自古學淪失士子習一經競為舉文茫然不解典籍為何物即一二知名之士槖筆載牘日以文賦相矜髙而巾箱五經匿為珍秘一遇史事即司馬光稽古錄無不張口㰦㰦不能略辯而蘿邨梅中年不踰終賈胸懐萬巻其能網古今而羅百氏如是是非古學將興有應運而先開者邪吾願天之假以時而得盡踵其所為志也五雲唱和篇序易曰方以類聚詩系曰才人當叔伯而予汝以興故白傅守杭元九為越州觀察始製詩筒而涪翁與眉山則各以著作為丹禁詞官因之有蘓黄唱和之作葢吹律用同而躍劍當合理固然也浣廬彭君為襄平異才當未通籍時即能讀等身之書出其所為詩與京門賢豪争長藝壇有年矣顧往往取法最上擷漢魏晉唐而踞其髙步睥睨宋元下如蛙鳴鴟哨唾㚄不屑予嘗聞其人而思一見之乃筮仕縉雲寄蹟山僻固知龎公非百里任然且一行作吏文簿鞅掌雖才大不擇而種花種秫究之與鄴宫酬唱之事稍有分別顧下車未幾而刑清訟簡仍然以詠歌風雅當揮絃之理㑹吾友蕉園擁皋斯地珪聨璧合叔伯予汝因為唱和詩而錄以行世吾聞東甌山水以括蒼為勝而括蒼山水則又以仙都蓬萊擅全郡之勝道書所稱一十八洞天此其一也地所鍾靈必産人傑乃計之前代自趙宋王伯厚後終鮮文學而近則劉君在園以括州刺史名過北海君復得以縉雲之長超李陽冰而上之而蕉園尾檡山後並厠不朽覺一時名士共集其間不可謂非山川之勝事而予以七十四叟寄數言以題其端延津飛劍千里必合世之見之豈止占類聚之爻諷蘀兮之什已乎雪園集序予與昌其比隣居兒時同學于塾師沈四先生之門予九嵗為文十嵗出赴試應童子科而昌其小予三嵗甫九嵗而即應試嘗曰吾無以過君然先君作舉文者穀一熟矣既而丁國變燕京不守留都之建號者相繼潰西陵烽火達甌粤里中奔逃予方避南山與沈七包二先生蔡五十一子伯為四隠闢土室列藏書室中刻日遍讀而昌其方竄處山隂之馬社不相聞也及王師東略地風鶴稍定予出為文社考鐘伐皷號召諸名士始得偕昌其領東江之㑹飲酒歌呼流涕道故舊然而昌其已就試每試輒第一聲名藉藉雄長諸試者諸試者見之輒相下呼為先生當是時昌其間為詩曽以一巻示子伯刻之問世世多稱之然實未見其全詩也暨予避人去周流淮蔡不相見者越十年而昌其已厭世不得赴嘗謂昌其賫志殁恨無表見舉文不可驗而生平詠吟且無所聞于時也乃予請假歸杜門十年而昌其令子能發其先人所藏較讎篇什搜簡諸闕軼付之梓而屬予為敘方予與昌其游時沈七早殞而子伯與包二先生則各有詩文數十巻藏之子舍乃數年以前沈七所遺子折而無嗣而今年八月則子伯之子不幸已娶婦而天祝之其所遺集且不知棄于何所祗包二先生孫枝已成長其别集中有所為蟲弋編者約三十餘巻予囑之早刻而其孫不戒為無賴子弟竊數卷去而昌其之子獨能保愛父書遍收其瀋澤而使之嬗後夫昌其之過人者不止舉文穀一熟矣袁春坊試浙紀程詩序當在史館時與袁子杜少分㕔起草毎牕紙日落必撤筆相對吟一詩然後騎馬出東華門計長安聚首及今相别南北各異地掄指約十五六年㑹丙子大比皇帝從撻伐還允橅臣所請擴鄉試額而杜少奉天子簡命主文吾浙因得于榜發之後循例謁謝見杜少官亭把袖如不相識其毛髮容齒皆大減于昔知其以終養復入官勞苦乆矣然猶四顧轢落意氣慷慨如平時自道無恙外愬言中簾燭短書日閲試巻無暇與㕘房賦詩倣嘉祐時事惟是乗軺南來津亭紀程合得絶句若干首以問吾子予受誦之其風骨峻上覺與當日相對時不甚相逺而乃身踐修途心懸魏闕就其所經無不以承詔品目偶佚繩簡為兢兢未剖蚌而愁得珠宜乎青嬰滿車篋也夫罔象入水不辨龍魚況以漆室探麩金而稱量璅屑錙銖不爽此豈易事杜少自言曰予甫入公舍而撫軍以廣額見咨遂喜為口號以附之紀程之末而揀所為詩適得七十一與撫咨廣額之數合其通于神明如此特予則重有感焉昔有謂長安之月明于鄉縣洛陽之花燦過他谷者非花月之有殊而所見之地異也今杜少銜使異于曩時而予則歸田有年逺不逮騎馬紅牆相對詠歌諸舊事而杜少為詩與予觀杜少之詩前後若一夫杜少千秋豈復以頃刻為今曩者哉然則繼此相思其觀杜少之為詩亦猶是已重刻楊椒山集序少讀王章傳涕泗被面驟出對客不能飾客訝問故曰吾讀王仲卿傳故也既而讀楊椒山自著年譜驚曰此非仲卿乎仲卿學長安獨與妻居疾病無卧被入牛衣中與椒山讀書無卧被同仲卿為諫大夫進左曹訐宦官石顯免其官與椒山為南部員外進北部劾咸寧侯鸞降典史同仲卿起司隸校尉進京兆尹遽劾帝舅大將軍輔政王鳯下廷尉獄既而死與椒山起刑部員外遷兵部武選司遽劾相嵩下詔獄辟死又同然且仲卿之封事以日食椒山入奏亦以日食仲卿之得罪以指斥張美人故椒山之得罪亦以扳援二王故所不同者兩人之妻皆沮其上書而椒山張夫人乞代夫死仲卿未有也然當仲卿下獄時妻女皆同時收繫女年十二夜起號哭曰平時獄上呼囚數常至九今八而止先死者必君也及旦而仲卿果死妻女徙合浦則是其妻之罹慘較有甚于椒山者予嘗入史館詢椒山傳同館官曰未􅍐也曰此一代有數人物當特為起草而俟􅍐分乎同館官不答既而微聞同館有進劄子者曰孝宗非令主陽明非道學東林非君子謂夫儒者言事但當以迂全不以激骫東林之争每始于意氣而終于朋黨此皆嘉隆間戅直諸習有以開之葢暗指椒山言也予曰然則如漢王章者非君子耶曰章不識輕重亢言殺身何有乎君子子不讀胡氏致堂諸史論乎其于兩漢人物率詆之不直一錢是以朱氏傳王荆公為名臣而稱秦㑹之太師為致有骨力何則不輕舉也夫以岳忠武之死而猶譏其横刺其直向前厮殺而無所于變也他可知矣予氣塞而罷然而歸邸撿舊史見趙宋兩朝當君國之慘死事者不下十百而宋史忠義傳並無一講學之徒厠身其間然後知薄事功并薄氣節皆宋學之陋而非恒情也今予去史館又十年餘矣康熈丁丑同邑章子鈺有感于椒山之為人取椒山所傳年譜與其生平詩若文合上下巻將刻以示世而屬予為敘予讀之淚滴滴下一如疇昔讀王章傳時雖不講學不汨其本心而章子以藝林之豪攻經生家年不及賈生獨能發奮忼愾聞椒山之風而興起焉且復輯其遺文惟恐其不傳于後而汲汲示世此非君子所用心乎夫椒山文士其于聖學未知其有當與否然而讀其疏而知君臣焉讀其諭兒文而知父子焉讀張夫人代夫疏而知其夫若婦焉讀王繼津書與弇州王氏所為狀而知朋友之交焉至于兄弟則年譜所記彰彰也近之言學者動輒輕事功而賤氣節至有訐陽明之學以明得意者夫陽明事功固所宜薄然而氣節者君子之梗概也椒山不幸與王章同兩漢儒術乆為宋學所不許而陽明又不幸而龍場以前同于椒山道學既難言而兩人氣節又百不如權相之骨力然而猶尚有讀其書感其為人惟恐其不傳于後而汲汲示世如章子者則是人心之未亡而君子之猶可為也世有見斯集而興者乎其亦以予之讀仲卿傳者讀之可矣郭總制觀風集序古總制方州之任雖宰相遙領而雄藩鉅鎮實専武事惟幕府辟士其聘舉之盛每與公府置吏王國命官相表裏而今則文武並憲三載論秀首列其銜于貢版即下車伊始亦得課士文而驗士習之善否謂之觀風此典自開國至今彪炳乆矣汾陽郭公膺天子寵任由直隸中丞總制閩浙甫朞月間即能揚清激濁振肅綱紀使官吏望風知所取法循良者相勸而貪墨誥誡灑滌自效父老謳思謂公駐閩疆旌門間隔但願一見公顔色捧公衣若履瞻公眉展頥揭嚬笑叱咤不可得而多士何幸遂得邀公試奉公教誨受公簡拔而拂拭則是四民之所先莫如士也乃士亦感激軍門頒賚即藉之以梓其文傳播逺邇且復以予職詞翰屬記事以弁其首夫文事升降闗乎氣運至治將開則其文昌明博大並歸雅正浙地雖多才而一經指授文教不變固不待言特予聞去秋北征皇上從黑魯侖還念公勞苦命畫苑從臣繪闗山堠望圖于扇并手書御製凱旋詩一章勞賜之且諭以閩地濕熱解以清風雖君臣相悦情愛實深然亦見聖治無偏其于武備稍間即不忘文治如此今小醜蕩平要荒來王邊闗數萬里皆我輿服六師奏凱正普天歡慶仰賀昇平之日而公以試義一編敷揚文治且即以此當歌詠黼黻之具則是錄雖微似亦報清風之諭之所自始也吾知文武憲邦之誦將從此進矣因于編輯之次謹搢筆抃舞而附以是言彚刻小試文卷序唐宋赴試舉子先以詞業進所司詞業者舉子生平所為文也明即不然士當應舉即自閟其文不令與所司相通而居常肄業往往羣連類集創社于枌榆之間載筆無幾何輒板其文以行世較之鄉舉之行稿禮部之房牘倍為張大苟非社業有名字即見舉禮部仍不得預館局侍從之選而今又不然士子不創社不板文出其詞業不得與行稿房牘並行藝林然而行稿房牘之為文則皆其文也禮部無房本而鄉闈撤簾後行巻不齊坊選搜未售之文偽為舉業而見舉者亦復遍假諸他人以自文其陋雖未行然行過畢焉徐子二吉偕同人為文聲應氣求未嘗挾敦槃賛牲醴皷鐘燕飲徼盟㑹之習而聲氣所感羣焉以興其文早播諸逺邇其應試而見舉以去者不可指絀乃不假詞業不需社文簡生平小試諸牘板之行世夫試牘與闈牘一也試于鄉試于禮部與試于州縣亦一也見舉者既得挾二試以行于時而已舉未舉亦各得因諸小試以自見其技九鼎在門無異于在廟而太阿有神可以剸兕虎即可以揮晉鄭之兵之衆則雖小試文巻自當與兩闈朱墨並行于世又何有于唐宋詞業有明社義之紛紛者為吳司教偕許太夫人八十雙夀序庚午之秋吳子介臣以第一人領是科解首而予兒次之故事同榜者敘年錄錄其井里氏族與二親之存者否而以兩存者題為具慶時開巻得具慶二人羡之顧予杖鄉乆而兒以類我未免懐本生之嗟惟介臣承歡在堂白首無間言予嘗讀孟子疑君子三樂上及父母中及俯仰下及教育而獨不得于一身出處之間分别顯晦豈薄仕進哉以為仕進者用以樂親而非吾所為樂之之具也乃介臣自言曰吾敢以父母之年徼榮顯哉夫父母何年耶幸而兩附計車去不登于禮部猶得以負米歸來着斒斕衣萬一通籍而致身則此身君身也其將乞此身以事親難矣于是端居子舍者又六年㑹天子從北伐還偃武修文仍然以鄉比當解士之嵗而介臣尊人先生年七十有九明年方杖國而太夫人許太君則正八十時也親朋謀所以為夀者而乞言于予予聞先生籍婺源族甲地大兒時親見其祖伯以太常卿抗疏劾魏璫救楊忠烈直聲震天下而先生弱冠受四門博士貢留都相争上進以不負門閥乃鼎革以來僅得充分水教諭即以孟安人在堂乞養歸里而太君少貴本中丞女孫而鞠育于世父大㕘公家其時一門濟美方遭鼎盛而太君之兄由副使分守蘄黄為憲賊所脇不屈被害雖已經贈䘏進太僕卿而終以一身許國之故家世中落太君毎言之而疢然于心故先生平時讀書訓子未嘗不汲汲仕進而其終生拮据者専以奉養孟安人為兢兢是以兵革甫定連值嵗歉而太君以珠玉錦繡之身為貧家操作不少懈怠然且以先生當幼子不能晩嵗承二親為歉今先生暮強耳目聰明骨綮而筋堅手無所攜持而足能濶達衣冠方幅率士子談道娓娓終日不少休予嘗欲舉耆英之㑹追隨步後塵而尚有待也太君盛母儀諸通家子拜堂下者摳衣問起居畫冠綠髮步履飲食如平常凡此皆人子之所願望而未易幾者夫年登八十一難也齊齒二難也身其康強而不為嵗月所耗蠧三難也況乎以稱觴之年當解士之嵗介臣與諸士同登建禮使仍首兩試耶則入官禁近當築養堂于京師而苟其從槐㕔學人選入東館則邸舍迎養亦正不廢是三樂之外抑别有所以樂親者而吾即于是而進思之初歸田時厭為夀辭擇其年之髙者八十九十間一應之而近則概不一應以為年踰七十安可以番番之老捉筆媚人以故繡屏錦幛皆任人為辭而署名其間獨于先生與太君忻然槖筆此豈以予兒同籍之故阿所好哉夫亦以推之古今而未易覯者則泚筆其間而深有幸也而況家人之當此者也龍山祝矜刪詩序予自乙丑歸田後年踰六十老且病不能為文辭遇有親知作慶弔屏幛􅝩石及詩文集序聽其自為文署年月名字與印記去且有偽為予手書以付碑版者予見之俯首稱不敏不敢直如此者又十年矣祝子矜刪偶出其近詩屬予為序予愛而留之不辭又不使自為然又急切不能應棄之案左者越半年自忖古書畫家見名人蹤蹟眷戀不釋然又不能弁其前而躠其後㸃次其佳好則但為署一名曰某觀予之讀矜刪之詩可無署一名以厠其間與近世為詩者好談二宋而今則又當小變之際明時郛廓既已灑滌而二宋佻喭諸習亦復去之恐或後則迄今以往自宜有獨闢意境推陳出新者為之更始而矜删先之予觀而知之然則觀之無以異于序之也夫以矜刪之才之學其為古文今文無不超然獨得一往多上人而予皆得以觀之而知之也而況于詩已胡飛九詩詞集序學者之兼才伸于彼者或絀于此張平子無五字佳詩而使梅都官與栁屯田易地相觀則詩詞闕然況近代舉文别為一科又復方圜黝堊必不能相通者乎以予觀胡子飛九即不然飛九名家子席其世學甫結髮即出與藝壇長者相為雄雌嘗自號潛九又號飛九雄鳴雌㐲吾不能測其飛潛之所至然與之相對如泰華竒峰􅈝立千尺而沕然穆然與之偕忘于無言之天至感時賦事偶爾觸發即指爪飛揚興㑹勃勃然且匠心絀折比于纂組機織之巧利青黄藻米抑何神也去年冬飛九以小品詩詞文草示予予留諸几案不能舍去惜年老無賴每言念舊交惄然傷懐而飛九集中諸贈答皆當時耆舊四十餘年所離别生死契濶而不得一見者而皆于是乎見之即此間名下若宇台景宣秦亭野君諸老友洛濵褉飲相對愾忼猶宛宛若昨日事而況其他乎然則飛九之詩文與詞其乆為耆舊所稱許有如是也吳中書廬墓序古倚廬在中門之外苟無故而夜居于外則見者弔之是以禮曰父為衆子則不次于外凡以明廬次之必在外也今門不設廬庭以外不設堊室有就墓堂寢枕者輒以為廬墓非孝道然則未卒哭而反于寢始為孝與夫古之不廬于墓者非謂墓不可廬也亦曰死徙無出鄉凡塟親者必不出井里之間而古之塟法不令妨田縱去棺有咫猶且起而藨菑之夫是以不壤不樹雖欲辟苫塊之地而無所容也今吳子以宰相判官上其母一品夫人塋之空山而廬于其傍人以為怪予聞而善之夫斯禮不行于今幾三百年矣幼時聞先君守墓駕言種桐而借宿于墓隣盛氏之門而司空張嵿且復以愛楓為名自號楓丘因徘徊楓間以寄慕思何則恐驚聽也今天子純孝當太皇太后賔天之年曽具巾葦廬居于乾清門外而臣工化之相公李公遂歸廬即廬江而廬之北門之岡而予友祭酒汪君就西湖壠間而堊室焉乃吳子復相繼起是數百年來今始知廬墓之無所否有如是也夫里門厭居即山陬海澨猶思張㡘幙而寢處其間而況先人之樂丘朝斯夕斯其與夫望都亭而馳哨堢者且有過也然則此亦安閒矣世有謂此為不孝者且讀論語註有曰人性止有仁耳曷嘗有孝弟予乆深惡之而無所發因題其篇云西河集巻四十八
