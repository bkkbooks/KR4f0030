body:
  text: 西河集巻四十七翰林院檢討毛竒齡撰序二十四送潛丘閻徴君歸淮安序予避讎之淮安與淮之上下無不交閻君潛丘在其中暨之梁之宋不能前復歸淮安則稍稍有言潛丘君年損而學多者于是躬詣之與之登城東程將軍塜題名而去顧予變姓名獨于淮有識予毛生者予漫應之曰毛甡于是有毛甡與潛丘君游墓之題當是時淮徐之間能言江東毛生事此其一也及予還舊鄉㑹天子開制科徴車四出其在淮則潛丘君首應之予相見于京師觀其所著書夥頥哉言洋洋乎乃不登科而罷值司㓂徐公修天下志書未成聘潛丘君掌其局多所論著既而謝去出其所辨尚書二十五篇廣其文約數十巻挾之游錢唐時潛丘毛髪種種而予則歸田有年越七十衰矣乃取所為文讀之謂之曰吾不知於漢北海君相去何等若唐之孔仲逺趙宋之深寧叟則出之逺矣潛丘曰知予哉盍為我言之予思元明以來無學人學人之絶葢于斯三百年矣生為舉子文志下矣識亦并陋前無師承後復鮮讎駮者幼合四友學古學予文中每及之所稱沈七包先生蔡子子伯者其二早死而包先生號書簏雜著四十卷今其子不能守索之無有也子伯以文多不醇不肻示世予則年未壯而避讎人間越四十而歸其不能為閉户生明矣且性魯又不能閱市肆有所記憶而以觀世之為學者枕藉焉漁獵焉其能飛一羽而穴五甲劖腹而透脢視肌理而驗㿂結者亦復安有而潛丘疏其容復極其裏自竹木番頁以迄金石甃甓浮圖欐礎無不蒐刻于天識其行于地見其理于人自疏仡以還可得其容貌詞氣于時日判其晷景于倫族無逺近必析其母妻子姓傳婢厮養于篇帙備列其編摘分合字畫戈波之數嘗謂予固不學人也即以求附于學人而其失有二其得有一好大而苦煩一失也見其一則不耐又徴其一二失也若夫得則他之博而不通者吾不博而通他之學而或無識者吾不學而有識如是而已潛丘無二失而饒一得世每言北人之學如顯處見月雖大而未晰也南人之學比之牖中之窺日見其細而無不燭也潛丘乃兼之禮堂寫定傳與其人予雖非桓譚且見潛丘之能傳矣于其歸也遂序其言以送之亦欲使淮徐之間其知江東毛生所與潛丘論文者又如是也浙江鄉試鏁院中秋倡和詩康熈癸酉浙江舉鄉試巡撫御史張公監視院事舊例八月十五夜席舍給燭監臨偕提調監試五公座設饌于明逺樓上綴席醮月公乃循故實與同事諸公銜茗具槃槅雖樓已改製減去重屋猶且雁齒坐敞櫩下口占三律諸公疊成之即簾外諸司薪膳封錄多有和者暨撤簾而主文兩公亦依韻得三首合并授梓名倡和詩嘗讀唐人詩話載知舉賦詩秪得井亭梧葉一篇他並無有惟宋嘉祐間歐陽學士偕同知貢舉者鏁院五十日得詩如干名嘉祐倡和詩顧皆主文參詳官為之非監院也今則鏁院日促且巻繁主文小試官各給手目之不足何暇及詠唫事而監臨公座于蒞事之頃從容賦詩一雪前人所云三條燭盡擁枕髙卧者此又増聖世鏁院中一盛事也因為通讀之而敬題其端在籍史官某頓首張禹臣詩集序詩有性情非謂其言之真也又非謂其多愬述少賦寫也當為詩時必有縁感焉投乎其間而中無意緒即不能發則于是興㑹生焉乃興㑹所至抽思接慮多所經畫夫然後詠嘆而出之當其時諷之而悠然念誦之而翕翕然凡此者皆性情也張君禹臣少為詩予嘗與陳老蓮游酒酣頽然必誦禹臣所贈詩􅉡然淚下今五律巻中有贈章侯題是也暨予逺遊歸每見禹臣詩人有比之羅昭諫者而禹臣方攻舉文予亦北去不相見㑹予以年過七十老且病就醫㑹城則禹臣亦逮老髮齒俱改乃不以予為不學出其詩請序予讀之詩凡十巻巻若干首其中樂府古今體昭晳清潤動合榘則即恭言詄貌多所縱變而皆有性情行乎其間若所云情為文經詞作理緯者乃禹臣自言作詩無他貧無所事事觸處生慨遲暮棄諸生不得志胸壘壘矣又役于他技為人相隂陽延翰之術勞苦且闕後目前無可為撫弄者夫如是則不得不藉詩以忘之以陶寫其心夫以遭逢如是貧且老如是困苦如是而能慨于心發于言陶寫于中而嗒喪于外則性情為之矣世無詩人謂唐舉詩而能詩今世舉經文而不能為詩觀唐無經解而今能以經為文可驗也夫以經為文而尚得謂之解經也乎唐舉詩而能詩今不舉詩而猶能詩者則猶是性情之故而世顧不察因于序禹臣之詩而遂及之慈雲寺新翻大悲准提二梵咒解序釋書有顯宻顯者其經宻者其咒也自少林傳印不立文字則并顯者而宻之以為阿難説法究歸耳宗必返之迦葉心度之宻而于是一指之示勝十六觀焉少時搜佛藏見瑜珈儀法不得音註即諸經梵咒亦並無釋義行乎其間妄謂宻部無解解則不神遂致彼傳此受展轉訛錯梵音無定字而既則并其音而移之口語株離其了無證明乆矣伯亭法師通四道大藏修馬鳴以來法海諸觀儼日月燈之現于口目凡顯宻各部無不洞其原而究其裏方闡燄口施食儀開千古聾瞶解釋之餘并及諸咒㑹司天鶴亭邵君歸田有年曩時得西僧祕授博通四譯間與師考晳論辨廣所未備每得之名義諸集之外因以大悲准提二咒為世所習誦者先為解註聞之大悲者觀音之心體也准提即諸佛覺性也大悲之咒譯于尊法而准提則龍樹所集二咒奥義從未翻解而今忽解之得毋祕㫖之洩為且明忌而予不謂然夫瑜珈通四法咒字具四悉夫人而知之矣然而一指之禪未嘗不洩觀經日誦未嘗不祕今所謂宻徒字音字形耳堯語舜云允執其中夫執中語字何嘗不顯然而舜受之禹亦受之他人勿受也古徳云諸佛宻語惟聖乃知今茲所翻雖曰一切乗境行果莫不相應仙陁㜑名鹽器水焉則莫不稱契然而其㫖深焉則使誦其文而當前了悟固所願望即不然而憬然于心犂然于耳目縱未及其裏而從此有省疑義生而信心起何為不可哉馮使君錢湖倡和詩序使君即馮躬暨世兄也嘗讀西江倡和詩嘆使君以郡國之長鞅掌文簿尚能與坐客賢豪競出其清新之句以互相贈答予歸田有年在籍閒人出而與使君主賔相見不一然且所至無一字讀而媿之今使君去郡未補擔囊來錢湖重與二三友朋􅉡盤酒榼叙疇昔之好往來雜遝因復有倡和之什傳于人間夫以使君之才當二三友朋賢豪之舊即微君錢湖其為登臨詠歌者自必抽新摘穎争出所未有則其詩之工不減西江固無論也獨予僦錢唐與湖隄相去不越數里亦且偕酒人相謁執手慰勞然仍無一字可以相餉徒把此一巻為之吟詠愧乃滋甚聞之古友朋㑹合多所贈答如鄭僑晉肸輩見于春秋顧未嘗為詩也誦人詩耳即良時髙讌賔朋滿前有若庾公在武昌歡飲達旦然祗稱理詠理詠者誦詩也予雖老去才盡而齒存心力衰而口尚健縱未能詩讀羣公之詩而一如已出口之所至心以為善則請誦諸詩以當賦詠寧有異焉三韓張氏家譜序夫輯族之法先分而後合其先分者何也分姓為氏分氏又為族也國君禪一姓而卿大夫下則各受以氏而判以族而後合何也一姓合諸氏一氏又合諸族也國君以一姓綂宗而大宗小宗則又一綂氏而一綂族故禮大傳曰國君有合族之道又曰尊祖故敬宗敬宗故收族其或分或合各具條理而要必有人焉立書册而稽覈之國語所云工史書世宗祝書昭穆胥視此矣自封建不作氏族不分而後之為世系者第合古之一氏者而不辨所始嶓其源岷亦其源也或析今之别流者而不知所收潛不知有江沱亦不知有江也三韓張侍御以科目起家遍歴三曹尚書郎從征滇南佐王師撻伐有功隨以言事故遷幕杭州其滯錄參有年矣生平孝友惇睦每念及所生期于無忝教子弟以詩書之澤乃復續輯其家乗而謁予以序予思遼左諸族皆從龍之胄世甲地大巋然當豐沛宛鄧之鄉其通侯代興冠金貂而錫履陛者不可勝數而侍御家聲爛然獨慨念先烈上溯之千里之侯百里之長以著所自來而所輯家規則又以砥行飭法勤學務業為兢兢是何席寵而思遙履貴盛而重本根一至是也夫圖系傳述仿之史氏以為家國雖殊記載則一而近為譜者第凖之唐之氏誌與宋之族譜著為科律而不知支派分合當遵古法夫清河曲江代顯閥閱凡連天之姓誰不視之若崑崙而侍御悉屏却之而第肇基于醫巫之丘是分者不輕合也然而萊子之國東近營州明時遷青齊巨族以實遼海四郡雖大究以膠萊為涓涓之地是合者終不可分也然則工史之書世與宗祝之書昭穆悉視此矣夫侍御以用世之才不竟用之國而區區經畫僅見之家門之内固為可惜然而工祝之所書較之太常之所紀未有歉也則即此一書而頒之國門永為凡有家者所取法何為不可乎梅中詩存序世無甘蠅非謂辭金僕而却銑珧也又非謂河中無弓人而封父無繁弱也方其家居懸蟣虱于牀柂之間閟其耳目而忘其筋骸初亦何敢謂天下之射必無過是及一出而朔蓬之抵所向無敵然後知射者之絶人逺矣惟詩亦然挾平水一本購劍南石湖一二巻意氣湓湓搖筆滿天下出以之為摯而處以之為徴名傲物之具人之望之者亦且辟易却顧莫之敢抗然而十餘年間自都市以至陬僻指詘心計求其得當于是者率刺促恝屑而眎若無有是豈操觚果無人而倡酬絶于世哉其所為詩者非詩而所為射者非射也予乆知蔣子梅中與其兄嵩臣各能以詩文名人間每見其投贈而思之既而得其所纂為律韻一書嘆其深于詩而并及夫詩之所為押四始雖絶當必有起而續之者今讀梅中詩作而曰甘蠅哉世無射者而今忽有之世已無詩人而今乃得而一見之斯時也而有斯人詩之幸也斯詩也而見于斯時則又斯時之幸也江河而日下矣袒膊以為容詬誶以為言溲塍糞壤以為所居與所處而梅中以爾雅之才展揮戈之技去喭而進史去駮而進醇去薉臭而進薌馨去其近今而進于前古言格格精言律律妙是非有鉏之彊力所幾也是非吴太史之神臂所能至也世雖多詩人吾必以為叔田之後無飲酒矣詩名存言可存也然吾以為所存者不止是也倚玉詞序詞成于宋舍宋無所為詞也然而人好宋詩不以宋之為詞者為詞而以宋之為詩者為詞而于是宋無詩亦并無詞夫詞雖宋體然自唐後樂府減四十八調為二十四調而後詩餘曲子由大晟以迄金元其所為九宫十三調者皆二十四調之遺則上自齊梁下逮金元無不以是為宫懸戛擊之端原非北宋一代所得而限也故予鄉曩時有創為西蜀南唐之音者華亭蔣大鴻也其法宗花間而人之為草堂者却而不進有創為徳祐景炎之音者禾中朱竹垞也竹垞客予郡覔予郡之景炎處士所稱菊山唐珏蘋洲周宻後村仇逺輩而效其倡和相率為恝急偪剝之詞而人卒局步而不敢前迄于今又三十年矣杜陵梅中以風雅之宗領袖篇什乃出予鄉倚玉詞屬予一言夫倚玉詞許君又文之所為作也鄉人為詞者夙稱雪舫而又文接踵而興標新領雋萃草堂之精而一軌于正有近晩唐者亦有類徳祐景炎者要之皆大晟之聲也越中乏詞宗而前有華亭後有禾中今得梅中而三之宋人之詞于是有真面目矣予老去不能為詞居錢湖之濵而目盻西陵所謂青驄油壁者皆惘惘若隔世矣觀又文之詞細犢車回小蠻人去雖逮老猶想見之長生殿院本序才人不得志于時所至詘抑往往借鼔子調笑為放遣之音原其初本不過自攄其性情並未嘗怨尤于人而人之嫉之者目為不平或反因其詞而加詘抑焉然而其詞則往往藉之以傳洪君昉思好為詞以四門弟子遨遊京師初為西蜀吟既而為大晟樂府又既而為金元間人曲子自散套雜劇以至院本每用之作長安往來歌詠酬贈之具嘗以不得事父母作天涯泪劇以寓其思親之㫖予方哀其志而為之序之暨予出國門相傳應莊親王世子之請取唐人長恨歌事作長生殿院本一時勾欄多演之越一年有言日下新聞者謂長安邸第每以演長生殿曲為見者所惡㑹國恤止樂其在京朝官大紅小紅已浹日而纎練未除言官謂遏宻讀曲大不敬賴聖明寛之第褫其四門之員而不予以罪然而京朝諸官則從此有罷去者或曰牛生周秦行其自取也或曰滄浪無過惡子美意不在子美也今其事又六七年矣康熈乙亥予醫痺杭州遇昉思于錢湖之濵道無恙外即出其院本固請予序曰予敢序哉雖然在聖明固宥之矣予少時選越人詩而越人惡之訟予于官捕者執器就予家捆予所為詩爨毁之姜黄門贈予序曰膏以明自煎所煎者固在膏也然而象有齒以焚其身未聞并其齒而盡焚之也昉思之齒未焚矣唐人好小説争為烏有而史官無學率摭而入之正史獨是詞不然誣罔穢褻概屏之而勿之及與世之所為淫詞豔曲者大不相類惟是世好新聞因其詞以及其事亦遂因其事而并求其詞則其詞雖幸存而或妍或否任人好惡予又安得而豫為定之左季折衷序左季折衷者時賢之書也明嘉靖間山隂季本字彭山作駁左傳書名曰私考而生其後者又駁之取左氏之文與季氏之駁兩相較辨名之曰左季折衷然不知何人作也其書本雜論經史之可疑者倣王仲壬論衡徐偉長中論而雜是篇于其中顧行文寛博使才氣微涉宋人論辨諸習然而其議工焉今其書已亡不可考矣亡友徐伯調之孫文士也謂予曰故祖嵗星堂所藏書有抄集六本云得之祁氏東書樓藏書中者忽何有之人攫去越十年聞其書已刻他氏名又五年聞刻書者已死又聞死時其人每寢有丈夫者據寢間百遣不去既而死逮死不得証其書為何人作且其書無兼本罔所據又踰年嵗星堂移居遷故祖書得左季折衷十三篇于廢帙間是竊刻中所有者且係祖手書非從刻後抄得之是宜可據而不署名氏雖欲刋正焉而仍不得其所為人抑者先生冠以序幸存之以俟他日之自雪何如予曰有是哉晉向秀註莊而郭象據為已有南史郗紹著晉中興書何法盛欺其無兼本也竊而署已名二事聞者深恨之然而秀與紹其為名未嘗亡也今乃盜其文而其人遂滅東陽盧元夫嘗言著書者集他人之説而不署其名比之盜人葢諸儒老死著書亦欲有所傳于人而後之為儒者述其語而不著其名與氏千秋萬世後又孰知某説為某所云者雖以盜比之而不為過況果盜哉或曰盜書與盜財異等況非剽人賊而索之抵死已踰量矣尚何憾之有而曰不然今夫居計者生平積汗血以收錙銖而一旦攻剽胠篋奪其所有然且戕其人滅其口子姓不得知隣里不及與聞易氏禪代而終不得其存亡起居人必曰忍人哉雖抵之亦何足償而乃有劌其心鉥其骨刳其腎腸銷亡其年嵗寒暑精力魂魄忻戚歡宴之所忘飲食男女之所不給陽陽攫之而其人亦遂窅㝠歇絶如蠛蠓影響之不可復睹此在旁人聞之猶震心慘耳而況其受之者也鬼神有知將必重雪之而重還之矣吾故書之以俟夫後之雪之而還之者其所抄目曰左季折衷説曰亂臣賊子辨曰編年辨曰三傳學官辨曰晉文公曰隠公曰秦穆公曰衛成公曰公子叔牙曰首止之㑹曰王子虎曰趙盾曰武子來求賻道源田氏族譜序道源田氏稱蕭山右族其里踞東南近郊水環其樊分庖而同涂前坊後廬無三眷之殊無丞相司空益宅減宅之弊予每于嵗時行禮一過其家輒東西眺視不能去云暨鼎革以還世家大族率相顧冷落曩時所謂太傅之澤尚不能庇及五畝況其他乎顧宗事亦稍曠焉姊子三上係中憲公嫡派凡數傳而服屬未絶慨然以因睦合族為己任謂族大以禮禮合以序譬諸衣裳别之以冠純而望之而儀生焉譬諸宫室棟宇標之以閈閎分之以閥閱而就之而黨以辨焉于是倣有宋諸譜勒為一書追溯其本源而條其枝流有表有序有譜有傳往來稽核閲若干稔而工成可謂勞矣夫邑有世族則邑重族有聞人則族愈重吾蕭在晉朝尚有望計望孝諸族與㑹稽埒而唐宗檢正世譜合九百二十三姓則吾邑夏郭二氏公然居右今戸版衰減門望寥閴而為人後者尚能述其先澤以下聨族屬此非克家所有事與嘗簡邑乗係前朝嘉隆間東源先生與芝亭張君龍泓錢君所共編者東源先生即中憲公也中憲在前朝以文章顯及啟禎之末予方垂髫尚得見中憲諸孫衣冠方幅若所稱楚府典儀上林監正内殿中書以及明經嵗薦司教司訓者不絶于時曰此田氏聞人也無何轉瞬間已相距五十年老成典型並枵然無一存者而姊子以諸生繼起率能繼志述事以承先人所未逮如此嗟乎吾見田氏之嗣興矣西河集巻四十七
