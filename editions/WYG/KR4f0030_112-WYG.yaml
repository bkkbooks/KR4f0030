body:
  text: 西河集巻一百十二翰林院檢討毛竒齡撰事狀嚴貞女狀嚴貞女者上舍嚴君長發女也許嫁同學柴君歛硎子際洛為婦而際洛亡貞女年十五聞訃隂却繡綺朱碧衣而以縞繩束其髪父母初惡之未之問也越一年俞氏來請婚父許之先是貞女却衣時减食卧牀咯喉血居常喜竊繙父書針黹小暇即與女弟奕至是屛去且與同居嬸氏沈道從一之志嬸氏累勸之乃聞俞氏請僵卧不肯起父大怒詣卧訶曰未嫁而守志禮乎且曰審爾吾當立譴汝至柴氏門貞女聞語據牀起請行父復揶揄之時七月天大熱貞女乃屛食出絮被䝉面使汗竭得就死法母見而憐之請以次女應俞聘父不許陳夫人者鄒明府端木之妻貞女之祖姑也謂貞女曰女子從一謂夫已嫁夫而從夫者也世無女在家而語從一者夫夫之未從一于何有貞女曰不然未嫁之夫即已嫁之夫無二夫也無二則一矣夫在家與出嫁雖不同而守志則一兒以為守一之志當從許嫁之日始夫彼固求之此則許之成言不違何謂非從故使許嫁而非夫也則已許嫁而夫則兒方恨許嫁之不幸有二而夫人謂一夫之未從兒不解也陳夫人無以難時嬸氏在坐泣而曰吾亦寡婦也為嚴氏守志已二十年豈不樂成汝志哉顧我有嗣子可恃子安恃耶且何必死也貞女曰歸柴則所恃在柴在家則所恃在家何謂無恃且嬸氏視兒豈願死者哉夫亦有迫之者而非得已也時聞之者悉流涕越數日貞女幡然曰吾不死矣以吾處重緆之中一日不再浴即形穢死則更穢矣吾不可以穢自處遽起彊食家人咸相慶謂其有變志也越三月復不食父母屢喻之不聽康熈三十一年十月二十七日咯血死死之日告其母曰兒年已十六當有訃顧訃稱柴氏婦耶則彰父過也稱俞耶非兒志也勿訃便苐兒志未明即死必告柴氏使知兒之死有為也既而父猶豫貞女既已暝復瞪目曰父憐我必告柴氏否則吾死不瞑矣父曰諾遂瞑太史氏曰予乞病㑹城所僦仁和縣祖廟巷傍與貞女居近故知貞女事最詳而特為之狀方予在舘時曾修明史􅍐題作孟貞女傳孟之夫蔣文旭者以童年為明髙帝朝監察御史因言事賜死而未婚也孟守志不嫁其事在洪武二十九年而宣宗朝特旌之時同官張烈者儒者也謂貞女非是不當傳獨不聞先儒之為戒者乎有云未嫁而守志與淫失同夫守志善行也縱未嫁亦何至等之淫失夫亦以學貴明理當未嫁則不成為夫不成為夫而為之守與非夫等蓋惟恐世之好為畸行而故為甚詞以杜其後也予曰否否夫天倫有五而人合者三謂君臣朋友與夫婦也然而不成為君臣者為君死而世未嘗以為奸不成為朋友者為友死而世不敢以為僻何則貞淫不兩立矣故王蠋不仕齊而死齊謂之忠臣龔勝不仕漢而死漢謂之義士張元節與孔文舉未嘗為友也而文舉藏元節而幾為之死謂之良友若夫婦許嫁則名定矣定名則與臣之未仕朋友之未交者迥不同矣乃以未仕之臣盡臣道而不為奸未交之友盡友道而不為僻獨此明明夫婦正名定分既已許嫁之為婦而反謂不成為夫許嫁之婦既已恪守婦志而反謂未嫁守節等之淫失是何儒者之好誣善喜刻酷其不樂成人之美一至于是時同官聞者皆稱快去今相距有年較之孟氏之事其在洪武至今者約三百餘載而僅此一見世鮮畸行其不煩垂戒之殷切可知也即未婚守志不列旌典其在宣徳一舉行而繼此而沮獨行者不求奬更不藉禁令之杜絶抑可騐也獨此天理在人其說不著徃徃躬行君子逡巡未逮而閨中偶行之即文人學士老師宿儒講習有素亦不能暢舉其義而巾裙年少不數言而决之善哉貞女之答陳夫人之言也此天理也此王者之教不絶于人世者也此聖學也此非畸行也吾故備述之以示後之言人倫者若夫孟貞女不死而貞女死則貞女亦自言之已大理寺寺丞前兵科掌印給事中任君行狀康熈三十一年十月一日原任大理寺寺丞任君卒于家距生故明天啟三年五月廿日年七十矣予與君同年生俗例年七十遇所生辰親朋㩦酒榼相饟謂之賀壽君久厭俗例避不納且囑予踵其事予方避賀間㑹同邑周先生為予同舘前進以通政使司通政使死受朝祭予歸渡作行擯便過君而君已病瘧五日坐起握予手于牀備訊予行禮狀言詞忼慨據案接殽核一如常時又五日而訃音至承重榮登等擗踊哭拜使西渡乞狀謂登等昏迷不能出一言且棘遽無記憶即記憶亦不具先生先大夫良友同生同里閈同學同官于朝又同時歸田其知先大夫莫先生若也古有狀以良友者先生忍不出一言為先大夫狀予聞之哭于寓亭遂索筆拭泪稍述其概君諱辰旦行四字待庵世居蕭山東門外近祖元禮當元明之際豁達有大志嘗破産任俠結天下豪士天下豪士爭歸之㑹青田劉基以行軍叅謀受浙江行省左丞鐵里帖木爾之聘征海喪師乃奉其母遁蕭山而自投劾去遂與元禮訂刎頸交一時名賢隂以舍養來從游者如東陽王禕河東張翥西江掲徯斯東嘉髙明臨川危太樸皆前後相過及髙帝龍興始幡然退耕于野辭諸路辟召散其財以濟難民難民稱之為長者任氏長者任氏几八傳而君生君父贈公生四子君其長也幼慧與予並總覊就里門學學師令角讀出漢賈生治安疏讀之各五過各不誤一字中書舍人王先吉舉人韓其昌嘗偕君與予同受書于予伯兄仁和教諭東壺公公每坐講必左右視曰此四傑也㑹國變江東民徒合方馬軍抗王師君族人有封爵于軍者與予家保定伯合武寧侯王君軍西陵君嘗與予詣行間覘事必敗去之君父贈公已破産從西陵歸貧且死而君竄馬谷與予所匿坑相近顧道梗不能從頼王師東渡得歸里乃從故明諸生籍應試順治丁酉以第四人舉于鄉先是君母韓太君以君封孺人待贈安人者吉安推官韓公女也君以外氏籍名韓燦附紹興學至是以韓燦名謁公車門值朝議改八比取士易䇿論丁未㑹試以䇿論中式殿試成進士遂奉㫖復姓改今名授江南松江府上海縣知縣上海故難治户甲十萬嵗所入田丁租稅不下四十萬而漕復半之民田産木棉不給漕粟每賣棉買粟以填漕舟其在冬及春凡四閱月棉梗未釋土而漕舟二百餘遮浦而下其帖追簿比如叠浪之發而君調以意不緩不迫絶追比諸費加以咻噢民雖苦輸将而不至于困值新令撤海濵防軍慮軍發時必乘間剽民財君密請將軍預懷令符之䟎行者故邀軍主飲請展其期次日忽下令促之行且盛具牛酒以勞前軍軍乃捃鐎釜帳棧及馬匹械仗不給毋敢遷延他顧者吳淞江者禹貢三江之一也受具區之水而下注于海閼則湓涌多水患前此中丞馬君行省慕君以疏濬入請而可之且復建牐于黄龍浦口以啟以閉而牐成而圯屢矣君力任修築謀于邑之曉事者皆云修必盛冬伺水稍卑減急築兩塘戽其中乾之然後量楗石而加累垜焉然而用䈾若干用木石若干欄之為塘然後用牛車若干桔橰若干夫領夫役若干既稟若十伍伯督視與差押監課若干然且沍寒無幾時春水將至儻度臘不就則前工盡隳從來建牐其坐糜金錢而率無成以是也君乃倣浙之為梁者命匠先範石于陸第其甲乙牝牡之而以次入水然後募善泅者暗理石而累垜其中一如陸地所範者短長合榘不築塘不戽水不下䈾楗傍作剡柱而上覆之以横梁且壘石作埂鱗布牐下如堦級然廣左右䕶堤而約束就牐使水無横溢而又善下其經畫若此君初到日以廉稱身衣木棉履疏履棧馬不食豆日買水二百錢屋腐不葺臺使嘉其廉將薦之至是服其多才能且富經術㑹天子右文設制科招天下有學之士使彚送于公車門擇俟親試名為博學鴻儒科臺使以君薦入京賜宴于體仁閣下呈巻而忽以數限復故官臺使乃特破例請謂是官清廉有治行徒以蘓松多逋賦例不令薦則是劇縣無遷官矣夫循例而薦者庸人也破常格而使進用者良吏也臣竊謂逋賦可償良吏不可失疏入上遽可其請不後例乃命取召以科員用康熈癸亥補授工科給事中當是時君深感聖恩思竭蹶報稱而無所恃意者身為言官惟盡其言職即足當矢効之地乃連上五疏言過急切上嘉其梗直優容之大抵君以廉進本破格而君謂奬廉者當用為例又身苦繁賦親見蘓松租額溢于他郡思欲為比較使江南諸郡地力户口勢相仿者稍為均一又當為縣時苦軍興之費無可設法遂謂設法非長䇿其云核廉貪酌賦則籌經費皆其平時所欲告而勢不能者㑹天子神聖功成治定念四海遼濶撫字者幾三十年而不一周知其地則綏要四訖何自通浹因用廷臣言先省南服而不設掌較不具扈壘不辦宫城梐枑及壇壝禮覲儀仗不譙訶民衆此真王通所云虞舜一嵗巡五岳而國不費民不勞者予時備史職因撰司賔答問辭一破俗儒拘牽之見而君過忠愛有所指陳于上前上復容之既遷兵科掌印給事中㑹甲子賔興欽㸃湖廣正主考得解士宋如辰等六十三人先是君任上海時值丁巳鄉試司使辟君為房官其所拔解若今省中劉國黻等皆名士至主文亦如之丙寅内轉改授大理寺寺丞方謀省覲而太夫人遽謝世遂奔喪歸湖撫張君以事敗其為副使時曾分守吾浙有能名故當廷推詢保薦于諸卿間而君應曰善至是以牽誤落籍嘗讀君疏有請酌裁兵利弊者其略謂兵冗奉裁得以核實數而杜虚糜載戢載槖豈不甚善然而裁不盡散散不盡挿皆足為害夫逍遥河上固屬可虞乃以游手之人而一旦使失其職饑寒切膚務為攻剽此其所係匪細事也向者屯田汝蔡既有成說今抛荒之土所在都有請查官兵若有裁而未散散而未挿者著督撫察明檄行有司撥給荒田資以牛種俾之耕墾三年以後償還所給六年起科賣刀買犢皆為良農不兩利乎又有請酌藩司䕶印者其略謂督撫均封疆重臣其體綂同故督撫員闕可互相䕶印若有撫無督其應用何官署理須奉㫖定奪以明鄭重近巡撫偶闕藩司遽自取印符升堂排闥甚非禮也夫藩司雖應陞巡撫之官然不得陞本省巡撫者所以防其彌縫任内事也其所􅃹錢糧及諸要事體平時皆申詳巡撫方得施行今一旦綰巡撫之篆申詳之官即允詳之官可乎且藩司與屬吏較為親切因緣甚便萬一乘勢市恩與逞威脅衆將行私叢弊無所不至矣今竊計各省惟直𨽻山東山西河南四處無總督耳其有總督者雖道里遼逺不難兼攝若山東河南或照前部議令總河帶管至直𨽻山西則現有長蘆河東御史可權宜也其經畫明晳且諳于大體如此君性孝友而峻于遇物不屑屑言貌其視親串情甚摰而外近落落且有不假以色者以故愛者多即嫉者亦不少少以文名自通籍後即殫思吏治不暇及即偶及之亦棄去所著詩文有介和堂集各一巻君嘗入東華執予手曰予與王内使及君四人同受書于東壺先生之門三人皆通籍而韓君亦領解此盛事也今韓君先死内史猶家食惟予與君各登朝而予主封駁君以善文職詞翰可謂相副然兩君何如矣予嘗聞其言傷之今予年七十内史王君亦厭世即予邑京朝官一時共事惟君與周先生三人而兩年之間兩人皆先我而逝獨㷀㷀一老猶黯然搦筆而為之狀悲可知己君父某以贈如君官母韓太君封孺人初娶蔡繼丁即予友大聲君女也大聲與君為忘年交既而愛其才妻之以女曰樂廣衞玠未嘗非友也子六衡華恒岱崧海華嫡早卒以其子榮登承重即拜使乞予狀者孫六長即榮登次崙介和葵寰女二女孫七諸所娶所嫁所聘所許嫁皆名族西河集巻一百十二
