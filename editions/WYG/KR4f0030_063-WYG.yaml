body:
  text: 西河集巻六十三翰林院檢討毛竒齡撰碑記二越王崢創置寺田碑記越王崢者越王保棲㑹稽地也其地在山陰東徧元至正間有甌兜禪師從錢唐來其師雪庭授以橙囑之曰當向月行既渡江聞越崢名曰師命我矣遂結茅于崢之巔而遺其蛻焉暨明萬厯十六年鹽官鶯窠頂僧有寶峰者與其徒慈舟開山伐石架木而繚以周樊為精廬若干前祠越王而飾甌兜遺蛻于其中且請大藏諸經設寶坊弆之而再傳而衰㑹年饑行儈過堂者日繁而餐流啖栢比之休糧逺明禪師乃募諸檀那創置寺田若干畝補捨施之乏夫化僧禮佛作大香積慮成虛願而儒家拒佛則必以不耕而食為伊蒲罪案有如依山穡植事家人産不必累攜缾鉢而福田常滿則亦桑門檀海所共當世守者也因于其衆請而誌之于石其田畝字數與化主姓氏例列如左琴室勒石記崧髙多穴居者土埴不石鑿土而横穿之宛轉連空如堂如房就其横際而竅以光明俗名土竉是也顧其傍不藉瓴甓崖覆上薄裁尺許耳上有鋤植而下無榱承居之者鮮疵癘焉崇禎壬午土賊李濟宇拒闖于洛據少室南名御寨者而誘殺少室僧遍發崧髙左右冢宅遂于同泰北發得二穴相連如環中無祕器表裏側折合以埏門門石刻琴室二字然實無琴也相傳賊于室中得銅盎二一實開元天寶銅錢五枚而一貯淺水撓之無物遽捨之去康熈四年潁川戴尊師經乆居崧陽得是穴而移就之傍啟一牖以當長松引小水到門設几闢竈斵二石琴藏其中予游少室遇尊師于少林後院因邀予過室使誌其事予讀水經注載潁上葛陵北有楚王瑟城瑟者琴也楚人謂冢為琴而六安大冢舊名公琴即皋陶冢也則意室之名為琴或室本近冢如古者墓樓者與抑亦有象于冢者而為之名也經曰夫既名琴則因而藏琴何過焉乃命經鼓琴甡為詞詞曰穴乎吟者有石其音泠泠乎翳戴逵之琴埂頭茶亭勒石記㑹稽二十八都曰埂頭剡川路經焉崇禎間商君周嗣創茶亭路傍樊以竹場延僧日濩茶其中以餉行人乃商君以國事死也人哀商君之死且悲亭之廢思興是亭而亭址故版藏之商君之僚壻傅氏者越二十年今商君之配胡願續前志遂謀諸女弟仍清故址延僧人心空復為構亭而惟恐後來之有所侵也請記之石雖然天下之能死國事好善如商君其不忘前志善成事能遂施予如商君之配其見其所遺誰不思復而其忍侵之月日勒石志雪堂記周子鉉讀書西村名所居之堂曰志雪堂實古今書史圖畫于其中繚塍為樊間以立垣忩虚延光軒平接隂沐檻移塵積瓦飾漏修鱗躍于池候禽翔于山時有新卉停紅上下四時襍植沃綠若灑于是周子相顧而嘆且曰吾獨不得毛甡為記耳㑹毛甡歸里過飲于堂中酒把筆若有所感昔者孔融薦襧衡表有云忠果正直志懐霜雪夫以周子之質粹然嚮道何難以孔孟遺行砥礪其志而乃因情標㫖僅同狂生是豈韓公之堂不廢醉白諸葛未逢且言㣲管哉夫亦有所取也生人之不潔也甚矣淟涊被乎其形容垢薉未涓諸行事亦何物焉可以藉之為溉汰者吾聞謝生作雪賦託枚叔為歌詞至謂白羽白玉無所比方陰凝以霏不昧其潔韓愈赴裴尚書宴座中指雪忼愾獻詩亦云自下何曽汙比心明可燭然則天下惟雪之無所于累也志此而已矣周子方少年席其門緒其家之入承明掌綸綍者方將策功良時為風為雲而周子翻是之志或曰何幼則髙尚自喜不屑驃騎然第五之名已逺矣袁夏甫累世公輔築室蔽體而彭城之業藉以不墜周子豈真與正平争好尚哉雪賦曰縱心浩然何慮何營韓愈云隠匿瑕纇増髙未危志雪之謂也特旌誥贈湯母趙恭人崇祀祠記予過睢陽問昔所稱樂羊子妻遺跡無有也既而還江介雎州湯斌以其母恭人崇祀事狀過示予且屬予為文予讀而嘆曰嗟乎何必樂羊矣恭人姓趙氏故明崇禎十五年三月二十二日李自成陷睢州恭人義不辱死之順治五年雎人上其事河南提學僉事李震成命知雎州事房星建祠于故居之東十三年其子斌由進士改翰林院庶吉士授國史院檢討遷陜西按察司副史整飭潼闗兵備兼分巡闗内道贈恭人十七年巡按御史李粹然請于朝廷坊旌其門是年知睢州事戴斌以故祠湫隘乃改今祠予昔過睢雎人亦有言恭人死賊事者賊入城恭人絞衿房間其族不諒者解之入井井燥㑹賊大至環而驅之恭人叱咤不聽行手捃仆器提賊且曰為國之赤子而作賊乎勿謂吾弱為鬼當徤耳吾見汝樔絶矣賊大怒遮迫以刃遂事刃方城未陷時先二日賊破開封之西華破陳州又破太康太康去雎九十里其子幼嘗從母學夜作共㸐脂讀至是遣從從父學城北逮歸而城閉父登陴哭恭人擗而曰事在闔睫不即為姑謀而為是穉子哭乎且賊所向城耳去城必得免此易解也吾向者遣兒學城北而不為君子誦其意也撝之去之龍塘而其子得免及其既也恭人乃立紉襁襡促夫負其姑藏葦中斂㫖蓄為鴟囊葦蔽淺泄度不能俱全請夫奉姑而已居留好言辭姑且謂賊勢方薦處宜不乆住食三日糒可免也後三日賊徙寧陵去果免予聞是言嘗謂恭人者是不獨能死也乃亦賢有智者也今讀其事狀知恭人讀書通大義由來舊矣婁東吳偉業容城孫奇逢各為之傳兹不具記獨記其死節者睢人又有言當恭人之死賊攻開封不能下開封守者決河水灌賊河大徙洪流湯湯潰城郭廬舍恭人殯堂汨于水毎嵗禁日其子號水傍水興隂雲寒雨四面來集中有旦明隨波㴿濘震怛晝夜睢人逢是日闔户悽愴比之罷社其神如此康熈七年蕭山毛甡感母事再拜稽首而記以詩其詩曰不見穀丘樂羊子其妻養姑擷甘㫖一旦乃為賊所死予嘗過之雙淚流欲弔其地悲無由居人為指今睢州翰林有母曽死節皎與樂羊比風烈葵丘之石作碑碣書其懿蹟螭首崇勅賜建祠祠里東年年寒食梨花紅擔漿灑醴嘗恐後當日雎陽潰流冦隔城子母不相就阿母入闈方雉經救之出井眢井平賊至叱賊賊頓驚長刀夾耳落如雪濯錦池頭洗寒血翰林呼親夜不輟顧念在堂有嚴君願為穀養兼報恩以此大節能上聞只今予告湯翰林曽使闗内蕃嶺陰拂衣歸省全初心我思翰林不得見忽遇江南淚如霰自言母饑鬻釵鈿獻姑滫瀡私饜糠滅燭授兒誦古章中原苦兵先苦荒遂使賢母成永訣我聞此言亦流血小人有親賢且哲教兒不成走道路日盼西陵舊墳暮可憐孝子能自樹為親作祀祀孔林哀思何必援鳴琴不見睢州湯翰林范督師祠記范司馬以督師失事死于法其中軍將軍左府都督同知陳君之驤瑩以木丹朱其名私祠于家廟之别楹感故恩也當督師之失事也人怨其重衂展轉不復于是有引兵鄉導縱士焚鹵之謗是不獨武徳有掲撫按有疏給事吳履中輩有彈糺已也特予嘗從吳祭酒飲祭酒能言故國事嘗謂督師才過中上而僨于好用當其戰界嶺也憑城以确軍纔數千耳從臺頭左右環繞分截勢更單瘠而補苴抵掎指撝馳驟一似擁數萬軍者暨開平之戰縱軍横截思東扞灤永西保豐玉遂以見却然猶能救敝以鼓鐲為縱止礟石紛拏縱止不亂故幕府馳聞尚有全疆勵師之敕及其後衆寡相軋殺傷過當遂不支耳要其心豈有他也且天下未有兵食不給而可言轉戰者也合烏為募既即駴散車輜徒頓難可言食以虚枵之旅而輕承謾用夸不自量我知其壊也且夫引兵鄉導者即有之矣斗入之師一則遮之一則距之此節制也遮為當前督范以之距為遏後督趙以之趙光忭也天下又豈有當前而不為之先焉者乎名為先人實以自却然而先之者固官軍也官軍所至必開闉撤塹以待軍入乃甫入而轢者至矣城不逮闔兵不逮走官不得為備民不得為守倉皇轉引所在迅埽然則向之先之者乃其所以為導之者也故徳州之守則武徳兵備雷演祚也閉城不内而城賴以全然而武徳之訟遂有不能為督師解者葢兵備登陴伏弩中脅環軍露宿攖城而譁則齮齕所由生矣嘗按督師為民曹時軍興饋餉先後莫措司農侯君侯恂也急謀諸司而督師無軍興之責毅然身任及其後卒以無失暨其為闗内道也修垣繕堡著戰守攻拒之䇿且屯田疏渠廣任地力至鎮城兵譟則宣示威信令攝之去則是督師非妄為而好僨事者卒之以敢為而遇難為以赴事而致隕事一經喪師殺身以報將軍之祠母亦有痌心于其間與督師善駕馭凡所為用輒能盡其才以收其效故一往知感將軍入嶺表身禦炮火爇其半身半尚無恙順治七年八月日剏督師祠并祠督師標諸將舊死事者左將軍李君輔明癸未九月前屯失陷戰殁前將軍黄君斐以南京總督疏調備邊乙酉六月殉九江難監記軍前兵部職方郎中蘇君觀生丙戌死粤中乃為之記記曰事有得喪功有成敗勢不可為死亦何害李廣責簿亞夫縲紲死鬭死辯總為執節禆將散立偏校嗣起龍額煇渠合騎陟軹三仁一心死即不同彼殪驂者乃真鬼雄觀音閣種栁記汝南城南有觀音閣故明崇莊王奉敕之所建也閣前曰南湖湖坦而抱閣之凸出者如璧之環好下有龍潭通汝流而隂為坊以閼之相傳莊王曽禱雨于潭見好女者屣波來故建閣或曰不獨閣也當莊王建閣時在嘉靖二十四年其時太平乆争以奢靡相矜誇亦既奉敕建閣敞博閎麗而莊王世子于萬厯甲申嵗重為請敇得太皇太后懿㫖増恢阿藍頒賚金銅器物并珠旛畫像等周羅其中其前後宫臺房廡之擁衛與夫桫欏菩提之環樹者曽不止是閣已也而迄于今唯是閣巋然獨存北平雪公自南嶽來卓錫于閣中朝夕披衣從閣觀凡所為髙明之象逺與天併游波間呈茭菁被水其諸流怡者無過也而特四顧拔起兀焉軒峙于層臺之上朝陽薄其東夕陽薄其西神明䕃樾于斯減焉閣東西有廣晦若干幅員周折綠塘為坪曩時雜植之所棲也雪公曰吾將被以栁乃咒萬黍結萬人緣毎人施一栁合萬人而萬栁成彌望曖􅀈混水漂碧髙不踰閣而芊眠于蒙蔓之野新飈微曳柔條􅆴􅆴遙山帶映遞相變色含暉浮彩以鬱雲氣盼睞之間飃然凌物遂練良日邀予與客登閣啜茗坐而樂之雪公曰客亦知予種栁之説哉客曰以栁之易長而易為涼也予曰不然栁者留也析其揚而留其莖逺不翳目近可衛足也夫逺不翳目則眺疎近可衛足則臺不孤而雪公曰豈為是與客亦知莊王之建閣者乎方莊王之禱于潭也旱方蟲蟲見屣波女疑為神降許覆以棟雨滂于陂既夢丈夫惡其忘之首胄而杵責王所許于是建閣而閣有神夫神之所應王者雨也其所垂者潤也執栁而灑之可以潤物是故種栁以為髣髴況夫覽河栁之豐茂既蕭槮以奮揚緬人情之感舊乃于焉而増傷廓落崇臺之步思麗藍之故處吾見攀條者之多延佇也記曰惟此有取以勿折此栁郡太守平賊碑記此崇禎末西河為王使君所作碑記今有竊移其詞為他碑者故不載使居姓氏文亦與舊稍異浙之東藩披江帶海負山以薅饑年之後民多逋逃既逋于江復援于山移剽江濵潜以山蔽顛越所至爰貿兵鐵太守憂之乃舉前古版甲之令團練之法㑹東浙苦旱自永興達鄞四百餘里河竭以路苖草燒熱荒萌乗之稂竊蔓附遂日以大案之太守之職惟典治民此秦制也晉永嘉中東南郡守皆稱將軍後加持節節諸軍事而今不然太守論課勸功已矣外臺分守建置旗鼓稍假節制太守不與焉時太守以攝理分守寧紹台道可兼領武冠用統軍行于是公曰此邦恢恢左轂于㑹良民秀疆何使逋厲乃具告警狀上之大中丞大中丞即檄之分守且遣中軍裨將等令與公㑹公拜檄行若日禡馬若日案沈村又若日絶中嶺踵軍漁山又若日隃大塢初賊伏沈村以下聞官兵來走暨若日敺至暨乃分三隊蹈陶姚公胄夜行天明賊以五隊來公先衆殺之遁是時暨地皆先受公命團練遂遣團練追捕鹵偽監軍等若日斬飛虎大將軍等若日躡漁裏若日中軍等㑹大橋時暨之團練又捕鹵偽先鋒等又若日而山隂西鄉復偵錢清江賊大來葢賊之枝遁而荒萌之乗而和之者也若日復度錢清江又若日返臨浦乃遣前軍守備把總等歴駱家沙與中軍㑹而捕賊燒其砦轢其闗門踣其滚石擂木若日鹵偽左軍都督等自若日至若日凡四十四日鹵偽監軍一左軍都督一先鋒一兵三百六十二陳斬偽飛虎大將軍一總兵官二首級六十四獲大將軍印一馬五驢十牛羊豕五百八十犬三大旗六令旗九藤牌十七弓二十箭千六百一十五長鎗五十七刀七百子炮十三眼鎗二馬釵钂釵鐵釵苖鎗等共十四黄葢一燒砦二降偽中營總兵官等百四十賊平先是公行時父老皆攀援曰公毋往及其旋也而父老讙呼且有逆拜于郊者齊曰非公領武冠焉至此或曰公返臨浦時降者日至公悉遣歸里間有願留者始籍記之又曰公敏于行略方賊之敗螺山也次日公謂中軍曰徐家閘賊歸路也盍守之乎及其既也則果有賊從閘來其略如此若日郡屬吏并諸父老請為碑記之繫之以頌其辭曰越之瀕海徹海于山是芽山蘖況今三江與五湖闗具區壤接古魏都㑹宜以荀良為魏太守浙東熊熊誰其能彊稱諸郡首郡公之來既餘仁教又修禮樂蠢兹小盜何能鷙驁復用如昨銅虎符五竹箭五枝時刺史職何幸九伯攝是總師布司隸檄天假我公釋惴袪悍并畀外臺我公慨然神武乾健真撥亂才曩者渤海亦遺㓂盜賣刀買犢賢哉太守少卿之教比及蕭育治其南郡受策殿中盜用絶跡何必涼州畏見我公然後喙息漁山之傍雞嶺之下㑹食以進挾絮相温傾醪相㵼士卒亮信䝉霧戴月身先甲盾誰敢或後兼禆經術保甲是問鄉練壯茂三旬之餘無用逆命此公之徳愚民投戈逖視邇聽半藉來格殺伐立威太守之武襁負争趨太守之仁願受安撫相顧而嘘寧忍棄置誅其不伏赦其歸降是以克勝拔諸渠毒餘者散亡昔公初行父老愛戀祝公有濟今公之旋子婦歡嘆助公樂凱公功在史銘厥旂常升爾廟坐惟是微文聊布土方以告來者西河集巻六十三
