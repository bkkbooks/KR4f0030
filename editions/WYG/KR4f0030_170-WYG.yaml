body:
  text: 西河集巻一百七十翰林院檢討毛竒齡撰五言律詩三越城觀獵較獵越城東旌旗岀郭紅翻鷹飛朔雪走馬踏春虹壯士爭金埓將軍控角弓離臺行樂地驅騁夕陽中登山曉樓望横浦作放曉登山郡乗秋望越臺江流從北去海日自東来鈴閣迎風動戈船下瀨迴天邊横浦樹應傍嶺雲開旅舎旅舎盤丘壠他鄉戀物華露流常濕樹霜煖不彫花江減看帆小城荒覺路賒雁歸渾未定猶似滯天涯姜都諫覲歸候轉負弩作先驅銜恩假舊閭晝歸重戲綵春殿久牽裾上秩需遷詔空函貯諫書鄉遊真可羨數世有懸車其尊人虞部公為宗伯公冡嗣揚子橋示友京峴雲霞曙蕪城草木凋秋風渡寥廓海色上金焦雁盡􅆶洲樹人逢揚子橋鄉闗吳楚隔何處問歸潮江南春春到江鄉豔花連海郭長清明兼上已處處倚新粧列閣環青嶂平船映緑楊美人歸渡口宛轉墮明璫二冶色三臺麗晴光一望遥青田平繞路緑水細迴橋栁市迷車騎蘋風颺綺綃春陽一百日日日可憐宵南征詞大將下三瀧東風引斾幢戈船開曉驛花浪滿春江越徼方馳檄甌蠻已受降畫梁新燕子早晩看成雙蔡五十一同伯兄過尋甡西湖故國歸難得春山望欲窮呼人谷鳥下尋弟黍苗中零雨淹湖寺浮雲蔽海東三年襟上血相視暮燈紅希軻曰新序以黍離為夀尋伋詩韓詩稱尹伯封求兄伯竒不得作黍離黍而為稷者憂􅀢不識於物也鳥鳴幽谷猶求友生皆詩句泊荻港盪槳葭鄉逺維舟荻港稀蛟龍蟠水宿烏鵲近檣飛雨歇繁昌驛烟横板子磯當塗無舊土歌詠欲誰歸冬夜湖西席限韻二首時計百司理將曉行千載征西宴同時鄴下賢觴流歌管外燭墜舞衣前霜柝嚴城靜星河曉幕懸驪駒誰待駕只有使君船二華館饒清興新歌夜未央裁詩劉庶子别席庾西陽月上移蕡燭霜霏薄羽觴明朝有離客歡讌轉難忘東望東望三江近西看七澤長到舟憐並纜私語習他鄉日落山城冷烟生草店凉波光千萬里江路好難量宿壚下早發春坂横江館晨裝去市壚霞翻城上錦露散草頭珠宿蝶銜衣帶棲鴉起轆轤出門逢小吏剛向府中趨題館壁洛下花爭發河中水正流春陽生大道西北有高樓浦口逢神女盧家字莫愁清宵深館燭猶許重淹留從龍津逹葛溪舟次道路邅迴日江湖樗散年彤山開古縣碧雨漲春田斾轉沿洲市檣鳴上瀨船九龍前望杳彷彿度青天登鎮海樓和友絶檻横秋聳危樓俯地雄烽烟遥海外樽酒大江東帆影隨潮白楓林帶雨紅烏鳶千載泪長在和歌中過陶桓公故居竒績著天壤當年有老親求名憂士賤留客值家貧建節長沙郡遺居鄱水濵我生悲負母感此涕盈巾長門怨莫作長門怨長門怨自長鑾輿迴上苑歌舞在平陽玉殿鵶飛白金鋪日下黄願為華燭影夜夜侍君王上舞昭君翠羽辭春殿氊車向朔風河流通塞口野火照衣紅粉黛銷吳地琵琶憶漢宫可憐上下舞盡入怨歌中送客屯安州洱海浮天逺昆陽擴地遥新田還漢驛壯士佩吳刀漕輓占城種軍移鄖國苗轉輸無用諭勿上長卿軺塞上曲舊註曰古西征也太白動高秋征人上戍樓風號沙曲裏天盡海西頭半壁跨闗隴前軍度塞溝專征年尚少莫道未封侯二上將調邊畧中兵出渭橋黄花秦地戍赤幟漢年標雪後留遮騎雲間逐射鵰古来稱善戰莫過霍嫖姚三出塞無中䇿開疆有上功沙流秋濯劍闗月曉懸弓漢陣三河震邊隂萬里空捷書連挿羽看入未央宫登富春山放溜下江闗春風輟棹還晴雲開絶壁一眺富春山江鳥寒波靜山花錦石斑高樓吾所向聊此遂幽攀赴新安至七里灘作東歸苦行邁南渉上新安水木干雲亂沙禽拂浪寒孤吟隨盪槳多難負垂竿何日風波靜還来住此灘泊嚴灘有感晩泊傍斜暉臨江泪滴衣年華新歲改京國故人稀雲散崗巒彩天垂薜荔圍嚴陵臺下水但見暮潮歸携田甥登嚴陵釣臺縹緲臨高臺凌虚亦壯哉浮雲分磴出落日大江迴客臥千秋在灘鳴七里来羊裘如可待吾亦負竿才早渡揚子孤嶼浮紅旭高雲蕩碧虚揚帆迴北固破浪出南徐曉樹迷三楚春潮渡伍胥蘆碕何處是湛湛欲愁予觀海東去觀滄海南行泛百川晨光開白地秋水屬蒼天鼇徙三山外鵬飛六月前空期羨門子採藥是何年二初日浮孤島洪波蕩九垓南傾從混沌東望見蓬莱蜃起雲連湧鰍高水大来何當掛席去天畔一邅迴三秋色翻溟渤晨征企混茫乘槎隨漢使鞭石笑秦皇水氣粘星黑潮流滚日黄大瀛環盡處乆已識扶桑戴公南歸餽予故宫人所用鏤管玉管二枝有賦彤管分金縷丹毛被綠璵長門曽寫賦東觀舊修書湘竹隨巡去簪花供奉餘錦囊才啟視光采照衣裾二誰把昭陽珥攜来海上翁琱函傳漢代金管類湘東露浥仙盤碧花披女袖紅如何淪落此相抱冶城中看月何處閨中月盈盈起故闗全濡羈客袂空到美人顔遥海生將滿高樓照未還秋来三度看兩度見弓彎希軻曰古詩有海上生明月明月照高樓句五六用此宿江寺春宵宿上方春雨思茫茫花氣衝簾細江聲入郡長歌樽通梵宇歸夢滿禪牀何事偏留滯吳鄉共楚鄉送李琦還家襄州送汝還襄鄧春風起大隄家浮青雀舫人唱白銅鞮諸葛隆中客龎公江外妻可憐新種栁都似武昌西遇邵二懷棠自潮州歸赴公車故國三年别天涯一望長公車驅冀北客路返潮陽湖海逢張儉才名重季方令兄公南齊名將攜新語奏莫戀槖中裝江閣新晴即事寄伯兄客裏回初日樓前趂早晴近欄江氣落映壁水紋生曉榻裁書遍春帆摺布輕愁霖罷唱久長負寄兄情二零雨銷江閣晴光滿郡湖奔流方捲練滴葉尚懸珠塞雁乾將度原鴒煖自呼如何春候逺日日在修塗襍詩屢被春前酒重尋郭外村沿溪浮水碓深巷閉柴門啼鳥一聲静梅花萬樹繁南天苦流滯誰與賦丘樊江園江路入深深江園倚碧潯流雲當檻落接葉滿庭隂馬埒沈春水魚牀啄暮禽何年商婦在時起隔江吟過普安寺并看劉孝亷伎童學伎古寺三車合荒城一徑斜秋雲籠寳塔曉露滴金沙紅豆籬邊子青蓮座上花善才華鬘好看綰佛頭髿寺有響塔金沙泉宛溪宛溪八九月秋水繞溪生吾尋宛溪路還愛謝宣城樓日褰簾皎溪花近岸明行遊垂盡處猶聴詠歌聲送馮之京歸里蕙帶束輕裝蕭然返故鄉甘貧辭薛客未老念馮唐零雨川原逈干雲意氣長綠楊新幔影咫尺是河梁襍詩古驛通丹巘山亭障碧茅佳人酤竹葉乾鵲噪花梢地僻鄉書斷江深市斾交春還愁未遣栁絮莫頻抛遇黄大有贈織貝裝書軸裁絲繞劍韜春光開白墮野馬掛青袍東府賔朋逺南行江漢高翻飛餘背羽愧爾鳯凰毛嗣佳曰野馬游絲見莊子秋後荷池泛舟小艇下荷池秋風拂水涯蒲磯收枕簟花浪蹙胭脂洗袂牽菱刺停橈結栁絲野塘歌詠罷剛值晩凉時寄懷姜侍御圖南分司南昌節鉞洪都府屏藩牛斗間高名震吳楚偉伐控荆蠻江樹思来渺湖雲望去閒南昌陳仲舉應向穉亭還丁司理偕内君王夫人玉映四十初度一在九月一在七月四十懸弧日同逢設帨辰建安推敬禮林下重夫人漉酒黄花近支機綵馭新從来歌穎秀大抵在秋旬希軻日漢郊祀歌秋氣肅殺含秀垂穎人閨中稱夫人繫其生氏西河選越詩稱祁忠敏夫為商夫人或非之西河有覆友書甚辨如王司徒婦稱鍾夫人夫右軍婦稱郗夫人李矩妻稱衛夫人鄭文學妻稱孫人類世說王夫人與顧家婦對偶然耳他便稱謝夫人矣見文集巻宫詞玉輦推青草金房敞碧渠龍盤仗下舞鳯轉殿頭書執㦸分環衛裁紈獻倢伃長門無用賦愁殺漢相如二萬乘驚鑾馭千門識冕旒風高鳷鵲觀春煖鳳凰樓酒捧南山翠花纒清渭流少君方進幸東望指瀛州三清宴迴長樂探春出未央侍臣青瑣闥仙母白雲鄉祕戲迎琱軫雄詞起柏梁昇平新有奏千載誦君王四御栁摇風細宫花滴露濃晨驅翻鐡騎晝漏下銅龍弟子催供奉昭儀敕幸從仙盤頒瑞下擎出玉芙蓉五曉觀移仙仗春林轉羽旗徵歌宣曲殿教戰定昆池花翦千垣綵星明五畤祠飛来雙白鵠方上萬年枝贈李昇就學尚有詩書意寧無禮樂情我慙晉處士君作魯諸生晚日花間酒春風江上城汾亭能就學從此送君行題孤山表忠祠事君䝉患難在昔死官僚樓觀祠遺烈冰霜識後凋山銜天目雨雲湧浙江潮朝暮看歌舞忠魂應未遥二豈欲棲幽境曾經從鼎湖封章廷闕逺祠廟海天孤絶閣環丹巘滄流漾碧蒲丘山懐古地下馬幾踟蹰孝女孝女秉幽姿靈幃展素絲春蘭時㑹鼓夜火滿叢祠江畔青螺水碑隂黄絹詞商船留賽去愁煞上潮時西施廟浦口西施廟蕭蕭竹映門越王山下路寂寂苧蘿村紅粉溝頭水青苔石上魂夜来餘里婦燈燭伴黄昏題聽山堂馬駿别業叢薄秋風裏巋然一草堂到来聽不盡只在此山陽管席環笙磬桐臺翥鳳凰淮南有賔客洗耳向滄浪聽羅牧彈琴未辨絃中趣徒憐爨下材秋風吹海水落日照琴臺目送歸鴻逺彈成野鶴来雍門原有泪不為薛公哀二阮氏長留嘯鍾期復鼓琴高臺垂晚日野寺間秋砧離黍他鄉泪飛鴻國士心撫絃縈佇久袛為少知音為河上白女冠彈琴作旅泊依河岸鳴琴起鬲津華陽仙子操盧女漢宫人海鳥銜紅藥天雞叫紫辰青谿凡五弄并入洞中春入虎丘鈄日山塘暮清秋古寺分樓臺銜樹雨磐石坐溪雲地勝開龍藏天高見雁群真娘墳上路長記醉紅裙舟泊登望朝雨五湖烟江南正採蓮丹樓憑浩蕩碧草望芊眠近市要離冡浮家范蠡船可憐漂泊久愁過酒城邊吹笛伍相曾亡楚梁鴻乍入吳賃舂来有意吹笛向何途曉樹迷長蕩秋風起太湖壺漿裁欲掩流涕下菰蒲重過淨居不信枝頭絮還為川上萍山門今又到磵水舊曽聽落日穿林白空雲出岫青逺公高詠在留和滿中庭岸坼岸坼疑天盡沙平與地浮萬程惟水宿千古此江流篠曲藏漁罶蘆花起棹謳烟波無限興相顧各悠悠高郵一片高郵水蒼茫曉纜開葦深知岸濶水濁自河来估市懸帘繞驢車振鐸催沙城迴泊處檣櫓倚層臺早發曙鼓開朱鷁晨鉦出白陂波横聨榜動風仄掛帆欹闗逺征呼靜舟凉睡起遲檣烏啼最苦不使近船知飲馬駿宅我醉扶風酒南湖落照時叢蘭披草路鮮鯉壓花瓷解珮聨刀錯傾觴倒接䍦原来絳帳外也有坐彈絲沽酒沽酒驛樓邊楊花入暮天車聲驚異地門影記當年江下兼程度壚頭一醉眠春鶯如有恨啼殺碧簾前過四洲寺與朱三馮大共作臨川客頻從化國遊慈雲開象駕寒日戀烏裘人事分雙樹天輪轉四洲上方憑眺逈應有仲宣樓逢朱三却憶難兄朱大士稚紺舎逢車笠黄花對酒巵天邊鴻雁侣衣上鶺鴒詩南海聞琴夜山陽偶鍜時祗餘難弟在相顧泪如絲鄧子鄧子本龍驤相逢大道傍談兵迴駿馬吹笛上胡牀意氣樽盤合闗城雨雪凉東都推將相誰不重南陽故人黄開平死十年矣旅夢泫然醒而有述委抱忽不樂幡然泪滿巾十年泉下友一夕夢中人别路螢如雨荒城雞未晨可憐相憶語倉卒未曾申入石溪寺碧嶂縈溪逺青林入寺幽堦前聽雨過城上見江流寳樹迷天界春花對客樓到來題字者誰識舊裴休寺舊有裴休題額盧肇讀書臺石溪寺遇雨古寺倚青林禪闗一榻深江雷奔夜壑山雨破春隂樓逈連官閣燈明見客心故鄉千里月夢去幾追尋東湖東湖看落暉湖上啓雙扉近水堤常濕無風花自飛林深重載酒春晚欲添衣舊日漁洲侣相過在益稀沛城道懷大敬憲臣南士因作二月淮徐道春風馬上行故人千里隔新栁萬條生鳳舉慙河内鶯啼過沛城枌榆仍作社無限舊游情希軻曰向秀從嵇康鍜河内五君詠曰攀嵇亦鳯舉碧樹碧樹藏紅斾朱門映綠潭春風歸海甸寒食在江南官市初調馬人家舊養蠶丹陽新栁下何處覓劉惔望閣皂山靈境何年到蓮花望裏生烟林浮海日雲氣滿江城地逈丹臺逺春深洞壑清蒼蒼一以眺頓起故山情除夕前一日崇仁官署分歲作故友居官地他鄉分歲筵臘從明夜盡客向此宵圓栢葉金盤酒千枝蠟炬烟誰憐江畔旅来日又經年二古署桃符改當筵爆竹新一堂分歲酒千里去家人燈火留殘臘笙歌度早春年華將盡處倍覺感沉淪襍詩夜雨增歸思朝曦動客愁長林湖路逈細草寺堂幽春色還南頓鄉書斷北郵兩經暄煖候猶未換烏裘登石鐘山幾度經湖口今來眺石鐘天風吹草木江浪起蛟龍崱屴懸千仞烟波思萬重手中無寸莛何以扣鐘鏞四月八日游華藏寺并懷徐徵君繼恩逃禪湖上四月尋幽興三摩觀會禪支公籖室外太子浴堂前黄鳥銜春菓丹臺長夏蓮流連當此日倍憶聖湖賢宿建平僧舎寒雲宿嶺頭隔嶺梵宫幽門間山菓落牕外石泉流燈影雙林白鐘聲萬壑秋愁心與勞思到此共悠悠菱湖晩眺流浪經年逺前湖一望賒晩風吹苧葉秋水散菱花霅浦停帆路烏程賣酒家相逢似相識延佇日將斜人日綵燕經年見仙蓂七葉新久為江外客愁翦勝中人日上平沙午風來故國春巴東千萬里極目轉傷神賦得小寳珠山茶叢開同用分字細蕋穠苞拆叢花小榦分琱槃扶絳蠟青女坐紅裙冬日兼春日丹雲共綠雲階前頻翫賞莫負掌中芬懷沈憲使大梁道署樓避楚原非計廻梁已倦游君方還泖浦我又上鈞州鳥語開㕔事花飛飲署樓憑欄歌八詠面面起春愁飲大梁道署海棠樹下懷沈憲使荃古署清缸發還思沈翰林十年賢使蹟一别故人心晩鱠菁初瀹春棠花自隂庾公乘興地皎月坐來深雨後飲黄兵部園林留詠并與黄二之翰露席花間啓江舟雨後來横廊堤栁接捲幔水亭開日暈穿林薄烟絲掛酒桮名園饒逺興還上幾層臺二每渡珠湖曲長思紅板橋雨餘還盪槳風起自生潮碧嶂依晴閣青田長夏苗平欄低水面四望總逍遥三雉堞連烟暝魚餐旁水多晩雲濃過樹積雨暗流柯濕蝶沽紅網翻鷗起碧波空亭留襆被鐘磬動巖阿四碧幕銷紅藥青衫映綠苕座中誰最爽吾愛馬西樵簾靜山逾霽天空鶴在霄繩牀歌嘯永不敢問歸橈五愛煞名園勝况兹園裏人論交誠有道作賦妙能神玉樹開朱榭清觴度錦茵晩雲留客處野水自相親宿少林寺夢䟦陀飲予水絶壑嵩陽晩西行宿少林月寒龍洞逺露下講堂深蓮椀分丹液楊枝滴素心何年婚嫁畢重向夢中尋送虎丘僧遊天台飛鍚朝乘嶠浮杯夜渡湖楢溪臨絶磵花頂㧞當塗清嘯成公賦希軻曰成公綏登天台赤欄橋作賦高披孫令圖石梁如可過萬里一相呼二勝域追遊近名賢餞送多杖來吳地月掛去海門蘿瓊樹明丹闕桃花泛碧河支公習靜後丘壑竟如何三天畔開丹壑霞標建赤城荷瓢横海去曳杖入雲行曉日千巖立春風衆鳥鳴金庭垂碧澗知汝早留名西河集卷一百七十
