body:
  text: 西河集巻一百七翰林院檢討毛竒齡撰神道碑銘誥授通議大夫通政使司通政使楊公神道碑銘皇清誥授通議大夫通政使司通政使楊公于卒之三月祔塟虎跑進龍浦山先塋之傍遺命勿上謝疏勿乞恩賜祭塟勿飾石人獸望柱于墓獨是東南神道有桓楹分樹仿延陵題墓之意當有文字而以予舉制科時為三相公及翰林院掌院學士所讀巻掌院學士者今已故都官尚書葉公公㑹試同考時所得士也重門相禪誼應操筆執其役又以予曾職史事即以此當史氏之誌因再拜稽首案狀公諱鼐字靖調别字西巖仁和人也其先籍江南合肥以勲衞授世職杭州曾祖諱憶其伯兄諱恒由選貢生任山東臨清州教諭遂家于州公祖松坡公諱大化誥贈通議大夫父仲卿公諱元貞敕賜徵仕郎誥贈通議大夫皆居杭州而仲卿公以臨清地勝曾挈家人僦其地故公母顧太君誥贈淑人生公于臨清别宅㑹顧太君父萍實公為山西平陽衞參軍㩦公之任所至八嵗而始歸顧太君膝下適仲卿公遽棄世仍扶柩還杭州當是時公家以屢徙中落且親族鮮少公與長兄峻明公考授經歴仲兄如之公邑文學相依若肩背夜共被晝易衣以出仲兄每授學所得舘祿僅八金必兄弟分之公幼不好弄數嵗如成人而天資髙少有文譽既早年為諸生屢不遇國初時既棄儒服溷跡商人車仍僦居臨清别宅自分抛舉業為親知勸重以臨清籍就童子試由州而府而道三試皆第一順治十一年舉于鄉明年成進士除大名府推官先是遷臨清時間以乏食應直𨽻王叅戎幕下之請至是叅戎以詿誤落職而案尚未結公為白其寃得末減且捐俸為折贖周恤甚備乃任甫朞月世祖章皇帝廉其能行取授户科給事中㑹值鼓院有辨復降革官職濫擊登聞者公大言鼔院之設所以呼大寃嘂大枉軍國民瘼久抑不治者藉是伸理豈容以一已予奪上瀆天聽斥疏通政去而文武官開復舊有定例至是吏兵二部于開復之例任意參變公特糾正之值已亥㑹試公以同考官取士十七人皆名卿如馬光劉如漢蔣宏道葉方藹等已轉刑科右給事中明年轉工科左給事中皇上登極充頒詔官至寧夏覘邊郡疾苦軍旅疲困謂西川初闢抽撥秦兵鎮其地戍守之制豈容蹔緩特其地叢箐險阨為憲賊所草殺白晝千里無生人虎狼都其中倉黄戍守本屬艱難今復盡遷其家屬以實其地夫鎮兵自月餉外原有田畝室廬以豢家口今使捐田畝抛室廬千山萬水以填此虎狼之鄉劍閣棧道曳銜而行此非徙之實死之也古有踐更番休之法今一仿其制迭相轉調不必遽遷其家室而限期遞代亦不廢事至平凉屯地設苑馬一卿專司孳息原以備邊郡攻守及内地驛站之用今闗塞所需取之茶馬而鄉亭郵遞動輙支驛站銀兩以補倒斃致孶生馬匹悉散之游牝蹴蹋之地水草既不給而騰驤無用翻累閑牧夫市馬防戰畜馬亦防戰無以異也支銀買馬與領馬抵銀其相去不少間也是必苑馬與茶馬一體分撥而附近驛站則直領馬匹以抵銀兩庶閑牧寡累而孶生不至于無用若夫邊兵月餉給之藩司而秦地遼濶邊鎮去省數千里每一領給動經嵗月則邊縣解司似不如徑解軍前之直且捷也上深然其言乃以覃恩封二代公捧敕徬徨念顧太君春秋髙請歸省覲上許之越一年假滿赴闕補吏科左給事中使稽察吏部事務乃以獄訟繁蔓請上飭部臣分别發審㑹康熈二年癸卯順天鄉試以經題訛錯諸生紛紛訟闕下公上疏曰竊惟三載一試本求賢盛典故事凡闈中試題例皆本經同考官所擬今春秋經題則同考官羅繼謨擬進者也乃春秋第四題經係邾子而題訛邾人夫以春秋本經閲春秋房而題有訛錯其人固已疎矣且此第四題即已亥科㑹試之第二題也已亥是題亦曾以邾子誤邾人隨經知貢舉與監試諸官題叅而考試官亦自檢舉請奉㫖改正試錄因將同考官范廷魁孫承恩處分在案此人人共知者已亥至今相隔祗一科不宜遺忘而繼謨者又已亥春秋房中式士也以已中式題而擬以試士既屬可怪况已經訛錯之題而重為訛錯在前此之誤猶曰坊本相沿偶失檢㸃故孫范叅罰可從輕擬今已經更正敕改試錄煌煌然見勒功令而乃以是科中式之人題即是題錯復再錯是前為過誤今且怙終前固違經今復悖敕此其所係匪細故也然且前時舉人哄堂而爭則内簾受過凡反題紙寫邾子者概使錄入今之諸生亦哄堂而爭而内簾必不受過凡反題紙寫邾子者皆帖斥不錄則遵經士子反受黜落去取盡乖詘抑誰贖毋怪乎叩闕之多譊譊矣上閱疏震怒著從重處去而公亦即以是時敕内陞京職需次回籍扶侍顧太君者又八年上俯念舊勞特㫖召用以正四品京卿服俸仍管禮科給事中事且謂公等係先皇帝所用諫臣必諳練國事請各進一言以佐盛治公乃極陳小民疾苦連年甾荒設救恤之典商捐助之法開罪犯折贖之例又且另疏積儲定制經久并請追在官贓賕銀兩及中外所奪月俸以暨闗稅溢額鹽觔割没總移之為賑民之用仁人之言其專于惠民如此康熈十一年二月上躬耕藉田敕和碩親王以下文官四品以上各齋戒入先農壇公届期以蟒服侍班已而陞鴻臚寺卿值癸丑欽賜表裏帑金充殿試執事官未幾遷通政使司通政使乃以積疾發兼念顧太君在堂累疏乞予告蒙温㫖許之㑹顧太君年八十賀者填門而恩綸以榮封三代頒官誥適至太君冠帔拜于庭觀者羨之因顔其堂曰慈慶堂既而太君卒服闋即具疏自陳衰老恩准以原品致仕遂杜門却埽焉康熈十八年欽賜日講四書解義一部二十年欽賜日講書經解義一部二十四年欽賜日講易經講義一部二十六年值太皇太后大行公扶疾赴闕哭臨越明年上南巡狩公朝于行所及還宫特傳在籍大臣自開府以上十人使所在官存問公居一焉三十八年上復以河工未成駐蹕清江浦公同在籍諸大臣恭請幸浙即迎送朝見如前時乃以暮年家居得重瞻天顔喜溢過望舞忭却杖一似較昔增健者越五月無疾卒公性孤介而龎和與人齒遇無畍畛而未嘗有汎濫交孝親友兄弟惇睦鄉族而疏逖者不加薄固窮而不侈于宦達致身通顯而家無雕室榻按不設寳玩日食戒桮杓而柈無兼殽之饌所衣敝裘嘗解之以與貧者每讀律講寳訓公必徃而非然者即終嵗不入府縣門一步遂安張公以巡撫使浙雅重公嘗昏夜親詣公所居遍觀門巷無閥閱無屏繚管鑰無外宅男兒警􅈀蕭條如寒冰嘆息而去公坐卧一室不出户僅以小童住户外令司啟閉嘗曰人生幾何東墻之隂有寸移寸滅而已公卒于康熈三十八年九月七日享年八十以順治十一年賜進士出身授直𨽻大名府推官欽取考選户科給事中已轉刑右于十六年已亥充㑹試同考官越三年轉工左宣詔寧夏以覃恩敕授徵仕郎轉吏左奉使稽察吏部事務以考滿二等勤職内陞京堂官重以正四品京卿頂帶食俸管禮科給事中事陞鴻臚寺卿康熈十二年癸丑充殿試執事經筵侍班進今官元配沈太君誥贈淑人繼張太君誥封淑人子四曰湘曰濤曰濬皆國學生曰淇嵗貢生孫六曰士楷士標士權士杞士楩士樞女二孫女三所娶所嫁皆名族乃系以銘其詞曰維此哲人生超于羣如鳥有鳯而魚有鯤其言可法其行可尊兩朝􅂄碩受不次恩澤下海國身歸丘樊以其所居名通徳門矧兹夜臺爰藏衣冠過者下馬澆酒墳間日月有盡其墳長存翳東南道時游清神片言不泐敢告後賢誥授中憲大夫奉天府丞前禮科都給事中定庵姜公神道碑銘姜京兆公以康熈三十七年五月十二日卒予扶服哭之且為作事狀附公所著姜氏譜後其明年卜塟于褚里福全山之陽禮君卿大夫皆有二碑以下窆而墓門東南為神道出入之所當以一碑移其地且勒銘焉予惟京兆公以司諫内遷奠天子都居作帥于京師首善之鄉然且舊京根本地並邀公坐鎮以倡九有其為中外所倚毗為何如者乃溯公在司諫時疏數十上值世祖章皇帝闢門伊始諸草昧荒畧名法未備相視為鍥刻毛舉而君以寛大處之㑹兩河地荒敕直指按視清丈諸衞所屯田歸併藩産廢斥諸地君請稽舊額核全書所載而凖其數勿令妄有增益使州縣弓尺得上下其手夫增額為益課計耳乃不思地力有限正課幾何在有司不過誇一時智計之能而貽朝廷以加派之名不可也上深然之當是時地方新闢民錢多積逋催科者合新舊而並征之而公任户科力請勿征謂量地所出一年祗得當一年之輸移新補舊將必并其新而逋之矣夫今年之新逋即明年之舊欠也苐有司考成既以完欠為殿最而完欠之數定限十分凡十分所核不論煩條璅件毫釐偶闕即議處隨之自順治十三年諸王㑹議以後勒為令甲諸科條件既多而有司經承動輙罹網朝至夕行無半席煖者公請盡合諸項之十分而總作十分則毫釐細故不致輕去且分各年之十分而各作十分則捱年遞察不致重累上既是其言而廷臣上下皆以為便遂立敇舉行永為定例其在今四十餘年無變更焉乃西南用兵兩廣撫臣報始興曲江兩縣知縣皆同時自裁不知所由在朝相視毋敢言公惻然曰人孰不樂生乃甫徼一命而輕生如此此非將𨽻吹索之即守臣儲備之不豫以至有是務根株所由勿使行間居守兩得委卸以骩國法書上聞者皆咋舌公嘗曰大學以理財為本而理財之要實惟用人今國家旁求亦云孔亟而一時吏治未登于古豈其賢實不足哉良由求治太亟進身之途寛而真才反多蔽也夫弭盜催科輸貲辟土亦臣工恒事而乃開荒有陞捐俸有陞漕務全完有陞多獲逃人有陞浸假邑無荒田糧無漕件四封無旗人官貧無餘俸則既無與于斯數而苟其興賢勸功課農養士修禮制而興教化有十百于此者將何鼔厲然且捐俸急公本屬臣誼而奬之太過將必有糜費金榖竭他有以足此數者此非所以厲廉而適足以奬貪也至若逆賊歸命遽受顯職則厲民尤甚夫穿窬駔儈狂逞海澨一旦計無復之叩首軍門不過匄朝夕之死初非有湔滌祓濯之能可立後效而乃監司守令冒濫名器夫居官必貴通經非謂柔翰之有良于弓矢也以為天下惟讀書者始能明理識義燭民隠而飭官邪而况錢穀之稽核獄市之裁决機務之參預無一不究之平時而施于一日否則茫然入官四顧無術勢必假手幕客諮請胥吏而後止此事權所由落而線索所由生也且用人之途亦既不一國家縱乏才亦何可使狡獪雜進至于如此其言皆侃侃切于時政而上方好賢力求敢諫故公得盡言稱一時盛事至于調繁簡轄兵馬窮私販廣㑹推清改折蠲賠椿緩征欠均銓法復勘合豫揀選重律例察闗政凡三十八疏皆一一議行雖諸部所議偶有齟齬而上未嘗不反復其詞而念其直也乃公方入户科時闗西叅政吳允謙以督撫專薦既已遷太僕卿矣公發其為道時貪跡立下吏議而其在兵科則海宼陳敬容以偽軍門投誠授山東兵備僉事公奏奪之至畿輔失盜有供義王家人李進才及范二達子為之因緣有司莫敢聞而公為發覺請直清盜本而後愉快至旱災求言公首以罰鍰入告謂旱者嵗不熟也乃民不苦凶嵗之不熟而苦貪吏之酷罰向者贖杖分别有力者四兩稍力者一兩五錢撟䖍之吏猶嚴刑以濟其惡今者贖杖一名動輙三十四十兩然且以意恣睢不拘律令在皇上不過期無刑之治而反開不肖者以貪黷之門甚非行法之意也夫年豐嵗稔徵需稍急猶或有剜肉補瘡之嗟况當災旱之餘二麥不登何堪重鍰敲扑之下其不為鳥獸散者幾何矣及海㓂縱横沿海震動公疏請撻伐具有方略已奉章皇帝密㫖議勦未及果行而皇上克詰加以六師遂耕犁其地而版籍之與公之所告若合符契其先見如此公諱希轍字二濵别字定庵明禮部尚書箴勝公之孫工部都水司郎中紫環公之子也世居餘姚六世祖春軒公以工部主事劾逆瑾貶瑞州府通判髙祖對揚公以行太僕卿忤分宜相公致仕曾祖翼龍公由禮部郎中出守以建國本上書罷職贈光祿卿遂徙家㑹稽為㑹稽姜氏公少頴異善文崇禎末都水公以出使張秋治故河詿誤下刑部獄公徒步入京請救㑹是年舉京闈鄉試公以諸生例咨監入試中式乃出公于獄而奉之歸里㑹本朝下令搜京闈見舉者授以官公以南歸免嵗丙戌王師下江東大將軍貝勒檄公出授監司而公辭之乃循故例補温州教授攝縣事因以民兵大破海㓂之㓂温者陞元城知縣鄰郡饑流民至者如蝟毛時逃人令嚴曳衘道路無收者殍殣相望公憐之乃察其男無東人語言婦耳無三環穴悉留之墾集北荒地受僱得食活者以萬計臺使下其法使鄰郡效之地之荒者悉以墾而饑民活者以數十萬計乃于順治十四年卓異賜章服陞户科給事中明年轉禮科右給事中十六年轉兵科左給事中遂于是年冬陞禮科都給事中㑹皇上登極公以禮臣襄諸大禮充辛丑㑹試同考康熈元年内陞京堂官候補歸越八年始赴都上以公為先皇帝言官重之謂其言必有裨于今政破例仍補户科都給事中乃連具三疏一請增科員以防壅蔽一請撫臣仍轄兵以防地方竊發一請緩期奏銷使催科不廹是年補順天府丞以憂歸又八年奉天府丞闕就家起視事三年以母疾予終養歸旋丁内憂服闋不起自十八年至三十七年凡十九年無疾卒公丰儀峻整瞻視越恒量懐抱犖犖然見事急捷如飛隼之及物而予人和坦好推解能拯人之急而出人于厄予中于所隟流離展轉屢言諸臺使解之郡江防不守民居困于沈湛設法救援其于宗黨之惇睦凡鄉祠義學墓田亭譜皆一身修舉無稍遺闕至于友朋之相䘏其得所告而去者踵踵也嗟乎賢矣公配朱恭人為行取科員澹明公女生子二曰垚曰坦庶子塽垚以年貢補杭州府昌化縣教諭陞國子監學正生子七長公銓丁巳科舉人餘俱列庠序有名公銓已有孫繼君五世稱極盛而垚以文章著自太僕公下文章經術至公益大而垚克繼之坦早卒銘曰保氏箴尹見周季時宋人無學謂無專司兩省四品補闕拾遺有未便者因而去之不審鞀鐸所以納誨匡輿正軸全在于是是以十論不削一二時謂良臣用使言事公之立朝侃侃盡職少具亮節更抱蹇徳每事進言為古遺直聖本無闕諫亦有力矧當草昧朝陽始曦宜以忠厚開萬世基竭我愷惻還于丕熈千秋國史猶應鑒斯特公歴世累顯文教太史傳書夏侯作誥惟公有子繼述大孝清芬是揚駿烈克紹况其成績早勒太常邦詞里頌亦云孔揚惟此片石雖表末光拜墓下者思之難忘西河集巻一百七
