body:
  text: 西河集巻一百五十九翰林院檢討毛竒齡撰七言古詩五樂府新歌漢家伊洛本京畿梁王樓閣擅閨闈大道雕甍十二翼曲房繡幔幾重圍日岀紅櫳疑鏡照雨飄翠網似絲飛蘭牕玉女爭妖豔雕鞍公子鬬輕肥北里笙歌新宛轉南隣桃李舊芳菲何悟流雲能作黛判將新葉看成衣鳥鳴私弄昭華琯花影重移帝女機碧波欲漲眉㾗淺斑竹初生泪㸃稀游童挾彈從教騁蠶妾移筐始畏饑才子五侯中第返使君千騎上頭歸不信羅衣半夜襞詎知華轂詰朝違疇能結帶非雙縷若箇沉釭無九微團扇障聲猶障面長琴連軫亦連徽生兒年少為盧婦上客吟多是楚妃抛繩舊事隨春電覓釧殘粧及晩暉莫向屏前怨日出自有花間歌露晞宋憲使雪中飲席越王城頭白雪墮宋公臺下朱旗翻毛甡抱刺走滑滑開轅交棨謁者煩宋公望見倒屣出後閣重開雪如織瑶裾珠履塡滿堂共見毛甡動顔色沈沈官舍止且留恍疑身在蓬瀛洲梁園賔客重嚴馬鄴宫飲讌來應劉當杯卓斝論今古睥睨如虹氣如雨天人要妙多可陳輓近紛綸少相許青箱縹軸萬餘叠世本從頭細標揭韋相能傳楚傅詩楊公自授闗西碣清譚滿座酒滿罍當前誰是乗時才嘆生五際大文作歌成四壁悲風來自憐置身苦不早世事浮雲總繚繞未識南樓詠裏情徒傷北寺車中草逡巡欲退轉䠥􅍷何幸相依邁前哲剡川早有戴安居南郡将留仲宣轍君不見宋公暫止㑹稽署将赴臨安臬臺去第五難遲浙上車寇君不借江東路寒風相對飲醇酒朝發山隂暮湖口東西相望去住難一聽清歌一回首君不見平臺飛雪賔客多毛甡對酒呼如何維揚贈姜侍御圖南巡鹽并祝初度有詩長淮浩浩出桐栢上引江流下䢴澤揚徐舊地斥鹵遙炙素熬波海濤坼當年齊相計利開呉王煮海雄齊臺木華作賦無遺句桓氏成書有軼才蘭臺侍御掌文史更作巡方繡衣使巋然霜陛二三人治此鹽官幾千里高冠柱後平準書豸頭豹尾懸商車烏衣監部識門第白簡彈人工走趨此方懷舊得遺烈漢代張綱棄車轍君今攬轡頗有餘况復從游盡英傑良辰游讌載美酒長向隋堤看楊栁自笑毛甡淪落人乗興還能厠奔走蕪城草黄時苦寒城邉游子衣裳單多君理財日無已天下未有如財難東西繹絡征戍繁可憐轉粟江淮間書生開口理民用不登要路言亦頑男兒有才湏早立姜君侍御方四十須邪行有序里中貴君金書幛子來生却之於其塊情須邪復須邪巷裏生諠譁瓦确撇撇墮烏鴉近前問何人云是來生行歸家寒風西北來吹出衣中紗入門何所有石甑浮魚蝦門内何所見不見蟲蠡鳥毳與蝌蚪但見滿壁綰結成秋蛇東隣有好女本是邯鄲媧練裙八幅不刺花願生為書之生乃對此長咨嗟西隣有賈人日暮載一車美酒百甕黍千斛為我大書雲錦如朝霞我乃前致辭願君勿為呀君不見鹿幘堆左壁飛蓬索索垂鬂髿又不見鹿鞾堆右壁着履踏地胝紋斜嗚呼須邪復須邪將渡江贈日者過訪道人過我青谿堂荷花滿池白日長我知凡事皆有命君能縱譚我能聽十年躍馬志未成今來重向清江行君歸若遇秋風起莫問江東張歩兵陳黄門台孫病中招飲賦贈兩年兩至淮隂城敝衣懷刺羞禰衡幾回欲問元龍狀百尺樓高那能上今年我從中州來清江未渡猶徘徊元龍豪氣果無敵况是文章老宗伯我來此地不一逢枉作梁王倦游客平明挾帚到門逺正値陳公病偃蹇門生扶病籃舁前深恨從前見來晩青蘭繞屋芝滿堂金壺玉椀傾寒漿座中羽客傲五嶽庭前佳子超諸王斜陽冉冉拂高木細雨牕紗度紅燭擲麈揮桮總樂方挾矢張弓坐追逐夫君今作臺諫臣當時曾宰春江濵春江江郭跨東越萬里迴潮瀉飛雪每到三秋水落時一望西陵最愁絶西陵游子去復來逢君又是榴花開病中記得觀濤處愧少枚乗七發才宿山寺書壁小溪淅淅覆草裏大溪㶁㶁長松間高嵓雨聲落松葉一夜冷徹桐君山山中寂厯忘近逺再宿始知路深淺南朝寺僻春到遲我來四月猶花飛黄姑取妻詞四章有序毛甡已渡江與友飲馬洲城東村村人兒贅前村家女匱婚儀議離處數年至是年七月六日適合甡見此戲為作此詞有生倫比似者稍稍諷解黄姑取妻美爪指日倚天河織文理取妻操作理固然傷心只在天河水河流秋清白如雪爪指簇簇心腸絶人間小女較優劣嘗恐乞巧坐成拙黄姑取妻多綺緆黄姑兩髀赤見骨牽牛入市賣不成歸坐營室泪如刺當時被驅河水邉祗少二萬青銅錢取妻無儀不得前從來天上亦使錢黄姑取妻妻嘗在東夫在西妻立機上晝夜啼黄姑飯牛牛不肥七月七日河滿隄呼車渡河汨汙泥河深無梁艇子遲着履拂靣坐低帷簌簌隔河聞午齝天帝有命夜渡之城頭烏鵲爭枝棲銜唇結羽造履梯露零襪泫烏背欹誰知天河今渡來黄姑取妻賣黄牯七月七日洗頭雨雨乾水枯黄牯乳黄姑取妻共一處黄姑上堂拜阿姥試茶歌東呉種茶白石株建州數處皆不如漸西漸東總甘辣㑹稽日鑄天下無春雷殷殷雨花薄瓜蘆小頭暗生肉風吹枝亞甲拆長鵲唇鶯嘴捎雲凉我來試茶値社後少婦入雲緑洗手山頭爛石膏沐多雪礫霜崖絶枯朽青絲籠子翦香葉箬裹焙成巻銀鬛不需木棨共桑砧何用銅匙并鐵鋏相攜且試耶水濵青黄黑白甘苦辛粗柑細蘗似難較雞蘇狗棘非其倫須臾地罏活火起沸向花堦石蘿裏半杓疑分乳窟泉滿船剛載南泠水傾來清瑩作冰雪掃却黄瓷細漚沫分明眼底見幽蘭驟使胸中斷消渴昨年曾向顧渚回一槍試後棠梨開宣州瑞草襍紫笋䝉山石花猶緑苔㑹稽新茶眞莫並搨腹頓教肺腸靜亭前風落増永摇山頭日色皆清冷今朝歸去踏葛蘿明朝飢渴知如何㗋焦舌燥且勿苦聽我開口歌茶歌逢姜九飲昔年遇爾春城東山前十里桃花紅今年逢君値春雨幾樹桐花落寒塢壚頭汗漫傾酒巵與君曾賦春游詞夏王陵東南鎭西紅粧灼灼如朝曦朝行採花暮歸遲緑楊鶯語春晝迷可憐春晝鶯語澁君欲行春待春及君來能宿酤酒家爲我且醉山桐花桐江王生長身幹一丈餘二尺遇于城東里有長句君不見伍胥挺然一丈身猶能挾弓報楚人又不見王商八尺坐未央單于仰視皆徨君今一丈乃有餘獨行道路垂衣裾丈夫困窮亦時有東方瑰奇挾兩肘日棲金馬索升斗不如侏儒飽食且醉酒毛甡自視負七尺仰頭看人乞衣食有時春至戀春色頺然將老終可惜我今願君東到蓬萊山山頭日上花斒斕挾予兩翮同追攀又不然驅車仗劍出天外坐予車下吸沆瀣與君俯仰且有在焉能傴僂還曲鉤依時逐例爭封侯食糠食肉兩不休山居庄家女種蓮子許粒小鉢厯日五銖隱然有鉢底忽花鴨唼去惜哉作蓮子蓮子有心能作花女兒採蓮先採蕸分蕸擘花得蓮子欲問所遺隔花市若耶溪頭千葉蓮風吹蓮葉葉田田年年上巳自抽葉不用栽根理雙檝盆頭有水照衣履長洗釵魚作風雨投將蓮子裹燕泥囑子泥中發辛苦團團小鏡貼波出隱見荷根起抽立風前捲鬘粧不成雨下抛珠佩來澀當堦花鴨睡花穏竊入琱欄覓新菌不念紅衣晩歲稀竟使朱顏早時損耶溪五月茭葉凉畵船兩漿􅋈横塘女兒只向東隣坐不採蓮花心自傷鎌麥詞鎌麥鎌麥斷篲束刺來子歸家初夏四月早起著犢頭看田左右皆陸穱獨我滿田盡羊角暮歸著接䍦看屋左右皆剥䆅獨我滿屋盡羊蹏三春風雨亦嘗有力田卒歲難逢時壠頭小鳥日呼呌架架格格曾何資來子告我當鎌麥恐歸如我鎌麥詞君不見前村老翁収麥斛一甌兩匙貯筐簏官車栗陸爭載趨尚揭空筐覆車軸君不見少婦今朝鎌麥歸明日下田食瓜葍湟川詞贈别趙王城邉百粤臺湟川渺渺連州開羨君南上湟川渡五月驅車嶺頭路繁花滿縣襍荔枝迎君勿訝君行遲今年竹布裁五褲明年椒穗垂兩岐紅亭酒香日炎午五兩薫風動南浦他日貽君陸賈書莫向人間道新語長歌送顔泰颺北征黄雀巡檐游不及蒼鷹飛神虬雖夭蟜不若駿馬馳丈夫慷慨負竒骨左顧流沙右溟渤手持寸莛撞重闗足下浮雲葢高闕當年定交三市東緑巾碧髪雙顔紅輸心對面指山嶽仰天嘘氣垂霓虹力持壇坫十年乆獨捧銅槃殺雞狗飛葢爭馳鄴下才揮毫共集梁園友倦游曾著亡是篇世人拾得驚相傳珍臺珠樹散霞綵青霄白鳳翔雲烟馳驅河洛結瑶珮徘徊宛委搜瓊編縱飲那知有時代同舟便足稱神仙横行萬里渺難顧奪得宫袍展雲路卞玉誰教暗裏投邢顔却被宫中妬子房豪氣不可除一椎誤中秦王車舉頭大笑趿衣履清江細浪開芙蕖倉黄萬里帝京道挾冊長安待明詔幾叠黄金臺上雲一羣冀北風中踔丈夫相對意氣眞飛揚䟦扈皆殊倫晴郊一送顔光祿思殺鏤金錯彩人送姜二承烈之都門丈夫居家不遂意翻然㧞劍游帝京滹沱萬里白雪盡薊門千頃黄榆生輕車掲掲走析下燕市風雲起叱咤懸金時上九成臺挾冊當來五侯駕我從君行袚君轍讀君雄文嘆竒絶向使馮唐早濟時魏邴蕭曹豈堪説春風吹開楊栁枝同舟元禮神仙姿㑹乗虎觀青雲去莫忘龍山夜雨時訥齋詩題史四廷栢南園新居訥齋先生好園居前庭一池長種魚垂幔或臨右軍墨滿牀盡叠張華書廬蝸車蠋苦未展更闢南園重修翦泥水空纒鄴下垣丘樊自衛山中饍當堦紅藥映虚牖桂樹團團拂清晝徑外爭看求仲來墻東誰是君公後君今弟子喜更彊公超成市非虚揚絳紗前後鬱相望悠然絲竹彈深堂堂中顧盻總芬潔别榜一軒名煑雪童子飢然土銼寒袁安醉抱冰壺裂南山敝廬空自憐陸居非屋水非船難尋西瀼浣花去僅留北幹松風前從君願續小園賦兼賦園中桂之樹他日能同汗漫游應記南園讀書處看月書事有序七月十五夜中元偕吳二卿禎飲商太宰宅樓酒酣望月去廣寜橋顧見龍華寺說法事鬼食漂燈流燎幡幢鈸鐸男女鱗脊如晝便相走觀卿禎躅足顧予曰子才士需立賦所見務其覈實使人省得知勿以虛叶何如予傚元白長蹋歌使商命說徵說各記憶書于篇七月十五天氣凉酒酣浴罷單衫長出門連臂看月去同到廣寜橋下路廣寜橋上坐萬人項背軋札如魚鱗廣寜橋下水波淺大船小船波上轉船中所有更奇絶云是中元鬼時節明燈灼灼浮水來萬盞千甌乍明滅初疑火樹蔽江渚旋道流螢墮秋雨横波落石飛彩星極浦銜珠散龍女旌幢高引紙葢揚旋風吹葢隂燐翔吹螺擊鈸撞法鼔迎照當年淨飯王飯王大坐正設食盆供盂蘭有名色龍華作法甘露殊細灑楊枝散涓滴橋邉婦女坐相待各守亡人紙牌在女為爺母婦為夫熖食從教滌清瀣呦呦壯女向天哭少婦羞人隱牌宿苦無紈扇障燈紅幸有珠旛裹頭緑呉生顧此發長嘆謂我長才屈柔翰相逢若此賦不成空復從前惜良旦我歌數句月自來終歌此曲纎雲開廣寜橋上人無數忽聽歌聲首盡回雨中聽三絃子適女士王玉映將之呉下過宿蕭城西河里因作長句書感却示汝不聞三絃聲最悲啁嘐哳軋誰所為天心雨落風迸裂坐客一時雙泪垂三絃初開彷鞉鼔萬厯年來重張甫曹剛不作甫不傳何處新聲到江滸當前撥拉如訴説漴漴嘈嘈漸相接絃聲復襍風雨聲拍散音繁語嗚唈江東女士當代希㑹稽王氏留烏衣著書不讓漢時史織素自憐機上詩清暉閣中父書在綵筆長濡舊螺黛吟成紅雨滴口脂行得青藤繞裙帶風流遺世姿獨殊將從秦氏聽啼烏朝行賣珠暮無粟天寒䄂薄凉肌膚可憐兵革滿衢路欲望西陵過江去﨑嶇宛轉進退難祇恐行來且多誤昨宵行李深巷宿聞汝空奩脱車軸今朝寂厯風雨來令我停絃撫心曲梧宫木落愁復愁女墳湖畔今難留君行𣺌欲向何所長江浩浩還東流蛾眉掩抑自今古况復哀彈最凄楚今朝自雨昨自晴不盡三絃此中苦從來出處難復難願君絃絶勿再彈半面將軍歌贈陳左府半面將軍年四十南戰羊城北馬邑歸來十載青門前可憐立功尚少年當時投筆出闗去萬里鳴沙暗雲霧弭節曾留都䕶邉連營不倚將軍樹乗秋代馬向風發烽火蕭闗動京闕判將䧟陣入邉雲誰道張弓效闗月長驅汗血仗蝥弧撒却腰間金僕姑論功較戰課先後不讓唐李那讓呉十年埋劍在田野欲向蠻天洗花馬嶺樹叢叢蔽眼來瀧川浩浩當胸瀉樓船南下共楊僕射獵重教起軍曲從燔礟火燎顚毛不拊珠褌泣髀肉焦頭滅耳志未成獨留半面哀人情誰憐射柳亭邉住竟使垂楊肘後生汝隂蕭大行將赴闕東渡過訪抒筆贈别君不見中牟丈人本負芻與君並坐氊􅉊毺又不見郢人堊鼻頗未潔相對揮斤嘆竒絶丈夫有才貴知己伯樂鹽車兩依倚何况蕭君司馬之鑑且無比鸞鳯集門亦可喜吾聞蕭君奉使持節南海頭還鄉彤馬將淹留忽當繩纓菅屨呼啾啾迄今負土已成室漢相三年將就職我讀愁吟尚慘悽况復哀號在疇昔君家忠孝眞莫當趨庭又有烏衣郎相隨千里學詩禮在道一時稱驌驦與之偕上謝安閣洞口薔薇正花落急返平臺拜紫泥勿教同舍占烏鵲陽春三月風雨多離亭樽酒應高歌胥江渺𣺌烟波裏欲别蕭郎奈爾何書意贈西昌蕭伯升白鷺洲高樓北風吹雪下江郭白鷺洲長暗寥廓蕭郎開幕燃桂枝重飲洲頭最高閣江天飛雪千古情蕭郎意氣踰平生清飈遥洗蜀江峽流雲欲撼西昌城連朝高㑹來鷺渚爭躡湖西講堂履我登傑閣望江河君向空亭考鐘鼔荒洲相接千百人東西十郡雙江濵寒能予衣飢予食悠然歌詠忘昏晨丈夫誰不重意氣揮斥千金偶然事獨成良㑹向千秋那羡平原與無忌春浮園頭枯草香雙江雪霽開春陽奉常舊有好花竹至今人説平泉莊期君更作春浮醉誰道雙江雪路長集曲水即事青山百屏向南郭積翠横開曲池曲高樓一望秦山陽流雲斷續梅雨凉夜來布錦錯燈火列坐庭深對歌舞行童十二唱柘枝招摇背䄂低參差酒酣徹幙燭垂地薌澤微聞墮環細主人潦倒脱絳幘尚引清樽照容色交盡海内為名高相逢不醉徒自豪驪駒在門車在路看殺庭前石榴樹送任雲蛟公車九月芙蓉蔽江渚孝亷船載江頭雨金樽相把潮欲來一曲離歌醉南浦公車十載憐計偕懷書屢上昭王臺旗亭雪煖紫貂墮薊門酒醒黄雲開春官新制改書義漢帝臨軒策竒秘郄氏中林選一枝平津東閣推高第長安春轉花又紅玉騧鞭落驚游龍秋江潮上金魚美盡在任公一釣中金鑑冰壺吟為張推官作金鑑挂高闕百里無近光冰壺貯前庭徹底成清霜龍山嵳峩起東府别搆蓮堂建鐘鼔金鑑朝懸紫嶠曦冰壺夜滴清江雨冰壺金鑑絶世清臯陶淑問稱明刑外臺分節下神讞朱花綠雀摇空㕔張衡機宻棄文網張釋寛平析民枉從來張姓本連天何必張星在天上君不見張公金鏡獻宸聽高鑒千秋著為令餘光并照寒士廬伏櫪長鳴解馳騁又不見庭前綆綆朱絲繩銀牀百尺縋寒冰冰花井乳相映發一時誰與同亷凌持壺壽公公飲冰讀荔裳集安雅堂集感賦當今作者誰擅塲山東趙王與萊陽王公士楨趙進美妙與萊陽正相峙崇禎以還大雅絶逺溯嘉隆紹前哲總是山東李白豪能使人間歌白雪今來三子起方駕不數風流舊厯下幾囬東岱互稱雄一出中原便成霸黄河九曲到海難東臨碣石流漫漫天垂百折亂雲霧風吹萬里廻波瀾丹崖山前日初曉眞見蓬萊接瑶島漢武看成朱雁來秦王渡處丹龍繞君文初著名荔裳集成安雅斯為堂大文既布錦貝息黄鐘在御瓦缶凉瑯琊天水渺難即惟見延清好顔色到溉忻從御史游王筠故受昭明識每惜今人事工巧大雅當前罕分曉但道江郎襍擬工誰言謝客新聲好往讀衍波詞輙思王禮部長憲與大叅鬱若兩珠樹可憐同體異工曲白玊分沙桂分木從教鳯羽蔽天涯寜止鷹揚距河朔于今大雅煩若林鍾嶸三品空沉吟東看無數滄溟水一望蒼茫何處尋别王恒蟋蟀方在堂倐忽歲云暮窮冬雪霏霏游子戒歸路東亭酒煖草葉稀臨行欲換征人衣城南王恒負意氣慷慨向予歌式微躊躇上馬不能别韓信臺前看飛雪將歸贈丘四象隨昔飲江南伯通里便記淮隂有丘子我今轉作淮上吟贈君愧乏雙南金淮河蕩蕩淮水濁丘子風流絶凡俗一見應教勝郭生再觀何必推羊叔逢來三四是子淵傾樽暢飲黄花前道傍不數假王釣城頭空覓甘羅錢凉風蕭槭度秋暮倐見寒冰滿江路芳草萋萋春又生愁殺王孫欲歸去君家兄弟眞不羣元方曾侍金華君在堂循吏未白髪中閨金母摇青裙最憐丘子本孝弟欲渡廬江見毛義問寝嘗踰世子篇敬兄不辨鄉人至况曾仗節急朋友一死一生見要乆白馬南馳范巨車炙雞逺酹橋𤣥酒吁嗟友道不復持東行杵臼將依誰見君不忍辭君去我欲從君那得知毛甡將行張公子礽禕贈甡踏冰行率筆酬之我行淮隂非得已不共王孫釣秋水乞食潜行射澤間避人還向珠湖裏曲江才子好我奇謂我落拓誠相宜中秋高讌并重九人前徃徃稱予詩飛光如流歲如騖渌酒黄花等閒度火樹長留烟水寒美人竟下蕪城路嚴風朔雪旅食凉倦游客子思還鄉躊躇不忍遽分手君還贈我哀歌長窮冬孤客易生感况復哀歌更繾綣一曲秦青雁鶩飛數聲羗笛闗山逺嗟君家世本曲江趨庭得侍尚書郎茂先有叔總博學蒼梧無弟非文章君才獨絕鮮儔侶淮海相逢驟相許曾來夢裏遇江淹頓使花前憶傖父贈我長歌眞有神恍若寒宵對君語對君語感君情此曲名作踏冰行層冰皓皓環江城踏冰我欲冰中度忼慨徘徊百思生西河集巻一百五十九
