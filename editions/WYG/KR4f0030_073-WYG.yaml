body:
  text: 西河集巻七十三翰林院檢討毛竒齡撰傳一三一名蕭山先生傳明南京吏部尚書榮祿大夫諡文靖魏公傳公名驥字仲房蕭山人也先為光之固始人五世祖文昌為宋江淮總制司制幹扈蹕臨安因家焉髙祖有聲宋承直郎常徳路判官曾祖應元臨平務副使祖毅元廣東鹽課司提舉以公貴贈正議大夫資治尹南京吏部左侍郎父希哲明承事郎上髙縣知縣自文昌至毅五世皆居臨安獨希哲以蕭山俗厚洪武庚戌由臨安遷居之公其仲子也先是希哲有兄伯雅在元時為録事判官入明徴辟累官寳鈔提舉司都監今贈同毅者卒于官無嗣而希哲哀思之也希哲長子騏宜後伯雅因愛公遂舎長子騏而後公焉公生而端重嗜學九嵗居生母李喪能哭踊如成人弱冠通五經初試於鄉聞父病不徹棘回公生七嵗而伯雅死此父生父也永樂甲申其兄騏中甲科已授翰林院庶吉士騏以庶吉士遷刑部主事縣志失載誤而公以次年乙酉舉于鄉丙戍㑹試中乙科甲乙科皆進士科文集稱乙科進士是也是年為永樂四年府縣志以鄉舉為乙科遂稱永樂三年誤授松江學訓導公至學以真知實踐為訓課諸生夜誦非諸生畢寢不就寢比甲夜聞誦給茶一器丙夜又聞誦給粥一器與諸生遇雖丙夜未嘗不冠也既而召修永樂大典甲午江右同考縣志作典試誤以明年滿九載諸生楊珙等詣闕請留時仁宗監國命留三年丁酉江右同考十七年己亥簽宰紀要作十四年誤用吏部尚書師逵薦遷太常寺博士陛見太宗謂曰一作謂逵曰誤劉履節為御史九年髙皇帝方授是官勿卑之也是年隨侍皇太子北上留行在太常署事次年營建畢工始行郊壇宗廟諸大典禮並充公導駕官累賜金繒甲辰從征至榆木川㑹太宗上賔預議喪儀仁宗改元召公至御前諭曰久不見卿思卿朕將作𢎞文館必卿與楊漙共任之賜太乙金丹六錠御書封識曰魏仲房收用其見重如此公善書法至是復遣修撰曹曼齡賫手敕曰書澹然二字付曼齡來用東宫圗書覆其上宣宗嗣位稍遷吏部考功員外郎宣德二年丁未同考會試留行在吏部署考功事次年持節充副使赴寧夏冊封慶王府安化眞寧二王并妃賜金銀綵段表裡鞍馬裘帶貂狐等物無算不受及返道又追賜常衣銀相鏤花銀帶鞍馬并詩三章不受受其詩復命上以不受親王賜特殊賜白金綵段表裏光祿酒饌庚戌同考會試越二年遷太常少卿縣志作為少卿時修永樂大典誤正統元年丙辰同考會試越二年戊午此正統三年也藏書獻徴錄皆作宣德誤召試行在吏部左侍郎孜孜以進賢退不肖為已任踰年為眞時進士有未終制來欲為考功者同官許之公毅然曰選法不可欺其親況欺上邪庚申持節充正使往代府行冊封禮其賜予不受如前時壬戍畿甸蝗奉敇巡視問民苦疾凡公所至地蝗為之息于是杜淫祀崇正典復漢漁陽循吏祠重立洪武望祭北鎭碑昌平修狄梁公祠癸亥以老辭不允調禮部巡視如故已而請老益篤先是公在吏部時中官王振怙寵而驕毎出公卿以下皆斂輿避道公與遇于崇文門不顧振啣之通志府志塵談言行賢奕諸錄此下有譛于上三字衆為公危後上以問公公具實對且慷慨曰臣不才備位六卿如臣犬馬不足惜奈何朝廷上温旨慰勞至是又辭乃特改南京吏部以優視之公豫為歛具所屬郎中殷時暴亡即日往弔大暑即贈以豫所為棺已丑滿六載復以老辭弗允間命讞獄時大旱當減刑有王剛惡逆當刑或憫其年少謀緩之公曰此婦人之仁耳天道不時正謂此也獄決而雨十三年戊辰滿九載詣闕上章乞致仕弗允遷南京吏部尚書賜五倫書五經四書孝順事實為善陰隲等書明年冦犯順公寢不去衣時率諸生條安攘策凡三上景泰元年秋冦退始以南京吏部尚書資善大夫致仕時年七十有七縣志七十三誤先是公以尚書進表大學士陳循公同考江西首取士也來謁請曰公雖位冢宰壙尊未嘗立朝願待之事在循輩而已公正色曰君為輔臣應為天下進賢才而乃欲私一校文主耶循大慙公為人端愼簡飭清苦自勵嘗貽書戒其子完曰端重祗愼簡嘿亷勤此吾生平得力處也好别流品辨君子小人不遺餘力嘗曰孟子有云無是非之心非人也同列後進有過必面折之怨誹不恤所至崇正抑邪務持大體山川壇獲雙白􅇠圻内升瑞麥皆却勿奏雖羸不勝衣嘿不出言而峻望素著驕若王振亦雅重之呼為先生贈振用帕一方振不為怪顧性鮮猜物嘗奉使南察㩦一僕行留貯厯年所積俸付同鄉同年子為刑曹郎者其人請封鐍公曰是何待前輩薄乎刑曹郎舍人維風編作子壻畜德錄作家僕笵偽易之公揀俸疑部司所為及揀柴薪銀又然笵工曰有某曹舍人嘗為此物幾是也公曰止是安足知之已而刑曹郎遷辰州守瀕行請誨公曰以君才何郡之足為特親近纎密所當閑矣辰州佩其語而未審也暨舍人以他事露并及前事辰州感之急㩦俸來償公不受曰銀具在耳其厚如此公事兄騏如父騏嘗以謫戌還遷泰寧諭過南京時公為侍郎年七十一迎騏于塗涕泗交頥然趨承恭謹時方隆冬汗浹紗幞公遇鄉人言家事遇有官者言官事悉本樸實自歸田後履芒戴笠布衣糲食其所日奉人或難之與野畯處不少崖異是時杭州太僕卿王榮布政司夏時輩倡恩榮會郡守胡濬亦與焉公先塋在杭將伺公渡江埽塋邀以入會伺之不得以公行無輿從也公詣闕歸嘗乗小舟阨于要津其子稍設儀仗公見命撤去曰豈藉是乎嘗過杭野服舁籃遇錢唐主簿于朝天門急不及避簿遣𨽻追訶之公曰蕭山魏驥者也簿曰蕭山㑹稽何耶公曰蕭山致仕魏驥者也簿惶懼不知所為匍匐請責公急為引咎扶之去天順八年甲申正月憲宗嗣位是年未改元故碑誌皆稱天順甲申而筌宰紀要藏書諸書俱稱裕陵復位誤矣若先德錄竟稱成化元年亦誤詔進階一品榮禄大夫仍令有司給食米羊酒綵叚如數成化七年辛卯監察御史梁昉上言曰臣先任浙江紹興府蕭山縣知縣有本縣致仕南京吏部尚書臣魏驥歸老居里與里人稠處帥子孫耕且讀務本及民間旱澇剔心區畫増堤淘湖弭辟鄉患如或作始誤其身創於凡所行動合禮法為殽為矩嘗説理學以朂後景知務正經雖在家閒有補宇治原其在任之時如訓導四考成材有祭酒陳詢編修楊珙等考試五科取人有學士陳循劉定之周收尚書何文淵祭酒蕭鎡翰林尹鳳岐等兩入太常祀事備飭再任吏部銓選公平其餘事蹟悉載朝史年過七十凡五乞休仕經五廷無一有害竊惟本官生平學行醇篤心術正大且暗于世事轑即瞭明也于國體臣在蕭山之時以為師法即今致仕二十餘年見年九十八嵗四方卭德有如卿雲誤作鄉靈改正百年化育滋此人瑞臣讀前史有以歸老賜祿畢身者有尊養三老五更者有安車蒲輪召者有賜延年杖封公爵者上齒德也本官齒德有餘爵亦不纎以曽孟語可稱達尊洪惟聖朝垂憲如䝉乞敇該部損益前代故事奏請施行或下安車之召諮以治道或遣存問之使慰其養躬此盛事也奉旨禮部會多官議皆言自洪武以來終今猶言反今也臣居重任德望遐夀如臣驥者實所罕有惟是期年難以召致殊恩自上未敢擅材八月戊辰上御奉天門召尚書鄒榦右侍郎劉吉雷復等曰尚書魏驥夀及百齡兼有德望朕深嘉悦其冩敇遣行人存問并賜賚如數九月丁丑遣行人張和存問敇曰卿以醇篤之資正大之學厯仕累朝官登八座歸安田里夀屆百齡進退從容體履康裕緬惟風采嘉嘆不忘特遣行人存問并賜羊酒仍令所司月給米三石贍之終身卿宜倍加調攝益隆夀祉佇聞讜論得慰殷思卿其體朕至懐敇甫臨浙公以是月己丑卒于里第是年為成化七年辛卯獻徴錄作八年誤時年九十有八公少過相者凡三過既而相者褰簾曰為我語向來人勿需相也貴與夀無度矣詰之曰吾見其屢來屐不改跡坐不移袵以是知之及將卒齒􅄠不變如嘗時先卒五日悉揀親朋所請卷軸題識酧答預書囑其子辭朝野祭塟唅襚賻贈先一日夜有大星隕于其隣王文政家質明􅏕潄就枕逮午有紅光熊熊自寢闔出衆驚為延燎也就視無騐既逝復起坐舉手加額若答謝狀連言曰無以報朝廷或曰此預為存問謝云邑人聞計皆哭他郡縣知不知皆為嗟嘆松江人士為位而哭有赴義者學士錢漙合舊門下士及庠序師生咨諸當路如胡安定故事以少牢祀公于學宫明年正月上聞悼惜遣官諭祭二埏并賜營塟既而其子鴻臚寺序班完以公遺言詣闕請辭營塟并乞以有司所存工價銀一千七百兩轉濟饑民上憮然曰老臣清德乃爾邪死尚然乎許之是年蕭山縣知縣李鞏請諡賜諡文靖又明年縣民沈安等一千五百四十人奏曰有已故鄉官致仕吏部尚書臣驥歸農建績千百為民邑地瀕海苦于傾渫上流易蕩下游易槁蕩則堰閼槁即瀦牐宋令楊時創有遺制以蓄以洩既而浸湮本官力尋舊踪著書勸導清復侵占身為怨棷其所奏攻有西江塘北海塘湘湖塘徐家閘螺山閘石巖閘股堰大堰畢公堰麻溪瓜􅅹諸處皆設法提蔽昭著永逺湖利以沛江患可捍祠稿原有開湖築塘二事今縣志府志僅指修湖又以修湘湖為防水患誤以兹旱澇皆能有備前此壬申年大雨􅍂霖圩岸隤倒水如奔馬人將愁魚本官身共畚土家供楗竹至丁丑年亦然今藉臨命遺言辭免營塟匄其工價以救大殺生啣巨澤死溉其漏不有享祭何以報德乞請降敇賜祠與宋縣令楊時久久合祀可之敇合祀德惠祠公長于詩文四方求購者不絶于路山刋木刻幾徧天下且好談理學所著有南齋集素履集理學正義水利切要諸書公初號梅居又號南齋其不由翰林而得諡文崇理學也後孫尚書貞出鎭兩浙取君奭平格之義尊稱之曰平齋先生何靜子曰文集稱門人何御史為之孫作記毛甡曰予嘗謁公像見公和以熈詘然如不勝衣及讀史載至為少宰時慷慨殿前不避權倖一何壯也王元羙疑墓誌不載其事且謂振雅重公當或無譛公理不知振之重公者憚公嚴耳彼豈嘗有愛于公耶且公召見即請老先幾自危而時亦遂以公請初調祠部繼出留都名為優禮實以疎之葉文莊為誌偶舉大略不務摭實而論者遂以是為齟齬誤矣嘗搜公家乗得商文毅所為神道碑葉文莊誌銘王文端姚文敏所為像贊若其子寧國君記事有云詳見年譜碑誌有云禮部尚書鄒君榦所述行狀今無有也公七世孫振宗懼記載散漶終就軼落且曩時為郡縣志者皆畫于方幅記事繆忽因遍考記載而屬予為傳若其記載之廣自通紀史料藏書吾學編法傳錄從信錄一統郡縣通志而外其一言一行彼此毫舉而不可極者名臣獻徴大事言行維風憲章筌宰畜德先進古穰麈談紀錄治世諸書叢叢也嗚呼盛矣何孝子傳孝子名競蕭山人父舜賔成化已丑進士擢南京湖廣道監察御史嘗理畿甸渠道與權有力忤謫戌廣西慶逺衛遵赦還里邑有湘湖宋縣令楊時為溉田作也嵗久浸湮前此魏文靖驥已經擴復而豪家不法仍肆牟食舜賔故文靖門下士也至是慨然曰吾不能治渠吾當治湖遂發湖民私占者揭縣具奏當塗鄒魯以御史謫宰蕭山𢎞治九年從寧羌衛經厯遷此湖民憾者爭賂魯謀變其事舜賔語侵魯魯恨誣以盗署事官印妄奏不經由署事官且身絓戌逃無遇赦牒冒濫冠帶應押解原衛亷理古今孝子集作舜賔長子棘忤逆以赦文盜與魯揭下所司治所司不可魯念舜賔終害已且宿驕悍惡舜賔敢枝柱紀錄彚編載魯自號蕭然逐客改牧民堂為寄豸堂舜賔譏之成仇又詗舜賔陰具實封將入奏會舜賔門下士憂居訓導童君顯章知魯陰事魯䧟以他罪有掘冢佔倉等論絞獄上憲司疑之更下府覆騐道舜賔家魯嗾解人押顯章過舜賔實錄作顯章入謀誤今據招詞改正隨遣里老皁𨽻蒯捕等五百餘人尾而迣執器圍其家曰舜賔簒取重囚毁門而入剽所具實封并成化二十三年原給赦牒及縁例冠帶慿照縳舜賔顯章去各箠以八人每箠五為一人下顯章獄立為文解舜賔原衛亷理不俟詳覆拲械舜賔狼狽督蒯捕任觀等十一人執器押就道魯必欲置之死續遣田敏胡紀等十三人諭意追之三衢屏去服食驅侵之過玉山屏舟押之步至餘干宿昌國寺反秃袖䝉靣氣絶乃故為白官相視楬置而歸一作厝上荒坪魯押其子棘載歸此𢎞治十一年戊午七月日也先是舜賔就道時魯捕其家人者四出孝子方患癰力疾負母朱提其妻虞入夜伏莽中凡三夜達其女兄夫福建僉事縣長山富玹家既而捕者危及之孝子仰天者再念其父為御史時有同年友嘗熟王鼎為南京刑曹郎相親重嘗于廣坐中指語人曰吾生平交滿天下所可託妻孥寄死生者吾元勲一人而已元勲鼎字也至是已為廣東布政司叅政歸里孝子念父語以手搤臂曰吾可投止者其是乎由龕山渡江凡五日達王鼎家諸志傳皆稱餘千凶問後孝子奔吳此據墓誌改正方是時孝子思安置母妻跳身扞父及餘干問至孝子乃擗踊頓絶鼎號泣而讓之曰競爾即死如狗豕耳誰為汝復讐者邪孝子甦既而孝子跽辭曰請歸復讐鼎曰孺子何言之易也方翼虎而思批其爪大難且爾非其人也居久之察孝子鷙可用孝子晝侍母坦坦夜閉一室繞床周遭行枕匏褽蘆雖就寢未嘗寐苐寐從外呼之未嘗不應如是者數月一日孝子曰如競者斯可以報讐矣乎鼎曰殆可也顧有母在爾兄懦存亡未可知壁中婦雖有娠尚未分也念誰為何氏後者且聖天子方在上庸詎無國法乎待之既而魯遷山西按察司僉事鼎乃曰可矣顧孝子曰交友之讐視從父昆弟吾當執兵以從爾顧爾能不煩吾行也餞于庭豫為圜緋骰投之得六緋遂行𢎞治十二年四月二日魯既已禪印詣省取慿藩輿而西孝子先一日歸匿族父何寧家假族父命召故人親暱飲之酒酒行謂曰魯酒將行而御史獨飲恨未泄邦植孝子字縣志作直誤流落報酬無所奈何皆曰豈無共酬之者乎因相顧泣再行又曰酒至則令行脱邦植在必欲甘心此魯酒將誰應之皆曰有令而為之應誰辭三行主者出席跪衆皆跪遍釂以觴既坐又曰事急矣吾與諸公決脱邦植果在云何曰在即從之孝子躍出叩頭曰競在也于是除二室請曰願從者左否者右幸勿歸皆左至是魯出伏道傍園在盛家港陳習園内導盡將過輿孝子手鐵尺直前衆二十人白衣手杖皆前騶從分散馳掀魯仆輿臝之杖一齊下呼號震天地矐其目剔其鬚􅄠相更溺之取食樏盛溲灌中偃箯登舟孝子㧞佩刀呼曰殺吾父者賊耶斫其左股衆止之抵渡用鹹水濯其血孝子與魯並項鏁預令族父何澤二負黄袱赴闕訟寃度出關鼓鳴控按察司時鎭守司設監中監巡按御史及布政分守諸司咸聞變眙愕不知所為而按察司判狀發分巡僉事蕭翀簡閱翀故黨魯至是乃刑孝子令其誣服孝子不堪蹶起大言曰必欲殺競競固非畏死者也顧人孰無父母耶且競既已訟于朝恐非爾所得擅殺者噬臂肉擲案上魯引手摩案若將厭肉孝子乃大呼含血噀翀面一堂皆驚翀亦拂拭動容顧念魯已盲廢絶助者望而孝子氣直不可詘乃視魯曰是肉非爾所能食矣遽起于是鎭監御史各委司道等會質孝子與魯各執詞不相下審者不得決獨布政司楊峻一作岐慨然具由略曰伏讀律例部民毆本屬長官杖且徒傷而後流折傷而後絞若毆非本管則三品以上傷者徒折傷而後絞其五品以上減二等矣今鄒魯久禪印何競之毆乃遲之給慿之際此非本管也且魯聞遷後競母及競各出籲詞籲守巡所特未理耳則兩造而已此非平人毆五品以上官也所爭者施讐之由耳時鎭巡以下聞者􅋏動然終忌之日叅論齗齗不已而何澤二訟闕下者實錄作魯遁去孝子走闕下訟寃今據奏疏改正遣郎中李時給事中李舉會巡按治之審者既各持兩端而胡紀等亦私念罪重隠其實乃擬魯故屏人服食至死競部民毆本屬長官篤疾俱絞孝子不伏其母朱赴鼓院撾鼓復命大理寺寺正曹亷會巡按覆治亷曰爾奈何毆縣官孝子曰競知父讐不知縣官況去任者也但恨毆之勿殺之耳相傳有奈何毆縣官曰印不在手奈何毆僉事曰慿不在手諸語以記載不詳不敢入言畢涕淚俱下亷為之惻然乃曰獨念致死無所從音踪義同又如字由也如何遣杭州前衛指揮僉事同本縣知縣就楬櫝騐孝子故疑櫝有詐將易棺已具歛具至是啟櫝孝子號呼嚙指血􅅹骨騐其眞觀者皆哭然後耤仵易衣歛報傷而解人任觀慷慨撿實具言其狀且出舜賓臨命所付血書若干字于是衆皆伏左騐無異乃改擬魯造意謀殺人斬競毆傷五品以上官加凡人二等徒三年田敏胡紀絞其助魯為惡及競親黨當充軍者十人擺站六人贖徒杖及枷號五十人餘所逮二百餘人准徒贖杖有差獄上上令法司議刑部尚書閔珪等議魯罪當獨競宜倣唐孝子梁悦例充軍實錄作宜坐聚衆持兇器傷人徒以上例其前審官舉時等審勘不詳各罰俸准擬于是辟魯戍孝子福建福寧衛或曰凡孝子所為一禀王鼎如素定者正德改元赦歸又九年甲戌卒孝子自復讐至是凡十六年服衰終其身先是舉時出勘時已改正湘湖奏請勒石其略曰湘湖八十餘里宋令楊文靖草建瀦水勒有舊石本朝成化中魏公致仕加意恢復著有成書今鄉官何舜賔重為廓清原于𢎞治八年白縣上聞已遣布政司分守叅政勘騐明實清出湖民孫全等侵占田一千三百二十七坵堰池九十六口地二十六片瓦窑房屋無算因委本府經厯到縣追理并設􅂄民等八名專一譏攝而挾持汚貨未之匡改今幸藉明命一復其舊棄害就利前緒有績但當預監夙昔杜之後來其命知縣楊鐸據案勒石嗣後遂無有敢占者後張尚書復清占但力較易耳張即御史門下士毛甡曰翁文曰邑之有湖創于龜山復于文靖而終以其身為廓清者御史也龜山文靖兩得祠祀而公以身殉顧不獲與一席之享人固有幸不幸與予按故實得嘉靖三十六年鄉人請名宦蘇琳及孝子鄉賢祠祀各有執結自督學使下業具覈實有提學畢知縣魏詳結而祠典未載何耶孝子事已登孝廟實錄在𢎞治十四年暨諸志傳通志府縣志皆有傳府志傳係湯篤齋太守作又福寧州有復讐編戍傳而疇昔鄉人且有遺孝子并御史傳者嘗讀孝子之子世復揭詞哀其志并錄之世復字景襄邑諸生孝子避讐時生于王叅政家叅政命名所謂齊襄復九世之讐是也嘉靖二十三年世復揭曰故父何競邑諸生也故祖御史以清復湘湖水利為縣令鄒魯阨絶道路湖恢本境身沈異鄉故父力為報讐置魯重辟百年史錄已載實事三修志書均為立傳今䝉本縣重勒縣志而妄者陰肆刋落至于湘湖之下則書曰𢎞治十二年邑人奏聞云云夫復祖之死死湖也父之訟即訟湖也此湖之所以復也不潔書父名而改曰邑人則用心刻矣且夫復讐者雖人子所不願聞然君子立教即嘗以此為激勸亦曰奬忠臣所以教忠矣奬孝子所以教孝矣故李唐張瑝張琇梁悦為父報讐綱目書之魏邑人朱恭明父為烏傷長陳頵所殺而刺殺頵子史冊不去凡以為人理所在不可冺也彼獨無人理耶原其設心但以為迕長吏耳殊不知春秋之義父不受誅子復讐可也是以楚平王君也子胥鞭其屍而後世不以為非趙師韞縣尉也元慶刃其首而先儒以為得禮若父之與魯以禮為不共之讐以律為謀故造意首論之惡況魯已去任非本管也父執其讐非推刃也豈以毆長吏而非之哉夫不忘讐仁也能報讐義也居心積慮以剸讐人之胸勇也束身歸罪而不奸擅殺之律智也一舉而四德備焉父誠君子所許者故大理評之為報讐司宼題之為孝子藉曰不然則使伊人者身處其地將忘親以事讐乎抑猶未乎夫論在千載書不足重不書不足輕特人子為親不容緘也郡下牒縣學訓導楊鋭等執結故御史何舜賔恢復湘湖一人殺身九鄉受惠故生員何競為父報讐洒恨已往垂名將來允合補傳無忝竹冊隆慶二年一作嘉靖三十六年俟考世復揭曰故祖何舜賔監察御史久入縣志屢修不刋而賕官罷閑妄以其父冒濫攙入思名臣行數方幅有限遂刋去復祖益入伊父殊不知伊父以貪暴去官計典昭然未可溷也若復祖為諸生時却補餼廪及登科甲兩辭坊銀其為行人則著聲蜀府曽建皇華清節亭于成都其為御史則抗節京畿復樹南臺風憲碑于白下徒以迕勲戚而致謫攖豪吏以殺身豈嘗有纎微之跡可為國法簡稽者耶是以屈平沉而楚户哀思范滂死而漢人隕涕且其所為殺身者非無利于邑人者也百室享其利而一行不使存其跡以情而言固為刻焅若夫是君者又名教所難容也父既叢諐子復貸惡昔者狄梁公為魏州刺史人已立祠及其子景暉作魏州叅軍稍行汚虐而梁公之祠頓為人毁今其父之行羞比梁公是君之惡浮于景暉縱有故載亦應芟薙況本無是也孟子云殺人之父者人亦殺其父於此緘嘿非人子矣痛予孝之不終每顧名而思義復名具在尚其鑒之縣學公議諸生毛瑚等由化一等都里老孫寶等皆執結直其揭仍去是人傳立御史傳御史字穆之號醒庵自髙祖以上五世皆仕宋有名三世祖為端平進士四世祖宗可道可兄弟舉咸淳鄉薦登進士御史在時有家藏宋試印厯見家乗張大司空傳張大司空嵿字時峻俗通籍者易其字公成化癸卯膺鄉薦丁未第進士厯官南京兵曹郎恥易字也無何以艱歸𢎞治庚申丁中外艱日省墓墓傍有楓攀楓悲號比歸徘徊楓間不忍行因别字楓丘以志不忘或曰其所著書有楓丘子對云予初傳魏公文靖繼傳孝子考其系皆自杭遷蕭公先世家錢唐元提領興甫徙居蕭之橫河里為蕭山人凡六世今贈資政大夫都察院右都御史總督兩廣軍務兼理巡撫清及孔殷其祖父也公初知上饒縣奏績考天下第一取擢南京兵部車駕司主事遷本司員外郎厯遷刑部貴州司郎中考第一正德三年以外轉出守興化明年罷歸當公遷車駕時南京内守備太監故例部司進謁長跪公至揖不跪太監怒詰以故例公曰此何例也如以例則請不跪自嵿始以是為例可乎監怒甚中一人私謂曰此故上饒令也予鎭江藩時知其人容之例内降至留都主事手錄呈内守備公置不録尚書趣之公曰主事豈史胥而任録為後遂為例及為刑部郎隆平侯張佑卒無嗣爭襲賄瑾瑾囑公不聽暨公守興化瑾遣使巡省郡假以盤府貯財物遍索貨賂預致公手記饋以金顔香名一作金香公不報會興化進士戴大賔及第第三人弱冠瑾欲奪其妻妻劉傑女年譜作瑾姪女公復執不可瑾大怒遂摭隆平奪爵事罷公職或曰初公上考得外轉皆瑾為之庚午瑾伏誅起公守南雄既遷江西右叅政時逆濠張甚聞公名預遣其黨王泰郭宇私要之使附已公拒之去濠不悦出公領饒州兵事以饒㓂方横故糺公公請之鎭撫親統官軍勦獲萬年賊首王重七上猶賊首龔福全等散其衆旬日復鎭撫鎭撫奇之會左布政使以述職赴都撫命公署布政使事是年冬司災濠乗間劾公且賂權䜿錢寧張雄謀罷之大學士費宏素賢公執不可處以過誤勿問甲戌考第一遂遷本司右布政使遣使旌異賜綵段羊酒破例彰其尤自開國以來所未行者時左布政使鄭岳以不附濠誣受賕賣㓂羈候别署寮屬過者莫敢視公至入叙故及三堂會勘公白其誣得減罪濠怒授以意使公去公初求去既而曰此地陸沈久矣錚錚者行殆盡吾不可復去使一往淪陷乃任事益力濠脅三學生徒保已孝行諷公具勘公却之曰嵿能舉孝子不能舉孝王也此正德九年事後十三年舉孝行公已去任會遣造内用紙劄公領其役故例督内造紙劄槽戸償料而以官價錢盡輸之濠㨂濾收裝復多尅索公親舍玉山給估辦料子槽户工廪如法監造得羡錢數千緡儲為司災營建之費濠怒密令鎭守太監黎安劾紙畨敝劣尅給自盜而以餘畨盡入之已先具稿呈司禮監太監蕭敬敬曰張君故彊項然中外頗亷之此勿行也且事無為己甚者還其奏明年轉左校尉戎信家有母彘生象獻諸濠濠以為瑞其黨白全等賦詩頌之擇吉開宴諷鎭巡以下諸司郡縣同日進賀既集公毅然曰以為瑞耶當賀于政府不當賀于王府以為妖耶省之不足何賀之有衆為悚然既又曰安禄山化猪為龍猶禍不旋踵況豕象乎且豕亥也象則十二位皆屬者也以一陰而生十二位細不鬻鉅害立至矣遽止丙子開生員援例監濠令引禮丁瓉者捧金如干從甬道躧入為其内戚徐生大才援納且稱有旨公曰何旨耶瓚以故對公曰以納例而犯㕔事以引禮而闌甬道可謂旨乎將叅之濠令長史入謝過乃已然終不與例三月史作九月誤濠將踞官湖史作池賂其謀主李自實徐以語公公曰侍郎自實侍郎致仕能占王土耶此非嵿所得聞也如其不然則嵿無敢以官湖私侍郎理濠色變公出濠大詈曰張風囚吾固知其不足語也或曰風囚者即楓丘之變音云五月濠以故府隘欲四拓其地擬之大内將撤民居櫐府居羣情洶洶公憂之直入爭曰故府有舊制必拓之非制也且江西民窮甚矣盜賊􅑣起殿下身為藩主休戚與同今府居七八重繚垣十餘里猶欲廣之撒民居一丈不足一楹而小民八口之椽廢矣此令一行男女流散殿下縱不念百姓獨不念朝廷乎且殿下即欲自大夸于諸藩又何藉此尺寸土為辭旨愷切便便不已濠屢麾之出不顧會營建災司司址王府右故例司府髙比埒濠加司已倍至是増司十五尺與府略等濠知拓地必不得乃抵曰司何得與王府等必􅈔此地司何得以髙于舊事且此何制公曰以殿下為爭袤狹耳乃爭此崇庳也耶謹受令矣趨而出遽割司五尺而濠怒不徹陰詗公他事且鉤索營建出入之數八月公例監鄉試已入棘濠遣官校二十人破司後廨出夫人戴并童婢等列㕔事盤撿帑畜得衣冠文書數竹箱無鐍鑰錢數緡日用薪米而已濠計無所施恚曰勿再言風囚徒擾我心遣去之已耳公出棘乃遣承奉劉吉餽以果公啟視則棗一梨一薑一芥一公呼吉曰我知之矣是欲我早離江西界也夫臣子受命于君行止豈人所能預哉是冬入覲吏部考第一賜宴内府位列天下方面官上朝野傾動濠大懼恐膺要擢益妨已急賂錢寧等謀置散地遂遷南京光禄寺卿明史紀事及郡縣志皆稱賂陞光禄卿誤衆議􅅝然有論薦者明年擢都察院右副都御史奉敇巡撫保定等處兼提督紫荆等關本年罷歸前是江彬宣府人欲挾上自誇誘狩宣府至是就宣府建鎭國府第復誘西狩所至省郡縣索金璧裘馬婦女等名曰供應公所統轄無供應張忠責之公曰故制巡幸恐無以金錢子女為饗獻者且此間地瘠不産他物民貧不保夕婦女皆民妻室必欲供應則嵿實不職嵿請歸忠曰都府公欲歸耶歸已耳請之何有撟旨令歸明年己卯濠伏誅南京巡江都御史劉玉奏曰逆藩蓄異戕害撫司原其不臣本非一日今幸䝉顯戮則開沈理抑在所宜亟先任巡撫都御史今致仕林俊先任布政使今致仕張嵿此則抑其非分見諸行事者也先任副使今充軍胡世寧先任御史今降職范輅此則糾其不法見諸章奏者也既鑒前節當策後用不報明年浙江巡撫都御史許光庭復疏薦之不報行狀稱以薦起誤辛巳彬寧伏誅乃起公都察院右都御史總督兩廣軍務兼理巡撫一切便宜從事年譜又云是年赴任又以盤𣙜鹽厰題准先斬後奏事例兩廣自成𢎞以來蠻冦飈起屢勦不靖至是益甚凡陽峒栁慶藤峽南詔諸處叢篁菁棘厯狃險阻且廣西土官田州太守岑猛累藉世緒繕器榖介驕蹇莫制從前進勦自韓雍李承勲諸督多藉犄角故益自負而公羈縻之不令借援得邀功伐預于嘉靖元年壬午密疏其惡思以漸揃滅而嚴勒將較陰别營伍盤鹽課椒以充糧儲于是設奇四出是年三月平廣西融縣賊周克亮六月平廣西上思州逆賊土官黄鏐敇遣賞銀三十兩紵絲三表裏十月進階資政大夫二年四月平福建賊江小范四江廣賊梁八尺黄萬山賴亷十月平廣東新寧賊嚴阮蔡猛三㧞寨二百所斬獲二萬餘衆敇遣賞鈔萬貫紵絲三表裏三年三月平廣東賊李文積公以疾辭旨曰卿望老成總督重任正藉委託不允所辭九月考滿廕一子入監是月召掌南京都察院事公又以疾辭旨曰卿厯有所勞方借南臺觀風紀耳不允公又辭旨曰老成年力未衰委任方切留臺掌握正東南重寄願占讜節七月仁夀宫災公復以消異請辭旨曰咎當朕躬詎在多哲十月進南京工部尚書明年丙戌詔賞先事疏惡功以廣西田州逆賊土官岑猛征勦克㨗及照先任總督張嵿曽于嘉靖元年疏猛逆惡宜先事預防功亦難免兵部以聞敇賞銀一十兩紵絲一表裏時三邊缺總制給事中管律論曰今之總制即古之大將也國家安危藩鎭得䘮皆于是繫詎可藐哉臣訪得尚書張嵿孟鳳侍郎孟春都御史姚謨陳九疇此五臣者允恊斯任剡上會猛黨廣東通畨官陶鳳儀郭畀并掌南察時所黜巡江都御史譚魯都指揮陳璠内守備舍人曹顯等各以宿懟賂言者誣公輸官賕為已有糺之上素知公亷得急白然寢其薦丁亥四月公引疾力辭乞以資政大夫南京工部尚書致仕許之年譜作不允辭誤明年詔進一品階榮禄大夫遣有司賫綵叚羊酒問勞越二年辛卯用廷臣薦將起用正月十八日卒年七十四浙江巡撫都御史胡璉巡按御史李佶各以訃疏故大司空張嵿初聲邑長嗣表曹郎節勵藩方功成開府晩著輯寧之略時亡將相之人欲報忠良宜崇優恤奉旨吏部文選考功并兵部職方厯勘累任上考及撫督軍功賞賚與奏畢合照例行翰林院工部依級祭塟兼行浙司備物遣祭時禮部尚書兼學士夏言題請賜諡于是遣工部主事羅餘慶營塟事布政司叅政党以平叅議姜儀諭祭二壇或曰公遺言曰吾得以楓丘易名字足矣其子遵公命勿復請諡而是時行孝廟典例謚由内裁故遲久不發葢中有沮之者云公罷興化歸饔飱不繼其夫人每食必故曰清官食粥糜及為江西左藩時逆濠盤撿無所有公歸語夫人曰此非清官之效乎後督兩廣有獻珠母海青嬰珠者公取大珠三貽夫人曰所以酬粥糜也公厯任多政蹟上饒立社倉裁浮驛清漁畝造舟梁濬瀦捍陂以防暵霪興化疏行估禁漂市鉏暴剔弊南雄罷賽祀節夫里修復庾嶺張文獻祠改郡縣兩學武宗實録載郡縣二學共一文廟故改建他所以盤鹽𣙜椒代民虚賦其去嶺也民送至嶺遂祠嶺乂勒石學宫解元李昕為記南京開金城溝其從巡撫保定歸清復鄉民呉瓚等占佃湖田如干畝居鄉不乗輿西江塘北海塘毛山閘圮修之公師孝子之父御史御史師文靖自文靖以下師生三世相繼復湖或曰有所受也文靖忤王振御史忤鄒魯公忤内守備太監忤瑾忤濠忤彬寧忤岑猛其剛正相似如此公有集亡初公第進士以文名簡公纂憲廟實録又奉勅往蘇松諸郡採纂政務民風人物期年復命始筮仕贊曰公兩以開幕出督軍務而不得樞要其時為之與抑亦有所掎也千鎔之鏐厯試不折忠果正直志在霜雪公實有之顧累公功德尚靳易名豈易字有志不欲更掩其稱與公誌傳俱闕其族孫廷弼弼成各以公譜狀示予屬傳因旁搜他乗述其載事可徵信者惟是邦賢之望亦魏何與張耳皆用至剛雖文靖善全御史不臧互有得失然得公乃章矣西河集卷七十三
