body:
  text: 西河集巻十七翰林院檢討毛奇齡撰書四答馬山公論戴烈婦書乍損緘示值腹下卧起搶卒報去既復繙閲似足下有不釋於此者僕少不戒口壮罹大隙老年鐍閉逺過他日特以足下謙已太過示文勤懇必欲指類因不揣狂昧繆指三病謂輕於下筆一貪於持論二執一説便攻一説三而足下遽謂華陀抽割創已立愈然猶云鍼石之間毫芒即乖是以僕為誤投藥也又云意苟不盡何有於病是以僕為必不能盡言也夫如是則所謂華陀者匪惟風之抑愧之矣又烏得不彊起一再吿之向閲尊駁家㑹侯戴烈婦傳以為烈婦為夫死夫姓呉宜稱呉烈婦不宜稱戴於是引春秋杞伯姬事為証辭嚴義切故僕叅數語註之左方謂婦無以夫氏者或以謚如荘姜共姬是也或以國如杞伯姬呉孟子是也並無稱姒伯姬姬孟子者若孔叢子云婦人於夫氏以姓字稱謂婦無姓者則以夫之姓字稱其婦如黔婁妻杞梁妻僖負羈妻栁下惠妻類而後之遵其例者即并婦之有姓者而亦稱之如王霸妻鮑宣妻焦仲卿妻樂羊子妻類然亦並無舍夫名字而單冠以夫姓如云某貞姬某節婦者也向使足下謂戴烈婦當稱呉某妻不當稱戴則其所云不當稱戴者固已非是然欲稱呉某妻亦無不可而足下謂宜稱呉不宜稱戴則兩失之矣故略為註及且猶恐戴烈婦之稱不明故既引李節婦與清河崔氏為証而又引劉長卿妻桓氏當時旌為桓婺與稱為義桓者為戴比例而足下乃又變其説謂尋常稱謂與作傳詞例不同稱謂從本姓若特為立傳則未有不屬之某人妻者于是取後漢列女傳指為定例首引鮑妻桓氏為証而曰假曰桓少君者渤海鮑宣妻也古來有是史筆傳體否竊疑足下向引春秋不及後漢傳今乃以僕舉桓婺係後漢傳文故考及之而不知執一攻一正復坐此足下苐知列女傳為後漢所始而不知始於西漢劉向僕前所云秋胡妻杞梁妻者為劉向列女傳言之也所云王霸妻樂羊子妻者為後漢列女傳言之也此僕所已言者也僕苐言古有是稱不曾分别兩家列女一是私傳一是史傳且不明言公私皆可稱而足下遂謂私稱用本姓史傳用夫姓且謂史筆傳體必無是稱斷斷鑿鑿此則下筆之最輕者晉劉孝標註世説趙母不知何趙母也引列女傳曰趙姬者桐鄉令東郡虞韙妻也皇帝敬其才詔入宫省作列女傳註號趙母註夫趙母所註列女傳則劉向列女傳也孝標所引列女傳則當時魏晉間舊史傳也以趙母之才孝標之學與舊史列女傳之古而可據而明明使趙姬之姓先於虞韙乃曰桓少君為鮑宣妻則便非史筆此是何説况史傳原文其為先婦姓而後夫姓者葢不知凡㡬也夫魯史漢傳記載不一南北五代閨闈闕講然而伯姬之名先宋共矣驪女雖惡有云驪姬者晉獻之夫人矣以至魯潔婦作秋胡之室貞姬貞姜為楚王白公之婦三代所稱比比而是若夫後史則西漢梁竦女者樊調妻也東晉孔耋朱百年之配也唐史河南竇烈婦者朝邑令畢氏之内子也楊烈婦者李侃室也宋則崔氏為合肥包繶之妻何氏為呉人呉永年之婦其列氏先後班班可考夫天經地義人人知之名正言順亦人人知之然而詩稱仲壬未傷經義史稱有娀有邰不為名不正而言不順夫婦為夫死婦之賢也夫有婦死節夫之幸也賢可旌而幸不可旌則夫可沫而婦不可沫有人於此其惠於人者則徳者也其為人所惠者則徳之者也徳之者可忘而徳者必不可忘然則烈婦之稱戴亦有為矣若云班昭曾稱曹大家則史文無是也史文稱大家者再而必不加一曹字范傳可考也若云孟子之母稱孟母嚴延年之母稱嚴媪則大不然毋論嚴媪與孟母皆無本姓僕前已明言之顧此以子稱非夫例也夫孟母者猶言孟子之母也猶之范滂之母稱滂母陶侃之母稱陶母也如謂陶母不姓陶正是夫姓則未聞滂母之夫姓滂也如謂陶母姓湛何不稱湛母則正以母是陶侃母非湛侃母也至於嚴媪者即五子萬石之媪也一名萬石媪夫嚴氏五子合萬石稱萬石媪猶之石氏五子合萬石稱萬石君則其以子稱而不以夫稱又斷可識矣足下又謂嚴媪不生於空桑何以無姓則王陵母王孫賈母皆不生空桑者也何以無姓也至若龎娥親本趙氏女而皇甫作傳不曰趙而曰龎此亦為子言之耳猶之孟母與嚴媼耳乃足下又曰何不曰趙娥親而曰龎娥親夫娥親之夫不知為誰也娥親之龎以子不以夫也足下不曾讀晉書乎龎娥者龎某母也字娥其又稱娥親者正以為龎某之母故親之夫親以子而可以他人親乎他人不可親而可以夫親之乎凡此皆一説之無可通者至於末一節則并一説亦無之足下謂僕舉劉妻刑耳守節朝廷旌其門曰行義桓婺可為戴例為非是特發明云劉妻有無忝所生之心而為之旌故變常例稱義桓猶春秋之特筆也云爾此以義起不可為例觀其吿宗婦曰昔我先君五更學為儒宗尊為帝師五更以來男以忠孝顯女以貞順稱故豫為刑翦以明我情於是沛相上之其旌曰義桓以是也我故曰此以義起不可為例云云此説初觀之猝不能解既而曲揣尊意似謂婦為夫死則當稱夫姓今婺遵先訓而守夫節此專為其家者也專為其家則當以其家之姓姓之故曰特筆曰以義起曰本無忝之志而就此推彼則仍是烈婦為呉死故當稱呉之本説也此毋論其説非是而即以其説還詰之足下不甫言龎娥親乎娥親殺父讎以報所生與婺之遵先訓而抱無忝誰為孝乎則必曰俱孝娥親痛父死而為父報讎與婺之遵先訓而為夫守志誰為為其家者乎則必曰娥親為其家是何也則以婺之無忝尚為夫而娥親之無忝實為父也乃以婺之為其夫而得䝉家姓娥親之為其父而反不得䝉家姓所謂春秋之特筆安在且以足下之善揆義例一則曰此義非例再則曰此義非例而於婺則以本姓為義於娥親則反以夫姓為義而曰奚不曰趙娥親而曰龎娥親以是柱口則是所謂義者未必義所謂非例者未必非例而其所云烈婦為呉當稱呉者反託之彼此無據之臆説而在義在例兩無所主則是自矛之而自盾之也且足下疑僕所引祗桓婺一事必謂苟舍婺事定無他據故來章亦明云辱賜書祗桓婺一事殊不知引古務切不務多此非僕之真寡昧也僕以為烈婦當旌鮮有不署婦姓者故特取旌門一節姑引及之葢惟恐俗有誤稱記載荒略偶失婦姓則俗便以他氏加之如鮑氏女宗尚加夫氏梁之髙行即冐以國號其在當時定無有以國號旌其門者故凡僕所註引而不發平情以觀原可類推若必欲更指一二則在史傳有封永壽鄉君者則曰王蘭英者獨孤師仁之姆也有詔賜侍養存問終身者則曰金節婦者安南賊帥陶齊亮之母也此非以義起可比例者至如堅貞節婦李氏既旌其門復改所居里名節婦里此亦世稱李節婦者乃史傳曰堅貞節婦李者鄭廉妻也此一李也若夫斷背李節婦則虢州司戸王凝妻也此又一李也皆可例也至於廖節婦為臨江軍歐陽貢士之妻王貞婦為臨江民家某氏之媳凡稱貞稱節無不從婦姓却夫姓者至前所引竇烈婦楊烈婦則正以烈稱此真戴烈婦比例也然而朝廷旌之史官傳之其所製傳贊如足下所云史筆傳體者乃云竇烈婦以身捍令又云世皆稱楊烈婦又云某州某妻某州某女總不如楊烈婦之慷愾識大義一曰楊烈婦再曰楊烈婦其詞義斷斷累稱不易一若樂府之呼都䕶如此夫戴烈婦者其所爭祗一旌耳即弔誄滿篋亦祗為他日受旌地耳假使幸而旌旌而至於登實錄列史傳則明有成例所謂宜稱戴不宜稱呉者此在史傳與家傳應均有之而尚何公私之足云僕年踰七十衰老日增身痺之未瘳而何有人病特來章過激且必索盡言以當鍼石故據牀彊起復不憚喋喋如此後即有所示不敢再報臨復増惕上宋大司馬論婚姻書李丹壑庶常内閣學士容齋公之子也兒時曾聘公同年生王君女未娶㑹三藩兵變王君仕西川阻絶有年丹壑年十六于己未科成進士館選出宋大司馬廖天公門下遂乞司馬公息女為配臨娶而王師收復滇南西川先闢王君已歸命還朝籍奏兵部于是始紛紛追道前事司馬公大憾前此成説時蹇修有人而呉俗行聘必借諸親友為之儐价西河為閣學門下士與錢編修庸亭陳檢討其年同往行聘至是司馬公并責備諸君謂預知其事故為隠匿且日夕聚議不决西河乃上書自明後亦究用西河書中語定長次焉某不肖不能自立循俗詭隨於舊年春寄居李閣學師宅時㑹師為世兄庶常通婚名族備役蹇修此事生平本未嘗有徒以潘楊世媾無庸講求且説情合好俱已有人祗呉中舊族須煩親朋将幣以為飾恭故忻然承任初未嘗計及歸妹之彖有殊扐也及行聘既畢驟聞他説隨與同事諸君合辭具牘其從前茫然不諳之情已荷見亮頃紛紛之言周章難定不監緣曲必謂儐价通導定有情愫偶一差池百口莫辨且此事何事冐訿忍訽省括不早馳駟難逭因敢略陳所見以徼聰聽昔者韋放張率指腹作聘范雲江祏被酒成説然而韋張不移而江范終棄者何也則以貴賤枯菀之形有相難也今李師與王君巾箱之剪不返當年黄鵠之棲未移華盛特因王君逺宦西川干戈阻絶右丞司戸曽未聞其從賊中來而庶常年已成丁單傳之子旁鮮兄弟太夫人在堂遂殷然為嗣續計求匹髙門揆之於理原未有過從来禮重著代婚貴及時以承祧言則著代為重以授阼言則失時可虞且當時䧟賊未易料也昔謝超宗為子娶張敬兒女而宋帝疑之及敬兒獲罪而超宗不免於難王裒與管彦早訂婚姻後裒以彦仕晉朝死𦵏京邑遂公然易婚夫裒不仕晉此為私情致身典午則為同量然猶竟以此易婚今䧟賊未歸出處何道嫌畏之際君子不居揆之利害則超宗可鑒也審之義理則王裒可思也儻李師於今聘未行之前西川未開之際明吿王氏播言親黨屬以逺隔遐陬義當别娶袁隗女自好聽許令匹鄭忽雖却齊齊女無惡則堂堂取婦夫孰云非而惜乎見之遲而不發之於早也今則西川既開屬國無恙楊信有歸來之期王肅無棄婦之理踟蹰審量實有難安如謂髙門既配彼可㫁絶是欲以禁臠之例施等倫也夫子敬却婚至死猶憾不應平世重見此事如謂禮難顯拒可以陰却此既他娶彼當􅅗退則欲以鵲巢百兩風使自㫁萬一蓍簪敝席不能相忘顧協幼聘六十不嫁何以處之假令兩大耦嫡不妨並建則尊卑不别安豐久有遺議左右夫人賈充豈可為法假使公私中外互為長少則李繁有姊不肯暫降於亂離母丘異居豈能抑之於别室夫却婚不可潜退不能耦嫡既難以並行互長又無以自决勢惟有彼此皆娶冺名嫡庶特校先後辨定正繼夫正無貴賤繼無賢不肖夫人而知之也然而先者當正後者當繼亦夫人而共曉之也特是聘之先後人所易明娶之先後則人所未解昔者趙衰入翟叔隗先婚呂布未亂鄭陳早配故宣孟返而趙姬下之徐州平而司空之妹公然居長今庶常有聘猶未婚也王氏定名其於庶常未嘗有一日之配也夫禮重歸娶貴在上堂婦禮既成始可授室向使有聘無娶則父母偶䘮尚當假辭以却婚享不成婦則雖三月不幸猶必歸而附女氏之黨何則重身先矣兹者王雖初聘六禮未具干戈阻絶未經奠摯而我則雙輪既御於在途祖醮将行之目下趙姬已先婚誰謂貴當下賤陳羣妹早配自非後娶可上則是荀凱之所為先為嫡而後為繼者惟此為先衞恒之所為新可奪而舊不可奪者亦惟此為舊也夫事苟未决可以引經理所難通宜據先典今按經義既如此揆諸掌故又如彼何去何從在下執必有定見而悠悠之口必欲使决裂以行甚至漫相爭上必無一説以䖏此聚訟紛紛盡成築室徘徊兩端無一而可某學識荒謭見事遲拙周官媒氏實慚調處勢惟有緘口退避不復相闗諸妄行事都不敢預豈曰立身無過抑亦訕謗所叢或可藉此徼末減耳臨緘皇恐仰匄埀鑒某頓首死罪覆謝福建呉觀察薦舉書車騎南行時正值某吹箎海上不能隨族躬餞祗以奏記託姜京兆寄去聞閩中壺􅈀漸廣皆嚴助朱翁子開拓之力雖海濵尚設烽堠顧長城在彼定無足慮特某奔走半生了無可見其為四方君子遐棄亦既多日近絃績書来驟傳閣下以新奉上諭循求天下博學之士謬薦及某甚為駴怖某久處困詘甘心蓬草如麋鹿在野叵耐縶靮猨猱入市不可衣履故生平奔逃北極齊宋而必不敢使誤步所至略近長安何則都㑹在前足未渉而心已驚也今無論宏才碩學某實無有而即欲一至長安望入雲之闕踐如霞之陛目眩青規心顫黄屋使其不瞀亂狂走鮮矣禮曰儒有可珍必忠信以待舉力行以待取今實無可舉可取之素而謬膺進獻則忠信不足何况力行夫明月之珠暗投道路尚虞有按劍相盼者乃以􅎙丸鳩彈之質光彩不足糞臭有餘而使之橫陳道左則往來徒旅且舉足而踧棄之耳此非按劍所可言也人有縶駑馬於市者終嵗不售孫陽見而偶顧之初未嘗以其馬之非駑也目睫所經偶一觸及而市之踊其價者􅈝至十倍然而價則髙矣馬則終安所用矣故駑馬被售雖未嘗不感孫陽之一顧而究不能不觳悚於将售之際何則以其原不可以售也况博學之舉實本制科在漢初天子親試有先後而無得失而其既有司行事十取一二故薦引雖多而被錄甚少今則徴車滿天下矣續食而入萬不敵夫躡履之出他日将車不能都養不可一出一入必至流落且夫朝廷求賢本屬盛典中外薦舉豈有干請然以某所聞名士競進藉此營騖多有挾門状候涓人以祈得當者某素乏知交並鮮故舊而偏於閣下有生平之歡致有此役昔漢長安令楊興将薦匡衡而以史髙為車騎将軍薦引親屬遂謂将軍以幕府之尊天下仰重而其所舉者乃不過私門賔客是有狐白裘而反衣之也今中外徴車多蹈此病而閣下所薦又復類是某則已矣天下其將謂閣下何䝉絃績來札謂三月下旬方能拜疏徴書之下當在仲夏此時正可中沮况海濵戒嚴無暇及此萬惟縝慎幸勿為徐淑所誤而為嵇康所憎踧踖不具寄曼殊禁方地下書月日寄曼殊汝病時患苦不可忍予每思及輙心悸齒噤欲塞耳不可掩目又不可蹋足搯肌肉不信天地間何以有此憯事自非夙生有因何至此今汝以是病舍我去思去我後能徼倖不發如平時七八月間漸漸已亦固天地間未必不有之事萬一不然則思昔病時雖患苦不可忍猶有我在有醫有藥物有軟兠帔可闗舉行有婢按摩之有牽挽繩在清防間譬救月然奔馳奏鼔雖無補於月然其救之者自在也今則誰為之醫者行者牽且挽者然則患苦何時是已况不必不甚乎夫不已吾驚心不必不甚則吾即以是刻驅吾神尋汝天髙地闊吾能芒芒即汝遇如當日否耶予思汝病時亦曾療汝但療而不效不知汝之死不療之故與抑亦療之不以道而反致死也且療亦殊苦炙熨湯醴皆不勝任毋論療不效即效亦非汝所願受况以療致死則其不宜療又瞭然者今有禁方於此姜君肩吾所祕受也不服藥不炙不熨不受痛苦即不效亦必不致死且萬無不效姜君曾以此活人多矣因悔生前不汝遇不為汝療故急欲療汝而以仙人所授方不惜授予而使予轉為汝療予乃思一療法将選療病日就汝生平所傳留視圖再摹之於絹而療於所患有符有咒意者汝既死近於鬼神則與仙人所授方相宜譬之幻月然蘆灰一畫月暈頓闕未可知也萬一療之不如法不效我即書禁方燔之與汝汝自療之何如某白西河集巻十七
