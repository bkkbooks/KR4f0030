body:
  text: 西河集巻四十三翰林院檢討毛奇齡撰序二十兩浙張中丞監臨庚午科鄉試舉人放榜謁謝公序皇上御極之二十九年禮臣舉賔興故事次及兩浙分别監臨提調監試考試諸官而以大中丞張公為諸使長監臨全闈昭舊典也前此東南用兵師武䇿力能以克詰戎行樹揆文奮武之略遂致東南禮治甲于天下我皇上廵方來浙特廣文教進諸生而諭以文章經術之本士子之渢渢興起于黌序者三物六行互相比較惟恐以浮文虚夸致妨德藝徃徃簡練揣摩必欲使偶然摸索皆名副其實而言見乎行始不負國家求賢至意故公于闢闈之始上下劼毖綱紀肅然而一經鏁院遂晨夕戒儆防衛周宻使中外官僚叅詳校理無不矢公矢慎底于有成公之于監臨可謂勞矣聞之宋之嘉祐以廬陵歐陽專主貢舉與端明韓君龍圖梅君輩互相倡和嬗為勝事今之監臨即古之知貢舉也然而監塲視巻今昔不同夫程材無方升求有數則限于材地風簾官燭刻日迫促則艱于審視參詳分牘各執意見則難于合併而公皆有以調劑之未嘗為苛細之行而合同融化以前簾而統中簾之務相傳草榜已定公遍閱其所取者為之甲乙暨放榜後尚能記其詞句而指其瑕瑜自非至公亡私以得人為己任者焉能至此昔者武成榜發姓稀名闇即為時譏而今則知名之士前後絡繹單寒陋巷皆蒙進取即間有閥閲子弟世濟家襲亦必少見頭角曽稱藝林並無衣冠襁褓之藉為口實道路之人不歸之主文之明而歸之監臨之公不歸之參詳小試之能謹而歸之監臨之飭之嚴而倡之毖則豈非方州大臣實能以求賢進士為致主之先資也哉公詞臣起家分闈者再皆以得人膺冰玉之鑒而觀風浙河日省月試裒然舉首者多登賢書其惠我譽髦如是嵗在庚午識者謂庚者更新之象而午為文明離光正中必有大人焉起而持其運會者公其是矣榜發之後舉人若干人謁公于軍門例有饗謝因請予為文而序之如此蒼源文集序吾越自陸佃陸游而後無文人焉若徐渭則丘邑之長豈可與中原伯叔較先後哉然而概視之天下與吾越同間嘗北極燕齊南抵甌越東西歴江漢河濟求若雲間日下相見如素渺不可得即或聞名而思通文詞以致慕效亦百不得一二然後知吾越雖乏才仍未嘗少遜于天下人亦有言一隅者四表之則也九有者一方之積也當予出遊時有稱諸暨馮蒼源氏為吾越著作之雄予嘗思其人而未之見也暨予歸里竊觀蒼源氏所著有叢笥一巻其目列叢説叢記叢問叢對諸條彷彿古諸子家言而不假連類不藉影響直抒諸所見而精警刻核語無旁貸鍥鍥乎論難之能也越數年而介予及門示以生平所著書兼屬予序人有學文不成者去而學藝而藝成曰文與藝等也學文之家不必減于學藝之衆也然而十人學藝而十藝名十人學文而文不得一名豈真藝人嬴于才而行文之家率鐬心鉥智曠百世而不一覯哉夫操斤滿前不可謂工倕也把筆者滿家不可謂屈宋與賈晁也藝事易習而難精文易為而難以名然則其所謂無文人者非無文人也謂無文人而如農師如務觀者也蒼源之詩别于文長而文則直與農師相頡頏吾越之人斯居其一矣特予與蒼源相隔祗百里耳其年齒相去亦不過七八歳以下而示我所著則予年七十蒼源幾八十然尚未相見而寄題其篇則猶是四海之大九州之廣所謂聞名而思見所著而起慕效者而又何一方之足云齊母張太君九十壽序齊欽齋徴士尊人也予與徵士齊君游其母張太君以大節受旌爾時有司即以賢壽題其門以為母年七十世所罕也及予為母作節壽録已届八十齊君嘗拜予且喜且懼以為世安有長繩可繫如此日者乃予宦京師以迄予告中間相距又十年而母尚無恙齊君因寓書及予重以九十之觴謂予稱祝予然後知我母之難老正未既也夫母不嘗以賢壽稱耶夫以賢致節以節致壽賢與節有定而壽則無定向之稱壽亦徒以七十古稀未必後來之有進于此而即此以頌已云罕覯乃不意進而八十又進而九十則夫向之所為壽者在當時以為頌而以今觀之則祗為祈也在當時以為祝其所已至而以今觀之則祗祈其所未至也夫至祈其所未至而千秋百歳亦祗于未至間概之已矣且夫節母之年未易也冰霜短景私顧難度每詘指一歳可抵十歳而人之求節母者常恐以靡他之義久而生變每詘指一嵗可抵數十歳則夫自矢志以至受旌已不啻百年之享而況受旌以來進而加倍則夫期頥耄耋豈足復為我母賀況從來賢節之稱多得之身後幾見榮名大典及身享受至數十年者則是所至皆千秋也齊君書至云吾母教子之切垂老不輟而為之子者與故人相隔十年貧窶如故是安足以慰母心則節壽録不云乎齊氏自觀察公後幾墮儒術而吾母于先公齎志之後撫藐諸孤而授一經以為斯世經術之冠此真所謂以善養不以禄養者雖絀處何憾焉黙堂詩鈔序古者試有甲乙科而鄉試無之以鄉第解之南省已耳未嘗設科也今則鄉會試並皆設科亦並有甲乙而近反去會試之乙科而獨存鄉試故會試無副榜即殿試三等皆謂之甲惟鄉試則但取入解者解禮部而以其副者貢之成均即乙科也康熙庚午上命編修張君尚書郎王君司浙鄉試而以沈君武抑中乙科或謂有司明能知武抑或曰不然武抑豈僅中乙科者予知武抑久三吴推指名士首絀指武抑其先人四世皆中甲科由父而上其為中外執法者三世矣以視武抑誠不無慙卿慙長之目區區是科誠何足為武抑重然而武抑之重是科何夥也毋論武抑舉文久為世誦習而即觀其詩體撰閎闓舉纂紃雕繪而悉返之神明之間然且質不傷雅樸不涉鄙追六義之遺而一袪近習之陋嘗謂浙詩頓降始于康熙甲乙間而武抑早有以振之予初從武康二韋君問訊武抑在三十年前越二十年而與陳君興公論文長安是時武抑居塘西往往對其友而未嘗不願見其為人也今武抑以主文編修君出予門下見予于湖濵時興公二韋已墓有宿草而予始得與武抑慷慨論詩雖知之有素然亦私幸有是舉以得一見也然則武抑入長安其得藉是舉以見其詩并見其人猶是矣予故序其詩并述其所遇以志予相見之有幸焉借山詩序前一年折指戒為文間或彊勉偶一及雜體而于序則戒之盡以為生平皆酬應文字而序居什八詩序尤甚人有以詩序請者必鑿坯閉閤拒不容息而獨于借山則不然借山謂予曰凡子之相戒序詩者亦以絶夫庸妄干進之徒謬邀虚譽以馳騖于聲利之塲言不足髙祗以取憎而有如澹然泊然絶塵離坱以偶然與風水相遭而不能出一詞加之豈古人贈言意哉曰不然夫序詩者序其詩耳其詩佳雖或馳騖可也其詩不佳雖澹泊不可也往予讀借山蘭亭一詩亟求其人而不得書其詩扇間既而遇旡休則旡休几前亦有其人所贈詩其佳與蘭亭等夫山臞之作不習薾芾必求其髙文典册飛書馳檄固為非分乃若六朝自湯休以下中晩唐自皎然靈一以下方外佳詩其所至超而至名者究無踰此二詩而止則夫借山之為詩亦可見矣乃既交借山嘆借山聞道之早二十而却染不十年間即已受大鑒大法于平陽門下夫平陽不二之旨昭然人間既已披僧伽黎衣其于語言文字宜一如土苴水沫匪惟戒之抑從而唾棄之而借山落筆儻然有如白毫之自生而丹輪之日見者予序釋氏詩二人一蛤庵一借山也蛤庵與借山皆出自平陽之門雖蛤庵聞道較借山稍晩而其為詩則一也方蛤庵游五臺企脚京師為天子所知已召之留天龍而以病謝去借山承其師之㫖將以祖庭未了事託之汗漫其與世往來必能紹平陽之蹟過于蛤庵而吾第以詩論今之言詩者有門庭矣詩無宗教禪無南北而第舉心之所得言之于人而人亦即以其言之有得者而得之于心書之扇書之几案皆是也此所謂聞道者也此非門庭也夫如是而何勿序之有嘉定李氏功行録序書曰天道福善禍淫易曰積善之家必有餘慶積不善之家必有餘殃此即桑門因果之説之所自昉也顧禍福因應吾儒有其理而無其事故禹稷得天有窮被殪仲尼每置之勿論而史傳伯夷且有顔氏早殞盜蹠考終之疑而其後桑門立教著為果報遂致法苑珠林諸録竟與楞嚴法華並垂佛藏予束髮時或有授予立命編者時崇禎之季袁氏所著方盛行於人考其為説大抵昌言禍福因應而以已事實之然止袁氏一事已耳其後數年漸有條列其事于其書後者又數年當國朝初年則又變而為感應篇取道家太上感應一書而句釋之且疏事其下而於是吾儒與道亦皆各有因果之録先後行世夫吾儒為善不必得福為惡不必得禍而老氏無為原以上徳不徳為道徳之要即桑門上乘亦何嘗有善惡兩途可墮因果而其理其事則未必非奬善絀惡者之所見端也練川李九蘭負君子行少時以藝文雄于鄉既而避草澤闔戸不出今老矣自思獨行無可為及人者乃著功行録四巻分出處方外閨闈四則每則則又分若干格格若干條其為格甚具而為條頗煩至每條則又列言論于前而紀事實于後葢合理與事而一之使讀之者見聞雜出理事並著按而行之瞭若指掌夫生人不古久矣聖王教令不行于世而國家律法刑政桁楊刀鋸顯然在人以為入此則生出此則死然猶有閔然蹈死不少畏者夫人畏名義而為善者十不得一畏刑法而不為不善者十不得二而有如導之以淺近之言示之以時俗之行成敗禍福歴歴不爽則雖才識過人素稱特達者猶然相顧咨嗟惕焉感興而況夫婦知能其讋于昭昭而警于冥冥者閭巷相觀葢往往而是也彼夫章句之子守理過拘惟恐稍涉禍福即有類于佛氏之所為以為正誼明道不計功利盍亦取是書而誦之可乎龍眠方又申游稿序江左能詩家舊推雲間龍眠而方氏則尤擅龍眠之勝故啓禎之際有稱雲龍與方陳者陳則黄門方者指諸方也顧予與方氏交頗習而獨于宫詹父子兄弟未嘗委摰一被容接前歳從長干得見待御預裀席之好今則三孝亷君慨然游越而季子又申特將車以來承顔受詞不啻覲安琰而遇莊朏焉又申固貴游之能賢者哉乃又申甫出游即為詩為詞紀其劉覽往復山川里道車騎盤盂之概措語清遙搆旨激越吾讀之而知其情之深與才之廣也夫家襲韋平身被文譽在又申固屬本事無所或異獨是又申丁門祚極盛之餘横被謠諑一若胥原欒卻平傾驟接雖欲道志事而難為情者而又申于通家舊故周旋樽酒之際輒流連慷慨形諸咏嘆是即王氏之念銅川庾信之悲江表亦罕有過而又何諸方之詩之不能繼焉燕臺醫按序倉公受扁鵲之書于公乘陽慶逮其家居漢帝嘗問其治病所驗者記之于册此後人醫按所自始也顧治十得九世難其人浸假得失平參世必好舉其所失而略其所得況浮湛湯液因循取驗其得失原無成形安能歴考其所得而為之記之雲間顧先生獨不然先生以經義治四門學作選人京師京師藉藉聞先生善醫其家居時每醫人有成績稱聖儒其為聲在崔長史李慶嗣上姑請召之而先生亦復以邸舍岑寂即應召往顧京師多官私醫萃天下之能醫者而僦于其間自給事内廷以至踟跦幸舍者比比而是即有詔召問按驗亦别有給事在左右者而先生非其人也然而所至輒起亦且有醫藥已病之狀書之成帙夫上醫醫國其次醫人夫人而知之矣生平讀書講道治舉子之學原不能抉隂陽之精調燮補助而即其試仕方州驟膺民物其張弛激揚亦何能展我欲為而有如嘑吸之間就人之死生轉旋俄頃以與造物者争其權度此亦吾儒施濟一快事也若夫其按可驗則予之家人已列其一如所為薄憂女子者而又何怪焉蘇子傳胥山詩序西泠古才地于文争六季于詩争漢魏三唐以上曩者順治之末會十郡名士于檇李之東塔寺惟時太倉吳學士尚在坐也榜文式于牆並推西泠之詩與雲間陳黄門李舍人功出禹上葢惟恐六義之指之有墮于畸衺矣今西泠耆舊渺無存者而胥山諸子起而踵其盛會開府好士闢舘設醴躬請胥山諸同志按名授簡並以蘇子子傳為之冠而子傳以甾目辭也予因從馮子屺章私讀其詩清雄博達語警而氣軼古格今律各極其致此與啓禎諸賢格漢魏而律三唐者又豈有異純鉤在土光氣燭于上無問逺近卬首交睫而得之不必斸其涂破其匱淬厲其釽華而後始揚其美也然而毁壁而飛翀漢而出者必有之特是西泠為詩向能式靡挽之于鍾譚既行之後與黄門舍人争相後先而近習畸衺間有流為打油為嘂賣而不可底者胥山諸子之大有造于西泠也吾將以子傳為揮戈之先矣家文山菜根堂全集序天之生物何限丹砂黄金瑤琨銀鏤不知其幾何也辰之砂拘彌之珠扶南之剛金林邑之貝不知其若何所也其或産于辰者亦産于宜出于拘彌者亦出于大秦以至硨渠馬腦琅玕瑇瑁自南番西竺東胡北貉所在皆有未詳其得于此得于彼也惟生才即不然左顧溟渤右顧流沙自日出日入以及南至北至之際其一時所生可以指詘而枚計如視地如手探缿如坐闗樓數過馬未嘗有纎悉之遺幾微之不可辨也然而多不過十人少不下七八人然且此十人與七八人中求其能嬗後如前人之赫然者則不得一二焉閩之有文山即閩之一人也前此周侍郎櫟園每稱文山為五言長城宛平王文貞之五言古詩太倉吳學士之歌行中原彭禹峰方伯之七言律與文山五律可以頡頏間嘗讀侍郎所摘文山五字句而慕之今文山合輯其序記賦頌彚為一集夫文山之文亦豪矣予遇文山晩甫一再見而予與文山皆已老計夙昔所為詩文亦既止此欲求其更進不可得然而予忝才盡而文山之可傳者遂復不少東南多瓌寳曩時重海中紅刺為帝子冠衣之飾相傳其名有所為紅亞姑青亞姑者皆石也而閩之名山其新產文石率五色陸離光芒璀璨相其聲價有逺出亞姑上者此東南之寶之可驗者也以當文山其亦間生之一矣若夫予兩人族誼則文山方七十予於他序中及之而此何贅焉胡寅公詩序工舉文而復工詩者二人姜子武孫胡子寅公是也二人舉文行天下而顧艱于一遇武孫垂老舉于鄉寅公至今日始就試天安門外除温州教授夫以其所專工者而知之甚艱猶俟之遲久之後況偶然為詩安望其驟致聲名為當世諷詠家所推重而寅公出薊門雜詩自計車道路以及天街馳驟載刺投贈之作長安公卿無愚智皆藉藉道寅公詩工則豈非龍阿不能藏夜光無可掩與往伯氏大千為仁和教諭論文之暇間亦論詩第其説以聲律為主世無不審聲不協律而可以稱風人作韻文者人初怪其説之異及按之古人則往與説合大扺律與絶其為聲為律皆易調劑而至于五七字古詩則宫商相宣律吕相應一推一挽皆如弦鞉家之有闗捩存乎其間自非明于永言者其乖舛立見而寅公豪蕩激越噌􅀈鞺鞳一唱三嘆居然宫商律吕互為宣布是豈諷詠家所易致哉宜其並舉文而稱工矣西河集巻四十三
