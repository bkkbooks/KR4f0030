body:
  text: 西河集巻一百七十三翰林院檢討毛竒齡撰五言律詩六送陳參軍之任牂柯京國三年别昆明萬里通官程踰洱甸郡舍傍烏充海瘴連山白蠻花染貝紅題詩相寄逺應在石屏東賁貞婦以未嫁死節黄絹詞難妙青陵路易迷但歌貞女操不賦仲卿妻䄜結猶懸帨鬟垂豈副笄羅敷墳上鳥到死未雙棲凌君生日君善醫其子善奕慈竹編成屋蟠桃斵作巵天垂襟宇濶霜入髩毛遲皷櫂歸西塞提壺出上池嵗華三百六庭下看枯棋送孫太史充冊立使封安南國王二首金册三交使朱衣萬里身聖恩優侍子賔禮覿王臣瀧海花如霧炎洲水似銀百蠻開詔後併作日南春二故典淹儒術新王拜御書去登朝漢闕歸負指南車象郡啣碑逺蒲泥賜印餘邊亭爭負弩為認馬相如閨中秋月下作不信秋纔半翻憐月倍圓光流收潦後寒入降霜前星没南鴻盡天高朔吹連閨人前度拜只道又經年賦得採菊東籬下秋菊滿東籬黄花對酒巵把來知坐久採去恨開遲玉露摧丹葉金錢掛碧枝故園三徑在回首一相思贈張判官之武定州趙軌分齊郡王祥治海康箳篂遮古道桑椹接隣牆山霧翻城白湖雲映綬黄驅車因祿養不為斗筲量二半刺名通守長才補判官院從施榻重壁掛佩刀寒茀軾安騏驥桐棲惜羽翰堂堂公輔器敢作庻僚看康熙十七年予以不學謬膺薦辟三辭不允兩浙開府陳中丞竟投檄舍下勒攜赴部勉强應命感而有作恭誦王言大深知儒術尊九重思帝弼三辟及公孫府檄封投舍徵車駕到門㣲臣久荒學乞放是君恩蕺山戒珠寺古殿倚嵯峨春風似永和龍歸華藏遠僧把戒珠多舊巷看巢燕清池想浴鵞前王曾採蕺覇業近如何送洪昇歸里覲省十載留京國三春返故扉興隨青草發夢逐白雲飛宿旅尋題壁前途數換衣城烏翻埤堄相顧轉依依二孝友鄉人信才名國士聞朅來依上舍此去浣中裙栁記當門長星從過野分天涯原有泪不用灑離羣昇有曲名天涯泪為思親也王黄門招遊祝氏山庄同施侍讀王祭酒徐大贊善曹編修汪二檢討汪五主事即席限山庄二字尋花來杜曲載酒到柴關朝士此時集春風竟日還菰蒲依檻外栁絮落衣間相對塵襟豁渾疑返故山二頗􅁴春光盡真成野興狂城南天自近杯底日初長草閣迴林薄花塍間水坊追陪王給事認作輞川庄左瞑樵歸里君是忠良後為忠毅公子相逢早記名題詩江令宅供帳越王城年雪當筵下春潮接岸平前途如有憶試㸔栁條生涇陽聞人明府之官索題巻子燕市傾行酒秦關引去旟䕃人通五柞任土得三渠林僻聞絃誦花明照簿書到時春信早應見雨隨車二古道攜琴意荒亭負弩情地高知野沃水濁騐官清山雉當車乳村鷄近縣鳴咸陽一百二行處是王程奉陪馮夫子游萬栁堂和韻同汪春坊陳檢討林主事諸公洛下三秋㑹城南尺五天草茵沾墜露茶竈引孤烟礙栁移橋板澆花決壟泉謝公餘興在絲竹正泠然二名園饒暇日踈栁漏晴天水洑方收潦林深長帶烟尋花度韋曲記石笑平泉千載登臨興吾思孟浩然詠西平舊蹟八首應西平令沈明府之請也柏亭封國貽來久鄉亭望去新風清山郭曉雲度野橋春疆理遥連楚桑麻宛在秦行車長駐處爭識種花人積雪莊四望白皚皚高風下石臺官橋冰未合汝水凍初迴峭壁參天映窮櫩負日開縣家能埽雪應向洛陽來周泊漁家碧水横梁笱青絲展釣車空村聞櫂唱前岸有漁家夜雨流菰葉秋禽叫蓼花江洲吾有興何必上仙槎分金岡其八景名義岡牧笛入世懷良友長貧感素心非時猶韞玉何地好分金細草全披徑斜陽半在林悠悠牛背上短笛是知音龍淵又名龍淵夜月灩㶑棠谿水蒼龍起石磻菁蔥蓮葉劍紫氣繞河干利器藏歐冶前朝廢鐵官清光千萬里渺渺向誰看董孝子織女臺贈珮天邊杳支機石上分荒臺啣晩照滿眼散秋雲磵蝶銷紅粉山花掩翠裙高堂如獻帨可用七襄文鄧公陂太尉多遺蹟中原感廢基當年曾伐蜀此地早開陂迤北平田濶征西返道遲汪汪千頃在為爾一追思郅君章遺塜荒壠迷春草高丘帶夕陽我來時下馬一拜郅君章史誌鴻名舊碑蟠螭首長蒼茫烟樹裏父老尚烝甞同年袁編修予養歸里才子徼中制詞臣去北扉㡬年同禁闥鎮日念庭闈史袐􅌢銀管装輕疊綵衣東明山下路應見白雲飛二朝天三館外愛日八甎餘曉禁辭行幄春園御板輿牕圍淇上竹饌入衛河魚獨恨南游返居然戀直廬奉和高陽相公元旦即事原韻正始端樞景朝元散珮聲日華方啓仗天氣欲銷兵祝嵗占黄稑開疆奠紫荆萬㡬勞首祚千載藉阿衡二甲子開元朔安危寄一身敷天皆得嵗大地總生春玉厯頒承久銀旛拜賜新不須房杜在宰相始稱真送蔡生之檇李生擅星學放眼星辰外乘槎天漢中新書傳趙載高論本王充海水分衣綠江城掛日紅由拳如望氣應過語兒東友人移居喜􅁲安仁宅應垂履道名青雲當牖出碧水繞堦生種樹前人蹟迴車過客情翻嫌茅舍遠斗酒問柴荆高侍講扈從東巡盛京有贈四首朔衛嚴清蹕東巡簡從官持衣陪萬乘蠧筆侍三壇仗扈龍驤逺江迴鴨綠寒豐人鷄犬在彌望即長安二御路通澄海鑾輿狩盛京掞天流漢藻計地出秦城班借千山影詩題五國名長楊勞聖眷早有射熊情千山有九百九十峰近髙句驪三豫動迎花壘春深暗栁旗敷文頒韎韐前史著高驪墓吊張僉事歌傳來䕶兒十三山下住回首一相思四才子膺供奉皇恩逮近臣百神黄道合二月翠華春鐵嶺追仙校凌河少凍人杏花山畔發看㸃屬車塵闗外有杏山城大凌河冰凌入夏不解與邑尉劉君飲次君本山隂人莫厭雌猶伏須知蠖自伸青袍映江草黄綬見鄉人學並劉希美仙同梅子真罇前須記取皓首是編民送顧記室赴濟南幕送汝游齊郡秋風起薊城車前闗樹逺衣上海雲生幕府藏珠匵函山訪玉罌徂徠能遍歴為我斸黄精二同作長安客君為歴下游贈鞭盈帝里操瑟向齊州雁度平原嶺秋高望嶽樓白雲無定所何處是滄洲益都相公攜門下諸子游王大司馬園林即席奉和原韻四首時首冬雪後攬勝覔佳囿入門生隱心巖從雲外接人向洞中尋絶閣摩天豁空壇負日隂恍疑臨塞峽騎馬度彈琴居庸闗有彈琴峽水聲如琴二複磴風前折隂崖雪後寒橋迴雙澗落石隙一亭安翠柱遮行幔銀牀潄急湍林踈垂縷絡尚有蔓胡蟠三遨遊勝西苑松菊想東澠益都家近澠水彭澤饒師弟平泉舊友朋相公與司馬為同年友山光涵盞碧樹色落衣澄愚谷新移處初時攀未曾四種花憐盍子南方草花名來鶴愛蘓耽簾捲千峰雪牕含衆壑嵐書臺延逺眺酒石醒餘酣千古藍田業何須在渭南山隂王生屢枉缺候有詩并文稿見寄奉答夜别西園久春還南沜稀吕安長命駕皇甫未披衣入世哀時命高文杜徳機前期千載在咫尺敢言違朱文學載中童二欽震各有贈詩并詩稿寄示答之以詩妙論朱公叔佳名童漢宗車中方合璧筆下儼追鋒隔水投雙鯉同時作一龍新詩都在眼開巻恨難從伯興歸自新安寳婺峰頭雨新安江上雲臨圻懷謝客歸路指桐君石記前溪好烟攜滿袖芬不知招隱地可誦小山文客晉安同諸公飲次贈蔡進士作良讌追河朔雄文重子尼當軒閒結襪入座靜啣巵古道歡逾朴鄉談褻不覉座中鎮操閩音酒酣方待駕秉燭對彈棊蔡好飲善奕又贈藍山人漪異地聞豪客同時擬謫仙玉山行處倒銀海抱來眠挾策裘還弊揮毫紙盡穿山人善書相逄林下士看解杖頭錢徐水部榷使歸朝使出南闗近天垂北望遥朞年三奏績四海一歸軺鳳語延花轉鷄含署粉銷軍儲催賦急平凖幸相調二司水推何遜為郎返杜陵雲亭需倚馬星路逐擔簦國計闗前草鄉書篋裡籐内廷諮近事只飲聖湖冰三駟馬官人餞雙旌使者回頻辭龍阜去會見鳳城開載惜川林賦搜餘竹箭材難忘吟盻處不獨宋宫梅南闗榷署有宋徳夀宫梅水部嘗咏詩索和四家乘饒中論闗門又著書聖王勞補衮下士妄牽裾授䇿來前席娛賔屬後車淥波江上路相望轉相紆吳明府納姬聨句和韻古署青鸞繞甡春城紫燕來筵前雙燭映吳沐勝裏一花開單父琴方御甡藍田玉自栽公門有桃葉沐看取隔江迴甡二兩槳西陵渡沐雙輪北府來燈垂百子豔甡扇逐五明開陶栁當牕種沐潘花繞砌栽嘒星中夜望甡長共斗杓迴沐遇徐二咸清同赴徵車有贈幸附南州辟同為捧檄行名高重孺子親死媿毛生黻珮當年意車徒此日情治安如有疏切勿效縱横上巳萬栁堂修禊奉和益都夫子原韻二首即席佳節三辰届名園幾度過雨來新水漲風緩落花多堦樹侵衣綠盤酥映面酡禊堂相隔久驚聴羽觴歌二臨水從周俗因風想魯壇草深埋野屐林密礙朝冠時序杯中興雲山天際看明農丞相意只顧問園官贈送郡司馬童使君赴任同沈光祿韻二首展驥為參守分符向會稽人如崔北地官比謝安西輦下諮編蔀車前賜屏泥褰帷將入郡江岸草初齊二暫借鈞衡器長懷荆楚材亭邊候騎列山半郡堂開披牘驚雲豁清軍渡海來琪花能四照光氣滿蒿萊陪游祝氏園即席和益都夫子原韻四首招尋當雪霽此地得幽棲巖曲通流細林深入路迷魚從寒潦伏鷄傍午烟啼扶杖追隨處悠然物我齊二梁苑抽毫至揚亭載酒過層冰封斷磵宻雪抱繁柯隔巷留賔騎長樊罥女蘿從來難和者唯有郢中歌三看山疑玉岫入室啓冰壺白墮傾來淺紅塵到此無烟霞忻自得牛馬任人呼况有當牕菊亭亭不用扶四談深神自靜地勝境逾幽傑閣憑來逈高岡坐去浮文章增嶛峭杯斚起綢繆燈火將歸晩行吟動暮愁題諸暨傅貞婦圖畫誰畫松和竹能分珉與玒烏羊安用匹黄鵠不曾雙冰鏡窺蘿石清流繞浣江清宵思彼髧長自對銀缸蛤大師之寧州用蛤公贈韻道人渡江去拂衣隔人群將攜剡川雪一臥匡廬雲妙指天邊落清談石上聞内廷供奉久長憶聖明君蛤公曽延住椒園故云二永夏辭天姥新秋去若耶題詩存八正飛錫近三巴鉢隱龍宫樹衣裁鷲嵿花天涯相問處不記有恒沙三東土栖支遁南朝重惠休金臺邀翠輦銅椀賜紅樓出伏山前虎行隨海畔鷗宗雷舊同社相送上寧州四修溪石室好此地得精廬編戶知僧律長廊貯佛書蹔聆幽讚會常住淨明居誰道秋江上瞻雲過太虛江上數峰青同南士作極浦彈瑶瑟群山列翠屏烟林棲浪碧嵐氣近江青九面開衡嶽雙螺洗洞庭不須悲帝子相望總㝠㝠吳江顧生初度每渡吳江水長思笠澤賢家傳三俊譽門繫五湖船釀黍逄冬節栽花度晩年香山能自咏好著會昌篇送汪檢討林舍人奉使琉球册封中山王四首水國稱藩遠儒臣奉使遥玉函天外啓金節日南標鯨路開雲驛虹旗結海橋殊方倘懷闕萬里趂歸潮二北顧敷文命東行載徳音片帆沙際急孤島霧中深天賚三繰玉波涵萬頃金針槃隨所向總見使臣心三鳳詔從天下鵬程擊水飛封留傳世寳到着賜時衣蜃氣看成幄鮫人喜下機主賔迎饗後頫首奉恩輝四荒服行人罕還朝覲禮成高風占使節落日騐歸程晩向龍宫别春從鰲背生蠻方書帶礪敢不藉芳名陪同館諸公飲喬編修宅即席和韻時同年尤檢討予告將歸秋早吟䖝急官閒度馬遲栁風清入座燭影暗流巵筵敞茵嘗宻堂深幔自垂明朝有歸客永夜且相隨二同舍愁分首當杯想乞身論文輸我軰索食向誰人庭竹含烟細沙蒲入醖新夜凉衣露滴涴盡六街塵周大公子赴河東參軍贈别雅有參軍興新添從事銜罌藏白墮酒桁掛綠羅衫吏治思吳彦兵書却渾瑊籌邊樓下路猶見石巉巉二庾杲才難敵嘉賔望自隆一官歸幕府三絶去河東槐簡分衣碧蓮花汎水紅題詩相望起多在晉陽宫和秋日閒居詩十首有序同年喬編修示閒居詩屬和嗟乎我乃無居時借寓王光祿宅因於奔走之暇陸續和此悉依原韻見者毋哂為不閒乃可耳鮑照非無廨張融未有居登朝真懶散渉世太迂踈僕老艱持刺官貧厭較書徒言殘暑退煩悶幾曽除二訪客還三市尋真過五家馬頭飛候雁寺裡見秋花近塞風逾上衰年日易斜所忻陪宴飲日日醉流霞三偃息竟何事驅馳了不知宦情供嘯咏蠻語拙言詞投筆增三嘆還書又一嗤東家有供奉且與譜龜茲四洛下吟初慣廬江客已殘驚心陪祖帳違例入句欄結組當年邁遺鞭在夜闌有田鉏未得何處問倪寛五名難垂後世賦乃嘆同時蒼髩歸金馬黄庭鎻玉匙酢梅空濺齒變豹豈留皮特愧終貧窶長膺鮑叔知六依人在廊廡與客度朝晡竹牖穿雲眼苔衣繡土膚傍身遮短褐無力養長鬚誰道佯狂者能令禮法拘七緘文愁玉柙食鱠想金虀賄在應焚齒香消那噬臍凉深知夏逺望久􅁴天低借問郗公舍今還在剡西八綠髪含霜淺黄塵着袂輕當車翻柘影隔巷賣餳聲肘繫還丹訣胸無堅白鳴徒吟王粲賦安得俟河清九但署崇文館從無治事齋花甎看局促虀臼費安排白璧誰留珮青錢勿繫鞋北山如可返吾欲訪洪崖十帶草枯難縳籬花落未拈歲時終有盡出處那能兼興至繙書簏顔衰避鏡奩秋來逄短景尚恐舊愁添西河集卷一百七十三
