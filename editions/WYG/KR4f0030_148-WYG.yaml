body:
  text: 西河集卷一百四十八翰林院檢討毛竒齡撰二韻即五言絶句三題松陵文石師樗隠巻子曲轅有櫟社其樹能蔽牛匠石不一觀散之松陵流二道人宿蓮花夜臥若蝴蝶若遇南郭生何必示枝葉嚴藕漁與王武合作畫扇藕漁畫杏武畫竹君家有名園花開若金谷徐熙與黄荃各自冩紅綠二淇苑青篃發東林紅杏開春風吹半面折取一枝來題何使君望雲圖朝解㑹稽章夕盻山陽廬頃刻不得前寸腸如轆轤二辭郡多賢名幾欲奪禮制清風起衣間白雲在天際三絻舟并臥轍千載見圖畫何如望雲人泪滴畫圖下張恒像别字北山我愛張北山讀書抱絶悟揮羽坐深林不入大航渡二酒朋興何减詩格峻莫攀流雲如波濤動盪胸懐間吴閶儂歌阿儂住揚州不若住吴閶前樓姑蘓臺後園脂粉塘四日吟舊傳淮俗嫁娶用大禹辛壬癸甲四日只盻辛癸至圖作千年歡何悟别離此只在四日間題像但到深嚴地翰林院後㕔書丹地深嚴四字長逢著作家取將夢裏筆寫出院中麻二蘸筆支𤣥玉鋪茵翦綠蕉槐㕔書敕罷放眼向青霄題何君畫像刷髮浹蘭蕙開顔生芙蓉披圖一相對有似何敬容二久擅三高譽曾聞第五名冰壺携處曉山石坐來清三廬江有高士覆幘把玉斚橋枝生堂前芝草長庭下四濯濯王忱影峩峩和嶠身寫來松石上一見一相親送楊臥之豐城訪周明府四首揚舲下栁浦㪚轡迴椒丘祇為思雷令時時望斗牛二豐城有遺劍聞在龍門山君往試探之當令莫邪還三洗馬將渡江芒芒百端集曾與彦輔譚清潤似玉立四少小才名重賔朋欵宴稠石門雲起處應上劍江樓傅大四十飲次自入桃源路于今十六年故人今四十醉我蓼花前過童君店雨後童君店停驢一問行鞦韆雙女下欲答不成聲孟山旅宿斟珠酒同行贈寶刀孟家山下過須避此中豪渡遲村二首風急水波昏漁家晝掩門前庄不可宿買艇過遲村二夾岸栁毿毿菱根繞曲潭遲村潮上過彷彿在江南姚文焱舉人畫像聞譽仰高躅披圖識令顔置身白石裏託足青雲間二鳳徳攬有神虎頭畫不俗魁梧過張良倜儻類方朔三獻賦還江表看花憶上都手中玉如意似欲擊珊瑚雯水師像百尺青松絲一枝紅杏子萬象獨露機得此畫圖裏師在南嵓時得萬象之中獨露機句二老僧袒右肩結跏在危石東渡何所聞南嵓似相識三如意指揮去天花滿空山當年叅石雨曾坐天花間師叅石兩和尚天花寺花燭詞為郁雲山作鳳凰鳴鏘鏘從來恊懿卜雄鳴聴三三雌鳴辨六六二嘉木發珍囿祥蓮産天池駢華與並蔕總作連理枝三九光燎不減百燼花自繁不識寶炬高看取雙銅槃四却扇難再藏施螺未全拭熖熖華燭光有人伺容色送蛤上人住黎里羅漢寺披衣辭越嶠飛錫下吴闗何以贈君行白雲相往還二上人絶凡流好住湖水湄經傳五門子花落七條衣三君曽住湘溪蓮花滿溪沚借問湖上蓮何如在湘水四黎里有故人聞在雪灘住他時杯渡還應過釣魚處吴江顧茂倫名雪灘釣叟有贈詩見七絶巻寄贈梅古愚八十因攬雞山勝曾隨鹿幘賢斵輪方七十記得十年前二緗帙藜牀展青裙菰葉裁長安舊㳺子猶俟杖朝來三宛上多哲行丈人饒古風千秋老梅尉八十面桃紅宣城有千秋嶺題畫柴門𦕈何所薄暮幽人還夜霧散林隙秋蟲吟樹間曺生彈琴圖陳思本驚才髙坐彈綠綺就聴寂無聲聲在圖畫裏為同年李漁村侍講題把釣濯足圖我友負古貎放情在山水晞髮蒼崖間濯足碧流裏二生平號漁村其志不在漁手抛一竿竹胸貯萬巻書三布水盪若雲目光簸如電千載素心人開巻一相見四交友滿天下既乃得此人何當放瑯琊同釣滄海濵書郭生嶺表詩巻後龍海看雲客羊城返道人葛洪携笈逺陸賈著新書二欲問羅山好行將栁述俱題詩當錦石得句似明珠夜宿阪上草堂同南士作秋風起隣園詩倣韓孟體阪上在山陰埭南有王氏别業今圮秋風起隣園移過阪上桑南士早起視阪上黄葉滿草堂甡二秋風起隣園槭槭在屋角甡隣女紡木棉秋雪夜半落南士織時有隣女守志苦作不嫁故云雪夜宿阪上同南士倣韓孟體聨句即事夜擁阪上絮恍卧清水裏南士早起見雪花抛落若鵞子甡二竹折帶鴉墮牕白先雞啼甡布絲織門隙認作隣女機南士姜京兆七十友人索書幛為夀京兆乞身早還林不記年違時懐栁下竟日坐花前二香山七十翁所㑹非舊友君今對飲者尚有元共栁三三萬六千日强半彈指過十嵗一捧觴何止限三度題同年汪宫坊讀書秋樹根圖終日削汗簡不若對珍樹秋山枳句間中有讀書處二榿林倚絶磵直下清流泉呼童㵸雲膏把巻心悠然三鞠色縑乍開柿葉書亦滿瑯琊藉稻名知在第㡬巻四君方沐東墅我將乞官湖前崖添蒲橋後廟祠栁姑五春坊且裁詩秋樹勿負米功成有時還讀書何日已題燕巢蔵書圖弆書築書巢有若入幕燕日穴紙絮間涎涎鎮相戀二設庫自羞養挿架儼壘封豈如宛委書但置巾箱中題畫峰迴碧雲合澗落蒼松寒何處携素琴高山流水間題畫碧樹分磵東青山翳雲外江閣連草亭此中有人在題畫扇春風野田花青紫碧紅白蜨蝶雙雙來與之比顔色題屏間畫蟬負緌入深林翳葉不能蔽吁噏墜露間喑喑作秋思伊勒兎親王召見賜飯賦謝二首國邸苴封早平臺賜召遲虚啣梁孝酒不誦楚王詩二栁賦抽殘簡芹絲擷上尊身慚戴安道飽食在王門題同年喬編修桃花汎舟畫像五首漫水綠溪漲桃花照眼新誰將蓬海客圖作武陵人二紅糝落芰衣青菰冐蘭漿但從魚港遊莫作蟻陂想三樹裏茅堂逺船頭酒甕虚一編横膝上猶是禁中書四借沐逢花雨尋春向栁塘最憐㰕棹者家在射湖傍五蹊草緑似裙山雲白如絮若過大夫橋同訪志和去題採蓮圖雙雙採蓮船並返芙蓉湖大姑擲蓮子小姑弄舒鳬二烏㡌窺岸側紅裙濕舷邉抛蓮有人覺弄鴨祇自憐金生索題畫像名秋林詩思圖南國新詩好西京舊姓傳秋林閒坐處吾意亦悠然題太倉王奉常畫石泗上興雲晩潼山帶雨初醉中看不極何必在中書二誰呼鬱林船取之落星渡我欲問斯圖君平在何處題青門五真圖五首展巻金桐逺相披鐵摘坐堪展誰道僕射書祇讀十二巻課耕烏犍去前坂白鷺下晴川睹此碧栁下何似青門前游嶽宗子愛五嶽畫之同卧起那知觀嶽人亦復在畫裏垂竿龍額不可居羊裘渺相望著書西塞間投犗東海上蕉團裴楷三毛勝稽康四字難相看俱有㑹只在此蕉團世説云覺神明殊勝過易亭吾愛楊公子相尋過易亭盤間菰菜綠池上栁條青晉安藍漣自畫竹影兼題詩持示為書其後綠竹不蔓生猗猗滿江沚誰知子敬來尋在月明裏二藍生善畫竹羞學管仲姬不解落筆妙請看題詩時何生讀書雙桐軒面白不傅粉日長能讀書雙桐生井上長覆讀書廬二百尺曾無路梅花尚有香百尺梅花皆何氏樓名高樓讀書處不見舊何郎予遲暮歸里徐二咸清命其女昭華師予飲予傳是齋酒半請試予喜其畫蝶即以命題昭華拈筆立成詩曰蛺蝶翻飛去翩韆綵筆中雖然圖畫裏渾似覔花叢因和其韻滕王有遺譜描之深閨中羞煞東園蝶翾翾滿綠叢續畫蝶詩為倣徐熙蝶閨中畫隔牕牕前花蛺子飛撲類雙雙二謝女本吟絮比來兼畫蝶㸃黛作翅花塗粉上衣葉三繡帖拈花譜香螺撲畫欄莊生雖老去如向夢中看集㳟夀堂觀多羅恵王書額玉版埀鈎勁金枝倒薤清書成為善字令我想東平二賢王玅圖書睿翰布金石一見龍鳳文羞探蟲鳥跡秋日假沐慈仁寺聴王生琵琶秋風來上苑落日登高臺誰作婆羅曲江東曹善才二杜曲看花晩慈恩載酒遲宜春高弟子尚在市樓西入湖堤口號高栁絆游笮濕草沾墜釵江南梅子熟湖上風雨來二入湖逢三梅閉寺坐半月青堤一條長緑水兩面闊寓言七首何處丹唇女行來白紵衣雲陽西去路恐是華山畿二未唱江都樂先逢吴絳仙鏤金雙檝子一駐栁州邉三蘖塢經行苦高唐藉夢成徒懐甄后枕不解枕中情四白石投寒水紅顔組苧裳客衣曾綻補梁燕語難忘五翠帳朝雲動瑤臺春雨寒草生磐石合先遣侍兒看六喜着羊欣練甘烹龍塞魚閒來無所索只索數行書七一作遲同行不至碧玉啼難忍青霄望未來木棲牀不穏一坐五徘徊石明府以小像請題素襟欲披風碧葉方藉地持桮弄清泠俯仰有深意二捧檄結雙舄將至龍門山如何謝㓜與寫置巖石間三星圖綵鳳名將起青麟紱乍留比來仙侣㑹相結在瀛洲二何地尋蓬島分明見畫圖三星同照處其一是南弧題朱拜石司理記年圖長松鬱嵳峩下有清流泉君子秉高躅抱膝以偃然二白石礪齒疎丹砂駐顔好投杖還深林趺坐藉芳草三太末佳山水攬轡曾司刑朝看藐姑雨夕飲薌溪冰四廬山金輪僧相顧説罔象側身瀑布傍何如此圖上五我來值暮春宿君東南軒開軒展斯圖宛坐花樹間題蔡鍊師畫像白玉垂紫縧黄金躍丹鼎成都老畫工親見手摩影二法果人難老仙桃山有名鍊師所居山他年留畫處應在岳陽城吴晉畫像夫君本佳士濯濯冰霜姿何處傳幽思秋林獨坐時二黄葉翻白雲清神映寒水我來頻見君如此畫圖裏迎鑾曲十章夏后重廵日虞庭肆狩年省方行縣㝢望幸遍山川其二羽騎鈴鸞减帷宫梐枑稀穿塍移左蹕避路解前騑其三楗石觀河逺鞭虹渡海長但能開馬頰何用詠宣房其四旭日驅龍輅春風布鳥田吴疆連越嶠西至怨東先其五蠲租同海谷復賦遍江淮不是君王至何由補助來其六雲葢連星羅草茵襯花織造舟當六龍江水共一色其七翠華將南臨含齒齊望幸神魚泳中江麒麟産旁郡是年正月海門神魚至二月餘姚縣民家産麟其八瀼瀼甘露降習習四靈至況兹姚姒鄉舜禹所巡地其九一人自遊豫萬姓齊樂歡江東皓首翁扶杖咸來觀其十戴德望堯轍感恩樹嵩碑微臣職紀實製此迎鑾辭西河集卷一百四十八
