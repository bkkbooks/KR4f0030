body:
  text: 西河集卷五十三翰林院檢討毛竒齡撰序三十陸孝山詩集序當予避人湖西時以滯久難安將投嶺表依故人之官韶州者而故人不欲值孝山為南雄太守招之來時予既已赴崇仁之招雖不果往而聞而壯之曰孝山哉夫哉既而予與其弟義山同官京師距向招予時已十三年而孝山以補思州太守來㑹京邸予每㑹必與義山相咨嗟謂思州難行而孝山慨然就道曰不聞王尊之過九折坂乎予揮手而别歸而嘆曰夫哉孝山哉迄于今義山為東閣學士以參知軍國歸田而逰而孝山竟卒於官義山所著雅埤集久已行世而孝山之子乃始持其所為詩屬予㸃定夫孝山兄弟席世家之遺競讀父書各能致身通顯以功名文章互相爭勝而孝山復饒于憂民恤俗之辭自之官蒞治詢方諮土而外流連今昔無非為斯民請命而即其水旱禜雩吁嗟而咏嘆哀于言而惄于氣讀者知其為志切九閶情通萬里此其政治之足傳與文詞之足錄固不待言矣特予少為詩必力排基壂先擴其所為地步者而後論裁搆之法格取其高却諠卑也氣取其壯絶薾弱也調取其噌吰斥嚶咿也律取其渾涵而周謐去纎以弛也意取其刻覈而㫖又取其有餘慮思維之易疎而諷嘆之又易竭也至若詞取其雅韻取其和平則將使誦者不愧于口歌者不跲于響向使起田更而著三豳則學士必口恧進株離而講五均之法則工歌者必張口而不能闔夫人而知之矣乃不學之徒厭常喜新一變而為京師呌賣之音村言市詞動以褻嫚相往來而既而厭之就其形之弇嗇者而拭其脣拂其眉宇易如山如河之貌而假以修容即其言之謱謱者而巧之俊之改黄鐘而為瓦釡何其細也今夫生世為丈夫必當有昻藏七尺之概行乎其間故相如追琢揚雄纂組猶以為壯夫不為而況砑衣膠鬂收貨郎把翫以為寳祕似非士君子所宜為者而以視孝山則正當累變之際乃獨堂堂坦坦直抒其所言而不詭不隨皇然為正始之音其調之高而氣之博雄沈廣大詞雖簡而意甚長其浩然自得為何如者夫不為時移夫也自抒所言而高明爽闓昻然自立于天地之間又夫也若孝山者豈非文章政事大丈夫哉嗟乎孝山與予年不相上下而予以崦嵫未入猶靦然叙其所為詩而特是齒衰意耗四顧滄茫孝山能招予而予于蓄哀之後距孝山死時又若干年即欲向西南荒徼作招魂之詞而不得也㝠㝠之中吾負此良友久矣孝山諸子皆相繼有文章名故既叙其詩而并為告之江臯草堂應試文序予避人以前曾授徒于㑹稽姜京兆宅一年凡七人而售者五曰希輅丁已曰兆熊癸酉曰兆驊丙子曰之琦壬子壬戌曰公銓丁已皆姜姓也其明年授徒于蕭山裁八閲月耳凡九人而售者亦五曰張燧丁夘庚辰曰李日燿日焜壬子曰逺宗丁已曰文戊午則兄子與孫也驟言之豈不甚盛然而不以予為功何則非當年也夫苟非當年則蒙師鄉塾中豈無售者敢謂其售由蒙師哉江臯草堂即不然草堂一先生而聚生徒于其中堂雖寛多不過十許人耳然而當年應童試其在辰年拔三人而在已年則拔至七人然且諸生錄第一與夫督撫藩臬府縣之㑹課其拔前茅者無算也夫小試實難㑹城學徒以萬計其學舍如草堂者應以千計至于童試則未經定籍四方纂纂來焉能以一草堂與衆學爭上而拔擢如是則其學之精督之勤先生之啟誘與學徒之鼓舞有不可量者或曰先生善課文每課如考校必􅍐坐而躬臨之榜以甲乙故知所懲勸而憶予總丱從予伯氏于任氏山莊時學者多人擊鐘㑹食亦以課文比考校題名中堂而是年為崇禎丁丑祗予一人取童試而他皆不得然則先生之教有異矣故曰河汾之門多開國名臣蘇湖學徒皆出之為經術醇儒悉後此之事而非當年也草堂非是也草堂諸生若干人名具試帖予不得而指數之也先生為誰仁和何泗音也翠柏集序翠柏集者許夫子之子巨山先生所為詩也夫子負蓋代之才以副相行省開藩中州而竟卒于官當是時嗣夫子者有人相距寥廓未知傳夫子之學在何等也既而予歸里四方來至者藉藉稱巨山文章超于時得夫子一節而予以年老僦杭州聞其言甚喜顧四望茫茫不能一相見悵然久之康熙辛已予以秋節渡江省西陵墓田有以爵里刺見投者驚曰巨山耶急返棹來杭謁巨山旅亭昻昻若駿馬之出于林意氣轢落慷慨道先烈儼然吾夫子在前咳唾顧盼不自知其泪之垂而膝之下也夫人生感恩何限避地多歲月其受人衣食承人色笑者必倍于衆然未有如吾夫子之感予深者顧瞻覲幾何而匆匆一訣倐忽已二十餘年詘指巨山于是時不過在童丱之際浸假予年不長則没齒冥冥焉得親見吾巨山相對話舊如今日者然則大徳雖不報而尚有人焉口能道之不可謂深恩之不在人矣乃巨山瀕行出其近年所為詩屬予論定夫論詩有二一則長安貴交千里馳示必假溢美以張之夫貴交孰如吾巨山者一則心所愛好無由申致必藉奬譽以阿之夫宜阿所好亦孰有如吾巨山者而進論其詩不惟不阿不溢即刻核以求而裁搆之高學植之富意指之精淳而博大顥盪感激一袪夫宋元近習之陋而不為苟趨不為㨗附即此數篇而知得吾夫子之學深也嗟乎賢者必有後夫子可謂有後矣苐其題以翠柏者夫子無家往以官為家亦何曾有一枝之可名而巨山逺述祖徳其在前朝有從高皇奮興者以軍功授遼陽左衞世襲都指揮使從五河東遷遂為遼左之巨閥而鼎革以來又復從龍繼起南開百蠻保世且滋大矣因不忘故鄉仍以翠柏名其篇蓋故舊之不可忘本如是也翠柏先人所居山也東臯二圖序錢唐有名士而寓于醫者三人一陸景宣一沈謙其一東臯徐君也景宣以東林都講賣藥長安市不知所終謙家故業醫顧國初詩人有稱錢唐十子者謙其一也東臯席名臣之裔豪于藝林與兄西泠弟北溟稱徐氏三珠樹而西泠試仕昭陽東臯脱青衿隠居養母間採藥療母疾遂以其餘伎療人取贏錢為負米資相傳入山中遇異人授公乘陽慶之術以醫仙名康熙庚辰夏六月不雨至秋七月民間苦疫癘東臯車所至隨步而解時中丞張君招予禱雨而予以疾辭中丞寓書曰使欲得太倉醫耶則隨地有之必欲得蘇耽耶非東臯誰屬焉蓋不知予之為東臯友也然而已仙之矣昔者左思丁典午之初厭王侯齷齪而慕許由之為人謂由能沖修好道學于齧缺得仙術因為詩曰被褐出閶闔高步懷許由振衣千仞岡濯足萬里流雖名詠史實游仙也東臯好其句間嘗為之圖而置身其間顧其時猶少年也朱顔青髩投足滄浪一似先除垢而後可以超于世人此即洗髓先伐毛之一端也乃越若干年而後作振衣之圖躡崇岡而攬雲物其形容先後邈不相識然且交游衆多題詩滿幅一展巻而存亡今昔之感生焉吾向者友景宣在崇禎之季兵戈亂離而既而與沈生游亦復倉黄避人歴十二諸侯舊都終不能與韓康偕隠及還鄉而予已老矣太沖慕許由而東臯效之天子聞東臯名召見行在欲處之丹臺紫庭之間而東臯力辭此非真許由乎予見真許由且與之友而年滿八十筋弛力衰思學仙而不能成乃徒取游仙二圖靦焉為題今而後媿可知也馮氏永思集序呂氏春秋稱孝為五帝三王之本務而漢詔賢良亦曰凡賢以孝為首則孝故重矣馮氏復鐸以孝稱所著永思集率哭母詩而乃持其集介于予所親者而請予一言夫學重力行予方恨俗學之多論議而思舉一躬行者以為之砥礪馮氏非其人乎夫言為心聲文為行表假有哭母者于此其聲甚哀而欲舉其聲而辨其音節以審定其哭之可與否必非人情則夫永思集者不問工拙而知其詩之可傳者也乃吾復有説于此昔者楊忠愍以諫諍死哀之者偽為王勃然變乎色文以表其忠今復鐸赴試實以父母在不逺遊題為有司所賞豈天之欲著其孝而故表之乎或曰事親不以文哭母有詩其情已疏況百首耶予曰蓼莪陟岵自古有之特百首則太過耳屈平忠而過復鐸孝而過過亦可已陸軼南南游詩序軼南有家學其為文為賦單詞複句皆能慷慨作一家言而至于詩則工于排比淪漣往復尤為時流所却步焉獨是此數詩者皆春朝出門稽遲途路之所為作也夫以軼南茂閥承副相之後將訪其先公所欽友南游晉安而乃中道旋返三閲月而不能前則其遇之竒與家事之不可問概可見矣予方欲為之賦五交之詩歌行路難之什以慰其骯􅗣而軼南詠吟自得登臨酬酢了無幾微之見于詞句是則和平温厚曠于心而達于事不止詩教為可法也夫彦升龍門不止公叔古道在人豈無讀其詩而感興焉者吾又何能重為贅之重修笑隠庵募簿序笑隠庵在清波門外相傳古法喜院地而與學士港為鄰居人每種花港間西湖十景所稱花港觀魚者即此地也鼎革之際已廢院為錢氏湖莊而陳君太蜚以禱嗣而購復之仍名笑隠有年矣康熙丁夘予歸田之後訪奕是和尚於其中見殿堂水閣四顧軒豁頗足棲息而牕户脱落欄楯欹缺不無鳥䑕風雨之憾因歎是地修復本有時數乃不轉瞬間而遽至於是劫灰咫尺可念也及再過三過則綢繆不蚤將有不可搘拄者奕公憂之思重加整葺而謁予以疏予思明末多眚四民俱乏財孰能舎其所無餘而急人之所不足顧為事在人事果可為則必有一二人焉起而任之當順治之末戎馬甫靖瘡痍尚未復陳君合鄉之善信剏為是業而院無宿糧薪蘇顆粒皆給之於外奕公以太白宗傳息居此地未嘗以缾缽乞假道路而仁社諸君為之力營供養等之月進迄於今其運以蒭而繼以粟者縷縷也世不乏善信豈無嗣諸君而興者夫陵谷之難問久矣湖山如故而興廢相尋曩時清波湧金二門皆予郡名園若所稱祁中丞商太傅别業燈火笙歌不絶晝夜而今已盡為馬塍菜壠烟火披離天下事成之難而毁之易秪此區區笑隠聊以存湖山萬劫之一而猶忍坐視其廢而不之救吾恐有心斯世者必不然矣唐七律選序前此入史館時值長安詞客高談宋詩之際宣城侍讀施君與揚州汪主事論詩不合自選唐人長句律一百首以示指趨題曰館選其祗選長句律者以時尚長句也其曰館選者以明代論詩尊主事而薄館翰故特標舉之以雪其事也既而侍讀死其手寫選本同邑高檢討受而藏之增入百餘首仍曰館選當是時同館諸官有争先為宋詩者檢討嘗曰侍讀作館選非館閣也貧不能受邸假宣城㑹館而翹居之㑹館所選其敢借館閣為昭文地哉康熙廿五年予請急南歸將選古今文作還町雜錄檢討瀕行寫一本授予曰此侍讀志也其逮今已十六年矣予歸懼年促經術未立日研經不暇即古今文録亦棄置不復道客有請間以詩者悉謝之恐後然而世尚遷變向之舍唐而為宋為南渡者今復改而為元為初明㑹予方老去作春秋傳畢意敗力歇不能事經學客堂同志重有以詩諮請者予謂詩本小文其得失升降亦何足關繫且夫沿變所時有也漢魏無三百晉後六代無漢魏樂詞唐人無六代俳比古詩而欲今之為詩者必墨守三唐以為金科一何不達夫事有由始詩律始于唐而流于宋元則循流溯源將必選唐律以定指趨誠亦無過而特是隨時遷轉勢所必至春之不能不夏猶之初盛之不能不中晩三唐之不能不宋元明也今但就其隨流者而自為砥止減高髻為五寸而恢蜾蠃之細腰而易以杵把則後人抖擻未必不可駕前人之轍而委勢隨下焉能自振嘗校唐七律原有升降其在神景大抵鋪練嚴謐偶儷精切而開寳以後即故為壯浪跳擲每擺脱拘管以變之然而聲勢虚擴或所不免因之上元大厯之際更為修染之習改鉅為細改廓為瘠改豪蕩而為璅屑而元和長慶則又去彼飾結易以通侻却壇坫揖遜而轉為里巷俳諧之態雖吟寫性情流連光景三唐並同而其形橅之不齊有如是也是以宋襲長慶元襲大厯嘉隆襲開寳皆欲遞反舊習而自趨流弊翻就汚下彼不讀書者每稱吾為宋元不為三唐則蘇陸虞趙高楊張徐原深論唐詩極為趨步其言不足道而即矯枉之徒必欲張元白以表宋元揚王杜以袒何李皆不必然之事也夫團扇之擯以時器也松筠之不壞以不與物候相轉環也昔有擇嫁者東家富西家貧然而西家美婿也問女何擇則曰吾願東家食而西家宿是以夏商不同治而講治道者則必曰夏取其時商取其輅今三唐諸律亦何一不可取擇葠苓固足藥而牛溲馬浡古人嘗用以和劑世之不自為詩者襲其形橅則遷流不一而苟自為詩則性情光景由神龍以至天裕皆通觀也因就侍讀所選本而大為增損約錄若干首去館選之名而題之曰選既不必與主事校而同館出入并無得失侍讀檢討抑亦可以自慰矣初擬倩同輯者作釋事註于行間而既以巻促且亦本明了無事多贅觀者諒之一等公皇太舅佟公六十夀序自昔軒耆御世必有五雲四山之佐為之長保其治今天子富于春秋在廷諸賢豈乏夀耉惟是去留有數其以親臣兼世臣之誼得與國家蕃翰同久遠者則非貴戚之卿莫與焉我皇太舅上公佟先生以鼎司之重領中外朝叅有年此即詩所稱王之元舅文武是憲者而乃深自抑損折節好學從來文臣以八比起家鮮有以聖賢之業自期待者即一二儒生縱談濂洛亦徒託空言已耳曾何補于理道而先生為業必曰聖賢何在五百年見知聞知何等無務夸詞第躬求實得以應名世之運凡工虞禮樂必根柢六籍佐以諸史窮源而竟委不特學古入官賴之底治而即此焦心恤事自强以維國此豈尋常小成可絜量與夫經營天物代執膚功從勘亂以及昇平其為綏定者何限然且忠貞世篤往往致身疆塲仗不二之節非止服勞王家得以奉揚鉅烈者今先生位極人臣以太后仲弟加之先皇后中宫所自出金根玉輅歴正坤極近復英姚相繼以元妃爵九品之一掌掖庭璽綬而文孫又且尚主進之為彤街副馬其餘子姓登屬籍與試授詞翰者比比而是則以恒情論其為周京尹姞亦豈有歉而先生自視欿然嘗曰世禄之家面牆不學蒼頭緑褠乘堅而驅良欲求内里皆賢家難矣吾將一挽其習以正之生平讀郭子儀傳輒掩巻太息以為世嬗休戚豈無遭逢肺腑前後相類者然而恩澤有之勲名則未也君子處此要當立勲名以居恩澤一若燕譽自處全不知從龍師保建成績以紀太常有過于汾陽十百者其謙退如此此豈旦夕之業也哉書有之天夀平格史亦有之視日則增輝方山則並長歲在壬午值先生周甲之辰同館諸君謀所以夀先生者而書以當祝若夫先生理學為時賢領袖某雖衰老而志尚未敗儻桑榆可待其願捧一經為受教地者於以視斯世事功孰輕孰重當必有説以處此新都太守盧舜公詩集序文章何與于政事而書曰學古入官論語曰誦詩三百授之以政一似非此不足以致治者景陵盧舜公累世以詞翰起家而舜公繼之一出而交河治再進而清苑無廢事又進而皇畿西路鮮探丸伏莽之子又進而六師輂輦三關餫饟方行塞外者不闕于供又進而符守煩郡尊之如神明而愛之若慈父母使名都千里盡成化國然且天子褒之庶民誦之太史書之中外大臣各手剡而交薦之若是者何也則以文章之澤概被之政治而無不足也是故行文不一而即以詩論前此為貢舉議者有曰唐以詩取士而韋臯裴度以功顯叚秀實顔杲卿以節顯陽城元結何易于韋景駿以循良顯詩亦何負于國哉舜公為詩不襲舊不詭隨于時其家景陵而無竟陵之習自京國出守值宋元弇劣草竊横行之際而日游其中而不為所動上追漢魏下法三唐取材愽而攄思遠此真古所云在内無遺情在外無軼象者是以皇上每嘉其能且稱其騎射而大臣所薦不曰撫字清勤即曰轉運勞苦夫我任我輦王事鞅掌小雅之所歌也民之父母慘慘劬勞詩人之所由慨而誦也召伯以乘其四騏為能事而衞武賔筵必以張弓挾矢作百禮壬林之慶蓋學詩成效有先事矣當予入館時其尊人亨一先生予前游也曾侍之講杜陵之詩娓娓數千言予拜而受教而先生特膺主知開府湖南即以説詩之法行之撫治至今浣花之説與峴首之碑共勒之湘山蠡水之間未有斁也特念予受教當日舜公方總丱坐先生膝前曾幾何時而予已病廢歸老舜公乃隆隆由良二千石取治行第一即其詩亦超軼儕輩多巻帙至于如此則他日再進其出其家學以發其治譜吾又焉得而量之西河集巻五十三
