body:
  text: 西河集巻一百八十三翰林院檢討毛竒齡撰七言律詩十奉和乾庵和尚天衣古蹟十詠原韻西來白馬有誰傳靈蹟初開東晉年萬仞遠看浮叠翠一峰高竟入重𤣥坐環絶壑疑無地行到深林别有天望斷法華臺畔路三花寶樹盡生烟右法華峰何處天香雲外飃髙峰斜傍碧天遥渡溪時逐雲間鶴伐木長逢山下樵瑶磵桂枝埀白露珠壇明月掛青霄如來金粟當年影只在西嵓古寺腰右月桂西嵓疎松澗底漫相撑畵得飛龍未㸃晴但向嵓前觀翠積尋來石上有苔生春雲度處蒼鱗濕朝雨迴時偃蓋明臺畔有人長說法空林鎭作海濤聲右松間積翠臺塔影重重鎖碧烟道人髙坐自談𤣥山高何處彈中指花落如曾袒右肩架上賜衣長作供嶺頭開鉢不湏牽若非臨濟當陽在誰遣孤峰與世傳右衣盂嶺曾看梧鳯愛朝陽不道空山現佛光斷壁雲間貍臥穩穿林日出燕飛忙琳宮曙啟花俱發鈴塔春通草亦香時見老僧來曝背袈裟影裏坐難忘右朝陽淼淼雙溪繞寺流蒼然夭矯望中收降來鉢底原無着伏在嵓前何所求說法有時看露爪聴經無處不回頭笑他五百阿羅漢渡海于今又幾秋右伏龍坳孤猿一嘯萬山深今日何由響北岑聴去不忘他日泪呼來應識舊時心秋清月下驚禪夢夜半霜寒伴梵吟攜得鷲峰靈蹟在慿欄唱和有知音靈隱鷲峰有呼猿洞時乾公為靈隱法嗣故云右猿嘯巖獨立幽巖幾度春芳年謪下在清宸崇朝細草連衣緑入暮飛花㸃髩新白日虹生疑結伴行雲天半不隨人多因曾禮如來懴瓔珞紛紛挂滿身右玉女峰嵑􅙙嘗思瞰大環白雲猶駐舊禪關也知嶺背多岐路不信淮南是小山千佛幾離春嶂外一門如啟暮烟間前身子敬因看竹誤向溪邊日往還右小雲門㠗欲上南屏多所思千秋王氣總成悲載歸瑶海三神藥望去凾關百二基石屭吼當亭午候杜鵑啼徹暮春時何年着得秦人服野寺蒼茫倚杖追右望秦喬處士壽丹砂駐頰似芙蓉家住東江第幾重梁國文章傳彩鳯湘州服食本飛龍人如公紀吳中出花向春申浦口逢絓就彩弧當漢臘寒梅香汎酒杯濃五代喬順隱湘州服飛龍丹仙去處士好丹汞故云贈新娶梁司馬夫子之孫都省雙輪控玊覊荷花巻作合歡巵華堂挾瑟彈三調繡户張燈掛百枝入魏陳羣還繞膝渡江衛玠早能詩開元舊賜金錢串散在屏前撒帳時李副使之任恒陽憲府自崔巍玉節新頒領外臺繡􅚫近隨河朔啟赤幢髙傍太行開五都碑記封隆烈三輔歌傳皇甫才却笑朱衣陪後乘蓬山曾汎碧霞杯副使舊係同舘送王舍人遷廣平司馬同趨丹陛惜分攜司馬南行展畵旗趙市尚淹騏驥足洺河應接鳯凰池刀啣帶珮因家授車障緹油耻世知舊日退朝相問處春風無限度花枝高江村詹事暫假還里暫辭雙闕下蓬萊白璧黄金莫浪猜海國自能瞻岱嶽帝心不用感風雷谷中鸚鵡眠方穩洞口蘠薇花正開只恐恩深饒眷戀浙潮一日兩瀠洄姜京兆七十少壯提攜毎及肩何期埀老共歸田長因親在娛良日冣憶君曾使奉天焚草只愁聞向外啣盃不覺感從前黄門五十為京兆詘指于今又廿年同朝士餞益都夫子于萬柳堂即席和夫子留别原韻元老功德邁三楊七十歸田髩未霜誼切及門通飲餞感深馳驛賜還鄉集賢庄上歌猶發履道坊南柳正長𣺌𣺌鴻飛方信宿便令人誦衮衣章二十年政府喜投閒載酒平泉草自删蘸壁題詩酬去志滿堂拂舞帶離顔歸時欲臥花間轍醉後難忘檻外山他日籃輿尋問處散金臺在冶湖灣寄還一和尚大能仁寺遥望嚴城隔翠微靈山自昔㑹來稀堂開講席龍初下門傍閒田鳥自飛蹋足頓穿三寶地閑身不掛七條衣從他法臘年年換何日相逢話息機耿使君赴任蔚州百里眞城繕塞才攜琴西上李陵臺州城版峻連雲起亭長車迎自代來官道畵烏通射革民田牧馬當鋤萊漢庭多少安邊䇿只有雲中魏尚能蘇州魯司馬赴京口造下海軍船遇于秦淮有贈平江司馬舊才賢北府今看借箸年早嵗賦詩驚漢苑清秋對酒在秦川題輿名著留雲閣將作功埀下瀨船他日緹油看賜去相逢重詠梓桑篇沈舉人飲次兼示其令嗣新赴公車初從闕下請長纓對䇿金門久未成阮籍近為馬乳醉超宗眞見鳯毛生青絲到處調銀埒白雪飛來㸃玉罌他日慈恩留飲處好同令嗣一書名奉祝李少司農夫子生日正月下浣日立時家製一屏乏詩命賦一十二首署京朝官名此祗八首餘四首見第七巻集賢學士本巃嵸晉秩司元佐上公周室冡臣兼㑹計漢家相業起關中生當白鳯翔天半嵗見蒼龍轉亢東少小鯉庭能嗣烈宮袍裁作綵衣紅二文昌都省動星躔誰似中行副相賢體國自饒登版計肥家不用度支錢代傳蓬觀文彌著部有天倉黍自塡祗恐隱之清太甚空庭設矢坐無氊三徒言治粟阜人民猶藉㕘知作稼臣蘭省尚傳左史貴蓬屏轉見侍郎貧升賢内府材無敵生甫中原嶽有神勿道李常無吏事清安端屬掌邦人四追趨鳯閣喜多年早領司庾典國泉紅廪獨稽天府外黒頭叅坐考堂前鍳公能度均輸議操潔曾無入獻錢夙昔長庚雖感夢秋星啟曜在春先五槐堂接武重人宗况復司徒即大農懐遠入官殊簡率深之計地甚從容招賢譽起燕臺駿有子名如荀氏龍問齒不疑纔服政含元鏡下對芙蓉六三行先後總無端祇覺相隨畵省寛元月帝蓂連嵗發百年仙李共根蟠六符未敢遮奎曜五教由來仰地官况復在庭饒儲􅀈瓊林十庫總琅玕七才名廿載動楓宸公府嘗聨丞相茵十日春生千日酒一年花判百年身通明自料常平粟節儉方辭月進銀五十公孫曾未貴何湏開閣話平津公年五十八黄柑獻罷上元巵栢子觴傳初度遲此日孟郊纔得第笑他常侍始為詩身稽版服恢龍馭世掌絲綸接鳯池祗惜泉刀通九府不令食指染銖錙胡御史廵鹽河東直指風清嶽色寒西行捧節重臺端登朝喜接鵷鸞序開府重瞻獬豸冠筆下凖繩追李勉論成鹽鐵問桓寛上林多少棲烏地總藉還臺振羽翰雲門徐武静五十南國才名嘆爾豪高門猶記舊西曹雲間少弟推龍躍其難兄闇公孝亷在前朝有名洛下諸生探鳯毛結客酒淹珠履細藏書花映玉臺高相逢詘指狂歌地五十年來一紵袍為婦和黄皆令吳門閨秀除夕詠雪見貽用東坡原韻怕向寒風捲畵簾多君猶自傍朱檐不將粉絮粧眉膴但見冰花落指尖夾岸似張雲母幛辛盤空貯水晶鹽無才終譲劉臻婦羞把丹椒嵗嵗添王封君初度華燭當筵奏八璈仙人海上獻仙桃春還碧嶠雲嘗滿晩讀黄庭興自豪雛鳯舞從庭下轉少微星傍越來高遥知名列丹臺久日擁花前白帢袍二鳯毛麟角世相仍名徳高門事可憑發䇿早時開緑字傳經當日憶青燈階前親種三珠樹手内常拖萬嵗藤為望南雲瞻紫氣且將歌管祝升恒寄贈西安鹿明府明府諱祐潁州人琴臺高踞漢新安之子才名冠潁川官舍栽花逾製錦仙山收橘當租錢人間放棹迎春後客至開衙返照前只愧趨庭眞駑下驅車仍負九方甄時予嗣兒鄉舉以第二人出公門下適㑹試下第故云沈母壽萱樹高堂錦瑟張綵雲深處進霞觴嘗來鯉鱠遺羹美翦出荷衣舞袖香夜月炤成瑶海白秋風吹發桂枝黄曾隨製錦陽山曲親見仙人坐五羊夫人為陽山令德配子新舉鄉試宫允鄭幾庭前輩將赴都値其初度有贈圖書遥映日華東萬仞龍門啟上宮史擷一編傳寶歴名同三俊重元豐東堂詔下宣麻紫南極星明照字紅何幸閩江相隔久還隨杖履問崆峒王兵部南使有贈鳯書初下紫泥新喜見西曹簡近臣宮路遠迴銀瓮暖樞臺高賜錦袍春南交盡洗蠻方瘴北望曾驅塞外塵共厠鵷班有幾度今來看欲畵麒麟祝詩東望蓬山憶故家清秋常擬汎仙槎蒼松偃作千秋蓋叢桂香生八月花金匱探書成緑字銅盤注酒沃丹砂山公四十方為簿况有鴻文薄綵霞贈王令平陵出宰本賢豪河上曾推舊法曹市集沙頭行部遠城環山半閉門高當㕔碧柳春前種近案朱絃手内操莫怪上公虛席久君家原有呂䖍刀文都司生日册子清秋列宿啟文昌熠熠南弧在建康自昔分藩推鄧禹于今開府遇文鴦青雲并繞營前棨黄石曾傅肘後方他日功成攜手處漢壇高碣已蒼蒼𣙜使君飲次鵲袍屢賜待旬宣裕國何須更算緡書勝桓寛為論日人如劉晏入官年重逢螺女洲邊月曾汎菱湖雨後船官舍薰風相對晩管教沉醉荔枝前徐司冦壽蓬矢初開竺澤濵時以纂修總裁開舘于太湖之傍從來東國藉人倫巖扉高貯盤中酒林屋分居門下人史局鎭教添半臂聖恩未許乞閒身罇前多少經綸事莫向秋風理釣緡壽福州王使君秉刺分符捍國憂專城猶是舊諸侯冰壺坐對仙山曉明鏡長懸螺女秋種柳閒如辛仲甫著書高比杜荆州不知太守年多少試看蓬萊天際流高江村宮詹初度寄書幛子以贈北門學士苑西居偶住當湖傍釣車立籞手編新種竹閉門閒訂舊朝書聞輯遼金元三史故云庭懸綵箙隨年轉酒汎黄花帶露攄記得内廷當此節君王長賜御前魚楝亭詩和荔軒曹使君作有序曹使君典織署其尊人舊任時手植楝樹蔽芾成陰使君因慨然登亭而歌屬予和之冬官相繼使江鄉父子同披錦繡裳官閣依然梅樹在丹陽重見柳條長牆西紫朶迎朝雨苑角紅亭對夕陽毎遇晩春花信滿風前涕泪一啣觴二當年開府近長干親見栽花傍井榦但過唐昌思玊蕋再來舉院見文官唐貢士舉院花名歌成蔽芾恩長在認作桮棬泪未乾滿樹離離初結子到今都是鳯凰餐莊子鳯凰非練實不食練即棟也贈陳太士并序予己未召試右臂瘍發㑹太士以長桑賸術遨遊京師藉甚諸王貴人間折刀圭贈予立效既而予入舘太士謁選得吳興司教去兩地相憶寄書道餐飯者十葚熟矣今年春太士已拂衣理長桑舊術相見于明湖之濵握手道故夫以太士之才致身通顯直咄唶間事且月旦藝林甲乙諸文士致足愉快乃猶沾沾以利人為念嗟乎稚川元化豈尋常自好者耶相對感激率題四詩所謂柬知我者不必定贈元使君也曾趨日下㑹天安贈我仙人藥一丸抱樸不為勾漏長鄭䖍忽作廣文官酒分箬下雞缸遠書寄蒼山鳥路寒百尺選樓長在望年來月旦有誰干朝野僉載柳亭製白雞盞取其迅速時長安尚成化雞缸取以為贈長興有鳥山蒼雲嶺二相思十載隔菰蘆老去重逢在聖湖愧我歸田纔負耒憐君過市尚懸壺戴憑叠席支雲臥司業贏錢付酒酤半世才名仍蠖伏可知高論勝潜夫三西㕔典教重宮牆並道前身擬太倉邀去座中皆白帢繫來肘後是青囊研經不讓蘇湖學竒疾曾醫濟北王驛舍相看裁咫尺當年此地遇長桑四領袖羣儒年復年昇山人重右師賢槐㕔自鑿蘇耽井藥地長鋪子敬氊晩嵗校書羞待詔方春種樹當收錢南湖築室尋常事何日相期鑑水邊行過道山弔范制府作官亭彌望草萋萋為弔忠䰟路轉迷蘇武不曾降塞外魯公終自死淮西孤臣殉國心如石天子旌門手自題試看遺骸留瘞處豐碑直與道山齊早入虎跑寺用蘇子瞻舊題原韻滿塢朝烟儼散香法幢開處石流凉巗埀蓮片支雲遠塔轉松陰入路長佛閣畵圖分四壁山厨筍蕨供諸方當年野虎閒跑處留得清泉與世嘗二深林行過麝臍香叅遍諸天趂早凉筧水續流春後淺幡竿倒影暮來長時薄暮方歸閒僧不作休糧術過客時傳捨藥方行憶舊朝風物改百年灰刼有何嘗西河集巻一百八十三
