body:
  text: 西河集卷一百四翰林院檢討毛竒齡撰墓志銘十四江西饒州府浮梁縣儒學教諭王君墓志銘君鄞人祖養吾公諱朝試杭州樂之與其兄萬厯戊戌進士在吾公諱猷者割所居居杭州西城生子五皆錢塘諸生其次子夢發公諱一焜君父也又次諱一虞中天啓辛酉鄉試遂下籍為杭州王氏夢發公生子四亦皆錢塘諸生君為第三子諱起芬字芳人而長子諱起彪者中順治丁亥進士有德興縣殉難之事按狀起彪字虎子以興朝丙戌開科舉鄉試中式其先一年君東渡西陵省墳墓于鄞未還渡也西陵舉民幡鎮海將軍守寧波者移軍屯西陵阻江而守時首事者多鄞人強君共事而君辭之匿于海濵者越一年王師下江東君始還渡值虎子賔興歸見君執君手泣曰吾將為興朝官矣明年成進士又明年除江西饒州府德興縣知縣而江西守將金聲桓反虎子捧檄行謁征南大將軍談君行間而談君留之新令諸官未赴任留軍前者事平以軍功超本級擢用名隨征官隨征官本捷徑人爭趨之虎子不欲曰吾赴任官耳既而賊平請赴任方是時賊渠雖授首而餘孽猶未解也饒州故山僻多逋冦而偽將董三合飢民乘之與婺賊張天麒樂平賊許宥等重聚洛口四入德興城民無守者巡撫朱君留虎子南昌待之既而賊稍散虎子乃馳檄遍諭德興民之附賊者而民皆感之多還歸來迎時虎子駐府城先行牌調伍伯取圖籍稽坊里户口報之行省行省以為能已促之行而居民之來迎者又踵踵至虎子遂赴任總鎮穆君饒九道吳君請以兵從而虎子却之己丑六月下車于五垣八月入城越十日偽將董三衝城入篡虎子去幽于十三都之天君廟廟後通弋陽一僧背指曰弋陽去此三十里可逃也虎子曰吾死賊官也吾以逃官死賊也時賊勢稍衰無主首將欲得仕官之賢名者為之號召故百計脅虎子令降而虎子不從已而張筵請觀伎酒半份武安王舞一賊持杯遽來前曰武安降漢不降曹誰謂漢曰吾奉天子命以來知此邦非漢乎曰是滿也非漢也曰堂堂天子蒞中國而撫四夷中與外誰非漢者曰然則請君還漢耳遂戕之先是君送虎子時訣曰吾以身許官官所亂此行存亡未可知諸弟能養親吾無慮矣第吾倘不測非子誰當周旋之而曰諾以故君聞變即走德興收其尸歸葬杭州隨獨身之江西號于江西巡按監察御史米君及饒九道吳君請題恤而御史難之君灑涕陳説侃侃數千言一時聞者皆相顧嘆息稱其賢遂謂君儒者可用使之署饒州府浮梁縣儒學教諭曰署此然後題蓋將以羇君也既而新令撤按差巡撫以變亂初定數更易終不得上請而君以稱職行省詳院使當請實授君投傳嘆曰吾所以羇此者為死者請恤耳豈為此縣博士耶且兄不為捷徑官而吾為之遂拂衣行已而德興縣士民舉名宦崇祀學宫君復至德興學奉主哭于祠康熙二十七年浙江巡撫金君提督學院使王君以君請崇祀杭州三學鄉賢祠又十年君持虎子狀詣豫寓亭再拜請表墓豫時病腹下未應也其明年君卒越二年君子國子生之麟且持君狀來告曰亡父卒于康熙三十七年十一月七日距生明萬厯四十八年九月二十七日已八十年矣將以某月日卜葬某所而銘詞闕然當彌留時囑曰吾向者乞西河文表吾兄墓而病未遑也雖然人亦有言死後能得西河文庶或幽德無泯淪吾兄節未白而吾又齎志幽德也而泯淪矣吾一生用心祇此兄事如贔屭不可解盍亦請之或者能銘其一乎則何敢辭矣間嘗出西城訪寶石山房觀君與夢發公讀書處湖光山色照映胸臆在崇禎之季山隂劉忠端從京師還過君而樂之與之論辨理學往返若干日曰山川人物各擅其秀今不可得矣西城舊所居已歷二世而國初兵燹甫定自錢塘湧金以至清波三門附城居多遷去者時虎子捷禮部歸里而女兄夫戴京兆岵瞻君方會試下第還為壻贅君家乃露處衢路傍徨無所依既久而後賃有屋之家居之君嘗曰人生丁亂離則拂意之事皆能安之少從夢發公遊楚中獻賊陷麻城略地廣濟蘄黃間夜走山市里仁會者湖民之甲保者也指為賊縛而俘于官官初不省既而呼訴之然後大驚急令釋所縛而導之歸其坎壈如此故後每遇拂意事必曰此非里仁民乎蓋通觀云君臨卒其子請曰脫不幸將以之易名乎否乎初曰否既而泣曰吾初以請恤受此官志在請也今可得耶名此所以志矣因名教諭君而附之以銘銘曰矯矯大節千古不刋更革之際始多難言太公夷叔東西異轅惟以官死聖門皆然所嗟伯封尋兄郊原軹深雖烈悲名不宣因之扶服三驅江干不幸齎志留名以傳誰言幽閟墓門此􅝩煌煌日月在兄弟間凌處士墓志銘凌氏豫世交有同官者有先世同籍者有與兒姪輩同計車者獨于悅菴君則少年避世與子之早嵗避人走四方正同而其子子健君又往以六藝相咨請有同學之好惜豫老未經方幅而悅菴已辭世而去且十一年當君生時丁崇禎之季中原羣盜如豪毛顧東南猶晏安也其時生齒盛四民熙熙士大夫以勢位相矜而杭州稱繁華之鄉苟名家者子出而問世又誰不慷慨思奮興者況凌氏甲第冠于西浙公自視固殊人亦不敢夷視之而乃自成童以後弱冠以前嶽嶽然將致萬里而一旦驟罹兵革逃乎蓬藋之域無何有之鄊卒以闤闠終舉生平所學而盡屏之斯已難矣矧君非無意進取者生既抱異姿承父兄之教家學有自而志又鋭上終日挾一卷歷長晝不輟雖傍晚猶俯首佇櫩隙此其汲汲為何如者而遽捃所誦束所為文稿再拜而投之㸑間嗟乎豈易言與是豈尋常學士所幾及哉非古之所謂髙自蹈而薄于功名者乎迄于今其家之羣從出試者或登賢書或第進士出身或召館試為翰林官即其子子健君亦以康熙己卯中鄉試乙科而君獨廢居治生業徘徊市門人皆稱之曰牆東君云顧君聞牆東名劇喜嘗曰吾家數世為顯官而食廉吏貧不幸早失怙七嵗衣麻衣何以將母自非居牆東其能為人子有今日哉以故公事母數擊鮮杭俗時物非最初出者雖貴值不名嘗新君必以新進母未嘗于口不食也兵革之際人間多傳聞每日夕必陳其晝所聞者以為歡母嘗嘆息謂吾不出門而周知天下之事可驚可喜較之矇瞍之彈詞亦何以過苐不意世故翻覆其為滄為桑遂至于此君有兩大願一大父與父棺俱未葬君營葬兩山至足趼股裂而卒以竣事一先世閥閲在新宫橋南初被兵災既而毁于煬因寄之望仙之左而久不能復君獨復故居且造家廟為合宗地兩願俱畢若其自處之嗇則幼讀乏薪燎每坐暗室必辨色而起以補宵課學書不用紙以退筆蘸水臨帖于琴磚日必千字至其身之所衣則自潔服對客外易以博綈之補綴者或詰之曰吾忍忘吾母手紉乎哉君勤于祭祀每以少不及事父遇諱日輒孺慕如兒時或其日偶值隂雨則尤愴然謂家人吾雖少猶記是日微雨寒煙起如縷今不猶是耶言訖泪隨下嗟乎如君者可謂孝乎惟孝隱君子矣康熙二十四年君年六十召家人謂曰古人有云人至六十須多為之貌以傳于後使子孫繼起可以想見其形容夫見其形容何如直聞其謦咳之為快也因自為詞以為夀其詞曰余生不辰七嵗喪父稚也伶仃母氏荼苦誰曰朱門不異蓬户埋首誦讀仰承傴僂經帖苟明青紫可取事乃大謬兵燹錯忤辭我管城而業商估嚴寒不冬酷暑無午漫擅竒贏庶給二釜于歸我室奉我筐筥舉男子三摧折草莽祝融肆焰惟餘燋土獨行煢煢託足靡所誅茅望仙苟且搘柱劬勞罔極又𢋫陟屺枯骨未安遑問跋股幸妥先魂委蛻山塢乾也豐也嗣續豆爼孰云其佳已乎猶愈淡泊素秉勿耽歌舞食取其飫何必魴鱮衣取其適何必楚楚恤其匱乏胡分爾汝資其嫁娶曰余是主凡我子姓亦或稍補拂逆之來理以自矩事得其平雖讎可侣謙謙君子人或相許鹿夢縈縈蝶飛栩栩花甲一周頓欲輕舉所俟式榖在乎善樹以此垂訓兼之作譜越四年卒君諱克誾字步騫别字悅菴錢塘人也代有顯官自五世祖刑部公後髙祖諱立嘉靖癸丑進士官建昌太守曾祖諱登瀛萬厯丁丑進士官禮科給事中與其兄太平太守諱登名者同舉鄉試而公居第一祖諱德國學生父諱龍徴杭州府學生配陸孺人子二長乾康熙己卯鄉試乙科充國子貢生次豐國學生公卒于康熙二十九年十一月距生故明天啓七年十二月享年六十四乃以某年某月將葬某阡孝子乾即子健也告豫狀而謁豫以銘銘曰惟君挺生席髙門兮方之靖節為南郡曽孫兮兩世家食居丘樊兮羣從紱珮猶然紛綸兮黃門之孫尚有為京朝官兮君特急退甘肥遁兮潯陽處士足相比倫兮豫少進取長而沉淪兮棲遲道路乞食者三十年兮驚翔之鳥念及同疸兮俯仰悼嘆等之豫之身兮今兹老去方校典文兮惟君之子每與之講論兮相君之室若堂壇兮宜爾子孫其永無諼兮誥封恭人湯母王氏墓志銘恭人無諱王姓故明崇禎進士直𨽻淶水縣知縣元建君女孫也父旋一君補諸生早卒母凌孺人以苦節著兩浙巡撫上其事于朝奉旨表之建坊旌里門恭人生而端整有賢名會誥封中憲大夫湯君其原配錢恭人卒求得一良助宰內政者聞恭人賢遂聘且娶焉方是時錢恭人所遺一子三女皆幼稚子裁七嵗即吉安府知府諱修禎者也提攜襁褓環膝前恭人以一身兼保傅之任斯已難矣暨修禎出就外傅君既饒結納交遊紛然加之在庭之師友往來請召其間酒漿珮璲不絶于御然且男女婚姻親串酬酢皆得揆人情而中禮節觀者謂嗣徽祚胤兩不愧焉據君狀君纍經坎壈迄無寧息至是外宅有洋估市海舶者以犯通洋禁為怨家所發而其人亡去大將軍捕逮謂君歷海人藏匿資結當連坐恭人投閣救君不可得犴狴祕密恭人輸奩具罄所有通之且謀出身鳴君寃會當事廉其情驟加省釋然後已康熙十六年修禎以年貢授內閣中書舍人二十年出補常德府同知值西南蕩平覃恩封宜人越五年遷江西吉安府知府晉封恭人其時恭人家居佐君宰家政秩如也既而修禎罷官歸越五年卒先是君兄弟四人各有子而君子最長其娶工部都水司員外郎勿針徐君女又最早以為似續可無慮而修禎無子其卒時君且七十三矣君以議立後咨之恭人恭人曰古有是禮耶于古稽之其無耶則稽之今之令甲乃以君弟洪九君之孫涵為修禎後其時會宗人集親黨告家廟恭人實主持并調護之其事璅不能悉也乃越二年而君又卒恭人向撫子今又撫孫兩世保抱無異焉當君卒服闋時恭人年六十親黨請為恭人夀而恭人辭之然而其誦恭人者有云恭人佐君以寬厚遇事出意外必曰君厚人君不負人義也人薄君人負君命也以故君每歷險阻得自解慰而修禎受恭人教自成童以迄筮仕晨夕出入惟恭人言是聽以故兩歷大郡而皆免于議至是則艱辛荼苦向之秉政于內者今且兼攝外事毋論樊籬鐍鑰廪棧簠簋持飾惟謹即一盂之饋一刺之稱亦必再四衡量之然而中外井井各有程度即至盛衰遷變前後榮落不少易其善于持門如此恭人卒于某年月日距生某年月日享年若干其子女婚嫁具君志康熙辛巳將合葬于甘溪青龍山錢恭人墓哀孫涵介其外大父禹臣張君來再拜乞豫銘銘曰翳時有淑基于太原亦越數傳而嬗聞人實産名貝掌中之珍庭梅有摽歸于商孫禮重嗣室宗貴肇禋乃甫脫帨遽抱繡幱以鸞車降將雛弱翰既秉懿矩復饒慈顔雖當中道頗遭險艱庾臺腳短文姬首􅤫終致完卵覆巢仍全因之嗣子獲獻天安五花再進六珈晏然如何鞠凶聯喪不旋不止上計以事去官大樹既撼孫枝并殘自非巨力誰能仔肩所幸式榖薪薪相傳臧為鑄返子家晉還宗祊克紹箕裘再延秪嗟祿食半出蕪田曩時車牛誰為挽牽恭人處此要為極難爾乃黽勉蓋藏不愆盤盂皮幣凖挍金錢出入禮度皆云至便古稱持門非健莫㨜云胡不造公然棄捐今兹祔瘞於龍山阡將俟朝賚以賁重泉歌礲片石長存墓門與並存者此石中文山隂張南士墓志銘南士張氏名杉山隂人父灝不仕祖鎡天啓辛酉舉人官晉府左長史曾祖一坤萬厯甲戌進士歷官江西布政使司右布政髙祖元沖嘉靖戊戌進士由庶吉士授工科給事中遷都察院右副都御史巡撫江西五世祖景琦成化丁未進士歷官廣西桂林府知府其兄景明𢎞治庚戌進士太子太保禮部尚書文淵閣大學士諡恭僖弟景暘𢎞治己未進士福建道御史六世祖以𢎞成化己丑進士由禮科都給事中歷任江西左參議其弟以蒙成化辛丑進士除江西廬陵縣知縣南士兄弟四人兄曰柷曰梯弟曰楞皆有才名而自梯以下每出主文社人呼曰三張子三張子當明季以其文行世名噪海內而楞甫弱冠與同邑鄭氏舉民幡蹈海而死梯病卒南士隱居白魚潭性孝友事兄若父撫兄弟之子過于己子講學務躬行砥礪刻苦其于人倫間細大必周無毫毛敢疏忽而尤篤于視朋友嘗隨兄客維揚為兄執御巡鹽御史薑圖南遍餽名士之過訪者杉捧兄刺投御史門而已無刺御史知杉兄弟來雖無刺各餽六十金會江隂王雙白以避人故髠為僧至是同杉寓乞門者通刺不許及通又無餽南士曰豈有王雙白來而無餽者此必誤也不然使君何繇知我至我當為使君補此一誤遂移餽己金換一簽付雙白去宣城施閏章督學山東以山繭三十丈屬山隂徐緘寄南士緘悉為家人辦衣不之寄或有言于施君者施君再寄之南士封還所寄曰已拜賜過矣施君大喜急持書示座客曰人言安足信吾固知伯調無是也伯調緘字餘姚魏􅀢以臘月渡西陵旗兵戍者剽其裝衷衣過蔡子子伯蔡子飯之裹之以越布單衣時南士居蕭山􅀢并過南士南士脫身所衣絮袍衣之且貸鄰人金為理裝或問子伯曰吾亦思有以助之而以念羣從其不能卒嵗多矣且家人雪中皆無兼衣而以厚所薄不忍也以問南士曰友以急投我而我薄視之則安賴有友者若夫吾所厚則生平事也生平不厚厚而臨急而較量及之徒薄而已聞者以是定張蔡優劣云康熙二年海上大獄起歸安魏耕走蕭山復走梅市大將軍刋章遮捕之獲耕兼逮蕭山梅市之藏耕者以鋃鐺鎖李達楊遷并祁忠敏公次子班孫家人莫敢問道路離立南士挺身走三家為經紀其事縣官遣伍伯戍守懼漏所籍而南士乘夜為涉帑且時時渡江入司獄通犴狴往來獄吏怪之執以告提刑提刑大驚初以為異姓非家人窺探資給擬坐而既而察其無故慰遣之及耕伏法南士隂丐之錢塘孫治收其尸而班孫與達與遷並徙塞外點解多一人則杉也解官斥之曰汝欲偕往耶曰當魏耕逃時亦思至某家而徒以舟楫未便故某幸免今某不忍三人者獨行欲送之過河而執事以為欲偕往吾豈畏往者耶解官義之勸之返乃嗥咷牽衣而别既而蕭山毛甡者為怨家所陷以殺人律負死罪在逮出走十五年中道遇赦潛歸將到家而怨家迹之南士親飾為舟子待之白魚潭而藏于家越一年逺近多有知者乃徙之南山之天衣寺出入瞭視每以茹蔬久私市肉炙之搗魚蝦雜菜而合之為菹日捧筋如家人顧終以暴露徙去康熙十四年南士過禾中聞甡在汝寧金使君署念甚遂獨身持被涉江溯淮由潁亳而西直趨汝寧遇于城南之蔣亭相抱痛哭云國家屢有赦籍簿已滅怨家亦散亡盡黃門薑君為君雪其事可還矣遂大遊淮蔡十日攜甡而歸其後五年甡被召赴長安而南士以猶子官廣東鹽市司提舉過其任疾卒君貌朴而氣直語鮮回曲然視天下人物皆如一體無彼我間隔而至于朋友嘗曰末儒以十倫五教衡量厚薄則君親至重孰有及于朋友者此執一之學也時中則不然時當所重雖朋友而等于君親無少磷焉何則中故也非然五品不並列矣故其交友每如此若其讀書則博篤而辨于載籍無所不窺然各有根柢嘗講學留軒座中論禮不能決南士引禮注及漢晉儒之言禮者數言決之當居蕭山時知縣羅明祖係京朝降官而有文名是年值崇禎己卯大集名士于河陽館鐘鼓笙瑟一若舉文社者先課文一篇題為德行顔淵三十字課畢復揭一籖于卷末曰漢人有諸賢名曰顔子曰曾子曰仲弓曰子路子遊子夏何人也座中百人無應者南士提筆書其下曰顔子黃憲也仲弓陳實也張曾子張伯饒也城頭子路者東平爰曾也子遊張騫之孫猛也漢同時有兩子夏一杜欽一杜鄴也羅君屈膝再拜曰名士哉蓋其年十九云子燧康熙庚辰進士乃為銘銘曰聖學久熄誰能躬行儒墨貽絣棄若蒯繩同此倫類妄分重輕敢謂朋友與君親并張仲孝友天良性成人我一體不徇虛名其于行事歷歷有徴況兹甲族袁楊東京世嬗冕紱家無瓶罌不幸五會與陽九丁三張抱才委諸棘荆我恃良友濟危扶傾北海餅豎徐州酒傭天涯莽莽黍離相尋既平急難孰念友生四時位哭徒然屏營百身願贖于斯冢中西河集卷一百四
