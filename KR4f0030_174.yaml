body:
  text: 西河集卷一百七十四翰林院檢討毛奇齡撰七言律詩一禹廟夏王四載告成功别禪苗山起閟宫玉帛千秋新裸薦衣冠萬國舊來同金書瘞井封泥紫窆石懸花映篆紅一自百川歸海後長留風雨在江東江徼懷人江徼懷人江外臺江流千里重徘徊秦人島嶼乘潮上漢將樓船繞地回殘壘低連沙樹暝孤城遙傍海門開西陵一望滔滔水不見長帆天際來無題織素誰來問故妻春機當戶曲欄低筝投秦氏桑林下家近王陽棗樹西錦字回看江北雁玉梭鳴傍汝南雞絲長日短難成匹愁煞鴛鴦半路溪晤太倉許長水煥左遷吉州司馬賦贈兼慰江州司馬舊髙陽吳下風流屬太倉長水自留循吏傳嚴關曽使户曹郎清秋好月逢玄度外府卑官念子將指顧漢庭思賈傅不教楚水厭明光懷張七梧遊粵𨝍關客舍送馮歡一别三年會面難草短愁人還北固花開憶汝在東官明螺舟放珠江白瑣布衣裁荔子丹陸賈未歸書使斷誰從嶺表問平安過東園偶過東園倒接㒿春風幾度憶前期低花趂蝶銷黃粉積草生魚散緑陂架滿書編看愈懶門無客到起嘗遲借問西川王録事可能還贈草堂資除夕逢立春效景龍體椒盤柏酒傍江開彩仗青旗出郭來玉厯乍看今夕換蒼龍先遣隔年回林雕朔雪驚抽蕙地近南天早見梅添嵗迸為除嵗日他鄉何似故鄉杯春盡林亭書事和吳水部韻春光欲盡曉陰寒間向林亭一倚闌當窗麥氣隨風度隔幔山容帶霧看宿鳥盈巢遮葉暗晴蜂繞地戀花殘共對琴樽忘物候朱盤新摘小梅酸白鷺洲施湖西席送吳百朋之任湞州即席同陸圻䪨天涯髙會惜離羣錦席芳洲夜送君樹裏星河三楚盡樓前章貢一江分翻來白鷺波間羽望起蒼梧嶺外雲怪底新歌皆妙曲征西官屬總能文二雙江髙閣上崔嵬入夜憑欄一舉杯千里重停吳隱棹羣賢追嘯庾公臺清歌别部風初轉換席西軒月欲來此去湞州應不逺南行端賴濟時才東蜀山人東蜀山人著素冠青蒲繞屋近河干自稱晚嵗須扶杖人贈清歌是考槃啼鳥春從花裏密烹魚朝出竹中寒間來時向藜牀臥種樹新書看盡難千秋橋訪友千秋橋畔草芊芊司𨽻間堂一徑偏隔巷燕飛尋舊壘開門水滿纜春船家人慣善秦聲曲故事猶談宣廟年落拓相過休恨晚夕陽江上有烽煙登臺望石門關作春草羣飛雉子斑登臺一望石門關緣江烽火來三楚橫海樓船斷百蠻絶徼軍輸愁逺度長征都護未生還我來不見周南郡金斗城髙何處攀旅中送張二自晉陽還歸西江髙林朝日照叢壇遊子還鄉勸早餐樂氏諸兒曽許趙張良垂老未歸韓路分南沜黃粳熟家在西江白露寒帶鋏揮戈年嵗晚重來莫忘釣魚竿登瓊花臺何年創此瓊花觀不見瓊花此觀開千載名花應有盡尋花還上舊花臺飛鴻曉斷𨝍關度疊浪秋翻瓜步來四顧憑欄一惆悵蕭蕭黃葉下蒼苔張使君泛舟作太守樓船駕露梯平明載酒鹿城西緑水漲時抽緑草青山斷處界青溪擬翻太液歌黃鵠曽使陳倉祀碧雞渺渺胥臺髙未極相看知與峴峰齊許記室新成進士有贈三年管記在江東獻賦還來宿射熊並道枚皋堪倚馬誰憐鮑照久從戎天門日映寒袍紫上苑花傳錦字紅舊府蒼頭擐甲去也聽鶯語到南宫送胡揭陽之官揭陽勝地古潮州束綬懸金起壯遊候吏逺迎三水驛居人多在百花洲鮫珠散處蠻雲繞馬甲裝來海氣浮君到若推吳隱後玉溪應發舊清流張梧去淮獨上淮陰古釣臺登臨作賦甚雄哉頻年帶劍驅吳楚忽爾行歌歸去來細草暄隨胥浦漲平濤凍逐射洪開南昌亭下春風發不見王孫哀復哀宿東村作東村别館傍東田猶許東家倚醉眠隔屋鳴筝聽漸逺疏櫺漏日影初圓枯荷殘暑浮新鯉髙樹先秋咽早蟬欲上南岡無羽翼褰幃愁較白雲篇遊倪司農園亭尚書休沐草堂成别有層軒倚水楹髙閣恍連千堞起修廊時繞萬山行曉霧隔陂牽紫蔓春風前路折朱櫻潁川才子題門巷只羡兒寬雨後耕陳推官子龍題階門為經鋤鄉送洪明府圖光之任程鄉程鄉南去載青驪明府才名天下知珠海煙深行處逺藤花風暖候來遲農錢絶徼輸螺子官酒長亭薦荔枝送汝鵬飛剛六月前圖應記鳯西池詒徐水部南州才子水曹郎兩度乘軺出帝鄉豹尾舊懸吳市曲麟書重下楚江陽遙天芻粟通關逺獻嵗椒花拂綬香慚愧梁園倦遊客秋風一别竟難忘登會城望江同金二鏐何四十二之杰沈太史孫吳二徵君江水滔滔接逺空登城遙望海門東秦皇弩仗驅三島句踐船軍散五戎斥地鹽潮賔雁白蠻天蕉雨客帆紅津亭飲宴當年事努力神州藉數公飲梁少府仙官趨府控金羈邀我同銜鸂鶒巵春到滿城開躑躅晚來雙甕發胭脂江關暇日參卿重山坂晴雲送客遲小吏不知廳事散隔牆猶自聽黃鸝桃花津前桃花津前津路回角巾布襡林扉開客知古事倘能説我亦野情當再來斜日白桐寒隔塢迎風紅蔓裊當杯山村處處春桑發那見彈筝秦氏臺暮春三月吳淞招上已修禊甡適過山陰不果從却簡張慤徐致逺諸子麗日晴風泖浦波青油畫鷁禊堂過江南舊俗推元已吳下新亭似永和蘭葉叢舒紅錦幔桃花髙漲白龍河千巖萬壑山陰路不見流觴奈若何少年少年抱劍出關中羽衛新招六郡雄久許報恩逾聶政平時飲酒笑秦宮雞鳴曉日黃河動雁陳秋陰紫塞空當日枌榆遷欲盡愁君馳馬過新豐與舊刻小異數字與祁六公子赴曲水社集不分肩吾曲水遊幸陪青翰鄂君舟殊方結客三千履連袂看花十二樓列伎長筵歌自緩畫屏深燭醉難留晚來多少江南雨瀉盡王家金埒溝王侍御席與歌兒御史筵前舞柘枝當筵重唱鷓鴣辭紅牙長繞青螺帶粉頰低垂緑玉巵人是故譙車子後歌傳秋浦謝楊兒蘭臺曽擬貞元宴葉底花間幾度思嘉模曰劉禹錫詩花前葉底奉君王間與前同匏瓜戲倣西崑體匏瓜空載兩車箱不疊蘘荷舊紫裳爭取百千邀碧玉何如十五嫁王昌樽前鳯舞黃華子水面魚吹白石郎辛苦盛年猶待聘當時只記善和坊逢劉二江南行王孫十載罷追遊又上龍江古渡頭獨酌馬生仍作客同行李廣未封侯梨花滿院留青漆栁樹長干躍紫騮無限建康城下水年年空向海東流孟逺訪友吳下孟子論交真丈夫清江四月下三吳花明錦帶懸刀錯風送斑鷦轉轆轤長夏鶯啼過茂苑荒臺草色戀姑蘇淮徐北望雄千里莫道韓陵片石無入湘湖書事落星湖畔草茫茫别有澄波萬頃涼溪口一橋連大路城西幾里到橫塘青山入浪煙林動翠藻緣嵓水帶長隔浦鵁􅪦驚棹起蕅荷深處又成行二環山淨捲碧琉璃紫幕紅茵度水涯稻葉暗抽朝溉後荷風不斷午涼時龍堂瀨淺楊王宅湖有楊冀王宅今為寺鳥道雲盤句踐祠蕩槳女兒歸獨晚前湖新約采蓴絲衡陽衡陽一望數峯髙雁去煙深絶羽毛嶺海但能供荔子滇關誰與種蒲桃戈連嵗擾魚龍舫花落春溫組練袍新息舊標江界柱天回南畔水滔滔贈薑二承烈赴從叔上元官署橫江草色柘袍輕遊子鳴榔報水程村市春煙迷浦漵布帆朝雨近清明河陽花縣迎潘叔建業官厨訪步兵天府嵯峨形勢壯相逢還上石頭城馬迹懷南士越王山下賦離羣英布城前看落雲嵗暮他鄉還作客春來何處不思君天開婺女搖晴翠水滿康郎漾夕曛陽雁欲歸愁未得幾回哀響夢中聞海寧祝生過訪攜伊舅氏朱孝亷書至喜贈嘉模曰時朱近修新刻集成微雨清秋筒簟涼誰來采苧到橫塘天邊落雁江湖晚篋裏懷人嵗月長越布衣含山氣白沙門帆落海雲黃憐君年少能乘興攜得新詩是渭陽奉贈屠又良解元母太君夀錦帨張筵泛玉波髙堂玄髮尚如螺長攜公子攀叢桂曽對靈均剪芰荷麗日朱函開寶篆秋風瑶瑟動雲和陽山大節終能配庭下何難見孟軻解元尊人殉陽山令有記寄獻嶺東使君金牙玉節啓龍江嶺右分藩早殿邦一代才猷專百越九天風雨下三瀧官亭葭吹開銅鼓蠻女花枝映繡幢陶侃功名君獨擅繇來國士本無雙過南徐軍贈袁八書記南徐幕下談兵日北府軍前對酒時愧我文章輸陸賈憐君慷慨過袁絲星門合壁調金鼓天塹橫江鎖鐵錐露布草成真倚馬可曾持示帳中兒驟雨口號三首驟雨空亭暑氣收紅雲堆作黑雲頭簷前飛練垂垂溜水面圓花點點漚逺岸林明回晚照平田澮滿快通流絺衣頓覺浮涼襲多少輕紈却畫樓二隱隱南山動晚雷山前雨腳自飛回浮雲擁隊爭吹去逺樹聞聲漸過來當户懸珠蟲網濕衝池破鏡水萍開不是蒼龍歸大海翻疑神女下陽臺三蒲葵觸熱雨初溥頃刻斜飛過羽翰花甓濺來衣自濕荷珠傾盡葉仍乾風飄錦帶垂虹細晝映金釭繞電寒滿地驚湍愁不定相看疑下幾重灘入橫山宿傅大溪上草堂有感十年九度入衡陽最愛君家舊草堂曲路環溪栽野竹前池拂水臥髙楊春雲壠首驅黃犢秋雨山岻射白狼少小逢君豪氣鋭今來看作丈人行二橫山西上路欹斜郭母峯前水一窪曾著竹書開墅曲到來松酒醉村家南溪人逺留紅樹隔塢天寒噪白鴉我欲乘船歸渡口期君三載種桃花衡門衡門寂寂傍江涯曲徑新成到轉疑風吹粉蝶翻花桁雨後青蟲滿豆籬漁網入陂牽綆細農歌出谷應聲遲短䘢相過長載酒不須陶令在東災客中送董匡北征朔風貂帔向皇州愧少琅玕贈逺遊鵬翅乍分雲外路梅花先發驛邊樓賓開燕邸通侯第詠並臨淮估客舟上苑春光鳯城月幾年回照越江流中州元夕觀鄉飲有感石經門下早啼鶯遺老猶存饗序情鳩杖扶來方醉酒鹿鳴歌罷自吹笙官街火樹縈星晝曲巷香車待月明伊昔洛陽圖畫裏春風幾度會耆英康臣宅感賦并憶蕃鮮多年不見沈休文府市南頭一訊君兄弟婚姻驚老大池臺今昔感離分羊羹對酒臨秋節鼠麥銜花散夕曛却憶美人南浦外湫風凄雨渡江雲欲留當壚次凡不得舟發同薑八孝亷占凡字淅淅江風吹布帆長征空賦石巉巉寒來沽酒停行客醉别當壚是次凡雁柱橫胸愁轉結螭環脫臂口難銜射陽湖畔江潮落不辨流波苦共鹹二斜日將沈少婦嵓回船浦口繫青杉同心未許乘油壁載妓何曾挂繡帆舊院雙扉樊素宅新歌一曲杏黃衫醉拚枕藉洲邊露猶自燈前認次凡東城東城初躍紫驊騮萬里親隨博望侯赤羽自傳光祿塞紅粧新下緑珠樓春還海雁天南盡日照黃河水北流寂寞朝鮮津吏婦長聨裙帶學箜篌中夏寄贈宛陵施先生初度江左衣冠尚未零琴溪曾見老人星聨吟時並潘尼詠賭墅欣留小謝庭蒲盞流霞傾綵鳯桃笙捲雪臥飛螢自憐長買餘杭酒不及稱觴到敬亭先生為愚山從父故頷云奉贈南關徐水部榷使君冬官分榷並河渠載得龍門平準書自聽猿啼懷木客還懸豹尾算商車庭開鼓蓋翔朱鷺榻下江潮滚白魚椅梓楩楠誇美麗可能裁搆玉臺餘贈閬中張明府宰會稽郎官萬里出巴西獨綰銅章到會稽江上早寒頻去虎山前春暖自驅雞思玄舊擅南陽譽博物重開禹井迷何處傳君遊覽興馬臻橋畔賀公堤參上人還歸西陵道人九月渡西陵間看湘雲杖古藤六十年來三藏法萬千山裏一歸僧桑花翠薄珠林雪蓮葉香開梵井冰到處錫飛忘甲子那知此地有懸燈贈沈探花荃歸雲間覲省雲軿初出少陽宫覲省還歸泖浦東丹詔捧來瑶殿側綵衣裁在杏園中波翻瀛海冰魚白日滿包山橘樹紅此去慈親方五十羡君年少邁諸公柬茂倫城雪初消想茂倫吳江草色緑粼粼關門練合春調馬天畔虹低晚渡人金匱簡探雲樹渺銀牀甕抱土花新阮生亡後嵇康死一望軺車最愴神茂倫號抱甕丈人見七古卷薑太翁月夜邀泛鑑湖城南一棹泛清漪永夜來遊賀監池風起平翻花底練月流遙漾鏡中絲開樽靜久鳴筝細撤燭涼深下幔遲萬頃波光明似雪誰來不作剡川思西河集卷一百七十四
