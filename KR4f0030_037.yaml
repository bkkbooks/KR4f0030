body:
  text: 西河集卷三十七翰林院檢討毛竒齡撰序十四吳冠五遊上黨詩序豫聞烏聊白嶽間有吳子冠五其為人為詩為天下人所推重而豫求其詩而未之見也薑子武孫謂豫曰冠五于人詩每少所可而獨不能已于君之詩嘗曰天下有為詩如毛生者哉而豫則疑之夫豫詩不為人見見即不必憎于人顧未嘗有稱豫詩如冠五者也是必冠五之詩偶與豫近近則悅悅則稱之有溢口而冠五不然冠五嘗遊上黨矣去而輯其詩來京師夫上黨介秦趙之間壺關虒祁本河朔勝地豫方傳綏盜前代名將若曹文詔張道濬輩曾提甲卒殺賊驅騁狄潞旁若無人豫思遊其地而惜豫詩不能竒無足為雄憤生氣􅯞膩狎褻無能鏤魂鑿影使神鬼吒㗫而讀冠五詩一何雕冥漠而刜虛無如是也然後知冠五之好豫詩非如當世之苟同而附已則悅異已則非者也然後知武孫之知冠五猶之冠五之知豫也然後知冠五之為詩也不然好竽而棄瑟襲青而斥白便宫徴而毁商角天下亦安有為詩如冠五者矣若夫冠五之為人則第就其為詩觀之而其人何難知焉桐城左仲子暝樵詩集序少聞左忠毅公死璫事恨生晚不及見忠毅會忠毅介弟于崇禎之末以御史代巡兩浙特渡江詣臺望見御史顔面咨嗟太息指語于衆中以為此即忠毅公介弟也況忠毅諸子曾預籍逮尤素所願見而不可必得者哉去年冬公仲子暝樵先生來遊永興距向望公介弟時已三十餘年豫與先生相對各已老大然猶幸于流離未殞之際得納履一相見惜乎去之遽也乃又距一年而貽書問訊兼寄生平所為詩屬為序首夫先生家世氣節不藉文章即文章自命亦必出入經術期於有用不必屑屑以巵詞帨語爭英角綺乃我聞忠毅在北寺時鼎鑊刀鋸剟肌爇肉即魂夢吁吸未嘗少為之偃息然且含毫搦竹與魏公忠節楊公忠烈周公忠介輩謳吟唱和為七字長句融金叶石情文俱備此非故示整暇誠以意旨激越呼天搶地之頃不能無所發泄則反舉而寄之於詩今先生遭逢未必皆順徑也羇遲俯仰形諸浩嘆亦固恆事況先生所存多歷遊詩往嘗訪弟司刑公於嶺外早有南遊刻卷行世而今則合諸所遊為一集寄迹棲棲不廢嘯詠倘亦文章忠孝之所必及者乎先生詩氣惇而詞雄不假雕飾洋洋多負道之色而剴摯刻實則直欲抉胏腸相向無優遊瞻顧可自解免蓋天性然也豫不及見忠毅見忠毅之子且得見忠毅之子之所為詩幸藉一言以挂名於其間則以視三十年前渡江竊視其介弟時不可謂非今兹之厚幸也況乎後之讀其詩而興起者與琴溪合稿序丁克揚别字琴溪向與琴溪之伯氏論詩城西琴溪方以舉進士走長安道上未暇及也暨琴溪筮仕懷印之下􅖿始得竊讀其所為楚中吟者夫以為吏之賾當下􅖿之邑之敝宜板稽簿責惟日不給而反從容焉而為之賦詩則其地之不足與有為奚待計哉第伯氏論詩雅好刻核非備極幽拗略一過不省即未嘗動色稱嘆而琴溪坦然獨行澔澔然若決陂之灌河曠然無所芥蒂于其詞是豈履道之所為務為可曉者與乃琴溪為邑與民休息終以不善事督郵投劾竟去會兩湖用兵荆嶽之劃江而相抵者合巴東上下強弩百萬烽火照夜不徹而琴溪以解組未歸棲遲于武昌楊栁之間目極晴川喟焉嘆興而又時時還下􅖿與父老子弟山川城郭重道故舊其流連賦詠哀與怨併讀其詩而見其志與其所以遇也今琴溪歸里思彚其所著若所稱前後楚吟與秋夢旅愁消夏諸編合為一集而命豫以敘夫履道任達本無宦情而感時觸事隤然自放嘗見之投間置散之間琴溪遇不及履道而情文曠逺往往相近自夫論詩者好言初盛遂致貞元元和以後棄置不問而昔有終身為詩始悟長慶集之不易為者夫從容遊娛易事雕飾而有如造次當前痌瘝未解非大聲疾呼即徑情自訴而不諒者猶欲以研練之詞責之彼夫不病而呻者謂之樂憂病而不呻而故為巧言令語以達之謂之飾喜樂憂與飾喜同一不倫則向使伯氏而在猶必以為琴溪所言當有不出于履道而不可者而況乎情之有相近耶蛤庵和尚語録序蛤師參諸方自謂有得及參報恩老人如捨仙經見十六觀盡悔諸宿習穿跏入地者凡十年遂舉西來所傳直指心印印之報恩報恩亟許之而未有付也既而隨報恩來京入萬善殿世祖章皇帝每訊以法因有所舉似于章皇帝前會平陽老人相繼應詔聞師名急覓見師而師已南下遂于其還平陽時出大鑒以來正法眼藏馳而授之報恩嘗曰吾芻象十年而衣纓者在禁門然豈不足示天下觀哉寧州龍安之兜率古名剎也越千里啓請值賊犯兩湖官兵從武昌下者道蒲圻下􅖿而出入於龍安之間師凡兩往振已廢之迹而經始之雖荆榛屢塞未能闢招提舊境一還故觀然而鐘鼓興焉嗣此則時遊三吳吳中人士每有所啓請皆不之却録中所稱吳江羅漢者其一也歲甲子任黃門招師渡湖會師發願將朝臺遇于京師和碩安親王延師于西山隆恩建幢設鉢逺近聞者皆宗之居無何翠華幸潭柘召師行在令賦詩訊五宗始末授齋賜含桃灑以宸翰時天下大定闢國日出入之表皇上大闡治道自堯湯至文見知聞知皆有獨契因舉心學相質難至謂佛家之見性即儒者之明德直揭千古所授受而明示之師幸于親承之下特拈宗教附以頌揚一何盛也夫佛無與于治道而言治道者不之廢然且曇摩釋安元奘宗泐雖出入禁廷未嘗遇堯湯之主而師以彌天絶學直取西方古德不化而自行不言而自信者上與聖天子參證同異其道法心印為何如者少林無文字維摩與文殊相對乃至無有言説龍安羅漢豈饒舌哉則謂是書為三洞經為菩提流支十六觀文為大學明德所傳北海之注衡州之疏無不可也聽松樓宴集序聽松樓者蕭山吳氏别業也其樓在蕭之北幹山下山故有松而築重屋以聽之因名聽松會吳子征吉偕錢唐許子莘野選文其中嘗有聽松樓文選行世故雖在錢唐亦以是樓名所居蓋其為友朋髙會久矣康熙己巳淮隂張子毅文杜子湘草與吳門俞子犀月顧子迂客俠君兄弟同來明湖適睦州方子渭仁家季會侯寄湖之南屏而越州吳子應辰王子六皆張子星陳金子以賔皆前後至因偕丁子藥園輩若干人髙會于莘野之草堂而以楊先生以齋為之祭酒仍題之曰聽松樓宴集統所名也少時作蘭亭大會合郡之八邑人士而集于倪文正公之園維時三吳諸名士各舉文會與東江相應顧東林諸賢實主之曾幾何時而風流歇絶至有假應求為結納藉聲氣之階為奔趨地者此西園之勝所由漸流為甘陵之禁而無如何也聽松諸子久以文章名于人而大江南北浙水東西其文人豪士偶相契合遂若磁石之粘針與琥珀之受芥流連詠歌延為髙會此固三十來所僅見者吾既悲斯事之久荒而深慶友朋相遭良辰勝地為未易遘也若夫敦盤在前聲伎間作諒亦從來良宴所自有者是集也各為文一賦一詩二豫老且醉不能承管硯越日竣事因復藉授簡之末而僭為之序倘湖樵書序幼時讀野客叢書而好之遂效之作説麻十二卷以未能博晳棄去既又為雜記記其耳目所見聞者亦不就時傭書長河間嘗詣元成先生聽先生談議每舉一事必批根導源窮詰流末然後以漸互引依類比見合古事與今事而串穿之為之指其異同而折其是否然且宛轉觸發左右旁及條條然如説家人事如按驗官府文牘如自訴肌膜所疴癢如數壯貝每聽之輒為之爽然者纍日而惜乎舍之遊而不能盡聞其語者且二十年也今年夏從海上還里私讀先生所為文竊疑先生以如是之學何難舉所聞所識而編之志之乃未幾而果以所著名樵書貽豫論敘豫受而讀之一如當日所談議者書凡若干編編若干卷不分部類門目而任取一類之中一目之內臚其事之可相發者鱗次櫛比凡夫鳬毛龍鮓隼矢牛鐸畢列其相干而推于盡變使讀之者時而頤解時而首肯時而心開而意釋時而舌嬌然不能下時而低眉決眥抶手躅足夫作祗百行讀有千卷故張華讀書遍三十車而其後作博物志僅存十卷左思窮搜討之力遨遊十稔而其所為文不過三賦先生弆書重屋三充牣上下凡翻閲數過加之以時賢之論述近事之睹記參互緯繣合成斯編記所稱博學無方又曰儒有博學而不窮殆謂是與考之稗官著作原有二家一則集事以資用一則考義以資辨故黃覽類苑而後在唐時名臣集羣書北堂作使事資而白傅列陶家瓶于書楹區分門目集所記以資六科試帖之用名曰六帖此皆集事資用所自始而王仲壬作論衡則實創為考核駮辨之文以助談議故後之為稗官家者雜記之外復有論説如筆談叢書隨筆友議諸書每可為談議所藉如所稱考義資辨者而是書兼而有之類事而無方比義以廣異此誠伐山之能事折竹所未逮也豫邑夙推多識者三人一包二淳博一蔡五十一子伯其一則先生也豫兄事包蔡而先生以倍年之長忘分下交將自厠載酒問字之列乃蹉跎就老包二且久逝今巋然者獨先生與伯耳聖天子方嚮文章昭回飾物徴天下博聞強識之士以充著作既已敦趣先生璧帛到門而先生以年老謝去豫方幸先生之謝可藉之仍聆談議而獨是宵燭餘光既膺照曜庶幾如曩時之著雜説而筋力耗頓又不可得夫睹是編而不恨十年之不讀書者寡矣徐昭華詩集序閨中傳詩自三百始顧三百多采藍伐肄執殳弋鴈之婦而其後班蔡鮑謝下及管李非名門巨閥傳詩頗鮮蓋閭閻夫婦操作不暇何暇與之言文章之事哉獨是金閨窈窕易於作偽故世傳李都御史妻陳懿遺詩半屬贋成而近年女士黃皆令遊于諸家知閨中所作類有藉于補鏝者則夫閨詩之未易工也始寧徐昭華以詩傳人間者有年其人慧生而産于世家父仲山君席大司馬公遺業著書等身而其母商太君則為冢宰公愛女稱工詩者然則昭華之能詩豈待詢哉第昭華嬌稚不屑就女傅即隨兄弄文史亦未嘗斤斤為學乃驟然搦筆相傳元夕隨諸婊觀燈曲廊向月獨吟遂有詩今集中絶句所為看燈者是也乃昭華特好豫詩凡繡枰針管脂盂黛鬲偶有著筆即漫寫豫詩以當散玩故其後謬呼豫師而豫得藉是數數課題面試以驗其誠偽嘗窺其落筆時頃刻簇簌如弱羽之翻窼而新花之生樹雖使鄒陽子建強顔伸腕猶不得與之爭新鬬捷矧詠蒲吟絮何足相上豫故曰如昭華者可令班昭為後先古稱妯娌為先後蘇蘭為姊姒非諛語也特工詩實難雖曰閨房之文易于見傳顧亦視其工何如耳考風詩有名字者唯緑衣燕燕白華河廣諸篇其他有其詩而亡其名至若漢唐以後凡史乘所載宫闈書目自班姬左嬪道藴令􅈺以下合若干人皆各有集名存于目中多者十卷少亦不下三四卷乃數傳以降殘韋斷竹或存或沒甚至通集遺軼有其名而亡其詩即或統為選輯若顔竣殷淳諸君所為婦人集若干卷者今藏書之家亦並罕有而團扇一詩千古不蔑則非閨詩之易傳而閨詩而工者之能傳也昭華亦勉為其能傳者而已矣山隂陳母馬太君八十壽序禮稱百年為期亦曰百年者庶幾可期致焉耳而禱頌之詞不曰於萬斯年即曰萬有千嵗似乎凡為禱頌率淪乎具文而不可為據況揚徽飾媺非誣則諛而亦有不盡然者豫與山隂陳電章遊久念電章居子舍養事素著嘗于登堂進拜時窺其瀡腆備矣今年余月為我母馬太君八十辰懸帨北堂族黨姻戚朋友咸起薦束帛列笙瑟設苞苴筐篚車馬冠蓋相望于路夫以陳氏門閥盛大加之太君之賢電章兄弟之友之廣何難乞言通顯飾致華膴為屏幛耳目光悅而乃以稱觴念詞問之居無宿給之毛甡曰此其所為非具文者也夫事不求諛則質詞非具文則能實方太君在閨中時扶風本右族其尊人星寰公與電章伯王父毅庵公同以萬厯甲午膺浙江鄉薦相擇年家子弟可為耦者于是始歸公乃公以文章名當世為藝林逺近推重却于內顧而太君井井家畫以婦道禔其身捍于其家然且于于睢睢不假言笑絶方幅畛畍而務飲以和以故事舅姑能孝相夫子能順御娌妯臧獲能睦能愛此可謂非得于天者真而盡于人者摯與夫貴而能勤富而能儉自昔稱賢而太君幼席寵緒且隨星寰公宦江右家世方隆隆起乃豐積裕施於儉勤之餘凡閭黨有求又能以嬴遺相及使滿願去及其教子也躬親課誦久為虛詞唯太君幼知書通論語孝經自為訓詁故電章兄弟未入孰時即共以講論誦讀稱于人間稍長而聲施藉甚迄于今天下之聞電章兄弟名而願為友者且比比也吾聞名材以朴遫而能貞良玉以質方而能大故長久之道唯在積之者不郛而後傳之者有永今太君春秋髙既逮鯢齒而電章亦正當服官之候方將入就選造膺嵗獻于天子為事親計乃其心則嘗以祿養之遲為憾禮曰八十者一子不從政電章之弟早已試仕嶺表驅車于髙涼羅麗之間獨電章在膝下則是承歡之切過于祿仕況祿仕已近也嘗讀漢史至萬石君傳嘆萬石君父子以質行聞于朝廷致天子以下皆動色贊誦莫及然要其大略則祗以垂老入官克就子舍電章尊人伯仲有四皆嘗夫婦負華髮為王父母扶鳩祝噎後先不替即在今羣從各已垂白而電章甫家杖依然衣綵衣帥孫曾若若賀太君羅拜堂下其久于養事如此夫享年之長與事親之久同一難致而今幸致之則自今以往雖曰千秋萬歲從此可得何為不可哉重刻北斗元靈經序北斗元靈經者道書之一也其書敘設教之原旁及功行姑假道于生死因應之説以為世誡而注釋興其間焉豫嘗論道家之雜過于他氏自柱下以五千開基初不過自示其慈儉不先守為道要而繼而繹之為遣有涉無之論滉洋瀰漫然猶是老生之常談也既乃一變為養生家言吞金咽髓相事為七還為九轉而由是而降漸至流鈴噀酒畫水叱石趨近狡獪而于是五符六甲之術因之以生是書所載亦固以步虛履煞為能事而其言質慤一似唐宋以來自厭其學因欲援儒以入之兼亦自冥其三景參錯每變愈下之況故首以定靜心齋微示祕旨繼乃翻覆于轉輪往來六害八難有似乎釋氏所言者世嘗以禍福憂患為釋氏詆毋論惠迪之語始于吾徒釋氏為教全不在是而即以是論匹夫匹婦不畏官刑而獨于冥冥之間施報赫然至有生儒日誦經傳習聞聖賢之訓而瞢焉貿焉得一感應篇以為寶祕何功何過遂有實見諸行事而不敢替者然則聖人復起亦必不以其言為可廢矣特是書所始相傳為東漢永壽而元時徐道齡為之注之然苦無兼本其刻之者則奉化州判官沈道宗也延至明永樂間其書漸毁道録徐氏得其本于朝天宫道士因再刻之惜流布未廣終致湮沒至英宗朝有太監鄭和者得自宫中而福建都轉運使司知司事者為懷柔王氏素受斗籙見其書悅之乃繪諸斗像合為鏤版迄今二百年而存已寡也吾友沈士超有道人也合同志剞劂重為流布將以公世之好道者非曰道如是也亦曰世固有言道焉如是者爾因為應其請而序之如此某序西河集卷三十七
