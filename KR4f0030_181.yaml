body:
  text: 西河集巻一百八十一翰林院檢討毛竒齡撰七言律詩八益都相公招集易園即席奉和原韻二首侍沐東園載酒過春衣猶着故山蘿客來語燕梁間静風定看花水靣多溪淺坐能埀釣餌日長歸恐爛樵柯朗陵多少門生在欲共將車奈晩何二碧柳春深始作花謝公清興正無涯琱盤翠進安胡飯玊液香分顧渚茶亭向斷崖廻處補山因隔水望來賖蓬池雅㑹知難再何必丘中誦有麻送友之萊蕪曾共梁園賦子虛看君仗劒出青徐東封此日應成頌北闕何年更上書驛騎曉過羊祜里亭餐秋食范公魚暇時若向秦臺望莫羡淄川有計車何起曹𣙜使蕪關鷄舌香含粉署郎司農官屬日華傍鳴呵初下神霄逈撾鼓纔聞吳㑹長幕下和衡飛燕雀關前清興對滄浪南行不厭袁宏放恐有商船詠夕陽送劉使君任江南提學儒臣啣命出文昌手握靈蛇比夜光公讌有詩稱鄴下高談名理重丹陽星連斗野純鈎現馬到閶門疋練長但使元和能振俗起衰何止變齊梁題張舍人攜琴圖羞將世事較雄雌白帢飄颻任所之為訪故人攜綠綺長留清聽是朱絲橋邊納履貽書早海上乘槎探石遲欲把鬚眉分影幛紫薇花下幾回思依韻和姚明府行縣作出舍郊原雨未晴尚留芻秣餉南征兵連久藉均輸計民在寧無撫字情花下載書追范寗桑間聽事想劉平浦陽江畔春行遍何處題詩不勒名重陽後一日奉陪益都夫子游長椿寺兼送家行九南歸同方象瑛徐嘉炎陳維崧潘耒汪楫諸同舘和夫子首倡原韻即席重覔黄花到法堂清談未敢效裴王偶隨卭杖來初地恰送柴車返故鄉午飯伊蒲延供遠秋林落葉聼聲長詩中談笑當拈示夫子原倡詩有一談一笑皆眞諦忘我忘人是醉鄉二句何止琪葩照四方二禪關寂静淡秋容同向空壇訪舊踪去客欲隨雲外雁豪吟驚起鉢中龍重陽小日猶堪賞重九次日名小重陽良㑹他年豈昜逢勿道遠行無所贈渉江正及採芙蓉送姜之琦進士還里南宮試罷聼鳴鳩選入春關直到秋是科九月殿試紅格獻書崇政殿黄花開宴曲江樓同門先後題青雁歸路康莊跨紫騮縱使蓬瀛身未到故鄉還近鳯麟洲和寳坻相公甘霖應禱原韻南郊禱祀撤宮懸五畤釐官總告䖍雲起不需瘞璧後雨來剛及昜衣前禋昇昊闕馨香合慶溢神倉黍稻堅始信聖朝無缺事何煩持鼎問蒼天魏使君之任建昌車前八隊引鳴騶世濟三公是列侯為柏鄉相公長子李勉未經懐北闕陳蕃偏得向南州章山對酒官花曙旴水褰帷錦浪秋退食稍閒能嘯詠麻姑壇畔有丹丘車騎將軍世襲三等阿逹哈哈畨一品夫人楊母嚴太君壽當年都䕶出湟中曽佐平陽建大功玊軸久貽官誥紫金箱猶貯戰袍紅前皇賜爵標忠藎有子為郎以孝通此日高堂方設帨關西佳氣正蘢葱喜金通至都復送之赴幕府次其留别諸子原韻日控驂驔下直廬重逢梁苑舊相如幾年裘敝驅馳裏一顧風生咳唾餘天畔鴻飛秋後少宮前柳色晩來踈研經才子還為幕何處堪移博士書沈宮詹六十長隨玊輦侍銅樓併秩南宮位望優天上星辰方六度雲間詞賦已千秋宮詹松江人蓬書毎得君王顧綺皓曾從太子游莫道承華裁咫尺桂山東望本滄洲過上海訪鐸菴遠公不値喜遇曇英和上用張宏軒壁間韻㳂城何處問阿難行盡橋西舊井桓午日到門聴磬遠春風吹水隔林寒閒亭喜見飛花雨高座剛逢渡海瀾不信衡陽龎處士今來仍作旅人看答友天涯轍跡本難同吳㑹車書一望通自笑求材虛冀北誰知好友困牆東公孫未啟平津閣郭隗終開碣石宮此際相逢能載酒肯教虛度月明中贈楊僉事歴任貤贈册子高文早已著瀧阡幸有雙螭帶露鐫碧檢千秋藏二袵黄封幾度賁重泉野田春黍烏還哺華表秋風鶴未旋相對荆門餘一水長因下馬泪澘然二紫誥雙貤展孝思竁門重表色絲詞最憐駕鹿之官日正是椎牛祭墓時百里舊呈丹篆匣五花曾賚白雲司一從奉使羊城返何限恩綸下鳯池先從邑令行取入刑部皆有贈李黄門席看白菊東臺高宴啟朱茵喜見秋花入夜新幾載風行能震世一庭霜氣尚侵人屏環玉鏡流清影酒入銀盤簇細鱗自訴曾為彭澤長燈前相對倍相親何生游贑州和見贈韻重逢平叔聴清談金水河橋飲正酣緱劍幾曾彈薊北書船將復上䖍南廬峰當嶽游成六亷水通江合有三愁煞嶺頭花信隔春來彌望總烟嵐送彭生之大梁才子相逢擁敝裘論文高㑹又經秋毎因擊筑來燕市長是聴鐘在寺樓銅馬門高廻六翮金堤水溢見雙鈎相如自有凌雲賦埀老重為梁苑游平生廷試還里曾啟公車下早朝看君對䇿御河橋筆含殿陛花千叠衣染宮牆柳數條海谷龍歸暑雨散燕臺馬逐暮雲遙羡君前路秋風起八月應看江上潮和倪生見寄原韻西林木葉下叢壇百尺樓頭雁影寒執巻我方慚李薦帶經誰得似倪寛吟來秋浦逢詩史寓近秦淮問酒官相隔十年良㑹阻思君空寄綵毫端寧國莊太守千里分符領上游彤幨皂蓋古諸侯共推莊蹻安南服争似元暉在北樓行縣雨隨宛水暮搴帷花發敬亭秋朝來綵鳯亭邊集認作鸞書下帝州和蕪關𣙜使君作名曹峻譽重朝班特簡星車控九關計國已成桓氏䇿開門長對謝家山千秋財賦農錢重萬里荆吳估舶間著得五千文未半便看紫氣滿人間送徐二十二還蘭亭十年蘭上久相依曾向空林講息機千乘幾能酬白璧諸州無復薦黄衣棲遲京國仍龍臥歸去滄江有雁飛誰想平泉舊韋楚到來文酒願俱違二秋盡㝠鴻惜羽翰故人相别在長安樽前可念唯官鱠郎官鱠以張翰得名闕下難留是伯鸞前路斷蓬驚嵗晩還家收稻恰天寒獨憐埀老金臺客長過青門泪未乾題同年王編修悼亡詩後寶瑟初彈别鵠吟斷釵猶在井桐陰病教奉倩分來少詩到黄門感自深月掛幔釘還墜粉風吹箱管昜銷金玊堂修史渾閒事半臂何人贈藁砧七夕送陸大學博南歸時大有悼亡之信共羡平原入洛游藕花閒値禁城秋公車人去雙龍闕祖席誰登百子樓冀北有時誇買駿河梁何處㑹牽牛送君情似金溝水多少東西不斷流秋日集曾止山寓亭分韻同無休南士十載相思贑水涯閒堂何幸共啣巵秋來江氣含烟早雨後牆陰下日遲斫桂燒成香在盎烹芹挑得碧流匙多君長在臯橋住只效梁鴻唱五噫二秋雨連雲覆碧幢座中豪客本無雙因翻鳬汁燒寒鼎為看鷄冠傍小牕新曲早成慚下里故人移住在平江慢嫌相對𤣥言晩猶有鐘鏞挺未撞奉送覺羅博問亭歸滿洲和其留别原韻帝里春光遍海濆還鄉剛及雁鴻羣關連鐵嶺排靑嶂車過蒲河起白雲險設早知藩衛重離懐多在御橋分衮衣欲致東歸意素鞞歌來不忍聞時問亭有遷葬之役二南陽佳氣本絪緼龍種諸孫更出羣天府坦埀遼左路日華晴見海東雲元良舊塞三屯合粟末支江五國分負土餘情如戀闕元王詩句早相聞四月初八古雲和尚六十生日大智光明照大千生同刹利梵宮前踏來江草當飛錫落盡天花似雨錢六甲乍看廻玊歴雙趺猶自捧金蓮那知迦葉相傳後重見昭王廿四年待庵明府生日和其自壽原韻河陽清興自能豪不藉綏山食一桃闕下鳯書春後展背間鳥爪夜來搔綵弧掛向吳天遠素縵操成郢曲高但使故人能勸酒官齋何處不陶陶荅杼山干石二上人原韻毎望㮙迦迥若神申江捨筏一相親空談欲度龎居士佳句能過休上人野寺風來皆作雨客堂花落不知春廬山載酒應難再偃蹇終慚歩後塵二長途擾擾久勞神幸遇曇摩且自親布袋豈遺三世佛祗園常坐二千人觀心石上應多日行脚年來不記春遮莫禪門文字少嗟君詩句本無塵喜吳兆騫入塞和徐健庵春坊韻少為遷客出重關埀老相逢京索間三篋自能銷壯骨五城何處吊完顔高文竄後悲零落聖世恩多許放還誰道混同江上水南流到海尚潺湲辛酉臘月奉陪益都夫子長椿寺飯僧説法即和夫子首倡原韻兼示彌壑和尚珠林高向帝城開臘月同登説法臺貝葉繙經龍聴去天花作供鳥啣來深厨香積維摩饌小品籖投殷浩才誰信經冬尋寶樹桫欏猶是舊時栽奉和高陽相公春集易園原韻二首春陰黄鳥弄交交别舘濃花拆露稍丞相自開新石壁野人空憶舊書巢草頭㸃屐含泥印柳外移亭接水坳一自蓬池修褉早頓令陽氣滿東郊二雨後春虹向日交長林擊馬玉埀稍臨塘水漲通魚屋隔葉風翻見鳥巢謝墅不連朱雀桁輞川原有白雲坳只憐抱病追隨晩燈火愁看接遠郊雪鑑和尚四十如是於今不可聞入㕓長得利人羣攜瓢汲破池中月賜衲披來嶺上雲八證好叅無上偈三乘總是悟空文臺前寶鑑光如雪四十年來一見君南還候益都夫子未得過淄川謁唐豹嵓前軰書此志懐纔侻衣冠下集賢東行先誦泰山篇敢言客路逾千里不到師門已四年巗屋未窺全豹隱柴車枉費一驢牽淄河南去無消息回首般陽思惘然二八口船從水次攜隻身旅病有誰依百年自命推王管千里相尋愧呂稽斗傍中樞瞻未改堂因志壑望來迷豹巖所居名志壑堂驛亭多少踟蹰處隔浦銅鐎野店鷄寄郡守故園東望毎屏營誰似東揚太守情連嵗只從花下臥方春曾向雨中行賓來白帢當前滿官似青溪徹底清十載金門猶未返悔予遲作一㕓氓朱法曹在鎬張州守錫懌徐文學允哲招赴曇潤師西林社集和允哲韻上人聲譽過高閑十里相從丈室間遂有晴雲開滬瀆可知勝㑹重香山到來人喜逢三益入坐吾將問八還載酒莫愁歸路晩杏花深處是禪關奉荅兖州司馬李廣寕原韻使君車載五都珍谷口還尋鄭子眞岸幘自稱方外吏江梅先報隴頭人政分民瘼愁班鬢書寄官齋羡等身時寄所著文集十巻記得南還相憶苦為君長挹甑邊塵劉琯南歸曾從淮水託王孫深羡君家好弟昆三樹儘教留玉蘂萬言仍自上金門春郊馬去天邊埒夏店人歸雨後村當日東湖同醉處可能詩句壁間存送陳太士長興廣文金臺作賦興翩翩又値西㕔典教年牀設戴慿新畵席家餘子敬舊青氊鳥山迎向蒼雲外馬帳開當罨畵前自昔槐堂通内外羡君此去近登仙北征同徐二咸清途中作河亭雨後換征裾淮海相逢在道隅洗馬有情堪並轡買臣無力可將車才高自著幽通賦老去難傳却聘書借問同行舊徐樂漢庭對䇿果何如贈扈從作二首詔蹕廵方輦路開詞臣何幸預追陪江淮日向千斿轉海國春從萬騎迴肅仗久知通禁旅扈游終屬掞天才欲覘此際横汾樂自有星文照上台二東廵不止為登封槖筆猶能賦射熊郊野瞻天齊望幸車書此日盡來同鑾回闕里尊行學河治宣房喜築宮幸託屬車眞勝事輶軒何必採皇風贈田僉事天南憲府領諸侯曲蓋朱旗擁上游越嶠賢聲推八察漢朝相業重千秋臺前明鏡當犀燭海外青山見鳯洲一自都官行部後閒堂長使白雲留趙比部母太君題旌建坊有贈婺彩高懸曜紫宸朱門閥閲喜重陳太君名過陶貞烈有子賢如趙德麟銀榜乍標東第顕金書長啟北堂春當筵無數鳴珂客同慶花前戯綵人二紫誥初啣下建章鳯毛長傍五雲翔慈闈親獻新裁幗京闕還留舊養堂矢髦獨憐江草碧旌題高拂海雲黄臨安萬户連閶闔從此裴家有賜坊酬别李漁村同年久捧銀􅎆伴集賢開元舊事手同編官貧曾餉瑯琊稻師在難尋海上船束篋草攜三舘外當門柳種十年前還鄉倘憶山陽鍜敢忘音書寄日邊漁村㸑食皆家鄉轉粟㑹䝉分餉時予出京門將特訪益都夫子故三四云王分司重使越州重持玊節過江行比户歡呼襁負迎山半尚留元度宅潮迴再上越王城訟亭人老棠猶在官道碑殘蘚自生當日蛟門題柱處今來方奏海波平二使君赴任似歸鄉况復江東引領長珠為再還逢孟氏花從前度識劉郎攀車鳥雀棲還起臥轍兒童長未忘長上聲獨笑他時䟦扈者蓬萊何處問滄桑漫興平明騎馬度金川右掖門高霄漢連曉雨荷香流太液秋晴花氣接甘泉搖環馬度疑天上捧詔人來自日邊徙倚承明休厭處東甌方値用兵年西林社集分韻得青字西林高㑹勝蘭亭花滿禪關晝不扄露席坐當天際白春衫換入竹中青馬從支遁迴金埒人共陶潜倒玊缾落日申江相對晩十年空憶在滄溟上巳雨中陪益都夫子修褉萬柳堂奉和夫子原韻上已名園景物幽同來何必共羊求花繁故向煙中見柳弱偏冝雨後遊濕鳥弄衣低復起晴魚吹沫去還留臨流不用浮杯下碧釀沉沉滿緑洲二年年此地静傳觴恍詠春風侍一堂談勝彩霞翻絶壁坐看宻雨過方塘琱盤帶絮抄雲子蠟屐和泥渡石梁隔岸空亭人坐處居然有閣似熊湘送朱徴君歸雲間吳中佳士着單衣正及歸時白露微斗下三能長北轉華亭一鶴且南飛關連曉樹烟常早湖偃秋荷花漸稀到得故園收潦盡階前無恙釣魚磯二西風㩂葉下蘆溝老去依然展蒯緱洛下競傳新月旦篋中猶載舊陽秋店通古寺尋前宿路入平江訪昔游帝里風光仍有待孟亭初築漫淹留贈吳禹定瑞安教諭延陵才子建安名齋閣還留治事情賜席孰能逾戴徳傳經早已重匡衡水從雁蕩分池碧雲起仙巖到座清聞道安陽搴藻去至今尚有魯諸生奉荅吳寶崖見贈原韻苦憶才名十載餘千秋相訂豈成虛燈前擬註延陵傳時寳崖為其尊人索墓狀篋底難忘季重書秋到兩湖迴客棹夜來一榻對吾廬丹崖收盡人間寶瓊圃瑤林那得如贈沈廣文吳興譽望在人間暫借槐堂啟素旃深夜月明題八詠清池藻影動三鱣譚經尚繫桓榮紱貰酒曾無司業錢自是文章冰鑑在當堦玊筍正芊綿贈天童曉公和韻倣長慶體金粟山頭早化身杯浮千里渡來新傳心自許終歸漢譯字何湏更入秦海上逢師俱在客座中念佛是何人可憐不識東山路花落花開幾度春二紫衣宣賜好披身山澤驚看禮數新聖徳早能容道信辯才原不類蘓秦經凾入寺還䭾馬海岸横梁且渡人莫道相從揮塵晩到來何地不生春依韻荅周副使體觀吳門舟次見贈時將赴武昌軍前昔年曾過分廵幕西上洪州與吉州今日再逢吳下路可憐江月送江舟從軍不减周南郡佳句長吟宋子侯此去戈船春正發武昌楊柳漫淹留酬别錢中諧進士和韻有感客裏梅花開較遲臨行猶喜誦君詩伯喈自足稱才逸李廣何須嘆數竒書有藜吹傳永夜衣邊柳汁想當時寒風嵗暮平江棹欲别吳興思復思池陽官署初成索詠池陽官舍傍林柯書巻閒開鳥雀過時見彩雲生渭北春來花樹滿涇河吏緘印匣移文減客踞繩牀高論多千尺露盤長在望漑成魚釜近如何宋比部分廵通永神京左臂迤藩封喜拜天書出九重按日旌門開鉅鹿當時節度重盧龍帷褰潞水波光遠版入灤田花氣濃咫尺題詩肯相寄望中雙闕對芙蓉同姜京兆戯賦空梁落燕泥句七字限韻紅襟烏帔慢相羊曾住盧家玳瑁梁壘破不因文杏改泥殘猶帶落花香紅閨有婿愁難返翠羽啣雛認未忘不識涎涎掠尾去可攜書信到遼陽西河集巻一百八十一
