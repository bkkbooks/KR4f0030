body:
  text: 西河集卷二十翰林院檢討毛竒齡撰書七復蔣杜陵書惠寄三札前後收到宛陵陽羡兩君亦並致意去因酬應稍煩戃恍度日友朋之懷徒抱胸次今則史館稠雜除入直外日就有書人家懷餅就抄又無力雇書史代勞東塗西竊每分傳一人必幾許掇拾幾許考核而後乃運斤削墨僥幸成文其處此亦苦矣又况衣食之纍較之貧旅且十倍艱難者耶今同館諸公分為五班自洪武至正德作五截􅍐分某班秖分得𢎞正兩朝紀傳而志表則均未及焉某于兩朝中又分得后妃六篇名臣二十五篇雜傳一篇合三十篇既又以盜賊土司后妃三大傳謬相推許統屬某起草在􅍐分之外雖此中尚有書可查然訛舛極多從前已刻如吾學史料諸編比之大海一漚百不十具他若通紀定紀法傳從信種種則又純涉虛假全不足憑是以是非易決真偽難審此在𢎞正以前尚然况嘉隆以還則將何所依據也客冬曽托董無菴彚徴越中諸先賢志傳而並不見寄足下雖寓公而居越最久越中聲氣皆願與杜陵呼吸凡諸賢後人無不在杜陵齒遇之末今專以相託嘉隆後八邑名賢祈統為彚徴寄某使某得專任敝郡列傳其中是非真偽不妨杜陵指定相寄則一郡一賢皆杜陵所表章也朱少師傅在陳大樽集中尚有實事可録但稍煩蕪耳至吳大司馬三世則不見狀志曩者其曽孫雲章曽示一傳是孫承宗作不善碑版了無可紀今并此傳亦無有矣且錦衣再襲最饒名迹曽見莊烈皇帝有親筆東司房敇而元素先生有救給諫薑埰及舉人祝淵諸大節俱恍惚不明白或向其從子伯憩抄一事實伯憩不作字即此附囑若倪文正祁忠敏諸公則足下曽作傳其稿本必具幸悉緘示他不能指名悉藉搜討其獨于吳司馬公諄諄者以伯憩與杜陵晨夕易面及也及湯太守篤齋公開三江閘事呂望如進士曽寄湯神傳一本荒唐之極太守雖祀越趨蹌禱賽然亦祭法功德之祀而男婦感之乃僅誇神異而于山川厄塞興築利弊諸領要全不一及曽記金華浦陽江為禹貢三江之一其下流由山隂西南入界東注錢清江而北入于海越故稱澤國又號暵壤衆山水易瀦而瀕于海而善下瀦即咽下即泄加之以浦陽建瓴之水而為壑于此稍暴漲即瀰漫而泄久而渴其為舄鹵也久矣前此太守戴公曽遏浦陽之枝流使之通浙江以殺其勢至是則鑿七堰而排浦陽而西之且壩于麻溪以截其西南之來然後為閘三江口以瀦泄全越之水咽即啓之渴即閉之其名三江閘者以此地本浦陽江入海之處襲故名也但其詳不可得聞其興築始末又略無可考逺求指示此亦咨諏獻老之一端矣舊臘中堂啓奏原有舉隱逸名賢之意而地震以後復從赦詔中作一條𣢾又監修入告祇以修史餘波相及不成光景且監修亦驟為之不卜于衆而足下則多以周之義士相目疑沮者半大敬則惟恐某有他意急作書戒勉倣佛山巨源之措詞者總之神龍不見愈髙也某原揣今年告歸而益都老師過愛之切為聘一貧家女為後嗣計是以羇絆不果頃聞越中有詩文之選羣推杜陵為政甚善某雖戒詞句之學然食指猶動但此時宋元惡習盛行長安某不憚直指其非幸羣公相讓不敢抗爭此事得杜陵一振興之必有可觀特某遍遊宇內恨無一真讀書人經學既已響絶而禮樂二字開口便錯偶與同館官論郊壇之禮訛舛百出即嘉靖議大禮一節雖未分題然倉卒語及便一閧而散至館長以樂章配音樂下議則雖淹雅如吳志伊亦不能出一言相答某年已漸衰倘幸歸里妄思以殘年著禮樂二書以存一線若雜詩雜文則筐篋尚多斷不敢出一字相質實薄之也來札少規語惟浮沉金馬一言為好我之切佩之紳帶不敢暫忘今朝廷甚愛儒臣且聖學最博洽稍有詞句必加乙覽頃西南告捷同館皆獻平湖南平蜀雅頌而某無一言其緘晦可知矣令郎買宅于越將來為王謝後增一寓賢吾越何幸得此佳迹總之杜陵與越人投分深耳三日前隨東海公遊摩訶菴至昨始歸而真定司農公又以碑文二通屬某捉刀因燈下草寄雜亂無敘總藉道鑒與吳廣文論國風男女書足下以國風多言男女之事且偏執國風好色而不淫一語以為朱子注淫詩未必無意此殊惑也國風男女大抵皆風人寓言並非實事且其事别有在如國風好色此寓言也詞也而不淫則别有事也幼時亦惑于朱子之説見國風無男女者亦似淫詩如十畝之間桑者間間亦謂桑者是蠶婦乃不幸而其言已行世及其既悔之而以觀國風則凡彼美人兮有美一人皆君子人矣豫避人至維揚薑滙思侍御巡鹽兩淮多結納名士時武寧侯王君蹈海門客髙孝修跳身破産扞侯故家事而名久在刋章未落侍御聞其來預貯五百金待之豫深感其事為作寄寇詩見七古卷寓佇望之意以撫寧侯家妓冦白門事頗相類也山隂薑質甫見豫詩急向埂子問冦白門消息直笑話矣後豫避湖東籍捕幾及旅主人之子鄧論秀匿豫别室且隂繼饔餐幾至波纍豫作鄧老秀一詩見五絶卷論老聲轉託言憲禁客宿而旅主人之婦鄧老秀違禁請留以隱記其事此亦掩爾壺漿勿令之露之意也而江都宗定九實為和鄧老秀詩十章此豈知豫者讀國風者能于此通悟則庶幾耳與閻潛丘論尚書疏證書昨承示尚書疏證一書此不過惑前人之説誤以尚書為偽書耳其于朱陸異同則風馬不及而忽詬金溪並及姚江則又借端作橫枝矣尚書本聖經前人妄有遺議者亦但以出書早晚立學先後為疑未嘗于經文有不足也且人心道心雖荀子有之然亦荀子引經文不是經文引荀子况荀子明稱道經則直前古遺文即易通卦驗所云燧人在伏羲以前填刻道經以開三皇五帝之書者是也又且正心誠意本于大學存心養性見之孟子並非金溪姚江過信偽經始倡為心學斷可知矣今人于聖門忠恕毫釐不講而沾沾于德性問學硬樹門戶此在孩提稚子亦皆有一詆陸闢王之見存于胸中以尊兄卓識而拾人牙慧原不為武然且趨附之徒借為捷徑今見有以此而覬進取者尊兄雖處士然猶出入于時賢時貴之門萬一此説外聞而不諒之徒藉為口實則以此而貽纍于尊兄之生平者不少吾願左右之閟之也至若學宮從祀則從來荒謬向與尊兄言廟學合一之陋孔子先聖稱名之謬極蒙許可至從祀進退則大不足憑漢世大儒如康成子政輩皆以神仙圖讖紛紛罷祀乃有受華山之書闡參同之祕指太乙九宫為洛書九類而公然與聖經並傳者是以王草堂作聖賢儒史一書頗有訂證而足下偏執程敏政無學之説以為金科陋矣鄙意謂尚書疏證總屬難信恐于堯舜孔子千聖相傳之學不無有損况外此枝節更為可已何如不具復髙雲和尚書髙雲閉關如龍歸大海無可蹤迹僕又病不能一顧獨念荷擔挈鉢未必無得力處雖闔戶靜坐吾儒多有此者然究非聖功此惟公家有此法耳若來字謂三生石上夜夢與僕聨句三生石正此間葛洪嶺也何不發關來一遊之耶僕不識李源何許人而髙雲道力不減圓澤相憶之切或見夢寐但僕生時先慈張太君夢番僧以度牒見寄醒而墮地太君心惡之而不言暨方馬兵敗僕髠首匿澤中太君撫首而泣始告以夢曰驗矣其後出走至少室已辮矣有關東賀凌臺先生之徒見豫于嵩山市授豫大學則其人僧也僕謂此授學之事一生大節先慈之夢當以此時此事為驗他皆不然特豫少論學溺于儒説而至此而聞誠意去惡絶私利之念終身行恕與佛氏之行善與與人為善大意本劇殊而末不甚悖因與佛門知識不大訣絶而見者不諒妄謂豫再來原有根柢一如髙雲之所云此僕久自揣南轅北轍彼此正相反儒之成已成物本順出佛之盡人盡已恰逆入僕之所僦在杭州公在髙雲葛洪嶺非相見所也苐隔江日久不無憶念舊冬臥病幾乎永訣夢寐之勞雖至人或不免耳聞人居士望公久春又過半湖上風物漸就暄暖山中雖苦寒想可解衲何時惠來珍重并詢答福建林西仲問韓昌黎一女兩壻書昨蒙下詢韓昌黎長女兩壻之説據皇甫湜所為昌黎志云夫人髙平郡君范陽盧氏孤前進士昶壻左拾遺李漢聓集賢校理樊宗懿次女許嫁陳氏三女未笄是昌黎見存者三女惟長女已嫁李漢而次與三尚室女也其有一壻為樊校理不無可疑因有昌黎長女更嫁兩壻之説而解之者為曲釋之謂志文句讀不同樊所取者次女也所許嫁陳氏者乃三女也其文以次女三女為讀而以未笄二字屬之許嫁之三女此亦尚論古人不厭忠厚之苦心苐僕不謂然者曲禮女子二十許嫁笄而字而昏禮與公羊傳亦皆謂許嫁始笄獨雜記云女雖未許嫁年二十而笄則笄亦有不必待許嫁者然是未許嫁而笄並未有許嫁而稱未笄者以古無幼婚笄者許嫁之節也且昌黎三女並非許嫁陳氏者也在昌黎死時三女尚幼無問名者故稱曰未笄而其後儼然有昌黎少壻見于太和開成之間考唐書蔣乂傳載乂子名系官右補闕為權門所忌斥之在外並及其僚壻李漢而系傳云宰相李德裕惡李漢以系友壻出為桂管觀察使復坐李漢貶唐州刺史夫僚壻友壻者妻兄弟之夫稱也系得與漢為僚友壻則必以三女為配而因為僚友此非許嫁陳氏者所能溷矣是以長女壻李次女壻陳三女壻蔣明有分屬雖陳氏之壻無所聞見他傳載當時朝官有欲改昌黎所作順宗實録者礙其壻蔣系李漢得以不改不及陳氏然不得謂昌黎無陳氏一壻此易曉耳至于樊氏宗懿亦以壻稱則絶無可考僕寓既無書且其事隱又無他書可以轉見苐就昌黎本集觀之其輯之者即漢也集首有序署隴西門人李漢所撰而篇中有云漢辱知于公最厚且親且親者以壻故也是昌黎死後漢方為昌黎輯集敦子壻之誼甚篤而謂其死前乃生奪其妻而豫樊氏不然一也即昌黎集中載有中大夫陜州司馬李公墓志名郱者即漢父也昌黎為壻父作銘惟恐不著故于子七人之後不載他子婚娶而獨于漢曰漢韓氏壻也故以屬豫銘其文在長慶元年是昌黎于壻父作銘尚自敦舅禮如是而甫越三載及長慶四年昌黎死而即云有他壻不然二也即云此之易壻本奪生妻非婺所改也是必女有他故而尊章遣之其歉在李不在韓故女雖改適而壻誼如故則出妻大事其在史傳家志並無李郱出婦李漢改娶一語見于文間且昌黎為郱銘時中及夫人此宜有微言隱詞略見大意而亦未嘗有片言存見棄之迹坦坦白白其不然四也且夫以人情之善移也漢既親與韓絶則雖與蔣系為僚壻而名實不浹在旁人所窺伺者自應以漸而殺况漢歷仕宦升沉已久其距昌黎死時已不知閲幾何嵗而在人之忌昌黎與忌蔣系者必甘心于漢則其終始相膠漆而絶無離異公然可知其不然五也若謂改嫁之例唐俗不嚴故昌黎許之宋即無是矣則又不然烈女不更二夫此前人之言不始自宋假使女果被出則出女改嫁前固有之又不始自唐是以顔氏家訓載曽子出妻事以為蒸梨不熟姑薄其過所謂出妻令可嫁而國策有云棄婦不出里閈而人爭取之者良婦也則出妻改嫁古亦並無或阻之者然而士大夫家必無其事况唐去古逺于伉儷頗重而昌黎又斤斤于學術焉見閨門雍肅不如宋人其不然六也然而皇甫之為文則可疑孰甚使無其事耶則一女而箸兩壻其文不通使有其事而需諱耶則又不必以兩壻復行但領一壻字而後所云次女三女者或略泯其數誰得非之且從來行文無連箸兩壻而異其字者皇甫為昌黎門人縱不善文亦不必出此僕揣其意似昌黎有他女或羣從中外之子撫而嫁之所云撫女如已女者然實非其女也故于稱壻時特殊其字以别之而又以三女簡核其數使知此壻為他壻以為此紀實非虛詞也然乎否乎按聓即壻字昏義釋文謂壻俗作聟後又更作聓揚雄方言聓謂之倩是也但此是古俗字故東觀漢紀風俗通博物志及後漢書注始有此字如光武與伯叔及姊聓鄧晨坐語趙岐為馬融妹聓類皆非正經文字所用然則雅俗並出或亦故為此區分以示異乎此皆曲臆之不必然者皇甫妄文姑為此妄解何如頓首答章泰占問方百里書接札閲近文五首甚佳此正時俗所稱第一流文即此已足頡頏廬陵且方駕曽王而上之矣但其極得力處總是灌瀹于宋人之宿習甚深凡揣字潔句造意取息一唾一吸一行一站總有一見成膜胚于其中能破此而擺落之便能出人一頭地否則猶是未侻衣一健蛹也向與足下相見少但以為精于舉業早受世知是當今髙才生耳今知留心經學考辨得失兼能著力作古雜文此是吾黨一大干城驟見此喜何等矣苐諸解經處凡十八條多以顧亭林閻潛丘謬説雜釋此悉前時所駁辨過者但觀豫從前説經諸録便自了却此固不煩再為喋喋至為方百里條有方百里者萬里也語以未解來訊則在前儒原未解此即陳氏禮書作圖繪指畫仍是罔罔今請以紙上解之方一里者縱橫一里也縱橫一里祇一里者以縱之一里即橫之一里無二里也若方十里即百里矣以方一里而縱十之祇十里耳至橫亦十之則已十其十而為百里然猶十倍法也若方百里則前所云方十里者已百里矣今又十其百而縱行之非千里乎且又十其千而橫行之非萬里乎此非百倍法乎故曰百里之國有萬井以方里一井也萬井之國有八萬家以一井有八家也此易曉耳或曰信此則舊稱干八百國勢必有一千八百萬里無此土矣且尚書弼成五服至于五干先儒説此祇以縱橫相距各五干里以為斷此何以稱焉殊不知此縱橫相距但分指縱橫言耳若以開方計之則縱五千里合之橫之五千當有二千五百萬里以二千五百萬里而止分一千八百萬里以為國有賸里矣况伯七十里每國止須四千九百里二諸侯之國子男五十里每國止須二千五百里四諸侯之國原有不必盈萬里者乎故王制曰其餘以為附庸間田非虛語也惟審之不具與黃梨洲論偽尚書書日月不暫留而道路不加近何時是相見之日思之悶絶前接來札有議禮數則草草復過雖稍有商量終以未能面請為憾若僕所著喪祭二禮因急于成書而又畏紙費不能自盡所欲言此非知禮如足下不敢向之爭得失也近保定李恕谷以問樂南來寓桐鄉郭明府署中因與桐之錢生曉城辨古文尚書真偽并來取證僕向雖蓄疑然全不考及今略按之似朱文公與吳棫吳澄趙孟俯歸有光梅鸑羅喻義輩其指為偽者皆自坐失據誤讀前人書處處訛錯誠不料諸公豪傑且欲詆毁先聖先王之書而竟出于此聞足下向亦曽指之為偽不知别有考據抑止此數也昨有老友謂尚書大序稱武帝敇孔安國作傳及傳成而安國遭巫蠱事因不果上此大可疑者史遷自序謂史記成于太初之年而安國之卒則在孔子世家末已記及之巫蠱起于征和年距太初以後尚越天漢太始兩號而謂安國能遭之非偽耶僕謂此則大序偽非尚書偽也且此仍自坐失據之言也大凡讀一書當辨其書之得失在于何所史記之失全在年月往往有一時而紀傳與年表各異書有一人一事而紀傳與年表又各異時者毋論安國遭巫蠱事非大序亂言在漢志漢傳荀紀隋書皆有之不必深辨即以史記論謂其書終于太初並不當及征和後巫蠱事則史記酈商傳胸奴傳及衛將軍傳後公孫賀公孫敖等凡以巫蠱族滅者皆征和後事而皆載及之何也且自序既云述黃帝以來訖于太初乃又云述陶唐以來至于麟止夫麟止則元狩之號又先于太初約二十年矣此時安國不知死否且此足據否人苦不讀書及豫其書而又不善讀足下聞此定不以僕言為可怪且此頗關係僕將確求實據以一雪此案尊府多藏書祈不憚搜討以示一二何如愼後與李恕谷論周禮書尚書寃詞序説中林覯疑周禮來札欲易此語似以周禮非聖經有礙耳夫三禮名經固自無辭若謂聖經則自不可今天下攻周禮者衆總只周公之書四字害之周秦以前並無周公作周禮儀禮一語見于羣書亦並無周秦以前羣書若孔孟老荀列墨管韓諸百家及禮記大學中庸坊記表記孝經所引經有儀禮周禮一字一句則周公不作此書明矣周禮非周公作何害大學中庸不知何人作其為經自在也必欲爭周禮為周公作大學孔子作則無據之言人將無據以爭之事大壞矣天下是非原有一定周禮惟非周公作非聖經然周人所言周禮即周之禮也其中雖有與春秋諸禮不甚相合然亦周禮也如公羊言禮全與左氏策書不相合然亦周人之書也况周禮全亡所藉此一書稍為周備可為言禮考據若又排擊之則無書矣如此説周禮方是妥當若謂周公作則雖始于鄭氏而祖之而表章之者王安石也人將以安石目之矣近姚立方作偽周禮論注四本桐鄉錢君館于其家多日及來謁言語疏率瞪目者久之囁囁嚅嚅而退然立方所著亦不示我但索其卷首總論觀之直紹述宋儒所言以為劉歆作豫稍就其卷首及宋儒所言者略辨之惜其書不全見不能全辨然亦見大概矣若儀禮非周公作且于三禮中倍加訛謬則豫喪禮中所駁士禮者甚夥皆無理不足道此更非周禮比也凡辨必有據方為無弊僕所辨亦無他人可語可商量然幼時尚有父兄師友偶相闡發今已絶矣僕記先仲兄嘗言先王典禮俱無成書韓宣子見易象春秋便目為周禮此果周禮乎國家班禮法祇于象魏懸條件使里閭讀之已耳刑法亦然子産作刑書反謂非法即厯書一項關係民用先王所謂敬授人時與世共見者然亦只逐月頒布並無成書如近代厯本則他可知矣是以夏禮殷禮夫子謂文獻不足不特杞宋原無文即舊來傳書亦祇得夏時坤乾一如韓宣子之以易象春秋當禮書者如是則周禮五卷不必周公作又是一證且此所言亦見讀書法思之思之西河集卷二十
