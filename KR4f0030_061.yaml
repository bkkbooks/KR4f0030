body:
  text: 西河集巻六十一翰林院檢討毛竒齡撰書後書張司獄巻册子後沈舍人請作古者敬獄周公曰其不誤于庶獄獄不重乎顧重獄者謂夫都官作士明刑司法可為平亭簡閱焉耳至司獄眇矣職圜扉啟閉灾瘐死生以逮箯輿搒掠之數日譏而月較之平反不可啟占而參豫之不可然且世重焉者豈非以獄吏之尊其勢易虐也哉然則欲其不誤難矣江寧張司獄世傳其有隱德自方侍御吳學士魏督學季司諫以下皆藉其給事御史臺時多所周旋侍御學士皆為文記之予至江寧江寧人云康熈辛亥江寧郡灾勢已延獄君料囚無死法者釋之令歸鐍死囚如干呼與坐共飲身具衣冠把酒望火嘆曰嗟矣釋囚死火囚亦死寧釋之勿火也死法死火亦死寧火之勿法也既而火滅君與死囚俱不死而前釋之者不可還矣于是復詣獄撿舉請死于法自卯逮酉所釋囚穰穰先後奔至且有中道返不至家者及料之少一人則其為君獄訟臺者也君曰公等何為矣豈吾釋公等時中其心耶皆叩頭曰非也方君之釋之也雖好生耶詎無臨難懼變之情為之先乎且囚東西走耳假使以釋去之故偶然動心縱或來歸寧能一一約無遺哉夫吾等之所以如此者誠不忍公之生平哀矜惻怛一旦且為我死也君曰善張君彚贈言為册子索予書遂書之且告世之典獄者書任叔連遺墨後此叔連君遺墨也幼時聞叔連名以生晩不及陪几席言笑聞其書法最精亦不及見康熙癸丑予還舊廬其猶子青巗君拾其遺墨數畨則平時所書南華兩篇及試岕一歌皆取閩中竹楮任意抄錄書法清真具有氣韻而藏穎身中運神象表似乎倣元常而進王氏者真楷書之雄矣昔人評字學謂金注不如瓦注散手振刷矜卓都盡故偶然標冩生平藴奥藉之流形意不在書也顧青巖謂予云南華本全抄遺軼流散僅得是畨則其勤縝于書法又若此唐武后向王方慶家索王氏遺蹟方慶以九代三從伯祖諸書紙進之青巗可以觀矣毛甡記任氏家藏劉誠意札記巻子書後予從澹生孝亷觀其所藏先人元禮公與故明劉誠意徃來寓復并誠意投贈巻子深歎元禮公以處士被元明諸路辟召掉臂不出矯然超于物乃獨偕天下豪俊一時應運從龍之彦周旋起居意氣縝宻此其聲實必有大超于倫類在也抑又歎前人所貽後人守之為不易而是家獨完葆之甚善迄觀青嵓所藏卷則益騐元公之賢與後人之能世守均可念矣卷列青田札記及學士蘓伯衡助教張經諸跋按其語㣲與史忤似青田當至正癸巳本以行軍叅謀應江浙行省左丞特哩特穆爾之辟征海喪師遂自投劾奉其太夫人避越止元禮廬是札其既去之謝也又一札有奉别兩載山冦漸平諸語則又在至正丙申青田復受江浙丞相達實特穆爾之聘諭其鄉青田遂昌縉雲諸冦遲乆未效而是年樞宻諸使將加之兵故云云則意古來命世者當未遇時其初無一定而與物浮沈若此况乎以庸才而當季世之艱難者乎然則時未可為而責處者以有為不可也聞任氏尚藏山堂記稿今青田集所載蕭山任氏山堂記是也又有送元禮東歸序稿似從龍後招元禮京師將予之官而元禮復掉臂歸其巻有髙啟王偉諸公送詩予鄉時曾見之至乎畫長江風雨圖題其端以贈元禮則予未見也名家巻軸守有三難兵革燥濕攟摭不預一友朋愛好傳觀漫漶二彼我分拆漸至零落三以前二難則任氏所知也至于三難則一家數藏恐或不免為語孝亷其亦合併而傳于勿替可矣同里後學毛甡謹記書朱指庵詩集後指庵故詩豪其言襍謿謔調笑懐人慰藉遇酒徒畫夜飲為憤奮不羇之詞雞禽啁唶乎其前市井讕謱乎其側賔從指斥侍姬婉孌中感外觸咸能調其語字而飾以音聲夫如是雖欲不稱為詩豪不得矣或曰指庵非豪也指庵故丞相後世嬗華麗一旦以離亂之故遭逢困頓其慷慨任達辭㫖縱誕較有似于豪焉者當其情深渺瀰一徃而遥憂思哀悲急不得解他人當之木然不仁獨為心通乎詞思隠乎句為詩詩深為詞詞哀嗟乎指庵豈豪人已哉論詩者謂内有意外有象論文者曰情深而文明情思所至文采煥發賈子弔屈平鬰為文章不事琱飾王叔師擬楚人調揚雄作反騷無所于懐徒文焉耳指庵幾有是乎指庵念姜綺季客大同從里門策馬浮渡河訪之值綺季從大同來遇之澠池綺季故將還轅已南也復却之反走過大同兩人者豪飲于定襄雁門之間晝夜不已閱十旬日始返以此誦其詩詩可知矣梅市倡和詩抄稿書後梅市倡和詩抄稿者閨秀黄皆令女君所抄稿也皆令自梅市還歸明湖過予室人阿何于城東里居其外人楊子命予選皆令詩而别錄皆令與梅市所倡和者為一集因有斯稿盖順治十五年也既而李子兼汝已刻梅市倡和詩復命予序則此稿遂不取去遺簏中乆矣康熙已酉予暫還城東里居偶揀廢簏則斯稿在焉距向遺此稿時約若干年皆令女君已亡于京師也兼汝與梅市祁子奕喜又同時戍塞外予亦棄家去不復得至梅市而其稿中所列如胡夫人已物故其為詩最工若修嫣者為王子舍人内君聞死前歳以視向序此稿時若何矣陳何知狀書來度詩後不幸丁亂離委棄年歳有若骨餘不知春陽之在道也如彼窮婺坐深闥者朝暮組絍日覺衣重及見乳燕飛而後心驚則已暮矣來子之情毋乃類是故徃多慷慨其言詞錯見無緒雖良辰勝游髙朋快㑹笑語之頃其愁若有餘者雖然來子有大節其大兄為國死予曾讀其臨刑詩而私為傷之今來子辱交善也來子天下士其為人流離感憤其撫時傷逝外更有壯烈某月日書李匡詩後李子詩似李賀人謂之小李賀然賀勿似也賀鑿多恒理不喜用事而李子反之李子遂異賀李子嘗自言曰作詩時似有物入其室者雖長夏白日亦若霜雪撲落傳屋柱間故其詩隂峭多儉氣雖使事亦不覺嘗怪鍾記室云若自然英㫖罕值其人詞既失髙則宜加事義似乎使事者悉中才所為然其中自有善敗不可同也李子自言曰予非好使事也予苐厭世作者雖募兒歉腹亦皆抱東野意氣為此言庶幾近之書張司空傳後子既應張君請作張司空傳凢有互異已為叅擇文獻不足存其可徴復恐見者之不量也且予所謂慎言餘者復攄其所見漫書若左公初為刑部郎時隆平無嗣有爭襲而賄逆瑾者公拒不許暨正徳戊辰出守興化瑾又欲奪戴君妻而妻以弟之女也公復拒之遂誣以他事罷歸此郡縣志傳同一辭者及覈公歸狀則仍摭隆平一事無他事也瑾以正徳丙寅改元始入司禮擅大奸而誅于庚午裁五年耳隆平事在𢎞治乙丑時瑾尚未横故苐啣公不得發而頓發于此此猶民部覆李東陽疏但及糧餉而瑾撟㫖忽并責韓文謝遷一例耳至為江西左藩與逆濠相忤史載數事皆與行狀志傳叅差互見獨創陽春書院于城東南隅壓天子氣則在八年癸酉四月而公以八年七月始自南雄守遷江西右藩此時公未至江西也年譜既列其事而費文憲為行狀復不審覈有曰濠欲拓府居以擬大内創陽春書院以招逆黨奪官池以賂謀主公皆拒之則誤矣丙子秋公出自棘闈濠遣承奉饋四菓公啟視之則棗梨薑芥也公曰是欲我早離江西界也此史載甚明而其家傳則又曰濠謀害公其妃婁氏者憂之饋公夫人戴以四菓盖隠令公去也此稍齟齬然未審孰是至公去任則史載暨郡縣志諸傳皆曰濠懼妨已賂陞南京光禄卿以逺之則大不然公屢考第一至為江西右藩時期年之間朝廷復加之旌異遣使勞問此已非望及其轉左再考第一且賜宴首班先諸方靣則超遷决矣濠始大懼恐要擢妨已然後賂錢寧囑吏部遷南京光禄卿散地以抑之此因公已居上考當大用勢已無可奈何故賂置閒散耳此亦揮戈之挽矣豈有惡其人而反賂之使陞之理不然濠所拂意者如胡世寜范輅輩若何摧排而此獨賄之陞耶若其進副都廵撫保定與彬寧相抗復罷去及彬寧伏誅然後復起公右都總督兩廣則公之再起實由彬寧伏誅故也而行狀則專記南京廵江都憲劉玉䟽薦而不及彬寧之誅其他志傳則記誅彬寧而仍及疏薦按劉玉之疏在已卯歳公之起官在辛巳歳此正彬寧伏誅歳也中間相距亦已三年是已卯一疏武宗漫不之省而傳者必以是為起官之由此何也若公任兩廣則勦上思州土官黄鏐時公宻䟽田州太守岑猛之惡猛聞大懟遂日伺公隟思中之及猛叛伏誅兵部䟽公功特賜銀幣已推公總制三邉而公頓致仕則猛黨之譛入之矣且以公功徳不秉樞要以公爵望不賜易名此皆有說則猛黨行間正公事興廢一闗鍵也而記傳未之詳載及考史料重地開府大臣表序云正徳中韓雍以右都御史總督兼廵撫于梧州開設總府正徳十一年改總督為提督至隆慶四年詔改復總督兩廣則公在正徳辛已夏起都察院右都御史總督兩廣軍務兼理廵撫許便宜行事此在十一年以後者家乘既多未覈而儼名為史復後先謬戾而無可據則又何也至公知上饒六年而行狀縣志皆稱三年公以三十三歳知上饒而行狀稱己酉為三十二嵗公以丁亥允致仕而年譜稱七十歳乞休不允此又謬戾之已甚者世無信史誰與闕文吾作司空傳而有感于後之記事者也因書之已酉書越絶書書後越絶春秋亡名氏書也辭文髙上紀志荒衍近先秦間所為文自篇首隠其所為人而故為推求以為子貢作又以為伍胥作故自漢迄今皆莫得所為人焉嘗讀末篇篇中皆隠語有云紀陳厥說畧有其人以去為姓得衣乃成厥名有米覆之以庚禹來東征死塟其疆盖㑹稽袁康者也又曰文屬辭定自于邦賢以口為姓承之以天楚相屈原與之同名其屬辭者盖同邑吳平者也昔王充有云㑹稽吳君髙又有云君髙之越紐録則豈君髙者平字也越紐故越絶也則前人亦偶有指平者矣逮明楊慎跋其書推袁吳名矜為獨得盖自漢迄今貿貿者且千餘年于兹矣徐受之注吳越春秋前後引據反覆于是書猶且猶豫必得升庵始解之誠亦甚怪然升庵猶未審似于其中文未遍觀也升庵云東漢之末好作隠語黄絹碑其著者也又孔融作離合詩以隠辭見郡氏而魏伯陽作叅同契亦隠其名是必其人與同時者抑知其末篇則明云句踐以來至于更始之元五百餘年又記吳地傳云句踐徙瑯琊到建武二十八年凡五百六十七年則東漢初書也而以為東漢之末猶近鹵略因特補出之三輔黄圖書後三輔黄圖不知何人作著書家多引之為據嘗讀漢書至元帝紀稱元帝好度曲被歌聲私嘆曰是天子者而有技若此漢之衰于元成間也信也及觀三輔黄圖則且曰宣帝亦能度曲曰宣曲宫在昆明池西孝宣帝曉音律嘗于此度曲是故名則又私嘆曰元帝之技宣實啟之漢之昭宣間極盛矣其天子皆有技若梁陳五代時豈漢之衰不在哀平而在元成抑又在昭與宣也則又恨漢書不詳宣帝紀載宣帝能度曲事班史多缺失失史官體一言而漢數世君臣書史俱有闕及又讀漢書然後知黄圖之說之謬也漢書東方朔傳有云武帝嘗從宣曲以南十二所中休矣則又云長楊五柞萯陽宣曲尤幸矣且又有長水宣曲校尉在百官表矣不幸而宣曲二字偶合于孝宣之謚求其曲而不得則私曰元帝曾度曲豈其有技也而宣實啟之遂以漢先世所建之宫室而加之後人以子技而上之父以二字之私而遂誣古君臣書史父子數世之惑嗚呼讀書者可不慎也三輔黄圖書後二予既書三輔黄圖宣曲宫事以示凢著書者以一二字而重誣古人者不可為著書者不可不儆讀書者宜益慎不可以不有所辨故既已書之而黄圖之誤不勝書也予嘗為客道而客不信也乃復舉一焉客嘗曰細栁營何在也今按黄圖曰細栁觀在長安西北三輔舊事云漢文帝大將軍周亞夫軍于細栁是也若然則是以長安西北之細栁觀為細栁營矣予嘗聞之漢有三細栁在長安西而兩在西北一在西南其在西北者則細栁觀與細栁倉也其在西南者則細栁營而與西北之細栁觀實異地焉嘗攷細栁觀即古徼也在長安西北即所謂渭水北者而細栁倉在古徼西獨細栁營者名栁市在長安西南漢書漢文紀顔師古註與張揖註同皆云在昆明南而昆明則長安西南也西南之不可得同于西北亦明矣且夫上林賦不有云登龍臺掩細栁乎此則細栁觀與細栁倉也此西北之細栁也西京賦云東至鼎湖斜界細栁此西南之細栁也此細栁營也嘗讀漢書矣匈奴傳云置三將軍軍長安西細栁渭北棘門㶚上夫曰長安西細栁耳復曰渭北之棘門㶚上向使細栁仍在渭北則細栁固與棘門㶚上軍並軍也漢書何得以渭北别之棘門㶚上得並于渭北之細栁觀與細栁倉而亞夫之細栁必不得並于棘門㶚上亦可知矣天下讀書者如客之求細栁營者不少書之註細栁營者不獨黄圖使不讀漢書皆疑漢是時長安西南何以獨無軍有以議漢世用兵之不詳也又書之三輔黄圖書後三天下有事本纎微說之似無闗大體其說之是與否抑不足當論世之一得而好古者每顧之而不忍釋則無如黄圖矣予辯黄圖再而客復請進以為書之是與否非三復不足定也且夫人著書垂千百年而欲以一言而非其書非偶然也三輔黄圖云建章有神明臺上有承露盤有銅仙人舒掌捧銅盤玉杯以承雲表之露魏文帝徙盤盤折聲聞數十里曰此又非也按漢晉春秋曰明帝徙盤盤折聲聞數十里此魏明帝事也故魏略亦云明帝景初元年徙漢長安諸銅人至㶚城遂留之而唐李賀作金銅仙人辭漢歌其叙云魏明帝青龍元年取長安捧露盤并仙人載之㶚壘仙人臨載乃澘澘淚下夫魏明帝始徙漢銅盤矣魏文焉得先徙之乎客曰予今而知子言之不足徴也子亦知漢有兩銅盤乎曰然昔者漢宫有兩銅盤一在建章神明臺按廟記曰神明臺有銅仙人舒掌以承雲表之露此即明帝所徙盤也一在甘泉通天臺班固漢武故事云築通天臺于甘泉去地百餘丈望雲雨悉在其下上有承露盤仙人舒掌擎玉杯以承露元鳯間一旦無故自毁榱桷悉化為龍鳳從風雨飛去夫惟建章銅盤始得傳之魏而為魏明所徙也若甘泉銅盤則在漢時已亡也夫魏明徙其一漢時已亡其一而謂魏文徙銅盤是三盤也客曰然則魏文不嘗徙銅人乎曰魏文固嘗徙銅人也何也昔者長安所徙者一則始皇銅人也一則漢武銅盤一銅馬物也應劭稱漢明徙長安銅馬物置西門外此銅馬物也魏略稱明帝徙長安銅人至㶚城留之此漢武銅人水經注注㶚水云魏文帝黄初元年徙長安金狄重不可致遂留㶚城秦銅人也夫魏文徙秦銅人矣而徒謂是銅人乎則徙之乎曰殆非也今夫魏文之徙金狄秦金狄也然而水經注亦曰魏明徙金狄夫金狄可兩徙銅盤獨不得兩徙乎曰魏明從金狄非秦金狄也金狄焉得兩徙乎夫魏明之徙金狄即魏明之徙銅盤也金狄而銅人混名也曰然則何以知魏明之必不徙金狄也曰以金狄之數知之昔者始皇二十一年長狄十二見于臨洮因作十二金人像之坐朝宫前此金狄也然而漢之董卓已毁其九人作錢其得留之及魏者祗三人耳然而其三人者魏文欲盡徙洛陽以重故留之㶚城此魏文事也故曰魏文徙金狄若夫後趙石虎復遷二人還長安毁作錢而以一人沉陜城河中則又後乎魏明之為也然而十二金人之為數則固已盡也故夫金狄之為所徙者概可知也假使魏文徙三人而魏明復得徙一人是十三人也書歐陽永叔秋聲賦後歐陽子作秋聲賦中情悽愴感與時興貧士夜讀之則飲泣旅婦朝歌之則謝去歐陽子得意文也客曰是文特未善理其辭似乎賦秋風者予初疑其言既得其說似有當因記之其言曰曾讀風賦與是賦同可指計者風賦云飄忽淜滂激揚熛怒則所云淅瀝蕭颯奔騰砰湃者也風賦云皷千尺之濤瀾襄百仭之陵谷則所云波濤夜驚風雨驟至者也風賦云送夕皷而傳音埽晨鐘而付響則所云鏦鏦錚錚金鐵皆鳴者也風賦云憯悽惏慄清凉增欷耾耾雷聲迴穴錯􅘅則所云凄凄切切呼號奮發者也風賦云列萬馬而並騖㑹千車而爭逐類鉅鹿之戰似昆陽之役則所云赴敵之兵銜枚疾走不聞號令但聞人馬之行聲者也風賦云飄玉蘂之濃草零圭葉于衰桐捎桂樹之間獵芙蓉之精離蕙草披秦蘅則所云蘴草綠縟而爭茂佳木蔥蘢而可悦草拂之而色變木遭之而葉脱者也凢其所言無一非賦風者而以為賦秋聲則謬甚也且夫言聲者不必其果有所聴也亦不必彼之砰磅銵鎗之果有以入吾耳也故凢言秋聲則白日㣲薄凉夜遥永徘徊閒庭展轉華省皆能有聲如必哀鴻晨鳴鵾雞夜咏梧桐蕭條觱栗啕哽然後舉耳聴之斯已晩矣譬之望登髙者向而指若得其笑言故未聞其響也尊者目動而舉頥蓑然得其所使然未嘗使也縣琴者嘗有清泠之音畜利刃者若吼夫聴瀑于廬山之顛既去而神色不定猶砯􅥁而心徬徨斯其時則已逺矣聞雁鳴者既滅沒而猶在于耳所云有聲者無聲之止無聲者有聲之始此貴乎賦聲也且夫聲之所在無徃不得噓咻噏叶隨物而起故賦秋聲者即如劉夢得所云驚綺䟽之曉吹墮碧砌之凉月動塞外之征行顧閨中之騷屑是亦聲矣吾意歐陽子所居不在山必在水不在閭閻必在田野外有籬落内有井榦床壁機杼缾罍筐籯蟣􅢊畜牧渢渢如也獨曰聲在樹間非風而何書圖繪寳鑑後圖繪寳鑑合四巻元吳興夏文彦著文彦字士良即雲間義門夏氏盖其先吳興人也其書譜列代能畫名自前古迄元固無所禆于問學而説者備焉昔王弇州撰陶九仍傳云又籍古之善書畫者而紀之曰書史㑹要曰圖繪寳鑑嘗疑是書固陶九仍著者然考孫作所撰南村先生本傳有云其所著書時所傳説郛一百巻輟畊錄三十卷書史㑹要九巻四書備遺二巻曾無圖繪寳鑑之目盖嘗簡是書所叙則楊君維楨叙也叙云吳興夏氏集是書成介其友天台陶君九仍持之示余則是書固夏氏所作而曾介九仍以乞楊為一叙之弇州不識是書與九仍展轉而不考夏氏遂為九仍所著書也事不深考誣所從來乃無作者乆矣且夫為人傳抑不可以無實錄丁未書西河集巻六十一
