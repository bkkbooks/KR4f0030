body:
  text: 西河集卷一百十三翰林院檢討毛竒齡撰事狀德州文學李先生狀先生諱潤字靜嵐德州衛李氏父監臬公為郎時以儀部督少府行錢生先生京師先生生有異稟受書不再過目兼行下顧兒眚五嵗始行地逮就外傳誦不得過午過午輒肌熱家人子為日程寅往卯退終一日之誦而同學之聚誦者終六時皆不之及然亦終不能日往會監臬公督清江船政歸里復入都留先生于家既而以諸道使之廣西家人不能隨則復留先生武昌先生既善疾且又以隨養故往復道路雖與兄編修公年上下相逐同硯究未殫于學顧且試輒髙等豫食廪每舉必應有司薦而卒以他故舍去康熙乙卯兄編修公領鄉薦第一先生書義皆完好人之見之者咨嗟賞嘆謂此行伯仲必並濟而復以失􅚍不令謄卷入先生乃慨然拊其首曰吾知命矣于是究黃符之術呼吸沆瀣嘗視兄京師歸語人曰年來析性命之旨頗得其要始知七還九轉茹芝餐醴之事非虛語也顧時不我與而老冉冉將至矣謂之何哉先是先生就試時從武昌還歸雖善疾然思殫于學散書一室閴然若無人者人隔軒櫺聽少頃度一紙霅然而響而既而仍寂其勤如此顧其所旁及凡揲蓍數草推厯算步以及姑布子卿公乘陽慶之學無不畢備嘗以方書療家人疾立效會太夫人病下痢先生侍湯藥謂必以梅諸治之羣醫不可既而病劇先生護藥時覓諸藏袖間暗投之果愈先生性警敏而意甚容暇東地震家人爭竄走先生堅坐曰將安之乎書室不戒火先生從容率家人運書運畢整衣冠而出十嵗時與兄編修君隨父監臬公于郊晝晦雷發聲家人恐雨至促亟行望村而避先生獨否曰徐之晝雷鬱律不成雨縱雨不必久况未雨耶既而果然先生以癸亥五月年三十七卒卒之明年甲子而其兄編修君屬豫為狀編修君諱濤字紫瀾豫同館前輩也嘗謂豫言先生孝且友五嵗時監臬公以繕部提督兩窑居琉璃厰官署而編修君疹疾發懼傳染不令見也先生日尋兄哭泣不食不得已見之時編修君痂未雪瘢耆滿頰不可識先生對之挽其頸號啕在旁觀之者至不能仰及編修君官京師先生隔嵗必詣兄留十日去癸亥夏將復來忽意不自樂揲蓍得蹇困以為不吉遽止而逾月而卒卒之日編修君在京夜夢右臂折醒而臂痛而既而訃至其友愛相感如此先生席纍世外臺之後以州牧編修兩君為之兄而身抱竒器獨不得少展其志以上承先業誠為可哀而編修君于卒服之後嵗月已移尚恐其弟之不得嬗後而哀思涕洟倣徨躑躅以向夫同館之後進而為之狀之嗟乎此其兄弟何如已臨海葉贈君狀贈君諱維藩字價叔别號翰生浙之臨海人也讀書尚躬行自齠歲為藝文立作數千言觀者器之而贈君志沖然以為為學不當徒藉藉作進取計時母陳太君弟寒山公間亦授贈君舉子文怪贈君志如此嘗以問贈君贈君曰曾吾舅氏而亦以科名重耶寒山愕然既而贈君同硯有周大參者與贈君中外兄弟共為文詘然讓贈君及大參成進士謂贈君曰吾文不及君然讀書事幸已畢君將如何贈君曰吾讀書而已以視子則進取己畢讀書事正未畢也贈君志髙而善下刻意謙退終其身未嘗見喜愠色其庭訓諸子未嘗不嚴而出之以和遇人無少長稱已必名與人行肩而不併有來者却立讓之過其沖懷偉度為學者所撫范而每臨大事遘大節斷斷不茍嘗講學里門紹其曾王父孝廉公理學之傳以躬行為本手注孝經大學二書穿丳通析有裨實踐學者宗之乃創修方正學祠買食田草畝作春秋二祀費復建義學養四方來學者而請知名士五六人為之講解不足仍買食田繼之崇禎之末寒山公以大宗伯蹈海死贈君哀之為不食未幾亦死贈君曰吾苐行吾事而已家所傳仕譜後有繼者吾能禁子姓之必吾若哉先是贈君之父典膳公仕楚府久贈君念身已長大不能親饋食躡革走三千里覲典膳公會典膳公方思歸贈君流涕作啓事奏王請假王許之當是時贈君以少年為文章動王父子陽陽然扶侍歸里人以為孝至是贈君之子州牧君以其官上之贈君順治十四年貤贈湖廣安陸府潛江縣知縣康熙六年又貤贈湖廣直𨽻郴州知州二十一年提學使劉君分巡張君台州府知府鮑君輩合詞請先生從祀膠宫而贈君之孫别駕君由廬江任賫表來京請為之狀狀之者曰豫與贈君之子州牧君遊嘆其學問淵粹著書等其身為詩且能追三唐間而今給諌前潛江令黃湄王君嘗為余言州牧君治潛江事知贈君後人皆嘗躬行非僅文章之士也别駕年少其治廬江即不減州牧而父子共揚駿烈以廣錫類古所稱孝子不匱者以是與贈君不求聞達而其子姓以善繼繼之必謂軒冕非贈君志不可吾故為之狀而反稱之曰贈君嗟乎可觀已柴徵君墓狀君諱紹炳字虎臣前朝侍御史醴泉公孫也父洞山公以恩貢授福建莆田縣學教諭故事教諭子許隨任赴試君垂髫于崇禎癸酉赴莆田縣試取第一府試再第一已入學籍為諸生會任滿福建督學使特移牒改歸仁和而仁和不受時浙學使方試仁和君已更名試恐不得當兼以他名試錢塘案發兩第一乃棄錢塘名而就仁和為仁和生入國朝君集同社生更相砥礪其社名登樓君與陸行人兄弟主之方行人通籍時君為序其文各以氣節相矜髙至是行人赴水死君欲應漳浦黃宗伯檄召不得乃屏居南屏以理學經術授生徒不入城嘗以哭父過自嘆曰禮有卒哭謂不設行哭禮耳豈制其涕泪耶又曰士不入朝者親閈闉也其不歷城市者以應與墳墓親也吾安親矣乃時過墓林徘徊哭泣以為常里中兒有避父杖出亡者君遇而止之曰父杖將焉逃還自指曰是雖欲乞一父杖其可得哉言未已而泣乃為遊子遇孤兒行以勸之其人幡然歸卒改悔為孝子云海寧吳太常山隂劉掌憲漳浦王宗伯華亭陳黃門皆東林君子千里馳書請為友君嘗愾然謂明亡寡實學大率通籍致身並以八比為惑溺即究心章句喋喋談性命何益遂于理講外更肆力于象緯輿地律厯禮制農田水庸以及戎兵賦役之事與及門子弟共相砥礪曰毋使後世襲經生空言徒誤人國也時東西各郡尚社事每立社必推君為首君謝之去顧伉直不媕遇有不韙必力折其非陳際叔者同社友也嘗于髙會間辨論人物或過為矯異變黑白際叔面叱之其人驚顧曰是必柴先生也起逸去公渺于軀幹行步涼涼而氣沛然不可禦有大吏欲致公附已不得忽遇君淨寺或指之其人訝曰若是其小乎君聞之笑曰欲令其附已則方苦其巨何言小也君家無長物四方名公卿遇有餽餉悉麾去不受嘗卧南屏山有偷兒入其室君覺其為鄰人也默勿言既而搜捃及卧被徐曰獨不能留此為我禦寒耶偷兒始驚拜牀下君傋慰之且勸其自新乃檢枕中錢百枚及案前銅器一二具使持出其人泣受去康熙二十年西南再闢下詔舉山林隱逸之士巡撫范君屏車騎到門者再君力辭之且請雕其所著書不許先是君贍古今學自九經諸史以及秦漢魏晉六朝諸家文不及唐以後故其所著書亦往往以秦漢六朝為指歸而宋元以後不及焉時同社吳君錦雯丁君飛濤張君用霖孫君宇台陸君麗京陳君際叔皆以古文詞名世而君為倡始自前朝啓禎以迄今順康之間别有體裁為逺近所稱名西泠體故終君之世不敢以宋元詩文入西泠界者君之力也君所著有翼望山人集二十卷青鳳軒詩十卷白石軒雜稿四卷經史通考十二卷柴氏古韻通八卷省過記年録二卷家誡四卷家傳二卷明理論二卷及卒督學使春坊王君敕令有司迎木主崇祀學宫越數年葬于南屏花家墟之陽督學使春坊周君題其墓曰崇祀理學名儒柴先生墓又越數年孝子世堂世臺因修家乘成請豫為狀狀曰崇禎之末嘗見君于陸行人坐間意氣慷愾縱談天下事娓娓可聽不減王景略披褐捫蝨見桓溫時暨豫避人歸相逄湖濱除道故舊外形神索莫執手無一言抑何瘁也君嘗寓所知曰近惟著一裘垂幕擁火此身如寒氷祗覺牆東皆附熱地傷哉當崇祀時既為五君崇祀記乃復為此狀以孝子幼孤未嘗狀也孝子善繼志有文章名施母王孺人墓狀禮佳婦不通私假又曰不假亦不與此言授室以前男女别嫌之一節耳若古者中外姻恤則九夫共井原有同巷相從之誼所以通貧富而合習俗况緩急賙助尤主饋者所有事乎施母王孺人以望族之子歸于清門當時積著未彰守中人恆産作田氏分荆而不足者自孺人歸後家稍起會崇禎辛巳綏賊亂天下隂陽流災浙東西旱蝗溝中之僵仆者日以百計孺人解奩具發蓋藏勸君子行惠散錢設粥鄉里全活無僕數既而疫作人責施無已力竭無所繼孺人咨嗟曰為德不卒古所戒也減膳節費盡括其所居掩骼埋胾間有可療者則合樂以起之在昔青臺之築自擅其利徒以涪陵丹穴起家不訾世亦遂相與傳之以為用財自衛不見侵犯將以抗萬乘而顯天下而况推其所有公以與物救災而恤患雖至艱窘無所吝此鄭僑之所難而端木之所歉者而孺人優致之可不謂賢焉今孺人之子以藝文著矣義方之訓勵之于早因得以文學而肄成均作明廷之獻授以監郡其子姓之知書者復相繼以起古之所謂擴其閈閎以待夫髙車之來其是謂與若夫姻婭之相恤羣從之相賙其為給嫁娶而養孤惸固時時有之不足夸也孺人舊居在錢江之濵鄉人感德者至比之家媪朝夕問訊相慰勞及其後而兵革屢興播遷者再矣入本朝之後郊市安堵甫得還舊居而三藩弄兵居復丁甌閩之衝仍徙之在城而久而屋壞孺人意不樂嘗曰不見門柳下坐羣兒意錢比之夢寐入金臺雖廣厦何益而鄉人之思孺人者每過門必左顧頺屋重以不見我母為唧唧監郡乃復購土木大修故居迎母還居之與鄉人慰勞問訊者又十年而後母以八十卒康熙二十八年己巳秋八月將葬母某阡而乞狀以謝親知之迎殯者狀如右敕贈文林郎益園沈君遺事狀贈君長于豫二嵗順治三年王師征海者閭左括民徒為夫有舊家子誤雇旗人應夫去得罪粥産以贖豫以通家故為挾劵導地強贈君授值而贈君應之既而其家謀益值駕言占産訟之官贈君乃益所值金并出劵左右操之告其家人曰以為占耶則請取劵去請益耶取金去何速訟為其家乃大慙領金而謝一時聞者多賢之當是時贈君長八尺䯱䰄下垂日能行百里顧豫孱然而慰之曰君神癯骨清當饗大年所歉于豫者他日相逢在道間君扶藜我挂肘耳于君何如豫曰有是乎及豫出遊三十年不相聞康熙辛酉贈君之子舉于鄉值贈君六十同里所親者皆為贈君慶謂稱觴續食兩喜相輻輳而豫以官京師不及賀寄之以詩暨乙丑鎖院豫忝預考事及發卷而首豫郡者君猶子也繼之者君子也兄弟喜同榜而唱榜之夕每呼名主房者必嚮同郡者而問其生平時兩呼豫郡名兩相問知為一氏子則滿堂稱快去而豫則益因所答而倍念贈君之為人逮豫歸鄉里值贈君杖國之嵗已七十矣豫尚挂肘行而贈君肅撎拜跪不藉扶掖顧盼卓犖如平時豫祝而笑之乃相距四嵗而贈君以微疾逝時丙子六月距生時天啓辛酉年七十有六越一年其子由四川屏山縣知縣歸治喪已著有行略而復以豫言可徵將以其言徼世之為銘誄者因于丁丑之夏緇衰到門向七十有五之老人而屬為之狀夫狀則行略已具矣今所狀者遺事耳特豫前一年于病隙之際已自為墓文將以辭世而家人勸之雖刻其文不令行今又遲一年而復為長豫二年者為之文惄不自安雖然猶愈于少于豫而文焉者矣豫嘗謂今人不及古而勝古者三古祭不及祧而今則四親以上同堂共祀于禮為黷贈君曰吾寧為其黷者古一姓而分數氏一氏而分數族族愈煩則分愈逺而今則上聨遙胄下通疏屬不無太濫乃贈君修譜偕族兄度支員外名振豪者統宗而合族自晉唐至今異地散處者纎悉不漏曰吾寧為其濫者古父子異宫兄弟逺房室故緦麻之服不及五世至六世而親服俱絶而今則兩世共財三世公爨甚至七世九世十八世猶然同居而合處謂之畸行亦謂之異節而贈君與兩弟公財共居垂老不分爨曰吾寧為其畸且異者夫祀逺孝也惇宗者睦也兄弟不忍分友也孝友因睦至德何加焉世見贈君不自愛刻于自奉食監門而衣􅓅褐㩦持戴負每以是為贈君吝嘗過界塘矣界塘故坎險舟車難通而贈君梁之界塘故疏僻雈苻多出入挾挺刃以厄行路而贈君為築亭設柝募僧人施飲而防之守之至今呼其橋曰益秀橋其道傍之庵曰益秀庵益秀者贈君之字也夫嗇以視已而厚以待物益秀有惠迹吝何害已贈君諱以庠字秀之别字益園世居蕭山長巷里有宋熙寧間兵曹公某以父子兄弟顯于時擇慈孤山傍而家之入明而侍御公某伯仲聨解以甲乙遞嬗者凡九世贈君生遭盛世安居草茅以積著自喜長子士本由乙丑進士授四川屏山縣知縣次子士瀾邑庠生行略曰屏之民有聞訃奔哭填門擁巷如失慈母者旬餘又曰屏邑士民無逺近老幼皇皇總總而趨赴者無不相望而哭夫屏之民何與于贈君而哭之如是以為贈君喪則贈君之子將去此也然則贈君之教子又何如哉例哀詞銘誄皆有韻語惟狀以質故省之且以俟世之銘之者溫節婦墓狀烏程溫鄰翼以文章名示豫家傳三一徽州府推官死義寶忠公一相國文忠公一節婦也節婦事早傳人間有傳五序二紀略一書後一大抵皆生時所為豫志之以待旌者而今已却世復出節婦所自為示兒文一篇詩詞若干首并孤子所為狀請傳于豫曰豫安能傳哉節婦事諸傳已悉且他日者必更有國史為之傳之豫在籍日久固不當為史傳若家傳又非吾事獨狀云事尚有不能言者非不知也夫亦以知之而仍難言者固就其所言重言之以當志墓曰墓狀按節婦溫氏大學士太傅公母弟刑部郎中幼真公子貢士梅士第四女也溫氏與沈氏世為婚姻沈工部侍郎端靖公子刑部尚書何山公為大學士文定公母弟其子舉人文五亦以第四子文然聘節婦為妻然未娶也順治十四年鄉試榜發文然兄始然名在榜中有謡諑者羅織諸名籍指為請託懷甓之徒搆蜚語洶洶四起先是文然伯兄重熙已早登賢書而怨家銜之將投以所隙而無自也沈氏以世濟之故資産盛大怨者與忌者交伺成釁伏其名于江寧之逆案間至是籍捕謂通逆法當死家口財産入縣官當是時文然名已填册去查律兄弟過房者不坐文然少曾過其伯氏都御史彥威公房得徼免而科場情重南北搆獄市朝堂議者皆執法遂奉特旨兄弟連坐戍塞外雖過房不免時文然年十六收之繫按察司獄或謂梅士曰君女幸未嫁猶可謝也梅士曰不然歸謂室人韋氏曰不幸壻當逺離吾女雖未嫁然許之矣他日將更嫁之乎抑守耶曰豈有吾女宜更嫁者且庸詎知去者之不復還也守之曰雖然未嫁而守之無名且何以繫其心吾欲先嫁之而後守之特時不久留如何曰譬之甫成婚而夫驟亡無如何也今逺離等耳果能婚之則雖婚一日猶愈于已矣寧計久暫焉曰何哉能如是乎雖然後將無悔與曰後亦何悔祇今不能出諸獄可奈何曰吾當丐諸官呼節婦出告故節婦號咷無一言遂訴其情于按察司使錢君朝鼎許之立遣伍伯押出獄就婚于溫是日轎至門親戚逺近咸來觀越七日返獄會差官到湖察財産家口册籍不得清發遣無期乃復乘在獄時丐之官月或一出或再出自順治十五年三月至康熙二年四月凡四年生女一其一尚在腹未生也及文然解京而生一男越明年出關發尚陽堡又明年文然卒是為康熙四年五月八日又明年訃至先是籍入時晨溪大姓將乘隙計奪其雙林絹莊而土豪躉集無賴子弟坌坌興謂欺匿官物有王式者擊登聞不可遽告通政司咨行浙撫遣杭嚴兩刑官清查隱漏易册者九換審官者八更番比駮者三十有六前此承問多降革詞連溫氏梅士解京師賴親王庭鞫知其寃王式伏誅然而兩家髓竭矣然且胥役塘保日催索各費并徵皇租自順治十六年至康熙八年共十年並科該米九百八十餘石而節婦手無一錢符牒一出鷹摶虎噬之𨽻咆哮到門輒魂喪膽裂幾欲自裁而孤子牽衣手執裙刀不能下豫少丁亂離既而踉蹌走四方見世家右族流離顛沛不一矣彼盛衰之數相為倚伏沈氏當極盛三公九列珠玉錦繡甲湖郡而適逢其衰溫氏雖地大與埒而未向衰殘向使梅士稍依回其慘烈之禍可以不及而危牆將傾以袒膞當之吾讀節婦狀而痛其所遭之不良也夫死節死烈所在都有而守節之慘則莫有過于此者吾故略其節不論而獨申言其苦厄如此若夫年老歸田畏聞畸行身處太平三十年而復為此狀輟筆流涕悲夫節婦生于順治乙酉十二月一十五日卒于康熙丙子七月九日子一琬琬者完也節婦少慧甚梅士為之延里師陶君震孟者授之書故能為詩文特以多難不欲存梅士為之存七律四首七絶二十四首詩餘十九首西河集卷一百十三
