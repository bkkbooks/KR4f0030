body:
  text: 西河集卷二十七翰林院檢討毛竒齡撰序四道墟十八圖詠序豫少時與章君含可同以小試受知于王雪于師而豫以國朝初年為怨家所搆會順治辛卯章君登賢書遂于填親供時為豫訟寃于部使軍門一時聞者爭頌之曰道墟君道墟君暨豫入史館草崇禎朝都給諫章格庵先生史傳氣節凛然嘆道墟地靈産竒士為東江冠而惜乎繼起者不再聞焉近得章泰占宗之讀其詩壯浪跳擲擺落所拘管而古今雜文則又矯矯成一家不寄人藩㰚以苟為棲托而至其為人抑何磊落超挽近也夫楩柟生于深山而舉世驚其名騏驥産渥窪而人爭致之何則物不以地限也宗之謂家有十人地有十八境以人十而厠地十八流連遊息而歌詠見乎其間有所為道墟十八圖詠者豫受而披之紛紛綸綸致佳哉生平惡志書多稱八景而舊為天依作十一迹詩為汝寧西平作九勝詩意有所感則未嘗不為應之而今以老去久絶倡和讀其詩而知其盛也然且十人之中有篛軒最少實為繪圖十八以跨于右丞之所為山莊圖者然則道墟之地靈豈自昔已趙都尉弟紀恩詩序余舅氏大宗公舉鄉試第一而驟丁陽九外弟潤菴繼起早露頭角年未及終賈即以臚唱第三越虎闈而侍禁闥可謂天馬無局步矣乃豫赴都時值潤菴出鎮宣府守畿輔右鑰而今則立功海外開幕子湘沅之濵重以心懸魏闕猶不能無浴殿西頭罏煙扇影之思因之作紀恩詩以見志其忠愛矢報之私一篇之中三致意焉昔宋人作唐史每從元長詩集中搜檢故實今詩句雖鮮然讀之可以見興朝掌故并掖庭記注諸璅事即以之比張籍王建諸詩亦豈有歉與錢塘宋孝婦方氏記傳序曹子衛公持錢塘宋孝婦方氏并其子刲股記傳示豫時兩浙督學使下及錢塘令君皆具驗實四方為文章詩歌相誦述者彚之積漸成卷或疑商周以來罕傳其事惟東漢畸節往相標識故鄠人之對韓愈詬之而有明令甲至有斥詭異之行題為不孝勿使濫列旌典者今方氏以姑以夫兩剔其臂而四子感奮亦遂展轉慕效八臂並創是豈典例不足法與豫以為孝無平畸亦惟其能行而已矣詩曰孝子不匱又曰孝思惟則夫惟孝思無量故極其所行而皆可為法蓋有限者其則而不匱者即其行也昔漢原涉吏二千石以禮讓自修而一行縱誕流為輕俠其言有曰不觀家人寡婦者耶亦思效伯姬孝婦而一汚盜賊遂行淫失何則所行使然也晉周處感清河之言一經更勵遽成忠孝今刲股者亦惟勿法而已然孝則已行也有人於此其素行未必純孝其視父與姑未必盡如一體而呼搶之際偶然感動創痛不恤然而暫焉耳及其後家人傳之鄉里稱之雖已亦頻視所創輒為感奮以為人固有可至于純人孝子之事而諸妄凡也所為亦且勉強顧畏而不敢為戾曰幾有身創如是而猶然為悖逆者乎不惟不悖逆而已豈猶然未順者乎如是而謂其行之有過焉不可也有人于此其素行不必不純孝其視夫與姑不必不如一體而挾持中正以為傷生滅性古人不為未幾而不必傷生者亦不為之矣豈惟不必傷生者又未幾而當為者亦不為之矣一旦遇有危難其能急君父而致身命者無有也豈其法則不善哉行未力也如是而謂之中正不可也然則人亦貴有行耳人苟行孝何惡于過况其母行之其子行之其諸子之展轉慕效者皆能行之吾將以風夫世之行孝者而又何典例之是責焉坡山朱氏族譜序自蘇明允講族譜于亭而宋時之為族譜者較今獨詳書曰敦敘九族譜也者敘之之謂也顧先王授姓期于别族而後人敘譜重于合宗是以謝朓稱太傅必曰宗衮杜甫贈杜位亦曰吾宗誠重之矣坡山朱氏族譜者有宋之所創也自宋張侍郎文丞相下皆有紀序而族姓攸肇則自顓頊後可系按焉特江右之族由宋學士公出知洪州而由洪之筠由筠之坡自學士公下歷元迄明凡德業文藻科甲仕籍屈指而數不可蕞會以故舊譜所志屢經更易猶必統其條貫節其繁委分之合之而後成誠哉茮聊之逺思瓜瓞之永經矣朱兹受先生客遊淮隂往以種嬰男祕痘得禁方書自漕部使下及于令丞皆迎而師之且將赴內廷親王諸大臣召而豫以家嬰之厄于痘而思救之也謂先生以祕術生天下嬰當蕃其族姓以饗其報而先生坡山宗也出坡山族譜屬豫為敘豫乃為嘆曰休哉前王之授姓則别而漸之于合也今人之敘譜則合而實成其别也不觀木之有根荄水之有源泉乎始也以萌蘖而條之枝之以涓涓也而于焉溝澮于焉江淮然而逺條之揚無所于亂江河之分介于清濁此無他經者綸之始合者理之端也昔明允為眉山大家而族譜所紀不及唐眉州刺史則至洽而至精宇之故黃渥可以宗婺州而狄青不可以附梁國方今天下合同里版清晳家之有譜抑與國之有籍相表裏也讀其書而知朱氏之盛且因之可以得古人敦族授姓之義則內合其情外分其等雖先生子姓必由此更大其宗乎是亦為政也王甲庵周易圖注序易易也變易而數起焉易易也亦易簡而天下之理得焉故曩時學易者大約分理數二端而主數者則曰易者筮書也言理過備反失象數朱子學是也然其敝也粗而不精主理者則曰理外幾有象乎乾二之德通于學問噬初之道進于仁義程子學是也然其敝也雜而不醇蓋朱程二學各有由始伊川之學王氏之學也王弼以費直為宗而好言義理伊川踵之朱子之學邵氏之學也邵氏衍皇極經世之説該理于數而朱子乃隂承之然而朱子言數既承其意而又不竟乎其説以為卜筮本義無關隱賾而于是理與數兩不得矣夫該理于數亦謂數本具理不必更立理名焉耳今乃曰數在卜筮而其言卜筮者則又專屬之吉凶貞悔隨所揲獲之語辭將使數聖人俯仰觀察後先探索而究其本義僅得與筮人菙氏指可否也有是理哉且夫今所傳易皆王氏之易也費直以彖象文言參入卦末而王弼則又分彖象文言或冠于各卦之首或附于各爻之中名曰古文易實今易也朱子既不欲以理言易而注易則又取言理之易此何意乎王甲庵講易有年其旨謂理外無數數外無理天地之理皆起于數數即畫也吾不學朱程之易而學文王周公孔子之易且不學文王周公孔子之易而學庖犧氏之易且不學庖犧氏之易而學天地自然之易夫庖犧氏之易無字句而有畫畫即數也至天地自然之易則將并其畫而無之夫至于無畫而意言象數不既悉于此而兆其端乎故其為書先圖象百餘各推其説側見旁覬並有至理焉周融其中自天時人事世數物候以極之日月水火山川燥濕道德風俗動植飛走通變不測之數皆有形狀而後分伏羲文王周公孔子為內外編合動靜之交通正互之體參內外虗實存亡進退之迹凡分策布指列序定位咸極淵眇而又旁及于四時五行兩遊八極二十四氣七十二候干支循端分至起例因象得數因數得理大約逺推京房焦贑孟喜梁丘賀諸儒所傳而去其災祥占譏之術邇本邵氏所學而更廣其天地闔闢世數治亂之説洋洋乎幾于無處非易矣近世學易家為豫所及見者自蕺山劉氏上蔡張氏仲誠先生而外俱能各極指趍自為其説然無以過也即桐城方氏歷世學易已括取諸家彚為一乘顧亦未能該是書也豫嘗因甲庵之易而曠觀之天地之易具在也其名周易一易耳夏易首艮而為數用三十六策商易首坤名歸藏則以坤為萬物所歸載也用十五策原不俟彖象十翼四十九策之易起而後有易學且即有彖象十翼四十九策之易起而凡為易者猶復有漢易太玄定九九之數以贊為爻以測為象唐易元包易八純之列有卦無爻有孟仲而無老少如今所傳者則以易在天地使必待庖犧而後有畫待文王周公孔子程朱而後有理有數則前古聖人之道或幾乎息而後此諸儒學道之説且幾乎敝也此則王子甲庵之所為兢兢者矣史訥齋先生偕德配徐夫人雙壽序往時為人壽每造侑申祝娓娓泛濫為巵詞十年以來所持匕道強飯立侍嚌啐皆先後等倫在兄事之列顧之驚心即欲一為阿好以稍加諛謾不得也况訥齋先生尤素所師資者乎今年冬先生歲六十夫先生則又已六十矣當先生弱年蜚聲文林旦暮冠進賢入長楊射熊之館佇受筆札既已丁亂離棄置倣佛然且豪蕩驅遣領袖東南壇坫間凡人士宴會有所譜記不得先生名不就特先生過簡亢不善容接四方造請者多落落去然其事才目前耳不謂遂已逾歲月久逺且不謂遂已六十豈時果難恃與亦曰吾為其可傳則已矣夫天下傳人有幾先生擅家學以父兄為師友嘗侍晉陵公談古今事其兄曙寅公猶在也每舉一事必引根批原分枝擘流剖析其異同而貫穿其初末經文史語歷歷成誦偶或遺闕則彼此補核其于挽近事猶是矣此不幾似王彪之乎晉陵公雍睦居家先生每承之怡愈不間嘻嗃有似陳季方把臂堪託以妻帑似朱生見利思義不因人炎熱似童子鴻嗜酒踈脫每一飲必陶然盡醉而諸務不失簡則有似張黃門訓諸經百氏鉤深致逺可使擔囊負笈執經問字者不絶門舍雖傾筐倒篋隨叩隨應猶然鼠壤有餘物似馬季長先生所乏者獨仕耳今有通名籍乘軒鑣服朱紫青緑洋洋坐政事堂而名不接耳行不衛足學不能章身教不可澤物此亦何足比較于短長之數且夫公孫𢎞六十為博士卒至通侯先生尚未艾也今先生門下凡八九十人各執漿篚載肴榼登堂薦罽會先生德配徐夫人以偕老同齒設兩坐于絳紗之內再拜起立分行滌爵以次進侑趨走蹌蹌一似設饌于安昌而列樂于南郡者此何如盛與然則甲辰不為雌而戊子未可小也乃豫則有私誦焉先生名閥廣逺席南渡相公之後族之軒冕往來者各尚結納而先生閉門却掃獨與豫為耐久朋方豫被謡諑倉黃出走交遊苐相視永嘆先生驅馳之力在間以為豫解釋至今談友誼者尚得誦艱難懷友之句其可傳而可誦如此若夫夫人之淑慎能賦江汜以共事夫子華封人不云乎多男多壽則早有祝之者矣薑侍御生日序夫天之生人不易而人之得自見於天下又甚難故大人者出則必揆共初度紀之歲月當其始生曰某生矣其長曰某長矣某若干年矣其遞進而有永也曰昔某甲今又某甲矣世以人重人以時傳理固然者薑子侍御以甲第起家讀中祕書乃歷任臺省綱紀鹽漕其在今行馬者再矣人之誦者必曰衣斧繡冠鵔鸃冠懸豹尾于車赫哉司𨽻而吾謂不特此也夫周名柱下漢名蘭臺皆掌治文史而後始行馬在外故王僧虔以烏衣自喜而控制南司監紀北省北魏崔宋所繇相譏公以中祕為監察一似復舊時柱下蘭臺故事昔人云不為簮筆臣當服獬豸以御天下而君已兼之且夫淮揚亦天下一都會也襟江臂海控制河洛斥鹵數百里積貯攸足非大重臣不足當此任吾聞古中丞之蒞中司也曰轂下無所撓也其出督諸州也曰整齊之也今君在內則能劾大將軍彈中書兩省以肅百僚謂之獨步其在外則能使簮裾輻輳作殷劉之宴而諸州咸震懾算商𣙜鹽了無廢事其重如此夫重其人即重其人之所生乃人之誦之皆曰御史若干年矣其在內與在外皆得計之曰御史某甲而我友祁子且偕越中同人共進為壽夫生年窮達有數昔有為監察御史而拭鏡揃白尚傷遲暮者今君方四十而留東堂者若干歲入臺司者又若干歲而故人暮齒乃從衆人後而數君之年嗟乎人之自見豈易也河南張公生日序詩曰永錫難老夫難老而有錫之者斯其權在天而王元之作壽域碑且復以修短之機豫之王者是不知壽之為數誠有是在已而不在人者即天又其後已張公於河為著姓其先人名典禁兵稱天子親軍者凡數世夫衛侯纍挂其勢已渥而又丁廢舉之餘羅居百族雖屢散其息於知友閭里而目語額瞬尚有嬴資公且崇約德而行闓澤日與世之賢淳者遊于于粥粥然和以沖擴乎其有容謂非得于己者有獨異耶且夫教子其大端也嗣君已膺薦置容臺髙等能持祿以養其親抑嘗以書升受關中聘髙啓龍門于汧渭之間時稱得人者皆歸公焉今其公姓已有接迹而起者夫人遭逢亦各有數公獨際其亨嘉而履其最盛迄于今丈人張筵少婦鼓瑟倚歟休哉其席世也則然明之基千秋之緒也其有所繼也則又伯饒開其前公超嗣其後也咸曰似有天幸而吾謂公獨有以致之今夫山本髙而必扶之以林巒之密則不傾水本深而必資之以百川之下則不泄故淵泉産良珠而髙岡藴名玉此無他誠積之者宏而培之者厚也公之生日在河諸名士各屬豫一言為壽豫曰不其然乎夫敷德行惠致之已也承乎前而啓乎後者積之匪一日也是故德彌劭則年彌髙吾知所以壽公矣匪然而禮有引年之典自漢唐以來歲必舉賔筵七饗以當憲乞犬以我公之德僅獲坐膠堂而饜酒醴而時之頌公者猶以為公之所受皆王者之功則夫天之因材所稱大德必得者其謂之何雙壽序為陳鄰軒翁并于太君漢沛公與盧綰同日生里中持牛酒賀兩家鍾瑾與李膺同年俱有聲名世嘗誦之况其為夫婦之間乎顧山濤與婦韓同顯老萊與婦同隱秦嘉與婦徐淑同為文章吳興太守沈君與婦同飲酒至同生則可賀極矣居平相敬如賔飲食起居各無所偃仰容容坦坦則夫婦而友道存焉嘗嘆世之為祈年者大率以富貴相矜髙屏幛卷軸必擇好文揄揚之而時之為文者備極奬飾雖鋪陳渝溢而不以為怍故豫于序壽一切屏棄而獨于陳翁夫婦有異者翁為邑甲地好讀書博通羣籍摩兩王書法嘗易金錢且善為人解紛立梗槩不專務榮利以故人多歸之至其婦之婉娩有禮又性然也自選舉法廢聘名禮賢視若辨髦必致身科目入膺太僚始足夸耀里閈而翁以東西曹椽糾彈稽違者數十年既已徴為録參旋復棄去天下聞翁名爭欲一拜庭下相為引重鄉里之飲德而食利者羣倚翁若屏蔽則是虞翻功曹尊于會稽參軍孫邵見重北海非異事也夫齒鄉不以爵禮也香山居士居家時其所與遊皆長年不仕世稱九老翁非其數乎若夫其婦之齊年則禮有之禮曰婦以夫之齒夫婦與夫不同生尚得以其齒齒之况為同生者與王孝亷鄉居序孝亷名曰欽向遊汝南過平輿城欲求戴慿許邵所居宅而不可得也喟然曰特無其人耳有其人吾將與之遊况所居哉既而與王孝亷遊則其人也嘗過孝亷家飲其堂與諸著名字嘗往來者日出入於其里門且嘗拜其諸嗣子於庭下于是隂記其所居坊曰何坊其里曰是何里迄於今越三年矣猶能心憶而目識之曰王孝亷所居如是也今孝廉已移于鄉而當時與諸同遊者且貽書屬豫為敘豫向固知孝亷家今移之矣向之所為記憶而不得忘者今且不及知其鄉田何畫井幹何向山林沮澤燥濕何度庭堂户閥甃辟戺霤何所規為則倘千載後望見孝亷不能得亦僅如今日之思孝亷已也而特是孝亷者以彼其才招致天下士大夫車徒冠蓋與其邑令丞以下假扼掔通恭敬也為名髙乎冝在邑為勢厚乎宜在邑為遊談之誇而竿請之哆乎宜在邑邑也者俋也凡皆名與勢與遊談竿請之所俋聚焉也邑者挹也可以挹取也而孝廉悉撝之而勿之顧則豈入商亳者必居莘耕南岡而可許漢乎夫龍之將見以伏江河之溢旱豬積而渟泓其勢人之將發迹以有為必先遵晦于所行而後可以速得志於其所有事宜孝廉之舍乎彼而就乎此也乃孝廉則更有進者昔者齊之市晏子居之而至今齊城之北有别宅焉柱下史所居在瀨鄉然譙之祠老氏無定也世亦恃有人耳古者在國之居名曰國宅在井之居則曰田廬國宅與田廬一也此地有袁本初名士也嘗從濮陽還車騎賔從焜然相望于道路乃方入里門而盡撤之以為不當令許子將見則使孝亷而邑居亦必不能以烜赫之勢有加孝廉如俋聚者也雖然以孝亷其人而所至可思即何必以俋聚為纍吾聞孝廉鄉居後其嗣子之拜庭下者已能博學舉茂才矣則浸假又越數年吾仍造孝廉之廬安知其所為交遊者不更有過於邑居時耶然則非無挹取也西河集卷二十七
