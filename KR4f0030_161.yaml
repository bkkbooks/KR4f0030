body:
  text: 西河集卷一百六十一翰林院檢討毛奇齡撰七言古詩七泛舟過秦園留贈秦翰林松齡有作芙蓉湖上曉雲生畫舫還為湖上行碧草千絲含日映紅粧幾處照波明平橋入路開朱榭曲澗潨潨林裏瀉泰伯城隨南沜回春申祠在東峰下祠前流水自年年宛轉瀠洄最可憐不從梁氏花溪度只在秦家桂樹邉秦家桂樹生烏子文石為池蕩秋水别巷應通解玉坊前關並築燒金壘烏椑紫木夾層樓大府錢堆馬埓溝北谷繩床春自偃西園翠蓋夜為逰暗通瓴甓銜環轉細激連珠波面捲出地疑分太液來去天不道承明逺滄州自古惜沉淪花底偏逢翰苑人潘嶽娛親推緑輦謝公攜妓坐紅茵風流盡日開三徑自笑多年隱名姓門投張儉已還鄉廡下梁鴻豈亡命一自浮家願屢違吳中築室故人稀君家尚有清泠水何日重來一浣衣鴛湖黃子錫自號麗農住苕南癸亭種瓜自給豫在淮西道遙題此詩黃公最愛菰城山攜家避地嘗往還自辭楚相不得意荷鍤欲老青苔間平田十畝啓幽壑招客還留癸亭鶴春半間炊松飯香晝長臥看瓜花落烏皮小几拂紫絲興來每欲圖東災嚴關醉臥淮西客為汝題詩思復思息縣阻雪同諸公集何景韓梅花書院有作我逰淮西三遇雪買酒一醉懸瓠池今來雨雪阻新息出門泥濘無馬騎髙陽好友漉清醑爭道梅花發前渚繞屋頻燒五木盤捲簾邀看三花雨辛蒸蕙錯羅苾芬豕臡蚍醢青羊臐興來髙詠和集霰酒酣噓氣為同雲周燔獸炭澆酒熱重見寒空攪冰冽幾斛明珠撒瓦簷萬條翦毳拋銀埒相逢同是作賦才夜深秉燭還登臺洛陽縣令煩趨走莫遣明朝掃雪來射獵歌為金公子敬敷作汝南公子好射生天寒射獵城東行申陽一關跨九塞招來遊俠俱有名平原積雪滿叢薄上蔡新羅縱搜索黃帝祠前雉漸肥白牙岡上桑初落雙韝壓臂掣皂雕桃花叱撥嘶來嬌銀翎割就穿珠箙碧血凝將淬寶刀鞭梢倒插如蘆管新織罽衣偏後短腰帶橫垂海貝寒指環細夾霜貂暖虛彎明月過雁驚忽然箭落秋雲平青天毛血灑如雨韓盧宋鵲空營營枯蓬爇肉當寒燒地冽沙冰阻長道望得黃熊驅不前擲却雕弓自調笑斜陽入地馬若飛懸禽帶獸盈金鞿歸來但索駝酥飲醉臥花前金地衣金公子射虎詞蔡州城東夜飛雪公子朝裝絡寒驖錦柙抽將練影長角弓開處霜膠折平臯木落狐兔稀風吹淺草蒼鷹飛近前雪窖有猛虎暮寒攫雀嘗苦飢中原神物應樞運樵採年年不相問豈是將軍在北平只因太守為南郡圍場突出公子豪從來豢虎將終驕同行雄帥伏強弩獨遣健兒燔枳毛般般三獸起鬬格吼入深林蟄雷坼觀時朱亥尚倉皇射得張昭動容色長楊羽獵會有時汝南公子真雄姿請君暫息長鯨飲聽我為歌射虎詞送史尚轍進士過夏口兼寄丘學士時學士為武昌别駕晨裝欲動海雞鳴日出河橋相送行繫馬未辭王粲宅前旌先指武昌城河橋日出輕攜手為食嘉魚過夏口去寉秋翻北渚雲啼烏夜宿西門栁故人遊宦滯江鄉十載還辭白玉堂共道祕書懷謝監翻令别駕得王祥從君昔在枚臯里憐我貧依漂母傍飲酒不嫌車下醉逃名時就壁中藏漂流歲月同虛棄惻惻相思成往事况汝春官舊主司杏花開後慈恩寺史禮闈出學士門下官齋對酒洗征鞍醉後應看江上山若問行來何所見但言逰子不曽還丹陽城下作簡郡司馬丹陽郡裏秋楊緑不見當時舊劉穆鐵甕徒懸鸛鵲棲金盤不貯檳榔肉岧嶤雙闕古郡臺丹陽司馬今奇才方輿偶屈陳蕃坐錦幘真看謝奕來髙牙傍海發葭鼓萬疊寒濤散艛櫓典兵自惜重南徐雄鎮只今推北府江東遊子歸較遲登樓賦罷將從誰重來丁卯橋邉路欲把垂楊幾度思過江南奉謁周侍郎值其行部留詩代訊我懷周侍郎慷慨不得見手把三年袖裏書漫字紛紛落如霰蘆崎夜走江路長東浮淮浦西潯陽侍郎久作南藩使每過江南願投刺踟躇側促終不前將投卭僰行蠻天薑生呼我汝南去路出龍江幾回住斯時正好謁侍郎又當行部留維揚我昨渡江來巨浪髙于山天風萬里吹不定鳥雀飛飛空自還前灘岞崿擁波白獨駕孤航片帆窄海豕江魚轉鬬爭篙工柁女愁顔色昔讀侍郎文怪其有如此浩蕩奔騰勢無止直下如傾七澤濤橫來不斷三江水孤航相向宛如睹恍與髙齋覿晨暮江邉况有蔣侯家小妹青溪舊曾顧十年出處同嶮巇懷人何必吹參差倘尋結襪留歡處只在乘船破浪時楊將軍美人試馬請賦將軍航頭載美人春行晚泊橫江濵斜陽墮地草場濶酒酣欲試紅麒麟美人常服雙袴褶青錦鴉幱紫絲結蟬鬢當風捲似雲馬毛散汗吹如血金錢壓口玉襪膚馬前細立秦羅敷見人羞上還將墮壯士驚前不敢扶調鞍整轡坐不定忽見桃花滿春徑將軍似妬九華韉在傍休視雙金鐙明霞片片爭繞林紅遊落處桃花深回頭失却真珠櫟春草蒼茫何處尋飲巴亭放歌并謝朱三驊元馮大之京王十文鼎王二漢泥泥草頭露不浥春桑枝傷禽驚離弦不解彈縵絲可憐數載滯江滸暫得相依駱明府集木難教逐鳥烏當筵詎敢題鸚鵡盤中食梅長苦酸冰絲還結絺袍寒誰攜美酒召我飲居然髙會巴亭山金盤玉斚勝三雅兩兩鴉鬟似謇姐小字曽為明府知清歌不在王郎下行觴雜坐飲未闌玉叉錯挂微臣冠流離之子久失意那復斗酒能為歡從來聽樂惡哀嘆我未聞歌已腸斷嘈嘈絲竹空滿前誰使飛鴉渡河漢三條裾子染竹黃一雙素手如秋霜擎將碧玉欄邉酒傾出真珠甕裏漿傾漿重起歌結襪渺渺愁心過緑髮座中可惜是毛甡莫遣巴亭待新月巴山酒壚送王十孝亷北行巴山秋市懸青簾市中却逢王孝亷當壚十五洗杯杓眉間撲粉如紅鹽楓林百尺日初照惱煞王郎尚年少五上公車十二年碧髮重遮緑羅帽巴山城下秋水清壚頭醉送王郎行明年我亦來燕市看汝春風馬上生將出巴城道寄徐十五緘春風吹葛條蘝蔓被溪曲巴城舊酒壚又見雙幔緑酒壚雙幔緑如草將去巴山出東道記得來時秋雨零我投蕭寺徐生行秋雨淹寺門徐生行且住惜也三日留仍向雨中去雨中一去秋水寒聞君久滯豐城間至今草青及春暮不識君今又何處十年奔走不得志道路相逢偶然事南北東西各自馳誰復風塵訊騏驥我數遊南昌潦倒無一詞羡君慷慨厯落千回思去年雨中讀君句恍捲長河向天注一任秋霖汨馬牛半入寒空散煙霧登臨若此真可惜何處天涯少蹤迹但使能留髙士亭無須更作名王客巴城二月春草薰城頭黃鳥啼紛紛我行記得君行日欲出巴城轉憶君春夜飲就亭花下見施二公子彥慤當筵賦詩有贈神龍墮地便生角鳯雛出林成羽毛不見宣城施彥慤少年特達傾人豪春花初開啓官舍豪客當杯酒如瀉錦袍緑髮衣帶紅搖筆熒熒燭光下燭光映筆筆花落展卷生風動油幕滿座咨嗟倒白波一庭風雨翻紅藥髙陽舊里擅才子元季雙慈近誰似毛甡夙歲曾渡淮但見楊家一童子西河楊童子歌見前宣城文章將起衰庭前卓犖真龍媒毛甡自傷徒老大見此不覺心為摧強顔捉筆擬酬和舉手落盞空徘徊看花愁見新花開紫芝山歌有序施公分司築亭于臨江城南之瑞筠山忽紫芝數百本繞亭叢生南昌李宗伯碑為之記且更名此山為紫芝山而標諸亭越數年毛甡登亭而歌焉毛甡走天涯歲歲厭春草曽採三花不得還空臥嵩陽歲將老踟蹰地上苦未間西遊重到匡廬間湖西丈人倚青嶂宛若姑射難躋攀丈人有佳興云在城南山城南山頭有亭子紫蓋團團碧雲裏背阜橫當古郡臺前林直傍清江水丈人築亭年復年當時異事今還傳紫芝本靈草斯地瘠難種亭前忽見湧銀甕倣佛丹霄間九彩睹翔鳯又如珠熖發丹穴芝草芝花滿丘垤採之亦不窮斸之亦不竭如盤如梡復如蓋輪囷離奇壓車載悔不當時負耒來餐以當糧紉當帶以此呼此山亦名為紫芝靈迹嘉名又一時未須四皓返商洛先看三秀生銅池迄今採芝已不早尚見山頭此亭好毛甡慨然登此亭幾度亭前聽啼鳥清江初漲江水長山風細拂林花香遊絲飛絮裊衣帶遙天望眼空茫茫我將舍之去念此芝草芳紫芝之草有時歇芝山勝事無時忘君不見紫芝山頭勒碑處有客哀歌不能去陳柱國將軍期宿鎮山遂泛舟集南塘同張杉平津李章薑埈商命説徵説兄弟作天星出地馬出關將軍夜宿城南山深林列火忽如晝與我髙會叢祠間平明鼓吹結珠勒毳幄重重映波白合艦同尋賀監湖毛生真作平原客湖亭日上林影疏金刀自鱠秋湖魚西園才子分彤管南國佳人披錦裾平山十里勝金埒頻挽睢陽弄鵲血獸炭燒成越嶠雲駝酥點作燕山雪歡娛短景苦難駐秉燭還題樾臺樹皎鏡東飛錦纜開將軍夜唱廽舟句時廽舟聨句陳為首唱十年長避追吏馳還鄉尚咏平林詩滕公豪氣真無敵羞煞山陽衣褐兒西江送春曲送春歸春歸在何處江草茫茫江水長不識春陽去時路楊花墮地吹復飛草間蝴蝶沾人衣遊絲百丈綰欲斷平沙白日空遲遲江邉酒壚十五女不解春歸客心苦紅簾日落照眼明猶唱陽春當金縷陽春唱罷思復思可憐又是春歸時漫歸復行書孔雀行關樓謝趙明府趙棠溪先生時為蕭宰孔雀披金花南飛畏剸尾白璧光芒受世疑子長縲絏非其罪東門拔劒不顧歸十年還視桁邉衣廳花結網無鶯度户草張罝有隼飛張罝結網遮無路欲渡蘆崎行又暮趙相真看解印來外黃重見操兵去南飛孔雀北度鴻將垂巨翼乘長風臨行不辨銜珠處啄盡關前花樹紅沈華席上同張杉王鎬錢霍王元愷平津祝宏坊并憶沈九祕書時九月八日吳興沈華宴賓客毛甡晝逐朱家來相逢衣褐把美酒當筵意氣為之開連年變姓滯江表衣上風沙不堪掃髙陽滿座相顧殊只有沈郎顔色好帩頭碧髮裹緑羅銅槃灔瀲傾金波阿兄簪筆掌文史方蓄新菱染麻紙翺翔入作親近臣家留賢弟能娛賓紫薇院裏張紅幔白玉堂前鋪錦茵憶昔山陽度廣栁曾别難兄釃杯酒今來江上覔蘆崎尚藉平原匿好友平原好友真足誇薑肱繡被平當家時豫留薑桐音平載問宅玉碗甫看分碧藕金錢又見拆黃花黃花滿地中心苦忽集華堂思如雨明朝倘約採茱茰莫負山隂栁家女豫屢歸不得釋冗屢過湖西施公苦相留日留日刻留刻適就亭鸚鵡三脫三復返豫刺傷于心因為賦鸚鵡還詞鸚鵡還鸚鵡還相思只在隴西山隴西萬里思歸去休挂人間畫欄柱畫欄雙柱玉籠垂金鎖連環控紫綏欄邉言語應憐汝心裏分明却訴誰却訴誰應憐汝早知苦分明何如不言語潛潛啄我紫絲縧密密捐豫金鎖條潛潛密密終教去金鎖紅縧何用住且避玉榿林且上石榴樹初疑小樹上無力既道長林遷不得别苑猶牽紅兔羅遙天只墮蒼雕翼蒼雕紅兔走復飛躊躇去此將安依他鄉好主應難遇故國多艱那得歸一去復一還主人相對起歡顔相思仍向深林避再去再還非主意主人破柱且開籠不道三回仍未逝仍未逝主且憂尋殺欄邉紅石榴石榴牆外行難測手執紅縧淚沾臆縧亦漸就促鎖亦漸就短一縧三續尚堪披萬水千山何處返鸚鵡還鸚鵡還願君仍住石榴間石榴啄罷傷紅觜願君仍住紅縧裏紅縧臨繫翠襟住主人淚落不能顧薑垚招登香罏峰絶頂同薑十七廷梧商二徵説秋山崒嵂海日紅浮暉倒映金芙蓉蒼崖負杖招羽客攜我直上香罏峰楓林黃葉下幽壑杖底風吹草衣薄石屋髙看洞鳥翻橫梁斜度山花落秋空望海海色飛赤城萬里煙霏霏越王臺上青烽起夏后祠前白雁稀玉函金簡探難得况蹈嶇􅋂未曾息北谷空標承露臺南還竟負凌風翼蒼崖四顧意氣開吹笙跨鶴真仙才何年乞汝盈箱藥共俟安期海上來垚號蒼崖子時修玄學霖臣招豫泛舟三日夜商霖好探奇擕我泛青翰日日南湖汗漫遊恍若乘槎度河漢山橋畫柱溪洞門夏王臺殿西施村碧江開錦簟緑草藉金尊檣鈴榜吹雜柁鼓朝日西飛暮來雨五木燒殘江鸛飛千花開處山雞舞君家兄弟真絶倫擕豫一避桃源春山中七日家應改幾欲還家愁殺人聽流鶯歌聽流鶯百囀在春城宛如舊苑花枝裏曙色將開弄曉晴此時玉櫳猶未啓此日金屛夜如水夢中隱隱聽綿蠻起見墻東映日斑墻東映日花枝暖睍睆綿蠻啼漸緩乍穿錦葉暫停留移到金窗更宛轉可憐宛轉最多情可惜間關寫不成秦女簫中三四弄吳娘曲裏百千聲今來百草翻紅色今日聽鶯度錦陌誰解參差逺趂人自傷漂蕩還為客參差漂蕩逐流鶯百變風前斷續生金刀細剪流鶯語依徙春城不忍聽和張夫人拜新月詩拜新月拜月出簾櫳天際分蛾碧花稍觸甲紅拜新月拜月粧臺側覆斗鉤自懸斜梳墮無力拜新月拜月暗傷悲記得少年時南園同伴侣裙帶一垂垂今看井桐及秋暮燕子西飛鵲東去夜靜花階緑蘚間羞向低低影邉顧冰輪半掩當復明婆娑桂樹暗中生那能拜得新生兔長與金烏作隊行一本題下有懷友作末那能二句作如何月下紅閨壻歲歲長留木葉城西河集卷一百六十一
