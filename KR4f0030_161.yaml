body:
  text: 西河集巻一百六十一翰林院檢討毛奇齡撰七言古詩七泛舟過秦園留贈秦翰林松齡有作芙蓉湖上曉雲生畵舫還為湖上行碧草千絲含日映紅粧幾處照波明平橋入路開朱榭曲澗潨潨林裏瀉㤗伯城隨南沜廻春申祠在東峰下祠前流水自年年宛轉瀠洄最可憐不從梁氏花溪度只在秦家桂樹邉秦家桂樹生烏子文石為池蕩秋水别巷應通觧玉坊前闗並築燒金壘烏椑紫木夾層樓大府錢堆馬埓溝北谷繩床春自偃西園翠蓋夜為逰暗通瓴甓銜環轉細激連珠波面捲出地疑分太液來去天不道承明逺滄州自古惜沉淪花底偏逢翰苑人潘岳娱親推緑輦謝公攜妓坐紅茵風流盡日開三徑自笑多年隠名姓門投張儉已還鄉廡下梁鴻豈亡命一自浮家願屢違吳中築室故人稀君家尚有清泠水何日重來一浣衣鴛湖黄子錫自號麗農住苕南癸亭種瓜自給予在淮西道遥題此詩黄公最愛菰城山攜家避地嘗往還自辭楚相不得意荷鍤欲老青苔間平田十畝啓幽壑招客還留癸亭鶴春半閒炊松飯香晝長臥看瓜花落烏皮小几拂紫絲興來毎欲圖東菑嚴闗醉臥淮西客為汝題詩思復思息縣阻雪同諸公集何景韓梅花書院有作我逰淮西三遇雪買酒一醉懸瓠池今來雨雪阻新息出門泥濘無馬騎髙陽好友漉清醑争道梅花發前渚繞屋頻燒五木盤捲簾邀看三花雨辛蒸蕙錯羅苾芬豕臡蚍醢青羊臐興來髙詠和集霰酒酣嘘氣為同雲周燔獸炭澆酒熱重見寒空攪冰冽幾斛明珠撒瓦檐萬條翦毳抛銀埒相逢同是作賦才夜深秉燭還登䑓洛陽縣令煩趨走莫遣明朝掃雪來射獵歌為金公子敬敷作汝南公子好射生天寒射獵城東行申陽一闗跨九塞招來游俠俱有名平原積雪滿叢薄上蔡新羅縱搜索黄帝祠前雉漸肥白牙岡上桑初落雙韝壓臂掣皂雕桃花叱撥嘶來嬌銀翎割就穿珠箙碧血凝將淬寳刀鞭梢倒挿如蘆管新織罽衣偏後短腰帶横垂海貝寒指環細夾霜貂煖虛彎明月過雁驚忽然箭落秋雲平青天毛血灑如雨韓盧宋鵲空營營枯蓬爇肉當寒燒地冽沙冰阻長道望得黄熊驅不前擲却琱弓自調笑斜陽入地馬若飛懸禽帶獸盈金鞿歸來但索駝酥飲醉臥花前金地衣金公子射虎詞蔡州城東夜飛雪公子朝裝絡寒驖錦柙抽將練影長角弓開處霜膠折平臯木落狐兔稀風吹淺草蒼鷹飛近前雪窖有猛虎暮寒攫雀嘗苦饑中原神物應樞運樵採年年不相問豈是將軍在北平只因太守為南郡圍塲突出公子豪從來豢虎將終驕同行雄帥伏強弩獨遣健兒燔枳毛般般三獸起鬬格吼入深林蟄雷坼觀時朱亥尚倉皇射得張昭動容色長楊羽獵㑹有時汝南公子真雄姿請君暫息長鯨飲聽我為歌射虎詞送史尚轍進士過夏口兼寄丘學士時學士為武昌别駕晨裝欲動海鷄鳴日出河橋相送行繋馬未辭王粲宅前旌先指武昌城河橋日出輕攜手為食嘉魚過夏口去寉秋翻北渚雲啼烏夜宿西門栁故人遊宦滯江鄉十載還辭白玉堂共道秘書懐謝監翻令别駕得王祥從君昔在枚臯里憐我貧依漂母傍飲酒不嫌車下醉逃名時就壁中藏漂流歲月同虚棄惻惻相思成往事况汝春官舊主司杏花開後慈恩寺史禮闈出學士門下官齋對酒洗征鞍醉後應看江上山若問行來何所見但言逰子不曽還丹陽城下作簡郡司馬丹陽郡裏秋楊緑不見當時舊劉穆鐵甕徒懸鸛鵲棲金盤不貯㯽榔肉岧嶤雙闕古郡䑓丹陽司馬今奇才方輿偶屈陳蕃坐錦幘真看謝奕來髙牙傍海發葭鼔萬叠寒濤散艛艣典兵自惜重南徐雄鎮只今推北府江東遊子歸較遲登樓賦罷將從誰重來丁卯橋邉路欲把垂楊幾度思過江南奉謁周侍郎值其行部留詩代訊我懐周侍郎忼慨不得見手把三年袖裏書漫字紛紛落如霰蘆碕夜走江路長東浮淮浦西潯陽侍郎久作南藩使毎過江南願投刺踟躇側促終不前將投卭僰行蠻天姜生呼我汝南去路出龍江幾回住斯時正好謁侍郎又當行部留維揚我昨渡江來巨浪髙于山天風萬里吹不定鳥雀飛飛空自還前灘岞崿擁波白獨駕孤航片帆窄海豕江魚轉鬬争篙工柁女愁顔色昔讀侍郎文怪其有如此浩蕩奔騰勢無止直下如傾七澤濤横來不斷三江水孤航相向宛如睹恍與髙齋覿晨暮江邉况有蔣侯家小妹青溪舊曾顧十年出處同嶮巇懐人何必吹參差倘尋結襪留歡處只在乗船破浪時楊將軍美人試馬請賦將軍航頭載美人春行晩泊横江濵斜陽墮地草塲濶酒酣欲試紅麒麟美人常服雙袴褶青錦鴉幱紫絲結蟬髩當風捲似雲馬毛散汗吹如血金錢壓口玉袜膚馬前細立秦羅敷見人羞上還將墮壯士驚前不敢扶調鞍整轡坐不定忽見桃花滿春徑將軍似妬九華韉在傍休視雙金鐙明霞片片争繞林紅游落處桃花深回頭失却真珠櫟春草蒼茫何處尋飲巴亭放歌并謝朱三驊元馮大之京王十文鼎王二漢泥泥草頭露不浥春桑枝傷禽驚離弦不觧彈縵絲可憐數載滯江滸暫得相依駱明府集木難教逐鳥烏當筵詎敢題鸚鵡盤中食梅長苦酸冰絲還結絺袍寒誰攜美酒召我飲居然髙㑹巴亭山金盤玉斚勝三雅兩兩鵶鬟似謇姐小字曽為明府知清歌不在王郎下行觴襍坐飲未䦨玉釵錯掛微臣冠流離之子久失意那復斗酒能為歡從來聽樂惡哀嘆我未聞歌已膓斷嘈嘈絲竹空滿前誰使飛鴉渡河漢三條裾子染竹黄一雙素手如秋霜擎將碧玉欄邉酒傾出真珠甕裏漿傾漿重起歌結襪渺渺愁心過綠髪座中可惜是毛甡莫遣巴亭待新月巴山酒壚送王十孝亷北行巴山秋市懸青帘市中却逢王孝亷當壚十五洗桮杓眉間撲粉如紅鹽楓林百尺日初照惱煞王郎尚年少五上公車十二年碧髪重遮綠羅帽巴山城下秋水清壚頭醉送王郎行明年我亦來燕市看汝春風馬上生將出巴城道寄徐十五緘春風吹葛條蘝蔓被溪曲巴城舊酒壚又見雙幔緑酒壚雙幔緑如草將去巴山出東道記得來時秋雨零我投蕭寺徐生行秋雨淹寺門徐生行且住惜也三日留仍向雨中去雨中一去秋水寒聞君久滯豐城間至今草青及春暮不識君今又何處十年奔走不得志道路相逢偶然事南北東西各自馳誰復風塵訊騏驥我数游南昌潦倒無一詞羡君慷慨厯落千回思去年雨中讀君句恍捲長河向天注一任秋霖汨馬牛半入寒空散烟霧登臨若此真可惜何處天涯少蹤跡但使能留髙士亭無須更作名王客巴城二月春草薫城頭黄鳥啼紛紛我行記得君行日欲出巴城轉憶君春夜飲就亭花下見施二公子彦慤當筵賦詩有贈神龍墮地便生角鳯雛出林成羽毛不見宣城施彦慤少年特達傾人豪春花初開啓官舍豪客當杯酒如瀉錦袍緑髪衣帶紅摇筆熒熒燭光下燭光映筆筆花落展巻生風動油幕滿座咨嗟倒白波一庭風雨翻紅藥髙陽舊里擅才子元季雙慈近誰似毛甡夙歲曾渡淮但見楊家一童子西河楊童子歌見前宣城文章將起衰庭前卓犖真龍媒毛甡自傷徒老大見此不覺心為摧强顔捉筆擬酬和舉手落盞空徘徊看花愁見新花開紫芝山歌有序施公分司築亭于臨江城南之瑞筠山忽紫芝數百本繞亭叢生南昌李宗伯碑為之記且更名此山為紫芝山而標諸亭越數年毛甡登亭而歌焉毛甡走天涯歲歲厭春草曽採三花不得還空臥嵩陽歲將老踟蹰地上苦未閒西游重到匡廬間湖西丈人倚青嶂宛若姑射難躋攀丈人有佳興云在城南山城南山頭有亭子紫蓋團團碧雲裏背阜横當古郡䑓前林直傍清江水丈人築亭年復年當時異事今還傳紫芝本靈草斯地瘠難種亭前忽見湧銀甕彷彿丹霄間九彩睹翔鳯又如珠熖發丹穴芝草芝花滿丘垤採之亦不窮斸之亦不竭如盤如梡復如蓋輪囷離奇壓車載悔不當時負耒來飡以當糧紉當帶以此呼此山亦名為紫芝靈蹟嘉名又一時未須四皓返商洛先看三秀生銅池迄今採芝已不早尚見山頭此亭好毛甡慨然登此亭幾度亭前聽啼鳥清江初漲江水長山風細拂林花香游絲飛絮裊衣帶遥天望眼空茫茫我將舍之去念此芝草芳紫芝之草有時歇芝山勝事無時忘君不見紫芝山頭勒碑處有客哀歌不能去陳柱國將軍期宿鎮山遂汎舟集南塘同張杉平津李章姜埈商命説徵説兄弟作天星出地馬出闗將軍夜宿城南山深林列火忽如晝與我髙㑹叢祠間平明鼔吹結珠勒毳幄重重映波白合艦同尋賀監湖毛生真作平原客湖亭日上林影疎金刀自鱠秋湖魚西園才子分彤管南國佳人披錦裾平山十里勝金埒頻挽睢陽弄鵲血獸炭燒成越嶠雲駝酥㸃作燕山雪歡娱短景苦難駐秉燭還題樾臺樹皎鏡東飛錦䌫開將軍夜唱廽舟句時廽舟聨句陳為首唱十年長避追吏馳還鄉尚咏平林詩滕公豪氣真無敵羞煞山陽衣褐兒西江送春曲送春歸春歸在何處江草茫茫江水長不識春陽去時路楊花墮地吹復飛草間蝴蝶沾人衣游絲百丈綰欲斷平沙白日空遲遲江邉酒壚十五女不觧春歸客心苦紅帘日落照眼明猶唱陽春當金縷陽春唱罷思復思可憐又是春歸時漫歸復行書孔雀行闗樓謝趙明府趙棠溪先生時為蕭宰孔雀披金花南飛畏剸尾白璧光芒受世疑子長縲絏非其罪東門㧞劒不顧歸十年還視桁邉衣㕔花結網無鶯度户草張罝有隼飛張罝結網遮無路欲渡蘆碕行又暮趙相真看觧印來外黄重見操兵去南飛孔雀北度鴻將垂巨翼乘長風臨行不辨銜珠處啄盡闗前花樹紅沈華席上同張杉王鎬錢霍王元愷平津祝宏坊并憶沈九秘書時九月八日吳興沈華宴賓客毛甡晝逐朱家來相逢衣褐把美酒當筵意氣為之開連年變姓滯江表衣上風沙不堪掃髙陽滿座相顧殊只有沈郎顔色好帩頭碧髪裹緑羅銅槃灔瀲傾金波阿兄簪筆掌文史方蓄新菱染麻紙翺翔入作親近臣家留賢弟能娱賓紫薇院裏張紅幔白玉堂前鋪錦茵憶昔山陽度廣栁曾别難兄釃杯酒今來江上覔蘆碕尚藉平原匿好友平原好友真足誇姜肱繡被平當家時予留姜桐音平載問宅玉椀甫看分碧藕金錢又見拆黄花黄花滿地中心苦忽集華堂思如雨明朝倘約採茱茰莫負山隂栁家女予屢歸不得釋冗屢過湖西施公苦相留日留日刻留刻適就亭鸚鵡三脱三復返予刺傷于心因為賦鸚鵡還詞鸚鵡還鸚鵡還相思只在隴西山隴西萬里思歸去休挂人間畵欄柱畵欄雙柱玉籠垂金鏁連環控紫綏欄邉言語應憐汝心裏分明却訴誰却訴誰應憐汝早知苦分明何如不言語潛潛啄我紫絲縧宻宻捐予金鏁條潛潛宻宻終敎去金鏁紅縧何用住且避玉榿林且上石榴樹初疑小樹上無力既道長林遷不得别苑猶牽紅兔羅遥天只墮蒼鵰翼蒼鵰紅兔走復飛躊躇去此將安依他鄉好主應難遇故國多艱那得歸一去復一還主人相對起歡顔相思仍向深林避再去再還非主意主人破柱且開籠不道三回仍未逝仍未逝主且憂尋殺欄邉紅石榴石榴牆外行難測手執紅縧淚沾臆縧亦漸就促鏁亦漸就短一縧三續尚堪披萬水千山何處返鸚鵡還鸚鵡還願君仍住石榴間石榴啄罷傷紅觜願君仍住紅縧裏紅縧臨繋翠衿住主人淚落不能顧姜垚招登香罏峰絶頂同姜十七廷梧商二徵説秋山崒嵂海日紅浮暉倒映金芙蓉蒼崖負杖招羽客攜我直上香罏峰楓林黄葉下幽壑杖底風吹草衣薄石屋髙看洞鳥翻横梁斜度山花落秋空望海海色飛赤城萬里烟霏霏越王䑓上青烽起夏后祠前白雁稀玉函金簡探難得况蹈嶇􅋂未曾息北谷空標承露䑓南還竟負凌風翼蒼崖四顧意氣開吹笙跨鶴真仙才何年乞汝盈箱藥共俟安期海上來垚號蒼崖子時修𤣥學霖臣招予汎舟三日夜商霖好探奇擕我汎青翰日日南湖汗漫游恍若乗槎度河漢山橋畵柱溪洞門夏王䑓殿西施村碧江開錦簟緑草藉金尊檣鈴榜吹襍柁鼓朝日西飛暮來雨五木燒殘江鸛飛千花開處山雞舞君家兄弟真絶倫擕予一避桃源春山中七日家應改幾欲還家愁殺人聽流鶯歌聽流鶯百囀在春城宛如舊苑花枝裏曙色將開弄曉晴此時玉櫳猶未啟此日金屛夜如水夢中隠隠聽緜蠻起見墻東映日斑墻東映日花枝煖睍睆緜蠻啼漸緩乍穿錦葉蹔停留移到金牕更宛轉可憐宛轉最多情可惜間闗寫不成秦女簫中三四弄吳娘曲裏百千聲今來百草翻紅色今日聽鶯度錦陌誰觧參差逺趂人自傷漂蕩還為客參差漂蕩逐流鶯百變風前斷續生金刀細剪流鶯語依徙春城不忍聽和張夫人拜新月詩拜新月拜月出簾櫳天際分蛾碧花稍觸甲紅拜新月拜月粧䑓側覆斗鉤自懸斜梳墮無力拜新月拜月暗傷悲記得少年時南園同伴侣裙帶一垂垂今看井桐及秋暮燕子西飛鵲東去夜静花堦緑蘚間羞向低低影邉顧冰輪半掩當復明㜑娑桂樹暗中生那能拜得新生兔長與金烏作隊行一本題下有懐友作末那能二句作如何月下紅閨婿歲歲長留木葉城西河集卷一百六十一
