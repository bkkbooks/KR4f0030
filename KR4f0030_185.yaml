body:
  text: 西河集巻一百八十五翰林院檢討毛竒齡撰五言格詩一七夕集兩水亭賦詠成篇金風扇微飈玉律囘迅商良朋遘嘉節言讌君子堂廣厦延樹色敞牗生雲光中㕑敇佳餚肆列圜以方燿􅏲間芍汁挏馬逾蘭漿雄談振林莾能使煩氣涼茲辰度靈匹歴歲旋河梁暗忻蛛網合明見烏鵲翔所愧守恒拙偃蹇無文章何期覿雙儀惠我同七襄生人重高㑹慷慨啣清觴但當保修期終古以為望入史館奉和監修先生赴召柬同館諸公原韻三首隆古重籍氏仰視樞東辰宣尼起嗣之寄志在獲麟前代多政記宛若眉列陳國書過激厲其事反以湮大君秉遐照丙穴觀細鱗美劇嗣元宋安問秦與新一時竸槖筆群䇿堪扶輪如何稽古疎有靦稱史臣愚賈閟寳玉哲匠迷荆榛所恃綸閣暇數晷凡再巡埽翳見白日披巾對高旻追隨蓬山顚灑濯瀛海濱空言啓石室將以傳其人終慚識未優誰得資討論前賢誦崧嶽所重惟生申况當天門高下視羅八垠二有明十七君作聖述亦賢順始復順終遂歴三百年八垓被鴻濛重譯及毳旃斯蹟既已陳所幸留簡編得失炯前鑒開館加窮研勝代雖逺遥相接猶几筵其中升與降疇則相紏䖍實頼司衮學引作庸衆先靈蚪展雲霧蠖蝮方同縁記盛時自速努力咸仔肩何必新唐書修在慶歴前三伊昔致治朝時政早論紀纂列無闕遺一若左右史降此多從諛展轉互相委虛實亦已淆遑問非與是况當革命時舘載乃頓已何期聖代興三恪備中㫖加以春秋法凡例共摩擬司衡既禮絶模楷責下士宛如百車轍相率遵一軌儻云具三長端在集衆美惟恐同異生筆削翻有俟作文無發明徃與穢濫比庶匄監正之三寸竹毫子月蝕詩季秋月丁未望日日將暝太隂在降婁不輯于奎觀維時酉初刻里燭方進薦奉常啓瑶壇糞地以為墠堂槐挺當門遮出白羽扇睥睨仄慝間驟爾丁物變啄齧罹烏喙涎蝕類蟲玩頓令瞻視乖側目不忍睊先王有常箴百執謹天變宗伯統列卿伏地作哀戀靁鼓五十雙轟擊儼鬬戰奔走逮嗇夫禮拜及下賤須臾􅀢雲生掩過十之半明質頗銷鑠魄色雜紺縓餘光射輪出迸裂過飛電相視驚閃動有似金任鍊祗疑齕餳餅中界等絃線地形與日虛兩兩不相劵金牌汎銅盎玉漏瀉銀箭如何哉明時入濁竟不見光復翳漸除災去神已遍君子省諐尤頫首矚河漢秋涼飲酒詩和馮天子韻涼風吹西堂秋日亦灑灑在墅有謝公下坐及裴楷絃誦代絲竹童冠列慧騃高懐浩然興微語渙以解作技任衆長觀塲笑予矮譬彼黄金臺駿骨亦可買况當炎蒸餘暑退氣稍􅀈水潦收前池林花覆高嶰中㕑飭修餚薑韮紛布擺誰道鱸魚鮮此鯉出徒駭暗撫大食刀雙環總精鍇洗燕泥詩和宗元鼎作紅英發新條碧柳啣初稊翩翩雙燕子宛轉覔宿棲雨中啄土梗日出捎牆衣一朝秋風來東西相背飛閒堂張委幔層裀設重緹巢虛易傾危壘仄難扶持常恐墮瑶席落索成汙泥因此感嘆生㩦盤滌櫨枅紅襟罕陳跡翠羽亦虛儀寄言韶華子不潔安可遺遥題雪舫禪師山閣册子用澄園馬居士韻曩予陟三竺一過西林僧朝簾掛石闑晝火圍紗燈云有般若臺𦕈向松間登白雲一囘首相望空層層十年羇京洛􅀈馬如凍蠅史輯今共古抄付掾與承今來住明湖雪舫嘗見稱目為青林馳心與滄海澄生世苦奔渉何年斷紏繩長嘯空巖間谷逺聲自應湖舫陪臧内史喟亭飲次採蓴兼送其還京即席和内史原韻晩春風物和良日恣幽探湖波沲還平隄草綏且蔘蠶老桑葚落雨過鶯語酣入寺問劉逸放鶴尋蘇耽山行幸追隨所至供伏凾霧散雨未接日漏光猶含共言南湖濵芹藻勝䕡庵中有雉尾蓴夏近採摘堪鮮滑取下酒可以資清譚只憐季鷹老我歸猶懷慙拂衣丁暮歲芸局本不勘君方返承明西掖當朝參草詔入禁筦人鑒藉指南豈可蕩兩槳流連向空潭蓴羔未下䜴本性我所諳秋風尚違時嘗恐食不甘去去典書命文富原非貪待君事功成對酒看山嵐題青園廬墓圖有序江闓孝亷圖其父青園公為祖尚寳公廬墓索予以詩孺慕不可已居廬傍泉臺自昔誰最稱王裒蔡伯喈今者青園公哭父如嬰孩負土既已就築室倚樹櫰攀身見枝枯滴泪成土灰吾友孝亷嗣為圖誌餘哀徬徨着草笠手指寒林隈云祖尚寳公千載從此埋丹青有時蝕丘山有時隤惟彼廬墓人天地同昭囘送史上海之任兼示舊明府暨伊兄婁縣滬城傍東溟本屬舊游地良友將之官抱此瓌瑋器舊尹吾故人為治軼俗吏天子嘉其能召取置殿陛棲鸞豈無羣馴雉眞足嗣况君乘風雲天路可坐致黄浦環城闉丹花被庭砌難兄宰婁水相隔祗埤堄此邦羡堂堂繼至有難弟同時府中趨千載生嘆異㩦琴向雲間贈鞭送行騎他時返承明吾友見前事寄無錫吳明府憶昔游延陵常登夫椒山慷慨懷令君高雲相與還就視獲良契茂茂承歡顔飲泉知其清置身東峰間把弄不忍去宛若氷雪寒迄今逾歲月七見山花丹相思寡言訊欲奮無羽翰朅來返梁苑延憇從近闗夫君惠化洽比蔀能相安津亭共車乘壠畝偕盤餐初為典使召星軺起追扳繼為負土行而且卧轍環翟相制未復冦公留多端與民一家人賢哉居是官今茲四征起羽檄紛河干祗恐念方叔徵輦來嘽嘽我本羇旅客中心戀所歡臨風寄微言三覆增長嘆秋夕詩和益都馮夫子韻朝登青綺門暮宿白楊巷為從南郡遊搴帷總成絳雲開逗秋隂雨過揭晩虹夫子鐘鏞姿含響待莛撞勿因宋人愚而棄仲宣戅碧梧嘶涼蟬白露時以降銀河亘長天入地猶淙淙賦得秋菊有佳色康熙甲辰重九雲起閣登高賦也分牌得鹽韻先有律祇複鹽字緒秋敞晴曦百卉揚素纎況有籬間葩芬藹宜幽瞻零露日以下𤣥霜日以嚴佳氣發清姿澹影何襜襜東園啓遐檻列種如抽蒹持杯一相顧遂使歡好兼薌苾乍蒸鬱歌嘯猶遷淹良朋共遊遨秀色時見添綠衣障黄粉碧椀盛紅鹽我欲掇其英把手徒摻摻高天雁初度日暮酒已醃徘徊玩芳華令我思陶濳康熙二十五年予請急歸里自京門赴益都特謁馮相公夫子㳟呈八章每章六韻共九十六句元宰昔秉政降典手闢門舉召遍四郊牧豕來公孫惟時試殿陞誰與廸至尊夫子搜隱逖搆材及髠梱以茲離詭質濫被青黄文晻映匏竹傍顧盻長啣恩啣恩託鈞陶砂礫就廣冶戴崇亦何人乃許食西庌只憐苦飢馳出入貰羸馬但得隨春風摳袂自灑灑有時開褉堂集之萬柳下嬰紱追上辰詠嘆振大雅大雅乆不作姬旦陳農篇何悟復明辟頓返南畝間天子盛嘉賚宸藻紛披宣傾朝餞遙郭作畵標近筵迄今課桑牧偃仰留鄉園鄭公自謝政避客已四年四年懐衮衣時事喟日易門士暨舊僚半作夜臺客伊予本蓬根霜落見孤植逝將請長假還住賀監宅何當感故年擁髻失通徳謂曼殊也從此塵網中坐使鬒髪白白髮閲新序言至萬柳堂觸目憬物移流涕攀條長茂𢎞褉猶在謝傅澤未忘時禽改啁哳清池變滄浪驅車税北海徒步詢鄭鄉所嗟不同㩦豔歌亦何嘗何嘗識東家遙望屈雙跗雲門萬仞間是我感恩處登堂式琴罇入里敬草樹誰昔戀宫牆相訂共樊素曼殊初訂同過益都獨身瞻天星咸嘆泣朝露千秋展斯須四顧謹翔步翔步肅凾丈詩書啓笭箐周游遍廊廡所至皆典型元臣本樂志天語昭上楹賜適上賜詩有元臣樂志年語又名志東山四字印記因以適志堂沈宫詹為書額懸梁間詩鐫儼韋谷花曲勝杜陵時從前村歸不記漁樵名䕫龍在丘壑日夕稱太平太平無窮期景運方逮旦東歸有康成早已受易算高天本寥廓卭首日相見人生非圏豚安敢乆留戀祗懼負師訓無以答宸眷努力崇光景終焉戒游宴寄贈陳山人七十放舟過長泖遙望梅花源皚皚十餘里有如銀濤翻良友徐允哲邀我遊其間揮手不能從至今勞心魂山人頴川後結屋繚土垣讀書博墳索懷寳藏璵璠遺世謝人染觀古究天根有時負杖立獨與趨鯉言梅花正開時栗鹿駕短轅京華埄塵中愛梅過芄蘭廻想下沙浦花開滿丘樊君子畜祕術青芝當朝飱加以抱璞授七十存眞元我欲窺至道卜築申江園慷慨寄一巵聊與志勿諼梅東渚築樓于草堂之北施侍讀題曰滿聽其羣從淵公孝亷首倡二詩書巻命和遂依韻率成續原巻後下直出中禁懷人在東溪豈無逢時交願與靜者期如何鬱儀轡日薄還相羇環山如舂臼入路逶以迤傳聞巖牗上重屋方臨卑虚似撓千空泛若坐百陂所喜朝日麗有鶯啼修楣樓成時有鶯啼于梁以此屬清聽能使神志怡君子畜嘉告同聲寄遙題何當㩦雙柑倚此雲外梯二披圖鮮周游蠟屐用幾兩惟此林間人于焉萃清賞逝將與晨夕浩然學長往詎無臨淵思徒抱結網想一旦𤣥暢成噫氣激疎爽崒嵂森似雲長林坦如掌遽令萬籟鳴雜作衆山響有時秋風生南還重相訪比之剡川賔乘雪鼓兩槳于斯理高吟憑欄且俯仰書簡末寄徽之大敬二兄鳯城新雨餘涼氣襲衣帶濊濊銅溝鳴宛若水下瀨何為坐煩縟宫漏日相待新功令每日赴午門坐班故園松檜間灌莽迷薆薱我有老同硯名者徐與蔡竒文埽人荒高矚出天外投簪願追隨欲去轉留礙長跪作素書飛鴻渺何在送李檢討予養還山招弓下中山葺屨朝上京公車何崔嵬所藉高世名志氣本超卓文藻亦縱横誰言紫閣翁少小無宦情至尊重良㑹召見開延英食以朱貝柈沃以碧筍羔給札令呈藝轢落無弱營因之授册府入署承明庭夏雲方南馳夜火將西傾一旦上省飬孝感動聖明啣軾謝京邑衣錦投鄉程祖帳各􅒆攬反若千里行人生有初服亦欲奠所貞何為坐拘牽閟志徒怦怦二圜鑿不受枘樛枝豈為輻況有終南行白華蔓空谷曾參着兒冠虞氏就養屋渴借桑門𤓰甘懷洞庭橘昔有捧檄生色喜逮親育今我亦何為但指風與木蓬池畜嘉魚得為親釜熟迎養曷不可遽爾返邦族白衣雖改繡披之當萊服碧山張學士當此悔解幞天涼賣漿稀官邸日不足臨朝思貽鞭無馬堪競逐但詠南咳詩雙泪下􅉡􅉡三太華有佳氣乃在龍門山千載啓石室一若通武闗盤岡與繡嶺隱者藏其間況復踵靈異於此産馬班當今居史窚疇職筆與删翳衆多匠手而予猶汗顔維彼粲門子高踞蘭臺端慷慨忽棄置躑躅誰躋攀柱下去一宿撰事留五難有論責韓愈無書報任安新秋坐林薄仰看飛雲還牕通紫微逺户傍太乙寒日月過櫩隙晨夕躬庭餐視此三寸擾何如一日閒予有湖上業灩㶑通周官思以割一曲未敢徼聖懽横門出祖道藉藉皆來觀偭彼前史賢相顧增長嘆為聶晉人題學釣圖吕望不賣漿公子乃垂釣當其投竿時相顧尚年少清姿比晴漪綠髮等秀葽違時起長吟所念在逺道卬首解博衣洗足脱行憿平沙浩茫茫斥略當晩照莕線牽素漚楊葉蔽枯潦豈無臨淵思魚美不可罩因之戀清流挶手把長篠十年行天涯汙漫摩所造乃猶乘下澤㧞輪出泥淖我從長安還將以隨荷蓧每念素心人把臂接林隩逢君明湖來貰酒勸一釂披圖見疇昔展巻助吟眺所嘆俯仰間非復舊時貎花開應重紅綸絶可再絩逝將溯滄浪慷慨發高嘯為家㑹侯題戴笠垂竿圖迢迢新安江上有龍門山君子居其中名滿四海間披懷似錦繡落筆成波瀾結組騁遐軌矯矯不可攀夙昔有男子把釣埀琅玕羊裘澤雲碧龍卧山花殷千載仰高躅何處堪投竿崇臺出天際歴落星辰寒披圖倘能追日暮相往還黄鵠篇出郭有訪留贈黄鵠志千里遙矚青雲端相隔纔咫尺曠若溟海間君子秉高躅守身如璵璠奉簡作良牧所念在民艱煌煌敷奏時乆已䇿治安康衢一以遘幡然却塵寰香山鑿八節將與劉白還赫䂀照林薄徂夏增欝煩清霜戒前塗倐及朔氣寒城西有精舍去作逍遙觀慷慨不得見令我凋朱顔逹人䝿變化金門借泥蟠況當被宣力藉此憂與懽溯洄幸相從俯仰同觀瀾長風自西來肅肅生羽翰九日陪馮夫子登善果寺毘盧閣和韻示同游諸公秋隂敞金陴朝日離羽嶠神都融清光佳節乃游眺司衮請澣歸後乘載同調師門舊簪裾命駕絶呼召㫖酒敕麹封肥炙鵝與犦貽糕作炊彫賜橘代鉶芼但惜金臺傾望古不堪吊此地有寳坊高閣宜晩照憑欄試一觀縱目攬衆妙浮屠鬱崔嵬金碧麗象敎層垣翳松柏隣圃通竹篠西山飛蒼烟空翠相映曜況復鈴塔間烏雀暮來噪故園有黄花被之幹山隩採摘無由通虚憶在逺道詎意侍芳躅丹梯廻能到豈無叅軍狂不用拾烏㡌蓮堂靜坐時宛若陟高峭何當㨿層霄慷慨發長嘯康熙十七年七月二十八日京師地震大厭朝廷下詔修省羣工怵惕予以謹戒之餘竊讀政府作續紀一首和益都夫子韻維歲在已未彛則月將晦京師忽地震廬舍多損壞有聲自西來轟作萬皷攂城壁樓櫓間擣厭若碓磑是時塵坌涌白日飛靉靆揺動及通潞逺過涿鹿界如是三十日岌岌餘硌礙不啻宋渭州四震瓦亭寨天子起修省下詔布罪悔羣工亦憂虞敷奏各創㣻伊予本韋布初進即求退況復職筆札所愧無補乂既鮮京易學誰擅子政解填陰與沴土相習總昧昧但道何物神得撼此大塊憶昔本始年漢世當盛㑹震厭毁皇廟河上警至再詔令内郡國舉若杜飲軰直言能極諫因與陳利害方今復制科茂才鬱繁㑹大廷倘䇿災何以置明對遒人振木鐸惟在謹天戒撫此修輔文永夜不能寐題靈鷲逢僧圖白門烏㡌生丹花駐雙頰尋真向靈峰迤邐看秋葉奚奴負錦囊左臂挂木篋海鶴梳顥毛神駿理壯鬛老僧坐洞中自顧能見睫仰天騐碧甃俯地露灰刼山童報客至徐起支歩屧覿靣若素心忻然笑相接問客從何來飛飛指黄蝶送張邇可還里用韓退之送陸暢南歸韻夫子擅駿業卓犖饒人聞披襟對天安氣辟仗下軍論逹得种暠詞雄比崔羣階前雁羔集户外車轂紛共言天子貴無書禪云云誰為翰林者當此硯欲焚乃者西都賔長懷北山文長夏厭暑雨高天矚流雲京門老同學把袂不忍分感深語方轖義激酒易醺衰年戀鄉邑刺促如蠅蚊何當隨周磐流涕還汝墳方貞靖祠堂雙白松巻子題後昔有軒轅松皜質如傅粉雨實褁霜􅀈數榦合一本其下穴甘液有若禾在囷以茲賚嘉名謂為藐姑坋磅磄與柜格當此俱自損何期數千年貞靖發孤憤峩峩尚書郎秉直如郅惲殺賊志不詘絶食遂甘殞首陽與華池兩兩接車軫居人表忠節祠廟日惟謹階隙樹佳草所以䕶欄楯何者作䕃樾蓬蓯蔽前阪惟時太史園五粒方兆朕移將未拱把纎若織籬槿俯仰甫數載枳句漸囷蠢迄今閲二紀鬱作雲葢偃風雨自崔錯鱗介亦蜿蝘青鸞并黄鵠一一互相引瀏蒞卉歙間號唳儼叩牝斯非徂徠山亦異石門畛蓮城種俱遥衡嶽望斯盡幾見灌河植誰則荷土畚得毋有神物呵之使安穩前賢布徽烈所賴繼衮衮雎鳩得遺式百度見繩準圖畵及詠歌務在令不冺況當蒼虯枝白者等芝菌何易雙雙列裛葉類茂苑貞心不可囘勁節不可挽藉此霜庭柯可以告乆逺許使君詩不唱鳯來曲不歌虎渡詞鳯來㑹有因虎渡將安之我有許使君皎皎神明姿生乘景昌運出應忠良期生民賴保障庶服膺藩維分節守外閫巡軍付中司初控五馬行既展雙旌馳心明比冰鑑道直如朱絲化物凜三異介徳凜四知褰帷問疾苦振槖哀惸嫠逺近各有望上下兩不疑方其守越州適遘張王師調士減虎竹行陣祛魚麗順者既懷徳頑者亦畏威一朝秉憲鉞盗賊不敢窺隣郡假敉剔此邦藉安危惟余本鯫生溉澤叨恩私僵魂起榮拂枯骨生華滋俚歌雜謠諺未得展素思但望峴山顚泪下如綆縻西河集巻一百八十五
