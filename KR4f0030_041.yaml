body:
  text: 西河集卷四十一翰林院檢討毛奇齡撰序十八張御史奏疏稿序三韓張御史以言事得罪出為杭州府録事參軍杭之人自達官長者下及士庶無不以御史稱之乃御史深自貶抑居官極拘檢甘處卑下每相見言論卒未嘗有骯􅗣之氣見于容色第公家事了私取生平入告者閉閣思過而其嗣君孝思竊次第其稿且過豫而請豫為序古者言官焚諫草今臺垣去職必鏤疏一本以誇其平日嘉謨之告類乎自衒況御史以科目起家蒙世祖皇帝厠之侍衛更厯曹員而皇上則又加之以非常之目拔擢之而置之南牀之首此其入告當必有大異于今之喁喁者而乃編次殘文下同庸衆此何説哉日此則御史之所為補過者也御史以為聖朝無闕在乘輿左右曾何足容吾拜揚則已所至無可諱之言況前代疏出懷袖不聞近侍而今則每一疏下即發諸科抄以遍示海內吾即不言天下未嘗不知也且也歷代人主厭親章奏即五日一御宫門不過令女官輪直一唱念詞頭已耳就其中揀擇驗黃百不一二而皇上日且負扆甲納而乙出大小詞摺悉經睿覽然且日左右詢若成誦者則亦何一不由宸斷而尚容以出納嫌疑過為祕謐不惟是也凡御史之所以再三毁棄不敢示人者亦曰有得罪之言在也夫善則歸君惡擅美也過則歸已慮委咎也向之袖奏焚草兢兢是飭者惟恐從容入告不能順外即有內降亦曰非我莫能為耳若夫得罪之言正其過也過當歸已而御史不諱其過以存其言其嗣君即又不諱父之言以善承其過則是此一稿而御史補過之忠與御史之子幹父之過之孝盡在乎是而又何時俗之可比視焉戴隱居九十壽序間嘗應世為雜文諸體什二而序什之八即他序什二而壽序什之八故當未赴都時禁勿為序而豫假以來則尤禁勿為壽序然而壽序雖多大抵在六十七十之間八十亦罕矣至九十則生平詘指無幾故每因罕見而稽之古人則自衛武伏勝而外無聞焉隱居戴翁以新安名族來居武林其門閥之大篸裾之富不待言也獨是翁生舊朝正丁神宗極盛之時每以英齡睥睨士林雖屐席嘗下人而意氣直上其説經談禮往往登大傅之堂而奪侍中之坐當其時稱少成者必推之乃閲歷數朝更身逢聖世以逵顒之才而務為髙隱植林開澗弄孫課子者亦復多年而逮今以九十聞夫生年滿百但指大概而壽竒者不以限故既臻耄耋則來日未嘗短而去日實長榮啓期曰生有不見日月者而吾臻九十豈非樂哉乃以翁遭逢子姓繞膝姻婭滿門其捧賜絮而上珍膳者皆不足引為翁慶而惟是稱觴之頃回想誰昔凡夫所歷之山川城郭朝野風物因革興廢一如麻姑所云揚塵于蓬萊而藝桑于滄海者銜巵扶几從容而道之此亦生人之一大快也朝廷重髙年之典尊崇憲乞將必聆其名而咨以政者几杖之錫于是乎始矣抑又聞之大年在躬必多問學故獻也而文因之考之武公九十力學成聖而伏勝以九十授尚書于太子家令翁擁書萬卷手自纂輯往往稽稗野釋掌故宵燭尺寸尚書作毫端細字為之評隲而家訓之餘益復著格言勸善諸録以為世警其問學何如也豫生平序壽上壽最鮮而頃為楊郡丞慈親作九十序今又以壽翁即一月間而得兩序大壽以附文于末何其幸乎況百年從此臻與平臺灣記序從來不世之功必藉大文以傳之虎之詩長舅之銘韓吏部之碑皆是也獨是循蜚以還不臣海邦幅員雖長漸被有限而本朝于四征之餘凡衣麛餐兕雕膺畫顙之族無不臣伏祗此海中孤島從古未經奉耕犁者而戈船所屆即驅除而版籍之然且逋逃四世由明季迄今僭妄自大舉前代孫盧陳彭鼂興暮蔑者且偷安因循至七八十年之間乃一旦破彭湖搗臺灣由銅山花嶼抵將軍大嶴乘潮而入斬將奪柵燔其井而瀦其穴海外一方重申弔伐自辰至戍揮數世積逋之冦而平于七日之內何其捷也然則廟算之神與師武臣之力其所宜鋪張而誦揚者豈顧問哉惟是壬戌春奏凱京師天子親御端門受俘獻馘其時侍班諸臣徒槖筆立左右不能歌咏其事以嬗于將來但記諸起居為聖朝實録採擇而倪君殿侯親歷行間目睹旌竿之所及辟易潮汐且身當炮石復能摩盾吮矢以志其始末今讀其文不啻陳琳之草檄而韋臯之紀功也則是廟謨雖大有載事而德益彰版宇雖寬得頌言而績彌顯斯文果傳其有裨于聖世者豈淺鮮也殿侯既以其文上之將軍將勒石海濵而復録其兼本以示世因次其篇帙而屬豫為序謹序西湖倡和詩序康熙草八年三月吳門顧迂客伯仲偕依園諸子來西湖時隄水初漲樹與草皆改新葉山容之開閉于雨晴之間者日再易會張太史毅文自淮至家明府會侯自睦州至迂客故好客早已偕錢唐諸子若吳君寶崖許君莘野輩為文酒會至是豪飲窮山水之勝凡飲十晝夜不輟夫以良時如晚春勝地如湖髙朋佳客相遇如迂客諸子豪飲不可已如此晝夜凡有一于是皆宜有詩而兹且兼之其彼唱此和而裒然成集固其宜也獨是迂客非酒人其家有名園今人所稱依園者其花竹丘澗甲于吳會其伯仲以才名致天下士車轍滿戶外而獨于此地且一再至流連文酒間往來送迎豈此鄉人士獨與迂客有殊契與曩時十郡大會當章皇帝時考鐘伐鼓極交遊之盛今歇絶不可再矣所幸翠華省方駐蹕此湖凡樓觀之望幸草石之被顧者稍有生色或可以助登臨之興而豫復臥病乃不得一與良會以自厠于負囊挈榼之末然且讀其詩而為之序之寧無愧與鄭彥升棣蕚樓詞序唐宋樂府本于隋時分宫調者大概以二十四調之律增減為法故詩餘舊譜原有稱黃鐘宫黃鐘商者不止小令長調分部曲名也然而詩餘初起在中晚唐之間其時樂工正盛尚能按歌而大晟樂録自秦周以前多中聲律故其詞雅馴南渡以後詞人爭為拗劣偃蹇兀奡璅屑扢抐以為竒然而樂府徴歌則從此多濶絶焉鄭子彥升與其伯仲並馳聲藝林既以詩古文辭爭長海內復出其餘技為棣蕚樓詞嘗展誦之芳妍秀綺沖瀜涵雅如赤城之披霞與蜀江之濯錦即比之竇羣之聨珠義山之花蕚鮮有遜者豫夙諳聲律近從先大夫遺志著為樂録正將按五聲二變七始九宫十二管之法編釋成書而細繹兹詞正與聲律幼眇互相闡揚則謂棣蕚樓詞直接大晟而上之其亦可也王明府季試文序朝廷設科取士三載論秀以簡于春官然後䇿試而用之要其初則黨庠酇遂其載事也曩時文翁興教原以吏治兼學術而其後政教攸分各有専典然猶郡縣較季與司教課月督學考歲相表裏蓋鑒迪精良進升有藉學臣之責也比按其生平時擩而月染之郡縣長人者之事也衡麓王君以楚黃名宿出宰仁和明庭固非百里才然且行省煩賾凡夫簿書之紛紜獄市之稠雜戶版稽核徴調去留之糾錯與夫上官客使都亭廨舍芻茭畜牧監燎監濯之猥璅即朝暮刯劃矻矻不暇給而乃車茵乍暖即屢進邑之賢良文學而咨詢之以為臨安都會本人才輻輳之地萟林華府爭長海內當此聖天子右文之世而不以文治何以善政于是出其冰鑑搜網剔抉覺明珠在淵有似手拾崑山之石不揚而剖第就其所已録者而諦觀之一若樽俎之陳筵而楩柟之列肆雖風會不齊而度量所及歸于醇一即或起昌黎而袪繁縟出廬陵以斥軋茁不是過也夫丘壤師山百川學海凡事有本故仲路為政告之身先況文章模楷必有宗工為範圍而君以兩湖名魁其經書墨義海內爭誦之為舉文之式迄于今若干年矣鞅掌所及尚能洋洋澔澔筆落而章成比之注水之穿錢彈丸之脫手極下帷穴硯之工而悉莫之及以之矩矱多士而多士宗之未見虎魄受腐芥磁石收惡針也所謂有本者如是也然則君之為政可推已髙學士花源草堂圖序宫詹學士髙君以侍從入直禁廷者十餘年會天子觀河南巡躬禱禹廟學士仍得叨扈從之班託之陪乘以暫還故鄉皇上乃于問俗之隙命減羽騎幸學士山莊俗所稱河渚間者上顧欣悅乃親灑宸翰書竹窗二字以賜之真異數也前此學士先贈公曾授生徒講學河渚間而其先數世有菊澗公者以林湖巨室著書于葛嶺之陽與河渚近學士少習其地猶能記童時往來遊釣之所而有懷靡及嘗扈從松亭上命學士登盤山之巔任其幽探以慰其丘壑之念學士因為記記之其流連慨慷未嘗不嘆夫遂初之可懷而君恩之難遽釋也今供奉日久毋論里桑社井榮枯匪昔而即其河渚往來登臨劉覽之迹略無可驗徒以丘樊未改稍理其竹間數楹留以為他日休沐之地植花種魚猶尚有待而萬乘之尊早已幸臨而惠貺之固屬非分然且乘輿既還追憶前事其所賜詩復有花源路幾重句拜賡之下詠嘆感激夫以河渚之間梅花十里其間長汀枉渚一往迤邐真不啻有武陵桃源之目乃睿題所及覺山川草木爛然生色因供宸翰于其堂而復取花源二字為斯堂名兼購畫工為之圖以傳之不朽吾聞草堂居士營陜河之東竹樹泉石稍有可觀而宋宗還祀汾隂召見不出詔圖所居以寵之今學士身居禁近日在蓬山瑤島間煙霞錮癖未嘗或間所謂夔龍在側無異巢由者而聖情眷戀猶且幸其地而為之詠歌嗟乎以視彼巖居圖畫者何等也王君慎齋詩集序人之為詩比之大樂之吹􅩁工師之斫杗杙大抵深心厚謀往往竭蹶于禔躬治世之所為偶出其餘技以為詠言亦或殫心著作髙文典册連纍乎筆札間為短章雜什以簡括其志意故詩者弛也弛其所有事也詩者貰也貰其散者而使之專貰其煩者而使之簡也顧人而不為詩也人而為詩則好見其技一篇短幅促易以示世二夫謳吟諷嘆初亦何足以自異而大事未就則姑出此以為可見之具三是故人之為詩者不為不多而人之自鏤其詩以求衒于世即不必不少王君不然王君以文章自命其考求經學裒然稱著作之林自馬融盧植以下代有模楷然且才力敏練急出其學問之氣以與世相周旋凡國家大事兵農禮樂以及錢刀醯醢之細無不經營貫串洞析源委然後轉見諸行事自對䇿大廷驅車江表綰銅結綬以致身于社稷民人之間于楚于豫皆是也然則其為詩特偶然耳然而詩之工舂容雋永功圜而思健往往語隨興驅而勢逐情起所謂茂先得其清景陽振其雅者是亦何難出其緒餘以遽見于世而乃藏之篋笥顏曰詩存蓋以為凡吾所見有大于此者而不在此區區之間也今慎齋以居官逝矣豫歸田有年一時孝子有刻其先公遺集而屬豫序者兩人一俞君友薇一王君孝先也夫友薇先公早年以文章經術縱橫萟林其試仕百里稍展驥足與慎齋等而齎志以殁乃兩家孝子皆能舉于鄉以繼夫先人之業而孝先復能搜討遺文與友薇相繼以後先嬗世一似手澤杯棬之不可釋者夫孝先孝思固不可及然而慎齋之不弛其事亦可驗矣夫慎齋豈甘以文章自貰者耶淩生詩序當明崇禎間訪友來杭人士􅀢􅀢多以藝文相往來每通刺後必出所鐫文互相質詢顧未嘗及於詩也即偶以詩及之必謝去然而其詩工焉既則棄舉文習為歌詩西泠詩遂行人間然其詩猶工今則為舉文與為詩者相半間或為舉文不利益復為詩歌以攄其不甘之心於是詩之數每多於文而詩反不工何也夫詩弗易為也唐以詩進士猶舉文也然而工者少即山人木客尊師上人終身絶仕進刻意為此而自唐迄今傳者罕有夫生人才質有限即工力歲月亦復有素而以舉文之餘汲汲為此縱使講求嚴峻望而却足猶恐以慢易為之而近之為詩者便於荒陋可以不才不力不汲汲歲月即日習舉文而可以餘工為詩以為詩固有時近之為時者如是焉爾而於是為詩者愈多而詩愈亡淩生繼滄有家學其尊人鑑含君以舉文解京師有名繼滄繼之不獨舉文佳勝早能以試事爭長萟林即為詩亦輒矜慎不輕於下字嘗持詩過余反復裁酌若有不超於挽近不止者其為詩豈可量也淩生將以詩刲木而索豫為序因序之而并論其詩之不易為也有若此李使君修復郡治城郭壇廟館廨麗譙諸碑記序古者以京朝為右凡內舉不得皆謂之一麾之出而其後位重親民往往擇京朝偉仕為名都主因有以相國之尊乞居外郡者世所謂千里之師一州之表任甚重也三韓李使君以從龍世胄暫紆邦紱其在先朝曾有以寧前巨鎮作萬里長城彪炳史册而奕葉以後其以元勳受帶礪之盟者亦復不少使君以三省儀同之子束髮入仕即以尚書郎受知天子簡畀斯任宜其驕貴自暇不習民艱而使君自下車以來飲冰齕蓼晨蓋而晦轍程石計簿瞬息而斷惟日以小民疾苦經營胸臆雖世濟之裔原有中外治譜相嬗勿替然非使君之神明智計實有以周知之不至此夫郡事之骫廢久矣自居官者以所歷為傳舍而一二因循之長又復市名飾貌動不關心誰則墜是修而骫是飭而使君則勤勤咨詢孰者當舉孰者當廢迄于今其為振興而可紀者比比也夫妥神祇祠賢哲惠賔客謹候望興學砥材平庭息獄以至觀雲察物立防通堰此皆為政所尤重而使君皆有以舉之然且自抒其意布之詞而勒之石百年因革班班如也至其志記之詳明情文之闓切懋于行者粹于言又無論已今夫賈父治洛刻石伊闕記其事也羊公之碑過峴而泣則又思其恩也使君之治行實不勝書而愛民之情每有超于記之外者近以八州澤國痌念水災于救恤捍禦之餘見洪流湯湯仰天而泣夫秦越肥瘠誰為膚受而觸目而憬于心則其極力拯援者何所不至然則使君之可紀豈惟是矣趙管亭涉波詩序管亭詩褰英攬秀時露騷屑故其任潭州司馬當橘頌之地京師同志咸謂其才與地值應必有涉江憑弔諸作而政紀瑟密悉志時事間為嶽麓諸志與邦賢登臨詠嘯屢見篇帙他不漫及蓋其胸藴經術務期有用一旦見諸實事遂紛綸揮霍盡其解剝而後微言以見意此載石既行所以有涉波之作與施侍讀嘗言越人為詩能不囿于俗謂明不襲文長宋不襲務觀與世之惑挽近之説者有别今管亭千騎將臨雲間此地為文章林囿當三吳靡然每趨逾下之際而此地靈光巋然獨存雖他時政事其煩賾必百倍疇昔而公家事了出與諸越布佳人談議風雅振起隤俗詎不甚快然則涉波亦先聲也重修笑隱庵募簿序笑隱庵在清波門外相傳古法喜院地而與學士港為鄰居人每種花港間西湖十景所稱花港觀魚者即此地也國朝初年已廢院為錢氏湖莊而陳君太蜚以禱嗣而購復之仍名笑隱有年矣康熙丁卯豫歸田之後訪奕公和尚于其中見殿堂水閣四顧軒豁頗足棲息而窗戶脫落欄楯欹缺不無鳥鼠風雨之憾因嘆是地修復本有時數乃不轉瞬間而遽至于是劫灰咫尺可念也及再過三過則綢繆不早將有不可搘拄者奕公憂之思重加整葺而謁豫以疏豫思近遭嵗飢四民俱乏財孰能舍其所無餘而急人之所不足顧為事在人事果可為則必有一二人焉起而任之當順治之末戎馬甫靖瘡割尚未復陳君合鄉之善信創為是業而院無宿糧薪蘇顆粒皆給之于外奕公以太白宗傳息居此地未嘗以瓶鉢乞假道路而姚君斐成為之力營供養等之月進迄于今其運以芻而繼以粟者縷縷也世不乏善信豈無嗣兩君而興者夫陵谷之難問久矣湖山如故而興廢相尋曩時清波湧金二門皆豫郡名園若所稱祁中丞商太傅别業燈火笙歌不絶晝夜而今已盡為馬塍菜隴披離煙水間天下事成之難而毁之易祗此區區笑隱聊以存湖山萬劫之一而猶忍坐視其廢而不之救吾恐有心斯世者必不出此西河集卷四十一
