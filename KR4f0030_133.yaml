body:
  text: 西河集卷一百三十三翰林院檢討毛竒齡撰填詞三小令十六字令近調宜列賦題但本稿多不列今不敢增入後倣此花下影跟人上玉墀誰推倒橫著半氊兒搗練子青草軟緑波長日暮鄉關思渺茫吳苑隋堤何處是滿江垂栁又垂楊前調泊山塘作雲淡淡雨絲絲舊日真娘何處祠橫笛短簫聲漸逺藕花塘子夜來時夢江南當緩緩歸曲妃埈曰按吳越王妃每歲歸臨安王遺書云陌上花開可緩緩歸矣吳人用其語為歌凄然又蘇子瞻有緩緩歸曲然用清平調引與此異臨安去陌上已開花扇影似翻江上羽車簾剛拂草頭沙緩緩好歸家其二臨安去陌上已花開繞路煙絲籠暖去清江日影帶潮回緩緩好歸來法駕導引送一苓和尚還羅浮江帆暮江帆暮六月水西頭竹子牽來黃蛤履荷花泛去白螺舟送汝返羅浮憶王孫東風吹栁覆金堤爽岸紅樓望去迷日映遊絲捲幔低畫橋西一樹嬌花鳥自啼前調遊西施山西施歌館舊城東畫棟朱欄映碧空花絮隂隂趂晚風翠重重石上胭脂墮雨紅翦半舊無此曲疑分一翦梅之半故名光宅坊前十字街桃子花開杏子花開鈿頭櫟子有人猜恐是銅叉不是金叉其二縛竹纎纎似女腰欲上溪橋怕上溪橋黑雲遮住北山坳昨日風潮今日風潮其三木槲花間乳鵲栖鵲也能飛花也能飛臨行空記草花期二月當歸三月當歸長相思泛舟西江即事一橋低兩橋低棗樹灣頭西復西江深雨欲迷早烏啼晚烏啼兩槳歸來烏未棲相逢半路溪前調雙頭叉獨頭叉一樣金鵝兩樣排叉梁起四臺烏帽來白帽來湖就磯頭望幾回菖蒲花未開點絳唇送春惱殺啼鵑逢人還道春歸去留人不住誰要留春住花絮茫茫萬點愁人緒歸何處春歸無路莫是人歸路前調薑亦輿汝長庚邀聽琵琶抱出檀槽金絲撥子輕輕落淺圍羅幕月上欄杆角夜半嘈嘈繁手驚相錯敲銀索夢回粧閣花底飛烏鵲前調采蓮曲南浦風微畫橈已到深深處藕花遮住不許穿花去隔藕叢叢似有人言語難尋泝亂紅無主一望斜陽暮相見歡倚牀還繡芙蓉對花叢牽得絲絲栁線翠煙籠愁思逺拋金翦唾殘絨羞煞鴛鴦銜去一絲紅前調花前顧影鄰鄰水中人水面殘花片片繞人身私自整紅斜領茜兒巾却訝領間巾裏刺花新前調懷人秋風嫋嫋登臺強徘徊兩兩鴛鴦飛去幾時回錢塘路西陵渡總天涯不是蚤潮又是晚潮來霜天曉角同丁大聲史窗臣徐徽之蔡大敬來成夫登望京門樓平沙十里滚滚江潮水橫下秋鷹如削短草岸朔風起欄杆人共倚舊關何處是記得西施去路殘陽外碧煙裏前調曉起栁煙如織病起逢寒食昨夜東風吹緊花梢上雨來急曉開銅鏡立鏡光涵曉色驚見濃雲堆下梨花月一輪白醜奴兒令妓席送酒玉瓶春暖酴醾淺艷殺青哥窄袖摩挲蚤把空杯弄鈿螺擎來誤濕雙條脫重瀉金波斜對銀河唱罷甘州奈若何前調珠繩初絓銀河瀉花滿中庭露滿中庭懶向庭前看月明山屏幾褶孤眠久夢也難憑醒也難憑翻願今宵夢不成減字木蘭花桑婦詞城南暮雨尚有採桑秦氏女低繫桑籠獨倚桃花一樹紅青驄西去口裏銜絲銜不住歸到燈前一任三眠與四眠前調同薑八孝亷有訪陸公祠畔十里橫塘行未半花港深深王四娘家何處尋醁醅初注又是孝亷船欲去怕照菱花對面分明又一家卜算子小鳥踏花枝花落如紅霰花樹朦朧一徑迷中有佳人面愁見落花多欲去還留戀扇子盛來仔細看點點桃花片前調門外緑楊堤門裏紅粧女何處金羈美少年故綰垂楊縷風起攪楊花飛作廉纎雨眼底迷迷不見人且聽黃鸝語阮郎歸春暮櫻桃子熟竹初肥南園晝啓遲蜂房濾粉暗成脾畫垣生緑衣蒲雨漲栁橋低鞦韆深院迷杜鵑啼歇最髙枝有人還未歸前調秋暮見曉粧者拒霜花發傍粧樓樓前細水流隔花初日上簾鈎美人樓上頭開碧篋瀉紅油鏡邊長坐愁鴛鴦瓦熱露華浮玉叉寒未抽浣溪沙和任二王俌回環韻隂栁垂庭山枕斜禽鳴自上檻邊花深屏午夢隔窗紗甕啓氷牙蛆瀉酒襟披雪眼蟹瀠茶臨粧晚掃淡黃鴉回前斜枕山庭垂栁隂花邊檻上自鳴禽紗窗隔夢午屏深酒瀉蛆牙氷啓甕茶瀠蟹眼雪披襟鴉黃淡掃晚粧臨武陵春登仙桃山溪口桃花紅欲暮淺水泛胡麻行盡空林散紫霞來到上清家縹眇香壇松飯熟石鼎醉丹砂歸路殘陽噪晚鴉回首亂雲遮菩薩蠻即事花前鼓瑟花間聽紅燈低照新粧靚侍婢喚行雲髙唐曾見君玉籠香霧繞怕見青銅曉井上轆轤聲翻教睡畫屏前調咏枕和友珊瑚鏤枕珠闐細盤雲散澤香衣膩枯壓鬢邊花花紅印一些與誰同轉側繡出雙鸂鶒將枕付陳思陳思思不思其二嘉文小褁雙絲紐單窩認得孤眠久淚浥口脂融相逢一夢中花函遮短帔中有相思字銀燭夜來新深憐抱枕人前調商霖臣納姬溝頭流水山頭雪春江幾度迎桃葉桃葉渡江來江花兩岸開珍珠量幾斛買得雙蛾緑衫子緑于蛾雙蛾奈緑何前調為楊生催粧者多見紙落緣上官知書也最後弟子周風逺索甡和詞丹楓葉葉迎春小錦茵開處香鸞繞銀扇隔雕櫳燈花百子紅櫩前烏鵲曙休遣催粧去賦得夜來珠昭容攬鏡餘其二雕籃細壓花毬小金箱疊鎖蛛絲繞畫燭滿簾櫳雙樽琥珀紅芙蓉清漏曙曉鳯銜煙去慢撒帳頭珠香奩貯有餘前調顛倒韻伯兄大千姪阿蓮同作藥欄勾墮銜叉雀雀叉銜墮勾欄藥花落畫屏紗紗屏畫落花曉山關堆繞繞堆關山曉人逺惜殘春春殘惜逺人其二軟鋪銅甃飛紅淺淺紅飛甃銅鋪軟深巷栁搖金金搖栁巷深爚篝香霧薄薄霧香篝爚門掩半黃昏昏黃半掩門其三去春三鳥栖來曙曙來栖鳥三春去邊塞絶秋千千秋絶塞邊錯彈哀抵角角抵哀彈錯樓倚謝娘秋秋娘謝倚樓其四井幹雙斷金絲綆綆絲金斷雙幹井城上響啼鶯鶯啼響上城綺園南去騎騎去南園綺遲日墜鳴機機鳴墜日遲其五簸錢金壓花裙唾唾裙花壓金錢簸斜日鬬鈿車車鈿鬬日斜酒胡雕列缶缶列雕胡酒孤燭醉當罏罏當醉燭孤其六尉香沉斗珠繩屈屈繩珠斗沉香尉花鴨睡籠紗紗籠睡鴨花減絲荷漏淺淺漏荷絲減長夜好難量量難好夜長其七燭槃深影春􅀈曲曲􅀈春影深槃燭迷路入花溪溪花入路迷枕函空覆錦錦覆空函枕遮莫苦棲鴉鴉棲苦莫遮其八刺桐花滿髙橋寺寺橋髙滿花桐刺魂斷幾家村村家幾斷魂去騧嘶落絮絮落嘶騧去娘度夜中霜霜中夜度娘其九小姑村映青溪曉曉溪青映村姑小家是就磯斜斜磯就是家返舟蓮棹逺逺棹蓮舟返儂識舊娃宫宫娃舊識儂其十寄友上潮春漲西陵望望陵西漲春潮上寒雨渡來難難來渡雨寒燕泥銜斷檻檻斷銜泥燕時苦作蠶絲絲蠶作苦時其十一訪所歡作路旁廂板烏椑樹樹椑烏板廂旁路尋處甚隂隂隂隂甚處尋縷絲千點雨雨點千絲縷何若别情多多情别若何其十二落帆亭送女士黃皆令逺行窄帆輕落亭前驛驛前亭落輕帆窄紅露浥花襱襱花浥露紅渡淮臨雨暮暮雨臨淮渡長過莫愁鄉鄉愁莫過長攤破浣溪紗懷張七雛隱粵東未歸黃木灣前蘆堆稀琵琶洲畔竹花飛南去陸郎煙瘴裏幾時歸翠鳥羽長臨鏡逺章魚海濶跳波微看到木棉紅又白好裝衣少年遊過陵下感舊當時邂逅凌家山下桃樹滿前津今來又值桃花開後不見那時人香輪翠幕陵前路日影動飛塵流水橫斜鳥啼哀怨愁對武陵春南柯子鬬草詞喜摘唯紅豆難攀是白榆百花亭外展氍毹藏得宜男臨賽又踟蹰綃帕牽藤刺緗幱褁露珠朦朧却把翠鈿輸暗揀花枝插補鬢邊虛前調和楊王客賦得玲瓏隔窗語青漆垂銀鑰丹紗映玉櫳隔窗嬌立小芙蓉兩地分明細語一燈紅好鳥音初剪幽蘭氣轉濃相看枉自喚玲瓏一寸明螺槅子萬重峰前調落花粉蕊飄來薄紅英落處稀一團并作屐頭泥却是桃花飛過李花飛殘粉留青蒂零紅斷碧枝落花那辨蚤和遲空自曉風吹了晚風吹前調飲龔氏梧子叢臺敞荷香小幕開氷漿雪瀣滿樽罍時見梁間雙燕自飛回覆草傳螺碗藏鉤覓墜叉閨中栁絮謝家才妬煞王郎私遣隔簾猜鷓鴣天絳帳迢迢結作雲東風吹皺石榴紋芙蓉弄色調金粉蛺蝶尋雙認繡裙花羃䍥思紛紜遊車歸去日斜曛不知唱得難忘曲十二叉邊若箇聞前調過女教場有感銀甲雕戈小隊工內家宣敕教從戎山蘿覆鏃縈金細野火燒旗閃幔紅宫月靜陳雲空鳯凰山下抱龍弓珠兜玉靸團營路小雨寒花何處逢前調賦得鴛鴦沙路逺翠鬛紅翹金跖低藕花多處一汀迷誰憐比翼琴臺瓦枉織雙絲錦字機銀埒逺玉塘稀天長海濶幾時歸相離只解相思死那解相思未死時其二蓼浦蘭江隔逺涔彩毛飛去信音沈十三絃上鎪金柱二八􅡹頭琢玉簮無處覔好難尋空留雙影繡羅衾幾回欲向沙頭路到得沙頭路轉深玉樓春薑汝髙公子迎婚武林梅花開滿清江路北府夜涼新􅚫度誰開扇上五明羅只挂燈前九子璐西陵水削回潮暮雙盞乍傳天欲曙開元新賜小金錢撒在帳中無覔處前調八月宿薑真源憲使後院夜飲同小農汝旦作紅蕖小幕開深檻微雨乍收涼漏淺酒淹罏火帶霜吹風攪燭油和熖翦銀船交泛明河轉玉樹當軒共婉孌夜深空憶廣陵濤水繞曲江知近逺前調題詩緯有敘乃若金箱填字逺過縹囊鏤管成文勿需黛碗秋金懷寶針之篇晨鏡挂玉臺之咏則有寄旨蒲生興情紈素藏明月于篋笥之中望悲風于枲麻之末雖或華叉曜首難間兩思澀布縫衣徒傷十指誠哉托纍歎以敘情惟導揚之撫志者矣夫隂陽麗居玄黃以間竒偶環生鍾吕惟錯故物情以抒播而相宣幽思緣咏謡而就闡曩者嵞山嬌女創始南音於越小君實憐西往周官諧淑女之章尹姞重都人之什則夫學士稱詩不疑備録閨中揚誦能無軼音洎乎偼妤嗣徽於有漢令暉振藻于齊代鳥聽三妹未誤吹桃蘭偶二媛不生上葉縱左兒金草數樹遺馨陶氏鈿筝幾行斷線亦且修肴扶寸而成味繭絲雜組以為色况復盤中屈曲刀尺所未傳錦上回環機絞所難及以至翾風多仙去之思著日起忘歸之樂即新聲苦耳子夜歌來舊地驚心陽春看去妓童且戀其金鈿嫂婢竟摷夫團扇沙門留少婦色比苕華湘岸送嬰兒號為蘭杜斯亦叢􅝸所難遺稇䆄之必備也且夫古之稱採托者豈徒摫長飾孑周流美好云爾哉蓋將以離合衆多區别偷妙而善用其所至優也雜花非一色而皆釀于目紛割非一味而皆蕩于齒故混絲匏于條貫之會則扭矣列黼畫于纂組之班則殽矣故夫曩帙既備搜討易為功近載未詳賓陳難為力茍其故杼之纒綿自必殘絲之紹屬然而空織無緯求匹自難絲子未生春蠶已化當日婉兒選士帳殿珠飛惠姬授書藜屏火爟加以婦功而受婦絲則絣絽不失其文以女士而作女誡則窈窕不傷其體矧玉映嗣本中郎家餘鮑照紅吟未斷還傳靧面之詞緑篋堪留實儲傷心之句曾攬珮纕于澧外已散珠唾于雲間則其堇銅照物鏡裏花開魏尺量衣燈前錦爛紅蛾著樹必當收園客之絲綺瑟停歌誰謂減嫘妃之鑷哉吳山曉閣粧螺子山木倒開蠻鏡裏筆牀間寫竹衣紅書帶自垂藤菜紫機頭小軸穿花綺纂就散絲盈絡緯秋波千頃照芙蓉無數綵雲江畔起虞美人九日蠡城遇雨龍山秋曙官亭冷煙鎖茱茰井西風吹雨雁南來何處還登戲馬宋公臺美人壚下桑郎熟細把金錢菊遼東皂帽墮堪傷不道滿城風雨又重陽前調廣陵李宗伯寓觀女劇作蕪城新曲勾欄淺覆地氍毹軟小蠻金管雪兒筝二十四橋明月照人醒三朝不作銜書鳯但舞江南弄曉風散去彩雲愁可是竹西歌吹舊揚州前調喜來我平歸自江右寄詩并詢徐大文張祖望吳雲章消息布帆婀娜江州至貽我相思字懷中一日九開看記得舊時風雨夜闌干潮平若泛西陵渡須把滕王賦南州榻冷劎城涼借問延陵何日下南昌前調寄懷鄒訏士宫鶯細囀皇州路花暖金盤露春風扈從賦長楊䇿馬歸來重醉酒壚傍錢塘五月氷壺曉别館新荷小瑶辭百幅重南金思煞梁園客子到如今西河集卷一百三十三
