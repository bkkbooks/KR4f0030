body:
  text: 西河集巻一百二十四翰林院檢討毛竒齡撰禁室女守志殉死文自古無室女未嫁而夫死守志之禮即列代典制所以褒揚婦節者亦並無室女未嫁而守志被旌之例則直是先聖之禮後王之制兩所不許者况六經二十一史諸子百氏及名人文集可為學士大夫所稱道者亦並無此等祗樂府有貞女引琴曲有處女吟前此作樂録與古今註者皆云魯室女作然亦並無守志事且亦小説家言不足據又且貞女即貞婦如鮑蘇妻稱鮑女宗者是此既違禮又畔制又為主持名教端風勵俗者所不道且又循蜚以來下至宋元百千萬年所不必有之人之事而不謂近世好異比肩接踵且愈出愈奇而未有已也少與蔡子伯遊見其族姑有未嫁夫死而守于室者年已五十矣未能旌也袛匄學士大夫以詩文旌之而世多未應惟子伯重族誼兼念姑祖龍池公以名進士為推官有聲而姑之夫則父與伯叔父皆狀元進士或殉死或守義如所稱余忠文先生兄弟者以故子伯強作詩而予亦依回從之以致後之索詩文者遂不能絶然未能破旌例也既而諸暨孟氏以先世孟女屬傳謂女名藴在洪武初為同邑蔣文旭所聘文旭年十七為監察御史請歸親迎值陳時政十二事中有暱戚殺平民一條忤㫖賜死女哭告父謂文旭既親迎有吉日禮應往弔不許又謂文旭死其父母無子請往事舅姑又不許乃瞷柩過門躍出隨之俟舅姑亡後仍歸室築一樓以居名柏樓比柏舟也時請旌不得厯洪武永樂洪熙至宣徳六年而始旌之雖已破典例而仍不為例予念文旭賢死事可感縱傍人猶憐之以通名之婦而與之齊一亦復何過又且請命歸娶事聞朝廷告母往弔早有吉日因為之作傳即後入史館作明史列女傳亦力持其説即以此傳入史傳中曰雖非禮已有例矣當是時予論列侃侃内省無媿顧甞自忖曰表章太過得母有效尤而起竟破其例為論列罪者乃未幾而果有仁和計二姑事二姑許同里陳桓為妻桓以貧從軍于康熙甲寅隨總制姚公征閩海而身没于陣姑過桓家親為操作且絡絲糊錫日取傭值以養桓二親逮老死杭府縣屬遂有據孟女柏樓明史立傳已事請特創旌例以擴典制即當事亦以此上之雖廷議破例而終不為例然亦岌岌矣今康熙辛卯予年廹九十臥病城東草堂客有以六安潘女事屬表章者其傳云夏舉人諱聲與潘貢生諱瀚者為婚姻夏子死潘女請隨母往弔不許暨母歸而女已投繯死矣大驚曰今室女守志又復有死焉者乎古有殉難無殉死者况夫婦無殉死事不惟室女不殉即已嫁守志亦何必殉此惟女遇不幸有奪其志者不得已偶一死之韓慿妻是也樂録宋康王好色築臺于青陵而奪慿妻妻投死臺下此惟奪志有然然此即殉難非殉死也然且有殉難而仍不死者周郁妻戳鼻不死魏溥妻割耳不死王凝妻斷臂不死清河崔氏截髮不死以至曹文叔妻刈耳復割鼻梁之高行婦戳鼻復剺面而皆不死即共伯之妻明云父母不諒將之死然仍不死也故父母不殉死親死亦死謂之滅性又謂之以死傷生名曰不子不子者不孝也惟君亦然三良而殉死即斥為不忠與婦寺等夫倫類之尊莫如君親忠愛之切亦莫如君親向使君親當殉則人孰無君孰無父母一君二親將見薄海之内民無孑遺縱有三身亦掄不及夫婦矣况夫婦則斷斷不可死者夫婦不言情故曰夫婦有别又曰闗雎好逑鷙鳥離立惟小説家言情則然後有暱情身死之事如謁漿乞飯裂塚返魂諸事生而死死而又生此則離經悖道蠱壞風俗大非士君子所宜言也生平寡學識予族弟㑹侯以祥符知縣還里與予同年同館友方君渭仁結子女之好已嫁娶矣忽子死而女為殉之投繯不死墮樓不死而絶食而死予無狀有文傳之既而新安吳戴皆名族子女吳死而戴即吞金以殉且祠于墓間名吞金祠此全類小説家事顧謁予為誌銘予曲為之說且多方解譬以明其義而實則不可為訓徒強詞以奪正理骫壞名教雖曰已嫁而殉説猶可原然亦無故覓死仍亦循蜚以還所未有事況室女殉死公然作俑此尤急宜救正者乃其傳又云太守州牧議以女棺歸夏氏與其子合𦵏則更非禮之甚顯然與先王之禮孔子之言大相刺謬不惟破例抑且蔑禮不得不大聲疾呼者矣不讀曽子問乎曽子問婚禮而孔子答之其言曰三月而廟見稱來婦也擇日而祭于禰成婦之義也此何説也葢婚禮頗重一禮未備即謂之奔謂之野合故自行媒納采納徵問名卜吉請期而後有三告廟禮一曰告迎告親迎也一曰告至謂婦車至又告也一曰謁廟則主人主婦帥新婦而謁之于廟即朝廟也有兩見舅姑禮其有舅姑在堂者則名曰婦見謂婦至之日舅迎于門謂之主人姑迎于堂謂之主婦但交拜行賔主禮而次日質明則婦以特豚之鼎棗栗修脯之筐拜舅姑于堂而舅姑受之夫然後醴婦饗婦而婦禮成焉脱不幸而舅姑偕亡則于是行廟見禮俟成婚三月新婦始菜盂素服扱地而見之于廟謂之廟見雖向謁廟時舅姑二主亦儼然在廟然是謁廟非見舅姑也惟此一見後夫然後擇日專祭禰廟而婦于以成故曰廟見始成婦乃或已婚三月不廟見而不幸女死則孔子又曰不遷于廟謂棺不殯廟不祔于皇姑謂不令立主而祔之祖姑之傍反葬于女氏之黨謂其棺反歸女家循其黨類而葬之何則示未成婦也謂非其家之新婦也夫奔與野合固不成婦若禮儀未備比之奔與野合者明有間矣况祗未廟見其在前此諸禮亦何一不備雖主人主婦不在亦必有世父伯母為之主者諒從前致辭從後致命必不少缺又况同牢合卺請袵薦趾已越三月徒以廟見一節有乖大義遂曰不成婦直使棺不殯廟主不祔祭生非其親死非其鬼其禮之嚴毅而剛斷如此今以平白不相干之人生不見形死不覿面上無主婚之尊長下無請袵之僕婢既不婦見又不廟見不特非取婦并非來婦則亦何道而可使歸棺合𦵏聯楄柎通窀穸冬夜夏日至于如此此明明與孔子所言一水一火一朱一墨一東一西的的相反如此而可為將見亂臣賊子邪説暴行凡可以反先王悖先聖者將無不為之禮教從此掃地矣故合𦵏非古但自周公創始而其禮倍嚴他倫皆無此而惟夫婦有之一男一女合并匪易原有較婦行得失作分合者春秋𦵏哀姜齊桓以其尸歸齊而僖請歸魯一離一合是非判然故禮當合𦵏雖生不得合而死必合之周大夫之妻無過而為夫所棄既已異居然而妻必請合𦵏所云穀異室而死同穴者苟不當合則雖同寢處而亦無合理郃陽季兒其兄為其夫所殺雖不復讎而其衾不忍因自經而請不合𦵏是以歸尸及棺必有着落荀爽之女至臨死而以粉書壁曰尸歸隂氏即韓慿之妻倉卒赴難亦且預書裙帶曰願以尸賜慿此等大事原非可以杜撰作臆計者又且傳女事者重為曲護更有隠就禮文以謬合其義如云禮取女有吉日而女之夫死女斬衰而弔又曰婦人不二斬既謂之夫而為之服斬固不二斬矣可二夫乎予初不記有是禮而既而記之此即曽子問不廟見不成婦之次一章也曽子問曰取女有吉日而女死如之何孔子曰壻齊衰而弔既𦵏而除之夫死亦然據此則是取女有吉日與室女在室不經請期者仍然不同且並無斬衰往弔之文惟禮註有之即禮註亦袛云弔服以斬非謂服三年斬也乃接云婦人不二斬為之服斬則直服斬服終三年喪矣是不特與禮註未有三年之恩故不服斬語不合且明明與禮文既𦵏而除之一語正復相反是改禮文也改禮文不可也又且婦不二斬出自儀禮子夏傳傅曰婦不二斬不二尊也女在家從父則祗尊父故室女為父斬三年及既嫁從夫則尊夫矣為夫斬而父且降期是不二斬謂不二斬服指夫與父言而乃以父為夫以不二斬服為不服兩夫是既改曽子問又改子夏傳聖經有幾堪此數改又况曽于所問尤宜審慎前文已有合吉日而壻父母死之問在女家已遣弔過矣然而既請吉日則必為致辭故壻當已𦵏必乞伯父致辭女家使女家許諾而弗敢嫁禮也此壻致命女家也及壻既除服則女之父母必使人請壻勿娶而后嫁之禮也此女致命壻家也是男女將婚已經擇吉徒以親喪間隔之故致男辭勿嫁女辭勿娶而為之註者且曰女可改嫁男可改娶此雖註之誤然亦見室女未配則其易離而難合遂致如此今隂竄禮文竊改禮註拗曲揉直以伸其説不過謂近代無學經宋元訖今毁經蔑禮之後必無有明指典籍直言其非者予乃舉一淺近禮文盡人當知者一指示之三禮有周禮雖未必如宋人劇尊為周公之禮然與禮記儀禮同出戰國實周朝禮也周禮媒氏掌男女之判不云禁遷塟及嫁殤乎舊註云男女未婚者有男死而女求歸之謂之嫁殤若男女偕亡而合兩棺而塟之謂之遷塟是堂堂典禮條例灼然今室女求歸與死而合塟兩禁俱犯既骫名教復蔑典禮且又犯三代先王所製禁例是厯求之而無一可者予之言此將以扶已骫之教植已蔑之禮稍留此三代偶存之律例于以救秦火未焚私竄私改之載籍并保全自今以後千秋萬世愚夫愚婦之生命世有識者當共鑒之西河集巻一百二十四
