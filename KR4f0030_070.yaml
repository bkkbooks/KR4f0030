body:
  text: 西河集卷七十翰林院檢討毛竒齡撰碑記九兩浙提督學政翰林院檢討顔君試士碑記國家三載一論秀而三載之內必一歲一類取民間俊秀而填之學中故曩時科目有所稱秀才科者而填學之士即假以是名以為俊秀者即論秀之所自始也但從來試例四民之子不露名籍貧者固無容自白而高訾厚稸亦並無可為物色之地以故每一試出縱令至公亦定有一二紈袴居于其間凡樹碑五達乞貴官諛文雕朱鑱素較易為力試而頌之再試再頌之今學使顔君吾不知所鑑何等其在杭已兩試計所得士兩縣三學己不減百十有餘而乃衣卉而食藿一若漆室揀火吹纎塵而揚大秦舉髙訾厚稸之子而盡却之囊無一金通衢大塗不能購一石乃相與羣聚而咨嗟曰猗嗟我公欲頌何從頌乎公乎能瞢瞢乎于是一人四銖合兩人而成一錙三人十二銖合六人而成一兩計若干人得若干兩糾工琢塊將樹之眀倫之堂而屬豫為文曰惟公文之足以嬗後來也豫嘗考明制學使悉用監司惟兩京首善之地始以南臺長官兼董其任監司道也而臺則以院名焉今天子以兩浙文盛改道為院使東南一區得厠之三輔之後斯已幸矣顧院使新開初但以坊局之能者充之謂中贊以上講讀以下堪荷斯職而皇上崇文右學惟恐狃于成習即不足以大非常之典因故為不測內而尚書副貮外而樞臺使相開府儀同皆一時互相擢用而獨于君則侍從臣也檢校祕書與討論國史尚將有事于草制之班記事之列而聖眷優渥即與中臺侍郎同參其選夫上以非常遇我即當以非常報之此時君之報主知不啻如士子之報君然且簡畀稠疊今茲之使學即昨嵗之主文也癸酉之役君主文兩浙實為得人因之甲戌首春即以是任當先茅之奬三載升秀與兩試課俊並舉而萃之一身是在朝所必不能已于君者而草莽在野安能以心所難已而反已之且夫士風而日下矣從來清論是非出于學校故左傳有云鄭人入學而執政善否于是乎定今則旌揚贊誦視為故事士子進身即以此為諛人之藉銘功紀德不可信矣有如此之慷愾踴躍吹浡而賦海把簞土而頌丘山此非尋常碑碣所可例也眀倫堂者公學之堂也兩浙布政使司布政使蔣君左遷去任碑記王者建邦辨治設諸道以領庶吏無非為斯民通上下之情是以卿長率屬每建行省于諸道使上初不過飭綱紀整官方升賢舉才編織户版以統諸管鑰之要一若居髙處尊不必與民間子婦披瀝情愫而民率呼吸歸之況兩浙為東南要區賢能財賦甲天下民之望大吏如望嵗焉襄平蔣君由西江觀察開藩杭州者越五年亦已綱舉而目張官不即于邪户口生齒已溢于圖版三年論書者已得良士嵗月舉倉庾會要而任土作貢已倍他日四方軍需及一概坑冶錢幣薪奉頒賚之典俱已權衡度量各得其理而偶以庶司關移檢校稍疏之故捲纛而去民之聞之者男廢耕耒女罷蠶績商估闔市門士子撤學損課讀百計思所以留之不得乃相率為畫像為侻屨為立祀版為謳吟哀思而終之勒石以紀其事豫思蚉虻之俗祇趣膻附暖往往長吏遷官則樹碑以應故事未有拂衣以行而復為之疏往昔戴恩膏者夫虛公之言其言可信不讇之辭其辭足録夫人而知之矣乃較君生平以行軍司馬開闢東甌會天子威行海外舉溟渤而耕犂之復簡君為長城之寄龍鱗馬齒井畫其地則自茲以往豈無天風之動築其禾而起其木者況前事者後事之規也民聽者天聽之本也夫以尚書僕射兼門下中書兩相之任推為行省古所稱左右丞相開政事堂者縱有蹉跌進可為開府儀同退之仍不失為大小參知之職而苟其規前事以策後效即民心以覘天意白石在前不必伸桐鄉之思下峴山之泪也吾是以應民請而樂為之記長山心庵自置食田碑記長山心庵者新建之庵也其義以新舊得名而住持者曰吾將以求吾心焉顧地近海塘前此山界于海潮汐抵山麓桑田萬頃在洪波中而今則延袤百里皆良園美蕩茭葦之外間産竹木故傍塘而居好善者歸之乃住僧凡白嘗為我言開山者非他豫法弟慧彰師也彰與白皆長山人且同師落染而彰長于白徒以桑門次第先入為兄故白弟視彰而實則開山大事皆彰主而白輔之乃彰本氏富白本氏金彰俗猶子有兄弟三人實捨得分地以為庵基因于康熙甲寅冬十一月彰與白同創此庵閲今二十有四年而彰已逝矣特庵有食産皆兩人自置不布施不經讖各攄其力積銖粒而賈買之播植藝穫量所入以給僧衆終嵗之用皆于兩族無與焉夫捐金布地不還所捐募錢以造像不復翦蓮片以作錢用況釋已捨姓一切身受非本姓所有豈有給孤餘地自耕自食而人猶得以覬覦之者夫茫茫滄海已為桑田而欲其遽就劫灰不得也夫心庵者心不可壞也凡白名某自置沙田如干畝沙地如千畝復有再置者列此末重修蕭山縣儒學文廟碑記漢制諸侯王相及郡縣長吏之官必先赴廟謁而後從政至隋唐定例往往以春秋二仲釋奠責之州縣而惟宋及眀則又增之以朔望行香之禮是廟學之設創自朝廷而其仰承之以延其制則實州縣所有事也苐居官遞代等之傳舍典禮十廢難于一舉況三征九賦惟正不足必欲統會計以戒功事則秦瘠而越視之矣國家建學垂五十年釐定典制整飭廟貌而皇上復臨雍講經親理帟羃其于崇儒右文之意可謂備至乃郡縣學宮每易傾圮大抵殿宇崇閎成艱毁易加之官府工作輕于審辨諸凡輦銅合土脂膠圬鏝所至以一切從事故子鑄而丑三釁焉桐城姚侯蒞吾蕭有年自廟謁以迄釋奠釋菜其為屈折盡禮者已非一日而獨于棲神之地尤厪俯仰蓋十年以來凡數修矣今遷官在即而瀕行之頃猶不無徘徊而警未雨者乃首捐月奉經營載事損廉入而考出之稽器倚具皆有程法自殿庭兩廡以及戟門垣牆凡刻桐畫梓笵金飾木皆量其疏密以辨工濫上視櫩楹下審坪墄朱丹而黝堊次第塗雘一若橋增其圜而池益其潔計長功中功閲兩更朔而告成豫乃于餕奠之後拜觶言曰不觀學乎學貴有補修之者所以補也學貴有繼重修者凡以為繼也顧其説尤有進者夫天下之以因循而隳吾學者豈少也哉事當可為其始未嘗不欲其急行而既而逡巡又既而以為此非吾事可俟之將來而于是退諉之情生矣向使侯當政成其視此未雨之事可姑待也且夫春秋遞嬗成功相推吾第從容焉留此成效以俟後之繼此者夫亦孰得而非之而乃奮焉勉焉不假瞻顧而興焉夫然後知當仁之不讓與見義之必為固有在也他日任國事有如此廟矣因為記其事而復為之詞其詞曰惟昔闕廟在魯觀右兩漢幸學别作妥侑唐改廟祀于州縣學澤宮巋然上有榱桷從此聖宇較殿陛隆几筵籩豆乃實其中特因嚴事饗薦有時銅槽瀏晚金鋪啓遲邑設學在文眀門內璧水東環筆峰南峙幾千百年勿詠茂草鳥鼠既去風雨殊鮮獨其嵬聳長藉修築比之藝業不殖將落我侯戾止胡然念之彼髙坐者實惟吾師雖當政成早賴神祐敢廢羮牆以自貽咎乃滌范釜用飾顔廬天宇方澄地軸載舒從來頌禱矢棘翬革試觀櫩楹如萬斯翼礲磶砥砫綺欐香橑自茲泮林有梅無梟在學言學不教而教業無推諉此是領要式瞻既往言規將來斯文無愆庶嬗勿衰湘湖水利永禁私築勒石記此文縣申藩臬二司敕勒石者縣復以不便于已假他紳一文刻縣志中後改正蕭山湘湖宋邑令楊公所開湖也公據熙寧大觀間縣民殷氏等有請築湘湖之奏而下議未決公決議成之遂開此湖用以灌九鄉田一十四萬六千八百餘畝歷南渡髙孝兩朝邑令顧公諱沖者以九鄉爭水度地勢髙下定諸鄉放水之則算毫釐酌多寡勒石縣門因有劃堤斷臂穴水釱趾之令而其後郭公淵眀于嘉定之末來宰斯邑則益加疏濬凡湖傍山足尺寸皆湖所謂以金線為界者謂山足黃土外皆湖水也自眀𢎞治間湖豪孫全等漸起侵占鄉官致仕尚書文靖魏公力為恢復而御史何公舜賔繼之不幸御史被害孝子伏闕孝宗皇帝親遣給事李舉郎中李時大理寺曹廉同外鎮巡官反覆審理置孫全于辟敕邑令楊公鐸勒石湖口毋侵毋佃毋私築毋蝕水涘毋倚墟傍岸以漁以草以栽以畜犯則重者辟輕者釘發遼東衛永逺充軍載在實録播諸志傳彰彰也今康熙二十八年距向勒石時幾一百八十餘載恪遵舊制無敢越者乃忽以秋暵湖涸湖豪孫凱臣等糾集畚鍤一麾而千人不鳴官不暴衆築堤數里自湖西至東兩山之間橫跨湖靣而攔截之邑令劉君據水利衙報文申請而無如阻之者之衆也夫湖職蓄泄不職行走況兩山厄塞從非五達揣其用心不過為風水計耳夫兩山墳墓下有關沙可以動勢家巨族相助之心而實則倚墟而栽滙巖而漁正曩時侵占所由禁也夫湖分為三其于上湖下湖不無偏曲然且放水早晚限有時刻堤截水緩則于限刻最少者每有水未出堤而即行閘止之患然而九鄉泄泄獨潦湖蔣棫等爭先控告會郡伯李君初下車時惑于阻撓屢敕集議而卒之用豫末議始敕令剗削榜杻示衆而豪黨多力抗拒官法府復據縣申之藩臬二憲司藩臬二憲司仍下之府縣剗削按律且為之永禁以勒之石夫創始之難不如守成開之者一時而爭而守之者乃在萬世第宋代敕法皆當事主之故洪武祀功尚有楊趙顧郭之祠建于湖濱而入眀以來則藉鄉官為力持故𢎞治賜祠特敕名德惠以祀楊魏而其後何氏父子得祔其傍今鄉人委蛇動多退諉築堤變制無一人為之爭執而一二州縣守令儻惑于豪強而動多變法此則生斯土者之一大患事也夫以宋世侵牟雖郡王之尊招討之貴一丞尹持之而有餘而孫氏一占即極之尚書御史門生數世之恢復而猶不足今遺孽復興幾壞大事及此不戒將何底止因為布諸石而禁之如右若其禁條則具見宋淳熙十一年嘉定六年眀正統五年景泰四年𢎞治十三年正德十五年今大清康熙二十八年禁罰各例載湘湖水利志中沈氏放生池碑記沈氏放生池在大芝巷沈氏宅前池方五百步廣長于袤其西角通他陂而平橋鎖之有長林修竹橫其南當宅門之屏凡過其門者停車而觀如登濠梁焉崇禎七年沈澤民先生捨其池為放生池而曰此池非他吾母袁宜人陪嫁産也先大夫痛宜人之早世也而思歸袁氏既而袁氏絶無可歸矣吾何忍據此傷父母心請捐為衆有以長存此池當是時先生手書放生池三字并書金光眀經流水長者子一卷又請李次公為之圖畫共勒石池上且曰後之人有食此魚者如食吾肉取此值若析吾骨而不謂甫易世而不能守也沈八公者先生之季子也與客飲于池而醉而流涕客詢之而告以故客曰傷哉顧質值幾何則以十五緡錢質貴門矣客慨然曰豈有沈八公無十五友者友各賫一緡贖之康熙三十七年重標其池曰放生池復書金光眀經及圖畫為卷册而大書十五友于其上曰胡氏曰朱氏曰鄭氏曰三王氏曰馬氏杜氏曰又胡氏曰陳氏張氏羅氏兩劉氏曰沈氏其眀年將勒石垂久而請豫為記豫曰世之能垂久者莫如佛氏天下名山其自晉唐迄于今豈或暫易而亦有不然者夫惟其為名山也名山而城市則覬之者衆矣向者先生亦知佛法不可守而動以孝思曰人孰無父母而世不顧也乃以挽近衰薄友朋凋喪之際而尚有人焉慷慨好義以善全此兩世之孝此在他人聞之猶逌然感興而況沈氏之子之親承其後者也然則是池也將與孝與義並存而安用守矣衆曰善遂書其説以為記方示神應記示音祁古有方示今之城隍是也有土示今之土穀是也顧土示之祠遍于里民而方示則官祠之然且行省郡縣每以上下分氐卬故都會城隍較郡縣加等況吳山嵳峩左江右湖尤神所依憑為昭昭者乎康熙三十九年六月不雨大中丞平州張公帥諸官屬暨師巫里老登山而雩初却車自山麓既而斷腥從軍門徒步歷戊夜以至髙舂吁嗟以祈之如是有日公慨然曰吾從來索雨三日而驗今如干日矣豈德日下耶抑亦索之不以誠而徒具文也乃立册書請減年以救燋灼翼日師巫大言曰為我謝軍門今年夏甲雨當爍地千里茲者鑒公誠且降雨矣公遣官籖問降雨何日籖有天書豬犬字籖曰連年久暗漸分眀所用天書自有成從此出門無阻滯相逢豬犬辨枯榮時七月二十七日越四日辛酉值八月合朔二日旁死魄壬戌犬日也晚而雨三日癸亥即豬日則大雨傾晝夜東自鄞鄮南自新安江西北訖浙所有地悉雱霈溝澮皆滿杭人歡呼頌公恩公曰此神惠也我何有乎爾乃手題大榜曰有感必應懸諸祠以旌其神云先是仁和學諸生袁樞貧士也有黃冠草衣者到門請偕之海濱耳颼颼行生掙揣曰吾有親吾何能從君言畢棄之塘西之市間已去家五十里矣然而口喑不能言苦之仁和令君廉其事以告公公為召生使具狀立為文據狀檄真人府切責之覆以印護以官簽驛之至江西取覆狀來真人不敢辭且有别牒令生賫詣城隍祠焚之生夢城隍神告曰是非妖也願軍門毋怒詰旦當以豫言告軍門生如言詣轅已能言矣遂以言告公公久神其事而未啓也然杭人早知之至是索雨應杭人比户傳其事且一閧至豫門曰此實公至誠有以感之然神應不可沫是非君文不足以傳此豫曰書曰至諴感神此言公誠能感神也又曰天壽平格此言公之平居有以感乎神則天必壽之不惟還其年且益其年也然而中庸曰神之格思又曰夫微之顯此不言鬼神之來格又如是顯乎吾多公之誠而併嘆夫神之應之能相與有成而不可掩也因應杭人請而書之為記時八月十九日都轉運鹽司運使李公賜御書記古天子賜大臣多用彤弓盧矢圭瓚秬鬯然必先之以文命如周宣錫召虎圭瓚詩稱肇敏平王錫晉文侯秬鬯弓矢尚書稱惠康是也司鹽李公由詞臣起家破例為臨江太守考清廉第一因擢兩浙江南都轉運鹽司運使以牢盆煮海積骩難治且亦以徴其廉也會天子南巡嘉其成績遂賜宸翰榜于堂豫趨覲行在急過瞻仰私謂以我公介節將必表之以清忠作百司倡而乃書惠愛二字填綾榜以賜一似親民之官了無所用吾心計者夫乃嘆聖人之用意深而垂訓逺也夫世治亦日疏矣擊斷者以毛舉為能而嬌枉之徒又復尚農田而抑商市夫四民皆民也自不學者為政祇以農為民而士工商不與焉初視商政為膚膜既為贅疣以農與士校則士絀以士工而與商校則商又絀甚至學校鹽法與親民有司分立門户一應文咨簿質各相為左右不止如漢庭鹽鐵使大夫文學剖判低昻于論議之間而公鑒其弊每揮戈而倒挽之喣咻滋養使四民同情無所畸跖其恤商之苦甚于自恤其肌肉此何如惠愛乎嘗讀月令云行慶施惠論語云節用而愛人夫惠澤所施關于財用惜財者即愛人所由生也不觀鄭公孫僑乎鄭以小國而供強晉之嵗賦所定車甲每加于魯衛六七百乘之外而僑以節嗇而裕丘甸夫子一則曰惠人一則曰古之遺愛蓋惠愛之厚繫于理財有如是也大哉王言其鑒于此矣康熙三十九年公礲丹于石拓諸紙而裝為卷軸因得于重瞻之次謹記之而書之卷末且以告後之繼此者慈雲灌頂法師開堂碑記嘗避地少林翻三藏文知釋有三學原具禪與教與律三家而近崇禪學第守臨濟一棒喝而教與律無傳人焉考之摩騰入中國馱經以隨而八代髙坐如鳩魔羅什輩皆以闡繹文字為唱導宗師即西來靣壁後亦復有圭峰論學舍天龍一指而修十六觀經者然則三學之必有藉于教也審矣是以兩浙名山三宗悉備如靈隱為禪上竺為講靈芝為律類所至比比而至于慈雲舊剎則初祖大休觀公應李鄴侯相國之請以講宗為開山一代而次祖寰中空公則白傅為刺史時實延繼之蓋禪宗也洎三祖普濟覺公則律宗而為吳越國王所師迎住此山是慈雲三祖實三宗相嬗迤邐次第而灌頂法師以三藏真印起而統承之豫嘗辨儒佛異同與師相質難歷舉從來經論與吾學相離合者娓娓數萬言如燎飈之發與決河之㵼聞者皆屏息嬌舌而不能前非深于三學而得有是與康熙庚戌杭州紳士請師入慈雲講堂越九年戊午順天府丞戴公請師于本寺講諸經論遂開雕師所著五教儀勢至鈔五祖記并會起信論疏記越八年乙丑應興福之請講楞伽經戊辰赴戒壇演法華眀年已已宮詹學士邵公請師主上竺開十期講逺方來聽者舟車不絶會聖駕幸講堂褒之時毗盧閣告成上竺之舊燼者師為之一新越四年壬申聖果請講報恩盂蘭盆經工部侍郎徐公請師復還院開戒三壇他若仁社諸君請説瑜伽皈戒西資皈戒崇壽説諸經潮音説般若經曹源説法華蓮居説戒且著瑜伽儀施食儀疏焰口經解及萬佛懴彌陀經注凡三藏三學圓通顯密無不周其外而徹其裏于以為僧林佛苑之冠其繼觀空覺三祖有光矣師諱續法字伯亭别字灌頂仁和亭溪人也少習經書能文章年十九好禪忽入淨慈參豁堂和尚有悟其時兼律學進具大戒豁堂深契之既而辭去過城山聽講悵然謂一指昆侖吾習阿難教以進于如來鬯然也康熙五年德水大師以師性相兩通遂付衣法而師復精進更以三學研練入三藏之奧而三宗門庭統為之闢三藏者經律論三宗者戒定慧也重興崇壽院碑記崇壽院者唐至德中慧因法師所建院也其地在龍山之北鳳凰山之南舊名龍岡崇壽院以師曽説法于此崇無量壽佛得名而歷後唐長興石晉天福則嘗有教觀諸師繼席其間是以吳越國王特迎志通居崇壽與淨慈永眀同為國師而趙宋熙寧間則道鴻通辨實為杭州僉判蘇軾迎住此山遷延至眀初而法師慧炬并開大之當是時崇壽之名甲于諸方前庭海日樓巋然江濆佐之以紫竹之林放光之井而山後石竇則珍珠泉出其中焉相傳泉石間三字東坡之所題也院有八景則杭州太守王興福所為詩也逮其後而蕩然矣康熙甲辰有僧照然者募其兄何氏捐資復之俗名何庵越一十九年而旭如法師卓錫于茲請灌頂大師講般若經演盂蘭盆于其中以址隘于昔購項氏山地益之會仁社錢生迎灌公説瑜伽皈戒并溥施法食五壇遂裝金刻木煏土築基壂而社中諸君則又各施以金錢丁丑開功韋馱殿告成眀年闡金剛經一期建彌勒殿重開山門雜置客堂法厨僧房而繚以藩垣工部侍郎徐公飯僧衆于院會者千人又眀年復辟朱龕裝竹林三大士像重講華嚴行願品法華普門品及彌陀尊經乃以宋雍熙年晤恩開法曽改崇壽為仁壽而今合仁社諸君重興此山則崇壽仁壽可間稱焉聞之梵剎之興雖有因緣然亦惟修持克實者得以致之考古德有云祛邪皈正為治心之實識果眀因為操履之實𢎞大道接方來為住持之實至于親賢之實則必察古今以定可否用人之實則必合短長以均利鈍而以觀旭公受法于慈雲親仁實也傳戒于資福正心實也隱開佛説于衆中操履實也恢金乘之廢墮住持實也程材量能隨所應而各盡其義用人實也夫以丁癸之年加之東南財匱之際不事勸緣未嘗有齋板募簿傳之于人而千年舊業不三載而底于成自非躬修之克實不至此旭如超于人矣又有異者當眀洪武初海潮壞堤慧炬法師為説三皈戒咒水所滴堤住而不壞今江門不扃洪濤澒洞砰訇蕩山麓而每當灌公説法之日則澶演而退其前後之一轍如此因應諸檀請而并記及之西河集卷七十
