body:
  text: 西河集巻七十二翰林院檢討毛奇齡撰碑記十一浙江三郡望幸圖記古者天子巡守每一嵗而周行四岳于以朝諸侯而考制度凡班圭輯瑞明禮飭法皆在是焉以為建方弼服多所分畫非藉是以振攝之則無以綜事權昭大統也今則天下一家車書㑹同三載一肆覲協律凖量審權謹度並無㕘互于其際而聖天子復勵精圖治萬㡬躬親周知吏治之賢否如燭照數計凡一黜一陟必有明㫁其所巡幸不過省方問俗因之以慰勞疾苦原不必周行四岳一嵗畢徧即或彼或此惟其所指而乃東行西怨南征北盻山陬海澨無不願見屬車之塵坱以為袚濯民之望君如望嵗焉嘗考周官底治軼不忘勞往往以戎兵之詰撫視九有若所云陟禹之跡方行天下者我皇上恢疆闢土南開葉榆東擴溟渤合日出日入之所而歸我版籍皆願以新藩之土仰邀怙冒曩者彭島初收高華竄跡鑾輿東狩登苗山而望蓬海凡兵行之所咸駢首引領惟恐攝提所指不至其地近則西羌屬國偶弄戈甲七校親發絶大幕以北犁其庭而罄掃之勒銘于伊吾望鄉之間夫然後罕東哈密以次簞迎而三秦且捧蹕焉今三苗乍服洞庭再靖凡馬王魚復諸鄉軍民宣慰皆與之更治因之荆門以南夜郎以北旋有山海諧諧徯我后來之謡播于民間甚盛事也然而望幸者從此起矣考之帝俈東封不辭里禾虞廷四巡僅班執玉即禹征有苗東巡㑹稽自治水之外復循其轍跡而徧行寰㝢夏書所云東漸西被朔南暨訖者是也然亦未嘗有捐珠賚布記于史氏及讀孟子則夏后遺諺公然以耕斂補助為世法則所云不游不休何豫何助者然後知古王出游不乏恩澤而記事者或失之也我皇上車駕所屇勞民疾苦觀風俗厚薄相寒燠以較豐儉歸市不止耕芸不變父老扶杖來觀者加以咻噢高年者賜粟帛在籍去職官咸復其職然且捐租之詔屢下至于再至于三兩浙已被賚而兹復特攤額課于四十四年正供槩賜蠲免此較之古王豫助之盛尤為優渥夫以天子之尊加父母之親原以天下為一家以六合八荒為一圍之帟朝夕出入使老稚男婦得時時望見顔色懽忻踴躍豈非甚快亦何必有所推予始著闓澤況我皇神聖所過之地山增高而水增深雨暘以時雞犬不為甾禾稼豐熟闤門之懋遷者較倍于昔其有惠于民為何如者前此駕臨東浙神魚上江門麒麟夜見于鄔山民家鳯凰山南甘露降草木如冰凌之綴于瓴日出而斂是天亦欲我皇之涖止以為慶矣兹者恩詔初下兩浙七十二州縣皆歌詠載道作迎鑾賦頌而浙東三郡父老子弟悉銜尾叩縣門拜聖恩訖乃復出西陵渡口北望舞抃希顧復以當乳哺因有繪為圖以傳觀者臣謹進曰古王以事行則謂之巡巡者事之則也今主以恩行則謂之幸幸者恩之著也巡尊而幸親巡嚴而幸寛幸可望而巡不可望今幸矣可以望矣恩之至亦望之至矣因題曰望幸圖而并為之記臣竒齡誠懽誠忭稽首頓首謹記新開吳淞閘碑記昔周職方氏以具區為東南之浸而夏書禹治震澤先導三江則是三吳之水雖曰具區能踵之實則三江能下之也第三江在昔分滮下洚爭相入海而今則東江已洇唯婁江淞江尚存古蹟然且婁之為瀏僅存一綫而吳淞自宋慶厯後堙閟者屢焉夫瀦之受水卑于習坎而江之入海亢于久閼以習坎之卑當久閼之亢則入之者如建瓴而出之者如拉釜其為震盪固不待言又況吳淞一江尤為蘓常以南嘉杭以北六郡之水之所灌注而靡遺者哉今天子御極之十年三吳水甾臺使上請開吳淞故道發水衡十萬由五渡迄上海亦畚亦鍤凡七十餘里飢民之廩役以丐活者萬有千計不期月而告成其六郡圩田變舄鹵就土膏耜之趾之已有漸矣然而朝潮夕汐脅沙而奔擔水斗泥遲久易壅曩者范公文正創謀立閘設坊于江海之㑹板障之使濾濁而後入板字下疑有以字門以餞之使挾滓以並出猶且僱捺缺一字之夫造鐵帚之櫓是以終宋之世未嘗全閼暨入明以來夏公忠靖開濬于前海公忠介疏瀹于後初未嘗不殫心修復而閘制未講旋啓旋塞因復建閘于上海縣北之黃龍口橫截海浦而無如海波之撞搪而易為圮也十五年秋大中丞慕公開幕斯地睹兹閘而惄焉憂之前此議葺者僉倣治河之法用栁䈾斷流戽水使涸然後楗木石而為之坊計栁䈾若干每一䈾約費至四五十緡合計不貲而役夫戽水日需千人且為日未易限也又役在農隙時當寒沍民艱臝躬以入水而朔風吹波衝䈾瀵石窞蕩叵測公向令錢塘聞浙地多水坊匠氏先範石陸地記其甲乙而次第縋水善泅者從而理之一如陸範所置力省而功倍且耐經久㑹上海任令浙人敏于相事立募浙匠之能者用其法先壘而作埂橫亘閘址如拾級然加板而縱覆其上則水無留行而易下而又楗木于埂末使免塌瀉然後樹三門而梁之廣左右䕶堤束水就道令不得汎具牒申約悉照規畫以從事始乙夘之臘迄丙辰陽月工竣民不知役帑不知費胥吏不按籍而派夫里工估不踰疆而運薪石三吳平土得籍耕耨六州黎庶並被沾溉于是此郡人士請勒石以記其事夫本國家之咸和播民見士于以急公而奉令不可謂非諸有司之力獨是疆域大事難于倡始既已計工按法扼持其要而迄于潰成猶且度支委輸必上省國課下惜民力使晝夜經畫期于百全而後已其灑澹鴻功于以慰聖天子南顧之勞與夫三吳數千里經久之計較之文正忠靖諸前烈又豈有媿夫以宋元明迄今或行或止歴數世而必不能興復者而一旦徐起而興之其亦偉矣後有興者庶亦有鑒于斯文重脩蕭山縣學碑記古興作必書春秋二百餘年間凡城郭宫廟門臺廐囿其或興或作無不歴書之于冊而獨不及于學校然且子衿一詩刺學校之廢以為膠廩不修學者所恥則是立學之重等于立國原不必以類書冊而一當有間則必飭化以苴之蓋作之有藉于修也明矣是以唐宋之記學記立學也以其時里塾未定廟饗未合夫固有倡之者也今此之記學則記修學也以成廟而合成學但修之而事已畢也顧作易而修難作簡而修賾作在一日而修之者在百年古云力學貴自修豈虛語與邑之脩學在二十年前其時縣侯姚君以記文屬予貽書京師而予為應之今予甫還里而文廟榱桷聞有闕于蝕齧者兩廡且瓦豁仰見星日頖之環門者如田坊圜橋于陸已久矣完石徐先生與昌亭謝先生秉鐸于兹力能以文教啟迪才士一時才士為都講者各發憤趨事以材以力稽器而考度任其物而就其功闕者補之仆者植之抑閼者疏而通之自殿而堂而廡而門而池而祔祠凡宦蹟邦賢與聖所自出皆一一整理而各依于法㑹學使按部已歳除矣故事暮冬興役不妨農政而特以日偪短景由亥月以迄寅月謂之下功乃卽此下功末旬甫班程簿而不日告成届二月上丁而卽可祼瓚以從事自非兩師率作諸都講咸和以協勞不至此然則是脩亦力矣苐司事多人不能備載而較其尤著則吳子升金子書何子西堰王子錫晉趙子昂發來子賡虞孫子曰發家從孫端皆都講能任事者山陽畢家溝勒石記山陽城南五十里曰畢家溝衡漕而枝而西接高堰洪澤諸湖之水然猶之漕也漕故北南行而溝抱西湖而北與漕合曰新漕故一溝也東受漕西受諸湖水中則沿漕堤而捍湖田雖田坊實繫之然故與漕渠相終始焉康熙四年夏恒暘之後繼以恒雨凡浹五晝夜諸水暴漲漕與湖憤溢抵諸溝而決堤而奔漕使以他故不暇視急檄山陽令朱君禹錫使治事君蓐食行僱諸庸水者臨潰堤杙之水濫不能下又杙之躬先負薪輿𨽻各畚諸土石戴漏踏坎砥其蕩而艮其植凡閱五晝夜築堤二一故堤一䕶堤也堤凡三十有九丈䕶差之堤成君告衆曰爾亦知都府之所以急是者乎淮之有漕也漕之有溝也溝之有堤也雖尺土而全漕與田坊均繫之矣都府汲汲于衛漕乃不暇選擇而使予予雖不職于水庸然終以此為坊田之事故不自量其不能而急受都府之使而不之辭詩曰念我獨兮我事孔庶吾願後之治此水者勿以事庶多推阻也衆曰善因記其言書之石西河集卷七十二
