body:
  text: 西河集卷八十二翰林院檢討毛竒齡撰傳十列朝備傳馬中錫馬中錫字天禄故城人三歲識字七歲能為詩父偉唐府長史以直諫忤王拲械來京中錫方毁齒隨母徒跣訴闕下事得白見者憐之成化十年舉鄉試第一明年登進士授刑科給事中萬貴妃弟通驕而侈中錫疏斥之予杖再疏再予杖公主侵畿甸民田奉命往勘以其田還民乃劾中貴汪直不法十數事直怒使賊曹詗其門無所得滿考調雲南僉事以憂去服闋改陜西督粮延綏革例不受一錢𢎞治二年遷提學副使入為大理右少卿南京内守備太監蔣琮豪鷙擅誅殺怨家上其事累治不决中錫請按之抵琮于法八年轉左九年陞右副都御史廵撫宣府革鎮守以下私役工匠使𨽻尺籍凡芻粮馬匹舊為勢家所奪者悉歸之官㑹北部入冦督軍擊却之斬首五十九獲馬二百賚金幣尋引疾去武宗即位以薦起撫遼東勢家所佔屯田便利者積數百頃役卒以畊而卒所受皆虚籍益復為勢家賠畝稅中錫疏于朝奪田給卒而除其虚籍鎮監招商市馬牟民利諸弁效尤各為立草行魚户設缿投責中錫密覈之一裁以法且謫其尤甚者遼大治正德元年召為兵部右侍郎尋轉左有朱嬴者瑾黨也冒邊功匄陞蔓列無賴脅兵部為之請中錫持不可瑾大恚矯㫖改中錫南京工部尋勒致仕家居越一年恚未已忽内降謂遼倉米損腐減軍積前撫不職就家鏁捕送遼東獄變田廬償米削其籍五年瑾誅起巡撫大同㑹河北賊劉六劉七與趙鐩齊彥名等前後倡亂流刼山東河南間屢𠞰不效廷推中錫為右都御史提督軍務與惠安伯張偉統禁兵討之中錫至軍謂盜本良民由酷吏寗杲與中官召賄相激成人豈無良吾當推誠以收之下令賊所居勿捕所過勿邀擊飢渇給食飲視如估客降者待以不死賊初聞讙譁戒勿殺勿焚勿椎埋行且就撫顧猶豫無成説而偉紈袴子將吏承中錫風㫖卸手觀望賊大熾值武清賊宫太保與劉六合兵犯天津副史陳天祥擊敗之獲宫太保上其功中錫遂于是時進左都御史然賊流漫衍六從河南還山東而燧與彦名則由江西流入湖仍返河南當是時諸府縣官軍間能破賊而賊善衝突往來儵忽後之稱流賊自此始中錫復縱之賊勢已成然後不得已主兵者謂禁兵弱不足辦賊請調宣大延綏諸邊兵聽中錫節制顧中錫欲戰則非其意欲撫則時嚮時背終不得要領雖其後亦稍悔之然終負成臆不即變先是賊攻棗强中錫遣救之失利賊屠棗强去知縣以下死者七千人中錫有創心至是賊稍挫邊兵所至皆克捷已追劉六等南徙至德州桑園中錫轝轎入賊營反覆慰諭與之宴賊且拜且泣遞起為壽劉六慷慨請降劉七仰天咨嗟曰騎虎不可下今内臣柄國人所知也馬都堂能伸其約乎㑹賊有自都還者探中貴無招降意徑去焚掠如故獨至故城戒毋犯馬都堂家由是謗起謂中錫通賊言官交章劾中錫降詔切責已中錫仍以乞降請尚書何鑑謂賊誠解甲則貰死即不然毋為所愚既而不然鑑遣侍郎陸完代中錫議中錫與偉受命徂征乃計護身家不以一矢相加遺師老則詘仍倡為招撫之説為賊所謾致賊破郡邑擄男女燔漕艘洒盪郊保震驚京師罪在不貰逮下刑部獄論死死獄中十一年巡按御史盧雍追訟中錫寃謂賊實聽撫僉事許承芳忌之陽請益兵疑賊心及賊已受約尋至軍門而檻車已就道矣朝廷是其言復官賜祭廕一子監生鄒昊鄒昊即馬昊寧夏人宗大其字其先本鄒後而冐馬氏少喜揮霍長身驍捷善射𢎞治十二年由進士為行人正德初選授御史遷山東僉事尋以御史時忤瑾論罪謫真定推官降夷騎多為盜剽攻人莫敢呵昊懸賞募善射者不數月游徼卒皆善射遇降騎剽攻輒獲之盜乃止瑾復用前罪謫判開州時真定吏民感昊恩伏闕留昊上許之六年川賊藍廷瑞鄢本恕方劇合四省兵進討不效以昊才擢四川僉事昊至閲所部笑曰將不知兵其何以戰于是擇驍卒千人分四隊隊各立長敎之㑹賊方四應本恕冦江津綦江進薄重慶時昊方駐重慶城乗夜出百騎舉火擊賊賊驚潰相跆藉昊乗之斬首四千級軍中皆賀昊曰何賀尚未見大敵也雖然宜及鋒用之遂并合玀􅉰土兵直前搏賊賊方陳左而伏兵于右為應昊以正兵當左而身率百騎直擣其伏伏潰復趨左左亦潰于是合擊火其栅大破之斬首捕降者近萬人四奔婺川而别將所獲獻俘進副使是時廖麻子喻思俸再冦川北被創川撫髙崇熈舊主撫至是復招之賊要質駐臨江市且勿徙市民崇熈輕信遽請之兵部賜復已有成議昊乃力争之謂是地為全川咽項上達重敘下連湖湘今悉已委之賊是絶吭也夫飢鷹之附可信乎崇熈不聽昊乃立賞格飭部伍觀變㑹彭澤以總制調土漢兵㑹𠞰崇熈請散還而遣副使張敏買臨江田宅挿賊賊囚敏屠臨江市官軍與戰皆敗績遂圍中江逼成都畏昊不敢東崇熈懼急檄馳援昊乃提勁卒五千赴救之賊聞昊至皆散去時土漢兵既遣還而官軍又無可用者乃始請邊兵辦賊擢昊右僉都御史代崇熈與彭澤時源共追賊至平壩賊潰為二廖麻子奔羅江昊遣指揮閻勲捕斬之而喻思俸奔金堂北走陽平復由昭化渡江還趨東鄉招鄢藍餘黨自益時源方卧病昊乃言于澤曰東鄉山險不便騎射深入賊為主非計之善幕下誠能統諸軍使昊得據險遏出入賊困可不戰詘也澤從之昊以一軍軍九真諸軍環向賊窮蹙降散殆盡思俸遁追及之于竹木溝負十創死時遂寧渠縣諸盜皆視思俸為進止思俸敗衆散賊首駱崧祥范藻皆相率就擒因以平賊功進右副都御史巡撫如故其明年西部亦不刺冦松潘昊與副將張傑謀招大信小信土番為間取道夜襲之亦不刺遁去加俸一級烏䝉芒部所屬葛魁諸寨與髙珙筠連接壤僰羿苗仲猓狢居其中僰人普法惡者蓄妖術僭號煽諸蠻叛富順謝文禮文義應之指揮杜琮出與戰敗績文義手奪琮胄去千户胡翔百户潘輔皆戰死昊乃督指揮曹昱統官軍討之賊大敗降者萬計乗勝搗其巢法惡率衆保青山寨昊追及望曰山髙而無泉絶其水道當自斃乃分據水口而闕南方圍待之賊果渴偵南圍薄薄暮突圍出官軍遮擊之俘斬萬計法惡中流矢死諸蠻奔昊撫定之已班師值珙縣知縣步梁承昊風㫖誘殺降蠻苗阿尚而琮恥亡胄檄諸蠻取文義頭文義方激諸蠻變昊又議吏増賦法諸蠻遂大訌集衆破髙與慶符二縣而琮匿不救及昊聞與張傑往討乃大衂官軍失亡者三千人昊又移軍攻小東路番而茂州核桃溝上下關諸番不平並糾白别羅打鼔各寨生番以叛殺吏攻城堡張傑與指揮龎昇皆戰死自黎雅以西天全六番皆相繼亂巡按御史盧雍黎然先後劾昊詔逮昊下獄免官世宗即位以楊一清胡世寧薦起復職然與璁萼殊不合仍致仕去久之卒當世寧薦昊時其言曰昊方今名將可用松潘之敗非其罪也昊長于用兵惟輕用其長故敗臣短于用兵惟重用其短故勝時謂名言論曰磽磽者易缺皎皎者易汙豈不信哉林俊始批逆鱗繼殄劇賊抑足以成名矣瑾敗而進疏以掩緘嘿之非不已拙乎昊所樹立差足方俊而松潘蹉跌訖以不振亦喜事之鑒也俊為僉都御史時李承勛方為部郎俊語之曰昔三原王公在南都無一日無賢士大夫在門今吾豈不能詘已耶何賢者之不至也承勛因問俊所交賢者幾何俊以張敷華楊一清楊廉對且論其長短承勛曰于公何如俊遜謝以質承勛承勛曰公生平所言多節義文章而未嘗及學問意者所長在彼所短在此乎噫是可以得俊之為人矣此似林俊馬昊合傳論今缺俊傳洪鐘洪鐘字宣之浙之錢塘人成化十一年由進士授刑部主事時進士習經生業不諳練鐘獨負實學堂上官林聰重之使之總諸司章奏聲驟起二十三年江西福建賊新定奉使安置既歸上言福建武平上杭清流永定及江西安逺龍南與廣東程鄉率流移混雜習鬭争以武力相髙故易亂譬若羣豺虎而失所檢欲其無相攫噬難矣是宜及其平時令有司立鄉社學銷兵器日教之詩書禮讓以化其姦慝時謂之知本之言𢎞治二年陞江西按察司副使既而陞四川按察使所在發奸摘伏無所撓避自土官宣慰司下皆恪奉約束時安氏世踞馬湖恃力蔑朝命為一方患鐘設策去之而請吏治其地九年進江西右布政使明年轉福建左又明年陞都察院右副都御史巡撫順天等府兼整飭薊州諸邊備時朶顏猖獗鐘建議増築邊牆自山海關界嶺口西北至密雲古北口黃花鎮直抵居庸延亘千餘里繕復城堡二百七十且悉城㳂邊諸縣使各有所守又奏減防秋官兵六千人嵗省輓輸犒賞之費以數萬計毁永平陶窰無令軍民有橫役者奪民田及牧圉草場之入于權貴者而悉還之逺近大悦然權貴人之扼勢失利者多未便數短于帝遂出為雲南巡撫尋改貴州頃之召還督理漕運兼巡撫鳳陽諸處正德二年陞右都御史仍董漕政明年命掌南京都察院事尋陞南京刑部尚書又明年改北京工部復改刑部兼都察院左都御史加太子少保賜玉帶五年特令出總川陜湖河四省軍務時沔陽洞庭水冦丘仁楊清攻掠城邑其鋒甚鋭官軍屢失利鐘調土漢官兵統都指揮及宣慰舍人等分道進剿乃敗賊于麻穰灘擒斬八百人俘獲不計賊平藍五鄢老人倡亂二三年間烏合十萬餘人僭稱王號置四十八營總管攻城殺吏鐘與巡撫都御史林俊督兵進𠞰賊敗求撫然意在緩師不至也及至依山為營預邀裂營山縣地且欲得旗牌官為質刼掠如故鐘佯許之㑹藍五以所掠女作已女飾嫁永順土舍彭世麟以結驩世麟白軍門受之鐘令藍五所親鮮于金説五及老人帥賊衆王金珠等二十八人來㑹伏發盡擒之衆聞變大潰鐘遣諸路兵分道追𠞰擒斬七百餘人招降十餘萬露布以聞其後土官楊友楊愛相仇激為變衆至三萬餘流刼重慶保寧諸州縣鐘隨調兵𠞰平之朝廷七降勅奬勵賜白金麒麟服進太子太保未幾被劾乞歸進榮禄大夫録其孫一人入監嘉靖改元詔進階特進光禄大夫柱國遣有司勞問既而卒謚襄惠論曰孝宗嘗謂劉健謝遷李東陽曰洪鐘在薊州時以潮河川開山致損人命故人論之不已時健遷各善鐘而東陽則極賛之豈功之所集其即謗之所興者與孝宗又曰大臣須剛正有氣節而人言鐘務卑諂當退第無實據耳夫鐘之城邊史稱民不知勞而官不妄費及其平鄢本恕藍廷瑞賊運謀設奇一何壯也蓋功實有據而卑諂無據然則論人者其亦務求其實據而可已附録擒洪鐘誌銘為王文成先生所作頗為可信但其敘廷瑞處較實録諸書稍略今從實録分省人物考以正德六年五月擒藍廷瑞考實録是八月不合又兩加太子太保俱訛謬之甚今俱考正陳金陳金字汝礪德安應城人也成化中繇進士知婺源縣以最擢南御史巡按浙江𢎞治三年改山西副使巡撫張敷華檄金増河東盬鹽補宗人禄㑹年饑民他徙無守池者金發帑賑招池丁歸業不數月課竣居六年遷貴州按察使已調雲南父老遮道留金金揮扇却之父老持其扇而泣遂留扇都亭去就擢左布政督兵平竹子箐蠻進禄一等尋遷右副都御史巡撫其地時孟養思陸冦蠻莫屢𠞰不定金請合蠻兵大征朝議不可金使使諭之即輸服願返侵地一十三所已督貴州兵破普安土婦米魯進禄一等滇池水溢淅官民田金以法疏濬復田數千頃召為南户部右侍郎正德改元以右都御史總督兩廣金故有幹局喜建立比至則慕韓雍之為人多彷其制行之栁慶馬平洛容獞叛金集土漢兵一十三萬討之分為四翼以總兵康泰為帥從栁州三江舖入直拔其巢斬首六千六百有奇俘獲無算以兵威風諭古田酋歸侵地輸賦如他日㑹斷藤峽賊阻山久畏罪願通江路自効金喜上其事改名斷藤曰永通因以功進左都御史尋遷南户部尚書復改左都御史掌院事未至以憂去先是江西盜起有桃源華林東鄉大㡌諸賊久不能制巡撫王哲坐失事以董傑代哲至是兵部復議遣大臣總制乃奪情起金官趣令即家就道之軍凡江西浙江福建湖廣江南北廣東鎮巡聽其督發三司而下悉受節制餘郡縣長吏皆得以軍法從事時大㡌山賊大出攻圍武平連陷建寧寧化諸縣贑撫周南已破賊金復督副使王秩等疏捕山谷獲賊帥何積欽劉斌陳鳳球等俘斬一千七百級破寨二十四㑹所調土漢官軍皆集乃下令征東鄉賊參議徐晟都指揮陸潮與土官岑鎏岑猛分道𠞰撲于熟塘于南㙩于赤岸廕嶺所至皆捷斬賊帥徐珏五揭瑞一等前後俘斬以萬計破寨二百六十有奇是役也目兵功多然實性貪好剽殺金不能御致有縱賊取賂者給事趙官劾金師出無律詔切責而是時華林賊羅光權遍掠州縣金檄㕘將趙鉞按察使王秩知府李承勛等討之先後敗賊於局州貴塘擒斬千餘級賊恐分立仙女寨以拒官軍副使周憲戰拔之復連拔雞公山寨乃始移兵討桃源賊參政董朴吳廷舉都指揮髙賔分守要害俘斬數千而副將張勇復統諸目兵毒弩機張所向破竹斬賦帥殷重十洪瑞七等金喜謂功在俄頃值良日與諸將置酒髙㑹慷慨賊偵知無備悉捆所載賂諸目兵乘夜遁時賊已創甚廷舉力追至弋陽將及賊而目兵所至攘攘居民遮訴滿馬首金乃大沮為招撫計㑹朝議亦厭兵聽之遂名降賊為新民即東鄉立為縣𨽻撫州並立萬年縣𨽻饒州州資給新民使居焉然後返擊華林賊張勇復以目兵破其寨斬羅光權等金積前後功加太子太保而新民王浩八叛破萍鄉執㕘政廷舉賊勢復振乃劾召金還削宫保以俞諫代金既而議者謂金功大過小復所加官請終制許之十年起再督兩廣比至首復鹽利開鐵冶佛山堡補南雄潮州逋賊定田州官田租平海冦饒平外洋而焚其僣用服物聲大起先是府江諸苗有大小桐江洛江仙回古茂田衝斷藤峽朦朧三黄出入行剸綿亘二千餘里積久未服金乃發兩江土兵及湖廣官軍征之斬其酋王公珦等俘斬萬級諸苗定㑹流賊龔福全冦連州連山樂昌并討平之捷聞召還加少保復掌院事時王璟張綸並以左右都御史在院金入而三人稱金中都御史居一年請歸又七年卒金歴官至五十餘年多在行間所至以功名顯顧劾者多言金茸闒多嗜慾競進其征江西賊時民謡曰土賊猶可土兵殺我初開永通峽民與蠻市既而蠻有役民者金不能禁民大恐時為歌曰永通不通來葬江中誰其作者噫陳公其怨金如是俞諫俞諫字良佐桐廬人𢎞治三年進士授長清知縣值旱饑諫徒跣禱且賑其不能存者毎嵗首給牛種勸之耕以治最擢為南御史同官有匿䘮者劾罷之既而遷河南僉事雪花崖賊吕梅聚衆亂諫率兵擒之而俘其黨是冬丁母憂正德三年起補山西瑾嘗出内降遣寺丞取縁邊防兵為他用諫慮其叵測白巡撫寢不報瑾怒欲中以法不果遷江西㕘議平大㡌賊鍾仕髙以功進廣東副使中道召為大理右少卿尋轉左亡何擢右僉都御史治水蘇杭時太湖浸渫倡築圩塘以扞水作歌諭民民賴之已而河北賊劉七走江上擢南右副都御史專理撡江備賊患㑹東鄉新民王浩八叛總督陳金被徵去詔諫往代金督兵江西以便宜從事時浩八自萍鄉流刼諸縣衆復踰萬轉入浙之開化而石埭生章仁挾妖書與浩八合副使胡世寧統新民艾茹七往擊茹七亦叛去㑹陶琰發所部兵命㕘將李隆同知伍文定等戰于華埠賊少挫遁還江西陽乞撫隨撫隨叛殺千户鄧俊連營十里諫乃合大軍攻之分遣王秩軍方家墩胡世寧髙賓各據其山岡吳廷舉從賊中還軍武山右斷其歸路李隆與指揮賈鑑率大同兵乗夜冐雨前進出賊不意大破之俘斬千計遂獲浩八而餘賊劉昌三等奔玉山據隘且復推浩三為帥諫督兵追擊斬首二百生擒五百餘昌三與浩三殱焉越兩月而有萬年之變先是陳金挿新民于東鄉萬年二縣各設管轄東鄉雖已叛而萬年尚未動也既而東鄉平萬年疑勢必及已而副使李情復嚴酷獨胡念二者畏李鋐屯餘干不敢發至是鋐卒賊首王重七素狡悍遂鼓衆叛殺李情及指揮千户府縣官以下縱火焚廨舍諸賊響應諫乃調湖廣官軍二千并永順土兵討之獲重七而茹艾七叛東鄉者至是亦就擒乃復討平臨川安逺新淦諸餘賊論功進右都御史既而建昌撫賊徐九齡復叛諫追討之九齡奔湖廣亡何復還醴源副使宗璽及同知汪穎知縣吳嘉聰合圍之斬九齡等班師上手詔褒慰加秩一等先是宸濠蓄異謀聲言得上賜欲撫臣以下朝服入賀諫不可且時治其左右之不法者濠久嗛之至是諷所親御史張鼇山劾諫言江西劇賊自用兵以來日奏斬獲其所奏之數日以萬計誠如是宜數月間賊無遺種而乃至今未殄者豈天之生賊過䖟蠛哉虚冐之使然也夫撫之而叛所恃在𠞰今𠞰之而愈叛則我將安恃乎夫賊久不殄民盡為賊請罷諫代以能者章甫下而捷音至得不問既而南給事御史復追劾諫如鼇山乃召諫還引疾以中㫖奪官家居久之嘉靖初用原官起督漕運平河南賊之流淮上者既而召入理院事尋致仕卒贈太子太保謚莊襄論曰治盜無良法斬艾不可盡也又多傷良焉而縱舍之其能無蓄患乎陳金俞諫之功章章矣乃皆被論劾其所以處之有未盡善故也雖然文法之議賢者不免而史又云劾諫者寧王為之然乎哉陳天祥陳天祥字元吉吳江人以武功左衛籍中𢎞治九年進士授青州推官召拜御史正德改元巡按雲南遷西安知府五年以副使備兵天津當是時河北賊大起畿南州縣相驚以賦至天祥練卒伍塞要害列營築堡為戰守計六年五月賊首宫太保突犯天津鋒鋭甚天祥親督兵迎敵兵既習戰無不一當百自旦迄暮大破之擒官太保及其黨事聞賜牢醴進祿一等尋以御史蔣瑶言陞天祥少卿仍駐天津理兵備未幾條上六事大抵以賊流山東當遏其所向德州守備必駐兵東陵韓村而後可以防河東河間守備必駐兵故城髙州而後可以防河西㑹劉六攻德州不克將之霸州臨行歎曰吾獨不敢犯陳少卿耳天祥聞其言大駴謂賊雖徙霸將必襲天津以牽制我于是益設備分兵布伏斷賊要路凡通津往來皆植木絙鐵使賊舟不得前又慮賊衆我寡急請都督張俊率千人待之賊果至天祥遂與俊夾擊賊大敗斬獲甚衆乃以功進左僉都御史領兵備如故時吏部尚書楊一清謂天祥邊才當歴駐他鎮以盡其能而廷議謂賊逼畿甸非得其人抵要地則樊蔽單弱故賊未即殄天祥雖遷而不能去也賊平移撫貴州㑹程畨苗亂天祥調各路土漢官兵分哨進𠞰苗驚潰遂破其寨擒斬六千級捷聞賜白金文綺明年召歸理院事宣大告警廷推天祥督軍務敵聞遁去天祥奏言守邊在設險今雖禁伐林木而豪强多闢山場立庄田以致邊無阨塞宜勅令禁絶報可既而敵又冦延綏復推天祥以左副都御史提督陜西諸路軍務敵又遁去詔賜九綵衣加禄二等尋徵還已奉命理浙閩鹽政道經吳江卒于家贈南京兵部右侍郎初天祥按雲南有左道號阿吒力朶兮薄者自宣德間賂中貴授官蔓延至今輒聚徒數百人祠鬼禹步相煽誘天祥請發所司編管如軍民例時論韙之天祥臨事能斷所至有聲其在天津功尤著已而科道交章劾賴上知天祥得置不問益委任焉然天祥卒後諸子争訟積貲至十餘萬人以是疑之叢蘭叢蘭字廷秀文登人𢎞治三年以進士拜户科給事中巡視光祿上言禁中齋醮係當年繼曉李孜省以邪術誤先帝者陛下既已置之于法而光禄供器依然註備皇壇之用是自誤也請罷之報可京師正月上元四月八日軍民婦女多炫服行道路蘭適以巡視禁止而太常卿崔志端自稱道流不願受禮部統轄蘭面斥之㑹清寧宫災以陳言請去侍郎林鳳巡撫錢鉞太監梁芳都督吳安等聞者心惕時奉命揀選官軍提督陳良請勿選守門者蘭持不可既而預選者仍充門軍蘭復奏止之言國初諸軍皆𨽻三營其後選鋭為十二團營不應差役既以邊方稍寧凡土木之興團營諸軍皆疲於奔遣不習操練往嵗調大同悉不堪用今臣任操練原許以專事簡撡無復差撥乃命下月餘而猶然被役非所以示信也已遷通政右㕘議轉左命經畧邊關自紫荆至倒馬正德初由左通政督理延綏邊儲㑹有寧夏之變上書陳十事瑾惡之及瑾敗遷通政使改左僉都御史督儲寧夏㑹河北賊起兵部言鳳陽陵園地宜重臣防守召蘭巡撫廬鳳滁和而其時嵗饑兼行賑蘭至鳳陽值賊已壓境蘭督吏士防縁河津隘而躬擐甲胄先吏士馳擊俘斬二千溺死者以萬計乃行賑所全活又十餘萬事聞璽書嘉勞賜金帛牢醴進秩一等以邊警巡西路諸關兼督宣大遂以右都御史總制其地是夏冦轉急詔京軍出禦中官監之而蘭駐陽和節制諸軍冦分道自偏關薄大同進犯懐安轉攻白羊浮圖峪入宰武關略陽和定襄復自萬全右衛從蔚州轉掠而南蘭督軍追擊隂使炊黍于諸堡雜以毒乃設􅓓石火矢于陽和天城伏卒其傍冦飢食毒發伏者乘之中矢石奔潰遂陳斬百人而奪其牛馬什器捷聞顧與監軍者不合薄其功明年改督漕運權貴不便者請罷漕專理巡撫中官劉允迎佛西域過淮請見蘭辭之及濠反蘭督兵江上捕賊諜武宗南巡識蘭名曰是為總制時禦敵嘗墮桑乾河者也蘭所治供張不能當他郡十二上不之罪久之遷南工部尚書世宗初立自陳求去不允御史陳克宅劾其附中官隂事而其時治彬寧獄法司亦有言蘭撫鳳陽時阿奉失察不宜處位詔置勿問既而致仕給夫廩二年卒贈太子少保論曰明亡于流賊而賊之流自河北始趙鐩嘗教劉六為影響影勿使踐響勿使追天下有不宿粮不薦居而人猶得困以疆場且詘以芻稗者乎吾因地而食官軍不能指民積吾易馬而馳官軍不能窮馬力以故漂流蕩渫展轉澒洞而國卒以亡然涓涓之始誰為濫觴而卒抵于是論者謂有明三百年間凡三更賊禍而勢若一轍王振用事則葉鄧以起逆瑾干紀則趙劉發難魏閹厚毒則闖獻播烈中人盜賊氣類相召理固有然第當其時則皆有指名自好經術素嫺者為之耆定故二正之間自新建咸寧外若項忠彭澤林俊馬昊諸人由此其選而啓禎以還則握廟算者既非其人即閫外驅馳又不能無從流愈下履扁愈庳之勢則以人定國謂非用世者所當鑒與故平賊名臣鉅細不一而第彚其略可考見者鱗比櫛次以覘得失若夫中錫風采最為矯然而過持偏見遂致禍敗人國幾不可挽馬昊克敵制勝略比韓雍而松潘小挫喜事之戒彭澤洪鐘陳金俞諫皆能以𠞰撫並成功名而議者多有夫不詘不招中錫罔聞已降不殺馬昊昧之無尸無從者不庸議𠞰時嚮時背者難以言撫則陳金俞諫輩皆不能朗然有所别識故時與遇合不必以人國僥倖而尺長寸短瑜瑕顯然至若功名末路幾于垂成而物必敗之前後相觀儼若霤滴雖忌之者實然然而生平審處之際亦大槩可睹已西河集卷八十二
