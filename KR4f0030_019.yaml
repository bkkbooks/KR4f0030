body:
  text: 西河集卷十九翰林院檢討毛竒齡撰書六答蘭溪唐廣文翼修書闕問雖日久然猶在浙河首尾每思覔蹤迹不可得舊夏貴鄉李紫翔金澤公來亟詢近狀又以異縣不甚悉但先生年尚富學問無盡境某崦嵫之嵗又三經大病癸未冬感寒幾死昨秋又伏熱幾死今則寒暖交煎目不辨黑白心數不能記一二居然一廢人矣惟懼首丘無地急還蕭山洗藥城東舊廬者已及半年乃逺荷書問且貽我多物四顧眙􅌓瀫溪名紙足佐我染板已大費功力况復載酒載肉使老病七筯為之失措且慙且感先生著書等身向俱賜讀過今從鐫板通讀尤為起敬每所諄諄皆身心切要之學子弟效法足以厚家天下人效法足以厚世向謂聖道不沫賴寶婺多儒者今益信矣苐以先生之學加之躬行某方撫楷之不足幸生平奉教尚非偶合德之不孤全藉相長而左右謙抑太過稱謂乖錯使人難任豈以某不能捧摯故逆施耶夫以如是聞人在身後所許與當代何異王虎文一傳已足嬗世顧以某之知愛乘此餘齒自必附一言以藉綴翼末祇恐翠華將臨刻下正西渡謀所以迎駕之法其報命之日則未可預定耳外蒙垂問廟制二則諸侯五廟分昭穆每廟不知是二層各三間否某按七廟五廟三廟二廟其外皆有繚垣環之所謂都宮也其中則每廟又各環以墉所謂宮墻也但門雖連墉亦稱門墉而自門而堂而室必列三層非二層也門止三間而堂與室必五間自兩楹東西階外又有東西房兩間一名東西夾與兩階之堂各隔一墻謂之東西序序者墻也室制亦然禮所云藏主西壁與尊于東房者皆室傍二夾為之是每廟之門皆止三間而堂室必五間鄭康成謂天子諸侯有東西房大夫士有東房而無西房此屬異義不足據也至又問大夫三廟不分昭穆則三層一直貫下矣但不知每層是一間是三間則大夫士廟皆分昭穆某向論廟制謂别子三廟但有祖廟而無昭穆者非謂不分昭穆也謂有昭穆而無昭穆之主以實其中也蓋大夫三廟有二等一是父祖合太祖為三廟王制所謂一昭一穆與太祖之廟而三者此是别子為大夫一等蓋别子是諸侯嫡弟之長者分為大宗其初立三廟止得立其父一廟名太祖廟亦名宗子所出廟而祖與曽不與焉禮云大夫不敢祖諸侯焉得有祖曽二廟上瀆先公是必虛昭穆以俟後之身入之如季友是魯桓别子則身為宗卿但立桓廟而昭穆虛主至季文子為宗卿然後以季友入穆廟武子為宗卿然後以文子入穆廟季友入昭廟而其既則以次祧入太廟共祭為百世不遷之大宗故曰立廟之始無昭穆焉若凡為大夫則不立太廟但列父祖曽而三如夫子為大夫則鄹邑大夫以上惟防叔伯夏合作三廟此如祭法所云大夫三廟曰考廟曰王考廟曰皇考廟者此又是一等然三廟則一中一昭一穆二廟則一昭一穆無一直貫下者即漢後同堂異室亦橫貫非直貫也若一間三間則頃已明言矣此禮頗煩璅不能備舉容續寄以鬯其説小兒家姪原通籍仁和此是先生舊學師門下而反辱貽問且小兒館杭州家姪在京不惟無報將兼乏候答惶悚極矣統俟將來彚復耳拙著經集四函藉使呈教諸俟另寄不盡不盡答李恕谷問笙詩并樂節書閲嵗不達問日濱于死接書強視雖瞪目亦為目汁所掩一則自悲老去一則何易接此口語因隨所來訊略盡欲答據問笙詩有詩則鄉飲酒禮笙入三終將以笙笙詩耶抑亦别有歌詩者而僅以笙應之耶此問最善從來辨笙詩未有辨笙其詩者夫所謂笙詩謂笙必有詩非謂笙詩之必有歌也凡詩可以歌亦可以笙所謂笙詩有詩謂笙詩之必可歌非謂笙詩之必不可以笙也蓋笙與簫與籥與管四器皆主聲詩皆應歌之器皆在堂下原無徒器者但有歌而器有不歌而器總必有詩其歌而器如鄉射禮之工歌于上而堂上堂下之笙瑟皆應之即鄉飲酒禮之合樂是也此有歌之笙也不歌而器如大射禮之管新宮始奏禮之管象堂下俱不歌而俱以管笙聲其詩即鄉飲酒禮之笙入間歌是也此不歌之笙也是以春秋傳有歌鐘即頌鐘頌磬所以應歌尚書有笙鏞周禮有鐘笙即笙鐘笙磬所以應笙夫笙又有應則笙即歌矣此如漢橫吹東西晉大角皆用之軍中並無歌工而曲中有詞如上之回思悲翁等則豈有笙管而反無詞者故往以不徒器折其無詞謂不如步瑟調笙之憑虛作聲無字音耳非謂其有字而不歌也若又問歌工上下多寡經無明文則漢後歌工多而授器少古則授器多而歌工少即如飲射一禮或四工則兩歌兩瑟六工則兩歌四瑟而笙管之數不與焉然而歌工必在上即笙管鐘磬皆列堂下而皆可以應其歌是以合樂之法工歌關雎則堂上之瑟堂下之笙管皆羣起而應之其歌葛覃卷耳鵲巢采蘩采蘋皆然舊注所謂合樂者合金石絲竹以歌之金石者鐘磬絲竹者瑟與笙管也乃孔仲逹誤注鄉飲酒義謂上歌關雎下笙鵲巢以應之則世無有以張家之聲合李家響者來問所云各詩各章長短不齊此明了之語注經之儒于此不曉宜乎六樂一經歷萬古如長夜也但世有過為分别者謂歌工必堂上堂上之瑟必不如堂下之以器器詩則又不然射禮至命射時歌工皆遷堂下而樂正命絃者曰奏騶虞則瑟工亦不歌而但瑟騶虞之詩以主鼓節所云魯鼓薛鼓者是歌工亦居下琴瑟亦器詩上下有尊卑八音無貴賤也至又問歌必在前舞必在後特不知舞曲與歌曲同終抑舞曲之餘又有歌曲則有以舞曲終者春秋傳季札觀樂見四代之舞而即觀止是也有以歌曲終者仲尼燕居序大饗之九節以獻賓樂作為一節賓酢樂作為二節升堂歌清廟詩為三節下管象武即舞也為四節至籥序興謂以籥吹又以籥舞也為五節薦俎而樂又作為六節將行歌采齊七節賓出以雍徹以振鷺八節九節是歌後有舞舞後又有歌况燕禮有無算樂將歌舞迭更而無算數即燕饗一禮且然至于祭祀之徹饌送尸其歌雍歌夏皆在舞後更無論也若琴色七絃分正清向未即答以病不及也嗣後即有答書而又不能寄今見來書所録備正清之説于七條十三刌之中雖與僕説稍未合然故不礙聲律所謂泛濫言之而五六皆見斯已耳舊答書并寄餘來録俟稍健細檢以復不具答張鶴門論九宮書昨説九宮法不能罄析蒙并示陳君藴先所詢札覺有未盡然者據云世所傳九宮之法蓋就一二三四五六七八九數而依次遞數以一居一二居二三居三四居四九宮皆各居本數者考張衡九宮法曰太一天神下行八卦一行坎一原居正北也二行坤二原居西南也三行震三原居正東四行巽四原居東南也由此而中宮而乾而兑而艮而離皆依八卦方位順次數去則于位于數仍未曽解世亦知位與數何自始乎易繫曰天一地二天三地四天五地六天七地八天九地十此大衍之數也乃演其數者則曰天一生水于北地二生火于南天三生木于東地四生金于西天五生土于中此正數也然有生必有成有四正必有四維于是地六成水于西北與天一并天七成火于東南與地二并地八成木于西北與天三并天九成金于西南與地四并地十成土于中央與天五并而五生五成四正四維之位數定焉故曰天數五地數五此數也又曰五位相得而各有合則位也然則位之必倚數明矣乃繫于説卦則直曰坎者北方之卦也離者南方之卦也震東方也兑正秋西方也乾西北巽東南也艮者西北也坤者致養謂南方長養萬物致盡則轉南而西為西南也則是坎一離二震三兑四乾六巽七艮八坤九實以位倚數以卦倚位確不可易故曰五位相得而各有合位者位此數合者即合此數也今以坤為二而曰二行坤謂之二居二四為巽而曰四行巽謂之四居四推之而乾兑艮離皆依八卦以順數則以離二兑四巽七坤九之定數忽改作離九兑七巽四坤二其于大易大衍本來位數俱差錯矣試問以離為九可云地二生火乎以兑為七可云地四生金乎以巽為四不得云天七成火以坤為二不得云天九成金况六為老隂而乾反居六九為老陽而坤反居九以是為乾坤互成隂陽交濟之數所謂相得有合實本諸此而乃曰坤數居二離數居九則乾交老陽離互老隂易卦之九六不是乾坤而是乾離其于八卦已大亂何况九宮所以相地諸師每造海角經以誤人世而世卒未之悟也然且曰以一始以九終始于中男終于中女縱橫交互皆成十五之數夫始于坎終于離當是以一始以二終以天生始以地生終以中男始以中女終並無以一始以九終之言此固易緯九宮所未有也至于縱橫交互皆成十五則以九宮改位配之原數方是十五若以八卦配原數則毋論其他即在南一重中離二數左坤九數右巽七數共成十八焉得成十五乎且九宮不始張衡傳也自黃帝創九宮法而周公取其法以作明堂此在大戴感德篇早已有九字之訣傳于西漢至東京崇尚緯學于是有乾鑿度坤鑿度乾坤鑿度三書相傳為鄭玄注者中有太乙下九宮法為張衡所本又有風角九宮為靈樞八風所占驗者則世並不傳此從舊注大戴禮鄭注乾鑿度一考而即得者若云河圖為體洛書為用則圖屬八卦書屬九宮截然兩分並不相為體用乃又云洛書祇于後天八卦中加一五數則八卦原無先後天之説藉有之亦但減十數並不加五數何則以河圖八卦有地十洛書九宮無地十河圖數五十有五洛書數四十有五直減十數而以為加五則于陳邵所傳偽河圖偽洛書之數尚未考見而欲定卦數不可也若云先天後天卦外别無坤南巽西兑東南離西南之卦則此是九宮非八卦也九宮是九宮八卦是八卦豈有既改九宮而仍以八卦行之了無分别者如此則但稱八卦足矣何云九宮乎豈行九宮法者但呼坎作白呼離作赤便足分别宮卦乎古人造一法必有一理八卦之四正四維無不相尅故周公造明堂九室定為二九四七五三六一八之數改巽離坤兑為兑坤離巽而四正四維無不相生如八卦南北水坎火離東西金兑木震東南西北水乾火巽西南東北金坤木艮皆彼我相尅而明堂祇改四卦而南北金坤水坎東西木震火巽東南西北金兑水乾西南東北木艮火離皆彼我相生此正天地數位相得有合之轉變與八卦全反而欲以八卦核九宮此方枘而圜鑿也至又云隂陽家稱坎山離向者忽改而為坎山坤向稱震山兑向者忽改而為震山巽向不無驚駭而去之則地師相地祇當以八卦方位一準舊説斷不宜以九宮之説略溷其間蓋厯本所載紫白皆近世荒唐之言非舊法也必欲兼行其説則倘相陽居或遇三楹三重如九室者或可以九宮法核之倘相墓域意者坎山離向其離來所對有似金形則坤向可相生矣震山兑向其兑來所對有似火形則巽向可還生矣相地固荒唐且斷不宜用九宮而杜撰求全或出諸此要之九宮八卦原不並用况紫白尤九宮法之邪説古無是也請以是質之知者或不謬也答柴陛升論子貢弟子書前論陳子禽集注謂陳亢孔子弟子或曰子貢弟子其或曰一説無據王草堂作集注補直謂二千餘年並無言陳子禽在端木門者此朱子臆説也時閩中張孝廉在坐便云朱子未必是造説特引據稍鹵莽耳豫曰何曰嘗考注疏引鄭康成注子禽弟子陳亢也子貢弟子姓端木名賜朱子才一見去恰似陳亢也子貢弟子七字連屬而遺却姓端木名賜五字故如此豫深服孝廉善讀書有識而坐客不然謂從來讀書人豈有此讀法豫曰漢書地理志云錢唐西部都尉治武林山武林水所出東入海而晉劉道真作錢唐志誤云西部都尉治武林山亦是才一見去似武林山三字與西部都尉治五字連屬而遺却武林水所出以下八字至今顧夷吾酈道元輩皆謂錢唐舊治在武林山即今所稱靈隱寺山者此千古笑話客未聞耶各眙􅌓而罷今來訊及此且以淮安閻氏作毛朱詩説為疑此正可與前説鹵莽相發明者朱子稱國風為淫風亦是誤讀論語鄭聲淫為鄭詩淫詩實不淫也亦誤放鄭聲為放鄭詩夫子三百篇並不曽放鄭詩也而後儒王柏曰不然鄭詩實淫朱子實放鄭詩夫子三百篇已燬于秦火久矣今行世三百篇是漢儒所偽造者實是閭巷浮薄之詩是淫詩而世不曉也其説已載于宋史儒林傳而究竟無據明儒程敏政乃改漢書劉歆傳以附會其説劉歆傳云孝文帝時詩始萌芽凡諸家傳説皆立學官在漢朝之儒唯賈生而已至孝武皇帝然後鄒魯梁趙頗有詩禮春秋先師皆起于建元之間當此之時或為雅或為頌相合而成而敏政云孝文時詩始萌芽至孝武時頗有詩或為雅或為頌相合而成則三百篇明明是漢儒偽造而淮安閻氏則又引敏政此語著為毛朱詩説一卷公然雕刻以行世實不知程閻二君于頗有詩禮春秋先師皆起于建元之間十五字果頑鈍失心祗讀得三字而不見十二字耶抑亦效前儒鹵莽剽裂竄取但割此三字而他文可不顧也况為雅為頌是髙叟為詩伯魚為周南召南之為本説詩非作詩也且朱子亦不敢稱淫雅頌也儒者強解格物為格致事物之理而實不能格反毁斥六經改竄典籍其鹵莽習氣亦有駴人聽聞者朱子闢大禹謨以後五十九篇為偽尚書未有據也今文尚書二十九篇者出伏生屋壁而先上之者也至孝武時魯恭王壞孔子宅以擴其居然後古文尚書百篇出孔子壁中其時孝武皇帝敇孔子之孫安國作尚書傳而巫蠱事發其傳不曽上而罷至東晉時經永嘉之亂前此伏生之徒歐陽夏侯凡為傳注者其書皆七而古今尚書經文獨存于東晉祕府間故豫章內史梅賾得安國之注而上之此上孔傳非上尚書也乃隋書經籍志明云晉世祕府所存有古文尚書經文今無有傳者至豫章內史梅賾得安國之傳奏之而朱子又鹵莽讀去謂東晉梅賾始得上古文尚書必是偽作竟忘却安國之傳四字以致吳澄趙孟俯輩竟斥為偽尚書將五帝三王舊文刪之廢之凡六七百年其禍烈至今未巳然且附會之徒各相沿以改襲舊文為故事吳澄遵朱説直廢古文尚書但録今文二十九篇名曰尚書纂言據其説謂漢書藝文志云尚書經二十九篇是今文古經十六卷是古文是班固原斥古文為經而以今文為尚書古文不曽名尚書也歸有光作尚書考異序亦引志文詆古文為晚近雜亂之書而萬厯已丑會試主考許國王𢎞誨以偽尚書策舉人而焦竑對策遂陽陽引據志文請刪去偽尚書一十六卷而主者快之竟以此冠會試本房薦殿試第一勒其文以為法式今考藝文志則稱古文是尚書今文是經與吳歸焦三君所引據正相顛倒則此三君者亦各具心腑各有面目豈一齊俱喪心瞎眼一樣顛倒即欲附會朱子或不憚毁斥先聖先賢之書以自坐誕罔然保無一人讀漢書者而乃一誤再誤致六七百年間祇曉儒説極溥天之下朝野官民並無一讀書人設科取士録文布式皆天昏地黑彼我顛狂致于如此此非細故也此下缺二十三字故來訊據草堂所論謂集注于浩生不害認作告子此緣誤讀趙岐注告子名不害語然趙注于浩生不害明云浩生復姓名不害則顯屬兩人淡臺子羽非顔子羽也若謂前人名氏原有成注雖鹵莽不當有誤則約略計之亦殊有不可解者如曽西是曽子之子非曽子之孫子西是鄭公孫夏不是楚令尹子申虞仲是仲雍曽孫周章之弟仲不是仲雍孟之反是春秋孟之側不是莊子孟子反蘧伯玉不對放弒之謀是寧殖之子寧喜不是寧殖公子糾是兄不是弟小白是弟不是兄左丘明是魯太史不是古之聞人公叔文子是公叔發不是公孫枝接輿與孔子下為文不是人名孟施舍姓孟施不姓孟太宰或吳或陳不是或宋政逮四世是文武平桓不是武悼平桓曹交姓曹名交不是曹君之弟太師摰即太師疵不是師摯南宫敬叔是孟懿子之弟故稱叔不是懿子之兄南容是南宮適即南宮縚不是仲孫閲南宮敬叔是即人名一項各有明據然亦鹵莽多誤如此真不可解足下有家學且善讀書能俯訊及此此亦不孤有鄰之一證諸有未備統俟過寓更悉不具與沈思齋進士論薄后稱側室書據鄭丹書致仁和謝明府札謂嫡庶之嚴苐嚴于封建之世以世國世官防篡竊也今有何立及有何襲替而尊嫡賤庶婦等傅婢子比厮養澆風薄俗悖禮孰甚此一説原倡自僕而丹書發明之然僕三輩皆嫡出不過論此以救世非有私也足下既疑其言又不能據一典禮以駁正之祗引漢文致南粵王書謂自稱髙皇帝側室之子其為名義一何凜凜僕嘗謂經學不明不可論史生平最恨宋儒史斷與聖經大悖急欲通論二十一史而時不我與將就木矣即此一語在數千年來誰不嘖嘖僕獨惡其喪心病狂悖義害禮之甚夫薄姬入魏豹宫轉輸織室其為微賤誰不知之但以名義論則此時是母后為髙帝皇后史稱迎皇太后于代是也夫既稱皇太后則雖告天地祖宗亦如此稱觀其後光武中興設郊壇洛陽以髙帝配天薄后配地直稱髙皇帝后其為名義凜凜如此乃以所生之子作繼世皇帝告一反側畔亂之蠻夷君長而造此穢稱褻天地薄宗廟斥嫚尊親虧辱國體為天下臣民所恥笑而舉世嘖嘖何也曰不讀書也春秋十二公八為庶子然而其母薨葬夫子必稱曰夫人曰小君人苟讀書此即名義矣且天下與母孰重瞽瞍殺人身罹國法舜寧棄天下必不使以絲毫辱親今薄后無罪皇帝賜書不過一畔夷冦邊已耳其于天下不必棄也縱使此語一出南徼盡平蠻夷君長並繫頸而致之闕下吾猶不以彼易此况區區尉他謬去帝號而仍稱于國跋扈如故何苦為此况薄后之崩在景帝二年景帝帥天下臣民行三年喪亦以春秋僖母成風薨于魯宣之四年夫子書喪葬服喪與嫡子嫡孫無異故儒臣據經而行此禮歷見之晉儒何澄徐廣之議是苟讀書識名義則薄后本事亦尚有引據不能盡者足下好論史或亦于此一諦觀可耳西河集卷十九
