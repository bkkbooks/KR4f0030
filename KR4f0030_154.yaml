body:
  text: 西河集卷一百五十四翰林院檢討毛奇齡撰排律聶明府生日荀藐來榆次言遊在武城愛將花自種操與水兼清飛舄瞻鳬近圜扉見草生亭邊三老約指下五絃聲楚户全輸版甌蠻尚用兵賣刀同虎渡懸鼓中雞鳴白望聞俱斂黃巾戒勿驚仙郎真列宿神父比長庚棠舍千秋意桑􅋃四射情登堂無可獻折取早梅馨雙壽篇贈餘姚諸徵君丈人稽郢後垂老舜江邊自昔稱三俊於今踵七賢占為鴻漸卦注就馬蹄篇隱向梧中據間來栁下眠銀牀穿碧甃寶鼎發丹田藜杖鄉初設桑􅋃牖自懸庚寅皇覽日甲子義熙年物外餘幖帙閨中喜緼絃龎公偕伉儷鮑女本神仙河鼓牽朱輞初度在七夕後江魚列綺筵相思何所寄唯有綵霞篇遙同淮上諸公九日遊裕親王園林登髙限韻得徒字冇序豫于九日過舒南宫舍人邸舍值淮上丘學士兄弟李明府張孝亷諸公車馬四集將以是日遊裕親王園林作題糕之會呼豫共載豫適以他集不能從既而諸公各有詩即席分字限一十二韻彚録見示昔梁孝王闢兔園召客自睢陽為復道屬之平臺凡四十餘里而河間王德嘗築日華宫置客館二十餘區以待學士今親王為帝室賢胄肺腑枝葉其開園築館原足為賔從厠足而諸公以鄒枚之才偶接蘭坂即能銜杯抽牘以當獻頌此在鄴宫宴集所稱良辰勝地賢賔盛主莫過于是而豫以無分不預則其為悵恨可勝道哉嘗讀韋學士和唐主九日詩知學士亦未嘗預會強顔作和而李白九日不與崔侍御同遊敬亭然猶有寄侍御詩見之本集豫效矉附和亦請限韻顧未知其與古人何如爾康熙戊午重九後一日某識九月入皇都秋髙海雁徂將車來舊邸懷刺向當塗紅藥頻年憶黃花滿地鋪宋公方戲馬陶令正提壺期赴尚書逺筵陪侍御無賢主開碣石豪士進雕葫積善坊邉桞髙颷館後梧留題雲作牘分佩水為符帽落違江夏巾摧記義烏登臨還倚樹附載豈編蒲梁苑饒詞客燕臺盡酒徒相逢能唱和清興未曽孤寄祝同年汪編修尊人雙壽三壽函金册雙星轉玉繩裔傳汪仲舉兒似栁吳興天上絲綸展人間歲月增桑􅋃懸鵲血門帨絓龍繒國老扶來罕閨間得未曾登朝惟齒尚舉案與眉憑鼓瑟歌方並開樽酒是朋千年桃實結庶品蕙肴蒸鳳喜翔新竹鳩看集古藤傳經貽碧檢染紙用青菱瀛海濤千頃丹梯路幾層一觴慙寄祝俯首誦岡陵奉酬董公子致平貽贈十六韻紅杏園初啓青槐路未遙髙門逢勝集公子踐佳招碧浪迎人醑紅泥坐客寮車回攀栁候茵藉落花朝誼以雷兼鮑名如董共鼂文章橫蓋代意氣上干霄八斗才無敵三餘工不佻虗懷嘗抑抑玄箸本超超東閣張筵遽南皮發興饒庭聯天廄馬世插侍中貂衣染牆葵汁書縈帶草苗琴心傳鳳曲劍鼻刷犀膠酒榼頻添漲薰罏欲上潮邀朋皆黼黻投我是瓊瑶道在雲嘗合詩成星暗搖雙飛看鷙羽不忍度河橋許使君詩聖代推觀察雄藩重列侯雙旌開鎖鑰千里藉懷柔勵治資良牧平情簡督郵巡軍星照海行部雨隨輈碑接山陰道屏髙甬上樓旬宣踰八越保鄣近東甌鑑逺無疑牘刑寬省要囚亷辭原憲粟儉著晏嬰裘勸駕乘羸馬耽書臥小舟亭遺黃絹字道鮮赭衣偷入市擕刀賣當筵借箸籌捐金輸士困貸粟賑民流自愧樗材劣曾經藥籠收宫牆傳五教稷下闢三鄒絳帳依南郡青雲起道周微文難紀績聊以代方謳題傳經堂詩至德聞荀里髙名著鄭鄉人方垂繼世家本住橫塘門對新花嶼經傳舊草堂青山回幔檻緑帙滿巾箱書帶牽隄逺垣衣繞砌長生徒間授几賔客靜傳觴詞業延中祕忠言肇侍郎其先侍郎公為靖難建言有聲一門追顧陸四世見袁楊駿烈遙堪誦清芬久自揚檥舟停下去豈是戀滄浪蒙孫國公徴灝請召西園宴集有贈時豫將南歸舟次奉答國公係義王之子西邸恢前緒東吳紹世修標名同燕頷覲面在螭頭爵過平原秩人如康樂侯田猶頒鄠杜文已駕曹劉家自傳盧矢門無詠蒯緱張錢長却會禰刺竟先投突室琴樽靜間園竹樹幽髙談驚逺聽散帙恣冥搜醴向晴軒設車從眢井留鼎脣沾雀蛤褥縫對犀牛慿袂先王几觀銘舅氏卣當陽褰武庫𢎞正醉書樓宴比東堂勝詩方南面優公詩名擁書堂集見示天才傾八斗國士感千秋金劵文難紀銀泥緘未酬栁城相望隔思煞潞河舟寄祝劉母王太君錦􅍤開雲縵朱門對水澄清樽傾緑醑峻節著青菱晚歲能餐桂當年重飲冰硯瀠提甕水書照辟纑燈身是陶貞烈庭趨劉孝陵筓珈頒錯落棹楔表峻嶒甲子人間換初陽地上升環葭飛玉琯覆斗絓珠繩衣舞新緺綬堂鋪舊毾㲪桃花開有日坐見歲時增看菊聯句為楊雲士菊圃作北苑尋幽鞠甡東籬見治蘠佳名渾不辨張杉妙植想多方種集伊川盛甡泉通酈縣香銅鐶鋪處白杉金碗鍍來黃龍腦蟠銀埒甡猧絲旋錦囊輪銜千輻廣杉錢取五銖良蠟朵紅兒髻甡檀窩青女粧苞沿舒茗甲杉瓣底綴瓜瓤敞類仙盤舉甡圓同佛面張微紅名馬藺杉小臭似蛇牀塢闢辛椒外甡園鄰苦竹傍穿鶯疑住久杉報雀欲銜將髙士裁為佩甡夫人染作裳分花餐屈子杉釀酒送長房合蜜團松餌甡和英煮桂漿翻叢袪蛺蝶杉啄蕊妬鴛鴦暫吸枝頭露甡潛窺葉上霜候遲猶猗狔杉風動自低昂重疊排成障甡離披布近牆記時存小正杉遣興在重陽賜鄴悲將老甡橫芬誦有芳秋葩應晚歇杉為我罄餘觴甡送任生北遊有序春草初碧朝雲欲馳集江上之離亭送樂安之公子千里名髙逺度黃金之館三洲歌苦同銜緑玉之巵趨庭須早計但作方遊即席有貽言不拘句韻客路飢驅逺離筵酒上微關山方漫漫楊栁正依依市劍吹花鍔征衫換葛衣燕臺需駿久塞館度鴻稀薦引思嚴助遨遊重陸機高堂頻慰去勿使傍柴扉贈胡少宗伯八韻南省推常伯東華景從臣披雲常見斗有嶽必生申祕閣專詞翰崇班領搢紳典從三禮貴賔與四門親伯始才無敵蘇湖學更醇名標仙闥上家在射湖濵秩序追前哲文章奬後人升堂才咫尺相望轉逡巡寄祝王匡廬先生七十初度即新城王禮吉東亭阮亭三先生之父也甲地開華閥髙筵啓玉壺人間瞻岱嶽天上見南􅋃苐五名偏重無雙譽不誣孝思懷牧伯至德紹司徒書繫階前草冠栖城上烏交遊同郭泰論議近潛夫皂帽龍垂尾丹山鳳有雛却官成八俊教子得三珠賜饌長遺膾徴車好載蒲鸞書天外錫鳩杖國中扶奕世多傳寶羣賢有繪圖一觴隨獻逺未敢效吹竽吳楷招會湯餅聯句湯餅傳瑶席張杉金錢壓綺襦石麟摩外士甡河鯉饋中厨主爵催浮白杉賔衣有拭朱試啼知大器甡占慶見充閭九子烏生好杉三嬴馬相殊髙虹天半玉甡滿月夜來珠父子吳中復杉階庭謝幼輿他年詩禮貴甡看汝早趨陪杉吳氏又氏謝故有幼輿句禹陵夏后南巡日茅山啓閟宫九川方灑滌萬國已來同宛委藏書古衣冠輯瑞隆羣侯遵會計江漢仰朝宗祀重陪方鎮功成抑下鴻層欄回綵鳳畫地有黃龍藻染梁紋緑花銜碑字紅千秋新貢賦八越舊登封俯首滄江外摳衣饗殿中翹瞻明德逺去此欲何從郡太守許公遷寧紹兵巡副使賦贈中巡加八使上秩賜通侯控地連滄海開轅在越州金茄吹外幕玉箸借前籌民事關心切兵行錫命優專城原倚重治郡早推尤草檄慿馬首封書褁箭頭盜因虞詡息人願賈公留攀軾同蟻附遷枝相鳥求碑橫剡上路靴挂郡東樓俗凡留官者脫其靴挂于庭神武調軍騎星文割女牛寇恂需歲月杜預注春秋公注左氏傳付刻自愧編遙服深蒙顧敝裘釋寃開蔀屋解澤到荒丘曽諭治先壠最切茂樹陰方接髙天戴未休江湖千萬頃誰敢賦涪漚丘大參年伯七十初度南極分樞久東山屬望專名髙公路浦家近射陽田雲閥青齊舊星垣碧漢連司民延世澤參嶽領時賢漢署常紆紱淮流自理緡井公六博戲韋氏一經傳玉樹圍瓊砌金英燦綺筵座中朱履集階下綵衣翩蓬島依兄弟槐廳入後先看雲還棘寺曙戒先生以學士左補大理愛日度花􅝩謂季貞檢討也佳氣浮簾幕輝光照里㕓門楣揚鳳翮地胄引蟬聨共有稱觴慶寧忘授几虔相隨羣從後敬誦白雲篇奉謁通政楊公林居感贈一十四韻上闕標雲路髙門啓道鄉詩書傳百代名德冠諸楊臺出金銀表官居喉舌傍天書垂左掖卿月照東堂假沐還泉石因間問梓桑往來申浦楫偃息午橋莊自愧紆三䇿曽經泝九方豫讀卷舉主出公門下袁公四世植陸氏一田荒種杞孫枝詘傳衣祖製亡到門慚舊主開晏謝新昌為仰千秋鑑來窺數仭牆一時依斗曜三日接衣香人望年來屬天星曉自張徴車應在道執䇿敢相忘葉使君六十會見黃星燦長疑紫氣連應鐘方啓籥甲子又周天族是諸梁裔家藏虞仲篇論文誇魏晉對䇿入幽燕製錦潛江曲專城桂水邊郡留黃霸迹人謂冦恂賢咅問三秋隔相思兩地懸誰知違俗久頓使杖鄉旋設矢逢初日稱觴祝大年金門邀曼倩同望赤城煙贈副都御史金君北闕推司憲中臺肅準人兩京傳舊族三坐見親臣上殿呼張緬諸曹拜郤詵朱衣長拂面蒼珮儼垂身抽簡如凝雪驅車總避塵五花堂上列六事御前陳道可孚中極清能敕外巡時君有以清亷敇外臺疏文緣章奏重治驗紀綱新在昔曕雲切於今披露親掃門徼典客觀國利來賔啓署通南省依垣近北辰槐廳慙後起還展舊絲綸康熙乙丑豫奉使分校會闈得士一十二人竣事恭紀兼呈同考諸公三十韻試士開三省徴書下九重名標文德殿宴列武成宫同考班行盛諸房領去崇翦金花插帽浴鐡馬安籠魚貫先開闑蜂攢後捲篷座如聯宿上堂以聚奎雄內簾中廳名聚奎堂布棘藏知雜垂簾示至公硯分新靛液題拜小黃封是科書接上頒書題用小黃封硃出上寫御封二字使席供旃細官厨煮桂濃吹鐃來堠北擊柝在牆東畫壁皆麟鳳標籖類活東卷排千字賾􅍐限五經通到晚門箝赤中宵燎舉紅九龍天上現萬蟻穴中攻啓簿覘多例未閲卷時先檢科場條例焚香矢寸衷主司愁失實進士苦雕空棘闈深鎖武成宫談天進士雕虛空係黃魯直詩文獻都堂內神枯號舍中有蕉難覆鹿入牖敢窺龍所藉千秋鑑曽無五色􅞲三呈皆白璧萬選得青銅勒帛藏雙管收囊會九緵草編時有次花判月將終編號次第即草榜也每日各房判紙封卷篋北斗魁為首南宫禮是從人方安夏課長安舉子落第者率淨坊度署曰夏課誰敢道冬烘進録盛箱窄題名散炬融書吏填榜名圍以萬炬闈開雲葉葉榜放日曈曈宿館袪甎甓升鑾伐鼓鐘賜袍披織綺開宴舞尋橦放榜後賜宴禮部教坊奏伎樂賜花賜綵段表裏因謝同苟誼翻慙獲狄功井亭深鎖處長盼隔窗桐鎖院簡王編修同考兼呈難弟侍郎主文十韻龍並雲間躍人同馬氏良弟方司主校兄反作參詳舊以房校名參詳官禮序回鸞列溫言下鳳章時院中接避旨令勿嫌隔屏分上座授尺首東廂四闢優三館羣空賴九方同臨戰蟻穴忝受獲麟房宋嘉祐倡和詩有萬蟻戰酣春晝永句豫以領房官閲春秋故云藍汁文千點樺煙燭幾行位因同考近分以後塵相館規豫與兩公相為前後輩海濶容流細天空任羽翔聚奎堂畔月相對意難忘過劉少參宅有贈北海標通德東田返近臣白雲仍在望綘節舊曽巡賭墅非間地歸湖有上賔搗茶花院靜讀易草堂春丹鼎招仙客金魚付酒人題詞俱咳玉封册總泥銀禁闥思嚴助台階讓賀循長干初置輦白下漫垂綸迹共潯陽隱交從北府親有誰司國舉唯汝秉人倫納履龍門峻披帷燕賀新思深猶望歲遊滯已兼旬霜雁飛黃浦秋楓動紫宸欲因徴詔切從此捧車輪趙弟舉茂才書扇志喜雅度如搴芷晴江賦采芹父為晉成子兄即趙觀文珠玉方呈彩驊騮逈出羣開襟飛紫電跬步上青雲佩重搖金穗衫踈映繡紋平原佳子弟知向武陵分送家僉事提學雲南司命開南詔除書下建章經傳宣聖里名冠鄭公鄉久列螭頭仗曾含雞舌香縹箱疑武庫珠斗見文昌比士昆池外衡文洱澤傍猓間垂甫掖瘴裏判干將八代唐文重諸生段氏良國書傳杜佑家學本毛萇東壁舒光逺南溟得路長雁行回復處相憶在瀾滄丹陽别羅坤作客鄉關逺懷君歲月深過江逢管仲入幕見陳琳代北方馳騁苕南久滯淫未懸腰下印長散槖中金入俗饒玄虔憐豫得素心烏衣人共訪白下酒同斟世已嗤求駿吾將效展禽天低垂去轍雲滿未分襟龍跳難為友鴉棲不擇林丹陽重惜别相對起沉吟胡副憲生日烏府垂標峻青陽感氣新藏書柱下史執法殿中人入陛長連臂居官善逆鱗周天剛六甲練日及三春指直冠如鐵風清簡似銀明時無可誦但願作良臣二憲長垂三坐端公擅外臺春風吹海甸曉日近蓬萊使作儀同貴生占宰相才程琳饒氣節王儉著風裁珮有蒼龍繞門呵驄馬回祗因留柱史紫氣滿東來寄吳制府廣東妙略雄南服鴻恩賚上京五年專棨戟獨坐領簪纓册授金鼇勝兵摧玉洞平三門新壁壘八克舊家聲重地深分履前轅早樹旌詔從雙鳳闕節授五羊城谷轉桄榔暗旗翻翡翠明趙他終北拜馬援且南征操得貪泉厲名因褁石成朱方行處樂白雉貢來輕磐石詛茅土河山倚保衡八行難盡意長使寸心傾吳門喜遇郭襄圖飲次留贈并謝所貽聨句作客當三伏甡懷人在一方銜鑣逢茂苑張杉把酒對金閶意氣干雲上甡追遊度日長髙名通宛洛杉近歲返炎荒藥採安期澗甡金擕陸賈裝賢王驚賦彩杉時郭以詩百韻贈俺答公每一字酬一金蠻女授衣香家隔鴛湖逺甡山看虎阜良歌迎桃葉渡杉居近百花坊金屋嬌還貯甡瑶山宴未忘尋仙同許邁杉結客過吳光何幸貽歐冶甡兼之贈楚纕峯前瞻縹眇杉亭下詠滄浪座愛林宗友甡行陪郭伋觴臨岐乖報諗杉為我俟河梁甡挽陸母萱草移金闥蘭旌返玉樓太君如湛母孝子是王修機織恩難斷杯棬澤自流階前黃鶴去天際白雲浮至德傳閨訓餘哀減巷謳只憐赴弔晚偃蹇愧南州觀徐昭華畫障作吾郡閨房秀昭華逈出塵書傳王逸少畫類管夫人紫水和泥染青山帶露皴蝶衣聨繡褶花片滴朱脣閣上煙雲曉階前草木春祗愁頻對鏡圖作洛川神西河集卷一百五十四
