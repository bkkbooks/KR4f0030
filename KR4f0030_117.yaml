body:
  text: 西河集卷一百十七翰林院檢討毛竒齡撰説伊尹告仲虺説毛甡居壁間讀新莽傳竊嘆新莽以還其為禪受者凡一十三家蓋亂臣賊子之利階也劉漢唐明本明為征誅而維唐之始則猶不能亡其習焉嗟乎禪受可勝言哉昔商湯伐桀告臣以慙亦惟懼後人藉為口實而唐虞之為口實逮今未聞善哉孟氏之罪燕曰子噲不得與人燕子之不得受燕于子噲其垂戒遠矣嘗按仲虺之誥本有伊尹告仲虺説疑在新莽時莽大夫輩阿刪之不令傳西河毛甡乃重考石匱之書得其文爰補録焉其文曰成湯放桀于南巢惟有慙德曰台恐來世以台為口實伊尹乃告左相仲虺曰嗚呼我聞在昔放德惟其遂德不惟其遂事遂事之效乃至于敗維昔三后丕禪允績不墜厥無馬牛之奔墮爾永命乃有夏三世弗堪于憂惟乃率循先典丕窮受命越在有窮其勿詢于龍圉惟風乃純狐亦惟薦我封豨之膏聞于上帝越在于今其誰敢知曰匪上帝之德錫于窮門今王遠宅不常愧乃禪德台恐後世禪德之誣流或甚焉仲虺曰厥勿以告余其以上帝大命用爽慙德仲虺乃作誥其後誥亦亡始有偽為百兩篇者齊于生辨日遠近説孔子遊越齊于生御車道逢兩兒辨日遠近不能決也以告孔子一兒曰我以日出時遠日中時近日出時滄滄涼涼日中時如探湯此不為近者熱而逺者涼乎一兒曰我以日出時近而日中時遠也日出時如車輪日中如盤盂此非遠者小近者大乎孔子不對齊于生言曰吁是何見之稚言之易也夫日之有涼燠日之行也日易朝晡行而寒暑因之且夫日有旅矣自土見土凡厯三旅是名昢明昢明之後更厯三旅謂之早食方其未見土藏之地中其道里將不得旅也然而我聞自昔王禪泰山爰登日觀雄雞初鳴日見海底未泛暘谷其徑三丈既而出水晞于扶桑倍丈有差暨于見土尚及十尺漢官儀記雞一鳴時見日出凡三丈許吾未聞土中之道近于見土也是無故月有盈虛日有舒斂其體固然也且夫日之有舒斂則非見者所得定也當其見舒見遠亦舒見近亦舒也當其見斂近見亦斂遠見亦斂也見且不得定何論遠近于是御者呼兒前告之曰皆非也日之在冬也滄滄涼涼其在夏也如探湯可謂近者熱而逺者涼乎日之初出也東極視之如車輪西極視之亦如車輪其在中也土中仰之如盤盂東西仰之亦如盤盂可謂近者大遠者小乎上巳説成問于齊于生曰上巳干名抑為辰乎齊于生曰上為上旬巳乃干名古人卜日用干為凖凡其數月然後以辰故三正建月爰定子丑四時分日乃始甲乙不觀之禮乎上丁習舞仲丁習樂又不觀之傳乎上辛大雩季辛又雩其云上者以上旬也仲者中旬季下旬也其云丁辛則以干也蓋旬凖于十十干妃之日有循環干無遺數所為可定以上也若辰以十二為準則惟月十二可以妃之使以辰準日則日有常旬辰嬴二數上難等矣請遂言之當其上旬朔在子丑則此一旬乃無戌亥假使上旬朔在午未則此一旬已無辰巳既無辰巳上無巳矣然必用巳巳在中旬將名此巳為上巳乎抑中巳乎是數之貿也故沈約宋書曰自宋以後但用三日不復用巳惡其貿也故風俗通云巳者祉也惟巳可止故用祓除此為巳也故爾雅稱巳月為則月則亦止也此篇出蔡州曹氏月令考壽人説若雲庭之松經廩霜而不變者夫何故則其靜也吕梁之石砥之波瀾而不泐夫何故強固者不移也今夫琴庵先生之為人也吾不得而知也始為雷州法曹繼而遷司馬于汾陽又繼則守淮其為政吾亦不得較稽也吾嘗與其季遊矣郡為宦者必大其閈閎髙其門廬而先生之桁不容􅚫門閥不可以為仰吾嘗入其庭漂漂乎洫乎然而安焉得非靜而不移者其是耶先生之季靜者也以學道為都居其嗣君宰松溪有名人比之陽城吾皆遊而知之故曰先生宜靜者流矣故曰其道龍變其心蛇行故曰惟靜可以為久常也惟靜故壽右董琴庵先生且夫絲繩之繳物也必先卷而懷之不盡舒也必遇物而後縆而舒其繳故其未盡舒者則非其時也舒則其時矣惟至人為能因時故夫冬荷而夏鞠違時也蟪蛄無春秋蜉蝣無朝昏者失時也彭鏗之畫于八百殤畫于期拘于時也至人後時而生不先時而成不必先道德而道德名焉不先功名而時之為功名者著焉吾故曰此李先生之能壽也故曰千魚在淵一罟收之則罟勞矣一罟收十魚而猶以為牣則罟全矣居得為之時行可為之事事嘗有餘而猶自以為未盡則時全矣右李司馬舊有三段今不存胡方叔字説胡方叔初字匡叔以兄弟多人有似匡裕兄弟故云觀其别字匡巖可知也然其初本字玉叔玉叔名璲玉表之璲者玉也既而舉于鄉危舉之而後失之且家徒四壁立無何盜復瞷其室玉叔曰吾韞吾玉矣荆山之英刖之固也既已遇楚成而復題曰瑕良玉不辨必有負之而投淵者且魯之陪臣又已竊吾寶玉矣吾安所字玉哉小東曰鞙鞙佩璲不以其長璲本無長耳生長東海居近東山東之又東誰謂東之不可名也因號東嵓吾嘗作東嵓先生被竊詩以謿之見七古卷今方叔曰吾其更字方叔與丈夫生而有志于四方故詩曰經營四方鄉遊不樂何必鬱鬱懷此都矣雖然家有老母吾不可以無所嚮論語曰遊必有方吾將為方遊則吾得字方所以志也于是送之者皆稱曰方叔先生或曰方叔元老克壯其猶此行有之或曰昔東方先生少擊劒學詩書受孫吳兵法得攻戰守備之具既長而遊長安天子偉之命待詔公車今方叔所學猶是也然而放言而卒軌于正滑稽侮嫚毁觚為圜而不詭于至方雖髙自矜詡洋洋執戟而終不類于衒才沽玉之所為是東方可方在此行也方叔之為匡叔為玉叔為匡嵓子為東嵓先生而終成其為方叔者其以是與方叔曰然作方叔字説李氏兄弟字説李子兼汝以二兒日煒日焜問字于齊于齊于曰長字一輝次字次輝維煒與焜皆輝也漢書青煒登平注曰煒之音輝言乎青氣之光輝也司馬長卿作封禪頌有云焫煥輝煌而唐五臣注文選即以輝煌讀焜煌蓋煒為輝焜亦輝也鄙意以為長君次君名異而實潔但有長幼都無差别維彼二難可比烈焉且自一而次于以進于學有緝熙之業何煩吾日之已昳假餘光而燭于昧與月日昧叶蔑學日煒後更名日耀與日焜壬子同薦嘗從于西河之門晨夕課授者二年西河辭其弟子禮若不屑以師自處者别有師説一篇今不存蓮城説曹君連城以中年嗜道斷酒卻肉更所字蓮城而問説于于先生先生曰是即太史所稱蓮之脫淤泥而皭然者乎夫連城璧也而更為蓮蓮者連也連偶而相生為蓮然則蓮亦猶連矣且不特此也蓮之脫于泥此非連連者所敢言也其不字連而更蓮是故惡夫連也夫連城以嗜道之故一旦捐人世之紛紜而返于淡滌豈猶有流連不已之意介其間乎則夫碎千金之璧而寄之一枝之安蓮峰化城于是乎觀矣不羣説今夫梧桐之生也特立于朝陽而巋然何依松之託徂徠也無附枝鷫鸘不並列以處而罦罿遠焉雉子之耿畫墳衍以分經界蓋天下本有不同于物之行而苟同之則為附也吾友包飲和作德本性好學併力而惜也抱宏材而賫志以死其死則徐君芳烈諡為淳博蓋取古人友朋易名之大義也而徐君復榜其故廬曰不羣或者疑之方飲和幼時羣于鄉及長也羣于友朋讀書論世上羣于古王聖賢往來贈答嵗時燕飲之次羣于峩冠側辨之夫居家羣于親親言笑無􅘅辭旨愈懌自生迄死凡若干年矣悉羣于所愛于所敬而以為不羣嗟乎世亦知夫柳下季之比居于魯而有以異于臧孫季孟者也飲和名秉德行二豫别有包二先生傳詩餘譜説會稽陶燕公定詩餘譜成屬僧開敘僧開既敘之且為之説其説曰古詩異近體近體限句字古詩不限句字也詞異詩詩句字不限聲詞限聲也夫詞限聲而可不審聲乎雖然詩亦限聲矣古詩之限聲者梁武之采蓮龍笛徐勉之迎客送客是也近詩之限聲則王維之青雀詞李賀之休洗紅韓偓之懶卸頭劉禹錫之瀟湘神是也詩限聲而無譜以紀之故失聲詞限聲而無譜以紀之不幾并失詞乎雖然花間之輯則歐陽舍人譜之矣大晟之釐定則屯田待制并譜之矣然而又有異者花間之江城子南鄉子諸詞字猶可增減聲猶可下上也大晟之虞美人減于唐則終減之也其臨江仙增于唐則終增之也花間以不定而尚近于詩大晟儻不定而不又降于曲乎雖然樂之易亡者聲難嬗也今則可嬗矣字則伊吾令吾器則魯鼓薛鼓矣然而更有異者今之稱淮海者曰山抹微雲其稱東坡曰大江東去夫山抹微雲之滿庭芳固無戾聲即大江東去之念奴嬌序亦豈有變聲也而強為優劣若此然則求詞者之當不僅在聲也而况于聲乎王景略不智説王景略將死苻堅問之景略曰晉雖僻陋然正朔相仍勿可圖也鮮卑羌虜時我仇宜漸除之景略死堅伐晉鮮卑羌人共殪之秦亡毛僧開曰景略之智也而非也知兵之能傷人也則必曰是兵也傷人而曰兵也利聽者勿憚也况其欲玩兵者哉景略曰晉不可圖也智也然不知夫晉之必不可圖也且不知夫堅之將必欲圖晉者也則曰正朔而已此兵利之説也兵利之説非智也然其曰鮮卑羌虜可患也而卒為所滅抑不可謂不智夫鮮卑慕容垂也羌姚萇也夫景略欲去垂矣欲去垂而不得嘗多其術以去之矣多其術而又不得也則夫其所言者或者又多其術之言與而欲堅之聽而去之哉則又非智也西河集卷一百十七
