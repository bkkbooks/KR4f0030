body:
  text: 西河集巻一百六十五翰林院檢討毛奇齡撰七言古詩十一吳興太守行吳興太守本仙吏早題姓字慈恩寺興來豪客坐滿牀數斗烏程不知醉拂衣歸去無一錢擕家住在閶門邉從事作詩好合集吏部出行那有船當年相過慧曉宅對客揮毫似飛翮天半流霞總失妍閨中刺繡皆無色夫君自是園季倫採芝處處忘冬春肯將商洛山中客還作留侯門下人時太守方辭薦辟故云昔日篇送任令南還上海兼示王十六舍人昔者結髪共文硯王韓及君成一龍王舍人先吉韓孝亷日昌任上海辰旦與予同學于先敎諭門下舍人孝亷久通籍君亦為令開吳淞予以龍尾不得意索食兩入泖浦中㑹當天子召文學郡吏已仕皆令從通經應詔孔子夏長史被徵黄次公炎風暑雨一就道逡廵獻賦明光宮爾時賜宴接袵袂猶記拜箸分脆膿何意詞業入祕閣既取復落神物工遂令李郃生感激抗書欲上不得通春明碧栁盡抛絮太液露荷將放紅徵車南返各祖帳使我泪滴樽盤空制科自古雖縝重厯代沿廢難盡同之官魏相自能達留京鄭昉當安庸不觀退之試宏博三試三却無赧容獨憐予友各散處仕止轣轆如轉蓬予復遲暮滯京邑南望獨立心忡忡吳淞潮上海雲起君應報最入奏功明年舍人儻就判為君佇望雙飛鴻夏杪集宋大司馬宅觀諸名伎偕同舘諸子即席長安六月手獵蠅西堂午琢銀牀冰花梢捲出雲棚敞桃竹鋪來夏簟清尚書朝罷理杯斚彷彿當年飲河朔護索彈將塞上聲參差吹遍江南樂金槽軋札銅椀鳴五絃三調傳新聲段師曹保賀懐智供奉御前皆有名雕闌雜坐列彛鼎佳客滿城紛召請門下通居白玉堂後來總住紅蘭省䣃衣還脱袖中麻㨿席不窺甎上影石枰玉局闘樂方挫糟潄酪呵凉漿釣魚作鱠供仙史籠餅加蔥有侍郎肴蔬錯列擬公讌對榻抽毫弄文翰鄴下方看楨粲來梁園未許賓朋散葵根度日暑漸収登臺月上金波流平沙水落玉河堰雲起夜封宣武樓華燈影裏呷鵝管遥望西山正蝘蜿倚檻平垂斗帳斜開軒坐對譙門晩自憐臣朔長苦飢短轅轣轆如鷄栖何期暫與蓬池㑹頓使凉風生葛衣上高陽相公詩有序予以康熈戊午應召入都䝉高陽相公日揀予舊文繙閲由繹奬引過當感而為之詩國家安攘三十載台階藉藉稱高陽兩朝首輔越廿䙫青瞳緑髪齒未央差峩當軸領政事海内于今號長治但向詞頭判綵毫不須敕尾添花字年來晨夕苦黽勉日上黄扉駐小輦食案朝垂籞宿寒火城夜照沙堤煖祇縁親近贊密勿毎佐皇威遏回遹當機不使殿外知祕旨長敎閣中出即今江漢將洗兵王師撻伐還連營已平昭義盧從史須討荆南劉漢宏以茲克詰煩廟算况復中原甫安奠借箸重為策治安求衣自合分宵旰恭逄聖主方好文將尋干羽銷兵氛詔書五色自天下徵車四集如雲屯東堂發策未親試預聆諸儒使談議晁錯難傳誓誥文買臣未觧春秋義相公明哲本神授矧向天人早窮䆒嘗通墳典作蟲書豈止山經辨禺獸顧斯末學類蠓蠛肯為申韓較優劣不道元臣總萬幾翻從下士求三哲嗟予出處兩未全懐文獻賦悲徒然樊川空挾阿房賦崔顥徒多輕薄篇其如河海詄蕩蕩能問春流細無恙裴令優容不可名謝公齒頬真難量紛紜冊府未引逸猶自燃藜照緹袠書因都護剖蘭筋賦使相如觧盧橘固知名敎自有主致治何須誦論語功徳方看過富韓文章早已歸燕許煌煌景運啟未遲要令相業傳康熈明年收復湖湘路願上元和聖徳詩飲次書梁陶侣世兄便靣陶侣為司農夫子從子猪市即夫子邸里幽蘭在谷芝在田謝家子弟多名賢朝陽門外騎馬去為汝一停猪市間紅顔緑髪將佩組腰下羅囊不曽賭衛瓘書名擅北堂野王畵法跨東府臙脂河上流水新酒家舊賣中山春幾時同返恒陽路重醉金門飢死人西臺先生行奉送臨海馮少司冦塟親請假歸里西臺先生似威鳯早上金堂拂雲棟閥閲高于桐柏山房櫳葢在桃花洞當時司法蒞永昌博南開後通瀾滄九龍不擾銀生地五聽長臨金齒傍自言家世嬗駿烈兩見高堂秉奇節劉毅冬銜祖母芹楊憑少吮慈親血陳情久已痛鳥烏獨迎萬里潘生輿東征賦就白蠻樹南郡辭將青海魚中丞入告賜表掲章安城邉竪雙闕五花錫命珈帔殊剛在裴家建坊節無何移守石皷城阿儂盜㺯潢地兵歸朝欲表鄭䖍志道梗頓違徐庶情踉蹌回任遘母疾路賧天遥哭相失誰能辛苦賊中來鍳此孤忠晉華秩都官力贊廟算行樓船潢浦檥昆明三巴六詔喜盡滅孤櫬一舟悲未迎因之觧組呌閶闔天子隆恩降優答皭然忠孝具能全况復妻拏此時合秋花初發繞玉街離亭欲别還銜杯故鄉墳墓望何許令我惻惻徒傷懐大江東下數歸驛天姥嵯峨下窀穸竁户封來繡閣雲壇碑琢出寒山石偉元廬墓歲月閒謝公舊墅難追攀何年丹穴歸棲羽仍向瑶臺縱翮還徐母邵夫人壽詩徐繼恩之配汾之母也往與徐汾父子友比之阮籍交二王夫人令妻併夀母既賢且哲能文章最憐老友入林去逺向寒山憇雙樹許邁徒傳阿閣書梁生不在臯橋住我昔從行恨未力廿載相違苦相憶今來堂上拜女師尚見芳樽照顔色清秋明月出毎遲玉臺皎鏡光離離若嫌祝誦無佳句自有庭前孝穆詩徐二將歸暫寄湖南周開府里第過别有贈徐樂上書不得意將乘欵段歸南山黄金用盡敝裘裂何計得還烟水間長安四月方苦熱日飲冰漿類沃雪鹽車欲駕去住難忽遇孫陽泪如泄菖蒲酒暖梔子香新裁越布單衫長湘南節度如堪倚且住城西舊草堂題文待詔雪圖奉送高少司冦還般山何年蒼筆寫顥景鹽花刻作山谷春孤懐澒洞當洗瀹兩目豁達開風塵伊誰蓄此作寳祕般山先生得真意圖畵恒留處士吟烟嵐不待官家賜當時出入金馬廬蓬丘瀛海連江湖夢游已聽鈞天樂草詔還呈紫府書集賢學士乞歸去家近凾山傍雲霧溪上銜將陶沔杯園中種得於陵樹最憐良馬䣃鞿靮偏借都官坐赤棘栁惠焉能作士師曽參未許諮刑辟西臺高臥對白雲還家久已忘冬春始知羞行貴有守誰謂侍郎難得人聖明下詔䇿災異執法承顔舉遺棄咸道先生風概殊能使頑亷懦立志先生磊落披敝裘寄居蕭寺翻經樓馬芻一束苦戀棧蠧紙半牀兼覆甌修容静與巖壑瞑論史决若江河流思以秪德代請讞勝彼木鐸警庶郵長官當白不當白豈向斯世争沈浮清秋遥夜雨初歇正遇棠村授師説時司農夫子招飲下直沿街燈火紅高軒到座星辰豁翛然相對澹欲忘後譚莊列前羲皇宛如鄭綮負驢背宵行風雪㶚滻傍不然溳上借書去冒雪一詣張君房纎埃不起林落浄奚啻澆水滌繒囊斯時秖恐絆鞅轡霜深露滑増徬徨何期聖明轉浩蕩特許還山遂微尚白雲出岫本無心黄鵠摩天總難量長洲待詔筆法精雪圖千載光芒生寒冬把此欲歸去瑶天粉地千山明山前有人騎馬行大雪陪益都夫子游善果寺歸燈下同夫子和陳檢討詩一人呼韻一人給寫信口占叶不許停刻時王二舍人胡徵君在旁知狀後舍人亦有和詩紀其事天將大雪早作霰譬如拆木先拆芽須臾抛落若栁絮細細剪出天工葩既非車下撲塵土復異柁底揚風沙祗覺雙林萬枝亞一望簇簇若枿枒是日本欲詣初地後車將發興有加寺門石幢掛秋草似我白首雙垂髿毳羽漫空不遽墮瓊瑶在地豈敢挐驟臻方丈恍突室一燈黯黯圍舊紗堂中鐘皷響還寂令我㝠㑹成無遮伊蒲作供飯未罷午鴉啼過啼晩鴉重登高閣逺眺望共驚銀海翻龍蛇雁王一塔藏貝葉獅子雙脊䭾僧伽彼此相峙總難辨就中密織如亂麻况當説法散花雨豈有餳米能膠牙浴堂煎出功徳水銅盤灩㶑傾流霞淙淙盥發細響不數隔水彈筝琶即此享受亦已過世間何用矜豪奢揮灑既畢重就坐寺僧復進龍乳茶南泉既逺趙州去不須齒舌相勾爬歸來暝色暗前路出門惘惘同天涯誰知夜半燭牕發依然落筆風雨斜寄贈淮安王君七十并示令子文學少年曽作淮隂游伍胥廟傍尋酒樓此時酣飲鮮雜客座上往往來王猷繁花當牕午雲熱醉餘隔院聽楚謳因之登堂拜獻老有若健柏凌嵩丘迄今廿載憶朋舊夢回月出清淮流但聞市少已漸散縱有亦復非黒頭昨來徵車税城下欲入不得爛兩眸猶幸同舘盡相識淮市三子居最優其中李生與王氏謂李編修鎧也實為羊鄧深綢繆况當獻老年七十秩閣將復傾庻羞彦方高志但居里逸少愛閒長汎舟那能侍杖效憲乞一觴捧出丹霞浮長安雨歇鴻雁發蓬池水落芙蓉秋千年碧藕欲攬寄凍瀋三挫成一甌人生得歲貴適意為我寄語且縮篘不信但看服綵者在家亦已扶鳴鳩時令子亦五十初度此日行寄祝益都夫子八十當年召試入帝京中書門下曽投名益都夫子典詞業手把繩斗弹墨絣並言朝右方倚芘眷此黄髮為民正其時正值授杖歲將進三列作五更盈庭憲乞予敢後因之扶服獻鼎鉶無如東望起歸興一日三疏乞觧鞓天子特詔宴禁籞中使扶侍周遭行題籖書絹并篆石宸賜優渥如雨傾遣官持節送還里長安車馬填郊坰不期此事已十載予亦南畆三耨秔曽因請急過通徳佳山冶水風光并佳山堂冶湖皆益都住處凌晨啜茗聽笙瑟傍晩種竹量雨晴出郭相訪誰氏叟將車剛及予門生曽幾何時忽彈指賜杖復得中夀稱三公雄健過伯始九老繪畵比武城生人聚散有定數矧予遲暮非壯齡再拜不得親獻杓一心終自同摇旌東方花木及春發南狩鑾馭將時乘醁􅌬滿甕漫斟酌烟霞萬里須丁寧非熊八十儻還載此日正逄渭水清寄祝姚少保六十初度大鵬搏扶越九萬林間斤鷃猶决搶丈夫致身亦有㑹安能刺促枌榆傍當予少小擅文賦即聞上國壇坫張衣冠輻輳徒輦集鐘鏞在序皷在房譬則齊晉大九合下士受約如江黄中間較文試帖括猶然領觧在帝鄉一朝烽火遍南服夜起趯躍加騰驤傾裝貿鐵募死士叩馬一謁沛獻王左手草檄右殺賊遂平甌越恢閩疆習書請兵張仲武麾扇克敵謝彦章天子嘉嘆遽錫命驟令開府建羽幢破蜀竇軌授神策平吳杜預封當陽論功不下大將列銘徳乃過元舅行至今溟海凛威惠環瀛萬里無波揚予忝梓里就史職槖筆往往書旗常况當弧矢罣綵箙道逺亦欲進一觴幸頒金匱誓泰礪將標銅柱凌扶桑臨風何以致稱祝神山嶻􅑖海水長烏栖篇為晉江范貞姑作青陵臺畔清霜飛秦家桂樹烏獨栖餐荼茹蘗三十載石闕久銜悲復悲春花秋月宛然在辛苦携雛羽毛瘁撤饌長依庾約兄寒房只坐張𤣥妹姑依兄鄭山公選郎故云慈烏反哺尾畢逋膝前有子傳詩書他時六翮翻雲去始信人間有鳯雛題董都護記年圖兼送其軍鎮萬州江都㺯環日能賦梔子詩庭下五色雀相視非常兒移時學字擅八體鵲反鸞驚并鷹跱偶寫烟巒㸃拂奇畫地歩天餘技耳因挽楊葉射枝㦸遂入天階獻高䇿彀騎分埀都尉符驚文自草叅軍檄從容渡海征斛羅盧循逺徙藏流波明廷加節授督護開府正當儋耳河賜衣不著但緩帶徐歩蒼林石塘外野人相遇誰得知試看當年好圖畵書生意氣本自奇虎頭豈是尋常姿留形丘壑無不可為龍還復為蛟螭青門設祖請祓軾一展斯圖壯容色他日功成倘鑄金碧帶青帬尚能識送梅庚赴江南田使君幕和其留别原韻同陸大即席昔年曽作蘆中人蓬萊幾度看揚塵但逄東海孫賔石不遇南昌梅子真長安忽遘載文軸把筆如櫨幘如屋入座皆嫌倒屣遲當筵但道揮毫速年來好酒惡水滛醉歸敲醒街頭砧蘭成自有閒園賦李勉難忘戀闕心同時大陸本舊識謂陸冰修也曲巷茹蘆日相即久知豪客自情親堪笑世人皆耳食才大驚疑總在胸官貧薦引全無力金臺名駿服軛多宮中誰肯憐娙娥誰知幕下得賢主頓如尺水生微波時冰修同落筆見幕下句驚曰何以合波字及得此句遂擲筆嘆絶雙橋相對草堂近澄江一望迷林柯高旌前導畵熊虎屬車後載環馬騾南行有客辨車鐸相逢莫使然疑作發冊應過玉笥山聽鐘猶在昇元閣只愁良友去薊門毎上河橋輙作惡陸生預道蕭山毛臨行一曲唱且高不虞漏盡鷄三號珊鞭欲揮心轉勞金繩墮地玉壺罄願君還聽歌聲豪陳明府選之遇于長安街飲次索贈朔風吹凍塵不飛道傍車馬如鷄栖天安門外栁條短回首一逄薜荔衣清姿濯濯負意氣我友陳生好難弟挾管長從鳯闕游揮金不計蠅頭利行年剛及强仕辰將紆墨綬拖黄銀陳遵自昔能驚座孺子由來不厭貧獨言賦性愛山澤毎向蘭亭探遺蹟太守祠邉釃酒紅栁姑廟後翻魚白今來偶寄碣石宮有人獨坐還書空何時觧組賦歸去與君把臂深林中長安邂逅值冬節幸對旗亭酒初冽腰下雙鉤觧照人且看春明杏花發送林使君督學河南東家拾明月傳視不能識青黄蔽前林誰能辨容色晉安才子林使君文章翕霱如蒸雲與予同舘者曹子偕過㤗山為主文聖人大悦加奬譽旋使中原視學去劍氣長飛龍子灘鹽車早辨羊腸路春風二月栁滿街御河流水當行杯南行已及清明後少室山前花正開陸生赴蘓州幕陸倕名在沈謝間垂老被召來燕闗龎嚴李益不敢薦三年將返支硎山蘓州使相甫開幕便展干旄導情愫臨海還招鮑照歸渡江且逐陳琳去吳中故舊多隠淪草堂仍築東湖濱浣花不厭主賓晩種菊愛看鄉井春只愁曲巷鮮憑軾石皷遺文倩誰識韓愈曽言空馬羣一顧燕臺泪霑臆送家太史假歸新安長安朝暮送行地西有張掖東沙河毎臨祖席發歸思曰歸不歸思若何憶昔徵車乍來赴本欲還山乞歸去光宅先敎宿李蟠直言必欲留裴素吾宗就試得數人林間二阮叨同倫雲陽舊令舉復罷謂祥符令㑹侯也叔氏妙才人盡聞掞天徹地藻思闢嘗見揮毫趂飛翮國子通傳虎觀文獻王親受京房易太史為授伊勒兎親王經集賢載筆入丹地便遣方平撰前記制舉從來待異材史書豈是尋常事嗟予落托百不成長沙舊譜依泉明霜前銅獸當㕔列日跨疲驢逐隊行如何叔氏掉頭早鎮自陳情痛烏鳥婺女瞻來橘嶂寒客星歸傍桐江曉予于去住願總違豈難遽著青羅衣慙于史局未能了覺與世數終相岐秋林柿熟菊初發此去蘆溝看新月詘指明年還院時仍在清商戒寒節軟塵著雨衣未乾滄浪自昔推新安冠纓濯罷如相望知在天邉風露間新安有天邉風露樓銜魚篇贈廣文盧先生先生本是麟龍姿偶來提領宣聖祠鄉書早展冠國士臯比坐擁為人師翛然高舉藴飛翮羞向長安再投䇿魏世文章重子欽漢儒學行推盧植秋花開發絳帳寒閒堂撤牗襟懐寛青氊不用氍毺布美饌長揮苜蓿盤生平月旦重閭里冰鑑當胸似清泚不敎魚目混明珠誰抱寒桐對流水蕪文好我如嗜痱天涯汗漫知音稀願為堂上銜魚鳥長傍秋花遫遫飛西河集巻一百六十五
