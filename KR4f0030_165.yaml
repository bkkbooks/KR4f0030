body:
  text: 西河集卷一百六十五翰林院檢討毛奇齡撰七言古詩十一吳興太守行吳興太守本仙吏早題姓字慈恩寺興來豪客坐滿牀數斗烏程不知醉拂衣歸去無一錢擕家住在閶門邉從事作詩好合集吏部出行那有船當年相過慧曉宅對客揮毫似飛翮天半流霞總失妍閨中刺繡皆無色夫君自是園季倫採芝處處忘冬春肯將商洛山中客還作留侯門下人時太守方辭薦辟故云昔日篇送任令南還上海兼示王十六舍人昔者結髮共文硯王韓及君成一龍王舍人先吉韓孝亷日昌任上海辰旦與豫同學于先教諭門下舍人孝亷久通籍君亦為令開吳淞豫以龍尾不得意索食兩入泖浦中會當天子召文學郡吏已仕皆令從通經應詔孔子夏長史被徵黃次公炎風暑雨一就道逡巡獻賦明光宮爾時賜宴接袵袂猶記拜箸分脆膿何意詞業入祕閣既取復落神物工遂令李郃生感激抗書欲上不得通春明碧栁盡拋絮太液露荷將放紅徵車南返各祖帳使我泪滴樽盤空制科自古雖縝重厯代沿廢難盡同之官魏相自能達留京鄭昉當安庸不觀退之試宏博三試三却無赧容獨憐豫友各散處仕止轣轆如轉蓬豫復遲暮滯京邑南望獨立心忡忡吳淞潮上海雲起君應報最入奏功明年舍人儻就判為君佇望雙飛鴻夏杪集宋大司馬宅觀諸名伎偕同館諸子即席長安六月手獵蠅西堂午琢銀牀冰花梢捲出雲棚敞桃竹鋪來夏簟清尚書朝罷理杯斚倣佛當年飲河朔護索彈將塞上聲參差吹遍江南樂金槽軋札銅碗鳴五絃三調傳新聲段師曹保賀懷智供奉御前皆有名雕闌雜坐列彛鼎佳客滿城紛召請門下通居白玉堂後來總住紅蘭省卸衣還脫袖中麻據席不窺甎上影石枰玉局鬪樂方挫糟潄酪呵涼漿釣魚作鱠供仙史籠餅加蔥有侍郎肴蔬錯列擬公宴對榻抽毫弄文翰鄴下方看楨粲來梁園未許賓朋散葵根度日暑漸收登臺月上金波流平沙水落玉河堰雲起夜封宣武樓華燈影裏呷鵝管遙望西山正蝘蜿倚檻平垂斗帳斜開軒坐對譙門晚自憐臣朔長苦飢短轅轣轆如雞栖何期暫與蓬池會頓使涼風生葛衣上高陽相公詩有序豫以康熙戊午應召入都蒙高陽相公日揀豫舊文翻閲由繹奬引過當感而為之詩國家安攘三十載台階藉藉稱高陽兩朝首輔越草䙫青瞳緑髮齒未央差峩當軸領政事海內于今號長治但向詞頭判綵毫不須敕尾添花字年來晨夕苦黽勉日上黃扉駐小輦食案朝垂籞宿寒火城夜照沙堤暖祇緣親近贊密勿每佐皇威遏回遹當機不使殿外知祕旨長教閣中出即今江漢將洗兵王師撻伐還連營已平昭義盧從史須討荆南劉漢宏以茲克詰煩廟算况復中原甫安奠借箸重為策治安求衣自合分宵旰恭逄聖主方好文將尋干羽銷兵氛詔書五色自天下徵車四集如雲屯東堂發策未親試預聆諸儒使談議朝錯難傳誓誥文買臣未解春秋義相公明哲本神授矧向天人早窮究嘗通墳典作蟲書豈止山經辨禺獸顧斯末學類蠓蠛肯為申韓較優劣不道元臣總萬幾翻從下士求三哲嗟豫出處兩未全懷文獻賦悲徒然樊川空挾阿房賦崔皓徒多輕薄篇其如河海詄蕩蕩能問春流細無恙裴令優容不可名謝公齒頰真難量紛紜册府未引逸猶自燃藜照緹帙書因都護剖蘭筋賦使相如解盧橘固知名教自有主致治何須誦論語功德方看過富韓文章早已歸燕許煌煌景運啓未遲要令相業傳康熙明年收復湖湘路願上元和聖德詩飲次書梁陶侣世兄便靣陶侣為司農夫子從子豬市即夫子邸里幽蘭在谷芝在田謝家子弟多名賢朝陽門外騎馬去為汝一停豬市間紅顔緑髮將佩組腰下羅囊不曽賭衛瓘書名擅北堂野王畫法跨東府胭脂河上流水新酒家舊賣中山春幾時同返恆陽路重醉金門飢死人西臺先生行奉送臨海馮少司冦葬親請假歸里西臺先生似威鳯早上金堂拂雲棟閥閲高于桐柏山房櫳蓋在桃花洞當時司法蒞永昌博南開後通瀾滄九龍不擾銀生地五聽長臨金齒傍自言家世嬗駿烈兩見高堂秉奇節劉毅冬銜祖母芹楊憑少吮慈親血陳情久已痛鳥烏獨迎萬里潘生輿東征賦就白蠻樹南郡辭將青海魚中丞入告賜表揭章安城邉竪雙闕五花錫命珈帔殊剛在裴家建坊節無何移守石鼓城阿儂盜㺯潢地兵歸朝欲表鄭虔志道梗頓違徐庶情踉蹌回任遘母疾路賧天遙哭相失誰能辛苦賊中來鑒此孤忠晉華秩都官力贊廟算行樓船潢浦檥昆明三巴六詔喜盡滅孤櫬一舟悲未迎因之解組呌閶闔天子隆恩降優答皭然忠孝具能全况復妻拏此時合秋花初發繞玉街離亭欲别還銜杯故鄉墳墓望何許令我惻惻徒傷懷大江東下數歸驛天姥嵯峨下窀穸竁户封來繡閣雲壇碑琢出寒山石偉元廬墓歲月間謝公舊墅難追攀何年丹穴歸棲羽仍向瑶臺縱翮還徐母邵夫人壽詩徐繼恩之配汾之母也往與徐汾父子友比之阮籍交二王夫人令妻併夀母既賢且哲能文章最憐老友入林去逺向寒山憩雙樹許邁徒傳阿閣書梁生不在臯橋住我昔從行恨未力草載相違苦相憶今來堂上拜女師尚見芳樽照顔色清秋明月出每遲玉臺皎鏡光離離若嫌祝誦無佳句自有庭前孝穆詩徐二將歸暫寄湖南周開府里第過别有贈徐樂上書不得意將乘欵段歸南山黃金用盡敝裘裂何計得還煙水間長安四月方苦熱日飲冰漿類沃雪鹽車欲駕去住難忽遇孫陽泪如泄菖蒲酒暖梔子香新裁越布單衫長湘南節度如堪倚且住城西舊草堂題文待詔雪圖奉送高少司冦還般山何年蒼筆寫皓景鹽花刻作山谷春孤懷澒洞當洗瀹兩目豁達開風塵伊誰蓄此作寶祕般山先生得真意圖畫恆留處士吟煙嵐不待官家賜當時出入金馬廬蓬丘瀛海連江湖夢遊已聽鈞天樂草詔還呈紫府書集賢學士乞歸去家近函山傍雲霧溪上銜將陶沔杯園中種得於陵樹最憐良馬卸鞿靮偏借都官坐赤棘栁惠焉能作士師曽參未許咨刑辟西臺高臥對白雲還家久已忘冬春始知羞行貴有守誰謂侍郎難得人聖明下詔䇿災異執法承顔舉遺棄咸道先生風概殊能使頑亷懦立志先生磊落披敝裘寄居蕭寺翻經樓馬芻一束苦戀棧蠧紙半牀兼覆甌修容靜與巖壑瞑論史決若江河流思以秪德代請讞勝彼木鐸警庶郵長官當白不當白豈向斯世爭沈浮清秋遙夜雨初歇正遇棠村授師説時司農夫子招飲下直沿街燈火紅高軒到座星辰豁翛然相對淡欲忘後談莊列前羲皇宛如鄭綮負驢背宵行風雪灞滻傍不然溳上借書去冒雪一詣張君房纎埃不起林落淨奚啻澆水滌繒囊斯時秖恐絆鞅轡霜深露滑增倣徨何期聖明轉浩蕩特許還山遂微尚白雲出岫本無心黃鵠摩天總難量長洲待詔筆法精雪圖千載光芒生寒冬把此欲歸去瑶天粉地千山明山前有人騎馬行大雪陪益都夫子遊善果寺歸燈下同夫子和陳檢討詩一人呼韻一人給寫信口占叶不許停刻時王二舍人胡徵君在旁知狀後舍人亦有和詩紀其事天將大雪早作霰譬如拆木先拆芽須臾拋落若栁絮細細剪出天工葩既非車下撲塵土復異柁底揚風沙祗覺雙林萬枝亞一望簇簇若枿丫是日本欲詣初地後車將發興有加寺門石幢挂秋草似我白首雙垂髿毳羽漫空不遽墮瓊瑶在地豈敢拿驟臻方丈恍突室一燈黯黯圍舊紗堂中鐘鼓響還寂令我冥會成無遮伊蒲作供飯未罷午鴉啼過啼晚鴉重登高閣逺眺望共驚銀海翻龍蛇雁王一塔藏貝葉獅子雙脊馱僧伽彼此相峙總難辨就中密織如亂麻况當説法散花雨豈有餳米能膠牙浴堂煎出功德水銅盤灩瀲傾流霞淙淙盥發細響不數隔水彈筝琶即此享受亦已過世間何用矜豪奢揮灑既畢重就坐寺僧復進龍乳茶南泉既逺趙州去不須齒舌相勾爬歸來暝色暗前路出門惘惘同天涯誰知夜半燭窗發依然落筆風雨斜寄贈淮安王君七十并示令子文學少年曽作淮隂遊伍胥廟傍尋酒樓此時酣飲鮮雜客座上往往來王猷繁花當窗午雲熱醉餘隔院聽楚謳因之登堂拜獻老有若健柏凌嵩丘迄今草載憶朋舊夢回月出清淮流但聞市少已漸散縱有亦復非黑頭昨來徵車稅城下欲入不得爛兩眸猶幸同館盡相識淮市三子居最優其中李生與王氏謂李編修鎧也實為羊鄧深綢繆况當獻老年七十秩閣將復傾庶羞彥方高志但居里逸少愛間長泛舟那能侍杖效憲乞一觴捧出丹霞浮長安雨歇鴻雁發蓬池水落芙蓉秋千年碧藕欲攬寄凍瀋三挫成一甌人生得歲貴適意為我寄語且縮篘不信但看服綵者在家亦已扶鳴鳩時令子亦五十初度此日行寄祝益都夫子八十當年召試入帝京中書門下曽投名益都夫子典詞業手把繩斗彈墨絣並言朝右方倚芘眷此黃髮為民正其時正值授杖歲將進三列作五更盈庭憲乞豫敢後因之扶服獻鼎鉶無如東望起歸興一日三疏乞解鞓天子特詔宴禁籞中使扶侍周遭行題籖書絹并篆石宸賜優渥如雨傾遣官持節送還里長安車馬填郊坰不期此事已十載豫亦南畝三耨粳曽因請急過通德佳山冶水風光并佳山堂冶湖皆益都住處凌晨啜茗聽笙瑟傍晚種竹量雨晴出郭相訪誰氏叟將車剛及豫門生曽幾何時忽彈指賜杖復得中夀稱三公雄健過伯始九老繪畫比武城生人聚散有定數矧豫遲暮非壯齡再拜不得親獻杓一心終自同搖旌東方花木及春發南狩鑾馭將時乘醁􅌬滿甕漫斟酌煙霞萬里須丁寧非熊八十儻還載此日正逄渭水清寄祝姚少保六十初度大鵬搏扶越九萬林間斤鷃猶決搶丈夫致身亦有會安能刺促枌榆傍當豫少小擅文賦即聞上國壇坫張衣冠輻輳徒輦集鐘鏞在序鼓在房譬則齊晉大九合下士受約如江黃中間較文試帖括猶然領解在帝鄉一朝烽火遍南服夜起躍躍加騰驤傾裝貿鐵募死士叩馬一謁沛獻王左手草檄右殺賊遂平甌越恢閩疆習書請兵張仲武麾扇克敵謝彥章天子嘉嘆遽錫命驟令開府建羽幢破蜀竇軌授神策平吳杜預封當陽論功不下大將列銘德乃過元舅行至今溟海凛威惠環瀛萬里無波揚豫忝梓里就史職槖筆往往書旗常况當弧矢罣綵箙道逺亦欲進一觴幸頒金匱誓泰礪將標銅柱凌扶桑臨風何以致稱祝神山嶻􅑖海水長烏栖篇為晉江范貞姑作青陵臺畔清霜飛秦家桂樹烏獨栖餐荼茹蘗三十載石闕久銜悲復悲春花秋月宛然在辛苦携雛羽毛瘁撤饌長依庾約兄寒房只坐張玄妹姑依兄鄭山公選郎故云慈烏反哺尾畢逋膝前有子傳詩書他時六翮翻雲去始信人間有鳯雛題董都護記年圖兼送其軍鎮萬州江都㺯環日能賦梔子詩庭下五色雀相視非常兒移時學字擅八體鵲反鸞驚并鷹跱偶寫煙巒點拂奇畫地步天餘技耳因挽楊葉射枝戟遂入天階獻高䇿彀騎分埀都尉符驚文自草參軍檄從容渡海征斛羅盧循逺徙藏流波明廷加節授督護開府正當儋耳河賜衣不著但緩帶徐步蒼林石塘外野人相遇誰得知試看當年好圖畫書生意氣本自奇虎頭豈是尋常姿留形丘壑無不可為龍還復為蛟螭青門設祖請祓軾一展斯圖壯容色他日功成倘鑄金碧帶青裙尚能識送梅庚赴江南田使君幕和其留别原韻同陸大即席昔年曽作蘆中人蓬萊幾度看揚塵但逄東海孫賔石不遇南昌梅子真長安忽遘載文軸把筆如櫨幘如屋入座皆嫌倒屣遲當筵但道揮毫速年來好酒惡水淫醉歸敲醒街頭砧蘭成自有間園賦李勉難忘戀闕心同時大陸本舊識謂陸冰修也曲巷茹蘆日相即久知豪客自情親堪笑世人皆耳食才大驚疑總在胸官貧薦引全無力金臺名駿服軛多宮中誰肯憐娙娥誰知幕下得賢主頓如尺水生微波時冰修同落筆見幕下句驚曰何以合波字及得此句遂擲筆嘆絶雙橋相對草堂近澄江一望迷林柯高旌前導畫熊虎屬車後載環馬騾南行有客辨車鐸相逢莫使然疑作發册應過玉笥山聽鐘猶在升元閣只愁良友去薊門每上河橋輒作惡陸生預道蕭山毛臨行一曲唱且高不虞漏盡雞三號珊鞭欲揮心轉勞金繩墮地玉壺罄願君還聽歌聲豪陳明府選之遇于長安街飲次索贈朔風吹凍塵不飛道傍車馬如雞栖天安門外栁條短回首一逄薜荔衣清姿濯濯負意氣我友陳生好難弟挾管長從鳯闕遊揮金不計蠅頭利行年剛及強仕辰將紆墨綬拖黃銀陳遵自昔能驚座孺子由來不厭貧獨言賦性愛山澤每向蘭亭探遺迹太守祠邉釃酒紅栁姑廟後翻魚白今來偶寄碣石宮有人獨坐還書空何時解組賦歸去與君把臂深林中長安邂逅值冬節幸對旗亭酒初冽腰下雙鉤解照人且看春明杏花發送林使君督學河南東家拾明月傳視不能識青黃蔽前林誰能辨容色晉安才子林使君文章翕霱如蒸雲與豫同館者曹子偕過泰山為主文聖人大悅加奬譽旋使中原視學去劍氣長飛龍子灘鹽車早辨羊腸路春風二月栁滿街御河流水當行杯南行已及清明後少室山前花正開陸生赴蘇州幕陸倕名在沈謝間垂老被召來燕關龎嚴李益不敢薦三年將返支硎山蘇州使相甫開幕便展干旄導情愫臨海還招鮑照歸渡江且逐陳琳去吳中故舊多隱淪草堂仍築東湖濱浣花不厭主賓晚種菊愛看鄉井春只愁曲巷鮮憑軾石鼓遺文倩誰識韓愈曽言空馬羣一顧燕臺泪霑臆送家太史假歸新安長安朝暮送行地西有張掖東沙河每臨祖席發歸思曰歸不歸思若何憶昔徵車乍來赴本欲還山乞歸去光宅先教宿李蟠直言必欲留裴素吾宗就試得數人林間二阮叨同倫雲陽舊令舉復罷謂祥符令會侯也叔氏妙才人盡聞掞天徹地藻思闢嘗見揮毫趂飛翮國子通傳虎觀文獻王親受京房易太史為授伊勒兔親王經集賢載筆入丹地便遣方平撰前記制舉從來待異材史書豈是尋常事嗟豫落托百不成長沙舊譜依泉明霜前銅獸當廳列日跨疲驢逐隊行如何叔氏掉頭早鎮自陳情痛烏鳥婺女瞻來橘嶂寒客星歸傍桐江曉豫于去住願總違豈難遽著青羅衣慙于史局未能了覺與世數終相岐秋林柿熟菊初發此去蘆溝看新月詘指明年還院時仍在清商戒寒節軟塵著雨衣未乾滄浪自昔推新安冠纓濯罷如相望知在天邉風露間新安有天邉風露樓銜魚篇贈廣文盧先生先生本是麟龍姿偶來提領宣聖祠鄉書早展冠國士臯比坐擁為人師翛然高舉藴飛翮羞向長安再投䇿魏世文章重子欽漢儒學行推盧植秋花開發絳帳寒間堂撤牗襟懷寬青氊不用氍毺布美饌長揮苜蓿盤生平月旦重閭里冰鑑當胸似清泚不教魚目混明珠誰抱寒桐對流水蕪文好我如嗜痱天涯汗漫知音稀願為堂上銜魚鳥長傍秋花遫遫飛西河集卷一百六十五
