body:
  text: 西河集卷一百五十六翰林院檢討毛竒齡撰七言古詩二飲王大參邸舍有感越東節度琅邪公赤幢曲蓋紅鬣驄皎然清白不可犯二十州縣爭承風時當北府徙軍鎮部騎牙官擾民畯公嘗執簡挂虎門夜草封章曉馳進彤廷震怒驅短狐直聲藉藉驚階除誰知民命甫休息反遣賜車去海隅今逢天子重儒術束帛玄纁召公入東堂進士推郤詵西漢諸儒薦王吉自慚六論不一通徴車礰碌空相從多公奬譽溢齒頰令我感激填心胸春宵月出勸杯杓坐聽宫門下魚鑰罏火圍來炭餅紅山屏遮處燈花落芳菰精稗肴核鮮大梁之黍華池蓮高文雄視絶流輩坐客縱談驚四筵銜觴脈脈念夙昔十載相逢苦相憶何期此地得追陪一見裴公舊顔色人生聚散會有時都亭高會真堪思獨憐垂老東華客醉裏騎驢何處歸短歌廣陵城下波粼粼吳家少女名阿真桃花為面日為影當軒一顧愁行人春桑初發采桑去五馬城南使君住煙絲漠漠吹碧林前路踟蹰日將暮鴛鴦雙飛江水傍蓮枝已折蓮絲長他時自有連根藕莫道空聞蓮子香明河篇有序毛甡遊淮隂查繼佐孝亷並轡過張吏部曲江園觀百戲時秋八月十四日江南北名士十百來集凡水亭當湖樓臺館舍刺史諸王軍府伎樂畢出驚見妙幻目不及瞬自曙起烏啼逮夜漏盡日初出兩竿迭呈絶藝如灌河接魚勿得已矣絲竹綺羅霏微幼眇自傷淪落未易遘此盛會樂極哀生易于感慨又當煙竿熱層纍遞上狀城郭宫宇人物狗馬簾幃釭幛士女觀者填塞渚港亦有簫管燈紗相間映水煙糢糊奉觴女郎從煙霏霏中載它舟去亦又凄已踏鞠者閻生搊筝王生有清歌絶妙錫山朱生吳門孫生皆一時絶技擅場幸一遘觀明當散去聊從諸君後賦詩三篇一樂府一律一此題也時賦詩者十之二甡與張公子礽煒詩先成人誦之劉漢中贈甡詩曰詞人罷唱曲江樓王孫晉曰賦傳明月夜詩動曲江樓張慕曾曰今來同上曲江樓崔皓題詩衆莫酬餘載東山釣史集中明河潔潔秋夜長草頭露白生微霜淮隂客子感秋節愁坐各言衣帶涼東山釣史卧淮浦私喜涼秋及三五蹈海誰牽八月槎臨淮須伐三洲鼓三洲鐘鼓淮水濵八月乘槎好問津邀得江南流浪子迎將河朔冶遊人江南河朔兩相望河水星光兩搖漾西園冠蓋翔緑池東第笙簫啓華帳張家舊院倚水陂珠湖千頃漾琉璃紅橋碧栁通油幕叢臺復樹繞金羈緋紗籠蠟安花裏綵幔懸毬似霞舉漢代名王久愛山曲江吏部今開墅初開湖墅接湖蓼重起煙樓布煙燎將立星竿火樹枝將貯三硝五花爆懸竿貯爆俟斜日列艇分燈晝如漆但留幻舞到庭看待駕明河泛槎出斯時濯燕稱最輕此際投竿舊有名絙懸傀儡戲東郭鈎藏神祕來西京誰翻竹簡弄漁史誰聽皮鞉拂絃子巾角彈碁四座驚花門踏鞠三郎喜别有秦箏老朔客曼節長吟變促拍何事哀彈塞上聲使豫翻動江南情江南一望欲起舞前亭又打閶門鼓內部新分刺史家明童盡出諸王府晚風乍起煙滿湖月輪推湧湖中珠明雲薄霧繞河漢蘭橈畫槳環菰蘆燈前紫幔開杯斝水面紅粧照綺疏紅粧紫幔兩相映水面燈前看不定明河將月蕩為煙皓月連湖㵼成鏡明河皓月乍流沒倣佛天星墮天末吹將星籥燎花生看到煙樓火竿發煙樓星籥繞槎轉甲燭鱗釭散珠逺祇因畫舫隔煙多翻使紅龍踏波緩香燔銀葉炭迸添箭下銅盆滴將滿别浦還營曼衍場重城已下葳蕤管大舸小艇歸不歸霜寒月白煙霏霏吳謳越唱本超絶靜對流波一聲徹繞屋驚翻桂樹烏滿船涼浸冰壺月只有傷心小樊素看繫榴裙坐花路不識初從何處來幡然忽入煙中去明河垂垂露華澀良會何時再能得賦就明河夜未闌皎皎東方又將白蓬池篇蓬池渺渺耶溪邉耶溪美人齊種蓮蓮花蓮葉何田田風前日下長暄妍東江節度文且賢朝來招我尺素箋紅欄屈曲初張筵圓方遞代羞新鮮孌童皎皎垂帶年滿堂拂舞愁管弦銀陂倚欄坐欄前宛如身在荷花船伊昔蓬池多列仙朱顔緑髮青嬋娟荷珠作珥荷鏡圓風衣雨鬟淨可憐今來侑酒真茫然微波著襪飛朝煙蓬池如盞酒如泉醉時欲踏蓬池穿誰聞薌澤碎珠鈿晚來灑雨荷花邉奉贈蔡二爾趾并為酬别淮陰蔡子嘗負竒鴻名將使侯王知鬑鬑白晳美鬚髮有時出語驚人兒我來淮陰問竒士日探懷中禰衡刺首謁城東蔡子廬恍若長途遘騏驥西風斜日同酒酤流霞灼灼抽冰壺汝南黃憲漫相嫓只言江左生夷吾相從晨夕惜歸去願作浮雲繞江樹秋雨裁飛圮上花春冰又滿臨淮渡蔡子驕蹇莫自疑空羣之顧非無期黃金築臺久相俟况當冀北長驅馳君不見淮陰故侯釣淮水渺渺流波散花蕊一旦能驅西楚王頓挾千金散閭里又不見淮王好文作竒句只詠淮南桂之樹後園汲水得寒漿白犬丹雞不知處方今蔡子世所聞黥彭絳灌難同羣只應高語為秦相不羡明堂是漢文西樵山人歌馬生自號西樵子家住東湖藕塘裏朝雨看沉屋角雲春風吹上階頭水間來著書還種花鄰園日聽啼慈鴉長鑱短鍥置不用自名樵者真浮誇西樵大笑為我説曾夢羊城見高闕青螺壁絶抽紫霞黃木灣深瀉紅雪羽衣前度指一山山高與汝同難攀西樵名山亦名爾自今爾是西樵子我思南中有竒嶼萬仭羅浮障春霧夢裏長從嶺徼尋醒來仍在江村住西樵何幸得此名此名竟與名山爭騎鯨欲去不得意枕柯將爛非無情念爾東湖濵日日放船好鄰園有泉亭幽清似瑶島前堤採蒲根中流滌蘭草就君長向東湖路時聽流泉不能去今來翻作西樵歌恍倚空嵓桂之樹西樵今亦名鸖樵薪煙蘇雨當凌霄西山縹眇不可見翺翔爭比他山高南還將上匡廬頂看爾西飛一羽毛放歌為劉二漢中留别王孫來時桂花發王孫去時春草生問君何以久居此只言為有劉生情劉生意氣邁碌碌好我逾于好金玉解褐頻酤市酒紅銼牀不用霜芻緑我本羈旅人天涯任奔走驛店聽曉雞旗亭折秋栁彈鋏辭里門吹簫渡江口渡江潛作瀨上行驚翔之鳥傷豫心何意君能好我摯且深令豫忘却蘆中吟朝來共藿糜前廡無用梁生炊晚來共紅燭街鼓沉沉倒􅌬醁一日不見亂心曲祇有倪寬相對坐牛角此際歡歌且相樂自此勿言淮水長濁泥數斗淤難量勿云淮城有千仞當此高懷不堪凖我今將住劉伶臺寒風斗酒長徘徊不然攀爾桂枝樹且與劉安共晨暮無如唧唧鄉井情方春竟逐王孫行臨行不識中心苦試看萋萋春草生渡河寄大敬徽之憲臣并呈張五杉張七梧薑十七廷梧丁五克振吳二卿禎顧大有孝河水將流澌東行渡枝津寒風吹襟裾使我思故人故人在何所云在舊鄉縣炎天三伏時送我走江甸晝行蘆中遲夜行瀨上淺三吳舊知豫故呼我王彥渡江旅集燒燭枝前楹歌發如流絲酒酣銜淚不能下低頭自弄黃金巵座中有客向豫指此是江東小毛子張祿更名識被袍梅生變姓詳居市直前把袂訴疇昔賔客盈堂盡前席銀瓶高瀉傾一時金管豪吹快終夕自此至江介車轂日來諗渡江一百日九十就人飲就人飲酒可奈何他鄉歲月真蹉跎渡江王彥今仍在曉日寒風又渡河觀滄海歌讀愚山觀海集作我欲登天孫俯視踏滄海躊躇志不決展卷發愧悔展卷忽讀觀海集滄海蒼茫水波溢前開岱嶽捫夫關下撼洪河蕩奔日魯源村北闕里開聖門觀者難為才巴西作傅詎仁術田何受易無文裁愚山慷慨董絶學朝發魚臺暮姑幕斗柄千年指玉衡龍門萬丈飛銀鰐觀于海弄海水只有鴻流亘天起浮雲瀉其中星漢簸其裏前臨海嶠自凌躐那用江淮理舟楫青天泛浮槎片片似落葉浮槎一過海鏡亭還看岣嶁蒼苔青女郎山下丹花發驛使詩邉紅淚零獨憐此地李厯下欲倒滄溟向天瀉歌成白雪好名樓題却黃金豈無價宣城浩蕩不可數自有文章變齊魯渡海何須漢將船驅潮不用秦皇弩宣城好我如好璞鼠魄還題卞和玊我知宣城知其深滄海滔滔涌陵谷當年刺舟還海中成連既逝波濤空今來我亦望洋去隨君觀海乘長風乘長風渺以漫但知觀海易不悟為水難奔濤澒洞震星嶽微流浩渺揚波瀾我欲從之水潺潺琅琊並厯下盡作臨崖觀不信但觀觀海曲躊躇浩嘆蒼煙寒陳州村人或賦上陽白髮人者毛甡過聞而感焉河南河北不種麻上陽宫中無好花玉溝流水載花出從此宮墻不能入宛丘東路桑落村漂流近在村東園黃門持鷂晚歸寂公主望鄉朝負暄西山盜賊走春電花落重飛舊巢燕舞鷺翻垂籞宿衣漚麻添作西宮線金輿入蜀未得歸道傍不用傷蛾眉上陽白髮誰家賦能使傍人雙淚垂食熊蹯口號呈薑黃門坐我兩水亭飲我五雲館中庖出熊蹯鮮濃滿螺碗青梔花發桐樹涼紅魚刺尾遊銀塘南風吹吹拂巾袖下箸一食神氣揚主人告我是難熟澳釡爍蠟三晝長晉侯枉咎宰夫暴老龜須用千年桑再食熊蹯口號易牙調苦辛伊尹負鼎俎熊掌亦我欲食之快起舞蹁蹮舞罷雙淚流餔藜含藿肝腸羞爭剸夏后兩龍肉未厭君夫六駮牛清絲嘈嘈酒滿鐘食熊并食熊蹯菘何時借宿長楊館更向山頭一射熊即席贈安陽許三禮進士南華山莊宴集同朱大士曾沈九嗣范令弟華葉大雷生祝宏坊金燾諸孝亷作鄴城才子東揚客新著單衫楝花白因尋神禹治河經遂跨秦皇纜船石當年獻賦意氣雄竒文驚動明光宮夷門結客滿河朔蘭亭高會來江東炎風六月雨初歇淡日熹微障雲葉樓船出郭栁港涼逺聽啼鶯駐輕楫紅箋曾約西曲人油車空返東城闉船􅐼四啓信流發大山小山如錦鱗南華山莊石橋裏句踐傳來照龜址叢英茂木深滿園獨立空青一亭子紅蓮落蒂挂石槎長竿曲上交藤花清漿凍酒雜瓜李高欄曲檻生雲霞過江許掾思如髮魯國朱家髯似麻葉公好龍有奇氣中酒清談更超詣杜秋有約恨未來蓮衣水面空相裁風流沈郎善吹笛倩我為歌古惜惜幾番涼氣襲袂生一片流雲滿山白江東王謝未易期奉觴疊鼓稱南皮菰蘆吳傖一何幸重逢鄴下黃鬚兒藤花初落日初暮畫楫還尋若耶渡漫賦漳河銅雀詞但飲前山照龜處寶刀歌送薑垚逺行并序薑垚公子遊晉陽挾寶刀以隨寶刀千金裝捽若朝芙蓉攜之入晉陽翼翼驚遊龍晉陽古地負朔易簫鼓汾川動春色砥柱峯高竹箭橫天門關外楊花白翩翩公子裘馬新幡然願作西都賔竒文凖擬拔河嶽灝氣直欲凌雲津春風二月固陵渡九坂羊腸太行路古署從教倒屣迎前途莫怨班荆暮我登君榻裁兩朝夜談新史傾洪濤徘徊忽綰柳絲别令我醉酒心酕醄我不能為雲君已能為龍追君那得隨長風去年曽買兩刑劍揚華一辨雌與雄雄者自佩儼星列雌以與弟同追鋒今持寶刀漫嚄唶但使揚華似冰釋從容麾示晉鄭間西去何人不相識睡石避兵上塢作毛甡睡石石如馬漴漴水聲走背下豫章葉密風四來葉搖隙開日灑灑老人釣水跪雙膝石穿膝穴釣不得北山山頂有白雲早歸好避鴉頭軍浦陽江南五十里仙人嵓與百藥山相對峙毛甡登陟之慨然成詠十三始登山見山如見鬼十五見山久踏之似牛豕仙人之嵓對百藥驟見猶然起驚愕魌頭䫪足何處來頓使嵓前倒行腳當年策強執神鞭欲驅此嵓神山前強項不得卒到海仙人就居近有年四圍削琢作門闥轟騰熇爚罏竈濶攢空岞崿起萬熖燒出丹砂紫花片在旁有石類駕鼇前當巨石鼇將逃修鱗入溪淹鼇足昻首絲絲細噴玊或傳此鼇腹虛空仙人産兒坐當中八月水枯穴溪底硃旗石竿羅青蔥枯查倒海插石罅千年海生石山下祇恐此鼇負嵓去黑風驟雨駭秋夜楓橋山人老蓮子曾畫富春江山水一日畫得一幅成當此一月不得似我今勉強攀天關仙人作歌留樹間向前倚樹和歌去西呼茅狗聲斑斑山有石翁嫗朴父不死東南隅千年老病無衣裾黃河不清父不死却在山前緑蘿裏緑蘿垂垂坐兩石石裏生成有骨格世傳老父好此山挈嫗同來作家宅早間洗頭玉女盆晚偷鬼火燒松根紅杉紫桫藉衣履乳麑鷇雀成兒孫琵琶灣頭有少女紅裙猩猩對風雨黃姑却上天漢邊日盻流黃最心苦老翁宴坐絶朝夕春花滿頭秋月白天吳欲牽老嫗去只挽嵓頭桂枝樹山有翁嫗桂有枝羡君婀娜長無知題倘湖讀書圖為來十五集之給諫初度倘湖先生讀書處幾疊湖山繞春樹綵楫初為錦沜遊隱囊高踞繩牀暮皖江司讞曾守城登陴注易退賊兵還歸青瑣頓辭去封章十七留筐籯湖山盤盤築書塢臨湖幾度清明雨碧栁朝開彭澤樽紅衫夜伴香山舞前年居我此湖北檜槳蘭舟蕩鸂鶒月明水靜語有聲日上岡寒炙成色先生晨夕湖水濵披圖恍對滄洲春羡君原有藍田筆寫出山中唱和人山霧引并序豫自江上還避人樓家沓上塢之石橋莊早起觀霧初泛絮海中既為雺雨劃然裂響過濡灑而畢則早食後矣日涉山中境不能悉記寫此寄與舊遊故人用代敘語山中大霧暗高閣咫尺不辨閣前竹朝光初上欲破難蒼茫如在環瀛間須臾日色拔松頂將破松枝漏光景忽聞一響裂萬壑大霧驟斂如雨落我來閣中觀素書窗紗几漆疑水濡竹根初青日初出此時已及數竿日入山數載恐不深大霧欲破驚人心我將深隱共元豹藏入霧中誰得尋擬古曲聽商生徵説彈琴作太傅府中銀燭光永恩樓上月輪涼珠徽璧軫甚的皪新聲舊韻何悠揚年少商公子彈成夜度娘欲踏園頭雙蛺蝶恐驚門左兩鴛鴦金烏薄栖墮翠林公子披衣拂綺琴梅花調發春月起楊柳渡暗暮潮深名姝妖女判不寐聞聲銜恨獨相尋子期真善弄田連猶知音飀飀閣中風脈脈絃上語海鳥汨緑波野鴨翻清渚銅壺唈咽流春聲玉馬轇結生夜情手指擽捋不終曲心想寂寞難為聽春花已靡熳春月又分明莫將卓氏屏間意寫作雍門道上行朱絃七條琴上絲白石一闕口中悲楚妃愁坐久無主王昭望鄉不得歸從君一唱復三嘆坐令春草生繁滋閉門行湖南風生湖北涼買酒湖北吹酒香湖中女兒渡湖去船頭雙載黃竹箱前湖荷花蔽湖路誰唱蓮舟買荷渡紅船看入荷葉中欲採荷花恨遲暮明朝伏日須閉門莫行荷路傷荷根草堂花枝詠有序避人後七年暫得歸城東草堂睹見花枝爛然不復能哭泣乃為之咏草堂三月花枝紅東風細雨春濛濛夜來燈影動花葉照見棲花緑蝴蝶墻東高閣翳紫霞隔墻一樹紅梨花鄰家少婦捲燈幔坐對梨花起長嘆幼時北里看鞦韆梨花吹落衣帶前今來拾花種花子又是花開碧墻裏飲祁中丞東書樓同張四梯張五杉薑十七廷梧蔡五十一仲光觀祁五理孫藏畫書事并呈祁禮部豸佳薑别駕幹清江細雨暗遙郭浮雲杳靄居上頭銀瓶美酒瀉行客招我東壁藏書樓樓頭遍插李侯架玊軸金籖滿前絓嘗餘幛子寫丹青更見屏開舊圖畫滕王蛺蝶銜緑苔江都駿馬飛黃埃龍瞳欲點風雨下虎頭落筆滄溟開憐豫畫理本未晰金錯三過頗疑惑張杉同我快指觀恍若洪濤蕩胸臆于今只愛陳老蓮蘇州待詔吳興錢烏程關思亦超絶君家尚有祁蟫仙我欲雨中摹一幅薑九西遊賦黃鵠主人便起經且營細拂鵝溪栁條緑酒清肉美催飲頻簷前驟雨傾盆瓶畫成相視頓開霽生綃捲出秦峰青寓高家亭子午日後黃大世貴蔡二爾趾舒四起鳳戴金劉二漢中舒章周􅀢童衍劉三琯移尊過飲率賦兼呈黃二翰樂大六舞高儀淑光淑天妃宫南一窪水前有高家小亭子女墻青草環曲沙幾疊紅欄傍沙起水光如鏡千頃多風來吹皺波中羅波心一徑似裙帶橫橋結束分沿渦橋邊野花夜棲鶴此地曽經種靈藥白日升仙舊得名緑鬟姹女今難索我來亭中值夏初菰茭接水生紅魚開欄移榻近沙岸沙邉一望真清虛黃梅未過又重五空亭尚對黃梅雨珠傾艾葉垂碧波血濺榴花墮遙渚良朋好我移酒尊煙雲萬疊迷黃昏斜陽暫啓照東壁明霞逺映回孤墩酒酣鐘鼓寺中發野火前堤乍流沒清歌幾曲聲滿湖黽吹蛙吟一時歇東湖深處黃氏園鳬亭依倚園東軒雨餘嘗就野鳬飲亭中瀟灑誠難言此亭縹眇有竒趣亦在南湖最深處良朋四坐皆盡歡恨不同留野鳬住清明上已醉裏過他鄉午日還高歌酒酣起望南湖水欲泛輕舟奈雨何放歌酬王孫晉詒别東行不得觀滄海策馬復至南昌亭將浮沅湘入衡嶽悠然萬壑踰青冥南風五兩泊河渚酒酣日落將揚舲忽言欲别王子去中酒起坐醉復醒王子當今一人傑少小能文過江薛十五彎弓射浙潮二十裝金返南越無端見我喜我狂效我黛筆書堂堂千秋知已莫過子他日青雲藉君爾此間好友倪與劉憐豫詩句時追遊小弟戴金更多事日訓兒童使強記爭知心雜指爪枯錯應紛酬總非意那知王子八斗才落筆滔滔等間視君不見毛甡䇿馬濟上來夜涼獨上韓王臺車裝暫稅小亭子亭下周遭蔽泥水朝亦渡水出暮亦渡水入車轂不得通褰裳坐相失猶然方幅滿几案蘸墨濡毫日揮汗可憐貧賤不自繇役思勞精受人慢逝將西上黃鶴樓先遣樊素回江州仙人天上不可待白雲足下還悠悠慿君送我千秋意瀉作舟邊新水流遣侍兒歸舟江口午日相待王郎自迎桃葉船我今送汝還江邊水芹如帶曵艇子波面晴帆共霞起宜男花發紅滿枝深江莫理絃鞉絲渡頭喚買豆娘子正是我來江上時西河集卷一百五十六
