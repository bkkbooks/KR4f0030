body:
  text: 西河集卷一百四十九翰林院檢討毛奇齡撰排律金谷園花發懷古得春字梓澤回朝日花林發上春誰為臨澗客思殺墮樓人長阪迷紅藥連珠散緑蘋霜條捎幔錦露蘂落車茵宴飲追王詡風流想季倫繁華餘艷影顧盼最傷神堯曰金谷詩波激連珠揮送龔舍人歸湖覲省朝雨灑行車春江送伯魚斑衣看外著銀詔自中書勝里方回轍髙堂正倚閭帔分清禁出羮上太官餘湖橘將花發湘蘭帶露舒黃香江夏士孝行有誰如寒食夜集施公就亭分得湖字同陳二上善髙四詠徐大崇倫麻二乾齡諸子髙宴同金谷清宵啓玉壺餳盤存令節榆火散平蕪對酒傷春暮裁詩及夜徂賔間交履舄宦達似江湖磬管沉官閣鞦韆記客途梨花留醉看莫聽樹頭烏賦得秋日懸清光換韻何堂曰換韻非題中韻也他倣此帝皓司秋肅陽烏啓曙新三竿懸有象萬里淨無塵照壁融丹粉流波蕩水銀孤光回暑氣涼影動蕭晨但得清時馭金天一轉輪大將軍西伐詩萬里絶塵埃將軍天上來聲名驚外域節鉞授中台司閫三軍命分符七校才熊旗收勑勒猿臂射輪臺日暗刀如雪沙空鼓似雷巡山宵擊斗度隴晝銜枚戰急前軍集行遲後命催霜髙兵氣肅風落陳雲開紫塞秦城逺黃河漢使回西征看略馬定為取龍媒宿東明寺十二韻寶地棲靈異香臺枕翠微龍銜秋雨過客共暮雲歸一鉢留殘篆雙松曳落暉蓮開太子座草長逺公扉秋老蟲爭響煙寒烏自飛階前翻貝葉樹裏挂僧衣寺古鐘鳴早林深人到稀榻懸新管簟燈暗舊紗圍鐵杵時誰舉金裝夜有輝尋真思未冥入道志多違潮湧來仙梵霜空得妙機可憐漂泊久暫此一皈依梁園感懷才子蕭條甚乘春遊大梁草青連日暮不見舊賢王荒甸傾朱榭長陂秀緑楊天寒剛灑雪人去幾經霜上館開樽冷平臺射涼諧文跨漆吏雅賦待鄒陽汴水開河淺鄢陵去路長曜華宫首望何處不蒼茫寄大聲徽之桐音南士大敬憲臣代書避地家千里懷人思百端鄉關春邈邈郡閣夜漫漫馬走時依棧鴻飛敢漸磐貧交投趙勝曼語報任安却載辭秦使操兵謝漢官舟車窮兩越書信斷三韓謂塞外諸君旅婦縫衣綻江漁解劎寒東亭悲聚散北斗望闌干海濶從垂釣河清好伐檀授詞當尺素反覆道加餐吳宫教美人戰試體旅悶效作名將觀兵略賢王試女戎隂符先閫內祕計定宫中金甲擐衣紫雕旗捲汗紅攢眉羞畫戟錯步笑彎弓魚貫看難列梟刑豈待終軍前娘子隊端賴霸圖雄夜到真州旅泊驚銷夏江行入早秋涼風吹甓社夜月上真州露白沙俱淨潮來水自流燈檣圍翟賈酒市記秦郵瓜蔓橫江步礬花映石頭女郎歸浣浦太子去書樓野鵲棲前渡飛龍過此洲只憐亡楚客吹笛尚悠悠登汴城即事不作名王客徒深公子情煙花三月暮一上大梁城舊苑樽盤合繁臺歌吹縈春隄紛繫馬午樹敞啼鶯世鮮捐虞相時無救趙兵賔師淹孟子關吏困侯生亭戍層煙晚河沙壅地平九門新浩蕩四術故縱橫士女看都雅金錢在市贏繁華追往事重與説東京堯曰譙周云虞卿食邑于虞非氏也謁嵩嶽太室開天表崇丘奠土中主名髙四域受秩比三公日月環區宅隂陽割渾濛歌嵩揚峻極望祀體昭融華蓋標方嵿金壺啓上宫翕河承漢禪卜洛載周工别觀翔修鶴層城倚大熊藏書憑玉女過澗遇青童洞閉能圍雪梯長恍御風羣山咸拱嶽萬歲自呼嵩槐弟封嶤爵菖羊採少翁浮丘間駕羽子晉妙吹筒石酒龍精白嵓花鳳首紅煙霏春渺渺水滴午漴漴虛壑涵深礦空梁拔斷虹天關應再闢帝座儼相通險塞分河內靈祇屈岱東神京懷舊服終古賴攸同廬山崷峍東嵓勝蒼茫南斗間倒傾彭蠡浪雄出豫章山駭谷驚難度奇峰秀莫攀星光流電閣日影上天關石鏡懸孤照屏風疊九鐶蓮花開社白杏子墜林殷雁陳迷遙渚鵬垂暗大寰分流遮七澤越嶺控諸蠻雙闕遊來迥三宫望去間陶潛真遁客匡氏本仙班赤豹司金鎖青猿獻玉環危梁跨兀兀飛瀑下潺潺剎轉金輪扇巒封錦石斑清颷回一氣散岫簇雙鬟吳楚區分大乾坤到處艱幽棲能託迹應見白雲還憩華嚴寺後院既入三摩地還尋不二禪長林分化域髙閣會諸天橘壠成香徑松門倚翠田龜趺留篆小龍女抱花姸紅網穿殘日黃金布昔年臺端翻覺藏湖外恍迷川龕石瘞唐祖廬峰景晉賢無心常擊磬得語自忘筌衣敝猶懷寶盤空不施錢開垣看緑樹赤地長紅蓮南郡饒新剎西林續舊緣晚鐘相繼起歸路夕陽邊蕺山寺東晉千秋宅吾嘗思右軍南朝四百寺汝以奉龍君灑墨飛花雨清談起佛雲名門成雁塔道士戀鵝羣白社前賢散烏衣隔巷曛此山嘗採蕺歌苦不堪聞南鎮古鎮封東越名山表會稽周官頒令册夏禹錫元圭丹殿憑嵓迥紅牆入路低天關懸畫額地勢控雕題代逺圖書杳雲深竹箭迷春還尋祕迹長望草萋萋黃甫及鴻臚書院前竹修竹映虛堂菁蔥入座涼筍多緣砌隙枝曲避簷長日影移紅幔風梢出畫牆連苞如洗露剝粉類雕霜近榻翻書靜穿林度酒香徵歌宜夜色髙嘯動秋光葉密藏鳩雀花開待鳳凰由來江夏郡清絶勝瀟湘憲臣招飲曙寅園萬李樹下萬李白皚皚雙樽啓白醅地從瑶海入人似雪園來樹密盤根逺花繁帶蘂開彌天遮作幔點地便成堆綺勝隋堤絮光浮庾嶺梅霧深剛五里風舞必千回過鶴憎裙黑拖鷴愧色灰坐迷雲母槅持晃水晶杯觸席傾煙粉沾茵襯土苔日明斜欲炫暮色緩堪猜衣晚添綿著賔稀待月陪香隨銀甕倒影共玉山頽漢將緣蹊集王公棄道栽華林能夜宴應見謫仙才紀使君生日良牧驅熊斾仙郎授虎符襜帷褰上郡竹馬候當塗星厯回珠斗春冰飲鑑湖百城尊巨守八邑啓鴻圖假節平戎莽揮錢減𣙜酤豐年饒比屋佳日洗行厨介夀豳公酒傳籌玉女壺庭鸞翔獸檻車鳳綴魚珠家擅千秋雋仙留九節蒲擕將生甫誦聊用當歌呼贈何仍炎舉秀才入軍玉靶角弓弦終童正妙年一人安用敵萬里竟爭先投筆驅戎莽披圖識陳田風號雙躍劍雲滿五花韉用世書生貴趨庭孺子賢茂才因國舉燦曰晉書逸少國舉驃騎是家傳朝氣能懷組秋期早著鞭蓮花開處舞楊葉望中穿秀士思稽穆從軍憶仲宣他時隨定逺擕我記燕然二少年懷大志慷慨事橫行弱冠羞埀帶乘時願請纓鳳雛分片羽驥子起長鳴納履聞三略傳經諳五兵張良如好女杜預本諸生淬劍流波動彎弧睡石驚樽前飛匹練花下解重英矍相曽觀射輪臺早勒名贈鞭豪士氣貽珮故人情率土非忘戰遙天尚輟耕烏衣兒輩在此去定專征殘月如新月試體仄景連晨發幽光類夜闌女驚粧罷拜人似醉歸看雞唱重栖塒烏飛尚繞竿升階宵讀永出渚曙吟寒鉤曲懸相比弦虛上轉難羈人無早暮一樣憑闌干賦得秋菊有佳色有序九日雲起閣各賦陶句其不得秋字從險也唐人試是題有唱得佳字而承以花者豈誤佳為嘉與抑佳嘉本同今不然與好學者稽焉九日東籬菊三秋色自佳金英開蘂屋玉露滴花階細碧攢幽幹圓黃挂采牌白衣慙把袖青女笑留叉味泛龍山酒香盈彭澤懷今朝良燕會燦燦在髙齋宿玄妙觀書范道士榻借宿上清家松壇日影斜白歸天際鶴紅掩洞門花羽駕留雙節玄經貯五車春星排玉豆晚飯進胡麻海嶠丹砂逺函關紫氣賒相逢仙室祕為我授瑶華西山黃菴主下小尼師十四小尼齡蓮花貯雀瓶衣裁桑眼緑眉掃佛頭青禮懴蹲還立迎人進復停供盂盛苧績齋板斷葷腥身長撩幡帶聲清憎閣鈴問家心憶姓無字口傳經荒澗迷春草間房閉曙星六時山磬響愁轉化王庭曾退公貽西河詩曰東寺鐘鳴後西山月上時比來嘗失笑為誦小尼詩聞蟬雨歇驟聞蟬南園欲暮天影藏青葉裏聲出緑楊顚羣噪當殘日孤吟曳晚煙互聽疏復密接響斷還連韻促從風急音遙帶露遷長鳴繅白縵暫咽下紅泉嘒嘒勻如節調調沸欲煎侍中喧墮珥齊女嘆遺鈿隔唱頻相應餘嘶靜自延鳥銜拖唳去蟲網抱喑牽枵腹歌難繼遺形語並傳秋山悲去國空賦蟪蛄篇贈東牟王宏昌王子東牟士能吟西塞詩貧依漂母飯間過楚王祠妙技柯亭篠新書虀臼詞聨吟秋水暮把酒雪花時方國推新譽天涯似故知同來覺汝俊别去繫人思芳甸抽青草遙波泛白陂登樓才賦罷不忍贈將離河橋驛遇阿真詩晚驛聽殘瑟停船問阿真十年深巷柳一夕異鄉人櫓楫迎難定衫褠認轉親波流縈睇逺燈火照愁新石路滋紅草天河瀉紫辰雞鳴開榜去相望滿江春元日登淮隂城樓眺望同黃大世貴劉二漢中蔡二爾趾童大衍首旦招同契乘城眺逺空淮流千里逝楚服八州雄曲磴搖星閣城有魁星樓在角樓左層臺控帝宫煙花明滅裏形勝去來中萬瓦飛鱗脊諸圻錯繡叢橫欄虛隱霧髙鐸響迎風隔岸烽墩合前樓戍鼓通天連平楚白日射逺波紅繞郭回檣櫓翻雲翳雁鴻丹牀憐斗粟食邑重良弓魯地原迤北吳關宛在東升垣誰屬耳劃界笑重瞳柏酒留時令椒盤驗歲豐登臨能賦詠端的藉羣公經姑蘇作舊苑長洲路依然澤國東我來秋正好看到館娃宫梧葉經霜白蓮衣覆水紅帆開婁浦月舟趂洞庭風鶴市憐吳女臯橋想伯通經年流浪意羞向緑波中潤州橋懷古落日南徐晚秋風北固遙連岡橫繞堞溟海漲通潮鐵甕鈐三楚金陵界六朝江關吳后塹軍府晉時標謝眺吟清句桓伊弄洞簫凄其河右子俯仰潤州橋舟泛金華瀫溪界至桐江道中三年思故國二月下新都歌詠曹顔逺山川孫伯符錦沙回細浪繡嶺接平蕪地闢仙關險天標女宿孤沿洄紆短棹涕淚迸修塗七里悲遷客雙臺訪釣徒赤亭淹處少玄暢詠來無漂似縈溪縠傷如負土烏青春隨境變白日與波徂那得留江郭終當蹈海隅重由南浦達湖至貴溪途中懷徽之涵之昌其憲臣大聲大敬并山隂張五杉董三繼商大命説吳二卿楨薑十七廷梧薑大兆禎金二鏐史大在朋吕四洪烈南浦逢梅雨東行及麥秋康郎來暴漲病客下孤舟白浪粘紅岫青天挂碧流晴霞升似錦曉月墜如鈎貰酒停津館鳴鉦度戍樓前灘初上險舊地屢經愁節近懸江艾村深見海榴無家雙槳逝續命一絲留採藥迷遙澗分瓜想故侯羣傾蒲盞熱定集竹林幽河朔違光祿山隂隔子猷連年同契濶終歲愧沉浮伍相空憑弔三閭尚逺遊窮途鄰午日引領遍芳洲飲陳石麟進士名士推陳實留賓識孟公良遊追洛社好酒瀉郫筒檻外楓林白盤間柚子紅山雲歸漢北江月下巴東客思迷前澗君才簡上宫相逢饒意氣不盡玉杯中飲丘象升學士賦贈藉甚瀛臺侶欣逢楚水陽清樽開晚露甲第啓朝陽良宴同王粲豪遊過杜良西園羅廣舄東井汲寒漿伊昔金閨秀曾跨翰苑郎起家由粉署幾葉授青箱玉字傳書古珠崖使路長丹花尋翡翠紅酒醉桄榔嚴助還東越王褒稅故鄉書成前席語金散槖中裝侍寢勞三問隨行是五常名髙枚氏里宅近廣陵王幸解陳遵轄嘗披荀令香淮流千載興鐘鼓最難忘同王侯服進士歸宿下城賦贈結轡踰河水從君到黍丘村前分野醖馬上共乾餱問道經睢口看山繞宿州風號開鹿鞘霜冷借貂裘歸國勝王粲窮途惜馬周登龍酬昔願驚蟄起春愁紅甲花將坼黃枝柳暗抽懸竿逢社首迎斾見莊頭連坂家相比平橋路轉幽到門林日墜開閣晚雲留滿座來羣玉盈盤接庶羞繩牀安别檻畫燭映重樓縶客煩芻束憐豫似水流繁臺思逺吹京洛想同遊地主羈難住天長去未休臨岐繾綣意為我贈吳鈎過禹州呈史廷桂使君南渡元公裔西京國士雄分符來潁上領郡出天中騶蒞韓王國屏髙汴帝宫瞻君如岱北贈我自山東史曾令山東有所貽十載音書濶三年夢寐通遊梁追漢馬過闕效童鴻古署雲天碧平臺花樹紅客因公子重禮以孟軻隆攬舊慚秦賈匡時識禹功采山人比玉加節虎垂銅桑甸飛神爵芝圖負有熊𢎞才方入用廉吏豈終窮上秩需黃霸徵車到郭公平津饒布被且與故人同春暮飲湖西署同陳二舍人沈二徵君即席春色壓江來招擕上署臺青峰雲外出紅藥雨中開過燕回書幔繁英簇酒杯遷筵如宛洛有客擬王裴望眼鄉關暗驚心節序催相逢花滿樹不醉肯言回李大司馬生日上秩兼三事中臺重五兵文章呈象緯軍政在機衡業以山河著人從海岱生鷹揚猶北峙虎拜即南行節鉞縱橫見甌蠻次第平地看支半壁國倚作長城講幕間彌肅戎車過不驚蒼頭三舍捷赤手一天擎樞䇿煩中制徵書返上京金輿新就駕銅柱舊來銘詩列申侯頌鄉留羊祜城衣襦猶戴德草木盡知名何意楓階列仍通蔀屋情如山驚岞崿于水見滄溟仙李承家逺綏桃出洞明千秋安用祝史册正嶒嶸西河集卷一百四十九
