body:
  text: 西河集卷三十八翰林院檢討毛竒齡撰序十五東園沈庵志圓尼師抄化齋糧功德簿序東園多尼居緑塍相接其在民家好佛如洛陽女子上請却髮率連房以棲至于故家遺閥官姬貴妹往往結廬而居于其中志圓尼師中年去家代茅而編籬獨以俗姓本沈氏築名沈庵有日矣康熙辛未將勸緣于城自持化簿膜拜豫而請豫為序夫閨中耽淡淨自昔所難況以朱門華屋之子餐金拖繡乃一旦托迹于此汰其膏而毁其飾猶復以齋薪供粥經營樵粒毋乃太苦豫嘗為家太保題墓門之碑疏所自出嘆其舅氏京兆公為明熹宗朝名臣當是時稱杭州甲族以沈為最其後嗣君輩起皆相繼仕宦而第五郎君曾以舉人為蒼梧令者則尼之夫也世事之如幻也久矣數十年來其間家國之興亡城隍之圮復與夫閭閻貧富宦遊荒落凡夫盛而衰衰而盛者亦復何限夫虹生電過倐忽遷變海樓山市到眼而沫而當其盛時炙顔爦手及其衰而悲之乃以解脫之情銷其愛憎舉凡人世遭逢或欣或戚者而一舉而返之空虛所謂以六如祛六觸非乎則夫愛金錢而吝施捨猶未達也夫斯世所乏不獨金錢而閨中施豫較外人更吝乃志圓所請不欲以身之所需乞之官人而第倣長安老尼出入汾陽臨淮諸閨闥以丐所有夫人之可愛者莫如家室女子之身其所甚愛者尤莫如首髮而以家之盛若此而棄之身與髮之所甚愛若此而捨之却之由是而思天下之可愛而不可戀有如是乎況金錢已張編修文稿序乙丑之役聖天子親定十人而春秋居二其一即編修張生也暨廷對三人亦既登春秋之一而編修又復次臚句首故天子謂是科春秋佳特命掌院擇詞臣工春秋者彚注傳義而惜豫以遷葬歸也其後編修遽槖筆入起居注日講為侍從親臣漸以髙文典册稱於人然而每科舉義必有一二特出者為運會主持微聞天下遴文家往往以編修為是科公孫僑云今鄉試典解推及吾浙禮臣據例謂編修曾以康熙草七年分考會闈不當復開列天子顧所開槩置不問獨破例標編修名使主浙試是何大聖人知人之哲一至是也編修居官住編檢廳既而遷會館客座傍列土銼瓦瓿隔以蓬屏出入無􅓅轎徒行遇朝官􅓅轎過避之其同鄉大僚嘗謀合嬴錢以佐月進編修量可搘即却勿受若他部寺事座偶言及輒左右視曰吾詞臣爾敢聞是也哉其介如此天子知其文又知其人兼以南巡故稔知浙人文之盛必得是人搜羅之極公且明庶士以成是聖天子大造吾浙人以有此舉也編修文行世已久坊人復遴其要者而佐以新篇因為應其請而序之如右雞園詞序詩餘者繼詩之樂章也前此歌詩矣歌詩之法取五七字詩押其平陂髙卑而被之以律曰宫曰調此其法如歌曲然有拍有散有序有遍而第其引伸之間限于字數五字必二􅠊七字必四􅠊排而摙引伸而不能變嘗得唐人所遺五調曲就其笛色而按之以歌亦既抑揚句矩來往盡致而第以五字之故尋分覓刌猶不若孤兒婦病得以散聲而抶掉以成其曲此詞句短長所由繼五七字而起也湯君鳴友作雞園詞夫詞名填詞則以詞也然而名倚聲則又以聲也往豫與華亭蔣生搜討唐詞謂小詞者實詞所自始而或曰否夫詞以具體第曰詞則曼體不可少也夫是故花間草堂各不相掩其後迦陵陳君偏欲取南渡以後元明以前與竹垞朱君作樂府補遺諸倡和而詞體遂變若夫聲則雖萬君紅友著詞律草卷其于句讀平陂則得矣然而與律吕何當焉鳴友詞櫽唐宋自供奉以迄辛柳皆有其體嘗自言曰事至則情生意逺則品軼此為得之而至于聲吾不知其何以諷之而善也長吟之而以散以拍殊有會也被之絃鞉而度以管曼聲以逐之而抑揚句矩未嘗有拗戾于其間也迦陵紅友君鄉人也鄉人皆善詞而君復能以其詞而進之于聲如此若夫三臺紅藥集有三臺弔曼殊詞開句云是盈盈一朵芍藥詞本傷心假使為歌將必有哽咽而不能終者然豈聲病哉馮氏塤箎集豫在京時與紫燦禮部同邸居每連茵並馬輒言其家友悌諸子在南並雍好為樂而益都師相纍稱其族自畢公髙後在晉宋間南遷者多以文章孝友顯于時今錢唐馮氏是也豫謂禮部君以經學起家而一門羣從皆丁年勸祿之際斯世洮洮誰解文行乃就其恆言以質之益都師相之所稱中心慕效以為世安有古道如是者脫有之吾舍此安歸矣及豫請假還急訪馮君屺章于有斐之堂見其與弟重韓輩閨門怡懌旦夕出入忘人而悅天一似三古之于于然者而披襟示客不問合志與同術而相觀而善並以無猜之義共為心期且歉乎自退抑抑乎多自損者會國恤下頒兩浙開府闢延賔之館聘術序有學之士賦詩作頌以紀聖孝而屺章重韓與同學蘇君子傳沈君方舟李君宏載徐君紫凝輩所為胥山諸子者一時並入為西園上客抽毫撝牘中丞擁篲前長跽請教豫然後知文章行誼其生平稱許為不可誣也昔阮嵇以中原耆舊與王渾為友而既而見其子戎輒忘年而與之交世説所謂與卿談不如與阿戎談者今林下七人則戎儼在也豫締交于禮部君逺過王渾而視屺章與重韓之年則與濬沖不相及然齊契從此始矣屺章兄弟與胥山諸子共集為詩而屺章與弟不忍分行因合而輯之名塤箎集詩云伯氏吹塤仲氏吹箎言友愛也屺章之友愛則于此猶見之若夫李義山兄弟皆以文名嘗合輯其詩名李氏花萼之集則但以華詞自誇門戶其于塤箎之義何有焉陳山堂五七律詩序少時為詩惑於楚人之説詩者而同曹不平各私其邦賢始以徐渭為越君子軍不足則又張之以渭南之師曰陸遊吾越中人也久而知皆不足恃夫然後轉而為信陽為北地為初明諸家又遲之遲之而始進而為三唐蓋幾折旋于其間矣山堂為詩則不然方學四韻即能以藍田孟亭之勝縈其腕間時邑之稱工詩者二人一張子邇可一山堂邇可中年始學詩山堂以小年雖時各不同顧其為驟工則一也人有效斫者於此引繩削墨久而傷其指而工倕試操斤即已刻木為龍鸞之形有尋聲者於此析鐘律辨銖黍歌工易其器而不知而師子野生不見絙桑目不睹嶰竹而偶聞人聲即審其形之短長與色之黑白此無他其才使然也豫與邇可同為詩驚而遜之為才子暨豫赴召應昭代制科四方之士咸集轂下然所見不必皆可驚即同時為詩亦不必盡為我遜而山堂每寄詩至則移情纍日不能自已是豈豫之有私於邦賢也與張子邇可近在都豫欲以邇可山堂為吾越張而山堂方刻詩示世豫喜而序之如此或有謂山堂之詩興長而賦短者張邇可曰人不識六義漫曰賦者賦其事遂以在前所感者為興而以其時所行者為賦夫必賦其事而後為賦則叔田必當補克鄢擊鼓何以無伐鄭也若其止刻五七律詩者則以山堂為唐詩五七律者唐人之詩也城山大拙禪師語録序蕭山城山為越王保棲之地舊名越王城以山椒有牆蜿蜒如沿盂因名城山曩時為比丘所居築椽蓋茆而祠句踐于其中蓋不知幾何年矣康熙戊申冷堂老人從雪竇來相山川形勝而卓錫焉舉四遊未開六幕未布之事而偕其從人闡導于巖阿之間不數年而三塗廓然即將如來所傳僧迦金縷嬌手而付之乘門之長所稱大拙禪師者使之奉佛衣而授僧法一何謐也夫槃阿寸土不宅龍象當大師參諸方時發源天童歷棲真能仁而聆獅音于羯磨念誦殿堂回向之際師夢中聞羯磨戒回向念誦有省且復由奉川跋涉渺漫而後倚嵓扃而居則斯山狹厄亦何足以闢神天之門容泜洹千百之衆雖亭雲澗水頓非舊觀而泝所從來得毋寄迹虛空截然雲水者非與乃師以象王之尊大踞獅座獨拈拄杖者二十餘年邋女牆數仞翻之為大千之界舉凡石凹舂虀雲頭曬衲者不計晨暮然且朝參夕囑拈古證今寄喝聲捧影于管硯之間而録以示世我聞於越謀吳當夫椒之敗戢翼歸來縮長河浩氣而暫企之斗城之隂卒至吞吳震楚稱伯萬里而英雄未遇方且拾芒繩而仰以􅀈也然則城山雖小其為鍛鍊英雄與鉗錘龍象者一而已矣周春坊新簡兩浙提督學院賀屏序古惟天子得試士制科是也嗣此則試之禮部又試之門下所稱明經進士諸科隋唐以降代有沿革顧諸州解士一聽之州吏從未有專遣京朝官主試事者自明增鄉舉之科入解者毋論得當與否而先以舉人為之階因之立學養士士之入學者皆有成數于是設鄉舉主文及比年視學之使重試事也第明制鄉舉主文多遣詞臣及省曹以下惟視學一使則例以諸曹郎出行諸道與觀察相長少獨京師首善地居重而馭輕别遣南臺有才望者主之名督學侍御史惟時江南本留都與京師等他無與焉大清興司列重文學改侍御史為詞臣專行直𨽻而聖天子復厪念南浙謂江左人文夸于他省宜破例升道為院已授專敕開轅於兩臺之間會豫同年生周君主文山左升書最第一甫竣事即有視學兩浙之命夫知人則哲前賢所難況登明選公尤出司試事者之所僅有也在昔廬陵為嘉祐主文不厭士論幾不能再參御試而近且搖唇懷甓相繼成習矧山左係鄒魯材藪纍科稱得士極盛者較難為繼而君于井亭葉落之餘鎖門躑躅時出其鈞石衡量􆅕敠諸才士諸才士翕然受程一似辨響于謰嘍而收金於麩糏即受裁諸族無或仰星辰而怨蠶蟻一何盛也從來諸州入解必投業門下詳審得失而後過解之賢否以定今天子明鑒萬里書論乍升即立察勤窳坐析明眯舉一時得人之賞遲久後酬者而使之再試于有效之際吾聞百鍊之銅不憚屢照原泉在山纍綆不竭言其蓄之者裕也曩者制科之興實繫曠典然亦漢唐以後故科目耳乃君以賈傅之年應天子召試拔居髙等夫制科莫盛于唐然以昌黎之聞望纍赴不售雖既舉禮部尤以未登其科為憾至宋則東坡兄弟並登制科然而夷考當時東坡所登止三等耳子由且四之而君且裒然舉首與郤詵李郃相頡頏及天南蕩平大廷獻頌人競進詞賦君獨稡擷六經攟托其成文纂為百韻詩而集儷句于其前以為序東堂學士動容咨嗟以為僅見至其髙文典册槖筆綸閣與夫金匱石室之搜討所謂擅三長而却五難者又其餘也夫人少年入學讀當世之書原思以文章見天下暨乎稍稍自見門巷有車轍爵里之投各不相下遇偶有欿懷者揖而問字即誇以示人以為流芬餘瀋庶幾不匱而君能出其所學分廳草制巋然登著作之林且復于論秀之餘復膺是選夫兩浙本多才而君以文章宗主進之退之毋論江表顧陸山隂王謝皆令出我門下古之以學被世而復為斯世興教以大所學意在斯乎故事學使君至凡在受治分應進一言為賀因應諸君請而序之如此北山無門洞志序當豫羈丱赴臨安考解在崇禎之末爾時寓錢湖北山有所謂蕭家莊者日攜屐追趂大抵在葛嶺以西棲霞以北扳巢而貫穴初不記其企足在何地也及豫浪遊歸而四顧滌然曩時叢岡灌嶺重樓疊榭悉袒膊裸背一望而腓腓而暨乎還山則遙憶向時所歷不啻如煙雲之過眼焉菊逸大師以無門洞志見示并謁以序豫展卷嘆曰北山勝地猶有幸存焉如是者乎夫無門非他宋慧開大師字也師曾説法于龍興之山而龍隨以歸乃藏龍山間劃泉而居之以其色黃名黃龍潭且闢洞以棲身其傍因有無門洞在黃龍院中宋時禱雨者多就之相傳寶慶中以歲大災天子特開選德殿延師説法暨淳佑七年又復以旱故遣丞相就洞禱祀丞相吳潛少保孟珙偕至因賜師紫伽黎衣給以平江官田三千餘畝錫號佛眼并爵龍以侯而祠之封靈濟侯今相距五百年矣夫天下山川因革經時而變即以錢湖之勝歷唐宋元明相嬗勿替而當豫一身相距五十年即已如髙陵深谷浮雲滄海之不可復記況南朝多寺寧無灰劫而無門一山尚能恢其遺業而授之以志自非師之功不至此夫天下之思其舊而悵然感者不獨豫也其不得其舊而思藉志記以想見夫當日則又不止此一山也今入湖者有能談宋明遺事而不慨然生懷古之思者乎乃區區一山而佛眼興之香林貞吉繼之宋時帝主開其前明之卿大夫各護持其後而師以太白髙僧巋然説法復能統餘緒而從容作志以傳之無窮志不云乎香林從經行之隙得佛眼金身于沙礫之中而近年杭州禱雨則黃龍之神儼然示現蓋洞中丈八之軀與澄潭故侯未嘗亡也則雖所見有時改而又何患焉包氏族譜序族譜之設創自蘇洵其時軾與轍尚未仕也蘇氏之貴當自唐蘇味道始然而譜不之及者亦曰親盡則略爾今之為譜者異于是必賢如子騫貴如梁公則雖逺必載而如其不然即髙曾至邇猶且記志恧縮以為此何足以光吾譜者甚矣譜義之非古也包氏始自安陸代有顯者乃由南渡後上泝所自獨以合肥孝肅公為斷其相距不越十世以統以系而由合肥而山隂而蕭山則又以蕭山為近祖蓋自南渡仕甌越或分或聚而蕭山最大其相距亦不越十世而為譜者宗之蓋其世當元明間賢哲代起一時父子兄弟若松坡東臯輩皆以明經進士顯于時凡海內聞人爭先結納若所傳河東張翥金華黃潛宣州貢斯泰南陽乃賢臨川危大朴東陽王褘餘干董朝宗青田劉基上元楊融西江揭徯斯廣平程巨夫東嘉髙明不下數十輩皆當代名臣偉儒能不逺千里並過蕭山與之遊車轂所至使市橋左右廬舍皆滿噫亦盛矣夫譜貴親親由身而推祇詳所自出而上本姓生下聨族屬未嘗有聲稱官閥之見生于其間而其貴而且賢若此豫少時與即山遊拜其尊大人于堂降而與即山吕和銓平結為兄弟惟時同遊者皆海內聞人渡江造請各以古學相切磨其一時賢俊亦不讓河東張潞公金華黃文獻以下乃身遇興朝未得一試其才以黼黻盛世信乎出處顯晦之際有數存焉而即山吕和且相繼齎志迄于今墓有宿草者已三十年矣豫乞假還里值銓平修族譜成屬豫為序豫思氏族之盛莫如包氏少時登其堂景其先賢懿行往往起敬起慕徘徊勿釋而今則觸目悲哀不忍過其廬造其門巷睹見其遺文賸字況明明世乘儼然載即山吕和于其册而其忍序之然而譜也者嬗後者也今之所作後之所述也夫以豫異姓之子束髮與交垂老而不忍棄去偶一見其家之所為即感生于心況為其子若姓者睹先人遺譜而不遵之如經守之若國史非人情也譜創于即山而銓平與吕和之子續成之前二年銓平示豫譜豫不忍讀受而藏之衣箱之間既而曰豫與銓平皆垂老倘一旦不測其何以應遂出而書此銓平豫老友尚居牆東此包氏家獻也吕和之子公度善文似吕和吾見包氏之繩繩矣史村曹氏宗譜序宗譜與世族譜不同唐時岑文本令狐德芬奉詔輯天下茂族合九百二十三姓一千六百五十餘家而分之為譜凡一姓之中第取其賢而顯忠雋而有材望者著于篇而他不之及名曰世族猶史稱世家孟子所稱世臣也若宗譜則創于趙宋蘇氏但以一姓為九宗上自髙祖下逮元孫毋論仕不仕賢智愚不肖而各豫以系而其後所宗過長其所及亦過逺然且進貴絀賤右賢退不肖至有冒他族名達遙遙華胄為世取誚者則宗譜也而與唐之譜世族無以異焉曹氏為蕭山茂族少時見木上先生以第一人舉于鄉名冠兩浙嘗追陪遊宴每嘆其器宇沈湛渺然若淵泉之在望叩其鐍抒之不匱猶繭絲焉方是時有為九江司理者有為望江令者豫生也晚不及一一而見其形與其事也然而名賢輩出在曹氏一門羣從譽望藉藉如浴雅先生以詩名于時時得其片詞賸字輒規之橅之轉相傳寫以奉為祕寶迄于今郤紹之書其為法盛之所行正不少也而文虎為文豫嘗私效之而嘆為莫及夫以邑之為詩為文為書法為理學政事而皆于是家取之此其家真世家矣豫與其裔孫國學名顯宗者遊每言其家茂才名錫爵者修宗譜甚具顯宗將捐槖謀付之梓而屬豫以序豫因諦觀之簡而核精詳而有要不附混元不冒巫趙所云以族譜而兼史乘者是書有之若其泝武惠王彬者始之也繼越州判官追其所自來也又繼而判官之子丞則自越而蕭所云占籍于桃源之下鄧村者是也而于是以學諭承之則以遷史村自學諭始也史村者今曹氏居里名也西河集卷三十八
