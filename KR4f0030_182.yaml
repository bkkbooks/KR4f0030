body:
  text: 西河集卷一百八十二翰林院檢討毛竒齡撰七言律詩九集劉選郎始恢新宅同李中允鎧丘檢討象隨李侍講澄中黃徴士虞稷即席永夜間堂對曲巵蕭疏院落喜初移談深不覺圍罏暖炙美翻嫌下筯遲透壁暗風搖短燭開簾積雪滿高枝醉來靜聽官街鼓猶似閻園酒散時曾客淮陰赴選郎閻園之集見七古卷題石城蔣生西郊泛雪卷子和原倡寒字同雲初度石城端載酒城西興未闌幾點雁鴻塗去白一船風雪載來寒平臺舊友工詞賦斷岸何人把釣竿我亦剡川回棹者今來同作畫圖看田將軍遷撫軍中軍高牙飛隼接雙旟橫海樓船總不如草檄未投几上筆登城還却箭頭書分營舊將調金勒開府新銜下玉除此際東南饒羽檄漢庭方召李輕車二水犀戈甲滿錢唐尚有中丞新拜黃嚴助儘教開粵徼田家原自鎮河陽三推幕府中權貴萬里戈船下瀨長在昔請纓同有志相逢執策敢相忘德州渡河和徐仲山韻曉發平原雞未號平明渡馬德州壕天銜白氣東開早水接黃河北去高霧裏旌竿搖客騎風前鉦鼓動官艚當年戎馬經臨地欲勒遺聞惜佩刀二客館分燈瀉碧波遙看屋角墜星河關長草短知秋盡水急風高奈渡何酤酒驛邊留訊晚題詩馬上寄懷多嚴城晝閉烽臺熄愁見平船載駱駝宿繆氏園同薑京兆作因瞻通德過金閶暫憩雙泉舊草堂地勝謝安江上墅人來裴令午橋莊畫廊山半回花塢紅岫煙深接野塘夜靜市門堪貰酒不教明月負清觴送使之大梁花幕初開藕葉紅離亭貰酒近新豐征車曉度燕南路使斾時回宋故宮越境有人迎郭伋同時入蜀想文翁時蜀新開有同被使命者夷門千古堪憑吊只在繁臺一望中白下遇吳山濤明府見贈有答江城十月早梅開把臂同登江上臺落日烏裘寒未徹清秋黃葉下堪哀西州路下停鞭過東冶亭前看劍回十載追陪題和晚登臨須借大夫才二長干精舍倚山屏邂逅重逢舊典刑望去石頭餘逝水坐當木末最高亭劇嫌客路回冬景須信郎官是嵗星白下相從應盡醉暮鴉啼處不堪聽答喬侍讀同年贈别原韻有感齊門操瑟總難工誰復相要到上宮史賾未經窺五志官淹從此笑三同懷人望逐煙波起羡爾名埀奏記中侍讀以河患奏對著名幾欲還鄉難遽别長帆不敢挂相風二舊院疏籬待手編乞身書上賜幡前不疑同舍脂車日竟及東宮出閣年時三月讀皇太子出閣書江令賦情饒緑水王維别業在藍田致身通顯尋常事切莫窮愁擬問天贈余生高秋官舍井桐陰把袂逢君愜素心千里客遊真意氣十年宦迹已浮沉湘中種黍還收玉門下搜材愧㨂金生廷試係豫閲卷舊例貢士試門下省當日北山同臥者緣牆石笋看成林寄江南觀察金君登車攬轡久澄清觀察江南舊有名開幕不離芳樂苑全家只在石頭城簾邊海氣穿雲起樹裏江潮拂岸生只為聖朝刑措近故教召伯早持衡馮相公師歸後蒙寄詩問訊奉和來韻每從朝罷聽鳴鞭長頌康熙相國賢一自日星回海岱頓令桃李失芳妍鴻飛未敢邀公覯蚿細何堪受目憐但訪東山黃綺去莫教人誦採芝篇二愛慕人皆願執鞭况逢致政是韋賢北山猿鶴看無恙東洞薔薇開自妍太傅金為留客計右丞詩重想夫憐誰知冶水漁舟發便寄湘中欵乃篇公時住冶湖來詩有裁將欵乃答鴻篇之句姚監郡沈考功同過草堂有贈賦答黃公壚下酒初紅拾得溪魚在釣筒方外謝生真曠達座間裴楷總清通因尋高會乘良日每度玄言見緒風異地相逢殊不昜莫教轉眼嘆秋蓬集宗藩博公恭壽堂同徐翰林王博士即席掖門高啓日華居迢遞春風到綺踈素蓋幸隨公子宴朱函親授獻王書簾間五木燒金鼎庭下雙槐映玊除抽牘自憐陪乘晚敢言詞賦比應徐奉謁陳中丞邸第有作橫江開幕擁霜鐔鑒物常如海鏡涵千里河山歸帶礪幾年烽火靖東南回看闕下翔威鳯暫借平泉解素驂聖主自能勤拊髀不勞風雨發金函二杖節巖邦賜錦貂河東兵革已全消陳蕃何幸推寒士孔闓深慚薦聖朝探簡雲封神禹穴開轅晴射浙江潮東山終慰蒼生望黍谷盤龍未可招御試畢答楊吏部見詢時豫方病臂未愈詔䇿羣才集體仁御試時賜宴體仁閣下共稱聖主得賢臣殿前已幸瞻天日腕下其如有鬼神對就強顔隨谷永詩成脫手遜王筠試思左臂書空者可是東堂折桂人奉别梁司馬夫子敬和所贈原韻只合南山詠敝廬十年空復侍宸居難忘柳下重開煆但立蕉林為受書師所居名蕉林書屋鎩羽每慙東觀鶴歸心如趂北溟魚春風一路吹行棹尚有檣雲轉覆豫二緑水初開白鱧舟主恩師誼總難酬登朝誰似韓忠彥故里難尋馬少遊文以漫成嘗受侮宦當拙退最為優獨憐衛尉方還洛早有青娥泣墮樓時曼殊已亡師詩有半載哀蟬中夜泪之句故及之盧中丞太夫人壽北堂萱樹映霞裾斗轉蒼龍絓綵輿瑤海賦成天上曲金函時啓帳中書羮遺賜食觀浮鯉舞進朝衫散佩魚自是母儀堪範世何須氏族問崔盧依韻和龎雪崖年兄送别集賢院後肯重過欲别燕關且放歌執戟不須隨曼倩埀綸好去問詹何晴攀柳色分衣碧醉看桃花映靣酡此去相思何處是鑑湖春盡水微波答張公子永嶽見贈原韻時新膺監簿之選幾度乘槎到海邊羡君神似藐姑仙探書不出三江水對酒剛逢二月天京邑有懷同謝監郎官初起繼韋賢春來貽我新詩好倣佛梅花隴上傳二澄江千頃滬城邊才與同舟便是仙驚道雄文能蓋世誰知張姓本連天四門書在堪供職九嘆篇中為惜賢取次黃花開帝里看君早晚好乘傳重過上海縣署寄徐西崖即用其所詒來韻為憶高陽舊酒徒重來清興未全孤蛟龍日出橫滄海橘柚煙深過太湖官舍彈琴依子賤人間著論有潛夫望中咫尺衡門近尚未相尋到荻蘆簡青浦錢徴士清秋烏鵲噪東陵上國賢書喜四徴江國文章推薛浦湘靈詩句重吳興殿前應詔誰堪擅車下追鋒我未能當日高軒相過後懷君時望海雲蒸馮紫燦新遷禮部賜席成均舊所聞百年秩敘喜推君祠曹賴有劉原父學行誰如馮仲文人入冰廳衣共潔花開春署坐來芬聖朝方議東封禮勒石應看海上雲贈吳二明府芙蓉初發映秋波喜見堯山一鶴過駿馬空臺行處近龍門佳士集來多賜書原欲徴韋抗製錦從教勝尹何遮莫干言時出宿帝城風月豈蹉跎寄答吳江朱鶴齡原韻時方箋詩謬附豫詩説并謝寒風客舍暗燈檠咫尺難通兩地情吳下未能隨市卒洛中空復會耆英書來西塞看留字家近東甌苦用兵何幸傳經千載後説詩還得附匡衡桐城方孝亷過集草堂值大霪雨即席和韻髙車衝雨過茅堂不數方疇在弋陽柳葉漸長遮曲巷榴花初發間清觴盤中射覆狂能識海內論交老漸忘謝汝遠來江漲後相看宛在水中央送高生佑釲南還并遊會稽和曹侍郎韻寶鞭不用飾珊瑚去路經秋入畫圖子偉遨遊真漫衍相如車服自間都銅溪鑄劍看離合石匱藏書問有無五載風塵京洛士但將洗滌付樵夫二桑乾歸渡一車遙客舍重門盡緯蕭機息可曾逢抱甕談深不必傍參寥南過建業浮金瀨東去天台渡石橋前路逢迎知不減羡君意氣本干霄集河樓同吳陳琰暨門下傅生即席佳客相逢解苧袍間堂深燭醉葡萄樓頭鼓瑟風俱遠座上聞歌興自豪入夜酒銜花氣淺臨流水映竹窗高深慙十載京華客重見樽前散彩毫原韻答方敦四孝亷見贈二首天涯相隔兩茫茫幸過城東舊草堂高論自揮王子麈無錢空負阮生囊交遊到處偕三俊兄弟于今過二方其難兄為婁江吏部邵村學士但惜相逢春漸老風前柳絮正猖狂二一望江關思渺茫何期相遇賦堂堂陸機真足稱才海朝錯誰知是智囊坐對曠懷能遠俗學成修士本通方多君道我狂如舊却愧清狂未是狂讀方敦四詩集再用前韻題贈細雨春江接冥茫間尋花落到蓮堂時寓江寺漫言得句分銅鉢真見投詩入錦囊散去碧雲回上下高飛黃鵠辨圜方謫仙號爾知非妄狂客原來不是狂賀知章稱李白為謫仙自號狂客賦得陶然共醉菊花杯東堂高會集朱輪籬下風光入座新慢向筵前羅鼎鼐偶從花裏見經綸歌臺響合元臣舄燭樹光分上客茵欲把黃金間泛酒天街已有醉歸人賜魚恭紀和高陽寶坻益覩三相公三首龍池千頃接天淵暫敕司漁獻罟筌自是聖恩能逮物敢言治國類烹鮮牽絲露滴盈車美下箸香分疊縠妍願向鱨鯊歌式燕多公早著衮衣篇右高陽韻二嘉魚自昔詠依蒲何幸皇恩下九郛溉釡定能懷北闕釣牀無復問東湖銀絲鱠就需良燕玉詔頒來豈細娛猶是青䰇與紅鬛相看俱道錦鱗殊右寶坻韻三水殿風生藕葉舒虞官宣敇賜王餘依然在藻歌豐芑不用橫汾羡泰初味美勝傳公子犗恩深敢却相公魚舊時彈鋏懷歸客也向金門謝起居右益都韻方編修典試四川七盤再見五丁開便識文星益部來程品自髙麟鳯目名都豈乏馬楊才夔門賦逐巫雲轉劍外文從巴字回不信十年榛莾後秋花錦里一時裁侍班口號蒼龍初轉震垣東紫極晨開引上公趨走班隨三殿後傳呼聲出百花中黃鐘遞奏聞天樂紫氣千重繞聖躬日侍甘泉曽未頌敢將詞賦比雕蟲祝友人初度間居十載誦黃庭曾向天門舞鳯翎海外神山千仞碧階前兒竹萬條青觴銜若下花如組盤進安期棗似瓶欲掣海鼇何處寄釣臺高築在東溟嚴都諌假還有贈十載風流東省郎聽鶯暫許沐滄浪明湖水漲浮丹檻深院花飛點皂囊門下近多新薦達函開猶有舊封章天池萬頃蓬瀛水親見丹山翥鳯凰時長公新就館選飲李觀察署亭賦謝和韻灔瀲春江覆楚蓀雨餘官舍靜開樽方慚老作平原客何幸狂登司𨽻門趙北歌繁來鼓瑟淮南賦在好扶輪亭前但覺春風發便有花開江上村雪後閶門舟集同周掌科吳太守陳學士薑京兆呂四洪烈即席武丘東上雪初晴載酒還過閶闔城棹起日從雲際豁窗寒風向水邊生望中山作瑶林色座上人傳兔苑名歲暮他鄉臨眺晚幾回繫楫倍含情擬館課四首豫以制科上卷比之一甲即授館職不隨庶吉士教習兼課館業偶集閣學李夫子宅命豫與令嗣庶常世兄立賦四題即席起草追刻燭遺事筆不加點愧世兄詩先成豫勉強卒業亦付録事且謬蒙鑒賞嗟乎駑馬隨良驥敢言利鈍哉特感深難忘不敢刪軼并志此以紀勝會云朝賀有序南面而臨詠萬國朝正之句東方將啓聽三階呼蹕之聲瑞闕集鵷鸞班就六蕃位次聖人衣藻火捧來五色雲中但瞻日馭之多輝願識天顔之有喜望樺煙而進拜環珮聲聞當爐氣之回飄衣冠身惹欲製朝元之引應賡入覲之章初聞閶闔奏靈璈建禮門通雞未號簾外兩行排御仗雲中九列盡仙曹龍文乍啓衣冠合雉尾橫遮星漢高無數珮環相接武有誰堪繼鳯池毛召見有序夫雲開睿幄禮重朝瞻日近天顔恩深陛見故唐主有含元之對漢家傳宣室之文况堯階四子揚言松棟之間夏后兩龍拜手璿臺之下集羣賢于蓬觀選吉士于蘭臺光華將啓旦宏開東壁圖書旃毳已含英堪作北門趨走欲承金馬門邊之詔當題玉皇案下之詩未經給筆敢道三長願效賡歌敬陳四韻九陌含薰曉陛清欣逢綵仗簇延英受書不敢同張説前席何當召賈生金掌露埀瑶殿迥玉罏煙繞御階平聖明多少求賢意欲獻凌雲愧未成扈從有序神堯遊洛嘗聞四子相從漢帝之回不藉六軍維衛九功成而幸慶善父老歡迎四海定而歌大風兒童起舞况卷阿有召公之誦而蒲津傳宋璟之詩巡行回岱嶽自有嘉謨扈從至甘泉能無獻賦濯龍西去杏園東羽衛旌旗映碧空秦地山河踰徼外漢家鐃吹度回中三關雲繞軒營白五畤花連帳殿紅祗愧甘泉叨侍從並無詞賦獻揚雄宴饗有序東觀招賢雲陛有搴珠之瑞西園啓宴仙厨分饌玊之光在聖皇以雨膏下逮為歡斯羣臣懷湛露不晞之德况庭陳百樂龍子銜觴聖壽千年天星奉酒駕楊舟之在鎬咏蘭秀以橫汾篚筐咸錫欣承綵芾文章瓜果同頒愧乏赤心投報總醉飽懷式金之度庶鹽梅以負鼎為功大官能設食不可無詩古樂有回波因之作頌芙蓉雙闕傍雲開淑氣新從籞宿回金殿曉陳三壽咏瑶池春上萬年杯酒漿捧出天星釀龍鳯炮成鼎鼐才藜藿久銜曾未厭當軒何必誦臺萊子請假南還時舟遇胡循齋少參赴都對江而泊以病不晤蒙惠示詩集相憶有年頃過明湖會于顧侍御莊復蒙見贈和答江字南行兩漿泊春江正值樓船駕繡幢風急不聞舵下鼓日髙猶閉水邊窗回思舊事逾三載每讀新詩對一缸西子湖邊侍御宅逢君恰在石華矼二頻瞻列宿倚天杠似此才名未昜降鳯闕書嘗聨陛進龍文鼎豈異人扛鄉遊私喜當同澤舟泊難忘在隔江獨耻聖朝真病廢時豫以病轉假十年燕市笑尋橦西河集卷一百八十二
