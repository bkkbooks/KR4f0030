body:
  text: 西河集巻一百二十翰林院檢討毛竒齡撰折客辨學文客有作讀傳習録辨者刻其書四巻装潢示予予謝之曰予不能讀也子言語株離無主客無首末無針黹綿絡指不能達心而學復䝉眯如入大霧中惽惽莽莽但自作已説其于所辨之人之理豪釐不接且時時以一已之腹強坐君子此固無容置喙者然聖賢大學豈可冺也姑記其平日往復與予所質難者數條即名之曰折客辨學文葢以不辨辨而辨亦得焉世之好學者幸鑒之嘗在錢唐倉吳氏宅飲次客縱論囂嘂不已予曰徐之子苐提一主語使我可解曰知行不偏廢纔説致良知則便無行一邊了予曰此非陽明之言孟子之言也孟子曰人之所不學而能者其良能也所不慮而知者其良知也良知有良能何謂無行曰正惟良知有良能而專言良知可乎曰然則子不讀孟子矣孟子又曰孩提之童無不知愛其親也及其長也無不知敬其兄也孟子何甞言良能乎孟子不言能而能在其中何也知愛敬知也愛敬即能也陽明不言能而能在其中何也良知知也致良知即能也然則陽明之言孟子之言矣予甞謂致良知三字聖學首功祗不宜為大學致知作解註耳大學格物者格其物有本末之物致知者致其知所先後之知此在宋儒元中子已明明言之陽明但以生平所得力認作首功此如春秋賦采蘩意在薦享而聞者認作大國恤小之義各言所得非訓詁也此皆不足為言者病也丙子秋在清和坊飲次客忽作心性事物之辨時平湖陸義山在坐顧而問予予曰予充耳久矣無已試再理前説可乎曰君臣父子物也以孝以忠事也陽明答顧東橋書云事父不成在父上求只在事父之心上求事君不成在君上求只在事君之心上求殊不知事父明有個父在明明有個事父之事在事君明有個君在明明有個事君之事在若教人在心上求則舎事事物物將這心求在何處曰此但知主説而全不知有客説者也夫陽明何嘗謂無事物但有心乎事父不在父上求非無父也只在事父之心上求謂只以此事父之事求之于心非舎事父之事而但求心也客明明曰事父之心而主但曰心可乎且心不能在事物上求也陽明謂事物在心上求則有事物而子必謂心當在事物上求則不惟無心并無事物何則心能有事物事物不能有心也請觀之天夫天一物也四時錯行日月代明者物之事也然而目不見碧落耳不辨氣候日星不知何所綴風雷不識何所發其物與其事幾乎㝠絶然而即心求之而千嵗日至可坐而致向使必求之事物則夸父逐日有渇死已耳故閉門造車不見九道也而動合軌轍陋巷簞瓢未甞服周冕乘殷輅也但其心不違而用即可行若謂事父必在父上求事君必在君上求則此心未通而天倫已絶何則人不能皆事君也向亦謂君在心上求故人人有君今必在君上求則君門九重求在何處即子亦曾上公車受職然並不曽立君朝踐君陛任君事也事君之心不可求而求之事君之物與事君之事則又皆非子所有是即子一身而君臣大倫早已廢絶尚何暇嘵嘵講事物乎甞讀徐仲山傳是齋日記其中作事物心性之辨有云紫陽説知行俱向外求故知則格物行則求事物未免馳騖向外若與聖賢存心知性之學有所不合所以陽明以事物在心上求對照挽之然俗儒猶嘵嘵者以為反求心性即禪學也吾謂陽明多事尚周旋俗學故有事物在心性上求一語孔孟即不然孔孟絶去事物專求心性大學不云乎心不在焉視而不見聽而不聞食而不知其味心逐事物便是不在故聖賢為學專求此心孔子曰操則存非操此心乎舎則亡非言此心不可舎乎孟子曰求放心則惟恐其舎之而專求此已舎之心此一聖一賢斬斬截截千秋萬世又誰敢以禪學非之惟性亦然中庸不睹不聞此中並無事物也孟子平旦之好惡此中並無事物可參求也故大學言心祗曰慎獨中庸言性亦祗曰慎獨獨者獨也謂一物不交一事不接獨有此而無有他也慎者謂即此而加之功也然則聖賢之為學其專求心性必不容有一毫事物參擾其間亦已明矣徃者施愚山作湖西道時講學于廬陵書院楚人楊恥庵與其徒來正作事物心性之辨恥庵咨嗟曰事物在心上求則有心有事物萬物皆備即反身而已得之孟子之言也若在事物上求則天下事物必不能求而此心已先失矣千文曰逐物意移此在兒竪能誦之况學人乎時聞者嘈嘈而起目之為姚江之學且有昌言孔顔學徒定無心上求事物者愚山亦不省唯唯而别次日愚山自言曰講學甚難只一顔子不遷怒必不能到昨㑹中多人盤飱闕具吾已取官庖責之今晨治魚不去乙吾又取責則未免遷怒矣且昨所責者誤公也今以口腹而責人公私謂何如此者將何以治之恥庵曰治之以心而已衆方愕然恥庵復徐徐舉手肅四坐云如此者請列坐各道一言可能在事物上求乎四坐數百人皆俯首無一言耳可察蠮螉半晌愚山幡然折膝曰先生言是也吾講學二十年憒憒久矣今知所歸矣時廬陵學徒有羅姓者自言先輩有從姚江舊講㑹中學得歌法請試之乃歌孟子牛山之木篇衆皆悚然歌者亦慷慨悲哀涕泗被面歌畢衆各起揖謝乃罷然則儒者求心有必不能在事物上求者如此或疑心在事物上求他無可見然夫子與仲弓言仁曰出門使民則曷甞僅求之心不知此正求心之極功也向謂周子主靜尚非聖學以但求之靜邊耳聖人靜固求心動亦求心無時無刻而不求此心所謂無終食之間造次必是顛沛必是况出門使民乎是以出門不在門上求曰如見大賔則并不在賔上求何也以並無賔也心也使民不在民上求曰如承大祭則並不在祭上求何也如祭非祭也心也夫出門自有事物况使民則更有使民之事與使民之物于此而不求事物則無處求事物矣立與在輿亦然世幾見事物之來可以影嚮倐忽一如飄風之當前鬼倀之掩至者乃曰參前曰倚衡此則非事物之求而心之求矣曰惟心之求豈不是佛曰聖與佛不同而人則同人與人不同而此心則同此非佛法入中國而後裁生此心亦非佛法入中國而後裁言此心求此心也正心盡性大中言之存心養性孟子言之今以佛家有明心見性之説遂使聖賢正心盡性存心養性之正學反不敢道裁言心性便類佛氏坐使上天所生吾身所有千聖千賢所共講共求之心性而一旦委而歸之佛氏可乎夫佛氏不患其相類也人之不類于佛氏者何限自此心性而外即此身已自不類而况由身而家而國而天下而萬物有何一可相類者吾儒求心有體有用佛氏求心有體無用其體同其用不同也吾儒求心有功有效佛氏求心有功無效其功同其效不同也今陽明以有體有用有功有效之學專求之心毋論陽明所求之學與佛不類即使有類于心而由身而家而國而天下而萬物全體大用𢎞功極效仍與佛氏毫不相類則即此求心其亦吾儒之心聖人之心矣况佛家求心單拈句子原是空求陽明求心存理去欲實是誠意即其體其功亦原有截然不同者乎張南士甞曰吾儒用心不同于釋然而同此心人與蟲獸則絶無一同者然而虎狼父子蜂蟻君臣其心亦尚有偶相類處今舍物求心惟恐類禪學而棄而勿求則君臣父子將必恐其類蟲獸而盡棄之是蟲獸不若也客曰陽明致知是個做不得的但言以之事父自然大孝以之事君自然大忠以之應萬事萬物無不中節其效驗廣大如此便把聖人教人學問思辨勉強積成的工夫一切埽盡且自説此㫖埋没了數百年不知未埋没之先那一個聖人賢人曽説過曽做過無論見效不見效請陽明説出來好做個榜樣那知是斷斷没有的是斷斷做不得的曰如此則喪心病狂極矣夫知貴乎行儒者空講理學有知無行陽明真有知有行者事君則忠事父則孝臨事接物無不汎應而曲當如此做不得則將誰做得乎且陽明未嘗言致知是生知必迸去學問思辨勉強積漸工夫而獨致此一知也子徒以一已之腹強坐君子固已竒矣且知之有行以行此事物也求心在事物謂當求此心于事物之間也今陽明力行已有明效陽明于事物又得大驗而反謂無論見效不見效千古聖賢無此榜樣詰使陽明自説則假使陽明自説必曰堯舜周孔其榜樣也使吾輩代陽明説必曰陽明即榜樣也萬一陽明使詰者自説恐肺腸面目大有不堪為榜樣者况近世攻陽明全屬門戸子欲傍其門戸彼門戸多人未必肯受且至尊大聖最惡門戸視䕃之年何苦為此若謂陽明逼拶門弟子苦苦勸人將聖賢大路從此阻絶故欲以此救之則又杞人之憂矣予嘗作土司傳方陽明在龍塲時土司安貴榮暴横無禮自恃從征功欲并諸官驛作土司地陽明貽一書示之彼即歸罪恐後夫陽明何嘗苦勸人而所至嚮化此即躬行有效之一証矣嘗見貴鄉道學有在敝郡開講肆者適敝邑有道學門徒兄弟爭繼其人立作數千言判之隂陽反覆實不知其中有私與否乃自此判出而兄弟各執反挑釁成隟兩相搆訟以至于死然則勸人之效誰得誰失聖賢大路誰通誰塞請平心易氣為一省之客又曰陽明有存理去欲之説不知欲是去不得的耳目口體與生俱來無去之理也書曰惟天生民有欲記曰感物而動性之欲也此豈可去乎若作虛字説欲仁得仁是好一邊生亦我所欲是不好一邊然未有説去欲者惟佛家以六欲為六賊不可不去儒者無是也曰存天理去人欲此舊儒甞談未甞始陽明也子苐拾書記一語謂欲不可去而于書記之全文仍未甞讀書曰惟天生民有欲不又曰無主乃亂乎記曰感于物而動性之欲也不又曰滅天理而窮人欲此大亂之道乎夫使無主以乂欲則必亂不窮天理而滅人欲則必大亂此正言欲所必去而子盡反之此非書記語也夫欲者惡之别名也存理去欲猶言為善去惡也惡可不去乎即朱子亦云好善惡惡皆務决去而求必得之故易曰閑邪存誠干寳謂去其隂非也論語曰克已復禮朱子謂克去已私也葢邪惡與私無論所生非所生而必有以去之克已私則克在私而不在已去人欲則去在欲而不在人此皆于身與已並無礙者若謂耳目口體即是欲去欲即是去耳目口體則朱子謂己是身之私欲得毋克己是克身乎且欲不可在去留之間也學者用功貴在斬截吾儒言理最忌鶻突左捶而右挪則百事骫裂既謂之欲則斷無在去不去之間者夫好善不用惡惡不去郭所以亡况在用功之際乎上蔡張仲誠讀蔡沈尚書註有道心嘗為之主而人心聽命焉語嘆曰此害道語也既曰人心人欲也欲可聽命乎推蔡沈之意必謂欲即心心不可去耳昔者孟子三見齊王而不言事門人疑之孟子曰我將攻其邪心朱子孟子註亦引此夫心尚可攻豈不可去有賊于此律當迸逐乃不幸而引經折獄者曰此民賊也不通者遂爭之曰然則此賊不可去何也以賊是民也則將逐賊乎抑留民乎引經之不通何以異是克伐怨欲不行焉不行欲即是去欲未有禁絶之而尚留中者朱註猶曰克去己私則私欲不留而天理之本然得矣若但制而不行則是未有拔去病根之意而令其潛藏隠伏于胸中也豈克己求仁之謂哉則是去欲之説起於朱子欲尊朱斥王而不識所尊為何等子欲附朱子朱子不屑也且儒佛不同然不礙有同者以佛有六欲而不言欲則佛有六道可不言道矣且佛祗薙髮猶尚有耳目口鼻子何不戳鼻滅口以自異于佛嘵嘵何為客又曰知行兩事並無説合一者經書所説無一不以知行分作兩件如言之不出恥躬不逮其言不怍為之也難之類于知處説得緩于行處更説得急從未有能知自然能行不行只是不知的説話惟佛家教外别傳纔有此等言語予曰子欲辨知行合一歴引言行相對者言之則以言屬知以為屬行此是書理未通之故不足辨也只知行合一四字予前已明言之矣孟子曰孩提之童無不知愛其親也孩提知愛親無所謂行也然而行矣且孩提只愛親無所謂知也然而知矣故孟子前説知能此只説知以知能合一也此其義紫陽亦言之紫陽註中庸曰由不明故不行此非不行只是不知乎又曰顔子惟真知之故能擇能守如此非能知自然能行乎然則陽明此言即紫陽之言而子妄謂教外别傳何與往在史館時同官尤悔庵􅍐題得王文成傳總裁惡傳中多講學語駁令刪去同官張武承遂希意極詆陽明予曰何言之曰知行合一聖人之學乎予曰知行合一有二説皆紫陽之言然紫陽不自踐其言而文成踐之其一説即予前所言者是也其又一説謂知是理必行是理知是事必行是事此即紫陽註中庸所云知所以知此也仁所以體此也知在此行即在此凡所知所行當在一處亦謂之合一乃其註大學于格物則所知在物于誠意則所行又在意在物少一行而在意少一知何也有人于此曰吾格禮節文登降所當習也吾格樂鐘鼔考擊所當事也知禮樂當行禮樂乃曰吾知在禮樂而所行在意可乎且知禮樂只知禮樂乃曰吾已知禮樂而凡吾心之所行更不必再知可乎是此知非此行此行非此知一知一行斷港絶流矣此非合一之病不合一之病也此非陽明之言不合紫陽紫陽之言不自合也武承大怒愬之總裁歸即作訐陽明一書將進之乃連具三劄一曰孝宗非令主二曰東林非君子三曰陽明非道學三劄齊進同館官並起而譁之㑹徐健庵庶子方入都總裁咨之健庵大驚曰陽明已耳孝宗東林豈可令史館是非顛倒至此儻在明代京朝内外共得以逐之矣總裁遽毁劄而罷其後武承不甘復與湯潛庵侍讀爭辨格物上書潛庵潛庵但致書于予竟不之答而武承已死既而文成一傳館中紛紛有言宜道學者有言宜儒林者有言宜勲臣者總裁斷曰勲臣而已又曰前史無道學傳惟宋有之今何必然請無立道學名但立儒林而屏陽明之徒于其中何如衆皆唯唯獨予不謂然然而不能挽也總裁嘗召予曰聞子説知行右陽明而左紫陽有之乎曰無之從來論文成者皆謂其不合紫陽而予獨曰否請試言之鄭端簡作今言云人但知陽明大學不合紫陽然平情以觀恐不可便以宋儒改本為是以漢儒舊本為非王弇州題正學元勲巻云陽明直指心訣以上合周程之説所未合者朱子耳嘉靖中曽以新建從祀策山西鄉試其議有云朱子訓詁章句為不失聖人之統而已未必盡得聖人之心新建致良知簡切痛快實有接乎孟子性善之説即其他訓詁章句小不盡合朱子耳非不盡合聖人也萬厯十二年詔申時行等定論新建從祀時行上言守仁致知出大學良知本孟子未甞禪也或者謂崇守仁則廢朱子不知道固有互相發者且朱與陸並祀矣朱學不聞以陸廢今獨以王廢乎時神廟得疏嘆曰皇祖甞稱王守仁有用道學國家能得一有用道學雖不合宋儒其又何疑時有議進王端毅者曰今人疑文成而去端毅為其專事功也夫孔子不薄事功何也孔子轍環天下厯七十二君而不遇退而刪述六經然猶曰我欲托之空言不若見之行事之深切著明也然則舊儒論王學皆謂與朱學不合而獨予則倡之曰知行合一實朱子言之而王子述之且朱子不自踐其言而王子踐之是右朱學者莫如予而反曰左之何也總裁推案起曰此事非吾輩所能定也他日總裁諸儒臣于内廷供奉之次間論諸儒學術同異皇上諭之曰守仁之學過高有之未甞于諸儒有異同也衆皆俯首頌揚而退葢至是而文成之學有定論矣予嘗觀天童僧北遊語録載世祖皇帝稱守仁之學有似孟子初不信其書今皇言大哉昭昭如此然則知行合一其幸為厯代帝王所許可豈易事乎先仲氏甞云天下論理論學皆不可有為而發當時攻陽明不知何意總裁諸大臣皆抱虛公並無所為今則頓成時局矣往讀鄭端簡集謂宸濠之變江彬許泰張忠輩既恥大功為文成所先必肆加羅織而忌功之徒又附和之反謂文成通濠功成詭遇當濠反時予年二十一應試杭州見諸路羽書皆不敢指名濠反或稱兵變或稱冦起或稱南昌告警或稱江西巡撫被害並不及濠一字何則恐事成後受族滅也及文成檄至直曰寧王反當是時文成直以全家生命授之濠矣小人有所為倡為邪説何足惑衆王弇州史料亦云正徳實録翦抑文成功不遺餘力雖今已暴白然未有摘發當時史官握筆之心事者葢實録之始為總裁者楊文忠廷和繼之者費文憲宏而以副總裁專任者董文簡玘也楊公與王恭襄瓊有郄恭襄雖隂譎然能識文成而獨任之在南贑時假提督軍務之權便宜撫𠞰以故前後平賊及平濠之疏皆歸功兵部一字不及内閣楊公切齒久矣費文憲久與濠忤文成平濠後未甞薦及費亦恨之董最名忮毒于鄉里如王鑑之輩盡力巧詆又内忌文成之功而外欲以媚楊費作此誣史將誰欺乎後文成之天定復爵贈諡而董受不根之謗至徹聖聽未必非鬼責也觀此則陽明當時議論未定亦尚有名儒大臣洞心剔骨推見隠慝使讒邪之徒無所容蔽如此况近代陋學肺肝如見稍有所為即十目十手未有不知所自者嗟乎可不慎與當時策議文成者曰新建膺閫外之寄建百世之績而嬰權幸牙角爪距之鋒柄在悍帥則悍帥攩㧙之柄在中貴則中貴揶揄之柄在輔相則輔相媒孽之皆極言受侮羣小之事並無一正人起為難者若同時誦揚則在朝在外比比而是皆屬君子予嘗略記明代實録其薦從祀者一則尚書舒化左都趙錦侍郎倪光薦右通政陳瓚大理寺卿曽同亨少卿何源諭徳呉中行都給事中齊世臣御史俞文煒龔一清陳遇文再則侍郎周子義洗馬陳于陛三則大理寺丞羅應鶴四則給事中顧問其他萬厯年詔議諸臣不可記數至若道學統宗則自餘干新㑹而後凡海門周氏浮峰張氏諸學者俱以新建直接周程之統即崇禎末東林學長如念臺劉公所在講學立聖學統譜以周程張朱王五子相禪但録朱子晩年定論于譜中以示合一即國朝學儒如容城孫鍾元上蔡張沭輩纂聖學宗傳道一録諸書其説亦然然則王學之在天壤昭昭如此况道學是非已定之至尊聖鑒之中涇渭秩然譌言雖多不足摇惑吾願子之且休也康熈丁丑閏月録西河集巻一百二十
