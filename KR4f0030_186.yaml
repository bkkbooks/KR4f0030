body:
  text: 西河集巻一百八十六翰林院檢討毛竒齡撰五言格詩二别伯兄五首孤鳥辭宿柯離獸馳舊林驚心見曲木走險不擇隂判茲同生子惻愴誰為心如何彼蒼天使我遘難深遘難未云極三載慰遐慕如何復離分悠悠即長路遊子多苦心况復値秋暮絺衣薄寒颸葛屨踐涼露揮手自茲訣一步三反顧反顧不可行囘身復牽衣慈殯未旋壙嚴車復停幃門户値中落各鮮庭樹枝連岡隔秋照影亡形亦疑暫竚覯形影及此將頺曦頺曦將右匿流影眷左疆孤雁雖西飛其音在東湘君子重去土豈不懷舊鄉形隔不得旋魂魄思茫茫生當從兄游周我門東塲死願為飛鳩鳴此道上桑桑梓在道上猶然起繾綣析柯解連枝豈不極哀戀念兄富文府弟亦擅華絢三珠秀稽林雙龍起江甸兄既辭司秋仁人不為讞兄已除理刑推官棄去弟復遭百罹中年起更變天高殫難呼道逺死誰見叠浪阻潮汐重山蔽鄉縣茹蘗苦自聆詎敢告親串兄年已傷哀無為乆勞眷努力紹前期揮手泪如霰王貞女詩有序康熙中吳江王自瑶許字同里蘇生未歸生死自瑶年十八截髮守節既而姑亦死服除請歸之蘓母曰豈有以無夫而歸妻者耶自瑤曰死者吾夫也夫死而代夫事翁則夫猶未死也不然吾夫在地下請歸之地下已耳有何難焉父母知志不可奪遂聽之丁已三月二十七日蘓迎婦如禮自瑤乃加髻與父母别蘓遣小姑迎于門自瑤乞撤綵止樂始入是日雨雪逺近來觀者皆泣下既升堂後拜夫影哭畢其翁感其義令不即以婦禮見先垂涕西向拜四自瑤亦垂涕北向答拜四然後成禮時自瑤年二十有二吳中人多為文嘉之予過海上顧子茂倫屬以詩乃彷樂府辭應之云爾黄鳥交交鳴集彼東南枝私顧無匹雙誰為好容儀有女秉貞素家在吳江隈十三能織素十四學裁衣十五弄文翰十六誦詩書十七備箱簾紅羅刺繡裳頭上芙蓉髻耳後明月璫足下雙珠履行步爛生光將作合歡襦上畵鴛與鴦明月有時翳芙蓉有時委合歡終無期鴛鴦空復爾阿女前致辭兒已得所親非謂得所親黄泉願相存擣盂却苦蓼從舊不從新冶金作華葢到底無翩翻駕我青牛車綰我綠玉繩逝將為彼媍入門事尊章惟時母聞之相顧起徬徨本謂相君子百年永無疆何悟廪霜下拆此蘭蕙姿鴛鴦未成匹何敢言雄雌芙蓉生兩岸那有並蒂時人生若朝露柯換葉復滋況今隔年歲四載尚不足三載頗有餘舊火既已改新糓屢見抭其家且無姑老翁獨閒居阿女含泪答所以不即歸吉凶不同行今既凶服除自可逺父兄少小通文史兼復誦詩書詩書雖無此文史聊以為為夫入子舍謂復理所宜寧有升笄女終老于中閨不然將從誰從夫下泉臺母知女志决為女理容粧便可擇良日車駕來相迎車前百枝燈車後龍子旛小姑到門迎新婦入華軒着我新嫁衣事事相週全頭上何所有䯼髻雙梁釵足下何所有織履躡素絲腰間何所有袙複結兩頭車左駕青鸞車右從文魚本謂坐華軒雙雙共翺翔何意牽紅絲獨身充後房到門撤皷樂行步將升堂是日暮春天百花園中開浮雲障白日寒風為之吹須臾霜雪下牛馬皆凍嘶觀者皆有嘆行者亦以哀桃花冐霜雪何得施臙脂阿翁拜前庭新婦拜前帷中堂兩交拜各自成禮儀雖則成禮儀浪浪泪雙垂自古通婚婣未有如此詞此詞有時盡此事無終衰將詞記此事當令後世知贈武孫姜生擅竒器少小稱文豪十憇柳樹下無汁染子袍擔簦逐主父浪跡為名高出入長安中造請滿市朝有時快落筆掣電驚兒曹萬言中時要逺鑒比灼龜純鈞具新割安用矜鉛刀黄鐘雖未鳴猶足震皷鞉生平主文坫高㑹東南交冠葢遍五都謂此非乆要獨予遘京邸仍眎漆與膠甫嘆伏􅀈乆數歲淹土坳豈期神蟉升一旦騰雲霄君家本世閥七葉盡珥貂趨庭與羣從早已先鳴鑣一第豈足重斯意原囂囂但念丈夫志卓犖貴自超何為坐窮困愁嘆生無聊不見燕冀馬千金在名標不見北溟魚為鵬以逍遙寄李制府生日作使相授節鉞開幕東南疆征繕行表貉杖䇿入戎行潢池㑹兵變甌越多叛亡賊斾下姑蔑獲索近括倉丈人師貞吉鞫旅必有方召虎鎭淮服杜預恢當陽嬰城并搏戰威噞如秋霜保障此半壁一若金與湯惟時就壇拜絶席同親王翳仁克佐賢擣虛而戞亢梟雄既懾伏虎衛爭騰驤碨􅓓漸底平鬚髮已皓蒼迄今刷介馬柙刃三衢旁軍書尚倥偬門柝猶恐皇君子被儒服所貴平披猖畏威并懷徳不在稱有光伊予本編庶竄處負痛創蒼頭乆奸旗白騎尤抗梁非公翦驕悍誰與戢斧斨況當炎崑時玉石不得妨撫䘏儼慈母袵席周匡牀方碑一以涕奚啻在峴岡予職忝史氏將以書旗常天子方倚賴仍使鎭上航當其始受脤膂力真方剛今來遘花甲歲月亦已長薊門隔千里所寄惟清觴微言當民謠聊以誌不忘聞王生新除行人有寄春花發青𤨏天閣動遙翠之子甫拜除暫陟介人位古賢重行已不辱乃其次少小充朝集何止學專對所以頒玉節貴在伸國契誰謂乘軺車僅載爵里刺況君有世徳立朝建風義藉此嗣駿烈且以繼其志寧效江南使㧞草進烏昧母若潘孟陽慷慨但遊寺奉餞趙中丞之任杭州神魚游溟涬不與鬐鬛羣黄鵠翔九霄燕雀徒紛紛伊昔秉人鑑九格定世勲奉使掌鏁院曾詠江東雲嗣此赴中召出入建禮門聨轡共丹陛酌醴同清罇一朝著風采慷慨承宸懽令作九州長六纛開崇藩内承弓矢命外秉鈇鉞權歲星占所麗金牙駐臨安呉越介天險鳯舞龍亦蟠昔為臺舘交今作編户頑單車出都亭尚覺霜風寒王學士出撫兩浙旋以閩越新定開府其地予遇于福州行舘極䝉贈饗賦此抒意憶昔直史舘下馬東華東夫子秉裁鑒視草牕日紅一朝膺寵命出使為儀同胥濤驅萬隊轉見幕府雄方州領節鉞草木皆生風百官避衢路四譯藏甲弓伊予有蔀屋編在封田中高天無私覆但覺雨露濃被廣絶邇逖倚甚同穹窿如何驟移軍重令甌粤通金湯藉開基銅柱將銘功浙人獨何辜奪此履戴崇今來展私覿澤國瞻軍容聆茲鉦皷肅饗我酒醴豐仙山本嵯峨鼇海何漴浤感深莫能酧慷慨長拊躬題括倉劉在園使君記年圖景星曜天衢有目爭快睹況當泰華峰矯矯出雲霧夫君本顥質少小名四布對䇿軼董相稽古邁桓傅幽棲弄文翰好作遐覽賦因此守檡山名與李繁伍今來明湖濵籌大實借箸翻以願受㕓藉是展遐慕青天覿修容碧崦藉高步黼黻猶在躬光彩灼眉宇蓬池曠莽間水草恣洄沍中有鯢子鱗相視等嵦嶇曩者千頃陂汪汪羡叔度展巻一以思伊人𣺌難溯送劉考功請假歸淮安兼示令兄内史劉郎擅東曹吏事稱第一比士閩海歸浮譽斥柳七一朝請沐去將理淮海繂舉朝競貽鞭過市罷彈瑟此去戀鄉井兼及好風日首曹設長名終以待執秩夙昔曾浮淮登堂覩作述朝讌施酒漿晩食授饠饆于今二十年同朝頗狎暱難兄甫待詔行選蓬島室春明俟君來壎箎共均律祗恐秋風高予早趂歸鴪六翮翔上林中途莫相失恭餞馮相國夫子還山神虯廻大澤威鳯翔雲間君子秉耆徳淑世饒令顔植躬表黄闥正色垂朱鞶道足慰三紀勇以定百連中司㨿台鼎遐海銷神姦啓心占帝沃握髮為士前譬彼天地闢萬物咸陶甄已舒禹臯烈始引黄綺年治定當明農功成乃歸田且從養天節豈為避世賢二經徳凛端右致身在虞唐言可當人監行乆作士坊瑞氣炳六符道精涵三光私語祕温室公績留太常維彼宣聖言善用不廢藏召奭别姬旦伊尹辭成湯都人恐公歸旦夕瞻繡裳啣詔汎太液載酒遊林光橋虛接瑤版洞曲流羽觴須臾灑宸翰雲漢囘天章使官衛前途乘傳還故鄉借問西苑游如何東門張三夫子本聖相晩歲懷巖阿曠度有如雪碧髮尚未皤三山集土壤九罭資網羅代已繼疏仡治豈沿共和有時坐一室兩膝容不多顧景念踧踖初志憂蹉跎奠邦儼磐石涉世同流波城東種萬柳長條拂岥岮閒來集羣賢于以永嘯歌逝將邁東山蠟屐投林柯高蹤固難攀當奈蒼生何四在昔裴中立乘興歸午橋何如二傅去餞之在東郊處宦若家室投閒亦京朝所以鴻飛㝠千古羡羽毛上宰展一徳𢎞儀冠諸僚幡然懷鄉邦遽爾振泬寥日者布文命聖心擢賢豪既資殿廷舉兼藉郡國招夫子較詞業燭照如龜燒以此文價起卒與睿鑒昭今茲且縶維駕言食塲苗牽裳攬紳帶卧轍填沙坳㑹應棄碧組同返青山椒踟蹰却立間一望空雲霄永寧程母康太君死賊其子乞興安兵復仇興安帥嘉其義且善相術謂他日當代已領此衆後果然康熙甲子同舘翁太史作詩誦之屬予和歌澠池有烈母忼慨罵賊死其子行報讎殄賊雪其耻當時感孝行奮迅礪穉齒豈期哭秦庭頓遇姑布子形在旄仗間早已識前此一旦列頗牧正値彼故壘曩時趙苞孝以母膏賦矢何如全令名揚顯自此始從來表至行彪炳賴藏史為讀清風吟三嘆不能已題宋母方夫人傳後宋母刲股行孝其子姓兄弟觀感繼起者凡五人宜家不私已大孝乃致身況當一體分骨肉同甘辛賢母秉亮節事姑如事親刲股嘗縷切和糜進殷勤中間療君子委篤良自振以此感至理數世咸相因子身可事父弟身可事昆往嘆聖教衰民散在彛倫痌瘝不相及邈若燕與秦敢言勿傷毁手足當見珍悠悠保軀子誰謂非完真錄别詩綠蘋被叢薄紅蘭覆江臯掛席浮海濵言渡枉渚潮君子秉遐契相顧稱神交一見贈縞紵再逢貽錯刀芳辰羅廣宴永夕傳佳餚㫖酒滌中脘爰以散鬱陶春鳩度麥葉暑鵲鳴桑條危檣駕五兩風便速去橈離歌未終曲别思如波濤嘉徳許攬佩隆情鮮紛囂良覿安可幾所恃在乆要寄贈宋使君犖通薊行署平明出東華秋色亦何有日照宣曲花風吹掖門柳使君擁朱旗日飲潞亭酒寒螗吟高槐詩興倍抖擻伊昔對建禮螭陛羡趨走相隔僅郊閾宛若間丘阜天涼懷家山歲宴憶良友何當道元州因君贈瓊玖留别朱在鎬司李作仲尼適泉源嘗主蘧伯玉我今遊海濵望門向公叔衣車税前除將就廡下宿主人出未歸四顧且跼蹜其家一何賢開軒啓􅌬醁繁花發園桃鮮筍薦牆竹日景方紆徐風氣漸烜燠幸逢主人還握手道悃愊如何復出門方駕不脱輻予住三月餘三見征且逐一如予汗游虛覔升斗粟我聞司馬公往就鹿門曲主客恒不分相向以為樂何悟千載後重得覯斯躅從來沛國𦙍歴禪富賢淑況君早蜚聲文譽振邦族曾授司刑官所讞無枉獄暨乎拂衣還晩食幾斷肉春草長及階夏雲覆如屋游子思東歸慷慨夜擊筑一念賢主人雙泪下撲􅉡奉答張檢討鴻烈南還留别原韻憶昔游東湖同賦明河篇酒酣一揮手翕忽三十年碧流徙滄海白髮凋朱顔何期㑹公車對䇿隨廣川抽毫共深禁作史分長筵把臂愬疇昔聨轡課後先誰令叱猘犬私愧同寒蟬多君秉謇諤慷慨陳殿前但謀救里𤯝豈為裕國泉聖明早垂鑒既已行其言旋作歸田計解組還舊山我本乞塟親請假還流漣君行及春晴先買通潞船聞君有别業逺與東朐連其山名鬱洲溟海相廻環中有良田疇仙驥曾耕烟移家暫棲止任使歲月遷江東無官湖何處溯潺湲他年倘相思一望雲海邊丁給事典試兩浙枉訊奉答時予猶子見舉門下維昔歲貞始文昌曜南離丈人效鵠觀四海以為期高舉翔寓内乘風到江涯藩車下蓬蓽熊斾臨蒿萊爾時恨陶室未足安范逵設醬苦蚍薄莝薦知馬飢一朝升掖垣相隔猶雲泥引身跨鳯翮叩額當龍墀上殿展十論直聲著邊陲㑹承華文開有詔典浙闈青簾散日映紅燭迎風吹至公誰秉筆恍見珠斗垂嘉祐斥蕭穆元和遘昌黎不謂猶子愚亦得擐草衣仰瞻泰岱高四顧乏羽儀潢汚隔滄流何以慰中私豈期度寥廓握手相追隨天地有餘量日月無常規但言駕逍遙鷽鳥安足知九頌篇奉贈梁大司農夫子并祝初度二十一韻結髮學儒術負篋為逺征父事言子游兄遇延陵生文章頗濩落意氣猶縱横但恨日垂暮所志百不成捧檄入京邑仰望天階行牽車類趙壹懐刺同禰衡誰信九州大及見三光清老成佇朝右明穆秉國經峻節凛聞式微言騐章程容物善下士乆作來者型蒼巖髙萬仞中有黄金庭俯視恒華間宛若丘與陵名世不數出斯代誰賢英敢與東丘違而令北海輕矧予依孔牆晩歲斟堯羔每當皇覽日願致歌誦情祗慚肄風雅三百有正聲何為雜衆竅百變煩嚘嚶尹吉自清穆史克終和平即此九頌末孰與六義爭不觀蕉林詩千載垂芳名司農所著詩名蕉林詩集奉和益都夫子讀孫司馬韻書原韻折竹作鳥書所藉在都講不虞聲未諧齊陸導魯港古有司馬韻皎如月在蚌豈必窮毫毛祗貴挈領項何為守一閧紛紛坐投缿金副憲遷少司馬舉子有贈煌煌帝庭宿歴歴轉玉繩天樞近三能鬱為萬物精之子冠柱後獨坐秉憲衡殿中中執法封事多能名天下望風采内外皆肅清至尊奬遺直特進掌七兵峩峩少常伯奄作西曹卿八事既條奏九命方出膺制軍及佽飛詰禁于以并爾時正垂弧寳樹生中庭已協夢熊卜況聽遷鳥鳴大徳嘉邁種所志傳一經華纓接芳彯永為斯世馨西河集巻一百八十六
