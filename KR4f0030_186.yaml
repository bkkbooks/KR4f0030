body:
  text: 西河集卷一百八十六翰林院檢討毛竒齡撰五言格詩二别伯兄五首孤鳥辭宿柯離獸馳舊林驚心見曲木走險不擇隂判茲同生子惻愴誰為心如何彼蒼天使我遘難深遘難未云極三載慰遐慕如何復離分悠悠即長路遊子多苦心况復值秋暮絺衣薄寒颸葛屨踐涼露揮手自茲訣一步三反顧反顧不可行回身復牽衣慈殯未旋壙嚴車復停幃門户值中落各鮮庭樹枝連岡隔秋照影亡形亦疑暫佇覯形影及此將頺曦頺曦將右匿流影眷左疆孤雁雖西飛其音在東湘君子重去土豈不懷舊鄉形隔不得旋魂魄思茫茫生當從兄遊周我門東場死願為飛鳩鳴此道上桑桑梓在道上猶然起繾綣析柯解連枝豈不極哀戀念兄富文府弟亦擅華絢三珠秀稽林雙龍起江甸兄既辭司秋仁人不為讞兄已除理刑推官棄去弟復遭百罹中年起更變天高殫難呼道逺死誰見疊浪阻潮汐重山蔽鄉縣茹蘗苦自聆詎敢告親串兄年已傷哀無為久勞眷努力紹前期揮手泪如霰王貞女詩有序康熙中吳江王自瑶許字同里蘇生未歸生死自瑶年十八截髮守節既而姑亦死服除請歸之蘇母曰豈有以無夫而歸妻者耶自瑤曰死者吾夫也夫死而代夫事翁則夫猶未死也不然吾夫在地下請歸之地下已耳有何難焉父母知志不可奪遂聽之丁已三月二十七日蘇迎婦如禮自瑤乃加髻與父母别蘇遣小姑迎于門自瑤乞撤綵止樂始入是日雨雪逺近來觀者皆泣下既升堂後拜夫影哭畢其翁感其義令不即以婦禮見先垂涕西向拜四自瑤亦垂涕北向答拜四然後成禮時自瑤年二十有二吳中人多為文嘉之豫過海上顧子茂倫屬以詩乃倣樂府辭應之云爾黃鳥交交鳴集彼東南枝私顧無匹雙誰為好容儀有女秉貞素家在吳江隈十三能織素十四學裁衣十五弄文翰十六誦詩書十七備箱簾紅羅刺繡裳頭上芙蓉髻耳後明月璫足下雙珠履行步爛生光將作合歡襦上畫鴛與鴦明月有時翳芙蓉有時委合歡終無期鴛鴦空復爾阿女前致辭兒已得所親非謂得所親黃泉願相存搗盂却苦蓼從舊不從新冶金作華蓋到底無翩翻駕我青牛車綰我緑玉繩逝將為彼婦入門事尊章惟時母聞之相顧起倣徨本謂相君子百年永無疆何悟廪霜下拆此蘭蕙姿鴛鴦未成匹何敢言雄雌芙蓉生兩岸那有並蒂時人生若朝露柯換葉復滋況今隔年歲四載尚不足三載頗有餘舊火既已改新穀屢見抭其家且無姑老翁獨間居阿女含泪答所以不即歸吉凶不同行今既凶服除自可逺父兄少小通文史兼復誦詩書詩書雖無此文史聊以為為夫入子舍謂復理所宜寧有升笄女終老于中閨不然將從誰從夫下泉臺母知女志決為女理容粧便可擇良日車駕來相迎車前百枝燈車後龍子幡小姑到門迎新婦入華軒著我新嫁衣事事相周全頭上何所有䯼髻雙梁叉足下何所有織履躡素絲腰間何所有袙復結兩頭車左駕青鸞車右從文魚本謂坐華軒雙雙共翺翔何意牽紅絲獨身充後房到門撤鼓樂行步將升堂是日暮春天百花園中開浮雲障白日寒風為之吹須臾霜雪下牛馬皆凍嘶觀者皆有嘆行者亦以哀桃花冒霜雪何得施胭脂阿翁拜前庭新婦拜前帷中堂兩交拜各自成禮儀雖則成禮儀浪浪泪雙垂自古通婚姻未有如此詞此詞有時盡此事無終衰將詞記此事當令後世知贈武孫薑生擅竒器少小稱文豪十憩柳樹下無汁染子袍擔簦逐主父浪迹為名高出入長安中造請滿市朝有時快落筆掣電驚兒曹萬言中時要逺鑒比灼龜純鈞具新割安用矜鉛刀黃鐘雖未鳴猶足震鼓鞉生平主文坫高會東南交冠蓋遍五都謂此非久要獨豫遘京邸仍視漆與膠甫嘆伏􅀈久數歲淹土坳豈期神蟉升一旦騰雲霄君家本世閥七葉盡珥貂趨庭與羣從早已先鳴鑣一第豈足重斯意原囂囂但念丈夫志卓犖貴自超何為坐窮困愁嘆生無聊不見燕冀馬千金在名標不見北溟魚為鵬以逍遙寄李制府生日作使相授節鉞開幕東南疆征繕行表貉杖䇿入戎行潢池會兵變甌越多叛亡賊斾下姑蔑獲索近括倉丈人師貞吉鞫旅必有方召虎鎮淮服杜預恢當陽嬰城并搏戰威噞如秋霜保障此半壁一若金與湯惟時就壇拜絶席同親王翳仁克佐賢搗虛而戞亢梟雄既懾伏虎衛爭騰驤碨􅓓漸底平鬚髮已皓蒼迄今刷介馬柙刃三衢旁軍書尚倥偬門柝猶恐皇君子被儒服所貴平披猖畏威并懷德不在稱有光伊豫本編庶竄處負痛創蒼頭久姦旗白騎尤抗梁非公翦驕悍誰與戢斧斨況當炎崑時玉石不得妨撫恤儼慈母袵席周匡牀方碑一以涕奚啻在峴岡豫職忝史氏將以書旗常天子方倚賴仍使鎮上航當其始受脤膂力真方剛今來遘花甲歲月亦已長薊門隔千里所寄惟清觴微言當民謠聊以志不忘聞王生新除行人有寄春花發青瑣天閣動遙翠之子甫拜除暫陟介人位古賢重行已不辱乃其次少小充朝集何止學專對所以頒玉節貴在伸國契誰謂乘軺車僅載爵里刺況君有世德立朝建風義藉此嗣駿烈且以繼其志寧效江南使拔草進烏昧母若潘孟陽慷慨但遊寺奉餞趙中丞之任杭州神魚遊溟涬不與鬐鬛羣黃鵠翔九霄燕雀徒紛紛伊昔秉人鑑九格定世勳奉使掌鎖院曾詠江東雲嗣此赴中召出入建禮門聨轡共丹陛酌醴同清樽一朝著風采慷慨承宸歡令作九州長六纛開崇藩內承弓矢命外秉鈇鉞權歲星占所麗金牙駐臨安吳越介天險鳯舞龍亦蟠昔為臺館交今作編户頑單車出都亭尚覺霜風寒王學士出撫兩浙旋以閩越新定開府其地豫遇于福州行館極蒙贈饗賦此抒意憶昔直史館下馬東華東夫子秉裁鑒視草窗日紅一朝膺寵命出使為儀同胥濤驅萬隊轉見幕府雄方州領節鉞草木皆生風百官避衢路四譯藏甲弓伊豫有蔀屋編在封田中高天無私覆但覺雨露濃被廣絶邇逖倚甚同穹窿如何驟移軍重令甌粵通金湯藉開基銅柱將銘功浙人獨何辜奪此履戴崇今來展私覿澤國瞻軍容聆茲鉦鼓肅饗我酒醴豐仙山本嵯峨鼇海何漴浤感深莫能酬慷慨長拊躬題括倉劉在園使君記年圖景星曜天衢有目爭快睹況當泰華峰矯矯出雲霧夫君本皓質少小名四布對䇿軼董相稽古邁桓傅幽棲弄文翰好作遐覽賦因此守檡山名與李繁伍今來明湖濵籌大實借箸翻以願受㕓藉是展遐慕青天覿修容碧崦藉高步黼黻猶在躬光彩灼眉宇蓬池曠莽間水草恣洄沍中有鯢子鱗相視等嵦嶇曩者千頃陂汪汪羡叔度展卷一以思伊人渺難溯送劉考功請假歸淮安兼示令兄內史劉郎擅東曹吏事稱第一比士閩海歸浮譽斥柳七一朝請沐去將理淮海繂舉朝競貽鞭過市罷彈瑟此去戀鄉井兼及好風日首曹設長名終以待執秩夙昔曾浮淮登堂覩作述朝宴施酒漿晚食授饠饆于今二十年同朝頗狎昵難兄甫待詔行選蓬島室春明俟君來塤箎共均律祗恐秋風高豫早趂歸鴪六翮翔上林中途莫相失恭餞馮相國夫子還山神虯回大澤威鳯翔雲間君子秉耆德淑世饒令顔植躬表黃闥正色垂朱鞶道足慰三紀勇以定百連中司據台鼎遐海銷神姦啓心占帝沃握髮為士前譬彼天地闢萬物咸陶甄已舒禹臯烈始引黃綺年治定當明農功成乃歸田且從養天節豈為避世賢二經德凛端右致身在虞唐言可當人監行久作士坊瑞氣炳六符道精涵三光私語祕溫室公績留太常維彼宣聖言善用不廢藏召奭别姬旦伊尹辭成湯都人恐公歸旦夕瞻繡裳銜詔泛太液載酒遊林光橋虛接瑤版洞曲流羽觴須臾灑宸翰雲漢回天章使官衛前途乘傳還故鄉借問西苑遊如何東門張三夫子本聖相晚歲懷巖阿曠度有如雪碧髮尚未皤三山集土壤九罭資網羅代已繼疏仡治豈沿共和有時坐一室兩膝容不多顧景念踧踖初志憂蹉跎奠邦儼磐石涉世同流波城東種萬柳長條拂岥岮間來集羣賢于以永嘯歌逝將邁東山蠟屐投林柯高蹤固難攀當奈蒼生何四在昔裴中立乘興歸午橋何如二傅去餞之在東郊處宦若家室投間亦京朝所以鴻飛冥千古羡羽毛上宰展一德𢎞儀冠諸僚幡然懷鄉邦遽爾振泬寥日者布文命聖心擢賢豪既資殿廷舉兼藉郡國招夫子較詞業燭照如龜燒以此文價起卒與睿鑒昭今茲且縶維駕言食場苗牽裳攬紳帶卧轍填沙坳會應棄碧組同返青山椒踟蹰却立間一望空雲霄永寧程母康太君死賊其子乞興安兵復仇興安帥嘉其義且善相術謂他日當代已領此衆後果然康熙甲子同館翁太史作詩誦之屬豫和歌澠池有烈母慷慨罵賊死其子行報讎殄賊雪其耻當時感孝行奮迅礪稚齒豈期哭秦庭頓遇姑布子形在旄仗間早已識前此一旦列頗牧正值彼故壘曩時趙苞孝以母膏賦矢何如全令名揚顯自此始從來表至行彪炳賴藏史為讀清風吟三嘆不能已題宋母方夫人傳後宋母刲股行孝其子姓兄弟觀感繼起者凡五人宜家不私已大孝乃致身況當一體分骨肉同甘辛賢母秉亮節事姑如事親刲股嘗縷切和糜進殷勤中間療君子委篤良自振以此感至理數世咸相因子身可事父弟身可事昆往嘆聖教衰民散在彛倫痌瘝不相及邈若燕與秦敢言勿傷毁手足當見珍悠悠保軀子誰謂非完真録别詩緑蘋被叢薄紅蘭覆江臯挂席浮海濵言渡枉渚潮君子秉遐契相顧稱神交一見贈縞紵再逢貽錯刀芳辰羅廣宴永夕傳佳肴旨酒滌中脘爰以散鬱陶春鳩度麥葉暑鵲鳴桑條危檣駕五兩風便速去橈離歌未終曲别思如波濤嘉德許攬佩隆情鮮紛囂良覿安可幾所恃在久要寄贈宋使君犖通薊行署平明出東華秋色亦何有日照宣曲花風吹掖門柳使君擁朱旗日飲潞亭酒寒螳吟高槐詩興倍抖擻伊昔對建禮螭陛羡趨走相隔僅郊閾宛若間丘阜天涼懷家山歲宴憶良友何當道元州因君贈瓊玖留别朱在鎬司李作仲尼適泉源嘗主蘧伯玉我今遊海濵望門向公叔衣車稅前除將就廡下宿主人出未歸四顧且局蹜其家一何賢開軒啓􅌬醁繁花發園桃鮮筍薦牆竹日景方紆徐風氣漸烜燠幸逢主人還握手道悃愊如何復出門方駕不脫輻豫住三月餘三見征且逐一如豫汗遊虛覔升斗粟我聞司馬公往就鹿門曲主客恆不分相向以為樂何悟千載後重得覯斯躅從來沛國胤歷禪富賢淑況君早蜚聲文譽振邦族曾授司刑官所讞無枉獄暨乎拂衣還晚食幾斷肉春草長及階夏雲覆如屋遊子思東歸慷慨夜擊築一念賢主人雙泪下撲􅉡奉答張檢討鴻烈南還留别原韻憶昔遊東湖同賦明河篇酒酣一揮手翕忽三十年碧流徙滄海白髮凋朱顔何期會公車對䇿隨廣川抽毫共深禁作史分長筵把臂訴疇昔聨轡課後先誰令叱猘犬私愧同寒蟬多君秉謇諤慷慨陳殿前但謀救里眚豈為裕國泉聖明早垂鑒既已行其言旋作歸田計解組還舊山我本乞葬親請假還流漣君行及春晴先買通潞船聞君有别業逺與東朐連其山名鬱洲溟海相回環中有良田疇仙驥曾耕煙移家暫棲止任使歲月遷江東無官湖何處溯潺湲他年倘相思一望雲海邊丁給事典試兩浙枉訊奉答時豫猶子見舉門下維昔歲貞始文昌曜南離丈人效鵠觀四海以為期高舉翔寓內乘風到江涯藩車下蓬蓽熊斾臨蒿萊爾時恨陶室未足安范逵設醬苦蚍薄莝薦知馬飢一朝升掖垣相隔猶雲泥引身跨鳯翮叩額當龍墀上殿展十論直聲著邊陲會承華文開有詔典浙闈青簾散日映紅燭迎風吹至公誰秉筆恍見珠斗垂嘉祐斥蕭穆元和遘昌黎不謂猶子愚亦得擐草衣仰瞻泰岱高四顧乏羽儀潢汚隔滄流何以慰中私豈期度寥廓握手相追隨天地有餘量日月無常規但言駕逍遙鷽鳥安足知九頌篇奉贈梁大司農夫子并祝初度二十一韻結髮學儒術負篋為逺征父事言子遊兄遇延陵生文章頗濩落意氣猶縱橫但恨日垂暮所志百不成捧檄入京邑仰望天階行牽車類趙一懷刺同禰衡誰信九州大及見三光清老成佇朝右明穆秉國經峻節凛聞式微言驗章程容物善下士久作來者型蒼巖髙萬仞中有黃金庭俯視恆華間宛若丘與陵名世不數出斯代誰賢英敢與東丘違而令北海輕矧豫依孔牆晚歲斟堯羔每當皇覽日願致歌誦情祗慚肄風雅三百有正聲何為雜衆竅百變煩嚘嚶尹吉自清穆史克終和平即此九頌末孰與六義爭不觀蕉林詩千載垂芳名司農所著詩名蕉林詩集奉和益都夫子讀孫司馬韻書原韻折竹作鳥書所藉在都講不虞聲未諧齊陸導魯港古有司馬韻皎如月在蚌豈必窮毫毛祗貴挈領項何為守一閧紛紛坐投缿金副憲遷少司馬舉子有贈煌煌帝庭宿歷歷轉玉繩天樞近三能鬱為萬物精之子冠柱後獨坐秉憲衡殿中中執法封事多能名天下望風采內外皆肅清至尊奬遺直特進掌七兵峩峩少常伯奄作西曹卿八事既條奏九命方出膺制軍及佽飛詰禁于以并爾時正垂弧寶樹生中庭已協夢熊卜況聽遷鳥鳴大德嘉邁種所志傳一經華纓接芳彯永為斯世馨西河集卷一百八十六
