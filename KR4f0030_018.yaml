body:
  text: 西河集巻十八翰林院檢討毛竒齡撰書五寄閻潛丘古文尚書寃詞書接讀四書釋地一編又經三年淮上去此不逺而郵寄甚艱去夏閩客屬一緘寄丘洗馬至今未達昨著喪禮一書見堯峰文鈔内頗多論辨然無一不誤不止如前時所示數則急欲奉質不可得因嘆當世果無一善讀書者近蠡吾李塨字恕谷康熙庚午舉人爲李孝慤先生之子其人學有根柢曽游博陵顔習齋門胸不安有疑義越三千里來証所學固已度越儕輩矣乃以寓居桐鄉之故與桐之錢氏作古文尚書真僞之辨列主客來問某向亦不愜僞古文一説宋人誕妄最叵信及惠教所著古文尚書疏証後始怏怏謂此事經讀書人道過或不應謬遂置不復理今就兩家説重爲考訂知古文尚書自漢武年出孔壁後凡内府藏弆與民間授受相繼不絶且歴新都簒殺永嘉變亂亦並無有遺失散亡之事而梅賾在晉所上者又但是孔傳並非古文經文其在隋書經籍志開載甚明外此則又無他書可爲藉口則其裏其底瞭然于人何得有假因就彼所辨而斷以平日所考証作古文尚書定論四巻其中微及潛丘并敝鄉姚立方所著攻古文者兼相質難以爲學無兩可祗有一是苟或所見不謬即當力持其説以爲可定雖自揣生平所學百不如潛丘且相於數十年誠不忍以言論牴牾啟參差之端祗謂聖經是非所繫極大非可以人情嫌畏謬爲遜讓况潛丘之學萬萬勝予亦必不敢謂能勝六經大凡有學識人定無我見一聞真是便當自舍其所非曩者先仲氏觀陳宗伯所藏商彞心疑其贋而閟不敢言及撤去客有以千金請值者始自悔其誤而再請觀之然不得矣故先仲氏嘗曰觀古有所失即悔且不及何况不悔今六經之重不止一鼎古文爲二帝三王之書又不止毛詩左氏公穀周禮儀禮禮記諸經之比向亦惟衛經心切誠恐僞之果足以亂真故任此無何之言而姑且耐之一經指正即悛除不暇此如清君側之奸者其稱兵直前以爲君側有奸耳君側無奸則此兵向君矣而可乎夫聖經無可非而非之詖士也君側無奸而忽指之爲有奸者讒人也爾乃辨之愈明來攻者愈急寧以兵向君而必不敢向讒人寧得罪聖經而必不敢得罪此宋元間非聖毁經之詖士此則何解然且研經好學如立方者亦復墨守不下曰各行所知則生薑真樹生矣某因削去定論名色而改名寃詞且増四巻爲八巻而再加考訂如孔疏之誣指鄭註二十三篇爲孔書二十三篇漆書二十四篇爲張霸二十四篇則當更校其篇數明儒謂安國之卒先于太初孔氏獻書不及巫蠱則當更考其年月賈逵馬融援僞學以冒孔學則授受當更清衛宏許慎據僞古文以亂真古文則字畫當更核然不曰釋寃而曰寃詞以不敢釋也吾苐列其寃而世釋之釋不在我也世不肻釋寃而必欲寃之寃亦不在我也如此則可以告無罪矣拙著并喪禮十巻統呈掌記外定論原敘數頁一併奉覽竊謂潛丘所學何處不見原不藉毁經以爲能事且胸藏該博必有論辨所未及考據所未備以廣我庳隘寃詞無定潛丘定之何如何如某頓首答章宗之問東西房書接問知于東西房有蓄疑處僕病後全無記憶居平所識書欲舉似一句不得又必不能就所按繙閲據禮註鄭氏謂天子諸侯有東西房大夫士則有東房無西房此不見經文原是謬註而黄梨洲主其説謂士冠禮冠者于牖西拜賓而賓即于西序答拜惟無西房故西序與牖西近有西房則西序在西房之盡相距逺難交拜矣又昏禮醴婦賛者于西階上北面拜送而婦于牖間席西東面拜受惟無西房故階得與牖西相當不礙授受有西房則西階在西房之下婦與賛背面難禮接矣推其説則竟以牖間之西西序之東爲西房將廟寢三間而以楹西之右一間當之此非無西房直無西廟寢謬之謬矣顧廟制無明文可據但就其所云冠禮推之似東西房在廟寢三間之外别附一間即爾雅所云有東西廂曰廟者其近北一半名曰夾室近南一半即謂之房如冠禮將冠先陳服于房中西墉下此東房也何也以冠子于阼在東階上也然而曰西墉則房西有墻矣此一墻與寢堂間隔即爾雅所云東西墻謂之序者其在墻西謂之東序在墻東謂之西墉是東序在戸東而東房則又在東序之東西序在牖西而西房則又在西序之西與梨洲所言正反也故尚書顧命位次有在牖間南面者此王朝位也在東序西面則養老燕饗之位也西序東面則聽政位也乃别有一坐在西夾南面爲親屬私宴之位則正是西房以其夾一墻故謂之夾以其有夾故親屬私宴得以掩蔽向使如梨洲所言在西序東則與牖間南面一位兩坐並抗既非儀法且殿堂何地其可以親昵燕私之乎是以下文有𦙍之舞衣大貝鼖鼓在西房語孔氏謂西坐夾東葢只此一間而北夾之坐居于正中則南房所列當在東墉此猶之冠者居東房之中而冠服所陳當在西墉可對証也但予謂大夫士亦有西房與梨洲所言又反者以喪禮推之按初喪襲斂奉尸侇于堂則男位尸東女位尸西至殯于西階則大夫䌈地士埋土皆依西墻爲柩堂西無地矣故男主位在殯東而女主則不得不入于西房南面拜客所謂不下堂者惟君夫人與女賓之尊行者至夫然後下堂而拜于階下此則大夫士廟制明有西房之經証也况所証必不止此也又答章宗之問吉祭未配書據問士喪禮吉祭猶未配語按此是􅎭月易纎服時倘遇烝嘗禘吉祭則但以新主入祖廟附食而不以妣配此極明了甬東萬季野謂未配者不以新主配食祖廟非妣不配考也此是臆説故嘗以問黄梨洲不謂梨洲竟是之且云新主雖在廟不以配食是主客言禮皆以配妣作配食解恐太疎矣從來禮文配字祗訓陪對並無訓作附食者家語郊祀其祖以配天孝經宗祀文王以配上帝喪小記王者禘其祖之所自出以其祖配之皆陪對之義故祖妣稱配以配與妃通周語註所云配者配先君也此與雜記男子附王父則配女子附王母則不配釋義俱同若附食名祔所云合食于祖者並不稱配故此當吉祭尚未配妣若是配食則卒哭而祔在三月之後即已附祭豈有二十七月而禫而猶未祔者若云新主雖在廟仍未配食則葬後祔廟正爲此廟食耳在廟三年而曽不得食餒也若何復馮山公論太極圖説古文尚書寃詞書數辱垂訊連接四短札覺心地傝伏入夏來煩紆頃刻都息生平喜聽人論學至紙上有考辯尤劇聳動老年不能㑹心目入反不若耳受之快然大致了了舊説太極圖但據一時所見便爾草草如紀顧諸名言皆超雋有餘趣自慚脱漏不能遍舉且有要領俱失處不止于此明知是圖本于二氏然僅僅以希夷夀涯當之昨見黄山中洲和尚有太極本于禪宗説其所爲太極圖即唐僧圭峰之十重圖也中三輪爲河梨耶識左行爲爲覺即圖之左右行爲爲不覺即圖之右此在陳搏授圖之前已行世者是搏所爲圖一本于道藏真元品一本于圭峰禪源詮集而總出于參同契是真賍實據鑿鑿要領今苐知真元品而不知禪源詮集是舉䙅失襋究竟脱漏從未讀書原不能盡且又以二氏忽之此即非真學問人况既論此事而于此事反有闕豈可耶若根字則過于推求竟忘孟子有根心之文捕蟬彈雀指出甚快但行世已久不能改矣至若古文尚書之寃則凡能救正即是聖人之徒况直窮隋志抉致誤之由尤得要領即所示志文屬讀正闡發苦心何容置喙但僕舊所讀正亦未嘗差誤者志云永嘉之亂歐陽大小夏侯尚書並亡濟南伏生之傳唯劉向父子所著五行傳是其本法而又多乖戾至東晉梅賾始上孔傳云云初亦疑以並亡伏生傳作句既而思歐陽二夏侯尚書並無伏生傳在内不得云亡伏生傳且伏生傳即今尚書大傳也在永嘉亂時並不曽亡又不得云所亡者是伏生之傳葢歐陽尚書出于歐陽髙爲伏生弟子和伯之孫自有歐陽章句三十一巻歐陽説義二篇大小夏侯尚書則一是夏侯勝爲張生所傳夏侯都尉之族子一是夏侯建即勝從兄子從勝學者大小各有夏侯章句二十九巻合五十八巻兼有大小夏侯解故即訓詁二十九篇是兩家俱自有傳其所以兩書並名者以武帝時先立歐陽尚書于學官至孝宣世復立大小夏侯尚書而分作兩官故並名歐陽大小夏侯尚書其云並亡以永嘉之亂兩書並亡也志所云今無有傳者是也若伏生大傳原不曽有章句訓詁如歐陽夏侯等其言反怪誕惟劉向父子所作五行傳是伏生本法而向歆襲之然又與經文乖戾不可作尚書之傳故梅氏以孔傳上之如此屬讀則始于劉向父子一段方有著落至于並亡作句恐疑涉今文之亡則明云歐陽夏侯之尚書學者留意自知之不足慮也僕從來説經極其審慎必多所考據並不執一以難一故謬處差少但限于方幅不能博設必俟質難始出之故凡髙明指摘幸乘僕生前有口時尚可商量一當死後則衆射之的誰能辨之况古文之寃尤口衆者耶至洛誥命公後文則公羊封魯一叚僕廣聽錄已載之何日面受率復不備與馮山公論論孟書每發椷示必益我未備老年終日向暗處行何幸有道不惜借四壁餘光時相照映祇恨彼此異處良對少耳昨有客過寄亭劇言海内無讀書人幸研攻八比惟論孟未荒落餘茫然矣予謂論孟亦何易明白客俯首咄咄似有不肯其語者然亦不送難竟去因憶往冬大病時通夜不寐雞唱後呼兄孫論孟子禹之聲章曷云以追蠡曰以用之者多也然則曷云城門之軌非兩馬之力曰以用之者久也予謂以城門一軌而當經涂衆軌之用正用之者多而曰久何也遂不能答今年春陳緘菴編修家以母喪請予作題主陪事坐客有問公行子有子之喪喪子耶抑喪親耶衆俱未應予曰僕亦有一問滕文以然友反命始定爲三年之喪豈三年喪制定自孟子耶少頃孝亷馬素菴曰以戰國久不行而今行之似更定也予曰不然據父兄百官皆不欲曰吾宗國魯先君莫行是周公伯禽不行也吾先君亦莫行是滕叔繡亦不行也此明指周初非戰國也然且􅊱􅊱曰至于子之身而反之曰喪祭從先祖一似乎叛朝典亂祖制者豈狂言乎一堂十二席五十餘人各嘿然如喑者既而過倪魯玉中翰觀其所著神州古史考載泰山明堂甚析予曰泰山明堂可解乎以爲巡狩耶則東巡燔柴不事五室且他岳無有也以爲王者聽政之所則鎬京共主必每月東幸以聽政于十二堂謬矣謬矣魯玉亦唯唯後又至其所説孟子述孔子見陽貨事謂大夫有賜于士孟子直稱陽貨爲大夫孔子爲士而集註又從之不置一辨時張叔明在坐但曰權臣以大夫自居而此苐因之以重其罪則世無稱新莽桓溫爲帝而謂之罪者且貨在當時並未敢以非禮自居彼方納改玉之請正僖閔之逆往往借禮法以助跋扈况大夫士相見承摯餽問自有定禮若果非大夫則夫子何難以非禮拒之觀記稱陽貨欲見孔子孔子不見則亦非苟爲依違肯無端而拜其門者乃夫子亦竟以大夫禮事貨而孟子則直據其禮而明稱之此在孔安國馬融包咸註論語趙岐註孟子皆若視爲固然事而並不註及此是何説最後有問予三家之堂者予苐出大小宗通繹示之便㸃首去然註疏集註亦全不能解據論語一稱季氏一稱三家之堂似分似合原不可訓夫三家者仲叔季也三家同僣不得獨坐季氏若僣在季氏則季僣已耳兩家又安得並受惡名且三家之祖非他爲仲慶父爲叔牙爲季友也兩祖以弑逆不得其死此在祭典不得立昭穆之尸食昭穆之牲而公然用天子禮樂世無此理且兩祖之死皆季友一人所爲季文季武何人肯以成季與共仲僖叔並坐而擬三天子亦必無之事又且大夫兄弟皆各有廟孟叔季三孫俱魯國正卿豈有三祖三大夫共一廟者然則三家之堂究竟何解若其餘無解之語櫛比皆是予苐就其已質者重質左右嘗在道南書院説論語大旨有以子貢問士子路問成人兩章送難者謂夫子重才而輕德重有爲而輕有守使不辱命與小才節文似不得與孝弟言行斷義利死患難忠臣信友同類並稱而乃反超而上之斯已過矣然且以言行信果爲小人以正誼明道節概赫然六行五品無少闕者爲今之成人不惟降之又從而鄙夷之若是者何也學者不體㑹聖人立教精意妄執臆見甚至以行已有恥與節文禮樂鋪張盛大以壓勝之夫行已不過躬行耳有恥不過四端之一禮樂不過六藝之兩耳夫子本舉春秋極猥璅者爲人士榜樣而學者必欲張大而壓勝之則亦小人之腹矣且此中自有一定意旨試以是兩章合之兩論二十篇與孟子與大學中庸一一比觀其爲學輕重定有明証不于此之求而聖賢意㫖但以不求甚解四字置之可乎凡此諸條皆淺近道理在童子學堂挾兎園册時都皆知得而老老大大反不能了况大易春秋迷山霧海自兩漢迄今歴二千餘年皆臆猜卜度如説夢話何時得白即僕在門者不乏名下每恐老死欲擇一二可傳喪祭二禮并五聲六律者而必不可得嗟乎已矣因于裁復之餘附及璅璅以爲眞讀書人當亦必有念及者何如不具與朱鹿田孝亷論論孟書向以論孟數條索馮山公解去遲久未答即以其説間語所識亦多不能了故僕解六經謂自漢迄今從來誤解者十居其九自漢迄今從來不解者十居其一但彼亦不自知其不解也及偶一提醒輒目釘口塞數日不能答即一論孟而治八比者仍在夢夢則八比何用矣昨座客謂三家之堂不是一個廟是各一個廟説見前篇此不特無據抑且無理諸書未有言異廟者此無據也同廟則成季一家尚可行僭若異廟則慶父弑君時哀姜與聞尚殺之于齊主不袝廟至僖公八年已歴三禘而始有致廟之文見于春秋豈有仲慶叔牙得專廟僭天子禮考不惟魯人不肯季氏亦不肯也若慶父之子公孫敖者則又得罪奔莒請歸請葬尚不許豈許專廟倘又降此則將以天子禮祀孟獻子莊子誣罔極矣若謂魯先君不行三年喪是近代先君不是周公伯禽説見前篇此本髙頭講章之言魯自春秋至戰國無不行三年喪者僖公三十三年薨文公二年納幣相距再期猶然以喪娶􅏺之成公三年喪畢然後朝晉晉叔向譏昭公有三年之喪而無一日之慼何嘗不行且本文明曰喪祭從先祖先祖者始祖非近代祖也若樊遲請學稼即禾中孫肖夫菰城江岷源輩亦驚顧無一言此實不可解者遲既非沮溺甘于石隱亦定非眞欲霑體塗足作農人者若以爲粗鄙則應告之以詩書禮樂之文以爲璅屑則當啓之以大經大法治已治人之道乃徒以君民相感爲言已難通矣且其申言叠喚一似遲欲招徠天下之民而不可得者豈聖人之言而全然如大霧至于如是試問焉用稼用字何解至子使漆雕開仕則但云可以仕夫可以仕則必如雍也可使南面明下可字豈有可仕而記者妄云子使仕者是使求仕也求仕不可也至若孟懿子問孝子曰無違則無違正對孝字即論語幾諫章所云不違中庸哀公章所云順乎親者此下原不得増加一字乃以恐涉從親之令必増數字則無違于理理不是禮然字音相同又不得曰前所言是條理之理今所言是禮樂之禮究竟無違二字在爾時作何口語作何解説至于宗國魯先君謂宗聖人之國聖人指誰誰宗之宗周公耶抑宗孔子耶若城門之軌兩馬之力則車多四馬所云乘馬也乃欲張大其力而反减二馬何解凡此數條請一一告我候命不俟復與朱鹿田孝廉論論孟書接札驚躍所訊甫一昔而論孟六條捷應如響此在名下有學者每遲遲未復復亦不必得而一昔了然少年既夙悟又且多學此天生異才使千聖絶學于斯大顯北有李恕谷南有朱鹿田德不孤矣昨貽札後客有投予考文者其中有兩考題不能解一是縣季考題冉有與之粟五秉以爲夫子之粟與則夫子設教闕門並無公廪安得有宰財用之人可强請支給且可任意出入者以爲冉子私粟與則夫子止與十六斗而冉子竟五十倍之與之八百斗是冉子未仕已自富于周公無是理矣且冉子不得私與粟也欲私與則不必請既請而再請則雖欲私與亦不得多衒富耶市惠耶抑矯夫子之吝耶此其所失將不止周急繼富一節爲可議也此非夫子之書也一是新學使考題秋陽以暴之夫道德無言潔白者惟行誼分清濁别有是名故夫子稱丈人欲潔其身孟子稱西子蒙不潔又稱狷者爲不屑不潔之士司馬遷稱屈原其志潔大抵獨行自好者始有髙潔之目此非聖德也况白則從來無擬及者惟夫子自云不曰白乎湼而不淄祗以不爲物汚與屈原傳之皭然泥而不滓正同仍是髙潔意曽子擬夫子反不若子貢之如天如日宰我之超堯越舜而僅云潔白非其㫖矣况潔白二字曽見之詩序白華孝子之潔白此但以物言並不以德言也予因大爲憤懣更從架上别覓時所投考文則更有可駭嘆者如有父兄在題據問聞斯行諸則必是義理矣何則子路有聞未之能行皆從義理解也且必是可行不待審别者矣何則以下文聞斯行諸可以聞斯行之也若然則天下有聞義理而必禀父兄而後行者乎曽子聞一貫必請曽晳仲弓聞不欲勿施必請之騂剛之所生此是笑話乃講師不通謂父兄長老之稱則諺云要好問三老以作事言學問無是也縱曰欲抑其勇行則但告之以徐徐已耳安得以長老壓之學問非長老所得主也又有夫子爲衛君乎豈有聖人助拒父者解者曰衛人助公輒故疑夫子亦助之夫君民相助理所應有夫子非是也且衛人助君與夫子助衛君當必有實跡有實據非可泛然讀過便撇却也至于雖周亦助與盍徹乎諸題則在僕亦踟躕不得决集註初以通力合作計畝均分爲徹法既又以鄉遂用貢都鄙用助爲徹法此于徹法原不曽有定説乃又加之以雨公及私一詩在通力計畝並無公私而在都鄙用助則助在徹中此正是徹法安得又有雖周亦助之解此非夢書乎若年饑盍徹是以庶士而受國君之下詢此老實經濟足則真足與則真與反覆急决本明白救饑之法而解者以君民一體混塞之則儒者真廢物矣凡此皆藉即爲剖發無所隱晦即冬日飲湯夏日飲水耆秦炙耆吾炙凡兩可仁義兩可内外者亦須一爲斷定葢八比遵功令必須照集註敷衍此大不得已之事故偶以考文訊及謂八比有礙經學經學並不礙八比今且解經而已又别有訊者論語兩子畏于匡從不知在何地即漢宋儒者皆不能註間嘗與學者論及亦一閧而散或謂是宋地孔安國據莊子謂孔子如宋游匡遇匡人之難或謂是衛地史記夫子去衛將適陳然尚未出境故使從者爲甯氏臣于衛以解此難以匡衛邑也或謂是魯地魯原有匡邑舊稱句須爲匡宰者家語陽貨曽暴匡而子貌類虎故見圍則魯地矣不然虎與衛風馬不及何由得暴然則在衛固可疑而在魯則又與去衛過匡去匡過蒲蹤跡不合若在宋則直以桓魋之難誤匡人矣是夫子一遘難所在尚不能暁何可併及答李恕谷問琴絃正變書來問琴七絃舊作五聲與少宮少商不及二變然亦有二六爲變宮徴者則以一絃爲宮二絃即變宮五絃爲徴六絃即變徴因以五小間作五清四大間作四清亦無不可第五聲合二變當有二戾聲故謂之變今七絃調和無戾聲也且其所爲調和者則先以四五大小間安排七聲夫清聲爲正聲之應必先有正而後有清今七聲藉大小間而調則大小間爲七聲之所自來而謂大小間是七聲之應似乎難通况正清四清皆有限數今以七六五四三作正聲者爲五小間七六五四作正聲者爲四小間然亦有一二三四五正聲爲五小間一一三四正聲爲四小間者則七絃内外皆可相應誰正誰清此恐非四五所得限矣故舊有七絃爲七律十三徽爲十二律之説皆按之不合不如任其自然隨聲正變爲得當葢絲屬人聲不可爲準古伶倫伐竹定聲必以管爲之故十二管即是十二律他器皆無有也曽在福州平遠臺飲次有清客善彈使之倚聲遂以明代郊祀樂郊壇酹酒獻重𤣥句用南音法曲彈之其人信手散彈四四五三七四三便已成句使彈北曲新水令即須用左手作按捺聲矣然則七絃正聲原無七音稍矯强便不是耳答施愚山侍講問公山弗擾書接問佛肸公山二事不得確據佛肸雖見史記然亦只就論語申言之若公山弗擾則與春秋傳全不合即家語史記俱多牴牾此原是一疑案故前儒亦有謂此是瑯琊膠東所受齊論而雜入之魯論中者然宋洪氏又祗以季氏十四章作齊論而陽貨篇不之及僕嘗與先仲兄校論深嘆孔安國舊註極其斟酌而朱氏襲其文祗改得一句便是不妥今足下欲依史記而又疑朱註共執桓子四字謂從史記致誤則兩失之矣朱註此四字不襲史記者孔註弗擾爲季氏宰與陽虎共執桓子而召孔子朱氏全襲其文而改而召孔子四字爲據邑以畔不知共執桓子四字雖可疑而尚有解至據邑以畔則無可解者考虎執桓子在定五年傳但曰陽虎囚季桓子及公父文伯而逐仲梁懷並無公山不狃共事然尚可解者以虎之囚桓子爲逐仲梁氏而仲梁之見逐實公山氏使之則囚桓逐懷皆公山氏所爲左氏作傳全得晉楚二策書而于魯策書反失全册故一往多混詞此混詞也若據邑以畔則在定十二年墮費時經書季孫斯仲孫何忌帥師墮費然後費宰公山不狃據費以畔是時夫子已爲司冦親命魯大夫申句須樂頎伐不狃逐之奔齊而仲由則又身在帥師墮費中焉得有召夫子與子路不悦之事此真夢語也故孔安國但據定五年執桓子事在夫子未仕以前其于以費畔則不過以費宰畔而不必據邑葢既執桓子則共事亦畔共謀亦畔不必據邑始是畔也惟不據邑故一釋桓子便可挾公同盟陽虎公山皆得仍居故位以俟再舉若是據邑則一敗而即當出奔焉有五年至十二年相距七載尚得安然在費者是改此四字不惟經乖抑且事舛論語與春秋傳諸書皆棼然也至若謂史記可據則更不然史記以定八年蒲圃謀弑誤作定五年囚季之役云執桓子而桓子詐之得脱已是悖謬乃竟造一畔費事在陽虎奔齊歸寶玉大弓之後則與五年之囚季八年之順祀十二年之墮費並相牴牾且此時爲定九年而十年之夏夫子已作司冦即有㑹夾谷之事然且十年以前先爲中都宰一年而後由司空而進司寇則在定九年夫子已仕魯而猶召夫子謬又謬矣凡此皆就夙所見而附復若此至考靖難事及傳稿較正另俟陪乗再請未備不又復陸雅坪編修問降一等書連以乞疾減面致同館不諒競傳予于鄉黨篇有異義而其言不實每思洒暴不可得今幸明問辱及正可藉此一匄審察惟恐簡幅不足因取他紙碌續以憑曲鑒日與髙遺山從中左歸遺山對殿陛謂禮文階級次第當從上數下上是一下是盡鄉黨降一等註曰等者階之級也當曰一等階之第一級也没階註曰没盡也當曰没階階之盡等也此在前儒禮註原有之謂士冠禮受冠法一加降一等三加降三等以至于地皆自上數下因以爲言殊不知此非定限鄉射禮主人升一等賓然後升公食大夫禮授食者升一等而後賓降等而受之則又皆從下數上觀士冠禮再加降二等時亦有云授冠者升一等則降是一等升亦是一等大抵下階則上一上階則下一無常稱也盡階亦然自上而降則在地爲盡論語没階是也若自下而升則在堂爲盡燕禮君饗樂工則笙人升階盡等不升堂而受爵是也特予謂降階一等是殿陛相接尊卑相禪中外相通一大儀位故論語于降階處著此位次其言頗不謬而聞者笑之且有展轉傳問必以盡等進言詞陳誥誡爲大非禮者夫䦨階邋級與堂上人通呼吸巳屬怪事而况限之在降階一等之地此非至愚亦必不信而不謂禮文則實有此嘗讀鄉射禮卒射則釋獲代相必升階盡等不上堂而告于一等之間初亦疑之以爲相距止一級何難登堂而搶呼階次以取倍戾既而讀既夕禮啓期則祝者亦升階盡等不升堂而告又既而讀曽子問吿世子生聘禮君薨告使者歸無不升自西階盡等不升堂而告則是降等之地直進告之位愚人之腹必不可以度聖賢之心然且更有異者史記世家載夫子夾谷之㑹是時在壇坫不在殿陛也乃當齊人奏夷樂時夫子歴階而登不盡一等而言其後奏宫中之樂夫子又歴階而登不盡一等而言是豈司冦官卑不敢上堂耶抑亦兩君在階間進告者必竚此耶然則門屏階等各有儀位論語之記一出一入正復于此地著一位次與入門過位升堂復位標作五次非汎汎升降可比此非略知禮意者必不能爲此言而愚山其年亦復以此爲齟齬真不解也若夫行禮儀位則冠禮之降一等而受冠燕禮之降一等而行酳大射禮之降一等而媵爵公食禮之降一等而辭幣授錦喪大記之降一等而受汲受瀋祗此尺級間而行禮要㑹必集于此所謂説禮到是處反似非禮此須藉小暇口謂更悉若等級之辨則諸侯之堂七尺一尺便是一等其階七等此不俟通經人俱得知者設有異趣幸更裁示勿吝西河集巻十八
