body:
  text: 西河集卷二十三翰林院檢討毛竒齡撰箋雜箋陳元龍淮海之士豪氣未除以登邳人屬淮禹貢稱淮海又稱海岱及淮故云習氣未盡也見舊淮志信此則後稱湖海者疏矣元龍淮海之士與徐寧郯人稱海岱清士一類二宋板萬首唐人絶句李白詩天門中斷楚江開碧水東流至此回此是望天門山詩因梁山博望夾峙江廣水至此作一回旋矣時刻誤此為北既東又北既北又回已乖句調兼失義理因為記之浴佛日記三江上吳氏園小集競舉疑義或有舉世説王子敬語王孝伯曰羊叔子故佳耳然何與人事故不如銅雀臺上妓座中悉據王敬美評文以為子敬傷厚則必是刺羊語不然亦微惜羊公清德過盛耳及觀孝標注有云此正墮淚之言始悟其言之委曲也大抵深美極讚而無以自解故為翻激乃有此句此正指墮淚一節耳若云公自佳然與人何關而墮淚如此故不如銅雀臺上妓相向六尺床得迸涕也四大學物有本末以物指明德諸條究無引據嘗讀仲尼燕居哀公曰敢問何謂成身孔子對曰不過乎物物即天也道也則即明德諸條也格物者格此而已又曰仁人不過乎物孝子不過乎物五子虛上林本一賦而分立二名古文多有之書顧命康王之誥魏武薤露蒿里宋玉髙唐美人賦皆是也史記直判為兩時所作至云帝令尚書給筆札作上林賦則請思子虛篇首明列子虛烏有亡是公三人而亡是公又三人之主也兩客喀喀懸詞以待史之誕何至此六用經中字雖稍誤不害自漢以前凡周秦間引經有與本經不謬一字者否行文自有機械引彼就我有不能不更置者而宋人必齗齗于一字一畫之間豈有文章哉七今人作詩以廣輿為行枕之祕遂至僻縣孤壤皆有標識若指點略濶翻訾不切不知古人所見者大名山巨浸泛絓人齒如入吳不逢張子布渡江不識王茂𢎞雖切認無當也嘗記豫鄉雲門與禹穴距逺而宋考功雲門詩山圍伯禹廟靈隱與江亦距逺而駱丞靈隱詩門對浙江潮太湖與七里灘更逺而喻鳬泛太湖詩灘回七里迷如此不可更僕甚者盧綸憶崔汶詩因汶客江西也故首云夜問江西客而中云晴日遊瓜步則在揚州新年對漢陽在湖望嶺家何處登山淚幾行在嶺閩中傳有雪應且住南康又在閩王維同崔傅答賢弟詩為弟客姑蘇也故首云洛陽才子姑蘇客而中云九江楓樹幾回青一片揚州五湖白此九江與揚也揚州初發下江兵蘭陵鎮前吹笛聲蘭陵今常州夜火人歸富春郭秋風鶴唳石頭城一秣陵一嚴陵矣周郎陸弟為儔侶對舞前溪歌白紵前溪屬湖州地曲几書留小史家草堂棋賭山隂墅山隂闕八每欲造仙而每厭其拙他不具論如仙家日月長即唐子西日長如小年一句也故前人詩山中方七日世上幾千年只是日長耳愚者誤會其意撰為王質觀棋劉晨採藥諸説反使仙家日月短于人世拙之極矣亂離晦冥旦明幾時則有中山飲酒千日一醒之譬謂不如急度耳仙何憂患而刺蹙如此審然則廣成安期到今不越數嵗而有唐鍾離權八君且生不彌月欲誇以大椿而反鄰于朝菌欲諛彭而反為殤非拙如何也九人為天地所生而能並天地何也天地能生物天地不能生人也其不能生人何也凡天地生物則全豫其生于物而生人不然必使其人自生之物不褓而藉不持而行不撲炙灌尉而能免燥濕疵厲人有生不抱持生不襁褓生不調水火隂陽而得挺然與物為安全者乎此非天為之而人為之也故萬物因天人法天因天者榮落􅩝革生死動蟄與天為轉旋已耳乃若法天天有晝夜而吾法之為顯晦天有治亂而吾法之為進退因之者我無與計法之者人自為功故曰人為貴此聞之臨陽講次者丁未二月十杜弼與邢劭從東山共論名理鋒角不竭要只人死還生一義耳豫謂天能生人人亦生人古皇之生天生人也羊叔子生從鄰家貌人生人也譬之潦水初積鱗影渴絶而涵瀜稍發噞喁可睹水生魚也託子蘋藻為鯤為鮞魚生魚也故蟣虱在體有自生者有抱蟣虱生者草木之在地有從土萌者有從陳根宿核作甲坼者十一禹州馬端肅家有嵩陽道士能為越方時少林無盡禪師在坐木木無術客謂古多神僧而今影絶豈西來之教非耶師曰吾之教不能使吾有術能使術不及我耳端肅曰如是則神于術矣請驗之道士遍採人衣袖花果而師無所有既而推人入屋壁人魚貫入如壁燭之度影而師推之不少動端肅嘆曰老僧之不見不聞真無窮也此史禹州為豫語十二周櫟園侍郎云金沙王伯陶孝廉順治中上公車至德州城下響馬剽銀缿去塵尚未逺解丁傍徨間城隙二馬馱進香夫婦過解丁熟視驚前曰此某捕也匍匐乞救男子垂首應曰賊多許曰四曰吾病央婦人可矣婦人搖手男子轉向逼促既而咄咄婦人不得已撤面紗去交男子抱貌束絡斂裙男子曰須吾箭乎婦人曰彈可已已而到呼曰吾某捕妻索銀缿者賊曰雄且誰何豈况而牝也四矢並發弰拂之落而以丸摩一人鼻不理遽內其目賊曰竟煩奶奶耶還之德州守饗夫婦有勞或曰此即于七夥也伊姓婦人賣解家女于七後以叛案籍逮不得所往十三小招激楚之結獨秀先些注結髻也謂鄭衛妖女工于服飾髻之殊製足激楚人故令之先進此王逸本注而朱子因之假以此入艾子有不冠拓纓絶乎向閲舞賦云激楚結風陽阿之舞私謂激楚與結俱舞曲耳然二曲併合猶可擬議既觀上林賦鄢郢繽紛激楚結風注云激楚楚舞可以結乎其風也則激楚即結風矣然獨下結字猶未安後讀淮南子曰揚鄭衛之淫樂結激楚之遺風則結直解舞言激楚之舞耳結風亦舞風耳文一字而三訂始合世猶有以妄臆解古文者十四丙申立秋日宿橫山草堂夢石級遺一書取視則西京雜記也中有云長卿入臨卭臨卭女子皆驚曰此間有惡惡客既醒閲記中並無此言十五淮隂侯傳漢王欲召信拜大將是使信拜如拜郎拜尉耳俗以為王拜信江上監國軍拜鎮東將軍為大將設壇備儀注時閣部督師張公國維代監國拜近搬演矣古命將出師原有推轂授律之禮特爾時不然觀傳云信拜禮畢則信自為拜豈拜信乎十六王師下浙東時台州馮蘇為亂兵所殺視同時見殺有未絶脰者魂憑之蘇因名蘇字更生别字再來丁酉戊戍聨中式今見守永昌焉山隂吳履泰太守女早死越十五年其僕女田氏未嫁死而蘇則女也太守疑田氏有詐謂覬嫁奩耳及詰故隱事作書覓舊弄歷歷劵合女故許配同邑祁氏至是祁亦斷姻謀續之女執不可曰父疑我矣今見居果園為尼家人尚呼為還魂小姑或曰履泰向亦為永昌守于山人曰人死不復生質耳若其神明則固有不然者特吳女久而能還又何也商雨臣內君為吳女侄豫時質女事于雨臣所故記此然則世謂無返魂者疑矣十七明崇禎朝宮中有位號者止田禮妃袁淑妃二人餘幸從者名新女子又以嘗居乾清宮後房名青霞室者亦稱青霞女子老宮云十八有承乾老宮云上稍寵禮妃而后以大體抑之妃嘗變製禮服雜備五采后遣禠去又嵗賀妃翟車直入后故阻之止門外須臾一車入則淑妃也時雨雪涷甚禮妃因泣搆上以他事辱后于交泰殿既而悔之特問后起居厚賚而傳旨令禮妃啓祥宮修省凡三月其後上御永和門后請召妃上不應后遽令迎之于是始還承乾然尋病薨其五皇子則薨于啓祥者舊云因册立皇太子日掃宮驚禮妃而妃言不孫被斥又云上欲用廷臣禮妃甫稱霍維華而外之薦維華者適至疑其通外故斥雖事皆有之然修省則不因此耳十九甲申之變宮人費氏為賊出于井紿曰我長公主也以獻自成自成曰主何號耶曰昭仁耳何名耶不應驗之老宮非是賜帥羅甲甲輿歸將婚費又紿曰我雖宮人實巨家女也今幸事將軍請召諸貴客為嘉會可乎甲大喜召諸帥豪飲及醉費竊利刃請甲入舂其喉出請行酒連刺二帥始自頸死瀕死呼曰吾之不得殺自成天也老宮云費嘗給事昭仁宮因次公主幼無封號嘗以昭仁主名之故費稱昭仁若長公主名徽娖封長平公主豈費時偶失記耶二十張給諌言崇禎末汴梁大家多于映壁畫水汪洋滿目又有鏤板印趙州水尺幅粘牆云以厭火災後闖賊與大司馬傅宗堯戰于朱仙鎮宗堯死遂薄汴城圍兩月百計攻不下而城中食盡推官黃澍與巡按御史謀決河灌賊遂決堤三重水大至賊徙營去而城已浸矣急取河北岸舟得二十餘渡人然渡亦無幾河遂瀦洗滎汴間人皆謂前之畫水皆妖云此十五年八月十六日事二十一康熙庚戌淮揚水災髙郵以下湖決二口各百丈許舊制修堤先椓杙水中然後下竹䈾橫闌之竹䈾者以竹器裹石者也忽水底浡發若火之沸鼎者所下杙與䈾皆作灰燼散浮水面不得所解二十二呂絃績云嶽州城下有鐵囊頭五沈水中秋冬水涸即見其製若井字縱長橫短其縱之四梢皆外張長丈厚尺有咫每具約重萬斤圜竅當中宛然囊頭土人指為洞庭君枷水怪者然不可信也一説前代用兵時作浮艦渡江此纜艦之具然亦殊迂且不考何代且亦何罏冶為此二十三呂又云臨清州村落有大姓祖塋栝柏森密集烏鴉萬餘有年矣忽過客仰之咨嗟急詣主者叩曰可賣耶主者怪其不誠謾曰可客遽請值主者復謾曰非若干不可客欣然解槖中金如數豫之遂立劵主者一家大駴隨往塋間視其所為見客出藥一握於塋隙焚訖揮手告别次日則樹無一鴉矣薑凡谷云河間某村亦有此事其家自鴉去後亦無恙二十四萊陽薑仲子出貞毅先生所藏東坡像示豫則儼豫像也腆頥賁嵿黃白其色鼻垂圜根細而鬚朗然或謂坡髯仲子曰汪戶部曰髯不必䰄即關雲長可驗也史訥齋又稱山隂朱嶙攜徐天池像亦似豫豫文不逮二公而兩與相類可謂顔厚然厄則與文長差不逺耳貞毅先生名埰以諫戌宣州死仲子名實節二十五薑仲子僦吳門藏管夫人硯緑石徑五寸橫半之厚如橫池子與面若兩環互抱而面侵于池其蝕繡黝澤往往四射豫嘖嘖久之仲子遽邀豫過鄰家觀宣和紅絲硯按博物志載天下名硯四十有一以青州紅絲石為第一而宣和尤紅絲之冠也質瑩甚而朱紋隱起上如紅羽下如丹葉故又名朱雀瓊花仲子云初吳門陸履長孝廉名坦者其家得此硯時以綵輿鼓吹迎歸每嵗時祠硯帥子姓盥獻成禮故彭城萬年少有祠硯圖圖子姓男女長幼傴僂歷歷而婁東吳學士雲間陳黃門皆有詩歌記之今已兩易主適所藏者錢氏耳豫聞之愀然嘗欲賦以詩不得因漫筆此錢氏字我安隱者也亦字臥廣時乙卯臘月初六日二十六往見李少宗伯于豫章酒酣語崇禎末議南遷事宗伯曰爾時主之者惟李都憲與豫二人他無與焉豫嘗面爭曰易言遷國書誥遷民唐世再遷而再興宋室屢遷而屢復諸君安諱遷哉時熹廟懿安后與周后亦稱遷便懿安嘗曰南中我家尚可居惜政府無力持之者一説懿安惡延儒言遷在上前極詆毁之則此時政府無延儒矣記事之誤每如此二十七虞書帝不任鯀而嶽曰異哉孔傳訓已止也説文訓已舉也蔡傳則從而兼收之曰廢而復舉也夫一異字而合廢舉二義通已已二音世頗疑之豫謂異字上已是止下廾是舉蓋廾者舉手也則宜兼二義矣若已音同已已音同已則古文盡然見豫答王履庵書二十八曽一日觀唐畫二一王維畫不知何圖與世傳輞川筆墨差類一大李將軍思訓畫名御苑龍舟圖又名御苑採蓮精細生動人長分許而意態具衣粉凸厚皆剝落而夭冶轉見其山水林木樓臺略涉疏野然工而彌逸則其遠勝小李者也或曰唐畫當識絹其絹如版松玉色不辨絲縷初視之疑金粟山紙張丑曰唐絹率熱湯細搗練如銀版其不能偽以此耳二十九平西額輔搆園亭于吳即故拙政園址也因舊為之凡長林修竹陂塘隴坂層樓復閣雕坪曲圮極崇閎靡漫之勝豫入觀時方籍入毁拆非盛時矣然一步一境移人性情但記其一名楠木廳者大槩九楹皆楠木所搆四嚮虛欄洞槅軒敞髙闢中柱百餘柱各有礎其礎縱橫潔量通約三尺而髙齊人腎墨石如鑑雕鏤之巧龍盤鳳轉錦卉錯雜詢之皆故秦晉楚豫諸王府物而車徒輦載所費不億不足則復取具區石購工摹倣以補之其奢麗皆此類三十可參上人講法華普門品福不唐捐以唐訓空言福不虛棄也意莊子求馬于唐肆義亦如此小至日記三十一越中閨秀以祁湘君徐昭華為最二人為從母兄弟其母夫人皆商太傅女一祁中丞夫人一徐大司馬子婦皆閨秀也湘君年長倍于昭華豫曽于其初婚時作催粧詩今二十年矣昭華年小好讀豫詩因以師豫其人殆天授過目成誦落腕成句二人才分固相埒然昭華不可量也豫嘗貽杜陵生書曰晚得一女弟子能為唐詩近詩已能逮韓劉間過此非所料杜陵得書每每示人以為佳言回友箋東林非黨也有抗東林者而黨始名然而不敢顯居于抗之者也于是甘于抗東林者必文曰中立夫使抗之者之不敢顯居于抗之而乃曰中立則東林尊矣今之抗王李之文者亦然明明詆其文而不敢顯居于詆之之列必文曰都不觀某某兩家之書則其文益尊矣吾之抗王李不如是必極觀王李之書使彼肝肺顯然一無所逃而後乃坦坦白白而上之斯足貴耳不然是欲以暗昧勝之也暗昧勝之非勝也若來旨云東林容有小人抗東林者必無君子文或稍異是耳二爭文者要問其所爭為何人假所爭者為班固為劉向侃侃持議夫亦誰敢非之然班劉則不爭耳吾不能班劉而能班劉之不爭孟之反似君子非與三文貴百變無容一是徇固不得何有于爭且爭最叵用苐曰爭則行文便有如許不平之氣久之即不至爭文而其不平之氣猶在也嚴顔曰斬可耳何為怒也此最妙語足下念此可已西河集卷二十三
