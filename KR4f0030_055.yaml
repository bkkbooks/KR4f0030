body:
  text: 西河集卷五十五翰林院檢討毛竒齡撰序三十二湯潛菴先生全集序豫避人睢川值潛菴先生以關西參政請十旬假就之論知本之學與關東賀凌臺先生知本説合因留睢半月且屬豫記其太夫人殉節事既而舉制科與先生作同年生且同入史館遂得辨前代得失并古今禮教名法知先生裕經術外擴而中堅體用咸備真所謂應元運而興者天子重其學進青宫保傅兼領參知入東閣作宰相判事遂以春官侍郎開府江南使揚歷中外為聖朝儒術之冠豫乞疾南還過其境見關門坦坦然農安畝而估習市武吏與暴客刷迹而徙閶樓夜鳴瑟遊媚貴富皆嚮晦闔外巷豫顧之嘆曰儒術之效如此耶乃未幾還院補冬官尚書而驟遭棟折先生且騎鯨矣其在今距先生捐館舍將二十年而京朝先後思之者如昨日江南之民一若服稅服雖相隔多歲月而偶然斂衽必哭泣因有慕其人稽其事願讀其所遺書者聞河撫閻君曾為梓其集而未備也王子孝先者先生門下士也家世習理學早歲見知而授受親切其視扶風之于北海不啻有過然且筮仕吳城正值先生所屬地遂輯舊集所遺軼購其全捐奉而付之剞人而以豫為先生友并具書幣屬其同門生沈子昭嗣踵豫寓而請豫以序夫世之所謂三立者謂夫德與功與言也而實則一立而無所不立古未有聖賢而闕事功者況文章乎即宣尼抱至德每傷世之不我用而退而著書然而書既成而聖德愈顯且有讀其書而謂功在萬世雖堯舜莫能過則是文章之無間于德與功也先生踐履篤實務為善去惡以求慎獨而出而應世則入參宰執出領方州明明有實效見諸成事此其功德為何如者而即以文論與子言孝與臣言忠不必飾講席之迹而發言中道不偏亦不矯其為羣儒之所取正者何限然且言議慷慨周旋政事堂多所建白而至于外臺入告則請賑請蠲尤極剴切嘗曰吾受天子命以出為民吏目擊恫瘝即過為激鍥寧得罪死官下亦何敢緘默負天子命而天子神聖亦即以是優容之然則先生之言其有繫于世如此若其髙文典册揚廟堂之盛則綸扉判詞槐廳起草舉凡應制應試之作往往而是夫既已舉于春官槖筆三館而復登制科膺鴻儒博學之選則文可知已孝先輯其書復為編類曰語録曰奏疏曰序曰記曰書牘曰賦頌論辨曰碑版文曰雜文曰告諭曰詩詞而總附年譜志狀于其末嗟乎世之求先生書者可以觀焉東臯詩集序宗藩輔國將軍博問亭稱東臯主人詩有髙其格間其辭藴其氣依約其意旨而均調其音聲在三古謂之雅在兩京謂之休成在魏晉六朝以後即謂之清和謂之善平謂之登歌上詞此即都尉屬國降之逮晉唐作者猶自歉難能而東臯主人優為之嘗從施侍讀愚山汪編修鈍翁陳檢討其年輩與東臯主人唱和每唱輒自愧不及不敢和録其詩而歸迄于今越三十年天下誰不知東臯詩者然而見其詩恍旅舍對千頃陂恍過江市人逢衛洗馬恍長安安樂坊觀海外玉樹即偶然觸及亦覺私顧形穢而東臯示我渢渢然吾何以測其涯涘也乎文章五百年一興皇上以經天緯地之作彪炳萬古而諸王龍種皆能各攄其所長以互相映發光天之下斯文且爛然矣獨是長安高髻時多異尚髙文典册往往間雜以句欄小曲私誇新樣而東臯獨軒軒自得每倣御製豫和以滌諸佻璅􅀈翕振之作清廟明堂之盛大海蕩蕩水所歸吾無間焉惜豫年八十有一生平論文者百無一存即愚山鈍翁其年輩皆先我而逝而每憶東臯比之膠之結于腸長庚之遠附于陽烏即中夜念及亦若隨之在後先而不踰寸步是非深有感于心而何以至此蕭山史氏世譜序豫與昢菴覺菴兄弟訂同硯交因得拜其尊大人兩世于堂而其子其姓即又從此而齒遇之迄于今往來不絶如家人此猶之親親之典由一而三由三而五以一身而得與五族相周旋況乎四親在匰其當前可見有非一三五九所得而概量者乎是以宋世造譜最重生人往往懸譜而録其可見者于亭名族譜亭而其既漸溯所自一如氏族志之統諸著姓以力搜往昔于是有非所自而自者而譜法變矣今天下氏族之盛無過史氏往者吾郡司刑從溧陽來訪昢菴兄弟而序為雁行而鼎革之際有東閣部堂開幕揚州者以摯幣聘覺菴稱曰宗仲而覺菴辭之當是時文章聲氣遠近無不通而凡氏史者則又以同宗故時相訪求其在明州與姚州則原屬本支公之讓而私之燕東西相從不待言也昢菴嘗謂豫豫家世譜詳今而略昔詳于是邦而略于異地顧四方之逺居者仍呼吸不隔而惜譜不修世系之闕略有難稽矣今其孫吉先承祖父志合逺近而並修之肇自成周受姓以來當漢孝宣時杜陵侯以帝戚開基傳襲五世及東京而溧陽侯繼之遂以家于封而世滋大焉至南渡以後則忠定越王與忠獻衛王兩世知政事散處東鄉其在蕭山則忠獻五世孫也乃自漢至今歷年一千七百有竒歷世五十有七而自元明迄今由明州以至蕭山亦歷年三百三十有竒歷世一十有八然且有參知行省開藩于河南山西若蕭之第五世者其自兹以往被簮紱而長方州且不乏也夫往昔難稽而譜之序之者前後無闕若夏之繼春而甲之授乙當前可見而譜之記之者生卒不爽一似太史之載䇿書而宗祝之判昭穆且復區畫有方詳略有法分之合之以不失列代相傳敦宗睦族之意向使吾友尚在亦必以是譜為不刋之則而況乎後此之繼之者也然則譜法雖變其不變者猶是已丁茜園賦集序賦者古詩之流也惟原本古詩故在六義之中與比興同列而實則源遠流長自為一體班生藝文志于歌詩之外載賦目千篇而惜其文之不盡傳也乃嗣是而降孫卿以規宋大夫以辨王褒揚雄之徒或以諷或以頌要不失六義之凖即六季佻侻猶然以緣情體物之意行之至隋唐取士改詩為律亦改賦為律而賦亡矣登髙大夫降之為學僮摹律之具算事比句範聲而印字襞其詞而畫其韻既無慷慨獨往之能而稱名取類就言詞以達志氣亦復掩卷殆盡本之亡矣流于何有丁子茜園胸有卷帙其于載籍根柢多所究竟故為詩為賦皆一往奮發有自得之致循其流而溯其源滔滔蕩蕩因之取賦體一卷屬豫論定豫嘆世之學者畏難喜利寧謝隆古必守挽近不惟詩不知古舍格為律而即其為律之中猶且闢景開而習和慶而況乎賦才特上煒爍縱橫誰則能上備援稽下工攄寫者而茜園揮手而成之鋪文揚質以方之矜宋元之詩襲試場之賦者何如也吾故曰賦者古詩之流世之見之慎毋以詩律律詩并毋以世之言賦者律是賦可也𢎞道録序孔子曰人能𢎞道謂夫大其道之在乎人也而特是道之為名言人人殊惟中庸以率性為道則始以天下達道屬五常之性而孔子答哀公即又以司徒五教稱五達道是必合五性五教而道乃立于其間是以向溯五教祗有父母兄弟子而無君臣夫婦朋友有天合而無人合而孟子則直以君臣五者當之曰人之有道也向辨五性或以一恩二理三節四權表明倫之則或以元善嘉禮利義貞信著盡性之要而孟子直舉五性而歸之五教曰仁之于父子義之于君臣以人性合仁類而曰仁也者人也合而言之道也則是道之為道已如白日之昭于天下而無如拘牽輩起刻舟以求門內多掩恩而門外義合有理無志致使親義序别多泥于一節而不能周通至道在人其不能𢎞也久矣𢎞齋邵先生儒者也由八比起家而以𢎞道為已任方其入解即以赴部舉人上武宗皇帝疏約二千言及成進士而世宗入繼又復上陳八事及中興保治諸疏然後授冬官主事使𣙜荆州當是時朝廷甫議大禮廷和與璁蕚各持異端致撼門哭廟天地皆震動而先生方拘于官無一言也暨再補都官員外郎則正值璁蕚被劾去而復留之際先生乃于十月日食假災變言事直斥璁蕚兼有禮守可變禮成可毁諸語攖世宗之怒遽下詔獄發邊逺充軍不復賜環者越三十年其于道也亦幾矣先生以為既不能行道以𢎞道亦當立言以𢎞之乃著三𢎞集曰𢎞道曰𢎞藝曰𢎞簡藝者文也簡者事之册也而總以𢎞道為要襋蓋其録五教有鑒于明倫大典之誤而亟亟以道正之使教之與性互為經緯或以性該教則以一經包衆緯而有餘或以教配性即以一緯分衆經而亦無不足取説于六經而實之以二十一史之事一篇之中三致意焉乃文孫戒山先生亦以八比起家既已成進士讀中祕書出之為江介宗師抑復以力學舉制科重侍講筵作東朝保傅于以揚世德之駿誦先人之芬豈復有愧乃校𢎞藝𢎞簡録而續其未備而至于𢎞道則踵事增華隨類加訂其引據既該博而考辨論析往往折羣書之奧執兩用一必至精至當以補前人所未盡此固古今上下闡明性教一大録也會天子念河功未成特簡先生理南河于負薪之餘重為檢校既已成一家之書而復刋行之為天下後世所矜此其于道為何如者夫道之藉人也甚矣曩者孔子言道中庸闡之然祗以性教言道已耳其後七十子之徒各祖前説或推五教為十倫而隨舉一倫輒曰仁者仁此義者宜此禮者履此貞者信此則已一倫而得備五性或廣五性為十義而祗舉一性即曰父義子義兄義弟義夫義婦義君義臣義則又以一義而得具五教是𢎞道一書固祖七十子之徒以為説而前聖啓之後賢擴之顯祖作于前文孫述于後夫𢎞道之在乎人有如是矣擬元兩劇序蕭山王叔盧曾譜唐人事擬元詞兩劇吳江沈長康見之謂不合宫調令其改作及改之而仍不合乃亟商之豫謀再改而叔盧死豫時哀其志私為更定其詞藏之城東之草堂未行世也會白頭兵起掠豫廬而胠豫篋去遂失稿所在若干年矣嘗夜卧嵩山土室夢叔盧來曰豫詞寄君所藉君竄定而稿未見還不能忘醒而泫然謂才人習氣自愛其所製雖魂魄猶戀戀顧無以報之如之何康熙三十年豫歸舊廬聞鄉人有得其稿者急遣人購至故紙儼然獨闕首二頁時豫痛經學晦蝕日疏衍不暇且悔幼嘗為詞損正學思壞所刻雖亡友叮嚀擬亟行而尚有待也暨四十一年遘大疾幾死死時仍夢叔盧來相對咨嗟且曰脫不幸奈何一似慮子死則其詞偕亡有不及待者因中夜坐起重為檢校且補綴前頁而梓行之豫思曲子仿于金而盛于元本一代文章致足嬗世而明初作元史者竟滅沒其迹並不載及祇以仁宗帝改造八比為元代取士之法以為崇經義而斥詞章可以維世而不知記事失實已非信史且經不嘗録國風乎男女相悅或不盡如朱子所云而懷思贈答溫柔宛孌以之陳忠信之道通君父之情不必二南即是十五國即非也況樂府科例不盡輕薄以後人譜前人事豈皆淫濫聞叔盧作此一傷蓮勺之棄故劍一慨武成主者並不識司空氏族皆有為而發原非泛泛即其間優遊按演動中窽會前儒所云言情深而寓旨切忠愛悱惻兩皆有之然且下筆髙卓摛文浩蕩于以方前此為詞未敢謂龍笛長鼓子短也夫文章之事難言之矣曩者靈均作涉江懷沙慮其遺亡乃于晉咸安之季白晝見形向吳人顧珏自為誦之夫才人之愛其詞獨叔盧也與徐沛師詩序昔嵇阮與王濬沖父子同時入林後之以名士而訂世交者率稱林下而豫與世臣先生訂交在崇禎之季其時趨庭者尚有待也乃既而與武令交又既而與沛師交皆相嗣以文章往來較之安豐末坐徒以談義相把臂似乎有過然而交武令而武令早世及交沛師則又以豫還山晚在沛師亦非盛年而豫竟頽然老去屈指崇禎已卯與先生角試場文真隔世事也乃先生高蹈早隱牆東而沛師亦復以歷試偃蹇有睥睨一世之意遨遊四逺藉登臨贈答作詩古文詞而間以示豫夫徐氏有家學曩時鄴宫諸賢稱偉長之文為一家言而士秀父子又以駢詞擅世濟之盛先生自棄試文後著書數百卷嫓美前哲豫嘗銘其墓而嘆其似續之𢎞且大也沛師讀父書其于辭賦諸雜文無所不工而即觀其詩蓬蓯燁煜奮筆而直前所在辟易世之以習俗為轉圜者其敢與之爭衡也乎特是歲月易駛向之論文于崇禎之年自已卯至甲申往來主客而今又復遭其際星紀一周存亡兩世雖欲不為之興感而豈可得焉韓邑侯生日序嘗讀豳風七月之詩嘆豳公以儉德治民為八百開基猶且羔羊朋酒公堂躋饗受介眉之祝以為父母于民其饋食之節所不廢也邑侯韓公自下車以來廉于於陵日啜蕭山一勺水以度朝昏即一蔬一菜必不苟入之官厨以故四民引領祗盼公生辰以稍伸饋食之私而公于是日亦始怡然舉一觴以為歡則是民之懸懸此一日非易事矣獨是稱祝之頃必有致詞而豫以齒長于衆必請豫一言為捧觴之藉豫惟古稱三夀上夀夀國其次夀民其次夀身以故前儒作夀域碑謂大宇熙熙四衢坦蕩舉生人子婦而盡登之春臺之間風雨不能蝕矢石不能壞夫然後身享永久無拮足瘏口之患今公于四民寧袵席而長養之庇以閈閎而授之扄鑰民之域之祗覺化日之倍長而恩年之倍永也夫上施以德下報以心心不能達則口以達之未有上施如是而民心如石不能報之以口者是以尊之呼嚴君親之呼慈母而未已也蓋民生多端生以食而道不飢生以衣而嘆不寒生以煦咻而始無鞭笞獄訟之嗟生以捍護而然後無水旱盜賊兵刑水火之告故仲尼至聖亦有歌詞子産大賢不廢輿誦以為報也今則何以報之哉吾仍考之豳風之詩夫千百為期人世罕有而豳詩之頌之者且曰萬夀誠以心之所至口即隨之心願其永久則不覺其詞之迂而語之過蓋施報相等古人所以云報稱也施者不訾而其所以報之者祗一言語間而尚或有吝則豈斯民之本心也哉他日公年果髙民年亦進京朝需人必將以公為天夀平格之選則即此夀民之盡于以夀國且有餘而況于身與盛玉符詩序少選越詩越無多詩人也既而作越州三子詩三子之外往來唱和者仍寥寥也及避人吳中吳中人藉藉稱玉符盛子所為詩豫亟索觀不可得暨乎赴都同館沈學士道玉符詩佳時老友西疇在坐實其狀豫于始歸田時作還町雜録覓得其詩會玉符以祿仕司鐸大雷不數數相見顧以數十年相憶之人經南北諸名下耆舊嘖嘖之久而朱顔茂齒年尚在強仕服官之間然後知玉符之知名早也獨是詩至今日爭以南渡陋習加三唐之上庸劣俚鄙自以為能夫以前人所品目阮生優緩猶病簡率劉楨錐角便訾割曳陳思勢隨情減伯喈意盡行間彼其聲望卓犖偶有所見已空絶前後徒以檢校偶偏之故遂多優劣何況今日之紛紛者而玉符獨慷慨任氣磊落使才挾清潤之姿而行昭晳之致結體撰詞全歸風雅此豈時流所得嫓與玉符家有别業等于蓬瀛而近復啓教于方城華頂之間擁臯授經望若神仙則自此以往其為槐堂所頌獻者又豈止學士稱嘆已乎西河集卷五十五
