body:
  text: 西河集卷一百三十四翰林院檢討毛竒齡撰填詞四青玉案渡江有感夕陽江上丹楓暮看車馬紛無數當日西施從此去城山出海樓船近岸中有更衣處平沙十里長亭路空留得花如霧最恨江流流不住暮潮初下午潮還上今古西陵渡其二片帆絓處蘆花白痛年少經兵革庾信江陵歸未得教兵城下髙遷屯畔一夜寒濤坼東來西往看如織問誰是當時客睹此芒芒百思集素車何在烏鳶散盡猶有人霑臆瑞鷓鴣和姪阿蓮梨花嚲鵲驚春雪栁曲迎車怯曉風檻外蝶衣籠畫粉樓頭鳯蠟瀉珠紅燻迷銀葉憐粧坼露壓金槽滴睡濃無奈景陽鐘隱隱數聲和月到簾櫳其二春還繡陌桃初落日映璚綃幕半遮黃點額頭花勝結紅抽靴子蒯繩芽妬蛾筝合矜秦趙細犢車香繞狹斜空有侍中誇易識難忘一笑在東家其三吳娃窈窕裁芳紵楚竹參差聚列星歌扇影回屏半褶舞裙絲挂箔頭釘觴迎水曲翻龍㔶車轉花梢動鴿鈴天上舊曾聽鼓瑟歸來幾度暮山青其四董賢館外驕騧騁班氏門前冷鳥啼湘浦芰裳迷蔡北秦臺蘇合出烏西針縈鸞縷愁丹纒燈滿蠶塸怨赤蹄難與故夫擕束素重逢但唱杞梁妻踏莎行題梅市香奩集後寶扇橫時玉堂深處開奩齊唱金針句漢陽少婦解璇璣孝標令妹工詞賦鬱草名金栁花成絮滿闌種就珍珠樹欲聽緱氏海西謡須尋仙尉江南路小重山麥壠青青菜壠黃野棠花滿路日初長誰家女伴鬬新粧蜂來往刺得口脂香三五映垂楊見人還却步背方塘小姑不解斷人腸看花落又看浴鴛鴦前調鞦韆詞繡柱紅繩曵彩雲雙雙懸畫板對斜曛風吹襪子小鴉分重扶下低繫水羅裙天際映虹紋拋來香帶薄繞氤氲空園人散欲黃昏驚鴻墮花落自紛紛前調尋鎦氏姬人彈琴時正學織縑催促始出坐後彈幽蘭操指弱苦絃逼又私顧坐人每彈多誤頻視指爪云為翦鑷所傷賦小令即事讀示之花裏重尋趙璧彈流黃朝日映織初殘停機暗下理雙鬟調絃請莫是喜幽蘭絃澀苦難安機絲曾裂指沁心寒思繁錯記寫離鸞彈多誤頻脫指環看前調青鳥銜來雙錦鱗背人佯撇下小重茵口脂紅淺浥香津緘題處印得指螺新素字小泥銀簮花新樣巧衛夫人鴛鴦格子剪江蘋波紋細恍見淚粼粼前調一過東湖深又深石橋啼不斷午時禽栁黃曾壓絞兒金雙朱戶流水晝沉沉有女暗相尋紅衣羞淚濕洗前襟東風吹放小桃心吹難住吹落滿庭隂調笑令馮二蘭陵酒壚江縣前壚頭小妓名阿絃粧成好咏晚桃曲手持雙帶黃金錢金錢綰帶隨手斷願絓銀牀幔頭蒜桃枝本是紅紫枝翻作當年栁枝怨怨怨栁如線青漆鴉頭紅脰燕背人偷弄金條釧一曲桃枝相戀落花飛滿春江面飛過春江何限前調胥苓弟張玄小妹閨房姿傾城能作顧兔詞孤鴛文彩本相惜只憐花鴨難求雌幨㡡熊熊燭光動誤泛桃花到花洞天青地白何所關愁煞江郎對牀夢夢夢晚花涷小妹閨房原解誦窺簾偏愛求凰弄恰是琴心難動琴心裊裊春風送豈是琴心難動前調真珠洛下排銀觴停絃暗呼紗帽郎金鈿花合入侯幕重逢仍在光延坊光延坊南泰娘路别住街頭有樗樹傾觴一顧十載心化作片雲無覔處處處繞飛絮紗帽郎今何處去章臺折盡長條樹樗子街頭重遇玉瓶金盞燈前注愁煞夜烏啼曙臨江仙沈康臣生日席上作五月海榴紅照眼美人初佩丹砂金堂綺席啓朝霞暑衣裁葛葉氷碗浸菖花賦就子虛將入奏漢庭狗監先誇秋風錦石動星槎但懸金似斗那羡棗如瓜其二細結五絲仙勝縷屏間艾虎交懸願郎如虎復如仙山公曾典簿四十正當年男子生難誇萬乘也應日數官錢他時花拂錦連乾欲看三島雪更泛五湖船前調送董琴菴司馬之任汾州紅斾逺迎汾上路樓船還賦秋風兒童騎就竹蘢蔥塞煙含栁碧關雨墜楓紅漢相江都三策貴勿需司馬軍容琴臺撤幕敞芙蓉髙山千萬疊流水兩三重前調贈任石友初度記得蜀葵花發後一樽長對花前鳴鳩初拂杖鄉年紫􅩁開碧篠丹竈有青蓮十畝綺園還自賦彥升當日詩篇玉鉤金犗釣魚船枕來滄海外潄向赤城邊蝶戀花蠟子櫻兒飛緑鵲午睡裁醒倚遍雕紅藥青映逺山回雨腳殘虹幾暈胭脂削滿院繁花看漸落日暮風生片片吹來薄粘得斷絲絲又弱重重絆住鞦韆索前調日暖穠桃紅照水粉蝶飛來水上銜香蕊映水雙雙低復起影貌也在花窩裏後缺唐多令嘲栁貌隋苑覆依依行人迷又迷風前空惜好腰肢待得長條堪作線蠶箔下又繅絲折盡渭亭枝年年送别離滿欄空自撲人衣待得飛花堪作絮交領下暖風吹江神子送栁兒紅亭細栁碧條條解輕舠渡春潮沽酒簾低春色滿河橋送得栁枝南浦去人漸逺楚天遙臨行重繫緑絲縧拂花梢望迢迢栁絮飛飛偏惹柘黃袍春去那堪還積雪點點下未曾消前調花銜日色栁銜煙畫樓前水連天緩櫓輕歌鴨嘴小娘船新載搖郎湖曲裏不願取渡頭錢前山深樹有啼鵑恨年年未歸旋紅板人家猶自挂鞦韆日薄餘寒春又晚溪路逺草芊芊祝英臺近畫欄低斜日暮睡起甚無緒蛺蝶遊絲陳陳惹飛絮是他梅子生心櫻桃辭蒂著甚箇五風三雨隔墻樹聽葉底鵑兒不住呌誰去看又黃昏寂寂閉朱戶夜來明月何如幾時回顧記不出初三十五滿江紅商兩臣彈琴作猊火初紅抱緑綺夜堂三弄漸秋老亭臯木落晚雲流涷紫稗霜田翔寡鵠碧梧涼葉棲雛鳯似蘭娘峽裏聽流泉當時夢幾曾是商陵痛何須作雍門慟但前軒月下手揮目送三尺氷絃看似雪有新聲迸入鴛鴦綜恰七條總似一條絲絲絲動前調施愚山憲長招同韋劍威六匠陳集生張南士徐伯調平載問過嶽王祠觀宋髙宗手勑用文待詔王弇州韻第六橋頭四望裏水青山緑栁隂下幔舟艤岸管笙低蹙過雨晚移東嶺盡清鐘午度西林曲趂紅裙同拜嶽王祠間追逐雙熊仗排花谷交螭字橫荒麓啓玉函珠璽鳯鸞飛簇漫道明湖春去久聽子規尚呌南枝木痛玉毫散寫作南枝枝枝矗玉漏遲白門張修崖京口吕錫馨逰越同人公宴于右軍祠下即事右軍祠下路勝友髙朋一時雲集修竹崇嵓遙想蘭亭當日車轂驟如流水交履舄滿堂笙瑟何處覔華鐙影裏管兒歌澀蚤是千里相思更命駕能來四愁都釋南國佳人邂逅相逢車笠梁苑鄴宫難再金樽滿倒傾安惜漏轉急今夕不知何夕滿庭芳公望遺甡以潞國之琴漢室淮南藩封澤潞紅絃久擅空桑㩦來海甸寶匣散珠光碧軫瑶徽璣額龍門樹斫羽鏤商人傳是乾清供奉曾遣賜諸王崇禎題歲月橫紋印緑蘇帶流黃自王孫散去淪落江湘故國軒懸何處燒桐好付與中郎誰知得紅絲繫足還是舊宫粧前調海燕爭春城烏啼曙叢叢花滿闌干虹梁日照碧葉露初乾昨夜新衣裁就薰籠暖翠簇紅攢頻提視羞人難著只説曉粧寒長干西去路春江鴨緑新水漫漫蚤青牛朱轂駵馬金鞍江畔垂楊萬樹風吹繞貝帶斒斕粧樓望翩躚水底疑向鏡中看前調夀諸耿衣五十紫嶠鸞飛銀河鵲去南園長抱金巵蓮塘晝暖花影散紅衣種得兔頭新熟間吟望繡滿町畦扶瑶瑟佳人醉擁日照畫欄西回思當日事雞壇會鼓鶴市吹篪難蹉跎隔歲屈指俱非但對百城圖畫家瀕海有友安期憑酣飲朱顔未老翹首絳雲低前調聽商生徴説彈琴永思樓微雨涼收風翻橡葉女墻斜點三星永恩樓上躡履暗中聽何處瑶琴初發珠簾外流水泠泠停聲久千崖忽墮元鶴舞青冥汾亭遙奏後簫憐秦女瑟怨湘靈奈晚風吹角秋雨淋鈴此際琴心到處東家女誰在銀屏屏中睡今宵無夢有夢也應醒前調沙緑妓一名沙六商氏姬也度曲稱妙一時既乃為尼于果園名谷虛矣亡友祁兵憲姬弱雲初北里有名兵憲亡後從六云甡飲桐音齋詢其事賦得長調金秉叔和歌焉石氏懸樓王郎開閣傷心睹此芒芒上宫碧玉本是舊名倡繐帳空懸日暮西陵下幾曲滄浪如何地漳臺望久回首見空王雙雙尋侣伴幽吟梵磬倣佛伊涼把楊枝滴露暗洗朝粧滿目天花散盡雲牀冷夢斷髙唐褰簾坐水田衫子不疊舊衣箱倦尋芳寄駱叔夜明府渭南萬里三載㩦琴人誦亷潔為葬慈親歸卧溪山别業道逺勿辭髙士弔哀來時涌丹徒血苦思君又蹉跎相失暮秋時節遊望冷薔薇洞口絲竹蕭條逺過前哲兔苑雞場還攬舊時英傑草暖吟成樊水調花飛夢散華池雪聽西堂幾何時又鳴蜻蛚桂枝香薑桐音芳樹齋留别去冬冬至剛雪霽梅花山樓殘醉兒女燈前感歎宛如夢寐春來重訂王孫約竟淹留又攀叢桂青陽下榻玄霜解纜頃刻間事念晨夕盤餐並對更寒雨雞鳴暖風花墜巴里聨吟古調遜君佳細雲門舊誓尋難度頓陽關衰栁搖曵幾時還看賓鴻萬里碧天留字喜遷鶯祝贈錦堂清晝恰瑶盞傳來玉荷開後齊岱基祥甫侯嗣懿盛世相君遺胄皇覽揆豫初度看綵鳯翔雲岫况世載有千金一字國門之購前侑歌緩處脆板清絲花下排紅豆竹秀聨吟波流送羽觴詠蘭亭依舊當日醉鄉何在教好女揄長袖恐有客飲淳于一石與君為夀長亭怨慢賦得春日凝粧上翠樓和葉蕃解春已暮畫奩頻啓朝日穿來又在眉際􅫰粉將施彈綿先拂鏡兒裏木瓜漬了又添上新紅子為要好情多還則向傍人問箇勻未晝長繡褶暖換却篩羅淺綺薰嫌石葉疊下鬱金細細臨行道履線將殘踏不得樓頭新􅖯誰曾顧樓前樓外暮春餘幾念奴嬌集張登子南華山館蘭亭秋暮眺晴原並到南華山墅畫檻橫塘看兩岸多少斷紅殘紫鼇禁當年鷺車昔日休沐時來此蒼梧頴嗣至今長讀秋水間備彩纜青絲玉壺㩦酒處錦鱗鮮美吳下阿蒙何日至相對鄴宫才子舞鳯雄圖放龜遺迹衰栁頻低起耶溪相望不知去幾何里前調示薑芑貽留别謝庭玉樹乍臨風搖曵烏衣巷裏何處羊車還洛市皎皎雙瞳如水洗馬清神黃門雋格少小能文史玄亭問字慨然逢故人子相對芳樹髙軒青鐙殘夜淺流螢娓娓轉盼河橋解纜去搴盡江皋蘭芷燕翼堪憐鳯毛有待西水浮新芑春陽努力眼中吾且老矣前調為白孟新仲調母夫人夀闕白下嘆何人不識白家兄弟長者賢良方就辟仲舉孝廉相繼有母年髙北堂娛養萱樹長芬斐及時捧檄如君孝弟能幾幸遇八十華辰稱觴逺近各具登堂禮曾讀前朝黨錮傳二白齊名杜李滂母賢哉從容告誡籍籍盈人耳風流無恙百年今且伊始春從天上來擬昭君詞送友出塞河水東流看萬里寒風塞外驚秋誰遣傾國逺嫁邊頭辭鳯輦下龍樓記臨行上馬賜與錦帶共箜篌卸宫粧向深深毳幕徐換貂裘平沙那堪曉發似露下長門月墮金溝滿地燕支萎紅枯紫巧勝畫筆塗勾羡年年塞堆歸渡海岸與沙洲願仍還上林舊宿同呌更籌花心動寄大敬蝶裹花幱微雨後深苑荆桃如菽紅粉堆邊露琯氷筝並起是誰華屋楝花風發前村暮空巖畔有人如玉牽蘿罷天寒倚遍一庭修竹私唱開元舊曲見林外春紅暗翻秋緑昨夜驚烏夢裏還啼向日對筵蕉燭玉猧盤地銀絲繞吹松粉墜來金粟那須聽黃公鳥聲斷續西河春後雪衫兒因甚難熱緑叢啼鳥聽吹來嫩簧小舌可憐榖雨是明朝又當花謝時節翠蛾子誰與貼雀花鏡裏誰折珠娘西去唱楊枝怨歌幾闋長干斷處苦相迎桃根桃樹桃葉枕屏疊下三四褶攬流蘇帶子雙結枉對金釭明滅但轆轤井上咿啞相接恰夜烏城頭啼歇望海潮越中懷古同秦淮海韻東南都會會稽形勝居然晉代風流宛委赤書蓬萊紫氣天連星宿牽牛佳境任優遊向山隂道上秦望峰頭萬壑千巖當時曾此鎮揚州依稀舊迹還留悵蘭亭人散蕺里歌遒九曲風光五湖煙雨望中處處生愁時泛小犀舟看西施西去花謝粧樓猶見若耶春漲緑草遍芳洲金縷曲夀商樞部正小春花暖繡屏開碧觴乍舉黃眉初展玄扈干雲太宰後猶見征南季簡且載酒間聽絲管緑野蚤成江上宅况採芝舊日商山逺問海水幾回淺古來七十原希罕更菁蔥滿庭玉樹雕盂金版荀氏八龍齊下食不羡瑶臺瓊花是何處馳歸輕􅚫大婦流黃中婦錦最可憐小婦調笙緩榆厯厯棗纂纂蘭陵王想前此閣下薇花乍紫橫欄曲半臂荔紅鬈髮新梳理黃子按鵾絃第四忽地吳頭楚尾看看逺海堆又來眼底空留數行字思量那年事不合啓廂東夜雨燈暗桃花誤賺劉郎至奈三載寒食一朝歡聚手把窄襪弄花綺那知夢兒裏倚徙病初起况翠帳寒生晚秋天氣暮暮朝朝向誰是縱迢遞關山夢魂堪寄知他去處是百里是千里西河集卷一百三十四
