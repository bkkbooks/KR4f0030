body:
  text: 西河集卷一百二十五翰林院檢討毛奇齡撰賦西河賦芊眠渺靡一往多麗當使袁淑見之而悔作蔡雍因之以輟翰舊評曰景與宋並為賦宗賈誼與相如並為賦聖則知小招不専竒子虛不專麗矣况賦體原分楚漢魏晉六朝為三截惟唐宋無賦耳西河以六朝新體為楚漢妙裁真是闢門鑿山之技蔡大敬曰西河賦大約度取江淹而江無其形似思規庾信而庾遜其宕曳沈康臣曰賦為六義之一故兩都賦序曰賦者古詩之流西河長律其體物瀏亮已合齊梁初唐諸家有之冝其賦之獨絶也又曰變纂組為流易此賦亡于唐宋也然明復漢魏而靡悶甚矣若西河諸賦髙不結澀卑不疏鄙響如戞玉思能入雲可謂上超潘陸下掩庾鮑江栁賦桓大司馬自江陵北行見向時所種栁垂條毿毿攀枝援條涕如淦矣至若栁既如此人何以堪自傷搖落棲遲漢南况乎毛甡渡江行當暮春楊栁依依逺覆江津拂乎緑波揚乎青蘋凄迷兮朝煙之蔽逺天縹眇兮輕雲之過渚其宛衍江岸嫋嫋而難定一如翠幛之牽風兮濛濛兮恍春山之含雨春山覆兮水隂生水波動兮隂未成吹萬條之如拽宛千縷之自榮又况三月楊花春江栁絮飄颻浦口低徊江路流水鋪茵平橋積素􅂒􅂒不落宛轉徐度停遊子之車拂行人之袂暖煙微分輕風乍起踟蹰偃仰思不能已則或鬱鬱園中青青客舍江北江南别離相藉乃流連于江津兮覆垂垂之碧葉沾飛絮于前襟兮綰長條于輕楫曾不知隋堤之有千里兮乃痛江亭之一别二若夫三條陌上萬里橋西乍牽玉勒遂綰金羈緑楊妸娜行人凄迷斜陽出樹晚風吹枝樹無雨而欲滴枝因風而漸低則有翠煙如絲碧枝如縷蓬蓬茸茸千條萬緒江臯有人悵乎延佇楊花飛其茫茫兮儼春江之飛雪聽哀歌之嘹咧兮渺欲和而紆結楊花不因風飛來沾帆子春風但吹鐡鹿行知下江陵幾千里和曰楊花可憐花但沾帆子飛莫教中道落飄颻在江涯于是客子聞之汨若流涕有如楊花點點墮地因徘徊乎江邉復留憩乎栁內攬青絲之長垂翳碧葉以自蔽何况武昌門前永豐坊底倣佛當年依然踠地悵官路之逶迤睇塞垣而難至折之于青門攀之于渭城望江南兮思如結懷故園兮心自驚誰不躑躅金堤徘徊朱􅚫帶緩垂縧淚開啼眼笛裏飄揚曲中宛轉千里懷人三年望遠蔣大鴻曰綿綿渺渺魂擾神泄讀之百端交集涪漚賦夫何毛甡經行瀨上遊滯江表羈行人之舊館入將軍之幕府亦有去國才人思歸王子咸集臺端同棲幕裏望朝雨之盈泜見涪漚之初起若乃前形既剖繼點復圓乍興乍滅旋來無端心幾懸而不斷眼隨啼而自穿至若萍根未反蓮葉如溜駢旋炳耀圜轉輻輳散疊迹而匪重躍前軌而恐後注成東海之濡滴若泰山之霤恍有佳人于焉止覯尉冰縠之未平碾晶丸而欲就若乃鏡規屢碎璧沉有瑕文魚吐沫繡蛤縈渦既浮浮其相值乃漂漂而漸賖帝女賣漿之棹江妃㺯珠之槎手拈滋而成泡口吹浡而為花匪去留之足審何存亡之有加左貴嬪涪漚賦云亡不消長存不久寄故云木芙蓉賦湖西節鎮幕府之庭有木芙蓉倚乎東楹根株盛長枝葉縹碧鮮葩皆敷殷泫欲滴當兹涼秋佳月白日爽皚清都葳㽔標致繁會宛若美人搖搖天際斂脣揚蛾流影揄袂飄乎多思靜若有待座客抽觴與之相對于是翠竹羣扶丹蕉互倚當晚霞之明牆恍叢條之臨水蘂帶露以生姸花薄寒而增斐使君顧之翩然以喜遂屬毛甡為之賦乃若習氏池頭蜀王宅裏玄霜霏霏寒颷間起江上雕百花之館臨川撤茱茰之幕有紛然其旖旎翩焉而婥㜰儼芳華之既施值清英之初萼乍臨風而有懷雖經秋而未落則有王儉相依謝客自好渌水能浮初日相照美人木末之搴才子涉江之採步南皮之通川劈西峰于天外况乎近在署中值之幕裏摻手能攀迎睋而起供座客之賞得主人之顧維時爛若披霞微有墜露當百卉具腓之時九欘將凋之候乃獨望亭亭而欲前炫輝輝其恐後攬修姱于盈庭揚娥媌于清晝調頳粉之輕綿剪緋紗以為袖目顧影而自憐眉礙目而微皺東家登牆之前西子倚牀之後豈非托根得所藐焉眄睞遂其妸娜勿怨遲邁薄涼颷兮傷素情敷暐曄兮揚修榮抱秋蒂兮得所生時有座客雅不善賦乃為詩曰木荷本脆質生在秋水邊涼風採蓮後花葉何翩韆何當近中庭與之揚令姸彈筝賦淮南桂樹之瑶堂城北椒花之麗館有朔客修髯彈筝哀吟毛甡客遊聞而淚滋次日流飲于枚生之里徘徊於曲江之園將軍梁姓者遣歌僮八人翦髮塗眉撫筝而歌簫笛琵琶越琴燕築相和以起遊魂戃恍于今五祀歙之王君遊于賢王每留行間雅入戎幕量郭氏之珍珠買荆南之佳娣有青琴絳樹之能史妠盧姬之技形體便婉光景妙麗時年正當修短中態眉綣欲揚波渺善睞被輕袿之淺碧兮曳修裳之薄紅揚蕙花以作色兮翦杏葉而為縫綴銜叉之玉蝶兮懸墜珥之金蟲掩薌澤之微聞兮點唇膏而自融儼朝雲之徐度兮宛晚色之方籠縈燕尾于領巾兮看垂髾之有雙厭深房之曲闔兮辭連鎖之髙忩欲渡江而裁櫓兮乃牽絲而作繩捐佩環於灃浦兮拾裙帶於江陵藉周遊之餘日兮于真州吾以逢於是暄日良和柔景樂易飛花度城踠栁垂地江轉雲容澤有蘭氣譬趙李之經過喜娵娃之猝至於是拂靣彈綿飾髮用溉侻衣易裝小立徐待乃出繪華琢藻之芳桐合以垂文錯象之彩木被諸園絲越繭之轇纒集之倕指輸斤之刻斫架以雕金鏤漆之鈿杖解以繡鸞刺鳯之錦􅀈爾乃柱澀將膠絃燥欲脆舉袂怯拂促柱微置甫躊躇而却立旋倚徙而還視於是皓腕呈釧纎指蒙甲翠襟暗理錦帶重押音欲就兮絃屢調曲未將兮思先接若散戞兮間搊但空彈兮虛捻若乃秦聲趙曲之姸椘豔吳歈之妙啼烏叩閣之聲别鶴商陵之嘯採蓮葉於將田詠竹竿之垂釣園中蝶蝶能飛塞上哀鴻欲呌甫蘆有窮士之吟羌笛換明君之調無不哀氣含商清音流徵怨入霜脾聲縈皓齒裁欲進而復留甫將行而乍止右甲鏦鏦自摧左指條條不掎曲以挫而難連音以悲而善徙聽哀歌之久絶兮彈正繁而未巳歌已絶而徐續兮又相和而好理歌有絶而彈終不絶兮視條條之五指至若新聲變節中㺯改度或棄為他或尋于故盈縮殊施長短同趣嬈嬈自憐詻詻猶欣七始還生六音交屬急擊危扣追赴遂作言語咇㘉意氣疏索初似慷愾一何壯怒既而愴恍又似遲暮減素女之哀感秦將之遇無射嫓其律太簇節其數心抽厯亂之絲情繞參差之柱諒兩象之難均孰六龍之可為御爾乃劈絃之指如削出歌之脣若勻絃隨指而聲妙曲通脣而氣親理釧聲而停腕為衣繚而却身逢可憐之佳節發雅奏于上春廊有虛飄之瓦梁無不落之塵詎要復之難昧亦嘽唌之有神况乎家本秦川生同趙里人比金珠顔如花綺因遭亂離自傷流滯視此迢遙有同捐棄效張女之哀彈兮顧荆王而喟氣任操縵之成文兮潛撫心而隕涕遂有惜别慶卿孤居顔叔愛弟稷苖纍臣修竹戴南冠而晝吟倚秦庭之夜哭何况趙王山木之歌王粲登樓之賦愁望鄉之有臺欲思歸而無路但使寫入新聲傳之哀嘆俯矚秦吳仰視河漢薛君聽之雙淚流中山聞之寸心亂無論玄圃有得筝之詞臺城出贈彈之句逢梁蕳之妖姬識陶融之佳婦亦憯悽而增欷且盤桓而不能去張南士曰既妙抒寫復工形似附物宛轉緣情綺靡真驚才絶豔之作也簡文以下尚遜其妙麗况近代耶境又曰節節新變每逐由繹唯恐其已任屏臣曰次楩邋遝赤水稠濁必如此裁是妙絶組繪鳴雞賦秋中臨穎夜半荒旅街無漏下之銅巷絶紞如之鼓嚴霜已棲墻明月又入户吟蟲唽嚦秣馬齟齬悵清秋之閴寂兮悄遙夜之無聲悲征行之孔邁兮夢還歸而未成何雄雞之腷膞兮將以踐乎司更忽延頸而引吭兮旋促距以奮膺遽竦身而拍肋兮振中宵之一鳴涼風於以下襲兮繁星因而西傾動羇人之不寐兮意倣徨而自醒至若初鳴喔咿庶類將舉􅑧起墻間聲縈樹裏發函關之羇客警司州之主簿傳餐刷騎悼嘆燈下其或膠膠角角撫􅀈再唱銀河低㵼珠斗偃仰霜華轉濃啓明未上逐行隊以驅馳猶夢魂之戃恍乃涉荒程之多路兮聆遠塒之三號傍衰蘆之囁唼兮間寒螿而唈喓恍草間之遙和兮類車下之相詨但前途能戒旦兮孰羡夫深江之伺潮爾乃嚶嚶噢噢因風長追啁啁哳哳落月未幾沙際蟄發林間宿飛路凝光以暗靄人辨色而熹微煙起則遙山復冥霧平而灌木皆低盼紅輪之將作兮看丹霞之漸霏閉金閨之緑扇兮掩山寺之朱扉蒼蠅既不可同夢兮黃鵠又不可與栖徒聽鳴雞以夙發兮將躑躅其焉之黃洲橋落日賦何長橋之蜿蜿兮跨􅀈漭之黃洲觀洲前之落日兮徐淫演乎中流曠山河之浩渺兮間雲樹之綢繆悵遊子之登臨兮魂黯黯而自愁若乃木末紅生檣邊照起影亂波間光流水裏綵霞能橫明雲善徙水射日而生花日浮波而散綺儼赤璧之沉江宛丹輪之渡水目流眄以遷延意倣徨而徙倚至若山銜判規沙隱窮轍墟里煙生波間影滅行旌乍收長帆半摺烏鳥飛還牛羊下括車路蕭條村語幽咽故國三年佳人一别目斷荒洲心焉欲絶毛馳黃評曰摹畫刻緻固不必言只宛宛數語使遊子三復黯然生愁千古絶調丁飛濤曰宋生悲士江郎恨人當此踟蹰寧無於抑觶賦梁孝王遊於忘憂之館進抽詞之士飲以美酒授以札牘於是鄒陽枚乘羊勝公孫詭路喬如之徒各有所賦獨韓安國賦幾不成鄒陽代為之陽與安國揚觶並罰於是羊勝進前謂鄒陽止罰乃得飲中其所喜不如勿飲且為賦觶成即受酒不能即退於是鄒陽左手執觶右手操管口諷手追而為之賦其辭曰一升曰爵三升曰觶三爵之來亦以云賜獻者用爵酬者用觚酬倍于獻豈為辜乎若夫器有大小量有多寡或角或壺或散或甒或喑而藏或暢而吐合體名朋跂足成釜犧用背載象乃鼻取鑿泰岱之雲法雷霆之鼓賢王秉瓚以臨小臣戴觴而舞斗雖大而能容觥其觩而不舉自非瓶之罄矣孰云罍之敢自許且臣聞之語曰雞勺不如鴟夷便便之畜不如滑稽口谽谺而不袐腹轉欵其能移堯舜之千鍾鮮溢莊生之五石皆宜飲之百榼亦不醉賜之巵酒安足辭臣竊以為王之愛之者是必别取金罌再揮玉斚女將捧而薌來妓共銜而津落鄭室之鐘已鳴齊臺之火繼作衣多暗解之襟冠無不絶之索浮之大白則不怡出之童羖即不樂詎有趙酒本厚反受肆伐鄒陽能文重被戮沒無九醖之尊有三升之罰杜簣為之色變公乘因而怒發且夫飲酒者齊聖之稱也醉酒飽德者有君子之行者也能飲者飲之不能飲者已之謂之醧齊顔色均衆寡謂之沉沉與湎君子不取焉是王將并安國之酒盡賞之臣而又何斯觶之足言王曰善與之安國之酒鄒陽遂不退秋菊賦豫于秋節重當逺行蔡子大敬作秋菊賦贈豫其辭哀焉越一年又遇斯節縈河之後愾而和之於是季秋九月白露如泚朝馳朗陵之臯夕泛潢河之水休于林垧稅而有待顧見墻下女花紛斐低枝圓靨粲蒨都有或寫莊金或佩素玖華黃花碧緑葉縹蒂煌煌曄曄郁郁泥泥熒明暗藹綿蔓猗靡望之欲親就之可採斯草之竒逾節不改涼芳寒茂于斯為久乃憶故縣城南之子滄浪垂釣之友與久離而暫合復攬䇿而把袂送我涉江之辰為我道出之時遙睹治􅀢散被廣畝爰摘為贈對之不喜爾乃作賦好語灑灑藉以慰我亦用自視藏之于篋中于今一年矣若乃涼飈吹林園英蕭條沃葉將脫芳卉就凋物含商以作響氣行金而易銷則或澤楊遡風臯蘭墜露青蓬既結薌萁垂秀九日候時之花百嵗延年之樹質英英兮麗華體便便兮修姱披曲室之纎阿綴連岡之廣步既遙裔乎水邊亦藂生乎籬下於是隂威耀靈晚景暢遂清芬鬱紆佳色微緻貫玉繩之明星撒金錢于在地碾轣轣之雕輪琢鱗鱗之編貝把瑟盞而團生墜珠璫而巧備布雲葉之葳㽔映晨光之瑣細其在詵詵仙徒奕奕髙士借染為衣餐英作食酥之酒中揚于頌外人皆先榮我獨後出任幽玄之通神曾顑頷而不為意若夫遊子天涯羇人道路緑髮已稀朱顔非故悵鵷雛之不來盼荆姬而勿顧雖復和惠休之吟續潘尼之賦能勿遙怨陽春近傷遲暮者也徐徽之評曰入手參錯帶詠帶敘音旨悠然自後有散寫有實倣有推合有比擬曲盡賦情白石榴花賦為二傅夫人姑婦作也邑文學蔡一萼與子士翹俱早死二夫人為守節太山之旁魯女有獨榮之木焉洞庭之濱湘君有斒璘之竹焉若夫城南蔡氏之婦橫山傅室之子杜預曰女子在室父天放稱室姑婦並孀不雙而處年少執節砛軻為久既寡衣嗑終鮮親嗣比次室之􅂒並任咸之婦其庭有石榴素質縞衣翩然而茂相對感發若有知解雖經易居仍灌左右有猶子仲光修名秉志獨居之賢者也為詩嘆曰婦姑存至性草木類人情輯曰孀居不記嵗曾見幾枯榮時聞之者莫不仰視石榴俯隕涕淚其友毛甡淚下如泗况夫石榴者本王母白雲之根為漢使銀河之載同蒟醬而來歸異蒲萄之可採固蜀都之饒竒製兮亦塗林之有變彩將移緗的于東園兮發青房于西海雖夏侯所不得賦兮孰傅玄之能解若夫春陽初謝之時暄風乍來之際嗟青幡之轉天笑紅英之墮地林鵲無改調之思山蜩有髙吟之意陌上之桑自求墓門之梅如棄逢大夫而麾之惜使君之多事于是緑荑已拆碧葉方吐翠茸成幃縹蒂如乳條柯漸苞敷蕊衆夥冰綃細疊霧縠漫裹緬霜姿之皎皎兮美玉質之瑳瑳垂皓帶之􅠠蜷兮披練裳之婀娜分銀勝于叉梁兮散珠翹于鬢朵經烈日而罔顧兮轉輕霞而未可莫嫌六月之懷氷兮空道雙鬟之如火至若大麥小麥婦姑未收采芣采苡夫壻焉求貴嬪以鬱金為頌令㛠惟薑橘之羞莫不心感芳華意傷狔葉中藏蔚英外鄙耀熠韓朋之木未連焦仲之蒲可接吟松同林下之姝采苦過山中之妾獻武陵而六實皆虛薦趙郡而百子未合何况種當櫺檻開近鞦韆弱幹窈窱叢條蔓莚花邊得路葉隙窺簷一榮一落十年五年澤銷緗莞塵縈翠鈿淚盡暑雨思為朝煙蕙帳未啓苴繩暗牽釘無粉絮桁有衣綿齊紈本素秦珠不妍睹蘢蓯之佳木兮實有似乎貞賢渺物類之相感兮每攀條而泫然上枝既不能汚兮下枝復不可搴匪匹蝶之所近兮何孤鶼之足親思白榆之宛在地兮痛黃姑之上天徒望秋之有實兮心已碎乎珠盤信豫情其芬且潔兮吾見斯花之可憐秦淮吹笛賦吳興袐書君嘗與西河毛甡宿采山之堂西河度曲吳興吹笛及為內史撰制東閣典文江左西河過之仍邀一㺯既而嘆曰吾不為斯有年矣昔者王郎于秦淮舟上望見桓伊不相識好使人邀曰聞君善笛試一弄可乎伊時貴顯便作三弄至今斯地名為邀笛今者袐書亦蹈斯迹其所弄處正在于此西河于是重為感嘆夫袐書君者有梁園賦栁之才入謝生吟藥之館其出也賜以仁壽殿前之金鑑加之璿璣臺畔之玉尺挾持炯照妙得裁曈至若東陽舊文久行建業永明新體已號吳興開江左之風變城中之製白下諸賢並稱座主烏衣子弟半屬門生况江左人文之區也拔椅梓于鄧林而工輸為之顧選驊騮于渥窪而孫陽騁其辨數錢新市販綵萬端維舟合浦載珠徑寸宜乎鄭君起五倫之敬袁氏植四世之德若夫毛甡久當曳尾無假山楹來因避風豈思鐘鼓徒以襄陽耦耕龍門同硯鄭司農之佳客平津侯之故人藜床獨卧久别子魚丐卒將車終逢嚴助遂乃追隨于秦淮之上流連于邀笛之步風流未忘感嘆斯作至若三秋佳日九月新寒桑枝初落桃葉將殘秋胡既去王郎未還帝主埋金之瀆君侯開府之山索東廂之長笛過西州而夜闌爾乃清商徐激三奏成弄白蘋風來黃菊露重停鄂渚之船引秦庭之鳯紅桃出兮哀嘆興赤玉號兮怨聲送何人樓上生愁少婦城南有夢縱復孌童在左妖姬在右秋風甓社之魚夜月宜城之酒南鄰北里之彈千金萬年之壽怨東墻之窺遲喜中筵之佇久駕文魚于青草之湖望栖鴉于白門之栁亦且聆宛轉而向子移情按凄清而潘生搖首况乎樓當結綺門對秦淮紅欄夜敞朱屏晚開龍鱗作瓦雁齒為階益母並種宜男獨栽幛眀螺之槅塗紫貝之灰虹有美人之色石如新婦之排海燕棲梁不定河鼓當忩自回乃楚竹微吟吳床髙據雖非王子之舟正是桓生之步拭華琯于西秦盼柯亭于東渡自當淮水波興方山石裂一響悲來再聽恨絶况夫甡者本墮泥中枉來幕裏惜燕河之逺别過而生哀類楚老之相逢因之下淚又且身非孝章長為不樂時無季重多有愁思題翟門而貴賤殊情畏謝公之出處異致是故中山王有聽樂之悲孟嘗君無聞琴之喜爾乃逢督郵于平陽值伯通于吳市憶故事于當年眇言情之甚旨居然濠上之風流倣佛洛中之倚徙豈知聞歌輒喚仍來譙邑桓郎登山而哭有似琅琊王子顧茂倫評曰庾子山按調尋節展轉入變之作何伯興曰感嘆斯作以前可劃作序西河集卷一百二十五
