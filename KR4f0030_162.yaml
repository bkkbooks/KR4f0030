body:
  text: 西河集巻一百六十二翰林院檢討毛奇齡撰七言古詩八杜陵蔣楛游淮曽讀予舊詩有感枉過不值留句見寄予適滯海濵率賦酬意憶昔避地淮隂城吹簫乞食更姓名山陽縣令争認得呼我車載還都亭爾時秋風度淮水髙㑹名園在河嘴入夜鐘鏞動地來當筵詞賦驚人起從茲日飲淮市傍酒徒到處争相藏元王廟後杏花閣駙馬巷邉薜荔牆人生聚散等朝露二十年來彈指過醉裏難忘皷瑟時花開不記留題處杜陵髙士有蔣生先後曾同淮浦行見予舊事毎興感貽來新句何多情嚴冬結駟過江縣栁下尋予不曾見雙扉久閉緑羅軒千里尚投青玉案但言時事多變遷黄公壚下尤堪憐稽劉已謝竹林去䑓舘半傾河水邉故人存没久心惻况讀君文泪霑臆夜月弹為海外琴寒風吹送山陽笛我今將欲尋杜陵東西南北隨元卿他時若溯長淮路何處還攀桂樹生中秋山寺作清風吹林當素秋碧空灔瀲金波流可憐二七又三五獨坐繩牀月當户初籠輕霧幛冰紈旋破濃雲出翠巒花壇斜倚青銅鏡松葉髙穿白玉盤生平待月啓華帳稍掩浮霾便惆悵林表今來閉寺看樓頭誰復開簾望去年霅浦弄清暉前歲湓城烏鵲飛此日山中無可翫夜深霜雪滿秋衣天馬行送崇仁吳孝亷公車吳生本公孫大道騁騏驥云是天閑舊賜駒我友孫陽識名字金絲羈子玉花靮將上燕䑓振髙策大道相逢秋漸過正好長安看春色君家舊有黄閣臣吳為崇仁相公孫閣前絡得生麒麟從來開閣歌天馬原屬公孫第一人奉贈顧將軍七十并呈嗣君澄吾郡顧元嘆少曾封遂鄉讀書擊劒跨鞍馬横行絶塞驅賢王歸來直棄雲中守右臂茸茸生細栁好學嘗經蔡伯稱貧交但飲孫權酒藜牀髙臥七十年過江子弟皆名賢庭前多少烏衣客最愛江東顧彦先守歲姜掌諫宅值太翁虞曹公上日初度酒酣有感因即事成句并呈掌諫君書次幛末連歲浮西江三朔剪華勝曽飲巴山山寺中夜走郎官集車乗今來守歲依諫公猶藏複壁東垣東堂前老都諫愛我如孫嵩輝輝夜燎徹銀霤坐對銅槃儼晴晝莫道椒花媚少年須知栢子添長夀雄雞叫罷閶闔開招摇初轉蒼龍回紞如嚴城打五鼓諫公衣錦三進舞須㬰魚鑰啓重闥萬里扶桑綴遥雪云是三朝賜勝時正逢七十懸弧節當年都諫趨紫宸仗前冠劒稱親臣八風吹入金門曉萬夀呼來玉殿春忻承假沐留覲省通徳門髙愛光景上日陳筵紫氣生元辰進誥黄絲逈諫公披賜袍銀青襍緋紫丈人本冬卿珮履紛若水諫公膝立親捧觴鳴珂列㦸盈華堂越中四姓攀麟紱浙上諸侯侍雁行相國持漿脩拜母縣官負弩重還鄉宛如張尉迎京邸絶勝虞譚賀武昌慚予流浪頗畏約枉厠親朋把杯勺戢鳯難傳祖徳明椎牛不逮親存樂酒酣浩歎溯所始七葉貂璫代相啓太僕捐民賦光禄匡儲君尚書甘去職要典持微文始知申蟠本非罔太丘何必名鉤黨司𨽻忠臣應代興虞曹竟嗣春垣長春垣禄養世所稀只憐座客言詞微願持三朔銀幡勝長傍千秋戯綵衣將逺行曲將逺行乃在西南阿僰間昆陽池外千重水闗索樓前萬仞山我將為沈犁之鬼蒲刺之蠻蠻中轉深曲乃與鄉井辭天寒日暮行安之仲尼居東海莊蹻留西夷將逺行無窮期王元愷將之巴山有贈寒不披豫章絹饑不食萊蕪魚韓康范史日不足誰能刺促分其餘巴山令君本亷吏自艾青蒭作賓餼敝井難浮花下罇空亭長擁車前篲故人相誡勿復前王生欲去仍流連王生抱意氣食力苦耕稼長貧念同袍千里將命駕可憐命駕不得達斗盎無粢衣無褐集蓼終愁楚雀迷横江誰把枯魚沬桃花乍發栁乍青河橋一歩三留行毛甡進前願致語座客紛紛醉起舞君不見君家阿齡貧且饑烏程陶令争求知滿船白粲収不得願索窮交鎮西食又不見毛甡乞米走江汜賣卜王成暗相倚豈少荆南幕下詩但飲巴山署中水觧襦不敢衣顧郎易衣并食翻尋常生人苦饑值春節黄花白絮填空倉君不見毛甡南避入蠻部萬里滇雲黯如霧金馬闗前無故人竟逐王生過江去訪劉息縣并讀周櫟園侍郎所詒文序因為書贈劉郎本是神仙姿手揮五色春桑絲中都偶爾作試吏望之不見長相思昔年曾逐湖西使一訪廬陵老從事命駕空隨曲巷車留題無復髙門字躊躇東顧還蔣山暫依櫟下官䑓間櫟翁老人出君句為君諷詠開心顔秋鴻飛飛信羽翼重向嵩陽看山色桓良未獲遇浮丘賈父何期在新息長途宛轉思一顧不道寒風薄冬暮日落天低潁上城朝來雪滿淮西路夫君獻賦標石渠尋常痛飲留柴車吏歸自戀空倉雀客到還烹掛壁魚十年相憶苦紆結相見忻逢歲寒節息子墟邉嘆轉蓬白公城畔猶飛雪髙談今古誇典墳篋中所載方紛紜君能不忘湖西客且與同觀櫟下文過息夫人粧樓遺址有感荆門不種章華樹此地還留洗粧處紅粉銷殘澗道花翠蛾飛作山城絮澗邉白日自悠悠城畔粧䑓秋復秋回首故園長不語鎮敎淮水向東流一抄作淮流千里一望長誰家髙閣映斜陽故園相憶都無語回首萋萋空斷腸遊濮公山作毛甡居息不得意搘頥日望城南山東甌夏君今贊府䇿馬邀我遊其間出城風日稍暄霽朔風吹靣靣不寒淮流本出自桐栢到此漸覺横來寛前呼亭長先渡馬幾曲淮流下如瀉渡口方看載一航道傍争欲開三雅須臾繋馬入櫪林濮公仙洞難追尋幽嵓尚自留丹竈過磵誰能採碧芩相隨野鹿度空谷便啓清樽坐蘿屋紅樹彫時未放花翠屏髙處曾懸瀑重披荒徑啓前路䇿馬直臨峯頂住長淮一帶𣺌如環萬里蒼茫盡烟霧從來黄白不易得梅尉當前總仙客况有張王諸孝亷曾經出入蓬瀛宅長林落日客未歸平田夜火光霏霏嚴城欲下葳蕤鑰尚見山前烏鵲飛飲郭將軍竹下萬竿修竹臨清流竹中留客郭細侯短簫横笛向風發居然身在蓬瀛洲行厨斫桂煮芍藥玉甕桃花泛清酪近郭天低散馬牛空亭雨過飛烏鵲酒酣倒載折角巾繡衣卸出紅麒麟將軍本是蒼山客不數悠悠世上人定情歌飲秦二保寅醉後作數嵗遊吳闗不逢臯伯通長攜杵臼少相識獨行畏約何終窮更衣夜起自擊筑暫就梁溪主人宿深念秦嘉是麗才久知王氏無癡叔飄颻挾刺隨襧衡風流學士相逢迎未從隘巷窺孺子便向東家訪歩兵東家桂樹生前路秦氏從來桂中住朝起金丸寫畵欄夜來烏子栖庭樹庭前列舄羅酒漿酒徒相顧稱髙陽覊人辛苦易為醉午日欄邉只將睡我昔歸明湖誦君秋帆辭愛君不得見一日千回思思君見君恨不早悔見秋帆去縹緲同時嚴忌最髙才况復君家仲容好嚴蓀友與令侄留仙同為詞美人何在愁復愁芙蓉開落經三秋今來但泝春申浦何意還登秦氏樓請觀杵與臼與君指皎日在上羅廣衾在下蔽蒻席與君戴笠還下車相思莫惜加餐書倘愁越國無歸雁此地吳王善鱠魚汝南郡亭飲次贈譚八吉緯汝南城上曉鴉啼王粲宅傍春燕飛故人千里一相見越布單衣白如練春陽艷艷汝水邉桃花樹樹郡亭前清明初看鞦韆戲上已還吟芍藥篇自憐蕩子多離别愛汝中原遍車轍彩筆能圖五嶽遊金丹自受三茅訣伊昔相逢淮水頭酒酣同過謝家樓今來重憶當年事把手金樽泪欲流廣文先生歌贈張學博廣文先生讀尚書客來有鳥嘗銜魚花間促坐綘帳舒不須歸去河汾廬當時獻賦誇子虚十年匄卒將公車我今相遇沈子墟春風冉冉吹衣裾莫嫌髙論與衆殊此間已是張融居將過松江先寄朱大用礪使君探書出林屋放舟遊吳淞欲觀海上袁公壘不問雲間陸士龍雲間勝地推吳下有友驅車最瀟灑劉毅嘗為郡股肱謝生今作軍司馬風流司馬是何人共識當年侍從臣丹鳯樓邉攜綵筆紫薇花下展紅輪紅輪綵筆紛相映侍女留題請名姓起草時聞長樂鐘整衣不避昭陽鏡可憐厭處承明久觧玉坊南私縱酒兩省通傳翰苑書一麾竟佐江城守江城千里蔽東吳黄綬金章一大夫嘯咏全為方外客從容分得郡中符果然祖父為三事方信男兒長五湖使君為朱少師公冢孫大金吾子故云君到只如棲枳鳯我來方欲覔蓴鱸已辭梁苑新車騎况遇髙陽舊酒徒髙陽夙昔輕相顧梁苑從敎騁辭賦片輿何必假陳蕃八俊由來重朱㝢陳蕃無事朱㝢閒題詩應滿干將山秋髙正值鱸魚美我欲維舟三泖間湖上贈何生倬炎何伯興季子也秋湖十里生芙蓉湖邉却逢何敬容緋袍相對儼翔鳯綵筆欲落驚游龍廬江自昔嬗才子前有司空後侍史洛下清談宛舊時元嘉樂府傳新體秋花灼灼秋水清道傍又見驊騮鳴荀羊本是長瑜友羡爾趨庭有令名送李生并序乃歲届祝淵時當顓冥甬東李生屺源税駕于都督李公之舊第維時白日窮次縞雪凝壁長松倚嵓其信芳寒梅蔽扉而釋蕚仝人咸集各贈以詩志永懐也原夫淇泉木李本貯瑶情灃上香蘭互申縞結故仲宣贈子篤于飛鸞正叔指河陽于逸驥苟懐悃愊豈乏呻吟李生抱苦心之行仝儕起定情之什以義而言固其宜矣乃戴逵入剡未聞買山阮籍當車於焉就路陳元龍淮海之士梁伯鸞傭賃為生將騎驢出門惟其所之牽舟上岸亦無可住王孫遊逺道睠春草之萋萋彼美在何方誦山榛而掩涕是伯陽適西戎而留字文羆遷斥丘以受言凡屬親串之所經誰勿咨嗟其善誦况李生沉淪之士也家本閥閲世濟開府棄朱門而勿盼甘白晝以長征胸羅星漢毎推烏績之紬節撫雄雌潛識秭􅗍之擾于是正棊旋栻辨才子之孅趨發䇿兆機啓靈均之浩蕩定箕張而斗揭任蚗伏與蠪伸則是帝女睠蜀都而抱石大夫拜楚人以獵冠江南投老應賦逢君稷下談天喜稱贅壻者也夫心企東山意傷南浦蘭亭原倡既擅糠粃海谷遥吟當來璣璧維兹軼士預為風漂伯叔之詞既屬同人應續雨雪英瑤之句先生本是青丘子直走塵埃過都市脱履朝看圮上星乗槎暮宿天河水梅花初發雪滿襟相逢醉臥東城隂天涯淪落知無定北斗南箕何處尋淮康行贈别元龍百尺樓頭客又向淮康奏嘉績監郡能分五虎符題輿不假雙熊軾九重丹詔下青霄十月黄鸝度翠條朝日搴帷鹽澤雨春風送艦射陽潮開樽暫飲如淮酒漸入天街見星斗若問人懐峴首棠但看鴉栖掖門栁潼川歌有序丹陽賀先生𦙍選崇禎十六年受資陽縣令夫人請從叱馭而行李自成破成都資陽不守先生及夫人慷慨就刃自成怪之命釋以俟屢脅之順畢不能屈縶之别營猶欲處焉越二年十月賊敗於南鄭懼中有應乃指而嘆曰留此輩為梗矣殺之同行十七口並日死于潼川州越十二年先生二子雲㑹雲舉俟西道通尋之不得有彭君退庵備述其事復詢之資人蔡文學語與相合號啕而歸雲㑹為司馬與予善予乃作潼川歌鹽亭何髙髙梓水何連連四座且莫喧聽我歌潼川潼川州南射洪渡天柱雲封七盤路不見潼川繞地來但見南津上天去南津令君負奇節夜泛桃花暗流血桃花江上草初青一夜寒風白如雪相傳此地殱令君招魂萬里呼南雲睢陽齒落白崖裂萇𢎞血墮高梁焚令君家世本吳楚北固山頭射猛虎興酣聚米劃地殊愁來投筆長心苦縣官續食計車發便請長纓繋南越嚴助三年厭舊廬龎公百里懐新割驚聞盜賊出巴下玉壘珠江廢耕稼白帝終成躍馬王紅巾時起鳴狐詐慨然請行一星入夢中曽見三刀集崎嶇九坂誰肯前忼慨王尊赴何急閨中有婦孟氏賢從征作賦同車軿觧綿繫樹苦食芋封魚滌釡長生鱻倉皇烽火接城野急繕亭隍料牛馬轉戰空聞笛裏哀升陴誰是搴旗者天心不觧遂人志人事良難勝天意縱敎南八是男兒難免西川盡捐棄丈夫死官久不屈舂磨砦邉自强立完城蔓子刎已遲斷頭嚴將生難執霜刀環視驚罕希誘以好爵啖以糜赤繩馬頭縶有待無如南鄭傷還歸天隂雨凍地冰裂乙酉之冬月初缺令君罵賊身死亡正在潼川此時節君不見令君同死十七口仝行死盡皆無有彭子退庵眼見知長望桃花酹春酒又不見令君二子逺相失十六年來尚尋入難持齒髪向天涯疾走潼川自悲泣潼川潼川西近秦桃花水落青春新我今歌罷潼川曲還想潼川赴死人西河集巻一百六十二
