body:
  text: 西河集巻九十九翰林院檢討毛竒齡撰墓誌銘九毛稚黄墓誌銘當甲乙之際士君子棄置今學學古人為文辭往往萃一二指名者互相標許維時臨安諸君則有所謂西泠十子者實以稚黄為項領云嘗與山隂張杉始寜徐仲子過稚黄與論古韻不合座客陸圻西泠十子之一也嘿而視不置臧否仲子曰景宣寧獨無一言乎曰二毛難降予之所以不禽也葢戲以兩人為不相下矣及予官京師高陽相公迎詢曰聞君有難兄稱大小毛子今安在意謂先教諭也予以稚黄對相公曰非三毛乎時嚴州毛㑹侯以推官改祥符令薦京師工古今學京師為之語曰浙中三毛東南文豪則又以稚黄與予及㑹侯而三也予既謝不敏然私念㑹侯與予以被薦名京師而稚黄家居尚為人稱道如是暨予請假歸㑹㑹侯來臨安按察佟公遣兩公子擇良日請召賔客治巨艦于湖延予三人坐上坐而稚黄以年長祭酒當是時四方賔客在坐者多請教稚黄稚黄各有以應之既而稚黄死㑹侯哭曰三毛巳亡其一矣康熈庚午八月日孝子熊臣等將卜𦵏于西湖青石橋先塋之傍扶服請銘予考毛氏譜大抵汴宋以前無二族而予族以南遷後徙居餘姚謂之浙東毛氏惟君與㑹侯俱居浙西而君自為族其族譜為君所自著可信自宣和御史扈蹕而南九傳入明有平易公者其兄鳯儀公舉洪武鄉試官教諭平易公再傳至孟遠公其弟竹軒公舉景㤗鄉試官南安府知府孟遠公四傳至繼齋公則君父也君祖愼齋公篤行而君父繼之號繼齋生君時母許夢虎登于牀占之者曰大人虎變其文炳也是兒後以文顯乎君六歳能辯四聲八歳能詩十歳能屬文十八歳著白榆堂詩鏤之版華亭陳子龍為紹興推官見而咨嗟於其赴行省特詣君君感其知巳師之時復有歊景樓詩質子龍子龍為之序後因過紹興謁子龍官署㑹山隂劉中丞講學于蕺山之麓君執贄問性命之學當是時君方棄舉義與諸子賦詩談道而專于力行事父母色養遇父母有疾告廟請代居䘮盡禮一切凶功皆身自厯之臨饗祀以誠禁日雖遠歳必衣幍其于從父昆弟及族黨親里雖葭莩皆以厚遇之嘗賣所居屋償責忽念女兄與其夫未𦵏出所賣屋金營塟事或難之君曰假使女兄為兄者則此賣屋金固均有也區區營塟事而又何有康熈癸亥浙撫王君修通志請召諸名士匄以屬筆次及君君所豋載必擇忠孝節義事及乙丑繼撫趙君每月朔望講學明倫堂令三學司教咨請德望素聞者司教以君應君力辭之不獲曰昔子夏設教于西河使人疑其似夫子而曾子責之今東臯張先生吾師也吾敢背吾師以膺此任卒不就其愼如此君作詩以大雅為主文不一格自兩漢以暨唐宋皆有之至于辨析則反覆侃侃必本經術往有鄭𤣥王肅之概嘗曰文須具根柢根柢者如草木之有根荄也然而根柢無他誠厚虚靜而巳矣誠通天心厚養元氣虚則受益靜乃生慧誠厚虚靜四字當記文章本根端在乎是每自頌之為作文箴云君自執贄蕺山後即有志聖學始嘗傍覧二氏書久之以其說濫漫棄去究觀有宋諸儒習語取其有禆實行者題曰鍼心愼鈔葢以自為鍼砭也其論學以宋儒為歸獨大學格物則專主去欲謂欲去則理存所謂閑邪而存誠克已則復禮也大學首功莫大乎是且朱子註首節亦曰物欲所蔽又曰無一毫人欲之私是亦未嘗不以去欲為首功人顧不察耳嘗以斯㫖與學者往復辨難約數千萬言觀者嘆伏顧生平好談韻學著韻學指歸以為字有聲有音有韻而韻為尤要顧韻有六條一曰穿鼻二曰展輔三曰斂脣四曰抵齶五曰直喉六曰閉口又撰唐韻四聲表及詞韻南曲韻諸書其大指與柴氏韻通顧氏韻正相表裏其他所著有思古堂集匡林巽書螺峰說錄毛馳黄集小匡文鈔聖學眞語格物問答東苑文鈔東苑詩鈔蘂雲集晩唱詩辨坻韻白鸞情集選塡詞名解諸書皆鏤版行世其未鏤者存于家君少無宦情後以父命為諸生及父殁仍棄如故顧有竒疾夏月衣重裘如五石匏首戴幘數重叠蓐三十層于牀上干覆斗而僵其中聲息􅀈􅀈然每呼人則以手撃椸然卒不死後忽得脾疾自夏六月至十月不起君初名先舒字稚黄錢唐人既而名騤為仁和諸生更字馳黄娶胡氏副娶王氏曹氏朱氏子三長熊臣次鳩臣次豹臣皆曹出女三長適徐鄴即世臣仲子也胡出次殤次適金大章王出君生于泰昌元年十月十五日寅時卒于康熈二十七年十月初五日子時享年六十有九乃為銘曰浙之東西有三毛生比諸管邴以君首龍惟臨安初士煩于林後逮苓落徒存典型乃復棄此何用為情所頼力學格致說精生平著書且不一名嗣子克衍既而振振夜臺無燭亦可以瞑生不滿百三二而嬴相去何幾而猶涕零南山之石原非堅貞所不磨者苐視此銘顧為銘者三人中人誥授嘉議大夫布政使司叅政趙君暨誥封許恭人合塟墓誌銘故嘉議大夫陜西督糧道布政使司叅政趙君請疾歸杭州康熈二十八年巳巳十一月七日卒于家距生明萬厯癸丑享年七十七孝子承熿等稽首請銘先是君配許恭人以康熈二十一年壬戌四月十一日巳先君卒于長沙官舎距生甲寅歳减君年一稔曽謁予宗仲知祥符縣事際可誌其文柩堂未書丹也至是謀合壙而並請予銘㓤于石君諱廷標字叔文少就試于兩浙提學副使黎君補諸生値父光祿公卒于官君丁年走京師持父喪歸錢唐大清興世祖章皇帝建年之三詔選天下竒才異能者授府縣官君鄉貢應詔除福建汀州府永定縣知縣縣久藪賊又天下初定甌越疆新開居民易骪翫為奸君嬰城一年府例頒春將迎之東郊守者難之君覆甲隍間而集諸耆老率兒童伎樂張綵設仗闢闉都以迎賊不疑有備羣趨之覆起掩殺撤環數十里㑹學使行部君復樹新志前導獵獵出郭迎學使賊皇惑不知所為相視不敢前巳而散去遷湖廣衡州府同知至則知府通判推官皆以事去君攝府㕔事湖南烽火接嶺徼當獻賊草殺後觜膏原野君設法捄䘏外扞逋寇而内養遺孑如是有年㑹閣臣洪公經略五省駐節長衡間諮詢文武有用之士督撫以君應薦第一時賊衆距武岡州踰十萬寳慶告急遷君長寳分守道開牙寳慶㑹文武將帥多不和君極力救解不得適君以事還衡州寳慶䧟君遂落職今天子御極王師平西南經略洪君請君從康熈辛丑奉簡命兵備安普撫爨僰諸蠻而寧州彌勒州各土官誘諸蠻反征蠻軍四出請君監軍君決策行間復故時維摩地安慰巴盤八甸間諸蠻以寧進布政司叅議管通省驛鹽事無何調廣東按察司副使分廵廣肇南韶道安普民暨盤州西堡諸蠻塹其路發巨石塞君所出城闉曰願留君勿以君行君慰諭之去㑹川湖兩廣八排嶺大讞未決君臨界㑹折定爰書具題彌月事竣連州冦起鎭臣失勦捕方略以委之君諸冦聞君至即就撫督撫嘉其績方㑹題間以憂去服闋補長沙驛鹽道當是時長沙䧟賊久甫及恢復而王師進辰龍關軍書旁午一切芻茭械杖舟師笮役征繇去來者絡繹于路君砥力給辦不誤晷刻而民之被調者不致流散然而心力竭矣時滿學士暨兵部督捕侍郎董餫湖南薦君能使併理糧儲道事㑹湘東有司催科亟激變廵撫韓君四顧曰事棘矣此非趙副使往不可謂君曰湖南民望君如慈父母久矣忍不一行慰斯民心乎君曰諾遂乘一騾戴星往民望見君皆投竿涕泣訴悔罪狀君散遣之返乃大修嶽麓書院營堂室市田蓄廪米使諸生讀書其中湖南文教為之一開自皇上踐阼早為監司歴西南烽火二十八年中間兩攝司事而未即于眞每調劑闕乏䘏荒補灾籌軍政所需而計其嬴絀雖兵興之際所至無爭取功而轉饟不絶軍賴以振乃三遷監司未經大用而遽至于病康熈戊辰遷布政司叅政督陜西糧儲道事君聞報以病牒上九郡耆幼爭先詣督撫軍門投牒請留㑹武昌兵變羽書來湘潭君强起視事晝課儲偫夜巡警以防竊發如是者累月而病愈甚乃匄督撫請于朝疏未及覆遽去時戊辰冬月明年春抵家病不起君趙姓世居餘姚高祖登由餘姚遷錢唐以舉人官陜西興安州知州授奉政大夫曽祖珙光祿寺大官署正封承德郎祖鈺龍驤衛經歴授徵仕郎父維清光祿寺丞授文林郎累贈中憲大夫湖南按察司副使母金氏累贈㳟人繼母張氏累封太㳟人兄弟七長廷樞廣東高雷亷總兵官都督僉事次廷機江南泗州都司僉書授明遠將軍次即君也次廷楨江南鎭江府知府次廷柱湖廣沔陽州同知殉難鄖襄贈奉政大夫又次廷相陜西甘肅鎭右營游撃將軍又次廷林四川江安縣知縣配許氏封恭人恭人者東安望姓以高祖官蘭谿知縣遷杭州曾祖應亨刑部員外郎祖仲譽山東鹽運司同知父文胄福建泰寧縣知縣皆以甲科世其家明萬厯間君父光祿公入成均與泰寧公為同舎生友愛願以子女為婚姻㳟人年十六歸君既隨君赴永定任値賊圍城城外火光燭官廨矢集于障侍婢皆失色君入室㳟人正容謂君曰妾之殉君猶君之殉國也即城破引案間佩刀曰吾了于此誓不以此軀剚賊刃矣葢堅君志也先是恭人事姑孝當君遷衡時幼弟林為江安知縣張太㳟人者君繼母也愛林赴江安去㳟人以不得迎養嘗恨恨及君遷安普㳟人前請曰聞安普地和宜養老太恭人在川久失扶侍是地去川近迎養之便遂迎張太恭人至安普巳而君弟柱以鄖襄冦亂殉難太恭人聞變將歸沔陽恭人曲留之越數千里周䘏其子婦及皇恩賜祭塟將理塟事于是太恭人决意東下而恭人隨之事太恭人于沔陽若干年暨君任廣東恭人念太恭人老不欲行太恭人廹遣之登車而下者三居常不樂聞訃後一慟而病遂于奔喪之次哀毁不能起嘗設饗鋪薦于庭女奴掖之跪即以手承恭人顙稽首搏地伏且泣薦為之濕巳而卒方君任衡衡民多流亡君外理戎事及入室必聞恭人以招倈為言有婦女被鹵者必勸贖之君大度而疏于財且坦白無城府與人謙讓不小立崖異而恭人復教之施且屬以和平下物故筦鍵財貨出入金錢者數十年而身無兼衣至親戚故舊以孤嫠待給與配偶失時喪塟無力者即舍養以應而當夫横逆之加置之不校恭人之善成君志如此子七皆㳟人出長承熿考選知縣次承煒後弟相游撃將軍早卒次承燦考選知縣次承焯候推都司次承煊考授縣丞次承熺次承燾次承燝皆考選知縣孫十九長大坤考選州同知次大堳考選知縣次大陛錢唐學増廣生次大環大塊大墀大均大垓大坊大圻大堪大墉大壑大埏大塏大垍大在大埜大㙨皆未仕曾孫十業鉉業鋐業釗業銑業鐸業錡業鎬業錚業欽業鍾皆幼自承煊以下所娶皆名族女女六孫女十六曾孫女四其所許字皆世家子弟某年某月某日塟于某原銘曰翳天水氏大以杭厯仕數世同袁楊君兄弟名跨五常弱把柔翰彊曲斨殉城治郡凌疆塲何者非國疏輔行惟君起家以才望揮絃却敵閩海傍青幡挿花階羽揚文教既揆來衡陽曾檄巴蜀通夜郎樓頭賧並諸羅戕手伐銅鼓平竹王夜散鈴柝晝聚糧十年心計留湖湘流澤寕讓杜與羊書勒幟與版並詳及其死也杵不相㳟人助德不易量慈母出牧模在房飛矢集鑑羽集箱尚譬大義同劻勷只憐孝行過樂龎萱董餳蜜佩帨纕猺苖萬里猶相將越四十載孝事嫜竟以孝死尤可傷楚郊蘭秀杜並芳足嫓大節中外良以兹子姓咸茂長亦與蘭杜好比方子忝國史歸梓桑槖筆僅此載柩堂羲輪舒馭迴且翔且歸若木同埋藏西河集巻九十九
