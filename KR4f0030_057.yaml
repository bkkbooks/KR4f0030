body:
  text: 西河集卷五十七翰林院檢討毛竒齡撰序三十四兩浙開府中丞張公生日賀屛序為武科新榜舉人作當宋元豐間文潞公以太尉留守西都值司徒富韓公治第洛陽乃集洛公卿為耆英之會一時慕效者咸趨之是必世際升平而又有天子重臣以出綏外藩人之詘指而相慶者曰天下誠寧于今若干年其長兹土而為萬室所取安者其人若干嵗蓋深幸夫是人之年富而致足以有為也又況善人百年王者必世其所致治又天下之所月較而嵗計者乎平州張公由行省儀同開府兩浙東南十道依毗為長城父老子弟往往于行部之頃咸相望而手額曰相公盛年迄于今相公之涖吾土者穀已三稔蒼龍之東轉而揆皇覽絓綵弧者已三授籌矣獨是三載論秀列國獻賢能之書而升之禮部其間賓興三物續食上計皆方州使相之事而今則監臨鎖院比之宗伯之知貢舉凡主文閲卷苐總其成效而不侵其細惟是古節使之制分麾授律設壇而拜職以仰受天子之寵命謂之軍門雖文武並憲而方行海宇以克詰戎兵則尤開府所專司也是以翹關車騎立期門之選三班入試自行營校射以及摩盾獻策圖上方略皆目給而面勘之以故武科榜發兩浙之歡呼而相慶者咸集榜下曰頗牧皆入彀矣又曰衡量一何精遴選一何公自非天地之無私日月之無蔽中羅星辰而外苞萬有何以得此歲之夾鐘門下之給牒而赴夏官者咸感恩投地願稱一觴為公夀豫曰公之夀豈惟是也古聖人之開夀域也非土木為版築而不湯而池不金而城晝不設鐍鑰而關市以清夜不俟聚柝而四裔以寧山嶽不加高溟渤不加深而雉堞溝隍藉之以安平故能上之體聖主無為之治而下之即豫十一州七十五城以無事之化其日坐政事堂以發號施令而閴寂寧靜邈若無有苟非旌門大闢笳吹鏗鍧于梐枑之側幾不知有中丞公之居其中而鎮撫其地者論語曰仁者靜又曰仁者夀蓋惟靜故夀此固我公之自夀以並夀此兩浙民不待言也乃即以取士論詩不云周王夀考遐不作人乎夫文王以知人之明倬若雲漢使之為章于天地而照曜四海其得人之盛為有商數百年以來未有之事然亦何與于夀考而以是為祝誠以十歲樹木百歲樹人周王樹多士以為王國之楨而濟濟多士即能報成周以百年之治所謂夀也然則公之自夀以夀人亦以是矣特是曩時留守創耆英之會凡鄉官在籍者悉携鼓樂就軍門行觴而好事者致圖畫像于資聖寺院為後來觀法即司馬溫公改為真率五行酒食亦必彚鄉老同餐以為盛事而今則軍門鞅掌無暇飲宴且司涓清絶矢不受鄉官一飲一勺致豫以近耋之年猶不能預真率之會以追陪一觴此又時勢之無可如何者也東陽李紫翔詩集序今世有文人而無學人夫文人者非謂習延祐舉業能挈筆作應試體也將以摛辭賦詩并發之為碑版札牘諸雜體文字則雖千百之中偶一有之亦屬幸事而況經學茫昧誰則能開扃發覆探五學之精窮六籍之奧使易象春秋詩書禮樂悉曉然于天地間如七十子者乎豫早知東陽有李子紫翔以舉文見知于時時之誦其文者咸稱之而豫獨謂其有古學嘗竊觀其論春秋䇿書按時度物其于三家之是非多所考駁即妄附謬説如豫者亦且一一正定之此不可謂非當今有學之一人乃相見投贄袛以所著詩篇若干卷示豫豫讀而嘆之此非學人乎昔論詩者云詩有别才非關學術此非知詩者之言夫詩肇于漢沿于六季盛于唐而衰于宋夫人而知之而今之詩人必且舍盛而趨衰何也不學故也天下惟雅須學而俗不必學惟典則須學而鄙與弇不必學惟高其萬步擴其耳目出入乎黃鐘大吕之音須學而裸裎袒裼蚓呻而釡戛即不必學則是今之為宋人詩者不過藉文人之名以自掩其不學之實非有他也紫翔以學為文即以學為詩溫柔敦厚一本經術以出之而風雅翩翩上追漢魏而下不失乎三唐之法即其主客盤桓倡和豫汝擬蘇李之遺而情旨親切于以篤厚誼而厲薄俗無非以三百至意行乎其間此豈與世之文人爭肩併耶夫四海雖遙風聲不隔文人雖鮮有必識之譬之瞻華于河拔干霄之木于鄧林遘僑如兄弟于侏儒之鄉雖千百必不失一而獨于學人則終恨罕見乃及今而一見之則是豫之所望于大山喬木與出羣之人當不止詩篇數卷而已會稽章晉雲夀言録序唐以前無祈年之文而今則世尚浮詞每十年一周輒預飾屏幛而書祝贈之言于其中豫初鄙之即有求者不之應而或曰此亦為人子者之用心也彼人子者以為父母之年日臻老大雖鼎烹在前子姓戴觴每無可以娛其意志而袛此贈言數行則欣然承之而特恐言之者之或不得其人也豫與章子泰占遊深信泰占之為人博通經術而工于操持其作古今文久為斯世所矜式而尤兢兢于家人之行此非有得于義方不至此乃聞其尊人晉雲先生席世閥之餘高蹈自喜早年以孝友著于宗族而既而姻睦任恤為鄉里嘖嘖雖鼎革以後不好進取而或以棲遁目之則嗛然道不敢曰人亦各有志耳曾市門皆墻東君而畎畝之間無非南陽躬耕者哉以故北走燕臺南遊吳楚間苐遨遊不輟而不為浮名所逐嘗念先人北渠公砥礪名節為蕺山劉先生表志其墓而祖仰渠公兄弟則又以效丁蘭刻木事陶半村先生為之立傳間書兩文于其堂令子姓觀之今年八月先生方六十泰占思乞言以慰親心而羇遲白門屆期始得歸乃人之知其年者在故鄉則親朋逺邇預為詩歌以致其禱頌之情而在江以南凡與泰占遊者聞先生之風各願出一言以志其盛夫人亦自愛其文凡金錢粟帛可以推豫而必不肯為不情之詞妄相附和以自貽慙慝而乃盈篇纍幅知與不知皆願附一言以相籍為名高此非先生之賢與泰占之名均有以致之不得也嚮使唐以前早有是風則庾信摛詞杜甫握筆亦必有以傳其贈言如今日者也然則世之以屏幛娛耳目者請以觀其詩何如也素園試文序昔厯禎間社業與房書並行而今則房選行牘率皆坊人偽為之而社刻無有惟取學使以下及諸司考校文版行坊間則猶存社業之遺意焉金子素亭久以舉文名于人而友教日衆乃與趨庭都講輩各出生平見知文彚以示世因人之重素亭者名所居園為素園遂稱其文為素園之文夫以素亭多才其于古今文何所不得廟堂無梁欐而但取㢋房之欂櫨以為美奐寧無餘憾然而高文自在也間嘗選唐人試帖嘆都堂試士外其為國子京兆及州縣所解帖無算也夫隋唐試法惟舉省試為最重得即為士否則仍為途之人無舉人諸生名目可以託足無行書社業為四方行估所藉手而試帖之傳大小畢備曾是知詩者而僅僅于行不由徑湘靈鼓瑟間爭得失哉金華杜見山悔言録序幼時講學龍山見劉忠端證人社譜疑黑白兩的出之禪源詮集而蔡子伯曰豈惟是哉周茂叔窗草不除何異乎庭前柏樹子也程子謂顔子所樂何事則衲子下句什麼是受用處也朱文公論太極以一隂一陽為形下之器則即心即物及注論語則又云灑掃應對便有個入神事則即物即心也世但以禪學歸陽明而不知有宋學者實有以啓之聖道之可疑于天下非一日矣東陽多名儒而舊所推者為杜見山先生相傳松嵓盧子講學五峯先生乍聞而驚曰有是乎遂從之相依不歸者閲四年既而還故里人事間隔自恨放廢之久日書所不足曰悔言録大抵生平得力惟主靜立極直本濓溪而自抒要旨則又以良知為本體致良知為工夫與陽明當日天泉授受者正相表裏見者因遂以近禪疑之豫嘗遊嵩陽得賀凌臺先生知本之教謂聖學切實袛一誠意而意之得誠袛止善以去不善並無窮物理與致良知兩途可以抄變于其間然而良知二字出自孟子致之一字加于陽明即不必以此參釋大學而苐就三字徐思之夫所謂致良知者非謂推虗靈之識以進于覺也謂夫知能之良可推之以進于無不良也蓋知則莫良于孩提之知愛親知敬長矣先生以愛親敬長為教而後人之繼起者即以是愛親敬長承之聞杜君雍玉素以孝稱乃憫其先録之亡力搜其殘編細為較輯而重授之梓使先人所學復傳于世則即此良知之致不必佛説四恩舉父母之親與方丈國王爭先後也世之讀是録者但以親長求聖學而又何疑焉甘州行省朝勿齋先生松岑集序松岑集者朝勿齋先生所著詩也先生詩早行海內豫嘗序東陽李紫翔集每見先生唱和詩而心儀久之乃先生以三輔分刺兼督理河務為天子所嘉賴遂由參知行省出巡邊衛開牙于酒泉張掖之間而家弟之子甘州軍司馬其屬官也因出所著詩不逺萬里使驛豫而命之以序豫三復之嘆先生勤勞王事自行役盡瘁外大抵皆屬車扈從賜衣賜膳賜什器珍琢并聖篇御藻種種班賚而先生亦深感刺骨往往紀其事而播之以詩一如唐人之所稱應制體者夫詩學之流移久矣長安高髻不計尺寸而世儒無學方且以草野哩唁之習易我髙文典册以自掩其劣而先生一以廟堂之體製出之就正大以合雅頌其為華國之文章力挽狂瀾固其所也特念喬松之名皇上嘗以賜大臣以為天夀平格貞松似之昔者聖主賢臣之頌有云萬年之久過于喬松是也今皇上書松岑二字賜之先生而先生即奉之以名其集不特徂徠千仞萃我髙岑而疾風徑草之志于此驗之蓋亭亭山上厥有本性盡瘁之節也心懸魏闕髙枝西靡懷君之忠也有臣如此其于聖主得賢臣亦復何愧然則先生雖盛年甫探二毛而他日夀考之稱與夫詩篇之久傳而不可沫不即于是名均見之哉竒姓類考序黃炎本一姓而父子兄弟各不相襲誠不知當時之仍其姓者限于何等暨中古以降則惟有地之君得以仍之而他皆易姓是以天子諸侯必析其弟為大宗而分氏别族為姓不一然且易姓之法以官以賜以字以諡以居以采以伯仲以長幼倫序以所聞所睹所齒遇遘併隨意立氏故曰姓分而為族族分而為氏氏又分而為庶姓為庶族自天子諸侯而外人各有姓不啻萬也自開闢生物以來生人造事以還及古皇立文字置書學以後凡物凡事凡字皆可為姓又不啻若干門若干部也曩者豫友蔡子伯將輯古今氏族譜已有成説聞豫言而遽止之今吳門徐子南沙取其姓之竒者編為類而分以門部題曰類考世不盡姓姓不盡人窮搜極討而總限于類見者開卷而耳目所接似乎豁然一改觀者此非異書乎夫讀書深者所言多怪即以氏譜論公羊傳云古以王父之字為氏豫嘗非其言而人多怪之是不特魯之季孟鄭之罕駟皆以身之字與父之字為氏並無孫氏王父字者自此言出而東門襄仲三世皆以子作孫以兄作父一門倫序全受禍烈此非細故也乃朱子論氏又但知王父之字可為氏一語而不識諡亦可氏反曰諡焉可為氏此必誤讀王父之字字字為諡字而因以諡氏則不特桓莊武穆顯見經傳者俱不之識而即其注論語孟子豈不知三桓為魯桓之諡戴不勝為宋戴之諡而以為諡不可為氏無怪乎論孟姓氏十餘處無不錯注此又非細故也重修祗園寺募序祗園寺在縣治之西實不知創于何時相傳晉咸和中高陽許詢客居永興界因捨其寓宅為寺載在志書然不可考也唯是明代盛時實為江南第一山五字係當時扁額周環若干畝寶坊嵬然凡官家大慶賀如萬夀元旦諸節縣之令丞輩率于此習禮合樂勒為令典而四方至止者舟車甫稅即蜂臺鷲室往往以是為遊觀之所一何盛與自江東不守戎馬蹂躪而後彼黍離離且六十年矣國家休暇闢補陀後山為祝聖之場敕禪師便菴開堂其間而其徒止公則嗣法者也見祗園之圮而憫之遂發願修復簿其募而謁豫以序豫思物有興廢本循環之理況珠藏金乘神實護之此固無慮其久堙者獨是彈丸三里四業艱難似乎時尚有待而幸值天子神聖宰官賢仁井邑蔥蔥然覺有起色以芥粒之施而成丘山之業想亦通邑老稚所相顧而欣然者乎城有三古剎一竹林一覺苑一祗園也竹林喜久復而覺苑甫興勢必以祗園繼之是天時人事與宰官耆闍輻輳而來不可謂非此山鼎新之一會也因為然其請而勸以是言先正小題選序從來應舉之文始于制䇿而既而詞賦又既而經義帖括止矣自元仁宗朝實創為八比之法改去帖括首以四書文取士更名書義而别立體製曰破題曰接題曰小講曰官題曰中比後比曰原經曰結尾而于是書契以來遂有八比一法在人世間焉然且主者命題多下小籖相傳延祐解士題用子曰二字其首解破題襲韓愈文匹夫而為百世師一言而為天下法以為能事其在明初載之元文矜式間曩時老成人能道之也乃選家無學稱八比文為制藝夫制科取士皆天子親試于庭八比試有司並非制也又以為八比始于宋偽造為王荆公曾子固蘇子瞻子由諸文以誣惑斯世夫八比矜式元實始之宋時書義尚未行焉所得八比而預用之也人日循墻而不知為序久矣豫友高介石先生博學強才少年主藝林即以舉文雄于時近方選古文行世而間及書義因遴取先正小題為之嚆矢念斯世書義屢變學人倀倀靡所適從而先生胸有準的考八比所由溯諸矜式且以歷搜夫成𢎞正嘉慶厯啓禎諸遺文而究其根柢閲之博而遴之精不輕加月旦不濫施點􅚍甲乙使學者一望而繩矩儼然此非近代之矜式矣乎先正多小題一仍元延佑遺法而先生亦以小籖先之雖曰以便學課亦以見元明以來汚抔載事有餘意焉應和堂試文序豫僦杭州學使補諸生何泗音江臯草堂從學者十人而補其七以為盛也丐豫序其文行之今豫歸城東而比鄰數武補之者三人曰莫東怡曰張南服其一則豫宗來初也三人同有聲試必同列且同出于莫子蕙先與英仲應和堂之門而東怡為英仲子且冠軍焉易曰同聲相應詩曰倡豫和汝言相孚也莫氏兄弟以文章領袖羣彥而一時應和合門生兒子而萃于一堂竹箭不異苞而冀野馬羣千里同皂此相孚之盛亦何足怪獨恨豫老去不能減年以追隨而尚有吾宗一人得附其列即不可謂非幸事也因復披其文而為之序之石艇詩集序天下幾人負重名比之睹恆星于天數髙山大浸于輿圖千不得一顧亦未嘗失一也然而生年有限豫年僅八十而四顧茫然回憶同時得名者或年長于豫年少于豫卒無不先我而逝而惟石艇李先生減豫四五歲而巋然獨存豫嘗謂良朋千里宛若一室顧見面實難生平避人走四方足迹汗漫縱南至閩海未能車過東陽一訪所謂石艇堰者而先生又髙蹈不出即謀通姓氏而日暮途逺每恐還山不相識為猿鶴所誚而先生之子亦當世名士今所謂東陽李鳳雛者過豫講春秋因得詢先生所著書而先生竟不以豫為不肖寄石艇詩來屬豫論定豫卒讀之然後知先生之過人逺也先生以文苑豪傑世紹家學一旦丁喪亂閉門却物其所居本山水之間而性好咏吟往往矢口即成句昔人謂山人之詩多于山葉不待言也獨惜生平苦易度而山中日月反長繩繫之猶是晨與暮而朝曦夕暉雜之冬夏之早晚而光景遷變誰能一一傳寫之況山川長在風物無恙賦詠匪一朝而隨所感觸千態萬象一似雲霞有性情而峰壑有面目縱同此即事有前後若異地焉者人嘗謂輞川杜陵工于抒寫千年以後必無其二亦嘗讀先生詩乎豫老還故鄉研經不暇屏一切詞句雖敗箱之中尚饒殘帙而必不敢示一字則即詩以觀而其有愧于先生者不既多與西河集卷五十七
