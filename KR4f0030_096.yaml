body:
  text: 西河集卷九十六翰林院檢討毛竒齡撰墓志銘六曼殊葬銘曼殊小妻張姓京師豐臺人十八歸豫能食貧人謂之糟粳之妾既而大婦至徙居右安門墳園纍病不可解嘗夢鄰廟阿母喚之去牽豫衣不忍醒而惡之飾桃梗貌已送廟間若代已者乃復圖其影於幛而自題之名留視圖觀者哀焉先是曼殊將歸時相國馮公豫師也為豫擇娶之而憐其慧視若已女至是公將致政歸謂曼殊曰本以毛生無子故娶女今三年不身而大婦忽南至汝自料能安其身否耶且毛生年大家故貧也蕭山去此遠貧不汝鞠家去此遠則叵測年大棄汝早黃鵠口噤則其摧挫有難言者汝曷不請去蓋公愛是人并愛豫以為計無過於是也曼殊聞其言大驚反覆泣謝執不可且曰本謂公教以禮義不謂其出此也獨不聞女不嫁二夫耶當斯時有婦辮而坐于傍者笑而曰有是哉誰則以妻汝而夸謾若是顧曼殊曰毛先生非汝夫也曼殊乃大恚號咷呼曰天乎人不以我為妻斯巳耳乃謂我無夫不如死㩳身擲于地公急止之曰賢哉嘆而起曼殊歸謂豫豫曰然惟公亦為豫言之汝試思豫豈欲去汝者特為豫汝計無出此便獨需汝自決耳曰吾決之矣君果遣豫則豫請先死君前不然尚憐豫而終收之言訖詘雙膝箸地曰以乞君既而有戚媪居京師者假豫言遣之初不信重強之以為果然哭踊氣絶一婢持抱之不得死三日高郵葛先生力救得活然嗣是氣匱血上壅涎液結轖不可下嘗泣曰吾死固分獨不能為君生一兒指婢曰俟此子長可當夕吾無憾矣又曰吾病不可耐病小間吾當從阿潘居尼寺中雖然君南行時其能掩面一揮手耶君毋嫌豫他日願以尼從行康熙二十四年五月二日病發卒年二十四初曼殊有二婢一名金絨兒即豫師馮公所遣媵也一名來子光祿王君買贈者後以乏食賣來子惟金絨兒存至是金絨兒年十七曼殊所稱俟此子長者是也前一月金絨兒亦病及聞主母死不能起匍匐出伏苓牀下叩頭哭越七日亦死初豫將葬曼殊于豐臺張氏之阡黃門任君謂豫曰生不忍相離而死棄之豫曰然遂擕櫝歸蕭山將附于藏豫之地而系以銘銘曰生矢相隨豈既死而魂無不之歸哉歸哉汝在斯金絨兒從葬銘金絨兒者曼殊婢也十一從曼殊如花花之有枝葉越六年金絨兒病初以月事閟腹下小痛醫者誤下之遂中死法曼殊在病中聞之泣曰是婢死吾無生矣既而曼殊死金絨兒驚起以手據地行哭七日口血漉漉隨死哀哉因擕其櫝偕曼殊同歸而葬于其側曰魂乎來乎從之者金絨兒乎曼殊别志書􅝩曼殊豐臺賣花翁女陳檢討維嵩序云疏籬織處青門種樹之翁纖籠擕來縞袂賣花之嫗開汪主事懋麟詩云荒村侍婢賣花回補屋牽蘿曉鏡怪底紅顔如芍藥妾家生小住豐臺汪春坊楫詩云春到長安芍藥開尋花曾一到豐臺自從解語歸金谷不是花時客也來張學士英詩云聞説豐臺住小姑百環新髻世應無又添一假遊人話芍藥開時説曼殊生時母夢鄰嫗以白花一當一根也寄使賣其前鄰奶奶廟也後鄰錢氏疑昔者乃錢氏嫗因名阿錢周贊善清原續長恨歌云張家小女名阿錢種花家住豐臺側生成骨格一枝香斟酌衣裳百花色阿錢慧甚能效百鳥音京城販兒推貨車行呌賣喓郁不可辨阿錢遙聞便知之十歲前村學針線把翦即能刻花種人獸不搆譜儼熟習者客有以千錢購蕃繡幡燈于前村家阿錢方學繡立應之去既長色白目有曼光十指類削玉黝髮委地可鑑續長恨歌云十枝春笋扶叉出一寸橫波入鬢流銀蒜雙雙垂綵索曉日曈曨射妝閣張編修廷瓚詩云子夜清歌醉不醒曾看寶髻倚銀屏菱花掩後香雲散腸斷春山一樣青才攏頭作十種名最上以髮丳綰作連環百結蟠頂前名百環髻留視圖自序云飾豫生平所梳百環髻種王舍人嗣槐詩云東風吹羅衣空園自搖曵採將千花攏作百環髻續長恨歌云八幅湘裙初拂地百環雲髻早宜春無方編修象瑛云自製新妝號百環春風搖漾畫圖間端夢逐空王去凄絶豐臺舊日山袛張中書睿詩云百結雲鬟别樣妝曼殊花放下巫陽今留視圖猶在減却生時一段香喬侍讀詩云百環髻就玉為神别有穠華領好春斜傍青山長不掃有誰堪作畫眉人顧性貞靜十二從廟歸路人觀者嘖嘖稱好姑則大愠歸不再出豫來京師益都夫子為豫謀買妾有以阿錢言者豫遣二世兄往視不許吳文學闡思詩云爭似豐臺解語花臉波春色襯朝霞盈盈碧玉年嬌小不愛青齊宰相家長喬侍讀詩云村莊無復住東墻但對名花引興莫道小家劉碧玉一生不嫁汝南王先是阿錢病西山尼師過其門咨嗟曰阿錢不年不宜為人妻或曰為小妻即免遂決計作妾然往請者率驕貴深不自願及二世兄往謂猶是相公家也越數日豫親往詢豫喜甚且有謬譽豫善文者李檢討澄中曼殊詩云守身堅擇對偃蹇已數夫不惜充下陳但願嫁通儒毛郎富文史作賦邁三都續長恨歌云紛紜粱肉皆塵土不願將身入朱户蘭生空谷人自知嘖嘖張家有賢女毛生一賦奏凌雲柱下才名天下聞龍檢討燮詩云湘湖詞客毛先生日昨捧檄來燕京子虛賦獻官侍從閨中兒女皆知名下李中允鎧詩云毛子鑾坡彥文筆五色鮮造訪出花驚鴻何翩翩豈有十斛珠乃訂三生緣盈盈賦麗情慕義良獨難是夜豫夢大士取盎中花手授豫次日插戴北方以下定為插戴暇續長恨歌云疏籬野徑多間落花無人碧窗夜天然芳潔不由人優鉢曇花是化身金胡文學渭生詩云媒氏新傳玉帳音定情何用百黃簾前一見如相識為插蓮花玳瑁簪臺丘學士象升詩云昨夜優曇帶露開簪花迤邐到豐湘簾一控春如海萬朵花光入座來其母兄與其母疑豫年大又貧且相傳婦妬欲悔之阿錢不然陳序云原思入仕仍然環堵之家仲路居官不離緼袍之色况乎桓家郡主性極矜嚴吳國夫人理多貴倨王茂𢎞將膺九錫時來悠謬之談劉孝標永憾三同屬有紛紜之論而乃情堅一諾面許三生曲續長恨歌云相國馮公重古風為訪名嫗到韋曲韋春花爛熳生求婚三唱踏莎行忽傳婦妒幾中止官貧復恐離鄉里阿錢却喜嫁才人委身情願同生死劉文學詩云夢授一枝和露種肻教連理被雲遮及娶檢討陳君就豫飲更名曼殊曼殊者佛花也汪主事詩云昨宵夢乞楊枝露從此更名號曼殊乍陳序云僕于阮婦之新婚曽學劉楨之平視屏前見遽訝天人燭下潛窺已驚絶世值此同官之被酒屢為愛妾以徴名以姬夙悟靜因親耽禪喜遂傍稽夫梵夾肇錫之以曼殊色相端然菩薩鬘薑州丞啓詩云曼陀花散到人間蔡修撰升元月上紗窗烏夜啼詞云檀心蕙質玉亭亭解語識迦陵慈雲一滴楊枝露訂三生却向天花落處認前身續長恨歌云同官往往停騶御欲拜青蛾不能去迦陵太史為徴名曼殊本在西來處曼殊既歸執摯即贄願從學取書觀有悟才把筆即能畫字其字每類豫見者輒謂豫假為之任黃門辰旦傳云檢討善詩文能書曉音律曼殊心習焉輒似檢討方編修詩云夫子江東早擅名學書學字儘聰明新吳文學陳琰詩云學書不學衛夫人别有簪花體格爭怪拈毫似夫壻燕叉作贄仿來真夫施侍讀閏章詩云夫人才把筆便作逸少字如此好壻何處不可似朱供奉葉兒樂府云檀板能歌絶妙詞銀鈎學寫相思字嘗為豫書刺早起呵凍連作十餘刺心痛遽罷陳序云於是雜弄簡編間親文史畫眉樓畔即是書林傅粉房中便成家孰學新聲于絃上詢難字于枕間硬黃紙滑竊書夫子之銜縹碧叉輕戲作門生之贄張檢討鴻烈詩云瞥見仙姝漫七年每聞素腕寫鸞箋修潘檢討未詩云學得簪花字體新蠻箋十幅簇芳茵成外傳多情思為有燈前擁髻人挈子有曼殊病詩云黛碗誰書刺銀床想壺曼陀花一朵看向日邊枯豫生平好歌至是酒後歌每歌必請豫復之三復則巳能矣按刌度節絲黍不得爽尤喜歌真定夫子祝家園詞梁司農夫子桂枝香曲開句賞心樂事祝家園裏轉馮太傳夫子長歌云從來繡閣惜娉婷紅牙欲按聲停聞君雅擅周郎顧妾若歌時君細聽又續長恨歌云學書便倣簪花格偷曲初成按拍時云拙宦中年何草草但看曼殊愁頓掃酒闌一唱祝家詞溫柔鄉裏真堪老冰絃檀板兩怡然花底徵歌月底眠田編修需詩云百綰雲鬟巧樣成淡黃裙子稱身輕清歌按板偏能會不數紅紅記豆名胡文學詩云新翻子夜與前溪顧曲周郎總不迷一唱黃雞嬌欲絶簫聲同徹鳯樓西時王光祿三傑詩云歌殘金縷不勝悲記得南園卧病夜起與郎花下坐含顰一唱祝家詞闌曼殊自為詩云階草銜虛檻亭榴接斷垣酒携錦瑟請唱祝家園苐苦無彈者不可巳呼盲女街前琵琶聽數曲諦視其攏撚㓦撥遂能彈朱供奉洞庭秋色詞云想暗通心曲朱絲絃裏盡携書卷玉鏡臺前尤檢討侗新樣四時花曲云羅敷趙瑟儂家占子夜吳歌近日諳燕袁編修佑詩云郎自豔吳曲儂自緩秦筝雙栖梁上解語弄春聲誰馮檢討朂詩云細拋紅豆譜相思腸斷金槽一縷絲道梁塵驚散後酒闌猶唱祝家詞吳别駕融詩云淥水春來豔金槽夜自彈市樓盲女在莫作假師看顧得竒疾初書刺心痛謂脘寒也既謂傷肝輸東風木揚春作而秋止又既謂中悶有瘕癖在胃傍氣積不行歷數載審候終不得其要領每疾作遍體若煿使婢按摩之不足以帔作兜負之行又不足縋筐而坐之東西推挽若鞦韆然任黃門傳云然而有竒疾􅔂劇則必約綵為兜有若花籃坐其中懸諸空際左旋右轉乃少可特終不可治嘗遍搜方術不治遂立願捨身作佛弟子不治乃召繪者圖之名曰留視圖云巳而竟不可治陸文學宏定詩云病倚籃輿挹翠霞後庭編徑曲欄斜綵兜行遍雖無迹猶長金蓮處處花嘗夢鄰廟奶奶喚歸去一日携兒至曰汝本吾家物我擠眼汝當隨我行其兒曰家去罷不去奶奶么喝醒乃刻桃木為偶人飾之衣被以生平所梳百環髻流涕送廟間趙編修執信詩云淡紅香白好容顔寶髻堆雲作百鬟喚作佛花元自誤如今爭肻住人間吳文學陳琰詩云阿錢生小態嬋娟多病皈依繡佛前不信曼陀花一朵忍教憔悴夕陽天親乂云妖夢頻隨阿母回香檀分影禮蓮臺百鬟巧髻留視畫裏真真喚不來圖沈文學季友詩云雕香分送淚糢糊六尺生綃便作認取白衣龕外立前身應是小龍姑豫送偶人詩云且送青娥去言隨阿母歸荷花開作靣菊葉翦為衣淚盡中途别魂離何處依他時香案下相待莫相違傍曼殊自為詩云百計延醫病轉深暫回阿母案身此身久巳魂離殼莫道含顰又一人乃復圖其形名留視圖而題詩焉梁司農夫子詩云百朵雲光綰髻斜焚香小坐淡鉛華畫圖展向春風裏好護豐臺第一花事任黃門詩云捨身現在禮慈雲月月纖腰減半分何畫工還染色淡紅衣褶藕絲紋綾沈明府皡日詩云彈窩石畔冷如冰消得春風數尺一自檀雕分影去夜深只坐佛前燈身阮庶常爾詢詩云新鏤香檀舊夢頻碧綃留供佛前由來仙骨原無二不信雙毫寫玉人汪春坊霦詩云寶篆依微繡佛前香臺欹坐髻鬟偏夢魂縹眇知何處只在蓮花秋水邊高徴士兆詩云百結雲鬟委陌塵一函玉骨瘞江濵可憐遺落春風影挂向花前還妒人鄭驃騎勳詩云細雨難滋天上花春光杳渺白雲斜可憐粉黛空留視腸斷當時油壁車初豫婦將至徙居南西門墳園慮不容也益都夫子憐其窮強豫開閣而曼殊難之其後有假豫意逼遣之者曼殊死復活曼殊回生記云曼殊以壬戌十月十一日死越三日高郵葛先生治之復蘇來李檢討曼殊詩云食貧二三載兩情如斯須何意南者事變出不虞舉家色慘悽丞相謂曼殊毛郎生遲暮官貧徒區區改圖便爾為作計莫太迂曼殊一無語淚落紅羅襦又云始至相逼迫既乃復揶揄郎意久異同計事一何愚曼殊大悲摧天乎我何辜郎今負義信慟哭聲嗚嗚氣結腸欲斷死生在須臾倉皇覔良醫強起事跏趺藥餌徐徐下數日魂始蘇李中允詩云踟蹰貯别館咫尺明河懸脈脈但相望郎言遂浪傳謂當羽翼乖聽續鴛鴦絃聞言一悲憤氣絶如絲聯已乃泣吞聲仰首呼蒼天家續長恨歌云食貧三歲恩情重恩情祗道長相共桓郡主驀地來驚散鴛鴦夜深夢深情無賴金門客愁煞飄風蕩魂魄倉卒墳圍貯阿嬌將使犢車無處覔那料流光迅如電好信不來飛語遍野花村落白楊郊安得仙郎日相見含情一慟倒玉山杳杳冥冥去世間葛翁投藥雖扶起那得桃花還結子畫圖試展舊時容玉貌花姿全不是以孟監州遠記云其初歸也則不以遲暮為非匹而惟得偶乎才子為幸其濵危也羣言紛搆猶矢若金石惟願得死于才子之手春彭侍講孫遹詩云優鉢從來不染塵無端號作斷腸憑誰地下三彈指喚起迦文坐畔人詞張文學暗然詩云曽説南園臥病時金槽猶撥祝家新聲不向豐臺度付與啼鶯戀舊枝甘曹學士木詩云芍藥初開驟委泥豐臺猶見草萋莫心遠葬西施里苦戀貧官與忌妻楊文學臥續張夫人拜新月詞云拜新月拜月在前墀死魄回生後殘眉未掃時至是病轉劇嘗曰令吾小可者吾當為尼懺除之李中允詩云古今傷心人慷慨以永嘆庶幾法王力遣此長恨端灼灼青蓮花阿母夢所搴因之綺羅中愛參清靜禪續長恨歌云從此香奩日日扄長齋頂禮願難成綵兜虛約香塵滿伏枕空房小膽驚既而謂豫曰向阿三病時豫從子阿三死京師豫藉其園居邀君日來以為幸今君將南行而豫以病殘留尼寺中其能來乎泣曰他日君歸者吾請以尼隨君行惟君置之既而病發死曼殊之死京朝爭作挽弔自梁司農夫子暨張曹諸學士下詩詞文賦不可勝紀又有作鼓子詞同韻唱和成帙如雲間李穠李榛顧士元馬左西冷何源長魏里周珂同郡成肇璋逹志金振甲馬會嘉王麟遊陶簠劉義林諸君至同館生有託碧虛仙史作盎中花雜劇者皆彚載别集死時羸甚及斂面有生色坐而衣骨節緩澤如平時任黃門詩云垂簾無力倚闌干怕見庭花易早殘偏怪瓦棺將掩處海棠猶作睡時看初陳檢討孺人死索豫為墓銘而貽豫以絹絹淺黃色為製裙而喜囑曰假使貽絹有桃暈紅者當復製一裙越四年無有貽者既斂乃賣金槽裁一裙納桞棺中續長恨歌云去路茫茫在何處矯首空濛隔煙霧金槽賣却剪紅裙大呌曼殊將不去高徴士詩云羅裙淺淡剪鵝黃一束纖腰白玉床長恨無人十洲外飛行為覔返魂香吳文學詩云減盡纖腰勝小蠻淡黃裙子帶圍寬可憐紅絹空裁剪不付金箱付玉棺西河集卷九十六
