body:
  text: 西河集卷一百六十八翰林院檢討毛竒齡撰五言律詩江水江水滔滔下浮雲蕩蕩開煙霏朝日起沙動早潮來舟落蕪關遠帆紆瓜步回山前空幕府無復舊軍臺過采石有懷李白李白揚帆出曽披宫錦袍我來尋舊迹空見水滔滔墜石分風急清江蹙浪高緑蘿寒月下一詠醉酕醄塞下曲結束事長征前軍早抗旌關山雲裏度隴水笛中鳴彍衛三城戍良家六郡兵爭先須努力驃騎舊行營沓壁新都山行作沓壁回青嶂懸峯落翠微曉雲隨馬去春草待人歸溪漲平流沫林長間落暉十年棲隱志貧賤苦相違入山偶成種藥神農地牽牛巢父家水禽時變響山草遞開花雲隙流天影巖空墜日華春深人不見愈覺此中遐過梁園春風吹薄雪剛度梁園時駐馬一為賦悠悠使我思繁條抽野館細草滿長陂千載鄒枚興無人與共知宿商丘作弱柳環城細叢菁被畝繁春天行宋苑暮雪度梁園曲閣飛花冷寒袍點絮溫清泠池上客誰與共開尊行上江將次入湖出馬當山下語船子只覺雲帆駛寧愁江路長乘風開魯港計日上潯陽曉嶼翻龍蟄秋花豔馬當黃頭天上轉辛苦棹船郎江行日日上江行秋風兩岸生波翻當利浦天盡豫章城磯路煙樓逈關門水木清前灘爭賽過杳杳聽鳴鉦渡黃河同王侯服柏肯堂兩明府作淮海南來盡黃河北去高百年吾渡此萬里一波濤落日回檣櫓春風滿布袍相期慚破浪不敢上君舠鈞州署中夜飲題史使君惜隂亭壁四首春夜開官閣華燈散酒杯天高星漢合地勝鳯凰來小檻凌橋聳繁花照水開中宵幽思洽疑上古鈞臺嘉模曰鈞州以夏饗鈞臺故名署有黃霸集鳯凰址二暇集黃公署宵分大禹城人標清頴志亭以惜隂名短燭圍紗冷方塘引溜輕相逢能痛飲藉有使君情三暗水平當席春鳩宿繞枝河魚烹萊釜露蕊滴鈞瓷時以自製鈞州瓷插花侑酒臺逈迷長葛星寒挂具茨子房初隱地俯仰一追思四襆被聨深廨盤餐勝故鄉官貧情較切漏短話偏長潁水通池細襄陵瀉酒香馮唐吾自老汝已久為郎飲汴園我愛魏公子西遊入汴園楊花天際落蝴蝶草頭翻估市停車騎繁臺對酒尊侯生悲老去不復在夷門登太白酒樓太白何為者夷然醉此樓千秋狂客去吾亦此中遊碧柳當軒合青天入濟流金魚誰作佩來往任悠悠入嵩陽將登嵩嶽有作太室群峯峻轘轅拾磴長春雲飛馬足愁絶古嵩陽玉女搖潭水山花墮石梁漢皇金匱杳何處挹瑶漿登嵩嶽感懷昔誦嵩高峻今知喬嶽尊紫微通帝座黃蓋繞天門中宅思伊洛平原眺陸渾春心千里度極目總愁魂上子晉峯懷薑十七梧蔡五十一仲光錢六霍不得毛甡友同登子晉峯青天空浩蕩插滿碧芙蓉伊闕黃河湧函關紫氣重攜君詩句在驚下九潭龍遊楊氏園林和韻共攬名園勝寒風曉渡河長堤環墜柳曲閣挂層柯疊石刳巖澗開樽對薜蘿赤欄回合處愁望起高歌二重坂尋幽境崇臺設錦茵相攜金谷酒同是兔園人白落寒郊木丹流石洞銀嚴飈隨倡和真覺愧陽春飲吳晟永夜開襟緩茅堂對酒清環林棲鳥靜深燭照人明冰雪鄉關思盤餐地主情俊才推附子羡汝早知名齊州道中遇雨千乘起黃埃終風終且霾雲從滄海上雨自泰山來村酒春前釀障泥渡後開東行分霡霂愧乏濟時材疊嶂疊嶂丘中度晴川郭外分草煙鴟尾散花氣馬頭薰樹響疑過雨山遙不斷雲棲棲瞻闕里不欲忘兹文懷蔣斐濟上曽遇張公子傳君下濟川今來濟口望不見杜陵船黍酒東亭晚楊花春店前江東賀監在翹首正蒼然徵説曰西河與大鴻先生最好聞在故淄川相公宅往尋之不遇涕泣而返大鴻稱杜陵生收緑堂小集即事胡奏膚别業也别館分晴早間堂收緑深樽中饒美醖座上有鳴琴屏散蒲葵彩城垂薜荔隂相逢毋恨晚所藉在知音二碧幛依修堞青枝繞曲房到來惟有靜坐久自生涼簷鳥隨風囀庭花散雨香樽盤成晤對幽思總難忘漫成遲日思難盡方春人未還平樓看野集短草度空山少婦騎驢穩村童牧豕間可憐逃楚客猶滯武津關徵説曰河以北呼市曰集呼暸臺曰平樓此是方語早行涼月尚在地出門趂早行燈前騎馬去草裏聽雞鳴漲水傾河岸連山度土城勞歌相繼起同有旅人情從遲村湖到王鄼橋道中宵發遲湖口明經王鄼橋星稀遙岸火風起逆舟潮霜店藜炊早煙林棗路遙百年豐沛地環視總蕭條徵説曰地屬鳯陽雨過雨過麥苗清楊花撲地輕平田千蝶舞深店一驢鳴上估牽車度村姑擔水行雙簾鯖饌美猶似汴梁城集鳬亭小檻當湖勝茅堂曲水西緑楊賔騎滿碧篠女墻低落日傾樽晚鄰園入牖迷酒酣悲聚散展轉愧雞栖廣陵城下作白露流江浦黃花隔永興鄉心異潮水夜夜返西陵人靜垂銀鑰天高墮玉繩城南一回首千里暮雲蒸夜泊與鄰舟袁少府西望紆蠻服南行去楚天看隨佑帆落住近酒樓邉白鷺翔荷岸青鳬散蓼田月明高詠去知是下江船寄朱郡丞惠州半刺行循郡清戎到博羅銅符分殿虎銀綬拂嵩螺翠羽翻江閣明珠耀海波東官吟和處應憶舊羊何王生之嶺表伏日番州路秋風瘴海邉王程隨桂楫官閣近花田高宴傾椰酒涼衣絮木棉紅亭分手去愈覺右軍賢淮安道遇吳百朋推官補選赴都夫君舊名讞補闕上燕關八月寒風急相逢淮海間官程環古道客思滿秋山幾樹王莊柳流連未忍攀奉送吳推官分韻淮海送郎星蘇州舊理刑朅來當白露此去簡彤庭清口裝銀勒張橋倒玉瓶可憐羈旅客還上短長亭山行過美施閘西子前裙處行人喚美施山花鴉子髻浦竹女兒祠教舞宫城豔吹簫里社思苧蘿村祠西子為土榖至今山下水流出似胭脂二水碧如漂鏡山青似洗粧柴門啼鳥細村徑覆蘿長零雨浣紗石繁花走馬岡當年教舞去祠下換衣裳山行幾欲尋幽徑重來倚杖藜山空收霧早溪淺洑流低松飯炊難熟桃花看易迷林深無犬吠一任乳鶯啼舟次江縣孤帆次飄颻震澤東人家斜照裏湖寺暝煙中柳港炊新火菱歌動晚風攏船雙赤腳祗自喚吳儂和顧織簾齋居同令子伊人倡和遺册原韻我愛顧夫子逃名在近關只今遺嘯詠猶是戀鄉山蘼草生皆潔藤花落自間鶴鳴留和處相對一開顔次奔牛裁過毗陵驛常州與潤州橫帆如快馬荒鎮是奔牛白杏千村暮黃茅兩岸秋茫茫何所屇淠彼一舟流自吕城至丹陽縣途中仄阜高行縴低沙曲上舟罾魚交插蓧踏水自翻謳赭岸通橋店紅竿隱寺樓涼風吹濁浪京峴已清秋西子西子吳中去盈盈住館娃自憐桃葉好插滿鬢邉叉捕鯉開荷屋棲烏下柳街莫嫌嬌貴甚夫壻是夫差輕薄篇馳逐來三市遊遨遍五都輕裝隨宿衛好酒瀉當壚東第呼公子西京𨽻監奴秦家多桂樹只射樹頭烏二少小學從軍間遊逈出群鈿箏彈雁字花夾刺龍文夜月留初舞春風解宿醺東方千萬騎上坐是夫君經太湖七月吳關路涼風起具區朝光開四塞秋氣滿重湖葭樹看回合煙波蕩有無揚州稱巨浸一半在姑蘇潤州早發東楚驚秋暝南徐趂早程星飛京峴口水落潤州城海日連雲起江煙拂浪生經行高唱遠徒有謝公情渡揚子我來渡揚子天氣正高秋挂席乘風去平潮浩浩流江關開巨塹海樹隱孤舟不辨金山寺鐘聲水上浮渡左蠡作挂席渡左蠡秋光映太虛大江猶作滙陽鳥正來居彭澤環山盡湓城落日疏星潭何處是一問此中漁將登廬嶽口吟始得瞻廬阜嵬然入杳冥巖垂秋水白風落暮雲青瑶草紛丹壑金書曜紫庭登臨慚羽翼長嘯倚林坰章江道中南日章流外西風浦棹邉年華看又過秋色到依然丹嶂芙蓉老青林橘柚圓征衫愁漸薄何日定歸年徵説曰章江上名橫浦下名南浦二浦浪吹仍削江煙冷易收片帆章口暮斜日武功秋荻短銜沙艦楓高倚石樓饒南重回首司馬在江州逢長沙王孝亷索書卷子因贈二首每愛湘潭客能披七澤雲今朝贑水上猶喜一逢君桂樹橫江館荷花映練􅀈漢庭曾對䇿珍重賈生文二邂逅江城晚盤桓野觀秋座中驚輔嗣名下識王修氣與青天合文成碧漢流昭潭新橘柚看汝賦離憂彈琴妓嶺嶠花初落江樓夜未央美人抽碧軫神女弄空桑清角風前怨冰絲指下涼郵亭雙鬢影長念楚明光二小閣開江月平軒倚柳條樽前操急縵手底瀉歸潮低露生磐石清風出藕苗楚妃連宋女相見果非遙三緑綺回長線紅衫映斷紋啼烏愁浦樹流水憶湘君撥去將垂釧彈時數斂裙曲終多苦調不欲座中聞薑琦曰梁詩玉釧逐絃搖又箏賦斂垂衫於膝前此與前低露清風二語俱是用古寫當境法吳使君南還同作梁園客新從庾嶺來三春章貢水萬里鬱孤臺酒盡朱絃繞花銜錦纜開使星終夜動看向斗邉回長至夜宴集湖西署同賦南至逢辰聚西堂授夕餐霜吹緹幔合燭動絳紗寒瀉酒驚花漏高談愧素冠今朝添線始莫惜夜漫漫二深宴酬時令清池起夜遊天風號過雁日影下牽牛酒暖葭灰發歌回燭樹流樽前有王粲不道滯荆州薌溪道中嫋嫋車盤路薌溪又葛溪雨來山洞濶雲偃石屏低村店梅花落江城柳色迷王孫歸去晚前度草萋萋聞笛寒浦秋將盡青天月欲流誰人夜吹笛獨上最高樓河內歸常侍平陽臥督郵清宵江上望愁煞一孤舟過西江幕問張七又去粵揀行篋見所寄長句是幕中見懷感而為詩不得張郎信聞君度嶺遙日從蠻嶠轉歲與瘴煙銷竻竹天邉郡藤花海上橋武溪書未滅目斷日南標二甫幸炎天返仍看絶徼違徒藏金槖語不見漢槎歸海縣丹砂酒雲山翡翠衣征西空幕府回望轉依依聞朱山陽遷吏部稽勳喜賦聞道朱明府今為吏部郎玉函將啓事金殿早含香庾亮尋清士嵇康有報章果然強直令千古遜南陽二相鳥求榮木斑鴛列選曹稍遷同謝朓偉識重山濤六計勳初弊三年治自勞故人王貢誼頻整舊綈袍送陶軍府移鎮雷州陶侃行南服移軍鎮海康樓船通象郡強弩下龍岡幕映珠光白碑分銅柱黃漢庭懸尺組只為使蠻方遊青原十三首十月寒光滿深林一徑斜晴巖開午霧霜樹落秋花石沫穿雲渺鐘聲隔嶺賒籃輿迤邐入四顧總煙霞二越澗路方曲到門山轉深石亭秋未暮溪閣書生隂象鼻環花岫龍堂蔽梵林欲留雙樹下前望起沉吟徵説曰象鼻巖名三青櫪高成幛丹宫逈在霄開天回地脈架水過山橋仙犬迎人近村雞唱午遙虎溪原不遠此地好招邀四七祖傳衣地居然古道場珠光飛寶塔金軸麗空王卓錫抽巖瀑談經繞石梁香臺雲滿處一過贊公房五絶磴攀雲莽高龕接露藤道傍三昧水山半六朝僧歸鳥迷荒洞寒花摘斷塍峯前真陡立何處覓傳燈六溪曲多橫嶂山寒少落桐魚吹沙底沫虎過草頭風積水連衣碧斜陽隔樹紅欲行難問渡恐入武陵中七孤亭當澗曲空翠襲衣襦水裏調笙瑟山前語鷓鴣日斜回地薄雲影渡溪無為愛少參句長吟墮玉壺亭有趙韞退施愚山兩少參詩八更上龍潭側還尋舊釣臺毒龍何處是我欲負竿來水鬘爭流斷林衣拂地開石頭聊憩息佳興正悠哉九曾尋貝多樹扶杖過嵩山碧草自開落白雲空往還西江優聖域東渡敞禪關渺渺幽棲境高風未可攀十藥地留殘莢松壇望落暉百年曾未遂千里竟來歸江竹扶行屐天花繡衲衣何時開白社得與遠公依此首贈藥地師十一不惜回短景還同眺遠峯渡溪騎鸑鷟近岸坐芙蓉幽興循盤蟻清談起蟄龍暝煙生萬壑空外數聲鐘十二香閣翻經邃僧寮欵客間月沉燈影動山靜唄聲寒警板棲烏醒虛窗墜葉乾中宵峯頂露片片落旃檀十三日照上方西清猿浹曙啼同行張鏡在謂張荀仲先生徐下碧雲梯疊嶂封龍洞三人笑虎溪秋山回首處煙靄望中迷施少參席送張纘孫之粵即席和韻日暮群賢會蕭蕭江畔洲暗雲圍北郭新月上南樓酒逐歌聲送花隨燭影浮明朝庾嶺客肯為鎮西留飲湖西官署兼贈施彥淳彥慤二公子之蕭江二首遂有南樓興悠然官閣東天高霜氣白夜靜燭花紅縱飲追元亮清談起謝公庭前雙玉樹皎皎又臨風二遠道追騏驥清霄覩羽翰庾王先後著元季弟兄難漏盡香城夜星搖碧嶂寒酒闌愁極目雙雁起金灘登愚樓薄暮倚丹樓雲山一望收尊前浮古堞樹裏見行舟寒浦歸烏鵲春星逼斗牛愚公清嘯地長為故人留飲就亭觀愚山集西郡清樽晚臨江官閣深亭從青磴入臺敞碧山隂高樹芙蓉屋寒煙橘柚林使君辭絶妙夜坐費幽尋亭左名芙蓉屋袁江示繁條碧峽來春雨清川泊晚潮客心如細草愁對是繁條玉女臨巖翠金蠶出地銷袁江初漲日羞過湛郎橋謝胡大公子以寧短䘢迎寒日清江傍客居劉生誰似爾鮑子故知豫滅燭他鄉酒高歌幸舍魚中宵頻感激不忍上柴車秋山寂寂秋山裏行來徑盡迷橋欹因礙石巖斷又逢溪枯樹懸朱果飛泉挂紫霓寒林延佇久冉冉暮雲低觀瀑幽壑分流急漴漴幾道傾濺衣嘗似雨坐語不聞聲激溜因崖折漚花帶草生匡山雲霧裏一望不勝情遇曾副使宏有贈白首歸田候清江曵杖年千秋高北府兩使盡南天桂酒虔陽幕椒花嶺外船至今留石屋猶誦丈人賢曽自號石屋老人二玉節臨荒服黃冠返曲沙賦曾飛綵鳯筆下綰秋蛇彭澤新凋栁東陵早刈瓜相逢剛晚節莫惜鬢邉華過施男亷使寓亭繫艇隨行客聽鐘到寺樓十年遺豸節一榻臥羊裘耆傳成江表蠻碑著嶺頭盧陂千頃雪宛在碧天流許使君歌席華琯吹蓮幕清觴度錦茵使君真愛客妙伎總能神燭繞緋紗短歌翻白紵新瑣兒方九歲冠絶魏宫人贈許使君小歌婢金雀鴉鬟小銀箏鴛背分種花先種葉為雨早為雲春草編歌扇秋江濯舞裙瑶臺一十二安置任從君于廬陵就宴詩有序乙已冬末群公西遊者共集於雙江之濵惟時玄飈斂凍烏裘嚮春儼車騎之將徂展蒯緱以自惜幸逢廬陵令于公慧男以河陽之長作平原之邀下榻南州為歡東道恍入戴逵之官舍便羈司馬于都亭于是令君者本屬人倫之表今成國士之知千里幸合一時難已屢倣習池之勝遊不假鄴園之公宴烹魚來幸舍似乎迭相為賔釃酒過柴車不知何者是客借芳洲之行樂同金澗以賦詩刻燭授言不拘句韻日飲廬陵酒還看醉孟嘉宦遊同是客賔至久如家山管寒吹雨江螺碧抱沙當杯看燭影舞袖幾行斜二出郭攜行屐芳洲載旅觴陶公過栗里山簡在高陽花雨迎春發歡情入夜長前灘歸路渺燈火看蒼茫春四日飲張經别駕署中新歷回南郡清樽對晚衙入吳逢子布傍斗見張華夜火煙如霧春街雪作花椒盤同歲序何處是天涯二江上逢春早盤中瀉酒濃虛亭圍薜荔深幕坐芙蓉雪映筵花細雲垂郡樹重新鶯啼欲下醉裏聽從容遊象巖天幕垂堤曉仙亭入路寬春雲漁父宅山雨藐姑壇亂水停帆遠諸峯擁髻寒此山真可隱莫復問車盤周南郡墓下作古縣連青嶂春山帶夕陽誰人遺舊壠千戴一周郎雄鎮巴丘險荆門天塹長英雄何處見下馬泪浪浪重遊青原七首為念青原勝重來過祖堂林疏驚岫豁源逺識溪長曲磴連雲壑空壇到夕陽上方鐘磬杳相視轉蒼茫二入寺愁雲暮尋山恐路迷幸隨元亮舁再宿逺公溪佛壁開新畫禪房記舊栖談經聽未暝延佇石梁西三策杖逾前澗攜餐上晚亭園葵披露碧山木擁潭青怖鴿飛珠塔歸龍繞鏡屏釣臺相望起渾欲渡滄溟四共發清鐘曉還尋衆壑深欹流緣岸仄初日隔山隂銜木天邉鳥飛雲石上心前岡不可度歇馬在長林五嶂合前車隱峯回縱屐遙循崖嘗避石渡水不須橋午過蓮關飯冬晴藥地苗青原幽絶處一憩舊僧寮六內史推靈運賢師過惠休浮廬開碧澗愚谷本丹丘接麈超林樾層茵坐石流清霄笙鶴下恍在萬峯頭時施愚山與藥公坐石久談浮廬藥公號七不信曩遊淺居然新徑通山楧臨水白霜草接春紅飲犢迷樵路飢烏散梵宫盤溪三十度總在碧雲中分得咸韻同諸公餞劉淶之贑州高觀成清餞深杯喜共銜因歌彈短鋏就道擁長鑱朔雪虔陽樹寒風贑水帆明年歸雁度慎勿惜書緘送曽三還峽江同用鮫字曾子真豪士英年在草茅窮冬歸玉峽樽酒送寒郊車路停邉馬刀容飾海鮫揚雄今愧汝不敢解人嘲又同用江字送汝東歸去章江共峽江天涯人好合國士爾無雙野鳥啼清觀梅花點玉缸名材知待用何必問三邦西河集卷一百六十八
