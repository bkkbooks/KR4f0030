body:
  text: 西河集卷一百三十六翰林院檢討毛竒齡撰填詞六沁園春即事有序三月四日曹緑嵓明府張宏軒州牧周譽凡孝亷趙愚公監郡朱服萬别乘羅木桓徐西崖文學招集羣公修禊于滬城之南園有女妓三人行酒即席朱别乘作沁園春詞豫依韻次其後已度三朝欣逢四并重對春波看楊栁堤邊羽觴泛去薔薇洞口油壁來過北地賢賓江南名士人物加于晉永和况雜坐有美人相間齊畫雙蛾興來酒瀉銀河恰巖畔斜陽照緑蘿看環擁楸枰目縈琢石暗拋博具指印紋螺紅袖香生碧桃花放此際春光可奈何華燈起見樓頭纎月徐上林柯前調答王西園見贈之作丁巳之春我來滬瀆喜遇西園念當日聞聲有如日下今朝髙會竟在雲間江薛才華廋徐藻采所著佳文是偶言箋題外有吹蓬小令折竹新篇桃花初漲平川又風起城頭撲栁綿自畫閣攤書談深燭下間堂贈妓腸斷樽前兩次三番風晨雨夕是處相逢非偶然溝頭水問東西會合知在何年前調送葉天樂遊吳門涼月銜雲清風出谷秋滿人間况出水芙蓉詩篇絶麗環溪修竹酒興將闌子羽湖頭伯通橋畔好友相思嘗往還揚舲去見停來顧渚望去吳關橫塘暑氣將殘更微雨初過銷夏灣只陂有雞棲人歸畫舫丘當虎去寺在青山疇昔曾遊石城深處夜月清樽酹未乾歌詞罷向旗亭試聽可有雙鬟前調題閻容庵青溪傳後有序豫夙為調笑詞紀馮弦事惜弦雖令材而事近于媟渡淮十日晤容庵粉巷出彭生詞讀之初以為賦古耳及讀竟始知為容庵少時事也容庵真今之君虞樊川矣哉青溪傳辭致幽斐其所答寓札亦復激宕可誦因為括諸詞合作一首詞雖不工事喜不媟世毋以豫詞入調笑可耳桃葉堤邊琵琶巷裏人字青溪本博陵舊氏愁窺燕幕汾陽公子共聽烏啼春寒愁又度落盡東園幾樹梨空回首正江南烽火塞北征鼙相誓盈盈兩地奈仙源雞犬望後都迷况渚下書沉誤排雁影章臺人去遺恨桃枝隔巷空還擊臂便鈿合金叉何處思只蠻箋數幅堪付新詞賀新郎蕭山縣署贅壻詞正河陽花滿秋水芙蓉艷紅如翦贅壻淳于千里至早己題詩齊苑喜今日光生銀管古署催粧開錦席看一堂紫罽鋪香軟雙盞暮酌來淺萬條紅燭燒將短更庭前幾行畫扇遮來宛轉洗馬文章當日事樂令風流不逺况種得藍田瓊琬最羡今宵乘鳯處聽秦臺幾曲簫聲緩烏鵲到喜何限滿庭芳南園公宴即事初過清明才逾上已羣賢髙會南園花巖接檻洞口瀉紅泉移得行厨竹裏雕欄曲雜坐金鈿擎觴至紅兒嬌小猶弄剪刀錢樓前爭作伎枰楸壺竹遊詠依然看玉叉紛絓薌澤微傳醉煞蘭亭舊侣華燈外新月纎纎當筵賦園如金谷人似永和年前調為汝南張廣文題傳竒卷首夏里開基清河啓郡曾燃祕閣青藜髙齋寂靜夜聽汝南雞仿佛神人告語他年事枕畔留題長弓後貂蟬奕葉不數舊關西黃梁炊未熟翩翩蝴蝶醒後多迷託梨園象板羽殿銖衣千載鳯鸞佳配華茵暖共酌玻璃聽吹罷一聲長笛無數綵雲飛前調題玉妃獻册圖為汝寧金使君夫人生日琳畹瓊妃瑶臺金母當年曾駕蟾蜍因披玉册還御五雲車絓去廬江錦帨閨房秀早被霞裾淮西路春城千騎夫壻上頭居五花裁作誥香奩百琲總是珍珠看平頭擎履編齒吹竽獻得龍泥舊簡傳經後莫問居諸間相視山桃片片飛滿玉牀書貂裘換酒題吳寶崖停鞭拂劎圖和其自題原韻想此為圖者計生平嶔嶙壘落未經揮灑富貴何時思量起凡事盡如此畫縱滿地才源傾瀉但頻年驅馳南北到頭來抹却當時話惟此劎鎮無價從前只向車前挂看中原平沙萬里儘堪馳馬建禮門邊題名後便到晾鷹臺下且自解雙鐶重把多少英雄今安在遇甘蠅莫折飛蓬射窮與達有時也念奴嬌即事有序暮春二月寒食夜胡繩先招飲上海署中聽妓酒半為詞申江官舍看桃花開後栁絲如織伯始風流才啓宴此夜剛逢寒食燭下新粧榴裙百褶翻盡深紅色那堪小妓病來歌舞無力聽蓮漏將殘玉觴嬌瀉去脣脂俱濕夜雨初過花毯上尚見翠鈿狼藉明日清明來朝上已到處春堪惜勾欄未散漫言今夕何夕前調徐都官裁枕函實詩名為詩枕製詞索和漫次其韻撚髭無計喚奚兒長向水邊山麓蒲簟橫陳將偃息好句吟來斷續授册嫌頻開緘已緩紙片紛零碌遊仙欹處斫成五色文木試啓小簏中空方幱連袵大似青油袱豹首雞鳴俱不用但取便便豕腹夢去無論醒來何事栩栩相追逐蝶庵詩就此時午睡方足桂枝香即事有序馬丹谷伎席有小鬟後至病不能作伎坐侑間詢何名曰未也宏軒張先生以其氏李且病中遲至取翩何珊珊之句贈名翩來同席者各為詞記之豫與張南士朱拜石丁殿生徐西崖莫蕙先並作桂枝香詞時康熙十六年二月三日夜堂聽伎正綘帳花垂玉罏香細蓮炬光中兩兩舞裙拖地忽來金雀鴉鬟小算才堪瑣兒年紀欄邊歌緩油車暗裏翻然而至便手把金尊徐遞似嫩葉裁衣幽蘭吹氣病起遲來問取小名尚未風流京兆偏憐惜道延年女弟如是珊珊可念何如竟喚翩來為字滿江紅題吳墨舫桃源圖步原用文待詔韻圖畫當年正桃樹生花時節有延州髙士酒顔方熱南浦風光何所似西畸興會由來别恰聞人洞口憶當年頻頻説舟過處涵氷雪花落盡同榆莢嘆青芝白鶴一時都絶凡事總隨風裏絮披圖恍對雲間月幸前賢手澤有傳人思來切水調歌頭詠鹿脯有序家會侯邸舍以鹿脯食客方雪岷陳其年及豫有詞加豆得乾臘釃酒莫踟蹰奈何置身巖谷其命在庖厨不是籠驢炙豕豈是牛犓鵝胛此物本清虛但束白茅去安問緑蕉無人一食夀百歲試何如陳蕃設脡相食慢作魯公書皮不必為藻幣腸不足為酒器祗噬此些須客座手能劈何用倩麻姑雲仙引壽王鄂叔進士蘭渚亭邊蓮河橋畔髙門乍啓朝陽丹紱繞彩雲翔云是覽豫初度爭獻仙人九醒觴何限才名今才四十江左王郎宫衣試著來長有花下新裁小樂章回首京華難兄執戟同是東方待補山公正當典簿努力功名看未央他日烏衣黑頭還聚重醉秋光上西平談開子貽畫并賦西平樂詞見訊志謝嘆年年看不盡短亭花更冬殘雪後停車問誰相憶寄來滿幅是煙霞分明指有西陵渡口人家滄洲近知何處空厯遍路途賖念君也留滯西平思時便望望時還見暮雲遮何年㩦我向青山麓碧湖涯慶清朝慢湖墅髙會同王丹麓陸思諸公即席候屬添絲人方繫纜還逢髙會南皮間堂夜來紅燭倒映金巵爭投博箸妓簾不挂夏侯衣頻傾看有葡萄釀色似胭脂夙昔祗愁間闊長從紙上汗漫寄相思今夕不知何夕能預斯期城頭紞如五鼓傍筵耿耿玉繩低那堪與曹劉沈謝即席為詞醉蓬萊題贈徐涵之小蓬萊别業是南州髙士東海名家西河舊里茅屋數椽縱亭臺無幾牆外疏桐櫩前蘝蔓到處成隂翳人道蓬萊逍遙散誕不過如此堪嘆年時燕齊吳楚汗漫天涯倦遊知止一任人間似桑田海水家有山妻門無雜客架上餘書史安樂窩成吾其從老于是鄉矣蘭陵王别談開子淮南路正值嵩陽歸去梨花晚寒食初過與汝東湖最深處夜涼傾斗醑聽撥銀筝無數扶紅袖酒醒回時長是城頭鼓聲曙恨一别如雨更南北東西春還秋暮許昌宫裏留君住任作賦繁臺題詩梁苑何期此地復相遇倣佛似前度看舞郡中署便圖遍屏山歌殘燭樹送君還上棠溪渡望長淮千里依然東注那堪言别况緑栁漸飛絮風流子答和桐城何令逺見寄浮山如在眼樅陽路時望大江遙想當日長瑜曾為四友今聞子季仍號三髙從誰道十年黃令閣一别湛郎橋湖上風光全隨蓬轉江南春信半在梅梢幸新來無恙詞中尚記得醉卧甘蕉不道安成前度良夜迢迢自白鷺洲邊歌殘纎月紅螺澤畔酒散寒潮試問梁園賓客誰憶枚皋南浦和徐西崖贈别最傷心處是紅亭載酒上河橋多少畫欄干外楊栁正垂條五兩南風欲度趂申江幾曲暮歸潮奈離筵人散贈鞭情重雙淚落征袍此地遨遊堪戀遍亭臺春意閙花梢長載佳人油壁深夜教吹簫况值歌成南浦也為君重撥紫檀槽且和歌一闋問當前誰最魂銷西河答和王西園送别春去久怕逢客館長晝寄君書到正街頭濯枝雨後那堪黃浦晚潮生一帆吹下如溜憶當日方邂逅按歌新記紅豆酒間移燭和豫詞霎時草就囱囱散去鎮蹉跎蜀葵花發時候驪駒唱罷頻把袖看江流如許顰皺遙指垂楊渡口更短亭東上酒家依舊欲放歌何時還又滿庭芳又一體沈失題似為同館氏生日梔子開殘宜男採遍日長深院啼鶯正荷衣被暑裁剪初成曾向慈恩寺裏春池淺蘸筆題名人爭看風流拔俗第一吳興相驚舊時八詠東陽雲起處藻思縱橫恰衣盤雕錦紙染紅菱羡煞絲綸世掌鳯池上綷羽爭明懸弧處堂前花發海上雲生剔銀燈詠米家燈有序梁尚書席上有燈為宛平米氏所製堆紗疊縠作山水花鳥人物座客各有詞屬和焉百尺氷荷可喜况滿壁盡張羅綺翦縠為欄堆紗作樹不數米家山水隔屏人指道人在隔花屏裏金粟玉蟲纍纍光到處轆轤齊起雞戴珠竿龍銜火籥總是數條紅紫燈前且醉看燈影照人何幾題姚將軍五圖詞今存一首相見歡桃源採藥圖何來採藥仙源問當年云是伏波橫海舊登壇麟閣裏滄洲意任相看一似桃花流水向人間臨江仙合詞題為奉贈何梅莊使君夫子作因使君初守越既使牂柯後復為兩浙督糧少參因有此詞但合二闋為一首不分又同一韻故照本抄入不敢移易當日虎符初下處桃花開滿山阿萬層綘帳覆來多驅鹽投峻阪拔羽出虞羅一自龍山髙會後春江曾哭曹娥天南萬里到牂柯帝鄉把盞去錦里盼車過誰料十年星紀換延津還泛仙槎江淮轉運使如何金笳開越嶠繡棨動吳波幸得間堂仍聚首清樽頻把玻㼈劉郎前度喜重過公門桃樹老猶有舊枝柯十美圖詞為汪蛟門主事作今存三首減字木蘭花燈下收書圖合歡成被鋪就鷓鴣單枕膩豹髓全融肯負饞燈入夜紅壁光如曙翻恨袖梢遮不住收却殘書何用掀翻壘算珠菩薩蠻午睡圖玉欄長夏金塘裏軒窗四面荷風起菀蒻織花紋盤盤散緑雲栁帷褰未閉隔水窺人至待起整叉鈿郎今未可前虞美人紅絲拂子打檀郎圖樂陵臺下看紅藥底處曾相謔苔衣掩盡石欄花辜負東園杏子數枝斜紫龍髯拂珊瑚柄秃袖紅相映郎身豈有赭頭蠅暫作吳宫點墨白螺屏兊閣十詞有序豫遊淮時閻子牛叟與丁少君敦伉儷之好作兊閣十闋索豫和詞豫未有以應也閲一十八年豫赴召至京師值牛叟年七十丁夫人已亡其嗣君百詩重貽書并幣專使赴長安請和前詞蓋欲以承尊人歡當稱觴地也豫始理其詞對使和去其十闋皆有題依題演義不自解工拙牛叟知我定有以諒之耳南歌子齊世家彤史朱閥迎齊女金箱貯楚雲髙閣傍斜曛阿誰居閣上濟陽君鵲橋仙證前生蓬山小吏上清舊籍曾控九仙朱鯉若非花下認前身幾負却雙成久矣楓亭何在治裝東去請食宋家荔子縱然置驛未能通也勝看忠州畫裏小重山雙魚問兩地烽煙天一隅蔣山西盡處莫愁湖誰言流水隔姑蘇春潮上中有一雙魚緘處印含朱澤蒲裁作線界蜘蛛簮花小字畫來疏憑偷看傳作竇家書荷葉杯維摩天女恰同參乃與阿潘同住何故花月映江潭問誰還宿普明龕參麼參參麼參天仙子病榻間情長向花前攤女史一榻自安花蔓裏儘教春去病還留捐藥餌弄筆底全似建安女博士階下稚童搖葛藟滿院月明清似水漫言蓁莽辟除難君意氣且已耳泛掃請從一室始十六字令佐家齊代逺空吟乘馬篇真珠釧解作算商錢栁梢青聨吟錦闥間心緑窗幽興得句相調何意東園杏花開遍又是春朝丁娘且索揮毫甚處見歡情久要幾闋清詞數行細字一幅生綃西河琴奕雙清且慢記琴心當日何似只看緑綺繞孤桐素絲未理髙山流水有誰聽離懷此際如寄况花底楸樹子舊枰在斷垣裏空留遺挂紫檀心琢成纍纍橫橫直直試躊躇幾曾間却纎指是中意誠莫已良人惜未能此追憶爾時佳致或庶幾鼓瑟湘靈堪比何况圍棋張良娣臨江仙逮下不辨黃鸝能却妬臨溪且採茵陳文園能聘茂陵人君心難問取我見也憐生今日秦淮相接處當年桃樹桃根門前流水記前因鬘陀花下影同拜繡幢身瀟湘逢故人慢採菱採菱歌罷見紫角新翻緑苞初卸問灌湖前汊女伴恁來遲停船相迓紅袖風吹剛一望夕陽西下喚侍兒慢捲朱竿菱刺又牽羅帕舉棹去南浦夜歎洲盡含霜灣名銷夏此事思如乍待舊約重尋流光不借幾度秋風看浩浩長淮東瀉好愁人翠藻清漣猶是參差如畫樂府補題和詞樂府補題者南渡越州諸處士所作詞也卷首載玉笥王沂孫聖與蘋洲周密公謹以及菊山唐珏玉潛後村仇逺仁近共十三人同于宛委山房諸處詠龍涎香白蓮蟬蓴蟹五題其調為天香齊天樂摸魚兒水龍吟桂枝香合一抄本在梅市祁宅藏書中禾中米竹垞為序之而鏤板京師且屬同館作和詞各五首初晴歸田後其五詞俱亡矣後陳其年遺稿中有白蓮蟹二詞是初晴作注筆甚明因丐其年手抄稿附載于此共二首水龍吟白蓮前湖十里芙蓉到門皎皎明如練波光雲映蘆崎鷺下宛然一片緗菂含鉛青房濾粉素珠成串便採蓮紅女絳裙千褶遮葉住有誰見只為社中人散倚遙空削成難辨赤欄橋子無端愁把碧天遮斷月下飛香霜前落葉容華將變但秋衣未製剪來朵朵不須染茜摸魚兒蓴但秋風有誰還憶夏瓜冬菜春韭兒家住近橫塘曲長在栁姑廟後相邀取借鄰女花竿挑起紅絲瀏摘來盈缶任九月豬毛百莖雉尾總貰一壺酒晶瀜甚漫説白如瓊玖下將鹽豉烹就鈿頭叉腳難形似只顧流匙在口還念否料拾鱠分鯖未是和羮手躊躇良久便羊酪能勝龍酥堪敵歸去也何有西河集卷一百三十六
