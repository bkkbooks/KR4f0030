body:
  text: 西河集卷五十二翰林院檢討毛竒齡撰序二十九唐人試帖序當豫出走時從顧茂倫家得唐人試帖一本擕之以隨每旅悶輒效為之或邀人共為之今豫詩卷中猶存試律及諸聨句皆是也暨歸田十年日研經得失桑榆迫矣尚何暇及聲律事客有以詩卷請教者力却之康熙庚辰士子下第後相矜為詩曰吾獨不得于試事已矣安見外此之無足以見吾志者必欲就聲律咨詢可否不得已出向所擕唐試帖一本汰去其半與同學相訂而間以示人夫詩有由始今之詩非風雅頌也非漢魏六朝所謂樂府古詩也律也律者專為試而設唐以前詩幾有所謂四韻六韻八韻者而試始有之唐以前詩何曾限以三聲四聲三十部一百七部之官韻而試始限之是今之所謂詩律也試詩也乃人日為律日限官韻而試問以唐之試詩則茫然不曉是詩且不知何論聲律且世亦知試文八比之何所昉乎漢武以經義對䇿而江都平津太子家令並起而應之此試文所自始也然而皆散文也天下無散文而復其句重其語兩疊其話言作對待者惟唐制試士改漢魏散詩而限以比語有破題有承題有頷比頸比腹比後比而然後以結收之六韻之首尾即起結也其中四韻即八比也然則試文之八比視此矣今日為試文亦目為八比而試問八比之所自始則茫然不曉是試文且不知何論為詩夫含齒戴髮而不知其為生人不可也知為生人而不知生人之有心尤不可也夫為詩為文亦何一非心所為而乃有其心而不審所用詩有性情人實不解而至于八比則敷詞貼字而並不得有心思行乎其間今毋論試詩緊嚴有制題之法有押韻之法有起承開合頷頸腹尾之法而即以用心論窮神于無何之鄉措思窅渺雖備極工幻具冥搜之勝而見之而頤解目觸一若有會心之處遇于當前夫乃所謂詩也則是一為詩而飽食終日無事他求即道路憂患猶將藉之以抒懷況文心霏霏又烏能已舊本雜列無倫次且科年爵里多不可考會先教諭兄有唐人試題寫本略見次第因依其所列而周臚之并分其帖為四卷而附途次所擬者綴諸詩後家會侯選本詩序會侯以舉文為世楷模世有甲乙舉文於會侯之前會侯不讓也古文亦然而獨于詩則世之楷模猶是而會侯反嗛嗛焉豫往與會侯同被召京師唱和邸里嘗謂君詩高警而劃滌上之無故朝郛廓之習而下之與時俗卑弇却之恐凂非嬗世何為而惜豫之未讀其全詩也及豫歸田後老不能詩而會侯亦泛泛置之人有以詩請者偶應去亦不大屬意間詢其舊作則曰亡于火災者久矣康熙四十年客有請刻會侯詩不得無已取其舊時被選者一鄧孝威詩觀一王景州離珠集合收其選刻而併作一卷屬豫裁定夫選詩未易事夫子定三百尚失貍首新宫諸什而昭明太子録建安詩後多有議其饒軼美者兩家選本又安足甲乙吾會侯全詩而乃以亡篇之後搜討舊章如覩真越絶于羣書注中輯伏生夏侯建逸傳于洪範五行春秋二類之內較全詩所見倍為矜惜而且好其詩者將必由此而倍思其全詩則雖謂全詩不亡可也夀昌禪堂刻周鄮山文集募簿序甬東周鄮山以能文稱海寧奎孝廉嘗為豫言之豫時求其文不可得既而豫出走四方不相見而殁實不知其人之學之果何等也夀昌菊禪師與鄮山舊將勸緣于人而鋟其集以行于世夫釋門空空每欲損所有以益所無然不過以虛化執以福利化仁謂佛家緣業如是耳從未有為儒門作檀那者夫吾儒為文嘔出心血原與釋氏之攻苦鉗錘爐烙相去不遠而乃篇殘簡脫輒共燎草為灰滅則雖慈海相息者亦且並生其悲憫之心而況居同方而行同倫其為鄮山所生平當不止查氏一孝亷己也菊師居夀昌曾得天童開山塔而重為新之其作佛門之旌幢者已非一日今復為是舉吾方慶吾學之窮有旃檀海矣重修示農亭合賦册序示農亭者戒示農事之所也故事孟春祈穀遂大布農事而戒而示之于是乎有亭蕭山出東門數十步舊有亭三楹合門房兩重佐以夾室每先春一日迎句芒之神暨土牛駐于亭間然後邑長帥僚屬吉服盛樂鹵綵仗就亭迎之給春花東廳俗所稱東營房者而反而宴于縣東之東司翼日則勸農于亭西申以訓戒加勞酒焉謂之示農則是前王制是亭以重農故其為邑要廨己不待問矣況亭之為用每不止此吾邑當東浙之衝上官往來者絡繹于路嘗設亭餐頒亭燎坐上官中楹而休伍伯于門之兩傍因呼亭前水階曰東馬埠門左勒一石曰輿𨽻息肩是其為迎春為示農止一二日而其為郵驛之用日三接焉如是其不可已也近日以來亭傾者屢矣民間既多侵蝕而縣長惜費修廨乏帑錢其于迎春儀節又崇尚簡略且視勸農為贅事遂漫置不理而至于上官送迎則又以謙謹太過謂馬埠逼城每越至百步以外之武安廟前而其亭遂圮然其基壂猶在也自修志者不肖受侵蝕貨賂其于官廨志中隂削去其名以漫滅之而于是告朔一禮無有司羊矣康熙四十年邑長鄭君蒞吾縣多舉廢事城東士民謂廢之當舉莫如斯亭因合詞議復而縣上其議太守宋君急許之移檄到縣士民首事者踊躍趨辦先立一册書而謂豫以序豫曰嗟乎不圖行年七十九尚得見斯舉以迄于瞑也往者城廓廬舍皆繫官築而今則官吏避事諸有興作苐責之民間而民又不足當此十室九空之際雖好任事鮮有克集于成者考之古築室之法惟賦力二者賦者斂財力者任役也是以召誥營洛周公必賦功屬役以為之書此即左傳命役賦于諸侯之法而力役所任必先賦斂非豫斂其賦必不能任其力以致有用況今所謂力必當合力今所謂賦必當合賦合者衆擎之謂也夫示農公事非東城之所能私而東城士民既為之倡則以丐夫同邑士民合其賦而共成之毋論公家大事多寡惟命而即以寡論能輸一金以視夫修志之徒僅婪一金而甘削舊章以滅其迹者其賢不肖何如也首事者誰四門國子莫時蕚諸君也淮安袁監州七十夀序自六十歸田後悔經學未攄杜門闡書易論語大學及三禮春秋曰晚矣惟懼不卒業日暮途遠却筆札酬酢客有以詩文造請者直再拜謝不敏以故碑板銘誄及諸屏幛所有詞率人自為文而署豫以銜雖詞有好惡勿計也而獨于淮隂故交則思之憬然語及之而惺然有道淮人事于豫前者則心目俱瞿瞿然雖醉亦醒夢亦覺即倉黃造次亦必徐理其説而後已而況徒委我以文其但曰文惡不足重不如不文斯已耳其敢曰無文哉兒子遠宗從淮歸道監州袁君年六十九矣明年丁七十戴子西洮劉子嵩藩輩謀所以夀監州者而遠屬一言豫方卧疾把素問一卷急起憶監州當日相遇何所往來何歲月其為豫較計者何事其鬚髮何等惜相别之久而垂老之容未及見也然而意念深矣夫天涯萍梗其所會合亦偶然事耳而身當憂患之日則望人倍切乃監州當日一似重有切于已者夫切于已者仁也切于已而厚遇之則不薄也夫嘉木以厚實成仁而石薄則磷是以論語曰仁者夀而中庸言誠則每以博厚而進于悠久乃于監州之厚豫在三十年前則其臻斯年也豫必以為此積厚之效顧此三十年中其為厚于物而應食效者又不知凡幾也劉勃安先生者豫老友也十年前為監州作序其言曰翁歷落人也矜于取舍而竊鄙夫澆漓之習不苟且然諾其于人也必使得于情而遠于不情且夫財賄羶逐權力焰張之世止見金耳翁特于義利之際辨之甚晰寧利物而不以自利以故興于身發于後人譬之梓材翁墍茨而其子且丹雘焉所謂久也則是豫文不足重而勃安之文其為可傳也如此豫嘗憶淮隂故交每引領不可見其幸厠同朝而追隨有年者為李君太常丘君洗馬張君檢討吳君中允以至劉氏兄弟如吏部選郎山東督學使無不聨轡長衢講疇昔之好而勃安昭華則僅僅把臂于天安門下觀其對䇿而既而别去迄于今又十年餘矣勃安年八十而豫亦七十有八雖不能追隨耆英附至道之會而老人一星彼此同照然而尚有扶杖相憶如監州者則浸假十年以後豫倘幸存在能挈筆猶願與勃安先生先後致詞而況于今也鐵庵遊黃山詩序生平乏濟勝之具過岱勿前望匡山而不能登即已陟太室而中道旋返未嘗越數峯而上宜乎藉觀覽以代遊歷而乃篋無山經且曾謂人曰僕最不喜觀近人遊記人遂有誚豫無登陟情者顧少時讀漢官儀而驚心偶閲謝客入康王谷詩輒把卷惟懼其盡則是能言山水者亦未始不好之矣鐵公居焦山數年而後入黃山既窮其勝抑復退居雲谷寺作黃山主人因之有遊黃山詩越千里相示夫鐵公有道者也曩者于無何之中不知何所見而太白山人以為見道而許之使如來無象者而忽著之為有象而況山容儼然極人世變幻之形視之如指螺掌壑當下可信而且見之真而言之切舉所見示人而人必不以為不可見之事則雖謂謝客之詩應劭之記畢陳于吾前當亦未有非之者而乃以豫不善遊將并世之言遊者而盡屏之豈其然與經義考序經義考者諸儒説經之書目也古經定于六春秋以前惟有易書詩禮樂春秋六名見於經解而其時夫子傳易子夏序詩虞卿論春秋各有經説行乎其間即至燔書以後尚有古五子十八篇周官傳四篇列漢志中而嗣此諸儒之説經者遂紛紛焉自宋人倡為論曰秦人焚經而經存漢人窮經而經亡而後之偽為文中子者直伸其語曰九師興而易道微三傳作而春秋衰于是談經之徒各大掃儒説而經學不可問矣考漢武倡制科以經義為對䇿之首而漢後説經之文皆稱經義今貢舉家猶以經義名舉文可驗也獨是豫之為經必以經解經而不自為説苟説經而坐與經忤則雖合漢唐宋諸儒並為其説而豫所不許是必以此經質彼經而兩無可解夫然後旁及儒説然且儒説之中漢取十三而宋取十一此非左漢而右宋也漢儒信經必以經為義凡所立説惟恐其義之稍違乎經而宋人不然孟子曰盡信書則不如無書書可信乎吾所信者義而已苐先立一義而使諸經之為説者悉以就義合則是不合即非是雖名為經義而不以經為義有疑文言非十翼文者有疑顧命非周公所制禮者有疑春秋非夫子作者有疑春秋傳非左丘氏書者有疑孝經為六代後增改非七十子所舊傳者而至于士禮則廢之周官經則明斥之王制月令明堂位諸篇則直祛之詘之然且有誤讀隋書經籍志而謂尚書為偽書誤讀劉歆讓博士書而謂今所傳國風為偽詩者是無經也無經焉得有義豫大聲疾呼以救經并救經義而不諒者遂謂豫遵漢而惡宋豈不甚寃然而儒不説經不知書之有經也經説不備則并不知説之以經為義不以經為義也朱子竹垞知其然先定其為經從前人所增七經十經十三經外而更廣一大戴禮曰此皆經也定其為經而凡以經為義不以經為義者而既已有説則并從而共臚之曰此亦義也有説而義明有非其義者而其義倍明豫方慮世之掃儒説者駕言窮經而故蔑其義以圖自便而又何暇乎左右而取舍之于是竭搜討之力出家所藏書八萬餘卷輯其儒説之可據者署其經名而分繫其下有存帙而無是非使窮經之士一覽而知所考焉洋洋乎大觀哉嘗按周禮春官以外史掌五帝三皇之書而志其書名此列代史志所自昉也乃漢武藏書名之曰䇿而成帝求書天下命總其羣籍而合為縱略其在經義則所云六藝略者是也至後漢以四部立名而以經部為甲部歷魏晉六朝或稱新簿或稱舊簿而要之皆部記之名此趙宋三館所以直稱為書目而無有他也然而在官輯者如劉歆奏經略班固著經部王儉撰經典志唐儒鄭覃輩之修經書四庫而自為輯者則如謝康樂之編經目阮孝緒之分經典録各有機軸竹垞曾館內庭為天子典祕書會其時方用兵滇黔再闢固未暇檢校而籖帙之也其後下徵書之詔敇天下經義之在學官外者皆得盡入祕府而説經之書于斯為盛然而未經甲乙也今竹垞于歸田之餘乃始據疇昔所見聞合古今部記而著為斯編曰經義考此真所謂古文舊書外內相應者乃其所分部則敕撰一卷尊王也十四經為經義者共二百六十三卷廣經學也逸經三卷惟恐經之稍有遺而一字一句必收之也毖緯五卷緯雖閟説經者也夫緯尚不廢而何況于經擬經十二卷此則不惟自為義并自為經者然而見似可瞿也其與經合耶是象人而用之也否則罔也又有師承三卷則録其經義之各有自者廣譽一卷立學一卷刋石五卷書壁鏤版著録各一卷通説四卷此皆與經學有微繫者然而非博極羣籍不能有此家學一卷自序一卷補遺一卷共三百五卷書成示豫豫曰嗟乎少研經學老未能就不及見諸書而年已七十九矣孟子曰觀于海者難為水遊于聖人之門者難為言荀子有云不登高山不知天之高不聞聖人之言將不知學問之大今經學大著聖人之言畢見于斯世而生其後者復從此而有所考鑒則既寶其書為盛朝慶而又喜天下後世之知有經并知有義也因卒讀而謹為之序張中丞勤雨録序歲六月不雨至於秋七月中丞張公偕行省觀察以下暨郡縣諸司並起禱祀雖雩壇多處所而要以城隍為之歸以為城隍者實五方五示所分主也乃自六月既望至七月合朔亦既見霡霂而禱祀不輟當是時豫方病􅂒痢僵卧西溪僧舍間未之知也暨七月望後天愈燥禱祀者愈切一日兩詣壇却輿蓋屏左右伍伯閉訟停獄市禁戒魚獸諸屠殺豫既病轉劇不能從而坊民愛公者各出丁迎土龍十門喧然以為公從此可息肩也乃公翻止之曰此我事何為廢民業且徒衆雩請無費耶諭坊民令歸而民乃散去其曲恤民隱又如此既而公留壇謝師巫里老謂吾生平呼吸通帝庭頗受神答今若此乃為奏書曰寧損年無無年奏訖卜之報曰天書有成矣犬豕日當有雨既而壬戌癸亥日果雨於是鄉官偕士民營壇於城隍之祠為公祝釐者三日且有願減年以還公年者乃合著為勤雨録而附之以詩蓋有取乎魯僖勤雨之義也夫甘霖立沛往屬諛詞御史隨車襲為故事矧以里門鄉官而頌當塗之賢勞非誣則讇而獨於公則實心實意格乎天而感乎人此在為編氓者雖合兩浙千萬户鉥心劌腎亦安足以酢公德徒藉區區齒舌間以言詞誦公為誼已薄而況明明口碑因避嫌而翻諱之則人各有心必不出此壺山草堂詩集序豫僦杭州凡詩人文士無不把臂修往來之好而獨于吳君介庵生未嘗相親逮屏世而始以壺山草堂詩集屬豫辨詞叩其故則以愛吳趨之勝築草堂居之十年以來未嘗返樟林舊桁以故蹤迹太稀聲問不相聞夫以錢江栁浦日搜探不暇而乃舍而之吳且相樂丘于東武之側一似子真之居吳市童子鴻之請墓于要離塜傍者斯其人固已殊矣乃披其詩則登覽十二贈答十三宴飲酬酢與感寄觸􅔊者十四而鯉庭倡和之作反十居一焉然且直抒其所得落落自好不詭隨于人幾不知世之有唐宋與元明者夫人席朱輪之裔服食玩好悉狃于便安未能拔擢以超于人況儼然為是邦名士文譽翔藝林而乃龜解蟬侻舍榆枋之控而一壺自適文詞爛然逡巡與在庭之賢鶴鳴子和此其曠懷何如也其猶子尺鳬吾小友也攜其詩來因率為題此而且以告之朱氏易韋序舉世皆言易而易亡然惟易可以舉世言之倘舍易而言詩則弼鄘唐檜至今尚莫解其名舍而言禮則祗為人後一節而定陶濮國積為千六百年必不可釋之寃獄況其他乎苐易雖廣大任人可言而易之為易卒亦未有言及者豫嘗謂言易有三一則易辭有著落一則與左氏史占相合一則包犧氏文王孔子同一易而無兩易而世之言易者皆不然名為言易而實自言其易不惟自言易而且自為作易易林之自為爻辭司馬潛虛阮氏洞極之自為卦畫揚子太圜衛元嵩元包蔡沈洪範皇極之自為䇿數為蓍數為揲扐之數可謂易乎如是而欲易之不亡何待已朱子贊皇作易韋不必言易也亦自言其易已耳而易可以見亦未嘗于易外自為易也亦就易言易已耳而其自為易亦可以見贊皇嘗與豫講伶州鳩七律之學泛濫不竭其好學善辨有非尋常涯涘可窺見者今此言易其洸洋猶是也而口可得道指可得畫舉易之廣大而悉歸之書不盡言言不盡意之中生平搜祕藏每恨史蘇靈臺無名氏翠羽玉闕諸書之不著于世以為易學雖煩亦饒缺落何可當世有此書而不急覯之湖州府志序天下不可信者三一道經記黃帝君臣一姑布子家談人相有休咎一天下志書所載山川疆域人物居處斯三者皆不可信而或者疑之周官職方氏掌天下圖籍并辨其人民財賦獸畜之數為作志書所自昉縱或未具亦安至如方術形法同類併斥而實有不然者小藝荒略無足取信斯已耳公然作訓方形國之書則凡疆場􅏠離道里厄塞皆有居馭之勢繫乎其間而況風土之記誦四方之傳道其為王朝所採托者觀物新舊並關掌故于此而叵信則天下無信書矣曩時考吾浙諸志嘆其紕謬即職方首載九州東南其𨽻吾地者一會稽巨鎮而不知所在一三江大川而于浙東浙西並不識分屬何所遑問三男五女獸畜穀稻之璅璅者哉是以疇昔記載如顧夷吾之記山川劉道真之記錢唐酈元注水經孔靈符著地志以及唐元和郡縣之記宋淳祐咸淳臨安之志皆誤讀禹貢史記及兩漢地理郡國諸書以秦始東渡為取道餘杭以漢西部都尉治在武林山以晉咸寧中開臨平湖為浦陽以西錢江以東以劉宋泰始間從海寧進軍趨蕭山回浦為從海鹽進軍趨錢唐同浦豫在蕭作蕭志刋誤在杭作杭志刋誤亦何嘗不歷歷置辨而無如􅭸駮之極不可以條件爭也湖志亦然湖之地始著于秦漢而大顯于南北六季之間自三國以後人物之盛甲于西浙而其中記載失實則自明萬厯以迄于今作志者不乏而訛脫謬誤前後一轍鄭子芷畦者博雅士也胸有書卷曾讀草一史而櫽括之而出其餘技輯湖人之著于史者自序紀列傳以至表考分其門部兼别其義類先合仕寓土處諸人物而彚以成編夫然後遍及象緯山川郡縣田賦户口徭役以至食貨之煩穀畜之細圖記十二表八考八列傳十五藝文十二共一百二十卷夫志莫難于人物而山川次之其餘又次之豫向受寧紹分巡之聘請修吾越人物志而辭之不得至鑿壞而遁何則人物去取恩怨之府也今湖中人物什倍于越而當前世家大族其卓然名氏無容甲乙者亦什倍于越雖芷畦受郡使君之屬再四諄切乃不憚一身肩之殫心於新舊碑版之間會萃以成而三代直道皎然不渝則其才力之敏贍志意之峻潔亦可見矣至于山川户口興廢沿革則又精于考核不復可疑如前所云者獨是故明一統志肇乎洪武而成于景泰其間歷文臣學士共相纂輯而仍不可信今國家文治大啓已敕諸儒臣開館撰一代之志賜名一統此必有大異于前者會王師北伐未集于成倘進芷畦之書而參稽之則以信徵信定鮮擬議其即以為天下可信之事自志書始未嘗不可也塢里張氏族譜序宋人立族譜稍合於先生收族之誼故世每遵之特是作者初意務在詳近惟恐惇敘有關因之造譜亭以會生人而踵其事者誇氏族之盛祇彚一姓之名且顯者記其官閥而考其事迹不問九河與九洛各有流𣲖祗繪圖立系以冠之卷首而于是遙遙華胄之譏所不免焉吾邑張姓皆名族而源委不一塢里之𣲖冠簮者纍世越宋元迄今而詩書不替可謂盛矣顧歷世久遠難以考據即其先有神人當汴宋初年為工官捍江以死勤事一如祭法所云冥勤其官而水死者列代援報功之典列在祀版此亦吾邑一大人物而即縣志乘不載始末不注爵里甚至有諱而無字有使銜而無授秩史書家紀兩茫茫焉裔孫二監搜元時所著族譜得殘䇿數簡力任修葺偕其弟南服仿所見所聞之例合遠近而增損之顧遠不加詳近不過略傳信而闕疑不檢不濫即其顯著如神祖亦且斟酌擬議不加杜撰于其間何其慎也豫老不捉筆不作序頌而譜像紛投尤不敢漫附一字而獨于張氏是譜有諄諄者世鮮才士以二監兄弟之才將必有文章大顯于時後人立言正當與前人立功有相需者此在吾邑且嘉賴之豈止鄭穆七族之有公孫羊舌十一族之有叔譽氏與東陽杜雍玉詩序當世有文人而無學人而今則并文人亦無之自避人山中曩時四方枉訊者多以五七字當乘韋之藉近且寥寥焉顧殘年相對由同里舊遊外獨與東陽學人王虎文父子暨盧子遠輩間以學術相往復而子遠競推其鄉人杜君雍玉為文章之雄豫嘗為其先人杜見山先生作悔言録序嘆是家有學其後必有繼起者而雍玉果以文名且出其所著楓莊詩遠屬論定夫詩之升降非一日矣漢魏不作降而三唐既而漸降為宋元每況愈下而世爭趨之何也以其便于不學也初尚謂詩有别情非關學力而今翻以學為纍曰抒意而已致使市肆袒裸爭相齗齗而雍玉以學行之上自六義之三原本風雅而下逮兩京安世三朝相和與夫黃門鼓吹軍中短簫諸樂録皆能就其詞以倣佛其概然且古排律絶各有攸歸日與二三同志唱和豫汝內飭其情文而外循其體製吟咏之間秩秩如也或曰子研經有年客以文序相屬者必瞑目搖手曰吾研經安暇而于斯獨娓娓焉曰子亦知斯文中之有學人乎西河集卷五十二
