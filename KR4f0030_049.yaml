body:
  text: 西河集卷四十九翰林院檢討毛竒齡撰序二十六重修族譜序豫族以魏尚書僕射孝先公為遠祖南渡直言敢諫科進士侍御史叔度公為兩浙之祖元初處士貴誠公為餘姚祖明贈朝議大夫福建都轉運鹽使司同知坦然公為蕭山祖逮豫十世矣自明正統後迄今康熙凡一百五十年間其登仕版者世世有之而在姚則丁多而族繁在蕭則丁匱而族復不充兵燹以後譜牒荒焉幼時聞族祖禮部公云寧七府君墳在餘姚師姑嶠冬青樹傍當石阡公征苗時值餘姚參政公為貴州提學副使兄弟行也同時仕貴州歸而墓祭于師姑嶠樹旌竿嶠中暨榜眼公以嘉靖已未官翰林編修相墓者曰師姑嶠墳後六十年亦當有以鼎甲官翰林者及萬厯四十七年又值己未而其言不驗至康熙己未豫乃以制科應召凡取中者倣宋制科例悉以上卷官翰林一如鼎甲之不必由庶常而授編檢者然則墳墓之所蔭其歷久不隔如此今族既散處惟藉譜記而譜又闕落豫弟大觀乃力任而增修之豫告之曰古貴分宗姓分而為氏氏分而為族是也今貴合族族合仍為氏氏合仍為姓蕭之五大房即一房姚之三大支即一支是也合則如磐石牙齶相互合則如葛藟如瓜瓞根株與枝葉相轇轕而多所倚附僕射雖逺昭假如在矣於其成也因舉蕭之與姚其祖宗墳墓雖歷久而不隔者書之于端合肥相公千首詩序合肥夫子自汰其詩一萬首為一千首曰吾家多文相然自深之明逺後所傳詩率不滿千首蓋世無萬首詩相公集也某嘗謂夫子三不朽德與事功早見諸天下至于言聖人曰其代豫言久矣然則此言戔戔耳大言行則小言可省而亦有不然者當夫子以侍從槖筆為天子所知日草千百言每計年枝幹而編其詩比年必編詩千首或贏或絀如是者約十許年某于請急時乞録夫子詩南歸名還町雜録今所存尚千有贏也往處門下見夫子以學士參知入政事堂中夜呵門出雞未鳴也至日仄而始還第故事參判詞頭伺日上鴟吻刷廏馬行傍已而散間有申入而酉出者崔相所謂薄暮出端門上馬詠詩是也今必駕以夜而稅以晝然且由元月以迄除月略無闕日無輪辰知印無三日五日一坐磚位無兼旬注門字自左右相至六事府三府皆然而夫子皆歷周之乃復所至優暇方侻巾小寢之後門館間間白日明靜取韻牌集字以當茗博遇有酬唱則押紙疾書連篇而纍什不計也夫應事拙速不關勞軼夫子處性沈默而抽思朗捷既熟于朝常晨夕待顧問無所檢點而所押羣務即踰時越嵗偶一詢及無不響隨莛鐘而應若桴鼓以故心間而思敏發奮泉湧雖欲過簡之而無可簡也嘗考三公宰相舊多兼官而不必實親其職周公以太宰兼太師江左置政府作司徒官唐以三省長官為左右丞相皆屬兼官而身歷其任則山巨源閲吏部司徒兩府之政杜佑以檢校司空入中書門下平章政事世每加稱而夫子歷四部尚書由冢宰以入東閣雖主知實隆然其卓捷為何如者古曰黑頭曰其年不可及鄉使夫子以逮今之年留意聲律猶能以度越前進跨常侍而上而夫子不為也夫子曰詩有以相掩者李德裕是也德裕處慶厯之間以文章名而其後不傳其詩而傳其人相有以詩見者張説是也燕公踵姚宋之後足可繼軌而當時不稱其人而祗稱其詩然則詩亦可省矣某從在籍之末窺夫子所為百務簡簡而天亦即以簡德報之方太夫人歸葬時天子奠以酒題曰貞松而不奪其情然而三公不備台司闕其位以待之三年甫服闕而就家起之其為天下重輕如此乃喪車渡譙水乾膠舟所至省民徒而家無伍伯相國綰雉繩前行不移跬步既而譙西水溭溭初不知其所自來也某嘗赴義躬詣墓林見夫子廬居棲舊茨三楹卑且狹也第治司馬公泉臺經營髙厰念無可為環蔭地者橫岡百里外無夭喬焉乃姑移前山枿蘖略具左蔽而叉粒駢茂鬱然成修林墓左宜園司馬公讀書堂也稍稍理之作饗祭之室不蓄蔬果不安禽鳥而方春而白燕來巢未既而復有南方翡翠重棲于丘樊謂非簡儉之格天有如是者乎夫萬盈數也夫子去盈而就歉而歉亦滋大漢志曰大于千故千人之長曰阡田與錢則皆以阡計大焉集文者以千字為率史記貨殖傳凡棗橘薪茜羊魚醯醬凖以千為數曰千亦足矣則是相公之詩之千也蓋去盈而就歉也然而詩之大亦見于此孫繡姑表貞録序國風首弼鄘而弼鄘之首則又以兩柏舟詠婦人志行之不可奪然則婦人之關于民俗久矣獨是表勵之責曩時率歸諸監察御史以故巡方每嵗必上所聞見孝友廉節核實以題旌而今則悉聽之開府儀同彚請事行之合例者三嵗一上而他不及焉以豫所聞錢塘孫繡姑有絶異者繡姑十五一稚女耳毁齒作人婦以貧家而為樣婚少小過門雖與家人合屋居而笄篸未加則又一室子耳乃其舅其壻販笠他鄉而與狂夫為比鄰杭俗貧巷多連房界一壁以分兩家而朝夕厮喚男女不能避狂夫每侵女女拒不受至是以溽暑闔户湢浴而狂夫穴壁而撓其足女嘂姑訴之鄰人狂夫素自豪往往以盛氣凌四鄰于是率黨來咆哮鄰有老者謂之曰何必然杯水可以謝百過過在君何難寫杯水謝之狂夫手杯前名為謝過而實借以為調笑女乃擲杯中其面面血狂夫率黨排闥入將捽辱之鄰人解而罷然詬詈不已其語有不可聞者女乃紩其衣撮鹽而滷之侵晨進羮于姑聞詬聲泣而曰不幸而遭此能事姑乎既而狂夫詬至門女仰滷氣絶鄰人聚衆首之官會開府張君甫勵治以興教化正民俗為已任聞其事核實乃破格入告而先置狂夫于理或言女棺劣且豁不蟲不穢青蠅四飛無近者開府為置棺復而畫之重為文遣中軍致祭而布政使趙君少參李君按察司副使卞君皆前後為弔詞懸之棺傍里老為席舍覆之凡郵亭鄉官士大夫之家居者及郡縣學博士相率為詩歌文賦粘之席舍而里巷謠諺紛紛四起好事者作搊彈唱本譜其事為韻語使盲婦負絃而唱于市聽之者人一錢時康熙戊寅六月一十六日越數月而李子完車何子漢霞輯諸詞而授之梓豫自傷老去不能為一詞綴席舍末而猶幸開府諸君其能砥民俗以繼採風有如是也因應其所請而力疾書之顔母朱太宜人八十夀序易以兌承坎為節而其所謂安節與甘節者反不在兑悅之二三而在坎險之四五何也則以遇險而能安遘窞陷而能甘之夫然後坎險去而節以著焉獨是安節者甘于節也甘于節則雖節也而安矣豫官京師值顔先生淡園以編修領袖史館而豫追隨之因得于槖筆之次竊聞顔母朱太君者為兖州鎮國將軍息女歸之贈公考功郎當前朝崇禎間河北大飢山東畿南皆被兵贈公父河間太守以嬰城死官而家居魯東兵之環城者潰而入悉俘其閭左而疾驅之且云緩者剚以刃急即免時太君在俘間故不行曰此生須臾耳何緩急為遂剄之城下而幸未殊也越數日家人有救之而歸之者方是時贈公家已破然猶踉蹌走河間奔赴請恤大司農倪公恤詞所云忠孝節烈萃于一門者是也豫嘗聞其事而為詩記之暨先生母弟修來君入為天官考功郎則太君次子也幼負才譽好以文章為交遊東曹邸舍車連而轡接豫嘗隨衆赴請召茆菹螺醯出其故鄉所進盧酒者而飲酣咨嗟必與編修兄弟謀造養堂于京師以迎太君謂太君春秋髙人夀幾何每以兩官奉庳薄深惻惻焉今豫方歸田而太君三子世稱學山先生者復由檢討充兩浙主文官其所得士率一時名下而豫兄之子忝冠一經遂藉同館兼通家往來及書上天子嘉其能會功令督學院使暫禁坊局參以二卿諸重臣而先生獨以史局官破例特簡為兩浙宗師建笳鼓開牙禾中乃欣然迎養太君張幃設幔躬帥門下士扶侍後堂而太君已八十矣丙子五月值太君生日豫既合鄉之搢紳彚為詩册而門下舉人偕豫猶子輩復製幛為夀豫曰此即前史館所稱朱太君也即編修考功所共謀迎養而未得者也夫當太君未行時其自視此生祗須臾耳距今五十年而已臻八十是須臾而千秋矣夫以前須臾言之不可為不險以今八十年觀之則又不可謂不安夫太君固甘于節者也而今以節而得甘又安于節者也而今反以節而重得安是節固坎也而一變即為艮坎者險也百川之至也艮也者貞也安也既如岡又如陵也而統于節乎該之今夫天無節則不成嵗地無節則不成理草木無節則不能發榮華而致盛大第觀夫百丈之松結根山阿凡勃窣輪囷喬然不拔者皆恃有節目以釐乎其間則是險者安之基而節者夀之本也孫氏族譜序周制工史書世宗祝書昭穆每以同姓所系載其世次于簡册以合之宗廟昭穆之列故雖别生分族姓氏屢易而終不失其本源所自何則有所以記之也吾邑孫氏肇基于樂安而大于富春其自奮威將軍領丹陽太守以來歷居吳陵有年矣暨趙宋南徙仍還江上相邑之湘湖而僦居其中至明世宗朝有禮部春溪公以文章為世指名而其弟東莞公登嘉靖甲辰進士當時榜之為湖中雙鳯比之雲間之兩龍而不為過豫嘗過湖濵慨然慕思嘆前哲風徽未嘗或沫而惜其族之無可詢也今吾友爾猷誦揚先烈以康熙辛酉登鄉書赴公車門還隨彚其族人溯本星宿而派之胡蘇馬頰之末不佚不濫仿工史所記而葺為族譜使煩有所總散有所紀逺而疏者皆有統彚而孫氏之工史成焉豫每見時俗之薄不親之至流于不遜見族人不問問亦不記間有詢其服屬者輒曰工史書世為天子諸侯言之也庶人何足當此數而簿之籍之而豫謂不然不見論語之式負版者乎夫民家口率何與至治而周官司書每以邦中之版籍記諸名數而少宰聽事即又取其所稽版以驗其是否論語所稱敬民數是也則是天子至尊猶得取下民之數而周知之況同宗已兩浙布政司使蔣使君民懷集序昔姚元崇去荆州時民遮擁馬前百計思所以留之者雖折鞭截鐙填門塞巷不可得于是為謳歌以送之今行省蔣公之將去浙也士子叩幕府慷慨陳辭農輟耕于野商人罷市三日咸褁糒躡草屩將嘂呼闕下願還我公會皇上親統六師征逺塞之不庭者無暇啓九關以延清問然後民之懷思者相率為詩歌以志其不忘之意此其事與姚相之去荆門等然而何以得此吾聞公以從龍起家由官閥名員出佐巖郡卒之以行軍司馬竭蹶效力于東甌再闢之際亦已多年會戈船出海南擴溟渤舉彭湖髙華從來不臣其地者悉舉而為我郡縣念非偉略素著足以撫綏其地者未易勘此巨任而公膺天子特簡軒車露冕為海外長城其間軫民隱而恤民瘼不為不久顧與浙人何預焉暨公以西江觀察分路揚鑣賜朱旗繡袋以榮其身遂得以參知政事行省此邦然而承流宣化不過兼總大綱與斯民相倚賴舉凡政刑璅屑獄訟煩賾悉委之諸屬而已不與惟是舉賢升秀底慎財賦以攬其户版之成未嘗家餔人餕與為咻噢而民之愛之戴之不忍頃刻而暫離之若疾痛之聨膚而甘苦之共咽者此曷故哉則以至誠之相通而剴摯之忱實有沁浹于心而不可已也夫民可虐而不可欺也久矣歡虞之治未嘗不足以動人而肌膚未浹神髓未濡往往農人野婦忘長吏之尊對若家人然且鋃鐺夏楚不忍相加哀矜涕泗以轇結其情而究之所居有名及既去而茫無可思蓋違道干譽徒邀民聽而民終背而去之有如是之愛之深思之切無所為而為無所強而終致之比之孺子之慕其母呼于途號于里門雖其母以得罪去猶不禁其子之期年而猶哭也書曰皋陶邁種德德乃降黎民懷之又曰民罔常懷懷于有仁題曰民懷紀其實也然而何以得此安郡王詩集序曩遊梁時值大雪過孝王園嘆寒士寥落不能入平臺曼館槖筆為文詞而棲遲道傍所稱鄒枚安在耶因下馬長思久之暨應詔赴制科濫厠親近劇聞桂山蘭坂間多維城之英龍種諸孫率能以多學仿周家分子賦詩睦族兼與賢俊相介接而又以身為朝士不敢越典例一登其門然後知遭逢有數人非鄒枚雖日伺東邸而無所用也今請急歸里已踰十年乞間下士不妨入日華之館校論古者而長安相去三千餘里痺軀曲足何能自前即當時休沐曽與王孫博公者唱酬主客已唶唶成往事不可紀矣獨念出都時客有書安親王世子一詩登之障面其題為秋江夜月用十四寒韻某愛而和之其詩至今存集中然實未嘗令世子知也乃數年以來大江以南藉藉稱古香主人詩禮堂書牖輒能寫其句入鏝壁間識者指之曰此即安親王世子安郡王也詩本之溫厚而出入風澤辭輯而氣懌一闢長安俗好南宋俚慢之習似與景運有重繫者丁丑嘉平某醫痺杭州僦君仁和羲同里忽有客從長安來扣門而入出所擕書授之曰此古香主人教今也主人以近所為詩抄謄一卷令校次而敘論之某叩首捧讀作而曰此非景運𢎞開之一大元會乎皇上以神聖之資大啓武功使薄海內外咸入版籍而文教則誕敷久也從來功成樂作必以四始六義為五聲八音之本是以中和丹陛皇上曽釐定樂章播之歌詠且復昭示羣臣以生聲製律之法某嘗對揚之作皇言定聲聖諭樂本二書而未有進也今諸王大臣皆能起而昌明之長吟短句一唱三嘆可以鼓休和而曜文德何其盛與昔楚元王好詩因自次所學為元王之詩而漢代文始之樂于斯以備即其後河間獻詩入對三雍説者以為此天人協應之助今主人所學亦猶是也某雖不才猶得于鄉居之次奉揚聖教為一代文運所始即使皋陶揚言后夔典命亦未有過而又何鄒枚之足云索太僕晴雲集序詩有性情初非質言之為性實訴之為情也當其情之所發根于至性始之兆朕于無何之鄉探之難明即之而無形既已刺刺焉不可自已而稍渝而遽失之而于是見之為言有漠然不解其所自來者而人之見之怵焉而驚􅀢焉而感默焉而神傷以為疇昔曽有是而厄不能言即或偶言之而不能委晳焉如是之鬯而此能言之且一若為我言之而鬯之夫乃所謂情矣是以作者于此鉤不為深灑不為淺雕鎪鍥刮焉而不失其靡煩怨亂之節屬詞比事觸物而連類此在九辨懷忠四愁怨友諸作時時有之而不知者動以玉臺西崑相比方豈通論與猶子季蓮以偕計赴都與太僕索君飲酒賦詩把臂金臺間攜其所著無題詩若干篇歸以示人人見之輒慕效以為天下詩有如是其可思者吾何為不為之乃為之而倍見其不可能有匿者有自慚形穢者有爽然失者猶子為集其見存者若干人人若干篇彚作一卷將以質之長安之言詩者既已付之梓而載板以行豫因于是時附一詩焉而惜其死于途而不能達也今豫僦錢湖而太僕乃逺貽以詩緘其所藏稿而屬題其端豫乃發其册再三讀之益嘆太僕之不可及也太僕席台司之裔年幾終賈早能以其詩上膺主知應制之作裒然冠諸篇且復唱酬雜沓藝場文圃皆遍寫其詩粘之屏幛而不遠數千里向請急老人而揚風扢雅一何善下豫自歸田後往往訊日下近聞皆云長安髙髻頃刻變幻車轂名士一時相尚為謰嘍之音反脣為歡而太僕獨眇不一顧専以胏腸為纒綿人多稱之惜豫老去未能藉美人所貽特為酬報而疇昔和篇乃不意隨衆人無賴亦謬附一詩寄思君之意一若冥冥感通有無端而啓其機者是亦言情者之所未解矣栁煙詞序少年讀人詞如聞清歌如衛洗馬渡江如從王伯與登茅山心思靡煩覺白日莽莽而不知此身之何歸逮老而幽巖涼潦不接朝旭壞衣無暴色散痺肢而沃之湯泉之間疴癢不復關寒暖不得相知雖日讀新詞何益而鄭君丹書以詞示豫且請豫言序其詞豫思魏公文靖年八十餘尚示門人何穆之曰晚來讀離騷殊動人思夫宋詞者唐詩之餘也齊梁清商曲詞吳聲歌詞者漢魏詩之餘也楚詞者三百之餘也文靖讀詩餘而思生矣不觀栁煙乎春雲羃䍥結初黃而曼布之長條細縷芊綿而可愛而至于秋潦至于冬烈武昌官渡櫹梢都盡而朝暮黤􅀈猶尚有霏霏之色舒卷其際詩之餘不猶是乎然則讀詩餘而以為可思老少無二時宋人與楚人無二詞矣丹書以栁煙名詞而意有在也吾故敘其詞而告以是言始寧陳璞菴言志集序詩無成法祗自言其志而歌詠出之故曰詩言志又曰在心為志發言為詩是詩者志之所發而往往得志之士其文不彰詩三百篇大抵賢人君子不得志於時者之所為也陳子璞菴以始寧名閥寄居杭州其為人慷愾卓犖不詭隨流俗而與世之漠漠者遊嘗過其所居席門蓽牖庭外多軌轍而髙堂熙愈家室雍睦間與一二友朋商古今得失豫嘗聆其言而敬之今觀其為詩情能緯物文足被質散辭觸事取之為歌咏之資雖古今殊體而各極其致非所稱風雅兼行短長並見者與又非所謂心體明密故出言而能通居已端誠故輕浮之盡迸者與或曰陳子失志而詩自得即有時得志而詩亦無所不得志之無與于詩也而豫曰不然陳子自號璞菴矣始而見刖不為璞傷終而見收亦不為璞幸曰吾志有在失者志不失者亦志也又嘗以摽梅自居矣松竹徑節雖嵗寒櫹槭而榮瘁不形惟梅有枯菀而芳華之時不厭摽落曰吾志在是得者志不得者亦志也然則陳子之為詩一陳子之志為之也而他何與焉西河集卷四十九
