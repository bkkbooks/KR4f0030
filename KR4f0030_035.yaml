body:
  text: 西河集卷三十五翰林院檢討毛竒齡撰序十二西湖三太守詩序杭之為守者衆矣而獨白與蘇並傳豈非以兩人並能詩哉顧樂天在唐當元和長慶之間距宋東坡時已二百四十餘年其間沙陀邢涿易姓者六而後兩人始以傳一若肩之比而踵之接者甚矣能詩之未易也豫僦居西湖值在園劉君以括倉良守借箸兹土西江聶晉人曾選在園詩而豫為校之嘗曰若在園者可以為西湖長矣既而蒼石魏君來則豫友也蒼石以石屋丹崖諸集屬豫纂定而晉人適至遂列其兩集于百家詩鈔之間且于去官後和東坡守杭時詩以寄意會舊黃守蘇君小眉代蒼石豫曰此真坡也當其命字時則既已坡居之矣乃適守兹郡相傳小眉詩提筆千首雖紙竭墨渴而筆尚未輟晉人居湖久將行還顧曰吾無已於湖吾當為湖留佳話去因遴三君詩並列之名西湖三太守詩夫自有杭來即有此湖亦即有此守即守之能詩者亦未嘗間絶于世而相遇甚罕今一時而適逢其盛彚後先三守于兩年之間而聶君晉人即又能歷取其詩而為之選之遂使曩時蘇白閲五百年僅一見者而今且車連袂結于滄浪之濵此不可謂非千秋極勝而豫以僦居一老亦躬承其際而觀其賦詩何厚幸也來子心聲序來子心聲者來子哭母之所為作也夫來子之所哭不一矣有哭其猶子者有哭子者而總以哭母之哭哭之夫哭母而何以文曰此其所以為心聲者乎蓋哀感有七惟心無飾故或以義哀或以情哀或耳目聞見而哀或口嘆而哀而心之所至則百哀具焉是以烏啼七章過于九嘆而祭姪悼兒較有類于昌黎之為文顧况之為詩者誠哉靈臺之呌號矣少從倘湖先生遊嘆先生以􅈤摯之性流為文章真所謂淳意發高文者而趨庭嗣興復能以孝友天性形諸哀嘆而不必以文為文而其文如此聞之來子好老氏放情任達置身于逍遙之外凡一切感心觸性稍有眷戀急舉而聽之無何有之地以為緣神感動恐傷自然而獨于天倫迫切若將身殉焉而不之顧且夫撿心者吾得以達心解之泥情者吾可以釋情喻之乃以來子之放情任達置身蕭散而迫切所至究且轇結繚戾而至于如是夫如是則雖欲寬之以原氏之歌慰之以曽點之瑟又豈可得哉龍眠風雅序自昔邦賢國獻多得之雍豫燕齊諸境而吳楚以南傳者漸少顧其所為可見者即一言一行致足稱述又何嘗定以文章為是邦耆舊高賢傳哉故七國文儒東漢名士原無爵履官閥可資撰引然且澤不被于人詞不彰于世而其名其氏誦之赫然今則非文不足以傳人而史館文厖無能軒􅀢非其人所自為文足以嬗後則雖言行之間原有可見而其人不傳然而今之吳楚猶之昔之燕齊雍豫而高賢耆舊往往不逮致觀者有古今升降之感此非其文不足傳而其文之可傳者或不能傳之使天下見也𤾂城為七國楚地而樅陽入漢即為名縣其間髙賢耆舊代不乏人且挽近以來名士輩出凡言行文章致足稱述者前後挽推互相暉映可謂盛矣乃潘子木崖復慨然念宋元以降自武樂洪宣下逮今日有其人其文久傳人間而風雨兵革侵蝕流散漸至洇蔑而不可考者將先輯其詩為集因博採國志旁搜家乘凡夫故老之遺聞閭閻之狎識務必袪其可疑而徴其可信不泛不逼以該以審命之曰龍眠風雅且不以豫為不文屬為敘次豫思江左言詩首推雲間而雲間又首推陳氏當夫黃門崛興與海內爭雄一灑啓禎之末駔獪餘習而其時齊驅而偶馳者龍眠也故雲龍之名彼此並峙當時習故者其于江介諸先正歷歷稱舉皆有倫有等可備譜牒然而黨同伐異肆口雌黃蓋門户習氣則若有詳于彼而略于此者此生其後者所由輯遺詩而憤然興也夫里門必式梓桑必敬此在鄉之人固然矧文章大事宜辨方域昔有見羊酪而誇蓴羔覯水嬉而歌河女者其私其所處而矜其所袐即偶然給捷世且誇之為盛事况乎南音之當操而土風之可播與木崖著書等身其所為詩久為海內所誦揚然猶兢兢乎不忘先烈而具為搜討今之所為後即後之所為先也豫生為越人僻處海隅邑之文獻固無能與寓內頡頏然嘗考遺載亦有鄉先生詩共若干卷自有明迄今判為二集既鏤版行逺近而數百年間眇無一存即故家收藏兼本副録亦罕有見者大抵世近則相形者多忌嫉而代逺則因循忽略易致軼落豫往欲輯之而難之也賦吳都者矜灌注之能揚藪囿之廣荒陬詭譎旁魄而算自以為竭智計詞説有裨吾土而忽有人焉控引漨浡襲歷坱圠聚鮫鯔而集镺蔓舉他人之所憑虛而談睟容而誥者而皆有以著其實則夫按緑竹之詩以求衛産誦板屋之章以驗秦風而猶謂未足攄懷舊之念發思古之情不可已大山稿序豫與滬上二朱子遊未嘗僅以文章也顧伯氏周望少時用制文冠毛詩北闈其文久為逺近所稱而季子大山復以娛清樓詩傳之人間然則其文章且若是矣大山之言曰豫欲樂府如參軍五字詩如陳思仲宣律體高藻如考功工部一輩而久不可得故為詩不愜心輒置去其不得置者獨其遊西江前後諸詩已耳豫薄遊滬上主周望家因得竊讀大山所存稿嘆大山前所自期具能有之其樂府且足當古三調詞五字詩追建安以前律體有微近隨州與嘉州者苐其稿所存止十之三而豫復汰去其半似乎過約然豫見舊時鄉先達名士襲隆萬間遺習裒然卷帙自許博大即彼此互贈必曰著等身書而身殁而書不傳雖藏書家偶用備數或子姓善守護其板使不斷爛已矣其于存毁之數固未可知者朱氏自九世前後其所傳集凡十有四今鏤板尚存故志書稱鄉先達名士有文集者莫盛于雲間朱氏而要其所傳者僅如靜庵公麒麟頌邦憲公江南感事詩數册而止則夫後之繼先達而傳文者顧在多與柯亭詞序嚮與蒼崖作集字詩平陂單復頃刻裁押豫早知其能填詞及其遊大梁作大梁竹枝若干首願雅而雋狎得填詞家遺法竹枝者填詞中一體也蓋蒼崖才多其于學無所不窺然且未嘗習為之略涉即得故其為詞固未嘗知其為詞而其詞工焉况履甲得乙豫已早見其能工者哉特詞為詞語使必效隋唐餘習刻意組就將以别于元慶之庸便嘉隆之佻滑而其失也錐而不利詞為詞氣必欲蓄志以藴氣使氣不橫泄比之詩歌庶幾免于蘇黃之奡劣辛蔣之頑誕然其失也宛而不舒蒼崖甫涉筆而二弊免焉蓋詞如衣然稱身而裁不減不浮而後越布單衣皆得目之為佳士氣如管然依聲高下而不伉不墜然後街談巷諺亦且播之為雅音而無所或二柯亭之詞不如是乎中郎見竹而知其材豫見其為他詩而知其為詞雅有同量若夫學仕者之亦為詞古有以君子而為詞者晦翁也晦翁且為詞而况其他也有以大人而為詞者希文也希文且為詞而况其他也有以命世之才而為詞者蘄王與鄂王也蘄王與鄂王且為詞而况其他也王西園偶言集序往者雲間與東鄉論文援大易修辭之旨自六經諸子下及漢魏晉宋齊梁諸為文者各示體要與以正的東鄉不能難而雲間之説遂行天下既則吳中耆舊自相操戈苐推廬陵為鼻祖而濓溪震川諸先輩宗分𣲖接以次礽袝一時制舉家便之即使能為漢魏猶不足與今之制舉家爭衡百一况六季乎雖然亦唯六季為非是焉耳浸假庾徐沈鮑仍行人間則廬陵南豐未必不望而却足曽是區區者而敢與之潔寡多較細大哉然則今之不為六季者非為之者少而為之而能者之少也豫與西園王子遊嘆其所為詩詞工麗絶俗以為雲間遺響庶幾未墜近讀其為文駢情儷句具極高勝猶且轆轤盤辟能使新裁别杼往往搖捩乎其間自非掞天之才為之摛詞又安見連珠繁露縈回錯互有如是者是得母所稱庾徐沈鮑者非與自初唐諸子工于詩律雖文仍偶體而格調全卑今則名為四六究其堆垜實表判爛假已耳夫以制舉表判而名為六季宜六季之不振也夫史遷班固不廢俳詞昌黎栁州多有潔字今毋論包犧一畫必藉偶成鍾吕間生娶妃而得試觀天地之間日月寒炎動靜往復凡夫花葉之駢生鳥禽之嫓翼以逮人事周旋冠緌扉屨又何一非奇偶之環為體者而西園以文筆之巧奪造物之能敏心慧指纂組成勢雖使嫘女縈絲天孫製錦猶不能擅其文而易其藻與彩也人即欲誇八家而抑六季而必謂絲麻之不如管蒯珠玊之不如砂磑夫亦孰得而眯之募建天衣乾公骨塔疏序向避人天衣乾公引豫至大悲閣前鳴鐘轑燭命豫皈法豫約以年嵗而未償也既則送乾公住靈隱又既則送乾公住揚之天寧時兵戈滿前植錫于西陵之路傍從容告别不謂别一年而乾公死死而歸其骨于天衣者又一年矣當公未死時嘗相天衣前大塢名茶園者指而曰吾茶毗後當龕骨于是而龕久未建法嗣寄庵為行腳告募屬豫敘事昔孔子有云朝聞道夕死可矣夫聞道早暮初亦何與于死生而至謂可死夫亦慮年嵗之不姑待以幸有是也今乾公聞道久久而可以死死而可以樹塔于茶園而不之愧獨豫以瀕死之人歸投于公初謂從此力學可旦暮計耳曽幾何時而公住靈隱又住天寧即又死而仍歸之天衣而豫猶然以茫茫之身為公敘事嗟乎人之生死可待哉公為天童之苐四世蓋三峰之孫而靈隱之子也靈隱嘗曰自五宗淪後必如公者始能繼三峰之學丁已秋月將有事建塔爰敘募簿且告世之能助者錢唐吳清來詩序豫讀翦霞詞如嫩簧乍調生絲繫桐金窗兒女子為帉帨家人語言而鸞雛未翔噦噦于銅屏之隟意其人必韶年而雋于言情者也則又慮其人或才高意闢興會英上昵于窈窕而曠于交遊况乎以留離之子當之翠尾之曳而赤霄之阻其不足副其婉孌之思也明甚乃吾未嘗見其人也讀其詞兼讀其所寓書抑抑乎藹乎若可親者又既而讀其詩且讀其和豫之詩則然後知其愛豫之深交豫之摯也古不有誦讀而相思者乎豫讀翦霞詞而思清來清來讀豫詩而思豫其彼此神契亦又何異顧豫久失志其詩本不欲傳于人間而疇昔在淮有王孫晉者能回筆效豫作雜體詩而近則始寧徐媛好豫長句遂展轉摩似世所傳徐氏昭華詩者則師豫作也豫方戒豫言而人不以豫言為不祥則緘祕之餘尚當慷愾一吐出胸中之藴况清來高才其為詩詞又豫之所遜為未逮者乎今清來詩超越凡近雖直抒所見不假容飾而意態橫溢駸駸乎有神駒拓落之致其和豫詩不下十百餘首顧皆非原詩所得髣佛惜豫逮老不能與之相唱和揚風扢雅以成其所謂誦讀而相思者也而苐以垂髫之年傳言情之句則進此以往其為情深而文明者益復何限吾未見情深而恝然于君父之際者也而况乎忘年交友愛好必篤讀翦霞之詞而猶恐于赤霄往來有相疑而無相契者也曷不取其所為詩而誦之丁少君四十夀序禮尚記年自三十伊始推至期頥每十年而更名顧獨不及閨閣豈非以閨閣無稱君子之稱即其稱與我友任君待庵以初仕為上海令會夫人丁少君年躋四十當君子強仕之嵗夫以君子試仕方在強毅而夫人以行年副之亦可慶矣乃在庭賢嗣纍纍稱觴就列屬豫一言為嚌酒勸豫因思夫人少席門閥其尊人樞曹君名滿天下雖不竟厥用然意氣亢逸務為豪上况夫人尤所愛也珠襴繡褓嬌處阿閣年時姻戚走車轂如流水而待庵以名家子當破産從戎之後長卿壁立慮難為歡乃夫人處之泰然復能拮據中閨仰事俯接周旋于妯娌先後之間可不謂賢乎且夫貴盛難久處也一人加蔮望者在户夫人自初歸以迄今日其間歷境變易如鮑宣就辟秦嘉上計在族里中外得失懸殊自不無愈戚相形之感在待庵閲久彌盛者而夫人一意謙抑平平居之者數十年即今劇邑之治與有佐理而夫人不以是自矜向非淑慎作德婉娩成性則葛覃儉勤采蘋知禮吾未見其能兼也夫閨中之年修短難計今無論夫人靜好宜享長久而即以記年推之自三十伊始晨昏笄總猶在子舍耳曽幾何時而趨庭衆多嵗月易邁一若當年之誦休洗紅者然則自強仕服官以逮傳政其將由君子而進年者可勝計與豫與待庵束髮定交爭欲以藝文雄長天下而為龍為蛇相逢官舍則夫回鹿門之筆為輞川中外揚徽誦懿雖欲過加以諛詞而不敢也張二先生八十序夫人之躋大年者綦少而或有其年而不能享受即致身通顯席履封厚猶然刺促旦暮竭心腎餘力急公營私求其優遊自怡衎衎于日用之間不可得况下此者而欲其遭逢泰然終其身譽處難矣故詩曰既多受祉蓋言受之之未易也豫少入黌序即知張二先生以齒長于庠凡後學始進者急從之習矩武稱為祭尊而豫以舊戚黃小敘行輩倍親且敬今豫亦老大而先生之子亦復以學行見重黌序人之見先生之子者一如昔之見先生而先生以今年仲春為八十懸弧姻戚中外各捧巵列幛為先生夀考邑之張氏凡有數族皆能以門閥甲第啓大于時而先生之先自曲江來遷歷安成而新淦而永興代有達人先生由儒術起少習孔氏咿唔相嬗數世矣乃先生性朴略洞無邊幅坦坦以遇物自少逮老喜節嗇自將不事文繪雕飾裘馬盤匜嘗擲杖行市中禹步嶽立挺挺然迄于今八十矣猶聰聽明視善起居躩鑠有如少年故吾謂先生之夀厥有數端夫夀曰全真以其無可飾也而先生以任真之性葆其天良夀一老子曰事天治人莫如嗇嗇則早服嗇則重積德今先生以節嗇自將是閟之者固而無所于耗也夀二丹經指太和為一元之氣先生之與物無忤和也而以得于元夀三且夫夀也者常久之道也故詩曰日升月恆言有永也而先生自少逮老常久不渝夀四人亦有言松柏之姿經霜彌茂世有如先生之體強而質堅而謂非松柏之爾承者乎夀五苐人之為夀茹荼習蓼未必皆適意之嵗而先生進退無害翺翔于里門者八十年市甘而披溫其在庭賢嗣又能以孝饗洗腆穿園池灌花為娛老計其享受也如此夫治世之民多和樂亂世之民多愁苦夫人而知之矣先生生神廟太平之日衢巷清晏城扉不夜闔父老垂白目不見介馬馳騖而其後驟當流賊之變海內騷然前明餘燼又稱兵逆命距錢塘十里兵如蝟毛鄉人之仳離于戰鬭者不可勝數其在今承平漸啓壟耕户織然猶有甌閩烽火之未盡靖者先生卒能全其年以處之如一不可謂非所遭之有幸也夫生年七十謂之古稀八十則益稀矣乃以稀有之年當難全之遇而從此益進則其享大年而受多祉者又豈僅八十已哉葉氏分書詩韻序葉氏分書詩韻者慈溪葉天樂以八分書而書近世所習用之詩韻也昔者葉此君先生擅八分凡郡縣碑玫榜閴屏几與夫鎔金琢玊笵土摩竉雕梨剜棗之事皆請先生為之書今天樂以先生嗣人既能讀其所遺書然且紹為書法謀集字之専見不復襲者千文而外莫如詩韻因書詩韻五卷計一萬一千三百五十八字大書其韻而注以小楷間有字形互異者則又小書一字于注字之左且偶芟今韻之不可用而增正韻之可用者名曰分書詩韻信乎偃波之神觀也夫王氏父子以書並稱即唐時大小歐陽亦嘗以字學相禪謂之善繼天樂于先人所遺即一節之美不忘紹述則凡奕世以來其文章名節有重需繼體之追蹤者衣聞蠁接亦復何限獨是書法與詩韻相表裏書即字形韻即字聲也字形至近代而一變明明楷𨽻悉律以篆籀之法戈波損益必準説文而天樂以篆𨽻之間行之使知篆𨽻分體不得雜出况乎韻學之衰自周沈創譜渺焉遼絶即隋唐詩韻所稱切韻唐韻諸書亦概不可見而祇以宋人所限禮部試韻傳之至今且即宋禮部韻亦并非咸平景祐所定韻本而僅僅得之南渡以後壬子刋併之殘本而公然行之三四百年而莫之能辨天樂之書此其亦有考古之心乎天樂曰吾姑書此為濫觴他日能重訂其書加以論辨吾尚當更書一本以示有進蓋字形字聲所宜參互而推求者未有盡也若夫書勢之妙則蛟龍蟠拏鸞驚鵲跱星之羅而雲之布舉凡先生之遺法倣無餘力謂歐陽險徑定非藐孤所能及也其誰信之西河集卷三十五
