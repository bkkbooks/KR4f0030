body:
  text: 西河集卷一百八十八翰林院檢討毛竒齡撰五言格詩四讀史詩二首張生本文儒夜起受簡編忽從遊俠行破産思報韓志意久不逹􅀈鬱何由宣一朝風雲生帷幄進讜言持籌并握箸所至無拘挺當其家居時遊戲商洛間平交結耆舊偉製裁衣冠辟穀散暮氣斸芝當晨餐貧賤可肆志富貴難久安寧負平勃交勿棄園綺歡遐哉赤松遊豈為求神仙二蘭成煙霞姿倜儻超等倫少小作抄撰落筆如散銀並使嚼鸚鵡同等摩麒麟池臺紹河曲鐘鼓宴洛濵太平三十載總是梁朝人豈知蒼鵝飛頓令玉馬湮朱桁撤單舶青袍蔽長津庶望下亭旅重遘南郡春如何走秦關别館留孤臣三户既已盡七葉誰見親從此東海鳥長作西都賔陽春方遞代去故當就新寒暑有時盡日月無返晨臨都哭三晝繞屋步百巡豈不被顯爵亦既叨殊恩無如慕鄉井惠好難重陳生逢亂離世老作異代身江南草長時回望情彌殷枳橘豈秦産夷齊本商民一吟思歸辭淚下霑衣巾重葺湯太守祠有感兼贈李使君先哲有遺澤所重在廟祀況能利是人不止悅從事緬想前代賢大者闡理義細亦克樹績樽爼列為例夫君親祼薦每祀致精意稽神戀膋蕭假廟葺頺廢伊昔漢太守不以一錢繫近且開瀃門恩共海濤濞感激拜祠宇前後治無二以之祝金石取壽在世世張荀仲先生七十壽詩紫螮斂朝日丹花拒秋霜攝提貞元英穡士以滌場良月遘皇覽弧矢方重張前庭羅嘉賔中饋陳酒漿君子聳高躅避地羇遐方書通獲玄祕道藴流詞章軼步周五嶽皓氣蓋四荒華首還班麟娛景時相羊伊昔介胡耉設醴遇石陽官亭致繾綣歷歲同杖鄉于今憩丘園子姓繁趨蹌白魚跳澄潭潭水何滄浪賤子託末契登堂進霞觴微辭播芳徽景止安可忘題趙千里右軍書扇圖為郡丞王君右軍本瀟灑卓筆起煙霧曾念貧嫗飢為寫蜀紈素畫子趙伯駒畫作秦宫人銜毫灑鸞羽意亦超等倫王君妙書法乃在右軍上健臂書榜闐往往過尋丈丈筆作丈書堆紙亦丈餘頃刻丈紙盡滿地堆明珠去秋涼風時古署看落筆兩目不及瞬宛如飛鳥疾一童伸紙來一童抽紙去但見紙背翻不知頴頭住我今題右軍愈思王君神終朝書扇去不解是何人淮上送白孝亷歸白門我愛白夫子遨遊迥凡俗信友兼順親嘗著老萊服宿昔飲耶水春山映紅旭今我逢淮山水蘸夏荷緑與之拜漂母彈絲并擊築忽言念高堂躊躇亂心曲解纜趂暮潮持樽出晴郭重茵對沙坳列坐倒􅌬醁人生各有親戚戚怨行役加何送歸舟萱花滿江麓題張七雛隱躬耕圖涉世不得意因思種南山惟恐志莫訓置之圖畫間野墟青禾滿高樹碧藟攀所畏秋風生蹙蹙凋令顏我亦厭車轍有懷在河干耦耕倘相期與子荷鋤還陳法曹妓席觀藝蘭作種草不擇葉所重在其花何況藝蘭者會鼓將傳芭古人貴紉佩比之雙珩牙迤邐幽谷間停車每咨嗟今者啓閬囿平地填玉砂白跗拆夏筍紫莖翳朝霞或云淮南説男寡蒔不佳所恃美爪指炫服相勾爬小固富苞甲大即盤根芽春風泛高光翩若嫮與姱君今列長筵雜坐皆吳娃前庭貯芳馨後苑揚綺紗我本深林人失足投繁華行將採幽蘭于以贈逺遐商太傅新宅作休暇逹城邑言稅太傅堂太傅有别宅緣城溯滄浪小入即遷坐暫復驚違方層庭挾幽芬敞楹延空光歌臺綴朱網花洞連曲房通川截帷簾圜橋接闌塘湔裙赭浮鯉濯粉堊去航夾石委波淺方陂貯雲涼鑑飛暮天鳥幔捲春城桑童觀雜賔對酒榼承麯牀酬勸藉絲管歌詠成篇章洛中景前模恍憩光宅坊從商太傅宅左巷問伎裁疑扉間以迎亟折屧同行者詠古詩四句謿之因索豫補綴數韻以代紀事遂倩掃粉幛捉筆成篇東山舊擕妓繐帷留空絃獨有東家姝不住松柏前自矜阿侯小豈羡羅敷賢援筝惜爪脆吞卵憂脣纎左閣佳客邀後園小婢延抽衣起恐遲局步迎當先花路細蘚滑畫屧高牆淹腰嚲翠襇落趾弱朱底牽新羅繡行纒足趺如春妍他人不言好我獨知可憐留别四首我昔挾弧矢驅馳桓東場伊雒多少年聨翩共翺翔名材極吳楚竹箭延三邦縱橫斥海內驕蹇莫與當號呼震原野所向無侯王高會置廣宴浩蕩稽山陽四顧失渺小長嘯進樂方朝餐金羽巵暮宿華鐙光四時相代序遞釋溫與涼劇飲還自娛歡樂誠久長二少壯逺行役置身車馬塵挾瑟投上都殷勤向齊門於時啓長馭高駕為紛綸朝登岱山陽暮出河水賔倉卒辭道里軫念惟故人玄冬涉冰雪亦復回陽春時物展徂謝夙昔猶見新流滯無逺大纎屑以寵珍外覽總濶逹內紆難重申回鑣䇿坡陀顧盼徒逡巡轅駒恐跲躓何以慰我身三窮冬抑悲懷方春動遐思遊子當困窮亦以專所之涼風起前庭落月垂軒墀秣馬展車輻出門造天涯白日無停軌流水無止期相將辭所好朴拙遲言辭長劍遊八荒麾斥窮四陲晞髮崑崙顚躅足流沙隈前塗方起駕風伯為我追努力事攬轡蹙蹙毋相違四涼風吹高旌逡巡轉悠遐我今適他方塗路仍已賖出門雖寡媚四海還為家結交本新豐故舊欣有加百步一回顧不見門扉丫我行況廣逺河水牽浮槎情盼雖不隔羽翼終見遮努力事餐飯泛景隨時嘉要汝以古期石室藏頗奢行將登龍門呼吸餐朱霞潁州道中謝野人獻菊有作晨發潁州路朝光啓城闉修塗接林端遙見菊蕊新微霜抽寒馥宿露滋清神駐馬一回盼駕言踰前津野人折相贈頓使幽意親菉苞含紫貝琢玉規芳鱗佳色滿轡繘流芬藉衣巾故園有遺侣高興發上辰東籬坐相待西苑歸何因餐英解頷顑釀酒酬苦辛眷言謝修塗雅意長相伸贈徐徵君三首滔滔黃河流中有天門高巍然一孤柱砥此千里濤雲物互回合魚龍亦相朝豈無波中石碨磊隨沙坳二曄曄山上芝熠熠開朝曦朝曦一何爛丹芝一何絢伊昔商山翁垂老採蔥蒨豈無春花榮芝草宜晚見三澤豹亦已隱吾獨誇熊羆太公年七十鼓刀去河湄豈無盛年子遊仕如散宜歸載方未遙居海以待之和汪柯庭哭子詩團團青荷珠恨在掌中碎㸐膏結蓓蕾翦剔轉憔悴汪家有竒兒阿閏年五歲名兆熙小名阿閏白雪洗弱顏香羅裹丫髻炯目駴濬沖摩頂驗寶志孝能把黃扇智足守鄧藝驟當秋霜飛庭蘭忽遭刈臂環探有在衣篋封未既鳯羽尚集肩虎魄已墮地瓦棺帶枿掩紙轎共藤瘞聞其理玉坡喚作養鴨滙桐鄉地名千秋亭一名十日舟再至延陵每號呼子夏但流涕伊昔喪亂日東南正鼎沸載車亦安往藏褲並無計新婚嚮明别夭殰中道棄況當避仇出家室總淪廢丁年走安丘垂老喪越騎天道真未明人間此何世君家茂神光竒骨應再繼比之瓊樹花一落一開替東門無前憂西竺有來意人生若轆轤聚散等升隮莫言太上亡情鍾在我輩逋翁既苦吟烏子亦哀祭香囊果無忘前身豈難記龍文篇祝嚴司農壽并貽其大令侍御鳯翮簸海出龍文鬱雲翔君子秉令儀特逹成圭璋弱齡弄柔翰矯矯升詞場國士傲管樂才子傾裴王中途騁軼足千里駕驌驦一出登承明再出侍建章以次躋榮列廣宿羅文昌當其隆獻贊腰組縣諫囊暨乎蒞臺端冽冽懷風霜雖復歷華要數歲周巖廊從容副司元國計歸少常夙昔侍文賦曾載西園觴為陪濬沖談每登御史牀玄冬會皇覽甲子回青蒼練日賔以集迎春物能芳曩者嚴夫子解犗投滄浪出處雖異致千載同馨香我將贈微言道大難敷揚庶幾景風徽山水高且長贈王生閬齋詩有序唐王績古詩云朝棲閬崑木言鳯也王生所居若卑瑣而意致深逺較之鳯五采備矣且遙曲通光時有爽朗意題曰閬兼贈以詩崑丘有閬木嘗以棲鳯凰我今羡王生結廬在市傍初入思窅窱坐久神飛揚譬之珠樹巔六翮苞采章覽輝德彌下處晦道愈光有時發清談鳥鳴在高岡擬遊仙詩二首為駱貞母俞夫人作峩峩山上松矯矯雲中鸞鸞羽將鳯雛松枝何團團昔我登玉笥遙望明星寒明星在西方寄我玉蘃丸駕言丹丘兒鍊藥燒琅玕一朝想丹砂慷慨前之官蓮花為緋衣石頂為金冠修成上玉女拂拭雲臺端聞之華山曲二八桃花顏中塗杖老翁謂棄黃金丹高天把沆瀣將以同所餐華池鬱金光千載長相歡二朝吸青城霜夕鱠紫海魚鴻濛一萬里白母來徐徐中宵八公駕外户雙成琚茅龍當前旌石虎回左車鈞天有瓊蘃用以標清虛紫冥聊服食下土安所儲瑤臺本金精緱氏凌玉除從容咽肺腑百歲良有餘碌碌笑周滿竊讀層城書春山驟騄耳倒載空璠璵黃眉既升行有母存居諸女貞樹三山五采將何如大敬生日和南士作林深木彌茂源濬流愈長君子秉令器裴然方成章嘉言被遐服飭行居舊邦豹變具文質龍神解行藏暮類思鳥鳴逐惡如隼揚容衆謬豫及親仁敢君忘曲枿綴鳥枝卑丘倚崇岡兄以十年長師乃一日良昏昕共涼曝荼旨分吐嘗荏苒歲序移倏忽冬春翔鮮蔬映窗緑弱羽翻壠黃嘉名錫揆覽服政惑救鄉蘧將寡愆悔陶始歸畎疆前徽豈難追上齒總未央道大德彌劭日暮途方長願觀中天曦藉爾四壁光楊母九十壽岧岧東廂桐下有青瓊枝有母秉懿德鬱若鸞鳯姿君子夙砥行藝苑垂風規趨庭善繼志早歲能紹衣筮仕出麟府間堂坐彈絲中間分虎節逺在汾水涯板輿逖難將養邸疏未期菽水代榮祿歸來戀庭闈下壽躋上壽星會三周馳依結兩不釋子孝母正慈今當捧瑤爵于焉慶期頥明星在中天百歲總不移曹伯母壽曹侍讀同年母太君也人生最堪樂高堂有賢親況當享修年八十方賜珍所慮版輿隔西舍留逡巡而乃拓養堂右與金闕鄰服獻絲監織鱠上山池鱗拜母有王導對客饒長文我亦捧五豆將遂攀千春俯首誦母德倍覺汗簡新當其翦荷蕙慷慨辭靈均銜翬養孤雛忠孝兩得伸白日漫揮戟滄海徒揚塵松柏在􅀢峩豈與衆草倫題畫石贈友人南遊作丈人嶽嶽姿意氣本磊落高峙泰華巔浮雲翳長薄所以謝幼輿宜置丘與壑涉世鮮塵坌孤懷頗岞崿比之他山攻往往藉礱錯頃將訪昆吾南遊望寥廓好友贈斯圖其意亦有託舉世皆脂韋何如守堅確想其下筆時相視起盤礴金少司馬開府八閩索書幛子曩者張尚書帝命作安撫豈不戀朝寧憲邦在文武所以名相業往往重開府袋帶賜尚方瓊林宴樽俎今公本司馬出鎮東南疆山澤甫聞訊海波為不揚天子顧安攘重念此一方龍圖乃長城虎池如金湯以茲錫弓矢兼賚旗與常方今啓王會萬國來梯航况爾閩海間侯衛非要荒笳吹發國門旄鉞分顔行南溟與東越從此奏乂康八州蒞蕃衆三公肇當陽何如下東甌大座威武堂三竺步禱詩為陳中丞作盛世鮮六事惠政裕三澤如何沴天行往往遘暵爀閶闔播時瀋歲下三百六偶然當愆陽所懼在恆燠不爭焚如􅀈念此黍與稷燒巫不能感暴瘠非所欲惟是湖上山最峻曰天竺上養佛母慈判身自西域清泉濯楊枝甘露釀箘竹中丞抱躬暍十日起齋宿出城十餘里躑躅走山麓由是躋雲椒倣佛覯天目跣足却羽麾炙背棄車檋穿林蔭清㡚借汁浣暑服從來禱郊壇響應藉工祝山農洗泥牛巷婦浸土蜴何如御史雨所至即霑足不煩翦爪髮但爾煏鎢錥束生謠自來魏后蓍可卜仁人惠澤多斸石不勝録即此步禱詩千秋詠芳躅贈别詩嚴城薄短景十月苦早寒清宵風露下遊子衣裳單良遊鮮得意嘉覿遺鮮歡逝將去江渚駕言投晨餐日出館隙光水駛河流湍脫木畏緒飈驚鳥疑空彈市圮納敝履廨馬束壞繁徒懷負暄炙苦憶培風摶推聲詎無繇弭節良獨難開緘乏錦假折竹虛琅玕遊心仰天雲餘問承海瀾朝看行車馳夕視飛鳥還薑京兆自奉天請養歸里送之潞河有作結綬出中固抵治蒲河隂慈母在高堂嚙指長痛心于今忽二載霜雪時相侵官居穴土藟戍窖藏山參不知八廂冗但覺三衛深詔書下褒美將以施巨任如何驟懷歸車騎徒駸駸憶昔别故里出祖胥江潯中間豫被召書閣隨向歆每思邊趙入對闕同開襟而乃詠白華先我返舊林聖明首教孝豫養時所欽烹魚割紅玉租橘堆黃金況當進舞者花甲方重尋時京兆六十春山驅騄耳萬里忘嶇􅋂我有一樽酒碧露芳沉沉既為修塗釃且作永歲斟薰風起通潞高柳棲鳴禽思歸不能隨雙淚如雨淋他時罷筆札慷慨還抽簪待君來承明更作海客吟古詩噭噭孤鴛鴦唼喋清漣漪文藻縈外澤幽花蔽中池單情獨皎皎戢翼還求雌相視寡偕偶所至恆乖離雄鳩善姚佚嚄唶嘗見疑祗為錦繡張坐使羅網羈賦性本良姱與世無乖違修容蓄文彩還為匹者施懷儔不能侣至死猶相思如何罹愆尤惻惻來嘆咨二櫩隙朝星移幃疏曉風坼怨女歸曲房一顧三嘆息階藥雕絳衣山藍壞芳色曙影涵鏡光問誰理容飾東園有狂夫中路懷匪測張羅近烏邊懷金匿桑側思以輸樂歡因之敘儔匹豈知我有夫道逺義不隔井深念絲長絃斷知矢急與子堅逺心高河展疇昔賦得前山手可數層峯列平疇曲嶼聨高岡空庭敞嵳峩長貯雲日光林扉逼欄啓石􅓫當門張綰螺儼堆髻眠磧同卧羊有時射晴旭霧散無遮藏宛若書笇子纍纍紛在牀巨靈擘蓮華丁士吹劍鋩懷抱苟可通何用長褰裳晨興撫家珍指計方未央為姪孫友桐題伏生授經圖卷子伊昔秦火後典誥無完編所賴伏博士藏壁草九篇斯時無孔書百兩數未全先以此草九教書齊魯間其奈口授多雜之齊人言兼失舊章句詰倔誰與傳以故太子令奉詔來牀前再拜請授業展卷捧几筵博士九十餘齒落聲喑然有女本姣小代為傳與宣經從數簾接字以脂香連義訓并屬讀由此無闕焉生平景芳躅長望空淪漣何期虎頭筆繪入鵝溪邊白石有時爛高松有時刋惟是傳經圖皎皎千百年西河集卷一百八十八
