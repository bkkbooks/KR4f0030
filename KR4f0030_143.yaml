body:
  text: 西河集巻一百四十三翰林院檢討毛竒齡撰七言絶句六下直東華門遇雪蓬觀寒生午漏稀掖門東岀乍添衣宫牆栁色俱凋盡那得楊花撲地飛二萬里霃雲羃四隣寒風刮地總無塵誰憐玊樹花生候尚有金門裘敝人寄田使君督學按部雲間薄海文章有幾存淮南詞賦自言尊何如軺使相臨處江左名流盡在門二掄才按部遍江闗佳士菰蘆自往還誰信龍津人去後顧雍猶自在雲間謂徐允哲也陸明府有水晶一團中含水草影碧色名萬年冰屬賦率筆一團清水瑩遙空萬里昆明洑道通却訝春江蘋藻影何年收入玉壺中二誰割林圻碧玉泉中含水草尚鮮妍無如官到陳彭冷惡説寒冰有萬年為如臯冒生題册公車嶻􅑖倚天髙何似揚州江上濤紫氣千重南望逺有人把巻在如臯二生平三至廣陵城作賦曾無東部名今日為修髙士傳題詩一寄冒先生奉和呈裕親王園林題壁三絶句原韻應教初秋小苑寒林初作花苑牆西上接東華那知隆慶坊邊桞只在岐王舊賜家秋聲秋到長安思渺茫五王宅傍御街長一聞葉向林間下頓覺風来水殿凉荷葉池荷花開盡葉猶香雨後傾珠似夜光但使恩波留太液何湏折作葢頭粧寄答上海徐允哲敝衣羸馬結黄塵待詔公車又一春遙憶申江新雨後晴牕深坐讀書人二御河楊桞甫垂絲寄到徐陵宫體詩日探懐中吟未了天街四月賣漿時三槐堂初入暑風清梅雨江南一望平記得滬城相别處青龍浦口夏雲生四制詔求賢空復催金臺終自待君来晉庭縱授王康第漢主還思徐樂才題同舘王檢討桃實畵幛玉洞桃花碧葉隂紫文緗核間黄金分明一片綏山景何日移来到上林二桃實如拳褁繡苔琱盤尚未薦瑤臺金門自是神仙侶故遣東方偷得来無題華堂錦宴夜吹笙仙女盈盈下太清莫道彩雲無覔處隔簾聽得和歌聲二華堂錦宴夜吹簫仙女盈盈下碧霄莫道畵簾相望逺銀絲隔得兩三條閩江送許遇之豫章黄雀風生笋簟涼蒲帆四月下康郎閩南多少鮮紅荔散作船頭碎錦囊二細雨濛濛好濯枝五月有濯枝雨長途節候最堪思遙知南浦傳觴日正是東湖競渡時三迤邐秋屏攬勝多旌陽原是舊巖阿莫憐丹竈無人問湏記陶缾有客過南昌許遜為旌陽令陶缾遇書室名四紅蘭開盡緑蘭開我亦從兹去越臺君到潯陽倘乘興可能還泝浙潮来雪灘釣叟歌四首白雪灘頭舊隠淪雪花深處一垂綸蘆中来往人争識道是吴江顧茂倫二松陵東下水瀠洄浪花都作雪花堆投将犗子衝舟去釣得鮦魚似屋来三白荻花開笠澤東移家住在荻花中前身疑是滄江叟後身疑是紫溪翁四西塞漁人未著書清灘萬叠雪来初松陵原有天隨子早向吴江學釣魚敬製仁孝皇后孝昭皇后輓歌詞十四章有序康熙辛酉春仲臣竒齡㳟送大行兩皇后梓宫于沙河城東之竇家庄敬隨諸臣後迎仗而泣爰思古者虞殯必有歌詞近世執紼不止鈴鐸故濯龍望幸朱奢進詩筮龜而行潘岳作頌乃以二年如喪之期加之百辟啣哀之日沙城舊殯齊赴陵園舘閣諸臣共扶纚綍覯畵雲之蜃軷頓傷墜露于蜼衣馬頭袐器宛若神携雀尾明旒凄然目斷則愉皇之舞可以稍遲引殯之辭在所不免雖前人哀軆多用短章唐世輓詩率皆五律顧白傅之輓元相亦用七言即江淵之哭宣妃僅成兩韻況乎絶句本清商遺調按之可為歌曼聲傳薤露新吟聞者易以感因不辭鄙陋爰為此詞世有知音或無貽誚金幢畵翣導龍軻挽紼争傳虞殯歌雙輦一時歸玉隧千官齊送在沙河二帷宫曉度慢吹簫鹵簿開時宫仗遙京兆寢園湏有䕶君王且輟未央朝時至上親䕶殯山陵三紅樁矗處纜牆低筥藻筐蘋薦席齊蜃輅未離沙澗外雲旌已過竇庄西四古堞徐開殯殿尊容衣先已駕輬輼當時玉燕藏幽篋此日金蠶繞羡門初殯兩梓宫俱沙河五幡幡旒旐夾朱幑疑是英皇並狩歸天半曉霞明象物車前清露濕靈衣六石竁曽通明月彎潞亭東去舊橋山六飛排作三屯衞五校行来㡬換班七羽葆千重映霧明駕将雙鶴負銘旌太常不用吹笳去仗馬交啣祕器行八親王命婦各班排纔見龍輴便舉哀不信敷天愁思切試聽動地哭聲来九璇宫節儉本天然生貸貧人脂澤田幾日六騩臨御處尚抛貰路紙黄錢十獨孤卜宅建陵園遺命因山塟長孫兩后後先真聖善皇情痛悼有何言十一彤管徽章定母儀並誇㜪徳共嫘師縱饒左氏為哀曲猶少揚雲作詠詞十二遵化陵園輦路通先皇曽此塟遺弓移旃不憚宫車逺長恐昭丘在望中十三雉尾髙搴逐繖迴白雲千里障瑶臺羽霓歸去原無跡惟有山前青鳥来十四法駕東行過玉田清塵除道百神聨哀歌恐助皇情惻不把銅鈴引殯前祝母詞為羅氏兄弟作芙蓉花發射陽湖日景南迴歲未徂何事綵雲留不去祗因庭樹有三珠二莫道庭闈樂事非羅含兄弟世應稀襄陽耆舊知多少共採荷花贈舞衣嵗暮入史舘書感用家太史韻日從東觀討遺編坐弄鉛黄度歲年自笑中郎生子晩縱修漢史有誰傳二千門爆竹嵗将除尚跨三花進石渠中夜草成羣盗傳教人泪濕一牀書時􅍐題中有盜賊傳故云何使君畫軸天際芙蓉有路通梅花庄上鉢池東使君曾守東揚郡身在千巖萬壑中花燭詞為馮公子恊一作相國堂前花燭開趨庭洗馬洞仙才移将海上連枝木琢作人間合卺桮二深房畫柱夾金杠時有䨧雲覆綺牕枕上芙蓉梁上燕怪他事事總成雙三親迎北府控驂驔何事炎風理鏡函只為榴花能結子愛将萱草種宜男四結就紅絲暗裏牽華燈慢把百枝燃但懸甲舍新裁帳好撒開元舊賜錢五試着單衫别様紅鄉音遮莫學吴儂麻姑衣繡西施屧家在蘓州鹿埭東新夫人為崑山徐宫坊女六孔雀筵開汎客巵日長猶恐促粧遲誰知綵筆題奩處只在銀屏却扇時送徐仲山南歸當時郡國舉才賢獨詣公車思黯然記得秋潮初漲後與君相遇大河邊二太常䇿奏本無期司馬門間召試遲誰使公孫留北闕偏教轅固返東淄三西風吹桞御河黄出宿街南光宅坊思煞故園殘暑後荷花初放賀家荘四曉日横門設錦茵繞朝此際贈鞭新中書門下停車久曽薦徐寧第一人益都夫子拆巻時特執巻薦之御前五周官湖口舊漁磯囘首江臯事事非欲送故人歸里閈頓令清泪滿朝衣六九門地震尚諠闐何事還登惜别筵能用士如王吉軰不教人憶漢宣年七雙鳬北嚮一南翔悔見溪雲出岫長寄語君家女都講莫将新句貯金箱謂及門昭華也和王侍讀索梅庚畫片原韻擬作蓬山萬里逰小牕松竹繪清秋不知塵世餘多少此地能安十二樓龔節孫以種橘小影索題二首金衣素袖曉烟籠家在荆溪水榭東不道長安舊圖畫雙顔猶帶洞庭紅二朱盤橘柚剖霜天但對斯圖意惘然㡬見蓬莱移種去誤傳天寳十年前答和陸大嘉淑見貽原韻憐君埀老客燕齊落日重逢禁苑西何處相期最相信錢塘江上伺潮雞二曾共登樓眺碧空平泉佳興有誰同可憐閣下千株杏留得溪南一樹紅三銀筝促促慢教搊萬仞黄埃起暮愁舊日酒徒今散盡燕姬雖好不湏留題劉生抱琴圖伯倫意氣道眞才手把枯笤埽綠苔此際長安好風日肯擕雷氏斵桐來二誰倩長康寫令顔深林日夕自來還當前無限滄洲興只在髙山流水間同年丘檢討予養歸里一紙黄封出九重聖人教孝每優容只因膝上需文度故遣雲間反士龍檢討為學士南齋難弟二刺史堂髙覆白雲其尊人曾為刺史河流千里接淮濆羡君衣上三花錦散作庭前五色文三金書百軸褁彤幨載去猶存修史銜借問錦堂樺燭裏夜來半臂有誰添四榆火初傳百子池横門㡬兩送丘遲最憐朝罷貽鞭日正是清明折桞時送友人歸苕溪京洛相期願已違前溪猶認舊柴扉只憐通潞亭邊桞無數長條挽客衣二平津東閣住多年歸汎菱湖雨後船囘首故人烟障裏還騎羸馬薊門邊上已同王二光禄修禊即事細雨新吹九陌塵桃花又放曲江春同來桞市傳觴客仍是蘭亭修禊人二駿馬郊原籠碧絲紅竿挑餤踏花時如何兩度芳林宴不作王融上已詩清明二首百兩騾車輾翠鈿單衣試着便門前秪因漢苑先傳火宫桞千株總帯烟二新裁寳幙障平蕪折得楊枝挿鬂無此日故園風雨後畫船開滿賀家湖題顧眉生校書畫蘭冊子眉生曲中伎有名後為龔尚書妾名横波夫人莫愁湖畔緑雲鬟手碾香螺畫逺山擷得洞庭花數本好留青影在人間二一幅生綃金錯裁幽蘭寫出仲姬才兒家自有千花譜不藉黄荃粉本來眉生自註倣壁間馬湘蘭筆三九畹叢生淺碧紋畫來香氣尚氤氲只愁幾片蘭蘓帯難繫三條杏子裙蘭蘓帯名樂府何用結歡忺三條杏子裙殉書詩書陳媛傳後有序陳媛沈計掾妻工佐餕以堇萱飴蜜得尊章懽年二十三死死時囑取生平所誦書殉塜中嗟乎是可傳已因拈殉書詩得四首書之云爾荆桃花下駐塗車莫向空箱揀曲裾窄窄桐棺纔數尺尚留一半塟殘書二誰道泉臺泠翠鈿銀牀猶是抱書眠却慚入塞文姫老空記遺文四十篇三秋風團扇裂齊紈落葉虗疑響珮環賦得盤中人不識欲留四角與誰看四白玉深深著地埋紅綿粉漬畵螺灰只愁繡字侵衣處化作金蠶出墓來西河集巻一百四十三
