body:
  text: 西河集卷八十七翰林院檢討毛奇齡撰墓表二誥授嘉議大夫陜西督糧道布政使司參政趙君暨誥封恭人許太君墓表君諱廷標字叔文别字雲岑杭州錢塘人趙姓髙祖孝亷公諱登官興安州牧從餘姚遷杭家焉孝亷公生光祿公諱珙君曾祖也光祿公生龍驤公諱鈺為君祖龍驤公生中憲公諱維清則惟君父君父官光祿寺丞而以君貴贈中憲大夫且以别于曾祖之為光祿正者因稱中憲公中憲公生七子一都督僉事一都司僉書授明遠將軍一鎮江府知府一沔陽州同知殉難西山一甘肅鎮右營遊擊將軍一江安縣知縣而君生第三以明經起家除福建汀州府永定縣知縣遷湖廣衡州府同知擢長寶分守道落職復從征南兵督師軍前題授安普兵備道進布政司參議管通省驛鹽事調廣東按察司副使分巡廣肇南韶道以憂去服闋補長沙驛鹽道併理糧儲道事康熙戊辰遷陜西督糧道布政司參政而以病乞去君饒于治術蒞事有體幹遇倥偬造次輒能顧盼給辦而受性惇誠袒胸膈示物所至感激故當試仕時海國初闢日扞冦却敵皆足以忠信來格即歷仕儲備多與強軍為周旋而不誤軍政不竭民力量其才地實可以大用而惜乎以監司終也方豫在都時值君以服闋補長沙驛鹽道將行餞君彰義門君偕其兄子進士承烈在座後至者見君風度灑然濯濯有儀表計其年不下六十猶前後審視與兄子不辨長幼暨豫歸三年驟聞君乞病已還里急過之即不能一見若君真所謂盡瘁死王事者今某年某月將葬君某山之原既請豫為文志諸幽矣禮卿大夫葬必幽述其繫而顯著其德孝子不以豫不文重請豫表墓而豫難之曰有是乎曰有之宋歐陽子之表李殿直眉山蘇氏為司馬溫公撰神道碑銘皆其人志狀而重丐其文表之可按也然則何辭矣君少以文章名年弱冠未嘗習武事然而所在戰克以永定強冦介山海之間三覆而驅之且有束身歸命者當圍城時忽有人從賊中來曰何哉爾之以賊間我也曰非也吾以戍為賊然當吾犯時感公之不死而戍之也故來歸焉于是盡輸賊中情而賊遂以衰至若湘江多盜剽及官吏既已籍捕得其多人然猶諭以禍福貰之以自新苐斫其渠一二人而餘俱散釋今之扶犁而為農者即昔之揭竿而為盜者也聞之安普之役土官為梗君以監軍平維摩彌勒之亂一時將帥怒諸城之為賊守者將殱之以絶後慮君巽言譬之不聽推几而訶之不聽則大呼曰朝廷好生踰于虞舜今以民命寄戎行而忍以殘逞負聖主意吾將啓督師使上聞矣時督師洪公經略五省諸帥怵其言已之及君任廣肇肇俗喜為亂當西南多故之後榛莽塞行路君行政之暇覘過抵所在而曲諭之伺衆多革面然後捕其尤者伏之法及臨刑皆仰首稱君仁立囑黨羽使散去其感人如此其後湘東之變激于催科時公司驛鹽不相聞巡撫韓君亟檄君諭之君往而亂民皆涕泣悔罪一夕而罷至于鹽𣙜之核郵傳之清糧儲之調度機宜緩急各中精勤而敏練古大臣莫過也君文具體要擬之西京凡文教書檄及親賔去復柬札皆手自濡削末年力小減藉手掌記嘗令其子為移文以事周章纍數十詞不能達君核以二語而簡暢明析若以少勝人多許者其才思然矣配許恭人名家子助君政有成績孝于姑惠于宗族其事多别載以合葬故得並書有子八人以一後遊擊將軍早卒餘七人皆仕有文名孫十六人或仕或幼曾孫九人未仕所謂能世其家者因為表之而並書其名于石曰某等敇授江寧北捕通判呂公墓表當豫入郡為文社時有以兄弟指名者曰三張三吕三張者張梯張杉張㮙也若三吕則一為巨烈一為相烈一為洪烈兩家皆世家子弟而文采爛然每入社軒軒若豹羽之張于岡觀者竊指視如迫火爁離立不敢近而既而三張皆就木相烈客死巨烈為鹽官訓導貧不得歸惟洪烈以記室從嶺南來見豫而咨嗟曰先公死二十年矣方康熙辛亥已與先繼母龔安人合葬于孟葑之原獨先母祝安人以先先公卒預葬于謝墅之棊子山不能遷記先公葬時曾虛左一槨以待而未果也今已書安人支幹覆以生時所御衣而填之壙中獨是墓門之石將以俟冡兄之歸而並請之今老矣子猶吾兄弟行也吾請自為狀而子表之何如豫曰然按狀呂系出四嶽唐河東節度使延之其逺祖也自宋太師正惠公端二傳至中丞公誨有子守襲慶死金人之難而其孫大理寺評事公億負父骨南渡家于越州之新昌為新昌吕氏其後有貴義公者遷餘姚餘姚呂與李同音明初定户版里長謬呼呂為李遂姓李嘉靖間太傅文安公諱本以李通籍相世宗朝十三年及將致政乃始啓奏請復姓方是時世宗重太傅甚先于餘姚建相國里第為别築一城居之復于郡治山陰地更造行府延袤若干區自廳事外比視為堂室從以謻房凡旁櫩離舍皆可容若干筵且作永巷從橫之使負販嘂賣者得周行其中以故太傅公後一傳為祠部柏陽公諱兖再傳為銓部少參薑山公諱胤昌皆居山陰自銓部公子茂才公諱天成髙才早卒生公而頴異蚤見頭角以為呂氏至公當益大故公母史太安人為郡守公諱繼勳女知書能授經而祖母孫太恭人為尚寶公諱墀女嘗與兄冢宰公諱鑨弟大司馬公諱礦者同館學博極羣籍下筆成文章遂教公為文而身師之公既善記憶一目可兼行下復以受太恭人教年十一作放膽文頃刻千言觀者皆咋舌去既而就童試適史太安人服未除及除而府試已畢不得已冒仁和籍補諸生仁和故省會太傅故有宅在省會間為舉人何氏所占而公訟理之會學使嵗試臚名入何氏買伍伯搜挾書為姦陰以簡摺納公袖隨探而出以首公公抗辨不伏曰有嫁之者學使不能決下之府判府判受何賄遽于訟庭給筆札令試試題既艱甚乃故出重囚刑于庭呼譟嗥嘈既以讋公心且撓亂之使思不得屬稍間囑伺者以曵白報公伸紙疾書略不加點庭鞫者未竣而文已成且直拄何陰禍狀判大駴揖公而退當公被陷時適祝安人以疾卒公四顧怏怏及娶龔安人往往文戰不利且不善事生産家中落會國家多故中原飢饉千餘里流冦四訌自恃世家後慷慨當有以自效而進取無地無所用崇禎癸未入北雍旋以流冦破京城南歸止山東時南郡建號者畫河而守不得渡適季子洪烈有婦翁徐公者監靖南侯軍迎公渡河居軍中順治二年王師下江南靖南侯死公與徐公還江南旅居會族父隨王師者授髙淳縣令邀公同行時浙東五郡已括民徒抗王師公念家浙東旦暮不保髙淳去家近或得隨王師東渡作保全計因欣然偕行及抵縣縣典史遣𨽻持文書來迎𨽻私抵家以後時當笞公固請免之既而問故𨽻以婦娩對時暮食公勞以匕肉𨽻食竟連目公去明日下剃髮令市民集無厲譟于訟堂公促族父出諭之族父遲回間忽壞門入棓擊者雨集公以腦受棓仆而僵儼跳身負屋梁者俯見體橫地裸其衣將加以創怖甚幾致墮幸創不即下衆洶洶擁族父去抵暮衆散覺身冉冉從屋梁降目瞑無所見頃之體蘇曰魂附矣急踰垣出則典史署也時衆已殺令典史知不免將竄去見公而驚既知為令客遽嗾兩𨽻牽公出遣獻以媚賊未曙坐月下公自念無死理且既已生之寧又死仰月吒㗫拾敗紙拭面血臨拭一𨽻熟視叩頭曰恩公也幾誤公矣詢之曰公不記後時𨽻耶公生𨽻而𨽻忍殺之遂語他𨽻各解衣衣公乘夜負公出他境得免居無何江南開試場試流寓生可以為江南官者公試得第四授江南江寧府北捕通判先是縣𨽻救公時公問其姓氏曰葉正甫也其後官軍平亂民兼戮縣𨽻之從賊者正甫以救公解公族父之子在軍問狀曰吾兄也釋正甫勿殺至是公以髙淳為府屬因檄髙淳令求正甫所在而正甫病死江南舊無督捕官因獄煩創設諸務山積公行以仁恕凡閲囚無輕重曲直多用貸免以為江南當喪亂之後民貧易犯法其罪皆可矜勿使寃入一時翕然頌公仁會內院洪公故明兩浙督學使也公試髙等至是將薦公值頒春治春宴于堂江寧故留都地設京兆府自治中别駕以下皆屬吏每宴京兆席南向餘東西向今改尹為守則守判敵體宜雁行列而胥史尚遵故京兆儀注已設席而公執不可將就坐更席守心銜之未幾甲有訟乙入舊內剽掠者公按之無有遂直之是夜丹徒簿解帑金藩司昏黑不能前以公同鄉負金投公署辨明輸去守陰偵得之疑得剽舊內者財讞事不實遂托以告臬及勘驗實訟不得財報無罪而臬已先驗一日遽劾公去順治三年王師渡績溪將下江東適徐公在內院軍中公亟趍軍門謀所以全江東者徐公初難之公以跪請徐公言無他苐遣父老詣軍前請命公曰諾及渡江入山陰界父老迎且拜徐公從容在傍向大將軍乞哀憐願勿屠城大將軍許諾立令封刃不復戮一人公是事頗祕至今尚相傳城隍神寄夢父老令迎于錢清之太平橋故封刃真隱德也既而大軍進婺州內院補公三衢教授隨軍行及至衢而徐公奉大將軍令先入城撫抗命者為亂兵所殺公乃徒行求徐公尸時尸僵橫路血胾狼籍無可辨公乃求其可記者辨得之為請殮請恤護之歸公在衢經年葺學舍修文宣王廟招徠諸生之竄伏者課以文文教大起內部聞公名移咨學使謂衢州教授與舊時江寧北捕通判同名氏是一人否學使遽以私人易公名公不置辨拂衣去公嘗曰吾兩次去官皆宜辨而不之辨且前此蒙不韙名猶默默豈甘以汚自居乎古者降其志辱其身夫猶是也又曰吾世受顯爵思以紹大而竟止于是以視靈運之述祖德平原之揚世烈不無有愧然豫與平原靈運同遭喪亡而豫以卑棲獨保全首領以安其天年不可謂非天幸也其言如此惟是世祿之家多産才士而公承茂才公後繼以三呂皆曠代軼才而茂才公早卒公坎壈不偶三呂者鷹揚虎峙非不足蔭映一世而卒之蹉跎就老竟賫志以終其身悲夫公諱師著又諱王師字謫名客星其號也為人才大而意不薄少于學無所不窺下筆銛利如鐵英之發于鋩而居之以厚好解人急每欲于人死中曲求其生嘗入友人幕平反大獄友人誚之曰君坐是失職而欲以是遺我乎公曰能生人雖失職何害間擅岐黃術起友人死當江南亂時從髙淳之蕪湖見道傍死人既過思救之及還視則故僕也負之歸投藥而起先是茂才公少時工填詞别號蔚藍生著樛木園詞十數種為吳江沈詞隱及同郡方諸生所推伏然雅不善歌公獨能歌且能言五聲六律七始九辨之學故他著作甚夥皆屏去惟以傳竒七種行人間曰此羊棗也康熙甲辰七月三十日以微疾卒距生明萬厯已亥享年六十有六配祝安人州牧金陽公孫女烏程教諭心嚴公女年三十一卒生子三即三呂也繼龔安人台州水師營遊擊將軍某公女年五十卒生子一煌烈孫七銘曰惟公之德閟不以揚知公後人必保大以昌其子之友蕭山毛奇齡謹書其文于墓石之陽曰時呂公之藏西河集卷八十七
