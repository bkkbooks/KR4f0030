body:
  text: 西河集卷一百二十三翰林院檢討毛竒齡撰古禮今律無繼嗣文古繼嗣一禮從無明文所可考者惟天子繼嗣雖經史亦無明文然自帝紀夏中康商太丁漢史惠文昭宣後尚有宋濮議明大禮聚訟不已此固無容議者諸侯繼嗣中庸繼絶世所以懷諸侯也論語興滅國繼絶世俱以諸侯言禮運大人世及以為禮鄭注大人諸侯也正義曰世者父子相繼及者兄終弟及也史世家吳泰伯為吳君無子而卒弟仲雍繼之此繼爵也及武王克商始使仲雍曽孫周章繼泰伯為後而别封周章之弟仲于虞名虞仲奉仲雍祀此謂繼絶宗子繼嗣喪服小記大傳俱有曰别子為祖謂諸侯長子為君其次子名别子使別立一宗而自我作祖繼别為宗而世世繼之名為大宗即宗子也繼禰者為小宗自次子後諸子但父子相繼各自立一宗而並統于大宗為一族則名小宗今多誤解詳見大小宗通繹儀禮傳曰大宗不可絶故為人後者必後大宗公羊傳注曰大宗無後不可絶小宗無後當絶喪大記曰為殤後者以其服服之正義曰宗子之子若殤而死猶當繼殤然而殤子無繼禮則凡為宗子殤後者仍繼殤子之父而但以殤服服殤者其委曲如此此三者有繼絶禮餘無繼者射義孔子射矍相之圃使子路為司正有曰與為人後者不入與者干預也正以當時公族大夫不繼嗣有干預繼諸侯者謂之支庶入繼干預繼大宗者謂之繼别之後皆不使入射蓋專指此二者言雜記云大夫無子則但為置後正義曰置後者謂借他大夫之子暫為喪主一若為之後者而喪畢即撤仍不立後謂之置後若宗子則立後矣他大夫之子不拘同異姓撤者還使歸也喪大記曰喪有無後無無主謂大夫士庶凡有喪者正義曰主所以接賓無則攝之若無後則身自絶嗣何關于人故可無後也然且攝主有制若本族無主必不令妻黨得以攝之雜記曰如無主則東西南北家主之無有則里尹里長主之其嚴如此他若論語臧武仲以防求為後左傳不可使叔段無後于鄭季友鴆叔牙曰飲此則有後于魯國皆繼爵非繼人者今非封建之世無諸侯宗子二者則有何繼嗣而民俗紛紛終年爭繼且造為律文有以長繼長絶幼不絶長諸説勒為金科致殘害骨肉攘奪財産訐訟不已一如六季諸王爭篡有所云願世世勿生帝王家者則慘毒極矣今試以律考之其必繼絶者惟官員襲廕此與封建時諸侯繼絶相等律有嫡立嫡無嫡立庶無庶則然後以同族之倫次相當者繼之如不依倫次攙越冒襲者杖一百徒三年軍官襲職辦事其律如前如異姓養子詐冒承襲者杖一百發邊遠充軍其當該官司知而聽行者同罪丁役此條在兵律即唐人相沿庸調一法大抵重有子而規避不先立者故不稱繼嫡子法而反稱立嫡子違法責其不遵法預立以承丁役開手便云立嫡子違法者杖八十蓋罪其規避也隨又云如嫡子年五十以上無子而不立庶子者罪亦同即亡子者已立同宗之子為子而是子捨之而去罪且加等是此一兵律專責有子而違法不立未嘗責無子而令繼立者是繼立之律惟此三者而皆與民俗繼嗣絶不相干則律無繼嗣文有明據也乃律既無文而會典所載且有庶民之家不必立繼二語則顯與禮合惟條例有許民繼嗣一條謂無子家有願承繼者許之然必昭穆相當先儘同父周親及子姪之有服者如俱無方許及同姓遠房聽其擇立並不許同姓紊昭穆及異姓亂宗祧則秪是願繼之家倘告官司則官司許之非律令也然且此許繼之子若不得于所繼之親即許其告官别立則是其所已繼者意苟不欲尚得告官司而棄絶之況未繼者則是繼嗣之文在條例亦秪此一節而即此一節中亦且官許其繼亦官許其絶其為不必繼亦甚了了而民俗險薄必妄捏無影響之律例以脅制官司而官司不察亦並不實據律例以折此獄致無子之家稍有財産必多方訟訐極至戕害周親雖人亡産絶而恬不知怪盍亦就禮律兩文一省觀之古今無慶生日文古有賀生文無慶生日文其有賀生文何也自昔帝王聖賢必表其所生之地與生時之瑞如孟子舜生于諸馮帝王世紀堯母慶都出觀三河寄于祁氏家有神感之懷孕十四月而生堯故堯姓伊祁氏世本禹母修己吞神珠如薏苡胸坼生禹毛詩正義契母簡狄以玄鳥至日吞鳦卵生契稷母薑嫄以祀高禖日之野履巨人迹欣而生稷此似皆有生日者然是契稷受生日非生契稷日也故俗儒無學誤以誕彌厥月為生稷之日因以生日稱誕彌不知彌作滿解秪懷孕滿其月不惟非生日并非生後滿月如晬日者也即漢後諸史亦多載此等如史本紀稱漢高母劉媪息大澤之陂雷電晦冥若有蛟龍覆其上生高帝焉南史梁張后方孕吞菖蒲花生武帝隋文帝生時紫氣集庭他若詩非熊非羆男子之祥禮生男則設弧門左晉賈充生時有充閭之兆陳徐陵母夢五色鳳集肩唐李白母夢長庚星入懷類因而有賀生之禮如漢盧綰傳綰與高帝同日生里中以羊酒賀兩家秪是賀初生非慶生日也又且古有祝壽文亦並無慶生日文如華封人三祝曰多壽洪範九五福一曰壽周人九如頌曰如南山之壽皆非生日進此頌者若雅頌所載則隨地稱祝如棫朴以官人而曰周王壽考行葦以賔客飲射而曰以翼壽耉載見以諸侯朝王而曰以介眉壽江漢以方伯征伐而曰天子萬壽閟宫以祭廟述祖德而曰俾爾壽而富楚茨信南山以祀田祖禱嵗而曰壽考萬年曰曽孫壽考並與生日無與焉即或實以引年加禮如六十杖鄉七十杖國六十養于國七十養于學類或自為宴會以私志慶幸如唐白傅作香山九老社宋宋琪輩有至道九老社以及文彥博有耆英會司馬溫公有真率會類要皆重年嵗不重生日故漢後倣古引年如漢文賜八十米肉唐玄宗七十八十賜帛絮几杖仍以十計即社會中人計年不計十如耆英張壽年七十富弼年七十九至道李運年八十張好問年八十五類其為非生日前後總一轍也此惟唐玄宗時張説請于上萬壽日名千秋節此實古今慶生日之始事然而諸王大臣以下及士庶皆不之及則仍是古帝王孤行一節其與明代以後比戶稱慶無是禮也春秋記魯莊子同生是記生日始事然不立慶禮故豫謂自古鍾生宜有生年月日傳于世者獨孔子一人他可無有然而孔子生日猶無實據至今不得明定為何年何月何日考春秋三傳左氏但記其卒日不記生日而公羊穀梁則並記之乃公羊于襄公二十一年冬記云十有一月庚子孔子生則明與春秋本經月日大相悖謬經云冬十月庚辰朔日有食之夫以庚距庚相距十日今由庚辰至庚寅由庚寅至庚子相距秪二十日耳經以庚辰為十月朔而傳乃以庚子為十有一月是一月秪二十日天地無此時古今無此厯也穀梁不記十一月似乎有見但于十月後間記曹伯來朝公會商任兩條盡十月之事而後及孔生則仍在十一月內與公羊同若史世家則云魯襄公二十二年而生孔子直差一年司馬索隱曰公羊作二十一年而此饒一年者以周正十一月屬之明年故誤也此尤可怪者從來三正推法祗以後月屬前月並無以前月屬後月者周正十一月苐能為夏正九月未聞又能倒而為夏正之正月者真笑話也至作通鑑前編者且直造云周靈王庚戌二十有一年冬十一月孔子生則不可問矣故古年月日無全見者秦始本紀始皇以秦昭王四十八年正月生故名政政即正字然不知何日孟嘗君傅田文五月五日生以為不祥顧不知何嵗若夏啓呱呱在辛壬癸甲之後屈平自敘惟庚寅吾以降則且有支干而無月日惟六季後作墓銘者記卒葬之日必逆記生時則往往及之然史集殊文慶弔殊禮墓閟之言非所常道故明代喪禮亦妄據墓文直以所死與生日謬稱忌日古忌日不祭而今且生忌死忌分作兩祭此在作婚喪禮者尚有知其非而痛闢之秪生日之慶無敢議者豫嘗曰此明代惡習亟宜屏絶即以文集觀之唐後作序者無所不序而獨不序壽近即儼然有生日序見文集間則其非古法端可驗也豫不幸犬馬齒長客有以慶賀來強邀者豫卧床口授而敬謝之西河集卷一百二十三
