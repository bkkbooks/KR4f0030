body:
  text: 西河集卷一百五十三翰林院檢討毛奇齡撰排律送周儀曹奉使安南册弔一十四韻星使頒雙節春官駕一軺恩綸綏異域册弔出中朝嶺嶠飛蘭斾關樓見桞條賜麟金作繡坐馬玉垂鞗銅鼓迎山驛香船渡海潮宅居羲仲古地拓季犛遙瘴薄開泓淹風炎近沃焦國王行饗重蠻女拂塵嬌靈祝陳方譯神歌引洞簫饌盛瓊海貝酒縮荔江蕉奠幣霜鋪紙傾珠泪織綃還朝酬浩蕩歸路記招搖沛國華文在都鄉舊迹超他時歌四訖誰敢後南徼賦得拈花如自生觀內家所製翦綵花作何事深閨巧能傳舊苑名花從心裏發香傍指頭生桞線非搓就荷衣豈織成春風吹不定曉蝶撲還驚散蘂聞多氣飛絲絆有情翻嫌枝葉上裁剪費經營上寶坻相公坐論安公府平章啓聖朝開疆逾漢鼎致主並唐堯殿借山為棟樞隨斗建杓身紆丞相紱世插侍中貂宅俊區三事班行絶百僚才名張道濟器識李文饒金筯籌還直彤弓賜轉弨璿臺熒玉燭土戍息銅鐎階峻依辰極門間近午橋登龍爭曵裾走馬亦銜鑣好士同三吐寬人減八條量能容海嶽言且詢芻蕘寶籙傳千䙫祥鸞下九霄祈年諸誥在應使勒青瑶滿洲中堂生日作上宰乘元會台司領百官帝圖開景亳相業邁貞觀地接三階逺天擎八柱寬進銜跨殿右正色立朝端在昔需楨幹先時奮羽翰鍾靈當五際作德兆三韓位陟行前省名髙柱後冠裴遵頒誥紫尚父受書丹日馭排雲動星文射斗寒蜼裳加緑綟貂錦賜黃盤坐見諸荒闢真成一德歡開疆踰鹿海通貢到烏丸社稷彌安袵江山似奠磐四征恢賧渡一日下瀧湍宣力舒肱股推誠見肺肝修鱗遊善下行馬出常單衡直知輕重羔和辨苦酸憐才收駿骨赦過傍雞竿鑄鼎鎔成鉉鎖圭秉作桓勤能移苑甓儉且節堂餐劍重今皇錫門弛漢相闌生當箕尾度歲值昴星攢甲子周方始箕疇衍正繁觴傳衣弄綵紱絓矢垂絙旭日纒南陸秋花發上蘭三清如寄祝好傍帝臺鸞上已申江修禊和任明府韻久惜春過半剛逢日在三湔裙雙檜里放漿百花潭碧浪將螺寫紅桃似酒酣觴傳流水曲歌擬望江南雨歇煙逾斂雲開日尚含回車沙漫漫觸屐草毿毿寶瑟當胸豔香餳入口甘隔花逢姹女採藥笑童男近郭生寒火遙山障彩嵐當筵雙進舞非復舊何戡送梁京兆之任奉天兼訊薑少京兆峻秩遷京尹髙名過趙張青雲連北鎮赤伏兆南陽居重安如石官清凛似霜玉麟新作篆銀莵舊為章地入三屯勝軍從九衛防渾河回障逺澄海度遼長屬國踰平壤降番處兀良城垂荒徼路廳傍故宫牆朝日沙間白秋花雪後黃通關持虎節候吏著熊裳王駿留三輔韓維置八廂端寮吾友在好為寄雲纕賜筆紀恩和韻黃紙傳深禁丹毫賜上宫文章三館貴頒賚九霄崇前史修方始尚書給未終時以修明史月給筆札牀聨雙襭下帕用五絲籠綵鳳題名重筆有文犀綵鳳赤刀緑字諸名青羊作被豐跗含膠似石頸截竹為筒析頴堪垂露吹毛擬旋風澤研桃洞碧鋒透衍波紅久負簪疏劣長慚荷槖工編摩難按實感慨但書空誰望衣裁紫翻教珥是彤班僚封薛稷牆壁置王充嬪御頻呵凍兒曹未發蒙鋭頭靈壽伯秃髮管城公起草依簾外生花憶夢中敢言金玉飾三品贈湘東夜飲施少參邸舍同諸徵士作論學申公邸銷愁阮氏巵烹魚設饌早射雉應聲遲觸㡢驚槐葉燒罏揀桂枝案間文似纊少參有上宰相書極言諸徴士寒苦座間索讀櫩際雨如絲禁苑鐘傳後天街人靜時徘徊紅燭下何處不堪思張通政初度八韻北斗轉珠綸南山倚殿新班聨親帝座出納羡王臣珮委看皆玉臺髙望似銀受書開畫掖司命出丹脣雲闕爭扳翼氷厨善劈鱗百年欣得歲四坐喜同春平子名逾盛張慿論有神長庚秋正煥莫問桞邊辰恭送仁孝孝昭兩皇后哀詞有序康熙二十年二月一十九日仁孝皇后孝昭皇后兩梓宫啓自沙河將遷葬於遵化陵園羣臣送之者齊集於竇家莊之西塍惟時龍轜乍移鑾衛先發曉月未落悲風斯起皇帝親臨祖饋躬奠殯階六衣在筵雙帟載道啓鷖軒於宿隧擁蜃輅於新沙將欲使八神警引五校戒迹宫紈數十列于仗內閟器百雙載之馬首自親王滿漢諸大臣暨福晉公主格格奉恩將軍之妻皆俯伏輿傍哀號道左天慘地裂山鳴雷動咸思仰攀黃帷俯挽朱紼盼翬褕而莫逮駐鸞蹕以何由因祗送縞輈私抽彤管下述愚情上頌懿德恭惟我仁孝皇后位正宫闈教先嬪婉紘綖既組穜稑是親乃以璇宫銜燕之姿當茲畫棟盤龍之日六騩馬上長輸繭御筐箱百子池邊早帶髙禖弓韣乃生殷於癸乙人望流星暨誕啓於辛壬毋先化石飾椒塗於天上展蘭殿於雲間亦越我孝昭皇后進承璽玉繼賜褘衣重看貫月之輪真是俔天之妹長秋宜配有司將玉輅迎來皇夏堪聽命婦用璁衡佩入聽雞鳴而警旦馭翟衛以朝元崑山和麗水頓見前碑璧帳與金根竟成宴駕兩度皇情之創痛六年臣庶之哀思雖揚雄之誄漢后麗筆難傳即錢起之挽貞懿微章未罄恩留府事無須莊憲慈仁化起宫人不數長孫節儉遂于上軫旋幽之際抒此左言敷善之情敢曰黼筵在御仍修念詞庶幾旒旐當前還同振鐸云爾梓禁分行帟椒塗引去輁祖成雙殯啓后出百靈從壼德無先後喪儀傋吉凶鳴鑾頒五校拂翟謁諸宗鹵簿迎朝旭陵園建上冬連年停纚綍一旦轉䃔礲路饌惟三獻泉宫尚九重靈幢遮蜃飾禮服覆鷖容扇導當乘鳳車臨儼濯龍環山圍畫翣配地捧黃琮寶獸如雲擁金蠶向日鎔朝官呼槭槭命婦泣淙淙妣喪真堪痛嫘賢豈易逢人方師儷淑史已誦偕雍纘女承先姒生商賴有娀脫簪弛髲剃鳴珮聽瑽瑢曉月移蘭殿悲風起桂茸姚墟餘舊德華渚式前蹤兩組傳旒旐雙函閟册封笳開金觱篥鑑掩玉芙蓉藻輦終辭載桑壇久罷供渭橋哀舉紼長樂厭聞鐘虎衛嚴中馭蟾光掩下舂心纒河畔草目斷道傍松製䇿踰齊敬題碑羡蔡雍誄詞懿未盡歌挽痛安庸林露銷青薤軒星入紫墉英皇齊駕去盼煞九疑峯翰林院掌院學士生日丹地掄才子朱衣引近臣天威嚴咫尺師表動班鄰位列槐廳長人從香案親百年昭黼黻早歲掌絲綸鷺集堂皆玉螭盤印是銀録裁時政切史總大綱陳祕記唐司馬微文漢獲麟寰中瞻海嶽柱下見星辰北苑黃花發前關紫氣新集賢能祝歲安數曲江春甘霖應禱恭頌二十韻四月分龍少三農望歲長汙邪曾未溉雲漢久為章少女吹難定司巫舞欲狂天無升隮意人鮮賣雷方聖德同於穆精心感皓蒼為壇供太乙酌酒禮東皇郭北袪燔骼街頭禁暴尫朱絲縈漢帝金鼎告殷湯雩祖分壝碧祈官入幄黃甫看浮蜥蜴頓見舞商羊有銜衣起流雲作蓋張衝泥成畎澮鞭石勝江湘仗濕甘泉潦盆傾洞府漿不稂歌帝力多黍祝神倉洗甲傳荆楚停囚在洛陽春秋曽志喜宵旰已如傷忝御諸司嗇言觀古太常雨來慚束晢災去笑京房林翳遙山色花漂上苑香須知畿甸廣從此慶茨梁寄祝董太史尊人七十東國衣冠在西堂几席連千秋雲伴侣七十地行仙肇氏來千乘通儒繼廣川晚能遺世寵早為領時賢逺道回車轍長橋理釣緡才名齊顧劭干請却任延庭有三珠樹園藏九疊泉膝前看鳳翥物外得鳶騫花石新探乳蓬池逺獻鮮數從金簡發書以玉杯傳嶽降逾良月林居獲大年羣瞻華髮曜屢舞綵衣鮮家餉餘杭酒門停甫里船一觴遙寄處敬誦白雲篇秋夕周金然編修招諸名士集張氏園分賦得銀漢倣唐試體以題為韻皓氣經秋肅衡潢入夜新周天雲作埒倒地水無垠風逐蟾車度波從鵲路堙低垂千尺練斜嵌一條銀輦下星辰合筵前瓜果陳南皮髙會去何減汛槎人又賦得白榆商節司青女秋山下白榆月中看去靜天上種來無蔭久門成列鑽還火在膚危巢飛赤鵲夾巷擁青趺赴社歡俱集眠床懶未扶鄉心千萬樹總向酒中攄喜遇王二光祿有贈我愛王光祿同居幸比肩學成荀况日䇿獻買臣年石匱家如寄金門吏是仙大官留熟釜好客散饔錢歲共登朝履人懷入剡船他時醉春酒相待鑑湖邊上李相公相室開三運師臣總庶官紫薇長啓曜仙李舊能蟠天子尊伊陟蒼生倚謝安鴻文標正始嘉績邁貞觀位極平章府名通泰乙壇君臣同德易父子上公難韋笥傳來久虔刀佩去寒迓衡真穆穆尚父自桓桓職衮將絲補堤沙共黍搏山河排作繡日月捧如丸麟擾黃扉外鸞回綵筆端引經千佛會押字百花攢綬曵圭恆輯金鎔印豈刓招擕開閣邸吐哺罷堂餐九宇遮成障三街望似磐明心垂寶鑑密語傍金鑾鍾傅驅車小蕭何賜第寬年才臻葛恪學已過甘盤論語行將半丹青寫未完他年靈壽杖會作應龍看集閩縣方京池亭同鄭宫坊前輩髙兆陳日浴定國即席分韻得花字良宴千秋勝方塘十畝賒飛飛天際雨的的水中花古荔蟠雙磴空亭枕一涯壺氷傾醴酪甕醢雜魚蝦香繞雕櫺直牙翻鏤字斜時戲翻詩牌行酒呼盧驚浴鶩出燭及棲鴉客盡來蓬島人如泛海槎女螺才咫尺何必問蒹葭賦得紅藥當階翻曉日穿朱網春風拆絳房重臺方漸啓兩戺正相當翠發年前種紅添午後粧翻芭疑婦繡落蘂帶官黃洧水貽香逺𨝍江舞袂長孰憐偏反意留詠在東堂過汪二檢討新居和馮三郡丞韻履道坊仍僻安仁宅不譁間官櫓紫陌逸興繞丹霞市隘門逾靜庭虛徑自遐近牆新種竹隱簟舊安花劍買秦王寶文袪左氏誇屏風排紀亮書乘載張華擊築娛心意銜杯潄齒牙髙談時據檻下直當歸家禁裏分題祕簾前起草賒蘭臺聯柱下何用達南衙陳開府生日出處原乘運安危久繫身十年膺節鉞六度轉星辰海國存元老方州憶重臣孤懷如執玉兩鬢未垂銀頌起桐鄉近碑傳峴首真殊方猶戀主軫念為生民日出浮雲散時回大地春翟公門下士誰是報恩人八月三十日上賜翰林院諸臣御河鮮藕恭紀一十八韻曉日瀛臺厰秋風水殿涼賞花開寶㡢收蔤薦銀塘敕使宣中祕分甘出上方宫僚皆受賜翰苑獨先嘗種獻蓬山逺根蟠太液長紅衣銷紫漫緗菂墜青房垜去如堆雪橫來似截肪蒲枝聯作帶菰葉織成筐嚼入冰淘冷烹疑茗粉香慢剸包筍白且掩覆虀黃洗骨回仙島虛心答昊閶纒深知節苦折處見絲揚鼎爼堪呈質汙泥不染腸量材逾七棗挫瀋得三漿不畏相如渴何愁孔凱狂盤傾金掌露七割玉臺霜華井誰含片天池甫佐觴願將千歲碧早晚進西王西王母進千年碧藕何使君紀績詩秦望羣峯峻耶溪萬壑流專城居刺史千騎擁諸侯望族鍾洪澤聲華冠鬱洲才非平叔下名與敬容儔振筆翔鸞鵠摛文射斗牛起家由祕省出守監炎州五玉桓蒲寵三山鼓角愁慿忠歸漢節含笑佩吳鈎重簡東南牧長寬社稷憂清風吹畫鹿甘雨拂鳴鳩井邑桑麻潤宫牆桃李收蒲鞭裁緑梗花篆沁紅油虎自江流渡魚從廳事留餘波沾鮒轍砥柱宅龍湫邁德傳經逺昌圖錫祚優盈巢皆鸑鷟當道見驊騮河畔桃花發淮南桂樹秋門髙容上駟庭敞列行騶進秩褰帷出匡時借箸籌子牟懷北闕嚴助闢東甌自愧龍丘老曾陪兔苑遊微文當紀績聊備史官搜慕中丞起湖北巡撫有贈東海珠仍合中天日自開謝公真再出寇氏喜重來敇自皇恩下裝慿使者催建牙襄鄧表移鎮楚江隈半壁恢雄建長城仗巨才民皆思雨露帝用感風雷嶽勢蟠南盡湘流至北回雈苻看驟輯魑魅敢還猜馬識前時路烏飛舊日臺君恩何所似江漢水瀠洄春晚曹顧菴學士過天中署夜飲即席和見贈原韻侍從雄東觀才名擅北宫與君違越嶠過我在天中華省書仍祕長沙賦轉工清缸新釀緑古署暮花紅把臂憐時逝談心及漏終羣遊懷鄴下三篋記河東每望天垂斗相逢月似弓賜緋真熠熠時學士投瓊得六緋結珮莫匆匆合座皆枚叔空樽愧孔融陽春才有和切勿笑巴童十月朔午門頒厯侍班恭賦鳳律開平朔鸞輿啓未央祭時歸太廟是日以時祭太廟迎駕頒厯坐明堂道夾珠幡轉庭開寶籙長司常將舞鷺掌餼不供羊疊册裝縑麗開車覆帟黃用人輿十餘乘載厯覆以黃帟背封箝押小面記印泥方殿上呼三壽階前奏八琅五官陳夏令百辟奉春王數合軒轅紀班隨星宿行授書馳赤縣開卷遇青陽葉向蓂階拆花含黍谷芳敬天方嗣服厯數正無疆駕幸溫泉恭賦羽肅句陳外波開帳殿中咸池長浴日華渚自流虹曉度榆關逺春從黍谷通慈寧扶葆馭神䇿駕豐隆盤溢銅仙露窗含玉女風青泥分太液紫氣接居庸淨可捐煩慮溫能養聖躬醴原逢處合仙井鑿來空衣藻沿渦碧巖花入照紅瀠階將赴壑聽水似呼嵩鐘乳浮銀碗松雲鎖玉櫳起居長樂輦扈從華清宫舜德時存坎湯田歲轉豐甘泉徒有賦未敢擬揚雄題耕隱卷子有序邑前進單能重先生名瑺隱居西山下自明洪熙至成化杜門絶仕進别號耕隱同志並為詩贈之逮今幾三百年矣康熙戊辰其裔孫廣宗為修其遺卷示豫豫捧而誦之有二洪先生一名鐘一名鏞皆洪宣間詩人其詩類元和長慶諸名家而其字不傳并不識住何所其子姓于今誰似惜前人輯詩家不能旁搜而邑有前進如是不能一表微為可憾也因取仲洪先生名鏞者長律一首依其韻和之雖慙續尾顧私喜一日附兩賢後乃應廣宗請而復為識其大略如此舊氏傳江表前賢住郭西此山曾豹隱深巷有烏棲地僻難回轍春陰自洗犁隨時觀塞馬玩世等醯雞但辨麻和菽能忘筌與蹄壇邊松障合門外栁枝低乳犢銜芻出新鶯繞樹啼商歌留白石叢話記青溪奕代存風節居家鮮傲倪川迥魚汕藻堂改燕巢泥筆篋餘花譜衣形想稻畦間看三徑菊貧授一莖虀茂族開於越髙風著會稽詩題王霸友隱並老萊妻故老行堪式賢孫卷自擕遺文追往哲流譽滿中閨附洪鏞原詩吾邑西山下君家住更西百年忘寵辱終歲樂幽棲沃壤資三熟生涯在一犁呼兒勤飼犢戒僕早聽雞髙棟縣龍骨衡門絶馬蹄來牟連屋近桑柘覆簷低花外提壺語林間布穀啼沾濡天雨澤灌溉水分溪托迹堪鄰鄭窮經合並倪不辭身滴汙寧憚足塗泥曉摘蔬盈圃秋收稻滿畦甑香炊白飯甕淡釀黃虀禮讓誇淳朴經營笑滑稽相親多野老主饋有山妻靜裏詩還覔間邊杖復擕優遊太平世何必慕金閨西河集卷一百五十三
