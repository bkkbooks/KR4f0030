body:
  text: 西河集巻三十三翰林院檢討毛奇齡撰序十重修萬壽慈禪寺募序山隂等慈寺創于石晉天福間賜名天長至宋真宗朝改建其寺于相墅之西遂更天長為萬壽等慈聞于廷而賜今額焉其後熙寧淳熙代有興廢逮元季天厯寺亡于菑慈室不修者有年明洪武初始得藉檀衛之工竭勸縁之力而重還舊觀今又漂搖矣吾聞釋氏兼愛自王公貴卿下逮輿皁無不煦嫗然合萬若一謂之等慈今山隂縣西凡百餘里間所云天樂相墅者其受慈悲之汎䕶非一日也佛等其愛而我平其施合萬若一以此報佛其可乎况宋明以來其為勸縁正等也衆曰善遂書之為序王草堂詩序春秋士相見必稱古詩為贈答而其後浸衰然猶有中郎之因訪友而詠招隠殷東陽送甥而誦曹顔逺之為詩者今則非已詩不贈爵里未通輙投以一卷古今長短毋論木李瓊玖軒輊有等而苐從輕車出敖必有填車篋而來歸者故予于近詩概不暇讀而獨于草堂有降心焉則豈予之有私于草堂也哉夫草堂固修處士之行而擅大夫之才者也天下尚結納乆矣雲間日下未嘗相見而縞紵往來凡知草堂與不知草堂者皆欲得草堂為賦詠故草堂家居足不出闔而側身四望其為贈英瑤而報錯刀者以詩言之不啻零露之為歌草蟲之以誦也予嘗浪游人間嘆今世無諸侯王虚已下士得追古稷下碣石故事而草堂以嵓穴之子致賢王忘分每以詩文相傾倒横槊之餘從容倡和夫淮南八公至今不得其姓氏而梁園賔客鄒陽以傳臨川門下明逺特著人苟自立則青雲在前當有相附益顯者夫草堂豈僅為河間誦詩者耶田子相詩序往餞胡東嵓之汾陽料其贈行詩得田子相七律驚為嘉隆間詩人既從予邑王子文叔見子相所刻方幅則居然唐詩也惜予見子相時少不能盡識其生平所作為之甲乙今子相自輯其詩次第編摘將以示于人而畀予以序夫詩之為思也窮神幼渺期于中度故流連咏嘆而未嘗無止則焉存乎其間特犬矜情太多則超詣反少葢詩有氣調氣揚則調振自非葭灰相發元氣具舉其能調音聲而播律吕鮮矣夫子相之詩之臻乎嘉隆而未進乎唐則以矜卓之未忘也然而遂有進也則以意氣之能開興情之日上也故少陵為詩衰于晩節其興減矣予避人有年而文詞不得揚氣未充矣向在姜京兆許見子相尊人驃騎君抵掌俠烈能縱譚天下時事比之陳同父之見幼安意思勃發致京兆以持重緘嘿之資互相激越暨予見子相于蠡城之龍山飛揚跋扈四坐為詘其在今驃騎戈船南下衝斥于甌餘姑蔑之間横槊慷慨賦詩而却敵其意氣之有效如是則夫子相以終軍之年抱請纓之志而又加之以雄悍博達慷慨激越之意氣豈獨示人以詩句而已朱斯珮五律遺稿序予詣斯珮斯珮出五字律一百餘首示予時盛暑設床坐林下索予㸃定其詩逮晡而别别數日而斯珮死今斯珮所著書無一存者而獨是詩以予所㸃定特為編摘乃得存則是斯珮所著皆可以傳而惜予之不盡為㸃定之也斯珮初不喜為詩其為詩也近嵗耳而與予論詩則在今嵗一二月間予漫游多年逮歸而親朋在者已無幾矣其為詩與文或十年或二十年向之所為同唱和共吟嘆者今或存或亡皆不可考而數月之内其為存亡之痛生死之感亦復如是又况乎四海之大友朋之衆之遙遙而莫可指記者哉予痛斯珮死而蹉跎車過無輓無誄無虞殯無哀詞無銘狀誌述而獨斯一編為二人手跡開卷而親娓娓焉悲夫嘗謂天下無全文近之為古文者皆非吾所為古文者也惟詩則欲各取其所長合為一集往欲得樂府如大敬擬梁陳以後詩如呉漢槎七字詩如梅村七律如葯園禹峯南士五字長律如杜陵生者以為善本而皆未有定斯珮詩倘幸而終存是亦五言之選也至于斯珮之篤行則予方效之非敢以斯序為傳述也輯其詩者何自銘也倬炎曰西河與施愚山先生謀選近詩約得十餘人終不果選見序四愚山詩序及題辭阮亭詩序中蔡子珮詩序夫為詩與為帖括同一無用然而寧為詩者豈非以詩本于志内之可以見性情外之亦可以覘問學哉苐今之為詩大率單心帖括而賈其餘才比辭摘句其于詩固未知精神之依憑而典墳之有效也蔡子子珮具絶人之姿不恃攻苦輙能為文章詞賦歌詠論議即下及書數繪畫博塞游娯之細無不意志所至手目畢達而特其所為詩則若有㝠心求通博觀取勝不甘以才分自限者夫審時候氣初亦何與于宫懸而穿域蹋鞠超乗投距其于横行轉戰之事相去甚逺然而吹銅布琯輕齎絶幕樂人每藉之正律而當時行軍制陳反有借斯戯為訓練者此無他理有相因則先事所從起也故種樹非製衣而衣由之成啣龜非築城而城于以備必謂調情者為虚器而旁蒐者非雅材豈通人之論哉夫詩畏言性懼其誕罔詩忌使事惡其拘牽而有如得之中而資之外在心為志而發言為詞子珮多才吾卜其思之成學之固矣子珮舊為詩頗學茂秦而近詩有進或曰茂秦詩有性情然亦寡學或曰性情吾所自有若夫學則老子不云乎善人者不善人之師不善人者善人之資人亦惟不好學耳人苟好學則亦安往而不為資焉胡氏東岡瑣言序昔漢藝文志載雜説家為書千餘今竝無一存即世所傳齊諧洞㝠搜神博物西京越絶諸記悉後之人襲其名而偽為之故記中所載竝與史傳所徴及他書記註所引據者了不相合是何雜説之難傳也然而唐宋元明以來人有外集集有别記篇帙之多至比之山毛海浡而厭不欲觀則又何與胡光禄著書東岡有東岡瑣言自六經九家以迄之街談巷議書凡幾巻巻凡幾部乾象五行書詩禮樂竺乾柱下神蛇鬼豕一一臚列不啻匱石之探而冡土之汲紛紛乎雜説之𢎞覽矣世每稱雜説家不可為其説有二一則惡妨于大文而養其力也一則恐殽于大事而不可為要也夫文之大小固無論已若夫雜説家好辨舊文其載藉字句考論得失所繋猶淺惟是捃摭遺軼往往取人間所傳而顛倒之指記混殽是非莫辨夫予宵小以平反借名覈實此固不害為廣大而有時以端人正士纎㣲無纇者或間摘數事為之㸃染嘗讀宋人小記至范公文正暨歐陽文忠諸隠軼事未嘗不惜夫野稗之漫傳而立説之當慎也今瑣言所及但有通記竝無偏駮其聞必取真而見必貴確他日者史館有人當必求是書以備搜採豈曰補衲是資而已乎初予避兵時曽記明季遺事凡四巻以示沈七七善其為文而疑于其事既而示大敬大敬曰矢人有叅訂而成一矢訂之不詳雖挽彊其可追耶予乃悟其義而焚其書瑣言無是耳采山堂詩二集序予與康臣為詩時同之者為伯調木弟桐音奕喜四人木弟早世無集而兹四人者各有刻集行人間其集以堂名伯調名嵗星桐音名芳樹齋奕喜名東書而采山則康臣所居堂也特康臣刻采山詩時值予以籍捕夜走呉下無暇為較讎而康臣屢屬予序亦不能應暨康臣赴都遇諸淮而後讀其詩而相對泪垂今集中絶句有云濕盡征衫者葢指是也乃康臣第進士對䇿以稱㫖擢高等白事閣下入筦中秘書其為詩滌然自喜却脂藥檢括不及嘗寄予書云吾方與同舍郎汪君同為詩吾憚其伉烈力追之吾將以此易天下而不知者必謂予兩人為宋人揚波效滄浪宛陵清江所為何哉其後招予于白門盡出其十年來所為詩屬予㸃定私喜五古雄博雖峭巉不類具茨七古有開闔縱一意倜儻汎軌軼步猶不足涉都官長史之藩而近體蕭踈非歐黄比也此猶居明堂者厭耑見之數而雜啓左右移易向背雖西盪東澹合宫重屋逐步為轉變而要之不離乎殿陛之間此猶先施侻衣毛嬙滌黛而意密體䟽神光離合無所或二葢絢爛之極則平澹生焉而惜乎康臣死而其説不早見于世也今康臣遺集其同舍郎汪君為之較讎而以不忘舊仍名采山且屬予為叙夫詩實難傳康臣幸與同舍偶汪沈之名已行人間而伯調亡後其嵗星二集世多瑕瑜芳樹之後人貧不能鬻紙染板而東書少年戌死塞外其毁其所為惟恐不盡獨予以一身當五人共逝之後復取采山詩而為之序之即欲相對泪垂如在淮時亦豈可得乎俞石眉詩序詩為六經之一而謂窮經者不言詩是何淺之乎為詩哉苐窮經實難孩提入塾長而游于師廣稽博習尚不足窺其藩牆而朏明詠露露未晞而詩已成此非詩之易葢必窮經有年而後能矢歌于一日故夫風人者學士之為也胡子東嵓亟稱石眉為仲高小阮工為詩文去年遇㑹城觀其舉義嘆八家傳文不廢試論技良者無棄藝也既而讀其詩風㫖警上梗概多氣雖縱横睥睨倚天拔地然要歸于大雅東嵓非欺予者特石眉年富方窮經術究其所蓄已足搘人頥而折人角乃降為韻語名動衣冠人遂有疑詩句之不韌學者夫儒術誠行即天下之大尚無窶業况言詞詠嘆櫽于問學能殖田而圃可鉏能削札而絣可組也人有操瑟而不為鞉者世共謂其不能鞉及改絃布革按度中律試為之而竟以鞉名夫鞉且能名况乎其瑟也哉懷許堂續集序懷許堂續集詩者蔡子聞似祖之所為名也子聞之祖青蓮君曽為詩名懷許堂集以東晉許掾嘗寓兹土因以懷之夫許掾無文往為孫楚所見譏而史尚隠逸不傳𤣥度此亦何足繫人懷而以顔其詩倘亦蕭條是好之意與許掾詩蕭條北幹園乃子聞痛祖徳之云亡思覲前烈復以懷許名而謂之續夫孫無續祖集者續之自子聞始然而其志可念矣昔陸機以揚祖駿徳姚珽以紹祖訓義為世所稱子聞有其志無論其詩之妍蚩足繫紹述而苐使芟落華膴獨存高致若許掾者當亦不負中領軍後况乎甫之詩之有似于審言者與子聞為制舉擅聲于時將特見所著為用世計𤣥度之續非其本懷予獨惜作述之難自漢史藝文暨唐世書庫所載名目今罕有傳者予聞曽大父為司刑時曽改撰冊府元龜諸書僱胥史抄録凡若干卷而大父所著不止懷許嘗讀其誌狀尚有左氏薈周禮鈔百子樷語尚書射覆四書摹空翠樓稿聊爾集三一言石室籌黽陼唫甘龎而三解酲嗑言忘身堇無無説蠙衣偶占清影軒雜爼凡十六名今兵燹之餘猶能有存焉否也而謂子聞之可無以續之也王紫凝幹山集序予隨羣公作舉文社髙㑹于洛思山之耆闍時搖筆者不下一二百人予為甲其三一選郎朱君一滎陽丞章君一紫凝也乃朱君為選郎歴文選考功稽勲諸司掌選者屢矣而貧不能飾葢履丞被謫幾死紫凝三十年衣麻不得卸去然則舉文之無闗于富與貴也雖然亦惟舉文為能致富貴之具故富貴反得而詘之浸假文之得無繫貴顯文之不得亦無與淪落則雖慶封宣孟日臨吾前其得而操吾文事之善敗哉乃由今思昔其所為一二百人者或隠或顯而要之能為詩為古文者又不逮三四人紫凝以為吾既無所見于世則必有所挾以自見芍藥之花不生于禁省之中訏水之外則退而藏之别出其材以合之于蘭桂調之于羶薌于以成五味而和五臟横江之鱣鯨不能薦寢廟具饗禮則枯腊無庸所當逞其餘技以鱗飾刀以目飾珥以鬐鬛脬膜飾韎韐旂弁車巾矢服之用葢挾持固有在也苐紫凝為詩傑奡自得每不潔潔于規橅而情深致長抽牘即合故隨其所寓各以名篇若所稱螺峰與浮峰與今之幹山集而三也夫遍紀所游而仍不離乎桑梓如是聞之章丞好為詩自筮仕山左繼謫中州而近且從征乎荆門夏口之間其為集當不止是也然而其幽愁憂思有過人者然則文人之窮達又安可定哉呉應辰詩序應辰工舉義舊習舉義者戒勿為詩而為詩者謂為舉義家必不工應辰同時工舉義者若張逺陳至言輩已能擅長律比考功盈川而應辰驟為之争相馳驅故自應辰詩出而習舉義者不得妄戒為詩即窮年為詩自誇有得者不得傲舉義以所不能才人之絶技也昔人稱詩有難至如轆轤交往未易駢嫓而元稹作工部誌謂工部獨絶一時在排比聲韻屬對律切葢三唐取士悉用排體而散詩自鮑謝後漸趨于偶故能律即能詩而能長律則然後能律然而宿儒老師窮年矻矻而不必能者而一旦能之如顔光祿忽聴張鏡與客語如魯肅就吕子明談議如石季倫作豆糜啖人吁噏猝辦如孟達聞司馬公兵至城下不意千二百里八日而到才之大者無所不通應辰可騐也如謂工舉義之不必即工詩也世固有已通籍而未能詩者夫通籍者則必其工舉義也夫通籍而何必工舉義也哉王鴻資客中雜咏序今之為詩者大率兵興之後掣去制舉無所挾揓而後乃寄之于詩惟鴻資不然少為詩數百自書之而與之雕工人之讀其詩兼摩其書以為兩絶予入塾時猶珍之暨鴻資漫游四方值天下初亂中州羣盜大起鴻資獨杖劒挾䇿思一得當以展所學而卒不可得歸而梓其詩則皆壯游時發憤怫鬱不得已而仍寄之咏嘆以圖一快者也今老矣凡所為詩則皆以奔走衣食寄諸侯幕下為他人搖筆草檄馳箋驛奏勞心敝力之餘暫一偃息而意氣感發亦復為之故為之不多即多亦散去不收拾乃亦録其賸者于篇葢曩時所為書記者有位而無事士君子未至通顯則先就辟召而後乃呈身庶僚故陳琳鮑照崔融髙適皆以記室起家而實則文章箋奏未嘗責乎其人也今則位與事午凡幕下詞章一以相委顧追隨屬車無所聞于外不惟無位兼無名焉乃鴻資凡三為詩一揣摹帖括而旁及之一挾䇿求有用而藉以興懷至于今則皆食苹傾醑之嵗月也然而其為詩一若劌心鉥神窮幽達𦕈而為之沈雄老健不遺餘力畫家無所得即使五日一山十日一水經營彳亍而一丘一壑望之而盡而假使輞川龍眠適意磅礴雖偶然下筆疾若風雨而指未到而氣已舉房皇流濫皆可觀也鴻資詩不猶是乎若予之三讀其詩而三好之是雖讀之時之或有異乎然亦何嘗無同嗜焉募裝韋䭾金身序祇洹無金湯之險兵革之衛所藉以維䕶者韋䭾也無論韋䭾所始以七世童真用堅固毅力作佛干城而即其岸然强立歴劫不去是亦弱門之錚錚者與天寧寺韋䭾未裝金身既已戴胄摩杵雄峙殿堂而髹漆不施追琢未竟雖使黄金布地一往照曜而丈八之間黯然無色縱曰像教猶勿像焉顧裝金實難雖一身有限而所費不訾計追師鏤綴填灰墁布約有千工佛以韋䭾為垣墉而韋䭾以檀越為篋笥故韋䭾稱䕶法檀越亦稱䕶法苐韋䭾䕶法逺在三洲而檀越以一身而不為之保䕶非䕶也况韋䭾幻形何所事飾彼以像飾教夫亦飾生人之瞻視者耶募者索予序為施捨勸因序之若夫以一人助一身與以千百人助一身其大少寡多原無限量亦視其一身之能助者助之而已募裝北嶺王天君減像序北嶺崇真道院為吾邑福地之一以其地在北故祠𤣥武協方神也乃祠𤣥武者必先火徳取水火相濟之義而火徳最神道家稱之為靈官或曰道書曰靈官本王氏名善即王天君者能驅邪燭奸開寃析罔其以善治不善而不枉于善乃以名善于是世之發憤怨抑無所告訴者得借其神為証明故時俗訟神者多于訟官而其如神之瘁于奔命何也向使神為生身金鐵不壞猶且遲乆賢勞思用歇息况以香塵和泥屑為之外加綵繪雖披甲胄土梗而已住院道某憫神之碌碌將以減像代增灰礲漆剜務使嚴重勿輕令舁輿得離其位此亦敬神去慢之㣲意與人有訟官而反褻官者官必加怒而假使尊其等威張其容色就訟堂而申辯質此亦聴訟之欣然者也靈官果靈福必有在吾願世之重其神以集其福而遂為是言西河集巻三十三
