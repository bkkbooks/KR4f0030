body:
  text: 西河集卷一百十八翰林院檢討毛竒齡撰録門讖録京師蘆溝橋為南北咽喉崇禎中流賊窺畿南當事議築小城設把總𨽻兵鎮之其城祗二門通南北往來乃當時題門者南曰永昌北曰順治實頌之非有他也後李賊僭號改元永昌而本朝世祖皇帝即位遼陽實建號順治門讖之先兆如此野樹神録豫友丁大聲有棗園在城西其祖母戴以剝棗至園惡大樟占棗地命伐之官園者力爭不可謂是樹壽枝葉偃及畝必有神不聽及樹斷母見緋袍人從斷樹出驚問之傍人勿見也登藩車到門忽有瓦礫從車簾中入正中母面及下車則飛礫集于頂如鴉然侍人橫遮之即止稍却集如故苦之或避之親串家然不能歸也大聲儒者也執經坐母側正色厲聲以訶之終不效杭有師婆善觀魅或延之來甫至階即左向肅手密問曰君家有娘子以雉繩環頸此誰耶家人哄然曰此大媈也大媈者杭人楊姓本大聲母而以母姑虐死于繩必此是也大聲叱曰止師婆杭人焉知非知其事而捏此言者師復曰尚有小婢從亦繩頸何也衆愕然曰此則外人無知者矣大聲乃大號請媈主出饗以小牲醴為文若干字且泣且告具言子媳無讎姑之禮家有名教不可訓母生知書豈死而瞀亂如此是夜夢媈至泣曰吾頗曉禮豈不知姑不可讎顧此實非吾意也有野樹神者伐其棲而神之門者惡門樓守僕日以穢漬澆門端遂因緣為姦而脅吾以來凡其犯姑狀皆其為之吾敢犯姑哉雖然野神饜所棲苐造尋丈瓴甓以棲之足矣吾十年以來頗苦盍亦告之姑得雲棲説法以稍為解釋可乎醒乃告之母遂築小祠斷樹下而詣雲棲作咒懴凡十晝夜及畢母朝盥一婢捧水盂一婢授巾灑面已接巾授巾婢忽取懷中礫擊母面母批其頰曰然則從來之投擲皆汝所為耶然婢實不知也嗣此遂絶于先生曰禮有室神論語鄉人儺孔子必朝服而立阼階注曰恐驚室神是也有野樹神周禮大司徒職田主各以其野之所宜木遂以名其社與其野注謂野無社主者不立壇壝但依其野所宜木以棲田神如依松曰松社之野依栗曰栗社之野是也今世無五祀不曉室神並不識門神為五祀之一而野樹棲神則以為怪誕而樵賊之因有此事烏知此皆言禮者所必及乎特其所為祟則野神不得入室必藉室神為因緣而室神野神又必憑其家人之間隙而後可為此總無可怪者祗人死能久留而雲棲佛説可解怨結則怪之甚録斯説者毋亦信其有禮者而闕其怪焉斯已矣二先師判鬼録山陽令朱君禹錫善讞獄見海寇案末有蘇道士名而疑之以詢豫豫時與杭州張纘同寓淮之天寧寺間為語及纘愀然曰此吾弟綋為之正欲告朱君而朱能詢及子盍為我告之母使道士獲無妄罪豫大喜遽報朱去旋即問故纘曰道士風馬其開隙受陷所由豫不得知但恨吾弟綋曾以不韙為天帝録罪死而復蘇許以改行自贖而今復如是如何豫因詢其不韙狀曰難言難言但其事則亦可異者吾弟綋于書無不通屢試必先人特以貧故依婦家塘西夏月痢死無棺其子走老屋乞吾叔父孝廉公買斂具而孝亷公在海寧遂從海寧還踰七日綋蘇言至天帝所聽讞已入死案既而曰此諸生也遣一官押至學宫請二先師出曰是已有成案矣然必得先師決之一師曰罪輕而情重死何辭耶一師曰雖然事尚有可矜者始非倡謀繼不附名雖同情可減等乎官曰同情則同罪何減為師曰不然情雖同而罪有等毋亦姑貰焉以覘其自新何如官躊躇曰念其父官嶺南有功德于民請姑貰五年改行則已不改然後收而倍入之乃遣押之見吾父吾父在嶺南名宦祠拒不見曰非吾子也轉而見吾母母氏蔡在德清外家泣曰父不汝子矣汝能改行當速歸雖然汝死久恐尸壞可歸則歸否則仍返之帝所自有所處萬勿認他人尸也因遣一僕同至家覘家人肯認與否及至見尸尚未斂有一燈一飯盂列尸前凳間尸動女驚走曰不認也既而妻女哭而前曰認矣僕與押者始辭去其怪如此時子詢其所為事纘勿告也後豫間還里避薑京兆宅見其從兄綱重詢綋事曰從弟死有年矣曩者清師下杭州潞王北去其宫眷留者匿之塘西孟氏家從弟為王氏所誘謀出首而既而悔之不與名也其後王氏出首者五人皆暴死而從弟賴先師救解以不與名得免然越五年亦竟死京兆問先師者誰曰先師者一顔淵一子服景伯也時京兆備書其事然終未得蘇道士狀及豫官京師與淮之張毅文為同館官毅文能言之時毅文尊人吏部公在籍纘綋兄弟以同姓嘗通譜往來值公生日綋無以為壽偶過三官閣見蘇道士養鶴雛二而道士他出綋遽指鶴雛曰道士已賣與豫矣遂攜之行而兒道士守之者堅不肯與乃擊兒道士奪去而兒道士尾之伺其送吏部公宅出兒道士跪門公問故竟還兒道士次日公張宴于曲江園綋在坐見大鶴翩然翥而前詢曰鶴雛何在耶公曰在也因歡言謝之傍一人揶揄曰鶴雛耶昨兒道士來跪門領去矣綋銜之因有此隙于先生曰豫惡説鬼物且薄宋儒以𡨕報事作感應篇客有道𡨕報事者但充耳俟之而獨于二先師事不能忘以凡言𡨕報必無可據而此云先師有二且以顔氏子服氏當之此數百年來極東西南北之人必無一人所敢言者而此能厯厯言之則此非漫造無據者矣當京兆宅言此事時在坐者一十二人裁及二先師便皆譁然曰荒唐至此豫俟其譁畢正色曰事或荒唐二先師不荒唐也豫初不信此事今信之正以此也京兆曰何也曰禮云古凡立學者必釋奠于先聖先師此在文王世子篇是春秋前禮也世信以學宫先師必屬夫子哉夫子前學宫必祀先聖而佐以先師聖為主而師附之聖尊而師卑相傳舜為先聖則臯夔為先師文王為先聖則吕散為先師故漢後周公為先聖或孔子為先師孔子為先聖或伏生申培公輩為先師及唐定典禮則始以孔子為先聖顔淵輩為先師是先聖先師創于唐虞三代以來而顔淵先師則定于漢晉後者自明嘉靖間改稱孔子為先師而此禮遂亡蓋聖人百世之師他時可稱而學中必不可稱何則以建學成典定作名分不可紊也今以斯世皆改稱者而𡨕𡨕之中獨能不改以存此名分此在張氏兄弟必不能搜掌故以自詭其説而在世之人亦必不能洞悉典禮故造為此言以矯誣張氏兄弟則真實録矣吾方欲存此以愧夫張璁桂蕚之徒之不學者而諸公以為荒唐何也京兆曰善遂録之某日録棗花録吉安曾副使言族丙應試旌陽觀道士謂之曰見棗花當舉曰然則來秋耳道過孀姑姑呼棗花持脯前則婢也丙告道士語姑與之待年果入解丙初有定詞姑能文後有代婢答詞丙詞曰欲見棗花開喜見花開早留此潘家苑裏紅試待秋風曉婢答詞曰將探上林花須記東家棗莫道人從四面來忘却枝頭好丙午録女棺録縣東里張逢吉妻曾遊城西五里東嶽廟廟停往來棺一女棺尸中僵祝竊啓視因謀衆將燬之或告張妻貌大與棺中女相類妻惑甚夜歸狂言曰豫河南南陽內鄉人家住秋林山從夫甲官台之黃巖豫先死于此而夫死赤城驛中不得歸迄今若干年今守台者頗憐之將歸棺南陽而道經取我使燬我是絶我歸也不幸更為汝婦敢乞汝汝當急往止諸衆張曰諾早起為衆言得勿燬然妻終以是益惑後漸病嘗曰脫不然何以貌尚未改也張大患之一日啓視則其貌乃大不類棺停廟亦未久台亦無有來取棺者于先生曰應劭外紀似此者多有惑則怪事生理也客有好言鬼物者適得女棺事因録之何氏僕録邑何氏僕方相何氏兩世入御史臺家富相效犬馬走積賜錢若干緡何氏中落出諸僕相亦以例出乃發前所賜錢營販耗敝筋力凡數嵗貿田園若干忽謂其弟曰吾何氏僕也將老何氏矣雖然豫固方氏子豫不可不為人後豫弟有子當後豫削木箸名字如既死者豫羡財若干而以身與田園歸何氏焉王師渡浙江江上軍潰兵入城何氏謀走避而難守者謂相衛家人出城已主守可乎相曰不然郎雖貧廣額豐頤又何氏也為衆所耳目恐死死則家人誰主者衛家人者郎也以輜從第宅器仗責奴已矣叩頭别城破諸坊人凡以僕守家而告其主所者釋之相不告死齊于氏曰江上軍潰時軍無守者而相獨為何氏守其家可不哀乎凡人進事人退則亦自愛其身向使相既出自營其餘財終老于外誰則厭之又或者好言致主指畫慷慨其忠誠似亦可信及一旦有急而隂鬻其事甚或豫敵以主者悲哉聞方相亦少愧矣全山人録山人名全樓氏嘗藥山中如兔齧物嘗自謂能全因名全然人不知山人也豫初知之知山人善醫癸巳夏家母病痿執不得捧乞山人藥儼敗竹箯者剔刮煎潄病愈因是人亦知山人善醫者欲醫者亦皆乞山人山人門如市一日山人謂豫曰子知吾善相乎吾請相子子兩目滴滴有如晨星明視事叶汝也孤生乎其腰亦何所輔也手指爪如錐而不能搰物物將搰之矣自瘐也其氣崖然午也豫曰何哉山人之所為相矣豫䀛且善物無妄履也是山人之言否也且山人誠愛豫豫亦愛山人豫願山人之全其為山人也山人既善醫今又善相是山人市人也市將求山人矣市將求山人則山人不全且夫人之有求于山人也必將有得于山人求山人而不得山人不得于所求者與山人之將必得于所求是皆不得全惜哉山人之不全其為山人也山人曰然則奈何豫曰山人故不善相人也豫貿者也善物坦坦平平居易以俟命而山人曰午也無輔也明可覩也則可謂善相人乎則其于醫也得毋亦若是耶于是聞者皆曰毛甡非昈者無所輔者齟􅀈者而山人曰孤且午山人誠不善相人者而于是亦無有乞山人相者山人亦不醫蟻録桃根有所宫者廣中而纎脣與圊傍之塏步八焉有蟻居之圊之蟻緣黍在塗者蟻從桃根出縷而遇不得紀數則圊之蟻驚似還所偵者而奪塏以行其桃根來者東西跂不知所向也又未嘗歸桃也散之盡而圊之蟻有巨者躍出似麾而前者而圊之蟻之細者縷應焉行至桃望之一若抽煤繭貫塏脣出而以步八之距而促也寸曲之向之從桃根來者初不得知其所之也故未嘗歸桃忽掩圊者脅圊者少却距而半巨中細翼之陳然後從桃根來者夾宫脣亦首巨而細者唯唯陳左右巨者從容收向時出者得諸宫脣以時之細者之出之盡在前也後細者踰時兩巨角無勝負細者與細者角叢而封也不可審記不辨向所從桃者與圊者以故亦不得勝負角畢解各返來相當各不得向之所出之半而其半且留就視之則奄然盡死者也或無首足者與夫世之角者無殊也然而既復出以為復角也而蟻則收所傷蟻蟻兩生攑傷一或生之三似乎得審記者然因得以各攑攑之盡其未盡時間相觸觸亦不復角豫寓來氏園親見所狀異哉于録特旌賢孝節壽齊母録賢孝節壽齊母者鄞張姓康熙八年其子寅與岱以母節狀白鄞令令白之學使者學使者按令甲請旌遂旌曰賢孝節壽齊母歲給薪米燭炭并時憲厯有差蓋壽以表節賢與孝則狀節時所并見云方母歸齊公時公以諸生授生徒里間母為公事舅如公會崇禎末嵗侵禾穀不升市無登魚蜃者母餐秭榆而舅不知其為侵也公亡而迎事外舅如事舅以故三十年無歸寧焉或曰此則母之以孝全其節者乃母之教子㸐薪向書而織于背其子每出必遣之互瞷其所遊客客至隱幔理客語語或不法謝之里有補陀寺去舍百步四方朝海者自燕齊秦趙曳流銜臂日以萬至母未嘗一窺寺而其子亦遂不敢以偶過入伺演繹其嚴如此當公訣時謂母曰吾固知汝節所願慰泉舍者教子而己以故母念及輒督教之雖兵革遷徙仳離坎險中教不輟蕭山毛甡曰豫方與岱遊而岱兄寅已謝世然母強如故此可謂非壽乎寅聲名擅經術而間以不得志稍為達節豫嘗為詩弔之若岱者則慷慨沈摯王景略之儔也有子如此母賢可知矣岱以母狀請甡傳謹節録其概如傳西河集卷一百十八
