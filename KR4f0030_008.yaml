body:
  text: 西河集卷八翰林院檢討毛奇齡撰議三請罷修三江閘議三江閘者山隂會稽蕭山泄水閘也三縣多水患前朝紹興府太守湯公造閘三江口以泄水于海名三江閘康熙四十七年山隂居民有無賴者妄言閘座將圮不經改修必有坍􅀈崩塌之害遂估計修費需銀一萬三千五百八十六兩有奇分𣲖三縣三縣大驚本府上之督撫兩臺發藩憲勘驗且下憲票關請三縣鄉官會議月日關到以三江閘改修等事蒙兩臺發勘敕藩憲親詣閘所勘驗應否其合行合止諸一切事宜自具驗狀何庸下議乃猶發憲票仰山隂縣關請俯詢忝在治末安敢不略伸管見以上副上憲急切為民至意愚竊以為三江一閘關係極大其應修與否似未可妄下斷語而愚則斷曰此不必修且必不可修何也大抵地方最要在興利除弊然必有利始興有弊始除若無利而求利原無弊而指為弊是揠禾作藝剜白肉而使療瘡鮮有不大僨乃事者紹興本澤國以古越千巗萬壑之水而山隂會稽蕭山三縣當之無尾閭去水則巨浸滔天所以前朝嘉靖十七年紹興守成都湯公相度形勢建閘於三江之口北臨海門以専司泄水其閘髙三丈三尺徑長四十六丈列二十八洞以上應周天列宿於以救三縣民田數百萬畝迄於今相距約二百年然而閘座巍然如長虹亘天一若有神物護持其間凡各洞各柱並無有纎毫傾仄而忽報將圮動言改修是狂夫也故曰不必也夫不必修即不可修然而又曰必不可修者從來有壞始有修今不壞而稱修不合因變為改修且名徹底改修顧改修則萬萬不可崇伯築金堤尚不可改未有大禹鑿龍門疏積石而可改疏改鑿者向在史館見湯公建閘明載之循吏傳中當公生時其父布政公命名紹恩一似當有恩于吾紹者斯已奇矣及守紹而晉謁禹廟則山川林麓如熟識者故方其建閘曾鑿山根叱海潮犁壅沙十餘里驅江豚水蟲出之下洋然後伐大石運大木收苖山之材與羊山硊磈以門以揵凡于梭礅剡砫牝牡銜結必和糜烹秫鎔金冶鐵以澆灌其中此其神力為何如者而大言可改是猶拆已補之天而改立天柱雖媧皇復生勢必不能萬一為民心切當事誤聽或偶涉輕舉以致撓亂成迹則三縣魚鱉誰任其咎然且私估修費限一萬三千五百有奇考府志湯公造費祗六千三百有奇雖湯公神功原難測度顧未有修費而其數反加于創造至一倍半者愚故曰必不可修也以展轉商之而有不可也可斷也乃既罷改修安用小修據其立説不過以閘底嵗久不無滲漏為辭此又大謬不然者按三江之為閘也司泄不司蓄宜通不宜塞故閘之利害祗在剡其柱削其檻以利奔瀉而罅漏之害不與焉乃議修不得搜及罅漏必以為天塹之險傷于螻蟻一隙雖微恐積漸之至或有妨閘座云耳殊不知閘工研密其礲石輳合雖不如天衣一片紽緎盡泯然牝牡交噬為力甚巨其綰結之處縱有離迹亦千牛莫掣是以啓閉舊法但勒五字于石牌而樹之水中每露可閉字則二十八洞循次下閘然而閘隙漏水流離四垂即閘傍石豁亦有從而溲潄者以視閘底之小隙何止十倍乃晝夜淋瀝而究無所患以為滲漏涓滴原不足以撼如山如嶽之閘况罅在水底則內外兩水相持不流即遇泌沸亦水勢無力此雖沙礫作底猶疏泐所不及儼然磊磈何所穿穴杞人縱有云不足慮也無已則或曰旱暵豈無害而實又不然從來藴隆之咎不關水閘何况閘底故山隂有兩閘麻溪上閘所以救旱可仰接上流之水而三江下閘則祗得救潦苟閘可見底則牌字盡露內河龜坼必不能以山川滌滌責此石罅所以閘傍父老謂閘原有罅然自建閘以來約一百七十餘年從無有以閘底漏水傷禾稼成暵災者乃愚即以目前論計議修所始在四十七年十月歷今四十九年九月已及兩年即此兩年間去年夏旱今年秋潦潦固勿論而即以旱言在呼雩禱雨時雖閘罅未露而去底不逺假使滲漏足患則不塗不塞何難以涓涓不檢竟成大災而兩年旱潦並鮮低仰則是石罅無所關而區區滲漏總無事修補而勿煩顧忌有眀驗矣又况海口沙髙流不盡出但苦咽而不苦豁故民謡曰三江咽民口絶三江豁民口活今塗罅修法則直與湯公犁沙民謠苦咽之説兩兩相反又且塗罅無益舊朝曾捐修不知何法若近年姚宦捐資修補則鄉人相傳亦曾鍊羊毛石灰墁諸砫隙然不期月而罅豁如故前車足鑒也愚故曰此閘無大修并無小修此非故為是妄言也有驗之者也然則必無有修之者乎曰圮則修之愚之言此正以待夫後此之修之者也可斷也夫既不大修復不改修業經前任制府暨藩憲勘驗明白早置不議即礅傍漏水亦有驗看謂閘座閘礅俱係堅固並無絲毫損壞諸語是閘有漏水亦無患害况並不損壞何處著漏此亦不必再議者乃自四十七年迄今五載府主據山隂縣詳必謂閘底嵗久不無石罅宜築壩戽涸露底塗隙為修法以致制憲范公委曲商量倣治河故事倡逐洞捱修之法用排樁板障貼閘洞而釘之水中于以戽板水而窺底罅則事逸功倍然且愛民迫切惟恐失此不修必致他日重議改修反傷民力是以屢經督催而不謂府主因循既不遵依又不回繳祗築舍數年而仍未決也愚謂閘洞之底斷無石罅者閘本依山足為門限明明有石骨橫亘水底石骨豈有罅即或閘洞分甃或另有削平磐石仰受閘版然亦不能罅使直罅耶則黃泉非受漏之所橫罅耶平石安能有橫石橫漏之理無已則仍指之閘礅之石而閘礅不損在憲勘有明驗矣且閘礅非閘底也是閘底必無罅即罅亦無關閘座所應直告之大憲無煩顧慮者况大憲修法専為底罅底罅無慮則自可稍緩且此中亦自有可商者憲法不明云貼閘上下用排樁板障釘水中乎向使此地水底如荆揚塗泥楗竹可下則不論貼閘離閘皆能受樁板以立根腳無如閘底山足總是石骨即或山足不齊亦大抵石多土少石不受樁則樁不能以竪板板不入土則板不能以截水今此樁板實有不能入土者即使離閘下樁可避山足而沙中確石所在都有石苟礙板即如拳之石皆足為梗何况磽確且欲窺底罅則貼閘之樁究所難免是樁板釘水歷揆之此地而有未協也凡此利弊在當事奉行者宜採擇衆議直陳以可行不可行之故則大憲虛公定無我見而乃故作蒙昧姑置不理迄于今秋霖綿邈內水洋溢忽山隂關到擇日興工已估值一萬餘兩三縣公𣲖應徴蕭山民錢三千餘兩付司事聽用縣民大駴實不知是上憲行文抑府主新檄正丐集議而署縣以他事無暇方遷延間會颶風大發巗壑震動內河既􅐓洞而海潮外撼三縣民田百萬畝悉沒水底雖開閘二十八洞通身泄瀉無救陷溺賴江豚肆擾蕭山北海塘與山隂瓜瀝塘盡崩于水初猶內水與外潮相持而既而潮退則泄口既濶而內河之水隨之而瀉夫然後民田稍露屋廬無恙則是此閘止司泄並不司蓄止宜去水斷不宜留水歷有成驗浸假此時此日無兩塘之崩則雖鑿二十八洞洞洞拆裂亦絲毫無用而乃司事者尚欲征民錢一萬涸溟海之波露東洋之底以窺此徑尺徑寸之石罅此愚所以大聲疾呼雖身叢怨尤而不敢徇也今海塘未築而丈五河塘又崩內水盡退勢必有重檄修閘者因不憚扶病亟成此議以為後來司事者備一省覽某日某議辨定嘉靖大禮議此辨之史館中者文載經集卷又一議上總裁官者文載札子卷兹不復録何御史孝子祠主復位議重建德惠祠升復二何公原位集議文載本録卷兹不再録請定勳賢祠産典守公議紹興府合府鄉紳會稿杭州勳賢祠者王陽眀先生敕賜祠也祠在正陽門外玉龍山顛舊為南齊天真禪院廢地而祠址因之故初名精舍又名天真書院萬歷七年廷臣議毁天下精舍書院祠已在毁中暨十二年巡按御史范鳴謙同先生門人侍郎黃綰疏請復祠而上許之是年詔從祀孔廟而復祀之疏適與相值因特賜祠額名曰勳賢然且春秋二仲敕杭州府帥府佐及兩縣詣祠行事惟恐上丁祀孔廟必致委攝復改定中丁祀祠相傳先生亡後其祠祀與書院合不下四百餘所半屬官祭而是祠為最真盛典也先生門人揭陽薛侃以行人出都與鄒侍郎守益王參政臣諸同門創建是祠原多置祠田作經久計至是門人蕭廩適巡撫兩浙復有助費除造祠外共置祠田二百餘畝皆勒石載志歷垂至今已百餘年矣特是祠志殘缺典守之人不能一定祗就志查核大抵祠中置守祠僧一人或合徒僕不過三人立主教生一人使之講學而主接四方來遊之賔客且可授徒其中然身不過一人而以典祠校官領之典祠校官者錢塘學齋之訓導師也明代學齋不一師或推在官一人借名典祠雖身不居祠而管領祠事于是祠田嵗租皆典祠校官按田畝收之除完正供外一切儲􅀈祠中且報其數于錢塘縣長吏使登簿記然後將祠中經費勒定十項曰國課曰祭祀曰修葺曰禮賔曰典籍曰館餼曰典祠祿米曰主教祿米曰守僧祿米曰優後路費凡此十項遇有關支則守僧出稟告典籍官支給辦用如當祭祀則于祭前數日守僧稟請典祠支領額銀若干一送錢塘縣供辦官祭一留本祠供辦私祭主教者核實登記他項亦然當是時先生秪一子襲爵無暇守祠且其家雖貧然爵廕祿米亦復嵗入二千石無庸覬覦祠米又且經制嚴切即優後一項遇有子孫渡江助祭亦秪許給路費二兩其云王氏子孫不得干預雖語無所考然亦不必干預也但時移事易屢經遷變在鼎革初襲爵王先通既已家替身死秪一子業耀又逺戍塞外祠僧雖如故而典祠主教俱已不設祠中田産半被侵占從前祠局至是盡變逮順治八年始有襲爵先通之從弟先遴渡江清理祠事爾時尚有守僧住祠故先遴雖本支猶借住其族甥黑橋頭鄭斌然家奈先遴孤身而斌然父子素號險譎且工刀筆遂毁匿祠志隂搆佃户金汝梅雷聲一等隱田詭佃瓜分祠産既而借協理名色父子一齊改姓王氏父曰王貽元子曰王謀焜于順治十五年丐錢塘縣慕公詳奉院批一應田租除正供外總歸守祠作禋祀修葺之用于是竟廢守僧而鄭氏之子儼然守祠作典祠管領而祠局至此則又一大變矣康熙八年襲爵王先通之子業耀戍塞外者遵恩赦還鄉依棲祠間真正嫡裔反與鄭氏父子倒作主客而不得要領且無一人相助者睜睜兩目無可如何乃有蕭山王士雄今訟詞稱王士榮者刻字杭州得舊祠志一本搜見根柢與業耀密謀恢復猶隱忍不即發捱延至康熙三十三年值紹興府李公移任杭州素知其事始據詞詳批王謀焜既非文成公嫡裔假借祠生侵蝕祠産以致先賢祠宇委之草莽應責逐出祠其佃户金汝梅等所佃占之田著勒限嚴追歸給而強抗占住復至三十九年業耀乃指名仍告錢塘縣王公府主石公臬憲于公學憲薑公執法追比始得稍稍清還且又遲至四十一年業耀身死孤子王貽樞收歸祠户雖十分之産僅追六七而祠局之變至此稍定乃不意杭紳何包兩君合近祠士民數十人羣起而攻之不許王氏守祠告府告縣告學師告學憲其毅然興師不知何意顧其措詞則有大可疑者據云舊志所載雖王氏子孫不得干預收掌查舊志並無此語説者謂志原有中離子云薛王二氏無預田事蓋指薛侃王臣言並不指勳賢王氏豫謂此語有無不足深辨縱有是語亦為前朝言之而今大不然從來典制沿革動關時世前朝祠局自萬歷十二年起至崇禎十七年止共六十一年其時有守祠之僧有主教之生而又設典祠一官以管領之故子孫不得干預彼一時也今開國以來自順治三年起至今康熙五十年共六十五年既無典祠之官與主教之生而守祠之僧亦且不設子孫不收掌誰為收掌然且收掌已六十年由王先遴起至王貽元王謀焜而後繼之以王業耀及子王貽樞凡王氏收掌已經五易而猶曰不許王氏干預收掌此是何説况此五收掌間有大須分辨者計先後五人惟業耀貽樞為襲爵嫡裔先遴為傍支餘即他姓及佃户矣先遴收七年他姓及佃户收五十六年貽樞嫡裔所收止九年耳近祠紳襟有志清理而于五十六年間目擊分占之他姓佃户並默然不出一詞而獨于嫡裔王業耀貽樞父子祠米方入口遽欲起而扼其吭是何刻于待真王氏而偏厚于待他姓佃户可疑一也又云其祠田應令良民當官承佃每畝納租四錢按此祠田係勳賢門人合錢私買之户田非官田官地可以盡人承佃者况祠志明云祠田若干嵗入租若干嵗入者入之祠非入之官也且其租或米或銀不盡納銀也况按畝科租自有常制什一九一不甚相逺誠不知官租四錢之説出自何書據自何典昉自何代何年則例及查其他詞又云學田納租四錢毋論民田執業非學田可比即遍考學田納租亦無如此數者此説一行將見執業之田業主二十取四而佃者反得二十之十六勢必將此四分并歸之良民而後已可疑二也又云王氏刻剝佃户每畝取租米一石私造大斗比官斛加一斗原田十分為一畝王氏出租止八分為一畝勒令租户拆賣房屋並賣妻女償舊租觀此則荒唐之甚從來每畝收一石此科租恆例即祠志成字號田亦多勒定如此數者大抵稍重石一稍輕九斗惟一石為平賦未有收租每畝一石而九年之間遂至拆房屋賣男女此告訐誰聳惡態恐非吾輩所宜言况業主佃人比之交易皆必兩下相情願者倘有不愜何難辭去不佃而乃留戀九年至棲身無所骨肉離散而猶然不已無此情理又况私造大斗吾不得知若減田丈尺則祠田區畫俱有勒定丘畝成數何處增減比如祠志載坐松關內田二十七畝一分可能減一分乎坊前墟田四畝九分可能增一分乎此則無庸置辨者可疑三也乃其大題則以驅王士榮清勳賢支𣲖為詞夫清支𣲖與定典守原屬兩事清支𣲖者是助王氏之事定典守者是攻王氏之事今欲定典守使王氏子孫不得守祠管田而其詞則又曰刋匠冒裔踞産蝕租是以踞産攻王貽樞而借冒裔以攻之反似助貽樞而救勳賢是巧于謀攻者也夫業耀之有王士榮猶先遴之有鄭斌然也王氏孤苦不幸而兩藉人相助誠亦可痛但鄭氏篡竊已成佃占已久而士榮則正奪篡竊而清佃占有功無罪且身不住祠而一切祠務盡歸貽樞與鄭相反必欲善後不過丐諸公祖父母禁其管理祠務以杜將來則他可無慮今諸君于士榮則必攻討之似欲寢其皮而食其肉而于鄭氏則反引進之謂勳賢祠生王貽元王謀焜素知士榮冒裔可使作證一若士榮清佃占而深惡之貽元謀焜則合佃通占而巧借以引進之張留侯始終為佃可疑四也且貽元謀焜勳賢之讐大不當引進者也據謀焜貼詞以身非王氏必欲滅王氏而後已初責先通業耀不知天命似先通死有餘辜業耀不當赦歸者繼謂士榮汚穢中冓查士榮自有妻孥别住他所而貽樞兄弟孤兒稚子貧不能娶何處汚穢而終則請改勳賢祠為萬夀亭夫溥天之下莫非王土果請建亭何地不可乃堂堂天子皇皇萬夀無端而獻此殘祠廢寺之一椽以當嵩祝則不敬莫大乎是為此説者其罪當誅而身為士大夫反引進之而使之貼狀可疑五也且即諸佃亦不宜引進者也前此姦佃金汝梅等強占祠田約五十年歷諸公祖父母前後力追始還十七今創痛未蘇且纍年賴租告理莫救而忽復引而進之使之貼狀試問此舉為勳賢乎為姦佃乎上有蒼天下有夷齊人苟有心當亦自省乃以舊時姦佃原案有名之八人如金汝梅雷聲一等合之欠租新佃告理在官之十一人如華茂髙王廷爵等一齊螽起即微紳襟帥先任其驅斥亦足以橫行天下而諸君復引進之可疑六也凡此六疑總歸一理蓋理至而情與法亦併至焉今此所爭不過為勳賢祠産定典守耳若以情言之則以勳賢門人置勳賢祠産即執塗人而問曰此勳賢産也當屬勳賢後人守之乎抑他人乎必曰勳賢後人又問曰此王氏祠也當王氏子孫守之乎抑他姓乎亦必曰王氏子孫此情也乃以理斷之則前此李公判詞有云夫理緣情起事以世殊昔者祠事之方盛也有典祠之官有守祠之僧有主教之人有四方來學之賢士大夫而今皆無之秪此煢煢裔孫當春秋霜露之時少伸此木本水源之感揆之于理最為切當而猶曰非其任大無理矣善哉仁人之言此不特勳賢子孫當世世銘勒即後賢更斷亦孰有渝于是者兹幸大憲大公祖父母皆人倫之主名教之宗星聚而萃于一方勳賢存毁決于此日惟願大賜鑒察仰體前哲俯憐孤裔審定典守且為召佃收租立一經久不壞之良法永傳碑碣勳賢幸甚名教幸甚某等忝厠紳末敢直言無隱伸此末議臨議惶悚西河集卷八
