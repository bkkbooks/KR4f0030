body:
  text: 西河集卷二十五翰林院檢討毛竒齡撰序二重修西卓庵募序西卓菴在清波門外相傳成都覺悟師從西川來卓錫于此故以為名而其後有達言和尚得教外别傳于黃蘖老人寄迹其間遂建幡以告四遠而化導興焉今元翁大師重來繼席十方之勤行多依之顧時值丁癸物力稍匱休請之士恆不能以相周旋然且剎桓久遠殿堂朽落失今不治將有漸崩圮而不可知者曩者湖南勝地多在長橋萬松間山亭露車應接不暇今則取徑湖濱由清波南迤皆成僻壤然而幽棲倍勝也夫以湖南勝地加以幽棲而西卓實當其奧人稍有心孰有不相顧而願興馬者况大師積行久為斯世所信從也吾請世之樂善者共聞此言容安詩草序容安園有樓臺竹樹而被以草花主人日觴咏其中是以豫老戒為詩而每過容安即不能無倡和諸作傳人間焉方今詩體纍變容安能不逐時好自闢為深微淡折之句質而不詭清而不靡存詩三百首不以多上人人亦莫得而上之獨是詩從境生曩時念湖山之勝來僦杭州而終以年近八十歲不再三過容安雖好亦安能時時相從然而眷戀之至思憶生焉比之良朋之契濶讀其詩而不能不想見其人也然則豫之讀容安之詩即對容安矣夫對容安而有不快然稱移情者哉集興福碑賸字序唐人多集右軍書以為碑刻如攝山寺建福寺三門及梁思楚絳州夫子廟堂類皆是興福其一也特興福碑本吳將軍墓銘不知何時折其半闕不可讀萬君授一離其賸字而韻而讀之散珠成衣雜轂合輻神工之能事矣集字始千文限字輳詞與攝山諸碑限詞輳字者不同顧千文詞多謬合如磻溪伊尹省躬譏誡不無倉卒此于末幅能隱其姓氏如漢人離合法尤出意外或曰忭舉埤留莫是升舉俾留否曰不然日以光上書以附傳古人製詞多似此東嘉夏廣秦詩集序東嘉夏廣秦丞于息而以能詩稱則其不得志可知也昔者豫嘗遊息矣息之治無丞官居賃丞廳於邑居之民廣秦一見豫則日邀豫騎馬去遊于邑而為之賦詩今蓮渚續集所稱松齋遊宴詩是也當豫之在淮南也淮南諸名士往往為豫謀所居豫卒辭之去及來淮西則思歸時也勢固無能採食于此土賃邑居以棲其身又是地無崇山巨壑陂池丘園之勝無聲色貨財珠玉狗馬驅馳之樂無曩昔戴憑黃憲陳蕃周磐袁閎諸名士往來標榜以因為名髙然且逡巡不忍去寢處於淮西之官居者兩閲歲其議豫者或曰其鄉人難與處也或曰淮西太守賢相與為因依而不忍舍也或曰無所歸也而不知其重有戀於廣秦是豈廣秦之為詩果有以重得於豫也哉然而戀戀如此者必其人非常人而不必僅見之能詩者也雖然廣秦非好言能詩也子思曰惡其文之著也惟惡其著故廣秦誠不欲以文使天下見而人之見廣秦之文者則親廣秦猶之豫之親廣秦者不以詩也然而廣秦工詩意者詩與文誠亦不得志者所見端而不可已與抑亦戴憑黃憲諸君非文章勿親與顧豫以文章親廣秦而豫與廣秦遊其為文章者闕如也廣秦則不然自豫至息時策馬遊遨浮浮冰雪中宴飲招呼無不臚列其人而歌詠其事迄于今渡淮悠然登城覽觀凡夫結轡傳觴一往可喜者歷歷然開卷而得之所稱松齋遊宴非與是豈可及哉則雖謂廣秦未嘗不得志亦可也長巷沈氏族譜序黃炎皆一姓之子然别生分類自大宗而外以封以居以字以官各殊其氏而其後始以一氏傳也乃氏不異姓而族不同氏秦趙不異嬴而馬服之馬或淆于司馬之馬故唐志氏族但稽氏始而將來之族不與焉自非善譜族者歲紀而世較之則長沙之陶判于潯陽雁門之郭溷于汾水其不致近瀆而逺遺鮮矣邑之望族推長巷沈氏其先由文昭食采于沈而中遷吳興蔓蔓葉葉大抵自宋熙寧朝其肇祖兵曹公以兄弟父子進士顯于時擇慈孤岵市之傍纍傳元明由武樂逮今凡登甲乙通仕籍者二十餘人髙曾雲礽歷嬗勿替其間羣從共薦伯仲聨解從侍御公下翼翼可數衣冠競爽門閥滋大可謂盛矣乃沈氏族譜在明永樂間已輯其概至成化中續修之迄于今又若干年矣度支郎振豪文學以祉輯其後來所未備者導源而疏瀾以傳以表衡直如指人後者不啻如是乎沈自𣆀季來春秋無聞楚有尹于沈者其後為葉閩人避王審知諱而南方之沈匿于他氏此其為族雖各有異然渙亦甚矣今逺追吳興而譜亭左右保無浸淫流漫者與自親親道衰角弓興刺杜甫以勿嫌示族孫濟而泉明贈長沙從祖至或歎昭穆之逺為路人者夫本源之誼隨地可見今有得先人遺物手澤杯棬必咨嗟涕洟而求之及得之即世守勿失歲時啓視以為家藏之赤刀琬琰於是乎在况其為先人之肢骸所分而析之者乎然則睹族譜而動本源之思亦期使後人之歷嬗于勿墜已也度支文學修譜在壬子歲越一年命序謹序如右虞氏族譜序虞仲與泰伯同姓然虞不稱吳或曰虞去虍為吳江寧吳氏之本為虞也豈亦虞仲之裔與虞氏肇祖為元臨川學士伯生公再傳來遷其子驃騎公以明靖難得罪更虞為吳介于婺源之吳者若干年逮𢎞治中有孝子者估于湖念所從來始慨然復虞虞氏衣冠數世矣考邾入于楚去右存朱棗據因避讎而更為棘束晳踈廣之後也其曾祖亡命隂刑其左彭城劉氏奔元魏而改為員氏此其子孫豈不能為之驟復而逡巡隱忍千秋萬世僅以見之虞氏之孝子母亦哀其志而不忍遽為之復之也與然則反所自始所以教孝而仍存其迹亦所以明節也古無不易氏者矣然紀牒昭然未之或貿今一姓相嬗而反有隂篡于他氏者宋時爭尚譜族相率為偽輯一姓所始而彚其姓之前賢者略其姓之前不賢者竊志史乘贋為之貌黃麻紫篆玉軸而金籖加之朱吕文謝序之贊之姓之著者皆是也此與姦生瀆類冒他人族而以為已族相去有幾而今人購之奉為世本此不易氏而易氏也都閫修族譜而問豫以言都閫勉之亦慎其可易而不可易則己矣太倉張慶餘詩集序夫人相見不足喜不見不足思固無論已見即相得一不見而思隨之豈非于常人之中當有所過而獨于古人未見而思思而至于相得而後已然後知夫不相見而能相思者此其人必無與于今人之數者也太倉張慶餘未嘗見豫也而思豫豫友南士曾擕豫詩遊嶺外慶餘見豫詩則益以豫為可思揀其所刻張子近詩與張子遊草二本寄豫且屬豫序豫固思慶餘者及見其詩益念慶餘之可思如是也乃南士既歸而慶餘寓書南士仍以豫序為諄諄豫乃歎慶餘之不欲以今人視豫矣慶餘詩經文以質緯物以志上雕瑶玉下刻梓杞能擅安仁輕敏士衡矜卓之勝往遊淮西輒擕其詩示人人見之者疑為嘉隆間作則其詩豈難超于今人詩與南士古人也其稱吾宗名士首指慶餘豫見太倉吳學士晚記在梁溪遇學士飲偶品目人士即語其鄉好學如慶餘者今人自視必勝古人及語以他人即十倍于今猶以為去古遙甚貴逺賤近桓談不言之乎南士與學士不愧古人而稱慶餘則過于今人豫雖不見慶餘然其思慶餘一如豫之不見古人者思之思而且至于相得則雖欲不以慶餘之視豫者視慶餘又豈可焉何伯興北遊瞻雲二草序初伯興行三子詩一徐君伯調其一豫也豫自悔鹵略漫見鬷蔑贖所已行者不得念輒汗下伯調存毁半而伯興詩逮今可觀則是其才之尋丈也今豫避人久漶遊于時而伯興亦寄晦行間不以詩文酬酢者二十年伯興乃北南其車踟蹰金臺既歸而徐弛其繘于烏聊白嶽之間凡所感閲輒為歌詩取而諷之何境與時進乎開大以還體周格變縱才所到不必增損而就所夙成驗諸新得即有風氣之日遷者豫久負尋丈而近較所詣且瞪乎莫追也伯興有丘園之樂其諸子千立悉皆才士豫方與其季名倬炎者作阿戎遊而伯興反驅馳南北寄志篇什似亦有不得已者惜倬炎方學史不暇韻語而伯調已逝乃不得共論其詩如疇昔者也淮隂蔡母徐太君八十夀序淮隂蔡子搆名士也太夫人在堂稱賢節蔡母豫嘗浮淮拜蔡母堂下人藉藉道蔡母與蔡母之子賢夫母之賢以節也子之賢以養母之善也夫節必愛子愛則生驕驕即不能以事母且蔡子季子也冡君丘嫂相繼亡去向使常情處此得有子幸矣有何必不愛愛亦何必如蔡子之賢而母之愛蔡子者吾不知也吾嘗見蔡子之養母飲酒髙會必俯視日影一如囓指動心者踉蹌辭歸而家之侍夕膳者在帷矣每宴與歌必歌曰枯魚銜索幾何不蠧家貧親老不擇官而仕豫嘗聞而悲之今母以八十帨辰豫亦持一觴隨淮隂諸名士後再拜以進恍然曰是亦蔡子之所以養母者乎人苐貴顯親耳丁年負管樂之望天下賢豪長者皆願為拜母而又一時品隲歸我平子以至河汾之受講問字于玄亭者今躇階而趨蹌棼然盛也夫自長非增自短非損算由已也風搖于千仞而巨羽載之抒皓氣于浮遊之波而洪舟可以運言利之豫自天也惟母之賢足以致壽惟蔡子之孝足以壽親而于此抑若有天全焉者凡母之有此年則皆母愛子之年也而今為蔡子養母之年夫養母之年可幾乎昔有願為長子者何也曰以事親之日長也今蔡子季子耳蔡子以季子而為長子之事母且蔡子以季子而為長子之事母而長久豈非天哉夫曰天則所以報施其賢者豈有盡乎雖然人之稱賢節蔡母者今已稱曰壽母云茅夫人生日序關雎道婦人之德史克頌魯僖而內本之于克配一則令妻再則壽母必若戴記所云內言不出迂哉詞也茅夫人者朱子揆敘之配也揆敘與豫友豫知揆敘因以知夫人之賢顧私謂揆敘雖久仕然齒髮鮮妍裁盛年耳迄今而夫人以四十告然則揆敘之踰于強仕可知也夫揆敘非生得貴者也揆敘世家子甲第烜赫而少且食貧犬人勤勞于其間不特此也揆敘負材藴學顧詘于進取其泣牛衣亦屢矣夫人慰勉之使揆敘卒忘困頓且發憤以成功名夫慰則迪情勉能勵志夫人何如賢耶世之述閫德者以為容也則曰蝤蠐瓠犀之姿也其以為功也則曰纂組之竒機絲之巧也且也吟栁絮以揚其才諷雞鳴而鋪張其德然往非其實孰有如夫人之令儀嘉德非之無可非誦之得所誦乎且夫揆敘孝弟人也少而遊學長且遊仕其得往來自適以無為晨昏慮者夫人孝也揆敘孝母夫人即孝姑揆敘友弟夫人即調于伯仲以和于娣姒先後豫嘗在山陽官舍見夫人米鹽窺伺意旨而家人不諒每致咨嗟動色如鄉田長幼恬不為怪夫以世家子弟當閨房之秀而又處之以官居蓬島之勢其不忘嘻嗃如此今揆敘為吏部矣昔山濤布衣時與其妻韓共食貧故至今稱婦賢者必曰山妻夫揆敘不愧濤豫不愧嵇阮夫人豈愧山妻哉特濤年四十始為郡主簿功曹而揆敘已先為吏部則四十已後其為服官者又可知也吳母黃太君壽序邑之稱賢母者則推吳母黃太君云今年夏太君壽七十顧太君賢也又壽少時與太君嗣子西美訂杵臼交拜其先大人鴻臚公于庭下因得拜太君私歎太君者其性婉娩其貌融融然事上以禮御下以慈愛即撫臧獲僮幼皆有法度賢矣哉地以柔致寧其謂是乎乃西美善事太君母論洗腆致厚其奉養有素也既已徘徊萟林將覬有用而乃從江革負母山阿暨從容歸鄉里又不忍截袂去迄于今其季君國學受公府辟猶且留連北堂兄與弟皆在側也吾聞李司𨽻強毅人也其所敬者三君定陵陳稚叔潁隂苟淑長社鍾皓皆以醇謹聞吳氏家世醇謹衣冠族處百年矣今夫木不能滋木而水能滋之則滋以漸也金不能鎔金而火能鎔之則鎔之以積之著也太君以賢佐忠厚之貽而西美兄弟又能以退處承太君之志滋之有漸而又加之以積厚之勢金躍于冶木榮于庭矣夫人家聲暗沕莫克自光大即稍席前緒又或時際兵革未能安其和而享其裕乃以帨之設于堂陳漿餽篚賓朋姻戚走車轂如流水觀者嘖嘖轉相語曰安得如太君賢即安得如太君壽即又安得如太君之豐前而裕後於休哉惟賢故壽惟壽故所享者全而所著者厚然則賢者壽之本而壽者賢之驗也甡生也晚不能知太君百一而能誦太君者莫甡若也故一時親朋咸列名於幛而俾豫書之乃若賢母之盛夙稱有宋而尹和靖母願善養而不願祿養太君有焉顧太君諸孫已有超躍而興者他日陳羣荀彧必以功名報太君則吾不得而知之矣新安王太君八十壽序夫天豫人以德豫人以名又不惜豫人以壽非報之也有德者非壽則無以享此名彼竊名者非壽則又何以自别于有德者故曰使周公但居東而新莽不終攝則周公為小人而新莽終元聖也新安貞孝王太君者張之母也氏于王適張而孀方是時居王者十九年居張才四年耳更五十年而祔姑于堂撫繼于室崇禎十六年旌曰貞孝迄于今嗣子舉于鄉又十年餘矣未亡人八十設帨于堂持觴者在前稱祝者在後可謂幸矣然而猶有惜之者以為太君之未易幾此年也今夫卜夜遊者厭朝雞悲短景者哀寒螿其情殊也以八十年獨居之孀當此八十年春秋代謝之久詩曰夏之日冬之夜以言長也太君亦不幸而豫之貞又豫之年矣然向使太君者懷此大節即下從君子天下安知貞孝若太君者即不然而大節已明不假以年歲有德不旌與旌之不久亦安知以德得名以名得壽如太君之彰且顯者夫周公誠聖雖在東未還不害為聖新莽誠偽雖居攝不行不掩其偽而天必昭然使著之如是作德者之必有徴也而又何疑于太君之為壽焉西河集卷二十五
