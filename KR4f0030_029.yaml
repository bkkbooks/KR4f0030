body:
  text: 西河集卷二十九翰林院檢討毛奇齡撰序六諸暨邑侯朱公治行録序浙東二暨為秦時所分邑而漢魏以還惟豫邑餘暨屢更其名而諸暨之稱至今不易則其邑之重巋然自立不與斯世為推移概可知矣邑侯朱公由名進士起家作天子命吏出宰是邑人之望公如望嵗其責備周詳有非他邑可比擬者乃不一載而多士誦之庶民謳之覺從來惠化之速無過于此然且郵亭父老編輯所為詞不逺百里各不以豫為不當而踵門而告豫以序其故有三一則二暨不相隔也一則鄉官居左孰教導里門可以周知列國之政與治也一則以豫年滿八十其言可信也顧豫則重有感者當豫避人時出走維揚維揚人藉藉稱直崖朱先生為昭代名賢能以經術超于人而其趨鯉庭而習詩禮者即公也暨豫入史館同館官丘君洗馬喬君侍讀亟推公人倫南國克領褎羣彥將以學古入官舒攬轡澄清之志而逮今而卜仕百里以治行聞夫功德之録類乎從諛疑非士君子所宜為况期月政成似蛾子待化不無過神而乃證乎昔而驗乎今因其已然而進觀其所未至則其言有徴不翅如孰師耄年可髙談得失如前所云者然且二暨雖同封而究為兩地夫編户之民九親八口皆𨽻其分蔀其因而加譽或亦應有而豫則垂老鄰界闔户不言事何求于長官而以詞為佞亦又何利則其言之公雖微父老請亦必謂無可渝者乂况輿人有誦古則採之入鄉校而議執政之善否古則書之然則今兹之録亦猶行古之道也雖以之宰天下有如此録已衆曰善遂書其言以為敘駱叔夜詩集序叔夜以詩古文辭會天下豪俊天下豪俊翕然歸叔夜南極吳楚北極燕代皆稱與叔夜合神契四方上下相追逐故其為詩多慷愾任氣負才具鄙視一切觀其赴都時辭友感激作五言詩懭悢槮楔情奮乎詞他可知也顧記云詩教敦厚而劉協論造詩必情為文經而詞為理緯故情不足以導詞理不足以敷文即縟旨星雜繁詞若綺無以揚經緯而被文質而浸假歡愈已甚愁苦未聞中鮮鬱紆之情外無憂讒畏譏觸類長志之概又何以抒情擲物激越其心思而暴揚其志氣然則情由境發而理從遇生道固然乎方叔夜為詩豪蕩振拔心存乎事物之微志極乎天地之大方自謂翺翔馳騁可以致逺而惜乎既也上無太常之徴為之稱祖功而誦宗德明堂郊廟藉為雅音次之無叔孫河間之薦使桂華赤雁秋風天馬諸曲庶得借才情而節靡曼萬石之鐘撞以寸莛用相盩矣然吾讀叔夜之詩自對策大廷賜酺光祿以至驅車河渭之間種栁華池之曲其間宴飲臨觀行農茇社而外紀述漸減暨雄鳩怒飛搆者旁午而後詩工可知也韓子曰物不得其平則鳴歐陽子曰非詩能窮人而窮而後工吾聞叔夜在北寺時其所治署有老親嚙指悲哀誠恐晨夕不繼見為倚閭憂其為詞痛心難以盡聞及再令崇仁重罹網罟則子長縲絏幾陷不測生平交遊多至有掉臂去者而叔夜獨坐請室為雜體詩倣佛阮籍陶潛諸作其綣戀友朋懷思鄉故離憂悽愴豫久蒙念訊往欲以書報少卿而未能也乃崇仁父老扳犴呼號舊時三原子弟至有懷白金數斤自關以西走豫章獄歷四千餘里涕泣跪餉然則天下有至情感人如叔夜者乎吾即謂其嬴于才而詘于理不得已王文叔嵩峯樓稿序世惡吾言吾復以言為世罪胠其篋焚其書辭知與不知者咸誡且訕以為今而後當勿復令是家為文而文叔坦然示嵩峰樓稿以較以敘豫方自畏今而後豫且畏文叔也雖然文叔固無可畏者文叔朝夕言言必有道其為文不怨尤人物涵瀜而清深豫自愧其淺也即以持示天下人無所憾即示豫豫苐自畏亦何庸畏文叔焉而事有不盡然者今夫窮愁而著書人之常也是故非窮愁之所言則不疾而唔也窮愁之所言而不得盡則病而隱且忍也人方窮愁不得不為窮愁之所言而凡達身而悅心者惡之是非惡窮愁之所言也惡窮愁耳夫惡窮愁之所言是何論言之盡與言之不盡而吾言之盡而為世罪文叔言之不盡而遂得為世好乎文叔徐徴君門下士也徴君嘗曰言非其時夙昔所戒夫橫議之發而後竟至于黨人故蘇子亦有云憂患雖已過尚宜慎口以安晚節豫方師其言文叔固熟聽而稔記者而豫反為文叔道豫悲世已惡窮愁而文叔之窮愁而著書方未已也語云愛其人者及屋上烏憎其人及其所畜徒豫畏文章為畜徒也是以序其篇而為之告焉春秋自得編序春秋為經世之書而意旨通微義例龎賾隨所解會悉得以觸類達志窺見大略而究其指趨則初無確然之見可葆不易故漢初四家互為抵掎而最後左氏傳出則各守師説而迄不相下雖至劉駿通經趙匡闢傳猶不足以發墨守而起錮疾宜乎胡子文定一舉而盡袪其説也顧文定是書道在乎匡經而志存乎悟主以彼其時南北勢成往可與周之東西相比發者故一偏之旨原不無有傳無傳并有傳無經之慮而後之為春秋者既飾傳作經復裂經就傳而春秋亡矣嚮與甲庵論春秋每喜其發凡新穎起義開闢嘗以為能出儕識必其能發祕義者今讀其書知其得之深而見之大也甲庵據程氏所言春秋者猶法律之有斷例又引邵子云春秋夫子之刑書也因謂春秋者有貶而無褒有非而無是有懲罰而無勸賞間固疑之暨觀其大旨則以春秋首五伯而五伯為三王罪人經所見者罪焉耳故齊桓稱人與衆分之殺其罪也晉侯則甚矣正譎之辨較之甚明而其他列國名卿大夫苟為聖人所稱許經勿及焉管子之才子産之賢詎無一事可記述與且命卿其任政固久也平仲與聖人交伯玉為聖人所夙好舅犯以仁親見稱又伯功也栁下季秉直受黜為後世惜凡若而人寧難假義例相及而是書泯泯焉必其人無與于閲實之數者也乃吾則又有進者甲庵所據者程邵語耳然而程氏作傳兩列功罪即程氏之先杜預五例亦以苐五為懲勸即范寧注榖梁猶曰臧否不同褒貶殊致而甲庵盡反之吾讀孟子矣孟子有以春秋為比例者晉乘楚檮杌是也夫晉乘不可考矣檮杌惡獸也故前古以目不才而楚史是名則必其書本飭惡者故或曰乘者治也治罪之書也春秋固一例也有以春秋為比義者抑洪水與戮飛廉驅猛獸是也洪水之割固無不惡其洚洞者也幾見虎豹犀象驅而逺之為褒賞者乎春秋猶是也夫古稱疾惡者莫如孟子其稱善讀春秋者亦莫如孟子乃以孔子之懲惡而見之于經以孟子之疾惡而見之于讀春秋以甲庵之為善去惡而見之于學孟子與作春秋之注此其自得為何如也乎况其句解而字釋者非依倚者也文犀匱院本序往從吳人話文犀匱事且云有院本甚善踰年至廣陵得其本讀之始知為吾鄉張陸舟先生作也先生好逺遊朝帆暮車然所習至者則尤在秣陵廣陵吳閶之間所至坊曲爭相迎藉先生為歡其于娼樂屢矣暇時為詩歌且雜為填詞小令諸體又為傳竒院本雜劇散弄合不下數十本文犀匱其一也或曰先生滑稽依隱以玩世其為文放浪嘲謔不可為法而豫曰不然稷下士為雕龍炙轂之談而東方先生不嘗騁諧文作據地歌乎夫不得乎世而至以文詞玩世則必為世所不敢道者而世于是乎略其寓言而師其正旨然則先生之為世法久矣不然當先生出門時披緇負笠與鄉里故人拱手告别其中懷隱深浩然長往之槩亦可哀矣然猶流連狹斜娛意歌曲倘亦有不安于心者在耶文犀匱實事也先生文雖竒然先生豈匱中人哉送李懷岵西征序李子不得志于時思西走襄武北抵雍岐關隴之間道逺苦舂糧也計無可如何於是託為星辰家以自前惜哉李子之為星辰家也雖然李子固無事為星辰家者李子先世居臺端門十乘車其去李子才二世耳李子固不宜貧假此事即不得已既已貧必欲假此則亦非專家者流也璣璿眇芒偶託而為之必不精乃每發輒中談者成市皆相顧眙愕去譬就質之射疏而見藏之發覆也昔者李生虗中以日辰支干斟酌休咎此即今代星辰家所自昉者故昌黎韓子亦口藉藉道虗中不衰李子曷嘗攻虗中術乎以彼其才偶有託且窮神達渺以臻至極浸假他日者使得遭逢良時其經紀大事豈有量哉吾知李子將不終以星辰行也雖然李子自言曰吾非欲為是者吾欲以四端求天下士而不得也必求文章如馬揚學問如荀孟者即不然則亦抱荆聶之肝膽具原嘗之意氣者又曰文章期實不期虗靡學問期真不期該博吾初謂李子星辰家也託日辰支干以相士其相士為宿舂計耳不期其復得求士即既求士亦日辰支干求士耳不期其復得以文章學問肝膽意氣求士然則李子之所必託者馬揚荀孟原嘗荆聶而其所不必不託者星辰也雖然李子貧李子終不能不為宿舂計矣己亥冬朅來蕭山至庚子之春而又有行也屬豫為序以送之吾悲李子之為星辰家而告其將不終以星辰行也乃李子則遂以星辰家行贈周先生九十壽序秋駕尊人也豫二十年來頗以詩文見天下天下之以生日屬豫為詩文衆矣顧獨自四十逮七十往往而是八十即僅矣至若九十則有十年罕一遘者向曾為海昌沈徴君王父作九十詩見七律卷去年客商城有少時所受知兩浙開府中丞熊公年已登九十思為詩頌之究以事去迄于今始有以周先生九十屬為文者然則九十之不易也先生生望族其嗣子皆能以祿養曩時次君迎先生養和州值先生年八十板輿就道親朋祖賀觀者嘖嘖今次君不幸而長君宦嶺表不能從季君文學則久棄舉子業歷隨諸兄為記室先生囑之去嶺表心安故遙承色笑留諸婦事滫瀡而先生九十矍鑠臨貺趨蹌未嘗手杖其不令諸子在側以是也而先生之壽則從此可識矣今人相詡者動曰百歲夫百歲可限乎鄉使造化者豫人以有限微獨不百歲也即果百歲人之當之亦且指詘心計嚮前期而多所綣戀眵眵盻盻惟日不足何則有限故也亦惟不可為限斯揚烏姬晉皆得心安于一日故德以無所概而德成年以無所量而年裕先生之年豈猶歲月所得量乎不然先生已九十其視百歲直十年耳惟其非是故從此以往遙乎未有盡也豫之所以頌先生者如此然則豫之頌百歲亦豈有異焉峽流詞序經解曰溫柔敦厚詩教也夫詩尚溫柔而况共餘乎文賦曰詩緣情而綺靡夫詩尚綺靡而况其餘乎然則詩餘者溫柔綺靡之餘焉者也其言巵匜其音曼俞馳情于華滋艧飾而寄旨于閨幃窈窱之間似組紃纂繢壯夫不為而自昔才人如龍標輞川青蓮香山輩猶且爭倡新聲互為標的則以詩餘者其流為曲而其源直本于國風離騷故離騷名辭詩餘亦名辭自非沿波討源滌流郤會道天淵而濯下泉孰能使涓涓細流一歸浩蕩故稸水髙唐漸觀百里流使然也王子丹麓擅掞天之才華文四發自著記撰述外多為詩歌雅騷凡比聲切律調商按徴無不啓其扄鐍而開其幼眇乃復以餘者溢而為詞豫受讀之一何情之厚而辭之綺如是也夫溫柔綺靡固始于詩而以凖其餘如岷流然齊梁樂府羊膊之源也緣崖數百猶未濫觴王維李白則已湔堋而下矣瀺嵓灂石淫淫溶㵝歷峽已盡也相其勢可以到海逮大晟以後逡巡元明間汨焉而已丹麓其峽流之際乎唐詞肇李白而白詩有云詞源倒流三峽水以為倒流但言其滂洋莫御焉爾然其源可睹也豫讀盛𢎞之荆州記云自峽七百里中春冬之時素湍淥潭回清倒影備極婍妮而宋玉賦髙唐更有姣姬揚袂之喻以較之詞其溫柔綺麗具在也讀峽流詞吾將徘徊于黃牛朝暮之間矣徐氏印譜序開基以毫書之暇間為鐵書嶻嶻乎肆其強幹博奧之才而一凖于法説者謂徐氏有兩傳書毫書者熊瑞鐵書者開基云豫嘗聞隰西萬年少論鐵書大抵晉有楷漢有篆晉以楷法易六義點畫增損雖倉頡弗顧也漢以篆銅易鼎漆勾曲變換雖姬公旦弗得預也以故鐵書宗漢銅猶之毫書法晉帖凡説文六書均無用之而其間填朱琢白若正變偏滿益減爭讓諸法確有程量唐宋以後無聞焉今開基于古法無所不解而往往自見其才譬于虞禇臨右軍形橅廓填而兩家之意居然見也前見開基篆謂其才過于學而今則見才于學豫悲年少已死不及見開基篆譜而又惜熊瑞先開基生竟不得使鐵書與毫書並傳世焉施愚山詩集序豫過湖西與愚山論次當代能詩可嬗後者合得一十二人愚山居一焉因較愚山詩竟五日起而嘆曰傳人哉今人所難言者情耳情有七而哀好分之好能歌哀能嘆也歌之有聲嘆乃復有淚也外即就裁耳接其中淵乎微也雖然嗜辛者忘辛習勤者安勤焉猶懼豫之習之而嗜之也乃復竟一日若從甌居者之視汧沔也若千百世後言逺人洇追而闞其凡也卿所較者其無有成説已矣其有成説還求之若少泛書傳既長且更探也乃益復嘆曰傳人哉傳人哉毋論愚山所傳者有學有術有名實有行止如是即使愚山如宋玉之輕浮司馬長卿之薄劣陳琳阮瑀輩離流遷就漫無足道猶必傳之如宋如陳劉如司馬成都不可謂非文章之林囿也况以愚山之學之術之名實行止如是者哉愚山刻谷音二卷序之者江右陳士業也其言曰唐人以詩為詩宋人不以詩為詩又曰仁義忠孝何惡于髙岑王孟而為髙岑王孟者必諱之假如屈平杜甫者皆忠孝中人也而屈道齊桓述帝嚳今杜詩所稱者可按而得也夫洵如士業言也則必屈之歌杜之詩皆誠明性教文也乃屈以帝妃簡狄為淫姪之辭杜以仲尼原憲作抵排之語而讀者終不以為非何則其旨微也今之為髙岑王孟者安知其所為者詩也而其旨不又有在也乃必曰言誠則誠言明則明則固之乎為詩也是不特平若甫也上之姬旦召奭其為仁義忠孝者有逾于屈與杜而旦為南風彼其誦后妃何如哉鄉使為仁義忠孝之言則必曰德之四從之三而公不然也愚山為仁義忠孝之人亦且為仁義忠孝之言而其言仁義忠孝者不過如此假曰不以詩為詩而詩傳則何不曰不以仁為仁而仁傳也世之為此言者多于士業而其髙語仁義忠孝者且過于愚山豫故論愚山之詩而舉士業之語以衡之世之較愚山之詩者可以觀矣景文沙門詩集序景文斷乳為沙門未嘗誦儒者書也而能詩夫詩亦有道不讀書不工如築繭然布蛾子于筁簿豈能遽邀其銜絲被縷搖首而經營者哉是必雔枝葉仰之蟄之而後時之至而于以化也故桑不關繭而繭以成學不關詩而詩以著今景文未習書也即習書亦藉記字形而己未嘗導其藩引其曲揚其通變乃矢口為詩而詩成或曰前身無相翁後身無著童子此其人宿生人也故其著筆若秀草若散香木若文錦毳段雖撚髭嘔心夙擅妙句無以過之豫謂景文之不宜為詩猶豫之不宜為禪也豫幼習儒書長為詩其為詩宜無所取疚而抑嘗一懴悔為口過而急為捨去景文方學禪何宜遽及于麗詞綺語以自取支離者哉顧豫學禪而終不能禪景文不學詩而能詩景文之才之倍于恆人如是則向使景文轉而為禪其精鋭進取當有十倍于豫之習儒書而為詩者則欲不懴其為詩不得也景文平陽孫本師破堂今來參湘溪湘溪者破堂之弟今能詩家所稱蛤公和上者也會稽縣志總論序會稽縣志前此典修者為山隂張宫諭君君屬徐渭編摩之因載徐諸論卷端未有易也康熙壬子再修志會守令遷革不以時典之者異首目一時博雅孰掌故諸弟子各遊散滯四方遂不得一與較核暨稍歸而志成既已無可如何第卷端分門發凡各有論統紀而語頗襲故且未備也會稽令君遂以諸論屬俞子賡之因文施易剗剔其成版而補鋟之且别彚一帙倣佛徐集中所載者翻而讀之何典制已甚也山川形勝户賦徭役詳于治術而議必開始語具裁略崖岸而波潏類七國時所傳文雖限于方幅而翻覆委蛇論述之能事矣賡之以跅􅕟之才出會稽令君門下垂薦復罷因濩落受督學使聘躑躅于苴蘭葉榆之間胸有幅員可承頦而得也豫浪遊十年所至乏耳目心志即詢以丘原浸灌丁男包篚之數瞚瞚然未有記者而豫邑志于諸邑最劣益修而益劣幸而無能計及于補苴之者也設或計及敢望有論著如徐俞鮮矣西河集卷二十九
