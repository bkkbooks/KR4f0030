body:
  text: 西河集卷一百二十一翰林院檢討毛竒齡撰答三辨文一孔氏三世出妻辨一井地辨一泰伯讓天下辨月日平湖陳佑以同邑陸琰卓字藴崑三辨寄訊豫耄病不能答已踰時矣猶子文輝見之謂此亦學術中事強豫口授解義且書之以便復去因存稿焉辨人道之大倫有五曰君臣也父子也夫婦也昆弟也朋友也五倫具而人道全矣聖人人倫之至也孔子三世出妻説不知作俑何人而家語附會之遂使萬世聖人竟缺五倫之一程子以為出於漢儒謬説真知言也追厥所由祗誤解檀弓不喪出母之出字始答方今士林有文人而無學人能作是辨鮮矣况辱逺訊焉敢不答苐有不能不直答者古五倫只父母兄弟子並無君臣夫婦朋友此在尚書春秋傳凡所稱五品五典五常五教皆然今之五倫是朱氏注中庸錯認五達道為五倫以致沿誤此不可不考正者若以孔氏三世出妻為疑則其説出于檀弓家語諸書六經惟三禮最叵信家語出于王肅家大不足據但不當臆斷墮宋人説經習氣如謂聖人不宜缺夫婦一倫則在真五倫止五人也然而堯有兄摯有子朱而舜且父頑母嚚弟傲豫商均不肖于五人無一全焉可曰堯舜非聖人乎如程氏謂孔門出妻出于漢儒謬説則檀弓家語並皆戰國人所作非漢人也明明有張罪而故刑李尤不可也若謂誤解檀弓出母之出字則檀弓自誤容有之無誤解也辨不知出母云者謂所出之母猶今所云生母耳子思曰為伋也妻者是為白也母子上之出母庶非嫡妻故子思不使喪之厭于嫡也儀禮公子為其母練冠麻衣縓緣既葬除之不敢並尊于嫡也王子母死其傅請數月之喪可證也答古禮並稱被出之母為出母並無以生母為出母者此並非誤稱且亦並無溷稱也若以生母為庶母則尤不可生者就其所生而言之若庶母則嫡子之稱猶言諸母爾幾有為其所生而可稱其母為庶母者且本文明云此原是伋妻故當為白母今已出非伋妻矣白安得母之則此不為妻從出母言若指妾則非伋妻者正是白母何則其生母也生母正其母而反曰不為白也母則又何説且生母之服未嘗厭于嫡也古喪服禮袛屈于父而不屈于母父在則嫡母亦在所屈禮父在為母期是也若嫡母則何所厭屈惟朱氏注孟子杜撰無學謂厭于嫡母此千古笑話今襲孟子注并引儀禮公子為母喪服文而亦斷之曰不敢並尊于嫡則豈可訓且儀禮所稱公子是諸侯之子一如孟子所稱王子者與大夫士又不同故既葬除服若大夫則父在當為其母大功士則父在當為其母期子思士也能使其子弗服生母喪乎正惟子上之母是被出之母可服可不服故姑且已之此與子思喪嫁母鄭志載張逸問答考核服制彼此未定一類若生母則父在服期父沒三年禮文具在而子思獨廢禮而弗使服喪亂矣辨伯魚之母死孔子使之喪生母之喪子思所謂道隆則從而隆也至期而猶哭則幾于匹嫡矣故嘆其甚而魚遂除之孔子十九嵗娶开官氏六十六嵗开官氏卒則孔子無出妻事答惟出母可服可不服故有隆汙若生母服喪在禮不在道矣且孔子十九娶开官氏諸書有之若六十六嵗而开官氏卒則袛見闕里志係後人所撰不足據矣若史記家語則較可信于闕里志者然云孔子十九娶开官氏二十而生伯魚向使伯魚是庶母所生則十九所娶者妻也而期年所生又是妾子將孔子甫及冠而一年之間妻妾並娶豈有此理辨子思之母死于衛子思哭于廟門人以為庶氏之母不當哭于孔氏之廟其曰庶正所以别于嫡也故子思受過而哭于他室而解者以為伯魚死其妻嫁于庶氏不知又何據也按伯魚年五十而卒其妻亦應四十餘矣四十餘改嫁此在恆人猶無之而謂聖門反有是乎若以死于衛遂解為嫁于庶氏則子思嘗仕衛其母獨不得從其子而受養乎且既云嫁矣則與廟絶矣胡為栁若猶以四方觀禮而欲其慎之也此皆自相矛盾不通情理之論而二千餘年曽無一人駮正之者答此適有庶氏遂疑為庶母之誤不知庶母不得稱庶氏且庶氏與孔氏對文明是庶姓不是庶母况庶母焉得不哭廟禮凡妾先死必中一而祔于妾祖姑傍無妾祖姑則又中一而祔之高妾祖姑之傍是廟原有妾而後妾之主又得祔入庶妾當祭廟矣誰謂不當哭于廟特孔門皆出母而此又稱作嫁母似乎有誤但不容哭廟則雖非嫁母而出母或容有之故前儒亦饒疑義而未敢定若云改嫁則伯魚五十而死豈有四十餘嵗之婦而尚再醮者一語斷定無疑也至于檀弓之矛盾不止四方觀禮一語既曰子思之母死于衛赴于子思則思不在衛故以訃來且云哭于廟則惟魯有孔廟是時子思在魯不在衛明矣乃又以栁若衛人戒思慎禮是思哭在魯而戒思之人則又在衛真矛盾也且子思祗哭耳即不然亦祗以齊衰期服喪服已耳而乃以禮與財較量厚薄是以含斂棺槨為言一如凡子之喪母者是又矛盾也來辨矛盾二字已啓其扃而尚未發覆然惟此節最明快故曰六經惟三禮叵信何况家語但當有實據窮極根柢不然宋人杜撰無益也又辨泰伯三以天下讓朱注其心即夷齊扣馬之心而事之難處有甚焉者不知何為却有讓周之説據朱子明注季厯生子昌有聖德太王因有剪商之志而泰伯不從遂欲傳位季厯以及昌此本注也有疑閟宫詩人為推本得天下之由者朱子曰若推本説不應下實始剪商剪商自是周人説若無此事他豈肯自誣其祖左氏分明説泰伯不從未知是不從甚事小注如此夫朱子下字斟酌盡善豈無其志而肯故入古人之罪耶答泰伯所讓是讓季厯則不必云讓周而自不得有他讓此在漢迄今由注疏以及行文家無異詞者獨朱氏一人倡言讓商此是武斷而反謂讓周之説不知所由此是何解凡人不讀書欲造説以説古事亦當就本事略一諦觀從來三代世系載之國史本紀者自有明文乃本紀云泰伯亡之荆蠻以讓季厯則讓字有實落矣孔子是言正因史文讓字推言之而曰豈止讓弟國哉此經文來厯蛛絲馬迹極瞭然者是以漢儒去古未逺即三讓三字亦有實落如一採藥二聞訃三斷髮類在王鄭輩皆能言之雖不必盡信然讓則無他解矣故先仲氏謂朱氏説經總不顧前後不惟亂經意即已意亦自亂太王以季厯生昌而謂為可興不過痛已亡國冀幸圖存並不敢稍覬此全盛之大商而朱氏以為志欲剪商則其所云能剪商而欲傳位者正季厯也泰伯欲讓商而反逃之以使之必傳此能剪商之季厯可謂讓商乎乃杜撰無理自造故事又且自加解辨以曲為回護而究之一往紕繆徒為經禍如注云太王有剪商之志泰伯不從遂欲傳位季厯以及昌夫居岐之陽實始翦商此魯頌文也忽添之志二字於其下已自不通乃又撮春秋傳泰伯不從四字以接之則不通彌甚按之志二字猶徒抱其志而未嘗剪及另造一説則太王直自剪之其説云閟宫剪商有謂詩人推本得天下之由者朱子曰若推本説不應下實始剪商語剪商是周人説若無此事他豈肯自誣其祖信然則太王自剪商矣夫剪者滅也謂滅商也太王何曽滅商豈曽以剪刀剪商幾刀乎太王為狄滅尚不能剪狄幾刀而謂能剪商直夢囈中語然且謂周人自説周人自誣祖亦嘗就本詩一讀之乎此詩係魯僖祭嫄廟而史克作詩雖是周人然周人之通者也剪者滅也滅商者武王也武王之滅商實從太王始基之此猶武成云我太王肇基王迹肇者始也王迹者武王滅商之迹也肇基王迹正是實始剪商一史克言之一是武王自言之爾誣他他不誣祖也若泰伯不從直接太王有剪商之志則尤為不通夫古經未易讀也泰伯不從出之春秋傳宫之竒諫虞公語其曰泰伯虞仲太王之昭也泰伯不從是以不嗣以不從接太王之昭原自難解然正須解説以求經義乃強接之剪商之志之下而于本文仍不解反曰左氏分明説不從不知是不從甚事夫祗有志而不從已不可訓勢必添不從父命為言而父命二字又添不出何則古兄弟讓國惟泰伯與夷齊而夷齊有父命故伯夷曰父命也遂逃去而泰伯無父命故前儒注經者惟恐有誤特于論語正義專下一疏曰文王有聖德太王欲傳之而未有命竟以未有命三字絶之其慎重如此朱氏既無學識又堅愎自用反為回護曰不從個甚事蓋原不解春秋傳不從之義而復強抵一句一似伯之不從舍從父一事便無他事可解者不知泰伯不從陡接太王之昭句正讓弟實解而世罕識者古工史書世宗祝序昭穆而孔氏正義曰父子異昭穆兄弟同昭穆然而同昭同穆中有先後焉先後定而位次因之順其位次謂之從倒其位次謂之逆故春秋文二年經書躋僖公而國語宗有司曰非昭穆也正謂閔僖兄弟閔先立僖後立而升僖于閔非昭穆位次也孔子譏之曰縱逆祀所謂逆也其後定九年經書從祀先公則以陽貨是時易閔僖之位而順祀之即謂之從從者順也所謂順而從之也今泰伯季厯同為太王穆考之昭而不依長次舉國讓弟謂之逆而不順不順即不從故曰不從同昭之位次而不嗣周國此正讓周讓弟實解而舉世不識何也辨意伯此時隱憂惻怛必忱思以感之不能則幾諫以動之正諫以格之夫得罪于鄉黨州閭寧熟諫也况君臣間乎伯于此時惟有逃之一著而然後父子恩全君臣義盡非陷父不義也答此直推廣朱氏説而縱言之宋人經禍當此益浸淫矣古事人多不曉然亦顯顯在人而人並不講且並不體察如伯與夷齊其事亦何嘗祕密而皆不能察其苦心觀伯夷傳云其父死叔齊讓伯夷是兩人之逃必父死而後行之其生前隱諱必不敢悻悻求去以見諸形迹當何如者惟伯亦然伯深體父意而隱忍不發至太王疾亟而後托採藥而幡然去之此並是實事而乃儼然撰事曰幾諫曰正諫父子兄弟幾幾閧市出一門矣曾宋儒經禍而可尤效之如此又辨井地之制在夏商以前不可考矣即夏商以後有貢助名而其為五十七十百畝之制則全不能解夫經界有定規溝塗有成域各自少而變多必將移易其封植更改其疆畎煩擾已甚竊意夏后氏時洚洞方平人民尚少一夫五十不過隨其力之所至地之所出所以為貢商人始為井田之制以六百三十畝之地畫為九區區七十畝其間溝洫道塗必尚廣裕廣裕則必有間田隙地棄之無用故周家百畝之徹因之以成大抵因商之舊斟酌其溝洫道塗五等之廣狹而蓄壅而墾闢之夏商尺度已無可考周人以八寸為尺履畝而計則商人七十畝以八準之八九七十二幾當周九十畝而遂廣深各二尺溝倍遂洫倍溝澮倍洫川受上四則之水分廣狹而蓄壅之徑廣容牛馬行畛容大車塗容車一軌道容車二軌路容車三軌分廣狹而墾闢之又可得十畝有竒則井形悉仍商舊不必有改作之勞而周人百畝可按數得矣答井地創于黃帝古有明文乃朱氏獨曰商始為井制無論毛詩維禹甸之春秋傳少康一成一旅王制夫三為屋屋三為井總夏后氏制而即辨中所開溝深廣倍遂洫倍溝澮倍洫川受上諸水出之遂人職文者皆夏后氏親治之虞書禹曰豫決九川距四海濬畎澮距川而論語亦遂云禹盡力溝洫是明明夏有井制而注孟子者敢曰井制始商將欲舉毛詩虞書春秋傳禮記周禮考工記并所注論語而盡付之祖龍可乎且其所云夏后氏時洚洞初開人民尚少至商後始漸次開闢亦未是也夏后非洪荒之世洚洞為災不過丁數百年治亂一轉運耳故厄運未幾而即已平復如禹貢記揚州之貢曰厥田惟下下厥賦貞作十有三載乃同正言井制有九等之田九等之賦九等任墾之人而耕作十三年後盡復如舊所云十三年者並是堯年即舜年五十載亦尚未及何況夏后氏故此一説在前儒亦曽言之總無當也乃若以尺度減短作朝三暮四之説前亦有之然未經推算今既推算則應有實數而仍然不合如云商人七十畝以八凖之八九七十二幾當周九十畝此大謬者據商七十畝以周尺八寸計之當云凖七不當云凖九夏制夫九為井以八凖九不能合五十且既夏商尺無考何得以今尺作商畝之凖且以八凖九則所伸十八合之猶是九十畝不得云幾當周九十畝也夫必減尺度以伸畝數則以周八寸之尺凖商人七十畝之數八七五十六先以五十六畝抵商七十而所餘一十四畝又得伸二百八十步增出二畝八分之數合之可得八十六畝八分然欲以之抵周人百畝則究竟不合又且畝數以步凖不以尺凖周制六尺為步步百為畝則在商必六尺為步步七十為畝猶之今制六尺為弓弓二百四十為畝但改弓步而不改尺數似乎地畝長短全非尺度所能限者乃又于減尺之外另欲壅溝洫闢塗路以為增畝之法因引遂人職文謂井地水道有遂溝五等可填水兩傍以拓之井地經界有徑畛五等又可鏟界兩傍以恢之則煩擾滋甚從來水道通塞狹者可使廣而廣者反不能使狹况以丈尺之水欲但存中流而畚土以填其兩傍則世無此事若欲削塗路則車徒牛馬量所行以定廣狹自容牛容馬容一軌以至容二軌容三軌矩步截然縱善鏟削欲其削車軌鏟牛馬足毁成法以恢此尺寸之土勢又不能向以為改疆界變封植由五十以更七十百畝力有難為故刻求良法而今此變更仍然不減又且有大難通者人苐知九夫為井井間廣四尺深四尺謂之溝倍之廣八尺深八尺即謂之洫亦知溝附于井止得十夫千畝之地而進而為洫即為方十里之成為百夫萬畝之地而進而為澮即又為方百里之同為千夫十萬畝之地能割此水邊幾尺路邊幾尺以分給此方百里千夫之家使各成百畝以合充此十萬畝之數雖鬼神在前亦且却步而猶曰可得十畝有竒吾不知此十畝有竒之地從幾溝幾徑得之而得之而分給之千夫之井中將安給也此又難通之甚者也釋二辨文一辨三族無服一辨叔嫂豫歸草堂與莫子蕙先觀歸安鄭芷畦所寄婚禮經典參同謂士婚禮于請期一條有云惟是三族之不虞使某也請吉日注三族是父母兄弟子言幸無此三族意外喪服可以擇吉行嫁娶禮據此文則三族祗身族上下斷非父族母族妻族之説何則以母妻黨服僅功緦之末不礙嫁娶也况六經稱九族皆注高祖至玄孫之親並不傍及親黨豈有三族反傍及者其説甚善會張風林從館來咸集草堂坐客因嘆自循蜚至三代何許年嵗雖苗民播惡不及族誅而暴秦倡之致斯高之徒延及親黨一何酷烈而風林曰不然雖暴秦亦無此事案史記秦紀文公二十年倡族誅法張晏曰三族父母兄弟子則正與士禮同惟如淳無籍妄注為父母妻三族然其言無驗在當時已不行其説觀李斯誅咸陽市無父母兄弟則祗及其子所謂牽犬上東門者正父子受誅時語况如淳不學但悖誕立説即注史記而不識史記記于張耳傳趙相貫高明云人孰不愛父母妻子哉今吾三族皆論死豈肯以王易吾親哉實實以三族指父母妻子此是史記大文無容更注也且三族二字不止見士禮也周禮小宗伯掌三族之别以辨親疏明指親族而仲尼燕居直曰閨門之內三族不和世無母妻二黨在閨門內者此尚何疑惑而舉世夢夢至今未了豫因念儒説為禍宋明實甚而前儒已開之雖耄荒健忘胸無一字猶記九經之注早已明白然亦有異義如夏侯勝歐陽和伯釋書九族誤據爾雅釋親以母妻二黨可稱兄弟且詩有兄弟婚姻語遂解九族為父族四母族三妻族二合而為九其説與如淳不異而又推廣之殊不知爾雅所釋謂母妻二黨雖繫親串然引而近之可有此稱並不以此釋族屬若角弓所云則正以族屬疏遠致等九族于婚姻故戒胥遠觀平王不親九族而詩直刺曰終逺兄弟謂他人父可驗也且以九族分三黨尤極無理即一父女昆弟適人者子即姑子也姑子視舅子猶之舅子視姑子一例也則母族中亦冝添出母昆弟之子一族而今又無有若母之父母為一族妻之父為一族妻之母又為一族則何以母父母祗一族而妻之父母則分而為二此直是孩稚無稽喪心狂病之言可一笑擲之者但三族九族既繫經學且厚繫國事不敢不藉此辨定以了其説世亦知三族九族歷見經史而三九之外尚有五族七族乎喪服小記曰親親以三為五以五為九謂已上及父下及子三也又以父及祖以子及孫五也此三之推為五也若五之為九則中已包七而略言之乃儒説便云曽高同齊衰曽玄同緦麻故無七族及讀史記鄒陽傳則云荆軻湛七族而張晏亦注曰七族上自曽祖下至曽孫若然則三五七九皆親族矣蓋同姓為族異姓為黨故爾雅于內宗曰族于母妻曰黨禮稱母之黨妻之黨妾服女君之黨反葬女氏之黨無稱族者大抵族與氏相聮國君傳族每一君為一族如曰桓莊之族桓戴之族有時分氏為族如高陽一氏而分為一十六族然合之止高陽一氏有時分族為氏如魯桓一君而分為孟孫叔孫季孫三氏然合之止為桓族他氏皆不得而參預其間然且族有寡多而總以服為之斷自三至五自五至七至九總皆以服推及之若但以族言則鄭之七穆初祗罕駟與國氏遊氏而後復分為子南少正諸氏皆穆族也魯之三桓初但有孟叔季氏而後漸分為子服為南宫為叔仲公彌諸氏皆桓族也然則族亦煩多矣惟三族服始九族服盡以是為斷則族屬雖繁而各有限制雖族誅之法三古迄今早已廢絶不必更為過慮而儒者論學最貴嚴確亦安可使天地之間有無稽亂道至于如此古叔嫂無服至唐初變制始有小功之服見開元禮此在學禮家皆能言之近歸安鄭芷畦作喪禮經典參同疑士禮喪服記有云夫之所為兄弟服妻降一等似夫為兄弟服期而妻降大功為從兄弟服大功而妻降小功類如是則叔嫂有服矣將欲據此文一雪從前言禮之誤豫與莫子蕙先見而疑之謂士禮大功傳明言叔嫂無服且故為問答以著明之豈有一傳一記自相矛盾之理時張風林在坐曰此但以恆稱兄弟解士禮非士禮例也士禮自有例凡恆稱兄弟者皆變稱昆弟如同父之子曰昆弟從父之子曰從昆弟以至從祖昆弟族昆弟而凡同姓之所為伯仲者盡之矣若兄弟二字則不論同姓異姓與凡繫屬之稍疏而有服制者皆得稱之故鄭氏于大夫之子于兄弟降等文注曰兄弟猶言族親是也然必有功緦末服一如從祖昆弟族昆弟者始當其稱故傳曰小功兄弟之服也若記則直引傳作問答以明其説曰何如則可謂之兄弟曰小功以下為兄弟其説之再三而確鑿如此似未可以恆稱兄弟強解之矣但此條兄弟在賈公彥疏單指是夫之從母之類則頗費解按從母係母之姊妹其不他及者據疏云妻從夫服其親族在前傳已有諸祖父母外祖父母世叔父母昆弟昆弟之子類凡傳之所載記不重出故苐補此親以類推之則但舉從母所以補其闕非謂族親止從母也此説良是特明稱兄弟何以同姓異姓男氏女氏皆得稱之豫曰周官春官以飲食親宗族兄弟而秋官刑族人亦曰不使國人慮我兄弟則宗族稱兄弟固也若爾雅釋親曰母黨妻黨為兄弟又曰婦之黨為婚兄弟壻之黨為姻兄弟則即此數語而異姓男女稱兄弟皆可見焉且他經亦有之不讀詩乎王不親九族而詩曰終逺兄弟此宗族兄弟也乃王舉族燕以異姓為賓客而詩曰兄弟具來曰兄弟甥舅是公族與賓客皆兄弟也然且古有飫禮國語每嵗必飫或祭畢行飫大抵以宰夫為主異姓為客王與族人飫于堂后與內宗之屬飫于房內外交飫然而常棣曰儐爾籩豆飲酒之飫兄弟既具和樂且孺楚茨曰諸宰君婦廢徹不遲諸父兄弟備言燕私是男氏女氏俱兄弟也西河集卷一百二十一
