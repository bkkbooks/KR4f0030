body:
  text: 西河集巻九十七翰林院檢討毛竒齡撰墓誌銘七陳翰林孺人儲氏墓誌銘孺人姓儲氏檢討陳君妻也齊國相臣基開青土開元才子家住丹陽祖江西按察使著績南州父太學生垂聲東序孺人生而婑媠性兼明慧刺朱幃于帳裏弄粉絮于欄邊學書操管篆略作丹黄雜技按楸紋便知横直苐名嬌女未字令人其母陳太君為陳君父姑君祖少保公即孺人祖舅兩相歡愛願合葭莩阮甥兄表抽碧軫以徴情劉女姑兒用玉臺為聘物遂使羊鄧婚姻之好加之郗王中外之親八緜初著體倍見同功九蕙未分根依然並蒂謂鴻妻之可託詠鳩配以奚慚獨是衿褵乍結新婦居儀珮帨將貽尊嫜寢疾君母湯太君病而孺人扶持之厨無茧蜜猶堪三日為羹盤裕棗脩誰使七年求艾乃曰老親方患苦思食江魚敢言夫壻未分明心同幙雀伺燕帬之澣滌伸鳥爪以抑搔不意君過澄江太君遽逝桑枝未捋秋胡有遠道之行木李難投秦掾少新婚之戀上黄世子不共游仙下軍大夫仍為生客痛臯魚之哭母頼趙孝以斂姑于是君父贈君分田授室責孺人奉養蕭娘初得壻略辨酸甜左女在兒時早營盤槅撃殊鮮而傳食斥他肉于當餐酒漿汎濫不疑湓浦留賔宰割從容奚翅安東歸獵其奈家世仕宦不事生産作客窮歸門巷迷失孺人好慰之使毋廢歌詠百尺樓陳氏劇厭求田三十歳王郎安知問米但驅饑于彭澤恍失路于天台柴門月色不辨誰家荻港烟生全迷舊徑錦文當户織自下機來翠襇出簾迎剛逄帶解庭能漂麥直須把巻房中爨有樵蘇何必行歌市上孺人每顧視嫁時衣飾典賣不郄嘗燈下出金簪一枝及羊脂小玉合子是八九歳弄物估値相示三英玉合子宛若凝脂七寳鈿頭釵非關曜首簪垂黄粟小年興炊䥶之嬉帕裹青梅數歳作繞床之弄每嘆長門之未草因之補屋以牽蘿招靈廽短髩誰從井底収來私語記長生那許波斯買去當春末夏初牕前黄杏樹為君從祖殿元君手植子熟將脫夜半謳吟時聽觸地一聲孺人輙令婢啟扉拾以啖君金門未入有誰從西母偷桃銀扇嘗關無復向東家撲棗惟此房陵三色李和嶠裁成似兹廊下九英梅元稹種在喜均亭之既熟儼巴旦之能甘味逾蠻柰生垂嘉慶坊邊響似霜桃聽落華林園裏雖酪需寒食未足充饑而果出天漿儘堪解渴乃君應制科置身翰苑每欲迎孺人到京一語昔昔而舟車蹉跎竟至奄忽門來羔雁徒致府侯勸赴之詞身入承明原無僚壻相欺之意黄鵠巳摩天未銜雌去青嬰方出浦難見珠圓贈紅衣于駢蔕荷間寄尺素在一流泉裏塞垣别鶴未貽徐氏瑶琴禁樹棲鸞空詠義安錦帳游宧度年時悵關河之阻隔思君如日月託晝夜以還生東瀛將涸可知床半封塵北地常寒不用庭中取冷遂于康熙十九年十二月六日終于陽羡私第越某月日𦵏于某阡祝英臺畔宜多佳婦之墳玉女潭邊即是其人之墓文褕應錫賚姑掩泉門華表待歸來相從地下嗚呼哀哉乃為銘曰粤稽肇族厥惟營丘諫議持節名賢是求由漢迄唐世嬗彤騶開元詩體高起𦕈儔惟是孺人門閥蔚薈瓠父陳思韞從阿大秀稱顧婦親即鮑妹鬱金成床迷迭結帶盤載纂組案據荼菽縑書覆紅螺字刷綠以其餘技時展玉局坐而談之有如姑媳乃持門户能欽尊章但咨傅母不杖小郎夜蚌作燭春蠶着湯亦既辛苦名為糟糠有時灑室人歸自遠山畔賣珠市中鬻盌肉杏可食如棗纂纂牛衣雖單馬齒未晩何晤獻賦旋登皇闈買臣無婦相如有妻只嫌顑䫲金門苦饑是以迎子徒勞驅馳河行亡梁陸驟匪輛甫盻三塗遽隔重壤塞北花飛江南草長子荆有詩亦復増伉金蝶閉壠銅棺掩墳離山埋日長蕩飄雲碣藉龜守泉從蟻分睠言誌之以紹來聞王給事孺人張氏墓誌銘孺人張氏西安人其父興由大同來遷生孺人即以官桞州城守都司攜孺人桞州有年逮歸道荆南㑹郃陽今給事王君知潛江有聲而亡其雌荆南道使君知孺人賢謂兩家同鄉請合好為婚姻孺人遂歸君時官居無廟見禮然猶奠菜扱地問尊章起居乃以不逮事老姑臨扱埀涕洟人稱賢焉既而君應取赴京天子嘉之命給事門下隨以丁外艱西歸且承重先王母與孺人共執三年喪有年先是孺人夢姑來褰帷坐陽陽召孺人飲食而慰勞之言語于于醒而舉似君君大驚曰此眞吾母容也至是孺人甫有身復夢姑來喜且慼不語時孺人巳病咨嗟曰姑之喜以此身也其慼者豈以吾病有難言者耶既而産一子越七日孺人死死之日孺人所手藝秋花參差雜列于盆盎間者繞帷幔几榻扈扈然一夕死時康熈十九年九月一十三日嗚呼孺人生二十二年而歸君一年還郃陽越二年而相繼服三年喪四年而生子以死死二年君始再赴京補給事門下乃始葬孺人而命予以銘銘曰維時孺人少禀婉孌天連張姓地即秦産字秀于閨以範著壼雜弄文史并力組絸箱貯玉尺裙繋金翦雪桃洗膚雲葉作鬒有時敕厨用饋洗腆脩陳績筐羮瀹黛椀乃隨父宧日至桞池翡翠設屋鬱金裁帷傍神女山去司户祠秋採蕉實春銜荔枝雙角舊井誰設珠璣五嶺荒服難以匹配用是有美獨居愆期詎謂鬱林載石歸來芙蓉之館瀟湘之臺乃停兩槳爰憇三澨所謂伊人在潛江水種花自娛揮絃而治黄鵠夜飛文雉朝逝用藉鳩媒申以鳥綵江妃有亭既名解珮君侯之堂可以燕喜擷芷于湘採蘭于澧何有何無以續以似如何冀州奏課稱神河陽縣令巳為黄門青蒲未伏堊室以存解𢎞託疾杜暹辭還羅褓負土蓍釵枕薪獨念姑嫜與魂相親茧豆未獻脯醢攸陳誰思笑語難求生平孝思所感寤寐以宣且慰且勞或慼或忻舉貌審象如說築焉何悟呱呱癸甲辛壬嵞山化石鈎弋喪身從來良婦本亦可悼奉倩神傷安仁詞玅况孺人者既順且孝長繋人懐不止婦貌缾墜豈挈釵折鮮耀埋玉塵坌置鑑漆窖是以時易屢改燧燎撃缶無韻彈瑟有調尚繁哀情如在初弔豈惟伉儷増重寡姚亦粤壼德歴久彌劭最可憫者秉性明滌屏斥繁煒房布清格光垂九枝芬爇五木瓤核茗藥雜列盤槅尤愛藝花作千種色紅羅造亭青油立壁猊采駝褐鱗接挿㙷戎王異名淨友殊殖不翅旖旎號十二客以故盤盎衆列紛藉櫩忌風漂繖慮日炙當其花時紅紫黄白但有開落而無斷續雖極秋末霜降土坼猶然􅦆鞢蓼蕙蘭菊一旦枯萎如彼殰殈草木有靈且為之惜天長地久此恨何極孫子荆文所為嘆息故明特授游撃將軍道州守備列女沈氏雲英墓誌銘夫驊騮牝牡必殊其馴健翡翠文質而被以雄雌故禮兵不同命諒無竝官揆奮無共功何有兼設况坤輿載物不麗日星陰教分儀判如水火其能笵金鉸之鍼管用貯豐狐脫貝琢之裙刀以跨銅爵此高才之嬗也若宫中女隊從親報國軍前娘子為夫闔幕又至德之發也有明列女蕭山長巷里沈將軍雲英生于華閥長厥名閨弱體僅足以勝衣薄力較難于舉臼然而女紅則蜘蛛孫其巧貌素而芙蓉失其色其父昭武將軍諱至緒辛未武中式進士初仕湖廣遂守道州崇禎之末流寇東訌朝衝夏口暮逼營陽陳其蘖妖劘剥千里君至緒誓師厲衆刑馬于塘䧟勍摧堅磔䑕在道而天歩少窘王略中沮州伯望風而旗靡府軍彎月而矢盡君再射裨將捐其大黄將殄渠魁縣諸小白而馬驚外埒身殞中野元戎巳殉千夫將亂于是列女束髮用胄覆羅以韐刷金箱而斬秣溉黛椀以傳餐朱旗拭淚盡作臙脂素鉞矢心勿縣巾幗乃率十餘騎奮呼突隍直趨賊壘連斬卅寇頓驚五校奪父骸于車上㧞賊幟于帳中裙披馬腹浥似桃花齒嚙箭頭碎為菰葉歸而啟營示以再戰寇避其威立徙鄰郡湖撫王君聚奎以其事聞遽邀寵命故湖廣道州守備沈至緒力守營陽臨陣却敵斬殺過當佻身授命生為長城死作國殤其贈至緒昭武將軍賜祠麻灘驛春秋祀之有女雲英閨房之秀奮其弱臂以呼殘衆求屍殺寇不用城頽誓命哭父如浮江出大復讎以報親肆弭亂以衛國殱敵全軍保疆恢境其授雲英游撃將軍仍代其父湖廣道州守備領其軍當斯時睢陽之死可以遏冦龎氏之車又足報怨廷降異數國有同德爾乃踰城荀灌小女救父抽刀謝藴為夫殺賊自逾壽陽孟妃之能竟攖内史陸妻之苦㑹其夫賈萬策四川人故閣部督師標大勦營都司鎭守荆州南門賊䧟荆州賈亦遇害因哭辭詔命領軍俟代雖身統士卒亦逮三月然而我師早敗不免司徒有夫繼傷誰呼督䕶不喜貔貅萬隊受君新策惟願明駞千里還兒故鄉乃乞卸巾鞲始扶槥櫝舎厥丹斾張兹白旐因葬親于原阡旋匿形于漆室而饑無朝爨採蓍為難寒鮮時衣賣珠不足于時傭書族里筆落簪花課塾閭門書垂帯草摹李衛之妙楷進鼂君而授經既缺班氏青黎之假終鮮章母絳幔之設乃以赤祝壯月小疾長畢年三十八葬于龕山昔者忠孝義烈定為綴詞中外武文亦需揚誨將軍于父為孝于國為忠于夫為節于身為貞此為女德又擅婦訓文能傳經武足勘亂而猶不得援故典託微文導淑施于既往揚清芬于後來匪惟舊史之缺遺抑亦學人之寡陋也西河毛甡有友沈兆陽名士也為將軍族人曽從將軍受春秋胡氏傳以為術也將軍從弟婦甡姪也乃屬予為誄并匄作誌而系之以銘其文曰猗歟將軍世顯名材九葉冠緌工居豸臺顯考棄繻為翹關魁㧞于樞曹智計以開少閑豹韜生實龍媒詣關請纓和門授裁婪婪饑冠時為盜階初折萁桿冀梗于野繼抽橛櫨思以擣舎若火薰穴翻壺之瀉不思撲滅乃半天下由陜及湖延蔓雍豫誰鎭江漢可無南顧懿爾顯考雄略有素羣推出守營陽之路維兹營陽為楚南服陶侃屏蕃周郎都督結艾為門伐材作輻外整牙關内安部曲不悟寇來如蟻如蝟噆血盈囊舂肝溢碓公乃奮武襲其不備殺伐衆醜漸殪厥帥醜衆他顧擬于此棄次日戴胄當門而出維兹志士激于攻殺呉戈倒揮秦弓逆折左驂受蹶右馬被刺高天滄茫平原超忽身委泥沙首受箭栝維兹將軍實維嬌女意慵比雲眉淡如雨好弄書翰閒習組纂何謂有美亦諳觀武如彼荆珍既柔且栗如彼湘草有靡其茁乃砥其矢乃蒭其馬束髮誓師哭于戲下左垂燕箙右把蛇㦸介服帥師哭于門側選騎勿多利在赴敵以此一二抵彼千百突如奔流矯羨飛翮賊方飲樂中賊之隙春虹走馬秋雨垂鏑斫斾用刀裹屍以革賊佔女鋒人駭兵色攻殺爭先三十餘馘闢營旋旅衆皆感激昔也觀公今也觀女灼灼紅顔為千人主賊始驚顧旋乃猶豫莫測所由棄之而去自兹營陽藉女少休何謂夫子復喪荆州父夫死國亦又何求擐甲羅氏無兒可留上書陸婦難殱夫讎捋其指筈以解臂鞲燕嘻還越狐死首丘長此鬼雄曜靈河洲為厲殺賊方神且遒雖明天子降以殊恩既榮死亡亦賚生存自昔閨中鮮牙其門維兹嬌女乃稱將軍死不敢受歸諸丘樊方賊小蠢藐焉窮梟以沸以揚國為之摇拖紳戴弁經營滿朝誰能摩厲有如此嬌貧拾蓬笛寒披女蘿經傳狩麟書成換鵝交交黄鳥亦集于柯人苟可贖遑知其他西河集巻九十七
