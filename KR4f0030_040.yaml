body:
  text: 西河集卷四十翰林院檢討毛奇齡撰序十七送汪翰林奉使琉球冊封中山王公饑詩序王者撫存萬國爰有使問故傳曰皇華遣使臣也送之以禮樂故逺而有光也而魏武著選舉令每曰使于四方古人慎擇葢期當于是選難矣今天下車書一家薄海来享凡蠻邦逺處日出日入之所徳廣所及去俗效義而皇帝聖文神武柔逺能邇諸所動作悉合天意既已東征西討盡驅諸不庭之族倭泥再闢雕題盡来惟是四裔之外如南夷君長番禺太子無不延頸舉踵想望為臣妾雖道里遼絶阻以人力猶不能强抑其自致之情况琉球處東海中早稱外藩自王公妃妾以及陪臣長幼咸願署名負版拜天朝一命以為煌寵是固開國以來所垂袂而臣之者也康熙二十一年命册中山王世子為嗣王國議遣近臣任使者捧天子詔敕及金册玉圭以往按海中屬國開自隋唐唐遣使官如新羅日東諸處悉簡御史中丞負人地者啣命拜節而琉球為明初所開其正副二使率給事門下及行人為之今廷議鄭重正用翰林官副以中書僉曰檢討汪君能受命不辱諭國威信其文章特達秉志皦皦已足取驗海外而儀度秀卓揚言如鏗金翹然上殿天子以為可遂賜一品服繡以麒麟而加之尚書之尊中臺八座自國門升車旌旗獵獵前導闗亭負弩者踵相望于路上既慰勞出而在朝諸臣並為之供張贈以詩歌而屬予為序夫居平誦讀忼愾自期非為九州伯統十萬師横行邊庭間即出使萬里折衝樽俎為國家建堂堂之節足矣乃以一儒臣夙抱弱翰給札牘為文賦而一旦朱軒緋驂奉天子威徳陽陽持節至日出之所頒布明命使屬國君臣崩首蹶角以致其父子同賜懐抱匹帛之意是則陸賈之語所不傳而相如之諭所未逮也若夫波濤澒洞戒我前綏則唐臣使海猶尚有受命不私履險如夷之頌詩不云乎忠信涉波濤夫世有信使如汪君者哉贈詩不限體從所志也副使林君同有餞而各為贈詩重其事也予拙不能賦僅成五字四韻詩凡如干首而書其序于端汪君名楫字舟次揚州人送張毅文檢討歸郁洲山序予以入舘之七年請假歸里未能乞官湖為棲息地也同官張毅文以言事去職自言家海東有郁洲山即山海經所稱郁山者山周八百里而四環于海林洞掩薄中多良田先考功思結廬其中而未逮也予將長往焉竊思毅文無言責其所以謇謇直陳撞九閶之鐶而不自顧者夫亦以鄉里蕩析人將為魚思稍其災拯滔淫而出之于溺因不憚越職言事乃聖朝既行其言而徒以封題細故少就裁抑反輕去其鄉悻悻蹈海以自置于波濤出没之中豈真謂此邦難與居與毅文本良史職司記註其纂前代事慷慨落筆即厭承明亦當自抱經術棲遲槐市間時毅文冝補助教以出與朝士相周旋而乃木石是居下同鹿豕何其憊也吾聞郁洲從鬱林飛來又名鬱洲其山中所植尚多竻荔柑蕉之屬曩時崔季珪遇仙人而悦之夫以入世之難測升沈反覆𦕈不可定則睹兹山之變幻而彷彿與仙人者游或者陸績之石有時而移淮流澶漫有時而渫豈亦依約翫世之㣲情也乎予隨考功先生父子登曲江樓飲酒賦詩辟易千百人越二十年而考功先生仍然就安車應建元之詔率毅文與予同上金馬門予因得與毅文並授舘職不十年而考功已厭世曲江樓傾廢不可復問而予與毅文又復于編纂之餘相繼言去嗟乎雖欲不為棲息地而何可得焉慎餘堂詩文集序古者傳世之文與問世之文無異也司馬文園以游梁之賦受帝主知公孫犀首揣摩短長終以此見用列國然三篇之目則依然具藝文也今則稍異矣帖括之精無預博洽故有皓首章句而不涉一韻語不及一短長言者況一行作吏棄如敝屣百城之相擁則萬巻所從廢矣廬陵劉君試仕來新息其為舉文亦既藉藉傳人間矣乃抱牘未幾復以所著詩古文相質昔者八家之傳三在江右而廬陵歐陽且推為八家之宗即入明以來其以舉文稱雄者代不乏人然卒皆以經術之氣兼行之帖括之中故當時特標為西江派迄于今不衰是豈地使然與抑亦傳世與問世兼資如所稱司馬之賦公孫之文與抑亦歐陽南豐荆川諸家有以開之于前而奕葉以後遂相嬗不之替與何劉君之能以舉文見復能以詩古文見也予寄居倉卒不能與劉君論古學而第披其集視其詩若文淵淵乎如大禹之吹筠而平陽之擊石含吐性靈抑揚詞氣與時之摭葩拾藻者殊矣且其文汪洋縱恣不可方限宜以為江河之目而乃顔其集曰慎餘則其不事誇靡務求􅌢檢謹言行而為世用者不槩可知乎虎跑定慧禪寺志序虎跑在西湖之南凡由湖越江者必穿山以通而寺當兩通之間相傳唐元和中有性空師者從南嶽來遷而苦于無泉陡見虎跑地即泉生而南嶽故居所稱童子泉者則頓于是日枯焉遂以此泉為南嶽移來因名虎跑又名虎移蘇子瞻詩所云虎移泉眼趂行脚是也特虎跑名泉而不名寺曩時大中乾符各有敇建而以山得名者謂之大慈以塔得名則謂之定慧大抵自元和而後歴宋元及明建置非一要必有人焉為之主之故開山以來代有嬗受凡寶洲規為慈室營造與夫帝王之頒賜檀那之供養齋田薪嵁經壇幡砫各為記載之以傳于不壊而明代諸志僅附之西湖之末闕焉不詳雖欲考按焉而不可得也本然禪師以彌天龍象受大鑒大法繼席此山其力行化導振興遺緒已非一日乃于説法之餘惟恐山川灰刼久而漸泐急㨑諸實蹟參之聞見以証以核以為之志其分門立部所為建置沿革法傳世䕶佃布樵採無不抽其端而析其委自此虎跑有眉毫矣夫名山之興闗乎運會前此大中乾符京師遼濶帝王頒錫皆未嘗親至其地即降而吴越錢氏世王此邦顧記載洇鬱不知其施賚何等而當今皇上于南巡之頃親幸泉亭掬流而飲之睿音稱讃間泉為之沸即井榦所刻金龍伸爪奮鬣日光動盪與聖顔照映同其晃曜則祗此一泉而神虎跑于前天龍現于後不可謂非重興之一會又況兜率化身久持法海于以迴髮字而成貝書即以是為龍藏之經函所以助道生法安之論説何不可也清化廣利寺志序當予讀書横山時每渡浦陽江見江流半青巋然髙出者氣佳哉鬱鬱蔥蔥此清化山也顧欲一至其地不可得暨予避人歸或有以清化三十二景屬題者予以焚硯辭之去當其時相傳清化山中有普慈師者實始興廣利舊刹一復晉宋以來雙嵓七宇之盛凡梵室之中落者則于斯復振焉康熙已巳予以歸田之暇杜足江村而普慈後人乃挾清化廣利志渡江再請願得數言敘其事予思名山福地必有聖僧覺士搘拄其間所謂山川之精與辟支之力相附而顯顧慈室易壊珠藏金乘不無循日月為興廢者考之廣利所始創于宋大中祥符之間而歴元及明毁者再矣普師以禪徳之長入山有年一旦出其願力使久淹浄土頓還舊觀不可謂非名山之幸顧興廢未可料也住持宗標丐其鄉居士輯為寺志歴載開山嗣法諸源流而附以旃檀捐助山塲田蕩之劵冀傳永久其為意非不甚善獨不聞清化之所由名乎夫清化非山名也在昔龍湫石室本名靈峰自五代晉時有純一國師者曾建院于廬陵之安福賜名清化及師還越州而吴越文穆王錫師紫衣因闢靈峰山創為道塲而師乃即以安福清化之名名其所居然則清化山者本安福舊名而以之重名其寺者也夫世有以山名寺無以寺名山者今清化之名實始于寺然而人之稱之者但知有山而不知有寺如予疇昔所稱清化山者極至山久無寺而清化之名猶是也夫至山無寺而尚名其山而謂山能無寺謬矣他日儻能至其地三十二景當在也予雖老尚能題之同音字解序字學有二一以形學一以聲學其在形學者自許慎徐鍇以後悉以篆𨽻為根氐而降而宋元拘牽波點其失古楷體之舊久矣若聲學則自唐迄今皆夢夢焉予嘗于修史之暇著通韻一書進之御前其義明指確已經宣行而惜未能家為喻而戸為説也錢唐沈君取梁周興嗣所著千文而輯其同音之字以類分聚謂之同音字解乃復以每字四隅分註四聲使里門兒童讀一字而字類之仄音皆備具焉考之兩漢以前以均為韻所以均聲之不齊而同聲之字古無其書至左校李氏首創聲類而後字聲之相同者彚為一家逮齊梁之間中書周顒少傅沈約始造為四聲類譜實非三古以後漢魏以前所舊有也然而聲類既開則于是有東冬之部就其聲音之同者而反從分之四聲既開于是有有入無入之辨就其有入十七部無入十三部而或為之界或為之合乃沈君所訂則聲同音異不拘東冬有入無入通合兩界一若李周諸學原非古法不屑與之較是非絜短長而第從小學之習字者而參稽之古者天子世子公卿適子學于宫閨而保氏教之以六書之法謂之小學今其説不明久矣誠使入里門者開巻誦讀即由是以得夫保氏之教不必逺稽説文近襲廣韻第隨舉一字而凡為齒齶之齊與喉舌之轉皆有以周知其數而推類以盡其餘是亦興復小學之一端也又何患形聲之不畫一焉俞可庵文集序順治辛卯浙三舉秋試是科解文往以第四人為一鄉之冠謂其文峻警拔恒等選本一出家模而戸程之一似風發于青蘋而須臾而遍大塊詢其人則可庵俞先生也既而先生成進士予嘗于文會中得一再見然于舉文外不見有所為他文者又既而先生之子復與予從子同舉于鄉每謂先生有詩集數卷藏于家已托子從子屬予點定而予以出遊去未之應也暨予官長安距當時屬予時已八九年逮歸而先生之子然後捧先生集至齎咨相示則儼然遺文焉夫以先生之舉文風發霆應亟行于當時而獨于詩于古文詞孑孑焉若艱于示人而遲之遲之一似桮棬之餘澤而必待孝子之㨑剔以傳于身後似乎贏于彼而詘于此何哉顧人亦有言方先生為諸生時日殫心古學講求漢魏以來樂府歌詞或勸之止以為與舉文有礙而先生不顧且曰舉文所以闡名理無根之言則名理所棄也所以孜孜于古人者為有本爾則夫先生之舉文皆原本古學而出之豈有本詘而末反伸者夫先生以為古學實難非得畢生之功力不能庶幾而又惡世之淺嘗而輒以為有得故每為之鄭重不輕就即就不甚存即存之亦任其流散不甚惜迄于今非得後人之孝思力為蒐輯則幾不能以嬗世所謂超世之珍以求全而反見希非欲贏而故詘也夫詩文自漢魏以還代有流轉然並無畸衺之習竄處其間而今則啓禎至今凡為數變始流于竟陵而今則漸欲以南渡卑薾上拒漢唐獨先生詩文則適當兩變之間前可為鍾譚而後亦足為宋元所惑乃其詩其文一歸于正則豈非先生之學以矜慎而不詭隨以遲重而不即為流俗所轉變哉若夫學有原本則皆足傳後夫先生舉文則趨庭繼起亦既承之而蚤有效矣至于為詩聞之謝氏閒庭能吟栁絮即康成家婢亦偶有起而詠泥中者夫東山北海之間多傳人矣楊母九十壽詩文集序昔陽城為國子司業詢諸生之有親者使之歸養夫人各有親方其羣居講舍亦何嘗謂賢聖之業可以坐致其窮年揣摩初不過為勸禄之具而乃有親莫顧必以待夫他人之遣之而況躬膺膴仕利禄在前其不至截裾亦僅矣予于康熙已酉從淮西歸同人競為詩為介璜先生母太君壽是時先生宰府谷未還也予謂太君年七十在先生當迎養不則或乞養以歸不宜在府谷而或曰不然先生甫赴宰即迎太君至官舍凡三年而以苦寒而返也府谷將報最庸詎知所移之必府谷而不為待之暨乎遷晉陽司馬而後踉蹌而辭去以為五原寒坂必不能置養堂于其地而其後八十之觴則先生親舞侑焉今則太君年九十矣然而先生亦皤然以老家居二十載剔黄揃白而躬披斑斕尚日以承歡為事即其子長㓜皆已筮仕且有佐郡于滇者而先生鎮居子舍以為樂夫捧檄色喜入院乞官為禄仕也壽親于京朝而迎母于軍屯者以仕養也先生初為禄仕而既不能以仕養則華膴在前棄如敝屣當其歸時即慨然以子舍終矣向使乞養之際逆料後此之嵗月甚長則稍待時日亦未為晩即使孝思懇切不能姑緩而太君强飯則稍為逡巡豈必盡歴之寒苦之地而先生不爾也先生有是志必得太夫人之年始足慰先生之心而先生既有其心則必天予太夫人之年而後足以彰先生之孝則是太夫人之年皆先生之壽致之而先生之孝則必藉太夫人之髙年成之然則太君之壽何既矣人生九十不易逢而先生以垂白之年稱觴膝下更不易遘先生輯詩若文而以之承歡夫詩若文則安能誦百一哉忠義録序傳曰忠為令徳又曰忠者下臣之髙行而夷齊餓首陽王蠋死晝皆稱義士故人亦有言有生所甚重者身也得輕用之者忠與義也顔杲卿赴洛陽自謂我世唐臣守忠義然則忠義亦重矣顧經載比干傳紀荀息仇牧而自漢以後累誌龔鮑巡逺暨王堪温序輩赫然史乘終未聞有會萃成一書者雲間朱先生者義士也而工于文嘗讀漢書作釋義力表其程法課諸後進而卬手挈筆往往近龍門之為文振踔皷盪一似雲蒸于前而海潰于後即生人已亡骨肉漫漶既已溉塵土音容歇絶而揮灑所至能使衣裳髭髮奕奕若睹生當啓禎間目擊夫國家之故北南喪亂有相繼而死其事者每憶而書之久之成帙遂題其編曰忠義録間嘗厠史舘編纂前代史文奉天子明命無嫌無忌因得逺丐先生所為書為之藍本而同舘前輩且有延先生于家者嘗述先生苦心殫歳累月將以藏名山而傳其人而煌煌國史業經採擇則千秋已定而先生猶兢兢慎慎出其稿相示先後檢覈一篇之中兼行並竄甚或塗乙至溢格者曰是何事而可以姑忽為也則是是書之成雖諸公靈爽實式憑之然其文亦皦然矣昔人稱忠臣義士在天為日星在地為河嶽而先生以皦然之文與為不朽前賢雖往可進而與之為接踵也日倍明于上河倍廣于下也意象髣髴毛髮動而精英生也人有慕比干之心戀常山之舌而不得其形與似者進而觀是書其庶幾已沈又京行稿序庚午之役兩浙舉鄉試上命編修張君偕民部尚書郎同時主文而先之者編修君也君為予乙丑省試春秋房首得士故事凡榜放而名次適符者比之佛氏之嬗衣鉢若一經相同而又同為一經冠則雖名次不相符而泝淵源者亦必以是為衣鉢焉沈子又京以第三人舉於鄉而其所冠經則春秋也居恒讀又京文嘆又京名下凡比年小試必冠多士其文為逺近所矜式以之當曹溪衣鉢庶幾不負乃從來知舉難厭士多起擲甓之習每一榜發必揶揄訾謷吹斒索隟甚至標帖衢巷以快其􅀢懣不平之意而獨是榜發見又京名無不唯唯稱得人者今又京行稿又紙貴矣三年揣摩去軋茁之陋而一軌於淳而世即奉之為科律且以袪累科積習為文害者特後唐清泰當戎馬倥傯之會知貢舉者猶能於放榜之後即引諸生詣座主宅以泝淵源而予以歸田之人于文明盛開之日亦得藉重門𦕈末以相為周旋所為吟裴皥之詩而深有歉也東臯詩集序崇禎已夘之秋予以童年應臨安鄉試稔知臨安多名士其最稱于人張先生也當斯時東南以社事相争髙自太倉金壇開其端浸淫遍海内而究以臨安為極盛予嘗讀先生社義嘆先生以排比小技造髙而窮深當為三百年來所未有而惜乎驟丁亂離灌園東臯間向之所為人倫長庶各競其華文以為雄長者後且閟而藏之一若銷亡刋落之唯恐不盡嗟乎先生之文其不輕見於世也久矣予向赴召入都時同邑徐徴君與何子毅庵扶杖過予送予于官亭予時左右顧謂老成無幾且不審後來復何幾相見暨歸而故交蕩然四顧無所嚮獨先生年踰八十尚能與顧君侍御丁君禮部輩講徳論道學者宗之為東臯先生然且出其所為詩屬予點定夫予以故鄉牢落將僦居臨安與少時之就試而藉之以為應求者相去有間況以先生之文深自􅌢晦而偶以行吟之所賸漫示學人則今日之誦先生詩與當日之讀先生文較之其盛衰今昔亦復不等顧予聞王通在隋著書河汾間當鼎革之際刻意自藏而門徒仕唐若鉅鹿河南京兆代郡皆能以一代相業盡發其師文以為典則況先生之學久而益顯其在門生兒子輩自能交相傳述以不致阨塞而獨予以七十之年徘徊故鄉魏文所謂鄴宫舊遊零落殆盡者而予猶得以遲暮歸來從容為髙年老友親受其詩而訂之序之則其把筆悵然者也周千仞八十壽序予與千仞先生戚也而為友少試于杭每千仞其兄而平山其弟記曰十年以長則兄事之予之兄先生與平山之兄予皆以是也乃十年以前予為其尊大人稱期頤之觴爾時先生宦髙要也予自視既非盛年而髙要君以杖國之嵗棲遲嶺表往往于稱觴之次拜而思之今予請假歸而先生巋然以八十大耋張弧于庭在昔香山居士作九老之會東都故人無復存者司馬温國會耆英于洛則但敘官閥而故人未仕者又不得與予年近七十舊交尚在梓里諸賢幸不以出處相間而尚齒之會至今未逮先生與平山伯仲把臂入林早已與邑中耆徳時會于幹山之麓以樂贏年然則其年可量乎予將持一觴以自厠于諸賢之間矣西河集卷四十
