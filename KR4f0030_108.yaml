body:
  text: 西河集卷一百八翰林院檢討毛竒齡撰神道碑銘皇清豫告內閣學士兼禮部侍郎雅坪陸公神道碑銘豫與學士公舉制科時學士以官取如朝錯以太子家令見取改為中大夫是也豫以人取如董仲舒以博士見取擢為江都相是也以官取者其志在于出夫既已官之矣亦安往不官而以人取者其志恆在處子大夫從田間來則亦歸之于田間已耳是以明詔所及亦直云博取天下才學官人以示有分别而學士不然制科榜發即騎驢出城自謝闕外不謁相公不題名京兆府不赴五十人衆春園宴不奉朝使先豫請十旬假俟豫歸五年臺臣有以規避劾在籍官者始于康熙二十九年仍補本院官凡五年而遽超遷入台司為副丞相兼部堂尊官越一年告歸一若在官之志之無異于在人者乃又三年而遽以疾卒臨卒謂其子凌勳曰豫與西河君其官與文與行誼不必同而獨同于志禮所云合志孟子所云舜與文王其得志若合符節豫兩人有焉必志豫墓非西河君不可而曰諾特其卒時不繕遺疏不令請恤典不訃臺使以下官及親戚僚友踰月即葬即以同志如豫者亦無從赴義乘素車一哭尚忍靦然為操觚而不可已也公諱葇字義山原名世枋雅坪其别號也吳中陸氏皆始于雲間而大于嘉興其在平湖諸陸悉世官纍爵門閥冠西浙而公為南陸宗其曾祖南京通政使升兵部侍郎津陽公獨以理學嬗其家公幼孝友年十四值江南初下王師之分徇者略平湖而東公父未庵公為鑲黃旗帶子阿什兔所俘夾鈹于項間公哭泣抱持不聽行乃舍未庵公而俘公至京誠順伯者阿什兔主人也馬姓為固山見公異之試以文大喜命拜為父子而使其諸子為兄弟會永平舉人李茂春授生徒于遷安之龍起寺公與馬氏往受學值嵗試公偶應之自遷安至永平縣府二試皆第一馬氏慮其過著也急沮院試不令赴留于旗四年適公兄世楷以開科選貢廷試于天安門外除平陽府通判尋公于李舉人家會之他寺而公父未庵公又以丙戌中式赴公車門親詣誠順伯里第乞放公歸許之乃以世枋名補平湖諸生當是時公兄升南雄府知府未庵公亦謁選為宣府理刑推官公自分守家讀父書徒以浙鄉試不利因改今名援例入國學及赴考即以髙等授內𢎞文院辦事中書舍人遂赴任而誠順伯適于是年寢疾卒公為侍湯藥奉含斂疏麻服喪公嘗曰吾受公大恩無以報迢迢隔三千里外得躬親送死以慰生平誰謂天理非人情哉乃復以國學挾中書銜舉順天鄉試聨捷登康熙六年進士第二人為原官是年以原官京察得一等隨駕至灤州奉恩詔加一級題管內祕書院典籍越一年甄别留任即請葬親假急歸詣南雄與伯兄議其先妣談太恭人葬事會其先司馬公曾在前朝以湖廣按察遷江西左布政司使有祠堂在章江門外而圮于兵革公謁當事清復之值理刑公卒于家遂偕伯兄歸合營葬事于廣陳之千字墟服闋未補也康熙十七年天子開制科詔內外大臣各薦舉才學官人赴部應試公以廷臣薦御試一等故事三等以上悉授翰林官而新令止二等除尊官授講讀外有原官者授編修否即檢討公以官典籍改授翰林院編修充明史纂修官撰成祖文皇帝紀及漕河水利藝文選舉諸志會西南蕩平獻平蜀詩一百韻平雲南表一道凱歌十章上優納之每賜魚賜筆賜蓮藕賜宴瀛臺賜綵緞表裏復于康熙壬戌乞病假歸居于家八年時崑山相公憐公貧不能還京檄浙江布政司使使助以金公却之不受乃以明史久未成謂史官規避公被劾就道會是年庚午舉鄉試即命公為福建正主考官凡薦卷廢卷皆親閲無一遺者越一年轉左右春坊贊善復以癸酉舉鄉試命公為順天武鄉試副主考官新令翰詹諸官儤直南書房承旨書二扇宣至乾清宫閣內賜坐出五臺金蓮花命賦限以韻立賦呈草上嘆賞不置退就南書房出御製金蓮花詩賜讀之康熙三十三年特開豐澤園試翰詹諸官八十九人先設宴于勤政殿前宴畢就園試豐澤園賦理學真偽論亭午賜酒果晚賜茶餅及上親閲卷取公第一且面諭云連次詩文並無出汝右者而從前薦引並未之及始知上聞故多壅也遂由宫贊升內閣學士兼禮部侍郎越數日復宣至乾清宫撰闕里孔子廟碑賜鮮荔枝并頒御筆所臨米芾綾字一幅于懋勤殿嗣此入閣嘗于一日獨坐判紅本七十有竒每啓事暢春苑撤御膳以賜間以病休沐上輒問云陸葇何在耶公感激思有所獻替嘗撰恭陳管見諸疏約數萬言不果上乃充續修唐類函總裁三朝國史平定方略會典一統志副總裁經筵侍班武殿試讀卷官會六師北伐勒銘于黑魯侖河獻北巡頌詞而東南所闢海島自丁卯庚午連科論秀有中式者作臺灣載舉賔興記上倍加器納重以侍從應制恭和上所製詠史詩視河詩宫門聽政詩覽貞觀政要詩時巡近郊憫農事詩觀渾天儀詩無不稱旨如是者一年忽嘆曰可歸矣夜起繕疏略曰臣本竪儒去年六月初十日謬荷皇上知遇遽由贊善升今職雖捐棄首踵不足以酬萬一顧念臣學問本疏而又無寸長可以表見年近七十衰脾頓發儻有隕越其仰纍主知負罪莫逭伏祈俯賜休致則在廷少一素餐之官而在野得增一鼓腹之人誠盛事也疏入摺其本不下公陛辭益切然後奉旨以原品致仕次日治裝鄉人望公者謂公以參知歸里九斿八騶必有異于衆當謀所以迎之而公乘吳船到門會天雨躡長齒屐登岸咸嘆息去公兄弟四人皆友愛以長幼為師友而長與三先公卒少從伯兄讀書于郡東之碧漪坊其同硯者一談太守璁一談給諫瑄一朱檢討彞尊也三人皆同朝而兩為郡守五人者皆有文章名公嘗作正統論五篇與四人論議各不合而論成而皆韙公言其論至今存集中幼聘楊氏及在旗誠順伯為計婚姻將問名侯氏而黃總兵者見公慧亦許以息女妻之是時歸期未可知失此年大恐難為配偶而公謂吾不可負楊氏儻不歸即勿娶已耳再拜謝誠順即誠順亦義之暨公歸而楊淑人已及笄且少孤移居公外宅久矣乃又越公歸一年公年二十一始成婚而先公十五年卒公生九子皆不育嗣子凌勳則伯兄太守公子也公體粹而貌莊舉止有常度雖無驕志無惰容而亦不故為矜嚴謙抑之色性簡坦而厚于與物不媕妸而親不好為深察而無所于汗漫其生平行事雖同室與千里皆可信益都相公嘗曰吾于近人多疑事而獨不疑于義山居常議論不抄變人詞説然又恥附和侃然有至理見乎言間讀書務精察而不計卷帙行文未嘗拘一格顧必中于格嘗曰緇衣曰言有物而行有格格者法也車塗有九軌仍一軌耳至于出處則髙官顯爵日居金馬門而難進易退欿然若無有曰志有在也嗟乎若公者可謂光明磊落君子人矣公卒于康熙三十八年四月一日距生明崇禎三年十一月二日享年七十所著有雅坪文稿十卷詩稿四十卷詞譜三卷御試進呈詩文合刻一卷雜著若干卷乃為銘其詞曰平原肇族以孝行多鬱林而後大于嘉禾派别南阮宗同諸何門閥長盛冠紳偉俄公獨有志如居巖阿家國多故爰尋干戈代父俘纍投身網羅孝感天地朱還泉渦甫侻夾戟旋聽鳴珂摛頌獻賦有如夙哦公家敬輿已登鑾坡復就制舉中拔萃科後先嗣響宛出一窩况逢聖眷夔龍賡歌屢宴承明頻居馺娑躬近銅鶴杯銜金鵝日判紅本大若蚪蝌而乃告歸急流回波行乏雙引車無八呵病鮮餽櫝喪誰行儺髙官顯爵奈非志何幸其傳文尊于刻犧金液常燦玉粹不磨矧行誼髙猶登陂陀動而益上與雲日摩即此可信逺近罔訛曾母三告亦不投梭展也君子崇山大河雖嘆馬鬛何須封駝祗愧微文交螭未踒以代豐碑從東南過西河集卷一百八
