body:
  text: 西河集卷五十九翰林院檢討毛竒齡撰題題王文叔詩頁子文叔身隱而文遨逰吳楚諸侯間吳楚諸侯爭欲傳其詩因刻詩人見之者以為近于襄陽云少與文叔共鉛槧長各遊散不相倡酬者已二十年襄陽少七律而文叔偶然以七律示世非有殊也向選文叔詩世人爭誦其排律百韻近文叔製樂辭一卷陵轢漢魏文叔不乏他體猶襄陽不必少七律也夫文叔豈僅擬安陽城樓詩哉題宋拓聖教序帖宋拓聖教碑海內能藏家絶少大抵小斷便佳耳此本鉤畫清穎風骨朗然真神物也使君為北平趙君所贈趙君云嘗得之劉帥幕府帥平豫章金虎符軍全活兩儒儒懷之以報蓋用此效生者儒不與俱沒于軍帥不使終溺于幕皆有神助乙已二月日題雞山諸子五言詩卷越絶書載雞山為句踐飼雞豢士謀伐吳處徐生正我王生子懷偕二童君讀書其中因作詩有所感也正我為故友伯調長君子懷曾從遊故友來君北沙門下童在公明府駿止進士每稱其族人二童君工詩其詩之妍好無足疑者近士相見比取詩文為將摯全詩卷繁即先録五律當紵縞之用苐昔人謂五古不可有律詩氣五律亦不當有古氣此妄語耳五字昉于漢魏漸趨三唐雖曰律詩實古詩之歸也能為五律詩他詩可知也某月日書題雞山諸子七言詩卷七字律詩自唐神景迄開大有如晨星中晚稍具矣宋稱極備逮明而勸酬贈復非是勿作豈時會使然乎然而昔以少見工今以多見拙又何也然則多固未可恃矣雞山諸子既出其五律問世復取七字詩彚為斯帙雖偶然故不得多然而其工存焉吾友沈子先揀弇州七字律憎其浮雜曰安用是夥夥者既後閲贈戚將軍作始嘆曰能如此即少亦何害則夫讀諸子詩亦安患少哉題周子鉉所藏董尚書臨聖教帖聖教終是唐人字畫苐于右軍清真大意如咀鹽見滷妙有尋味若董尚書臨聖教則又如下豉見鹽轉本轉脫然要其不為法縳不為迹窘自具名馬軼步好女卸頭之致則亦能矣往朝美叔謂黃涪翁學右軍書僅取其韻至如戈波點畫殊不相似尚書有之豫見尚書臨聖教凡四本唯嵩山廟市所見與此本差似此本幼見之黃刺史家今復為子鉉所有子鉉妙書法得此恍右軍之洛得梁鵠書欲令書法不精進不得已某觀并題題吳夫人評閲明史卷首陳何亟稱吳夫人善文且饒腹笥豫與商生遊十年而不知其內家有是雖善匿抑亦稱者過耶丁未春其闥左有牡丹一本向當豫寄席至是雖邇闥但花時仍假一觀逮觀則臨軒覆茵圖書燦然就中明史半部丹黃初下夫人筆也其評隲前後具見稱量書法婉麗類衛櫟夫以有明人物言議概節久未論定而夫人以閨中較觀可感已夫人名芝楨其兄卿楨弟棠楨俱有文世襲司馬勳衛如遜抗之有機雲也閲一歲豫內陳何假史觀因題之何知狀題身後芳名卷子身後芳名卷者丁孝子東阜君死孝録也萬厯辛已臘孝子之父病胏喘已中死法孝子禱于除請身代之歲朝又禱匿其文紙幣中俗歲朝謁神焚紙幣時孝子之父分必死顧不欲失謁禮輿而前見紙幣中紙掣讀怒曰欲我依孤孫耶投之别火越十五日上元又禱如故距禱之十日越二十四日而孝子病孝子初未嘗病胏也至是病胏喘中死法凡五日死當是時孝子凡三禱禱之文皆不可得而見也及乎小祥孝子之父敇諸孫收父書撿故札中得禱文稿一廣尺詞旨哀酸字如大菽而書疾旁有點竄則至今存焉豫傳節孝衆矣去秋程孝亷以節母狀來稱母刲臂肉啖姑而先禱于夫之木請延姑三年其後果三年而姑始死也夫古禱無必信者而今且一信于節母一信于孝子曰非信則無以别夫世之為禱者也且勿使自便者得藉口無用萬厯癸未山隂朱太常既為之傳而一時名公巨卿爭為文以誄以弔以頌以述凡若干篇邑禮部郎孫公為之題身後芳名四字合一卷越百年而歷世相嬗幾燹矣裔孫日宣者攫于火重為裝潢今紙尾有焦則燹之為也夫止一稿也而初不盡焚于紙幣今復不揃于火天之信孝子何如耶康熙乙卯遇日宣會城語其事又一年而以卷屬題甡盥手卒讀并題如前題三孝卷孝無成名而有成性士君子既鮮克厲而一二閭巷椎朴之夫知本不慮任其性而為之雖未盡合然亦未可非者豫久聞金閶有沙孝子其先子升曾于先朝天啓間擊魏璫所遣緹騎被逮幾死以末減僅存其軀者若干年姚孝亷為沙仲昌傳謂仲昌善娛親有似養志蓋沙氏聲名數起矣今沙氏三孝子復能剔臂和糜築廬守隧以各見其志豈亦感子升大義仲昌孝養而接踵而興者與當先朝輯會典時世無敢以畸創之行仰干功令故廬墓刲股皆目為非法抑勿使上然而居廬倚壙刺肝鈹骨者所在都有夫上不以是旌而下之為之者衆上必以是置法而下之為之者必不以是而少有所却則是不求旌不畏法而為之也夫不求旌不畏法而為之者性也孝子見性矣豫寓金閶客有携三孝卷屬題因題此世之徇孝名者可監耳題鳬亭曇廬鳴和篇首豫渡淮交鳬亭曇廬父子最晚然而最親嗟乎吾能忘鳬亭與曇廬也哉鳬亭踞東湖之勝傍亭而廬即曇廬豫寓一漚亭與相隔也顧豫過亭廬必留詠亭廬過亭亦必為間歌易云鶴鳴在隂其子和之詩云叔兮伯兮倡豫和汝夫亭廬為鳴和亭廬與亭而敢忘唱和焉題湘溪唱和詩昔北來道人與支公竺法深集瓦官寺各有談義當其時則長樂在焉今放公卓錫淨土而蛤公從兜率還湘溪會諸路道人各以瞻平陽靈骨于是道場兀公中嵓節公俱間道造訪一時天龍咸集斯地能無吟乎諸道人嗣法平陽東土偶會真不減會稽遺事獨豫不能從而諸公懷豫且録豫和詩以附卷末嗟乎諸公之不忘長樂如此題秉鑑圗豫遊巴城戲為駱明府夫人作麻姑圖暗公過明府私臨之歸暗公筆墨秀人間而乃為是可惑甚矣豫同武孫公叔訪暗公于碧峰寺強豫畫豫辭不能出所臨畫揶揄之因大慚便復作此暗公方登文選樓且夙善藻鑑為秉鑑志贈也十日前適為櫟下老人戲墨題曰生平無繪學戲為者裁苐三程耳此又四矣戊申十月日題止園詩方止園踞東湖之勝幽清渺漫豫向思賦之未能也大宗居其中其為詩如輞川杜曲優遊日涉遂領佳要諸如嵓根瀉瀨浦口回橋卧內山光空廊人語諸句此中人語言矣大宗嗣兵曹家學從西樵遊所往來多髙人軼士是詩之傳亦欲得和詩如裴秀才者可共題之某題題雪中遊勝果續詩石公避地于城東之東園天大雨雪四顧而興生負蓑渡江登鳳凰山絶嵿逮晚止宿勝果因勝果有詩故續詩石公謂豫云勝果果勝其通天望月諸巖率皆有前人詩句鐫之巖間雪中洗觀之滌滌然豫曰可以續前人矣短至日題客詠豫與天章遇于驛亭時朝雨初過負弩者訶之豫方倣徨起而天章吟不輟也既而與遊于春申祠下同遊者悉困升陟而天章搖筆思至腕落天章何如才矣謝客兒有遊覽詩讀者謂宜于作客故名客然則豫之不宜客也久矣雖然獨不宜讀客詩耶題汴梁竹枝詞竹枝為巴東折竹之音北人勿宜也自鐵崖倡西湖竹枝而後之詠方土者輒效之于是有汴梁竹枝詞豫數經汴城見輪蹄轣蹢攘攘都會往欲諷隋唐以來汴州東京諸勝而蹤迹洇然杳不可得讀蒼崖諸詞抑何渢渢有餘思也南人好捉搦生為吳聲每欲效變吟作幽并馬客以為豪快風之自南而侵于北也聞竹枝而有不廢然返者乎題淮隂郭氏有筠亭詩卷子郭子錦伯以有筠名亭甲辰十月毛甡登其亭而觴之雜坐若干人乃接風日于筠中風間日流郭子顧同遊而為之賦詩夫淮南招隱之地深林叢薄自昔所推而今已望之而曠若無有區區有筠亦何足致人詠思而吾不謂然吾嘗勞于其塗矣車遙遙以長征或僵或暍不必珍囿之在前而平臺之在側也但得都亭而止之猶宛然袵席今淮流雖夷曠苐當淮市􅀈卑北南轣轆之際而偶登斯亭其不動山中之思而願為淹留鮮矣夫錦伯者楚人之材也余處幽篁者招隱之句也路險難而後來者遊子之悲也以楚人之材當招隱之地而又厠之以路險後來之子即欲不賦詩其中而為之題之奚可焉題羅坤所藏吕潛山水册子壬子秋遇羅坤蔣侯祠下屈指揖别東昌坊五年矣新詩已能到劉河間平視近代邊徐一輩獨其文大率紀所遊雖小品顧善摩畫每讀一首如展畫一幀及飲酣後探得槖中所擕吕潛畫則居然似也吕畫妙人間不能名其所自來坤藏之如藏其文者坤曰吾與别東昌坊後南經苕霅北過燕代見多山水始知名畫之妙一如司馬之為文必多所閲歷始得精到然則其文猶是耳題詞托園集題詞自律文興而古文絶書義興而小品之文亦絶王氏矜式其不能下殷源之籖久矣托園盛君以書義起家每試髙等食下士之祿而特以司成薦早策對天安門遽為擁臯比而服介幘遷轉槐廳者越二十年乃所至慷慨落筆成文章而尤傾情于小品昔所稱長篇固自佳短篇尤超然者非耶庾肩吾箋奏數行過于駢麗而眉山雜文即又不能無坦率之誚能緣情體物不事轆轤而句鎪字剔仍渢渢若御風行則雖托園數畝地而謂就之有千巖萬壑之勝誰曰不然孫天驤試文題詞天子以大賚選天下士貢公車門孫子天驤考仁和第一領選將由長安出其所試文以質于人豫讀而善之夫以天驤少知名曾作五經七藝補博士弟子隨試髙等食下士之祿其席先世御史臺後嗣龍山十洲諸公之業猶惟日不足則亦何有于是選而正不然者天驤孝于親友于兄弟其惇誠慈慤篤于同師同序而見信于比長閭尹之良者下里而澆澆矣朝廷重實學六德之奬必先行之京師首善之地而天驤得遊其間吾知見其人者即未見其文猶且起而模楷之况見其文也與江園二子詩集題詞自春秋詩亡而雅頌已衰洎陳靈而變風息然尚有賦比興可尋求也故離騷賦也而近于比子虗比也而近于賦枚叔之發東方之答賦也而雜出于比興故都尉辛苦之作媫妤哀怨之音莫不原本風騷感歸六義彼搖蕩性情形諸舞歌指事造形窮神寫物非因情喻志無以見端寓言書思何以竟體故夫鍾嶸之品初古猶曰建安以後元嘉以前𢎞斯三義酌而用之使専用比興患在意深但用賦體患在意浮而殷璠之選近今亦曰自大同至于天寶理則不足言嘗有餘都無比興但貴輕艷蓋比興賦者意之所生而理之所立也意生則文明理立則調起庸音雜體棄于髙聽挈瓶膚受終涉平流良繇情文散煩六義未舉故曰賦比興者風詩之則也江園二子以終賈之年賦班揚之質經緯文質遺思粹雅前古迄今各擅標勝譬之歌者依永而就班舞者循聲而蹈節爾乃託言體物比晰連類玄覽者無直情耽思者無傾訊抱景光而彈寂懷聲響而招鮮嘉會等諸南皮懷人優于栗里望逺擬霜閨之作將離賦纍臣之辭流連世故朔客吹哀感慨亂亡衰伶淚盡已足比蹤楚謡接迹夏咏斯誠感寄之殊軌興觀之能事矣夫江園者二子之所居也二子言同簠簋行並車轍友朋之樂渝溢伯仲其髙言嘆興懷憤所至亦或應如拾芥契于合竹故其所著言偶爾鱗輯已若二龍蜿蜒于雲間雙珠隱約于合浦吾言雖輕定亦不謬若夫才能定辭遽許入奧我睹淪平彼觀警策揮萬有為已麗置六義於未服竊資遺沫轉相矜詡口衆我寡孰能奠之記室所謂膏腴子弟淄澠並泛殷璠所謂勢要賄賂輕薄相取此固品目所羞稱掄録所不道也黃皆令越遊草題詞吳門黃皆令以女士來明湖有年既而入越有越遊詩其外人楊子云皆令渡江時西陵雨來沙流溫汾顧之不見斜領乃踟蹰于驛亭之間書奩繡帙半棄之傍舍中當斯時雖欲效扶風槖筆撰述東征不可得矣逮入越而舉止稍定始慨然懷悲去故就新喟情自違酌酒弛念於是有遣懷諸詩顧唱酬贈答十八九也豫曰豫鄉閨秀梅市其最也以客居之美千里比肩迭相賡揚此甚盛事當别録梅市倡和為一集而存其所餘乃為斯卷夫越遊者遊越者也越多名山水雲門若耶以皆令當之應必有異乃用貧流離不得已而寄迹于書畫之間既已善疾藥鐺潲然減良諷也益復為名家閨闥談宴廢日鄉使皆令居明湖有年往來吳越不以委璅攖其心得怡情物感放志玄覽嗟乎其所撰述吾安知永初之有七非黃氏賦矣續本事詩題詞自祈招止王左丘志始墓門負子屈氏更端于是韓嬰有記實之文劉向得徴情之序此即後人本事之所自昉矣顧漢魏以來代有蹤迹而旁引曲述迄無成本都尉録别附見史文郡掾贈言彰于詩品晉樂載桃葉之詞吳調列明君之曲從未有彚所見聞裒為一集如唐孟啓所傳者蓋唐人為詩猶近風諷有其言在此而意在彼者有題鮮緣情而文實多寄旨者自非晰所從來用為標識則緑珠之篇無與左司息媯之吟但詠楚事幾何不倫于白華之疑采唐之訟也夫切類指事所以附理起物擬議所以植情故詩為樂體事為詩志無疾而呻吟聽者謂其不能吟無指而怨刺識者謂其非所刺蓋物觸者理通而事形者志起也特録事之文藏于篇什本始遺軼徒具諷嘆而近且大雅不作載述未聞吳江徐子電發因有續本事詩之選所以備輯題序嫓諸記事豫惟是近代以來時移物更景與會遷其間閲歷遭逄感慨都有南皮酣飲不廢盤桓西塞流離自傷羇紲王粲起登樓之製陳琳成記室之言塞姑昨日都護難歸驛騎明朝逐臣將去然且世際因革遇有興喪就其上聲言聞變調豈無帆開牛渚歌用莎持人在彭城道逄播掿絶弦聲苦猶懷五日當年破鑑光分虗過上元子夜又况才人淪落意氣慷慨髙逸未就怨憤斯作汾隂無西顧之悲明河增北門之誚簾前燭影歲月依然北闕書成故人休上天下有事故流易坐丁憂嘆如今日者即微斯編亦必以為序傳之當興向嬰可與嗣矣刻薑左翊文稿題詞夫絶節髙唱凡耳勿悲端綺芳華庸目勿善哲者隱心于鉤曲愚者飾情于曈曨譬之仰翔禽于千仞緒晰毫芒俯泳鱗于三涔坐遺泃沫端木得其平林顔氏遊其深谷所繇來矣然而眇志瘁深漸臻娛樂抱景者拊形而嬉懷響者循聲而逝始躑躅于樊墻終翺翔于寥廓桃花既盡忽睹桑麻蓮葉乍舒遂通箭栝鑿龍門于天上開鳥道于雲間使夫耳目攸窮心神欲絶匠氏運斤而不知屠者藏刀而若失過行雲之譎詭宛御風而逍遙此雖窮年皓首竭智殫精揚雲思絶于攡玄周子韻成而戴白猶然七襄未報于牽牛五楘難調于乘馬左翊以絶代之才為遣時之製左圓右方不煩餘指中紺外素罔襲前裘啓巴蜀于行間泛蓬萊于紙上峙東頭之屋比迹士龍押西京之書追蹤司馬枚臯辭賦並古為雄叔寶風流于今不墜黃絹勒曹娥之字朱花開江令之辭故偶然而掣筆亦飄颻以成文斯固謝家之鳳羽王氏之龍驤也自耻學殘况當才盡已興減于南皮復心慙乎北海竽笙濫耳驚聞嶰谷之吹絺綌為膚羞暏錦江之濯爾乃妄希珠玉漫倚蒹葭乍捧新編頓生夙感猶夫魯門雜縣聽鐘鼓而悲摧洛水魴鮞藉風雲以起勢得毋拜手于嫏嬛遊神于板桐者乎阿蓮瓊枝集題詞乃若蘋生調緩不如折楊苓落聲亡原非續竹因之房中起送逺之音封內識歸來之怨雖南朝學士雜稱曼辭洛陽宫人踏歌新體猶且普通變聲于五引海山嬗調于八闋則亦風會之攸趨淫靡之漸逮矣夫翰林憶秦司馬思汴六季餘也故主呈詩相公遺曲三唐軼也洎乎大晟增諸宫而體弛政和翻新譜而節變溯其沿革厥有升降夫諷嘆所及限于宫調歌詠既成辨在絃管曩者漢宫近調編諸府丞秦樓舊詞填之河卒故栁綿以婢響增哀松菊唯童歌是樂自夫順郎失葉底之傳樂世亡桂株之唱江南花落不復逄君塞下霜繁徒憐送客然而舍伊羊之可叶藉句字以爭新偶然抒感自具章繩凡屬推懷豈無填綴且夫按節調宫疏絲滌管樂人之成也究體崇庳觀風正變學士之功也當其美人既往荔草興思孝子將歸稷苗生感鬱孤臺下多江流不盡之悲長樂宫前作春去人間之痛亦復有情誰能自遣爾乃按崇庳以定體依正變以成聲假玉樹之哀情傳金荃之靡韻晴郊挾殘酒用斥酸詞太液有翻波袪其險字摩訶驚皺水之風沙際重回潮之夢豈無瓊樓玉宇感諸內庭桂子秋香懷來異地則夫身慚大阮誰得當微雲佳壻之稱爾過潘尼何必減花影郎中之譽陸藎思新曲題詞夫新聲乍起僅有黃華餘歡未亡始歌白紵故議郎存協律之思主簿起定情之則三洲將變阿子空聞一曲相迎就姑無恙此非情有固然誰能思而不已間嘗誦南粵之新語想雲間之麗材東吳名勝首指橫雲入洛風流羣推如海是以甘泉未賦綿竹誦成梁甫長吟分桃念少抱臨卭之瑰質懷沅浦之離憂雖聞歌輒喚王子堪憐顧曲多情周郎自妙然尚以巴東之激訐為濫耳江南之調弄為變聲內人舁出不復霓裳弟子部中誰工阿鵲因復寄指尋橦編情舞柘夫搗麋香減紀摩支之散辭折竹音傳倣紇那之間韻秦川一半獨想夫憐江上三臺總言客到自古聲律攸通原關至性謳吟相嬗雅稱才子故魚家舊譜訾其點拍才成都子新歌每道典刑猶在况五言一遍調韻頗遒幾疊六么管絃斯急其中因革屢殊短長互掩乃以我眇思細翻宫徴豈獨龜年新樂傳李白之宫詞何勘舊人誦王維之絶句而已薑肩吾效金元樂府題詞且夫大晟既變遂肇升平㸑舞相仍比之欿假此雖科泥拽棒别有當家然而按徴調宫總歸作者故樂府繼康衢之遙葉兒為梨園之散摸魚戀蝶爰作俑聲白馬王睢爭先創體若夫解元失絃鞉之譜花郎亡板沓之傳大都甌海尚多戾辭宣城臨川豈無劣調薑子肩吾思緩聲之當續假麗唱以相宣鬱輪袍不作縱耻王維醉蓬萊未傳亦懷栁七顧乃聽風聽水識所由來序散序中詳其沿革長卿多别製都是髙文奉倩有深懷原非妄想效感甄之能賦幾慕宓之可詒熊湘張樂將寄洞庭青草之思帝渚吹笙願發澧浦紅蘭之詠遂使空舲峽內兩度聞歌嶽麓山前一時詭語夫羇臣善諷引唱巴人明審聲矣婺婦沉寃急呼都護揚妙節矣惟公瑾之諒曲多方故李煜之製樂有本肩吾辨定鐘律别有成書釐晰宫調盡破習論解趙人之牛鐸以諧鐘取蜀中之魚桐而擊鼓宜其尋聲按節窮極微渺况乎學滿辭山才通曲海邉城畫李益之詩宫掖繡元稹之句機邉紅錦久藉鮫人酒肆烏衣已隨龍女則其髙唐薦枕何必假房中太傅之名玉笥為歌誰得進曲子相公之目固已騁星渚之幽歡攬妃巖而咸媾矣題端為吳君卿楨合諸君集滕王閣賦詠題端若夫登臨抽好古之思羇旅發將歸之什則黃陵峽下極望生哀白岸亭邉詠歌自好况南州髙士已詣陳蕃北去孝亷往留陶尉此豈猶六軍駐節偶賦層樓九日開筵故誇勝會宜其俯章江而懷愁感滕王而興嘆為諸君秋日登北山懷友寄答題端乃時當九秋集兹多士登臨騁望觸􅔊增懷淮南慕類援叢樹以淹留江畔懷人把芳椒而太息劉遺遷白社當時傳雲靄三章應璩去西園何處見月明千里為張驃騎君朔遊贈復題端一江新雨時懷淥波南浦之詞萬里長征遂有吳馬北風之詠夫丁年作别半在干戈馬上相逄難憑紙筆在昔河橋日暮故人各執策以贈言只今塞北春還遊子復聞笳而流涕則夫射上林之雁應有書來啼白下之烏寧無腸斷為商景徽閨秀詩題端景微字嗣音商太宰季女徐大司馬次君咸清配也是以纂繡床之五采著處能文掃黛碗之餘青畫來成字才名踰謝女不羡因風栁絮之辭夫壻是劉臻自傳元日椒花之賦西河集卷五十九
