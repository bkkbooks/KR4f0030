body:
  text: 西河集卷一百十四翰林院檢討毛竒齡撰事狀奉天府府丞前禮科都給事中薑君行狀君希轍浙之會稽人其先五世皆列卿明崇禎十五年君以國子舉北京鄉試弱冠祖禮部尚書故在朝父工部都水司員外以奉使張秋得罪君出之請室入本朝舉人循例敕受職以杜規避除溫州府學教授值瑞安縣闕攝縣事海冦大至舟尾髙堞樓丈餘俯瞰而炮君募乞兒縻印牒于屨請府兵乘間殺而出大破賊衆于齊雲江順治九年遷直𨽻元城縣知縣畿北災五種不一熟飢民牽子婦就食日以萬計時八旗張逃人令甚嚴所至閉户雖僵仆不使傍櫩下君憐而收之察其雄非東音牝耳無環穴使大墾隰北荒地地闢而飢民以活顧縣多部件經時難理君決之如流水凡督使及諸道營將公同視折以君當皆是君所受決皆不恨三省諸詞多有願質元城者督使嘗曰元城能吾欲覓元城一詞再訊之而不可得也因以尤異召為工科給事中會畿盜充斥探丸鳴鏑無虛日勢家隂相杖為賊囊槖前撫請莊頭廬兒概行保甲未果至是發覺賊曹供義王家人買馬資賊而廂白旗丁為之因緣舉朝側目不敢問君獨抗言義王孫可望無橫草功徒以去卑辱奧泄來歸本朝宜湔滌不暇尚敢收亡命作關通賫盜之事至身為旗丁豈復應桀鷙自居抵冒殊扞而刺姦簿理昭昭如是夫盜有根氐主者是也盜有黨羽憑藉者是也臣請破柱索義王家人及旗丁主子窮詰之以清盜本上為下其奏飭部臣嚴議抵法聞者皆屏息嚙舌去時上厲官方以廉貪為殿最巧吏並公借罰鍰以濟其貪嬌刑曲罰公行追比君曰是暮夜而白晝矣吾向吏元城未嘗入一贓錢也而公私厝費無所誤今何便至此乃于題恤旱災時極言酷罰之弊謂年嵗不登咎在貪吏貪吏營私尤在酷罰向者贖杖分别有力無力其所輕重不過銖兩之間耳嬌虔之吏猶或畸重以峻入今者贖杖本輕鍰而倍五倍十不拘成數小不應而敲朴隨之是罰以省刑而反濟刑矣且其鍰未盡聞也近者直𨽻撫臣疏稱昌黎贓錢隱匿不報則其餘可知矣夫以大有之年需惟正之賦徵求稍急猶且痛剜肉而嗟補創况當水旱頻仍之後加之二麥不升之時鬻兒賣婦尚糊口不給而加以重贖繼之敲朴民何以堪乃飭還前例永遵不改會西南方用兵舊給馬匹有期限不及期而倒斃者有賠樁銀兩南方風土熱水穀不良易于顛仆加之征行之際汗血勞苦請大江以南概減其半而征行之地盡蠲之然而軍需孔棘南贑撫臣報曲江始興兩縣知縣同時雉經廷臣皆相視咨嗟然莫敢言者君曰人誰不愛生况見為郎官已邀一命而輕生若此必有大不得已于此者夫大兵所集米豆草束槽鍋口自所必需然必先時傳檄使之豫備應用什器明開數目如一槽飼馬可容四匹一鍋更番可煮擔豆十馬芻稈祗用一本縣不足濟以他縣事訖交還不許隳壞至于水程舟楫陸程􅓅轎亭餐驛飯各有限度此外則一絲一粒無容需索否即坐主者以放縱之罪則供億雖艱何至絶吭而乃以前軍猝至之頃搘拄不及遂至捐僨則其立法之不豫亦可見矣夫行兵不嚴責在督立法不豫責在撫二者必居一于是請咨察前件并圖後效上深是其言既轉兵科右給事中旋轉左無何轉禮科先是諸王大臣立會計法凡錢糧完欠每項各限十分以定考成條件煩賾動輒罹網有司救過惴惴無數月留者君請總歸十分但以一嵗之徵收統完一嵗之條件頭訖既清稽核亦便嗣此部計稍紓有司得久任不致輕去又恐查欠未定應停升轉者或不經稽核分數與例符合而先咨停止始行稽核保無已停之官其拖欠未及一分或已欠而即行補完或欠有公抵相應免議者而一經停止則部撫咨覆動越年嵗雖不停已停過畢矣是必先查分數而後停升轉至于完欠責成祗在藩司府州縣官于諸道無與嗣後稽核諸完欠不并及諸道永以為例顧當時升遷之法雖有一定苐旌功奬能多有躐等如拿獲逃人開墾荒地漕糧報竣則不論俸滿即行躐升君于遷兵科時力疏止之謂此三者皆臣子職守所應為之事倘玩泄不舉則自有罰以懲其後而紀録不已又復加級前已驟遷後復踵跖此非國家勸賢意也夫此三者非有異能卓犖可以膺不次之升者也徒以地當畿輔官近轉運逃人漕糧得以施設而推之他省即不能矣且國家縱乏人庸詎無勸農顯善敦禮興讓勤兵訓旅有什百踰于是者而皆未聞有凌躐之舉獨于此三事斤斤加意如幸進何又其時有以捐俸為紀録者君曰捐俸辭利紀録勉名固亦良吏所可為然而營俸外之金冒非分之級漁地斂民夤進不已是紀録非旌賢捐俸亦奬貪也是豈盛朝鼓厲之初心哉方是時世祖章皇帝急于求治其于闢聰達明惟懼不盡而君又公忠敢于論事雖骨鯁倜儻每優容之故嘗得以盡其言前此太僕少卿吳允謙以參政內升君已劾其貪列其贓私下部議法而山東兵備道陳德容由海冦歸命降授今官而君復劾之謂駔儈穿窬不當使冒濫名器為用人羞至是進君禮科都給事中復糾禮部巢雲林及主考莊朝生科場指詐諸事而淮倉主事熊焯𣙜關病商特劾治之會上以災異求言君連上六疏一時風采卓越無如君者今天子登極君以禮臣職掌請諡號條典禮外謂天下無事惟逋冦鄭逆以東海一隅遊魂未禠遂使江浙閩粵沿海郡縣所在戒嚴墮名城毁要害東南海壖貽纍無已是豈賊之必不可滅抑任事諸臣不勠力以馴致此也夫海賊之衆不抵東海一郡縣也其揚帆得意不過乘風汛之便逞剽竊之技者也彼其寄身命藏妻孥者獨厦門區區一中左耳夫中左之距漳泉海而不過二十餘里何難多置艨艟相機進勦直入鼠穴而江浙左右則各謹守禦以防其衝突是閩兵任勦江浙任守而勢已定矣于是造船艦以馬足不蹈海也練水師以陸兵未嘗操櫓楫也備矢石以摧其鋒設犄角以遏其軼置應援以制其變選遊哨會哨以偵其來去賊衆雖狡斷未有不成擒者時疏入值世祖皇帝不豫已奉密旨下該部議而逡巡未決暨皇上親政西南再闢遂決計行罙入之舉距君所請日已閲十年前後廟算如合契券今已犁其族版其民郡縣其土地東漸之化遂越溟渤然後知君言之果先見也君內升後遽回籍時水部公尚在堂承歡者八年至康熙九年始赴都候補值京堂闕員上諭先皇帝言臣必能皎鬯舊事大裨于今政仍以原官補數月每入侍必溫言禮之嘗于班行呼君名詢君鄉居君乃具三疏一請增科員防耳目壅蔽一請撫臣仍管兵防地方竊發一請緩期奏銷使催科不迫會浙撫范君承謨以疾告業奉有俞旨而君疏留之乃由浙遷閩以總制監靖南軍遂殉難云既而補順天府丞以艱歸服甫除會奉天府丞闕上念盛京根本地須君往就家補之三年以病請假歸杜門謝賔客立宗祠義學講習禮教之有裨于鄉邑者康熙三十七年五月十二日無疾卒西河太史為狀曰汪司成有言司諫主封駮侍御史主糾彈今則條陳事宜一里師耳惟君不負此官云嘗讀君疏稿凡四十餘篇骯􅗣激切得古諫臣風其所抗疏必中綮要非大關國事民命必不言言不令可行不進且相其立意欲挽世鍥刻而歸于廣厚故其疏刑罰惟恐失入疏清丈田畝惟恐溢故額疏舉人揀選法三年二年惟恐其不早疏勘合惟恐不復至于審法律商酌流徙其踟蹰于寧古塔席北之間徘徊悱惻宛轉囁嚅每一展卷未嘗不流涕也言事至此賈長沙陸敬輿瞪乎後矣若其居鄉之善自宗族鄰里鄉黨以及朋友無不藉藉然豫曰賢衆人亦曰賢非阿好矣洪贈君事狀君諱超字玉宋别字逸庵杭之上庠生也先世籍樂平洪氏自宋忠宣公以徽猷閣直學士賜第杭州其仲子文安公與兄尚書右僕射弟端明殿學士同中博學宏詞科而公以同知樞密院事就賜第家焉入元有浙東安撫使徙居上虞至明成化間襄惠公諱鐘仍以杭州籍中乙未進士官太子太保刑部尚書子諱澄君髙祖也由𢎞治庚午舉人授中書科中書曾祖諱椿政和縣知縣贈都察院右都御史祖諱瞻祖萬厯戊戌進士歷官都察院右都御史巡撫南贑以平賊功贈少保兵部尚書父諱吉暉字星卿萬厯戊午舉人中壬戌甲戌乙科進士未仕而卒乃以世父諱吉修字真長者為官廕生無子以君為後顧君九嵗時即遘母黃太孺人之變越三年而星卿公相繼逝當是時少保公猶在也然君以孝故養生送死備極哀瘁乃未幾而事真長公真長公以少保公仲子負才學不屑屑官廕屢試不售即發憤成癎疾而君以嗣子扶侍醫療不離寢餽者幾二十年君弟潤孫者有學人也感兄孝裁簿記君事君見驚燬之特君席世寵之後如在蓽門少保公亡八年始葬星卿公遽慮居出已所住房推以與人且少保公無祀田會叔父載之公為德安推官遺命以公産所贏分諸兄子而君力請之叔母得置祀田使忠宣以下共享祀焉君少以文名性敏給博通經籍注四書周易通鑑諸書皆各得領要而獨薄於仕進大學士黃文僖公者君母黃太君弟也雅重君每邀君至邸第晨夕講議而君亦每懷渭陽之痛數往依之文僖曾以子翰林公女配君三子而其女早卒雖重君未析其隱也及文僖豫告所居邸第將取值他主舊例中價並所值而輕亦半之此第值千金則中者例三百餘金固授受以來沿至今者今已牉所羡作白薄資矣餘者皆君有而君並不取益之值中文僖驚曰曩值止千金而今翻益以三百何耶鄉大吏為臺臣所糾丐君導地君直辭之曰大吏無罪當事已白之久矣丐者曰果爾何不即以此為先生壽君怒曰子以我為誆金者耶文僖每為人言之其介如此君居鄉和厚好周人之急與物無忤而方正自持里中有倡邪教惑衆者君力排而痛斥之或云彼固多力子縱不邀福獨不畏其為禍耶君曰吾見其立敗禍且及身矣能禍人耶必有禍者則吾請當之既而其人置於法稱先鑒云君長子潢以髙才蚤卒次承祥中康熙戊辰武科進士已授寧夏鎮守備又卒又次承禧承祐承禎皆諸生有名西河集卷一百十四
